front:
  text: 朱文公校昌黎先生集卷之三十二考異音釋附
  hash: sha256:3deff84d67b92bdda8fffe4d2ed5421763beba1d20b62516496d74139eaf4fd3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_032-1a}
body:
  text: 碑志司徒兼侍中中書令贈太尉許國公神道碑銘韓姬姓以國氏國下或有為字今按以國氏春秋傳語其先有自潁川徙陽夏者其地於今為陳之太康太康之韓其稱蓋久然自公始大著公諱弘公之父曰海為人魁偉沈塞以武勇遊仕許汴之間寡言自可不與人交衆推以為巨人長者交或作校方云以上文自可言之作不與人交為是今以下文長者言之又似作不與人校為是更詳之巨上方無為字或無以巨人三字而為上有之字或併無以為巨人四字官至遊擊將軍贈太師娶鄉邑劉氏女生公是為齊國太夫人夫人之兄曰司徒玄佐有功建中貞元之間復出夫人字或作齊國功下或有於字為宣武軍帥有汴宋亳潁四州之地兵士十萬人公少依舅氏讀書習騎射事親孝謹侃侃自將不縱為子弟華靡遨放事侃侃或作侃侃字與侃同縱或作從出入敬恭軍中皆目之嘗一抵京師就明經試退曰此不足發名成業復去從舅氏學將兵數百人悉識其材鄙怯勇指付必堪其事司徒歎竒之兵下或有將字士卒屬之欲切心諸老將皆自以為不及方無皆字司徒卒去為宋南城將比六七歲汴軍連亂不定貞元十五年劉逸淮死軍中皆曰此軍司徒所樹必擇其骨肉為士卒所慕賴者付之肉下或有而字今見在人莫如韓甥且其功最大而材又俊即柄授之而請之於天子天子以為然遂自大理評事拜工部尚書代逸淮為宣武軍節度使悉有其舅司徒之兵與地其舅或作舅氏當此時陳許帥曲環死而吳少誠反方無而字自將圍許求援於逸淮啖之以陳歸汴使數輩在館公悉驅出斬之選卒三千人會諸軍擊少誠許下少誠失勢以走河南無事公曰自吾舅殁五亂於汴者吾苗薅樊曰淮南子云聖人之用兵也櫛髮媷苗所去者少而所利者多而髮櫛之幾盡然不一揃刈不足令震駴方云我即東兵以取曹師道懼不敢動弘正以濟兵以或作以兵非是誅吳元濟也命公都統諸軍曰無自行以遏北冦公請使子公武以兵萬三千人會討蔡下歸財與糧以濟諸軍卒擒蔡姦三千淮西碑作二千於是以公為侍中而以公武為鄜坊丹延節度使師道之誅公以兵東下進圍考城克之遂進迫曹曹冦乞降鄆部既平公曰吾無事於此其朝京師天子曰大臣不可以暑行其秋之待公曰君為仁臣為恭可矣遂行既至獻馬三千匹絹五十萬匹他錦紈綺纈又三萬金銀器千而汴之庫廄錢以貫數者尚餘百萬絹亦合百餘萬匹馬七千糧三百萬斛兵械多至不可數五十或作七千𥘉公有汴承五亂之後掠賞之餘且斂且給恆無宿儲至是公私充塞至於露積下子智切王幹秩俸布帛皆露積腐爛不垣𥘉公下或有之字無上或無恆字册拜司徒兼中書令進見上殿拜跪給扶贊元經體不治細微天子敬之元下或有老字非是元和十五年今天子即位公為冡宰又除河中節度使在鎮三年以疾乞歸復拜司徒中書令病不能朝以長慶二年十二月三日薨於永崇里第年五十八天子為之罷朝三日贈太尉賜布粟年五十八或作年八十方考新舊史定從今本方無天子為之四字布粟或作布帛方云按舊史實賜米千石其葬物有司官給之京兆尹監護明年七月某日葬于萬年縣少陵原京城東南三十里楚國夫人翟氏祔子男二人長曰肅元某官次曰公武某官肅元早死公之將薨公武暴病先卒公哀傷之月餘遂薨無子以公武子孫紹宗為主後汴之南則蔡北則鄆二冦患公居間為巳不利卑身佞辭求與公好薦女請昏使日月至既不可得則飛謀釣謗以間染我公先事候情壞其機牙姦不得發卑或作畢至既方作既至非是不可下或無得字釣或作鈞染或作諜先事候情或作先得事情候或作後王誅以成最功定次孰與髙下公子公武與公一時俱授弓鉞處藩為將疆土相望公武以母憂去鎮公母弟充自金吾代將渭北公以司徒中書令治蒲于時弟充自鄭滑節度平宣武之亂以司空居汴自唐以來莫與為比公之為治嚴不為煩止除害本不多教條與人必信吏得其職賦入無所漏失人安樂之在所以冨公與人有畛域不為戲狎人得一笑語重於金帛之賜畛或作軫非是其罪殺人不發聲色問法何如不自為輕重故無敢犯者或無自為字非是其銘曰在貞元丗汴兵五猘居例切祝曰猘狂犬也自劉元佐死汴州五亂將得其人衆乃一愒丘例切祝曰愒息也與憩同詩不尚愒焉其人為誰韓姓許公磔其梟狼養以雨風桑穀奮張厥壤大豐貞元元孫命正我宇公為臣宗處得地所河流兩壖盜連為羣雄唱雌和首尾一身公居其間為帝督姦察其嚬呻與其睨眴上音詣下音荀祝曰眩也又目動貌淮南子視焉無眴邪視出左顧失視右顧而跽巨几切蔡先鄆鉏三年而墟稿乾四呼終莫敢濡常山成德軍幽都幽州孰陪孰扶陪或作悖或作倚天施不留其討不逋許公預焉其賚何如賚或作賴悠悠四方既廣既長無有外事朝廷之治許公來朝車馬干戈相乎將乎威儀之多將則是矣相則三公釋師十萬歸居廟堂上之宅憂公讓太宰養安蒲坂萬邦絶等有弟有子提兵守藩一時三侯人莫敢扳又音班引也春秋傳扳引而立之與攀同生莫與榮殁莫與令刻文此碑以鴻厥慶柳子厚墓志銘子厚諱宗元七丗祖慶為拓跋魏侍中封濟隂公或無拓跋二字曽伯祖奭為唐宰相與禇遂良韓瑗俱得罪武后死髙宗朝髙或作中朝或作時皇考諱鎮以事母棄太常博士求為縣令江南其後以不能媚權貴失御史權貴人死乃復拜侍御史號為剛直所與遊皆當丗名人遊上方無與字子厚少精敏無不通逹逮其父時雖少年巳自成人能取進士第嶄士咸切又士咸切選嶄絶峯殊狀注險峻貌楚辝何山石之嶄巖注石髙貌然見頭角衆謂柳氏有子矣其後以博學宏詞授集賢殿正字或作授校書郎方云柳集可考或本非是此下方有藍田尉三字今按三字下文已見不當重出俊傑廉悍議論證據今古出入經史百子今古或作古今踔敕角切前漢非有踔絶之能注髙逺也厲風發率常屈其座人名聲大振一時皆慕與之交諸公要人爭欲令出我門下交口薦譽之貞元十九年由藍田尉拜監察御史順宗即位拜禮部貟外郎遇用事者得罪例出為刺史或作貞元十九年拜監察御史王叔文韋執誼用事拜尚書禮部貟外郎且將大用遇叔文等敗例出為刺史今按方本得婉微之體它本則幾乎罵矣疑𥘉本直書後乃更定也若從𥘉本則上文須輔藍田尉三字未至又例貶州司馬居間益自刻苦務記覽為詞章泛濫停蓄為深博無涯涘而自肆於山水間水下或有之字元和中嘗例召至京師又偕出為刺史而子厚得柳州既至歎曰是豈不足為政邪因其土俗為設教禁州人順賴其俗以男女質錢約不時贖子本相侔則沒為奴婢子厚與設方計悉令贖歸其尤貧力不能者令書其傭足相當則使歸其質觀察使下其法於他州比一歲免而歸者且千人衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀其召至京師而復為刺史也中山劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將拜疏願以柳易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州白上或作上白改下或無刺字嗚呼士窮乃見節義今夫平居里巷相慕恱酒食遊戲相徴逐詡詡虛甫切語也強笑語以相取下握手出肺肝肉示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髮比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也救下或有而字此宜禽獸夷狄所不忍為而其人自視以為得計聞子厚之風亦可以少愧矣少上方無以字子厚前時少年勇於為人不自貴重顧藉謂功業可立就故坐廢退既道又無相知有氣力得位者推挽故卒死於窮裔材不為丗用道不行於時也死或或作厄道上或或有而字使子厚在臺省時自持其身巳能如司馬刺史時亦自不斥斥時有人力能舉之且必復用不窮時有或作而有力能方作解或能下復出解字皆非是然子厚斥不久窮不極雖有出於人其文學辭章必不能自力以致必傳於後如今無疑也力以或作以力或無致必二字皆非是雖使子厚得所願為將相於一時以彼易此孰得孰失必有能辨之者子厚以元和十四年十一月八日卒年四十七以十五年七月十日歸葬萬年先人墓側十八日月或作十月五日七月上或有秋字或無十日字子厚有子男二人長曰周六始四歲季曰周七子厚卒乃生女子二人皆幼其得歸葬也費皆出觀察使河東裴君行立費或作資行立有節槩立然諾下立字或作重與子厚結交子厚亦為之盡竟賴其力葬子厚於萬年之墓者舅弟盧遵遵涿竹角切上谷有涿縣涿或作可或作為人性謹順學問不厭自子厚之斥遵從而家焉逮其死不去家下或無焉字既往葬子厚又將經紀其家庶幾有始終者銘曰是惟子厚之室既固既安以利其嗣人下既字或作且唐故昭武校尉守左金吾衛將軍李公墓志銘公諱道古字某曹成王子其先王明以太宗子王曹絶輒復封五丗而至成王成王諱皋有功建中貞元間王諱上或無成字非是以多才能能行賞誅為名至今追數當時內外文武大臣成王必在其間或無成王字公以進士舉及第獻文輿三十卷拜校書郎集賢學士四遷至宗正丞憲宗即位選擢宗室遷尚書司門貟外郎以選為利隨唐睦州刺史遷少宗正元和九年以御史中丞持節鎮黔中十一年來朝遷鎮鄂州以鄂嶽道兵會平淮西以功加御史大夫十三年徴拜宗正轉左金吾上即位以先朝時嘗信妄人柳泌能燒水銀為不死藥薦之必或作賁經云新舊史李干墓志石本皆作泌泌以故起閭閻氓為刺史不效貶循州司馬其年九月三日以疾卒于貶所年五十三月下或有十字長慶元年詔曰左降而死者還其官以葬遂以其年某月日葬于東都某縣其年或作某年月上無某字公三娶元配韋氏諱修修生子紘紘為進士學修方並作循學或作舉女貢嫁崖氏夫人隋雍州牧鄖音云公叔𥙿五丗孫父士佺蓬山令次配崔氏諱藥乙角切又音約白正其葉謂之藥生綽紹綰女會嫁鄭氏季毗夫人父昭嘗為京兆尹今夫人韋氏無子父光憲光祿卿其葬用古今禮以元配韋氏夫人祔而葬次配崔氏夫人於其域異墓或無用古今禮至而葬十四字非是公宗室子生而貴富能學問以中科取名方無生字非是善自傾下以交豪傑身死賣宅以葬銘曰太支於今其尚有封太或作本非是尚方作上當公弟兄未續又亡弟兄或作兄弟其遷于南年及始衰誰黜不復而以喪歸誰或作雖海豐彌彌万里于畿載其始終以哀表之唐故朝散大夫尚書庫部郎中鄭君墓志銘君諱羣字弘之丗為滎陽人君或作公其祖於元魏時有假封襄城公者子孫因稱以自别此下或有君其後也四字今按下文有君其季也此有則不應重出曽祖匡時晉州霍邑令祖千尋彭州九隴丞父迪鄂州唐年令娶河南獨孤氏女生二子君其季也以進士選以上方有君字吏部考功所試判為上等授正字自鄠縣尉拜監察御史佐鄂嶽使裴均之為江陵以殿中侍御史佐其軍均之徴也遷虞部貟外郎之徵或作戶徵非是均鎮襄陽復以君為襄府左司馬刑部貟外郎副其支度使事均卒李夷簡代之因以故職留君歲餘拜復州刺史遷祠部郎中遷上或有方字非是會衢州無刺史方選人君願行宰相即以君應詔方無會字或無方字君願行作行願者治衢五年復入為庫部郎中行及揚州遇疾居月餘以長慶元年八月二十四日卒春秋六十或無居字即以其年十一月二十二日從葬於鄭州廣武原先人之墓次君天性和樂居家事人與待交遊𥘉持一心未嘗變節有所緩急曲直薄厚踈數也不為翕翕熱亦不為崖岸斬絶之行熱或作然斬或作嶄俸祿入門與其所過逢吹笙彈箏飲酒舞歌詼調醉呼連日夜不厭費盡不復顧問方無此上六字或分挈以去一無所愛惜不為後日毫髮計留也遇其空無時客至清坐相看或竟日不能設食客主各自引退亦不為辭謝看或作對看下方無或字與之遊者自少及老未嘗見其言色有若憂歎者豈列禦寇莊周等所謂近於道者邪其治官守身又極謹愼不挂於過差去官而人民思之身死而親故無所怨議哭之皆哀又可尚也𥘉娶吏部侍郎京兆韋肇女生二女一男長女嫁京兆韋詞次嫁蘭陵蕭儧詞或作嗣宗儧或作讃後娶河南少尹趙郡李則女生一女二男其餘男二人女四人皆幼嗣子退思韋氏生也四或作一銘曰再鳴以文進塗闢佐三府治藹厥迹郎官郡守愈著白官或作中洞然渾朴絶瑕謫朴或作璞甲子一終反玄宅唐故朝散大夫越州刺史薛公墓志銘公諱戎字元夫其上祖懿為晉安西將軍實始居河東公之四丗祖嗣汾隂公諱德儒為隋襄城郡書佐以卒隋上或無為字襄城有子二人皆貴其後皆蕃以大而其季尤盛官至邠州刺史邠州諱寶胤有子九人皆有名位其最季諱縑為河南令以卒縑或作謙方云丗系表作縑河南有子四人其長諱同卒官湖州長史贈刑部尚書尚書娶吳郡陸景融女有子五人皆有名迹其逹者四人公於倫次為中子仁孝慈愛忠厚而好學不應徴舉沈浮閭巷間不以事自纍為貴常州刺史李衡遷江西觀察使曰州客至多莫賢元夫吾得與之俱足矣使下或無曰字即署公府中職公不辝讓年四十餘始脫褐衣為吏衡遷給事中齊映自桂州以故相代衡為江西公因留佐映治桂或作睦方云考傳當作桂治方作始屬下文非是映卒湖南使李巽福建使柳冕交表奏公自佐詔以公與冕在冕府纍遷殿中侍御史冕使公攝泉州冕文書所條下有不可者公輒正之冕惡其異於巳懷之未發也遇馬揔以鄭滑府佐忤中貴人貶為泉州别駕冕意欲除揔附上意為事使公按置其罪公歎曰公乃以是待我我始不願仕者正為此耳不許冕遂大怒囚公於浮圖寺而致揔獄事聞逺近值冕亦病且死不得巳俱釋之冕死後使至奏公自副又副使事於浙東府轉侍御史元和四年徴拜尚書刑部貟外郎遷河南令歷衢湖常三州刺史所至以廉貞寬大為稱朝廷嘉之某年拜越州刺史兼御史中丞浙東觀察使某年或作元和十二年正月二十二日方云前巳云元和四年此不當復出年號它銘亦無書除授月日者或本非是史下方無兼字至則悉除去煩弊儉出薄入以致和富部刺史得自為治無所牽制四境之內竟歲無一事公篤於恩義盡用其祿以周親舊之急有餘頒施之內外親無踈逺皆家歸之疾病去官長慶元年九月庚申至於蘇州以卒春秋七十五卒上或有病字奏至天子為之罷朝或無奏至二字贈左散騎常侍使臨弔祭之士大夫多相弔者大夫或作人以其年十一月庚申葬于河南偃師先人之兆次以韋氏夫人祔其或作明公凡再娶先夫人京兆韋氏後夫人趙郡李氏皆先卒子男二人曰沂曰洽長生九歲而幼七歲矣沂或作泝方云丗系表作泝女四人皆巳嫁愈既與公諸昆弟善又嘗代公令河南公之葬也故公弟集賢殿學士尚書刑部侍郎放屬余以銘故字疑當在上文公之字上刑或作兵其文曰薛氏近丗莫盛公門公倫五人咸有顯聞公之𥘉志不以事纍或作不纍以事僶俯以隨亦貴於位無怨無惡中以自寶或作中人以自方云此文四句一韻古音寶與壽叶寶或作貴或作實不能百年曷足謂壽公宜有後有二稚子其祐成之公食廟祀朱文公校昌黎先生集卷之三十二
