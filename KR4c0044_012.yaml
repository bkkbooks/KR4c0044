body:
  text: 雜著獲麟解方云李本云元和七年麟見東川疑公因此而作然李翺嘗書此文以贈陸傪傪死於貞元十八年則此文非元和間作也今按此文有激而託意之詞非必為元和獲麟而作麟之為靈昭昭也詠於詩書於春秋雜出於傳記百家之書雖婦人小子皆知其為祥也書於或作載於然麟之為物不畜於家不恆有於天下其為形也不類非若馬牛犬豕豺狼麋鹿然馬牛或作牛馬鹿然或作鹿之狀或無之字皆非是然則雖有麟不可知其為麟也角者吾知其為牛鬛者吾知其為馬犬豕豺狼麋鹿吾知其為犬豕豺狼麋鹿下或有也字惟麟也不可知不可知則其謂之不祥也亦冝雖然麟之出必有聖人在乎位麟為聖人出也聖人者必知麟麟之果不為不祥也又曰麟之所以為麟者以德不以形下或有也字若麟之出不待聖人則謂之不祥也亦宜下或有也字或有哉字師説古之學者必有師師者所以傳道受業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之閣本無此五字非是生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎庸方從閣杭作豈或并有二字而無夫字皆非是是故無貴無賤無長無少道之所存師之所存也方無也字嗟乎師道之不傳也久矣欲人之無惑也難矣嗟上或有咨字非是古之聖人其出人也逺矣猶且從師而問焉今之衆人其下聖人也亦逺矣而恥學於師期作巳下或作去皆非是是故聖益聖愚益愚聖人之所以為聖愚人之所以為愚其皆出於此乎愛其子擇師而教之於其身也則恥師焉惑矣彼童子之師授之書而習其句讀者非吾所謂傳其道解其惑者也非上或有也字方云讀音豆周禮天官注徐邈讀馬融笛賦作句投徒鬪切何休公羊序失其句讀不音山谷和黃冕仲詩只從如字句讀之不知惑之不解或師焉或不焉小學而大遺吾未見其明也巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則羣聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近諛盛或作大安官盛語見中庸嗚呼師道之不復可知矣巫醫樂師百工之人君子不齒今其智乃反不能及其可怪也歟不齒或作鄙之其可或無其字聖人無常師孔子師郯子萇弘師襄老聃句絶郯子之徒其賢不及孔子方無孔子師郯子五字而以萇弘師襄老𣆀六字連下句郯子之徒為句曰校本一云郯子下當有數子二字其上當存孔子師三字為是今按孔子見郯子在適周見萇弘老聃之前而聖人無常師本杜氏注問官名語故此上句既敘孔子所師四人而再舉郯子之徒則三子在其中矣方氏知當存孔子師字而不知當并存上郯子二字乃以下郯子二字屬上句讀之而疑郯子之下更有數子二字誤矣孔子三人行則必有我師子下或有曰字方從杭本云論語本無則字曰字似不當有是故弟子不必不如師師不必賢於弟子故上或無是字聞道有先後術業有專攻如是而巳李氏子蟠年十七好古文六藝經傳皆通習之不拘於時學於余余嘉其能行古道作師説以貽之學上或有請字方無下余字進學解國子先生晨入太學招諸生立館下招或作召誨之曰業精于勤荒于嬉行成于思毀于隨方今聖賢相逢治具畢張拔去凶邪登崇畯良畢或作必畯或作俊方云古文尚書俊皆作畯公陀文石本多用畯字新舊史同上占小善者率一録名一藝者無不庸􅐡滿巴切􅐡或作把方云音義同羅剔抉於庚切刮垢磨光蓋有幸而獲選孰云多而不揚諸生業患不能精無患有司之不明之不或作不能非是行患不能成無患有司之不公言未既有笑于列者曰先生欺余哉弟子事先生于兹有年矣年方作時云考舊史公時以聀方下遷蓋非久於博士今按此文恐非聀方左遷時作説見下三年博士注先生口不絶吟於六藝之文手不停披於百家之編吟或作吟記事者必提其要纂言者必鉤其玄記或作紀貪多務得細大不捐焚膏油以繼晷恆兀兀以窮年先生之業可謂勤矣焚或作燒兀兀或作矻矻之下或有於字抵音底角觸排異端攘斥佛老輔苴子余切苴所以藉履罅呼訝切孔罅漏張皇幽眇方云衣弊不補履決不苴吕氏春秋語抗辝幽説閎意眇旨見揚子雲解難尋墜緒之茫茫獨旁搜而逺紹障百川而東之回狂瀾於既倒先生之於儒可謂有勞矣茫茫或作芒芒障或作停方云禮記鯀鄣洪水音章或無有字沈浸醲郁含英咀華醲或作釀作為文章其書滿家上規姚姒徐里切夏姓也姚舜姓也渾渾無涯無或作亡或作之非是周誥殷盤佶屈聱五交切韓曰廣雅謂不入人語也孫曰佶屈聱牙皆艱澀貌牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣文方作德或作儒或作得非是少始知學勇於敢為長通於方左右具宜先生之於為人可謂成矣具或作其或作且人上或無為字然而公不見信於人私不見助於友跋前躓音致後動輒得咎躓多或疐方云載疐其尾説文與躓義通暫為御史遂竄南夷三年博士冗不見治平聲遂或作逐年方作為謂貞元末為四門博士元和𥘉為國子博士今復下遷諸本多作三年樊謂公元和元年六月為博士四年六月遷都官史謂三嵗為真蓋三年也今按洪譜則樊説為是當作三年唐本詩注行狀皆有三年字何煩曲説乎然洪亦附三為之説則又誤矣命與仇謀取敗幾時冬暖而兒號寒年豐而妻啼飢取方作其豐或作登頭童齒豁竟死何禆不知慮此而反教人為先生曰吁子來前夫大木為杗音盲尓雅杗瘤謂之梁説文云杗屋大梁也細木為桷左氏傳子尾抽桷繫扉法桷椽也詩松桷有梴欂櫨侏儒欂音薄櫨音盧三者皆屋上短柱欂下名枅櫨一名楶侏儒一名梲字或作株檽椳音隈户樞闑魚列切門限扂亭點切門關牡楔音屑門兩傍木各得其宜施以成室者匠氏之工也或無冝字室下有屋字工作功方云淮南子曰賢王之用人也猶巧工之制木也大者以為舟航梁棟小者以為楫楔修者以為櫚榱短者以為侏儒枅櫨無小大修短皆得其所宜規矩方圎名有所施天下之物莫凶於雞毒烏頭也然而良醫蠧而藏之有所用也是故林莽之林猶不棄者而况於人乎公言蓋祖此而宜施二字當為一飾玉札丹砂赤箭青芝牛溲音瘦馬勃敗鼓之皮七者皆藥名也玉泉一名玉扎生藍田山谷赤箭生陳倉山谷及太山少室青芝出泰山牛溲牛溺馬勃馬屁菌也生􅊜地及腐木上敗鼓皮主蟲毒出本草俱收並蓄待用無遺者醫師之良也登明選公雜進巧拙紆音迂紆箇屈曲貌餘為妍卓犖為傑校短量長惟器是適者宰相之方也卓犖或作犖犖昔者孟軻好辨孔道以明轍環天下卒老于行荀卿守正大論是弘逃讒于楚廢死蘭陵荀卿至是弘八字方從舊史如此又云文苑上文皆同惟是弘作以興蓋國𥘉以諱避也閣本亦只作大論以正為王以論為倫自杭本也而新史又易守為宗其訛益甚矣是二儒者吐辭為經舉足為法絶類離倫優入聖域其遇於丗何如也遇或作進今先生學雖勤而不繇其統言雖多而不要平聲其中文雖竒而不濟於用行雖修而不顯於衆顯或作洎舊史四句皆無而字猶且月費俸錢歲靡與縻同廩粟俸或作奉子不知耕婦不知織乘馬從徒安坐而食從或作而非是踵常途之促促窺陳編以盜竊促促諸本多作役役方云促音齪公張署墓志抑首促促就食與此同史記申屠嘉娖娖廉謹娖與促音義通集韻齪下二字皆出編或作篇然而聖主不加誅宰臣不見斥兹非其幸歟或無其字或作此非其利哉動而得謗名亦隨之投間置散乃分之宜若夫商財賄之有亡計班資之崇􅋻音卑忘已量之所稱去聲指前人之瑕疵是所謂詰匠氏之不以杙音杙莊子求狙猴之杙者斬杙橛也楹柱也杙小而楹大故以代自喻為楹而訾音紫醫師以昌陽引年欲進其狶苓也狶音喜又音希昌陽本草昌蒲注生石磧上概節者良生下􅊜地大根乃是昌陽不可服東坡云不知退之即以昌陽為昌蒲耶抑謂其似是而非不可以引年也孫曰昌蒲味辛溫無毒從服輕身不老延年益心智一名昌陽生上洛池澤及蜀郡嚴道祝曰楚人呼豬為狶狶苓乃豬苓也已量或作量巳非是師不或有不字今按本草昌蒲一名昌陽作不以者非是本政周之政文既其弊也其方作有或無其字今按猶言既而弊矣既字又似及字後丗不知其承大敷古先遂一時之術以明示民遂或作逐民始惑教百氏之説以興其言曰天下可為也彼之政仁矣反於誼此之政敬矣戾於忠何居我其周從乎曰周不及殷其殷從乎曰夏曰虞曰陶唐曰三皇氏曰遂古之𥘉何居方無何字或無居字我或作吾今按何居凖檀弓音姬大率此篇僻澀必其少作今或有所未通闕之可也暴孽情飾淫志孽或作泰枝辭琢正紛紊紏射以僻民和以導民亂嗚呼道之去丗其終不復矣乎長民者發一號施一令民莫不悱芳尾切口悱悱也然非矣或無然非二字謂不可守遽變而從之譬將適千里及門而復後雖矻矻苦骨切矻矻堅也用心貌決不可暨方無後字暨或作洎原其始固有啓之者也聞於師曰古之君天下者化之不示其所以化之之道及其弊也易之不示其所以易之之道政以是得民以是淳其有作者知教化之所繇廢抑詭怪而暢皇極伏文貌而尚忠質怪或作類茫乎天運窅音窈爾神化道之行也其庶巳乎守戒詩曰大邦維翰書曰以蕃王室諸侯之於天子不惟守土地奉職貢而已固將有以翰蕃之也今人有宅於山者知猛獸之為害則必髙其柴楥而外施窞穽以待之楥方云籬也欄也字當從木宅於都者知穿窬之為盜則必峻其垣牆而內固扃鐍古穴切孫云莊子曰固扃鐍扃關也鐍劒也以防之此野人鄙夫之所及非有過人之智而後能也今之通都大邑介於屈強衢物巨兩二切或作倔強之間而不知為之備噫亦惑矣野人鄙夫能之而王公大人反不能焉豈材力為有不足歟野下或無人鄙二字為下或有之而二字或只有之字今詳文勢疑為字衍蓋以謂不足為而不為耳天下之禍莫大於不足為句下或有而不為三字今詳文勢疑下足字衍下文不足為者放此材力不足者次之足下或有為字非是不足為者敵至而不知材力不足者先事而思則其於禍也有間矣彼之屈強者帶甲荷戈不知其多少其綿地則千里而與我壤地相錯與上方無而字無有丘陵江河洞庭孟門之關其間又自知其不得與天下齒朝夕舉踵引頸冀天下之有事以乘吾之便頸或作領此其暴於猛獸穿窬也甚矣嗚呼胡知而不為之備乎哉賁育之不戒童子之不抗魯雞之不期蜀雞之不支今夫鹿之於豹非不巍然大矣於或作與非是然而卒為之禽者瓜牙之材不同猛怯之資殊也曰然則如之何而備之曰在得人圬者王承福傳圬或作杇方云圬音烏左傳圬人以時塓館宫室杜注圬人塗者題語正本此説不當用杇字今按論語作杇圬之為技賤且勞者也有業之其色若自得者聽其言約而盡問之王其姓承福其名丗為京兆長安農夫方無夫字天寶之亂發人為兵持弓矢十三年有官勳棄之來歸喪其土田手鏝母官切祝曰鏝杇具尓雅鏝謂之杇衣食餘三十年舍於市之主人而歸其屋食之當焉視時屋食之貴賤而上下其圬之傭以償之有餘則以與道路之廢疾餓者焉又曰粟稼而生者也若布與帛必蠶績而後成者也其他所以養生之具皆待人力而後完也吾皆賴之然人不可遍為宜乎各致其能以相生也故君者理我所以生者也方從閣杭本如此諸本以生或作以出令今按所以出令與原道意同似當從之然詳上文有三生字故此言君者理我之所以生者正承上文而言也若作出令則與上下文意皆不叶矣今當以方本為正而百官者承君之化者也方從閣杭無也字非是任有小大惟其所能若器皿焉食焉而怠其事必有天殃故吾不敢一日捨鏝以嬉一日捨鏝或作捨鏝一日夫鏝易能可力焉又誠有功取其直雖勞無愧吾心安焉夫力易強而有功也心難強而有智也智上方無有字用力者使於人用心者使人亦其宜也吾特擇其易為而無愧者取焉特或作故嘻吾操鏝以入貴冨之家有年矣挏或有於字有一至者焉又往過之則為墟矣有再至三至者焉而往過之則為墟矣問之其鄰或曰噫刑戮也或曰身既死而其子孫不能有也或曰死而歸之官也問下或無之字死上或無日字吾以是觀之非所謂食焉怠其事而得天殃者邪焉下或有而字非強心以智而不足不擇其才之稱否而冒之者邪非多行可愧知其不可而強為之者邪知其不可下杭本有能字蜀本能上又有強字方從閣本作知巳之不可能又無強字今按此𢾗本語意皆與上文不擇其才之爯否者相復又與本句多行可愧者不相承惟杭蜀本近是但能字亦未安而強字當在而字下耳今參取二本定為知其不可而強為之則其上下文之義皆暢矣將貴冨難守薄功而厚饗之者邪方無之字抑豐悴有時一去一來而不可常者邪吾之心憫焉是故擇其力之可能者行焉樂富貴而悲貧賤我豈異於人哉又曰功大者其所以自奉也博妻與子皆養於我者也吾能薄而功小不有之可也我者閣作我類有之閣作有小皆非是又吾所謂勞力者若立吾家而力不足則心又勞也者下或有也字一身而二任焉雖聖者不可能也愈始聞而惑之又從而思之蓋賢者也蓋所謂獨善其身者也然吾有譏焉謂其自為也過多其為人也過少其學楊朱之道者邪楊之與所證之文𥘉不相似况下文有嗚呼余乎則此于字皆是余字明矣嗚呼余乎其無知乎君子之棄而小人之歸乎知下或無乎字言針不知言之人烏可與言知言之人默焉而其意巳傳烏或作焉焉或作然幕中之辨人反以汝寪叛臺中之評人反以汝為傾以汝方並作汝以今按近丗校本務為新竒多作倒語文乖字逆幾類歐陽公所譏石公操作字之怪殊失韓公立言本意今悉正之不敢從也汝不懲邪而呶呶女交切以害其生邪行針行或作悔行與義乖言與法違後雖無害汝可以悔行也無邪言也無頗普禾切死而不死汝悔而何宜悔而休汝惡曷瘳宜休而悔汝善安在悔不可追悔不可為思而斯得汝則弗思追諸本皆同而方從閣杭作止今按草書追字近似止字二本偶以轉寫致誤而方乃以好怪取之不復計其文義之通塞可一笑也好惡針無善而好不觀其道無悖而惡不詳其故善方從杭蜀作悖今按二本蓋由下句而誤方亦不顧文義而取之也前之所好今見其尤從也為比捨也為讎前之所惡今見其臧從也為愧捨也為狂維讎維比維狂維愧於身不祥於德不義不義不祥維惡之大幾如是為而不顚沛齒之尚少庸有不思今其老矣不愼胡為知名針內不足者急於人知霈焉有餘厥聞四馳焉或作然今日告汝知名之法勿病無聞病其曄曄昔者子路惟恐有聞赫然千載德譽愈尊矜汝文章負汝言語乘人不能掩以自取汝非其父汝非其師不請而教誰云不欺欺以賈音古憎掩以媒怨汝曽不寤以及於難小人在辱亦克知悔及其既寧終莫能戒及其或作其及既出汝心又銘汝前汝如不顧禍亦冝然禍亦方作辱則後漢三賢贊三首樊曰后漢王充王符中長統三人者同傳公為之贊各不滿百言而敘事略無遺者王充者何會稽上虞本自元城爰來徙居師事班彪家貧無書閲書於肆市肆是遊一見誦憶遂通衆流閉門潛思論衡韓曰王充所為論衡𥘉中士未有傳者蔡雍入吳始得之常祕以為談助其後王良為會稽太守亦得其書及滿許下時人稱其才進或曰不見異人當得異書以修為州治中自免歸歟同郡友人謝姓夷吾上書薦之待詔公車以病不行年七十餘乃作養性一十六篇肅宗之時終於永元王符節信安定臨涇好學有志為鄉人所輕或無為字人或作里憤丗著論潛夫是名述赦之篇以赦為賊良民之甚其旨甚明甚或作急方云王符述敢篇曰今日賊良民之甚者莫大於數赦公全具此語皇甫度遼聞至乃驚衣不及帶屣履出迎豈若鴈門問鴈呼卿樊曰度遼將軍皇甫規解官歸安定鄉人有以貫得鴈門太守者亦還家書刺謁規規卧不起既入而間即前在郎食馬美乎有頃王符在門規素聞符名衣不及帶屣履出迎時人為之語曰徒見三千石不如一逢掖不仕終家吁嗟先生仲長統公理山陽髙平或無仲字謂髙幹有雄志而無雄才諸上或有自字其後果敗以此有聲俶儻敢言語默無常人以為狂生俶或作攔方云俶與傳台州郡會召稱疾不就著論見情𥘉舉尚書郎後參丞相軍事卒不至于榮舉下或有髙弟字今按本傳無髙弟字論説古今發憤著書昌言是名友人繆襲稱其文章足繼西京文章方云考本傳當作才章公三贊未甚致立一語四十一終何其短邪嗚呼先生一下方有而字諱辨愈與李賀書李上方有進士二字非是勸賀舉進士賀舉進士有名與賀爭名者毀之此公自言嘗勸李賀舉進士而賀從已説舉進士有名稱故與之爭名者毀之也今方氏乃從諸本刪去名字而以有字屬下句遂使復出四字為刺語而爭各二字無所承故諸本亦有覺其誤者而并則四字以從自雖若小勝方本然要為失韓公本指而不究毀者之情也方本又無之字亦非是方又云康駢劇談録謂公此文因元稹而發董彥逺謂賀死元和中使稹為禮部亦不相及爭名蓋當時同討者曰賀父名晉肅賀不舉進士為是勸之舉者為非聽者不察也和而唱之同然一辭或無也字皇甫湜曰若不明白子與賀且得罪方無若字愈曰然律曰二名不偏諱釋之者曰謂若言徴不稱在言在不稱徴是也律曰不諱嫌名釋之者曰謂若禹與雨立與蓲之類是也蓲與丘同音烏蓲草名或無此注字今賀父名晉肅賀舉進士為犯二名律乎為犯嫌名律乎父名晉肅子不得舉進士若父名仁子不得為人乎嫌名律乎下諸本皆有此二十字方從杭本去之非是夫諱始於何時作法制以教天下者非周公孔子歟周公作詩不諱若曰克昌厥後又曰駿發尓私若字方作周公孔子不偏諱二名若曰宋不足徴又曰某在斯若字方作孔子春秋不譏不諱嫌名若衛桓公名完本或無若字康王釗音招之孫實為昭王曽參之父名晳曽子不諱昔若日昔者吾友又曰裼裘而弔若字方作曽子周之時有騏期漢之時有杜度此其子宜如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎期字度字下或並有者字方云董彥逺曰騏期以姓苑考之為期又李涪謂杜澡字伯度魏人以武帝諱謂杜度公誤用也然張仲景方自有杜度公所用或出此漢諱武帝名徹為通不聞又諱車轍之轍為某字也諱吕后名雉為野雞不聞又諱治天下之治為某字也或無下又諱一字方云顔氏家訓曰桓公名白傳有五皓之稱萬王修公詺長琴有修短之目不聞謂布帛為布皓呼腎陽為腎蓋有自也今按公言或與顔氏偶同未必用其語也今上章及詔不聞諱滸勢秉飢太祖名虎太宗名丗民代祖名昞玄宗名隆基也惟宦官宫妾乃不敢言諭及機以為觸犯以論為近代宗廟諱以機為近玄宗廟諱士君子言語行事冝何所法守也言語或作立言今考之於經質之於律稽之以國家之典賀舉進士為可邪為不可邪或無舉字為可下或無邪字方無邪為二字凡事父母得如曽參可以無譏矣作人得如周公孔子亦可以止矣矣或並作也方並作邪今丗之士不務行曽參周公孔子之行而諱親之名則務勝於曽參周公孔子亦見其惑也夫周公孔子曽參卒不可勝勝周公孔子曽參乃比於宦者宮妾則是宦者宫妾之孝於其親賢於周公孔子曽參者耶宦者或並作宦官訟風伯訟或作讒非是維兹之旱兮其誰之由我知其端兮風伯是尤旱上或無之字山升雲兮澤上氣雷鞭車兮電搖幟雨寖􅎊兮將墜風伯怒兮雲不得止寖寖或作侵侵將下或有欲字暘烏之仁兮念此下民閟其光兮不鬪其神嗟風伯兮其獨謂何我於爾兮豈有其他獨或作將求其時兮修祀事羊甚肥兮酒甚旨食足飽兮飲足醉風伯之怒兮誰使雲屏屏兮吹使醨之氣將交兮吹使離之鑠之使氣不得化寒之使雲不得施氣不或作雲不雲不或作氣不嗟爾風伯兮欲逃其罪又何辭方無兮字又上或有其字上天孔明兮有紀有綱我今上訟兮其罪誰當我今或作今我天誅加兮不可悔風伯雖死兮人誰汝傷雖方作之非是汝或作爾伯夷頌士之特立獨行適於義而巳不顧人之是非皆豪傑之士信道篤而自知明者也一家非之力行而不惑者寡矣至於一國一州非之力行而不惑者蓋天下一人而巳矣若至於舉丗非之力行而不惑者則千百年乃一人而已耳若伯夷者窮天地亘萬丗而不顧者也舉丗非之下方從杭粹及范文正公寫本無力行二字千下有五字云自周𥘉至唐貞元未幾二千年公言千五百年舉其成也今按此篇自一家一國以至舉丗非之而不惑者泛説有此三等人而伯夷之窮天地亘万丗而不顧又别是上一等人不可以此三者論也前三等人皆非有所指名故舉丗非之而不顧者亦難以年數之實論其有無而且以千百年言之蓋其大約如此耳今方氏以伯夷當之巳失全篇之大指至於計其年數則又捨其幾二千年全數之多而反促就千五百年竒數之少其誤益甚矣方説不通文理大率類此不可不辨昭乎日月不足為明崒慈恤切山髙貌乎泰山不足為髙巍乎天地不足為容也當殷之亡周之興微子賢也抱祭器而去之去下方無之字武王周公聖也從天下之賢士與天下之諸侯而往攻之未嘗聞有非之者也從或作率與或作從彼伯夷叔齊者乃獨以為不可殷既滅矣天下宗周彼二子乃獨恥食其粟餓死而不顧繇是而言夫豈有求而為哉信道篤而自知明也明下或有者字今丗之所謂士者或無所字一凡人譽之則自以為有餘一凡人沮之則自以為不足一凡人諸本兩句皆作凡一人唯范本並作一凡人乃與下文非聖人者相發明諸本非是彼獨非聖人而自是如此夫聖人乃萬丗之褾準也余故曰若伯夷者特立獨行窮天地亘萬丗而不顧者也準方作唯今按凖字從水準聲俗作準方本誤也又按此篇之意所謂聖人正指武王周公而言也既曰聖人則是固為万丗之標準矣而伯夷者乃獨非之而自是如此是乃所以為窮天地亘万丗而不顧者也與丗之以一凡人之毀譽而遽為喜愠者有間矣近丗讀者多誤以伯夷為万丗標凖故因附見其説云雖然微二子亂臣賊子接迹於後丗矣朱文公校昌黎先生集卷之十二
