front:
  text: 朱文公校昌黎先生文集卷之六考異音釋附
  hash: sha256:6ef1d436b4f0931af6bb60bcba4c72e9e75b5ecf94f5c2eab3a7bc8b3abe4e2a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_006-1a}
body:
  text: 古詩符讀書城南樊曰城南公别墅符公之子孟東野詩有喜符郎詩有遊城南韓氏莊之作按公墓志及登科記公子曰昶登進士第在長慶四年此云符疑為昶之小字也木之就規矩在梓匠輪輿人之能為人由腹有詩書詩書勤乃有不勤腹空虛欲知學之力賢愚同一𥘉同一或作一同非是由其不能學所入遂異閭兩家各生子提孩巧相如提或作啼非是巧或作兩少長聚嬉戲不殊同隊魚方云少讀如多少之少漢賈誼胸奴東平王傳三見公此詩與劉統軍李虛中志亦三用年至十二三頭角稍相踈二十漸乖張清溝映汙渠三十骨骼成乃一龍一豬飛黃淮南子飛黃神馬也又選張景陽七命整頓雲輅驂飛黃驣踏去不能顧蟾蜍一為馬前卒鞭背生蟲蛆子魚切蟲也鞭背或作背上非是一為公與相潭潭府中居樊曰黃魯直嘗書此詩跋其後曰或謂韓公當開後生以性命之學不當誘之以富貴榮顯涪翁曰熙寧元豐間大儒之過也又何學焉孔子曰齊景公有馬千駟死之日民無得而稱焉伯夷權齊餓于首陽之下民到于今稱之韓公之言其於勸奬之功異趣而同歸也熙寧元豐似指荆公而言然曰間云者又不專指荆公也問之何因爾或作耳學與不學歟金璧雖重寶費用難貯儲學問藏之身身在則有餘則或作即君子與小人不繫父母且子魚切語助不見公與相起身自犂鉏閣本作不見公與汝幸免自犂鉏今按閣本之謬有如此者它可盡信邪不見三公後寒飢出無驢荀子云雖王公大夫之子孫也不能屬於禮義則歸之庶人雖庶人之子孫也積文學正身行能屬於祀義則㷌之卿相士大夫文章豈不貴經訓乃災畬災音淄畬音豫耕也孫曰言文章當以經訓為本補注吕原明雜記云杜子美詩云文章一小技於道未為尊文者載道之器安得謂之小技顧所用如何耳韓退之詩曰文章豈不貴經訓乃災畬此説有可取焉潢乎光切積水也潦無根源朝滿夕巳除人不通古今或作今古馬牛而襟𥚑行身陷不義况望多名譽時秋積雨霽方作闋新涼入郊墟燈火稍可親簡編可卷舒豈不旦夕念為爾惜居諸恩義有相奪作詩勸躊躇示爽韓曰譜系公子姪無名爽者疑為韓湘小字湘登長慶三年進士弟宣城去京國里數逾三千念汝欲别我解裝具盤筵日昏不能散起坐相引牽冬夜豈不長逹旦燈燭然座中悉親故誰肯捨汝眼念汝將一身西來曽幾年名科掩衆俊名科或作科名州考居吏前今從府公召府公又時賢時輩千百人孰不謂汝妍汝來江南近里閭故依然汝來或作此來故或作固昔日同戲兒看汝立路邊人生但如此但或作得其實亦可憐吾老丗味薄因循致留連強顔班行內行胡郎切此詩當是知制誥時作何實非罪愆才短難自力懼終莫洗湔音箋臨分不汝誑有路即歸田宣城在江之南公有别業在焉上云閭里故依然謂此人日城南登高荆楚歲時記正月七日為人日董勛問禮俗正月一日為雞二日為狗三日為豬四日為羊五日為牛六日為馬七日為人𥘉正候才兆涉七氣已弄七謂七日氣謂陽氣靄靄野浮陽暉暉水披凍聖朝身不廢佳節古所用親交既許來子姪亦可從姪或作姪盤𬞞冬春雜樽酒清濁共令徴前事為令去聲韓日劉貢父云唐人飲酒喜以令為罰今人以絲管謳歌為令即白傳所謂醉翻襴衫拋小令是也其舉故事物色為令即公所謂令徴前事為是也徴舉也觴詠新詩送扶杖凌圯址或作扯之市切基也刺船犯枯葑方用切菰根戀池羣鴨廽釋嶠孤雲縱人生本坦蕩誰使妄倥偬上音控下音粽困貌直指桃李闌幽尋寧止重重再也幽尋或作尋幽云病鴟屋東惡水溝有鴟墮鳴悲靑泥掩兩翅掩或作淹又作淹拍拍欲飛兒不得離羣童呌相召瓦䃯爭先之計校生平事殺却理亦宜奪攘不愧耻飽滿盤天嬉晴日占光景髙風送追隨或作恣追飛遂凌紫鳯羣肯顧鴻鵠卑遂或作擬紫或作鵉鴻鵠方作鴻鴈今按紫鴻是假對今者運命窮遭逢巧丸兒中汝要害處汝能不得施於吾乃何有不忍乘其危丐汝將命死馬或作救又作與方云丐兄弟死命冦恂傳語浴以清水池朝餐輟魚肉瞑宿防狐狸自知無以致蒙德夕猶疑飽入深竹叢飢來傍階基亮無責報心亮或作諒固以聽所為昨日有氣力飛跳弄藩籬今晨忽徑去徑或作徑曽不報我知僥幸非汝福天衢汝休窺京城事彈射豎子豈易欺勿諱泥坑辱泥坑乃良規良或作汝非是華山女街東街西講佛經撞鐘吹螺落戈切佛家用為樂器云閙宮庭廣張罪福資誘脅聽衆狎恰排浮萍資或作恣狎恰方云唐人語白樂天櫻桃詩洽恰舉頭千万顆或作拾似非是黃衣道士亦講説座下寥落如明星華山女兒家奉道欲驅異教歸仙靈洗粧拭面著冠帔白咽紅頰長眉青遂來升座演真訣觀門不許人開扄不知誰人暗相報訇然振動如雷霆掃除衆寺人迹絶驊騮塞路速輜軿上音災下音萍衣車也前後有韻後漢輜軿曜日光觀中人滿坐觀外後至無地無由聽抽叉脫釧解環佩堆金疊玉光青熒諸本青作晶方云字本西都賦天門貴人傳詔召六宮願識師顔形玉皇頷首許歸去乘龍駕鶴來青冥豪家少年豈知道來繞百市腳不停雲窗霧閣事慌惚重重翠幔深金屏仙梯難攀俗緣重浪慿青鳥樊曰漢光武故事七月七日上於承華殿齋正中忽有靑鳥從西方來集上間東方朔朔曰此西王母欲來有頃王母至有三青鳥如烏夾侍王母傍通丁寧青方作三云三鳥王母使見山海經楚詞九歎江文通雜詩今按陶詩云三青鳥則青字亦未為無據也或怪公排斥佛者不遺餘力而於華山􅗔獨假借如此非也此正譏其衒姿色假仙靈以惑衆又譏時君不察使失行婦人得入宮禁耳觀其卒章豪家少年雲窗霧閣翠慢金屏青鳥丁寧等語褻慢甚矣豈真以神仙處之哉讀皇甫湜公安園池詩書其後二首晉人目二子其猶吹一吷軒劣切又音血小聲也樊曰莊子惠子吹劒首者吷而巳堯舜人之所譽也道堯舜於戴晉人之前譬猶一吷也注疏戴姓晉人名梁之賢者區區自其下顧肯挂牙舌春秋書王法不誅其人身爾雅注蟲魚定非磊落人湜也困公安不自間窮年枉智思掎托糞壤汗穢豈有臧古本只如此一本不自間上有其間字糞壤下有問字方云蜀本間字下有糞壤多字豈字下有必字有字下有否字又一本無必字否字而臧字下有不臧字謝本窮年作至間而注公近本增足八字不知所校之自語淺俗非韓文胡元任云我有一池巳下當為别篇恐或然也今按此詩多不可晚當闕或云丗有石本與今本同知舊本脫誤明矣謂有所增八字也然諸公校本皆不言不知果然否也誠不如兩忘但以一槩量我有一池水蒲葦生其間蟲魚沸相嚼日夜不得間我𥘉往觀之其後益不觀觀之亂我意不如不觀完用將濟諸人捨得業孔顔百年詎幾時君子不可間路傍堠堆堆路傍堠音后封堠也堆堆或作拆拆方從唐本作堠堠皆非是一雙復一隻迎我出秦關送我入楚澤千以高山遮万以逺水隔逺方作大吾君勤聽治照與日月敵臣愚幸可哀臣罪庶可釋何當迎送歸緣路高歷歷食曲河驛晨及曲河驛悽然自傷情悽或作凄群烏巢庭樹烏或作鳥乳雀飛􅉉楹而我抱重罪孑孑萬里程親戚頓乖角或作榷圖史棄縱橫下負明義重明或作朋按杜詩於公負明義作朋非是上孤朝命榮殺身諒無輔何用答生成用或作由過南陽南陽郭門外桑下麥靑靑行子去未巳春鳩鳴不停秦商邈既逺湖海浩將經孰忍生以戚吾其寄餘齡戚或作蹙瀧吏南行逾六旬始下昌樂瀧音雙水名樂昌今韶州縣昌樂諸本作樂昌方從杭蜀本云歐公嘗以劉仲章言考歸舊本蔣頴叔云李君謂樂昌五里有昌山有樂石瀧在縣上五里今按歐云縣各樂昌隴名昌樂也險惡不可狀唐本作樂昌險惡狀非是船石相舂撞往問瀧頭吏潮州尚幾里行當何時到土風復何似瀧吏垂手笑官何問之愚譬官居京邑或作譬如官居北何由知東吳東吳遊宦鄉官知自有由潮州底處所有罪乃竄流儂音農吳人稱我曰儂幸而負犯何由到而知官今行自到那遽妄問為妄或作妾非是不虞卒見困汗出愧且駭吏曰聊戲官儂嘗使往罷嶺南大抵同官去道苦遼下此三千里有州始名潮惡溪瘴獨聚雷電常洶洶音􅎍水鳴聲楚辝聽水聲之洶洶鱷魚永州記曰鱷魚大者凡數丈善食人一生百卵及成形則有為蛇為龜為蛟者甚靈大於船牙眼怖殺儂州南數十里數十諸本作十數謝本作數十方從閣本作十數云抗斗作鬪義同史記書盛山斗入海斗絶也今以地里考之謝本為是此向與斗入海文意絶不同方説誤矣有海無天地海或作水颶其遇切一音具風名風有時作掀音軒簸真差昌化切事怪也事聖人於天下於物無不容比聞此州囚亦有生還儂官無嫌此州固罪人所徙閣本作官嫌此州惡固人之所徙官當明時來事不待説委李本作官當來時事不待説而委官不自謹愼宜即引分往胡為此水邊神色久戃慌上他悶切下呼晃切失意貌楚辝云心戃慌而不我與缸大瓶罌小所任自有宜缸音岡今江東通名大甕為缸見方言或作瓬音倣周禮有旊人義不相近官何不自量滿溢以取斯工農雖小人事業各有守不知官在朝有益國家不否字得無虱其間諸本虱作風方從唐杭謝公洪謝本云商君二十六篇大抵以仁義禮樂為虱官曰六虱成俗兵必大敗洪引阮籍語亦非也不武亦不文仁義飾其躬節方作飭躬或作姦巧姦敗羣倫杭蜀本如此姦或作躬羣或作其羣倫方久閣本作倫羣云謂敗其倫敗其羣也羣倫為無義今按倫羣不詞而冠乎羣倫乃揚子云語又正與其躬為對不可謂之無義叩頭謝吏言始慙今更羞歷官二十餘國恩並未酬凡吏之所訶嗟實頗有之不即金木誅莊子列禦冦篇為外刑者金與木也注金謂刀鋸鐵鉞木謂箠楚桎梏敢不識恩私潮州雖云逺雖惡不可過雖惡方作堆今據洪謝本皆作雖下注澄字其義差長蓋再疊上句雖逺又倿下文而言也二字或又作推思雖亦可通然與下文不相應於身實巳多敢不持自賀特或作特贈别元十八協律六首或無别字樊澤之謂元上八集虛見樂天集桂林伯裴行立也知識久去眼去或作絶吾行其既逺瞢瞢眉登切目不明也莫訾省閣蜀本作毀方云史記膠西王傳遂為無訾省蘇林謂為無訾録無所省録也今按蘇注不可曉而顔注又以為不省訾財亦非是禮記不訾重器母訾金玉成器注皆云思也詳此蓋以訾為思慮計度之意云默默但寢飯子兮何為者冠珮立憲憲方云詩顯顯令德禮作憲憲校本多讀憲為顯詩又云無然憲憲傳曰猶欣欣也何氏之從學蘭蕙巳滿畹已或作以於何玩其光以至歲向晚治惟尚和同無俟於謇謇音蹇諤也楚辝余固知謇謇之為患治惟或作時治或師絶學賢不以藝自挽音晚子兮獨如何能自媚婉娩金石出聲音宮室發關楗其偃切老子善閉者無關楗而不可開何人識章甫儒行丘少居魯衣縫掖之衣長居宋冠章甫之冠而知駿蹄踠下於阮切馬足蹉跌選踠足鬱怒言無人識章甫并知此駿蹄也惜乎吾無居不得留息偃臨當背靣時裁詩示繾綣英英桂林伯實惟文武特逺勞從事謂元協律賢來弔逐臣色南裔多山海道里屢紆直風波無程期所憂動不測子行誠艱難行方作往我去未窮極臨别且何言有淚不可拭何或作無吾友柳子厚其人藝且賢吾未識子時巳覽贈子篇寤寐想風采於今巳三年不意流竄路旬日同食眠旬日或作兼旬所聞昔已多所得今過前如何又須别使我抱悁悁勢要情所重排斤則埃塵骨肉未免然又况四海人又况或作况又嶷嶷魚力切桂林伯矯矯居夭切詩矯矯武臣注矯武貌義勇身生平所未識待我逾交親逾或作如遺我數幅書繼以藥物珍藥物防瘴癘書勸養形神形一作精不知四罪地豈有再起辰窮途致感激肝膽還輪囷下去輪切鄒陽傳蟠木根柢輪囷離竒輪囷屈曲貌讀書患不多思義患不明患足巳不學巳或作以方云足已而不學史記周亞夫贊論既學患不行子今四美具實大華亦榮王官不可闕未宜後諸生嗟我擯南海無由助飛鳴南海方作海南寄書龍城守君驥何時秣峽山逢颶風雷電助撞捽上宅江切下昨沒切相擊也乘潮簸扶胥地名在廣州見公南海神廟碑曰扶胥之口黃木之灣近岸指一髮兩巖雖云牢木石牙飛發屯門地名雖云髙亦映波浪沒余罪不足惜子生未宜忽胡為不忍别感謝情至骨初南食貽元十八協律鱟音后實如惠文骨眼相負行惠或作車山海經云鱟形如車文見玉篇骨李本云疑當作背嶺表録異鱟眼在背上雌負雄而行蠔音豪殼如石亦曰蠣房相黏為山百十各自生方云字書無蠔字董彥逺云五代潘崇徹敗王逵兵於蠔石亦地名不應不見字書蓋闕誤蒲魚或曰鷠魚也今廣州曰蒲魚尾如蛇口眼不相營方作縈蛤本草注云青蛙龜蛤長肱蜲子皆蝦蟇類即是蝦蟇同實浪異名章舉有八腳身上有肉如曰亦曰章魚馬甲柱洪云即今之江瑶柱鬪以怪自呈其餘數十種莫不可歎驚我來禦魑魅自宜味南烹調以鹹與酸芼音冒釋也詩左右芼之以椒與橙調以或作調之腥臊始發越咀吞面汗騂思營切赤色惟蛇舊所識實憚口眼獰開籠聽其去鬱屈尚不平賣爾非我罪不驗豈非情不祈靈珠報搜神記隋侯見傷蛇以藥活之其後蛇銜明月珠以報淮南子謂隋侯之珠是也幸無嫌怨并無方作不聊歌以記之又以告同行記或作寄宿曾江口示姪孫湘二首孫曰湘字北渚老成之子公兄弇之孫元和十四年公赴潮州作雲昏水奔流天水􅐯相圍三江謂曾江有三江合流今混為一不見江口滅無口其誰識涯圻暮宿投民村髙處水半扉大雞俱上屋不復走與飛篙舟入其家暝聞屋中唏音希哀而不泣曰唏問知歲常然知或作之哀此為生微海風吹寒晴波揚衆星輝仰視北斗髙不知路所歸舟行亡故道亡或作止屈曲髙林間林間無所有奔流但潺潺嗟我亦拙謀致身落南蠻茫然失所詣無路何能還答柳柳州食蝦蟇蝦蟇雖水居水特變形貌下水字或作未方作木云言於水族之中恃異其形貌也今按此字此説皆不成文理闕之可也強號為蛙蛤於實無所校或作較或作效雖然兩股長其奈脊皴皰匹貌切玉篇云靣皮生氣也脊皴方作背脊跳躑雖云髙意不離濘淖上音侫下音閙泥也意方作竟今按又義作意為是下文又有竟不字不應復出鳴聲相呼和無理只取閙周公所不堪􅎈與灑同蟈氏掌去蛙黽焚牡鞠以灰灑之則死灰垂典教我棄愁海濵方作渚恆願眠不覺音教叵堪朋類多恆或作頗沸耳作驚爆音豹火裂端能敗笙磬仍工亂學校雖蒙句踐禮韓子越王伐吳欲人之輕死出見怒蛙乃為之軾從者曰奚敬此王曰為其有氣故也勇士遂有以頭獻者竟不聞報效大戰元鼎漢武元鼎五年秋蛙蝦蟇鬪年孰強孰敗橈或作撓方云字從木左傳畏君之震師徒橈敗杜云橈曲也居然當鼎味豈不辱釣罩余𥘉不下喉近亦能稍稍常懼染蠻夷失平生好樂方從唐本如此諸本或作平生性不樂閣本作不好今按此句未詳當闕樂五教切祝曰欲也禮記有所好樂捕注張牧為猘犬所傷醫云宜食蝦蟇牧甚難之而君復何為甘食比豢豹獵較務同俗全身斯為孝哀哉思慮深未見許回棹謂未見其歸棹揖也與棹同别趙子我遷於揭陽韋昭曰揭其逝切集注顔師古音竭漢屬南海郡廣州記云大廋始安臨賀桂陽揭陽為五嶺君先揭陽居揭陽去京華其里萬有餘不謂小郭中有子可與娛心平而行髙兩通詩與書婆娑嬉遊貌晉陶侃為荆州刺史將歸顧謂王衍曰老子婆娑正坐諸君輩海水南簸弄明月珠及我遷宜春袁州元和十四年七月憲宗上尊號大赦天下十二月公自潮州量移袁州意欲攜以俱擺頭笑且言一作不可我豈不足歟又奚為於北往來以紛如北或作此非是以或作各海中諸山中幽子隱士也頗不無相期風濤觀巳久不可渝又嘗疑龍蝦果誰雄牙鬚蚌螺與螺同魚鱉蟲瞿瞿音衢又音屨詩狂夫瞿瞿注無守貌以狙狙識一巳忘十巳方作以又云山谷謝本以皆作已今從黃謝大同細自殊欲一窮究之時歲屢謝除今子南且北豈非亦有圖人心未嘗同不可一理區或作驅宜各從所務未用相賢愚務或作好或作勝相一作分除官赴闕至江州寄鄂嶽李大夫謂李程也盆城去鄂渚風便一日耳不枉故人書無因帆江水帆諸本作泛方從蜀本云帆去聲少陵詩浦帆辰𥘉發故人辭禮闈旌節鎮江圻而我竄逐者龍鍾𥘉得歸别來巳三歲望望長迢遞咫尺不相聞平生那可計我齒落且盡君鬢白幾何鬢或作鬚年皆過半百來日苦無多少年樂新知衰暮思故友衰或作歲譬如親骨肉寧免相可不我昔實愚蠢或作戇方云愚憃見禮記漢書多用愚戇字今按説文憃丑江切戇陟絳切不能降色辭子犯亦有言臣猶自知之晉公子重耳亡外子犯從之反國及河子犯以璧授公子曰臣負羈絏從君行於天下臣之罪多矣臣猶自知之而况君乎公其務貫音丗又音射貸也過我亦請改事左氏傳鄭伯逆楚之辝曰使改事君夷於九縣君之惠也孤之願也樊曰反復詩語若與李嘗有隙至是因謝之故舊無大故則不棄此公所以思之且請改事也桑榆儻可收願寄相思字古詩客從逺方來遺我一書札上言長相思下言久離别南山有高樹行贈李宗閔韓曰據詩意鳯凰謂裴度挾丸子謂李得𥙿李紳元稹也據宗閔傳裴度代蔡引為彰義觀察判官蔡平知制誥長慶𥘉錢徽典貢舉宗閔托所親於徽李德裕李紳元稹共白徽取士不以實坐貶劒州刺史俄復為中書舍人由是嫌怨顯結搢紳之禍四十餘年不解此詩蓋長慶𥘉作也新史云宗閔𥘉為裴度引用及度薦李德𥙿可為宰相宗閔遂與為怨韓愈作南山猛虎行據度薦德𥙿在公殁後五年史誤矣輔注苕溪漁隱詩話云退之宗閔俱裴晉公征淮西時幕客也退之作南山猛虎行貽宗閔皆略盡其終身然退之無恙時宗閔才為中書舍人所為尚未暴白錢徽貶後牛李之憾始結至其為相則退之死久矣遂有封川之行所謂前汝下視鳥各議汝瑕疵鳥雀從噪之虎不知所歸者何其明驗也校本謂猛虎不為宗閔作南山有高樹花葉何衰衰所追反微也方云考張衡南都賦當作蓑蓑上有鳯凰巢鳯凰乳且棲四旁多長枝群鳥所托依黃鵠據其高衆鳥接其卑倿或作棲不知何山鳥羽毛有光輝飛飛擇所處正得衆所希上承鳯凰恩自期永不衰中與黃鵠羣不自隱其私下視衆鳥羣汝徒竟何為衆鳥方作羣鳥今按下有羣字不當復出不知挾九子心默有所規或作窺方云規啚也東坡五禽言去年麥不熟挾彈規我肉本公語也彈汝枝葉間汝翅不覺摧或言由黃鵠黃鵠豈有之慎勿猜衆鳥衆鳥不足猜或作疑無人語鳯皇汝屈安得知黃鵠得汝去婆娑舞貌弄毛衣方云閣本作婆婆今按閣本之謬乃有如此之甚者方雖不從而亦不敢明言其謬也前汝下視鳥各議汝瑕疵汝豈無朋匹有口莫肯開汝落蒿艾間幾時復能飛哀哀故山友中夜思汝悲路逺翅翎短不得持汝歸得或作能猛虎行諸本有贈李宗閔字方從唐閣蔡李本云蜀本總題誤以上題贈李宗閔四字綴猛虎行之上後人因之其實後詩不為宗閔作也猛虎行樂府舊題非前詩類也新史又謂裴度薦李德𥙿宗閔怨之為作此詩薦事在太和三年公沒久矣不可據猛虎雖云惡亦皆有匹㑪羣行深谷間百獸望風低身食黃熊父熊或作能奴耒切非是下同子食赤豹麛擇肉於熊豹方作羆肯視兔與貍正晝當谷眠眼有百步威自矜無當對氣性縱以乖朝怒殺其子暮還食其妃匹㑪四散走猛虎還孤棲狐鳴門兩旁雨方作四注云山谷本四作雨今按門只有雨旁作雨為是山谷蓋以唐本定也烏鵲從噪之出逐猴入居諸本皆如此方從舊藍本潮本倒此雨句又從杭蜀本以猴為猚云居當音姬傳本不考古音多以烏鵲從噪之一語易置於其上質之舊本非也推音壘似猴而大今按詩意蓋謂狐鳴鵲噪於外虎出逐之猴乃入居其穴而虎不知所歸耳狐鳴鵲噪能使虎出而不能使之夫其歸猴既入亢則又不待鵲噪而後虎失所歸也方以舊本古韻之故必欲倒此二句而不顧其文理之不順不若諸本之為當也又猚字本作雖字雖見於禮經然非常有之物亦不若作猴之為明白而易知也方意務為艱澀大抵如此今皆不取虎不知所歸誰云猛虎惡中路正悲啼豹來銜其尾熊來攫音矍持也其頥猛虎死不辭但慙前所為虎坐無助死况如汝細微坐或作兕如或作知皆非是故當結以信親當結以私親故且不保人誰信汝為朱文公校昌黎先生文集卷之六
