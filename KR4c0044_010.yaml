front:
  text: 朱文公校昌黎先生文集卷之十考異音釋附
  hash: sha256:cd77f5a4601140d6228cfc8181f71b7b58547bd391a26d6be6e2a69dff8e6045
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_010-1a}
body:
  text: 律詩凡八十首諸本作七十九道方從蜀本送李尚書赴襄陽八韻得長字李遜也帝憂南國切改命付忠良壤畫星搖動旗分獸簸揚五營兵轉肅孫曰謂禁掖後漢張奐率五營士圍竇武千里地還方控帶荆門逺飄浮漢水長賜書寬屬郡或作部戰馬隔鄰疆縱獵雷霆迅觀棊玉石忙風流峴胡典切樊曰羊祜每風景必造峴山置酒謂從事鄒湛曰自有宇宙便有此山首客花豔大堤倡韓日宋隨玉設為襄陽郎聞諸女歌因為詞曰朝發襄陽成暮至大堤也大堤諸女兒花豔驚郎目富貴由身致誰教不自強和席八十二韻席夔絳闕銀河曙東風右掖春韓曰應劭漢官儀中書為右曹稱西掖孫曰正門之兩旁曰掖官隨名共美花與思俱新綺陌朝遊間綾衾夜直頻孫曰漢官典職儀曰尚書郎入直洪青綾白綾被直宿直也橫門開日月髙閣切星辰庭變寒前草公主當年欲占春故將臺榭押城閸押或作壓欲知前面花多少直到南山不屬人少或作處晚春誰收春色將歸去將歸方作歸將排是慢緑妖紅半不存慢或作漫榆莢祗能隨柳絮等間撩亂走空園大行皇太后挽歌詞三首方公此憲宗母莊憲皇后也樊本云諸本脫太字非是一紀尊名正三時孝飬榮髙居朝聖主厚德載羣生武帳虛中禁虛或作空玄堂掩太平秋天笳鼓歇松柏遍山鳴威儀備吉凶文物雜軍容配地行新祭因山託故封鳯飛終不返劒化會相從張華延平津事補注王介甫曰此非君臣所宜言近於黷也樊曰莊憲後顯宗崩公故云謂近乎黷非也無復臨長樂空聞報曉鐘報曉或作曉暮追攀萬國來警衛百神陪畫翣所甲切韓曰王后輦車有翣羽蓋所以禦風塵登秋殿容衣入夜臺孫曰容衣喪服喪大記飾棺君龍帷三地振容注云青質五色盡之於絞繒而垂之以為振容容女蓋謂此韓曰選陸士衡挽歌送子長夜臺夜臺謂間墓雲隨仙馭逺風助聖情哀助方作動非是只有薑陵日妝奩音廉與奩同鏡奩也孫曰漢明帝謁原陵見太后鏡奩中物感動悲涕令易脂渾衰具左右皆泣一暫開廣宣上人頻見過三百六旬長擾擾百或作十不衝風雨即塵埃久慙朝士無禆輔慙方作為空愧髙僧數往來學道窮年何所得吟詩竟日未能回天寒古寺遊人少紅葉窗前有幾雌間遊二首雨後來更好繞池遍青青柳花間度竹菱葉故穿萍故或作亂方云少陵詩濽龍故起雲泣上燕子故來類皆用此字獨坐殊未厭孤斟詎能醒持竿至日暮幽詠欲誰聽兹遊苦不數再到遂經旬到或作至輕或作兼萍蓋汙池淨藤籠老樹新林鳥鳴訝客鳥或作鶯岸竹長遮鄰子雲祇自守奚事九衢塵酬馬侍郎寄酒馬揔壷情所寄四句意能多秋到無詩酒其如月色何和侯協律詠笋侯喜竹亭人不到新筍滿前軒乍出真堪賞𥘉多未覺煩或作繁方云公律詩不重用韻成行齊婢僕環立比兒孫驗長常攜尺愁乾屢側盆對吟忘膳飲偶坐變朝昏滯雨膏腴溼驕陽氣候溫得時方張王方云莊子所謂王長其間是也並去聲讀公與劉夢得蒲萄詩皆用張王字挾勢欲騰鶱見角牛羊沒看皮虎豹存攢生猶有隙散布忽無垠詎可持籌算誰能以理言縱橫公占地羅列暗連根狂劇時穿壁羣強幾觸藩深潛如避逐方作丗逺去若追奔始訝妨人路還驚入藥園萌牙防寖大覆載莫偏恩巳復侵危砌非徒出短垣身寧虞瓦礫計擬掩蘭蓀音孫香草且歎髙無數庸知上幾番短長終不校先後竟誰論外恨苞藏密中仍節目繁暫須回步履要取助盤飱或作餐方云盤飱置璧左氏語穰穰疑翻地森森競塞門戈矛頭戢戢蛇虺首掀掀婦懦咨料㨂料或作聊方云料音聊量也張湛列子序且將料蕳丗所希有者兒癡謁盡髠侯生來慰我詩句讀驚魂我或作意屬和才將竭呻吟至日暾他昆切日或作欲方云楚詞九嘆日暾暾其四舍亦可以日入言也過鴻溝龍疲虎困割川原億萬蒼生性命存誰勸君王回馬首真成一擲賭乾坤送張侍郎方云張賈時自兵侍為華州閣本作侍御非司徒東鎮馳書謁丞相西來走馬迎宣武節度韓弘為司徒持書謂巳持書往謁弘也丞相謂宰相裴度為淮西宣慰處置等使走馬迎謂巳走馬迎度也兩府元臣今轉密一方逋寇不難平贈刑部馬侍郎馬惚時副晉公東征紅旗照海壓南荒徴入中臺作侍郎中臺或作臺中非是暫從相公平小寇便歸天闕致時康奉和裴相公東征途經女几山下作或無奉字旗穿曉日雲霞雜方雲作紅雜作集今按對偶及文勢當從諸本山倚秋空劒戟明敢請相公平賊後暫攜諸吏上崢嶸郾城晚飲奉贈副使馬侍郎及馮李二貟外郾音偃郾城縣在許州或無奉字馮李謂馮宿李宗閔也閣本馮宿時以都官李宗閔時以禮部並從征城上赤雲呈勝氣蔡未平𢾗月前吳武陵自峽石望東南氣如旗鼓矛盾皆顛倒少選黃白氣從西北出盤蜿相交告公曰今西北王師所在黃白喜氣也敗氣為賊賊必亡矣眉間黃色見歸期幕中無事惟須飲即是連鑣向闕時酬别留後侍郎或無酬字蔡平命馬揔為留後寪文無出相如右謀帥難居郤縠先歸去雪銷溱洧動西來旌斾拂晴天同李二十八夜次襄城李正封也周楚仍連接川原乍屈盤雲垂天不暖塵漲雪猶乾印綬歸台室旌旗别將壇欲知迎候盛騎火萬星攢同李二十八貟外從裴相公野宿西界四面星辰著地明散燒煙火宿天兵不關破賊須歸奏自趂新年賀太平過襄城郾城辭罷過襄城潁水嵩山刮眼明巳去蔡州三百里家人不用逺來迎宿神龜招李二十八馮十七龜下或有驛字隘山野水照斜暉啄雪寒鴉趂始飛夜宿驛亭愁不睡幸來相就蓋征衣次硤石諸本硤作峽方云今陜縣也地理志可考數日方離雪今朝又出山試慿高處望隱約見潼關和李司勳過連昌宫或作李二十八司勳無過字樊曰連昌宫按志高宗顯慶三年置然詩落句云云疑為明皇所作而元微之連昌宮辭大概亦詠明皇帝夾道踈槐出老根高甍巨桷壓山原宫前遺老來相問今是開元幾葉孫次潼關先寄張十一一閣老使君張賈荆山巳去華山來日出潼關四扇開出或作照扇或作面刺史莫辭迎候逺相公親破蔡州回親或作新次潼關上都統相公峯本無此篇關下或有頭字一本在雨中寄張藉侯喜詩後暫辭堂印執兵權盡管諸軍破賊年冠蓋相望催入相待將功德格皇天桃林夜賀晉公西來騎火照山紅夜宿桃林臘月中手把命圭兼相印一時重疊賞元功送李貟外院長分司東都去年秋露下羇旅逐東征今歲春光動驅馳别上京飲中相顧色送後獨歸情兩地無千里因風數寄聲晉公破賊回重拜台司以詩示幕中賔客愈奉和或作晉公自蔡州入賜途中重拜云云愈因和之南伐旋師太華東天書夜到册元功將軍舊壓三司貴相國新兼五等崇鵷鷺欲歸仙仗裏熊羆還入禁營中長慙典午非材職或作識得就間官即至公獨釣四首釣或作酌侯家林館勝偶入得垂竿曲樹行藤角平池散芡盤羽沈知食駛或作怏或作緡細覺牽難聊取夸兒女榆條繫從鞍一徑向池斜池塘野草花雨多添柳耳水長減蒲芽坐厭親刑柄時為刑部侍郎偷來傍釣車坐厭方作厭坐云厭與偷為一義坐親刑柄來弄釣車為一説公詩多此躰今按坐厭與偷來為對亦自親切又况坐厭乃常用之語韋蘇州云坐厭淮南守此類極多方從誤本更為曲説不知語意之拙澀也太平公事少吏隱詎相賖獨往南塘上秋晨景氣醒露排四岸草風約半池萍鳥下見人寂魚來聞餌馨所嗟無可召不得倒吾瓶秋半百物變溪魚去不來風能坼芡觜露亦染梨腮方云廣信晃氏舊藏印本能作稜亦作液一云山谷所定逺岫重疊出寒花散亂開所期終莫至日暮與誰回枯樹老樹無枝葉風霜不復侵腹穿人可過皮剝蟻還尋寄託惟朝菌依投絶暮禽猶堪持改火樊曰論語鑽燧改火馬融曰周書月令有改火之文春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞槱之火冬取檀槐之火一年之中鑽火各異木故曰改火也未肯但空心元日酬蔡州馬十二尚書去年蔡州元日見寄之什元日新詩巳去年蔡州遙寄荷相憐今朝縱有誰人領自是三峯不敢眠峯或作冬方從唐本云華嶽有三峯唐人守華者皆謂之三峯守蓋公西歸經從之路馬詩必有所序述今不可得而詳也今佊此詩并題皆不言經由華州所作方説既無所據又三峯不敢眠亦無文理今當闕之以俟知者詠燈花同侯十一或作同侯十一説燈花侯十一喜也今夕知何夕花然錦帳中自能當雪䐘那肯待春紅黃裏排金粟諸本黃作囊方云何遜詩金粟裏搔頭蜀人史彥升曰黃裏排金謂額間花鈿也又沈約宋書漢制乘輿翠蓋黃裏所謂黃屋也諸本多引漢紀注實此義今按漢制黃屋與此詩文意不同疑史説誤叉頭綴玉蟲更煩將喜事來報主人公祖席前字此詩公自題其後云兩詩何處好就中何處佳何處惡舊注云以王涯徙袁州刺史而作方云按舊紀涯刺袁州元和三年四月也公時在東都故曰祖席落橋邊出詩前後注文舊本無之蜀本亦然又或二題前字秋字上皆有得字祖席洛橋邊親交共黯然野晴山簇簇霜曉菊鮮鮮書寄相思處杯銜欲别前淮陽知不薄終願早回船方云陽本作南洪本作陽云用及黯事以後詩有淮南字隨筆以誤也秋字淮南悲木落而我亦傷秋而或作今況與故人别那堪羇宦愁榮華今異路風雨苦同憂莫以宜春逺江山多勝遊送鄭尚書赴南海番禺士音潘下音愚廣州有番禺縣軍府盛欲説暫停杯蓋海旗幢出連天觀閣開衙時龍户集韓曰南部新書長安有龍户見水色則知有龍或引出但魚而巳上日馬人來韓曰後漢思援詩尋邑蠻以不能還者數十人留於象林南界所鑄銅柱下南蠻呼為馬留人見新史南蠻博風靜鶢鶋祝曰海鳥見左傳及國語去官廉蚌蛤回樊曰後漢孟嘗合浦還珠事貨通師子國師子國有而海中余袤二千餘里國史輔云師子國船最大梯而上下數丈皆積寶貨云云樂奏武王臺武或作越方云漢傳尉他自稱南越武王事事皆殊異無嫌屈大才答道士寄樹雞樹雞木耳大者軟濕青黃狀可猜欲烹還喚木盤回煩君自入華陽洞韓曰茅君傳玄中之洞六十三所第八句曲山之洞曰金壇華踼之天直割乖龍左耳來取譬也左遷至藍關示姪孫湘藍關即秦之嶢關在今藍田縣湘字北者筆墨間録云公此詩仁且有禮非志仁義者不能也封朝奏九重天夕貶潮州路八千欲為聖明除弊事肯將衰朽惜殘年欲或作本肯將或作豈將方作豈於朽方作暮惜方作計雲橫秦嶺家何在雪擁藍關馬不前擁方作掩今按方本此詩於暮計掩四字皆不如諸本之勝知汝逺來應有意好收吾骨瘴江邊武關西逢配流吐蕃嗟尓戎人莫慘然戎或作胡湖南地近保生全地近或作近地我今罪重無歸望直去長安路八千次鄧州界潮陽南去倍長沙戀闕那堪又憶家心訝愁來惟貯火眼知别後自添花商顔樊曰漢溝洫志引洛水至商顔下注商山之顔譬人之額也暮雪逢人少鄧鄙春泥見驛賖早晚王師收海嶽普將雷雨發萌芽題臨瀧寺不覺離家已五千仍將衰病入瀧船潮陽未到吾能説海氣昏昏水拍天吾能或作人先或作先聞水或作浪晚次宣溪辱韶州張端公使君惠書敘别酬以絶句二章或無辱端公絶句字韶州南去接宣溪韶或作潮非是雲水蒼茫日向西客淚數行元自落元或作先鷓鴣休傍耳邊啼兼金那足比清文百首相隨愧使君那或作安百或作白俱是嶺南巡管內莫欺荒僻斷知聞題秀禪師房橋夾水松行百步竹牀莞席到僧家松或作船牀或作林暫拳一手支頭卧還把漁竿下釣沙頭或作頤釣或作晚將至韶州先寄張端公使君借圖經或無端公字曲江山水聞來久恐不知名訪倍難願借圖經將入界每逢佳處便開看每或作亦過始興江口感懷憶作兒童隨伯氏南來今只一身存目前百口還相逐舊事無人可共論韶州留别張端公使君來往再逢梅柳新孫曰元和十四年正月公以論佛骨貶潮州三月至潮州十月量移袁州十五年正月至袁州其往來上下於韶皆梅栁新時也别離一醉綺羅春久欽江揔文才妙韓曰陳後主欲以江揔為太子詹事孔奐曰揔文華之人大子何藉於㧾自歎虞翻骨相屯樊曰虞翻仕吳為騎都尉數犯顔諌諍孫權不恱坐徙丹陽涇縣後又徙交州嘗云自恨疏節骨體不媚犯上獲罪當長沒海隅翻字仲翔以喻巳也鳴笛急吹爭落日清歌緩送欸行人諸本爭作催欵作感方從唐本云蜀本亦作爭李云二宋評此詩小宋疑感字誤大宋𥘉不以為然後得善本始信巳知奏課當徴拜那復淹留詠白蘋量移袁州張韶州端公以詩相賀因酬之或無端公因三字或作量移袁州酬張韶州先寄詩賀或作量移袁州張韶州先詩見賀因酬之方云題語凡四易各有義也明時逺逐事何如遇赦移官罪未除北望詎令隨塞鴈南遷才免葬江魚將經貴郡煩留客先惠髙文謝起豫暫欲繫船韶石下上賔虞舜整冠𥚑次石頭驛寄江西王十中丞閣老仲舒慿髙試回首試回方作回馬今按下句有馬字方本非是一望豫章城人由戀德泣由或作猶馬亦别羣鳴寒日夕始照風江逺漸平風江或作江風默然都不語應識此時情遊西林寺題蕭二兄郎中舊堂蕭兄有女出家諸本遊作題題作故無兄字及注方云蕭蕭存也存少與韓會梁蕭友善惡裴延齡之為人棄官歸廬山廬山令猶有蕭存魏弘李渤同遊大林題名中郎韓曰蔡中郎雍女名琰字文姬興平中天下喪亂為胡騎所獲曹操痛雍無嗣以金贖之因問曰聞夫人家先多賞藉猶能記憶否曰昔亡父賜書四千卷流離塗炭罔有存者今所誦憶裁四百餘萹於是繕寫送之文無遺誤有女能傳業伯道樊曰鄧攸字伯道為河南太守永嘉末以石勒之亂負妻而逃擔其兒及其弟子緩恐不能兩全乃謂其妻曰吾弟早亡惟有一息理不可絶乃棄其兒而逃曰幸而得存後當有子過江仕終尚書右僕射卒以無嗣時人義而哀之曰天道無知使鄧伯道無兒無兒可保家今按因話録作無人可主家偶到匡山即廬山蕭郎中名存字伯誠頴士之子與公兄會厚善公自少為存所知及自袁州還過存廬山故居而存諸子前死有一女為尼公為經紀其家西林即江州廬山寺也曽住處幾行衰淚落煙霞方云因話録作今日匡山過舊隱空將衰淚對煙霞自袁州還京行次安陸先寄隨州周貟外諸本如此但以隨為循方從唐本云自貶所蒙恩袁州除官還京凡多六字方云如淳漢紀注曰凡言除者除故官就新官也公志鄭淡墓日詔授司馬節度除其官為工部尚書與此司周貟外周君巢也時為隨州刺史以經由道里考之作循非是今按諸本得之唐本既顛倒重復而方云又不可曉疑袁州字當在貶字上或注在所字下循州之辨則方得之或本袁州下有除官二字亦通隨又作復當考行行指漢東暫喜笑言同雨雪離江上蒹葭出夢中面猶含瘴色眼巳見華風歲暮難相值酣歌未可終題廣昌館白水龍飛巳幾春偶逢遺迹問耕人逢或作尋丘墳發掘當官路何處南陽有近親路或作道寄隨州周貟外隨或作循或作復説已見上陸孟丘楊久作塵蜀本楊作陽方云公與陸長源孟叔度丘頴楊疑及周君巢同為董晉幕客故也同時存者更誰人金丹孫曰周好金丹服餌之術栁子厚集中有答周君巢論餌藥久壽書是也别後知傳得乞取刀圭救病身酒中留上襄陽李相公謂逢吉也諸本作醉中留别襄州李相公濁水汙泥清路塵孫曰曹子建詩君若清路塵妾若濁水泥浮沉各異勢會合念何時濁水汙泥公以自喻清路塵以喻逢吉也還曽同制掌絲綸眼穿長訝雙魚斷耳熱樊曰楊惲書云酒後耳熱仰天拊缶而呼烏烏何辭數爵頻銀燭未銷窗送曙銷或作終或作殘窗或作雞金叉半醉座添春醉或作墜許彥周云退之詩酩酊馬上知為誰又云金叉半醉坐添春乃知賦梅花不獨朱廣平知公不久歸鈞軸應許間官寄病身去歲自刑部侍郎以罪貶潮州刺史乘驛赴任其後家亦譴逐小女道死殯之層峰驛旁山下蒙恩還朝過其墓留題驛梁諸本只作題驛梁下有注字與此題少異方從唐本數條藤束木皮棺草殯荒山白骨寒驚恐入心身巳病扶舁沿路衆知難繞墳不腵號三匝設祭惟聞飯一盤致汝無辜由我罪百年慙痛淚闌干賀張十八祕書得裴司空馬或作酬張祕書因騎馬贈詩司空逺寄養𥘉成毛色桃花眼鏡明落日已曽交轡語春風還擬並鞍行長令奴僕知飢渴須著賢良待性情旦夕公歸伸拜謝免勞騎去逐雙旌騎去或作去騎方云裴詩有它曰著鞭能雇我之語故公云尓杏園送張徹侍御歸使或作侍即無歸使字方從唐本云徹時以幽州判官趍朝半道有詔還之仍遷侍御史從張弘靖之請也杏園在長安城南其實徹已抵京但未朝見耳舊傳云續有張徹自逺使歸是也東風花樹下送爾出京城久抱傷春意新添惜别情歸來身巳病相見眼還明更遣將詩酒誰家逐後生雨中寄張博士籍侯主簿喜放朝還不報半路踏泥歸半路方作夜半今按朝還無因至夜半作半路亦不可曉疑以雨放朝而有司失於關報行至半路乃得報而歸也方本非是雨慣曽無節雷頻自失威見牆生菌遍憂麥作蛾飛歲晚偏蕭索誰當救晉飢奉和兵部張侍郎酬鄆州馬尚書祗召途中見寄開緘之日馬帥巳再領鄆州之作張謂張賈諸本無奉和及鄆州作字别有奉和二字祗或作𬒳來朝當路日承詔改轅時再領須句國句音劬樊曰須句韓之東平也左傳僖公二十一年邾人滅須句杜預注須句在東平仍遷少昊司韓曰秋帝少昊蓋主刑而總加檢校刑部尚書故云暖風抽宿麥清雨卷歸旗輔注石林詩話張文潛常與蔡天啓論韓柳五字警句文潛舉退之暖風柚宿麥清雨卷歸旗子厚壁空殘月曙門掩候蟲秋皆集中第一賴寄新珠玉長吟慰我思早春與張十八博士籍遊楊尚書林亭寄第三閣老兼呈白馮二閣老諸本無十八字方從唐本云白居易馮宿也第三閣老楊於陵之子嗣復也白和詩只作楊舍人林池今按注本第三作三第云澄本如此然王沂公言行録記楊大年呼沂公為弟四廳舍人疑前丗遺俗自有此等稱呼洪本或未必然而此所遊乃嗣復家林亭故特以詩寄之而并呈白馮也但未知三人者其次第又如何耳牆下春渠入禁溝或作流云渠氷𥘉破滿渠浮鳯池近日長先暖流到池時更不流更或作見奉使常山早次太原呈副使吳郎中或無早字方云公使鎮州吳刑以駕部郎中副行㓪㓪聞街鼓晨起似朝時翻翻走驛馬春盡是歸期地失嘉禾處風存蟋蟀辭暮齒良多感無事涕垂頥夕次壽陽驛題吳郎中詩後或作壽陽驛題絶句方云蜀本亦注夕次字風光欲動别長安春半邊城特地寒不見園花兼巷柳馬頭惟有月團團鎮州𥘉歸别來楊柳街頭樹擺弄春風只欲飛擺或作搖弄或作撼只或作祗還有小園桃李在留花不發待郎歸同水部張貟外曲江春遊寄白二十二舍人或作同張水部籍遊曲江寄云云漠漠輕隂晚自開靑天白日映樓臺天或作春曲江水滿花千樹有底忙時不肯來和水部張貟外宣政衙賜百官櫻桃詩或作和張水部勑賜櫻桃詩漢家舊種明光殿炎帝還書本草經豈似滿朝承雨露共看傳賜出青冥香隨翠籠力董切竹器也擎𥘉到或作重或作出色映銀盤寫未停映或作照食罷自知無所報空然慙汗仰皇扃早春呈水部張十八貟外二首閣本無此二首天街小雨潤如酥草色遙看近却無最是一年春好處絶勝花柳滿皇都花或作煙莫道官忙身老大即無年少逐春心慿君先到江頭看柳色如今深又深送桂州嚴大夫同用南字嚴謨也題下或有赴任二字蒼蒼森八桂森八閣本作八月桂或作樹方云山海經桂林八樹在賁禺東天台山賦八桂森挺以凌霜兹地在湘南地閣本作樹在或作近江作青羅帶補注東坡云退之詩江作青羅帶子厚詩海上羣山似劒鋩子瞻為之對云繫悶豈無羅帶水割愁還有劒鋩山山如碧玉篸祖含切與簮同叉篸也祝曰梁劉孝威詩金篸臨鬢斜户多輸翠羽家自種黃甘逺勝登仙去飛鸞不假驂假或作暇奉酬天平馬十二僕射暇日言懷見寄之作或無暇日言懷之作六字馬㧾時為鄆曹濮等州觀察使天平馬㧾軍曰天平篇什外政事亦無雙威令加徐土儒風𬒳魯邦劉夢得天平軍壁記惟鄆在春秋為須句之國涉漢為濟東蓋禹貢兖州之域而曰威令加徐土者禹貢海岱及淮惟徐州而前漢以徐隸臨淮則徐亦魯也徐土魯邦字蓋出詩常武閟宫之什云清為公論重寬得士心降歲晏偏相憶長謡坐北窗奉使鎮州行次承天行營奉酬裴司空或有相公字竄逐三年海上歸逢公復此著征衣旋吟佳句還鞭馬恨不身先去鳥飛鎮州路上謹酬裴司空相公重見寄謹或作奉銜命山東撫亂師日馳三百自嫌遲風霜滿面無人識何處如今更有詩奉和僕射裴相公感恩言志或無奉字文武成功後居寪百辟師林園窮勝事鍾鼓樂清時擺落遺高論雕鐫出小詩自然無不可范蠡爾其誰其或作為和僕射相公朝回見寄或作回朝或有裴字盡瘁年將久公仐始暫間事隨憂共減詩與酒俱還放意機衡外收身矢石間秋臺風日逈正好看前山奉和李相公題蕭家林亭逢吉樊曰李相公逢吉也蕭氏在唐最盛瑀嵩華復俯置倣遇凡八葉宰相嵩第在城南布政坊置弟在城南永樂坊見長安志餘無所見山公孫曰襄陽記晉山簡為守峴山南習郁有佳園池蕳每臨此池輒大醉而歸名之日高陽池時有童貌歌曰山公何所往來至高陽池日夕倒載歸酪酊無所知自是林園主歎惜前賢造作時岩洞幽深門盡鎖不因丞相幾人知奉和杜相公太清宫紀事陳誠上李相公十六韻或作杜相公太清宫十六韻紀事陳誠上李相因和和謂元頴也天寶三年置耒耜興姬國輴欙上丑倫切下魯追切書豫乘四載孔安國曰水乘舟陸乘車泥乘輴山乘欙輴樊曰史記漢書並作橇音蕝纍史記作橋漢書作挶音九足切建夏家在功誠可尚於道詎為華象帝威容大仙宗寶曆賖衛門羅戟槊圖壁雜龍蛇禮樂追尊盛乾坤降福遐四真樊曰天寶元年親享玄元皇帝于新廟以莊子為南華真人文子為通玄真人列子為沖虛真人庚桑子為洞虛真人是為四真也皆齒列二聖樊曰𥘉太清宫成命工於太白山採白石為玄元真像衮冕之服當扆南面元宗肅宗真容侍立左右皆朱衣朝服亦肩差陽月時之首隂泉氣未牙殿階鋪水碧階或作筵庭炬坼金葩紫極觀忘倦青詞奏不譁噌吰上音錚下音宏鍾聲相如賦曰聲噌吰而似鍾音宫夜闢嘈囐杜刀切下才曷切祝曰鼓聲東都賦奏嚴鼓之嘈囐鼓晨檛陟瓜切擊也祝曰你衡為漁陽摻過蹀𨄌而前褻
