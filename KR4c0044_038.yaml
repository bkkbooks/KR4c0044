front:
  text: 朱文公校昌黎先生集卷之三十八考異音釋附
  hash: sha256:59ebb8e5bd641de7d05ad4f21f302ad550ccd98993d9284e90100b2d168bc43c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_038-1a}
body:
  text: 表狀為韋相公讓官表韋貫之也臣某言伏奉今日制命以臣為尚書右丞同中書門下平章事非常之寵忽降於上天不次之恩遽屬於庸品承命震駭心神靡寧顧巳慙靦手足失措臣某誠惶誠恐頓首頓首臣本非長才又乏敏識學不能通逹經訓文不足緣飾吏事徒知立志廉謹絶朋勢之交處官恪恭免請託之纍因緣資序驟歷臺閣蒙生成於天地無禆輔於涓塵忝冒以居涯分遂極常以盈滿自誡方思退處里閭何意恩澤益深猥令超參鼎鉉竊自惟度實不堪任臣某誠惶誠恐頓首頓首臣聞宰相者上熙陛下覆燾之恩下遂羣生性命之理以正百度以和四時澄其源而清其流統於一而應於萬毫釐之差或致弊於寰海晷刻之誤或遺患於歷年固宜旁求隱士必得能者然後授之不可輕以付臣使人失望上纍聖主知人之哲下乖微臣量巳之義無輔於理有妨於賢况今俊乂至多耆碩咸在苟以登用皆踰於臣伏乞特回所授以示至公之道天下幸甚方有復出四字為宰相賀雪表臣某言臣伏以去歲冬間雨雪頗少今年春首宿麥未滋陛下深念黎氓屢形詞旨神監昭逹皇情感通春雲始繁時雪遂降實豐穰之嘉瑞銷癘疫於新年東作可期南畒有望此皆陛下與天合德視人如傷每發聖言則獲靈貺見天人之相應知朝野之同歡臣等職在燮和慙無效用覩斯慶澤實荷鴻休進順宗皇帝實録表狀臣愈言今之所以知古後之所以知今不可口傳必慿諸史自雖二帝三王之盛若不存紀録則名氏年代不聞于兹功德事業無可稱道焉順宗皇帝以上聖之姿早處儲副晨昏進見必有所陳二十餘年未嘗懈倦隂功隱德利及四海及嗣守大位行其所聞順天從人傳授聖嗣陛下欽承先志紹致太平原大推功實資撰次原大或作原本去八年十一月臣在史職監修李吉甫授臣以前史官韋處厚所撰先帝實録三卷云未周悉令臣重修臣與修撰左拾遺沈傳師直館京兆府咸陽縣尉宇文籍等共加採訪并尋檢詔勑修成順宗皇帝實録五卷削去常事著其繫於政者比之舊録十益六七忠良姦佞莫不備書苟關於時無所不録吉甫愼重其事欲更研討比及身殁尚未加功臣於吉甫宅取得舊本自冬及夏刋正方畢文字鄙陋實懼塵玷謹隨表獻上實懼塵玷或作實積慙懼臣愈誠惶誠恐頓首頓首謹言右臣去月二十九日進前件實録今月四日宰臣宣進止其間有錯誤令臣改畢却進舊本者臣當修撰之時史官沈傳師等採事得於傳聞詮次不精致有差誤聖明所鑒毫髮無遺恕臣不逮重令刋正今並添改訖其奉天功烈更加尋訪巳據所聞載於首卷儻所論著尚未周詳臣所未知乞賜宣示庶獲編録永傳無窮謹録奏聞謹奏為裴相公讓官表臣某言伏奉今日制書以臣為朝議大夫守中書侍郎同中書門下平章事承命驚惶魂爽飛越俯仰天地若無所容臣某誠惶誠恐頓首頓首臣少涉經史粗知古今天與朴忠性惟愚直知事君以道無憚殺身慕當官而行不求利已人以為拙臣行不疑元和之𥘉始拜御史旋以論事過切為宰臣所非移官府廷因佐戎幕移或作出因或作乃陛下恕臣之罪憐臣之心拔居侍從之中遂掌絲綸之重受恩益大顧已益輕大或作厚益輕或作愈輕苟耳目所聞知心力所逮及少關政理輒以陳聞於禆輔無涓埃之微而讒謗有丘山之積陛下知其孤立賞其微誠獨斷不謀獎待踰量微誠或作盡誠量或作重臣誠見陛下具文武之德有神聖之姿啓中興之宏圖當太平之昌曆勤身以儉與物無私威怒如雷霆容覆如天地實羣臣盡節之日才智效能之時聖君難逢重德宜報苦心焦思以日繼夜苟利於國知無不為徒欲竭愚未免妄作陛下不加罪責更極寵光既領臺綱又毗邦憲聖君所厚凶逆所讎闕於防虞幾至斃踣恩私曲𬒳性命獲全忝纍祖先玷塵班列未知所措祗自內慙豈意陛下擢臣於傷殘之餘委臣以燮和之任忘其陋汙使佐聖明此雖成湯舉伊尹於庖厨髙宗登傅説於版築周文用吕望於屠釣齊桓起寧戚於飯牛雪耻蒙光去辱居貴以今凖古擬議非倫陛下有四君之明行四君之事微臣無四子之美獲四子之榮豈可叨居以彰非據方今干戈未盡戢夷狄未盡賔麟鳯龜龍未盡遊郊藪草木魚鱉未盡𬒳雍熙當大有為之時得非常人之佐然後能上宣聖德以代天工如臣等類實不克堪伏願博選周行旁及巖穴天生聖主必有賢臣得而授之乃可致理或作集事乞回所授以叶羣情無任懇欵之至為宰相賀白龜狀鄂嶽觀察使所進白龜右今日某宣進止示臣前件白龜者止或作旨方云今玉堂宣底作進止下同今按陸公奏議亦可考伏以禎祥之見必有從來物象既呈可以推究古者謂龜為蔡蔡者龜也今始入賊地而獲龜者是獲蔡也白者西方之色刑戮之象也是必擒其帥而得地也提挈而來生致闕下此象既見其應不遙斯皆陛下聖德所施靈物來效太平之運其在於今臣等謬列台衡親覩嘉瑞無任抃躍之至冬薦官殷侑狀或無冬官字前天德軍都防禦判官承奉郎試大理評事兼監察御史殷侑右伏凖貞元五年六月十一日勑停使郎官御史在城者委常參官每年冬季聞薦者或無停字方引宋説云前天德軍防禦即所謂停使也前件官兼通三傳傍習諸經注疏之外自有所得久從使幕亮直著名朴厚端方少見倫比以臣所見堪任御史太常博士臣所諳知不敢不舉謹録奏聞伏聽勑旨進王用碑文狀故檢校左散騎常侍兼右金吾衛大將軍贈工部尚書王用神道碑文右京兆尹李翛是王用親表傳用男沼等意請臣與亡父用撰前件碑文者翛或作修説巳見前伏以王用國之元舅位望頗崇豈臣短才所能褒飾不敢辭讓輒以撰訖其碑文謹録本隨狀封進伏聽進止其王用男所與臣馬一匹并鞍銜白玉腰帶一條臣並未敢受領謹奏謝許受王用男人事物狀某官某乙本或無此四字但云且愈言今日品官云云今按狀體前合貝官不當云臣某言右今日品官唐國珍到臣宅奉宣進止緣臣與王用撰神道碑文令臣領受用男沼所與臣馬一匹并鞍銜及白玉腰帶一條者臣才識淺薄詞藝荒蕪所撰碑文不能備盡事迹聖恩弘奬特令中使宣諭并令臣受領人事物等承命震悚再欣再躍無任榮抃之至謹附狀陳謝以聞謹狀薦樊宗師狀攝山南西道節度副使朝議郎前檢校水部員外郎兼殿中侍御史賜緋魚袋樊宗師校下方有尚書字右件官孝友忠信稱於宗族朋友可以厚風俗勤於藝學多所通解議論平正有經據可以備顧問謹潔和敏持身甚苦遇物仁恕有材有識可任以事今左右史並闕貟外郎侍御史亦未備貟若蒙擢授必有輔益忝在班列知賢不敢不論謹録狀上伏聽處分舉錢徽自代狀尚書刑部朝散大夫守太子右庶子飛騎尉錢徽右臣伏準建中元年正月五日勑常參官授上後三日內舉一人以自代者前件官器質端方性懷恬淡外和內敏潔靜精微可以專刑憲之司參輕重之議況時名年輩俱在臣前擢以代臣必允衆望伏乞天恩遂臣誠請謹録奏聞謹奏進撰平淮西碑文表或無撰文二字臣某言伏奉正月十四日勑牒以收復淮西羣臣請刻石紀功明示天下為將來法式正月十四日勑牒或作某月日勑榜榜字非是以或作巳或無復字式字陛下推勞臣下允其志願使臣撰平淮西碑文者推勞臣下或作推功勞臣聞命震駭心識顛倒非其所任為愧為恐經涉旬月不敢措手中謝涉旬方作旬涉竊惟自古神聖之君既立殊功異德卓絶之迹必有竒能博辨之士為時而生持簡操筆從而寫之各有品章條貫然後帝王之美巍巍煌煌充滿天地其載於書則堯舜二典夏之禹貢殷之盤庚周之五誥於詩則玄鳥長發歸美殷宗清廟臣工小大二雅周王是歌辭事相稱善并失次待或作侍乾坤之容日月之光知其不可繪畫強顔為之以塞詔旨罪當誅死其碑文今巳撰成謹録封進無任慙羞戰怖之至謹上或有隨表二字慙羞戰怖或作慚惶怖懼此下或有謹奉表以聞三月二十五日臣愈誠惶誠恐頓首頓首謹言二十三字今按此或本以聞下便著月日與今表式不同未詳其説奏韓弘人事物狀古本云四月一日涯度羣夷簡奉進止碑文宣賜韓弘一本右臣先奉恩勑撰平淮西碑文或無恩字或無勑字伏緣聖恩以碑本賜韓弘等今韓弘寄絹五百匹與臣充人事未敢受領謹録奏聞伏聽進止謹奏謝許受韓弘物狀臣某言今日品官第五文嵩至臣宅奉宣聖旨令臣受領韓弘等所寄撰碑人事絹者恩隨事至榮與幸并慙抃怵惕罔知所喻中謝伏以上贊聖功臣子之職下霑羣帥文字所宜陛失次待或作侍乾坤之容日月之光知其不可繪畫強顔為之以塞詔旨罪當誅死其碑文今巳撰成謹録封進無任慙羞戰怖之至謹上或有隨表二字慙羞戰怖或作慚惶怖懼此下或有謹奉表以聞三月二十五日臣愈誠惶誠恐頓首頓首謹言二十三字今按此或本以聞下便著月日與今表式不同未詳其説奏韓弘人事物狀古本云四月一日涯度羣夷簡奉進止碑文宣賜韓弘一本右臣先奉恩勑撰平淮西碑文或無恩字或無勑字伏緣聖恩以碑本賜韓弘等今韓弘寄絹五百匹與臣充人事未敢受領謹録奏聞伏聽進止謹奏謝許受韓弘物狀臣某言今日品官第五文嵩至臣宅奉宣聖旨令臣受領韓弘等所寄撰碑人事絹者恩隨事至榮與幸并慙抃怵惕罔知所喻中謝伏以上贊聖功臣子之職下霑羣帥文字所宜陛下謙光自居勸勵為事各賜立功節將碑文一通使知朝廷備録勞效韓弘榮於寵賜遂寄縑帛與臣於臣何為坐受厚貺恩申上致利則臣歸慙戴兢惶舉措無地無任感恩慙懇之至朱文公校昌黎先生集卷之三十八
