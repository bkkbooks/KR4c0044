  text: 朱文公校昌黎先生文集卷之七考異音釋附
  hash: sha256:49f675918fe302ee7d901c7a1b4f389e71e827097dc853811c210df9bfb424ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_007-1a}
body:
  text: 古詩雪後寄崔二十六丞公斯立藍田十月雪塞関我興南望愁羣山攅天嵬嵬凍相映嵬嵬諸本作崔嵬君乃寄命於其間秩卑俸薄食口衆豈有酒食開容顔殿前羣公賜食罷驊騮周穆王馬蹋路驕且閑稱多量少鍳裁宻豈念幽桂遺榛菅上音臻下音官榛或作蓁幾欲犯嚴出薦口氣象硉兀上盧骨切硉兀高亢皃兀或作矹未可攀歸來殞涕揜関卧心之紛辭誰能刪詩翁憔悴斸荒棘斸陟玉切斫也時元和十年十月孟郊已死洪曰詩翁指孟郊也清王刻佩聮玦環玦古穴切韓曰玦如環而玦肉好如一謂之環孫曰三者喻孟郊詩之王也腦脂遮眼卧壯士洪曰謂張籍病眼大弨强招切弛也挂壁無由彎挂方作擐云擐貫也言擐於壁而不用也或作擐臂乾坤施惠萬物遂獨於数子懷偏慳朝欷詐旣香衣二切戯欷也暮唶唶子夜切歎也祝曰後漢遥望見㫪陵郭唶曰氣佳哉選咄唶令心悲不可解我心安得如石頑送僧澄觀浮屠西来何施爲優優四海爭奔馳構楼架閣切星漢誇雄鬪麗止者誰僧伽樊曰李邕泗州普光玉寺碑僧伽者龍朔中西來甞縱觀臨淮發念置寺旣成中宗䑗名普光玉以景龍四年三月二日示㓕於京洪曰李太白曾伽歌云此僧本住南天竺為法頭陀來此囯又云嗟子落泊江淮乆罕遇眞心說空有蓋相遇於江淮也太白於豪傑中識郭子儀隱逸中識司馬承禛浮屠中識僧伽則其人可知後出淮泗上淮方作雄云雄言特出也今桉上句已有誇雄字下句又云尤恢竒則此作雄非是勢到衆佛尤恢竒恢或作魁方云恢竒字見史記公孫洪傳此詩今本以恢為魁又悪上語意同遂易雄為淮非也今按作恢亦不免与上句相犯况淮之不可為雄自避上句誇雄字𥘉不專為此耶越商胡賈脫身罪或作献今從謝校珪璧滿船寕計資淸淮無波平如席欄柱傾扶半天赤火燒水轉掃地空突兀便高三百尺影沉潭底龍驚遁當晝無雲跨虚碧借問經營夲何人道人澄觀名籍籍愈昔從軍大梁下往来滿屋賢豪者屋或作日方云蒲屋字見丗說皆言澄觀雖僧徒公才吏用當今無後從徐州辟書至紛紛過客何由記人言澄觀乃詩人人言或作又言一座競吟詩句新向風長歎不可見我欲收歛加冠巾洛陽窮秋厭窮獨丁丁啄門疑啄木啄門或作打門疑或作如有僧來訪呼使前伏犀孫曰伏犀謂骨當額上入髪祭韓曰伏犀貴相李固頂骨匿犀後爲太尉即此挿腦高頰權或作顴方従杭蜀本云選洛神賦敏俳文高權長頭高權古字只作權刋本不深考也頰古叶切靣頰也權輔骨也選靨輔承權頬惜哉巳老無所及坐睨神骨空潸音删然臨淮太守謂泗州刺史𥘉到郡逺遣州民送音問好竒賞俊直難逢直或作实去去爲致思從容山南鄭相公樊貟外酬荅爲詩其末咸有見及語樊封以示愈依賦十四韻以獻鄭餘慶樊宗師也鄭餘慶元和九年爲山南西道節度使樊宗師爲副李肇囯史𥙷曰元和以後爲文竒詭則斈於韓愈苦澁則斈於樊宗師公此詩及宗師墓誌語竒而澁皆所以效其体也梁維西南屏維或作推山厲水刻屈禀生肖勦剛勦音巣輕捷也方云荆公山谷本作勁云難諧在民物滎公鼎軸老方云餘慶封榮陽郡公作榮者非烹斡烹謂烹擊斡謂斡旋猶言幸制也力健倔渠勿切強也斡或作鮮非是帝咨女予往牙纛前􅽛坲上蒲悶切下音佛或作拂方云佛哱塵起皃字見楚詞九歎威風挾惠氣盖壌兩劘拂方云劘音摩子虚賦上摩蘭蕙下拂羽盖文選作靡賈山傳賛自下劘上序傳只作摩古摩靡劘字皆通用揚子劘虎牙莊子喜則交頸相靡漢衡山王賛臣下漸靡使然今集韻摩下不出靡字非也􅰩諸本作刜茫漫華黒閒指畫變怳歘許忽切暴起也即忽字華黒或作筆墨非是住云華陽黒水惟梁州渭山南所領也誠旣冨而美章彚音胃文采也霍炳蔚日延講大訓龜判錯衮黻孫曰定公八年公羊傳宝者何璋判白弓繡質亀青純何休注判半也半圭曰璋白藏天子青藏諸侯故曰判亀判謂亀玉也衮龍衮衣黻者綉兩巳相背於裳也亀判言其所執衮蔽言其所服錯雜也言講大訓者之多錯雜如此樊子坐賔署演孔刮老佛刮或作乱方云字見劇秦文金㫪撼玉應孫曰㫪撞也金下相應以況樊鄭唱酬之作也厥臭香氣也劇蕙欎欎金香草遺我一言重跽巨已切長跪受惕齋慄辭慳義卓闊孫曰言詞約而義富呀豁疚掊掘疚或作疾方云疚勞也呀虚加切掊彼垢切掘渠勿切掊擊也掘掘地也孫曰呀豁隙竅也因其隙竅疾加掊掘掊掘者計究也如新去耵聹雷霆逼颶䫻于聿切孫曰言讀此詩如新去耳中垢却聞雷霆颶䫻言驚恐不定也新或作𥘉盯矃並上声方云盯矃耳垢也从日非颶或作䬝或作䬖䬖字書未見或与䬝同綴此豈爲訓俚言紹莊屈此或作作孫曰言我綴此荅詩豈以爲訓乎俚下之言聊以紹莊周屈原而巳奉和武相公鎭蜀時詠使宅韋太尉所養孔雀武元衡韋皐也諸本无奉字穆穆鸞鳯友何年來止兹飄零失故態隔絶抱長思翠角髙獨聳金華煥相差坐蒙恩顧重畢命守堦墀感春三首作於元和十一年三月爲中書舎人時也偶坐藤樹下暮春下旬間藤隂巳可庇落蘂還漫漫斖斖音尾翠色皃新葉大瓏瓏花落声晩花乾青天髙寥寥兩蝶飛翻翻或作翩翩或作翩翻時節適當爾懷悲自無端黄黄蕪菁花孫曰方言云豐蕘羌菁也陳楚謂之豊齊魯謂之蕘関西謂之羌菁趙魏之間謂之太芥羌菁日薄風景曠薄或作落方云薄迫也囯語今㑹日薄矣恐事之不集今詳語势但如白楽天所謂旌旗无光日色薄耳方說非是出歸偃前簷晴雲如擘絮新月似磨鎌田野興偶動衣冠情乆猒吾生可攜手歎息歳將淹方云淹當作殗殘也淹延之義不可通用今人書殁作没殂作徂多互用李白詩東溪卜築歳將淹又逺行歳巳淹字皆訛今按古字通用者多不知方何以知此獨不可通用也題張十八所居君居泥溝上溝濁萍青青諸本上句作濁溝下句作泥濁蛙讙橋未掃讙或作喧蟬嘒呼惠切小声云門長扄名秩後千品詩文齊六經端來問竒字漢書刘歆子棻嘗从揚雄斈作竒字注云竒字古文之異者也爲我講聲形周礼保章氏掌囯子六書注云一日指事二曰象形三日形声四日㑹意五曰轉注六日假借形声如江河之類張籍酬韓庶子詩云西街凼僻處正与懶相宜尋寺獨行逺借書常送遲家貧无易事身病是閑時寂寞誰相問只應君自知樊曰寂寞字揚子雲事公詩落句用竒字籍詩落句用寂寞皆揚子雲事唐人酬荅和意而巳奉酬盧給事雲夫四兄曲江荷花行見寄并呈上錢七兄閣老張十八助教曲江在長安城昇道坊千頃秋波淨平鋪紅雲蓋明鏡秋波方作波秋雲或作蕖方云紅雲明鏡皆喻也公三堂詩水上覔紅雲与此同義大明即含元宫宫中給事歸走馬來看立不正遺我明珠九十六寒光映骨睡驪目驪音离方从杭蜀本作离云光映骨而睡离目言讀盧詩之快也今按諸本盖用莊子取驪龍之珠者必遭其睡之語以目言之則又不止其頷下之珠矣方說不成文理况上文𥘉无欲睡之意耶我今官閑得婆娑樊曰公時自中書舎人降太子右庶子問言何處芙蓉多撐舟昆明昆明池在長安西南周回四十里云度雲錦孫曰言芙蓉之盛云脚𫾣兩舷呌呉歌舷音賢舡邉也孫曰晋夏統會稽人詣洛市薬㑹上已王公以下並至浮橋統時在船中賈充今統作其土地間曲統以足扣舷引声喉轉清激慷慨大風應至雷電晝㝠王公以下恐遂止之樊曰東坡詩脚扣两舷歌小海亦是引用此事太白山髙三百里百或作十負雪崔嵬挿花裏孫曰謂太白山影見曲江荷花裏也玉山亦山名前却一作一前二却不復來曲江汀瀅音瑩小水水平盃水下方有不字非是我時相思不覺一廻首天門孫曰謂君門九重也言盧雲夫給事宫中如在天上耳九扇相當開上界眞人足官府孫曰謂上界真人猶有官府之事不如雲夫作地上散仙終日嬉遊也豈如散仙鞭笞鸞鳯終日相追陪方云仙下或有无字分两句讀至笞字句絶又本或无鵉鳯二字皆非是奉和錢七兄曹長盆池所植錢徽翻翻江浦荷而今生在此今生方作生今非是擢擢菰音孤說文曰彫胡也葉長芳根誰復徙露濡兩鮮翠涵一作儒風蕩相磨倚但取主人知誰言盆盎是誰或作詎記夢夜夢神官與我言羅縷孫曰羅縷謂詳言之曹不云羅縷豈闕辝道妙角與根方云按囯語辰角見而雨畢天根見而水涸注辰角大星蒼龍之角天根亢氐之間所謂角与根也挈攜陬維口瀾翻今按上句言角根即辰卯二位二十八宿所起也此句言陬維通謂寅申巳亥之西隅也挈此四隅則周乎十二辰二十八宿之位矣淮南子天文訓云西南爲背陽之維東南爲嘗羊之維西北爲􅕭通之維東北爲報德之維又地形訓云河水出崑崙東比􅑍赤水出其東南􅑍洋水出其西北􅑍亦邊隅之名也百二十刻須臾間方云董彦逺云丗間只百刻百二十刻以星刻言也今按星紀之說未詳其旨但漢哀帝嘗用夏賀良說漏刻以百二十爲度矣我聽其言未云足捨我先度横山腹先一作去我徒三人共追之一人前度安不危我亦平行蹋􅙚􅚤上丘召切下生召切不安也神完骨蹻其虐切㪯足髙皃詩云小子蹻蹻脚不掉徒弔切驚掉也側身上視溪谷肓黒闇也杖撞玉版聲彭􅘑撞玉鍾声神官見我開顔笑前對一人壯非少石壇坡陀可坐卧坡陀不平皃方云与送惠師詩陂陀字同語見楚詞招䰟然唐人多通用坡陀字又郭璞子虚賦注音婆駝故蜀本作婆陁我手承頦户來切頤下肘拄座隆樓傑閣磊嵬髙天風飄飄吹我過壯非少者哦七言六字常語一字難樊曰魯直云只前句中哦字便是所難此乃爲詩之法也我以指撮白玉丹行且咀噍行詰盤噍或作嚼方云字見大人賦与嚼音義通孫曰行且咀嚼謂咀嚼玉丹行詰盤謂詰盤詩句詰盤反覆也口前截斷第二句孫曰謂仙人以已詰盤之故遂不復吟第二句也綽虐顧我顔不歡乃知仙人未賢聖護短慿愚邀我敬我能屈曲自丗閒諸本能多作寕方从閤杭蜀本今按此言我若能屈曲及之則自居丗閒徇流俗矣安能从女居山間而又不免於屈曲乎猶柳下惠所云枉道而事人何必去父母之邦云尓方本爲是安能從女巢神山山或作仙非是樊白蘇内翰嘗曰李太白詩云遺我鳥跡書讀之了不聞太白尚氣乃自招不識字不如退之倔強云我寕屈曲自丗間安能从女巢神山又云退之性氣雖出丗間人亦不能容也南内朝賀歸呈同官洪曰唐長安有三内皇城在西北隅謂之西内東内曰大明宫在西内之東南内曰㒷慶宫在東内之南此詩朝賀南内也奉酬盧給事詩大明宫中給事帰即東内也薄雲蔽秋曦蔽或作户清雨不成泥罷賀南内衙歸涼曉淒淒内衙或作衙内非是曉或作晚緑槐十二街洪曰中朝事迹云天街两畔槐樹俗号爲槐街白楽天遊園詩云下視十二街緑槐間紅塵即此也渙散馳輪蹄余惟戇陟降切愚也書生孤身無所齎三黜竟不去致官九列齊豈惟一身榮佩玉冠簪犀滉蕩天門髙著籍朝厥妻文才不如人行又無町徒頂切田畔也畦問之朝廷事略不知東西况於經籍深豈究端與倪君恩太山重不見酬稗蒲賣切稊田黎切所職事無多又不自提撕自或作相明庭集孔鸞曷取於鳧鷖樹以松與栢不宜閒蒿藜間或作問非是婉孌自媚好幾時不見擠貪食以忘軀尠音鮮少也不調塩醯法吏多少年磨淬七内切出角圭將舉汝愆尤以爲已階梯収身歸関東期不到死迷朝歸峨峨進賢冠耿耿水蒼佩孫曰水蒼玉名礼記大夫佩水蒼玉而純組綬服章豈不好不與德相對顧影聽其聲頳顔汗漸平声背進乏犬雞效又不勇自退坐食取其肥無堪等聾瞶長風吹天墟秋日万里曬抵暮但昏眠不成歌慷慨愁嘆也魏武帝短歌行曰慨當以慷憂思難忘雜詩四首樊本作四首方云以義考之鵲鳴声楂楂以下當爲此篇韓曰公時爲右庶子而皇甫鏄程异之徒用事元和十一年也故此詩及東方朔雜事遣瘧鬼皆指事托物而作朝蠅不須驅暮蚊不可拍蠅蚊滿八區可盡與相格得時能幾時與汝恣啖咋音責涼風九月到掃不見蹤跡鵲鳴聲楂楂音查声也烏噪聲擭擭烏􅉑切爭鬪庭宇閒持身博彈射食亦切閒或作聞非是持或作將云黄鵠能忍飢兩翅乆不擘能忍方作忍長非是蒼蒼雲海路歳晩將無獲歲晚或作晚歳截橑音老椽也楚辝桂㨂兮蘭橑爲欂櫨上音博下音盧韓曰長門賦施塊木之欂櫨兮委參差以棟梁注拱斗之属斵楹以爲椽束蒿以代之或作茨小大不相權雖無風雨災得不覆且顚解轡棄騏驥蹇驢鞭使前崑崙髙萬里歳盡道苦邅張連切迴逺也停車卧輪下絶意於神仙雀鳴朝營食鳩鳴暮覓羣覓或作求獨有知時鶴雖鳴不縁身喑音瘖蟬終不鳴有抱不列陳喑或作瘖方云本草陶隱居曰啞蝉不能鳴者雌蝉也蛙黽鳴無謂閤閤蛙黽声祗亂人讀東方朔雜事樊曰漢武帝内傳帝好長生七夕西王母降其宫有頃索桃七枚以四枚与帝自食三枚曰此桃三千年一實時東方朔從殿東廂朱烏牖中窺母母謂帝曰此窺牖児甞三來偷吾此桃昔爲太山上仙宫令到方丈擅弄雷電激波揚風風雨失時隂陽錯迕致令蛟鯨陸行海水暴竭黄鳥宿渊於是九潦丈人乃言於太上遂謫人間其後朔一日乗雲龍飛去不知所在洪曰退之不喜神仙此詩譏弄權挾恩者耳嚴嚴王母宫下維萬仙家方云古岩嚴通詩維石岩岩陸云本亦作嚴是也此云下維万仙家似當以岩岩爲義噫欠爲飄風噫烏界切欠或作吹方云聚氣爲噫張口爲欠說文欠張口氣悟也宋孟顗以亢声大欠𬒳劾舊本作噫歆噫歆警神声也見鄭氏礼注音於其切者非濯手大雨沱方朔乃豎子驕不加禁訶加一作自偷入雷電室輷轟字衆車也輘曽登切或作較方云輘字見王褒簫賦又晋李顒雷賦鼓訇輘之逸韻掉狂車王母聞以笑衛官助呀呀不知萬萬人生身埋泥沙簸頓五山踣音匐流漂八維蹉七何切流漂或作飄流維或作絃曰吾兒可憎柰此狡獪音㑹校獪小児戯何方朔聞不喜禠身絡蛟蛇瞻桓北斗柄兩手自相挼奴禾切两手相切摩羣仙急乃言百犯庸不科謂科其罪也向觀睥睨處莊子雖羿逢蒙不能睥睨注猶斜視也孫日即謂瞻桓北斗也事在不可赦欲不布露言外口實諠譁或作欲不布露之言未沬不修其操行賤薄似汝稀豈不忝厥祖靦然不知歸靦他典切面慙湛湛江水清歸居安汝妃清波爲裳衣白石爲門畿呼吸明月光手掉美蓉旂降集隨九歌孫曰屈原所作以迎送神飲芳而食菲贈汝以好辭出汝去莫違示兒始我來凉師止攜一束書辛勤三十年以有此屋廬此屋豈爲華於我自有餘爲方作無非是中堂髙且新四時登牢𬞞登方作祭云中堂以供時祀而前榮以饌親實也今按公作袁氏先廟碑有親登邊鉶之語与登牢𬞞語意正同不必須作祭字乃爲時祀也前榮𥙷注沈氏筆談云退之示児詩云云屋翼謂之榮東西則有之未知前榮安在藝苑雌黄以爲不然記云洗當東榮又升自東榮降自西北榮上林賦偓佺之徒暴於南榮則所謂榮者東西南北皆有之矣故李華含元殿賦又有風雨交四榮之說榮爲屋檐即屋四垂也又謂之楣又謂之梠屋梠兩頭起者爲榮孫曰前榮者揚雄甘泉賦云列宿施於上榮是也饌賔親冠婚之所於所或作依於或作依皆非是庭内無所有髙樹八九株有藤婁絡之婁或作縷方婁音縷莊子有卷婁者注卷婁者猶拘挛也春華夏隂敷東堂坐見山雲風相吹嘘松果連南亭外有瓜芋區西偏屋不多槐榆翳空虚山鳥旦夕鳴有類澗谷居澗或作磵方云當作􅤝郭璞江賦幽􅤝積阻李善曰􅤝与澗同主婦治北堂膳服適戚踈恩封髙平君子孫從朝𥚑或作車開門問誰來無非卿大失无非方作非无非是不知官髙卑玉帶懸金魚問客之所爲峩冠講唐虞峩或作巍酒食罷無爲基槊音朔与矟同洪曰唐人詩云星宿天圍碁冡子地握槊碁弈也槊愽也斉尓朱丗隆与元丗攜握槊忽聞笑声一局尽倒以相娯凡此座中人十九持鈞樞又問誰與頻莫與張樊如莫与或作莫若曽本作莫先來過亦無事考評道精麤蹮蹮音先蹮蹮旋行皃選䠥􅍷􆂊蹮媚好也學子牆屏日有徒以能問不能其蔽豈可祛立魚切禳却也嗟我不修飾事與庸人俱嗟我或作我如今按作我如即与下文安能如此及卒章无迷厥𥘉者相應但作嗟我則語势差健而義亦自通蓋我不修飾者非謙詞乃謂向使我不修飾則不能致此爵位居室交遊之盛耳然則我如者乃嗟我之注脚故今雖只从方本而我如二字亦讀者所當知也安能坐如此比肩於朝儒詩以示皃曹其無迷厥𥘉按此篇所誇乃感一鳥符讀書之成效極致而上宰相書所謂行道憂出者則巳不復言矣其本心何如哉庭楸庭楸止五株楸或作樹方云以題語考之當作楸共生十歩閒各有藤繞之上各相鉤連下葉各垂地樹顚各雲連朝日出其東我常坐西偏或作邉云夕日在其西我常坐東邊或作偏當晝日在上我在中央間或作焉方云此詩二連字三閒字諸本刋鉤䏈作鉤纒中央閒作中閒焉以求避重韻誤矣仰視何青青上不見纖穿朝暮無日時我且八九旋濯濯晨露香明珠何聮聮夜月來照之蒨蒨音倩草盛皃自生煙我巳自頑鈍或作滯方作惰重遭五楸牽客來尚不見肯到權門前權門衆所趨有客動百千九牛亡一毛未在多少閒往旣無可顧不往自可憐顧方作領或作得皆非是翫月喜張十八貟外以王六秘書至王六王建也以或作与方云以与義通已見前今按以字或取能左右之之義前夕雖十五月長未滿規君來晤我時來一作未風露渺無涯浮雲散白石天宇開青池孤質不自憚中天爲君施翫翫夜遂乆亭亭曙將披况當今夕圎又以嘉客隨嘉一作佳惜無酒食樂但用歌嘲爲和李相公攝事南郊覧物興懷呈一二知舊燦燦辰角曙市據切辰房星角東方宿名楚辝云角宿未没曜靈安藏亭亭寒露朝川原共澄映雲日還浮飄上宰嚴祀事清途振華鑣悲驕切馬銜圎丘峻且坦前對南山標村樹黄復緑中田稼何饒顧瞻想巖谷興歎倦塵囂音枵左傳曰湫隘囂塵不可以居倦或作卷惟彼顚瞑者方云瞑从目古眠字徐鍇曰今俗别作眠非也莊子曰顚冥於冨貴之地司馬彪日冥音眠去公豈不遼去方作云非是爲仁朝自治用静兵以銷勿憚吐捉勤捉或作握方云字本史記今人用吐握本韓詩外傳也可歌風雨調聖賢相遇少功德今宣昭和裴僕射相公假山十一韻裴謂裴度也假方作爲公乎眞愛山看山旦連夕猶嫌山在眼不得着脚歷枉語山中人匄我澗側石枉或作往匄或作与有來應公須歸必載金帛當軒乍駢羅隨勢忽開坼有洞若神剜烏官切說文削也有巖類天劃終朝巖洞閒歌鼓燕賔戚孰謂衡霍期近在王侯宅期或作竒方云選謝靈運詩遊當羅浮行息必廬霍期傳氏築巳卑磻音盤溪石溪釣何激逍遥功德下不與事相摭樂我盛明朝或作時於焉傲今昔與張十八同效阮歩兵一日復一夕夕或作日方云阮嗣宗詠懷詩近百篇其一六韻一首云一日復一夕一朝復一朝顔色改平常精神自損消其一七韻一首云一日復一朝一昏復一晨容色改平常精䰟自飄澰公詩效其体而又繹之日一日復一日一朝復一朝然其題實自效一日復一夕始也後人以詩語与題不相應併易作一日字實非也一日復一日一朝復一朝祗見有不如不見有所超食作前日味事作前日調不知乆不死憫憫尚誰要於霄切富貴自縶拘貧賤亦煎焦俯仰未得所一丗巳解鑣譬如籠中鶴六翮無所揺譬如兎得蹄或作跡何用東西跳還看古人書復舉前人瓢前人或作前日未知所究竟且作新詩謡送諸葛覺往隨州讀書李繁時爲隨州刺史鄴侯家多書挿架三萬軸一一懸牙籖音僉韓曰唐經藉志甲乙丙丁四部書各爲一庫經書紅牙籖史書緑牙籖子書碧牙籖集書白牙籖以别之新若手未觸爲人強記覧過眼不再讀偉哉羣聖文磊落載其腹行年餘五十出守數巳六京邑有舊廬不容乆食宿䑓閣多官貟無地寄一足我雖官在朝氣勢日局縮屡爲丞相言雖懇不見録送行過滻水東望不轉目今子從之游學問得所欲入海觀龍魚矯翮逐黄鵠勉爲新詩章月寄三四幅南溪始泛三首榜音謗刺也舟南山下或作溪上上上不得返幽事隨去多或作幽尋事隨去孰能量近逺隂沉過連樹藏昻抵横坂石麤肆磨礪波惡厭牽挽或倚偏岸漁竟就平洲飯點點暮雨飄梢梢新月偃梢梢或作捎稍方云廣雅區區稍稍小也餘年懔無幾懔或作諒詳下對愴字明是懔也矣休日愴巳晩自是病使然非由取髙蹇或作謇云南溪亦清駛踈吏切馬日行千里駛疾也或作駛洪云作駃誤姑兩存之云而無檝與舟山農驚見之隨我觀不休不惟兒童輩或有杖白頭饋我籠中瓜籠方作篱勸我此淹留我云以病歸此巳頗自由幸有用餘俸置居在西疇囷倉米榖滿未有旦夕憂上去無得得下來亦悠悠但恐煩里閭時有緩急投願爲同社人雞豚燕春秋足弱不能歩自宜収朝蹟音迹祝曰詩念彼不蹟注不循道也羸形可輿致佳觀安可擲輿或作与可方作事非是即此南坂下乆聞有水石拕舟入其間拕方作施今按漢書拕舟而入水注云曳也音它溪流正清激隨波吾未能峻瀬乍可刺七迹切峻瀬方作瀬峻云鷺起若導吾前飛數十尺亭亭柳帶沙團團松冠壁柳帶松冠或作帶柳冠松方從閤本作帶柳松冠云此吉日辰良体也今按亭亭帶柳沙無義且此兩句用對偶亦何害方信閣本故曲爲之說如此或本亦无義皆非是歸時還盡夜誰謂非事役朱文公校昌黎先生集卷之七
