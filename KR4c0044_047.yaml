front:
  text: 朱文公校昌黎先生外集卷之五考異音釋附
  hash: sha256:ff940211b2a4cdb4f2eae46609625b5af1b919fdcc60a0e1032c0e883dcb92c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_047-1a}
body:
  text: 除崔羣户部侍郎制勑地官之職邦教是先必選國華以從人望具官崔羣體道履仁外和内敏或作内和外敏清而容物善不近名從容禮樂之間特逹珪璋之表比參密命弘益旣多及貳儀曹升擢惟允邁兹令德藹然休聲兹或作此選賢與能于今雖重擇才均賦自古尢難雖方作惟重或作盛均或作經往愼乃司以服嘉命可下或有云云字祭董相公文祭下或有汴州字維貞元十五年歳次已卯二月乙亥朔某日節度行軍司馬檢校右散騎常侍兼御史大夫知使事呉縣開國男食邑三百户陸長源呉縣開囯或作呉郡或无食邑三百戸字度支營田判官檢校金部貟外郎侍御史孟叔度觀察支使監察御史裏行丘頴觀察推官守祕書省校書郎韓愈等謹以少牢之奠敬祭于故尚書右僕射平章事隴西公之靈嗚呼天髙而明地厚而平五氣叙行萬彚順成交感旁暢聖賢以生雨水于雲瀆水于坤蕃昌生物有假有因坤或作神昌生或作生庶天睠唐邦錫之元臣肫肫元臣其德孔碩肫肫或作盹盹誤不謟不笑不威不赫不謟不笑或作不容不謟或作不䧟不酷或无不笑二字而連下文不威為句下文其敵下别出不讎二字与士求字叶不求其盈不致其敵盈方作用爰立作相訏謨實勒立方作𥘉出若無辝疇德之聞德或作得帝念東土公其來撫乃守洛都乃藩浚郊迺去厥疾乃施厥膏不知其勞鰥寡以饒維昔浚郊厥亂維舊昔或作若厥乱維舊或作維乱舊政或作乱維政舊有狡有狂其羣孔醜公其來矣爲民父母為民或作公為非是父誨其義母仁其愚旣変旣從孰云其𥘉孰云或作親去或作親云非是自邇徂逺混然一區公來自中天子所倚公今不歸誰佐天子公旣來止東人以完公旣來止方作旣來至止或作公來至止今依行狀更定公旣殁矣人誰與安濁流渾渾有闢其郛填道歡呼公來之𥘉今公之歸公在䘮車㫖酒旣盈嘉肴在盛嗚呼我公庶享其誠尚饗雷塘禱雨文此篇乃柳子厚文此不當録祭石君文或作祭石濬川文維元和七年歳次壬辰七月二十七日右𥙷闕宋景國子博士韓愈謹以清酌庶羞之奠敬祭于石三學士之靈或无敬字惟君學成于身名彰于人知道之可行見人之不幸見人或作知命或作見命不上或无之字不事顧譲以圖就功如何奄忽永䘮其躬此四字或作以䘮其良能下或有知㣲有議四字或作不負長巳誰知口有義何害今按諸本皆无文理疑不足據曰景與愈與游爲乆或无曰字景下或无与字愈下有也字為乆作日乆自君之逝相遇輒哀傍無強親子孩妻姖或作稚方云姖古文姬字然義亦不近敢忘分濟念力未任客葬秦原孤魂誰附奠以送訣悲何可窮尚饗祭房君文房次卿字蜀客維某年月日愈謹遣舊吏皇甫恱以酒肉之饋展祭於五官蜀客之柩前方无維某字愈作某或无日字嗚呼君迺至於此吾復何言於此或作於斯若有鬼神吾未死無以妻子爲念嗚呼君其能聞吾此言否君上或有房字尚饗髙君仙硯銘并序儒生髙常與予下天壇中路獲硯石似馬蹄狀外稜孤聳内發墨色幽竒天然疑神仙遺物寳而用之請予銘底仙馬有靈迹在于石稜而宛中有點墨迹文字之祥君家其昌方云應劭武紀出大宛舊有天馬種蹋石汗血顔曰蹋石謂蹋石有迹言其蹄堅利米新仲謂銘語本此髙君畫讃沘篇方從蜀本録之今按疑非公所作然姑存之君子温閑骨氣委和迹不拒物心不揚波澄源卷璞含白瑳瑳遺紙一張德音不忘潮州請置郷校牒孔子曰道之以政齊之以刑則民免而無恥不如以德禮爲先而輔以政刑也斉上或有而字或无則字或无礼字夫欲用德禮未有不由學校師弟子者此州學廢日乆進士明經百十年間不聞有業成貢於王庭試於有司者百十年間方作百十数年非是貢於試於並无於字人吏目不識郷飮酒之禮耳未甞聞鹿鳴之歌孫曰唐制郷㪯試訖長吏以郷飲酒礼㑹属僚設賔主陳爼豆備筦絃牲用少牢歌鹿鳴之詩与耆艾叙少長焉忠孝之行不勸亦縣之恥也方无或与耳字夫十室之邑必有忠信今此州户萬有餘豈無庶幾者邪刺史縣令不躬爲之師里閭後生無所從學爾或作耳又或作矣非是趙德秀才沈雅專静頗通經有文章能知先王之道論說且排異端而宗孔氏可以爲師矣師下方有友字請攝海陽縣尉爲衙推官或无官字專勾當州學以督生徒興愷悌之風刺史出巳俸百千以爲舉本収其贏餘以給學生厨饌㪯或作斈直諫表方本无說見苐三卷今从之論顧威狀同上朱文公校昌黎先生外集卷之五
