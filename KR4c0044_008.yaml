front:
  text: 朱文公校昌黎先生文集卷之八考異音釋附
  hash: sha256:0655a8dcf6b4a5125cd74ae01a72cf38d07c5dcdb8b57ebdb0fb2dd8baf20d9b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_008-1a}
body:
  text: 聮句方云諸聮句多元和𥘉作城南聮句聮句古無此法自退之始樊曰刻貢父云退之與東野聮句宏壯辨傳似若不出一手王深父云退之容有潤色吕氏童訓徐師川問山谷曰人言東野聮句大非平日所作恐是退之有所潤色山谷云退之安能潤色東野若東野潤色退之却有此理方云蜀本作一百五十韻今本因之然此詩實多三韻不可以為據竹影金瑣碎郊瑣或作鎖非是沈存中云乃日光非竹影也洪曰日光在其中若日日光金鎖碎則不可也泉音玉淙琤音一作聲淙藏宗士江二切琤楚耕切陸士衡詩云山溜何泠泠飛泉潄鳴玉樊曰荆公詩云風泉隔屋撞哀玉竹月緣階貼碎金語本此琉璃翦木葉愈翡翠開園英流滑隨仄步郊搜尋得深行遙岑出寸碧愈逺目增雙明乾穟音遂禾秀乾滯德也紛往地郊紛或作絲或作紅化蟲枯挶莖挶居玉切韓曰挶持也孫曰化蟲蟲之變化者如蟬蟻之類枯挶莖者言化蟲已枯尚揭持於草木之莖也木腐或垂耳愈草珠競駢蒲眠切並也睛浮虛有新􅓯郊摧扤饒孤撑方云扤動也字不當從木古樂府不見山顚倒摧扤下為薪囚飛黏網動愈盜啅接彈驚啅音卓鳥食也社詩啾啾黃雀啅接彈言彈丸相接故驚也方云囚飛盜啅潮本作蟲飛雀啅此詩一體六語皆賦物而不言其名舊本並同上脫實自開坼郊牽柔誰繞縈禮鼠拱而立愈陸機云河東有大鼠能人立交前兩腳於頸上跳舞善鳴駭牛躅直六反躑躅也且鳴駭方作騃音俟説文馬行仡仡也詩儦儦俟俟韓詩作騑騃騃故西京賦云羣獸騃此當從俟音則於躅且鳴義為合也今按方説騃躅二字於牛義無取疑當從蜀本作駭而躅當作觸乃於牛有意又與上字相偶然無所據姑附于此𬞞甲喜臨社郊時乃八月田毛田所生者謂之毛宅不毛是也樂寬征露螢不自暖愈凍蝶尚思輕孫曰尚欲飛也宿羽有先曉郊孫曰宿鳥有未曉而飛也食鱗時牛橫孫曰魚之食者半橫水中菱翻紫角利愈翻或作繁荷折碧圎傾楚膩食亶知連切口在頷也魚下江東日黃魚鮪亂郊獠羞螺蟹并獠張絞切又盧作切祝曰西南夷别名孫曰羞亦食也言水有鱣鮪螺蟹若獠羞然桑蠖烏郭切桑蟲也見虛指愈言空有迹耳穴貍聞鬪獰逗翳上音豆下於計切逗上也翳隂也孫曰言鳥止於林隂其翅相觸也翅相築郊擺幽尾交榜薄庚切孫曰擊也如蛇之類擺於出僻其尾相繫也蔓涎孫曰謂蝸牛涎於蔓上角出縮愈樹啄啄木鳥頭𫾣鏗修箭竹也裊金餌郊羣鮮沸池羮岸殼坼玄兆愈孫曰言岸有蟲壳拆開如立兆象野牟漸豐萌窰煙羃疏島郊窰音由白姻羃覆也周禮羃人窰或作瑶沙篆印回平孫曰言回曲之平處洪曰華山有青柯平鍾藥平因地之平處以為名也㾕肌遭蚝七吏切毛蟲有毒刺愈刺七亦切㾕或作瘁方云見鬪雞篇啾耳聞雞生竒慮恣回轉郊遐睎縱逢迎巔音顚山頂林戢斂也逺睫愈縹敷沼切祝曰青黃色孫曰夷樂也言望巔林觀縹氣戢目以夷情氣夷空情歸迹歸不得郊捨心捨還爭靈麻撮狗蝨愈孫曰胡麻也狀如狗蝨村稚啼禽猩孫曰言小兒之啼如猩猩尓雅猩猩小而好啼紅皮孫曰果實皺而紅芻者説者曰乾棗曬簷瓦郊簷或作簷黃團繫門衡洪曰瓜萎也一日天瓜衡門上木得雋徂兖切言豪俊左氏得雋曰克蠅虎韓曰崔豹古今住蠅豹即蠅虎健愈相殘雀豹孫曰雀之鷙者以其勇健故曰雀豹趟音棖洪曰跳躍貌玉萹䞴趟跟黨也束枯樵指秃郊刈熟擔肩赬澀旋隨戀切皮卷臠愈卷求晚切臠力轉切不舒放也若開腹彭亨孫伯野謂此二語與上二語意屬一日澀旋乃旋果實之澀者苦開乃破瓜瓠之苦者也方言謂環而鐫之為旋卷臠見莊子彭亨方作膨脝又云古字只作彭亨毛詩傳炮烋猶彭亨是也機㫪韓曰果碓也潺湲力郊吹簸飄颻精賽饌祭食木盤簇愈靸妖藤索絣靸恐合切絣北萌切孫曰靸小兒履絣以藤索為之樊曰此句與其下䟠繩機婺疑為今之靸韆韓曰已上泛言城南景物之盛靸妖或作妖靸絣或作帡或作耕方作併云今併字不入庚韻故學者疑之今按靸廣韻云蘇合切小兒履也今猶以為鞋靣疏屨之名但用之於此句似無意義疑當作投楚治切收也取也獲也妖謂狐狸之屬能為妖媚者也絣當從系獄中以繩索急縛罪人之名也言捕取妖狐而以藤索縛之也荒學五六卷郊古藏四三塋音營墓域四三或作三四里儒拳足拜愈土怪家語季桓子穿井得土缶問孔子孔子曰土之怪者羵羊缶也閃眸瞬目偵候也蹄遁補復破郊絲窠掃還成暮堂蝙蝠沸愈破竈伊威盈伊威或作蛜蝛方云詩釋文曰或旁加蟲後人增也追此訊前主郊答云皆冡卿上卿也敗壁剝寒月愈孫曰月自敢壁而入如剝破之狀折篁嘯遺笙孫曰風次聲袿熏霏霏在郊綦迹微微呈袿或作桂綦或作棊皆非是方云袿音圭婦人上服也古樂府衣上香猶在握裏書未滅班倢行賦俯視兮丹墀思君兮履綦綦履下飾也在或作炷呈或作星皆非是劒石猶竦檻愈獸材尚拿楹寶唾拾未盡郊玉啼墮猶鎗楚耕切唾或作碣啼方作題云蜀都賦玉題相輝題椽上飾也故曰墮猶鎗鎗墮聲本或作琤或云柱躓也與玉題意相類洪曰此以咳唾喻珠璣以啼泣喻玉筯也唾又作硾啼又作揥今按上下文意皆婦女事洪説為是若作題即上句當作碣然非文意又躓乃柱礎亦非可抬之物也窗綃孫曰言窗紗中尚疑閟藏佳人也疑閟豔愈妝燭巳銷檠緑髮韓曰細草孫曰緑苔也抽珉甃孫曰珉石之次玉者甃并甃珉甃美言之也言緑苔生於珉甃之上青膚孫曰青皮也韓曰苔蘚聳瑶楨音真説文木也瑶楨美幹白蛾飛舞地愈幽蠧落書棚薄萌切博雅云閣也説文棧也蠧書蟲棚書架蠧一名蟫韓曰已上言郊墟宅野之古廢惟惜集嘉詠郊吐芳類鳴嚶窺竒摘海異愈恣韻激天鯨天上鯤鯨激騰躍也腸胃繞萬象郊精神驅五兵蜀雄李杜拔愈李杜下對雷車未詳其説嶽力雷車轟大句斡玄造郊玄或作元高言軋宵崢孫曰山之切雲者謂霄崢軋轢也芒端轉寒燠愈神助溢杯觥巨細各乘運愈湍潿湍急流湋濁不流韓曰巳上言昔人吟詠之工潿或作湋亦騰聲凌花咀粉蘂郊削縷穿珠櫻綺語洗晴雪愈嬌辭哢雛鶯酣歡雜辨珥郊珥音餌耳飾歡方作勸雜或作新方從閣本云昔淳于髠所謂前有墮珥後有遺簮是也今按方意勸為勸酒之意然此皆形容詩語之工不當作勸而作歡字則對價字為尤切繁價流金瓊􅔽蓞寫江調郊江或作紅方云選劉體玄詩悲發江南調謝靈運詩采菱調易急江南歌不緩李善皆引古江南詞江南可採蓮以舞之東野本集亦喜用江詷字萎蕤綴藍瑛音英玉光方云萎㽔青花圓實亦名土竹藍瑛藍田之玉也庖霜鱠玄鯽愈浙玉炊香粳音更方云浙字從折之舌切魏文帝朝王朗曰不能效君昔在會稽折杭米古浙作折其從折者星歷切孟子所謂接浙而行是也本多作浙朝饌巳百態郊春醪又千名哀匏蹙駛景愈蹙駛或作缺蹙或作蹙缺洌清也唱凝餘晶日光疑猶遏也解魄不自主郊痺卑利切肌坐空瞪或作膛今按莊子瞪若乎其後瞪丑庚切直見也言坐久而無所見也扳援上音攀下音袁挽引也賤蹊絶愈孫曰謂賤者不可扳援而至也炫曜仙選更藂巧竸採笑郊藂或作叢方云唐人多書叢作藂楚詞及舊本韓桞集皆然今本尚見一一一姑存之駢鮮互探嬰桑變言桑樹變化却生蕪蔓忽蕪蔓愈樟音章裁斫也浪登于登于斫木之聲霞鬪謂雲霞相合也詎能極郊風期誰復賡誰復或作復誰皋神皋區扶帝壤愈瓌藴郁天京祥色𬒳文彥郊良才插杉柳河柳隱伏饒氣象愈興潛示堆坑擘華西京聀注華山首陽本一山河神巨靈以手擘開其上以足蹈離其下中分為兩河因通流神物巨靈也露神物郊擁終儲地禎終終南山儲蓄也訏謨壯締結也始愈輔弼登階清泰階坌秀恣填塞郊呀靈畜渟逹丁切水止也澄益大聮漢魏愈聮或作連肇𥘉邁周嬴積照涵德鏡郊傳經儷音麗偶也金籝音盈笭也韋賢曰遺子黃金滿籝不如教子一經食音寺家行鼎鼐愈寵族飫弓旌奕制盡從賜郊盡或作書此句未詳殊私得逾程過法度也飛橋上架漢愈漢天河繚岸俯規嬴海也規或作窺方規度也東方朔傳規以為苑瀟碧逺輸委郊湖嵌口銜切費攜擎湖本作胡方云瀟碧竹也胡嵌石也萄首上音陶下音目張騫使外國得蒲萄首蓿從大漠愈首或作首漠或作漢非是楓櫧音諸選云沙棠檪櫧華楓枰櫨櫧或作儲至南荆嘉植鮮危朽郊膏理易滋榮理或作方云此以嘉植言也周禮其植物宜膏物鄭注云謂楊柳之屬理致白如膏懸長巧紐翠愈紐或作細紐結也象曲善攢珩攢聚珩玉也善或作蓋魚口星浮沒郊馬毛錦斑騂五方亂風土愈百種分鉏耕葩蘖相妬出郊蘖方作孽非是菲茸共舒情類招臻倜詭愈倜他歷切類物臻極也相如封禪書云竒物譎詭倜儻窮變翼萃伏襟纓翼禽屬危望跨飛動郊冥升躡登閎方云字見揚雄校獵賦蜀本登作竹肓切宏屋響也春遊轢靃靡愈靃音隨孫曰草木敷華貌轢踐也祝曰章木弱貌楚詞萍草靃靡彩伴颯嫈嫇上音縈下音萌祝曰廣韻嫈嫇新婦兒遺燦飄的皪郊選珠翠的皪白狀淑顔洞精誠嬌應如在寤愈頽意若含酲鵷毳孫曰鴛鴦之羽以飾其衣帶詩毳衣如菼翔衣帶郊鵝肪截佩璜肪音方脂也孫曰玉書云白如截肪黑如純漆赤如雞冠黃如蒸栗璜半璧也文升相照灼愈武勝屠攙音讒搶楚庚切祝曰彗皇為攙搶注亦謂之孛言其形孛孛似掃彗孫曰攙搶以喻冠亂割錦不酬價郊構雲結屋於髙處有高營通波牣鱗介愈牣方作仞云相如賦充仞其中古字作仞作牣非也今按詩及孟子皆作牣方説非是疏畹疏寬也冨蕭蘅音行杜蘅香草大者曰杜若買養馴孔翠郊逺苞樹蕉栟音并栟櫚選栟櫚枸榔鴻頭排刺芡愈芡音儉輔注方言曰南楚謂之雞頭比燕謂之䓈青徐淮泗之間謂之芡又云雞頭或謂之鴈頭鵠㲉㲉卵也攢聚也韓曰巳上言土地人物富華之盛瓌橙香橙也諸本㲉作殼方云㲉外也納涼聮句盤有饋禽㲉今本亦誤騖廣雜良牧郊蒙休賴先盟罷旄奉環衛愈守封踐忠貞戰服脫明介郊朝冠飄彩紘爵勳逮僮隸愈簮笏自懷捐也繃北萌切小兒繃也以繒帛為之亦謂之襁乳下秀嶷嶷郊椒蕃言子孫多如椒蕃泣喤喤音橫小兒啼聲詩日其泣喤喤貌鑑其貌有光可以鑑也清溢匣愈眸光寒發硎館儒養經史郊綴戚觴孫甥考鍾饋肴核愈戞鼓侑牢牲飛膳自北下郊函珍極東烹如瓜煮大卵愈比線茹芳菁海嶽錯口腹郊趙燕錫媌娙媌音茅娙五莖切美婦人也選燕趙多佳人媌或作媖一笑釋仇恨愈百金交弟兄貨至貊戎市郊呼慱鸚鵒令令鸚鵒傳呼也鸚或作鸚方云戎貊鸚鵡鸚鵒四物也或本非是順居無鬼瞰愈瞰音闞視也揚雄曰髙明之家鬼瞰其室門抑橫免官評宫謗也韓曰已上言門地簮纓之家殺候肆凌翦郊籠原市置紭音弘網綱羽空鳥𬒳箭羽毛滿空顚雉鷃愈血路迸狐麖音京獸名一角牛尾其狀似麋折足去踸踔郊踸敕甚切踔直角切孫曰行不正貌莊子夔謂蚿曰吾以一足踸踔而行注踸踔自跳躑也蹙鬐怒䰃音彭鬤乃庚切䰃鬤言魚中鈎其怒如此鬐張貌躍犬疾翥飛舉貌鳥愈呀鷹甚飢虻音肓算蹄上林賦射麋腳麟顔師古云持引其腳計其所獲也所謂算蹄如此記功賞郊裂腦擒摚掁上音膛下音棖摚距也振棎也諸本腦作􅠱擒作相摚作蕩又作湯方從蜀本云􅠱腦字之或體掁揬也蕩掁陽揬之義監本作摚掁摚距也義亦通而擒作相則非今按􅠱别本作脅疑傳寫之誤蕩當作摚孫曰䳟鳥名楊子鷦䳟遴集食其潔矣祝曰鷦䳟似鳯南方神鳥楚辝鷦䳟開路兮注智鳥也方云鷦䳟鳯也諸本多訛作鵬畦肥翦韭薤愈陶固收盆罌利養積餘健郊孝思事嚴祊輔彭切祭求神掘雲破嵽嵲愈雲或作靈採月漉拗泓寺砌砌石也上明鏡郊石明如鏡僧盂𫾣曉鉦音征鐃也似鈴而無舌泥像對騁怪愈鐡鐘孤㫪鍠音橫鍾聲㫪撞也後漢鍠鍠鎗鎗注鍾鼓聲癭頸閙鳩鴿郊蜿于丸切垣亂蛷音求多足蟲垣或作方云謂蜿蜒於墻屋之間作非蠑音榮蜥蝪椹桑椹黑老𧖟蠋愈蠋音燭桑蟲也麥黃韻鸝鶊上音離下音庚鸝鶊二鳥名鸝黃鸝庚倉庚韓曰已上言民居寺宇之美韶曙韶妍也曙曉也曙或作署遲勝賞郊賢朋戒先庚朋方作明馳門填逼與逼側同仄愈競墅輾語箭切砯砰上披氷切下普耕切選砯岩鼓作砰聲如雷列子砰然若聞雷霆之聲碎纈紅滿杏郊碎纈或作醉結方從閣本云曽本亦作碎唐小説裴晉公午橋有文杏百株立碎錦坊少陵詩內蘂繁於纈杜牧之詩花䲧團宫纈或云當作醉大李長吉詩醉纈拋紅網稠凝碧浮餳徐盈切飴也蹙子六切踏也繩覲娥婺愈娥或作蹴覲或作觀娥婺美女也鬪草擷胡結切監本桔將取也潮本作拮擷或作祮璣珵音呈楚辝豈珵美之能當注美玉也粉汗澤廣額郊金星寶黶也墮連瓔瓔珞婦人項飾鼻偷困淑郁愈郁香氣眼剽強盯􅟑上音振下音萌玉篇視貌是節是時也飽顔色郊兹疆稱都城書饒書富也罄魚繭愈國史輔云𥿄之好者有魚子紙晉王羲之用蠶繭𥿄紀盛播琴箏孫曰謂播之樂府韓曰已上言里人遊觀之樂奚必事逺覿郊無端逐羇傖助庚切祝曰晉史吳人謂中州人曰傖羇傖謂謫陽山江陵時也將身親魍魅愈浮迹侣鷗鶄音精鶄腥味空奠屈郊天年徒羡彭天或作天驚魂見蛇蚓愈觸嗅值蝦蟛上音遐下音彭似蟹而小曰彭蜞幸得履中氣郊中和之氣忝從拂天棖孫曰天門也棖門兩旁木言自遷謫得歸朝廷也禮記十介拂桭歸私暫休暇愈驅明出庠黌明或作眤方云樊本作驅抳抳土輪木也時景元校作驅朋今按驅馳遲明而出太學也蓋作此時公方為博士鮮意鮮新也竦輕暢郊連輝猶言連璧也照瓊瑩陶暄逐風乙愈乙烏輕切説文玄鳥也齊魯之間謂之乙躍視舞晴蜻音精蜻蜒也風乙或作乙乙晴蜻或作蜻蜻皆非是足勝竒也言勝遊處自多詣郊心貪敵無勍渠京切強敵也始知樂名教愈何用苦拘儜尼耕切固也晉史不簡蚩儜拘濘拘束也又困弱貌畢景盡日也任詩趣郊焉能守硜硜愈硜堅與論語硜硜義同小謹之貌方云字書無硜字按鹽鐡論器多堅硜又皇甫謐釋勸篇龍潛九淵硜然執髙何令升晉書音義硜口萌切不知字書何以逸之也會合聮句樊曰公召為國子博士與張籍張徹孟郊會京師而有此詩故郊有京遊步方振謫夢意猶恟等語徹有馬辭虎豹怒舟出蛟鼉恐之句皆敘公南還意而公則云念難須勤追悔易勿輕踵其義一也韓曰黃魯直嘗云退之會合聮句四君子皆佳士意氣相入雜之成文丗之文章之士少聮句蓋筆力不能祖追或成四公子棊耳離别言無期會合意彌重籍病添兒女戀老喪丈夫勇愈劒心猛氣也知未死或作謝詩思猶孤聳郊愁去劇箭飛歡來若泉涌徹析言析開析也貫事也多新貫析或作折攄抱無昔壅籍念難須勤追悔易勿輕踵愈吟巴山犖嶨或作嵤方云嶨音學山多大石也説楚波堆壟郊馬辭虎豹怒舟出蛟鼉恐徹狂鯨時孤軒起也幽狖音柚獸狀如猿雜百種愈瘴衣常腥膩蠻器多踈冗籍踈冗不堪也剝苔洪曰湘中班竹方生珩每點上有青苔錢封之孫曰博物志曰洞庭之山帝之二女居之涕下揮竹竹盡班苕溪漁隱曰班竹惟清湘間有未嘗有苔藤梧間别有一種斑竹間有苔蘚封之弔斑林角飯餌沉塜愈忽爾銜逺命歸歟舞新寵郊尓或作示非是歟或作還鬼窟脫幽妖天居覿清栱愈栱或作拱京遊步方振謫夢意猶恟籍恟許拱切懼也詩書誇舊知酒食接新奉愈嘉言寫清越愈病失疣與疣同結病也腫郊腫大也夏隂偶髙庇宵魄接虛擁愈魄方作魂今按宵魄謂月方本非是雪絃謂琴有陽春白雪之歌寂寂聽茗碗與碗同纎纎捧郊纎捧謂美婦之手馳輝燭浮螢幽響泄潛蛬愈蛬音拱尓雅曰蟋蟀蛬今促織也詩老獨何心江疾有餘腫郊腫音腫足腫我家本瀍榖瀍水名出河南榖城山有地介皋鞏皆河南地名史記韓獻成皋鞏休迹憶沈冥揚子蜀莊沈冥猶言隱淪也峨冠慙闒音拓或作闒或作溻愈音冗祝曰不肖也劣也司馬遷云在闒茸之中楚辝雜班駮與闒茸皆以茸為諸本此四句下無愈字方從唐蜀本增洪云退之家在洛陽嘗謫陽山今為博士則唐本為是一作升朝髙㘘逸振物羣聽悚方云别本悚作竦嵇康琴賦竦衆聽而駭神徒言濯幽泌音祕詩泌之洋洋注泉水也誰與剃音替又音雉除草也荒茸籍茸音冗草生荒或作芒方云此漢敘傳所謂夷險芟荒是也芒字非朝紳欎青緑馬飾曜圭珙音拱璧也孫曰謂銜轡之屬圭珙以為飾也國讎未銷鑠我志蕩卭隴郊時劉闢亂蜀王師出征故云蕩卭隴也二山名君才誠倜儻時論方洶許拱切洶或作洶音凶溶音勇洶溶水貌格言多彪蔚懸解無梏拲上古沃切下音拱周禮上罪梏拲而桎張生得淵源寒色拔山冡堅如撞羣金羣鍾也眇若抽獨蛹愈蛹音勇祝曰蠶化為之孫曰言微而不絶伊余何所擬跛鱉詎能踊塊然墮嶽石飄爾罥巢氄郊罥音畎氄音冗罥網也氄鳥獸細毛也書鳥獸氄毛孫曰此聮甚言其危龍斾垂天衛雲韶凝禁甬孫曰甬道天子之居君胡眠安然朝鼓聲洶洶愈胡或作乎非是鬪雞聮句韓曰公與東野聮句詞意雄渾極其情態間以人才為喻兩皆傑作真歐陽文忠所謂韓孟於文詞兩雄力相當者也樊曰至若爭觀雲填道助呌破翻海則公詩之豪而一噴一醒然再接再礪乃則東野工處大雞昻然來小雞竦敬也而待愈崢嶸顚盛氣顚音田孫曰玉藻曰盛氣顚實揚休注云顚讀為闐揚讀為陽盛身中之氣使之闐滿如陽氣之休物也方云顛讀為闐見禮記洗刷凝鮮彩郊髙行若矜豪側晲如伺殆愈精光目相射劒戟心獨在郊既取冠為胄復以距為鐓音隊孫曰鐓鍪柄下蹲禮記進矛戟者前其鐓是也或作鎩漢書鉤戟長鎩今按鎩廣韻所拜切於四聲不協然鐓乃刃下之平底者與距不相似亦未詳其説也天時得清寒地利挾爽塏愈塏音凱髙地磔毛各噤巨禁切口閉也㾕或作或作瘴或作癢方從杭本云㾕所錦切寒病也義訓寒謂之㾕􅱵皮日休詩枕下聞彭湃肌上生㾕􅱵韓握詩禁㾕餘寒酒半醒怒癭爭碨烏罪切碨磊不平也選磔磈磊而相摩磊俄膺忽爾低植立瞥匹蔑切而改郊腷膊上音愎下音粕古詩腷腷膞膞雞初鳴戰聲喧􅌭翻落羽皠七罪切白也中休事未決小挫勢益倍愈妬腸務生敵腸方作腹敵或作欺賊性專相醢裂血失鳴聲啄殷烏闌切赤黑色甚飢餒郊對起何急驚隨旋誠巧紿音怠欺也毒手飽李陽樊曰晉石勒與李陽鄰居歲常爭麻池相歐擊勒既即偽位召陽酣謔引陽臂笑曰孤昔日厭卿老拳卿亦飽孤毒手杜子美義鶻行所謂巨顙拆老拳亦此事也神槌困朱亥愈史記魏朱亥為侯嬴薦於魏公子公子矯魏主令代晉鄙鄙合符疑之亥袖四十斤鐵椎椎殺晉鄙槌或作椎或作鎚方云謝本云貞元本毒手作尊拳尊拳劉憐語也郡公濟云善本神槌作神捶於史記本文為合然晉祖納曰假有神雖必有神槌神槌尊拳豈皆借用字耶今按毒手是李陽本事中語而神槌字則朱亥事中無之故卲欲改神作袖以從本事然又屬對不親切故方又欲從謝本借劉伶之尊拳以附李陽借祖納之神槌以附朱亥則兩句皆為兼用兩事而不偏枯耳然亦未敢遽改也今以其説未明復為詳説如此以俟考焉惻心我以仁碎首爾何罪獨勝事有然旁驚汗流浼郊知雄欣動顔怯負愁看賄爭觀雲填道助呌波翻海愈事爪深難解事或作爭方從唐本云館本作倳李校同樊本作剚皆側吏切漢蒯通傳事刃公之腹中考工記災蚤不齵則輪雖敝不匡鄭讀蚤為瓜謂輻入牙中者災聲如胾泰山平原人謂樹立物為災公蓋全用此二字也管子倳戰十万又春有以剚耜事剚災倳古音義同閣杭蜀本皆作爭其訛久矣嗔睛時未怠一噴一醒然樊云雞用水噴神氣始醒再接再礪乃郊或作再礪乃煆乃礪又或作勵皆非是樊曰接猶接戰也爭觀雲填道助呌波翻海則公詩之豪一噴一醒然再接再礪乃則東野工處頭垂碎丹砂翼拓拖錦綵拓或作拓方云字當從手選陳琳檄垂頭拓翼莫所慿恃五臣注拓斂也士獵切此當一以摧拓為義音他蠟切軒軒猶軒昻也尚賈音古齊高周之晉師桀石投人以徇衆曰欲勇者賈豫餘勇賈買也餘清厲鳴聲也比歸凱愈選俊感收毛受恩慙始隗下五罪切毛遂郭隗也英心甘鬪死義肉恥庖宰君看鬪雞篇短韻有可採郊有或作亦或作言皆非是納涼聮句韓曰此篇敘九謫新召還為學官本末甚詳遞嘯取遙風微微近秋朔郊金柔氣相低火老候愈濁愈熙熙炎光流竦竦髙雲擢愈閃紅孫曰電光也電光之閃有若蚴虬驚蚴於紏切又音憂龍類楚詞蒼龍蚴虬於左右虬或作蚪凝赤孫曰凝聚也赤氣之聚如山嶽也聳山嶽目林恐焚燒耳井憶瀺灂上士咸切下才弱切瀺灂水聲前漢瀺灂霄墜仰懼失交泰非時結氷雹化鄧韓曰列子夸父逐日影於嵎谷之際渴欲得飲赴飲河渭河渭不足將北走飲大澤未至道渴而死棄其杖尸膏肉所浸化為鄧林渴且多奔河誠巳慤暍音謁祝曰字林暍傷暑也莊子暍者反水乎冷風道者誰子叩商叩擊也韓曰列子師商彈琴當春而叩商絃以召南吕涼風忽至草木成實者何樂洗矣得滂沱洗或作浩方云古洗與灑通史記觀范睢之見者羣臣莫不灑然變色易容徐廣洗先典切洗矣猶洗然也感然鳴鸑鷟下士角切孫曰鸑鷟鳯屬感言得滂沱則瑞應至嘉願苟未從嘉或作佳或作喜方云公後詩王嘉願還中州佳喜皆字訛也前心空𬗟邈清砌千回坐冷環再三握煩懷却星星或作醒二方云劉夢得詩自羞不是高陽侣一夜星星騎馬回唐人星醒通用高意還卓卓郊龍沈劇煮鱗劇方作極牛喘甚焚角蟬煩鳴轉喝於邁切祝曰聲嘶前漢正見秋蟬喝栁詩長楊流喝盡烏躁飢不啄晝蠅食案繁宵蚋肌血渥單絺厭已禠長箑音霎扇也孫曰方言扇自關而東謂之箑祝曰選屏輕箑字一作箑或作箑倦還捉幸兹得佳朋於此蔭華桷青熒文簟施青或作清淡澉音敢韓曰選淡澉手足注淡澉猶洗滌也甘瓜濯大壁孫曰華屋中壁也曠凝淨古畫壁上古畫竒駮犖止比角切下吕角切牛色雜又竒怪貌壁或作璧畫或作書凄如羾寒門羾方云杭本作淜蜀本作珝淜今馮字徒涉也史記武紀所謂寒門者谷口也顔曰今治谷去甘泉八十里盛夏稟然此納涼詩也淜字自當又甘泉賦登椽欒而羾天門羾音貢至也諸校本多用此定栁文扣亦作珝又淮南子北方北極之山曰寒門故離騷連絶垠乎寒門若以珝言則寒門當用此義然前義為優今按方後説是蓋谷口既非絶境未為極寒之地又不言有水則徒涉字亦無埋當改作羾皓若攢玉璞掃寬延鮮飈汲冷漬香穱音捉稻田種麥又麥飯篚實摘林珍盤肴饋禽㲉㲉或作殼説巳見上空堂喜淹留貧饌羞齷齪愈齷齪菲薄也殷勤相勸勉左右加礱斫上音籠孫曰壁也即下言賈勇事加或作皆賈勇發霜硎爭前曜冰槊孫曰莊子庖下解牛十九年而刃若新發於硎風俗通云矛長丈八者謂之槊霜硎冰槊皆以禦熱微然草根響先𬒳詩情覺感衰悲舊改工異逞新貌誰言擯朋老孫曰謂擯棄於朋友而又加之以老也猶自將心學危簷不敢慿朽機懼傾撲音雹倒也機一作瓦青雲路難近黃鶴足仍鋜土角切玉篇云鎖足未能飲淵泉立滯呌芳藥郊藥音渥楚辝辛夷楣兮藥房本草楚人謂白芷曰藥與子昔睽離嗟余苦屯剝直道敗邪徑拙謀傷巧諑音卓韓曰楚詞謡諑謂余以善淫注諑猶譛也炎胡度氛氲熱石行犖硞音確犖硞石聲又石多貌痟飢夏尤甚瘧渴秋更數君顔不可覿君手無由搦女角切持也今來沭新恩庶見返鴻朴儒癢恣遊息聖籍飽商榷音確商略也左思曰商榷万俗危行無低徊正言免咿喔上音伊下音渥楚詞屈原卜居曰將喔咿嚅唲以事婦人乎注強笑噱也車馬獲同驅酒醪欣共欶音朔説文吮也惟憂棄菅蒯上音姦下苦怪切左傳曰雖有絲麻無棄菅蒯敢望侍帷幄此志且何如希君為追都回切治玉琢愈秋雨聮句樊曰按詩云儒宫煙火􅊜此公謂學官在京師時又云因思征蜀土蓋憲宗元和𥘉也萬木聲號呼百川氣交會郊庭翻樹離合離或作雜牖變景明藹愈潨聀戎切説文小水入大水㵼殊未終飛浮亦云泰郊牽懷到空山屬近也聽邇驚瀨愈簷垂白練直練或作龍渠漲清湘大郊甘津澤祥禾伏潤肥荒艾愈禾方作木非是伏或作服主人吟有歡客子歌無奈郊侵陽日沈玄剝節風搜兊愈坱圠上烏朗切下音軋賈誼曰大鈞播物坱北無垠應劭曰其氣坱圠非有限齊也張衡曰地勢坱圠注坱圠猶髙下也遊峽喧颼飀上音搜下音留祝曰髙風也隋盧思道納涼賦動颼飀於翆帳卧江汰郊汰音太濤也微飄來枕前髙灑自天外愈蛬音拱蟋蟀也穴何迫迮或作窄方云義訓迫迮急也字見鴇羽詩箋蟬枝掃鳴噦郊援菊茂新芳援或作園徑蘭銷晚馤愈馤音藹香也地鏡時昏曉池星競漂沛郊歡呶尼交切尋一聲灌注咽羣籟愈儒宫煙火濕市舍煎熬忲郊忲音太奢也卧冷空避門衣寒屢循帶愈循或作修方云李陵傳數數自循其刀環又自循其髮顔注謂摩順也梁范靜妻詩循帶易緩愁難却心之憂矣叵銷鑠水怒已倒流隂繁恐凝害郊憂魚思舟楫魚或作虞非是感禹勤畎澮愈懷襄信可畏疏決須有賴郊可畏方作不思非是疏決謂禹決江疏河疏方作踈蓋俗體也筮命或馮蓍卜晴將問蔡愈蔡大龜也晴或作情庭商家語曰齊有一足鳥名商羊童謡曰天將大雨商羊鼓舞今齊有之忽驚舞墉禜音榮孫曰墉城墉也榮祭名左氏曰日月星辰之神則雪霜風雨之不時於是乎禜之亦親酹郊氛醨孫曰氣醨謂雲氣稍薄也稍踈映氛或作氣雺亂上音謀又音茂尓雅天氣下地不應曰雺注言蒙昧也還擁薈詩薈兮蔚兮注雲興兒謂雲霧擁塞也隂旌孫曰亦謂雲氣如旌旗之狀時摎音劉顔師古云摎流猶周流也流帝鼓孫曰天帝之鼓謂雷霆也鎮訇磕上呼宏切下苦蓋切大聲也選訇磕㗦嘈棗圃落青璣孫曰棗未熟而落如青璣也璣珠之不丸者瓜畦爛文具貧薪不燭竈富粟空填廥愈廥音澮芻藁藏秦俗動言利魯儒欲同丐深路倒羸驂弱途擁行車犬音大車轄毛羽皆遭凍離蓰不能翽羽飛聲方云離今本從竹非古樂府竹竿何嫋翽魚尾何離蓰翻浪洗虛空傾濤敗藏蓋郊吾人猶在陳僮僕誠自鄶音澮國名也洪曰左傳自劊以下無譏焉注以其微也洪曰言吾人猶絶糧童僕母足言者因思征蜀士未免濕戎斾安得發商飈廓然吹宿靄白日懸大野幽泥化輕壒音藹後漢軼埃壒之混濁戰埸暫一乾賊肉行可膾愈搜心思有效抽䇿期稱最豈惟慮收穫亦以救顚沛郊禽情𥘉嘯儔礎音楚負楹石色微收霈庶幾諧我願遂止無巳太愈征蜀聮句事見聖德詩題注日王忿違慠與傲同日或作曰方云唐本閣本皆作日此語左傳漢史屢見入詩則自庾信始日余濫推轂民願始天從是也有命事誅拔蜀險豁關防秦師縱橫猾愈風旗匝地揚雷鼓轟天殺言鼓聲如雷轟天震動也竹兵彼皴音逡説文細皮起蜀以竹為弓矢脆鐡刃我鎗䶪郊䶪𥘉八切齒利也刃或作刀方作力刑神吒㹈音釐㹈牛尾可為旄旄隂𦦨颭職琰切風吹也札甲也洪曰説者謂此聮盡雕刻之工而語仍壯刑神隂𦦨主我師而言犀札甲也夫差水犀之甲三千翻霓孫曰言旌旗動如虹霓也紛偃蹇塞野孫曰言兵衆塞野勢欲傾側也澒坱圠愈澒或作傾生獰競掣跌孫曰言生而惡者競相牽掣跌墮也癡突孫曰謂癡弱而突出皆以匡音為正今按本或作狂獽楚詞作攘􅚃竄脫趫起器切善走也選捷趫夫之敏手捷或作健川點岩鉤踔直角切巽也又知教切狙猿水漉雜鱣螖音滑蟛螖似蟹而小漉或作䍡方云亦紕也今按上句鈎字當讀如鈎致之鈎投奅匹貌切音炮石聲閙䃔音穹䃧音隆炮石聲填隍􅢼㑻傄愈㑻莫八切傄呼八切健貌又無憚也隍或作湟􅢼鳥歸切又作傶方云蜀本作􅢼鳥皆切當作崴威字不見字書理篬崴㠢不平也吳都賦隱巔崴㠢五臣曰排積也於填隍之義亦合今按隍湟通用易城復于隍一作徨強暗死不閉獷鈎猛切獰犬貌眼困逾䎵莫八切惡視也爇燒城也堞音牒城上豆熇呼木切又音壑熱也歊許嬌切熺音僖熾也抉門上音央排也左傳縣門發聊人紇抉之以出門者是也呀拗䦪上於紋切下乙轄切門扇也天刀封未坼酋膽懾前揠跧梁上酋所切跧伏於梁上排郁縮恐懼斂縮貌排或作非闖竇揳音屑不可正也窋竹律切説文物在穴中窡丁刮切又丁滑切穴中見也迫脅聞雜驅咿􅊯音幽呌冤􅞨郊􅞨與刖同方蜀本􅞨五刮切與跀同樊本只作跀今􅞨字不入刮音非窮區指清夷凶部坐雕鎩音殺漢書鉏耰不敵長鎩雕鎩翦徐也卭文卭蜀地名文織之有文者裁斐斖音尾文章貌巴盍蜀之豐美女收婠妠上烏八切下女刮切小貌肥貌椎肥牛呼牟音牟説文曰牛嗚子厚牛賦曰牟然而鳴黃金滿脰載實駝鳴􅕫乙轄切實重也􅕫駝聲荆公詩云槖垂鈴棧駝鳴􅕫節擁棠郊虎視耽聖靈閔頑嚚燾養均草䕓玉篇音察草有毒用殺魚下書遏雄虓乎交切虎聲渴雄唬令將帥無多殺也解罪弔攣瞎愈瞎許轄切攣手攣病瞎目病戰恤時銷洗劒霜夜清刮漢棧罷囂闐獠江上張絞切獠江蜀江也息澎汃上音彭下普八切湍聲選砏汃輣軋戍寒絶朝乘方云乘猶乘塞乘障之乘守也或作來非是刀暗歇宵察與察同方云刀刀斗也晝炊夜擊諸本多誤又此二語諸本多綴於厚麩枯之下古本乃綴於息澎汃之下今從古本蓋此詩自斾亡多空杠以下每人皆五韻亦可考也今按刀斗之刀與刀劒之刀古書蓋一字但以音别之耳始去杏飛蜂及歸柳嘶􅘪音扎尓雅蜇蜻似蟬而小廟獻繁馘音幗截耳級樂聲洞椌楬郊椌苦江切揭栝轄切祝曰珠逹也禮記聖人作席也為椌楬注控揭祝敔也臺圖煥丹玄郊告儼匏秸音戞稿本也祭天以為席漢志其席藁秳秳鞂字同念齒慰黴黧上音眉下音梨祝曰垢腐貌楚詞顔黴黧以沮敗孫曰齒歲也徵黧面黑也念其歲老有黴黧者則慰安之視傷悼瘢痆女點切瘡䀶休輸任訛寢詩或寢或訛訛動也報力厚麩秳或作又或作秣方云秳戶秳切説文曰春粟不潰也今本多作與偕一物不當雨出公歡鍾晨撞室宴絲曉扴音戞絲琴瑟扴繫也宴或作晏杯盂酬酒醪箱篋饋巾帓莫轄切帓帶也小臣昧戎經維用贊勳劼愈劼恪八切勤也書汝劼毖殷獻臣同宿聮句韓曰此詩召為國子傳士後與東野同宿而作自從别君來逺出遭巧譖愈斑斑落春淚浩浩浮秋浸郊毛竒覩象犀羽怪見鳥音服不祥鳥賈誼為服長沙傳鵩入其舍鴆愈鴆直禁切毒鳥朝行多危棧方作桅或作軛今按上言朝行即桅字無理當作棧夜卧饒驚枕郊生榮今分踰死棄昔情任愈鵷音冤鵷雛似鳯行參綺陌雞唱聞清禁郊山晴指高標槐密騖長蔭愈直辝一以薦巧舌千皆􅤉郊􅤉巨禁切牛舌下病匡鼎惟説詩桓談不讀讖愈逸韻何嘈嗷上音曹下音敖衆口聲也高名俟沽賃郊紛葩歡屢填曠朗憂早滲愈滲所禁切孫曰言忘其憂如物滲漏也朗或作亮方云張協七命野曠朗而無塵潘嶽寡婦賦訴空宇兮曠朗為君開酒腸顚倒舞相飲郊飲音蔭曦光霽曙物景曜鑠宵祲愈祲音浸曜光鑠銷祲祥氣儒門雖大啓姦首不敢闖義泉雖至近盜索不敢沁七鴆切沁水出上黨不敢沁言不敢及也清琴試一揮白鶴呌相喑音蔭鳴相應也又貌泣不止曰喑或作相呌吟吟去聲讀趙德麟本同音閣本作音欲知心同樂雙繭抽作絍郊維汝鳩切祝曰後漢安得識絍孫曰言二人同心相樂如雙繭作絍絲也莎柵聮句河南谷名冰溪時咽絶斷續聲也風櫪孫曰櫪木名亦作操風櫪為風所吹軒舉飄揚也方軒舉愈北處不斷腸定知無斷處郊雨中寄孟刑部幾道聮句孟簡集注孟簡字幾道德州平昌人以新舊傳考之朱嘗為刑部史豈逸之耶新傳言其為倉部貟外以不附王叔文徙它曹或者它曹即刑部也秋潦淹轍迹淹或作無髙居限參拜愈耿耿蓄良思遙遙仰嘉話郊一晨長隔歲百步逺殊界愈逺或作還商聽謂聽秋聲也饒清聳悶懷空抑噫郊噫烏界切噫氣也商或作高悶或作閟非是美君知道腴逸步謝天械愈爵位冠冕之屬吟馨鑠紛雜抱照瑩疑怪郊撞宏聲不掉不振也輸邈瀾逾殺愈簷瀉碎江喧街流淺溪邁郊念𥘉相遭逢幸免因媒介祛煩類決癰愜興劇􅐡疥􅐡或作匏方云今字書匏匏也無􅐡音然文選把搔無已把蒲巴切則知唐字今不出者多研文較幽玄呼傳騁雄快今君軺音遙説文小車軺或作春方馳伊我羽巳鎩所拜切鳥羽病顔延之詠嵇康曰鵉翮有時鎩溫存感深惠琢切奉明誡愈誡或作戒方云説文誡敕也戒警也漢谷永傳猶嚴父之明誡後漢西域傳蹙國減土經有明誡此語當用誡字至下文伸誡則當用戒字今按謝本下文實作申戒逮兹更凝情暫阻若嬰瘵側界切勞疾欲知相從盡靈珀韓曰琥珀也虞翻曰琥珀拾芥樊曰謂無所遺拾纎芥拾或作據非是欲知相益多或作從益神藥銷宿憊德符仙山岸永立難欹壞氣涵秋天河有朗無驚湃郊湃普拜切滂湃祥鳯遺蒿鷃雲韶掩夷靺莫拜切東夷樂周禮鞮鞻氏掌四夷之樂注東方曰靺南方曰任西方曰株離北方曰禁爭名求鵠如射之志鵠徒騰口甚蟬喝於邁切蟬嘶聲未來聲巳赫始鼓敵前敗鬪埸再鳴先孫曰左氏傳州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴杜預注云此於雞鬪勝而先鳴今言再鳴先者蓋取此事遐路一飛屇遐或作霞東野繼竒躅修綸懸衆犗音戒樊曰莊子任公子為大鈎巨緇十五犗為餌投竿東海犗騬牛也穿空細丘垤照日陋菅蒯愈垤蟻塜也孫曰左氏雖有絲麻無棄菅蒯菅前茅屬可以為布丘垤菅蒯公以自喻也小生何足道積慎如觸蠆丑邁切愔愔揖淫切安靜貌左氏曰祈招之愔愔左思曰靡靡愔愔安靜也抱所諾翼翼自申戒申方作伸戒説見上聖書空勘讀勘方作甚盜食敢求嘬楚夬切禮記無嘬灸謂一舉盡臠惟當騎欵假緩馬也馬援曰乘下澤車御欵假馬足矣豈望覿圭玠弱操愧筠杉微芳比蕭薤何以驗高明柔中有剛夬逺遊聮句樊曰逺遊送東野之江南也聮句凡四十韻東野二十公十九李習之一習之之詩見于丗者此而巳大率詩非其所長也習之李翺也别腸車輪轉一日一萬周郊離思春氷泮瀾浸不可收愈馳光忽以迫飛轡誰能留愈取之詎灼灼此去信悠悠翶取或作前楚客宿江上夜魂棲浪頭棲或作捷曉日生逺岸水芳綴孤舟村飲泊好木飲或作館方云東野幽居詩有嘉禾偶良酌芳隂庇清彈館字非也野𬞞拾新柔獨含悽悽别中結鬱鬱愁人億舊行樂鳥吟新得儔郊憶舊方作意憶新方作折皆非是靈瑟時窅窅霒猿上於金切霒雲覆日也霒猿謂猿在雲間也夜啾啾憤濤氣尚盛恨竹淚空幽長懷絶無巳多感良自尤即路涉獻歲歸期眇涼秋兩歡日牢落孤悲坐綢繆愈觀怪忽蕩漾叩竒獨冥搜海鯨吞明月裴氏廣州記鯨鯢目即明月珠浪島沒大漚音甌浮漚或作浮我有一寸鈎欲釣千丈流良知忽然逺壯志欎無抽郊魍魅暫出沒魅或作魎蛟螭互蟠蟉力幽切蟠蟉龍貌昌言拜舜禹舉帆音凡船上幔或作帆凌斗牛吳楚分野在江南懷糈下音所離騷巫咸將夕降兮壞椒糈而要之糈精米所以饗神屈原五月五日自投泪羅而死楚人哀之每至此日以竹筒貯米投水祭之方云語見離騷祭神米也蜀二作精非楚餽賢屈乘桴追聖丘飄然天外步豈肯區中囚愈肯或作有楚些蘇個切楚語助辝待誰弔賈辭緘恨投翳明孫曰謂掩翳其明也弗可曉弗或作不祕魂安所求氣毒放逐域蓼茶蓼芳菲花閛貌疇田疇雜芳菲疇當春忽淒涼不枯亦颼飀貉謡衆猥欸貉或作豹飲或作誶方從杭蜀本云欸音烏來切楚詞九章欸秋冬之緒風又楊子始皇方獵六國而翦牙欸王逸曰欸嘆也方言曰欸然也南楚凡言然曰欸元次山有欸乃曲亦音靄今按方説是也欸説文亞改切又烏來切譍也史記項羽紀作唉亦音烏來反説文同黃魯直讀欵乃為襖靄誤矣今或為作欵字亦誤乃却當音襖也巴語相咿㗀與嚘同方云字書無幽字公寄三學士用咿嚘字征蜀聮句用咿吻字考之字書咿嚘為正默誓去外俗嘉願還中州江生孫曰水微張也行既樂躬輦自相勠音留孫曰并力也躬輦自推車樊曰言水行可樂則躬輦為勞矣飲醇趣明代味腥孫曰醇謂醇德以酒為喻故云飲醇明代盛丗也腥楚越之食也謝荒陬郊陬隅也馳深鼓利楫趨險驚蜚輶蜚或作飛繫石沉靳尚安楚詞上官大夫靳尚楚之讒臣讃屈原於懷王者開弓射鴅吺孫曰史記鴅吺即歡兜字古文尚書亦以歡兜為鴅吺堯放之於崇山靳尚鴅吺皆在南方恐其為鬼為􅑂故欲沉射之也路暗執屏翳上步丁切樊曰司馬長卿大人賦時若曖將混濁兮召屏翳誅風伯刑雨師將雨路暗故欲執屏翳戮之應劭曰天神使也波驚戮陽侯樊曰揚雄反離騷云陵陽侯之素波兮豈吾纍之獨見許應劭曰陽侯古之諸侯有罪自投江其神為大波廣泛信縹眇高行恣浮遊外患蕭蕭去中悒稍稍瘳振衣造雲闕跪坐陳清猷得風變讒巧仁氣銷戈矛人或作和方云人氣見禮記名聲照西海淑問無峕休豈或作肯方云峕古時字作肯誤也歸哉孟夫子婦去無夷猶愈晉左思吳都賦輕禽狡獸周章夷猶夷猶猶豫也楚詞君不行兮夷猶歸去方作君歸或作歸興晚秋郾城夜會聮句集注元和十二年七月裴度受命平淮右以郾臣為行蔡州治所公為行軍司馬季正封為判官其詩與正封作於郾城蓋九月間蔡未平時也詩凡百韻東野死後公所與聮句者惟此可見耳方云杭蜀本題只此洪曰今本有上王中丞盧院長者非從軍古云樂樊曰王仲宣詩從軍有苦樂但問所從誰談笑青油幕孫曰廣雅幕悵也宋劉瑀與顔峻書曰朱修之三代叛兵一朝居青油幕下作謝宣明面向人青油幕未將幕也以青油縑為之燈明夜觀音貫棊月暗秋城析正封上中丞方從古本如此諸本無上中丞三字羈客方寂歷驚烏時落泊語闌壯氣衰酒醒寒砧作愈奉院長方從古本如此諸本無奉院長三字遇主貴陳力夷凶匪兼弱百牢犒輿師千户千户侯也購首惡正封平生恥論兵末暮晚年未或作未方云顔延年詩幼壯困孤介未暮謝幽貞不輕諾徒然感恩義誰復論勳爵愈多士賊中將士𬒳沾汚小夷施毒蠚丑略切蟲行貌何當鑄劒戟或作巨鉟相與㷌臺閣正封室婦歎鳴􅔏古玩切詩東山曰鸛鳴于垤婦歎于室家人祝喜鵲終朝考蓍龜何日親蒸礿愈礿音藥間使斷津梁間或作問方云間使漢書蒯通張騫傳屢見潛軍索林薄紅塵羽書靖孫曰羽檄也繳者以木蕳為書有急事則插雞羽其上謂之羽檄紅塵羽書靖者謂羽書稀少紅塵不起也大水沙囊涸正封銘山子所工插羽余何怍未足煩刀爼沛公軍灞上來見項王至鴻門樊噲曰人方為刀俎我為魚肉言賊不足以煩刀俎誅夷祗應輸管鑰愈樊曰國語越王勾踐使大夫種行成於吳曰靑委管鑰屬國家以身隨之孫曰言賊不足以煩刀俎但當輸送其管鑰而巳雨矢逐天狼韓曰楚詞舉長矢兮射天狼天狼星名以喻貪殘電矛驅海若電矛謂矛戟如電海若海神矛或作刀靈誅天誅固無縱力戰誰敢却正封峨峨雲梯天黎切諸葛亮攻郝照於陳倉以雲梯衝車臨城中照以火箭射之乃燒之翔赫赫火箭著連空隳雉堞音牒臣垣也公羊曰五板而堵五堵而雉照夜焚城郭愈軍門宣一令廟算建三略兵法有黃石公三略謂上中下三略也雷鼓揭千槍或作鎗方云蒼頡篇曰刈木兩頭説者是也槍字為正浮橋交万筰正封筰或作莋方云莋當從竹音昨説文曰筊也西南夷以竹索為橋尋以渡水是也少陵詩有連笮動嫋娜字亦作笮蹂野馬雲騰映原旗火鑠方云校本一云鑠當作爍疲氓墜將拯殘虜狂可縛愈摧鋒若貙兕超乘秦師過周北門超乘者三百乘如猱玃音攫大猿逢掖服翻慙漫莫干切或作曼莊子垂漫胡之纓曼胡纓武士纓名也胡纓可愕正封星殞聞雊雉雊古豆切唐景龍𥘉有大星殞于西南聲如雷野雉皆驚雊星殞者賊敗亡之兆師興隨唳鶴唳音戻苻堅以百万入寇謝玄謝石以八千拒之堅大敗衆棄聞風聲鶴唳皆以為王師已至虎豹貪犬羊鷹鸇憎鳥雀愈憎或作讋燒陂除積聚灌壘失依託失或作去慿試諭昏迷執殳征暴虐正封倉空戰卒飢月黑探兵錯黑或作暗凶徒更蹈藉逆族相啖嚼愈軸轤亘淮泗斾旌連夏鄂大野縱氐羌長河浴騮駱正封東西競角逐逺近施矰繳音勺孫曰謂結絲於矢繳生絲縷也顔師古曰繳弋射其矢為矰人怨童聚謡天殃鬼行瘧愈漢刑支郡黜周制間田削計作間漢支郡如楚王削東海趙王削常山是也周制諸侯有功者間田以祿之有削地者歸之間田侯社退無功鬼薪文帝三歲刑曰鬼薪言取薪給宗廟也懲不恪正封余雖司斧鑕音質斧也孫曰公為行軍司馬主罰情本尚丘壑且待獻俘囚終當返耕穫愈藁街陳鈇鉞孫曰漢長安街也蠻夷邸在其中誅罰人於此鈌莝斫刀也桃塞西京賦曰北有重險桃林之塞興錢鎛上子踐切銚也鏄耨也農器地理畫封疆天文掃寥廓正封天子憫瘡痍將軍禁鹵掠䇿勳封龍額㷌獸獲麟腳愈獲方作獵云龍額平原縣名劉氏音額崔浩音洛此詩用魏闕秦關龍額麟腳皆借對也獸或作騎麟腳見子虛賦射麋腳麟韋昭曰持引其腳也家語謂魯西狩子鉏商獲麟折其前足載以歸豈用此耶今按歸獸用書序語對䇿勳為切但當獸作狩義耳詰誅敬王怒給復音福前漢民産子復注云不役使也哀人瘼澤髮解兜牟或作鍪方云古通用􅋳顔傾鑿落正封駝音陀酡面赭楚詞美人既醉朱顔酡鑿落飲器樂天詩銀含鑿落盞金屑琵琶槽安存惟恐晚安存或作存安洗雪不論昨暮鳥巳安巢春𧖟看滿箔愈箔音泊以竹為箔所以盛蠶聲明動朝闕光寵耀涼洛旁午降絲綸中堅擁鼓鐸正封孫曰漢光武與王尋戰衝其中堅中堅謂大將居中以堅鋭自輔故云中堅此言裴度凱族擁鼓鐸而歸也密坐列珠翠高門塗粉雘跋朝猶言舉朝也賀書飛塞路歸鞍躍愈魏闕橫雲漢秦關束岩崿音咢崖也拜迎羅櫜鞬居言切以藏矢晉重耳曰右屬􅐤鍵以與君周旋左傳問遺結橐橐正封江淮永清晏宇宙重開拓是日號升平此年名作噩愈元和二年歲在丁酉洪赦方下究或作救方云雞冠子上情不下究淮南子號令不能下究漢燕王旦傳主恩不得下究作究為是武飈亦旁魄步角切封禪書曰旁魄四塞廣𬒳也南據定蠻陬北攫空朔漠正封儒生愜教化愜方作怯武士猛刺斫上七亦切孫登呼楊駿曰刺刺斫斫吾相兩優遊他人雙落莫愈印從負鼎佩門為登壇鑿再入更顯嚴顯或作深方云顯嚴見吕氏春秋九遷彌謇諤正封賔筵盡狐趙導騎多衛霍國史擅芬芳宮娃分綽約愈娃於窪切集注宫女也風俗通曰楚人謂美色為娃分賜也綽約柔弱貌莊子服膚若氷雪綽約若處子宫或作官非是丹掖列鵷鷺洪爐衣狐狢摛文揮月毫講劒淬霜鍔正封命衣備藻火賜樂兼拊摶兩廂鋪氍毺上音衢下山芻切風俗通曰織毛褥謂之氍毺五鼎調勺藥愈方云勺藥五味之和也子虛賦及文選凡四見皆音酌略姚令威曰後語有仍祈却老藥此當異讀帶垂蒼玉佩轡蹙黃金絡誘接謂登龍謂或作諭趨馳狀傾藿正封藿音霍葵類能向日青娥眉也翳長袖紅頰吹鳴籥儻不忍辛勤何由恣歡謔愈惟當早富貴豈得暫寂寞但擲雇笑金仍祈却老藥正封殁廟配樽斚生堂合毊音喬尓雅大磬謂之毊鑮音傳尓雅大鍾謂之鑮安行庇松篁高卧枕莞蒻愈莞音菅蒻音弱所以為席菅草蒻蒲也莞或作官洗沐恣蘭芷楚詞浴蘭湯兮沐芳華割烹厭脾臄其虐切詩曰善肴脾臄臄喜顔非忸怩逹志無隕穫正封隕或作殞方云見儒行萹詼諧酒席展慷慨戎裝著斬馬祭旄纛孫曰以旄中尾大如斗繫馬軛上謂之旄纛師行則用之炮羔禮芒屩愈草屨也史記虞卿躡屩擔簦禮謂禮士山多離隱豹野有求伸蠖音獲屈伸蟲也推選閲羣材薦延搜一鶚正封左右供諂譽親交獻諛噱其里切説文大笑也關嗢噱終日名聲載揄揚權勢實熏灼愈熏或作薰方云詩憂心如熏毛傳熏灼也漢谷永傳潘嶽西征賦皆用無作薰者道舊生感激當歌發酬酢羣孫輕騎紈下客豐醴酪正封窮天貢賝與琛同異市海賜酺音蒲又音步醵其虐切合錢飲酒作樂鼓還槌從禽弓始彍愈彍音廓説文曰弩滿也取歡移日飲求勝通宵博五白孫曰博齒也韓曰屈原曰成梟而中呼五白注五白五木也劉𥙿與毅樗蒲𥙿厲聲叱五木即或盧氣爭呼六竒心運度正封恩澤誠布濩音護祝曰布露也前漢布濩閎澤樊曰封禪頌非惟如之我布濩之嚚頑巳簫勺音酌諸本簫作蕭方漢房中歌蕭勺羣慝晉灼曰簫舜樂勺周樂言以樂征伐也顔師古曰教化行則逆亂之徒交散也告成上云亭封禪書伏羲至湯封泰山禪云云黃帝封泰山禪亭亭云亭二山名也考古垂矩隻憂縛切度也馬融尋曰規墓矩彠古封禪之君或禪云云或禪亭亭前堂清夜吹東第良晨酌池蓮折秋房院竹翻夏籜正封五狩朝恆岱三畋宿楊柞音昨長楊五柞漢宫名揚雄曰振師五柞習馬長楊農書年討論馬法長懸格愈格音各孫曰武帝時有善相馬者東京門獻作銅馬法此説思非格亦廢也馬法謂司馬法字見揚雄美新懸或作廢雪下收新息蔡州縣名陽生十月也過京索應破曰京縣名今有大索小索亭收或作牧方云漢書索皆音山客切惟文選功臣贊有桑各一音爾牛時寢訛我僕或歌咢正封五各切孫曰詩或歌或咢比於琴瑟曰歌徒擊鼓曰咢帝載載功也書然帝之載彌天地臣辭劣螢爝音爵炬火也劣或作勿為詩安能詳庶用存糟粕愈存方作等朱文公校昌黎先生文集卷之八
