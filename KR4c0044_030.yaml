front:
  text: 朱文公校昌黎先生集卷之三十考異音釋附
  hash: sha256:6ccb8583670add350418b6693a4a58fc0d2401364d5df66f25b7c05783c11d9d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_030-1a}
body:
  text: 碑誌唐故監察御史衛府君墓誌銘樊曰公此誌自与弟中行别以下至可餌以不死造語雄竒所謂唯陳言之務去者也君諱某字某或作諱之玄字造微中書舎人御史中丞諱某之子某或作晏贈太子洗馬諱某之孫某或作璿方云按元和姓纂晏三子長之玄次中立次中行汪彦章云王仲一本謂此衙中立墓誌中立字退之非之玄也家丗習儒學詞章昆弟三人俱傳父祖業從進士舉君獨不與俗爲事樂㢮置自便不下方有字云讀去声非是或疑此与字當作以更詳之㢮或作施父中丞薨旣三年與其弟中行别曰若旣克自敬勤及先人存趾美進士續聞成宗唯服任遂功爲孝子在不怠我恨巳不及假令仐得不足自貫音射又音丗或作貴作貫我聞南方多水銀丹砂雜他竒藥爊於刀切又音禄煉也煨也爲黃金可餌以不死今於若丐我我即去遂踰嶺阨於革切塞也南出藥貴不可得以干容帥帥且曰若能從事於我可一日具許之得藥試如方不效曰方良是我治之未至耳留三年藥終不能爲黄金而佐帥政成以功再遷監察御史帥迁于桂從之帥坐事免君攝其治歴三時夷人称便新帥將奏功君捨去南海馬大夫使謂君曰幸尚可成兩濟其利君雖益厭然不能無萬一冀至南海未幾竟死年五十三子曰某某或作景微元和十年十二月某日歸葬河南某縣某郷某村祔先塋某縣某郷某村諸本作伊闕縣伊囯郷髙都村於時中行爲尚書兵部郎號名人而與余善請銘或无於字郎下或有中字銘曰嗟惟君篤所信方云信音新漢武悼李夫人賦申以信兮要無有弊精神以弃餘賈於人脫外累自貴珍訊來丗述墓文唐故河南令張君墓誌銘君諱署字某河間人大父利貞有名玄宗丗爲御史中丞㪯彈無所避由是出爲陳留守領河南道採訪処置使数歳卒官皇考諱郇以儒斈進官至侍御史郇或作詢君方質有氣形皃魁碩長於文詞以進士㪯博斈宏詞爲校書郎自京兆武功尉拜監察御史爲幸臣所䜛與同輩韓愈李方叔三人俱爲縣令南方三年逢恩俱徙掾江陵半歳邕管奏君爲判官改殿中侍御史不行拜京兆府司録諸曹白事不敢平面視共食公堂抑首促促就哺歠揖起趍去無敢䦨語促促或作旦旦方云促如齪齪之促本或作娖娖闌或作間縣令丞尉畏如嚴京兆事以辦治辦或作幹京兆改鳯翔尹以節鎮京西請與君俱改禮部貟外郎爲觀察使判官帥它迁君不樂乆去京師謝歸用前能拜三原令歳餘迁尚書刑部貟外郎守法争議棘棘不阿方从諸本无議字及下棘字而云眺本校増此二字阿或作撓今按歐公嘗疑此句有脫字不知眺氏以何本校也詳其文理當有此字故从之改䖍州刺史民俗相朋黨不訴殺牛牛以大耗或无不訴字又多捕生鳥雀魚鼈可食與不可食相買賣時節脫放期爲福祥君視事一皆禁督立絶祥下或有事字或无視事二字或但有事字使通經吏與諸生之旁大郡斈郷飲酒䘮婚礼張施講說民吏觀聽從化大喜經吏或作經史度支符州折民户租歳徴緜六千屯比郡承命惶怖立期日唯恐不及事𬒳罪君獨䟽言治迫嶺下民不識蚕桑月餘免符下民相扶擕守州門呌讙爲賀改澧州刺史民稅出雜産物與錢尚書有經数觀察使牒州徴民錢倍經君曰刺史可爲法不可貪官害民留噤不肯從竟以代罷可爲法疑必有脫誤或爲字當作守觀察使使劇吏案簿書十日不得毫毛罪吏或作史改河南令而河南尹適君平生所不好者君年且老當日日拜走仰望階下不得巳就官数月大不適即以病辝免公卿欲其一至京師君以再不得意於守令恨曰義不可更辱又奚爲於京師間竟閉門死年六十或无閉門二字君娶河東柳氏女二子昇奴胡師將以某年某月某日葬某所其兄將作少監昔請銘於右庻子韓愈昔或作者方云李遜赴襄陽送行詩有著作郎張昔愈前與君爲御史𬒳䜛俱爲縣令南方者也最爲知君銘曰誰之不如而不公卿奚養之違以不乆生唯其頏頏以丗厥聲鳯翔隴州節度使李公墓誌銘一本上有唐故字度下有觀察使開府儀同三司撿校户部尚書贈尚書左僕射字公諱惟簡或作某字某司空平章事贈太傅之子太傅𥘉姓張氏肅宗時㪯恒趙深冀易定六州戰卒五萬人馬五千匹以歸聽命天子嘉之賜姓曰李更其名寳臣名下或有曰字立其軍號之曰成德由是姓李氏太傅薨公兄弟譲嗣公竟弃其家自歸京師及兄死家覆有司設防守德宗如奉天守卒出公即馳歸與母韓囯夫人鄭氏拜訣屬家徒隨走所幸道與賊遇七闘乃至有功迁太子諭德加御史中丞從幸梁州天黒失道識焦中人声得見德宗於盩厔上音輈下音窒雍縣名属鳯翔西上曰卿有母可隨我耶可或作何曰臣以死從衛及幸還録功封武安郡王號元從功臣王或作公方云考之史當作王圖其形御閣而以神威將軍居北軍衛居或作爲衛或作御乆乃加御史大夫丁韓國憂去官累遷神威大將軍加工刑二曹尚書天威統軍又改户部尚書金吾大將軍有長上萬囯俊者以軍勢奪興平人地吏憚莫敢治上方作尚新史蜀本作上仐按長上盖衛卒之号猶今言長入也當从蜀本及公爲金吾興平人曰乆聞李將軍爲人公平庻能直吾屈即齎縣牒來見公發視立杖國俊廢之以地還興平人聞者莫不称歎於是天子以公材果可任用治人將兵無所不疑元和六年即以公爲鳯翔隴州節度使户部尚書兼鳯翔尹隴州地與吐蕃接舊常朝夕相伺更入攻抄人吏不得息公以爲囯家於夷狄當用長筭邊將當承上㫖謹條教方作務非是蓄財穀完吏農力以俟不宜規小利起事盗恩禁不得妄入其地益市耕牛鑄鎛釤鉏斸鎛音博釤山監切鉏陟𥘉切又仕𦵔切与耡同去檅助苗斸陟玉切集注詩庤乃錢鎛注田器也釤大鎌也斸大鋤也以給農之不能自具者丁壯興勵㒷或作愈歳増田数十萬畒連八歳五種俱熟公私有餘販者負入褒斜音邪孫曰梁州記万石城沂漢上七里有褒谷南口曰褒比口曰斜長四百七十里褒水通沔斜水通渭選右界上褒斜舡循渭而下首尾相継不絶十三年公與忠武軍節度使司空光顔邠寕節度使尚書釗俱來朝上爲之燕三殿張百戯公卿侍臣咸與方云唐麟德殿有三靣故曰三殿旣事勑還公因進曰臣幸得宿衛四十餘年或无得字今年老斥外任不勝慕戀願得死輦下天子加慰遣焉斥或作許或作訴還鎭告疾其复五月戊子薨年五十五訃至上悼愴罷朝遣郎中臨弔贈尚書左僕射以其年十一月景申葬萬年鳯棲原万年下或有縣字夫人博陵郡崔氏河陽尉鎬之孫大理評事可觀之女賢有法度賢下或有而字公有四子長曰元孫三原尉次曰先質彭之𪷟陽尉曰元立興平尉曰元本河南參軍皆愿敏好善元立元本皆崔氏出葬得日嗣子元立與其昆弟四人請銘於韓氏曰先人嘗有託於夫子也愈曰太傳功在史氏記僕射以孤童囚羈京師或无記字重下方有子字仐按翟方進傳无者爲是卒能以忠爲節自顯取爵位立名績使天下拭目觀父母與榮焉旣忠又孝法宜銘或无銘字銘曰太傳之顯自其躬興僕射童羈孰與之朋遭囯之難以節自發致其勤艱以復考烈孝由忠立爵名隨之銘此玄石維昧之詒唐故中散大夫少府監胡良公墓神道碑此萹从方氏石本疑者别出蜀本注牛僧孺撰墓志陳鴻撰謚張籍撰行狀今按方本无中散大夫良五字又它神道碑不著墓字唯此有之亦変例也少府監胡公者諱珦字潤愽年七十九以官卒明年八月十四日葬京兆奉先夫人天水趙氏祔焉八月或作七月无十四日字其子逞迺巡遇述遷造或无迺字或无巡字與公壻廣文愽士呉郡張籍以公之族出行治歴官壽年爲書出下或有処文二字非是使人自京師南走八千里至閩南兩越之界上請爲公銘刻之墓碑於潮州刺州韓愈曰胡姓本出安定後徙清河於仐爲宗城屬具州何下或有複出清河字大父諱秀武后時以文林徴爲麟䑓正字父宰臣用進士卒官平陽冀氏令贈潭州大都督或无官字公早孤能自勸斈立節槩非其身力不以衣食勸或作勤凡一試進士二即吏部選皆以文章占上第樂爲儉勤自刻削不干人以矯時弊楽方作出非是及爲富平尉一府称其断决建中四年侍郎趙賛爲度支使薦公爲監察御史主餽給渭橋以東軍洗手奉職不以一錢假人賊平有司考覈群吏多坐貶死考覈方或作覈考或无貶或无死字獨公以清苦能檢飭無漏失遷河南倉曹魏公賈躭以節鎮鄭滑以公佐觀察事檢校尚書工部貟外郎以剛直齟齬不阿忤權貴除獻陵高祖陵令居陵下七年市置田宅務種樹爲業以自給教授子弟業下方无以字杭併无以自給字子弟或作弟子貞元十一年吏部大選以公考選人藝斈以勞迁奉先令以治辦迁尚書膳部郎中改坊州刺史州經亂無孔子廟公至則命築宫造祭器率博士生講讀以時如法以祠人吏聚觀歎息生下或有徒字遷舒州刺史州歳大熟麥一莖数穗閭里歌舞之或无舞字考功以聞遷尚書駕部郎中数以事犯尚書李巽巽時主塩鐵事富驕恃势以語丞相丞或作宰由是退公爲鳯翔少尹巽死迁少大理改少詹亊元和十二年朝廷以公年老能自祗力亊職不懈可嘉拜少府監兼知内中尚明年以病卒方无病字非是公始以進士孤身旅長安致官九卿爲大家七子皆有斈守女嫁名人年幾八十堅悍不衰事可傳載可謂成德謂或作爲非是銘曰朅朅丘竭切武壯皃胡公旣果以方挾藝射科毎發如望音忘人求於人我已爲之自始訖終不降色辝因官立事隨有可載發跡餽軍遭䜛府介軍或作運去居陵下爲吏爲隱坊舒之政于兹有靳或作歎守官駕部名昇巳屈昇或作升巳或作民躋于少府甚宜秩物不配其有君子耻之少府古卿公優止之刻文碑石以顯公行維公後人無怠嗣慶維公或作維彼唐故相權公墓碑上之元和六年其相曰權公諱德輿字載之其本出自殷帝武丁武丁之子降封於權權江漢間囯也周衰入楚爲權氏楚㓕徙秦而居天水略陽符秦之王中囯其臣有安丘公翼者有大臣之言後六丗至平凉公文誕爲唐上庸太守荆州大都督長史焯有聲烈焯或作綽平凉曾孫諱倕贈尚書禮部郎中以藝斈與蘇源明相善卒官羽林軍録事參軍於公爲王父郎中生贈太子太保諱皐以忠孝致大名去官累以官徴不起追謚貞孝是實生公公在相位三年其後以吏部尚書授節鎭山南年六十以薨贈尚書左僕射謚文公以薨以或作六方考舊史云當作以公生三歳知變四聲知或作能四歳能爲詩七歳而貞孝公卒來弔哭者見其顔色聲容皆相謂權氏丗有其人及長好斈孝敬祥順貞元八年以前江西府監察御史徴拜博士朝士以得人相慶改左𥙷闕章奏不絶譏排姦倖與陽城爲助轉起居舎人遂知制誥凡撰命詞九年以類集爲五十卷天下称其能十八年以中書舎人典貢士拜尚書禮部侍郎薦士於公者其言可信不以其人布衣不用即不可信雖大官势人交言一不以綴意奏廣歳所取進士明經在得人不以貟拘轉户兵吏三曹侍郎太子賔客復爲兵部遷太常卿天下愈推爲鉅人長德時天子以爲宰相冝參用道德人因拜禮部尚書同中書門下平章事公旣謝辝不許其所設張舉措必本於寛大以幾教化多所助與方作爲或无此一字今按助與如後救于頔亊之類是也作爲非是維匡調娯不失其正中於和節不爲聲章因善與賢不矜主巳矜或作務以吏部尚書留守東都東方諸帥有利病不能自請者公常與䟽陳不以露布不以或無不字露布或作布露復拜太常轉刑部尚書考定新舊令式爲三十編舉可長用方无長字其在山南河南勤于選付治以和簡人以寕便以疾求還十三年某月甲子道薨于洋之白草奏至天子痌傷爲之不御朝痌或作痛郎官致贈錫官居野處上下弔哭皆曰善人死矣其年某月日葬河南北山在貞孝東五里月下或有某字公由陪屬升列年除歳遷以至公宰人皆喜聞若巳與有無忌嫉者于頔坐子殺人失位自囚親戚莫敢過門省頋朝莫敢言者頋下或有者字朝上或有在字公將留守東都爲上言曰頔之罪旣貰不竟冝因賜寛詔公下或有時字曰下或有于字上曰然公爲吾行諭之頔以不憂死前後考第進士及庭所䇿試士踵相躡爲宰相逹官與公相先後其餘布處䑓閣外府凡百餘人自始學至疾未病未嘗一日去書不觀或无未病二字公旣以能爲丈辝擅聲於朝多銘卿大夫功德或无能字然其爲家不視簿書未嘗問有亡費不偫餘視或作親問下或有其字諸本偫作待或作諸公娶清河崔氏女其父造嘗相德宗號爲名臣德或作代方考宰相表云當作德旣葬其子監察御史璩音渠纍然服䘮來有請服䘮或作䘮服方无來字乃作銘文或无銘字曰權在商周丗無不存无或作次㓕楚徙秦嬴劉之間甘泉始侯以及安丘詆訶浮屠皇極之扶貞孝之生鳯鳥不至或作至丗爵位豈多半塗以税以或作巳壽考豈多四十而逝惟其不有以惠厥後是生相君爲朝德首行丗祖之文丗師之祖或作師師或作推或作祖流連六官出入屏毗無黨無讎㪯丗莫疵人所憚爲公勇爲之惮爲或作惮焉其所競馳公絶不窺其方作人競作共絶作有今按作絶乃与上文勇字相應孰克知之德將在斯克或作先刻詩墓碑以永厥垂乎淮西碑并序樊曰宰相裴度爲淮西宣慰處置等使公爲行軍司馬蔡平随度還朝詔撰平淮西碑公以吳元済之平由度能固天子意得不赦卒擒之多帰度功而李愬特以入蔡功居第一愬妻唐安公主女也出入禁中訴碑不实帝詔斵其文更命翰林斈士段文昌爲之見舊史公傳及新史吴元済傳文昌之文見姚鉉丈粹其与公作不待較而明蘇内翰録臨江驛小詩云淮西功業冠吾唐吏部文章日月光千載断碑人膾炙不知丗有段文昌盡之矣陳无巳白龍圖孫斈士斍喜論文謂退之淮西碑叙如書銘如詩又云少游謂元和聖德時於韓文爲下与淮西碑如出两手盖其少作也商隱讀韓碑詩元和天子神武􅐾彼何人哉軒與羲誓將上雪列垩耻坐法宫中朝四夷淮西有賊五十載封狼生貙貙生羆不據山河據平地長戈利矛日可麾帝得聖相相曰度賊斫不死神扶持腰懸相印作都統隂風惨淡天王旗愬武古通作牙瓜儀曹外郎載筆随行軍司馬智且勇十四万衆猶虎貔入蔡縛賊献太庿功无與比恩不訾帝曰汝度功第一汝從亊愈冝爲辝愈拜稽首蹈且舞金石刻畫臣能爲古合丗称大手筆此亊不繋於聀司當仁自古有不避言訖屡頷天子頥公退斎戒坐小閤濡染大筆何淋漓㸃竄堯典舜典字塗改清庿生民詩文成破体書在紙清晨再拜鋪丹墀表曰臣愈昧死上詠神聖功書之碑碑髙三丈字如手負以靈亀蟠以螭句竒語重喻者少讒之天子言其私長縄百尺拽碑倒麄砂大石相磨治公之斯文若元氣先時巳入人肝脾湯盤孔鼎有述作仐無其器存其辝嗚呼聖皇及聖相相與烜爀流淳熈公之斯文不示後曷與三五相攀追願書万本頌万過口角流沫右手胝傳之七十有三代以爲封禅玉檢明堂基天以唐克肖其德聖子神孫継継承承於千萬年敬戒不怠全付所覆四海九州罔有内外悉主悉臣髙祖太宗旣除旣治髙宗中睿休養生息至于玄宗受報収功極熾而豐物衆地大孽牙其間肅宗代宗德祖順考以勤以容大慝適去稂莠不薅奴豆切又奴毛切薅器也以刺地除草詩以薅荼蓼相臣將臣文恬武嬉習熟見聞以爲當然睿聖文武皇帝旣受羣臣朝帝下或有陛下字非是乃考圖数貢方无乃字数色阻切祝曰謂考輿地之廣狹計貢賦之至与不至曰嗚呼天旣全付予有家今傳次在予予不能事事其何以見于郊廟羣臣震懾奔走率職方无奔率二字明年平夏綏銀節度留後李惠琳叛兵馬使張承金討斬之又明年平蜀劒南節度韋皐卒行軍司馬刘闢自称留後東川節度髙崇文擒刘闢以献又明年平江東又明年平澤潞蜀下方有西川字云刘闢求都統三川方圍梓州而敗乱固不及他郡也仐按旣圍梓州則乱巳及東川矣方説非是鎮州招討使吐突承璀执昭義節度盧從史帰京师遂定易定義成節度張茂昭以易定二州帰于有司致魏博具衛澶相魏博節度田弘正以所𬋩六州帰于有司無不從志皇帝曰不可究武予其少息究或作窮九年蔡將死蔡人立其子元濟以請不許遂燒舞陽犯葉襄城以動東都放兵四刼城上或有等字洪云此謂葉与襄城耳等字非是皇帝歴問于朝一二臣外或作外臣方从杭苑无外字仐按此句若作外臣則當時朝臣自以伐蔡爲不可非獨外臣也若作一二臣則當時㪯朝之臣皆以伐蔡爲不可又非獨一二人也考之下文所謂一二臣同不爲无助者又正指武元衡裴度一二人賛伐蔡之謀者而言則此乃謂唯一二臣以爲可而其外羣臣皆以爲不可耳諸本作外臣及无外字皆非是唯作臣外者得之皆曰蔡帥之不廷授于今五十年帥或作師于或作於傳三姓四將其樹本堅兵利卒頑不與他等因撫而有順且無事大官臆决唱聲萬口和去声附并爲一談牢不可破井或作併皇帝曰惟天惟祖宗所以付任予者庻其在此予何敢不力天上或有夫字非是或无何字况一二臣同不爲無助不上或有固字曰光顔汝爲陳許帥維是河東魏博郃音合在同州縣名陽三軍之在行者汝皆將之郃或作涇非是曰重㣧汝故有河陽懷今益以汝維是朔方義成陜益鳯翔延慶七軍之在行者汝皆將之延慶本或作鄜延寕慶曰弘汝以卒萬二千屬而子公武往討之屬下方有集字或在公武下皆非是曰文通汝守壽維是宣武淮南宣歙浙西四軍之行于壽者汝皆將之西下或有徐泗字四或作五皆非是曰道古汝其觀察鄂岳曰愬汝帥唐鄧隨各以其兵進戰曰度汝長御史其往視師曰度惟汝予同汝遂相予以賞罰用命不用命曰弘汝其以節都統諸軍節下或有度字諸方作討仐按前軰有引左傳討其軍实爲討軍之澄者恐未必然若必作討則秦之罘刻石自有遂發討師之語而晋官有都督征討諸軍事皆足爲證不必引左傳却不相似也但公所作韓弘碑但云都統諸軍則作討者爲誤矣不可以偶有旁證而強引以从之也曰守謙汝出入左右汝惟近臣其往撫師汝惟方作惟汝曰度汝其往衣服飲食予士衣去声食音嗣無寒無飢以旣厥事遂生蔡人方无服飲字或无服字有飲字或无衣服字寒下或无无字賜汝節斧通天御帶衛卒三百凡兹廷臣汝擇自從惟其賢能無憚大吏庚申予其臨門送汝曰御史予閔士大夫戰甚苦自今以往非郊廟祠祀其無用樂祀下或无其字顔胤武合攻其北大戰十六得栅城縣二十三降人卒四萬或无人字方云此謂降其民与卒也故下語皆不再出人卒字今按荘子云人卒虽衆公語亦有自也道古攻其東南八戰降萬三千再入申破其外城降下或有卒字文通戰其東十餘遇降萬二千愬入其西得賊將輒釋不殺用其䇿戰比有功比或作皆十二年八月丞相度至師都統弘責戰益急顔胤武合戰益用命元濟盡并其衆洄曲以備師或作帥非是洄方作廻今按洄与史合十月壬申愬用所得賊將自文城因天大雪疾馳百二十里用夜半到蔡破其門取元濟以獻盡得其屬人卒馳或作走辛巳丞相度入蔡以皇帝命赦其人淮西平大饗賚功師還之日因以其食賜蔡人凡蔡卒三萬五千其不樂爲兵願歸爲農者十九悉縱之斬元濟京師方无帰字済下或有於字冊功弘加侍中愬爲左僕射帥山南東道顔胤皆加司空公武以散騎常侍帥鄜音孚坊丹延道古進大夫文通加散騎常侍方云考之史及段文昌碑皆合一本无大夫文通加五字非是道古時巳爲中丞故不復言御史也今按道古墓志亦可考丞相度朝京師道封晋囯公進階金紫光禄大夫以舊官相或无道字或作進或无囯字而以其副揔爲工部尚書領蔡任旣還奏羣臣請紀聖功𬒳之金石皇帝以命臣愈帝下或无以字臣愈再拜稽首而獻文曰唐承天命遂臣萬邦或作方孰居近土襲盗以狂往在玄宗崇極而圯部鄙切毁也在方作居云唐人多以在爲居公本政亦曰居我其周從是也今按以在爲居亦草書之誤本政居字巳論於本萹方說非是河北悍驕河南附起四聖不宥屢興師征有不能克益戍以兵夫耕不食婦織不裳輸之以車爲卒賜糧外多失朝曠不嶽狩百隷怠官事亡其舊百隷怠官或作百司隷官亡或作忘帝時継位顧瞻咨嗟惟汝文武孰恤予家旣斬呉蜀旋取山東呉蜀方作蜀呉取或作出魏將首義六州降從淮蔡不順自以爲強提兵呌讙欲事故常始命討之遂連姦鄰隂遣刺客來賊相臣方戦未利内驚京師羣公上言莫若惠來公或作臣帝爲不聞與神爲謀乃相同德以訖天誅乃方作及非是乃敕顔㣧愬武古通咸統於弘各奏汝功奏方作走非是三方分攻祝曰謂顔㣧武攻其北道古攻其東南文通戦其東也五萬其師大軍北乗厥数倍之常兵時曲軍士蠢人旣翦陵雲蔡一大窘勝之邵陵郾城來降勝或作遂自夏入秋復屯相望入或作及復或作複兵頓不勵告功不時帝哀征夫命相往釐士飽而歌馬騰於槽試之新城賊遇敗逃盡抽其有聚以防我西師躍入道無留者頟頟音額大皃書罔晝夜頟頟注肆悪蔡城其壃千里壃或作彊旣入而有莫不順俟帝有恩言相度來宣誅止其魁釋其下人釋同或作釋于蔡之卒夫投甲呼舞蔡之婦女迎門笑語蔡人告飢舡粟往哺蔡人告寒賜以繒布賜以方作詔賜非是始時蔡人禁不往來今相從戯里門夜開始時蔡人進戦退戮今旰而起左飱右粥旰方作眠飱或作方云舊本皆作飱今按还予授子之粲兮傳云粲餐也史記餐未及下咽酒未及濡脣漢書令其禆將傳餐則餐字亦有義公票鄭天人文念寒而衣念飢而餐同以衣對餐也或當作餐爲之擇人以収餘憊収或作牧選吏賜牛教而不税蔡人有言始迷不知今乃大斍羞前之爲蔡人有言天子明聖不順族誅順保性命汝不吾信視此蔡方孰爲不順往斧其吭古郎切喉也充叛有数聲勢相倚吾強不支汝弱奚恃其告而長而父而兄或作及女父兄奔走偕来同我太平偕来方作來偕淮蔡爲乱天子伐之旣伐而飢天子活之始議伐蔡卿士莫随旣伐四年小大並疑不赦不疑由天子明凡此蔡功惟断乃成旣定淮蔡四夷畢來旣定淮蔡或作淮蔡旣定遂開明堂坐以治之朱文公校昌黎先生集卷之三十
