front:
  text: 晦庵先生朱文公韓文考異序南安韓文出莆田方氏近丗號為佳本豫讀之信然然猶恨其不盡載諸本同異而多折衷於三本也原三本之見信杭蜀以舊閣以官其信之也則宜然如歐陽公之言韓文印本𥘉未必誤多為校讎者妄改亦謂如羅池碑改步為涉田氏廟改天明為王明之類耳觀其自言為兒童時得蜀本韓文於隨州李氏計其歲月當在天禧中年且其書巳故弊脫略則其摹印之日與祥符杭本蓋未知其孰先孰後而嘉祐蜀本又其子孫明矣然而猶曰三十年間聞人有善本者必求而改正之則固未嘗必以舊本為是而悉從之也至於祕閣官書則亦民間所獻掌故令史所抄而一時館職所校耳其所傳者豈真作者之手藁而是正之者豈盡劉向揚雄之倫哉讀者正當擇其文理意義之善者而從之不當但以地望形勢為重輕也抑韓子之為文雖以力去陳言為務而又必以文從字順各識其職為貴讀者或未得此權度則其文理意義正自有未易言者是以豫於此書姑考諸本之同異而兼存之以待覽者之自擇區區妄意雖或竊有所疑而不敢偏有所廢也郡齋近刋朱文公校定昌黎集附以考異而音辨則舊所刋也初讀者未免求之音辨質諸校本既字不盡同且音訛事多缺此書有集注有補注有辨證有全解音通句釋引物連類雖若加詳而于本文間亦抵捂余頗病之今悉從校本更定音訓因旁托諸家注解劫本文用事者枚舉而記其凡有未備則訪諸士友博極此書者併記之意其間闕逸尚多也昔黃太史有云杜詩韓文無一字無來處竊謂必盡所云而後可讀二文公之書過不自料附所嘗記録於逐卷之左而空其下方以待來者竄釋兾更相緝續於音辨或有補云寶慶三年季夏既望承議郎特添差通判南剱州軍州兼𬋩內勸農事王伯大謹書
