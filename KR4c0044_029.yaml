front:
  text: 朱文公校昌黎先生集卷之二十九考異音釋附
  hash: sha256:da109702a2edd62630cad6d3dab2a369d2913eb0734c402cf9408ea872c3c091
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_029-1a}
body:
  text: 碑志唐故朝散大夫商州刺史除名徙封州董府君墓志公諱溪字惟深丞相贈太師隴西恭惠公第二子十九歲明兩經獲第有司沈厚精敏未嘗有子弟之過賔接門下推舉人士侍側無虛口退而見其人淡若與之無情者太師賢而愛之父子間自為知巳諸子雖賢莫敢望之太師纍踐大官大或作從非是臻宰相致平治終始以禮號稱名臣晨昏之助蓋有賴云太師之平汴州師下或無之字年考益高挈持維綱鋤削荒纇音耒祝曰絲節淮南子明月之珠不能無纇纇或作頑納之大和而巳其囊篋細碎無所遺漏繄公之功上介尚書左僕射陸公長源齒差太師標望絶人聞其所為每稱舉以戒其子楊凝孟叔度以材德顯名朝廷或作於朝及來佐幕府佐或作往詣門請交屏所挾為或作屏棄所挾太師薨始以祕書郎選參軍京兆府法曹選或作遷日伏階下與大尹爭是非大尹屢黜巳見大或並作太歲中奏為司録參軍與一府政以能拜尚書度支貟外郎遷倉部郎中萬年令兵誅恆州改度支郎中攝御史中丞為糧料使兵罷遷商州刺史糧料吏有忿爭相牽告者事及於公因徴下御史獄因方作顯云漢韓安國傳由此顯結於漢當用此義今按此召對私耳與方所引者不類當只作因公不與吏辨一皆引伏受垢除名徙封州元和六年五月十二日死湘中年四十九州下方本無年月日但於湘中下云年若干仐以眺本定按唐書元和七年立遂王為太子亦與下文相應明年立皇太子有赦令許歸葬其子居中始奉喪歸元和八年十一月甲寅葬于河南河南縣萬安山下太師墓左夫人鄭氏祔公凡再娶皆鄭氏女生六子四男二女長曰全正惠而早死次曰居中好學善為詩張籍稱之次曰從直曰居敬尚小直下或有次字長女嫁吳郡陸暢其季女後夫人之子公之母弟全素孝慈友弟公坐事棄同官令歸公殁比葬三年哭泣如始喪者大臣髙其行白為太子舍人將葬舍人與其季弟澥户買切問銘於太史氏韓愈將葬下方有中字今以上文考之無者為是然丗系表全素太子中書舍人通典中舍一云中書舍人又安知全素不自舍人遷中舍邪今按中字有則前後皆當有無則皆當無不應前無而後有也審如方説此志亦必是未遷時作况它本自有無中字者今姑從之不必曲為之説也愈則為之銘辭曰物以久弊或以轢音歷車所踐也毀考致要歸孰有彼此由我者吾不我者天斯而以然其誰使然貞曜先生墓志先生孟郊湖州武康人也唐元和九年歲在甲午八月巳亥巳或作乙方云考唐曆是月無乙亥也貞曜先生孟氏卒無子其配鄭氏以告愈走位哭且召張籍會哭走或作赴位或作泣明日使以錢如東都供葬事諸嘗與往來者咸來哭弔嘗或作常韓氏遂以書告興元尹故相餘慶閠月樊宗師使水陸運從事試協律郎親拜其母於門內陸下或有轉字門下方無內字母卒五年而鄭公以節領興元軍奏為其軍參謀試大理評事挈其妻行之興元次于閿鄉或無之興元字暴疾卒年六十四買棺以斂以二人輿歸鄷郢皆在江南十月庚申樊子合凡贈賻而葬之洛陽東其先人墓左以餘財附其家而供圯或無而共祀字有以俟字或無供祀字有俟字將葬張籍曰先生揭德振華於古有光賢者故事有易名况士哉或無古有光字杭本無賢者下十字如曰貞曜先生則姓名字行有載不待講説而明皆曰然遂用之待或作從非是𥘉先生所與俱學同姓簡於丗次為叔父由給事中觀察浙東曰生吾不能舉死吾知恤其家銘曰於戲貞曜維執不猗方無戲字執或作持或無維執不猗一句或此句在維出不訾之下維出不訾訾凡數義集韻云思也思不稱意也惟前漢書訾讀與皆同顔師古注多財也若日不資削貧也猗亦二義詩那云倚歟歎辝也莭南山云有實其猗鄭氏注倚也若日不猗則無所倚也東野中立不倚而以貧出仕卒至於無所施為止用昌其詩名意如是而巳維卒不施以昌其詩蘇子瞻嘗舉此以問王定國當昌其身耶昌其詩也來詩下語不契作詩答之有云昌身如飽腹飽盡還復飢昌詩如膏面為人作容姿不如昌其氣欎鬱老不衰雖云老不衰却懷安所之不如昌其志志一氣自隨餋之塞天地孟朝不吾欺公謂東野昌其詩而東坡乃云不如昌其志蓋蘇嘗讀東野詩有未足當韓豪之句不為所取也唐故祕書少監贈絳州刺史獨孤府君墓志銘君諱郁字古風河南人常州刺史贈禮部侍郎憲公諱及之第二子憲公躬孝踐行篤實而辨於文勸飭指誨以進後生名聲垂延紹德惟克君生之年憲公殁丗與其兄㓪畜於伯父氏始微有知則好學問咨稟教飭不煩提諭月開日益卓然早成年二十四登進士第時故相太常權公掌出詔文望臨一時望或作迎登君于門歸以其子歸或作妻選授奉禮郎楊於陵為華州署君鎮國軍判官奏授協律郎方從眺本無奉禮至奏授十八字朋遊益附華問彌大元和元年對詔策拜右拾遺二年兼職史館四年䙲右輔闕詔中貴人承璀將兵誅王承宗河北君奏疏諌召見問狀有言動聽其後上將有所相不可於衆君與起居舍人李約交章指摘事以不行五年遷起居郎為翰林學士愈𬒳親信有所輔助權公既相君以嫌自列改尚書考功貟外郎復史館職七年以考功知制誥入謝因賜五品服八年遷駕部郎中職如𥘉權公去相復入翰林九年以疾罷尋遷祕書少監即間于郊間下或有居字十年正月病遂殆甲午輿歸卒於其家贈絳州刺史眺本有上五字本或繫於年四十下方並無年四十男子二人長曰某早死次曰天官始十歲有至性聞呼父官與聞弔客至輒號泣以絶女子一人夫人天水權氏贈太子太保貞孝公臯之承孫故相今太常德輿之女承孫字未詳㣧慶配良是似是冝是似方作是以今按是似是宜承上句言胤慶而似配良而宜也方似作以非是四月已酉其兄右拾遺㓪以喪東葬河南壽安之甘泉鄉家塋憲公墓側將以五月壬申窆家或作冡謂愈曰子知吾弟久敢屬以銘知或作與久或作友銘曰於古風襮布谷切又音博又黼領也衣表也詩繡衣朱儤謂衣領之在外者順而裏方於下或有平字仐按上篇四言不應首句為三字此乃雜言或有此三字句也不耀其章其剛不傷戴美丗令而年再不贏惟後之成戴或作載令或作命仐按此言載前人之美而丗其令德也唐故虞部貟外郎張府君墓志銘尚書虞部貟外郎安定張君諱季友字孝權年五十四病卒東都明年兄子塗與其弟庾掞等謢柩歸葬長安縣馬額原夫人北海唐氏之封明下或無年字或作月庾掞或作庚揆前事塗進韓氏門伏哭庭下曰叔父且死幾於不能言矣或無曰字張目而言曰吾不可無告韓君别藏而不得韓君記猶不葬也張目方從杭本無目字云後漢嚴光傳良久張目熟視然此恐當從杭本為正仐按方知古有張目字而必以杭本為正殊不可曉今從諸本我皇甫媪何疾銜未決皇甫母病果死得解遷留司虞部貟外郎孝權為人孝謹與人語恐傷之而時嶷嶷有立與孝權遊者極衆而獨以其死纍余可尚也巳是為銘此下或注銘亡二字或注疑闕銘詞字唐故檢校尚書左僕射右龍武軍統軍劉公墓志銘一本撿佼上有金紫光祿大夫字僕射下有兼御史大夫字統軍下有知軍事上柱國彭城郡開國公食邑二千户贈潞州大都督字公諱昌裔字光後本彭城人曾大父諱承慶朔州刺史大父巨敖好讀老子莊周書為太原晉陽令再丗宦北方宦或作官樂其土俗遂著籍太原之陽曲曰自我為此邑人可也何必彭城父訟贈右散騎常侍訟或作誦仐按名訟無理疑避諱而改公少好學問始為兒時重遲音稚不戲恆若有所思念計畫及壯自試以開吐蕃説干邊將不售入三蜀從道士遊久之蜀人苦楊琳寇掠公單船往説琳感欷雖不即降約其徒不得為虐洪云唐史昌裔傳云入蜀楊惠琳反昌裔説之惠琳之亂在夏州歲月相逺惠琳事詳見崔寧傳琳降公常隨琳不去琳死脫身亡沈浮河朔之間建中中曲環招起之為環檄李納指摘切刻納悔恐動心恆魏皆疑惑氣懈環封奏其本德宗稱焉環之會下濮州戰白塔救寧陵襄邑擊李希烈陳州城下公常在軍間環領陳許軍公因為陳許從事以前後功勞纍遷撿校兵部郎中御史中丞營田副使吳少誠乘環喪引兵叩城留後上官説咨公以城守所以能擒誅叛將為抗拒令敵人不得其便説或作悅與舊史合擒方作檢今按此謂安國寧謀以城降賊昌裔密計漸之當作擒圍解拜陳州刺史韓全義敗引軍走陳州求入保公自城上揖謝全義曰公受命詣蔡何為來陳公無恐賊必不敢至我城下明日領騎步十餘抵全義營全義驚喜迎拜歎息殊不敢以不見舍望公改授陳許軍司馬上官説死拜金紫光祿大夫撿校工部尚書代説為節度使命界上吏不得犯蔡州人曰俱天子人奚為相傷少誠吏有來犯者捕得縛送曰妄稱彼人公宜自治之少誠慙其軍亦禁界上暴者兩界耕桑交迹吏不何問何或作呵方云漢賈誼傳大譴大何衛綰傳不孰何顔曰何即問也何上或有可字亦非是今按過秦論云陳利兵而誰何顔注云問之曰此為誰人何人也亦此義封彭城郡開國公就拜尚書右僕射元和七年得疾視政不時八年五月涌水出他界過其地防穿不輔沒邑屋流殺居人拜疏請去職即罪詔還京師即其日與使者俱西大熱旦暮馳不息疾大發左右手轡止之公不肯曰吾恐不得生謝天子上益遣使者勞問勑無亟行至則不得朝矣天子以為恭即其家拜檢校左僕射右龍武軍統軍知軍事十一月某甲子薨年六十二某下或有日字下同上為之一日不視朝贈潞州大都督命郎弔其家郎下或有中字明年某月某甲子葬河南某縣某鄉某原公不好音聲不大為居宅於諸帥中獨然夫人邠國夫人武功蘇氏子四人嗣子光祿主簿縱學於樊宗師士大夫多稱之長子元一朴直忠厚便弓馬為淮南軍衙門將便方作使非是次子景陽景長皆舉進士葬得日相與選使者哭拜階上使來乞銘銘曰提將之符尸我一方配古侯公維德不爽平聲祝曰楚詞厲而不爽些注楚人謂羮敗曰爽我銘不亡後人之慶洪曰爽慶皆當叶韻若讀若霜慶讀若羌又離騷云慶夭悴而喪榮沈存中云古人諧聲如慶字多與章字叶韻孝孫有慶万壽無疆黍稷稻梁農夫之慶是也集韻並收入平聲朱文公校昌黎先生集卷之二十九
