front:
  text: 朱文公校昌黎先生集卷之九考異音釋附
  hash: sha256:bbc93615c6bdfe18202ea0020ac214ebdaae4aef1531c7990a7712f8e7cfed18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_009-1a}
body:
  text: 律詩凡八十五首題楚昭王廟丘墳滿目衣冠盡墳或作園城闕連雲草樹荒猶有國人懷舊德一間茅屋祭昭王宿龍宮灘浩浩復湯湯音商西清詩話魯直云退之裁聽水句尤見工所謂浩浩湯湯抑更揚者非諸客裏夜卧飽聞此聲安能周旋妙處如此耶灘聲抑更揚奔流疑激電驚浪似浮霜夢覺燈生暈宵殘雨送涼如何連曉語一半是思鄉或作抵是説家鄉義魚招張功曹或無下四字義集注周官以時藉魚鄭云以􅒎刺泥中取之魚春岸闊此興在中宵大炬然如晝長船縛似橋深窺沙可數靜搒音謗進船也水無搖刃下那能脫刃或作手波間或自跳中鱗憐錦碎憐或作疑當目訝珠銷迷火逃翻近驚人去暫遙競多心轉細得雋音俊左傳得雋曰克語時囂潭罄知存寡舷音船舷邊或作船平覺獲饒交頭疑湊餌駢首類同條濡沫情雖密登門事巳遼事或作志盈車孫曰孔叢子衛人鈞魚於河得魚焉其大盈車欺故事飼犬上音伺食也孫曰鹽鐡論曰彭蠡之濵以魚飼犬樊曰杜子美黃魚詩脂膏兼飼犬驗今朝血浪疑猶沸腥風逺更飄蓋江煙羃羃莫狄切深貌拂棹影寥寥疑或作回獺去愁無食龍移懼見燒如棠名既誤釣渭日徒消文客篤先賦篙工喜盡謡膾成思我友觀樂憶吾僚自可捐憂纍何須強問梟孫曰賈誼鵩賦曰問於子鵩余去何之楚人命梟曰鵩不祥鳥也李貟外寄紙筆方云李伯康也伯康以貞元十九年寪郴州刺史權德輿集有墓志今按後卷祭文獲𥿄筆之雙貿即謂此事投義魚之短韻亦指前篇也題是臨池後韓曰張芝伯英善草書凡家之衣帛必先書而染練之臨池學書池水盡黑寸紙不遺韋仲將將之入聖分從起草孫曰漢制尚書郎掌天子制詔起草禁中餘兔尖針莫並繭淨韓曰淨準繭紙也羲之製蘭亭乘興而書用蠶繭紙輔注建中𥘉日本使者興能獻方物興能善書其𥿄似繭而澤人莫能識雪難如莫怪殷勤謝虞卿正著書樊曰虞卿著虞氏春秋太史公曰虞卿非窮愁亦不能著書以自見於丗次同冠峽冠或作弄或作巫今日是何朝天晴物色饒晴或作清落英千尺墮遊絲百丈飄泄乳交巖脈懸流揭浪摽無心思嶺北猿鳥莫相撩笞張十一功曹唐本有張署寄公詩山淨江空水見沙哀猿啼處兩三家篔簹云當三音竹名也祝日選其竹則篔簹籃箊韓曰郭璞江賦桃枝篔簹實繁有叢競長纖纖笋躑躅間開豔豔花間或作𥘉未報恩波知死所莫令炎瘴送生涯吟君詩罷看雙鬢斗覺霜毛一半加郴州祈雨乞雨女郎魂炮羞潔且繁廟開鼯鼠呌神降越巫言旱氣期銷蕩隂官想駿奔行看五馬入蕭颯巳隨軒湘中酬張十一功曹休垂絶徼千行淚共泛清湘一葉舟今日嶺猿兼越鳥可憐同聽不知愁郴口又贈二首山作劒攢江寫鏡扁舟斗轉疾於飛回頭笑向張公子終日思歸此日歸雪颭職琰切霜翻看不分雪或作雲雷驚電激語難聞沿涯宛轉到深處何限青天無片雲涯或作崖題木居士火透波穿不計春根如頭面幹如身偶然題作木居士便有無窮求福人寪神詎比溝中斷孫曰莊子百年之木破為儀尊黃而文之其斷在溝中比儀尊於溝中之斷則美惡有間其失性一也遇賞還同㸑下餘後漢蔡雍吳人有燒桐以㸑者雍聞火烈之聲知其良木因請而裁為琴果有美音其尾猶焦故人名為焦尾琴云朽蠧不勝刀鋸力匠人雖巧欲何如晚泊江口郡城朝解纜江岸暮依村二女竹上淚孤臣水底魂雙雙歸蟄燕一一呌羣猿回首那聞語空看别袖翻聞或作能湘中猿愁魚踊水翻波踊或作躍自古流傳是汨羅汨音覔在長沙羅縣故曰汨羅蘋藻滿盤無處奠空聞漁父叩舷歌盤或作船舷或作船别盈上人方云柳子厚集有誡盈住衡山中院山僧愛山出無期俗士牽俗來何時祝融峯下一回首即是此生長别離喜雪獻裴尚書或無下四字宿雲寒不卷春雪墮如篩所宜切孫曰篩下物竹器或作篩騁巧先投隙潛光半入池半或作亂喜深將䇿試驚密仰簷窺自下何曽汙增高未覺危覺或作見比心明可燭拂面愛還吹妬舞時飄袖欺梅併壓枝地空迷界限砌滿接高卑浩蕩乾坤合霏微物象移為祥矜大熟布澤荷平施為或作驗布或作市方云以上句為祥言之布澤為當巳分年華晚猶憐曙色隨氣嚴當酒換或作暖灑急聽窗知照曜臨𥘉日玲瓏滴晚澌晚或作曉聚庭看嶽聳掃路見雲披陳勢魚麗音離孫曰左傳鄭人為魚麗之陳先偏後伍逺書文鳥篆韓曰尚書疏蒼頡造書觀於鳥迹因而遂滋則謂之字竒縱歡羅豔黠列賀擁熊螭履弊行偏冷門扄卧更羸悲嘶間病馬或作鳥浪走信嬌兒竈靜愁煙絶絲繁念鬢衰擬鹽吟舊句授簡樊曰謝靈運雪賦曰梁孝王遊於兔園密雪下授簡於司馬大夫曰抽子愁思騁子妍詞為我賦之慕前規捧贈同燕石孫曰間子曰宋之愚人得燕石於梧臺之東歸而藏之以為寶有客聞而觀之掩口而笑曰此燕石也與瓦磔不殊公言此者以自喻其詩多慙失所宜春雪看雪乘清旦看或作觀無人坐獨謡坐獨或作獨坐拂花輕尚起落地暖𥘉銷巳訝陵歌扇晉王珉侍人為白團扇歌還來伴舞腰灑篁留密節密或作半著柳送長條入鏡鸞窺沼行天馬沈存中云杜子美詩紅稻啄餘鸚鵡粒碧梧栖老鳯凰枝語相反而意新退之雪詩入鏡鵉窺沼行天馬渡橋蓋倣此體度橋遍階憐可掬滿樹戲成搖江浪迎濤日風毛縱獵朝弄間時細轉爭急忽驚飄城險疑懸布砧寒未搗綃莫愁隂景促夜色自相饒色或作月聞梨花發贈劉師命桃蹊惆悵不能過蹊或作溪紅豔紛紛落地多聞道郭西千樹雪欲將君去醉如何春雪間早梅間或作映梅將雪共春彩豔不相因逐吹能爭密排枝巧妬新誰今香滿座獨使淨無塵芳意饒呈瑞寒光助照人玲瓏開巳遍點綴坐來頻那是俱疑似須知兩逼真熒煌𥘉亂眼浩蕩忽迷神未許瓊華比從將玉樹親從將或作將從孫曰揚雄甘泉賦翠玉樹之青蔥兮壁馬犀之璘㻞先期迎獻歲韓曰楚詞獻歲發春更伴占兹辰或作晨願得長輝映輕微敢自珍微或作嚴早春雪中聞鶯諸本或在關詠馬之後朝鶯雪裏新雪樹眼前春帶澀先迎氣侵寒巳報人共矜初聽早誰貴後聞頻暫囀那成曲孤鳴豈及辰風霜徒自保桃李詎相親寄謝幽棲友辛勤不為身梨花下贈劉師命方云蘇魏公云當録於古詩中洛陽城外清明節百花寥落梨花發今日相逢瘴海頭共驚爛熳開正月和歸工部送僧工部歸登也方云約荆州人詳見劉夢得集早知皆是自拘囚不學因循到白頭汝既出家還擾擾何人更得死前休得或作向入關詠馬歲老豈能充上駟力微當自慎前程不知何故翻􅋮首牽過關門妄一鳴妄或作忘木芙蓉新開寒露叢逺比水間紅露方作路間或作邊皆非是豔色寧相妬嘉名偶自同採江官渡晚搴木古祠空方從杭蜀館本官渡作秋節祠作辝又云閣本作秋江官渡晚寒木古祠空洪本校從採江官渡晚搴木古祠空按古詩有涉江採芙蓉正謂荷花又九歌搴芙蓉兮木未則謂搴之非其地也此以一花對喻謂將採之江則秋節已晚將搴之木則古辝所喻為無益蓋詩人強彼弱此意也今按方説非是蓋此詩言荷花與木芙蓉生不同處而色皆美名又同故以採江搴木二事相對言者生處而九歌者祭神之辝故曰古祠也如此則此詩從頭至此六句意皆聮屬然嘉祐杭本巳如此非洪意定也願得勤來看無令便逐風願得或作須勸題張十一旅舍三詠榴花五月榴花照眼明枝間時見子𥘉成可憐此地無車馬顚倒靑苔落絳英絳或作細井賈誼宅中今始見孫曰湘水記云賈誼宅中有一井誼所穿也杜詩長懷賈誼井依然葛洪山孫曰葛洪字稚川其井今在栁州下昔曽窺寒泉百尺空看影正是行人渴死時渴或作暍蒲萄新莖未遍半猶枯高架支離倒復扶復或作後若欲滿盤堆馬乳韓曰蜀本草云蒲萄有紫白二色又有似馬乳者莫辭添竹引龍鬚若或作君峽石西泉西一作寒居然鱗介不能容石眼環環水一鍾聞説旱時求得雨祗疑科斗是蛟龍梁國惠康公主挽歌梁或作涼方云考之史當作梁今按本或有詞字羊士諤集有梁國惠康公主挽歌詞二首注云時詔令百官進詩定諡芳聲逺移封大國新巽宫尊長女台室屬良人河漢重泉夜梧桐半樹春孫曰梧桐半生半死半樹春以言公主死獨其夫王季友存尓龍轜音而祝曰轜喪車名前漢此似轜車孫曰周禮王后五輅重翟錫回朱總厭翟勒靣繢總厭翟平時所乘車也非厭翟上於涉切下丁歷切雉羽飾車其羽相迫還輾禁城塵秦地吹簫女湘波鼓瑟妃佩蘭𥘉應夢奔月孫曰淮南子羿請不死之藥於西王母羿妻常娥竊而奔月是為蟾蜍竟淪輝竟或作競非是夫族迎魂去宮官會葬歸從今沁園上七􆄺切孫曰沁水公主漢光武皇帝女竇憲恃女弟為皇后以賤直奪公主園沁者沁水公主園也草無復更芳菲和崔舍人詠月崔羣也門本無此篇三秋端正月今夜出東溟對日猶分勢騰天漸吐靈木高蒸逺氣半上霽孤形赫奕當躔次虛徐度杳冥長河晴散霧列宿音秀曙分螢浩蕩英華溢瀟踈物象泠或作零池邊臨倒照簷際送橫經花樹參差見皋禽斷續聆牖光窺寂寞􅻅影伴娉婷上晉丁切下徒寧切祝曰和色也杜詩赤節引娉婷幽坐看侵户間吟愛滿庭輝斜通壁練彩碎射沙星清潔雲間路空涼水上亭淨堪分顧兔孫曰楚詞厥利維何而顧兔在腹顧兔月中兔也細得數飄萍山翠相凝緑林煙共羃靑過隅驚桂側當午覺輪停屬思摛霞錦追歡罄縹瓶郡樓何處望隴笛此時聽右掖連台座重門限禁扄風臺觀滉音晃滉一作洸漾􅖅砌步靑熒音螢選眩耀青熒獨有虞庠客無由拾落蓂孫曰白虎通曰日度得其分則蓂莢生於階間􅕴莢者樹名月一日一莢生十五日畢十六日一莢去三十日畢亦見帝王丗紀詠雪贈張籍樊曰此詩自松篁遭挫抑以下語專以譏時相終以意示張籍曰惟子能諳尓諸人得語哉又曰傳示及提孩其有所譏也審矣只見縱橫落只或作祗寧知逺近來飄颻還自弄歷亂竟誰催座暖銷那怪池清失可猜拗中𥘉蓋底垤處遂成堆劉貢父云歐陽永叔與江鄰幾論此詩以隨車翻縞帶躍馬散銀杯為不工而以拗中𥘉蓋底垤處遂成堆為勝且曰未知得韓意否慢有先居後慢或作漫輕多去却回度前鋪瓦隴發本積牆隈發本或作奔發穿細時雙透乘危忽半摧舞深逢坎井集早值層臺砧練終宜搗階紈未暇裁城寒裝睥睨城上女墻樹凍裹莓苔裝或作粧裹或作覆片片勻如翦紛紛碎若挼奴回切定非燖鵠鷺其是屑瓊瑰緯繣上音徽下呼麥切緯繣垂戾也屈原曰忽緯繣其難遷觀朝蕚冥茫矚晚埃當窗恆􅏮凛出户即皚皚五來切壓野榮芝菌壓或作潤傾都委貨財娥嬉疏恆娥疏遊也華蕩漾漾或作漾胥伍子胥怒浪崔嵬磧七迹切迥疑浮地雲平想輾雷隨車翻縞帶逐馬散銀杯萬屋漫汗上音暪下音寒大水也合千株照曜開松篁遭挫抑或作折方云公時以栁間事下遷疑寄意於時宰也今按此詩無歲月方説恐未必然糞壤獲饒培隔絶門庭遽擠排陛級才豈堪禆嶽鎮強欲效鹽梅隱匿瑕疵盡包羅委瑣該誤雞宵厄喔厄喔二音雞聲也誤或作悟驚雀暗徘徊浩浩過三暮悠悠市九垓風俗通十苑曰經十經曰垓國語天子之田九垓以食兆民孫曰垓極也九州之極處曰垓鯨鯢陸死骨玉石火炎灰厚慮填溟壑高愁㨖音致刺也指也至也斗魁日輪理欲側坤軸壓將頽岸類長蛇攪岸類或作堰似攪或作擾陵猶巨象豗音灰鬪也水官夸傑黠木氣怯胚鋪胚切懷胎一月也胎著地無由卷連天不易推他回切龍魚冷蟄苦虎豹餓號哀巧借奢華便專繩困約災威貪陵布𬒳光肯離金罍離或作雜賞玩捐他事歌謡放我才狂教詩硉矹上勒沒切下音兀豪放貌興與酒陪鰓蘇來切兀或作杌陪鰓方云怒張貌字見潘嶽射雉賦樊李校作毰毸惟子能諳耳諸人得語哉助留風作黨勸坐火為媒雕刻文刀利搜求智網恢莫煩相屬和傳示及提孩酬王二十舍人雪中見寄方云王涯為舍人見王適墓志本傳略之今作仲舒非今按王二十涯亦見諱行録三日柴門擁不開階平庭滿白皚皚平庭或作庭平今朝踏作瓊瑶迹為有詩從鳯沼來從或作仙送侯喜已作龍鍾後時者懶於街裏踏塵埃如今便别長官去直到新年衙日來長官或作官長非是學諸進士作精衛銜石填海山海經云赤帝之女溺於東海化為冤禽名曰精衛銜西山木石以填東海鳥有償冤者終年抱寸誠口銜山石細心望海波平渺渺功難見區區命巳輕人皆譏造次我獨賞專精豈計休無日惟應盡此生何慙刺客傳不著報讎名奉酬振武胡十二丈大夫諸本無奉字胡證也傳云河東人元和九年黨項屢擾邉證以儒而勇由諌議大夫選拜振武軍節度使傾朝共羡寵光頻半歲遷騰作虎臣戎斾暫停辭社樹諸本作弩矢前驅煩縣令方從閣本云趙璘因話録曰胡證建節赴振武過河中時趙宗儒為帥證時刺稱百姓入謁獻詩曰詩書入京國旌節過鄉關若用今語亦非胡公敬桑梓之意閣本多出於公晚嵗所定今按方意甚善但其言閣本為晚年所定者為無據耳里門先下敬鄉人橫飛玉盞家山曉逺蹀音牒躞蹀行貌謂行春也楚詞衆踕蹀而日進金珂塞草春自笑平王誇膽氣不離文字鬢毛新奉和庫部盧四兄曹長元日朝回盧汀也洪曰國史譜云兩省相呼為閣者尚書丞郎相呼為曹長郎中貟外御史輔遺相呼為院長上兼下下不可兼上唯御史相呼為端公然退之呼廬庫部為曹長張功曹為院長則上下亦通稱也天仗宵嚴建羽旄建或作樹春雲送色曉雞號金爐香動螭頭暗韓曰唐制起居郎舍人分侍左右夾香案立直第一螭首和墨濡筆即拗處時號螭頭見百官志玉佩聲來雉尾高孫曰雉尾扇名天子出則御者持之引於庭上樊曰唐制人君舉動必以雉尾扇障面小團雉尾扇四方雉尾扇十二見儀衛志戎服上趨承北極儒冠列侍映東曹太平時節難身遇難身或作身難郎署何須歎二毛寒食直歸遇雨寒食時看度春遊事巳違風光連日直隂雨半朝歸朝或作晴不見紅毬上孫曰劉向别録曰鞠黃帝所造本兵勢也或云起於戰國鞠與毬同紅毬以紅帛為之那論綵索飛孫曰古今藝術圗云北方山戎寒食日用鞦韆為戲以習輕趫者綵索即謂鞦韆惟將新賜火孫曰周禮季春出火即賜火也向曙著朝衣送李六協律歸荆南早日羇遊所春風送客歸柳花還漠漠江燕正飛飛歌舞知誰在賔僚逐使非宋亭池水緑莫忘踏芳菲題百葉桃花知制誥時作百葉雙桃晚更紅窺窗映竹見玲瓏窺方作歸或作臨今從嘉祐杭本應知侍史歸天上應劭漢官儀曰尚書入直臺𪠘中給侍史一人女侍史二人皆選端正者侍史從至止車門還女侍史潔被服執香爐燒薰以從入臺中給使護衣服也天上謂內庭公以考功郎中知制誥寓直禁掖故云故伴仙郎宿禁中春雪新年都未有芳華二月𥘉驚見草芽白雪却嫌春色晚故穿庭樹作飛花戲題牡丹幸自同開俱隱約何須相倚鬪輕盈陵晨併作新粧面對客偏含不語情雙燕無機還拂掠遊蜂多思正經營正方作近長年是事皆拋盡今日欄邊暫眼明盆池老翁真箇似童兒汲水埋盆作小池一夜青蛙鳴到曉恰如方口釣魚時方或作枋方云唐屬衛州亘溫敗枋頭乃其地也公此詩與送李願詩只作方口今按公盤谷詩因及方口燕州則二如皆盤谷旁近之小地名耳盤谷在孟州濟原縣孟州東過懷州乃至衛州而濟原又在孟州西北四十里則遊盤谷者安得至衛州之祊頭乎方説非是莫道盆池作不成洪曰劉貢父云退之古詩高卓至律詩雖可稱善要有不工者老翁真箇似童貌此真諧語為戲耳或云盆池詩有天工如拍岸才添水數瓶一夜青蛙鳴到曉非意到不能作也藕梢𥘉種巳齊生從仐有雨君須記來聽蕭蕭打葉聲有雨或作雨灑瓦沼晨朝水自清小蠱無數不知名忽然分散無蹤影惟有魚貌作隊行惟方作為泥盆淺小詎成池夜半青蛙聖得知聖或作聽一聽暗來將伴侣不煩鳴喚鬪雄雌池光天影共青青拍岸才添水數瓶且待夜深明月去試看涵泳幾多星明或作乘芍藥浩態狂香昔未逢紅燈爍爍緑盤籠紅燈喻花盤籠喻葉覺來獨對情驚恐身在仙宫第幾重情或作忽奉和􅉑州劉給事使君三堂新題二十一詠并序或無奉新題三字方云劉伯芻以元和八年出刺乳州白樂天有制詞􅉑州刺史宅連水池竹林往往為亭臺島渚目其處為三堂劉兄自給事中出刺此州在任逾歲職修人治州中稱無事頗復增飾從子弟而遊其間又作二十一詩以詠其事流行京師文士爭和之余與劉善故亦同作新亭湖上新亭好公來日出𥘉水文浮枕簟文一作紋瓦影蔭龜魚流水汩汩越筆切又音骨幾時休從春復到秋只言池未滿池滿強交流只或作祇竹洞竹洞何年有公𥘉斫竹開洞門無鎖鑰俗客不曽來月臺南館城隂闊東湖水氣多直須臺上看始奈月明何渚亭自有人知處那無步往蹤莫教安四壁靣靣看芙蓉竹溪藹藹溪流慢慢或作漫梢梢岸篠長篠或作竹穿沙碧簳古旱切淨落水紫苞香北湖聞説遊湖棹尋常到此回應留醒心處凖擬醉時來凖或作準俗字花島蜂蝶去紛紛香風隔岸聞欲知花島處水上覔紅雲柳溪柳樹誰人種行行夾岸高莫將條繫纜著處有蟬號西山新月迎宵挂晴雲到晚留為遮西望眼終是懶回頭竹徑無塵從不掃有鳥莫令彈若要添風月應除數百竿荷池風雨秋池上高荷蓋水繁未諳鳴摵摵那似卷翻翻稻畦罫布畦堪數罫或作卦布或作圃方云罫博局上方目也字見選傳奕論仐按博局當云棊局桓談新論守邊隅趍作罫以自生於小地枝分水莫尋魚肥知巳秀鶴沒覺𥘉深柳巷柳巷還飛絮春餘幾許時吏人休報事公作送春詩花源或作原源上花𥘉發公應日日來丁寧紅與紫慎莫一時開莫或作勿北樓郡樓乘曉上盡日不能迥晚色將秋至長風送月來鏡潭非鑄復非鎔泓澄忽此逢魚蝦不用避只是照蛟龍孤嶼朝遊孤嶼南暮戲孤嶼北所以孤嶼鳥與公盡相識方橋非閣復非船可居兼可過君欲問方橋方橋如此作方云白樂天皮日休詩皆自注曰音佐仐按廣韻作造也將祚切而荀子肉腐出蟲魚枯生蠧貪利忘身禍災乃作及亷范五袴之謡皆巳為此音矣然讀如佐者又將祚切之訛而丗俗所用從人從故而切為將祚者又字之俗作也梯橋乍似上青冥𥘉疑躡菡蓞自無飛仙骨欲度何由敢月池寒池月下明新月池邊曲若不妬清妍却成相映燭遊城南十六首方云十六詩非一日作編者類次賽神白布長衫紫領巾差科未動是間人麥苗含穟桑生椹共向田頭樂社神題于賔客莊榆莢古協切榆莢亦謂之榆錢車前上尺遮切陸機云馬舄一名車前一名當道在牛迹中生蓋地皮薔薇蘸水筍穿籬馬蹄無入朱門迹縱使春歸可得知晚春草樹知春不久歸草樹一作草木百般紅紫鬪芳菲楊花榆莢無才思惟解漫天作雪飛落花巳分將身著地飛那羞踐踏損光暉無端又𬒳春風誤吹落西家不得歸楸樹幾嵗生成為大樹一朝纒繞困長藤誰人與脫青羅帔看吐高花萬萬層幸自枝條能樹立可煩蘿蔓作交加可或作何傍人不解尋根本却道新花勝舊花傍或作遊風折花枝浮豔侵天難就看清香撲地只遙聞只或作可春風也是多情思故揀繁枝折贈君㨂或作折折或作將贈同遊諸本無此篇方云杭蜀本皆闕惟唐本有之且屬在此喚起窗全曙催歸日未西洪曰魯直云吾兒時每哦此詩而了不解其意自出峽來吾年五十八矣時春曉偶憶此詩方悟之喚起催歸二禽名也古人於小詩用意精深如此況其大者乎蓋其學問淵源有五石六鷁之旨催歸子規也喚起聲如人絡絲貟轉清亮偏於春曉鳴江南謂之春喚輔注復齊謾録云豫嘗讀唐顧渚記曰顧渚山中有鳥如鸜鵒而色蒼每至正二月作聲曰春起也三四月云春去也採茶人呼為喚春鳥然則喚起之名唐人説矣豫章不舉為證何耶無心花裏鳥更與盡情啼贈張十八助教喜君眸子重清朗攜手城南歷舊遊忽見孟生題竹處相看淚落不能收題韋氏莊昔者誰能比今來事不同寂寞靑草曲散漫白榆風架倒藤全落籬崩竹半空寧須惆悵立翻覆本無窮須一作知晚雨廉纎晚雨不能晴方從蜀本作晚雨廉懴於律不諧當從諸本池岸草間蚯蚓鳴投竿跨馬踏歸路才到城門打鼓聲出城暫出城門踏青草逺於林下見春山應須韋杜家家到祇有今朝一日間把酒擾擾馳名者誰能一日間我來無伴侣把酒對南山對或作謝嘲少年直把春償酒都將命乞音氣花祗知間信馬不覺誤隨車楸樹青幢紫蓋立童童細雨浮煙作綵籠不得畫師來貌取定知難見一生中貌或作邈方云此猶少陵貌得山僧及童子之貌仐按貌音邈遣興遣或作逺斷送一生惟有酒尋思百計不如間莫憂丗事兼身事須著人間比夢間朱文公校昌黎先生文集卷之九
