front:
  text: 朱文公校昌黎先生集卷之二十五考異音釋附
  hash: sha256:38db24d7f4dfebef469ee1fc9e6e83509b013581bfc912d712c3315f8c02ce55
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_025-1a}
body:
  text: 碑志登封縣尉盧殷墓志元和五年十月日范陽盧殷以故登封縣尉卒登封年六十五月下或有五字君能為詩自少至老詩可録傳者在紙凡千餘篇無書不讀然止用以資為詩或無在紙二字以下或有目字與諌議大夫孟簡協律孟郊監察御史馮宿好期相推挽卒以病不能為官在登封盡寫所為詩抵故宰相東都留守鄭公餘慶抵或作投或無公字留守數以帛米周其家書薦宰相宰相不能用竟飢寒死登封將死自為書告留守與河南尹乞葬已又為詩與常所來往河南令韓愈曰為我具棺留守尹為具凡葬事韓愈與買棺又為作銘十一月某日葬嵩下鄭夫人墓中嵩下或有山字君始娶滎陽鄭氏後娶隴西李氏生男輒死卒無子女一人學浮屠法不嫁為比丘尼云女上或有子字興元少尹房君墓志房故為官族稱丗有人官或作宦自太尉琯以德行為相相玄宗肅宗名聲益彰徹大行丗號其門為太尉家宗族子弟皆法象其賢公曾祖諱玄靜尚書膳部郎中歷資簡涇隰四州刺史太尉之叔父也方無祖字非是祖諱肱為􅉑州司馬父諱巒都水使者皆名能守家法巒或作欒公諱武字某以明經歷官至興元少尹謹飭畏愼年七十三以其官終幼壯為良子弟老為賢父兄歷十二官處事無纎毫過差嘗以殿中侍御史副丹陽軍使其後為盩厔上張流切音輈下陟栗切音窒縣名屬鳯翔令施州刺史丹陽盩厔施州吏民至今思之娶滎陽鄭氏女生男六人其長曰次卿次卿有大才不能俯仰順時年四十餘尚守京兆興平尉然其友皆曰房氏有子也次曰次公次膺次回次衡次元始學而未仕女三人皆嫁為士人妻士人方作人士𥘉公之在施州夫人卒焉殯于江陵元和五年次卿與其羣弟奉公之喪自興元至堂殯于伊水之南方云公改葬服議殯於堂謂之殯六年正月次公奉夫人之喪自江陵至遂以其月十四日合葬河南緱氏之髙龍原公母弟式自給事中為河南尹孝友慈良盡費其財以奉公葬未葬之一月詔以河南為御史中丞領宣州觀察使中丞或作大夫將行召河南令韓愈行或作往泣謂曰吾兄之葬於是而吾為尹於是吾以為得盡其道於吾兄也今壓於上命不得視吾兄之棺入此土也豈非天邪子與吾兒次卿遊我重知子凡吾兄之終事將子是託焉愈既不獲辭既助其凡役事退又為銘云有位有年有弟有子年或作名從先人葬是謂受祉河南少尹李公墓志銘元和七年二月一日河南少尹李公卒年五十八尹下或有隴西字或作陸渾斂之三月某甲子葬河南伊闕鳴臯山下方云或作八月丁亥朔十六日壬寅考之史亦合伊闕或作陸渾方云考唐志鳴臯實在陸渾前事之月其子道敏哭再拜授使者公行狀以幣走京師公方作功非是乞銘於博士韓愈曰少尹將以某月日葬冝有銘其不肖嗣道敏杖而執事不敢違次不得跣以請月下或有某字愈曰公行應銘法公方作功今按若從方本則此句無首而下句字文禮葬亦無所承其誤明甚子又禮葬敢不諾而銘諸或無葬字方無而銘諸三字或無諾而二字皆非是公諱素字某或作字貞一生七歲喪其父貧不能家母夫人提以歸教育于其外氏育方作畜于下或無其字以明經選主虢之弘農簿又尉陜之芮城李丞相泌觀察陜􅉑以材署運使從事以課遷尉京兆鄠胡古切音户古扶風縣名考滿以書判出其倫選主萬年簿而母夫人固在食其祿倫上或無其字主或作往非是母夫人卒三年改尉長安遷監察御史奏貶九卿一人改詹事丞遷殿中侍御史由度支貟外郎選令萬年貶或作敗或無郎字選令萬年或作遷萬年令公主奪驛田京兆尹符縣割卑之公不與士下方有簿字天簿如簿録之簿非是改度支郎中使侍郎介恃不禮其屬大夫士擅喜怒賞罰公獨入讓不受度支或作屯田恃或作特非是或無擅字劉闢平上以蜀賞髙崇文尚書省以崇文幕府爭鹽井因革便不便命公使崇文以崇或作與崇或無不便字崇文命幕府唯公命從即其日事巳疏奏侍郎外稱其能竟坐前敢抗巳事巳方作事以衢州飢擇刺史侍郎曰莫如郎李某遂刺衢州至一月遷蘇州如郎下或有中字遷下或有刺字李錡前反權將之戍諸州者刺史至斂手無敢與敵或無權之二字方無敢敵字或無敢字皆非是公至十二日錡反公將左右與賊戰州門不勝賊呼入公端立責以義皆斂兵立不逼喘或作號非是錡命械致公軍將斬以徇及境錡適敗縛公脫械還走州賊急卒不暇走死民抱扶迎盡出天子使貴人持紫衣金魚以賜或無縛字急卒一作竟平今按州字句絶賊即錡將之戍州作亂者以公至之速不及走死為州民執以迎公耳然民字以下必有脫誤居三年州稱治拜河南少尹行大尹事吕氏子炅古逈切棄其妻著道士衣冠方無衣字謝母曰當學仙王屋山去數月復出間詣公公立之府門外使吏卒脫道士冠給冠帶送付其母黜屬令二人以贓減民賦錢歲五千萬請緩民輸期一月詔天下輸皆緩一月賊或作臧古通用然不知此句當如何讀若贓字屬上句即下文減賦别為一事若屬下句即是以所沒入之臧代民賦錢也但屬上句者語意差澀耳千或作十公一斷治不收聲事常出名上曾祖弘泰簡州刺史弘或作純祖乾秀伊闕令父燮宣州長史贈絳州刺史母夫人燉音屯古瓜州地煌張氏其舅參有大名氏下或有封西平郡太君六字參或作泰公之配曰彭城劉氏夫人夫人先卒其葬以夫人祔公方作君氏夫人下或有封彭城孫君五字夫人曽祖曰子玄祖曰餗皆有大名公之子男四人長曰道敏舉進士其次曰道樞其次曰道本道易皆好學而文或無其次曰道樞三字樞下或無其次曰三字道易上或有其次曰字女一人嫁蘇之海鹽尉韋潛自簡州而下皆葬鳴臯山下銘曰髙其上而坎其中以為公之宫奈何乎公上下方有立字立或作丘或作山集賢院校理石君墓志銘校理下或有京兆昭應尉五字君諱洪字濬川其先姓烏石蘭九代祖猛始從拓拔氏上音托下蒲撥切杭曰或説自云拓天而生跋地而長遂以為氏後魏孝文改為元氏入夏居河南遂去烏與蘭獨姓石氏而官號大司空九或作七方云下文七出為曾祖則此當作九拓拔或作跖跋後七丗至行褒官至易州刺史於君為曾祖易州生婺州金華令諱懷一卒葬洛陽北山金華生君之考諱平為太子家令葬金華墓東而尚書水部郎劉復為之銘君生七年喪其母九年而喪其父能力學行去黃州録事參軍則不仕而退處東都洛上十餘年行益修學益進交遊益附聲號聞四海方云李翺嘗有薦洪狀謂明經出身曾任冀州紏此黃字蓋誤海或作方故相國鄭公餘慶留守東都上言洪可付史筆李建拜御史崔周禎為輔闕皆舉以讓禎或作禎方云考周頌從示今按大雅文王詩從木當兩存宣歙池之使與浙東使交牒署君從事河陽節度烏大夫重胤間以幣先走廬下故為河陽得佐河陽軍吏治民寬考功奏從事考君獨於天下為第一君下或有為字走下或有君字得上或有所字元和六年詔下河南徴拜京兆昭應尉校理集賢御書明年六月甲午疾卒年四十二娶彭城劉氏女故相國晏之兄孫生男二人八歲曰壬四歲曰申女子二人顧言曰葬死所七月甲申葬萬年白鹿原既病謂其遊韓愈曰子以吾銘以或作與銘曰生之艱成之又艱若有以為而止於斯唐故江西觀察使韋公墓志銘方云諸題唐故或有或無或有銘字或無銘字皆從舊本百本多用大唐字公諱丹字某姓韋氏字某或作字文明六丗祖孝寬仕周有功以公開號於鄖鄖音云江夏雲社縣公之子孫丗為大官唯公之父政卒雒縣丞贈􅉑州刺史公既孤以甥孫從太師魯公真卿學太師愛之方無大師愛之四字舉明經第選授峽州音洽居三峽之口曰峽州逺安令以讓其庶兄峽或作硤方云考地理志當作峽入紫閣山事從父熊通五經登科登下方有明五經三字或無登字歷校書郎咸陽尉佐邠寧軍自監察御史為殿中侍御史徴拜太子舍人益有名遷起居郎吳少誠襲許州拜河陽行軍司馬未行少誠死改駕部貟外郎河陽下或有軍字或無未行二字少上或有適字新羅國君死公以司封郎中兼御史中丞紫衣金魚往弔立其嗣故事使外國者常賜州縣官十貟使以名上以便其私號私覿官公將行曰吾天子吏使海外國不足於資宜上請安有賣官以受錢邪即具疏所以上以為賢命有司與其費資或作資方無以為賢三字至鄆州會新羅告所當立君死還拜容州刺史容管經略招討使始城容州周十三里置屯田二十四所化大行詔加太中大夫或無置字順宗嗣位拜河南少尹行未至拜鄭滑行軍司馬軍上或無行字始至襄陽詔拜諌議大夫既至日言事不阿權臣謇然有直名遂號為才臣劉闢反圍梓州詔以公為東川節度使御史大夫州下或無詔字公行至漢中上疏言梓州在圍間守方盡力不可易將徵還入議蜀事徵上或有請字劉闢去梓州因以梓州讓高崇文拜晉慈隰等州觀察防禦使自扶風縣男進封武陽郡開國公食邑二千户或無邑字將行上言臣所治三州非要害地不足張職為國家費不如屬之河東便上以為忠方無上以為忠四字疑或公自以前有上以為賢語涉重復故刪其一不知當有何字也一歲拜洪州刺史江南西道觀察使以晉慈隰屬河東公既至則計口受俸錢委其餘於官罷八州無事之食者以聚其財始教人為瓦屋取材於山召陶工教人陶聚材瓦於場度其費以為估不取贏利凡取材瓦於官業定而受其償從令者免其賦之半逃未復者官與為之貧下能者卑之財載食與漿親往勸之卑或作禆財或作材為瓦屋萬三千七百為重屋四千七百民無火憂暑濕則乘其髙别命置南北市營諸軍歲旱種不入土募人就功厚與之直而給其食業成人不病飢為長衢南北夾兩營東西七里人去泄息列切祝曰易井泄不食注不停汚之謂泄廣韻泄除去也汚氣益蘇方無長字汚或作汙復作南昌縣徙廄于髙地因其廢倉大屋馬以不連死馬或作焉不或作為死或作廄方云新史作以廢倉為新廄馬息不死明年築堤扞江長十二里疏為斗門孫曰用泒湖入江節以斗門以走暴張築堤捍江高五尺長十二里明年江與堤平以走潦水公去位之明年江水平堤老幼泣而思曰無此堤吾尸其流入海矣老上或有既退二字灌陂塘五百九十八得田萬二千頃凡為民去害興利若嗜欲居三年於江西八州無遺便其大如是其細可略也其大下九字方從閣杭李謝本作其大不可略如是或作其太略如是皆非是卒有違令當死者公不果於誅杖而遣之去上書告公所為不法若干條法下或有者字朝廷方勇於治且以為公名才能臣治功聞天下不辨則受垢詔罷官留江西待辨使未至月餘公以疾薨使至辨凡卒所告事若干條皆無絲毫實詔笞卒百流嶺南公能益明春秋五十八薨於元和五年八月六日公好施與家無剩財剩或作自校書郎至為觀察使擁吏卒前走七州刺史與賔客處如布衣時自持卑一不易方無如布衣時四字或四字在不易下卑下或無一字娶清河崔氏故支江令諷之女某官某之孫有子曰置年十五明經及第嗣其家業支或作枝後夫人蘭陵蕭氏中書令華之孫殿中侍御史恆之女皆先公終有女一人方無史字凡公男若干人女若干人或無女若干人四字明年七月壬寅從葬萬年縣少陵原方無縣字將葬其從事東平吕宗禮與其子置謀曰我公宜得直而不華者銘傳於後固不朽矣方從閣杭蜀本無直而不華者三字及傳於後固四字而復出得銘二字云朝氏本有此字殊不知嘉祐杭本已如此大氏方未嘗見嘉祐本也置來請銘銘曰武陽受業始於太師以官讓兄自待不疑勤于紫閣取益以卑可謂有源卒用無疵慊慊音歉注漢書曰慊慊常若不足慊慊或作謙謙為人矯矯為官爰及江西功德具完名聲之下獨處為難辨而益明仇者所歎碑于墓前維昭美故納銘墓中以識公墓唐故河南府王屋縣尉畢君墓志銘畢氏出東平歷漢魏晉宋齊梁陳士大夫不絶入國朝有為司衛少卿具邢廬許州刺史者曰憬入或作人屬上句憬之子構纍官至吏部尚書卒贈黃門監是為景公方云新舊史有畢構傳終於户部尚書出系表亦作户部然舊更畢諴傳乃稱吏部景公生抗為廣平太守抗安祿山城陷覆其宗贈户部尚書生抗方云杭本抗作炕丗系表作杭傳作炕而丗系官聀亦不同覆其宗或作其宗覆焉尚書生坰家破時坰生始四歲四或作七與其弟增以俱小漏名籍得不誅為賞口賊中寶應二年河北平宗人宏以家財贖出之求增不得增長為河北從事兼官至御史中丞坰既至長安宏養於家教讀書明經第方云明經第一句當有脫字仐按明上或經下當有中字或登字之類宏死坰益壯始自别為畢氏歷尉臨涣安邑王屋年六十一以元和六年二月二日卒於官𥘉罷臨涣徐州節度張建封慕廣平之節死聞君篤行能官請相見署諸從事攝符離令四年節死或作死節請上或有以幣字署上或有遂字按諸字疑衍及尉王屋徐之從事有為河南尹者聞君當來喜謂人曰河南庫歲入錢以千計者五六十萬須謹廉吏今畢侯來吾濟矣入錢或作出入繼數尹諸署於府者無不變而畢侯固如𥘉竟以其職死諸或作請君睦親善事過客未嘗問有無既卒家無一錢凡棺與墓事皆同官與相識者事之墓或作葬娶清河張氏女女下或有子字方云女子字疑皆因下文誤入生男四人曰鎬鉟銶鋭女子三人其長學浮屠法為比丘尼其季二人未嫁以其月二十五日從葬偃師之土婁銘曰上古愛民為官求人苟可以任位加其身其後喜權人自求官退而緩者身後人先故廣平死節而子不荷其澤王屋謹廉而神不福其謙嗚呼天與人苟無傷其穴與墳試大理評事胡君墓銘胡之氏别於陳明允先允或作元河東人丗勤固固或作國戴厥身戴或作載籍文譜進連倫惟明允加武資力牛虎柔不持吏夏陽有施為去平陽民思悲河東士河陸原冝兹人肖厚完或作後昆或作省厚寬仐按厚完二字見晉語五十七不足年孤兒啼死下官母弟證音政秩大夫秩方作秋方云胡弟證元和九年以御史大夫帥振武十二年召還此下又云友韓愈司馬徒豈十二年從征淮西時邪然則秩當為秩明矣托君遺哭泣書托方作石友韓愈司馬徒作後銘系序𥘉襄陽盧丞墓志銘或有唐故字范陽盧行簡盧下或有君字將葬其父母乞銘於職方貟外郎韓愈曰吾先丗丗載族姓書丗丗或作五丗吾胄於拓拔氏之弘農守守後四代吾祖也為沂録事參軍沂下或有州字五丗而吾父也為襄陽丞始吾父自曹之南華尉歷萬年縣尉至襄陽丞以材任煩能持廉名萬年二字或作三去襄陽則署鹽鐵府出入十年當最其列府下或有聀字十下或有五字貞元十三年終其家年六十七殯河南河隂南下或有縣字縣字或在河隂下吾母燉音屯煌張氏也王父瓘為兖之金鄉令之或作州先君殁而十三年夫人終年七十三從殯河隂方本殁下無而字年下有而字生子男三人居簡金吾兵曹行簡則吾其次也大理主簿佐江西軍其幼可久女子嫁浮梁尉崔叔寶將以今年十月自河隂啓葬汝之臨汝之汝原葬下或有於字臨汝下或有縣字汝原上或有臨字吾曰隂陽星曆近丗儒莫學獨行簡以其力餘學能名一丗舍而從事於人以材稱葬其父母乞銘以圖長存是真能子矣可銘也遂以銘以圖長存方作圗久長存仐按此與後篇張圎志文躰特為橫逸與諸篇不同亦其文之變也但此篇中稱吾者皆述盧語而最後一吾字乃韓自吾似少分别耳弘農諱懷仁沂諱璬音皎襄陽諱某仐年實元和六年沂下或有州字唐河中府法曹張君墓碣銘有女奴抱嬰兒來致其主夫人之語曰妾張圎之妻劉也劉下或有氏字妾夫常語妾云吾常獲私於夫子且曰夫子天下之名能文辭者凡所言必傳丗行後或無夫子字非是仐妾不幸夫逢盜死途中將以日月葬逢或作遇妾重哀其生志不就恐死遂沈泯方作名敢以其稚子汴見先生將賜之銘是其死不為辱而名永長存所以蓋覆其遺胤子若孫且死萬一能有知將不悼其不幸於土中矣汴下或有兒字或無將字胤下或有若字又曰妾夫在嶺南時嘗疾病泣語曰吾志非不如古人吾才豈不如今人而至於是而死於是邪若爾吾哀必求夫子銘是爾與吾不朽也古下方無人字愈既哭弔辭遂敘次其族丗名字事始終而銘曰弔下或有即字今按既辭而遂敘其事蓋一辭而許所謂禮辭者也君字直之祖歡父孝新皆為官汴宋間君嘗讀書為文辭有氣有吏才嘗感激欲自奮拔樹功名以見丗𥘉舉進士再不第因去事宣武軍節度使得官至監察御史坐事貶嶺南再遷至河中府法曹參軍攝虞鄉令有能名進攝河東令又有名遂署河東從事絳州闕刺史攝絳州事能聞朝廷元和四年秋有事適東方既還八月壬辰死于汴城西雙丘年四十有七明年二月日葬河南偃師日或作庚午方云考唐曆二月無庚午葬下或有于字妻彭城人丗有衣冠或無有字祖好順泗州刺史父泳卒蘄州别駕女四人男一人嬰兒汴也是為銘太原府參軍苗君墓志銘君諱蕃字陳師其先楚之族大夫亡晉而邑於苗丗遂以苗命氏其後有守上黨潞州上黨郡者惠于民卒遂家壺關縣名在潞州曾大父延嗣中書舍人大父含液舉進士第官卒河南法曹父頴揚州録事參軍君少喪父受業母夫人舉進士第佐江西使有勞三年使卒後辟不肯留獨護其喪葬河南選輔太原參軍假使職獄平貨滋息吏斂手不敢為非年四十有二元和二年六月辛巳暴病卒其妻清河張氏以其年十二月丙寅葬君于洛陽平隂之原男三人執規執矩必復其季生君卒之三月君同生昆弟姊凡三人皆先死四室之孤男女凡二十人皆幼遺資無十金無田無宫以為歸無族親朋友以為依也天將以是安施耶宫或作家為依方無為字韓曰按丗系表苗襲叢生延嗣延嗣生含液含液生頴頴生蕃蕃生著著生愔惲恪愔生合符渾生廷乂又按登科記愔長慶二年惲太和五和恪八年治符大中八年廷乾符三年皆相踵登第然有可疑者丗系表以愔惲恪為蕃之孫志謂蕃卒於元和二年男女皆幼自元和二年至長慶二年甫十五年豈遂有孫登第耶然則丗系表蕃之下所謂著者誤矣疑愔惲恪即蕃之子而執規執矩必復者蕃死時幼而未名持其小字云爾其後遂名愔惲恪也嗚呼蕃死其困如此其後子孫之盛則如此為善者可無怠矣銘曰有行以為本有文以為華恭以事其職而勤以嗣其家位卑而無年吁其奈何朱文公校昌黎先生集卷之二十五
