front:
  text: 朱文公校昌黎先生集卷之二考異音釋附
  hash: sha256:5445efb693445e8da312b07077e513e61d80de2030395d5e80e77719a9b747c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_002-1a}
body:
  text: 古詩北極一首贈李觀北極有羇羽南溟有沈鱗川源浩浩隔影響兩無因風雲一朝會變化成一身誰言道里逺里方作理非是陶詩云不怨道里長正作里感激疾如神我年二十五求友昧其人哀歌西京市乃與夫子親所尚苟同趨尚或作向趨方云孟子云三子者不同道其趨一也注趨讀如趣賢愚豈異倫方為金石姿萬丗無緇磷音鄰無為兒女態兒女或作女兒非是燋悴悲賤貧此日足可惜一首贈張籍洪曰此詩雜用韻又疊用韻歐陽公云退之工於用韻得寬韻則波瀾橫溢泛入傍韻如此日足可惜之類是也得窄韻則不復旁出因難見巧如病中贈張十八之類是也此日足可惜此酒不足嘗不足或作不可捨酒去相語去方作須今按須字無理或是復字傳寫誤尓共分一日光念昔未知子孟君自南方自矜有所得言子有文章我名屬相府欲往不得行或作驤思之不可見百端在中腸維時月魄死冬日朝在房韓曰朝旦也月令孟冬之月日在房驅馳公事退聞子適及城或作墻方云此詩視古用韻不入今韻者多為後學以意妄改吳才老云詩人用行字韻二十有五無叶今讀者此詩後用東去趍彭城諒知有所成皆庚韻也何獨於此疑之命車載之至引坐於中堂開懷聽其説往往副所望音亡孔丘殁巳逺仁義路久荒紛紛百家起詭怪相披猖亂也長老守所聞後生習為常少詩詔切知誠難得純粹古巳亡古一作固譬彼植園木有根易為長留之不遣去館置城西旁歲時未云幾浩浩觀湖江未或作來江或作湘非是方云植園木以喻籍之始從學也觀湖江以喻其成也衆夫指之笑謂我知不明兒童畏雷電魚鱉驚夜光州家舉進士選試繆所當馳辭對我䇿章句何煒音偉光也煌相公董晉也朝服立工席歌鹿鳴禮終樂亦闋苦穴切終也記曰爵卒而樂闋相拜送於庭之子去須臾赫赫流盛名竊喜復竊嘆竊喜復或作慷慨仍諒知有所成人事安可恆奄忽令我傷聞子髙第日正從相公喪孫曰正元十五年髙郢知舉籍登第是歲三月晉卒愈護其喪行哀情逢吉語倘恍上音敞下許昉切輔注相如曰聽敞恍而亡聞注耳不諦也惝或作敞方云楚詞逺遊作惝恍相如傳作敞恍難為雙暮宿偃師縣名今在洛州西徒展轉在牀諸本作展轉在空床仐按或當從諸本夜聞汴州亂繞壁行倣徨我時留妻子時留或作乃棄倉卒不及將相見不復期零落甘所丁驕兒未絶乳念之不能忘忽如在我所或作其側所或作前或作側耳若聞啼聲中途安得返一日不可更俄有東來説我家免罹殃乘船下汴水東去趨彭城徐州地孫曰公妻子先在徐州從喪朝至洛方無朝字洛下有陽字今按朝至洛蓋用洛誥語又下文云日西入軍門則此當作朝至洛明矣還走不及停還或作旋假道經盟津出入行澗岡日西入軍門羸馬顛且僵音薑什也主人願少留延入陳壷觴卑賤不敢辭忽忽心如狂飲食豈知味絲竹徒轟轟平明脫身去決若驚鳬翔黃昏次汜音似汜水在河南城皋縣水欲過無舟航過或作濟號呼久乃至夜濟十里黃中流上灘灘灘方作沙灘或作澤方云郭璞曰江東人呼水中沙堆為灘灘即灘也今按下句便有沙字恐只當作灘二字復出如上句言舟航之類沙水不可詳驚波暗合沓星宿爭翻芒轅馬蹢躅鳴諸本或作馬乏復悲鳴或作馬蹢濁鳴悲左右泣僕童甲午憩時門左傳昭十九年鄭大水龍鬪于時門之外洧淵杜氏注云時門鄭城門也臨泉窺鬪龍東南出陳許陂澤平茫茫方作茫茫平云用古䪨今按此詩固用古䪨然皆因其語勢之自然未嘗作意捨此而用彼也諸本只作陂澤平茫茫韻諸語協本無不可若作陂澤茫茫平却覺不響不應以欲用古韻之故牽挽而強就之也又按别本平或作路而或作何者語意尤勝讀者詳之道邊草木花紅紫相低昻百里不逢人角角雄雉鳴角方云音谷見集韻雄雉或作雉雛行行二月暮乃及徐南疆下馬步堤岸上船拜吾兄洪曰公有三兄皆早丗見於集中者雲卿之子俞紳卿之子岌皆公從兄或曰吾兄謂張籍非也誰云經艱難艱或作險百口無夭殤或作橫方云楚詞強死者為國殤三字全語亦見列子僕射南陽公張建封也宅我睢音綏水名在徐州孫云二月末公至徐州泗濠節度使張建封以公為節度推官祝曰公與孟東野書云主人與余有故居余符離睢上即此也水陽篋中有餘衣盎烏浪切盆也中有餘糧閉門讀書史讀或作閲窗戶忽巳涼諸本多作清風窗户涼或作窗户風已涼或作窗户清風涼今按公以二月末到徐不知此詩何時作若夏即當作清風窗户涼若秋即當作窗户風巳涼日念子來遊子豈知我情别離未為久辛苦多所經對食每不飽共言無倦聽連延三十日晨坐逹五更我友二三子友方作有宦遊在西京東野窺禹穴李翶觀濤江蕭條千萬里會合安可逢淮之水舒舒楚山直叢叢子又捨我去我懷焉所窮焉或作安男兒不再壯百歲如風狂方作狂風今按方亦強用古韻之過不如只作風狂語勢尤健髙爵尚可求無為守一鄉幽懷幽懷不能寫能或作可行此春江潯音尋水涯選弭節乎江潯適與佳節會士女競光隂凝妝耀洲渚繁吹蕩人心人方作神非是間關林中鳥亦知和為音諸本作知時為和音非是然今本疑亦有誤或恐為是其字豈無一樽酒自酌還自吟但悲時易失四序迭相侵我歌君子行視古猶視今君子法天運君子法天運四時可前知可或作每小人惟所遇寒暑不可期利害有常勢取捨無定姿焉能使我心皎皎逺憂疑落葉一首送陳羽或作葉落篇首同非是落葉不更息斷蓬無復歸飄颻終自異邂逅暫相依悄悄深夜語悠悠寒月輝誰云少年别流淚各霑衣歸彭城天下兵又動太平竟何時訏音吁大也謨者誰子無乃失所宜前年關中旱閭井多死飢方作飢去歲東郡水郡或作洛方云非也舊紀貞元十五年秋鄭滑大水生民為流尸上天不虛應禍福各有隨我欲進短䇿無由至彤墀彤或作丹刳肝以為紙瀝血以書辭上言陳堯舜下言引龍夔言詞多感激文字少葳蕤上音逶下音緌盛貌選文物共葳蕤葳或作萎方云紛葳㽔以馺遝見陸機文賦今按葳蕤巳見楚詞一讀巳自怪再尋良自疑食芹説文芹楚葵也列子宋有出大自曝於日謂其妻曰負日之暄人莫知者以獻吾君將有重賞又有喜食芹者對鄉豪稱之鄉豪取而嘗之蜇於口慘於腹衆哂而怨之其人大慙晉山濤為吏部郎舉嵇康自代康恨不知巳移書責之曰野人有快炙背而美芹欲獻之至尊雖有區區之意亦巳踈矣願足下勿似之雖云美獻御固巳癡緘封在骨髓耿耿空自竒昨者到京城屢陪髙車馳周行多俊異議論無瑕疵見待頗異禮未能去毛皮到口不敢吐徐徐俟其巇虛宜切楊子曰巇可抵乎巇罅隙也歸來戎馬間驚顧似羇雌孤雌也枚乘曰日暮則迷鳥羇雌宿焉連日或不語終朝見相欺相方作我見相或作相見今按此三家三本疑皆有誤乘間輒騎馬茫茫詣空陂遇酒即酩酊君知我為誰醉後煌煌東方星奈此衆客醉𥘉喧或忿爭或作紛爭方作爭紛中靜雜嘲戲雜或作惟方云雜以嘲戲選典論全語淋漓身上衣漓或作浪顚倒筆下字人生如此少酒賤且勤置醉贈張祕書方云今本下或注徹字徹元和四年進士此詩元和𥘉作徹猶未第公五六年間皆在東都此詩蓋在長安日作非徹也人皆勸我酒我若耳不聞今日到君家呼酒持勸君為此座上客方作士非是及余各能文君詩多態度藹藹春空雲東野動驚俗天葩吐竒芬張籍學古淡軒鶴避雞群鶴方及諸本皆作昻今按此言張籍學古淡而不驚於綺靡如以乘軒之鶴而反避雞羣也又軒鶴乃與天葩之句相偶阿買趙堯夫曰或問魯直阿買是退之何人答云退之姪必有據而云不識字頗知書八分樊曰秦壞古文有八體其一隸書今八分也詩成使之寫亦足張吾軍所以欲得酒為文俟其醺酒味既冷冽酒氣又氛氲上音芬下於云切祝云氣也冷或作冷氣或作煙氛或作氤方云氛氲盛貌字見選雪賦性情漸浩浩諧笑方云云此誠得酒意餘外徒􅌭紛亂也長安衆冨兒盤饌羅羶葷音熏臭菜不解文字飲惟能醉紅裙雖得一餉樂有如聚飛蚊今我及數子固無蕕與薰險語破鬼膽補注開元天寶遺事李果為洛陽令有劉兼者過其境夜聞人外語聲曰古今正人李令是也見其行事令人破瞻開户視之無物乃鬼神也髙詞嫓匹詣切祝曰爾雅妃嫓也注相偶嫓也嫓或作動皇墳至寶不雕琢或作瑑神功謝鋤耘方今向太平元凱承華勛吾徒幸無事庶以窮朝曛音薰日入也同冠峽南方二月半春物亦巳少維舟山水間晨坐聽百鳥宿雲尚含姿朝日忽升曉羇旅感和鳴囚拘念輕矯和鳴或作陽和方云和鳴輕矯皆指百鳥而言也潺湲淚久迸久或作交詰曲思增繞行矣且無然蓋棺事乃了送惠師惠師浮屠者乃是不羇人鄒陽上吳王書使不羇之士與牛馬同皂注不羇無所拘繫也又司馬遷傳少負不羇之才十五愛山水超然謝朋親或作同隱淪脫冠翦頭髮頭或作短按下對蹤塵當作頭髮飛步遺蹤塵飛或作孤發迹入四明梯空上秋旻遂登天台望韓日天台山名在台州衆壑皆嶙峋上音鄰下音荀深崖貌選階楯峋嶙鯨戲側修鱗自來連州寺曽未造城闉音因詩出其闉闍闉城上重門日攜青雲客青或作春方云李白詩多用青雲客字探勝窮崖濵太守邀不去或作往或作得羣官請徒頻或作其志信不羣囊無一金資翻謂富者貧謂或作為昨日忽不見我令訪其鄰奔波自追及波或作走把手問所因顧我却興歎我却或作却我君寧異於民離合自古然辭别安足珍吾聞九疑好輔注山海經曰蒼梧之川其中有九疑山漢武巡狩祀舜于此孫曰其山九疑相似故名九疑韓曰九疑山在零陵營道縣零陵今永州而營道則隸道州矣夙志今欲伸欲或作願斑竹啼舜婦清湘沈楚臣衡山與洞庭此固道所循尋嵩方抵洛歷華遂之秦浮遊靡定處偶往即通津吾言孫曰公自謂子當去子道非吾遵江魚不池活野鳥難籠馴吾非西方教憐子狂且醇吾嫉惰遊者憐子愚且諄章倫切誠也去矣各異趣何為浪霑巾浪或作淚送靈師佛法入中國爾來六百年齊民逃賦役髙士著幽禪官吏不之制紛紛聽其然制或作禁紛紛或作紛紜耕桑日失隸朝署時遺賢靈師皇甫姓胤胄本蟬聮孫曰㣧繼也胄系也謂姓氏所出蟬聮連續之貌輔注南史宋王鈞七葉之中爵位相繼人人有集沈約語人云自開闢以來未有爵位蟬聯人才相繼如王氏之盛者少小涉書史早能綴文篇中間不得意失迹成延遷逸志不拘教軒騰斷牽攣圍碁鬪白黑生死隨機權六博在一擲梟盧叱回旋梟或作呼或作􅦻楚辝宋玉招魂菎蔽象碁有六博王逸注云投六箸行六碁故為六博也宋劉𥙿與劉毅樗蒲毅以為不能𥙿惡之因按五木既而四子俱黑其一子轉躍未定𥙿厲聲喝之即成盧毅意殊不快也宋玉招魂有成梟而牟呼五白梟勝也社詩袒跣不肯成梟盧廣韻􅦻子樗蒲采名唐李文公集五木經氓采六開塞搭秃撅􅦻則裊冝從􅦻戰詩誰與敵浩汗橫戈鋋音延小矛戰詩或作爭戰或作文戰或作詩戰方云戰詩戰文唐人語也白樂天戰文重掉鞅劉夢得戰文矛戟深誰與方作與誰非是飲酒盡百􅊦側眼切杯也嘲諧思逾鮮􅊦或作盞或作盞後放此逾或作愈有時醉花月髙唱清且綿髙唱清或作清唱髙四座咸寂默杳如奏湘絃尋勝不憚險黔江黔州有黔江縣屢洄沿上音回下音緣泝流而上曰洄從流而下曰沿瞿塘五六月驚電讓歸船讓或作攘非是姚令威云讓責怒也方云此只謂歸舟急於驚電耳讓如厥大誰與讓之讓怒水忽中裂千尋墮幽泉尋或作潯今按潯與尋同環回勢益急仰見團團天下團字一作圎投身豈得計性命甘徒捐浪沫蹙翻涌漂浮再生全同行二十人二諸本作三魂骨俱坑填靈師不挂懷冒涉道轉延開忠二州牧方云魏道輔謂二牧韋處厚白居易也二公出守在元和末此詩作於貞元二十年間考其時非也詩賦時多傳失職不把筆珠璣為君編強留費日月密席羅嬋姢昨者至林邑使君數開筵逐客三四公盈懷贈蘭荃音詮香草湖遊泛漭沆上音莽下胡朗切深大也西京賦滄也漭沆湖或作湘方云此言在林邑日非相地也今按湖遊對溪宴乃切溪宴駐潺湲别語不許出行𥚑動遭牽鄰州競招請書札何翩翩十月下桂嶺縣名在賀州乘寒恣窺緣落落王貟外爭迎獲其先自從入賔館占吝久能專吾徒頗攜𬒳頗或作或𬒳或作之接宿窮歡妍聽説兩京事分明皆眼前縱橫雜謡俗瑣屑咸羅穿材調真可惜朱丹韓曰陶徽詩對酒展塵編朱黃加釋注孫曰磨研猶琢磨也在磨研方將斂之道且欲冠其顚韶陽李太守髙步陵雲煙得客輒忘食開囊乞繒錢繒或作緡手持南曹敘唐制吏部貟外郎一人掌判南曹王仲舒自吏部貟外郎貶方云謂王貟外仲舒也墓志云所為文章無丗俗氣字重青瑶鐫子全切祝曰鑽也斫也古氣參彖繫方作象今按杜詩前哲垂彖繫髙標摧太玄維舟事干謁披讀頭風痊音詮孫曰典略曰張繡反曹操令記室陳琳草檄檄成呈太祖太祖先苦頭風是日疾發讀琳所作而愈翕然起日此愈我病還如舊相識還如或作頗似傾壷暢幽悁於緣切祝曰憂悒也通也詩中心悁悁以此復留滯歸驂音參驂馬幾時鞭縣齋有懷少小尚竒偉平生足悲吒陟駕切嘆也郭璞詩撫心獨悲吒猶嫌子夏儒肯學樊遲稼事業窺皋稷或作稷卨文章蔑曹謝濯纓起江湖綴珮雜蘭麝悠悠指長道去去䇿髙駕誰為傾國媒樊曰漢李延年傳北方有佳人絶丗而獨立一顧傾人城再顧傾人國上嘆息日丗豈有此人乎平王公主因言延年有女弟上召見實妙麗善舞由是得幸是為李夫人自許連城價樊曰史記連城謂十五城秦所以易趙璧者史記𥘉隨計吏貢屢入澤宫射雖免十上勞韓曰戰國䇿蘇秦説秦惠王書十上而説不行資用乏絶去秦而歸何能一戰霸能或作曽人情忌殊異丗路多權詐多或作重蹉跎顔遂低摧折氣愈下冶長信非罪侯生侯嬴也孫曰史記魏有隱士侯嬴公子無忌虛左迎之嬴有客朱亥在市屠中嬴引車入市見之其客睥睨久立徒騎皆竊罵侯生或遭罵懷書出皇都銜淚渡清灞音霸灞水也選控灞乘滻身將老寂寞志欲死間暇朝食不盈腸冬衣才掩髂枯駕切祝曰腰骨前漢折脅拉髂軍書既頻召戎馬乃連跨大梁從相公彭城赴僕射弓箭圍狐兔絲竹羅酒炙兩府變荒涼荒或作炎方云此言董晉張建封相繼殂謝也三年就休假求官去東洛去或作來或作去官來東洛方云此謂貞元十五十六年冬如京調官也犯雪過西華塵埃紫陌春韓曰唐人樂府云紫陌青門三十六宫春晝永風雨靈臺夜名聲荷朋友援引乏姻婭音亜孫曰尓雅兩壻相謂曰婭雖陪彤庭臣雖方作偶或作仰陪或作偶皆非是孫曰彤庭丹墀謂御史也詎縱青冥靶音霸轡革王褒曰王良執靶冥或作雲寒空聳危闕曉色曜修架捐軀辰在丁鎩所介切鳥羽病也選鵉翮有時鎩翮時方䄍音乍年終祭公貶山陽以其年十二月投荒誠職分領邑幸寬赦湖波翻日車韓曰淮南子日乘車駕以六龍羲和為御杜詩西江浸日車嶺石坼天罅虛訝切孔也毒霧恆熏晝炎風每燒夏雷威固巳加颶勢仍相借氣象杳難測聲音吁可怕夷言聽未慣越俗循猶乍循或作修非是指摘兩憎嫌睢盱上音墮下音吁視上逆貌祝曰視不明也列子老子而睢睢而盱盱而誰與居互猜訝祗緣恩未報豈謂生足藉嗣皇永正元年順宗即位新繼明新方作帝非是率土日流化惟思滌瑕垢長去事桑柘斸陟玉切斫也嵩開雲扄壓潁抗風榭禾麥種滿地梨棗栽繞舍兒童稍長成雀鼠得驅嚇音罅訩嚇莊子鴟得腐鼠鵷雛過之仰而視之日嚇注怒而拒物聲官租日輸納村酒時邀迓間愛老農愚歸弄小女姹陟駕切少女也後漢姹女工數錢如今便可爾何用畢婚嫁樊曰後漢向平字子平隱居不仕建武中男女嫁娶畢敕官事勿相罔當如我死也合江亭諸本作題合江亭寄刺史鄒君方從閣杭蜀本篇內三處注文亦用蜀本孫曰亭在衡州負郭今之石鼓頭即其地也地形特異崛起於二水之間旁有朱陵仙府唐人題刻散滿岩上公自陽山量移江陵過衡山紅亭枕湘江紅或作江方作洪今按歐本作紅鮑云當作紅其作洪者聲存而字訛也蒸水會其左瞰臨眇空闊緑淨不可唾維昔經營𥘉邦君實王佐洪曰謂故相齊映所作翦林遷神祠買地費家貨費或作匱梁棟宏可愛宏或作橫結構麗匪過伊人去軒騰兹宇遂頽挫老郎來何暮髙唱久乃和洪曰謂字文炫又增其制樹蘭盈九畹音宛楚辝豫既滋蘭之九畹栽竹逾萬個或作箇方云史記貨殖傳竹竿万個古書皆作個字漢功臣表始出箇字長綆汲滄浪音郎幽蹊下坎坷口個切坎坷地不平波濤夜俯聽雲樹朝對卧𥘉如遺宦情終乃最郡課人生誠無幾誠方作成非是事往悲豈奈乃個切語助或作那蕭條綿歲時契闊繼庸懦勝事誰復論醜聲日巳播中丞黜凶邪天子閔窮餓君侯至之𥘉閭里自相賀淹滯樂間曠勤苦勸慵惰為余掃塵階塵方作東非是命樂醉衆座窮秋感平分新月憐半破願書巖上石勿使泥塵涴烏卧切泥著物也泥塵或作塵泥陪杜侍御遊湘西兩寺獨宿有題一首因獻楊常侍諸本無兩字及一首因三字楊常侍慿也時觀察湖南長沙千里平勝地猶在險况當江闊處斗起勢匪漸深林髙玲瓏上音苓下音籠玉聲也一曰明貌青山上琬琰以冉切青玉也上或作生路窮臺殿闢佛事煥且儼剖竹走泉源開廊架崖廣音􅌂因岩為屋廊一作廓是時秋之殘之或作𥘉暑氣尚未斂羣行忘後先朋息棄拘檢朋或作困客堂喜空涼空或作風華榻有清簟澗𬞞煮蒿芹水果剝菱芡音儉雞頭伊余夙所慕陪賞亦云忝幸逢車馬歸獨宿門不掩山樓黑無月漁火燦星點夜風一何喧杉檜屢磨颭聀琰切風動物也磨或作摩方云古摩磨通猶疑在波濤怵惕夢成魘於琰切睡中魘靜思屈原沈逺憶賈誼貶椒蘭離騷經注蘭楚懷王弟司馬子蘭椒楚大夫椒也爭妬忌絳灌共讒諂誰令悲生腸坐使淚盈臉翻飛乏羽翼乏或作摧指摘困瑕玷困或作因非是珥音餌曹植戴蟬珥貂珥插也漢官儀曰侍中冠金蟬有貂韓曰珥貂分陜謂楊以常侍鎮長沙貂藩維重政化類分陜禮賢道何優奉己事苦儉大厦棟方隆巨川楫行剡音琰鋭利行或作𥘉經營誠少暇遊宴固已歉歐本行歉俗字當作慊方云古書歡欣之類或從心或從欠多通用旅程愧淹留徂歲嗟荏苒平生每多感柔翰遇頻染展轉嶺猿鳴曙燈青睒睒音陜燈方作光𦦨𦦨或作𦦨𦦨今按曉光不青作燈是也嶽陽樓别竇司直竇庠時以武昌幕權嶽州洞庭九州間厥大誰與讓南匯羣崖水匯或作維北注何奔放瀦為七百里吞納各殊狀自古澄不清環混無歸向炎風日搜攪幽怪多冗長音仗選陸機曰故無取乎冗長軒然大波起宇宙隘而妨音訪妨礙也玉篇云害也一作放巍峩拔嵩華騰踔較健壯踔或作躍方云選吳都賦騰踔飛超聲音一何宏轟輵車萬兩輵諸本作􅮣或作揭方定作輵云丘葛切車聲也楊雄羽獵賦所謂皇車幽輵是也杭蜀本作渴盧同月蝕詩亦有推蕩轟渴不知唐人何以訛輵為渴也今本多作磕砰磅轟磕上林賦語磕與輵音義一也猶疑帝軒轅張樂就空曠蛟螭音摛無角如龍而黃露筍簴縞練吹組帳組或作祖今按鮑昭詩組帳揚春風鬼神非人丗節奏頗跌踼上徒結切下徒浪切放逸也陽施見誇麗隂閉感悽愴感或作咸朝過冝春口袁州唐日冝春郡極北缺堤障過或作回北方作地夜纜巴陵洲嶽州唐曰巴陵郡叢芮而鋭切草生貌才可傍蒲浪切近也星河盡涵泳俯仰迷下上餘瀾怒不巳喧聒鳴甕盎明登嶽陽樓輝煥朝日亮飛廉風伯戢其威清晏息纎纊音曠纎纊細綿也息或作自方云按海賦輕塵不飛纎羅不動息字為勝泓烏宏切水深澄湛凝緑物影巧相況江豚時出戲説文江豚一名鱄䱐欲風則踊驚波忽蕩漾波或作沒時當冬之孟隙竅縮寒漲前臨指近岸側坐眇難望滌濯神魂醒幽懷舒以暢主人孩童舊孩童一作童孩握手乍欣悵憐我竄逐歸相見得無恙音漾病也李陵曰霍與上官無恙乎開筵交履舄韓曰史滑稽傳履舄交錯杯盤狼藉爛漫倒家釀音讓劉曰見何次道飲酒使人欲傾家釀杯行無留停或作停留髙柱補注琴柱送清唱中盤進橙栗投擲傾脯歡窮悲心生婉孌不能忘音望念昔始讀書志欲干霸王于放切二屠龍莊子朱萍漫學屠龍於支離益殫千金之家三年後成而無所用其巧破千金為藝亦云亢孫曰髙也愛才不擇行觸事得讒謗前年出官由或作日以前卷上􅕭豈其由之語推之作由者是但恐此與彼語意不同則只作日亦通此禍最無妄公卿採虛名擢拜識天仗姦猜畏彈射食亦切公時為御史為王叔文之黨所排逐斥逐恣欺誑新恩移府庭移或作趨逼側潘嶽曰駢闐逼側又子虛賦云逼側祕節厠間也諸將于嗟苦駑緩但懼失冝當追思南渡時魚腹甘所葬嚴程迫風帆劈箭上音僻又轉麥切説文劈破也入髙浪顚沈在須臾忠鯁誰復諒生還真可喜剋巳自懲創剋或作刻庶從今日後粗識得與喪事多改前好趣有獲新尚誓耕十畒田不取萬乘相細君知𧖟織稚子巳能餉行當挂其冠生死君一訪送文暢師北遊昔在四門館晨有僧來謁補注聞見録云歐陽公於詩主退之不主子美劉仲原父每不然之公日一美老夫清晨梳白頭玄都道士來相訪有俗氣退之決不道也仲原父曰亦退之昔在四門館晨有僧來謁句之類耳公賞其辨自言本吳人少小學城闕巳窮佛根源粗識事輗五雞切軏五骨切車轅端曲木攣拘漢鄒陽書能越攣拘之語潘安仁賦陋吾人之拘攣屈吾真或作身戒轄胡轄切車軸頭鐡左氏巾車脂轄詩云載脂載轄思逺發薦紳秉筆徒聲譽耀前閥音罰閥閲家丗也後漢聲榮光耀於門閥從求送行詩求或作來屢造忍顛蹶今成十餘卷浩汗羅斧鉞先生公自謂閟窮巷未得窺剞劂上居綺切下音厥祝曰刻鏤刀也淮南子剞劂無迹人巧之妙楚詞握剞劂而不用揚雄甘泉賦般僅棄其剞劂或云剞作剞字見傅毅琴賦當考又聞識大道何路輔剠刖剠與黥同莊子庸詎詎造物者不息我剠而輔我劓韓曰公詩意謂文暢既祝髮為僧欲輔其剠則而反之𥘉庸可得乎出其囊中文滿聽實清越謂僧當少安草序頗排訐上論古之𥘉所以施賞罰下開迷惑胸窙豁斸株橛音掘株橛木根列子吾處若橛株抅注橛株抅斷木也言序所以排訐釋氏而告以聖人之道者如以刃而􅓯株橛也方云何遜詩窙豁下岩呀窙音孝氣上蒸也校本一用西京賦作孝豁恐非今按一本作豁注云開逹貌西京賦李善無注而篇韻以為宫殿貌祝氏音義作豁開逹貌潘嶽登虎牢賦幽谷豁以窙寥今亦末詳孰是且從方氏作孝僧時不聽瑩莊子是黃帝之所聽瑩也疏聽瑩疑惑貌不聽瑩則無所疑矣此所以若飲水救渴也若飲水救暍音謁傷暑也或作渴方云公詩用今韻者未嘗逾韻此詩三十三韻不應獨旁取此一韻個按方説不知何以見此詩用今韻當考風塵一出門時日多如髮三年竄荒嶺守縣坐深樾音日兩木交隂之下日樾徴租聚異物或作物異非是詭製怛巾襪製或作制怛或作恆方云恆驚也幽窮共誰語共或作與思想甚含噦於月切逆氣禮記噦噫昨來得京官照壁喜見蝎音歇韓曰江南舊元蝎樊曰蘇內翰謫黃州五年離泗州北行岸上聞騾馱聲欣然日不聞此聲久矣退之照壁喜見蝎不虛語也况逢舊親識或作識知親或作相無不比鶼音兼尓雅曰南方有比翼鳥不比不飛其名謂之鶼公竄逐新歸見蝎猶喜况相識乎無不比之鶼蟨矣蟨音厥見後岠虛注長安多門户弔慶少休歇而能勤來過重惠安可揭孫曰舉也重惠或作惠重方云母丘檢詩憂責重山嶽誰能為我擔與此義同當今聖政𥘉恩澤完􅛺狘上許出切下許月切祝曰飛走貌記鳯以為畜故鳥不獝麟以為畜故獸不狘完或作寬胡為不自暇飄戾逐鸇鷢其月切似鷹尾上白善捕鼠僕射領北門威德壓胡羯音訐胡種相公鎮幽都竹帛爛勳伐酒埸舞閨姝獵騎圍邊月韓曰李恢秋月詞云邊月破鏡飛開張篋中寶自可得津筏音伐海中浮從兹冨裘馬寧復茹藜蕨音厥余期報恩後謝病老耕垡音伐孫曰耕起士謂之垡祝曰與撥同國語王耕二撥庇身指蓬茅逞志縱獫方驗切大長喙猲許竭切祝曰短喙犬日猲出尓雅詩曰載獫猲猲僧還相訪來山藥煮可掘答張徹筆墨間録劉澗云答張徹一詩尤竒麗辱贈不知報我歌爾其聆首敘始識面次言後分形道途綿萬里日月垂十齡浚郊浚音峻孫曰正元十五年宣武軍亂殺留後陸長源避兵亂雎岸是歲公至彭城節度使張建卦居之於睢水上連門停諸本作庭閣本作停而方從諸本按停猶居也上對亂字冝用停字乃的後又有洞庭字或未必重押也肝膽一古劒波濤兩浮萍漬墨竄舊史磨丹注前經義苑手祕寶文堂耳驚霆暄晨躡露舄暑夕眠風櫺結友子讓抗請師我慙丁𥘉味猶噉與啖同祝日顧愷之啖蔗從尾至本云漸入佳境蔗遂通斯建瓴上紀偃切下音零見漢髙紀注瓴盛水瓶也居髙屋之上颷卑遙切風也韓曰楚詞忽飈騰兮浮雲颭伶俜普丁切補注伶傳行不正選少伶俜而偏孤悔狂巳咋音責囓也指垂誡仍鐫銘峨豸宅買切祝曰獬豸獸似牛而一角知曲直善觸御史冠用之忝備列伏蒲孫曰元帝欲廢太子史丹伏青蒲上泣涕諌帝愧分經孫曰分别涇渭以明清濁微誠慕橫草孫曰漢終軍云軍無橫草之功橫於草野謂戰也瑣力摧撞筳音廷孫曰東方朔傳以𬋩窺天以蠡測海以筳橦鍾從丱恐未是諸本筳從草方云當從竹繀絲管也見東方朔客難疊雪走商嶺飛波航洞庭下險疑墮并守官類拘囹音令圄也官或作宮荒餐茹獠音老祝曰夷别名孫曰獠南夷蠱蟲毒自峩豸下皆言自監察御史貶陽山時事蠱幽夢感湘靈刺史肅蓍蔡孫曰言刺史為人所信肅如蓍蔡蔡大龜也吏人沸蝗螟音冥點綴簿上字趨蹌閣前鈴補注羊祜出鎮南夏鈴閣之下侍衛不過十數人賴其飽山水得以娛瞻聽紫樹雕斐斖音尾祝曰文色貌選彤雲斐尾以翼檽彤一作雜碧流滴瓏玲映波鋪逺錦插地列長屏愁狖余救切祝曰狖形似猿酸骨死或作怨怪花醉魂馨潛苞絳實坼幽乳翠毛零乳或作孔赦行五百里月變三十蓂音冥孫曰丗紀堯時有草夾階而生於庭隨月凋榮每月朔日生一莢至望則落一莢月小則餘一莢漸階羣振鷺入學誨螟蛉音苓桑上青蟲也楊子以喻七十子肖仲尼元和六年公自江陵法曹召為國子博士故云蘋甘謝鳴鹿罍滿慙罄瓶問冏抱瑚璉飛飛聮鶺鴒魚鬛欲脫背孫云言將化為龍虬光或云劒也先照硎光先或作精光豈獨出醜類方當動朝廷勤來得晤語勿憚宿寒廳薦士薦東野於鄭餘慶也東野正元十一年為溧陽尉時鄭餘慶尹河南公作是詩薦之周詩三百篇雅麗理訓誥雅麗或作麗雅理或作埋今按二字皆未安恐必有誤曽經聖人手議論安敢到五言出漢時蘇李韓曰選李陵與蘇武詩注云五言詩自陵始也首更號東都漸瀰漫大貌派别百川導孫曰謂風雅之體如百川之分也建安能者七孫曰建安漢獻帝年號典論曰今之文人孔融陳琳王粲徐幹阮瑀應瑒劉楨斯七豫者於學無所遺於辝無所假卓犖變風操孫曰風謂風雅操琴操之類亦詩也逶迤抵晉宋氣象日凋耗中間數鮑謝孫曰謝靈運謝朓或日二謝通稱鮑昭字明逺謝朓字玄暉李觀評孟郊詩云平處下顧二謝比近最清奧齊梁及陳隋衆作等蟬噪搜春摘花卉沿襲傷剽強最也盜國朝盛文章子昻補注薦士詩與送東野序盛言子昻李杜餘皆不在其列始髙蹈勃興得李杜萬類困陵暴後來相繼生亦各臻閫奧或作方云舊本作奧今本以重韻誤刋也班固傳究先聖之閫奧有窮者孟郊受材實雄驁音傲敖也冥觀洞古今象外逐幽好橫空盤硬語橫空或作縱橫安帖力排奡孫曰論語奡蕩舟言多力能陸地行舟輔注臨川云吟詩各有所得清水出芙蓉天然去雕飾此李白所得也或看翡翠蘭苕上未掣鯨鯢碧海中此杜甫所得也橫空盤硬語安帖力排奡此韓愈所得也敷柔肆紆餘屈曲貌古詩日山澤紛紆餘奮猛卷海潦榮華肖天秀捷疾逾響報捷或作健逾或作愈行身踐規矩甘辱恥媚竈孟軻分邪正眸子看瞭眊杳然粹而清或作精可以鎮浮躁酸寒溧音栗宣州陽尉五十幾何耄孜孜營甘旨辛苦久所冒俗流知者誰指注競嘲慠聖皇索遺逸髦士日登造廟堂有賢相鄭餘慶也愛遇均覆燾况承歸與張郊嘗為歸登張建封所知二公迭嗟悼青冥送吹噓強箭射魯縞音稿韓曰漢韓安國傳強努之末力不能穿魯縞孫曰縞素也曲阜之俗善作之尤為輕師故曰魯縞胡為久無成使以歸期告霜風破佳菊嘉節迫吹帽念將決焉去感物增戀嫪盧到切集注吝物也聲類云姻嫪戀惜也説文云固也彼微水中荇尚煩左右芼音冒擇也魯侯國至小廟鼎猶納郜幸當擇珉玉石次玉也寧有棄圭瑁音冒孫曰周禮天子執瑁悠悠我之思擾擾風中纛音導補注楚王曰寡人之心搖搖然如懸旌詩意取此纛以犂牛尾為之繫於左騑選黃屋左纛上言愧無路日夜惟心禱鶴翎不天生變化在啄菢薄報切鳥伏卵謂之菢通波非難圗尺地易可漕善善不汲汲後時徒悔懊於倒切恨也晉史門生驚懊者纍日救死具八珍韓曰禮記內則入珍謂淳母炮豚性牂搗珍積熬肝膋也不如一簞音單楚與晉戰或人誰玉一簞酒王傾酒於水上與軍士共飲犒不或作無微詩公勿誚微或作數愷悌神所勞即到切喜侯喜至贈張籍張徹韓曰公𥘉謫陽山令元和改元自江陵掾召國子博士其從遊如喜如籍如徹皆會都下詩以是作昔我在南時數君長在念搖搖不可止諷詠日喁噞上音顒下音驗孫曰魚口動也韓曰張衡曰喁噞浮沉如以膏濯衣每漬垢逾染又如心中疾針石非所砭波驗切孫云説文以石刺病常思得遊處至死無倦厭無或作不地遐物竒怪水鏡孫曰水鏡一名蜮陸機疏云一名射影江淮水皆有之人在岸上影見水中投人影則殺之涵石劒荒花窮漫亂幽獸工騰閃礙日不忍窺忽忽坐昏墊音店溺也逢神多所祝豈忘靈即驗依依夢歸路歷歷想行店今者誠自幸所懷無一欠孟生去雖索孫曰離也侯氏來還歉説巳見上欹眠聽新詩屋角月豔豔眠或作枕月或作日雜作承間聘雜方作新按上句巳云聽新詩不應此句便重出新字當作雜作承間聘蓋謂間出它文也交驚舌㸦舚他念切樊曰説文吐舌貌交或作文㸦或作牙皆誤㸦俗互字也􅌭紛指瑕疵拒捍阻城塹阻城方作城阻非是以余經摧挫固請發鉛槧七艷切韓曰王充論衡斷木為槧西京雜記暢子雲好事常懷鉛提槧從諸計吏訪殊方絶域之語鉛墨槧牘也居然妄推讓見謂爇天𦦨天或作黔非是比踈語徒妍悚息不敢占呼奴具盤飱或作餐飣餖上丁定切下音豆貯食也魚菜贍人生但如此朱紫安足僣古風樊曰安史之後方鎮相望於內地大者連州十餘小者不下日四兵驕則逐帥帥強則叛上不廷不貢往往而是故托古風以寓意觀詩意當在德宗之丗與烽火相為表裏云今日曷不樂幸時不用兵無曰既蹙矣乃尚可以生日或作日以或作勞非是彼州之賦去汝不顧此州之役去我奚適去我方作我去奚或作爰皆非是一邑之水可走而違天下湯湯曷其而歸好我衣服甘我飲食無念百年聊樂一日駑驥洪曰唐本有贈歐陽詹字或作駑驥吟示歐陽詹詹集有答韓十八駑驥吟駑駘誠齷齪上音渥下音擉或作􅐅選小人自齷齪市者何其稠力小苦易制價微良易酬苦或作良良或作誠渴飲一斗水飢食一束芻嘶鳴當大路志氣若有餘騏驥生絶域自矜無匹儔牽驅入市門行者不為留借問價幾何黃金比嵩丘老杜驄馬行朝來夕試華軒下未覺千金滿髙價借問行幾何咫尺視九州飢食玉山禾渴飲醴泉流問誰能為御諸本作借問誰能御方從杭蜀本及歐陽詹集如此曠丗不可求惟昔穆天子乘之極遐遊王良執其轡造父挾其輈挾諸本作夾此從詹集今按左傳頴考叔挾輈以走當作挾因言天外事韓曰周穆王西極有化人來王敬事之遂肆意逺遊駕八駿之乘主車則造父為馭宿于崑崙之阿赤水之陽别日升崑崙之上以觀黃帝之宫遂賔于西王母孫云天外事即謂崑崙池事非中國所見者也茫惚使人愁茫或作恍或作荒方云詹集作慌古慌與茫通駑駘謂騏驥餓死余爾羞餓或作飢有能必見用有德必見收孰云時與命通塞皆自由騏驥不敢言低徊但垂頭人皆劣騏驥共以駑駘優喟余獨興歎才命不同謀寄詩同心子為我商聲謳商聲秋聲也記曰愛者冝歌啇選諒懷詩素質遊商聲悽愴傷我心詩或作言商或作髙馬猒榖此詩及其下出門皆未得志之辝馬猒榖兮士不猒粳籺音纈又胡骨切粗屑為籺土𬒳文繡兮士無䄈褐裋或作短方云前漢貨殖傳實用裋字董彥逺洪慶善皆嘗辨古無短褐字按䄈褐字兩漢如賈誼貢禹貨殖傳班彪劉平張衡傅凡六見無有作短字者班彪王命論短褐之襲漢書作裋文選則用丁𬋩切是唐儒方兩用之故少陵詩以長纓短褐為對而史記孟嘗君傳與戰國䇿墨子語蓋皆傳寫之訛公好古最深當以短為正今按戰國䇿鄰有短褐一作裋史記士不得短褐司馬貞曰短亦音竪班彪王命論短褐之襲韋昭曰短當為䄈裋襦也字皆正作短注中乃云䄈字竪音又淮南子亦云巫馬期才衣短褐而髙誘無説則亦末必皆傳寫之誤也又柳子厚亦嘗用之則安知韓公之必不然乎今兩存之以俟知者彼其得志兮不我虞一朝失志兮其何如巳焉哉嗟嗟乎鄙夫出門長安百萬家出門無所之豈敢尚幽獨與丗實參差古人雖巳死書上有其辭其或作遺開卷讀且想千載若相期出門各有道我道方未夷且於此中息天命不吾欺命或作誠嗟哉董生行淮水出桐柏山東馳遙遙千里不能休遙遙一作悠悠淝水淝音肥水名在廬江出其側不能千里百里入淮流百上或無里字壽州屬縣有安豐唐貞元時元下或有年字縣人董生召南隱居行義於其中召或作邵刺史不能薦天子不聞名聲爵祿不及門門外惟有吏日來徴租更索錢方無更字非是嗟哉董生朝出至夜歸讀古人書盡日不得息或山而樵或水而漁而方並作於非是入厨具甘旨上堂問起居父母不戚戚妻子不咨咨方從閣杭蜀本作羞羞云此詩以三嗟哉易韻以羞叶居視古用韻也今按咨字自與居叶方於毛頴傳資字論之矣何獨於此而疑之邪羞羞韻雖可叶然殊無理而可笑方之主此又其酷言三本之誤也或恐本是嗟字叶音子余反而誤作羞字耳然亦不如且作咨字之見成穩當也嗟哉董生孝且慈董召南壽州安豐人公嘗有送董生遊河北序且日董生舉進士嘗不得志於有司而此詩敘其孝且慈如此東坡姚氏三瑞堂詩云君不見董召南隱居行義孝且慈天公亦恐無人知故令雞狗相哺兒又令韓老為作詩尓來三百年名與淮水肥人不識惟有天翁知方無有字非是生祥下瑞無時期家有狗乳出求食雞來哺其兒啄啄庭中拾蟲蟻哺之不食鳴聲悲傍徨躑躅久不去以翼來覆待狗歸嗟哉董生誰將與儔時之人夫妻相虐兄弟為讎食君之祿而令父母愁亦獨何心嗟哉董生無與儔或作誰將與儔或作將無與儔或作誰與儔今按上句誰將與儔疑而問之之詞也此云無與儔答而決之之詞也烽火登髙望烽火誰謂塞塵飛王城富且樂曷不事光輝勿言日巳暮相見恐行稀願君熟念此秉燭夜中歸我歌寧自感乃獨淚霑衣汴州亂汴州城門朝不開汴州自大曆後多兵董晉卒軍司馬陸長源揔留後事八日而軍亂殺長源等監軍俱文珍密召宋州刺史劉逸凖使揔後務朝廷從之賜名全諒公時巳從晉喪出汴四日實正元十五年二詩蓋譏德宗姑息之政云天狗狀如犬流星有聲其下正地類狗必有破軍殺將之兆墮地聲如雷健兒爭誇殺留後誇或作誘連屋纍棟燒成灰纍棟或作纍纍諸侯咫尺不能救孤士何者自興哀母從子走者為誰大夫夫人留後兒昨日乘車騎大馬坐者起趨乘者下廟堂不肯用干戈肯或作敢嗚呼奈汝母子何利劒利劒光耿耿佩之使我無邪心故人念我寡徒侶寡或作無徒或作儔持用贈我比知音我心如氷劒如雪不能刺讒夫使我心腐劒鋒折決雲莊子説劒上決浮雲下絶地紀中斷開青天噫劒與我俱變化晉雷煥事歸黃泉齪齪齪齪當丗士所憂在飢寒但見賤者悲不聞貴者歎音灘大賢事業異逺抱非俗觀報國心皎潔念時涕汍瀾妖姬坐左右柔指發哀彈酒肴雖日陳感激寧為歡秋隂欺白日欺方作蔽今按作蔽固古語然作欺尤有味也泥潦不少乾河堤決東郡老弱隨驚湍天意固有屬誰能詰其端屬或作謂或作以詰方作語今按謂以語不若作屬詰為深切願辱太守薦得充諌諍官諌諍方作爭臣今按爭臣下更著官字語復非是排雲呌閶闔天門也楚詞排閶闔而望豫披腹呈琅玕致君豈無術自進誠獨難卷終
