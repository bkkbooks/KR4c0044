front:
  text: 朱文公校昌黎先生外集卷之四考異音釋附
  hash: sha256:4c25ba6a8e4f7bb0fd4d763f5056170998f3df5ad80275a68a95f7101181b83d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_046-1a}
body:
  text: 通解洪日通解擇言解鄠人對或云皆少作陳斉之云通觧之乎者也下皆未當此雖少作然亦本訛也今之人以一善爲行而恥爲之慕達節而稱夫通才者多矣然而脂韋汨没以至於老死者相継亦未見他之稱他下或有人字今按此句疑有脫誤其豈非亂教賊名之術歟乱或作害且五常之教與天地皆生然而天下之人不得其師終不能自知而行之矣地下方有而字非是故堯之前千萬年天下之人促促然不知其譲之爲美也於是許由哀天下之愚且以爭爲能廼脫屣其九州髙揖而辭堯由是後之人竦然而言曰雖天下猶有薄而不售者況其小者乎或作焉下同故譲之敎行於天下許由爲之師也爲之或作之爲下二語同自桀之前千萬年天下之人循循然不知忠易其死也故龍逄哀天下之不仁覩君父百姓入水火而不救於是進盡莫言退就割烹就下或有其字非是故後之臣竦然而言曰雖萬死猶有忠而不懼者况其小者乎故忠之敎行於天下由龍逄爲之師也忠之上或有其字非是自周之前千萬年渾渾然不知義之可以換其生也周或作殷方无以字故伯夷哀天下之偷且以彊則服食其葛薇逃山而死之下或有人字服或作伏且以彊則服一句或有脫誤故後之人竦然而言曰雖餓死猶有義而不懼者况其小者乎故或作於是義或作死或作強故義之教行於天下由伯夷爲之師也是三人俱以一身立教而爲師於百千萬年閒其身亡而其敎存扶持天地功亦厚矣或无百字存下或有於字功上或有而字嚮令三師恥獨行慕通逹則堯之日必曰得位而濟道安用譲爲用或作能夏之日必曰長進而否退安用死爲周之日必曰和光而同塵安用餓爲和光而同塵方作同塵而和光若然者天下之人促促然而爭循循然而佞渾渾然而偷其何懼而不爲哉是則三師生於仐必謂偏而不通者矣其可不謂之大賢人者哉方无則字必字謂偏作爲偏矣作也矣上或无者字嗚呼今之人其慕通逹之爲弊也且古聖人言通者蓋百行衆藝備於身而行之者也而上或有通字今恒人之言通者蓋百行衆藝闕於身而求合者也是則古之言通者通於道義今之言通者通於私曲其亦異矣古之仐之下或並有人字將欲齊之者其不猶矜糞丸而擬質隨珠者乎或无其字或无不字或无之矜二字且令今父兄教其子弟者曰爾當通於行如仲尼雖愚亦亦知其不能也方无亦字也或作邪非是曰爾尚力一行如古之一賢雖中人亦希其能矣賢上或無一字豈不由聖可慕而不可齊邪賢可及而可齊也也方作邪今按恐上句无邪字下句也字却當作邪今之人行未能及乎賢而欲齊乎聖者亦見其病矣夫古人之進修或幾乎聖人今之人行不出乎中人而恥乎力一行爲獨行且曰我通同如聖人進修或作中人非是我下或有周字同字疑衍彼其欺心邪吾不知矣彼其欺人而賊名邪吾不知矣余懼其說之將深爲通解擇言解韓日此篇雖日擇言甚於水火然曰知理者必擇於言則未嘗欲人緘嘿苟容而巳不然則幕中之評臺中之辨公豈遂忘言乎哉火洩於密而爲用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反爲災矣乎方作於方无其字下二語同水發於深而爲用且逺能不違於道可浮可載可飲可灌以濟乎生物及其導而不防反爲患矣乎方作於言起於微而爲用且博能不違於道可化可令可告可訓以推於生物及其縱而不愼反爲禍矣火旣我災有水而可伏其熖能使不䧟於灰燼矣䧟或作蹈或作熖水旣我患有土而可遏其流能使不仆於波濤矣方无而可字言旣我禍即無以掩其辭能不罹於過者亦鮮矣於過或作其失過下方有失字所以知理者又焉得不擇其言歟其爲愼而甚於水火言上方无其字而字恐誤鄠人對樊日新史孝友傳云唐時陳藏器注本草拾遺謂人肉治棄疾自是民間以父母疾多封股肉以進或紿帛或旌門善乎韋愈之論胃父母疾烹藥餌以是爲孝未聞毀肢体者也鄠有以孝爲旌門者乃本其自於鄠人曰彼自剔股以奉母疾瘳大夫以聞其令尹令尹以聞其上上俾聚土以旌其門使勿輸賦以爲後勸孝下爲字疑衍又疑是而字其門或无其字以爲或作欲爲按尹謂京兆尹令字恐衍下同鄠大夫常曰他邑有是人乎愈曰母疾則止於烹粉藥石以爲是未聞毀傷支體以爲養在教未聞有如此者或无愈字或无止字母下十二字本作父毋疾烹藥餌以是爲孝今按是字或是事字按下文又有未聞字此未聞字恐衍或是若夫字之類苟不傷於義則聖賢當先衆而爲之也聖賢方作賢聖是不幸因而致死則毀傷㓕絶之罪有歸矣其爲不孝得無甚乎而下或有此字仐按此句上是字疑是耳字苟有合孝之道又不當旌門蓋生人之所宜爲竭足爲異乎苟或作若合下疑有乎字或无足字旣以一家爲孝是辨一邑里皆無孝矣以一身爲孝是辨其祖父皆無孝矣然或䧟於危難能固其忠孝而不苟生之逆亂以是而死者乃旌表門閭爵禄其子孫斯爲爲勸巳矧非是而希免輸者乎生之方云刘仲忱謂之當作於恐或然也表下或有其字曽不以毀傷爲罪㓕絶爲憂不腰於市而巳黷於政况復旌其門爲憂或作其憂非是河南府同官記方无府字永貞元年愈自陽山移江陵法曹參軍獲事河東公公嘗與其從事言建中𥘉天子始紀年更元命官司舉貞觀開元之烈方无下公字烈或作例或作列非是羣臣惕慄奉職命材登良不敢私違當時自齒朝之士而上以及下百執事官闕一人將𥙷必取其良百下方有吏字然而河南同時於天下稱多獨得將相五人或无同時二字方无将字今按下文所記实為宰相者三人裴碩未為真相故特著其官聀戎馬之盛則此処宜有將字方本誤也故於府之參軍則得我公於河南主簿則得故相國范陽盧公邁於汜水主簿則得故相國今太子賔客滎陽鄭公餘慶下相國上方无故字今按故相猶仐言前宰相非亡没之謂方本誤也於陸渾主簿則得相國今吏部侍郎天水趙公宗儒相囯今或作仐相囯於登封主簿則得故吏部尚書東都留守呉郡顧公少連故下方有相囯字今以下文考之非是盧公去河南爲右𥙷闕其後由尚書左丞至宰相鄭公去汜水爲監察御史佐山南軍其後由工部侍郎至宰相罷而又爲趙公去陸渾爲右拾遺其後由給事中爲宰相中爲或作中至顧公去登封爲監察御史其後由京兆尹至吏部尚書東都留守我公去府爲長水尉其後由膳部郎中爲荆南節度行軍司馬遂爲節度使自正部尚書至吏部尚書三相國之勞在史冊顧吏部愼職小心于時有聲在上或有布字我公愿潔而沈密開亮而卓偉行茂于宗事脩于官嗣紹家烈不違其先作帥南荆厥聞休顯武志旣揚文教亦熈登槐賛元其慶且至帥或作扞亦方作旣故好語故事者以爲五公之始迹也同其後進而偕大也亦同其稱名臣也又同官職雖分而功德有巨細其有忠勞於國家也同有若將同其後而先同其𥘉也或无官聀字分作則属之下文而无而字忠上或无有字家下或无也字有聞而問者於是焉書旣五年始立石刻其語河南府參軍舎庭中方无有方語下方有于字於時河東公爲左僕射宰相出藩大邦開府漢南時或作是鄭公以工部尚書留守東都趙公以吏部尚書鎮江陵漢南地連七州戎士十萬其官宰相也留守之官居禁省中歳時出旌旗序留司文武百官於宮城門外而衙之守下方无之字江陵故楚都也戎士五萬三公同時千里相望可謂盛矣河東公名均姓裴氏記宜城驛方作宜城驛記下或有愈代姪孫作五字此驛置在古宜城内驛東北有井傳是昭王井有靈異至今人莫汲内下或有復出宜城字方无昭字驛前水傳是白起堰西山下澗灌此城壞楚人多死流城東陂臭聞逺近因號其陂臭陂有蛟害人漁者避之或脫堰字臭陂上或有曰字井東北數十歩有楚昭王廟有舊時髙木方株多不得其名歷代莫敢剪伐尤多古松大竹或无昭字名方作始于太傳帥㐮陽遷宜城縣并改造南境數驛材木取足此林或无陽字舊廟屋極宏盛今惟草屋一區然問左側人尚云毎歳十月民相率聚祭其前廟後小城蓋王居也後或作複其内處偏髙廣貟八九十畒號殿城當是王朝内之所也城或作域朝或作席多甎可爲書硯自小城内地今皆屬甄音真氏甄氏於小城北立墅以居甄氏有節行其子逢以學行爲助敎元和十四年二月二日題題李生壁平余始得李生於河中今相遇於下邳自始及今十四年矣邳或作邽非是洪云下邳貞觀中属泗元和中属徐始相見吾與之皆未冠未通人事追思多有可笑者與生皆然也今者相遇皆有妻子昔時無度量之心寕復可有是生之爲交何其近古人也近下方有於字是來也余黜於徐州將西居於洛陽汎舟於清冷池泊於文雅臺下西望商丘東望脩竹園入微子廟求鄒陽校叔司馬相如之故文乆立於廟陛間悲那頌之不作於是者巳乆丘或作州非是庿陛間或作庿下或作庿下陛間頌之方作之頌今按庿字疑衍或是廟字隴西李翶太原王涯上谷侯喜實同與焉涯或作渥貞元十六年五月十四日昌黎韓愈書朱文公校昌黎先生外集卷之四
