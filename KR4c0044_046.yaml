front:
  text: 朱文公校昌黎先生外集卷之四考異音釋附
  hash: sha256:4c25ba6a8e4f7bb0fd4d763f5056170998f3df5ad80275a68a95f7101181b83d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_046-1a}
body:
  text: 通解洪日通解擇言解鄠人對或云皆少作陳齊之云通解之乎者也下皆未當此雖少作然亦本訛也今之人以一善為行而恥為之慕達節而稱夫通才者多矣然而脂韋汨沒以至於老死者相繼亦未見他之稱他下或有人字今按此句疑有脫誤其豈非亂教賊名之術歟亂或作害且五常之教與天地皆生然而天下之人不得其師終不能自知而行之矣地下方有而字非是故堯之前千萬年天下之人促促然不知其讓之為美也於是許由哀天下之愚且以爭為能乃脫屣其九州髙揖而辭堯由是後之人竦然而言曰雖天下猶有薄而不售者況其小者乎或作焉下同故讓之教行於天下許由為之師也為之或作之為下二語同自桀之前千萬年天下之人循循然不知忠易其死也故龍逄哀天下之不仁覩君父百姓入水火而不救於是進盡莫言退就割烹就下或有其字非是故後之臣竦然而言曰雖萬死猶有忠而不懼者况其小者乎故忠之教行於天下由龍逄為之師也忠之上或有其字非是自周之前千萬年渾渾然不知義之可以換其生也周或作殷方無以字故伯夷哀天下之偷且以強則服食其葛薇逃山而死之下或有人字服或作伏且以強則服一句或有脫誤故後之人竦然而言曰雖餓死猶有義而不懼者况其小者乎故或作於是義或作死或作強故義之教行於天下由伯夷為之師也是三人俱以一身立教而為師於百千萬年間其身亡而其教存扶持天地功亦厚矣或無百字存下或有於字功上或有而字嚮令三師恥獨行慕通逹則堯之日必曰得位而濟道安用讓為用或作能夏之日必曰長進而否退安用死為周之日必曰和光而同塵安用餓為和光而同塵方作同塵而和光若然者天下之人促促然而爭循循然而佞渾渾然而偷其何懼而不為哉是則三師生於仐必謂偏而不通者矣其可不謂之大賢人者哉方無則字必字謂偏作為偏矣作也矣上或無者字嗚呼今之人其慕通逹之為弊也且古聖人言通者蓋百行衆藝備於身而行之者也而上或有通字今恆人之言通者蓋百行衆藝闕於身而求合者也是則古之言通者通於道義今之言通者通於私曲其亦異矣古之仐之下或並有人字將欲齊之者其不猶矜糞丸而擬質隨珠者乎或無其字或無不字或無之矜二字且令今父兄教其子弟者曰爾當通於行如仲尼雖愚亦亦知其不能也方無亦字也或作邪非是曰爾尚力一行如古之一賢雖中人亦希其能矣賢上或無一字豈不由聖可慕而不可齊邪賢可及而可齊也也方作邪今按恐上句無邪字下句也字却當作邪今之人行未能及乎賢而欲齊乎聖者亦見其病矣夫古人之進修或幾乎聖人今之人行不出乎中人而恥乎力一行為獨行且曰我通同如聖人進修或作中人非是我下或有周字同字疑衍彼其欺心邪吾不知矣彼其欺人而賊名邪吾不知矣余懼其説之將深為通解擇言解韓日此篇雖日擇言甚於水火然曰知理者必擇於言則未嘗欲人緘默苟容而巳不然則幕中之評臺中之辨公豈遂忘言乎哉火泄於密而為用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反為災矣乎方作於方無其字下二語同水發於深而為用且逺能不違於道可浮可載可飲可灌以濟乎生物及其導而不防反為患矣乎方作於言起於微而為用且博能不違於道可化可令可告可訓以推於生物及其縱而不愼反為禍矣火既我災有水而可伏其熖能使不陷於灰燼矣陷或作蹈或作熖水既我患有土而可遏其流能使不仆於波濤矣方無而可字言既我禍即無以掩其辭能不罹於過者亦鮮矣於過或作其失過下方有失字所以知理者又焉得不擇其言歟其為愼而甚於水火言上方無其字而字恐誤鄠人對樊日新史孝友傳云唐時陳藏器注本草拾遺謂人肉治棄疾自是民間以父母疾多封股肉以進或紿帛或旌門善乎韋愈之論胃父母疾烹藥餌以是為孝未聞毀肢體者也鄠有以孝為旌門者乃本其自於鄠人曰彼自剔股以奉母疾瘳大夫以聞其令尹令尹以聞其上上俾聚土以旌其門使勿輸賦以為後勸孝下為字疑衍又疑是而字其門或無其字以為或作欲為按尹謂京兆尹令字恐衍下同鄠大夫常曰他邑有是人乎愈曰母疾則止於烹粉藥石以為是未聞毀傷支體以為養在教未聞有如此者或無愈字或無止字母下十二字本作父毋疾烹藥餌以是為孝今按是字或是事字按下文又有未聞字此未聞字恐衍或是若夫字之類苟不傷於義則聖賢當先衆而為之也聖賢方作賢聖是不幸因而致死則毀傷滅絶之罪有歸矣其為不孝得無甚乎而下或有此字仐按此句上是字疑是耳字苟有合孝之道又不當旌門蓋生人之所宜為竭足為異乎苟或作若合下疑有乎字或無足字既以一家為孝是辨一邑里皆無孝矣以一身為孝是辨其祖父皆無孝矣然或陷於危難能固其忠孝而不苟生之逆亂以是而死者乃旌表門閭爵祿其子孫斯為為勸巳矧非是而希免輸者乎生之方云劉仲忱謂之當作於恐或然也表下或有其字曽不以毀傷為罪滅絶為憂不腰於市而巳黷於政况復旌其門為憂或作其憂非是河南府同官記方無府字永貞元年愈自陽山移江陵法曹參軍獲事河東公公嘗與其從事言建中𥘉天子始紀年更元命官司舉貞觀開元之烈方無下公字烈或作例或作列非是羣臣惕栗奉職命材登良不敢私違當時自齒朝之士而上以及下百執事官闕一人將輔必取其良百下方有吏字然而河南同時於天下稱多獨得將相五人或無同時二字方無將字今按下文所記實為宰相者三人裴碩未為真相故特著其官聀戎馬之盛則此處宜有將字方本誤也故於府之參軍則得我公於河南主簿則得故相國范陽盧公邁於汜水主簿則得故相國今太子賔客滎陽鄭公餘慶下相國上方無故字今按故相猶仐言前宰相非亡沒之謂方本誤也於陸渾主簿則得相國今吏部侍郎天水趙公宗儒相國今或作仐相國於登封主簿則得故吏部尚書東都留守吳郡顧公少連故下方有相國字今以下文考之非是盧公去河南為右輔闕其後由尚書左丞至宰相鄭公去汜水為監察御史佐山南軍其後由工部侍郎至宰相罷而又為趙公去陸渾為右拾遺其後由給事中為宰相中為或作中至顧公去登封為監察御史其後由京兆尹至吏部尚書東都留守我公去府為長水尉其後由膳部郎中為荆南節度行軍司馬遂為節度使自正部尚書至吏部尚書三相國之勞在史册顧吏部愼職小心于時有聲在上或有布字我公願潔而沈密開亮而卓偉行茂于宗事修于官嗣紹家烈不違其先作帥南荆厥聞休顯武志既揚文教亦熙登槐贊元其慶且至帥或作扞亦方作既故好語故事者以為五公之始迹也同其後進而偕大也亦同其稱名臣也又同官職雖分而功德有巨細其有忠勞於國家也同有若將同其後而先同其𥘉也或無官聀字分作則屬之下文而無而字忠上或無有字家下或無也字有聞而問者於是焉書既五年始立石刻其語河南府參軍舍庭中方無有方語下方有于字於時河東公為左僕射宰相出藩大邦開府漢南時或作是鄭公以工部尚書留守東都趙公以吏部尚書鎮江陵漢南地連七州戎士十萬其官宰相也留守之官居禁省中歲時出旌旗序留司文武百官於宮城門外而衙之守下方無之字江陵故楚都也戎士五萬三公同時千里相望可謂盛矣河東公名均姓裴氏記宜城驛方作宜城驛記下或有愈代姪孫作五字此驛置在古宜城內驛東北有井傳是昭王井有靈異至今人莫汲內下或有復出宜城字方無昭字驛前水傳是白起堰西山下澗灌此城壞楚人多死流城東陂臭聞逺近因號其陂臭陂有蛟害人漁者避之或脫堰字臭陂上或有曰字井東北數十步有楚昭王廟有舊時髙木方株多不得其名歷代莫敢剪伐尤多古松大竹或無昭字名方作始于太傳帥襄陽遷宜城縣并改造南境數驛材木取足此林或無陽字舊廟屋極宏盛今惟草屋一區然問左側人尚云每歲十月民相率聚祭其前廟後小城蓋王居也後或作復其內處偏髙廣貟八九十畒號殿城當是王朝內之所也城或作域朝或作席多甎可為書硯自小城內地今皆屬甄音真氏甄氏於小城北立墅以居甄氏有節行其子逢以學行為助教元和十四年二月二日題題李生壁平余始得李生於河中今相遇於下邳自始及今十四年矣邳或作邽非是洪云下邳貞觀中屬泗元和中屬徐始相見吾與之皆未冠未通人事追思多有可笑者與生皆然也今者相遇皆有妻子昔時無度量之心寧復可有是生之為交何其近古人也近下方有於字是來也余黜於徐州將西居於洛陽泛舟於清冷池泊於文雅臺下西望商丘東望修竹園入微子廟求鄒陽校叔司馬相如之故文久立於廟陛間悲那頌之不作於是者巳久丘或作州非是庿陛間或作庿下或作庿下陛間頌之方作之頌今按庿字疑衍或是廟字隴西李翶太原王涯上谷侯喜實同與焉涯或作渥貞元十六年五月十四日昌黎韓愈書朱文公校昌黎先生外集卷之四
