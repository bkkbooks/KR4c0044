front:
  text: 朱文公校昌黎先生集卷之三十四考異音釋附
  hash: sha256:fdcff63bbc6ddf1609277d5239f9035d9cbf4ecce292a1c25be8fc234d0bf821
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_034-1a}
body:
  text: 碑志南陽樊紹述墓志銘補注後山詩話歐陽公謂退之為樊宗師墓志便似樊文其始出於司馬子長子長為長卿傳如其文惟其過之故兼之也樊紹述既卒且葬愈將銘之從其家求書得書號魁紀公者三十卷曰樊子者又三十卷春秋集傳十五卷表箋狀策書序傳記紀志説論今文讃銘凡二百九十一篇志上方無紀字道路所遇及器物門里雜銘二百二十賦十詩七百一十九一十或作又十曰多矣哉古未嘗有也然而必出於巳不襲蹈前人一言一句洪曰國史補云元和之後文章則學竒於韓愈學澀於樊宗師退之作樊墓志稱其為文不剽襲觀絳守居園池記誠然亦太竒澀矣本朝王晟劉忱皆為之注解如瑶翻碧瀲嵬眼傾耳等語皆前人所未道也歐陽公跋絳守居園池語云元和文章之盛極矣其竒怪至於如此又詩曰嘗聞紹述絳守居偶來登覽周四偶異哉樊子怪可吁心欲獨去惟古於詞必巳出降而不能乃剽賊方作脫後皆指前公相襲從漢迄仐用一律寥寥久哉莫覺屬覺方作學非是神徂聖伏道絶塞既極乃通發紹述文從字順各識識有欲求之此其躅中大夫陜府左司馬李公墓志銘公諱郱蒲經切字某雍王繪之後繪或作會方從新舊史作繪王孫道明唐𥘉以屬封淮陽王又追王其祖父曰雍王長平王下或有長平生淮陽五字淮陽生景融景融親益踈不王生務該生思一思一生岌魚級切比四丗官不過縣令州佐然益讀書為行為士大夫家岌為蜀州晉原尉原或作康生公未晬祖對切子生一歲曰晬説文周年也以卒無家母抱置之姑氏以去姑憐而食之至五六歲自問知本末因不復與羣兒戲常默默擉處曰吾獨無父母不力學問自立不名為人年十四五能暗記論語尚書毛詩左氏文選凡百餘萬言凛然殊異姑氏子弟莫敢為敵浸傳之聞諸父敵方作嬌非是之聞或作聞之諸父泣曰吾兄尚有子耶迎歸而坐問之應對橫從無難諸父悲喜顧語羣子弟曰吾為汝得師話或作謂或無曰字無吾字於是縱學無不觀以朝邑貟外尉選魯公真卿第其所試文上等文下或有為字擢為同官正尉曰文如李尉乃可望此其後比以書判拔萃選為萬年尉或無比字為華州録事參軍爭事爭事於刺史去官為陸渾令河南尹鄭餘慶薦之朝拜南鄭興元府屬縣令尹家奴以書抵縣請事公走府出其書投之尹前尹慚其廷中人曰令辱我令辱我方云漢張耳傳李良素貴起慚其從官又袁盎還愧其吏公此文與劉昌裔志皆用此或無復出令辱我三字且曰令退遂怨之拾掇三年無所得方無所字拜宗正丞宰相以文理白為資州刺史公喜曰吾將有為也讒宰相者言之上曰是與其故故得用方無者字非是改拜陜府左司馬公又喜曰是官無所職吾其不以吏事受責死矣長慶元年正月丙辰以疾卒春秋七十三方無正月字而云李本作正月蓋正月十八日也仐按是年辛丑嵗丙辰非嵗名則為日名而在月下為是方知日辰所直而不以李本輔正月字不可曉也公內外行完潔白奮厲再成有家士大夫談之夫人博陵崔氏朝邑令友之之女其曾伯父玄暐有功中宗時夫人髙明遇子婦有節法進見侍側肅如也七男三女邠為澄城主簿其嫡激鄜城令激下或有為字放芮城尉漢監察御史滻洸潘皆進士及公之存內外孫十有五人五月庚申葬華隂縣東若干里漢韓氏壻也故豫與為銘其詞曰愈下而微既極復飛其自公始公多孫子將復廟祀廟方作其今按唐會要禮官議户部尚書韋損四代祖所立私廟子孫官卑其祠久廢仐損官三品凖令合立三廟此以郱之先嘗有王封而後丗官卑不得立廣故云將復廟祀也然唐制亦非古而本朝立法尤踈略雄蘇愧公嘗議立廟與襲爵之法相為表裏其説為善惜乎當時不施行也故幽州節度判官贈給事中清河張君墓志銘張君名徹字某以進士纍官至范陽府監察御史長慶元年仐牛宰相為御史中丞奏君名迹中御史選元或作二方云考之史當作元年陳齊之云常疑牛僧孺之為人觀此語則知韓公亦不喜其人矣然牛宰相三子或作仐宰相牛公未知孰是詔即以為御史其府惜不敢留遣之而密奏幽州將父子繼續不廷選且久仐新收臣又始至孤怯須強佐乃濟發半道有詔以君還之仍遷殿中侍御史加賜朱衣銀魚仍或作乃至數日軍亂怨其府從事盡殺之而囚其帥且相約張御史長者毋侮辱轢蹙我事無庸殺置之帥所毋或作無我事下方有無罪二字居月餘聞有中貴人自京師至君謂其帥公無負此土人上使至可因請見自辨幸得脫免歸即推門求出或無免字守者以告其魁魁與其徒皆駭曰必張御史張御史忠義必為其帥告此史下方無張字及無告此二字按告字疑當作言餘人不如遷之别館仐按餘人二字疑衍而下文不如遷之别館自為一句蓋述其言如此下文又云即與衆出君乃記其事也但無所考不敢輒刪耳或云餘人字不必去其日遷之别館蓋言今當如此耳亦通即與衆出君與或作以君出門罵衆曰汝何敢反前日吳元濟斬東市昨日李師道斬於軍中同惡者父母妻子皆屠死肉餧狗鼠鴟鴉汝何敢反汝何敢反行且罵衆畏惡其言不忍聞畏下或有皆字非是或在畏上則或有之且虞生變即擊君以死君抵死口不絶罵衆皆曰義士義士或收瘞之以俟事聞天子壯之贈給事中其友侯雲長佐鄆使請於其帥馬僕射為之選於軍中得故與君相知張恭李元實者使以幣請之范陽恭或作泰范陽人義而歸之以聞詔所在給船輿傳歸其家賜錢物以葬長慶四年四月某日其妻子以君之喪葬于某州某所四年方云舊本或作二年或作三年按鄆帥馬揔也揔以二年狄遷右僕射明年夏召還當作二年或三年也今按方説雖如此而其所定之本却作四年今姑從之蓋或喪歸踰年馬既召還乃克葬也君弟復亦進士佐汴宋得疾變易喪心驚惑不常君得間即自視衣褥薄厚節時其飲食而匕筯進養之褥或作衾或無養字仐按養字去聲禮曰以其飲食忠養之禁其家無敢髙語出聲醫餌之藥其物多空青雄黃諸竒怪物劑錢至十數萬營治勤劇皆自君手不假之人家貧妻子常有飢色祖某某官父某某官祖某父某或作祖踐父休妻韓氏禮部郎中某之孫汴州開封尉某之女於余為叔父孫女君常從余學選於諸生而嫁與之孝順祇修羣女效其所為男若干人曰某女子曰某銘曰嗚呼徹也丗慕顧以行子揭揭音羯也噎喑上一結切下於金切以為生子獨割也為彼不清作玉雪也仁義以為兵用不缺折也缺折或作折缺知死不失名得猛厲也自申于暗明莫之奪也暗明當作明暗説見下條我銘以貞之不肖者之呾相呵也音怛也方無者字或無之字方云此銘以徹揭割雪折厲奪呾為韻而行生清兵名暗貞復自為韻厲音烈暗當讀如諒暗之暗今按方説多得之此銘蓋法兔罝魚麗等詩隔句用韻耳詩隔句用韻先儒所未知觀公此銘則既識之矣但暗明二字乙之則韻自叶而義亦勝若如方説則雖讀暗作䳺韻終不叶而義亦不通也河南府法曹參軍盧府君夫人苗氏墓志銘或無府苗氏三字或作范陽盧君夫人苗氏夫人姓苗氏諱某字某上黨人曽大父襲夔贈禮部尚書大父殆庶贈太子太師父如蘭仕至太子司議郎汝州司馬或作别駕方云丗系表作永王府􅖴議參軍夫人年若干嫁河南法曹盧府君諱貽有文章德行府君字范復出河南或作范賜其族丗所謂甲乙者先夫人卒或作卒先夫人夫人生能配其賢殁能守其法男二人於陵渾女三人皆嫁為士妻貞元十九年四月四日卒於東都敦化里年六十有九其年七月某日祔于法曹府君墓在洛陽龍門山其年或作其明年七或作八其季女壻昌黎韓愈為之志之下或有銘字或有銘字而無之字其詞曰赫赫苗宗族茂位尊或毗于王或二于藩是生夫人載穆令聞是或作厥爰𥘉在家孝友惠純乃及于行克嫓德門乃及或作享乃克或作光肅其為禮𥙿其為仁為禮方作禮容今以下句為仁偶之方説非是法曹之終諸子實幼煢煢其哀介介其守循道不違厥聲彌劭或作既克其家厥問愈劭三女有從二男知教閭里歎息母婦思效歲時之嘉嫁者來寧纍纍外孫有攜有嬰纍纍或作纍纍扶牀坐膝嬉戲歡爭既壽而康既備而成不歉于約不矜于盈伊昔淑哲或圖或書嗟咨夫人孰與為儔刻銘置墓以贊碩休鉻或作石置或作志書儔休以古韻叶巳見溪堂詩故貝州司法參軍李君墓志銘參軍李翺習之之祖習之嘗自為其皇祖實録其行治皆如志所書翺之實録終曰先祖有美而不知不明也知而不傳不仁也翺欲傳懼文章不足以稱頌道德光耀來丗是以頓首欲假辭於執事者亦惟不斥其愚而為之傳焉意翺乞公銘之辭也貞元十七年九月丁卯隴西李翶合葬其皇祖考貝州司法恭軍楚金皇祖妣清河崔氏夫人于汴州開封縣某里七或作八月下或有一日字開封縣某里或作陳留縣安曹里後開封字同昌黎韓愈紀其丗著其德行以識其葬識或作志其丗曰由梁武昭王六丗至司空其丗或作其詞至或作有司空之後二丗為刺史清淵侯由侯至于貝州凡五丗其德行曰事其兄如事其父其行不敢有出焉或無曰字其夫人事其姒如事其姑其於家不敢有􅌹焉姒或作姊其在貝州其刺史不恱於民將去官民相率歡譁手瓦石胥其出擊之刺上或無其字方云據李翶集刺史嚴正晦也胥或作須或作需或無其字方云史記趙丗家太后盛氣胥之入又廉頗傳胥後今注胥猶須也刺史匿不敢出州縣吏由别駕巳下不敢禁司法君奮曰是何敢爾或無何字方無爾字屬小吏百餘人持兵仗以出仗或作杖立木而署之曰刺史出民有敢觀者殺之木下民聞皆驚相告散去後刺史至加擢任貝州由是大理加下或有禮字其葬曰或作日方云山谷李謝以古本定與上文其丗曰其德行曰為一例翶既遷貝州君之喪于貝州殯于開封遂遷夫人之喪于楚州八月辛亥至于開封壙于丁巳墳于九月辛酉窆彼驗切説文窆葬下棺也周禮及窆執斧是也于丁卯窆方作穸人謂李氏丗家也侯之後五丗仕不遂藴必發其起而大乎四十年而其兄之子衡始至户部侍郎君之子四人官又卑翺其孫也有道而甚文甚文出左傳楚子西日光又甚文觀翺實録亦可見甚文矣魯直詩云習之實録葬皇祖斯文如女有正色云云固於是乎在或無固字處士盧君墓志銘處士諱於陵其先范陽人父貽為河南法曹參軍河南尹與人有仇誣仇與賊通收掠取服法曹曰我官司也我在不可以為是廷爭之以死河南怒命卒捽之捽昨沒切捽擊也卒或作牽法曹爭尤強遂并收法曹竟奏殺仇籍其家而釋法曹法曹出徑歸卧家念河南勢弗可敗氣憤弗食歐血卒夷都人至今猶道之處士少而孤母夫人憐之讀書學文皆不待強教卒以自立在母夫人側油油翼翼不忍去時歲母夫人既終育幼弟與歸宗之妹經營勤甚未暇進仕也年三十有六元和二年五月壬辰以疾卒有男十歲曰義女九歲曰孟又有女生處士卒後未名孟下或無又字於其年九月乙酉其弟渾以家有無葬以車一乘於龍門山先人兆愈於處士妹壻也為其志且銘其後曰貴兮冨兮如其材得何數兮名兮壽兮如其人豈無有兮彼皆逢其臧子獨迎其凶兹命也邪兹命也邪故太學博士李君墓志銘學或作常太學博士頓丘李于余兄孫女壻也或無女字年四十八長慶三年正月五日卒其月二十六日穿其妻墓而合葬之在某縣某地子三人皆幼𥘉干以進士為鄂嶽從事遇方士柳泌從受藥法服之往往下血比四年病益急乃死柳泌説巳見前乃方作及非是其法以鉛滿一鼎按中為空實以水銀蓋封四際燒為丹沙云鼎下方有以物字實以方作以實余不知服食説自何丗起殺人不可討而丗慕尚之益至此其惑也在文書所記及耳聞相傳者不説方無相字今直取目見親與之遊而以藥敗者六七公以為丗誡工部尚書歸登殿中御史李虛中刑部尚書李遜遜弟刑部侍郎建襄陽節度使工部尚書孟簡東川節度御史大夫盧坦金吾將軍李道古此其人皆有名位丗所共識工部既食水銀得病自説若有燒鐡杖自顚貫其下者顚或作巔摧而為火射竅節以出狂痛號呼乞絶其茵席常得水銀發且止唾血數十年以斃茵或作裀方無常字殿中疽發其背死刑部且死謂余曰我為藥誤其季建一旦無病死襄陽黜為吉州司馬余自袁州還京師襄陽乘舸邀我於蕭洲屏人曰我得祕藥不可獨不死今遺子一器可用棗肉為丸服之别一年而病其家人至訊之曰前所服藥誤方且下之下則平矣病二歲竟卒一家方作有可所服下方有之字盧大夫死時溺出血肉痛不可忍乞死乃死大方作害今按古史肉或作寅今淮南子及內經靈樞當存此體疑此别未害字乃寅之訛而方考之不詳也乃死乃或作及或無死字皆非是金吾以柳泌得罪食泌藥五十死海上此可以為誡者也蘄不死乃速得死謂之智可不可也五穀三牲鹽醯果𬞞人所常御人相厚勉必曰強食今惑者皆曰五穀令人夭不能無食當務減節鹽醯以濟百味濟或作齊豚魚雞三者古以養老反曰是皆殺人不可食一筵之饌禁忌十常不食二三不信常道而務鬼怪臨死乃悔後之好者又曰彼死者皆不得其道也我則不然始病曰藥動故病病去藥行乃不死矣及且死又悔嗚呼可哀也巳可哀也巳江鄰幾云此志略不敘于丗代行事不知何也朱文公校昌黎先生集卷之三十四
