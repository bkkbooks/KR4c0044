body:
  text: 朱文公校昌黎先生外集卷之九考異音釋附順宗實録四起六月盡七月六月乙亥乙或作巳貶宣州巡官羊士諤爲汀州寕化縣尉士諤性傾躁時以公事至京遇叔文用事朋黨相􆃽頗不能平公言其非叔文聞之怒欲下詔斬之執誼不可則令杖殺之執誼又以爲不可遂貶焉由是叔文始大惡執誼往來二人門下者皆懼先時劉闢以劒南節度副使將韋皐之意于叔文求都領劒南三川謂叔文曰太尉使某致微誠於公若與其三川當以死相助若不用某亦當有以相酬使某或作使闢与其疑當作与某叔文怒亦將斬之而執誼固執不可闢尚遊京師未去至聞士諤遂逃歸尚下或有以字上或作貶今按士上當别有貶字左散騎常侍致仕張萬福卒萬福魏州元城人也自曽祖至父皆明經官止縣令州佐萬福以祖父業儒皆不逹不喜書學騎射年十七八從軍遼東有功爲將而還累遷至壽州刺史州送租賦詣京師至潁川界爲盗所奪萬福使輕兵馳入潁川界討之入潁川或作入穎州賊不意萬福至忙迫不得戦萬福悉聚而誅之盡得其所亡物并得前後所掠人妻子財物牛馬萬計悉還其家爲淮南節度崔圎所忌失刺史改鴻臚卿以節度副使將兵千人鎮壽州萬福不以爲恨許杲以平盧行軍司馬將卒三千人駐濠州不去有窺淮南意圎令萬福攝濠州刺史杲聞即提卒去止當塗陳莊賊䧟舒州圎又以萬福爲舒州刺史督淮南岸盗賊連破其黨大暦三年召赴京師代宗謂曰聞卿名乆欲一識卿且將累卿以許杲萬福拜謝因前曰陛下以許杲召臣如河北賊諸將叛以属何人代宗笑曰且欲議許杲事方當大用卿即以爲和州刺史行營防禦使督淮南岸盗賊至州杲懼移軍上元杲至楚州大掠節度使韋元甫命萬福討之未至淮隂杲爲其將康自勤所逐勤或作勸下同自勤擁兵繼掠循淮而東擁或作權萬福倍道追而殺之免者十二三盡得其所虜掠金銀婦女等皆獲致其家女或作人代宗詔以本州兵千五百人防秋京西遂帶和州刺史鎭咸陽固留宿衛固或作因李正已反將断江淮路令兵守埇橋渦口江淮進奉船千餘隻泊渦口不敢進德宗以萬福爲濠州刺史萬福馳至渦口立馬岸上發進奉船淄青將士停岸睥睨不敢動諸道継進改泗州刺史爲杜亞所忌徴拜左金吾衛將軍召見德宗驚曰杜亞言卿昏耄卿乃如是健耶圖形凌煙閣数賜酒饌衣服并勑度支籍口畜給其費至賀陽城等於延英門外天下益重其名二十一年以左散騎常侍致仕元和元年卒年九十萬福自始從軍至卒禄食七十年未嘗病一日典九郡皆有惠愛癸丑韋皐上表請皇太子監國又上皇太子牋尋而裴垍嚴綬表継至悉與皐同贈故忠州别駕陸贄兵部尚書故道州刺史陽城左常侍贄字敬輿呉郡人也年十八進士及第又以愽學宏詞授鄭縣尉書判拔萃授渭南尉遷監察御史未幾選爲翰林學士遷祠部貟外郎德宗幸奉天贄隨行在天下搔擾逺近徴發書詔一日数十下皆出於贄一日或作曰百非是贄操筆持紙成於須臾不復起草同職皆拱手嗟嘆不能有所助常啓德宗言方令書詔宜痛自引過罪巳以感人心昔成湯以罪巳致興後代推以爲聖人楚王失國亡走一言善而復其國至今稱爲賢者陛下誠能不恡改過以言謝天下臣雖愚陋爲詔詞無所忌諱庶能令天下叛逆者迴心喻㫖德宗從之故行在制詔始下聞者雖武人悍卒無不揮涕感激議者咸以爲德宗尅平冦難旋復天位不惟神武成功爪牙宣力蓋以文德廣彼腹心有助焉累迁考功郎中諌議大夫中書舎人兼翰林學士丁母憂免䘮權知兵部侍郎復入翰林中外屬意旦夕竢其爲相竇參深忌之贄亦短參之所爲且言其黷貨於是與參不能平㝷眞拜兵部侍郎知禮部貢舉於進士中得人爲多八年春遷中書侍郎平章事始令吏部毎年集選人舊事吏部毎年集人其後遂三年一置選選人猥至文書多不了尋勘眞僞紛雜吏因得大爲姦巧選士一蹉跌或至十年不得宫而官之闕者或累歳無人贄令吏部分内外官貟爲三分計闕集人以爲常其弊十去七八天下稱之𥘉竇參出李巽爲常州刺史且迫其行巽常衘之至參貶爲郴州别駕巽適遷湖南觀察德宗常與參言故相姜公輔罪參漏其語參敗公輔因上䟽自陳其事非臣之過德宗詰之知參洩其語怒未有所發㑹巽奏汴州節度劉士寜遺參金帛若干士寜得汴州參處其議士寜常德之故致厚貺德宗以參得罪而以武將交結發怒竟致參於死而議者多言參死由贄焉以武當作與武裴延齡判度支天下皆嫉怨而獨幸於天子朝廷無敢言其短者贄獨身當之日陳其不可用延齡固欲去贄而代之又知贄之不與已多阻其奏請也謗毀百端翰林學士吳通玄故與贄同職姦巧佻薄與贄不相能知贄與延齡相持有閒因盛言贄短宰相趙璟本贄所引同對嫉贄之權密以贄所戢彈延齡事告延齡戢通鑑作譏或作談戢弹或作彈戢延齡益得以爲計由是天子益信延齡而不直贄竟罷贄相以爲太子賔客而黜張滂李充等權按中滂充皆以論裴延齡得罪此但著黜滂充䓁而上文不言其所以得罪之由盖脫漏也言事者皆言其屈皆或作多贄固畏懼至爲賔客拒門不納交親士友春旱德宗数獵苑中延齡䟽言贄等失權怨望言於衆曰天下旱百姓且流亡度支愛惜不肯給諸軍軍中人無所食其事柰何以揺動羣心其意非止欲中傷臣而巳後數日又獵苑中㑹神䇿軍人跪馬前云度支不給馬草徳宗意延齡前言即迴馬而歸由是貶贄爲忠州别駕滂充皆斥逐德宗怒未解贄不可測頼陽城等救乃止贄之爲相常以少年入翰林得幸於天子長養成就之不敢自愛事之不可者皆爭之德宗在位乆益自攬持機柄親治細事失君人大體宰相益不得行其事職而議者乃云由贄而然贄居忠州十餘年常閉門不出入人無識面者避謗不著書習醫方集古今名方爲陸氏集驗方五十卷卒於忠州年五十二上𥘉即位與鄭餘慶陽城同徴詔始下而城贄皆卒城字亢宗北平人代爲官族好學貧不能得書乃求入集賢爲書冩吏竊官書讀之晝夜不出經六年遂無所不通乃去滄州中條山下州或作洲非是逺近慕其德行來學者相繼於道閭里有爭者不詣官府詣城以決之信用姦臣即率拾遺王仲舒数人守延英門上䟽論延齡姦佞贄等無罪狀德宗大怒召宰相入語將加城等罪良乆乃解令宰相諭遣之於是金吾將軍張萬福聞諌官伏閣諌趨徃至延英門大言賀曰朝廷有直臣天下必太平矣直臣或作直言遂徧拜城與仲舒等曰諸諌議能如此言事天下安得不太平也戓无也字巳而連呼太平萬歳太平萬歳萬福武人時年八十餘自此名重天下時朝夕相延齡城曰脫以延齡爲相當取白麻壞之慟哭於庭竟坐延齡事改國子司業至引諸生告之曰凡學者所以學爲忠與孝也諸生寜有乆不省其親乎明日謁城歸養者二十餘人有薛約者嘗學於城狂躁以言事得罪將徙連州客寄有根蔕吏縱求得城家縱疑當作蹤坐吏於門與約飲决别涕泣送之郊外德宗聞之以城爲黨罪人出爲道州刺史太學王魯卿李儻等二百七十人詣闕乞留住数日吏遮止之䟽不得上在州以家人禮待吏人宜罰者罰之宜賞者賞之一不以簿書介意賦稅不登賦稅或作稅賦觀察使数誚譲上考功第城自署第曰撫字心勞徴科政拙考下下觀察使嘗使判官督其賦至州怪城不出迎以問州吏吏曰刺史聞判官來以爲巳有罪自囚於獄不敢岀判官大驚馳入謁城於獄曰使君何罪某奉命來候安否耳留一兩日未去城固不復歸館門外有故門扇横地城晝夜坐卧其上判官不自安辭去其後又遣他判官崔某徃按之崔承命不辭載妻子一行中道而逃按或作或非是城孝友不忍與其弟異處皆不娶給侍終身有寡妹依城以居有生年四十餘癡不能如人常與弟負之以遊生或作甥或作男𥘉城之妹夫亡在他處家貧不能葬城親與其弟舁尸以歸葬於其居之側往返千餘里卒時年六十餘戊午以戸部侍郎潘孟陽爲度支塩鐵轉運副使其日王伾詐稱疾自免自叔文歸第伾日詣中人并杜佑請起叔文爲相且㧾北軍旣不得請以威逺軍使平章事又不得其黨皆憂悸不自保伾至其日生翰林中䟽三上不報知事不濟行且卧至有忽呌曰伾中風矣明日遂輿歸不出戊子以禮部侍郎權德輿爲户部侍郎以倉部郎中判度支陳諌爲河中少尹伾叔文之黨於是始去乙未詔軍國政事宜權令皇太子某勾當百辟羣后中外庶僚悉心輔翼以底于理宣布朕意咸使知聞上自𥘉即位則疾患不能言至四月益甚時扶坐殿羣臣望拜而巳未甞有進見者天下事皆專断於叔文而李忠言王伾爲之内主執誼行之於外朋黨諠譁榮辱進退生於造次惟其所欲不拘程度旣知内外厭毒慮見摧敗即謀兵權欲以自固而人情益疑懼不測其所爲朝夕伺候㑹其與執誼交惡心腹内離外有韋皐裴垍嚴綬等牋表垍當作均而中官劉光竒俱文珍薛盈珍尚解玉等皆先朝任使舊人同心怨猜屢以啓上上固巳厭倦萬機惡叔文等至是遂召翰林學士鄭絪衛次公王涯等入至德殿撰制詔而發命焉詔或作誥又下制以太常卿杜黄裳爲門下侍郎左金吾衛大將軍袁滋爲中書侍郎並平章事又下制吏部尚書平章事鄭珣瑜刑部尚書平章事髙郢並守本官罷相皇太子見百寮於東朝百寮拜賀皇太子涕泣不答拜景申詔宰臣告天地社稷皇太子見四方使於麟德殿西亭朱文公校昌黎先生外集卷之九
