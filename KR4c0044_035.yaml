front:
  text: 朱文公校昌黎先生集卷之三十五考異音釋附
  hash: sha256:d9961d8ae11e8d65125fe363f3fd86c77f398fdb2a3cd9c4170d652f25675253
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_035-1a}
body:
  text: 碑誌盧渾墓誌銘前汝父母右汝兄兄上或有弟字或作後有汝兄方云渾於陵弟也兄弟惟二人汝從之居視汝如生遷汝居兮日月之良迁汝或作汝迁于三字汝居孔固兮後無有殃如不信兮視此銘章此方作於虢州司户韓府君墓誌銘安定桓王五丗孫叡素爲桂州長史化行南方長或作刺方云考丗系表李太白去思頌公墓誌行狀皆作長史有子四人最季曰紳卿文而能官嘗爲揚州録事參軍事故宰相崔圎或无參軍二字圎狎愛州民丁某至顧省其家後大衙㑹日司録君趨以前大言曰請舉公過公與小民狎至至其家害於政或无復出至字圎驚謝曰録事言是圎實過乃自署罰五十萬錢由是遷涇陽令破豪家水碾利民田頃凡百萬君諱岌桂州君之孫司録君之子亦以能官名少而竒壯而強老而通閤本无而强老三字方以爲脱以元和元年六月十四日卒年五十七无或作三娶京兆田氏女或无女字男曰家女曰門曰都皆㓜或无曰門二字𥘉君樂虢之土田山水求掾其州去官猶家之旣卒因以其年九月某日葬州北十里崔長史墓西葬下或有于字銘曰凡兆于兹唯其家之材或作財今按此句未詳當有脫誤蓋歸有時四門博士周況妻韓氏墓誌銘四門愽士周況妻韓氏韓好或有復出好字尚書禮部郎中諱雲卿之孫開封尉諱俞之女開封娶趙氏生二女三男下開封字或作俞開封卓越豪縱不治資業喜酒色狗馬趙氏卒十一年而開封亦卒開封從父弟愈於時爲愽士或无弟字方云舊本皆有今按公父仲卿与開封之父雲卿爲兄弟則公与開封固从父兄弟也乞分教東都生以収其孥於開封界中教畜之而歸其長女于周氏況況進士家丗儒者或无複出况字曾祖諱延潭州長沙令祖諱晦常州參軍父諱良甫左驍衛兵曹參軍況立名行人士譽之韓氏嫁九年生一男一女年二十七以疾卒􅔂或作病葬長安城南鳯栖原其從父愈於時爲中書舎人父下方有弟字今按方本非是仪礼䘮服篇有族曾祖父者曾祖之兄弟也其子爲族祖父其孫爲族父其曾孫爲族兄弟有从祖祖父者祖父之兄弟也其子爲从祖父其孫爲从祖兄弟有丗父叔父者父之兄弟也其子爲从父兄弟今韓公於開封及虢州皆爲從父弟矣於開封之女則公當爲从祖父也此但云從父爲脫一祖字方作从父弟尤誤今无别本不敢輒増祖字且从諸本去弟字爲銘曰夫失少婦失或作䘮子失壯母歸咎無處韓滂墓誌銘樊曰丗系表老成二子湘大理丞滂宝雞丞按此誌云滂年十九死盖未甞仕也表復誤矣滂韓氏子其先仕魏號安定桓王滂父老成厚謹以文爲韓氏良子弟未仕而死有二子滂其季也其祖諱介爲人孝友一命率府軍佐以卒二子百川老成老成爲伯父起居舎人某後或无複出老成字或无某字起居有德行言詞爲丗軌式滂旣兄弟二人而率府長子百川早死無嗣其叔祖愈命滂歸後其祖或无早字滂清明遜悌以敏讀書倍文功力兼人倍与背同倍文謂背本暗記也周礼注倍文曰諷韓語盖本此洪譜以爲作文盖不考此而誤改兼下文復有爲文辝字亦不應重複如此也爲文詞一旦竒偉驟長不類舊常吾曰爾得無假之人邪或无得字无人字退大喜謂其兄湘曰某違翁且踰年懼無以爲見今翁言乃然可以爲賀羣輩來見皆曰滂之大進不唯於文詞爲人亦然方无文字詞下或有於字旣數月得疾以死年十九矣死或作卒吾與妻哭之傷心三日而斂旣斂七日權葬冝春郭南一里或无一字嗚呼其可惜也巳銘曰天固生之邪偶自生邪或无之字天殺也邪其偶自死邪或无也字莫不歸於死壽何少多帰或作悲銘以送汝其悲柰何河南緱氏主簿唐充妻盧氏墓誌銘夫人盧氏諱某蘭陵太守景柔八丗孫父貽卒河南法曹法曹娶上黨苗氏太師晉卿兄女生三女三男方云考苗夫人志當云二男夫人最長法曹卒苗夫人嫁之唐氏充充明經或无復出充字宰相休憬曽姪孫出郄氏今按郄綺㦸反俗郤字与郄字相乱仐流俗郗超字多作郄誤也外王父昻中書舎人夫人年若干嫁唐氏凡生男與女九人年四十二元和四年正月二十二日卒其年四月十五日葬河南府河南縣之大石山下銘曰夫人本宗丗族之後率其先猷令德是茂爰歸得家九子一母得或作其婉婉有儀柔靜以和命不侔身兹其柰何刻銘墓石以告觀者觀或作親方云者音之戈切与何叶呉才老讀如此乳母墓誌銘樊曰唐志義服有為乳母報者其服緦麻韓曰丧乳母且為之銘自公始舊本作河南縣令韓愈乳母李氏乳母李徐州人李下或有氏字號正眞入韓氏乳其兒愈入或作為下或有家字愈生未再周月孤失怙恃李憐不忍弃去視保益謹遂老韓氏及見所乳兒愈舉進士第歷佐汴徐軍見下或有其字徐下或有二州字入朝爲御史國子愽士尚書都官貟外郎河南令娶婦生二男五女二或作三時節慶賀輒率婦孫列拜進壽節下或有受字輒上或有愈字年六十四元和六年三月十八日疾卒疾或作病或无疾字或作以疾卒卒三日葬河南縣北十五里愈率婦孫視窆封且刻其語于石納諸墓爲銘語方作誌朱文公校昌黎先生集卷之三十五
