front:
  text: 朱文公校昌黎先生集卷之十三考異音釋附
  hash: sha256:8140fe5f73f02942f0076e01796cfd6a70605945d564f9522eee34aa60280a4c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_013-1a}
body:
  text: 雜著子産不毀鄉校頌我思古人伊鄭之僑以禮相國人未安其教遊于鄉之校衆口囂囂安或作知方云此以教叶僑與囂車舝詩用韻如此或謂子産毀鄉校則止曰何患焉可以成美夫豈多言亦各其志善也吾行不善吾避維善維否我於此視川不可防言不可弭下塞上聾邦其傾矣既鄉校不毀而鄭國以理在周之興養老乞言及其巳衰謗者使監成敗之迹昭哉可觀哉或作然維是子産執政之式維其不遇化止一國誠率是道相天下君父暢旁逹施及無珢君或作者交暢旁逹方從三本作旁暢交逹非是逹或作通於呼四海所以不理有君無臣誰其嗣之我思古人理下或有者字釋言此元和二年春作宰相鄭絪翰林學士李吉甫中書舍人裴垍也洪日國語云驪姬使奄楚以環釋言注云以言自解釋也退之作釋言取此元和元年六月十日方無十日字愈自江陵法曹詔拜國子博士始進見今相國鄭公公賜之坐方無下公字且曰吾見子某詩吾時在翰林職親而地禁不敢相聞今為我寫子詩書為一通以來我下或有盡字而無為一通以字或無為我字而有盡字一方作二愈再拜謝退録詩書若干篇擇日時以獻若干方作箸于獻下或有之字今按著于萹雖古語然施之於此似不相入且公亦未必特用此語以為竒也於後之數月有來謂愈者曰子獻相國詩書乎曰然曰有為讒於相國之座者曰韓愈曰相國徴余文余不敢匿相國豈知我哉子其愼之或無為字愼下方無之字愈應之曰愈為御史得罪德宗朝同遷于南者凡三人獨愈為先收用相國之賜大矣百官之進見相國者或立語以退而愈辱賜坐語相國之禮過矣以或作巳四海九州之人自百官巳下欲以其業徹相國左右者多矣皆憚而莫之敢獨愈辱先索相國之知至矣賜之大禮之過知之至是三者於敵以下受之宜以何報况在天子之宰乎敵以或作敵巳方云國語自敵以下則有讎注敵體也今人多用敵巳字者非宰下或有相字人莫不自知凡適於用之謂才堪其事之謂力愈於二者雖日勉焉而不近束帶執笏立士大夫之行不見斥以不肖幸矣其何敢敖於言乎或無乎字夫敖雖凶德必有恃而敢行愈之族親鮮少無扳音攀引也聮之勢於今不善交人無相先相死之友於朝無宿資蓄貨以鈞聲勢宿資蓄貨或作宿貨蓄資弱於才而腐於力不能奔走乘機抵巇虛宜切以要權利夫何恃而敖若夫狂惑喪心之人蹈河而入火妄言而罵詈者則有之矣而愈人知其無是疾也雖有讒者百人相國將不信之矣愈何懼而愼歟相國或作宰相或無歟字既纍月又有來謂愈曰有讒子於翰林舍人李公與裴公者子其愼歟愈曰二公者吾君朝夕訪焉以為政於天下而階太平之洽或作理居則與天子為心膂出則與天子為股肱四海九州之人自百官已下其孰不願忠而望賜不下或有能字非是愈也不狂不愚不蹈河而入火病風而妄罵不當有如讒者之説也雖有讒者百人二公將不信之矣愈何懼而愼既以語應客夜歸私自尤曰咄當沒切市有虎而曽參殺人讒者之效也詩曰取彼讒人投卑豺虎豺虎不食投卑有北有北不受投卑有昊傷於讒疾而甚之之辭也又曰亂之𥘉生僭始既涵亂之又生君子信讒始疑而終信之之謂也孔子曰逺佞人夫佞人不能逺則有時而信之矣今我恃直而不戒禍其至哉徐又自解之曰市有虎聽者庸也曽參殺人以愛惑聰也巷伯之傷亂丗是逢也聰或作聽非是亂丗方作丗亂今三賢方與天子謀所以施政於天下而階太平之治聽聰而視明公正而敦大夫聰明則聽視不惑公正則不邇讒邪敦大則有以容而思彼讒人者孰敢進而為讒哉聽視或作視聽進而或作而進雖進而為之亦莫之聽矣我何懼而愼方無而愼字既纍月上命李公相客謂愈曰子前𬒳言於一相今李公又相子其危哉方無哉字愈曰前之謗我於宰相者翰林不知也後之謗我於翰林者宰相不知也今二公合處而會言若及愈必曰韓愈亦人耳彼敖宰相又敖翰林其將何求必不然吾乃今知免矣既而讒言果不行宰相或皆作相國乃今或作今乃又無矣字既下方無而字愛直贈李君房别左右前後皆正人也欲其身之不正烏可得邪烏或作焉吾觀李生在南陽公之側有所不知知之未嘗不為之思有所不疑疑之未嘗不為之言勇不動于氣義不陳乎色乎或作于南陽公舉措施為不失其宜天下之所窺觀稱道洋洋者抑亦左右前後有其人乎公下或有之字有其方作其有凡在此趨公之庭議公之事者吾既從而遊矣或無此字今按此下疑當有而字言而公信之者謀而公從之者四方之人則既聞而知之矣李生南陽公之甥也人不知者將曰李生之託婚於貴富之家將以充其所求而止耳故吾樂為天下道其為人焉今之從事於彼也吾為南陽公愛之為南上或有能字又未知人之舉李生於彼者何辭彼之所以待李生者何道又或作且舉不失辭待不失道雖失之此足愛惜而得之彼為歡欣於李生道猶若也舉之不以吾所稱待之不以吾所期李生之言不可出諸其口矣吾重為天下惜之惜或作愛張中丞傳後敘元和二年四月十三日𥘉愈與吳郡張籍閲家中舊書得李翰所為張巡使巡上方無張字翰以文章自名為此傳頗詳密然尚恨有闕者不為許逺立傳又不載雷萬春事首尾逺雖材若不及巡者開門納巡位本在巡上授之柄而處其下無所疑忌竟與巡俱守死成功名城陷而虜與巡死先後異耳開上或疑當有然字兩家子弟材智下不能通知二父志以為巡死而逺就虜疑畏死而辭服於賊逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎當其圍守時外無蚍音孚音毗蟲浮蟻子之援所欲忠者國與主耳而賊語以國亡主滅語方校作悟滅下或有悟之字今按悟字無理且從諸本作語若果合有悟字即是誤字之訛但以字上若有語字或誤字或語之字或誤之字即滅字下皆不當復有誤之字若以字上無此四種字即滅字下皆當有誤之字逺見救援不至而賊來益衆必以其言為信外無待而猶死守人相食且盡雖愚人不能數日而知死處矣逺之不畏死亦明矣烏有城壞其徒俱死獨蒙愧恥求活雖至愚者不忍為嗚呼而謂逺之賢而為之邪其徒上方有而字或又疑而字當在死字之下邪上方無之字説者又謂逺與巡分城而守城之陷自逺所分始以此詬逺此又與兒童之見無異詬或作語非是人之將死其藏腑必有先受其病者引繩而絶之其絶必有處觀者見其然從而尤之其亦不逹於理矣小人之好議論不樂成人之美如是哉如巡逺之所成就如此卓卓猶不得免其他則又何説當二公之𥘉守也寧能知人之卒不救棄城而逆遁苟此不能守雖避之他處何益之卒或無之字及其無救而且窮也將其創楚良切傷也殘餓羸倫為切之餘雖欲去必不逹二公之賢其講之精矣守一城捍天下以千百就盡之卒戰百萬日滋之師蔽遮江淮沮遏其勢天下之不亡其誰之功也之不或無之字非是當是時棄城而圖存者不可一二數所矩切擅強兵坐而觀者相環也不追議此而責二公以死守亦見其自比於逆亂設淫辭而助之攻也改或作功非是愈嘗從事於汴徐二府屢道於兩府間府或作親祭於其所謂雙廟者其老人往往説巡逺時事云南霽雲之乞救於賀蘭也方無之字賀蘭嫉巡逺之聲威功績出巳上不肯出師救愛霽雲之勇且壯不聽其語強留之具食與樂延霽雲坐霽雲慷慨語曰雲來時雎音綏宋州也陽之人不食月餘日矣雲雖欲獨食義不忍雖食且不下咽慷上或無霽雲字非是因拔所佩刀斷一指血淋漓以示賀蘭一座大驚皆感激為雲泣下雲知賀蘭終無為雲出師意即馳去將出城抽矢射佛寺浮圖矢著直略切其上甎半箭曰吾歸破賊必滅賀蘭此矢所以志也箭或作笴歸或作師非是愈貞元中過泗州船上人猶指以相語城陷賊以刃脅降巡巡不屈即牽去將斬之又降霽雲雲未應或無霽字巡呼雲曰南八男兒死耳不可為不義屈雲笑曰欲將以有為也公有言雲敢不死即不屈欲將或疑衍一字張籍曰有于嵩者少依於巡及巡起事嵩常在圍中及巡或作及其常方作嘗籍大曆中於和州烏江縣見嵩嵩時年六十餘矣或無下嵩字以巡𥘉嘗得臨渙縣尉好學無所不讀或無嘗字籍時尚小粗問巡逺事不能細也云巡長七尺餘鬚髯若神嘗見嵩讀漢書謂嵩曰何為久讀此久或作又嵩曰未熟也巡曰吾於書讀不過三遍終身不忘也因誦嵩所讀書盡卷不錯一字嵩驚以為巡偶熟此卷因亂抽他帙以試無不盡然嵩又取架上諸書試以問巡巡應口誦無疑嵩從巡久亦不見巡常讀書也為文章操𥿄筆立書未嘗起草起方作有樊日巡開元二十四年進士劉夢得嘉話載其謝加金吾表有云主辱臣死當臣致命之時惡稔罪盈是賊滅亡之日激勵將士賦詩有云褁瘡猶出陳飲血更登陴又夜聞笛聲詩有云營開星月近戰苦陳雲深觀此則巡之文章可見矣一本作未嘗有草新添巡守睢陽詩全章云接戰春來苦孤城日漸危合圍侔月暈分守效魚麗屢厭黃塵起時將白羽麾裹瘡猶出陳斂血更登陴忠信應難敵堅貞自不移無人報天子心計欲何施𥘉守睢陽時士卒僅萬人城中居人户亦且數萬巡因一見問姓名其後無不識者或無户字巡怒鬚髯輒張及城陷賊縛巡等數十人王拜稽首天子之光庶德昭融神斯降祥殊本連理之柯同榮異壟之禾方云三館本潮本之何皆作枝柯仍與下文同榮為一句今本木作禾由枝字訛也今按殊本連理之柯即今所頌之木也同榮異壟之禾即書所謂異畒同類之嘉禾也蓋追為前白之預言而泛舉其類耳司馬相如所謂雙觡共抵之獸其句法亦類此如方所定則理乖語贅句分而韻不協失之逺矣吾傒之産兹土也久矣方無之字今按之字疑當作其今欲明于大君紀于䇿書王抑余也冶金伐石垂耀無極王余抑也欲或作將王余抑也或作余抑王也或依上文作王抑余也方從三本定此今按抑余余抑蓋互文以叶韻耳作余抑王固無理作王抑余亦重復無它竒當從方本為是奮肆姁偷上音劬下音俞美熊也不知所如願託頌詞長言之于康衢頌曰木何為兮此祥洵厥美兮在吾王洵方作詢非是願封植兮永固俾斯人兮不忘斯或作其人或作民汴州東西水門記并序貞元十四年正月戊子隴西公命作東西水門或無隴西二字非是方云董晉本仲舒之裔自廣川徙隴西故云越三月辛巳朔水門成三日癸未大合樂設水嬉會監軍軍司馬賔佐僚屬將校熊羆之士肅四方之賔客以落之士女和古和字會闐郭溢郛既卒事其從事昌黎韓愈請紀成績其詞曰維汴州河水自中注厥𥘉距河為城其不合者誕置聮鎖于河宵浮晝湛舟不潛通距或作拒不合或作弗合湛或作沈舟不方作舟用方並從石本今按上下文意蓋言置鎖雖足以禁舟之潛通然未􅊵虧疏宣泄之患故須作水門耳諸本作舟不潛通者是也今上文既言置鎖而下文乃天舟用潛通則是鎖為虛設而其下句亦不應著然字矣若以為誤則石本乃當時所刻不應有誤然亦安知非其書者之誤刻者之誤况或非所親見則又安知非傳者之誤耶其説之未盡者又見於溪堂盤谷等篇覽者詳之然其襟抱虧疏風氣宣泄邑居弗寧訛言屢騰歷載巳來孰究孰思皇帝御天下十有八載此邦之人遭逢疾威嚚童噭呼上音呌下音呼皆聲也嚚童李乃劫衆阻兵懍懍栗栗若墜若覆時維隴西公受命作潘爰自洛京單車來臨遂拯其危遂去其疵拯或作持弗肅弗厲薰為大和神應祥福五榖穰熟既庶而豐人力有餘監軍是咨司馬是謀諸本及石本皆有此二句方從閣本刪去云閣本蓋公晚年所定當從之今詳此二語疑後人惡監軍二字而刪之耳方氏直謂閣本為公晚年所定不知何據而云然以今觀之其舛誤為最多疑為𥘉出未校之本前巳辨之詳矣大抵館閣藏書不過取之民間而諸儒略以官課校之耳豈能一一精善過於私本丗俗但見其為官本便尊信之而不復問其文理之如何巳為可笑今此乃復造為改定之説以鉗衆口則又可笑之甚也乃作水門為邦之郛以固風氣以閈寇偷閈戓作扞黃流渾渾飛閣渠渠因而飾之匪為觀遊天子之武維隴西公是布天子之文維隴西公是宣文方從石閣蜀本作醇今按此記方氏多從石本石本固當據信但上條用字大誤而此醇此亦未安耳河之沄沄有君切轉流也源于實崙天子萬祀公多受祉乃伐山石刻之日月尚俾來者知作之所始燕喜亭記燕或作宴此記方亦多從石本太原王弘中在連州與學佛人景常元慧遊佛下或有之字惠下或有者字異日從二人者行於其居之後丘荒之間上髙而望得異處焉斬茅而嘉樹列發石而清泉激輦糞壤燔椔翳燔或作焚椔側師切詩作之屏之其椔其翳注曰木立死曰椔自斃曰翳却立而視之出者突然成丘陷者呀虛加切張口貌然成谷漥烏瓜切一日窊也老子窪則盈者為池而缺者為洞若有鬼神異物隂來相之自是弘中與二人者晨往而夕忘歸焉乃立屋以避風雨寒暑避或作禦寒上或有禦字或作立屋以避風雨既除寒暑既去或作以禦風雨以除寒暑方從石本云左傳吾儕小人皆有闔廬以避燥􅊜寒暑既成愈請名之其丘曰俟德之丘蔽於古而顯於今有俟之道也其丘上或有名字有俟下或有德字其石谷曰謙受之谷瀑音暴又步木切曰振鷺之瀑谷言德瀑言容也其土谷曰黃金之谷瀑曰秩秩之瀑谷言容瀑言德也洞曰寒居之洞志其入時也池曰君子之池虛以鍾其美盈以出其惡也泉之源曰天澤之泉出髙而施下也合而名之以屋曰燕喜之亭取詩所謂魯侯燕喜者頌也名或作言者頌方從石閣石以記方從石本無而字徐泗豪三州節度掌書記廳石記豪諸本作濠石或作壁洪云地理志濠𥘉作豪元和三年改為濠據退之作記時尚為豪作濠誤矣方云通典以為州名字本作濠今按顔魯公干祿字樣及唐韻亦皆作豪而元和郡國志云濠字中間誤去水元和三年字又加水皆與地理志合但通典偶脫中間去水一節耳此濠字當以洪氏作豪書記之任亦難矣元戎整齊三軍之士統理所部之氓以鎮守邦國贊天子施教化整或作總士或作事守或作定而又外與賔客四鄰交其朝覲聘問慰薦祭祀祈祝之文與所部之政三軍之號令升黜凡文辭之事皆出書記祈或作所非閎辨通敏兼人之才莫宜居之閎或作宏然皆元戎自辟然後命於天子後方作后苟其帥之不文則其所辟或不當亦其理宜也南陽公自御史大夫豪壽廬三州觀察使授節移鎮徐州歷十一年而掌書記者三人者下或有凡字其一人曰髙陽許孟容入仕于王朝令為尚書禮部郎中其一人曰京兆杜兼今為尚書禮部貟外郎觀察判官其一人隴西李博自前鄉貢進士授祕書省校書郎方為之瀧上或有曰字南陽公文章稱天下其所辟實所謂閎辨通敏兼人之才者也後之人苟未知南陽公之文章吾請觀於三君子苟未知三君子之文章吾請觀於南陽公可知矣人苟下或有有字蔚乎其相章炳乎其相輝志同而氣合魚川泳而烏雲飛也章方作扶或作華泳或作伏方無也字愈樂是賔主之相得也故請刻石以記之而陷置于壁間俾來者得以覽觀焉記下或無之字來上或無俾字畫記雜古今人物小畫共一卷騎而立者五人騎而𬒳甲載兵立者十人兵下或無立字一人騎執大旗前立騎下或有而字騎而𬒳甲載兵行且下牽者十人騎且負者二人騎執器者二人騎擁田犬者一人騎而牽者二人騎而驅者三人執羈居冝切靮音的馬韁立者二人騎而下倚馬臂隼而立者一人騎而驅涉者二人徒而驅牧者二人徒下方無而字驅牧方作騎牧今按徒則非騎矣方誤坐而指使者一人甲胄手弓矢鈇鉞植者七人甲胄執幟植者十人負者七人偃寢休者二人甲胄坐睡者一人方涉者一人方無方字坐而脫足者一人方本坐上有方涉二字寒附火者一人雜執器物役者八人奉壷矢者一人舍而具食者十有一人具或作且十上或有二字挹且注者四人牛牽者二人二或作三驢驅者四人一人杖而負者負下方無者字今按一人字疑在負者之下婦人以孺子載而可見者六人婦人方作婦女而無以字載而上下者三人孺子戲者九人凡人之事三十有二為人大小百二十有三而莫有同者焉事下或有主字為或作焉屬上句非是馬大者九匹於馬之中又有上者下者又有上者下者方從杭本作亦有馬之下者焉蜀本同但又作亦閣本作亦有馬焉今按此句三本皆無理唯别本作又有上者下者而無焉字乃與上下文意相屬今從之行者牽者牽方作奔或併無四字今按牽謂牽而行也後有走者則奔者為重復當存牽而去奔涉者陸者或無陸者二字今按此承涉者則陸為方出水也不當無翹者顧者嗚者寢者訛者立者人立者或無人立者三字非是齕音纈又胡沒切齧也者飲者溲者陟者降者癢磨樹者噓者嗅者喜相戲者怒相踶齧五結切者喜下或有而字秣者騎者驟者走者載服物者載狐兔者凡馬之事二十有七為馬大小八十有三而莫有同者焉為或作焉屬上句非是牛大小十一頭十下或有有字橐駝三頭橐或作駱下同方云漢書子虛賦注橐駝者言其可負橐而駝物故以名驢如橐駝之數而加其一焉隼一犬羊狐兔麋鹿共三十旃車三兩雜兵器弓矢旌旗刀劔矛楯食尹切弓服矢房甲胄之屬瓶盂簦音登又都滕切笠之長柄也史紀虞卿躡蹻擔簦是也笠蓋也笠筐筥錡釡錡其綺切方日筐圎曰筥皆以竹為之三足日錡無足曰釡飲食服用之器壷矢博奕之具二百五十有一皆曲極其妙方從閣杭本用下有投壷二字而無器字非是貞元甲戌年余在京師甚無事同居有獨孤生申叔者或無有字始得此畫而與余彈棊沈存中云彈棊有譜一卷其局方二尺中心髙如覆盂其巔為小壷四角微隱起李商隱詩玉作彈棊局中心亦不平謂其中髙也白樂天詩彈棊局上事最妙是長斜謂抹角斜彈一發過半局今譜中有此法抑子厚序棊用二十四棊者即此戲也余幸勝而獲焉意甚惜之以為非一工人之所能運思蓋藂集衆工人之所長耳雖百金不願易也工下或皆無人字藂或作叢明年出京師至河陽與二三客論畫品格因出而觀之座有趙侍御者君子人也見之戚然若有感然感上或有所字或無若有感然四字少而進曰噫余之手摸也摸上或有所字或作手之所摹也亡之且二十年矣余少時常有志乎兹事得國本絶人事而摸得之遊閩中而喪焉居間處獨時往來余懷也以其始為之勞而夙好之篤也來上或有日字為上方無始字今以下文夙好之語推之當有今雖遇之力不能為己且命工人存其大都焉余既甚愛之又感趙君之事因以贈之而記其人物之形狀與數而時觀之以自釋焉藍田縣丞廳壁記丞之職所以二令於一邑無所不當問其下主簿尉主簿尉乃有分職丞位髙而逼例以嫌不可否事文書行吏抱成案詣丞卷其前鉗以左手右手摘𥿄尾鴈鶩行以進平立睨音詣丞曰當署鴈或作堯曰下或有丞字丞涉筆占位署惟謹涉或作濡目吏問可不可吏曰得則退不敢略省漫不知何事官雖尊力勢反出主簿尉下諺數慢必曰丞至以相訾謷上將此切下牛刀切謷不省語也前漢聲謷謷説文云不省人也丞之設豈端使然哉諺或作劾或作該方從文苑云謂諺語之所舉計者以丞為慢之最且至以相訾謷也數所矩切博陵崔斯立種學績文以蓄其有泓涵演以淺切長流也迤日大以肆涵或作澄大以或作以大貞元𥘉挾其能戰藝於京師再進再屈於人杭本無再進二字文苑無下再字而屈下一字皆作千字方云斯立貞元四年進士六年中博學宏詞再進而屈千人也今按杭苑皆脫字方從苑為誤但唐人試宏詞者甚少如貞元九年僅三十二人而巳作千人恐非是或疑千當作其如云屈其坐人也然無所據姑放穆天子傳闕其處以俟知者元和𥘉以前大理評事言得失黜官再轉而為丞兹邑始至喟曰官無卑顧材不足塞職既噤巨禁切不得施用又喟曰丞哉丞哉余不負丞而丞負余則盡枿五割切去牙角一躡故迹破崖岸而為之喟下或皆有然字負余上方有喜字云喜音許吏切黃霸傳少學律令喜為吏岸下方無而字為之方作為文而讀連下句曰為文丞言猶文具也今按文丞不成文理方説之僻類如此丞廳故有記壞漏汚不可讀按丞字或疑為衍文斯立易桷與瓦墁母官切治壁悉書前任人名氏庭有老槐四行南牆巨竹千挺儼立若相持廷方云從木説文梃一枚也水㶁㶁音虢循除鳴斯立痛掃溉對樹二松日哦其間日下或有吟字有問者輒對曰余方有公事子姑去考功郎中知制誥韓愈記新修滕王閣記愈少時則聞江南多臨觀之美而滕王閣獨為第一有瑰偉絶特之稱則或作嘗臨觀或作登臨特方從閣本作時非是及得三王所為序賦記等注或云王勃作遊閣序王緒作賦今中丞王公為從事日作修閣記或並無壯其文辭益欲往一觀而讀之以忘吾憂繫官于朝願莫之遂十四年以言事斥守揭陽或無事字揭或作朝便道取疾以至海上又不得過南昌而觀所謂滕王閣者其冬以天子進大號加恩區內移刺袁州袁於南昌為屬邑於上方無袁字私喜幸自語以為當得躬詣大府受約束於下執事及其無事且還儻得一至其處竊寄目償所願焉諸本皆同方獨從文苑無及其無事且還儻得一至其處十二字而償作賞下又增適字今按敘事當如諸本乃有曲折而其先公後私不以遊覽雜乎受命之重尤得事大府之體與聘禮既受饔飱然後請觀乃從下門而入意亦相似如方所定則皆失之而竊寄目賞語意生澀適所願亦不若償字之穩也至州之七月詔以中書舍人太原王公為御史中丞觀察江南西道洪江饒虔吉信撫袁悉屬治所八州之人前所不便及所願欲而不得者公至之日皆罷行之行上文苑有而字非是大者驛聞小者立變春生秋殺陽開隂閍生方從文苑作施今按下字對偶文苑亦非是令修於庭戶數日之間而人自得於湖山千里之外日或作月吾雖欲出意見論利害聽命於幕下而吾州乃無一事可假而行者又安得捨巳所事以勤館人則滕王閣又無因而至焉矣或無矣字其歲九月人吏浹和公與監軍使燕于此閣文武賔士皆與在席酒半合辭言曰此屋不修且壞前公為從事此邦適理新之公所為文實書在壁理或作洽所上方無公字今三十年而公來為邦伯適及期月公又來燕于此公烏得無情哉烏或作胡方從杭苑作乎今按作乎語意輕脫不類公文亦非寮屬所得施於其長者蓋本作烏自烏而胡又自胡而訛耳大抵此篇文苑多誤公應曰諾於是棟楹梁桷板檻之腐黑撓折者蓋瓦級甎之破缺者赤白之漫漶上莫半切下胡館切赤白繪畫之色前漢為其泰漫漶而不可知注漫漶不分别貌不鮮者治之則巳破方作故鮮或作圭説見祭湘君夫人文今按瓦甎堅物破缺乃不可用而故則無甚害也且修屋而盡易其故則是新作而非修之謂矣作故非是無侈前人無廢後觀工既訖功公以衆飲而以書命愈曰子其為我記之而下或有賞焉字子下或無其字愈既以未得造觀為歎竊喜載名其上詞列三王之次有榮耀焉乃不辭而承公命其江山之好登望之樂雖老矣如獲從公遊尚能為公賦之元和十五年十月某日袁州刺史韓愈記某或作五科斗書後記愈叔父名雲卿仕終禮部侍郎李習之志其妻母墓日禮部君好立節義有大功於昭陵其文章出于時而官不甚髙習之妻雲卿孫女也當大曆丗文辭獨行中朝天下之欲銘述其先人功行取信來丗者咸歸韓氏於時李監陽冰獨能篆書而同姓叔父擇木善八分擇不代宗時官禮部尚書杜子美李潮八分歌云尚書韓擇木騎曹蔡有鄰開元以來數八分者同姓方從閣蜀本如此或只作配善或作蓋或作蓋能非是今按禮云五丗袒免殺同姓也公於擇木巳無服矣故以同姓言之不問可知其人不如是者不稱三服故三家傳子弟往來貞元中愈事董丞相幕府於汴州識開封令服之者陽冰子授余以其家科斗孝經漢衛宏官書兩部合一卷愈寶蓄之而不暇學服之或作復之官書方云新唐志作字書考之杜林傳及陳蕃傳注非也後來京師為四門博士識歸公歸公好古書能通之愈曰古書得其據依蓋可講方無其字據依或作依據方云左氏無所據依因進其所有書屬歸氏元和來愈亟不獲讓嗣為銘文薦道功德思凡為文辭宜略識字方無道字識下或有古字因從歸公乞觀二部書得之留月餘張籍令進士賀拔恕寫以留愈或無愈字蓋得其十四五而歸其書歸氏十一年六月四日右庶子韓愈記朱文公校昌黎先生集卷之十三
