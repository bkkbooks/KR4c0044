body:
  text: 文録序趙德昌黎公聖人之徒歟其文髙出與古之遺文不相上下所履之道則堯舜禹湯文武周孔孟軻揚雄所授受服行之實也固巳不雜其傳由佛及聃莊楊之言不得干其思入其文也以是光於今大於後金石燋鑠斯文燦然德行道學文庶幾乎古蓬茨中手持目覽飢食渴飲沛然蒲飽顧非適諸聖賢之域而謬志於斯將所以盜其影響僻處無備得以所遇次之為卷私曰文録實以師氏為請益依歸之所云實或作寶記舊本韓文後歐陽文忠公豫少家漢東漢東僻陋無學者吾家又貧無藏書州南有大姓李氏者其子彥輔頗好學豫為兒童時多遊其家見其弊筐貯故書在壁間發而視之得唐昌黎先生文集六卷脫略顚倒無次第因乞李氏以歸讀之見其言深厚而雄博然豫猶少未能悉究其義徒見其浩然無涯若可愛是時天下學者楊劉之作號為時文能者取科第擅名聲以誇榮當丗未嘗有道韓文者豫亦方舉進士以禮部詩賦為事年十有七試于州為有司所黜因取所藏韓氏之文復閲之則喟然歎曰學者當至於是而止爾因怪時人之不道而顧巳亦未暇學徒時時獨念于豫心以謂方從進士干祿以養親苟得祿矣當盡力於斯文以償其素志後七年舉進士及第官于洛陽而尹師魯之徒皆在遂相與作為古文因出所藏昌黎集而輔綴之求人家所有舊本而校定之其後天下學者亦漸趨於古而韓文遂行于丗至于今蓋三十餘年矣學者非韓不學也可謂盛矣嗚呼道固有行於逺而止於近有忽于往而貴于今者非惟丗俗好惡之使然亦其理有當然者故孔孟惶惶於一時而師法於千萬丗韓氏之文沒而不見者二百年而後大施於今此又非特好惡之所上下蓋其久而愈明不可磨滅雖蔽于暫而終耀于無窮者其道當然也豫之始得於韓也當其沈沒棄廢之時豫固知其不足以追時好而取勢利於是就而學之則豫之所為者豈所以急名譽而干勢利之用哉亦志乎久而巳矣故豫之仕於進不為喜退不為懼者蓋其志先定而所學者宜然也集本出於蜀文字刻畫頗精於今丗俗本而脫繆尤多凡三十年間聞人有善本者必求而改正之其最後卷秩不足今不復輔者重增其故也豫家藏書萬卷獨昌黎先生集為舊物也嗚呼韓氏之文之道萬丗所共尊天下所共傳而有也豫於此本特以其舊物而尤惜之泉本云吾少居漢東年十五六時於里人李堯輔家見一弊筐棄在壁角中有故事數十册因得韓文於其間皆脫落無次序吾略讀之愛其文辨而意深當是時學者方作時文天下之人無道韓文者豫亦將舉進立以觖祿利未暇學也遂求於李氏而得之以歸輔次成秩而藏之數年始及第遂官于洛而得師魯與之遊因出韓文而舉之自後天下學者亦稍稍近古吾家所藏書万卷然獨韓文最為舊物君為吾愛惜之可也今按泉州本乃生彥章所刻此序獨與諸本不同不知何據其所謂君者又不知為何人也今井存之以俟知者潮州韓文公廟碑蘇文忠公匹夫而為百丗師一言而為天下法是皆有以參天地之化關盛衰之運其生也有自來其逝也有所為矣故申吕自嶽降而傳説為列星古今所傳不可誣也孟子曰吾善養浩然之氣是氣也寓於尋常之中而塞乎天地之間卒然遇之則王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辨是孰使之然哉其必有不依形而立不恃力而行不待生而存不隨死而亡者矣故在天為星辰在地為河嶽幽則為鬼神而明則復為人此理之常無足怪者自東漢以來道喪文弊異端並起歷唐正觀開元之盛輔以房杜姚宋而不能救獨韓文公起布衣談笑而麾之天下靡然從公復歸于正蓋三百年於此矣文起八代之衰而道濟天下之溺忠犯人主之怒而勇奪三軍之帥此豈非參天地關盛衰浩然而獨存者乎蓋嘗論天人之辨以謂人無所不至惟天不容偽智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精誠能開衡山之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇父鏄李逢吉之謗能信於南海之民廟食百丗而不能使其身一日安於朝廷之上蓋其所能者天也其所不能者人也始潮人未知學公命進士趙德為之師自是潮之士皆篤於文行延及齊民至于今號稱易治信乎孔子之言君子學道則愛人而小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉而廟在刺史公堂之後民以出入為艱前守欲請諸朝作新廟不果元祐五年朝散郎王君滌來守是邦凡所以養士治民者一以公為師民既恱服則出令曰願新公廟者聽民歡趨之卜地於州之城南七里期年而廟成或曰公去國萬里而謫于潮不能一歲而歸沒而有知其不眷戀于潮也審矣軾曰不然公之神在天下者如水之在地中無所往而不在也而潮人獨信之深思之至焄蒿悽愴若或見之譬如鑿井得泉而曰水專在是豈理也哉元豐七年詔封公昌黎伯故榜曰昌黎伯韓文公之廟潮人請書其事于石因為作詩以遺之使歌以祀公其詞曰公昔騎龍白雲鄉手扶雲漢分天章天孫為織雲錦裳飄然乘風來帝旁下與濁丗掃粃粳西遊咸池略扶桑草木衣𬒳昭回光追逐李杜參翶翔汗流籍湜走且僵滅沒倒景不可望作書詆佛譏君王要觀南海窺衡湘歷舜九疑弔英皇祝融先驅海若藏約束鮫鱷如驅羊鈞天無人帝悲傷謳吟下招遣巫陽犦牲雞卜羞我觴於粲荔丹與蕉黃公不少留我涕滂翩然被髮下大荒朱文公校昌黎先生集傳卷終
