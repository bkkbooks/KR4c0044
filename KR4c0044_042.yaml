front:
  text: 朱文公校昌黎先生集傳新書本傳宋景文公今以李翶所撰行狀皇甫湜所撰墓志神道碑舊史本傳資治通鑑洪興祖所撰年譜程俱所撰歷官記方嵩卿增考年譜考其同異詳略附注本文之下以見公之行事本末而文之巳見於集者不復載云韓愈字退之鄧州南陽人七丗祖茂有功於後魏封安定王父仲卿為武昌令有美政既去縣人刻石頌德終祕書郎李白作文公父仲卿去思碑云南陽人而公常自稱昌黎李翶作公行狀亦云昌黎某人皇甫湜作墓志不言鄉里又作神道碑乃云上丗嘗居南陽又隸延州之武陽而舊史亦但云昌黎某今按新史蓋因李碑而加鄧州二字也然考漢書地理志有兩南陽其一河內修武即左傳所謂晉啓南陽也其一南陽堵陽即荆州之南陽郡字與赭同在唐屬鄧州者也元和姓纂唐書出系表有兩韓氏其一漢弓髙侯頽當玄孫騫避亂居南陽郡之赭陽九丗孫河東太守術生河東太守純純四丗孫安之晉貟外郎二子潛恬隨司馬休之入後覣為玄菟太守二子都偃偃生後魏中郎穎穎生播徙昌黎棘城其一則頽當裔孫尋為後漢隴西太守丗居穎川生司空稜後徙安定武安至後魏有常山太守武安成侯耆徙居九門生尚書令征南大將軍安定桓王茂茂生均均生睃睃生仁泰仁泰生睿素睿素生仲卿仲卿生會愈而中間嘗徙陳留以此而推則公固潁川之族尋後之後而不得承騫之系矣而洪興祖所撰年譜但以騫之後丗嘗徙昌黎遂附新史之説蜀以赭陽為均州小有不同耳及其再考二書而見公丗系之實則遂諱匿不敢復著仲卿會愈之名而直以為不可考今固不得而據也唯方嵩卿增考引董逌説以為騫乃韓瑗韓休之祖而公自出於尋稜與二書合其論南陽則又云今孟懷州皆春秋南陽之地自漢至隋二州皆屬河內郡唐顯慶中始以孟州隸河南府建中中乃以河南之四縣入河陽三城使其後又改為孟州今河內有河陽縣韓氏出居之故公每自言歸河陽省墳墓而女拏之銘亦曰歸骨于河南之河陽韓氏墓張籍祭公詩亦云舊瑩盟津北則知公為河內之南陽人其説獨為得之公詩所謂舊籍在東都我家本瀍穀則必以地近而後嘗徙居耳但據此則公與昌黎之韓異派而每以自稱則又有不可曉者豈是時昌黎之族頗盛故隨稱之亦若所謂言劉悉出彭城言李悉出隴西者邪然設使公派果出昌黎也則其去赭陽巳歷數丗其後又屢遷徙不應舍其近丗所居之士而逺指鄧州為鄉里也方又引孔武仲之説亦同董氏而王銍以為公生於河中之永樂今永樂猶有韓文鄉則其説為巳詳蓋其丗系雖有不可知者然南陽之為河內修武則無可疑者而新史洪譜之誤斷可識矣愈生三歲而孤隨伯兄會貶官嶺表會卒嫂鄭鞠之李漢序云先生生於大曆三年戊申三嵗而孤見祭梗文及乳母志會事見盧東美志洪譜云盧志所謂宗兄乃太宗小宗之宗舊史以為從父兄誤笑又云舊史大曆十二年夏五月起居舍人韓會坐元載貶官柳宗元先友記云會善清言有文章名最髙以故多謗曽既卒公携家北歸葬會河陽建中貞無間復避地於江南韓氏有别業在宣城因就食焉見歐陽詹哀詞復志賦祭嫂及老成文示爽詩愈自知讀書日記數千百言比長盡能通六經百家學行狀云讀書能記它生之所習墓志云先生七嵗好學言出成文某今按復志賦云值中原之有事兮將就食於江之南始專專於講習兮非古訓為無所用其心則公之為學正在就食江南時也擢進士第洪譜云貞元三年丙寅公年十九始至京師見祭老成文歐陽哀詞答崔立之書五年己巳有上賈滑州書六年庚午有河中府連理木頌七年辛未有送齊皡序八年壬申登進士第時年二十五見上邢君牙書唐科名記云貞元八年陸贄主司試明水賦御溝新栁詩公名在榜中見與陸貟外書舊史云太曆貞元間文士多尚古學而獨孤及梁肅最稱淵奧愈從其徒遊鋭意鑽仰而自振於一代洎舉進士投文於公卿間故相鄭餘慶頗為名譽由是知名是年有爭臣論九年癸酉博學宏詞試太清宫觀紫極舞賦顔子不二過論見上考功崔虞部書及與韋舍人書十年甲戍有省試學生代齊郎議方考此議當繫十一年試宏詞下未詳是否洪譜又云是年嘗歸河陽省墳墓見祭老成文有贈張童子序十一年乙亥又試宏詞見答崔立之書有三上宰相書皆不報是年去京師過潼關有感二鳥賦既歸河陽有畫記遂自河陽如東都有祭田橫文今按八年以後此年以前又嘗遊鳯翔以書抵邢君牙不得意去有岐山詩洪程皆定為此年六月誤矣會董晉為宣武節度使表署觀察推官晉卒愈從喪出不四日汴軍亂乃去依武寧節度使張建封建封辟府推官操行堅正鯁言無所忌董晉行狀云十二年七月晉拜宣武節度使受命遂行韓愈實從公行狀云董公辟公以行得試祕書省校書郎為觀察推官墓志云先生三十有一而仕神道碑云十四年用進士從董晉平汴州推官舊史作巡官洪譜云二狀載公入汴在十二年丙子與史合而志碑所記皆後二年殊不可曉豈今年辟公以行至十四年始有成命邪亦不應如是之緩也方考蜀本樊本無三十一而仕之文但云歷官二十有七年尓然自公卒之年逆數之亦當以十四年三十一歲為歷官之始故公入汴雖在十二年然水門記十四年正月作石本猶但稱攝節度掌書記前進士韓愈是辟命猶未下也計必是年辟命乃下故碑志之言如此不當以命下之緩為疑也某今按公入汴之年洪方得之碑志所計年數若以命下之日言之亦未為失但云十四年從董晉平汴州則誤矣又送俱文珍序亦在十三年安得言十四年乃入汴乎要當以公之自言及二狀二史通鑑為正持正狂躁其考之或有未審不足據也舊史之作巡官則程記巳辨其非乙矣洪譜又云十三年丁丑公在汴有復志賦送汴州監軍俱文珍序十四年戊寅公在汴有天星詩水門記楊燕竒碑十五年己卯董晉行狀云二月三日丞相薨公從喪行四日而汴州亂有汴州亂詩歷官記云汴軍亂愈家在圍中尋得脫下汴東趨彭城愈從喪至洛還孟津渡汜水出陳許間以二月暮抵徐州節度使張建封居之于符離睢上及秋將辭去建封奏為節度推官試協律郎至冬建封使愈朝正于京師見歐陽哀詞是年有此日足可惜汴泗交流詩答李翶書上建封書論晨入夜歸事後又有諫擊毬書賀白兔狀徐泗豪節度掌書記廳石記崔翰墓志十六年庚辰春公朝正叵徐有歸彭城詩夏去徐西居於洛陽見孟東野書及題下邳李生壁按公與東野書欲至秋辝去而題李生壁在五月十四日則不待全秋而巳去徐矣舊史亦云公發言真率無所畏避豈竟以此不合雖建封之知巳亦不能容邪公既去徐而建封卒翌日徐軍亂見白樂天哀三良文在洛有與衛中行書冬公如京師調四門博士洪譜云十七年辛巳公在京師從調選三月東還見與盧汝州薦侯喜狀將歸有贈孟東野房蜀客詩是年有送李願歸盤谷序李楚金墓志公自去年冬參調竟無所成而歸今年冬再往十八年壬午春始有四門博士之授為博士日嘗謁告歸洛因遊華山即答張徹詩所謂洛邑得休告華山窮絶陘者也李肇國史輔云愈好竒與客登華山絶峯度不可返發狂慟哭為書與家人别華隂令百計取之乃下沈顔作聲書以為肇妄載豈有賢者輕命如此考公詩則知國史輔乃實録也是年有送陸歙州序上巳日燕太學聽彈琴序與崔羣書施士丐墓志馬彚行狀遷監察御史上疏極論宫市德宗怒貶陽山令有愛在民民生子多以其姓字之洪譜云十九年癸未公年三十六自博士拜監察御史時有齒落哭楊兵曹陸歙州傪詩及與陳京給事書禘祫議論權停選舉狀苗氏墓志又上李實書稱前守四門博士時巳罷博士未受御史之命書云愈來京師於今十五年蓋公自貞元五年從鄭滑間復來京師至此十五年矣實録於實詆之不餘力而此書乃盛稱其所長此又不可曉也方考唐制凡居官以四考為滿公在官踰年耳不知何故而罷罷而復遷行狀墓碑皆只言選授四門博士遷監察御史而此書稱前官又以文投贄於李實似若不得巳者是固嘗罷博士而别遷也是嵗七月公猶任博士乞免停選狀謂臣雖非朝官月受俸錢可以考也罷免之由不可詳究然恐不至於媚實以求進也或云德宗未年不任宰相所取信者李實韋執誼輩耳公蓋未免於屈身以伸道也然公天旱人飢狀專指李實而言其修實録又於實一辭不恕獨於此書抵牾如此又公年十九始來京師在貞元二年也至貞元十九年實十八年矣今云來京師於今十五年洪雖以再至言之其實牽合也併志所疑以俟知者洪譜又云是時有詔以旱飢蠲租之半有司徴愈急公與張署李方叔上疏言關中天下根本民急如是請寬民徭而免田租天子惻然卒為幸臣所讒貶連州陽山令幸臣李實也見進學解及祭張署文舊史云愈嘗上章數千言極論宫市之弊貶陽山令疏今不傳則公之𬒳絀坐論此兩事也方考云公陽山之貶寄三學士詩敘𫐠其詳而行狀但云為幸臣所惡出宰陽山神道碑亦只云因疏關中旱飢專政者惡之則其非為論宫市明矣今公集有御史臺論天旱人飢狀與詩正合况翶湜皆從公遊者不應公嘗論宫市數千言而狀及碑志略不一言及也然行狀且謂為幸臣所惡而公詩云或自疑上疏上疏豈其由則是又未必皆上疏之罪也又曰同官盡才俊偏善柳與劉或慮語言泄傳之落冤讎又嶽陽樓詩云前年出官由此禍最無妄姦猜畏彈射斥逐恣欺誑是蓋為王叔文韋執誼等所排矣德宗晚年韋王之黨巳成是年輔闕張正買疏諫它事得召見與所善者數人皆𬒳譴斥意公之出有類此也憶昨行云伾文未揃崖州熾雖得赦宥常愁清是其為叔文等所排豈不明甚特無所歸咎駕其罪於上疏耳洪兼宫市旱飢兩事言之而又不考韋王始末故為申及之一洪譜又云以公詩考之蓋以十九年冬未貶官二十年甲申春始到陽山時有同冠峽貞女峽和張十一功曹送劉生謝李貟外諸詩及别知賦送楊八弟歸湖南序區册序答竇存亮書王弘中燕喜亭記改江陵法曹參軍洪譜及歷官記云二十一年乙酉正月丙申順宗即位二月甲子大赦八月辛丑改元永貞遷者皆追回愈為觀察使所抑財徙江陵府法曹參軍見八月十五夜贈張功曹詩及張署墓志河南同官記洪又云公以今年春遇赦夏秋離陽山俟命於郴者三月至秋未始受法曹之命見祭李郴州文時有郴州祈雨及郴口諸詩自郴至衡有合江亭及謁衡嶽廟詩自衡至潭有陪杜侍御遊湘西寺及湘中諸詩自此泛洞庭有阻風贈張十一詩至嶽州有别竇司直詩赴江陵有途中寄翰林三學士詩又有送孟琯序荆潭唱和序上李巽書鄭夫人殯表及五針序云余生三十有八年則其針蓋是年作所謂幕中之辨蓋謂在徐州時臺中之評則謂為御史時也元和𥘉權知國子博士分司東都三歲為真洪譜云永貞二年丙戍正月丙寅朔改元元和時憲宗即位之踰年也公年三十有九其春夏猶在江陵有李花寒食出遊夜歸贈張十一鄭羣贈簟答張徹諸詩六月自江陵召拜國子博士還朝後有豐陵行遊青龍寺贈崔立之送文暢諸詩城南諸聮句及祭十二兄岌文并墓志二年丁亥春公為博士有元和聖德詩并釋言行狀云宰相有愛公文者將以文學職處公有爭先者構公語以飛之公恐及難遂求分司東都而公作周况妻韓氏墓志乃云從兄俞卒開封尉愈於時為博士乞分教東都生以收其孥於開封界中教畜之飛語即釋言所解之讒而竟不能解故以兄喪為辭而求去耳時宰相鄭絪翰林舍人李吉甫裴垍也公以夏永離京赴東都有酬裴十六途中見寄詩是年有張中丞傳後敘答馮宿書盧於陵墓志三年戊子改真博士見行狀有酬崔十六少府及東都遇春詩與少室李渤書裴復墓志新史渤傳云洛陽令韓愈遺渤書公時為博士五年方為河南令未嘗為洛陽令也改都官貟外郎即拜河南令洪譜云四年巳丑公年四十二改都官貟外即守東都省神道碑云除尚書都官郎中分司判祠部行狀新舊史皆云貟外郎送李正字序亦但云都官郎碑文誤也方故公除都官六月十日也制辭亦作貟外郎一洪譜又云神道碑云中官號功曹使司京城觀寺尚書斂手失聀先生按六典盡索之以歸誅其無良時其出入禁譁衆以正浮屠歷官記云公判祠部日與宦者為敵惡言罵辭狼籍公牒乃上書留守鄭餘慶乞與諸郎官更判不見允在東都有遊嵩洛諸題名送李翺侯參謀和盧汀錢徽與竇韋尋劉尊師諸詩送李正字歸湖南序并詩鄭涵校理序祭薛公逹文并墓志京兆韋夫人墓志河南府同官記五年庚寅授河南縣令神道碑云魏鄆幽鎮各為留邸貯潛卒以橐罪士官無𬒳問者先生將擲其禁以壯朝廷斷民署吏俟令目發留守尹大恐遽相禁有使還為言憲宗恱曰韓愈助我者是後鄆邸果謀反東都將署留守以應淮蔡又有上留守鄭公啓時公以論事失鄭公意既令河南軍人有罪公追而杖之留守不恱公以啓辨明旦力求去見集中行狀云改河南令日以聀分辨於留守及尹故軍士莫敢犯禁疑鄭公卒聽其言故軍人畏服如此也在河南有感春詩燕河南秀才序送石洪序并詩及月蝕招揚之罘河南令舍池臺諸詩張圎墓碣盧殷墓志遷職方貟外郎洪譜云六年辛卯行尚書聀方貟外郎是年春公尚在河南有送窮文辛卯年雪寄盧同誰氏子諸詩送溫造序乳母志至京師有酬盧雲夫望秋作石鼓歌復仇狀盧丞房武畢墓志華隂令柳澗有􅓧前刺史劾奏之未報而刺史罷澗諷百姓遮索軍頓役直後刺史惡之按其獄貶澗房州司馬愈過華以為刺史隂相黨上疏治之既御史覆問得澗贓再貶封溪尉愈坐是復為博士洪譜云七年壬辰二月乙未以聀方貟外郎復為國子博士年四十五舊史云愈因使過華上疏理澗公自去年以來未嘗出使或云即公赴聀方時過華覩其事遂疏于朝尓進學解云三年博士冗不見治舊又作三為博士按公貞元壬午授四門博士元和丙戍為國子博士丁亥分教東都今年又自郎官下遷凡四為博士矣此先言暫為御史繼言三為博士則自丙戍而後三歷此官也若云三年則自元年夏赴召至四年春尚為博士首尾巳四年矣方考云丙戍𥘉除丁亥分教自不必釐而為二其為博七實三遷也當作三為為是今按上句言暫為御史而此言三年博士正以其居官之久近為言恐當作年為是然亦未敢必也洪譜又云是年二月有論錢重物輕狀新志云自建中定兩稅而物輕錢重民以為患於是詔百官議革其弊方考以為此識在穆宗即位之𥘉通鑑附之長慶元年秋為得其實今年𥘉無此議也惟會要載元和六年二月制謂建中後貨輕物重許諸道所納見錢五分量徴二分餘三分兼納實估匹段或當時有此議然亦非七年也况公六年二月尚在東都洪誤矣洪譜文云是年有石鼎聮句贈劉師服詩祭石洪文李素石洪墓志路應神道碑既才髙數黜官又下遷乃作進學解以自諭執政覽之竒其才改比部郎中史館修撰洪譜云此除在八年癸巳三月乙亥舊史云執政覽其文而憐之以其有史才故除是官時宰相武元衡李吉甫李絳也是年有答劉秀才論史書及烏氏田氏廟碑鄭儋神道碑李虛中董溪息國夫人墓志轉考功知制誥洪譜云九年甲午十月甲子為考功郎中依前史館修撰十二月戊午以考功知制誥是年有元微之書田弘正書送張道士序劉昌裔神道碑王適孟郊扶風郡夫人墓志十年乙未公知制誥有和庫部盧曹長元日朝回及寒食直歸遇雨二詩與李絳書進順宗實録狀舊史云愈撰實録繫簡不當敘事拙於取舍按退之作史詳略各有意削去常事著其繫於政者其褒善貶惡之旨明甚當時議者非之卒竄定無全篇良可惜也史又云愈説禁中事頗切直內官惡之往往於上前言其不實此言是也是年有與柳公綽二書論淮西事宜狀説見眀年又有捕賊行賞表藍田縣丞廳記獨孤郁衛之立墓志徐偃王廟碑進中書舍人𥘉憲宗將平蔡命御史中丞裴度使諸軍按視及還具言賊可滅與宰相議不合愈亦奏言淮西連年侵掠得不償費其敗可立而待然未可知者在陛下斷與不斷耳執政不喜會有人詆愈在冮陵時為裴均所厚均子鍔素無狀愈為文章字命鍔謗語囂暴由是改太子右庶子洪譜云十一年丙申正月丙戍以考功郎中知制誥遷中書舍人丙申賜緋魚五月癸未降為太子右庶子行狀云盜殺武元衡公以為盜殺宰相而遽息兵其為懦甚大兵不可以息以天下力取三州尚何不可與裴丞相議合故兵遂用而宰相有不便之者月滿遷中書舍人後竟以它事改右庶子時宰相學逢吉韋貫之也其云月滿遷中書舍人者蓋唐制臺郎滿􅍲則遷公以去年冬知制誥至今春竟一歲矣李漢云收拾遺文無所失墜公掌綸誥一年無一篇見收者失墜多矣唯後集有崔群戶部侍郎制一首爾某今按行狀通鑑洪譜論淮西事直狀在去年知制誥持而神道碑新史則在遷中書舍人之後但行狀言公所論有殺宰相事乃在去年六月而狀中實無此語若狀果在六月之後則不應全不言及則是此狀不惟不在十一年正月之後亦不在十年六月之後也故通鑑直以繫於五月之下行狀敘事雖實而記言則誤碑文新史固為失之今當以通鑑為正洪譜又云是年有酬盧雲夫曲江荷花行周况妻韓氏墓志王用碑科斗書後記及度以宰相節度彰義軍宣慰淮西奏愈行軍司馬愈請乘遽先入汴説韓弘使協力元濟平遷刑部侍郎行狀神道碑及舊史云十二年丁酉秋以兵老久屯賊未滅上命裴丞相為淮西節度使以招討之丞相請公以行賜三品衣魚為行軍司馬從丞相居於郾城軍出潼關公請先乘遽至汴感説都統弘弘説用命師乘遂和公知蔡州精卒悉聚界上以拒官軍守城者率老弱且不過千人亟白丞相請以兵三千人間道以入必擒吳元濟丞相未及行而李訴自唐州文城壘提其卒以夜入蔡州果得元濟三軍之士為公恨蔡州既平布衣柏耆以計謁公公與語竒之遂白丞相日雀西滅王承宗膽破可不勞用衆宜使辨士奉相公書明禍福以招之彼必服丞相然之公口占為書使柏耆神之以至鎮州承宗果大恐上表請割德棣二州以獻遣子入侍丞相歸京師以功遷刑部侍郎詔公撰平淮西碑其辝多敘裴度事時先入蔡州擒元濟李訴功第一訴不平之訴妻出入禁中因欣碑辝不實詔令磨公文命翰林學士假文昌重撰文勒石是年有送殷侑序祭張署文并墓志及東征往還酬唱諸詩晚秋郾城夜會聮句為刑部時有舉錢徽自代狀十二年戍戌四月鄭餘慶為詳定禮樂使奏韓愈李程為副是年有李惟簡墓志權德輿碑憲宗遣使者往鳯翔迎佛骨入禁中三日乃送佛祠王公士庶奔走膜唄至為夷法灼體膚委珍貝騰沓係路愈聞惡之乃上表極諌帝大怒持示宰相將抵以死裴度崔羣曰愈言訐牾罪之誠宜然非內懷至忠安能及此願少寬假以來諌爭帝曰愈言我奉佛太過猶可容至謂東漢奉佛以後天子咸夭促言何乖刺耶愈人臣狂妄敢爾固不可赦於是中外駭懼雖戚里諸貴亦為愈言乃貶潮州刺史既至潮以表哀謝帝頗感悔欲復用之持示宰相曰愈前所論是大愛朕然不當言天子事佛乃年促耳皇甫鏄素忌愈直即奏言愈終狂疏可且內移乃改袁州刺史𥘉愈至潮問民疾苦皆曰惡溪有鱷魚食民畜産且盡民以是窮數日愈自往視令其屬秦濟以一羊一豕投溪水而祝之是夕暴風震電起溪中數日水盡涸西徙六十里自是潮無鱷魚患袁人以男女為隸過期不贖則沒入之愈至悉計庸得贖所沒歸之父母七百餘人因與約禁其為隸洪譜云公以十四年已亥正月癸巳貶潮州刺史宰相疑馮宿草疏出宿為歙州刺史時宰相皇甫鏄程異也公之𬒳謫即日上道便道取疾以至海上據宜城驛記則以三月二日過官城據龍吏詩則以三月幾望至曲江據謝表則以三月二十五至潮州據祭文則以四月二十四日逐鱷魚其自曲江至潮以十許日行三千里蓋瀧水湍急故也方考乃云謝表及祭神文皆止云今月而逐鱷魚文正本皆但云年月日則公之到郡實不知何月日也兄自韶至廣雖為順流而自廣之惠自惠之潮水陸相半要非旬日可到故公表亦云自潮至廣來往動皆經月則公到郡決非三月而逐鱷魚亦未必在四月二十四日也某今按道里行程則方説為是但與太顚第一書石本乃云匹月七日則又似實以三月二十五日到郡也未詳其説闕之可也洪譜又云公自京師至潮有路旁堠至藍關示姪孫湘武關西逢配流吐蕃食曲河驛坎鄧州界過南陽隴吏題臨瀧寺至韶州寄張使君酬張使君惠書過始興江口感懷贈元十八協律𥘉南食貽元十八答柳柳州食蝦蟇别趙子諸詩及宜城驛記潮州謝表祭鱷魚文請置鄉校牒賀册尊號表是年七月己丑羣臣上尊號大赦十月己巳凖例量移改授袁州刺史召拜國子祭酒洪譜云十五年庚子閏正月穆宗即位公以今年春到袁途中有酬張韶州端公及韶州留别張使君二詩至袁有袁州謝上賀穆宗即位賀赦賀册皇太后賀慶雲五表舉韓泰自代狀滕王閣記九月召拜國子祭酒而閣記乃云十月袁州刺史者蓋命下在九月受命在十月也有祭湘君夫人文祭文所謂復其章綬者公為行軍司馬時賜金紫今為祭酒始復其舊也自袁䞦京師有次石頭驛寄江西王中丞閣老仲舒詩至江州有寄鄂嶽李天失程及題西林寺故蕭二郎中舊堂詩因話録云蕭穎土子存字佰誠為金部貟外郎惡裴延齡之為人棄官歸廬山公少時嘗受金部賞知及經江州遊廬山訪金部故居因賦此詩留百縑以拯之行次安陸有寄隨州周貟外君巢二詩至棗陽縣有題廣昌館詩至襄州有醉中留别李相公詩以冬暮至京師是年有南海廟碑與孟簡書論黃家賊事宜及典貼良人男女狀又論夷獠請因改元大慶遣使宣諭仍擇經略使撫之又有柳子厚及姪孫滂祭文墓志洪譜又云行狀云公入遷祭酒有直講能説禮而陋容學官多豪族子擯之不得共食公命吏曰召直講來與祭酒共食學官由此不敢賎直講奏儒生為學官日使會講生徒奔走聽聞者相喜曰韓公來為祭酒國子監不寂寞矣公在國子有雨中寄張藉詩舉張推素自代及請復國子監生徒狀論新注學官牒薦張藉狀請上尊號表轉兵部侍郎洪譜云此除在長慶元年辛丑七月時有舉韋顗自代狀李郱張徹祭文李郱鄭羣薛戎墓志今按方氏增考論錢重物輕狀當在此年秋鎮州亂殺田弘正而立王廷湊詔愈宣撫既行衆皆危之元稹言韓愈可惜穆宗亦悔詔愈度事從宜無必入愈曰安有受君命而滯留自顧遂疾驅入廷湊嚴兵迓之甲士陳庭既坐廷湊曰所以紛紛者乃此士卒也愈大聲曰天子以公為有將帥材故賜以節豈意同賊反邪語未終士前奮曰先太師為國擊朱滔血衣猶在此軍何負朝廷乃以為賊乎愈曰以為爾不記先太師也若猶記之固善且為逆與順利害不能逺引古事但以天寶來禍福為爾等明之安祿山史思明李希烈梁崇義朱滔朱泚吳元濟李師道有若子若孫在乎亦有居官者乎衆曰無愈曰田公以魏博六州歸朝廷官中書令父子受旗節劉悟李祐皆大鎮此爾軍所共聞也衆曰弘正刻故此軍不安愈曰然爾曹害田公又殘其家矣復何道衆乃歡曰侍郎語是廷湊恐衆心動遽麾使去因泣謂愈曰今欲廷湊何所為愈曰神策六軍之將如牛元翼比者不少但朝廷顧大體不可棄之公久圍之何也廷湊曰即出之愈曰若爾則無事矣會元翼亦潰圍出廷湊不追愈歸奏其語帝大恱轉吏部侍郎洪譜云良慶元年七月鎮州亂殺田弘正立王廷湊命深州刺史牛元翼節度深冀以討之十月命裴度為鎮州四靣行營都招討使無翼為廷湊所圍二年壬寅二月赦廷湊詔愈宣撫歸而牛元翼果出行狀云公還於上前奏與廷湊及三軍語上大恱日卿直向伊如此道由是有意大用授吏部待郎某今按先太師謂故鎮帥王武俊也神道碑云方鎮反太原兵以輕利誘回紇召先生禍福譬引虎齧臃血直今所患非兵不足遽疏陳得失某今按此數語不可曉它書亦皆無之未詳何謂恐有誤也洪譜又云是年有次壽陽驛次太原呈副使吳郎中次氶天營奉酬裴司空鎮州路上酬裴司空重見寄鎮州𥘉歸諸詩及韋侍講盛山詩序論變鹽法事宜狀二年士寅九月轉吏部侍郎行狀云凡令史皆不鎖聽出入或問公公曰人所以畏鬼者以其不能見也鬼如可見則人不畏矣選人不得見令史故令史勢重聽其出入故勢輕是年有鄆州溪堂詩竇同業祭文墓志楚國夫人墓志黃陵廟碑時宰相李逢吉惡李紳欲逐之遂以愈為京兆尹兼御史大夫特詔不臺參而除紳中丞紳果劾奏愈愈以詔自解其後文刺紛然宰相以臺府不協遂罷愈為兵部侍郎而出紳江西觀察使紳見帝得留愈亦復為吏部侍郎洪譜云三年癸卯六月以吏部侍郎為京兆尹兼御史大夫敕放臺參後不得為例十月癸巳為兵部侍郎庚子為吏部侍郎行狀云改京兆尹六軍將士皆不敢犯私相告曰是尚欲燒佛骨者安可忤故盜賊止遇旱米價不敢上李紳為御史中丞械囚送府使以尹村杖之公曰安有此使歸其囚是時紳方幸旦夕且相宰相欲去之故以臺與府不協為請兩改其官紳既復留公入謝上日卿與紳爭何事公因自辨數目復為吏部侍郎神道碑云復為兵部侍郎銓不鎖入吏選父七十母六十身七十悉與二利取才財勢路絶某今按碑失兵部一節此兵字當作吏字不鎖入吏即謂前縱吏出生事三利取才未詳其義疑銓法有此語或是有脫誤也洪譜云公為京兆有舉馬揔自代狀賀雨及賀太陽不虧表祭竹林神曲江祭龍文再為兵部有舉張正甫自代狀是年有羅池廟碑送鄭權序并詩祭馬揔女拿文并李干女拿墓志韓弘碑論孔戣致仕狀長慶四年卒年五十七贈禮部尚書諡曰文洪譜云四年甲辰正月敬宗即位二月有王仲舒碑四月有張徹墓志八月有孔戣墓請是年公沒年五十七行狀云得病滿百日假既罷以十二月二日卒於靖安里第公屬纊語曰某伯兄德行髙曉方藥食必視本草年止於四十二某踈愚食不擇禁忌位為侍郎年出伯兄十五嵗矣如又不足於何而足且獲終於牖下幸不至失大節以下見先人可謂榮矣明年張籍祭公詩有云去夏公請告養疾城南莊籍時官休罷兩月同遊翔又曰共愛池上佳聮句舒遐情又曰公為遊溪詩唱詠多既康城南莊在長安城南公之别墅也池上聮句集中無之遊溪詩即南溪始乏三首是也又曰公有曠逹識生死為一綱及當臨終晨意色亦不荒贈我珍重言傲然委衾裳其於死生之際如此神道碑云遺命喪葬無不如禮俗習夷狄畫寫浮圖日以七數之及拘隂陽所謂吉凶一無汚我某今按此事可見公之平生謹守禮法排斥異教自信之篤至死不變可以為後丗法而譜下載蓋不以為然也愈性明鋭不詭隨與人交終始不少變成就後進士往往知名經愈指授皆稱韓門弟子愈官顯稍謝遣凡內外親若交友無後者為嫁遣孤女而恤其家嫂鄭喪為服期以報行狀云公氣厚性通論議多大體神道碑云朝有大獄大疑文武會同莫先發言先生援經引決考合傳記侃侃正色伏其所詞墓志云公洞朗軒闢不施戟級平居雖寢食未嘗去書怠以為枕餐以餄口講評孜孜以磨諸生恐不完美遊以詼笑惸歌使皆醉義忘歸嗚呼可謂樂易君子巨人者矣碑又云內外惸弱悉撫之一親以仁使男有官女有從不啻於巳生交於人巳而我負終不計死則庀其家均食剖資雖微弱待之如賢戚人詬笑之愈篤未嘗一食不對客閨人或晝見其靣退祖指語以為異事未嘗宿貨餘財每曰吾前日解衣質食今存有巳多矣每言文章自漢司馬相如太史公劉向揚雄後作者不丗出故愈深探本元卓然樹立成一家言其原道原性師説等數十篇皆奧衍閎深與孟軻揚雄相表裏而佐佑六經云至它文造端置辭要為不襲蹈前人者然惟愈為之沛然若有餘至其徒李翶李漢皇甫湜從而效之遽不及逺甚從愈遊者若孟郊張籍亦皆自名於時墓志云先生之作無圖無方至是歸工抉經之心執聖之權尚友作者跋邪抵異以扶孔氏存皇之極知人罪非我計茹古涵今無有端涯渾渾灝灝不可窺校及其酣放豪曲快字凌𥿄怪發鯨鏗春麗驚耀天下然而栗密窈眇章安句適精能之至入神出天嗚呼極矣後人無以加之矣姬氏巳來一人而止矣某今按知人罪非我計此句中必有脫誤疑當云人知人罪非我所許方氏附録程子日韓愈亦近丗豪傑之士如原道之言錐不能尢病然自孟子以來能知此者獨愈而巳其日孟子醉乎醇又曰荀與揚也擇焉而不精語焉而不詳若無所見安能由千載之後判其得失若是之明也又曰退之晚年之文所見甚髙不可易而讀也古之學者修德而巳有德則言可不學而能此必然之理也退之乃以學文之故日求其所未至故其所見及此其於為學之序雖若有所戾者然其言日軻之死不得其傳此非有所襲於前人之語又非鑿空信口率然而言之是必有所見矣若無所見則其所謂以是而傳者果何事邪人今按諸賢之論唯此二條為能極其深處然復考諸臨川王氏之書則其詩有日紛紛易盡百年身舉丗何人識道真力去陳言誇未俗可憐無輔費精神其為豫奪乃有人不同者故嘗折其衷而論之竊謂程子之意固為得其大端而王氏之言亦自不為無理蓋韓公於道知其用之周於萬事而未知其體之具於吾之一心知其可行於天下而未知其本之當先於吾之一身也是以其言常詳於外而略於內其志常極於逺大而其行未必能謹於細微雖知文與道有內外淺深之殊而終未能審其緩急重輕之序以決取舍雖知汲汲以行道濟時抑邪與正為事而或未免雜乎貪位慕祿之私此其見於文字之中信有如王氏所譏者矣但上氏雖能言此而其所謂道真者實乃老佛之餘波正韓公所深詆則是楚雖失而齊亦未為得耳故今兼存其説而因附以狂妄管窺之一二私竊以為若以是而論之則於韓公之學所以為得失者庶幾其有分乎贊曰唐興承五代剖分王政不綱文弊質窮蛙俚混并天下巳定治荒剔蠹討究儒術以興典憲薰醲涵浸殆百餘年其後文章稍稍可述至貞元元和間愈遂以六經之文為諸儒倡障隄末流反刓以朴剗偽以真然愈之才自視司馬遷揚雄至班固以下不論也當其所得粹然一出於正刋落陳言橫騖别驅汪洋大肆要之無抵牾聖人者其道蓋自比孟軻以荀況揚雄為未淳寧不信然至進諌陳謀排難恤孤矯拂偷末皇皇於仁義可謂篤道君子矣自晉訖隋老佛顯行聖道不斷如帶諸儒倚天下正議助為怪神愈獨喟然引聖爭四海之惑雖蒙訕笑跲而復奮始若未之信卒大顯於時昔孟軻拒揚墨去孔子才二百年愈排二家乃去千餘歲撥衰反正功與齊而力倍之所以過況雄為不少矣自愈沒其言大行學者仰之如泰山北斗云
