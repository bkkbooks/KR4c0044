front:
  text: 朱文公校昌黎先生集卷之十八考異音擇附
  hash: sha256:e7f8f04670eeaade108f2aebd9ff8cc5411c72b89989476aae99b4fb466c5523
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_018-1a}
body:
  text: 書與鳯翔邢部尚書書或作京西節度使邢尚書方亦如此而無下三字邢謂邢君牙也愈再拜布衣之士身居窮約不借勢於王公大人則無以成其志王公大人功業顯著不借譽於布衣之士則無以廣其名是故布衣之士雖甚賤而不諂王公大人雖甚貴而不驕其事勢相須其先後相資也今閣下為王瓜牙為國藩垣威行如秋仁行如春戎狄棄申而逺遁朝廷髙枕而不虞是豈負大丈夫平生之志願哉豈負明天子非常之顧遇哉下豈上或有是字赫赫乎洸洸乎功業逐日以新名聲隨風而流或無洸洸乎三字宜乎歡呼海隅髙談之士奔走天下慕義之人使或願馳一傳或願操一戈納君於唐虞收地於河湟操上或無或願二字湟或作隍然而未至乎是者蓋亦有説云蓋亦或作亦蓋説上有其字非是豈非待士之道未甚厚遇士之禮未甚優請粗言其事閣下試詳而聽之夫士之來也必有求於閣下夫以貧賤而求於富貴正其宜也閣下之財不可以遍施於天下在擇其人之賢愚而厚薄等級之可也假如賢者至閣下乃一見之愚者至不得見焉則賢者莫不至而愚者日逺矣或無日字假如愚者至閣下以千金與之賢者至亦以千金與之則愚者莫不至而賢者日逺矣亦方作又抗本無賢者至與之九字非是日或作亦欲求得士之道盡於此而巳欲求士之賢愚在於精鑒慱采之而巳得或作待已下或並有矣字精鑒於已固已得其十七八矣又博采於人百無一二遺者焉方無固字若果能是道愈見天下之竹帛不足書閣下之功德天下之金石不足頌閣下之形容矣能或作行德下或有矣字愈也布衣之士也布上或有固字上下或無也字生七歲而讀書十三而能文二十五而擢第於春官以文名於四方前古之興亡未嘗不經於心也當丗之得失未嘗不留於意也常以天下之安危在邊常或作嘗故六月于邁來觀其師及至此都徘徊而不能去者誠恱閣下之義願少立於階墀之際望見君子之威儀也此上方無至字不上方無而字能下或有速字去或作進不能去或作不敢遽進際或作下居十日而不敢進者誠以左右無先為容進下或有謁字誠字或在容字下容下或有也字方無以左至為容七字皆非是懼閣下以衆人視之則殺身不足以滅恥徒悔恨於無窮故先此書序其所以來之意閣下其無以為狂而以禮進退之幸甚幸甚先下或有陳字書下方有陳字皆非是來之下或復有之字其無以或無其字或無以字洪氏家譜云公以正元八年壬申二十五歲中第十一年乙亥二十八歲上宰相書求官不得而歸出潼關作二鳥賦又據程致道説既出潼關因遊鳯翔上邢君牙書今按程説大誤蓋賦序言五月過潼關而此書言六月至鳯翔潼關在長安之東鳯翔在長安之西相距六百餘里豈有五月方東出潼關而六月遽能復西至鳯翔之理此書決非此年所作必是八年以後十年以前嘗至鳯翔而有此書及岐山下等詩也愈再拜為人求薦書某聞木在山馬在肆遇之而不顧者雖日纍千萬人未為不材與下乘也過方作過及至匠石過之而不睨伯樂遇之而不顧然後知其非棟梁之材超逸之足也以某在公之宇下非一日而又辱居姻婭之後是生于匠石之園長于伯樂之廄者也於是而不得知假有見知者千萬人亦何足云方無有字云下或有耳字或有爾字今幸賴天子每歲詔公卿大夫貢士若某等比咸得以薦聞若下或有于字而無比字或無等字是以冒進其説以纍於執事亦不自量巳然執事其知某如何哉昔人有鬻馬不售於市者知伯樂之善相也從而求之伯樂一顧價增三倍某與其事頗相類是故終始言之耳諸本皆如此方獨從閣杭本以其知某如何哉為其如某何哉而無昔人以下四十三字今按此書本為人求薦而杭本曰執事其如某何哉則似決以其人力不能薦巳矣故諸本或作執事其知某何如哉語意似弱而亦未有懇切必求之意又無結末收拾之語敢又繼以鬻馬之説文意方似粗足然亦重復無竒文意首尾不甚通暢恐尚有脫誤處更詳之某再拜應科目時與人書或作與韋舍人月日愈再拜天池之濵大江之濆音汾水際曰有怪物焉蓋非當鱗凡介之品彚匹儔也匹方作比其得水變化風雨上下于天不難也天下或有地字其不及水蓋尋常尺寸之間耳無髙山大陵曠塗絶險為之關隔也然其窮涸不能自致乎水為獱獺上音頻下音闥水狗也選獱獺睒瞲乎奩空之笑者蓋十八九矣或無十字矣或作年方從謝本云唐舉子禮部及弟例須守選選未蒲或就制舉或書判拔萃方獲出仕此書謂其不及水蓋尋常尺寸之間是專指宏詞試也言出之嗤笑者十而八九乃上宰相書所謂得其所者爭笑之是也本多作八九年其義非也如有力者哀其窮而轉運之蓋一舉手一投足之勞也然是物也負其異於衆也且曰爛死於沙泥吾寧樂之若俯首帖耳搖尾而乞憐者非我之志也是以有力者遇之熟視之若無覩也其死其生固不可知也今又有有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎而轉方作而輸轉之清波或作轉致之波濤其哀之命也其不哀之命也知其在命而且鳴號之者亦命也鳴或作呼嗚下或有且字或作而鳴且號愈今者實有類於是是以忘其踈愚之罪而有是説焉閣下其亦憐察之答劉正夫書正或作嵒方云此書謂賢尊給事者劉伯芻也伯芻三子寬夫端夫巖夫無名正夫者故蜀本刋作嵒豈正夫即嵒夫邪今且從舊愈白進士劉君足下辱箋教以所不及既荷厚賜且愧其誠然幸甚幸甚凡舉進士者於先進之門何所不往方無凡字先進之於後輩苟見其至寧可以不答其意邪來者則接之舉城士大夫莫不皆然而愈不幸獨有接後輩名名之所存謗之所歸也接後輩下或有之字有來問者不敢不以誠答或問為文宜何師必謹對曰宜師古聖賢人曰古聖賢人所為書具存辭皆不同宜何師必謹對曰師其意不師其辭又問曰文宜易宜難必謹對曰無難易惟其是爾如是而巳非固開其為此而禁其為彼也諸本無爾如是字巳下有矣字謝校矣作爾或作耳夫百物朝夕所見者人皆不注視也及覩其異者則共觀而言之夫文豈異於是乎漢朝人莫不能為文獨司馬相如太史公劉向揚雄為之最然則用功深者其收名也逺若皆與丗沈浮不自樹立雖不為當時所怪亦必無後丗之傳也沈浮或作浮沈足下家中百物皆賴而用也然其所珍愛者必非常物夫君子之於文豈異於是乎今後進之為文能深探而力取之以古聖賢人為法者雖未必皆是要若有司馬相如太史公劉向揚雄之徒出必自於此不自於循常之徒也後下或無進字若上或無要字不下方無自字若聖人之道不用文則巳用則必尚其能者能者非他能自樹立不因循者是也有文字來誰不為文然其存於今者必其能者也顧常以此為説耳顧常或作必當或作顧當愈於足下沗同道而先進者又常從遊於賢尊給事既辱厚賜又安得不進其所有以為答也足下以為何如或作如何愈白答殷侍御書方云殷侑也或注銜字非是某月日愈頓首辱賜書周覽纍日竦然增敬蹙然汗出以慙愈於進士中粗為知讀經書者一來應舉事隨日生雖欲加功竟無其暇遊從之類相熟相同不教不學悶然不見巳缺日失月亡以至於老月或作日所謂無以自别於常人者每逢學士真儒歎息踧踖愧生於中顔變於外不復自比於人句前者蒙示新注公羊春秋前者或作前人非是又聞口授指略私心喜幸恨遭逢之晚願盡傳其學職事羈纒未得繼請怠惰因循不能自強此冝在擯而不教者今反謂少知根本其辭章近古可令敘所注書惠出非望承命反側善誘不倦斯為多方敢不喻所指八月益涼時得休假或作睱倘矜其拘綴不得走請務道之傳而賜辱臨執經座下獲卒所聞是為大幸况近丗公羊學幾絶何氏後漢何休任城人太傳陳蕃辟與參政事蕃敗休坐廢銅乃作春秋公羊解話妙得公羊本意作公羊墨守左氏膏肓榖梁廢疾墨守謂如墨翟之守城不可攻也於是鄭康成乃發墨守針膏盲起廢疾休見歎日康成入吾室操吾戈以伐我注外不見他書聖經賢傳屏而不省要妙之義無自而尋非先生好之樂之味於衆人之所不味務張而明之其孰能勤勤綣綣若此之至固鄙心之所最急者綣綣或作拳拳如遂蒙開釋章分句斷其心曉然直使序所注挂名經端自託不腐其又奚辭將惟先生所以命辝或作詞愈再拜答陳商書方云唐志有商集十七卷愈白辱惠書語髙而旨深三四讀尚不能通曉茫然增愧赧又不以其淺弊無過人知識且喻以所守幸甚知或作智且方作具愈敢不吐情實然自識其不足輔吾子所須也齊王好竽有求仕於齊者操瑟而往立王之門三年不得入方無者字叱曰吾瑟鼓之能使鬼神上下吾鼓瑟合軒轅氏之律吕諸本皆如此方獨從閣杭本以律吕二字為宫字云國語琴瑟尚宫鐘尚羽重者從細輕者從大今按方氏所引國語是也然凡作樂者八音並奏而其一音之中大者為宫細者為羽莫不皆有五聲之序又以六律六吕節之然後聲之大細得其次弟而不差書所謂聲依永律和聲而八音克諧是也其日琴瑟尚宫者非謂琴瑟只有宮聲也但以絲聲大細恐其掩於衆樂而不可聽故大其器使其聲重大而與衆樂相稱耳其中固有五聲而聲必中律吕也方意似以琴瑟專為宫聲而不用它律吕者故特取此誤本耳今從諸本客罵之曰王好竽而子鼓瑟雖工如王不好何瑟字句絶諸本如此方獨以鼓為瑟而為句絶其下瑟字乃屬下句曽本上亦作瑟而下作之皆非是是所謂工於瑟而不工於求齊也求齊或作竽或無也字皆非是今舉進士於此丗求祿利行道於此丗而為文必使一丗人不好得無與操瑟立齊門者比歟求上或有也字道於下方無此字文雖工不利於求求不得則怒且怨不知君子必爾為不也雖或作誠或雖上有誠字故區區之心則疑其有所未睹且於日用之間亦未見其有以存飬省察而躰之於身也是以雖其所以自任者不為不重而其平生用力深處終不離乎文字言語之工至其好樂之私則又未能卓然有以自拔於流俗所與遊者不過一時之文七其於僧道則亦僅得毛干暢觀靈惠之流耳是其身心內外所立所資不越乎此亦何所據以為息邪距詖之本而充其所以自任之心乎是以一旦放逐憔悴亡聊之中無復平日飲博過從之樂方且欎欎不能自遣而卒然見夫瘴海之濵異端之學乃有能以義理自勝不為事物侵亂之人與之語雖不盡解亦豈不足以蕩滌情纍而暫空其滯礙之懷乎然則凡此稱譽之言自不必諱而於公所謂不求其福不畏其禍不學其道者𥘉亦不相妨也雖然使公於此能因彼稊稗之有秋而悟我黍稷之未熟一旦翻然反求諸身以盡聖賢之藴則所謂以理自勝不為外物侵亂者將無復羡於彼而吾之所以自任者益恢乎其有餘地矣豈不偉哉及祭神至海上遂造其廬及來袁州留衣服為别乃人之情非崇信其法求福田利益也孔子云丘之禱久矣凡君子行巳立身自有法度聖賢事業具在方册可效可師仰不愧天俯不愧人內不愧心積善積惡殃慶自各以其類至慶下或無自字何有去聖人之道捨先王之法而從夷狄之教以求福利也詩不云乎愷悌君子求福不回傳又曰不為威惕不為利疚假如釋氏能與人為禍祟非守道君子之所懼也况萬萬無此理崇或作福且彼佛者果何人哉其行事類君子邪小人邪若君子也必不妄加禍於守道之人如小人也其身巳死其鬼不靈天地神祇昭布森列非可誣也布森方作森布令按公進平淮西碑狀亦有森列字可考又肯令其鬼行胸臆作威福於其間哉進退無所據而信奉之亦且惑矣或作非大惑歟且愈不助釋氏而排之者其亦有説孟子云今天下不之楊則之墨楊墨交亂而聖賢之道不明則三綱淪而九法斁禮樂崩而夷狄橫幾何其不為禽獸也故曰能言距楊墨者皆聖人之徒也子下或有有字或復出聖賢之道不明六字楊子雲云古者楊墨塞路孟子辭而闢之廓如也云或作日夫楊墨行正道廢且將數百年以至於秦卒滅先王之法燒除其經坑殺學士天下遂大亂至方作涘非是其經或作經書或下有書字及秦滅漢興且百年尚未知修明先王之道其后始除挾書之律稍求亡書招學士經雖少得尚皆殘缺十亡二三尚皆方無尚字或作皆尚故學士多老死新者不見全經不能盡知先王之事各以所見為守分離乖隔不合不公二帝三王羣聖人之道於是大壞後之學者無所尋逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也孟子雖賢聖不得位空言無施雖切何輔然賴其言而今學者尚知宗孔氏崇仁義貴王賤霸而巳崇方作貴上又有知字今按宗上巳有知字王上又有貴字不應復出方本非是其大經大法皆亡滅而不救壞爛而不收所謂存十一於千百安在其能廓如也然向無孟氏則皆服左袵而言侏離上音朱後漢甫蠻傳衣裳班闌語言侏離注蠻夷語聲也語不明之貌矣故愈嘗推尊孟氏以為功不在禹下者為此也向方作苟漢氏已來羣儒區區修輔百孔千瘡隨亂隨失其危如一髮引千鈞綿綿延延􅐛以微滅方無氏字於是時也而唱釋老於其間鼓天下之衆而從之嗚呼其亦不仁甚矣甚方作耳釋老之害過於楊墨韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於巳壞之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在傍又安得因一摧折自毀其道以從於邪也而粗或作目粗籍湜輩雖屢指教不知果能不叛去否辱吾兄眷厚而不獲承命惟增慙懼死罪死罪愈再拜答吕醫山人書愈白惠書責以不能如信陵執轡者史記魏公子無忌封信陵若魏有隱士侯嬴為大梁夷門監者公子從車騎虛左自迎侯生攝弊衣冠直上載公子上坐欲以觀公子公子執轡愈恭夫信陵戰國公子欲以取士聲勢傾天下而然耳如僕者自度若丗無孔子不當在弟子之列僕下方無者字以吾子自山出有朴茂之美意恐未礱磨以丗事又自周後文弊百子為書各自名家方無書各自各四字非是亂聖人之宗後生習傳雜而不貫貫或作實故設問以觀吾子其巳成熟乎將以為友也其未成熟乎將以講去其非而趨是耳下熟乎或作熟邪趨下或有其字不如六國公子有市於道者也方今天下入仕惟以進士明經及卿大夫之丗耳其人率皆習熟時俗工於語言識形勢善候人主意方從閣本意下有在乎云意在謂意之所嚮也左氏晉君少安不在諸侯趙穿有寵而弱不在軍事漢書王莽意不在哀義祖此也今按但如諸本語意巳足不假在字為音也政使能竒亦復幾何而巳不勝其贅矣此近丗所謂古文昔之弊而謂韓公為之哉恐閣本𥘉亦失誤而方乃曲為之説以誤後人故不可以不辨或者又疑在亦草書者字之誤更詳之故天下靡靡日入於衰壞恐不復振起務欲進足下趨死不顧利害去就之人於朝以爭救之耳非謂當今公卿間無足下輩文學知識也不得以信陵比然足下衣破衣繫麻鞋率然叩吾門吾待足下雖未盡賔主之道不可謂無意者破上方無衣字繫上方有腳字者下或有也字足下行天下得此於人蓋寡乃遂能責不足於我此真僕所汲汲求者議雖未中節其不肯阿曲以事人者灼灼明矣阿曲方無曲字或作效俗或可上仍有效字或作效阿俗方將坐足下三浴而三熏之聽僕之所為少安無躁愈頓首答渝州李使君書或注方古二字乖隔年多不獲數附書慕仰風味未嘗敢忘書下或有狀字使至連辱兩書告以恩情迫切不自聊賴連辱方作辱連𥿄重序河南事迹本末文字綢密典實可尋而推究之明萬萬無一可疑者欽想所為益深勤企欽上方有重字豈以愈為粗有知識可語以心而告之急哉是比數愈於人而收之何幸之大也於下或有古字愈雖無節槩知感激若使在形勢親狎於要路有言可信之望雖百悔吝不敢默默知上疑脫一字信或作伸方云信音伸之下或無望字敢下方無復出默字今按衆本皆未安疑本用易有言不信之語若作言有可信而讀如字則其義通矣更詳之今既無由緣進言言之恐益纍髙明是以負所期待竊竊轉語於人不見成效此愈之罪也然不敢去心期之無巳以報見待惟且遲之勿遽捐罷幸甚去心或作忘去其心或無期之無巳四字捐或作止今按捐罷字疑衍又按此書題一作狀故其詞亦用俗躰不甚作文莊子云知其無可奈何而安之若命者聖也傳曰君子俟命然無所輔益進其厭飫者祗增愧耳良務寬大愈再拜答元侍御書九月五日愈頓首微之足下前歲辱書論甄逢父濟識安祿山必反即詐為喑棄去棄或作亡祿山反有名號又逼致之濟死執不起卒不汙祿山父子事又論逢知讀書刻身立行勤巳取足不干州縣斥其餘以救人之急足下繇是與之交欲令逢父子名迹存諸史氏方作事非是足下以抗直喜立事斥不得立朝失所不自悔喜事益堅微之乎子真安而樂之者抗或作伉謹詳足下所論載校之史法若濟者固當得附書附字疑衍蓋濟固合立傳下應言附書也今逢又能行身幸於方州大臣以摽白其先人事白方作目載之天下耳目徹之天子追爵其父第四品赫然驚人逢與其父俱當得書矣濟逢父子自吾人發春秋美君子樂道人之善夫苟能樂道人之善則天下皆去惡為善善人得其所其功實大足下與濟父子俱宜牽聮得書足下勉逢令終始其躬而足下年尚強嗣德有繼將大書特書屢書不一書而巳也愈既承命又執筆以俟愈再拜朱文公校昌黎先生集卷之十八
