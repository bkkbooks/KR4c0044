front:
  text: 朱文公校昌黎先生集卷之十四考異音釋附
  hash: sha256:d7fd7cd9faeb84f68018e877dace21aba8f3c46ed458d5f1844828da866292ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_014-1a}
body:
  text: 雜著鄆州溪堂詩并序此篇方多從石本憲宗之十四年始定東平三分其地孫曰謂析李師道所據十三州為三鎮馬㧾鄆曹濮等州觀察使薛平青州刺史王遂沂州刺史以華州刺史禮部尚書兼御史大夫扶風馬公為鄆音運秦為薛郡地漢為東平國曹濮音卜古昆吾之墟節度觀察等使鎮其地公下或有㧾字既一年褒其軍號曰天平軍上即位之二年召公入且將用之以其人之安公也復歸之鎮安下或有於字此句或作以彼之人安於公也上之三年公為政於鄆曹濮也適四年矣治成制定衆志大固惡絶於心仁形於色竱心一力以供國家之職竱心一力或作竭心力竱或作竭一或作戮方云竱旨兖切專也國語竱本肇末于時沂密始分而殘其師方云沂帥王遂也洪日謂十四年沂海將王辨殺其觀察使王遂自稱留後其後幽鎮魏不恱於政相扇繼變謂長慶元年幽州盧龍軍都知兵馬使朱克融囚其節度使張洪靖以反成德軍大將王廷湊殺其節度田弘正以反二年魏博節度使田布自殺兵馬使史憲誠自稱留後復歸於舊於政或作于政方云謂張弘靖𬒳囚田弘正史憲誠皆為下所殺徐亦乘勢逐帥自置同於三方置或作署或置上有署字方云此謂崔羣為王智興所逐也惟鄆也截然中居四鄰望之若防之制水恃以無恐閣杭蜀及諸本皆有四鄰望之一句方從石本刪去今按文勢及當時事實皆當有此句若其無之則下文所謂恃以無恐者為誰恃之邪大凡為人作文而身或在逺無由親視摹刻既有脫誤又以毀之重勞遂不能改若此者蓋親見之亦非獨古為然也方氏最信閣杭蜀本雖有謬誤往往曲從今此三本幸皆不誤而反為石本脫句所奪甚可笑也然而皆曰鄆為虜巢且六十年將強卒武曹濮於鄆州大而近方云曹濮於鄆自為一句或作於曹濮州非是軍所根柢皆驕以易怨而公承死亡之後掇拾之餘剝膚椎髓公私掃地赤立新舊不相保持萬目睽睽持或作恃公於此時能安以治之其功為大若幽鎮魏徐之亂不扇而變此功反小何也公之始至衆未孰化以武則忿以憾以恩則橫而肆或無以憾二字或作而撼一以為赤子一以為龍蛇憊蒲拜切病也心罷音疲精磨以歲月然後致之難也及教之行衆皆戴公為親父母夫叛父母從仇讎非人之情故曰易下或有也字於是天子以公為尚書右僕射封扶風縣開國伯以褒嘉之或無公及封字縣或作郡公亦樂衆之和知人之恱而侈上之賜也於是為堂於是居之西北隅號曰溪堂以饗士大夫通上下之志既饗其從事陳曽謂其衆言公之畜此邦其勤不亦至乎此邦之人纍力隹切繫也説文綴得理也公之化惟所令之不亦順乎上勤下順遂濟登兹不亦休乎昔者人謂斯何今者人謂斯何雖然斯堂之作意其有謂而喑無詩歌是不考引公德而接邦人於道也德下或無而字乃使來請其詩曰帝奠九壥與㕓同有葉有年有荒不條河岱之間不或作有及我憲考一收正之收或作牧視邦選侯以公來尸公來尸之人始未信公不飲食以訓以徇孰飢無食孰呻孰歎孰冤不問不得分願孰為邦蟊亡侯切螣也節根之螟蟊或作蛑音義同羊狠狼貪以口覆城吹之喣之摩手拊之針之石之膊音粕而磔陟格切説文薄脯膊之屋上左氏成二年傳龍人囚靈蒲就魁殺而膊諸城上磔閃也張也針或作針之凡公四封既富以疆謂公吾父孰違公令可以師征不寧守邦師方從石本作帥今按平淮西碑云屢興師征作師為是石本或誤未可知也公作溪堂播播流水淺有蒲蓮深有蒹葦公以賔燕其鼓駭駭方云此詩十一章以令叶強以駭叶水皆古音也令有平聲一讀公獨孤郁墓志亦見淮南子勿驚勿駭方物將自理勿撓勿櫻万物將自清駭古音自與理叶也周官注疾雷擊鼓日駭西京賦所謂駭雷鼓是也今按古音之説甚善吳才老輔音輔韻二書其説甚詳駭水叶韻如𬋩子宫如牛鳴盎中徴如負豕覺而駭亦一證也沙隨程可久曰吳説雖多其例不過四聲互用切響通用二條而巳此説得之如通其説則古書雖不盡見今可以例推也公燕溪堂賔校醉飽流有跳魚岸有集鳥既歌以舞其鼓考考公在溪堂公御琴瑟公暨賔贊稽經諏律稽考也􅓪訪也施詩智切用不差人用不屈溪有薲苽上音蘋下音孤孫日説文薲蘋也苽凋胡也周禮魚宜苽有龜有魚公在中流右詩左書無我斁徒故切又音亦遺於子孫二失字下或並有之字今夫功德如是祥祉如是其善持之也可知巳既巳或無此二字因敘之為貓相乳説云下或有爾字非是進士䇿問十三首問書稱汝則有大疑謀及乃心謀及卿士以至于庶人龜筮考其從違以審吉凶則是聖人之舉事興為無不與人共之者也吉凶方從蜀本作凶吉今按經傳凡言吉凶者多先吉而後凶惟協韻諧聲則或倒用而近丗好竒之士不問可否一例倒用則失之矣此類當徐讀而從其聲之諧者不能悉論也於易則又曰君不密則失臣臣不密則失身幾事不密則害成而春秋亦有譏漏言之詞如是則又似不與人共之而獨運者下或有也字書與易春秋經也聖人於是乎盡其心焉耳矣其文相戾悖如此欲人之無疑不可得巳是二説者其信有是非乎抑所指各殊而學者不之能察也諒非深考古訓讀聖人之書者其何能辨之方作也此固吾子之所宜無讓君願承救焉誰下或無者字者下方有也字問古之人有云夏之政尚忠殷之政尚敬而周之政尚文是三者相循環終始若五行之與四時焉原其所以為心皆非故立殊而求異也各適於時救其弊而巳矣夏殷之書存者可見矣夏殷下或無之字非是至周之典籍咸在考其文章其所尚若不相逺然焉所謂二者之異云乎逺下方無然字焉或作烏今按當有然字而焉字屬下句但其下疑當有一有字作烏亦通其下疑或有一睹字抑其道深微不可究歟將其詞隱而難知也不然則是説為謬矣周之後秦漢蜀吳魏晉之興與霸亦有尚乎無也或無興與字觀其所為其亦有意云爾循環之説安在吾子其為所隱焉問夫子之序帝王之書而繫以秦魯及次列國之風而宋魯獨稱頌焉秦穆之德不踰於二霸穆或作魯非是宋魯之君不賢乎齊晉其位等其德同升黜取捨如是之相逺亦將有由乎願聞所以辨之之説問夫子既沒聖人之道不明蓋有楊墨者始侵而亂之其時天下咸化而從焉孟子辝而闢之則既廓如也或無其時字或無則字今其書尚有存者其道可推而知不可乎或無知字非是其所守者何事其不合於道者幾何孟子之所以辭而闢之者何説之者或作之也今之學者有學於彼者乎有近於彼者乎其巳無傳乎其無乃化而不自知乎其無傳也則善矣如其尚在將何以救之乎尚在方從閣杭苑作在尚無將字今按若久方本則尚何以救之乎乃是恐不及救之意與比上下文不相入其説非是諸生學聖人之道必有能言是者其無所為讓問所貴乎道者不以其便於人而得於巳乎當周之衰管夷吾以其君霸九合諸侯一匡天下戎狄以微京師以尊四海之內無不受其賜者天下諸侯奔走其政令之不暇而誰與為敵此豈非便於人而得於已乎人下方無而字巳作身今據上文及詳語勢方説非是秦用商君之法人以富國以強諸侯不敢抗及七君而天下為秦使天下為秦者商君也而後代之稱道者咸羞言管商氏何哉庸非求其名而不責其實歟願與諸生論之無惑於舊説名下或無而字其實或作於實舊或作記非是句下或有焉字問夫子之言盍各言爾志盍上或有曰字又曰居則曰不吾知也如或知爾則何以哉今之舉者不本於鄉不序於庠一朝而羣至乎有司有司之不之知也宜矣不之或無之字今將自州縣始請各誦所懷聊以觀諸生之志死者可作其誰與歸此下或有又曰居是邦也六字事其大夫之賢者友其士之仁者敢問諸生之所事而友者為誰乎而或作所為或作其所謂賢而仁者其事如何哉言及之而不言亦君子之所不為也方無之所二字問春秋之時百有餘國皆有大夫士詳於傳者無國無賢人焉其餘皆足以充其位不聞有無其人而闕其官者聞下或無有字春秋之後其書尤詳以至于吳蜀魏下及晉氏之亂國分如錙側時切銖市朱切讀其書亦皆有人焉魏字或在晉下謂元魏尓蓋不然也三國之魏豈應略而不言乎今天下九州四海其為土地大矣國家之舉士內有明經進士外有方維大臣之薦其餘以門地勳力進者又有倍於是其為門户多矣有倍或作加倍而自御史臺尚書省以至于中書門下省咸不足其官豈今之人不及於古之人邪何求而不得也夫子之言曰十室之邑必有忠信如丘者焉誠得忠信如聖人者而委之以大臣宰相之事有不可乎委之以方作以委之非是况於百執事之微者哉古之十室必有任宰相大臣者今之天下而不足士大夫於朝其亦有説乎問夫子曰潔淨精微易教也今習其書不識四者之所謂盍舉其義而陳其數焉問易之説曰乾健也易上或有周字説下或有者字今考乾之爻在𥘉者曰潛龍勿用在三者曰夕惕若厲無咎在四者亦曰無咎在上曰有悔卦六位一勿用二苟得無咎一有悔安在其為健乎二或作一非是又曰乾以易知坤以簡能乾之四位既不為易矣坤之爻又曰龍戰于野戰之於事其足為簡乎野下或有其而玄黃四字易六經也學者之所宜用心願施其詞陳其義焉或無所字非是問人之仰魚向切恃也而生者榖帛榖帛豐無飢寒之患然後可以行之於仁義之途措之於安平之地此愚智所同識也者下或有在字豐上或有既字今天下榖愈多而帛愈賤人愈困者何也愈賤方作益賤而字疑當在賤字下但此正與張中丞傳後城壞而其徒皆死云云者相類恐公自有此一種句法也耕者不多而榖有餘𧖟者不多而帛有餘有餘宜足而反不足此其故又何也將以救之其説如何問夫子言堯舜垂衣裳而天下理又曰無為而理者其舜也歟書之説堯曰親九族又曰乎章百姓又曰協和萬邦又曰曆象日月星辰敬授人時又曰洪水懷山襄陵下人其咨人或作民此試進士當避諱作民者非是夫親九族平百姓和萬邦則天道授人時愁水禍非無事也而其言曰垂衣裳而天下理者何也於舜則曰慎五典又曰敘百揆又曰賔四門又曰齊七政又曰類上帝禋六宗望山川遍羣神又曰協時月正日同律度量衡五載一巡狩又曰分十二州封山濬川恤五刑典三禮彰施五色出納五言封諸本作隨非是嗚呼其何勤且煩如是而其言曰無為而理者何也將亦有深辭隱義不可曉邪抑其年代巳逺失其傳邪二三子其辨焉抑其下或有所字非是巳逺或作逺矣方無巳字問古之學者必有師所以通其業成就其道德者也德下或無者字由漢氏巳來師道日微氏或作代方無巳字然猶時有授經傳業者及于今則無聞矣德行若顔回言語若子貢政事若子路文學若子遊猶且有師非獨如此雖孔子亦有師問禮於老𥅆問樂於萇弘是也方無雖字今之人不及孔子顔回逺矣而且無師無下或有所字然其不聞有業不通而道德不成者何也或無而字問食粟衣於既切下同帛服仁行義以俟死者二帝三王之所守聖人未之有改焉者也今之説者有神仙不死之道不食粟不衣帛薄仁義以為不足為是誠何道邪聖人之於人猶父母之於子二於字或皆作于有其道而不以教之不仁其道雖有而未之知不智仁與智且不能又烏足為聖人乎烏或作焉不然則説神仙者妄矣爭臣論爭或作諌方云曰本及歐公與范司諌書溫公通鑑皆作爭或問諌議大夫陽城於愈可以為有道之士乎哉學廣而聞多不求聞於人也行古人之道居於晉之鄙晉之鄙人薰其德而善良者幾千人大臣聞而薦之天子以為諌議大夫子下或無以字人皆以為華陽子不色喜或無人字及色字皆非是居於位五年矣視其德如在野彼豈以富貴移易其心哉在下或有草字移易方作易移愈應之曰是易所謂恆其德貞而夫子凶者也惡音烏得為有道之士乎哉在易蠱之上九云不事王侯髙尚其事蹇之六二則曰王臣蹇蹇匪躬之故夫不以所居之時不一而所蹈之德不同也之時之德方並無之字若蠱之上九居無用之地而致匪躬之節以蹇之六二在王臣之位而髙不事之心則冒進之患生曠官之刺興志不可則而尤不終無也蹇上或有以字事下或有上字尤下或有之字終或作絶或作始皆非是今陽子在位不為不久矣聞天下之得失不為不熟矣天子待之不為不加矣而未嘗一言及於政今陽子下或有實一匹夫四字或作實一介之夫下再出陽子二字或作實匹夫陽子亦再見及下方無於字視政之得失若越人視秦人之肥瘠音籍忽焉不加喜戚於其心問其官則曰諌議也問其祿則曰下大夫之秩也問其政則曰我不知也有道之士固如是乎哉夫下方元之字且吾聞之有官守者不得其職則去有言責者不得其言則去今陽子以為得其言言乎哉得其言而不言與不得其言而不去無一可者也乎上或無復出言字按此語正謂陽子若自謂得其言則何不言乎哉或本非是陽子將為祿仕乎古之人有云仕不為貧而有時乎為貧謂祿仕者也宜乎辭尊而居卑辭富而居貧若抱關擊柝者可也蓋孔子嘗為委於為切吏矣嘗為乘田矣亦不敢曠其職必曰會計當而巳矣必曰牛羊遂而巳矣若陽子之秩祿不為卑且貧章章明矣而如此其可乎哉秩祿或作祿秩或曰否非若此也夫陽子惡訕上者惡為人臣招音翹其君之過而以為名者故雖諌且議使人不得而知焉方云舊本招下注音翹二字武子好盡言以招人過見國語漢書五行志蘇林讀招為翹招舉也朱元憲曰考它書未獲為翹之意作音者當有所據今按吕氏春秋孔子之徑能招國門之關注招舉也又過秦論招八州而朝同列蘇林亦音翹書曰爾有嘉謨嘉猷則入告尓后于內尓乃順之于外曰斯謨斯猷惟我后之德夫陽子之用心亦若此者愈應之曰若陽子之用心如此滋所謂惑者矣滋或作兹非是入則諌其君出則使人知者大臣宰相者之事非陽子之所宜行也夫陽子本以布衣隱於蓬蒿之下方無本以字主上嘉其行誼擢在此位官以諌為名誠宜有以奉其職使四方後代知朝廷有直言骨鯁之臣天子有不僭賞從諌如流之美庶岩穴之士聞而慕之束帶結髮願進於闕下而伸其辭説致吾君於堯舜熙鴻號於無窮也若書所謂則大臣宰相之事非陽子之所宜行也且陽子之心將使君人者惡聞其過乎是啓之也是啓或作其咎非是或曰陽子之不求聞而人聞之不求用而君用之不得巳而起守其道而不變何子過之深也愈曰自古聖人賢士皆非有求於聞用也有下或有心字閔其時之不平人之不乂得其道不敢蜀善其身而必以兼濟天下也必方作不孜孜矻矻音窟死而後巳故禹過家門不入孔席不暇暖而墨突不得黔門下或有而字彼二聖一賢者豈不知自安佚之為樂哉誠畏天命而悲人窮也夫天授人以賢聖才能豈使自有餘而巳誠欲以輔其不足者也輔上方本有自字者下無也字云自者指言天之所授也義為長今按韓公之意乃言天生聖賢非但使之自有餘也乃欲以輔衆人之不足耳故下文云云方説非是耳目之於身也耳司聞而目司見聽其是非視其險易然後身得安焉聖賢者時人之耳目也時人者聖賢之身也目下或無也字且陽子之不賢則將役於賢以奉其上矣若果賢則固畏天命而閔人窮也惡音烏得以自暇逸乎哉則將或作且將於賢或作於身皆非是或曰吾聞君子不欲加諸人而惡訐以為直者或無欲字若吾子之論直則直矣無乃傷于德而費於辭乎好盡言以招音翹人過國武子之所以見殺於齊也吾子其亦聞乎愈曰君子居其位則思死其官未得位則思修其辭以明其道我將以明道也非以為直而加人也且國武子不能得善人而好盡言於亂國是以見殺而好盡言於亂國方本作而言盡言盡言於亂國今按方本殊無文理傳曰惟善人能受盡言謂其聞而能改之也子告我曰陽子可以為有道之士也今雖不能及巳陽子將不得為善人乎哉或無哉字改葬服議經曰改葬緦春秋榖梁傳亦曰改葬之禮緦舉下𬗟也此皆謂子之於父母其他則皆無服何以識其必然經次五等之服小功之下然後著改葬之制更無輕重之差以此知惟記其最親者其他無服則不記也若主人當服斬衰其餘親各服其服則經亦言之不當惟云緦也云一作言傳稱舉下𬗟者𬗟猶逺也下謂服之最輕者也以其逺故其服輕也最輕下或無者也字女下或無其字江熙曰禮天子諸侯易服而葬以為交於神明者不可以純凶况其𬗟者乎或無其字是故改葬之禮其服惟輕以此而言則亦明矣衛司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦既葬而除之不忍無服送至親也非父母無服無服則弔服而加麻此又其著者也文子又曰喪服既除然後乃葬則其服何服乃葬下或有者字或有也字子思曰三年之喪未葬服不變除何有焉未下或有除字非是然則改葬與未葬者有異矣古者諸侯五月而葬大夫三月而葬士逾月無故未有過時而不葬者也過時而不葬謂之不能葬春秋譏之下而不葬或無而字若有故而未葬雖出三年子之服不變此孝子之所以著其情先王之所以必其時之道也雖有其文未有著其人者以是知其至少也方無是字改葬者為山崩水涌毀其墓及葬而禮不備者若文王之葬王季以水齧其墓魯隱公之葬惠公以有宋師太子少葬故有闕之類是也諸本無故字方從舊監本云考之左氏當有喪事有進而無退有易以輕服無加以重服殯於堂則謂之殯瘞於野則謂之葬近代巳來事與古異或遊或仕在千里之外或子幼妻稚而不能自還稚下方無而字甚者拘以隂陽畏忌遂葬於其土及其返葬也逺者或至數十年近者亦出三年其吉服而從於事也久矣又安可取未葬不變服之例而反為之重服歟在喪當葬猶宜易以輕服况既逺而反純凶以葬乎若果重服是所謂未可除而除不當重而更重也而除下或有之字更下或無重字非是或曰喪與其易也寧戚雖重服不亦可也曰不然易之與戚則易固不如戚矣雖然未若合禮之為懿也儉之與奢則儉固愈於奢矣雖然未若合禮之為懿也過猶不及其此類之謂乎或曰經稱改葬緦而不著其月數則似三月而後除也子思之對文子則曰既葬而除之今宜如何似或作以非是曰自啓至于既葬而三月則除之未三月則服以終三月也啓下或有賔字至下或無既字今按禮有自啓至于反哭之語方本是也曰妻為夫何如曰如子或無日如二字非是無弔服而加麻則何如曰今之弔服猶古之弔服也省試學生代齋郎議諸本此下有貞元十年應博學宏詞九字齋郎職奉宗廟社稷之小事蓋士之賤者也執豆籩駿奔走以役于其官之長不以德進不以言揚蓋取其人力以備其事而巳矣奉宗廟社稷之小事執豆籩駿奔走亦不可以不敬也於是選大夫士之子弟未爵命者以塞貟填關而教之行事子上或無之字其勤雖小其使之不可以不報也必書其歲歲既久矣於是乎命之以官而授之以事其亦微矣哉學生或以通經舉或以能文稱其微者至於習法律知字書皆有以贊於教化可以使令於上者也自非天姿茂異曠日經久以所進業發聞於鄉閭稱道于朋友薦於州府而升之司業則不可得而齒乎國學矣所進或作進所方本作進以進或作道然則奉宗廟社稷之小事任力之小者也贊於教化可以使令於上者德藝之大者也其亦不可移易明矣或無然字稷下或無之字今議者謂學生之無所事謂齋郎之幸而進不本其意因謂可以代任其事而罷之蓋亦不得其埋矣亦或作以今夫齋郎之所事者力也學生之所事者德與藝也以德藝舉之而以力役之是使君子而服小人之事且非國家崇儒勸學誘人為善之道也此一説不可者也抑又有大不可者焉宗廟社稷之事雖小不可以不專敬之至也古之道也今若以學生兼其事及其歲時日月然後授其宗彜罍洗其周旋必不合度其進退必不得宜其思慮必不固其容貌必不莊此其無他其事不習而其志不專故也非近於不敬者歟又有大不可者其是之謂歟莊此下其字疑衍非上或有此字若知此不可將令學生恆掌其事而隳壤其本業則是學生之教加少學生之道益貶而齋郎之實猶在齋郎之名苟無也知此戓作知其教或作教大凡制度之改政令之變利於其舊不什則不可為巳又况不如其舊哉什或作然方云此商君傳所謂利不百不變法工不什不易器是也如下方有於字考之於古則非訓稽之於今則非利尋其名而求其實則失其宜失或作去非是故曰議罷齋郎而以學生薦享亦不得其理矣文苑此篇前後有議曰謹議四字禘祫議方校作祫禘今按篇內皆作禘祫方誤也右今月十六日勑旨宜令百僚議限五日內聞奏者將仕郎守國子監四門博士臣韓愈謹獻議曰伏以陛下追孝祖宗肅敬祀事宗下方有廟字今按此等公家文字或施於君上或布之吏民只用當時體式直述事意乃易曉而通行非如詩篇等於戲劇銘記期於久逺可以時出竒怪而無所拘也故韓公之文雖日高古然於此等處亦未嘗敢故為新巧以失莊敬平易之體但其間反覆曲折説盡事理便是真文章它人自不能及耳方本非是後皆倣此凡在擬議不敢自專在或作有擬方作疑聿求厥中延訪羣下然而禮文繁漫所執各殊自建中之𥘉迄至今歲屢經禘祫未合適從臣生遭聖明涵泳恩澤雖賤不及議而志切效忠切方作在今按官不及議而自言則作切為是今輒先舉衆議之非然後申明其説一曰獻懿唐武德始立四廟宣簡公懿王景皇帝元皇帝開元中乃詔宣皇帝為獻祖元皇帝為懿祖廟主宜永藏之夾室臣以為不可廟或作之夫祫者合也毀廟之主皆當合食於太祖獻懿二祖即毀廟主也今雖藏於夾室至禘祫之時豈得不食於太廟乎名曰合祭而二祖不得祭焉不可謂之合矣祭焉方作登焉詳上下文作登非是二曰獻懿廟主宜毀之瘞之臣又以為不可諸本毀下或無之字或毀之下再有宜字今按上之字疑當作而謹按禮記天子立七廟一壇一墠音善其毀廟之主皆藏於祧廟雖百代不毀祫則陳於太廟而饗焉自魏晉巳降始有毀瘞之議事非經據竟不可施行今國家德厚流光創立九廟以周制推之獻懿二祖猶在壇墠之位况於毀瘞而不禘祫乎三曰獻懿廟主宜各遷於其陵所臣又以為不可二祖之祭於京師列於太廟也二百年矣今一朝遷之豈惟人聽疑惑抑恐二祖之靈眷顧依遲不即饗於下國也遲諸本作違方從閣杭蜀苑云新史與文粹作依違以意改也甘泉賦徠祗郊堙神所依兮徘徊招搖靈屖迡兮屖音栖迡與遲同皆徐行也顔曰言神久留安處不即去也四曰獻懿廟主宜附於興聖廟而不禘祫臣又以為不可傳曰祭如在景皇帝雖太祖其於屬乃獻懿之子孫也雖下方有為字其於方作於其今欲正其子東向之位廢其父之大祭固不可為典矣父之或作父子父下或并有子之字皆非是五曰獻懿二祖宜别立廟於京師臣又以為不可夫禮有所降情有所殺是故去廟為祧去祧為壇去壇為墠去墠為鬼漸而之逺其祭益稀方無去璮去墠四字之逺作逺之今詳四字祭法本文之猶適也言漸而適逺也方本皆誤昔者魯立煬宫春秋非之以為不當取巳毀之廟既藏之主而復築宫以祭今之所議與此正同又雖違禮立廟至於禘祫也合食則禘無其所廢祭則於義不通此五説者皆所不可其所方作所主義或作經或作禮今按此言若作別廟則不當禘於太廟又不當禘於别廟故云禘無其所若以無可禘祫之所而遂直廢其祭則於義又有不可通者故其説如此方本誤也故臣博采前聞求其折中以為殷祖玄王周祖后稷太祖之上皆自為帝又其代數巳逺不復祭之故太祖得正東向之位子孫從昭穆之列禮所稱者蓋以紀一時之宜非傳於後代之法也蓋以方作蓋曰或無於字傳曰子雖齊聖不先父食蓋言子為父屈也景皇帝雖太祖也其於獻懿則子孫也當禘祫之時獻祖宜居東向之位景皇帝宜從昭穆之列祖以孫尊孫以祖屈求之神道豈逺人情之神或作神之非是又常祭甚衆合祭甚寡則是太祖所屈之祭至少所伸之祭至多比於伸孫之尊廢祖之祭不亦順乎衆或作頻方云新書陳京傳亦作衆今按韓公本意獻祖為始祖其主當居𥘉室百丗不遷懿祖之主則當遷於太廟之西夾室而太祖以下以次列於諸室四時之享則唯懿祖不與而獻祖太祖以下各祭於其室室自為尊不相降厭所謂所伸之祭常多者也禘祫則唯獻祖居東向之位而懿祖太祖以下皆序昭穆南北相向於前所謂祖以孫尊孫以祖屈而所屈之祭常少者也韓公禮學精深蓋諸孺所不及故其所議獨深得夫孝子慈孫報本反始不忘其所由生之本意真可為万丗之通法不但可施於一時也程子以為不可漫觀者其謂此類也歟但其文字簡嚴讀者或未遽曉故切推之以盡其意云事異殷周禮從而變非所失禮也所字疑衍臣伏以制禮作樂者天子之職也陛下以臣議有可采粗合天心斷而行之是則為禮議下方有為字如以為猶或可疑乞召臣對面陳得失庶有發明謹議省試顔子不二過論論曰登孔氏之門者衆矣三千之徒四科之目孰非由聖人之道為君子之儒者乎目方作夫由或作曰其於過行過言亦云鮮矣而夫子舉不二過惟顔氏之子其何故哉請試論之夫聖人抱誠明之正性根中庸之正德苟發諸中形諸外者不惟思慮莫匪規矩不善之心無自入焉可擇之行無自加焉故惟聖人無過所謂過者非謂發於行彰於言人皆謂之過而後為過也所上方有故字非是生于其心則為過矣故顔子之過此類也不二者蓋能止之于始萌絶之於未形不二之於言行也中庸曰自誠明謂之性自明誠謂之教自誠明者不勉而中不思而得從容中道聖人也無過者也自明誠者擇善而固執之者也明誠者上或無自字不勉則不中不思則不得不二過者也故夫子之言曰回之為人也擇乎中庸得一善則拳拳服膺而不失之矣又曰顔氏之子其殆庶幾乎言猶未至也而孟子亦云顔子具聖人之體而微者皆謂不能無生于其心而亦不暴之於外考之於聖人之道差為過耳亦不或無亦字顔子自惟其若是也於是居陋巷以致其誠飲一瓢以求其志或無飲字不以富貴妨其道不以隱約易其心確乎不拔浩然自守知髙堅之可尚忘鑽仰之為勞任重道逺竟莫之致是以夫子歎其不幸短命今也則亡謂其不能與已並立於至聖之域觀教化之大行也不然夫行發於身加於人言發乎邇見乎逺或無不然字下或併無夫字苟不愼也敗辱隨之而後思欲不二過其於聖人之道不亦逺乎而夫子尚肯謂之其殆庶幾孟子尚復謂之具體而微者哉則顔子之不二過盡在是矣謹論方無謹論字與李祕書論小功不稅書祕書官稱也或無書字而以祕為人名及論作問又稅下無書字者皆非是劉敞原父之論曰曽子曰小功不稅則是逺兄弟終無服也而可乎韓子嘗吊於人見其貌戚其意哀而其服吉者問之曰何也曰小功不稅也是以葬子疑之而作小功不稅之書夫之子之疑是也彼人之為非也然而小功不稅禮也韓子曰君子於其骨肉死則悲哀而為之服者豈牽於外哉聞其死則悲哀豈有間於新故死哉甚矣韓子之逹於禮而近之也雖然疑之未盡也求之不得也夫為服者至親之恩以期斷其殺至于大功兄弟之恩以小功止其殺至于緦外親之服以緦窮其殺至于袒􅊵聖人之制禮豈苟言情哉亦著於文而巳矣大功稅小功不稅其文至于是也兄弟之服不過小功外親之服不過緦其情至于是也因其情而為之文親踈之殺見矣故禮大功以上不謂之兄弟兄弟有加而大功無加無加者親親也有加者報之也親親者稅不親親者不稅是亦其情也且禮專為情乎亦為文乎如專為情也則至親不可以期斷小功不可以不稅如為文也則至親之期斷小功之不稅一也夫曽子韓子隆於情而不及文失禮之指而疑其説雖然韓子疑之是也彼人之為非也何以言之邪小功雖不稅亦不吉服而巳矣記曰聞逺兄弟之喪既除喪而后聞之則免祖哭之成踊夫若是奚其吉哉故曰彼人之為非也韓子疑之是也小功不稅禮也然則免袒成踊其巳矣乎猶有加焉曰我未之聞也雖然降而無服者麻不稅是亦降而無服巳哀之以其麻哭之以其情逾月然後巳其亦愈乎吉也曾子稱小功不稅則是逺兄弟終無服也而可乎鄭玄注云以情責情以情上諸本有是字方云鄭注無此語只云以巳恩怪之今之士人遂引此不追服小功不上或有而字小功服最多親則叔父之下殤與適音的孫之下殤與昆弟之下殤尊則外祖父母常服則從祖祖父母禮沿人情其不可不服也明矣功服或作功之服或無常字古之人行役不踰時各相與處一國其不追服雖不可猶至少人方作時又無相字非是然各字亦疑誤今之人男出仕女出嫁或千里之外家貧訃告不及時則是不服小功者恆多而服小功者恆鮮矣君子之於骨肉死則悲哀而為之服者豈牽於外哉豈下或有有字聞其死則悲哀豈有間於新故死哉今特以訃告不及時聞死出其日數則不服其可乎愈常怪此近出弔人見其顔色戚戚類有喪者而其服則吉問之則云小功不稅者也戚戚或作戚容類下或有於字喪或作服稅下方無者字禮文殘缺師道不傳不識禮之所謂不稅果不遣服乎無乃别有所指而傳注者失其宗乎伏惟兄道德純明躬行古道如此之類必經於心而有所決定不惜示及幸甚幸甚泥水馬弱不敢出不果鞠躬親問而以書悚息尤深弱作溺愈再拜太學生何蕃傳方本無太學生字傳作書云此文總於書類當從舊本今按此當作傳而入書類未詳其説但其之士必有待然後能有所立獨何蕃歟吾是以言之無亦使其無傳焉無下或無亦字答張籍書籍遺公書云古之胥教誨舉動言語無非相示以義非苟相諛恱而已執事不以籍愚暗時稱發其善教所不及施誠相與不間塞於他人之説是近於古人之道也籍仐不復以義是執等而拒歡來者烏所謂承人以古人之道歟須承論於執事嘗以為丗俗陵靡不及古昔蓋聖人之道廢弛之所為也宣尼沒後楊朱墨翟恢詭異説于惑人聽孟軻作書而正之聖人之道復存于丗秦氏滅學漢重以黃老之術教人使人䆮惑楊雄作法言而辨之聖人之道猶明及漢衰末西域浮屠之法入于中國中國之人丗丗譯而廣之黃老之術相沿而熾天下之言善者推二者而已矣昔者聖人以天下生生之道曠乃物其金木水火士榖藥之用以厚之因人資善乃明乎仁義之德以教之俾人有常故治生相存而不殊今天下資於生者咸備聖人之器用至於人倩則溺乎異學而不由乎聖人之道使君臣父子夫婦朋友之義沉于丗而邦家繼亂固仁人之所痛也自楊子雲作法言至今近千載莫有言聖人之道者言之者誰執事焉耳習俗者聞之多怪而不信徒相為訾終無禆於教也執事聰明文章與孟軻揚雄相若盍為一書以興存聖人之道使時之人後之人知其去絶異學之所為乎曷可俯仰於俗囂囂為多言之徒哉然𣣔舉聖人之道者其身亦宜由之也比見執事多尚駮雜無實之説使人陳之於前以為歡此有以纍於令德又商論之際或不容人之短如任私尚勝者亦有所纍也先王存六藝自有常矣有德者不為猶以為損况為博塞之戲與人競財乎君子固不為也今執事為之以廢棄時日竊實不識其然且執事言論文章不謬於古人今所為或有不出於丗之守常者竊未為得也願執事絶博塞之好棄無實之談弘廣以接天下士嗣孟軻楊雄之作辨楊墨老釋之説使聖人之道復見於唐豈不尚哉籍誠知之以材識頑鈍不敢竊居作者之位所以咨於執事而為之尓若執事守章句之學因循于時置不朽之盛衰與夫不知言亦無以異矣籍再拜愈始者望見吾子於人人之中固有異焉上人字或作衆仐按人人乃衆人之義此篇下文及後與孟東野書别本歐陽詹哀詞皆有之然不見於它書疑當時俗語也及聆其音聲接其辭氣則有願交之志因緣幸會遂得所圗豈惟吾子之不遺抑僕之所遇有時焉耳近者嘗有意吾子之闕焉無言意僕所以交之之道不至也意吾子下或再出吾子字非是言下方無意字今乃大得所圗脫然若沈痾去體灑然若執熱者之濯清風也然吾子所論排釋老不若著書嚻嚻多言徒相為訾若僕之見則有異乎此也見上或有所字夫所謂著書者義止於辭耳宣之於口書之於簡何擇焉孟軻之書非軻自著軻既殁其徒萬章公孫丑相與記軻所言焉耳或作者耳僕自得聖人之道而誦之排前二家有年矣不知者以僕為好辨也然從而化者亦有矣聞而疑者又有倍焉頑然不入者親以言諭之不入則其觀吾書也固將無得矣為此而止吾豈有愛於力乎哉無下或有所字得下或無矣字然有一説化當丗莫若口傳來丗莫若書又懼吾力之未至也未至方作不能或至下更有至之不能四字三十而立四十而不惑吾於聖人既過之猶懼不及矧今未至固有所未至耳請待五六十然後為之冀其少過也吾子又譏吾與人人為無實駮雜之説此吾所以為戲耳比之酒色不有間乎吾子譏之似同浴而譏祼裎也與下或無復出人字説見上裎方作體若商論不能下氣或似有之當更思而悔之耳博塞之譏敢不承教其他俟相見薄晚須到公府言不能盡或無言字愈再拜重答張籍書籍遺公第二書云籍不以其愚輒進説於執事執事以導進之分復賜還答曲折教之使昏塞者不失其明然猶有所見顧復於執事以畢其説焉夫老釋惑乎生人久矣誠以丗相沿化而莫之知所以久惑乎尓執事材識明曠可以任著書之事故有告焉今以為言諭之不入則觀書亦無所得為此而止未為至也一處一位在一卿其不知聖人之道可以言諭之不入乃舍之猶有巳化者為證也天下至廣民事至衆豈可資一人之口而親諭之者近而不入則舍之逺而有可諭者又豈可以家至而説之乎故曰莫若為書為書而知者則可以化乎天下矣可以傳於後丗矣若以不入者而止為書則為聖人之道奚傳焉士之壯也或從事於要劇或旅遊而不安宅或偶時之喪亂皆不皇有所為况有疾疚吉凶虞其間哉是以君子汲汲於所欲為恐終無所顯於後若皆待五六十而後有所為則或有遺恨矣今執事雖參於戎府當四海弭兵之際優遊無事不以此時著書而曰俟後或有不及曷可追乎天之與人性度巳有器也不必老而後有成立者昔顔子之庶幾豈待五六十乎執事目不覩聖人而究聖人之道材不讓於顔子矣今年巳踰之曷懼於年未至哉顔子不著書者以其從聖人之後聖人巳有定制故也若顔子獨立於丗必有所云著也古之學君臣父子之道必資於師師之賢者其徒數千人或數百人是以沒則紀其師之説以為書若孟軻者是巳傳者猶以孟軻自論集其書不云沒後其徒為之也後軻之丗發明其學者楊雄之徒咸自作書今師友道喪侵不及楊雄之丗不自論著以興聖人之道欲待孟軻之門人必不可冀矣君子發言舉足不逺於理未嘗聞以駮雜無實之説為戲也執事每見其説亦拊抃呼笑是撓氣害性不得其正矣苟正之不得曷所不至焉或以為中不失正將以苟恱於衆是戲人也是玩人也非示人以義之道也吾子不以愈無似意欲推而納諸聖賢之域而或作之拂其邪心增其所未髙謂愈之質有可以至於道者浚其源導其所歸溉其根將食其實此盛德者之所辭讓况於愈者哉德下或無者字抑其中有宜復者故不可遂巳昔者聖人之作春秋也既深其文辭矣然猶不敢公傳道之口授弟子至於後丗然後甚書出焉其所以慮患之道微也或無然後二字今夫二氏之所宗而事之者下乃公卿輔相吾豈敢昌言排之哉乃或作及今按此言其下者猶是公卿輔相蓋微詞以見上自天子亦宗事二氏之意擇其可語者誨之猶時與吾悖其聲嘵嘵馨公切若遂成其書則見而怒之者必多矣必且以我為狂為惑其身之不能恤書於吾何有此句書於方作於書仍無吾字今按書於吾何有言無輔也方本誤夫子聖人也且曰自吾得子路而惡聲不入於耳其餘輔而相者周天下猶且絶糧於陳畏於匡毀於叔孫奔走於齊魯宋衛之郊其道雖尊其窮也亦甚矣窮方作躬甚作窮皆非是甚又或作至賴其徒相與守之卒有立於天下向使獨言之而獨書之其存也可冀乎今夫二氏行乎中土也蓋六百年有餘矣其植根固其流波漫非所以朝令而夕禁也自文王沒武王周公成康相與守之禮樂皆在及乎夫子未久也自夫子而及乎孟子未久也自孟子而及乎揚雄亦未久也下二及乎方並作至乎句下無也字然猶其勤若此其困若此而後能有所立吾其可易而為之哉其為也易則其傳也不逺故余所以不敢也然觀古人得其時行其道則無所為書書者皆所為不行乎今而行乎後丗者也書者上或有為字或無丗字今吾之得吾志失吾志未可知俟五六十為之未失也天不欲使兹人有知乎則吾之命不可期如使兹人有知乎非我其誰哉其行道其為書其化今其傳後必有在矣吾子其何遽戚戚於吾所為哉其何或作又何前書謂吾與人商論不能下氣若好勝者然雖誠有之抑非好已勝也好已之道勝也非好已之道勝也已之道乃夫子孟軻楊雄所傳之道也論上或無商字方云考張藉本書實有若好下或有巳字或無然字或無非好已之道勝也一語雄下方無所傳也三字皆非是若不勝則無以為道吾豈敢避是名哉若上方有傳者二字以方作所皆非是夫子之言曰吾與回言終日不違如愚則其與衆人辨也有矣駮雜之譏前書盡之吾子其復之昔者夫子猶有所戲詩不云乎善戲謔兮不為虐兮記曰張而不弛文武不能也惡害於道哉吾子其未之思乎能字本皆作為方云考之記實日張而不弛文武不能也弛而不張文武不為也則此為字當作能字乃是但李本云論衡嘗引此以􅼒董伸舒不窺園事正作為字疑公自用論衡非用戴禮也今按作為無理必有脫誤不然不應舍前漢有理之禮記而信後漢無理之論衡也况公明言記日而無論衡之云且又安知論衡之不誤哉今據公本語依禮記定作能字惡害於道哉惡或作豈於下或有為字一本作鳥害其為道哉孟君將有所適思與吾子别庶幾一來愈再拜朱文公校昌黎先生集卷之十四
