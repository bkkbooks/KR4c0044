front:
  text: 朱文公校昌黎先生集卷之二十八考異音釋附
  hash: sha256:7d1ff2924d0c435b09cb6c3ddc8045662fdd4f27b5976d0868e124a01981e6d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_028-1a}
body:
  text: 碑誌曹成王碑洪曰退之甞云凡爲文詞宜略識字如曹成王碑用剜鞣鏺掀撇掇筴跐等字是也王姓李氏諱臯字子蘭謚曰成其先王明孫曰太宗弟十四子正觀間封曹王以太宗子國曹絶復封傳五王至成王成王嗣封在玄宗丗蓋於時年十七八紹爵三年而河南北兵作天下震擾王奉母太妃逃禍民伍得間走蜀從天子或无得字或无蜀從二字天子念之自都水使者拜左領軍衛將軍衛下或有大字轉貳國子秘書王生十年而失先王哭泣哀悲弔客不忍聞䘮除痛刮磨豪習委已於學痛下或有自字稍長重知人情急丗之要恥一不通侍太妃從天子于蜀旣孝旣忠持官持身内外斬斬持身方作將身斬斬或作漸二非是由是朝廷滋欲試之於民上元元年除温州長史行刺史事江東新刳於兵郡旱飢民交走死無弔交或作皆仐按唐人語多用交字如陸宣公奏議云交駭物所交下不存済者之類意猶曰即今云尔王及州不解衣下令掊舊注𬒳垢切撃也鎖擴門悉弃倉實與民活數十萬人擴或作横活下或有者字或无十字奏報升秩少府或无報字府下或有監字與平袁賊仍徙秘書兼州别駕部告無事兼方作処云考舊傳合今按成王本以温州長史行刺史亊今两奏功而得処州别駕又不行州事則於地望事權皆爲左降矣以事理推之不應如此疑方本誤而諸本作兼者爲是盖以舊官仍兼本州别駕以寵之尔下文又云部告无亊則謂温州前此旱飢而今始无亊也又云迁真干衡則是自行刺史亊而爲眞刺史也其間不應復有処州一節明矣舊史亦承集誤不足爲拠遷眞于衡法成令脩治出張施聲生勢長真或作鎭說見上施或作弛觀察使噎媢上烏結切下音墨冒寐三音祝曰噎妬也媢怒也史記王后亦以妬􅎱不甞侍病不能出氣誣以過犯御史助之貶潮州刺史助或作劾楊炎起道州相德宗還王于衡以直前謾或无于字或无前字王之遭誣在理念太如老將驚而戚理或作治出則囚服就辯入則擁笏垂魚坦坦施施祝曰詩將其來施施注舒行也如字即貶于潮以遷入賀及是然後跪謝告實𥘉觀察使虐使將國良往戍界方云閤杭蜀本察使下有殘字而无囯字觀察使辛京杲也將囯良王囯良也馬大年所得柴氏善本无殘字良下有往字以虐字属下句云良不願往而辛強使之也然按舊史云前使貪殘新史亦云前帥貪虐囯良以富獲譴則馬說爲非是囯良只称良猶南霽雲只称雲李光顔只称顔也下文亦可併考今按文势則馬說爲是虐使亦古語新史所載疑亦以碑語料其如此耳仐从馬說但国良𥘉見當全書二名其後乃可单出如霽雲光顔亦先全書後乃單出也良以武岡叛戍衆萬人戍或作成歛兵荆黔洪桂伐之二年尤張於是以王帥湖南將五萬士以討良爲事王至則屏兵投良以書中其忌諱良羞畏乞降狐䑕進退羞或作爲鼠或作疑新史狐作首王即假爲使者從一騎踔五百里抵良壁鞭其門大呼我曹王來受良降良今安在良不得巳錯愕迎拜盡降其軍愕或作迕方云集韵愕逆各切相遇驚也或作遌隷作遌後漢寒朗傅二人錯愕不能對新舊史亦謂愕眙不敢動則此用愕字爲正太妃薨王弃部隨䘮之河南葬及荆𬒳詔責還責或作遣㑹梁崇義反王遂不敢辭以還升秩散騎常侍方无常侍字明年李希烈反或无李下四字遷御史大夫授節帥江西以討希烈命至王出止外舎禁無以家事関我裒兵大選江州羣能著直畧切職江方作洪州或作南方云考新舊史皆作洪仐按洪州即江西帥治所若只大選洪州乃是未曾出門一歩无足書者選兵江州盖爲北向進討之势故其下文遂政蔪州道里亦便史承集誤不足據當從諸本作江爲是不然則以州爲南猶勝作洪州也王親教之摶力勾卒音猝嬴越之法摶新史作團方作摶嬴或作方云樊澤之馬大年皆曰作非是嬴謂秦也越謂勾踐伐吳之兵法也今按摶徒官反團也楚詞云圜果摶兮古字通用而新書从今字也然秦紀越語丗家皆无摶力勾卒之文不知諸家之說何所據唯蘇氏古史見之則恐或是反用此碑語也摶或疑是竱字亦未有㨿但摶力无理其誤无疑耳或疑杜牧之有以力摶力之語然杜後出韓公不當用其語也曹誅五卑卑或作卑方云曹五字見馬融廣成頌曹伍相保是也馬大年云曹誅五卑敗則誅及其曹有獲則分卑其伍新書臯自將五百人教以秦兵團力法聮其賞罰弛張如一即約此碑語而爲文也艦歩二萬人以與賊遌嘬楚快切祝曰嘬謂一㪯尽脔礼記无嘬炙鋒蔡山踣音匐僵也之剜烏丸切又烏官切削也蘄之黄梅大鞣如又切一音柔祝曰鞣熟皮也又說文云耎也長平地各唐書曰臯授伊愼兵収黄梅次長平殺賊將斬級千餘相蔡山尤刀遂下蘄州長平鏺普活反祝曰說文發两刄木柄可以刈草廣済蘄州縣名廣濟掀音軒祝曰掀㪯出也蘄春亦蘄州縣名蘄春撇祝曰選撇波而済蘄水亦蘄州縣名蘄水撇普㓕皮擊也方誤作撇掇黄岡筴古業切又音夾祝曰廣韵莢著也鍼箭其漢陽縣名属汚州漢陽行跐音紫又側氏切汊側駕切水𡵨流也一作汶非是川還大膊音愽又頗落切樊曰左傳成二年殺而膊諸城上注膊磔也蘄水界中披普靡切祝曰廣䪨披開也裂也安三縣拔其州斬僞刺史方云汊川唐属沔州今漢陽地跐蹋也莊子跐黄泉而登太皇或無中字拔或作誅或作㧣馬本作誄今按左傳云又披其邑安三縣安州三縣也其州安州也此碑用字竒古有不可強通者當闕之以俟知者標匹遥切祝曰標木杪也光州有光山縣无北山恐誤光之北山􅞌他合切祝曰􅞌大食也說文云歠也隋光化二縣名並属隨州隨光化捁祝曰後漢捁羽羣注案字書從手即古文攪字謂攪優也攪古巧切一作梏械也其州捁或作梏方云廣成頌散毛族捁羽羣李賢曰捁古酷切字從手即古攪字十抽一推后山談叢云唐令民二十成丁以下爲推宋次道云推者稚也避髙宗諱而闕耳吕縉叔云推者椎也独䯻爲椎盖傳冩誤耳唐人𥘉不諱嫌名也陳以吕說爲是按史記漢書陸賈傳有魋結字注讀爲椎䯻故唐令以椎爲未冠之称此云十抽一椎者十椎而取其一以爲兵即杜詩所謂无丁而選中男者也然唐志但云十六爲中而无推字會要亦然未詳其說救兵州東北属郷還開軍受降属方作厲今按厉郷當属亳州去安州尚逺當作属大小之戰三十有二取五州十九縣民老㓜婦女不驚市買不變民下或有之字田之果榖下無一跡加銀青光禄大夫工部尚書改户部再换節臨荆及襄真食三百王之在兵天子西廵于梁希烈北取汴鄭東略宋圍陳西取汝薄東都薄或作亳非是王坐南方北向落其角距賊死咋仄革切声大也不能入寸尺亡將卒十萬盡輸其南州亡或作上非是王始政於温終政於襄恒平物估賤歛貴出民用有經一吏軌民使令家聽户視姦宄無所宿一吏方从杭蜀本作吏一云一當如壹民而重威之壹吏一軌民用吉日辰良体也使令疑衍一字宿上或无所字非是今按方說一字是也但因沈存中說吉日辰良二句遂更不問是非每有訛舛悉以迁就如此以一吏爲吏一則无理之尤耳府中不聞急歩疾呼治民用兵各有條次丗傳爲法任馬彛將愼將鍔將潜偕盡其力能任至潜九字或作任馬彜伊愼王鍔將方云替李伯潜也時馬彛掌幕府故不言將今从之偕尽其力能一作偕能尽其功偕上或有王字其力方作力其非是今按能字合在尽字上薨贈右僕射元和𥘉以子道古在朝更贈太子太師道古進士司門郎進士上或有登字下或有第迁字刺利隨唐睦徴爲少宗正兼御史中丞以節督黔中朝京師改命觀察鄂岳蘄沔安黄提其師以伐蔡且行泣曰先王討蔡實取沔鄿安黄寄惠未亡寄或作其今余亦受命有事于蔡而四州適在吾封庶其有集受或作授州或作邑先王薨於今二十五年吾昆弟在而墓碑不刻無文其實有待子無用辭乃序而詩之詩或作請方无之字皆非是辭曰太支十三曹於弟季或亡或微曹始就事微或作徵二或字並作旣或无下一句方云曹始封於正觀二十一年時太宗十三子三早卒二貶死泰与愔亦皆迁降也曹之祖王畏塞絶遷曹方作明宋景文云豈有爲人作銘而名其祖者當作曹方云明坐太子賢事降零陵王徙黔州都督謝祐逼殺之今按銘文四字未詳其義疑畏如畏厭溺之畏塞如其行塞之塞言見殺於閉塞之中而封絶於迁謫之時也方說沂是而别圖云明徙黔州都督則不知明但徙黔州而爲都督所殺遂誤以者督属上句也零王黎公不聞僅存按新史明子俊嗣王傑黎囯公皆爲武后所殺子父易封三王守名按史中宗神龍𥘉以傑子胤爲嗣曹王後明少子備自南還詔停㣧而封備備薨復封㣧所謂子父易封也㣧薨子戢詞自備至戢所謂三王守名也延延百載以有成王成王之作一自其躬文𬒳明章武薦畯功蘇枯弱彊齦音懇祝曰廣韵云齦齧也謂屡破希烈之衆其姦猖蘇枯弱疆或作吹枯蘇僵以報于宗以昭于王或无此一句王亦有子方云或云語下脫一句按公爲銘不必尽偶句用韵刘昌裔于伸舒碑可見今按刘碑脫句前巳論之不可爲去王碑虽可爲例然彼文從韵叶无可疑者而此萹下文亦不可曉不知其果然否耳處王之所唯舊之視蹶蹶居衛切祝曰蹶蹶行遽也詩良土蹶蹶陛陛實取實似下陛字方作陞云陛陞猶階而升也今按方説无理作陛陛則韵叶故且从之然其義亦不可曉大抵此萹多不可曉今姑闕之刻詩其碑爲示無止息國夫人墓誌銘貞元十五年靈州節度使御史大夫李公諱欒守邊有勞詔曰欒妻何氏可封息國夫人元和二年李公入爲户部尚書薨夫人遂專家政公之男五人女二人而何氏出者二男一女夫人教養嫁娶如一雖門内親戚不覺有纎毫薄厚御僮使治居第生産皆有條序僮下或有僕字非是居卑尊間無不順適卑尊或作尊卑命服在躬承祀孔時年若干元和七年甲子日南至以疾卒明年八月庚寅葬河南河陽夫人曾祖某綏州刺史祖某潞州别駕父某晋州録事參軍二男戡左威衛倉曹參軍倉或作胄成左清道率府録事參軍戡强以肅成敏以和或无戡下八字女子嫁興元參軍鄭博古將葬戡與成以其事乞銘於其鄰韓愈愈乃爲銘曰男主外事治不爲易主或作子非是施于其家難甚吏治難甚或作甚難非是又况公侯族大而貴夫人是專厥聲惟懿昔在貞元有錫自天錫或作息方云盖以囯封言之非也啓封備服以疇時勲時或作以婉婉夫人有籍宫門克承其後以嫁以婚隨葬東土在河之陽遥望公墳而不同藏試大理評事王君墓誌銘王荆公云退之善為銘如王適張徹銘尤竒也君諱適姓王氏好讀書懷竒負氣不肯隨人後舉選見功業有道路可指取有名節可以戾契致取下有字或作而或本無之方云戻力結切契詰結切字本作奊通俗文曰多節目謂之方言作詬賈誼傳奊詬亡節夲按取下有字當属上句言功業可指取而有之名節可以戾契而致之也不然則當作而困於無資地不能自出乃以干諸公貴人借助聲勢諸公貴人旣志得皆樂熟軟媚耳目者不喜聞生語一見輒戒門以絶門下方無以字上𥘉即位以四科募天下士君笑曰此非吾時邪即提所作書縁道歌吟趍直言試旣至對語驚人不中第益困乆之聞金吾李將軍年少喜士可撼年上或有惟簡字或无年字喜士或作喜亊乃蹐資息切祝曰小歩也詩不敢不蹐選屏氣跼蹐門告曰蹐或作踏天下竒男子王適願見將軍白事一見語合意往來門下盧從史旣節度昭義軍張甚奴視法度士欲聞無顧忌大語有以君生平告者即遣客鉤致君曰狂子不足以共事立謝客李將軍由是待益厚奏爲其衛胄曹參軍充引駕仗判官盡用其言將軍遷帥鳯翔君隨往改試大理評事攝監察御史觀察判官櫛垢爬痒民獲蘇醒居歳餘如有所不樂一旦載妻子入閿音聞又亡云切集注弘農胡縣有閿郷前漢以胡閿郷邪里聚爲戻園注云関字本從旻其後轉訛誤作門中受耳郷南山不顧中書舎人王涯獨孤郁吏部郎中張惟素比部郎中韓愈比上或有太史字日發書問訊顧不可強起不即薦明年九月疾病輿醫京師或无疾字其月某日卒年四十四十一月某日即葬京城西南長安縣界中曾祖爽洪州武寕令祖微右衛騎曹參軍父嵩蘇州崑山丞妻上谷侯氏處士髙女或无高女二字非是仐按侯高事見李翶文集髙固竒士自方何衡太師丗莫能用吾言再試吏再怒去發狂投江水𥘉處士將嫁其女懲曰吾以齟齬窮下或有瘁字一女怜之必嫁官人不以與凡子君曰吾求婦氏乆矣唯此翁可人意且聞其女賢不可以失即謾謂媒嫗鳥浩切女老称吾明經及第且選即官人侯翁女幸嫁若能令翁許我請進百金爲嫗謝諾許白翁諾許或作許諾翁曰誠官人邪取文書來君計窮吐實嫗曰無苦翁大人不疑人欺大或作丈我得一卷書粗若告身者我䄂以往翁見未必取眎幸而聽我行其謀行或作施翁望見文書銜袖果信不疑曰足矣䄂或作軸以女與王氏生三子一男二女男三歳夭死長女嫁亳州永城尉姚侹他頂切其季始十歳銘曰鼎也不可以柱之庾切韓曰淮南子曰柱不可以摘齒筐不可以持屋馬不可以服重牛不可以進速銘取此意車馬也不可使守閭佩玉長𥚑不利走趍長或作曳祗繫其逢不繫巧愚不諧其須有銜不袪須或作願非是鑚石埋辭以列幽墟扶風郡夫人墓誌銘夫人馬暢之妻夫人姓盧氏范陽人亳州城父丞序之孫吉州刺史徹之女嫁扶風馬氏爲司徒侍中莊武公之冡婦少府監西平郡王贈工部尚書之夫人𥘉司徒與其配陳國夫人元氏惟宗廟之尊重継序之不易序或作緒賢其子之才求婦之可與齊者内外親咸曰盧某舊門承守不失其𥘉親下或有戚字其子女聞教訓有幽間之德爲公子擇婦冝莫如盧氏媒者曰然卜者曰祥夫人適年若干或作十四入門而媪御皆喜旣饋而公姑交賀克受成福母有多子爲婦爲母莫不法式天資仁恕左右媵侍常蒙假與顔色人人莫不自在杖婢使數未嘗過二三雖有不懌未嘗見聲氣雖下或無有字元和五年尚書薨璲殁後以資甲天下暢以善殖財家益豊晚為豪倖侵牟乂彚妻訟析産正元末神䇿中尉楊志廉諷使納田産至順宗復賜之中官往往逼取暢畏不敢吝以至窮困當上以暢厚畜為戒夫人哭泣成疾後二年亦薨年四十有六九年正月癸酉袝于其夫之封長子殿中丞継祖孝友以類子下諸本有敖字或作穀或作榖眺本作長子継祖殿中丞孝友嗣類本或孝友上有氶考二字方云此碑謂少府監者馬暢也暢子継祖公嘗誌其墓新舊傳暢只有此一子丗系表遂之子彚暢彚子赦敡暢子迹只有継祖豈継祖先名敖邪或敖字當剛今按馬少監墓誌云君諱継祖則方說得之仍當更从眺本剛敖字但以赦以弟連名考之則又疑作敖爲是而其下或有氶考二字者乃言敖能継此平氶少傳而孝友似之也少監志云諱継祖或是反用此志誤本𥙷足而也系表又氶集誤然不可考姑从眺本而并著其所疑如此云葬有日言曰吾父友惟韓丈人視諸孤其往乞銘以其狀來愈讀曰嘗聞乃公言然吾冝銘銘曰隂幽坤從維德之恒胡登切出爲辨強乃匪婦能淑哉夫人夙有多譽來嬪大家不介母父或作父母有事賔祭酒食祗飭恊于尊章畏我侍側章或作卑方云漢廣川王傳背尊章顔注猶言公姑也作卑非是畏我侍側此句未詳畏我或作我之亦未安或疑畏當作慰及嗣内事亦莫有施齊其躬心小大順之夫先其歸其室有丘夫先其帰方作不失其帰或作夫其先帰今按下文有合葬字作天先爲是其室或作有室合葬有銘壼苦本切彛是收殿中侍御史李君墓誌銘殿中侍御史李君名虚中字常容其十一丗祖沖貴顯拓㧞丗舊注云㨿元和姓纂虚中乃冲八丗孫父惲紆愤委隕二切河南温縣尉娶陳留太守薛江童女生六子君最後生愛於其父母年少長喜學學無所不通少或作以或无少字最深於五行書以人之始生年月日所直日辰支干相生勝衰死王相並去声太元經用事者王王所生者相注春則木王而火相也斟酌推人壽夭貴賤利不利輒先處其年時百不失一二王相或作相王其說汪洋奥美関節開解萬端千緒參錯重出美或作義學者就傳其法𥘉若可取卒千忽切然失之星官暦翁莫能與其校得失進士及第試書判入等𥙷秘書正字秘書下或有省字母䘮去官卒䘮選𥙷太子校書河南尹奏䟽授伊闕尉佐水陸運事故宰相鄭公餘慶継尹河南以公爲運佐如𥘉宰相武公元衡之出劒南奏奪爲觀察推官授監察御史未幾御史臺䟽言行能髙不宜用外府即詔爲真御史半歳分部東都臺遷殿中侍御史元和八年四月詔徴旣至宰相欲白以爲起居舎人經一月疽發背六月乙酉卒年五十二其年十月戊申葬河南洛陽縣距其祖澠音泯祝曰黽池縣名史記秦王与趙王飲于澠池池令府君僑墓十里君昆弟六人先君而殁者四人其一人嘗爲鄭之滎澤尉嘗或作常非是信道士長生不死之說旣去官絶不營人事故四門之寡妻孤孩與滎澤之妻子衣食百須皆由君出自𥘉爲伊闕尉佐河南水陸運使换兩使經七年不去所以爲供給教養者及由蜀來輩類御史皆樂在朝廷進取君獨念寡稚求分司東出嗚呼其仁哉君亦好道士說於蜀得秘方能以水銀爲黄金服之冀果不死將疾謂其友衛中行大受韓愈退之謂或作爲非是曰吾夢大山裂流出赤黄物如金左人曰是所謂大還者今三矣三下或有年字君旣殁愈追占其夢曰山者艮艮爲背裂而流赤黄疽象也大還者大歸也其告之矣妻范陽盧氏鄭滑節度使兼御史大夫羣之女與君合德親戚無退一言退一或作一退或疑无字在退下男三人長曰𥘉恊律或无恊字或疑律下有郎字次曰彪其㓜曰還適三歳女子九人銘曰不贏其躬以尚其後人贏或作羸方云獨孤郁墓銘曰年再不贏惟後之成義同此也朱文公校昌黎先生集卷之二十八
