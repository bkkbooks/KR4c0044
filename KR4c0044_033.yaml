front:
  text: 朱文公校昌黎先生集卷之三十三考異音釋附
  hash: sha256:311115e120871269b29af4af10081cfc07619f8d73d88ae590f6a39aa1e73bb5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_033-1a}
body:
  text: 碑志楚國夫人墓志銘韓弘妻楚國夫人姓翟氏故檢校御史大夫宋州刺史良佐之女今司徒兼中書令許國公之妻前鄜坊節度使散騎常侍兼御史大夫公武之母或無司字坊或作州非是夫人在家以孝友聰明為父母所偏愛選所宜歸以適韓氏韓氏族大且貴又太尉劉公甥內外尊顯又或作父非是公下或有之字夫人入門上下莫不贊賀或作賢事皇姑齊國太夫人肅恭誠至奉養不怠皇姑以夫人能盡婦道稱之六親能上或有為字其事夫義以順其教子愛以公司徒公曰我之能守貴富不危溢者楚國有助焉耳大夫領梁偏師卒就蔡功受節居藩為邦家令人父母之教然也夫人以元和十四年十一月一日薨于鄜之公府春秋若干大夫委節去位奉喪以居東都詔起之辭以羸毀不任即命又加喻勉固不變天子嗟歎之起上或有再字固下或有守字長慶二年三月某日葬夫人于洛陽北山夫人生二子長曰肅元為大子司議郎以卒贈尚書主客郎中其次大夫公武也銘曰翟氏之先蓋出宗周璜顯於魏以佐文侯髙陵翟方進封髙陵侯相漢義以家酬遷于南陽始自郎苗逮魏晉宋代不絶史以至夫人太守之子司徒之妻大夫之母公居河東子在鄜畤為王屏翰有壤千里公或作父非是公曰姑止以承我祀子曰母兮莫我撫已莫我或作莫慰文駟雕軒往來有煒莫尊於母莫榮於妻從古迄今孰盛與夷用昭厥裔篆此銘詩唐故國子司業竇公墓志銘國子司業竇公諱牟字某或作字貽周六代祖敬遠嘗封西河公大父同昌司馬比四代仍襲爵名代或作丗同昌諱胤生皇考諱守東都後佐留守司徒餘慶歷六府五公文武細粗不同自始及終於公無所悔望有彼此言者六府從事幾且百人有願姦易險賢不肖不同公一接以和與信卒莫與公有怨嫌者言下或無者字其為郎官令守愼法寬惠不刻令守疑當作守令謂守法令也教誨於國學也嚴以有禮扶善遏過益明上下之分以躬先之恂恂愷悌得師之道遏或作蓋過或作惡方云漢路溫舒傳遏過者謂之妖言或無益字公一兄三弟常羣庠鞏常進士水部貟外郎朗夔江撫四州刺史羣以處士徵自吏部郎中拜御史中丞出帥黔容以卒庠三佐大府自奉先令為登州刺史鞏亦進士以御史佐淄青府皆有材名公子三人長曰周餘好善學文能謹謹致孝述父之志曲而不黷好善學文或作好學善文或作好古善文次曰某曰某皆以進士貢女子三人上某下或有少字愈少公十九歲以童子得見於今四十年始以師視公而終以兄事焉公待我一以朋友不以幼壯先後致異公可謂篤厚文行君子矣其銘曰后緡旨珉祝曰左傳曰昔有過澆滅夏后相后緡方娠逃自宋歸于有仍生少康克復舊物少康二子曰抒曰龍龍留居有仍遂為竇氏竇逃閔腹子夏以再家竇為氏聖愕樊曰史記孔子將西見趙簡子至于何聞竇鳴犢舜華之死臨河而嘆美哉洋洋乎丘之不濟此命也夫旋河犢少康二子曰杼曰龍龍六十九丗孫鳴犢為晉大夫引比引以為比相嬰撥漢納孔軌鳴犢七丗孫子嬰漢竇嬰相武帝大后好黃老而嬰務隆推儒術眨道家言此云撥漢納孔軌蓋謂嬰撥漢家黃老之習而納之孔子之道左氏所謂納民於軌物前漢敘傳所謂伏周孔之軌躅也撥一作發後去觀津安兄之子充葬觀津充之孫宣帝時以吏二千石徙平陵而家平陵而或作西遙遙厥緒夫子是承我敬其人我懷其德作詩孔哀質于幽刻或作石唐正議大夫尚書左丞孔公墓志銘孔子之後三十八丗有孫曰戣字君嚴事唐為尚書左丞年七十三三上書去官天子以為禮部尚書祿之終身而不敢煩以政上上或無三字吏部侍郎韓愈常賢其能謂曰公尚壯上三留奚去之果方無韓字留下或有公字曰吾敢要君吾年至一宜去吾為左丞不能進退郎官唯相之為二宜去方從杭本無至字云洪引龔勝邴漢俱乞骸骨苔詔古者有司年至則致事今大夫年至矣恐未必然今按洪所引漢書文理甚明方以欲從杭本之故遂以為未必然而不取殊不可曉今正之一本乙君吾二字語尤健但如此則君下却少一吾字不敢輒輔耳郎官或作郎中愈又曰古之老於鄉者將自佚非自苦閭井田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨來往也今異於是公誰與居且公雖貴而無留資何恃而歸曰吾負二宜去尚奚顧子言愈面歎曰公於是乎賢逺於人於是或作是於於音烏或元賢字皆非是明日奏疏曰臣與孔戣同在南省數與相見相上方有孔戣字今按上下文孔戣字多此不宜有戣為人守節清苦論議正平或作平正平或作直年才七十筯力耳目未覺衰老憂國忘家用意至到如戣輩在朝不過三數人陛下不冝苟順其求不留自助也不報明年長慶四年正月巳未公年七十四告薨於家贈兵部尚書公始以進士佐三府官至殿中侍御史元和元年以大理正徵纍遷江州刺史諌議大夫事有害於正者無所不言加皇太子侍讀改給事中言京兆尹阿縱罪人詔奪京兆尹三月之俸三上或無尹字權知尚書右丞明年拜右丞或作拜左丞或兩皆作左方云戣在元和中未嘗為左丞蓋權知右丞事踰年而正除右丞長慶二年還自廣州乃為左丞耳新舊史戣傳皆誤南海碑石本可考也而山谷本於為尚書左丞之上從蜀本增一復字蓋於元和兩次除授皆巳誤作左丞故又誤謂長慶為再除也陳齊之又去拜右丞三字皆非改華州刺史明州歲貢海蟲淡菜蛤蚶可食之屬自海抵京師道路水陸遞夫積功歲為四十三萬六千人奏疏罷之改華州刺史或在罷貢海物之下方云華州乃輸貢之途此疏專為遞夫而言也新史亦可考或無可食二字下邽音圭令笞外按小兒繫御史獄公上疏理之詔釋下邽令而以華州刺史為大理卿外按或作按外孫曰元和十年以李絳代戣為華州以戣為大理卿今按唐會要每歲冬以鷹犬出近畿習狩謂之外按使領徒數百恃恩恣橫郡邑懼擾皆厚禮迎犒百姓畏之如冦盜元和九年裴寰為下邽令疾其擾人但據文供饋使者歸乃譛寰有慢言上大怒將以不敬論宰相武元衡中丞裴度懇救甚切乃釋之即此事也言小貌者蓋以田獵應奉者謂之五坊小貌事見順宗實録會要亦有小使之名疑即此輩也十二年自國子祭酒拜御史大夫嶺南節度等使約以取足境內諸州負錢至二百萬悉放不收蕃舶之至泊步有下碇丁定切與句同錘舟石之稅始至有閲貨之燕犀珠磊落賄及僕隸公皆罷之賄方作財絶海之商有死于吾地者官藏其貨滿三月無妻子之請者盡沒有之沒下或無有字公曰海道以年計往復何月之拘苟有驗者悉推與之無算逺近厚守宰俸而嚴其法嶺南以口為貨其荒阻處父子相縛為奴公一禁之縛或作傳或無公一禁之四字有隨公吏得無名兒蓄不言官有訟者公召殺之吏上或有之字山谷諸黃丗自聚為豪觀吏厚薄緩急或叛或從觀不或有察字非是容桂二管利其虜掠請合兵討之冀一有功有所指取當是時天子以武定淮西河南北用事者以破諸黃為類向意助之武定或作定武類或作願皆非是公屢言逺人急之則惜性命相屯聚為冦緩之則自相怨恨而散此禽獸耳但可自計利害不足與論是非恨下或有焉字無而散字或焉字在散字下此上或有况字方無耳字天子入先言遂斂兵江西嶽鄂湖南嶺南會谷桂之吏以討之𬒳霧露毒相枕藉死百無一還安南乘勢殺都護李象古桂將裴行立容將楊旻皆無功數月自死嶺南囂然月或作日非是祠部歲下廣州祭南海廟廟入海口為州者皆憚之不自奉事常稱疾命從事自代唯公歲常自行官吏刻石為詩美之常自方作自常非是詩或作詞十五年遷尚書吏部侍郎公之北歸不載南物奴婢之籍不增一人長慶元年改右散騎常侍二年而為尚書左丞曽祖諱務本滄州東光令祖諱如圭海州司户參軍贈尚書工部郎中皇考諱岑父祕書省著作佐郎贈尚書左僕射公夫人京兆韋氏父种大理評事有四子長曰溫質四門博士遵孺遵憲溫𥙿皆明經女子長嫁中書舍人平陽路隋其季者幼下溫或作遵方云作溫與傳合蓋晚年皆從溫丗系表云四子皆從溫非也今按上文長子巳名溫質則非晚年從溫也豈以嫡庶為異耶然非要切不必強解公之昆弟五人載戡戢戵音忂公於次為第二公之薨戢自湖南入為少府監其年八月甲申戢與公子葬公于河南河隂廣武原先公僕射墓之左銘曰孔丗卅八吾見其孫丗或作三十方云此銘皆以四言為句作三十者非今按此依字當作班白而長身寡笑與言白或作自非是其尚類也莫與之倫也或作耶德則多有請考于文故江南西道觀察使贈左散騎常侍太原王公墓志銘或有中大夫洪州刺史兼御史中丞十二字公諱仲舒字弘中少孤奉其母居江南遊學有名貞元十年以賢良方正拜左拾遺改右輔闕禮部考功吏部三貟外郎貶連州司户參軍改夔州司馬佐江陵使改祠部貟外郎復除吏部貟外郎方無復字吏部貟外下或無郎字遷職方郎中知制誥出為峽州刺史峽州説巳見前遷廬州未至丁母憂服闋改婺州蘇州刺史闋方作鈇改或作除徴拜中書舍人既至謂人曰吾老不樂與少年治文書得一道有地六七郡為之三年貧可冨亂可治身安功立無愧於國家可也樂或作宜文書下或有事字日日語人丞相聞問語驗即除江南西道觀察使兼御史中丞至則奏罷榷酒錢九千萬以其利與民千或作上與民或作丐丐貧民方云諸本以後語誤入釀户非盡盡貧民今按丐貧民一語下文巳有不應再出方本是也但其説非是除酒榷蓋與民共之使得自釀非直以錢九千萬與釀户也又罷軍吏官債五千萬悉焚簿文書或無文字又出庫錢二千萬以丐貧民遭旱不能供稅者禁浮屠及老子為僧道士不得於吾界內因山野立浮屠老子象禁方作學今按作學非是但下文自有浮屠老子字此不應重出且其文理亦不明白疑此自浮至為六字亦是行文去之則文理通暢矣但無本可證不敢刪耳界下或無內字山或作出立或作去皆非是以其其字疑衍以其誑丐漁利奪編人之産編或作經今按以民為人蓋過諱當作民乃是下求人利害與人吏約放此在官四年數其蓄積錢餘於庫米餘於廪朝廷選公卿於外將徴以為左丞吏部巳用薛尚書代之矣或無以字長慶三年十一月十七日未命而薨年六十二天子為之罷朝贈左散騎常侍逺近相弔以四年二月某日葬于河南某縣先塋之側公之為拾遺朝退天子謂宰相曰第幾人非王某邪是時公方與陽城更疏論裴延齡詐妄士大夫重之為考功吏部郎也下莫敢有欺犯之者非其人雖與同列未嘗比數收拾故遭讒而貶在制誥盡力直友人之屈不以權臣為意又𬒳讒而出在或作及知三字元和𥘉婺州大旱人餓死户口亡十七八公居五年完富如𥘉方無口字按劾羣吏奏其贓罪州部清整加賜金紫其在蘇州治稱第一公所至輒先求人利害廢置所宜閉閣草奏利或作之李云古本無利字神道碑周知俗之病亦無利字今按下文云廢置所宜則此句合有利字古本偶皆脫漏不足為據又具為科條與人吏約事備一旦張下民無不抃呌喜恱或𥘉若小煩旬歲皆稱其便備下或有悉字或有復出事字今按文勢疑當有悉字在備字上公所為文章無丗俗氣其所樹立殆不可學曽祖諱玄􅌔比部貟外郎或無諱字下同祖諱景肅丹陽太守考諱政襄鄧等州防禦使鄂州採訪使贈工部尚書政或作某工或作吏公先妣渤海李氏贈渤海郡太君或無太字公娶其舅女有子男七人𥘉哲貞弘泰復洄𥘉進士及第哲文學俱善其餘幼也長女壻劉仁師髙陵令次女壻李行修尚書刑部貟外郎修或作循或無郎字銘曰氣鋭而堅又剛以嚴哲人之常又方作及哲方作若皆非是愛人盡巳不倦以止乃吏之方與其友處順若婦女何德之光墓之有石我最其迹萬丗之藏之有或作中之最或作撮或作載方云集韻最撮之省文今按方説非也史漢功臣傳末總計其功皆以最字起之殿中少監馬君墓志或有銘字君諱繼祖司徒贈太師北平莊武王之孫少府監贈太子少傳諱暢之子生四歲以門功拜太子舍人積三十四年五轉而至殿中少監年三十七以卒有男八人女二人始余𥘉冠應進士貢在京師窮不自存以故人稚弟拜北平王於馬前王問而憐之因得見於安邑里第王軫其寒飢賜食與衣不下或有能字食上方無賜字云表記君子問人之寒則衣之問人之飢則食之食與衣皆去聲讀今按無賜字即不成文食衣並讀如字方説非是召二子使為之主其季遇我特厚少府監贈太子少傳者也姆抱幼子立側眉眼如畫髮漆黑肌肉玉雪可念殿中君也方云畫胡麥切左思嬌女詩眉目璨如畫今按畫當音胡卦切左詩叶韻故爾髮下或有如字非是念或作憐方云姑記云王丞相於青踈臺中觀有兩三兒騎羊皆端正可念當是時見王於北亭猶髙山深林巨谷龍虎變化不測傑魁人也或無巨谷二字退見少傳翠竹碧梧鵉鵠停峙能守其業者也碧或作蒼業或作恭非是幼子娟於緣切好兒好靜秀瑶環瑜珥蘭茁其牙稱其家兒也後四五年吾成進士去而東遊哭北平王於客舍後十五六年吾為尚書都官郎分司東都而分府少傳卒哭之分府此見當時分司官之稱號或無此二字非是又十餘年至今哭少監焉嗚呼吾未耄老自始至今未四十年而哭其祖子孫三丗于人丗何如也句末六字疑衍人欲久不死而觀居此丗者何也李本云眺以道乙居字今按此篇末兩三句不可曉疑而字當作亦而何下當有如字蓋誤寫著上文也然無别本可證姑闕以俟知者朱文公校昌黎先生集卷之三十三
