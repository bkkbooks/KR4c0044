body:
  text: 行狀狀故金紫光禄大夫檢校尚書左僕射同中書門下平章事兼汴州刺史充宣武軍節度副大使知節度事管内支度營田汴宋亳潁等州顴察處置等使上柱國隴西郡開國公贈太傳董公行狀題中或无支度二字曽祖仁琬皇任梁州博士祖大禮皇贈右散騎常侍父伯良皇贈尚書左僕射公諱晉字混成河中虞郷萬歳里人少以明經上第宣皇帝居原州公在原州宰相以公善爲文任翰林之選聞選下或有旣以字召見拜祕書省校書郞入翰林爲斈士三年出入左右天子以爲謹愿賜緋魚袋累升爲衛尉寺丞出翰林以疾辭拜汾州司馬崔圎爲揚州詔以公爲圎節度判官攝殿中侍御史以軍事如京師朝天子識之拜殿中侍御史内供奉由殿中爲侍御史入尚書省爲主客貟外郎由主客爲祠部郎中先皇帝時兵部侍郎李涵如囬紇下没切古匈奴也亦作鶻立可敦詔公兼侍御史賜紫金魚袋爲涵判官囬紇之人來曰唐之復土壃取囬紇力焉約我爲市馬旣入而歸我賄不足我於使人乎取之市字絶句方以馬字属上句而復出馬字連下支爲句非是涵懼不敢對視公公與之言曰我之復土壃爾信有力焉吾非無馬而與爾爲市爲賜不旣多乎公与或作公爲与上方无而字爾之馬歳至吾數所矩切皮而歸資邊吏請致詰也至上方有五字而无吾字皆非是天子念爾有勞故下詔禁侵犯方无故字諸戎畏我大國之爾與也莫敢校焉爾之父子寧而畜馬蕃者非我誰使之於是其衆皆環公拜是下或無其字旣又相率南面序拜皆兩㪯手曰不敢復有意大國兩㪯或作㪯兩汾州司馬崔圎爲揚州詔以公爲圎節度判官攝殿中侍御史以軍事如京師朝天子識之拜殿中侍御史内供奉由殿中爲侍御史入尚書省爲主客貟外郎由主客爲祠部郎中先皇帝時兵部侍郎李涵如囬紇下没切古匈奴也亦作鶻立可敦詔公兼侍御史賜紫金魚袋爲涵判官囬紇之人來曰唐之復土壃取囬紇力焉約我爲市馬旣入而歸我賄不足我於使人乎取之市字絶句方以馬字属上句而復出馬字連下支爲句非是涵懼不敢對視公公與之言曰我之復土壃爾信有力焉吾非無馬而與爾爲市爲賜不旣多乎公与或作公爲与上方无而字爾之馬歳至吾數所矩切皮而歸資邊吏請致詰也至上方有五字而无吾字皆非是天子念爾有勞故下詔禁侵犯方无故字諸戎畏我大國之爾與也莫敢校焉爾之父子寧而畜馬蕃者非我誰使之於是其衆皆環公拜是下或無其字旣又相率南面序拜皆兩㪯手曰不敢復有意大國兩㪯或作㪯兩方云此用莊子盗跖大怒兩展其足也方無復字自廽紇歸拜司勲郎中未嘗言廽紇之事遷秘書少監歷太府太常二寺亞卿爲左金吾衛將軍今上即位以大行皇帝山陵出財賦拜太府卿由太府爲左散騎常侍兼御史中丞知臺事三司使選擢才俊有威風始公爲金吾未盡一月拜太府未尽方作始尽九日又爲中丞朝夕入議事於是宰相請以公爲華州刺史拜華州刺史潼関防禦鎭國軍使朱泚之亂加御史大夫詔至于上所又拜國子祭酒兼御史大夫宣慰恒州於是朱滔自范陽以回紇之師助亂人大恐人下或有心字或有心字無大字公旣至恒州恒州即日奉詔出兵與滔戰大破走之還至河中李懷光反上如梁州懷光所率皆朔方兵公知其謀與朱泚合也患之造懷光言曰公之功天下無與敵公之過未有聞於人某至上所言公之情上寛明將無不赦宥焉乃能爲朱泚臣乎与敵上或有以字彼爲臣而背其君苟得志於公何有且公旣爲太尉矣彼雖寵公何以加此彼不能事君能以臣事公乎公能事彼而有不能事君乎彼知天下之怒朝夕戮死者也故求其同罪而與之北公何所利焉或无故字公之敵彼有餘力不如明告之絶而起兵襲取之清宫而迎天子庶人服而請罪有司罪下或有於字雖有大過猶將揜焉如公則誰敢議語巳懷光拜曰天賜公活懷光之命喜且泣公亦泣則又語其將卒如語懷光者將卒呼曰天賜公活吾三軍之命拜且泣公亦泣故懷光卒不與朱泚當是時懷光幾不反公氣仁語若不能出口及當事乃更踈亮捷給其詞忠其容貌温然故有言於人無不信下或有之字明年上復京師拜左金吾衛大將軍由大金吾爲尚書左丞又爲太常卿由太常拜門下侍郎平章事在宰相位凡五年所奏於上前者皆二帝三王之道由秦漢以降未嘗言以或作巳退歸未嘗言所言於上者於人子弟有私問者公曰宰相所職繫天下句天下安危宰相之能與否可見欲知宰相之能與否如此視之其可凡所謀議於上前者不足道也故其事卒不聞或无復出天下二字以疾病辭於上前者不記退以表辭者八方許之記或作巳拜禮部尚書制曰事上盡大臣之節又曰一心奉公於是天下知公之有言於上也𥘉公爲宰相時五月朔㑹朝天子在位公卿百執事在廷侍中賛百僚賀中書侍郎平章事竇參攝中書令當傳詔疾作不能事疾上或有辝字非是凡將大朝㑹當事者旣受命皆先日習儀于時未有詔公卿相顧公逡巡進北面言曰攝中書令臣某病不能事臣請代某事於是南面宣致詔詞事巳復位進退甚詳爲禮部四年拜兵部尚書入謝上語問日晏謝下方有迁字問日晏三字或作移時復有入謝者上喜曰董某疾且損矣出語人曰董公且復相旣二日拜東都留守判東都尚書省事充東都畿汝州都防禦使兼御史大夫仍爲兵部尚書或无州字由留守未盡五月拜檢校尚書左僕射同中書門下平章事汴州刺史宣武軍節度副大使知節度事管内支度營田汴宋毫頴等州觀察處置等使或无田字汴州自大曆來多兵事劉玄佐益其師至十萬玄佐死子士寧代之畋遊無度其將李萬榮乗其畋也逐之或无畋遊字无度或作无幾方云考之傳士寕每畋獵数日方還或本非是萬榮爲節度一年其將韓惟清張彦林作亂求殺萬榮不尅度下或有使字三年萬榮病風昏不知事其子乃復欲爲士寧之故監軍使俱文珍與其將鄧惟恭執之歸京師而萬榮死詔未至惟恭權軍事公旣受命遂行劉宗經韋弘景韓愈實從不以兵衛及鄭州逆者不至鄭州人爲公懼或勸公止以待有自汴州出者言於公曰不可入公不對遂行宿圃田榮陽西圃田澤是也明日食中牟逆者至宿八角明日惟恭及諸將至遂逆以入者下或有至字非是以或作与及郛三軍縁道讙聲庶人壯者呼老者泣婦人啼遂入以居𥘉玄佐死呉湊代之或无𥘉字及鞏聞亂歸士寧萬榮皆自爲而後命軍士將以爲常故惟恭亦有志以公之速也不及謀遂出逆旣而私其人觀公之所爲以告曰公無爲惟恭喜知公之無害巳也委心焉進見公者退皆曰公仁人也聞公言者皆曰公仁人也環以相告故大和𥘉玄佐遇軍士厚士寧懼復加厚焉至萬榮如士寜志懼下方有不字云士寕懼其无以継也若方不字則下文皆衍今按士寕万榮專命竊據故懼士卒之圖巳而復加厚焉尋上下文未見其措費而薄之之意也况以下文又加厚每加厚推之不字之衍甚明方説誤矣及韓張亂又加厚以懷之至于惟恭毎加厚焉故士卒驕不能禦則置腹心之士幕於公庭廡下挾弓執劒以須日出而入前者去日入而出後者至寒暑時至則加勞賜酒肉故士下或有寕字非是公至之明日皆罷之貞元十二年七月也明日二字方作時非是八月上命汝州刺史陸長源爲御史大夫行軍司馬楊疑自左司郎中爲檢校吏部郎中觀察判官杜倫自前殿中侍御史爲檢校工部貟外郎節度判官孟叔度自殿中侍御史爲檢校金部貟外郎支度營田判官職事脩人俗化嘉禾生白鵲集蒼烏來巢嘉瓜同蔕聮實亊下或有既字俗或作民蒼烏方云舊本多作蒼鳥家語蒼鳥鴈也瑞應圖有蒼四方至者歸以告其帥小大威懷有所疑輒使來問有交惡者公與平之累請朝不許及有疾又請之且曰人心易動軍旅多虞及臣之生計不先定至于他日事或難期猶不許十五年二月三日薨于位上三日罷朝贈太傅使吏部貟外郎楊於陵來祭弔其子贈布帛米有加公之將薨也命其子三日歛旣歛而行於行之四日汴州亂故君子以公爲知人或无旣歛二字知或作智公之薨也汴州人歌之曰濁流洋洋有闢其郛闐道讙呼公來之𥘉今公之歸公在䘮車又歌曰公旣來止東人以完今公殁矣人誰與安人誰或作其誰仐按外集作其非是始公爲華州亦有惠愛人思之公居處恭無妾媵不飲酒不謟笑好悪無所偏與人交泊如也未嘗言兵有問者曰吾志於教化享年七十六階累升爲金紫光禄大夫勲累升爲上柱國爵累升爲隴西郡開國公娶南陽張氏夫人後娶京兆韋氏夫人皆先公終四子全道溪全素澥全道全素皆上所賜名全道爲秘書省著作郎溪爲秘書省秘書郎全素爲大理評事澥爲太常寺太祝皆善士有斈行諸本溪作全湲澥作全澥方云考丗系表董溪志溪澥皆无全字盖全道全素出於賜名也或无爲大理評亊五字謹具歷官行事狀伏請牒考功并牒太常議所謚牒史館請垂編録或无伏字謹狀或作狀上貞元十五年五月十八日故吏前汴宋亳潁等州觀察推官將仕郎試秘書省校書郎韓愈狀與汝州盧郎中論薦候喜狀方无薦字云盧䖍也喜嘗爲䖍作復黄陂記進士侯喜右其人爲文甚古立志甚堅行止取捨有士君子之操家貧親老無援於朝在㪯場十餘年竟無知遇或无知字愈常慕其才而恨其屈與之還往歳月巳多嘗欲薦之於主司言之於上位名卑官賤其路無由觀其所爲文未嘗不揜卷長歎主司或作有司長或作而去年愈從調選本欲攜持同行適遇其人自有家事迍邅上音屯下音鱣坎軻又廢一年事或作難及春末自京還怪其乆絶消息五月𥘉至此自言爲閤下所知辭氣激揚面有矜色曰侯喜死不恨矣喜辭親入關羇旅道路見王公數百未嘗有如盧公之知我也王公下或有大人字或有貴人字比者分將委棄泥塗老死草野仐胷中之氣勃勃然復有仕進之路矣愈感其言賀之以酒謂之曰盧公天下之賢刺史也未聞有所推引蓋難其人而重其事仐子欝爲選首其言死不恨固冝也古所謂知已者正如此耳身在貧賤爲天下所不知獨見遇於大賢乃可貴耳若自有名聲又託形勢此乃市道之事又何足貴乎子之遇知於盧公眞所謂知巳者也士之修身立節而竟不遇知已前古巳來不可勝數或日接膝而不相知或異丗而相慕以其遭逢之難故曰士爲知已者死不其然乎不其然乎或无復出四字不其或作其不閤下旣巳知侯生而愈復以侯生言於閤下者非爲侯生謀也感知已之難遇大閤下之德而憐侯生之心故因其行而獻於左右焉謹狀論今年權停㪯選狀右臣伏見今月十日勑仐年諸色㪯選冝權停者道路相傳皆云以歳之旱陛下憐閔京師之人慮其乏食故權停㪯選以絶其來者所以省費而足食也臣伏思之竊以爲十口之家益之以一二人於食未有所費今京師之人不啻百萬都計㪯者不過五七千人并其僮僕畜馬不當京師百萬分之一以十口之家計之誠未爲有所損益分上或无力字又今年雖旱去歳大豐啇賈之家必有儲蓄舉選者皆齎持資用以有易無未見其弊仐若暫停舉選或恐所害實深一則逺近驚惶二則人士失業臣聞古之求雨之詞樊曰春秋威五年公羊傳曰大雩者何云云曰人失職歟然則人之失職足以致旱仐縁旱而停㪯選是使人失職而召災也臣又聞君者陽也臣者隂也獨陽爲旱獨隂爲水仐者陛下聖明在上雖堯舜無以加之而羣臣之賢不及於古又不能盡心於國與陛下同心助陛下爲理有君無臣是以乆旱以臣之愚以爲冝求純信之士骨鯁之臣憂國如家忘身奉上者超其爵位置在左右如殷髙宗之用傅說周文王之舉太公齊桓公之拔寗戚漢武帝之取公孫弘清閑之餘時賜召問必能輔宣王化銷殄旱災公孫或无公字王化方作主化臣雖非朝官月受俸錢歳受禄粟苟有所知不敢不言謹詣光順門奉狀以聞伏聽聖旨御史臺上論天旱人饑狀韓曰公旣上此䟽專政者惡之十二月奏貶連州陽山縣令具神道碑右臣伏以今年巳來京畿諸縣夏逢亢旱秋又早霜田種所收十不二一陛下恩踰慈母仁過春陽租賦之閒例皆蠲免所徴至少所放至多上恩雖弘下困猶甚至聞有棄子逐妻以求口食坼屋伐樹以納税錢寒餒道塗斃踣蒲北切又匹豆切僵尸也溝壑有者皆巳輸納無者徒𬒳追徴臣愚以爲此皆羣臣之所未言陛下之所未知者也臣竊見陛下憐念黎元同於赤子至或犯法當戮猶且寛而宥之况此無辜之人豈有知而不救又京師者四方之腹心國家之根本其百姓實宜倍加憂恤今瑞雪頻降來年必豊急之則得少而人傷緩之則事存而利逺伏乞特勑京兆府應今年税錢及草粟等在百姓腹内徴未得者並且停徴容至來年𧖟麥庶得少有存立腹或作復方云德宗十四年詔諸道州府應貞元八年至十一年兩税及㩁酒錢在百姓腹内者並余放今按腹内謂應納而未納者嘗見囯𥘉時官文書元有此語如今言名下也臣至陋至愚無所知識或无知字受恩思效有見輒言無任懇𣢾慙懼之至謹録奏聞謹奏請復國子監生徒狀國子監應三館祝曰囯子館太斈館四門館學士等準六典孫曰唐六典三十卷開元十年起居舎大陸堅𬒳詔撰元宗手冩六條曰理典教典礼典政典刑典事典至二十六年書成國子館學生三百人皆取文武三品巳上及國公子孫從三品巳上曾孫𥙷充巳或作以下同太斈館斈生五百人皆取五品巳上及郡縣公子孫從三品巳上曽孫𥙷充或无從字四門館斈生五百人皆取七品巳上及侯伯子男子𥙷充右國家典章崇重庠序近日趨競未復本源至使公卿子孫恥遊太學工啇凡冗或處上庠今聖道大明儒風復振恐須革正以賛鴻猷今請國子館並依六典其太學館量許取常參官八品巳上子弟充其四門館亦量許取無資廕有才業人充如有資廕不𥙷斈生應舉者請禮部不在收試限其新𥙷人有冒廕者請牒送法司科罪縁今年舉期巳近伏請去上都五百里内特許非時收𥙷其五百里外且任郷貢至來年春一時收𥙷其厨糧度支先給二百七十四人今請準新𥙷人數量加支給謹具如前伏聽處分唐故贈絳州刺史馬府君行狀君諱某字某諱某或作諱彚其先爲嬴姓當周之衰處晉爲趙氏晉亡而趙氏爲諸侯其後益大與齊楚韓魏燕爲六國俱称王其别子趙奢當趙時破秦軍閼與閼与地名有功號馬服君子孫由是以馬爲氏方无時字梁有安州刺史侍中贈太尉岫岫生喬卿任襄州主簿國亂去官不仕喬卿生君才隋末爲葪令燕王藝師之以有幽都之衆葪或作蒯苦懷切武德𥘉朝京師拜武候大將軍封南陽郡公卒葬大梁新里趙郡李華刻碑頌之君才生珉爲玉鈴衛倉曹參軍事贈尚書左僕射生季龍爲嵐州刺史贈司空清河崔元翰銘其德於碑在新里司空生燧爲司徒侍中北平王贈太傅謚莊武莊武之勲勞在䇿書君其長子也少舉明經司徒公作藩太原授河南府參軍建中四年司徒公使將武人子弟才力之士三百人朝行在扞衛獻御服用物弓甲煑器幄幕奔走危難上嘉其勤超拜太常丞賜章服遷少府少監太僕少卿嘉方作喜司徒公之薨也刺臂出血書佛經千餘言期以報德廬墓側植松柏終䘮又拜太僕少卿疾病一年貞元十八年七月二十五日終于家凡年四十有五七或作十其弟少府監暢上印綬求追贈贈絳州刺史布帛百匹君在家行孝友待賔客朋友有信義其守官恭愼㪯職其朝獻奉父命不避難其居䘮有過人行𥘉司徒公娶河南元氏封潁川郡夫人贈許國夫人許國薨少府始孩顧託以其姪爲継室是爲陳國夫人陳國無子愛君與少府如已生其薨也君與少府䘮之猶實生巳親負士封其墓陳囯无子或作夫人无子夫人滎陽鄭氏王屋縣今况之女有賢行待君疾逾年不下堂食菜飲水藥物必自擇將進輒先嘗方書本草恒置左右子男二人赦前左衛倉曹參軍敡音羊右清道率府胄曹參軍女子二人在室雖皆㓜侍疾居䘮如成人愈旣丗通家詳聞其丗系事業仐葬有期日從少府請掇其大者爲行狀托立言之君子而圖其不朽焉復讎狀蜀本此狀首云元和六年九月冨平縣人梁悅為父报仇殺人目投縣請罪勅復仇殺人固有彛典以其申冤請罪視死如歸自詣公門發於天性志在徇節本无求生寕失不經特從减死冝决杖一百配流循州於是史官聀方貟外郎韓愈獻議云云方云公於时未為史官也此後人以史文增入閣本舊本皆无之右伏奉今月五日勑復讎據禮經則義不同天徵法令則殺人者死禮法二事皆王敎之端有此異同必資論辯冝今都省集議聞奏者端上或有大字朝議郎行尚書職方貟外郎上騎都尉韓愈議曰㐲以子復父讎見於春秋見於禮記又見周官又見諸子史不可勝数未有非而罪之者也最宜詳於律而律無其條非闕文也蓋以爲不許復讎則傷孝子之心而乖先王之訓許復讎則人將倚法專殺無以禁止其端矣律无下方有有字夫律雖本於聖人然執而行之者有司也經之所明者制有司者也丁寜其義於經而深没其文於律者其意將使法吏一断於法而經術之士得引經而議也將方作特周官曰凡殺人而義者令勿讎讎之則死義宜也明殺人而不得其宜者子得復讎也此百姓之相讎者也公羊傳曰父不受誅子復讎可也不受誅者罪不當誅也誅者上施於下之辭非百姓之相殺者也殺下方无者字又周官曰凡報仇讎者書於士殺之無罪言將復讎必先言於官則無罪以錢出嶺及違令以買賣者皆坐死五嶺舊錢聽人載出如此則錢必輕矣三曰更其文貴之使一當五而新舊兼用之凡鑄錢千其費亦千金鑄一而得五是費錢千而得錢五千可立多也四曰扶其病使法必立扶方作狀非是凡法始立必有病今使人各輸其士物以爲租賦則州縣無見錢州縣無見錢而穀米布帛未重則用不足而官吏之禄俸月减其舊三之一各置鑄錢使新錢一當五者以給之輕重平乃止四法用錢必輕榖米布帛必重百姓必均矣謹録奏聞伏聽勅旨謹奏朱文公校昌黎先生集卷之三十七
