front:
  text: 朱文公校昌黎先生集卷之五考異音釋附古詩
  hash: sha256:3ca7e609d44b0b91183f364150c9d2b43ede055d9e5344e1dbafd91d796a1495
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_005-1a}
body:
  text: 辛卯年雪元和六年春寒氣不肯歸河南二月末雪花一尺圍崩騰相排拶姊抹切逼也孫曰排拶密拶也龍鳯交横飛波濤何飄揚天風吹旛旂白帝盛羽衛鬖髿或作㲚土音參又蘇含切下音沙髮垂貌祝曰選緑荅鬖髿乎斫上振裳衣白霓先啓途從以萬玉妃翕翕陵厚載譁譁弄隂機生平未曽見何暇議是非或云豐年祥飽食可庶幾善禱吾所慕誰言寸誠微醉留東野昔年因讀李白杜甫詩長恨二人不相從吾與東野生並丗如何復躡二子蹤東野不得官白首誇龍鍾方云依字當作躘踵盧仝詩盧子躘踵也賢愚緫莫驚韓子稍姦黠自慙青蒿倚長松低頭拜東野願得終始如駏蛩上音巨下音卭樊曰孔叢子北方有獸名曰蟨愛蛩蛩駏驉食得甘草必齧以遺蛩蛩駏驉見人將來必負蟨以走蟨非愛駏蛩也爲其假足也二獸亦非心愛蟨也爲其得甘草而遺之也夫禽獸猶知北假而相報也况士君子之欲名利者乎東野不廻頭有如寸筳撞鉅鍾吾願身爲雲東野變爲龍四方上下逐東野雖有離别無由逢離别或作别離李花二首諸本作一首方云此二詩也自當春天地争奢華以下分焉意義甚明編者誤合之樊曰此詩自夜領張徹投盧仝而下狀極李花之妙矣蘇内翰梅詩㪯此云縞裙練帨玉川家肝膽清新冷不邪穠李争春猶辦此更教踏雪看梅花亦一竒也平旦入西園棃花數株若矜夸旁有一株李顔色參慘似含嗟問之不肯道所以獨繞百市至日斜忽憶前時經此樹正見芳意𥘉萌牙或作芽方云漢傳如朱草萌牙事有萌牙无用芽字柰何趂酒不省録不見玉枝攅霜葩枝或作杖泫胡畎切流也然爲汝下雨淚無由反斾羲和車東風來吹不改顔蒼茫夜氣生相遮氷盤夏薦碧實脆斥去不御慙其花斥去或作片雲或作雲去或作斤逐方云張衡思玄賦斥西施而不御韓語原此或本皆誤也當春天地爭奢華洛陽園苑尤紛挐或作拏方云董彦逺云挐从如今人从奴唐韵以挐爲或躰非也考相如子虚賦王逸九思皆只作挐今按說文拏从奴牽引也挐从如持也古書作拏盖通用誰將平地萬堆雪將方作堆剪刻作此連天花日光赤色照未好明月暫入都交加夜領張徹投盧仝乘雲共至玉皇家長姬香御四羅列縞白色裙練帨始銳切佩巾詩无感我恱兮無等差静濯明䊋有所奉顧我未肯置齒牙清寒瑩骨肝膽醒一生思慮無由邪招揚之罘方云之罘元和十一年進士閤本作之果字訛也柏生兩石間萬歳終不大野馬不識人難以駕車蓋柏移就平地馬羈入廐中馬思自由悲柏有傷根容傷根柏不死千丈日以至千或作百日以或作不難以或作巳馬悲罷還樂振迅矜鞍轡迅或作頓方云振迅字見七月詩傳鮑昭鶴賦之罘音浮南山來文字得我驚館置使讀書曰有求歸聲我令之罘歸失得柏與馬失得方作失待或作實待或作實失今按三本皆无理唯嘉祐杭本作失得似頗有理而㪯正不収盖其意曰失得之計觀於柏馬可見云尓之罘别我去計出柏馬下我自之罘歸入門思而悲之罘别我去能不思我爲洒掃縣中居引水經竹間嚻譁所不及何異山中閑前陳百家書食有肉與魚先王遺文章綴緝實在余禮稱獨學陋易貴不逺復作詩招之罘晨夕抱飢渴寄盧仝玉川先生洛城裏破屋數間而巳矣一奴長鬚不裹頭一婢赤脚老無齒辛勤奉養十餘人上有慈親下妻子先生結髮憎俗徒閉門不出動一紀至令鄰僧乞米送僕忝縣尹能不恥令或作今非是尹一作令俸錢供給公私餘時致薄少助祭祀勸參留守謁大尹樊曰唐洛城有東都留守有河南尹公誌盧登封墓曰爲書告留守与河南尹是時鄭餘慶留守東豈無農夫親耒耜先生抱才終大用宰相未許終不仕假如不在陳力列立言垂範亦足恃苗裔當蒙十丗宥豈謂貽厥無基阯或作址方云阯字見漢䟽廣傳故知忠孝生天性㓗身亂倫安足擬昨晚長鬚來下狀隔牆惡少韓曰荀子无廉恥而嗜乎飲食可謂惡少者也惡難似毎騎屋山下窺闞或作瞰渾舎驚怕走折趾慿依婚媾欺官吏不信令行能禁止先生受屈未曽語忽此來告良有以嗟我身爲赤縣令操權不用欲何俟立召賊曹呼伍伯方作五百今按五伯見古今注什伍之長也作五百非盡取䑕輩尸諸市先生又遣長鬚來如此處置非所喜况又時當長養節都邑未可猛政理先生固是余所畏度量不敢窺涯涘牀史切放縱是誰之過歟效尤戮僕愧前史買羊沽酒謝不敏偶逢明月矅桃李𥙷注即前李花詩曰光赤色至玉皇家四句是也先生有意許降臨更遣長鬚致雙鯉酬司門盧四兄雲夫院長望秋作長安雨洗新秋岀極目寒鏡開塵函終南曉望蹋龍尾龍尾陂長安地名倚天更覺青巉巉徂衘切髙也自知短淺無所𥙷從事乆此穿朝衫歸來得便即遊覽暫似壯馬脫重銜曲江地名唐号芙蓉園荷花蓋十里江湖生目思莫緘自思或作思自或作思目非是樂遊孫曰漢宣帝神爵間起楽遊苑在杜陵西北今呼爲楽遊廟下矚無逺近緑槐萍合不可芟白首寓居誰借問平地寸歩扄雲巗扄或作局一作屈雲夫吾兄有狂氣嗜好與俗殊酸鹹日來省我不肯去論詩說賦相諵諵女咸切諵諵語声望秋一章巳驚絶猶言低抑避謗䜛抑或作徊若使乗酣騁雄怪造化何以當鐫劖鉏衘切断也嗟我小生值強伴怯膽變勇神明鍳音監馳坑跨谷終未悔爲利而止真貪饞饞饕也孫曰言拘於利禄而不遊此山是爲貪饞之人矣髙揖羣公謝名譽逺追甫白感至諴樓頭完月不共宿完或作見或作皎今按月蝕詩有完完上天東之句言月圎也此亦同意以下句就缺推之可見其柰就缺行攕攕或作纎纎方云攕蜀音所咸切詩掺掺女手說文与石經皆作㩥㩥誰氏子吕氏子炅見李素墓誌非癡非狂誰氏子去入王屋稱道士白頭老母遮門啼挽断衫袖留不止翠眉新婦年二十載送還家哭穿市或云欲學吹鳯笙方作皇非是所慕靈妃嫓蕭史孫曰列仙傳秦穆公时有蕭史善吹蕭公女弄玉好之公以妻焉遂教弄玉作鳯鳴居数十年吹鳯凰声鳯來止其屋公爲作鳯凰臺夫妻處其上一旦皆隨鳯凰去又云時俗輕尋常力行險怪取貴仕神仙雖然有傳說知者盡知其妄矣聖君賢相安可欺乾死窮山竟何俟嗚呼余心誠豈弟願往教誨究終始誨方作悔今按作誨非是大抵方意以竒爲主比類可見罰一勸百政之經不從而誅未晩耳誰其友親能哀憐冩吾此詩持送似或作以非是河南令舎池臺灌地纔盈五六丈築臺不過七八尺七八或作六七欲將層級壓籬落未許波瀾量斗碩規摹雖巧何足誇景趣不逺真可惜景或作指長令人吏逺趨走巳有蛙黽武幸切又母耿切蛙属助狼藉方云藉從艸說文曰草不編狼藉今本從竹漢陸賈傳名声籍甚孟康曰狼藉甚盛盖古字如藉田皆只作藉而從艸從竹則㳂義以生此當以藉爲正送無本師歸范陽即賈島也即賈島集注刘公嘉話云島𥘉赴㪯京師一日於馬上得句云鳥宿也中樹僧敲月下門𥘉欲作推字練之未定不斍衝尹時韓吏部權京尹左右擁至前具告所以韓立馬良乆曰作𫾣字佳矣遂与爲布衣交有詩曰孟郊死葬北邙山日月風雲頓斍閑天恐文章渾断絶再生賈島在人間又摭言云島甞騎馿天衢時秋風正厉黄葉可掃島忽吟曰落葉滿長安卒求一䏈不可得因唐突京尹刘栖楚𬒳繫一夕而得釋新史云島字浪仙范陽人𥘉爲浮屠名无本來東都愈教其爲文遂去浮屠㪯進士當其苦吟及值公卿大夫不知斍也一日見京兆尹跨馿尹詰責之乆乃得釋其意与摭言合而嘉話䓁集所云公与島詩東坡云丗俗无知者所託非退之語洪氏亦云按送无本時公爲河南尹不應至是方相知又島𥘉爲浮屠後乃㪯進士此云後改名无本乃傳者之誤又樊氏云按此詩元和六年冬作而是年秋東野亦有詩与无本云長安秋声乾木葉相号悲時東野尚无恙何以云死葬邙山耶若以爲公爲京尹始識島故云則公爲尹在長慶三年而是年何以有此作也無本於爲文身大不及膽吾甞示之難勇往無不敢蛟龍弄角牙造次欲手攬衆鬼囚大幽下覻襲玄窞玄黒也窞徒感切說文坎中小坎天陽熈四海注視首不頷胡感切頤也方云李本頷作顉說文顉低頭也列子巧夫顉其順今按說文顉五感切引衛献公頷之而巳爲證則与頷字自不同也然左傳今本只作頷未詳其說或疑下有顑頷字此不當重押則作顉爲是然顑頷字見楚詞云顑虎感古湛二切頷户感魚檢二切食不飽面黄皃則亦与不頷義不可也鯨鵬相摩窣蘇骨切亦摩也前漢書媻姍勃窣上金堤兩舉快一噉夫豈能必然固巳謝黯黮上烏减切下徒感切黒也楚詞云尚黯黮而有瑕孫云庸暗皃狂詞肆滂葩狂皃低昻見舒慘姦窮怪變得往往造平澹蜂蟬碎錦纈紋繒蜂蝉或作風蝉或作蝉翼今按此与下句不對未詳其說緑池披菡蓞上音撼下音禫披用荆公本定或作垤或作低方从閤本作坏皆非是唯披坏声相近耳孫曰詩有蒲菡蓞尓雅荷芙蕖其花曰菡蓞芝英擢荒蓁或作榛孤翮起連菼吐敢切孫曰尓雅菼薍郭璞注云似葦而小連菼叢葦也家住幽都逺未識氣先感來尋吾何能無殊嗜昌歜徂感切孫曰昌蒲𦵔也文王嗜昌歜孔子聞而食之出吕氏春秋又左氏享有昌歜始見洛陽春桃枝綴紅糝遂來長安里時卦轉習坎老懶無鬪心乆不事鈆槧欲以金帛酬舉室常顑頷上呼感切下乎感切離騷曰長䫲頷以何傷韓曰顑食不飽皃頷向黄色孫曰言欲酬以金帛則我家常飢貧也念當委我去霜雪刻以㦧痛也礼記中心􅉃怛獰飈狂風也攪空衢天衢也攪一作摺天地與頓撼孫曰揺撼也言獰飈之起天地亦且揺撼也勉率吐歌詩尉女别後覧石鼓歌樊曰歐陽文忠公集古録云石鼓乆在岐陽𥘉不見称於丗至唐人始盛称之而韋應物以爲周文玊之鼓至宣王時刻尓韓退之直以爲宣王之鼓在今鳯翔縣孔子廟鼓有十先時散棄于野鄭餘慶始置于廟而亡其二皇祐四年向傳師求於民間得之十鼓乃足其文可見者四百六十有五磨㓕不可識者過半然其可疑者四逺之好古不妄者予姑取以爲信耳至於字畫亦非史籕不能作也文忠所跋如此孫曰石鼓文可見者其略曰我車旣攻我馬旣同又曰我車旣好我馬旣騊君子貟獵貟獵貟游麋鹿速速君子之求又左驂幡幡右驂騝騝秀弓時射麋豕孔庶又曰其魚維何維鱮維鯉何以櫜之維揚維柳櫜音髙說文曰嚢也又筆墨間録此歌全仰止杜子美李潮八分小篆歌才薄將奈石鼓何即子美云潮乎潮乎柰尓何快劒斫断生蛟鼉即子美云快劒長㦸森相向張生手持石鼓文勸我試作石鼓歌少陵無人謫仙死才薄將柰石鼓何周綱陵遲四海沸宣王憤起揮天戈大開明堂受朝賀諸侯劒珮鳴相磨蒐于歧陽騁雄俊蒐踈鳩切今歧山縣舊曰歧陽萬里禽獸皆遮羅萬或作百鐫功勒成告萬丗成或作盛方云封岱勒成東都賦語鑿石作鼓隳嵯峨山髙皃從臣才藝咸第一㨂選撰刻留山阿揀或作簡撰或作譔雨淋日炙野火燎鬼物守護煩撝呵撝音麾指撝呵或作訶公從何處得紙本處方作士毫髮盡備無差訛辭嚴義密讀難曉字體不類隷與科諸本皆同方从蜀粹作蝌今按蝌乃科之俗体後人以重韻而誤改耳方知韓公不避重韻乃疑於此何耶孫曰隷書秦始皇時程邈所定施於公府也科謂科斗書魯共王時壞孔子宅得書論語孝經人不知古文謂之科斗文字年深豈免有缺畫或作劃快劒斫斷生蛟鼉唐何切韓曰快劒斫断以下皆狀石鼓文如此鸞翔鳯翥衆仙下珊瑚碧樹交枝柯碧樹或作幽碧孫曰班固西都賦云珊瑚碧樹周阿而生廣雅曰珊瑚珠也說文云生于海中色赤碧樹碧玉樹也淮南子日崑崙山有碧玉樹在其此韓曰晋武帝賜王愷珊瑚樹髙二尺餘許枝柯扶踈丗所罕比金繩鐵索鎻紐壯紐音狃結也古鼎躍水龍騰梭龍騰或作騰龍韓曰梭織具也樊曰晋陶侃少時漁于澤網得一梭掛於壁少頃雷雨化爲龍而去陋儒編詩不収入二雅𥚹迫無委蛇収一作得蛇一作佗上於爲切下音移祝曰毛詩叶韻𥙷音唐何切詩注行可從迹也孫曰平易之皃孔子西行不到秦掎摭摭或作拾掎音竒摭之石切來俊臣掎摭諸武星宿遺羲娥孫曰羲娥日月也羲和日御嫦娥月御韓曰詩意謂石鼓文不編於詩而二雅不載孔子言詩小者具𫐠而此文獨遺是猶掎摭星宿而遺日月也嗟予好古生苦晚對此涕淚雙滂沱憶昔𥘉蒙博士徴其年始改稱元和故人從軍在右輔爲我量度掘臼科孫曰謂安石鼓處濯冠沐浴告祭酒如此至寳存豈多氊苞席裹可立致十鼓祗載數駱駝駱或作馲依字當作槖薦諸太廟比郜鼎光價豈止百倍過聖恩若許留太學諸生講解得切磋觀經鴻都尚填咽孫曰漢靈帝元和元年始置鴻都門斈熹平四年詔諸儒止五經議郎蔡邕爲古文篆隷三体書之刻石于太斈門外碑始立觀覧及謩冩者車乗日千两瑱塞街陌鴻都觀經盖二事公併用之坐見舉國來奔波剜一丸切刻削苔剔蘚露節角安置妥帖平不頗大厦深簷與蓋覆經歴乆逺期無佗中朝大官老於事官或作夫詎肯感激徒媕娿上音庵下音阿不决之皃牧童𫾣火牛礪角誰復著手爲摩挲音娑後漢薊子訓至長安摩挲銅人日銷月鑠就埋没六年西顧空吟哦羲之俗書趂姿媚樊曰周宣王時史籕始変大篆爲籀書石鼓文籀書也秦変古爲篆爲隷今又変爲楷丗俗書尓非古書也𥙷注王得臣塵史云王右軍書多不講偏旁此退之所謂俗書趂姿媚者也數紙尚可博白鵝繼周八代争戰罷無人収拾理則那那何也左傳犀兕尚多棄甲則那方今太平日無事柄任儒術崇丘軻任或作用安能以此上論列願借辨口如懸河石鼓之歌止於此嗚呼吾意其蹉跎雙鳥詩集注鯀内翰作李太白畫像詩有曰化爲二鳥鳴相酬一鳴一止三千秋或者遂謂此詩爲李杜作柳仲塗双鳥詩觧云韓之為心憂夫道也履行非孔氏者爲夷矣故垂言以刺之釋老俱夷而教殊故日双鳥自柳仲塗爲二氏說行干丗洪慶善祖述其意而箋之而朱文公謂公爲巳与孟郊說見考異注雙鳥海外來飛飛到中州來飛飛方作飛飛來一鳥落城市一鳥集岩幽集或作巢不得相伴鳴爾來三千秋兩鳥各閉口萬象銜口頭春風卷地起百鳥皆飄浮兩鳥忽相逢百日鳴不休有耳聒皆聾有口反自羞百舌記曰反舌无声注百舌也舊饒聲從此恒低頭恒或作且非是得病不呻喚泯黙至死休雷公告天公百物湏膏油自從兩鳥鳴或作聒聒亂雷聲収諸本同但蜀本声作光閤本作雷声三伏収皆誤而方獨从唐本作聒雷声伏収則不成文理矣鬼神怕嘲詠造化皆停留化方作作草木有微情挑抉下於說切桃撥也示九州蟲䑕誠微物不堪苦誅求不停兩鳥鳴百物皆生愁不停兩鳥鳴自此無春秋不停兩鳥鳴日月難旋輈不停兩鳥鳴大法失九疇周公不爲公孔丘不爲丘天公怪兩鳥各捉一處囚百蟲與百鳥然後鳴啾啾百鳥方从閤杭蜀本作七鳥云柳謝荆公皆作七鳥謂月令七十二候之虫鳥也蘇耆開譚録亦見今按百虫即上文之虫䑕百鳥即上文所言皆飄浮者耳与七十二候𥘉不相関也且使果爲七十二候之鳥而但云七鳥則詞旣有所不備又鳥旣爲七而虫獨爲百於例亦有所不通今細考之豈以草書百字有似於七而致誤耶𥘉不必過爲之說也兩鳥旣别處閉聲省愆尤朝食千頭龍暮食千頭牛朝飲河生塵暮飲海絶流還當三千秋更起鳴相酬方云柳仲塗有此詩觧一篇傳於丗謂指釋老也然以歐公感二子詩及東坡李大白畫像賛考之盖專爲李社而作今按釋老李杜之說恐亦未然舊嘗竊意此但公爲巳孟郊作耳落城市者巳也集岩幽者孟也𥘉亦不能无疑而近見葛氏韵語陽秋巳有此說矣讀者詳之贈劉師服服或作命羡君齒牙牢且㓗大肉硬餅如刀截我今呀豁落者多所存十餘皆兀臲音臬不安皃匙抄爛飯穩送之合口軟嚼如牛呞音癡食巳乆復出嚼也妻兒恐我生悵望盤中不飣栗與梨祗今年纔四十五後日懸知漸莽鹵上莫古切下音魯杭本作鹵莽方云鹵莽本莊子然唐人多倒用之柳子厚沉昏莽鹵又食貧甘莽鹵白楽天飬生仍莽鹵始斍琵琶絃莽鹵所用同也朱顔皓頸訝莫親此外諸餘誰更數憶昔太公仕進𥘉口含兩齒無贏餘虞翻十三比豈少遂自惋恨形於晝惋烏貫切吁嘆也比或作皆或作比方从蜀本云太公两齒事見古本苟子虞翻呉志只載其上書謂臣年耳順髮白齒落豈在當時猶有可考也耶丈夫命存百無害誰能點檢形骸外巨緍東釣儻可期與子共飽鯨魚膾鯨音就莊子任公子為大釣巨縯五十㮫以為餌持竿東海已而大魚食之自制河以東莫不厭若魚者題炭谷湫祠堂時公在京師歐本云在京兆之南終南之下所雨之所也南山秋懷詩皆有之萬生都陽明幽暗鬼所寰嗟龍獨何智出入人鬼間不知誰爲助若執造化関厭處平地水巢居挿天山列峯若攅指石盂仰環環巨靈髙其捧保此一掬慳西京賦注云華山本与首陽同一山河神巨靈以手擘開其上掬謂以手棒物一掬言小也詩云不盈一掬森沉固含蓄本以儲隂奸謂龍也猶南山詩所謂疑湛閉隂獸也魚鼈蒙擁護羣嬉傲天頑翾翾棲託禽翾許縁切小飛也揚字曰朱鳥翾翾飛飛一何閑祠堂像侔眞擢玉紆煙鬟群怪儼伺候恩威在其顔我來日正中悚惕思先還寄立尺寸地敢言來途艱吁無吹毛刃血此牛蹄殷殷烏閑切孫曰吹毛良劒也牛蹄蹄涔小水也言我豈无吹毛之劒血此牛蹄水令殷乎言欲殺此龍也殷赤黒色左傳左輪朱殷注云血深也至令乘水旱鼓舞寡與鰥林叢鎮冥冥窮年無由刪妍英花也雜豔實星瑣音鎖玉也黄朱班妍或作研瑣或作鎻石級皆險滑顚躋莫牽攀龍區雛衆碎付與宿巳頒大也棄去可奈何吾其死茅菅菅音奸草名聽潁師彈琴潁師若是道士則潁字是姓當乆水是僧則潁字是名當从禾西清詩話云六一居士甞問東坡琴詩孰優坡答以退之潁師琴公曰此祗是琵琶耳呉僧義海以琴名丗或以六一語問海海曰歐陽公一代英偉然斯語誤矣昵昵男女語至失势一落千丈強皆指下絲声妙処惟琴則然琵琶格上声烏能尓耶退之深得其趣未易譏評洪氏亦日或云浮雲柳絮无根蔕天地闊逺隨飛楊此泛声也謂輕非絲重非木也啾喧百鳥羣忽是孤鳯凰泛声中寄指声也躋攀分寸不可上吟繹声也失势一落千丈強歴声也善琴者云此数声最難工歐文忠公以為琵琶声東坡甞作听琴詩報文忠公不及見二公之論似未必然昵昵兒女語昵昵或作妮妮或作呢呢恩怨相爾汝劃然變軒昻勇士赴敵埸浮雲柳絮無根蔕天地闊逺隨飛揚喧啾百鳥羣忽見孤鳯凰躋攀分寸不可上失勢一落千丈強嗟余有兩耳未省聽絲篁自聞潁師彈起坐在一旁或作傍或作牀推手遽止之濕衣淚滂滂潁乎尓誠能無以氷炭置我腸乎或作師方云李賀亦有聽潁師琴歌韓曰當是琴操必有感於公者故聽終而悲焉送陸暢歸江南洪曰暢字逹夫娶董溪女溪丞相董晋第二子貶死湘中事見墓誌公甞為董晋从事舉舉江南子方云唐人以㪯止端䴡為㪯㪯名以能詩聞樊曰暢貢㪯年對雪落句云天人寕底巧剪水作花飛崔諫議林亭云蝉噪入雲樹風開无主花及登蘭省遇雲陽公主下降暢為儐相有詠簾詠行障催粧等作内人以暢呉音才思敏捷以詩嘲之暢酬曰粉面仙郎選聖朝獨逢秦女斈吹蕭須教翡翠聞王母不奈烏鳶噪鵲橋觀此可見其能詩矣一來取髙第官佐東宮軍迎婦丞相府誇映秀士羣鸞鳴桂樹間鵉鴻或作鳴鵉觀者何􅌭紛上四賔切下音芬交雜也揚雄曰􅌭紛往來人事喜顛倒旦夕異所云蕭蕭青雲幹遂逐荆棘焚歳晚鴻鴈過郷思見新文踐此秦關雪家彼呉洲雲悲啼上車女骨肉不可分感槩都門别丈夫酒方醺我實門下士力薄蚋與蚊受恩不即報永負湘中墳不即或作即不方云暢董晋子溪之婿也公甞佐董晋幕今按暢字逹夫甞著蜀道易詩送進士劉師服東歸猛虎落檻穽坐食如孤㹠㹠与豚同落一作知食或作貪荆公本如作茹㹠或作豚方从閤本云此乃司馬迁所謂猛虎在檻穽之中揺尾而求食也今按方說是也然則坐當作求矣但本皆作坐故未敢改耳丈夫在富貴豈必守一門公心有勇氣公口有直言奈何任埋没不自求騰軒僕本亦進士頗嘗究根源由來骨鯁材喜𬒳軟弱吞低頭受侮笑隱忍硉兀冤侮笑方作笑侮硉兀或作矹硉硉音律硉兀危石也選江賦碧沙演沲而往来巨石硉矹以前却泥雨城東路夏槐作雲屯還家雖闕短或作短闕指日親晨飱攜持令名歸自足貽家尊時節不可翫親交可攀援音爱勉來取金紫勿乆休中園嘲魯連子韓曰魯連斉人太史公亦有取焉公嘲之之意不悉其安在意必有所諷於當時後丗有不得而窺者魯連細而黠而方作兒有似黄鷂子弋照切鷂鷙鳥也田巴兀老蒼兀一作元孫曰巳斉之辯者辯於祖丘議於稷下一日而服千人有徐刼弟子曰魯連謂刼曰臣願當田子使不得復說連往見田巴云云巴於是杜口易業終身不談橉汝矜爪觜開端魯連要驚人雄跨田巴吾厭矣髙拱禪鴻聲若輟一盃水輟或作啜獨稱唐虞賢顧未知之耳孫曰以天下与人於堯舜何足道者而仲連以唐虞為賢盖未知之耳今按此詩洪說巳詳然公之意必有為而作也贈張籍吾老著讀書諸本著作嗜方云著如髙士著幽禅少忤著遊宴之著餘事不掛眼有兒雖甚憐敎示不免簡君來好呼出踉蹡上音郎下音鏘又上音亮下七醬反急行皃潘岳曰巳跟蹡而徐来越門限懼其無所知見則先愧𧹞昨因有縁事上馬挿手版笏也唐輿服志八座尚書執笏者自筆綴手版頭其餘王公卿士俱執手版正主於敬留君住㕔食使立侍盤􅊦爵也薄暮歸見君迎我笑而莞与莞尓而笑同指渠相賀言此是萬金産吾愛其風骨粹美無可㨂試將詩義授如以肉貫丳𥘉限切炙肉丳開祛祛衣袪猶開懷露毫末自得髙蹇嵼蹇或作􅑬上基展切下所簡切山屈曲皃選連崗岩以􅑬嵼楚詞思蹇嵼之不呉我身蹈丘軻爵位不早綰固宜長有人文章紹編剗感荷君子德怳若乗朽棧朽一作杇乗朽棧謂驚喜也召令吐所記解摘了瑟僴遐板切曽子曰詩云瑟兮僴兮恂慄也顧視䆫壁間親戚競覘矕武板切竊視皃說文目矕二也喜氣排寒冬逼耳鳴睍睆上胡顯切下户板切詩曰睍睆黄鳥如今更誰恨便可耕灞滻音産滻水出藍田谷霸陵入灞三滻二水司馬相如上林賦曰終始灞滻出入涇渭調張籍李杜文章在集注退之有取於李杜如薦士腸句留東野望秋石鼓等詩毎致意焉然未若此詩之專美也光熖萬丈長諸本熖作艶方云西京賦光熖屬天庭不知羣兒愚那用故謗傷魏道輔云公作此詩為元微之發盖元稹作李杜優劣論先枉後李故耳黄魯直云吾友黄介讀李杜優劣論曰論文正不當如此予以爲知言蚍蜉上音毗下音浮大螘也撼大樹可笑不自量伊我生其後舉頸遥相望夜夢多見之晝思反微茫徒觀斧鑿㾗不矚治水航想當施手時巨刃磨天揚垠崖劃崩豁乾坤擺雷硠垠方作根擺一作罷硠音郎山崩声左思曰拉獵雲硠韓曰硠磕石声郭璞江賦巴東之峽夏禹䟽鑿絶岸乃丈壁立霞駮又云如地裂豁若天開觸曲崖以縈繞駭崩浪而相礧詩意謂李杜文章如禹䟽鑿江峽雖有迹可尋而當時運量之巧則今不可得而覩矣惟此兩夫子家居率荒凉帝欲長吟哦故遣起且僵翦翎送籠中使看百鳥翔平生千萬篇金薤垂琳琅韓曰金薤書也古有薤葉書詳見􅒖嶁山詩注琳琅石也言李杜文章播於金石云尓仙官勑六丁道書陽官六甲隂官六丁六丁者六甲中丁神也雷電下取將𥙷注異人記云上元中台州道士王逺知善易知人死生禍福作易緫十五卷一日雷雨雲霧中一老人語逺知曰所泄者書何在上帝命吾攝六丁雷電追取上方秘文自有飛天保衛金科秘藏玄都汝何者輒藏緗帙逺知曰青丘元老傳授也流落人間者流或作留方云孔毅父甞曰漢霍去病傳諸将留落不偶今丗浴皆作流落如江揔詩流落今如此少陵詩流落意无窮皆只作流落字盖留謂遟留流謂飄流自不可拘以一義也太山一豪芒豪方作毫云李本作豪按孟子莊子秋豪之末班固答賓戯銳思豪芒之内字皆作豪然楚詞秋毫微而見容王逸曰銳毛為毫是豪字通今按毫俗字當作豪為正我願生兩翅方作願生兩翅翎捕逐出八荒精誠忽交通百怪入我腸刺七亦切手拔鯨牙舉瓢酌天漿魏道輔云髙至於酌天漿幽至於拔鯨牙其思賾深逺如此詎止於曹刘沈宋之間耶騰身跨汗漫猶茫洋也淮南子若上与汗漫期於九垓之上不著織女襄㐮駕也或作相非是顧語地上友經營無太忙乞音氣後漢乞楊生師君飛霞珮與我髙頡頏上胡結切下音航韓曰詩頡之頏之飛而上曰頡下曰頏盧郎中雲夫寄示送盤谷子詩兩章歌以和之两或作二東坡云退之尋常詩自謂不及老杜此詩獨不减子美云昔尋李愿向盤谷正見髙崖巨壁爭開張是時新晴天井溢孫曰天井関名在太行山上水經曰天井溪出天井関北流注白水丗謂之北流泉誰把長劒倚太行孫曰水自天井順㵼而下如長劒之倚山韓曰宋玉曰長劒耿介倚天外行音航衝風吹破落天外破或作波非是楚詞衝風起兮水揚波吹破謂吹此長劒之水飛雨水漂散如雨白日灑洛陽東蹈燕川地名食曠野有饋木蕨芽滿筐馬頭溪名溪深不可厲以衣渡水由膝巳上曰厲借車載過水入箱平沙緑浪榜音謗進舡也与傍同又比孟切楚詞斉呉榜以擊汰方口地名鴈鴨飛起穿垂楊窮探極覧頗恣横物外日月本不忙歸來辛苦欲誰爲坐令再往之計墮眇芒或作渺芒閉門長安三日雪推或作堆書撲祝曰擲也蜀志云未甞不撲之于地筆歌慨慷下音康韓曰魏武帝慨當以慷憂思難忘選中矯厲而慨慷注抑揚意氣也旁無壯士遣屬和逺憶盧老詩顛狂開緘忽覩送歸作字向𥿄上皆軒昻又知李侯竟不顧方冬獨入崔嵬髙山皃謂盤谷也藏我今進退幾時决十年蠢蠢隨朝行家請官供不報荅何異雀䑕偷太倉行抽手版付丞相不待彈劾還耕桑還方作帰寄皇甫湜𫾣門驚晝睡問報睦州吏睦或作乃手把一封書上有皇甫字拆隔雪風照鑪釘音定明釭夜䦨縱捭闔上音擺鬼谷子有捭闔篇哆昌者切脣下垂口踈眉厖多毛皃勢侔髙陽翁坐約齊横降降胡江切酈商髙陽人也斉王田橫懼誅入海居隝中髙帝使商持節貝告以詔意横謝使者乃自殺連日挾所有形軀頓胮肛上匹江切下許江切脹大皃將歸乃徐謂將帰方作帰將云逺干將之毛傳將行也故古人以送將帰為三事焉今按楚詞言秋之可悲如在逺行之処而登山臨水以送欲帰之人愈斍羇旅之牢落故其意象慘戚而无聊耳將字与詩文同字異安得強爲一說而謂送將帰爲三事乎必爲三事而可顛倒言之則楚詞之与此詩皆不復成文理矣子言得無哤音厖語雜乱曰哤管子四民雜処則其言哤迴軍與角逐軍或作君非是斫樹収窮龐皮江切孫臏减竈僞走㳙逐之臏度㳙夜至之処伏弩万人見火則發乃斫樹書云龐㳙死於此樹下㳙至果㪯火讀之弩發㳙死韓曰公始也扶几導籍使之言且匿其麾幢觧斾束杠而示之弱籍乃縱其捭闔如酈生之下斉旣連日挾其所有其後乃爲公所敗是猶孫臏之収龐㳙也雌聲吐𣢾要酒壷綴羊腔苦江切肫羊張鷟云案後一腔東猪肉君乃崑崙渠籍乃嶺頭瀧閭江切奔湍譬如蟻垤微詎可陵崆㟅或作𡵻方云㟅字見南都賦蜀本苦江五江二切今本作坑字書未見南都賦曰其山則崆㟅嶱嵑幸願終賜之一作願終賜之教斬拔枿牙葛切芽也與樁株江切椿橛也從此識歸處韓曰籍旣爲公所敗乃自以為嶺頭之瀧不足以方崑崙之渠蟻垤之微不足以陵崆𡵻之山願終受教於公而公於是導其所帰也東流水淙淙士江切水声雜詩古史散左右詩書置後前豈殊蠧書蟲蠧書或作書虫生死文字間古道自愚憃陟降切愚也或作戇或作蠢古言自包纒當今固殊古誰與爲欣歡獨攜无言子共昇崑崙顚長風飄襟𥚑遂起飛髙圎下視禹九州禹方作㝢一塵集豪端遨嬉永云幾下巳億萬年向者夸奪子万墳厭其巔方从唐杭本作墳今按方所从本盖後人以重韻而誤改之說見石鼓歌惜哉抱所見白黒未及分慷慨爲悲咤陟駕切淚如九河翻指摘相告語雖還今誰親翩然下大荒𬒳髮騎騏驎或作麒麟方云古書如戦囯䇿多用麒麟字其義一也孫曰謂復仙去樊曰東坡爲公潮州庿碑詞終篇多取此意寄崔二十六立之西城貟外丞心跡兩屈竒屈或作崛或作倔方云淮南子聖人无屈竒之服髙誘曰屈短竒長也言服之不中漢廣川士揚椎傳選西征賦皆只用屈竒字今按漢書注屈竒異也其勿反往歳戦詞賦不將勢力隨下駐入省門左右驚紛披紛或作分傲兀坐試席深叢見孤羆文如翻水成𥘉不用意爲四座各低面不敢捩眼窺捩力結切拗也又苕溪詩話云音䴡琵琶撥也謂左右窺升階揖侍郎知㪯者立之中正元四年進士第知㪯待郎刘太真歸舎日未欹佳句喧衆口考官敢瑕疵或作玼方云避重韵而誤改也連年收科第若摘頷底髭迴首卿相位通途無他歧途或作逵或作逹豈論校書郎立之登第後除秘書省校書郎𫀆笏光參差童稚見稱說祝身得如斯儕輩妬且熱喘如竹筒吹老婦願嫁女約不論財貲約不或作不約貲或作資方云亦避重韵之誤此詩用二疵字二斯字不獨此也老翁不量分累月笞其兒攪攪爭附託攪攬或作擾優無人角雄雌由來人閒事翻覆不可知安有巢中鷇音冦鳥生子湏母哺曰鷇燕雀之属揷翅飛天陲駒麛音迷鹿子著陟畧切爪牙猛虎借與皮汝頭有韁音姜馬組繫汝脚有索縻䧟身泥溝間誰復禀指撝不脫吏部選可見偶與竒又作朝士貶得非命所施客居京城中十日營一炊逼迫走巴巒恩愛座上離昨來漢水頭始得完孤羇桁掛新衣裳桁音行又下良切韓曰衣椸也周庾信對燭賦灯前桁衣凝不亮盎棄食殘糜苟無飢寒苦那用分髙卑憐我還好古宦途同險巇毎旬遺我書竟歳無差池上楚宜切两相差左傳何敢差池新篇奚其思風幡肆逶迤幡或作旛又論諸毛功劈水看蛟螭劈或作擘雷電生睒䁑二字或从日說見永貞行上音閃下音釋韓曰疾視皃選忘其所以睒䁑孫曰睒暫見也言雷電睒爍見其光如日角鬛相撑披或作枝方云亦以重韵而誤改也属我感窮景抱華不能摛蜀本作把筆不能摛不能或作能不方从杭本云班固答賔戯摛藻如春華盖公得崔詩正當冬月故感窮景而不能摛發其春華耳上文諸毛乃謂筆也旣隱其詞則此不應又直言之故作把筆者亦非也今按方本及說皆是但其詞有未足者故今略為𥙷之論諸毛功必是為毛頴傳而發但蜀本之誤不待以此為辨而自明矣唱來和相報愧歎俾我疵疾移切黒病又寄百尺綵緋紅相盛衰巧能喻其誠巧或作功方从唐蜀本云列子矜巧能修名譽今按巧能喻其誠言崔遺我書并新篇綵帛巧於能逹其意猶言工於某事云尓非以巧能為二字相連如列子之意也方說誤矣深淺抽肝脾開展放我側方餐涕垂匙朋交日凋謝存者逐利移子寜獨迷誤綴綴意益彌舉頭庭樹豁頭或作頂狂飈卷寒曦迢遞山水隔何由應塤箎别來就十年君馬記騧音瓜黄馬黒䴡音离馬深喙曰騧馬黒色曰􅌐長女當及事誰助出帨音稅佩巾所以拭物縭音离緌也詩親結其縭諸男皆秀朗幾能守家規文字銳氣在輝輝見旌麾摧腸與慼容或作居或作眉方云居當為容字之訛也眉特以意定耳慼作蹙亦通孟子其容有蹙能復持酒巵我雖未耋老髮秃骨力羸所餘十九齒飄颻盡浮危玄花著兩眼視物隔褷䙰上所宜切下吕支切方云離褷毛羽𥘉生兒字本海賦然離字字書无从衣者惟王維詩有独立何日是嵇康琴賦作離纚古楽府作玉蓰陸羽茶經作䴡簁義皆通今此作褷䙰豈古連緜字或可倒用不然褷字自入韵豈傳者誤耶姚令威曰唐本作視物劇隔褷不知謝本何以不出今按所見謝本实校作劇隔褷下注澄字然義亦未通恐當作視劇隔褷䙰物字乃劇字之訛而又重出遂去䙰字以就五言耳然亦无据不如且从方說徐更參考燕席謝不詣游鞍懸莫騎敦敦凭書案敦敦或作孜孜方从閤杭本作敦音都回切譬彼鳥黏黐丑知切用以䵕鳥且吾聞之師不以物自隳孤豚眠糞壤眠方作服或作伏不慕太廟犧孫曰荘子或聘於莊子應其使曰子見夫牡牛乎衣以文綺食以蒭菽及其牽而入於太庿雖欲爲孤豚其可得乎君看一時人幾輩先騰馳過半黒頭死隂蟲食枯骴音疵殘骨歡華不滿眼歡或作權咎責塞兩儀觀名計之利或作实今按此句難曉切意計猶校也言觀其所得之虚名而校之以实利不足相𥙷也詎足相陪禆符支切𥙷也増也仁者恥貪冒受禄量所宜無能食國惠豈異哀癃罷音皮倦也乆欲辭謝去休令衆雎雎音隋視上逆也又衆目所視莊子而睢睢而盱盱而誰与居况又嬰疹疾又或作自疹音軫說文唇瘍也寜保軀不貲即移切後漢書曰不足以償不貲之身不能前死羅内實慙神祗舊籍在東都茅屋枳棘籬還歸非無指灞渭揚春澌音斯觧氷也方云流氷為澌父水非生兮耕吾疆死也埋吾陂也一作兮文書自傳道不仗史筆垂不或作奚夫子固吾黨新恩釋銜羇去來伊洛上相待安罛公胡切魚罟箄音卑取魚竹器江東呼小籠為箄我有双飲􅊦其銀得朱提上音殊卜音時孫曰漢縣名属健為郡有朱提山出銀綱祝曰漢朱提銀捌兩為一流直一千五百八十他銀一流直一千是爲銀貨二品黄金塗物象雕鑴妙工倕音垂荘子工倕旋而盖規矩倕人名堯時共工乃令千里鯨么麽微螽斯麽母果切細小皃班彪幺麽不及数子螽之中切蝗類以股嗚者孫曰言工人之巧能使千里鯨魚小如螽斯也猶能爭明月擺掉出渺瀰野草花葉細不辨薋菉葹离騷經薋菉葹以盈室王逸注薋音咨蒺藜也菉音緑王芻也葹音施枲耳也韓曰三者皆惡草以喻䜛佞緜緜相紏結狀似環城陴音脾城上垣四隅美蓉樹擢豔皆猗猗長也鯨以興許應切君身或作㒷居狀或作状㒷居皆非是荆公本作狀君身近之方从唐本作興君身乃得其正盖興猶比也君指崔立之而言失所逢百罹月以喻夫道僶勉勵莫虧莫或作其草木明覆載妍醜齊榮萎醜或作臭願君恒御之行止雜燧觽上音遂下許規切雜方作親或作新皆非是但共本云登作雜遂山見内則言當常御此􅊦雜於所佩燧觽之間也此乃得之異日期對舉當如合分支通鑑元魏熈乎元年立法在軍有功者行䑓給劵當中竪裂一支給勲人一支送門下以防僞巧今人亦謂柝産符契爲分支帳即此義也公以双􅊦之一贈崔故末句如此月蝕詩效玉川子作方云李本无詩字洪曰或謂館中本效作删注彦章本同元和庚寅斗挿子月十四日三更中四或作五森森萬木夜僵立森森方作臨臨殊无義理按盧詩乃作森森盖自森轉而爲林自林轉而爲臨也今改作森森寒氣屓奰頑無風屓虚器切奰平秘切西京賦日巨靈屓奰屓奰諸本作贔屓或作屓贔方云盧詩雖作屓屓然公多不用盧本語贔屓用力皃屓奰亦大皃詩傳不醉而怒謂之之其義尤長今按諸本不同未知孰是姑兩存之月形如白盤完完上天東諸本作貌貌或作皃皃方从杭范荆公本作完今按完字說見酬盧雲夫望秋詩洪本亦云古書完多誤作皃此又轉冩爲貌耳忽然有物來噉之不知是何蟲如何至神物遭此狼狽凶狽音貝神異經云狽无前足附狼而行選亦狼狽而可慜星如撒沙出攅集爭強雄撒方作摋云側手擊也盧詩作拆今本从之非也今按側手擊沙於義不通公於盧語固有損益然改此字却无文理當只作撒油燈不照席是夕吐𦦨如長虹如長或作長如玉川子涕泗下中庭獨行独下或有自字念此日月者爲天之眼睛此猶不自保吾道何由行嘗聞古老言疑是蝦蟇精徑圎千里納女腹何處養女百醜形把沙行皃脚手鈍誰使女解縁青冥把或作􅐡音義同黄帝有四目諸本黄作皇方从杭本云帝王丗紀謂黄帝用力牧常先等分掌四方各如己視故號黄帝四目一曰李賢後漢注漢人書黄多作皇皇字亦通洪以皇帝爲堯則非也帝舜重其明今天祗兩目何故許食使偏盲堯呼大水浸十日不惜萬國赤子魚頭生女於此時若食日雖食八九無嚵名嚵狙銜切祝曰說文小也嚵或作饞赤龍黒鳥燒口熱黒鳥未詳或謂日中三足烏也鳥一作烏翎鬛倒側相搪音棠搪突也撐婪盧含切与惏同楚辝衆皆競進以貪婪注愛財曰貪爱食曰婪酣大肚遭一飽飢腸徹死無由鳴後時食月罪當死天羅天網也磕帀何處逃汝刑磕音搕磕帀者周帀也磕帀或作磕匝磕或作匌或作或无女字玉川子立於庭而言曰地行賤臣仝或作今方云汪本云仝字當句断亦与盧詩合再拜敢告上天公上天或作天上臣有一寸刃可刳凶蟇腸無梯可上天天階無由有臣蹤寄牋東南風天門西北祈風通丁寜附耳莫漏洩薄命正值飛廉慵呉氏春秋云風師曰飛廉漢書音義云飛廉能致風東方青色龍牙角何呀呀音牙小兒忿爭声從官百餘座此下或有從應二字荆公删去嚼啜煩官家月蝕汝不知安用爲龍窟天河赤鳥司南方尾秃翅觰沙觰或作方云觰陟加切角上張也字亦作􅡬作訛月蝕於汝頭汝口開呀呀或作齖齖方云齖齒不正也音牙与開口義不合此當音呼加切唐韻唅呀張口皃也今詳或改此字亦避重韵而誤也蝦蟇掠汝兩吻過忍學省事不以汝觜啄蝦蟇於莵上音烏下音徒楚人謂虎爲於莵蹲於西旗旄衛毿㲚參沙二音長毛皃旣從白帝祠又食於􅷲禮有加礼記䄍礼迎虎謂其食田豕忍令月𬒳悪物食枉於汝口挿齒牙烏龜怯姦怕寒縮頸以殻自遮終令夸蛾㭈汝出夸苦瓜切列子帝命夸娥氏二子負山注盖有力者蛾或作娥方从列子校抉方作扶非是卜師燒錐鑚灼滿板如星羅此外内外官漢天文志經星常宿中外官百十八名七百八十三星瑣細不足科臣請悉掃除愼勿許語令啾譁併光全耀歸我月盲眼鏡浄無纎瑕全或作金暇或作霞皆非是弊蛙拘送主府官弊或作斃今按弊蛙猶卓茂言敝人也不然則當改从斃字盖此時蛙雖未斃而其罪亦當死矣帝箸下腹嘗其皤皤音婆腹下白皃或作蹯皤腹下白處也蹯足蹠也當作皤依前使兎操杵臼玉階桂樹閑婆娑恒娥還宫室方作堂太陽有室家礼記曰君之与后猶日之与月天雖髙耳屬地感臣赤心使臣知意臣知方作知臣今按下文云雖无胡言潜喻厥旨則此句乃謂天感悟臣心使臣黙知天意耳諸本多作使知臣意非是其下所云有氣有形以下即天意也雖無明言潜喻厥㫖明或作口有氣有形皆吾赤子雖忿大傷忍殺孩稚大或作夭還女月明安行于次盡釋衆罪以蛙磔死磔竹客切裂也方云盧詩新史以為譏元和逆黨然稽之歳月不合盖元和𥘉宦官已横恣故譏之非為逆黨也今按盧韓二詩必有所為而作但未有以見其所指為何人何事耳新史固謬方說恐亦未必然也孟生詩諸本孟下有先字方云此詩以篇首二字為題今本誤也孟郊荅韓愈别因献張徐州詩云冨别愁在顔貧别愁銷骨懶磨青銅鑑畏見新白髮古樹春无花子規啼有血離絃不堪听一听四五絶丗途非一險俗慮有千結有客歩大方驅車独迷轍故人韓与李逸輪双皎㓗哀我摧折歸贈詞從横設徐方囯東樞元戎天下傑祢衡投刺遊王粲吟詩謁髙情无遺照明抱開曉月在士不理冤有讎皆爲雪願爲竒草木永向君地列願爲古琴瑟永向君前發欲識丈夫心曽將孤劒說孟生江海士生一作郊古貌又古心嘗讀古人書謂言古猶今嘗或作常作詩三百首窅黙咸池音諸本窅作冥方云李習之与張建封書引公此語亦用窅字騎驢到京國欲和薫風琴豈識天子居九重欎沉沉一門百夫守無籍不可尋門藉孫曰為二尺竹牒記其年紀名字物色縣之宫門案省相應乃得入也晶光前漢太陽之晶晶亦光也蕩相射旗㦸翩以森遷延乍却走驚怪靡自任如林切堪也舉頭㸔白日泣涕下霑㯲朅來遊公卿莫肯低華簮諒非軒冕族應對多差參萍蓬風波急桑榆日月侵柰何從進士此路轉嶇嶔上音區下音欽山不平皃范曅曰隨山上嶇嶔是也異質忌處羣孤芳難寄林誰怜松桂性競愛桃李隂朝悲辭樹葉夕感歸巢禽顧我多慷慨窮簷時見臨簷或作閻方云考苟子史記子貢傳閻字為正清宵静相對髮白聆苦吟聆或作耻或作怜採蘭束晢南陔詩言採其蘭言念親思帰也起幽念眇然望東南起或作赴望或作思秦呉秦長安呉東野所居脩且阻兩地无數金我論徐方牧方一作州好古天下欽竹實鳯所食德馨神所歆求觀衆丘小必上泰山岑力簮切山小而髙求觀衆流細必泛滄溟深溟或作海于其聽我言可以當所箴旣獲則思返無爲乆滯淫卞和試三獻琴操卞和得王献楚懷王遭刖献平王又刖平王之子立復献之中果有玉封陵陽侯期子在秋砧射訓狐有鳥夜飛名訓狐名或作呼唐五行志休留一名訓狐或曰訓狐其声也因以名之矜凶挾狡誇自呼乗時隂黒止我屋聲勢慷慨非常麄安然大喚誰畏忌喚或作唳方云曹子建鷂雀賦不肯首服烈頸大喚造作百怪非無湏聚鬼徴妖自朋扇擺掉栱音拱大杙選栾栱夭矯而交結桷方作角頽墍音洎塗慈母抱兒怕入席那暇更護雞窠雛我念乾坤德泰大卵此悪物常勤劬縱之豈即遽有害斗柄行拄西南隅誰謂停奸計尤劇尢或作猶意欲唐突羲和烏侵更歴漏氣弥厲何由僥倖休湏臾咨余往射豈得巳候女兩眼張睢盱梟敬墮梁蛇走竇一夫斬頸羣雛枯夫館本作矢方云或謂矢何以能斬頸也鮑明逺詩黄間潜彀盧矢直刎繡頸碎錦翼詩人之語顧隨所用耳今按方說雖有理然以詩考之似只是公親徃射而梟夜墮梁故佐之者得以刀斬其頸耳不必改字強說也將歸贈孟東野房蜀客蜀客名次卿君門不可入勢利互相推借問讀書客胡爲在京師舉頭未能對閉眼聊自思倐忽十六年終朝苦寒飢宦途竟寥落鬢髪坐差池潁水清且寂箕山坦而夷如今便當去咄咄無自疑疑或作癡亦通方作女无癡則誤矣答孟郊東野集有别公詩此篇所以荅也汴州别愈詩云不歛濁水瀾空滯此汴河坐見此岸水尽為還海波四時不在家弊服断綿多逺客独樵悴春英各婆娑汴水遶曲流野桑无直何但為君子心歎息終匪佗洪云規模背時利文字覷天巧此效東野酬獎樊宗師云梁惟西南屏山厉水刻屈此效宗師黄魯直云子瞻詩妙一丗乃云效庭堅体盖退之戯效東野宗師之比以文渭稽耳規模背時利模或作謨或作謀文字覷天巧人皆餘酒肉子獨不得飽纔春思已亂始秋悲又攪朝餐動及午夜諷恒至卯名聲暫羶腥腸肚鎮煎煼𥘉瓜切熬也杭本煼作熖俗字也古心雖自鞭丗路終難拗弱拒喜張臂猛挐閑縮爪見倒誰肯扶從嗔我湏齩五巧切交齒也選口齩霜刃樊日此䏈即公誌子厚墓所謂落穽不一引手救反㨈之而下石焉者是也縁上出路而言之從仕居閑食不足從仕力難任兩事皆害性一生恒苦心黄昏歸私室惆悵起歎音棄置人間丗或作事古來非獨今短燈檠歌本或作灯檠方云姚令威曰古詩灯檠昏魚目讀檠為去声集韻檠渠映切有足所以凡物又檠音平声榜也非灯檠字韓詩牆角君看短檠弃亦誤也按灯檠昏魚目乃唐彦謙詩李商隱詩亦有九枝灯檠夜珠圎是唐人固以去声讀也然白楽天詩有鐵檠移灯背自注曰檠去声讀則知唐人本二声通用古檠只用檠字晋宋諸人集尚可攷長檠八尺空自長短檠二尺便且光黄簾緑幕朱戸閉風露氣入秋堂凉裁衣寄逺淚眼暗搔頭頻挑移近床太學儒生東魯客二十辭家來射䇿夜書細字綴語言兩目眵尺支切目什凝昏頭雪白此時提携當案前携方作挈看書到曉那能眠一朝冨貴還自恣長檠髙張照珠翠高張或作熖髙珠或作朱吁嗟丗事無不然牆角君看短檠棄送劉師服夏半隂氣始浙然雲景秋淅或作晰亦作晳方作晢云明也之丗切髙唐賦晣兮若姣姬揚袂障目而望所思晰与晳同故今本訛爲浙也今按淅爲淅歴凄涼之義晢爲明乂此詩上云隂氣始下云雲景秋則与晳義不相應而宜爲浙瀝之意矣盖由淅而誤爲晰又因晣而轉爲晳也蟬聲入客耳驚起不可留草草具盤饌不待酒獻酬待方作持士生爲名累有似魚中鉤齎財入市賣貴者恒難售音讐宣帝毎買餅所从買家輒大讐讐与售同也豈不畏顦顇或作乆憔悴爲功忌中休勉哉耘其業以待歳晚收朱文公校昌黎先生集卷之五
