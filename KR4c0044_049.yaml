front:
  text: 朱文公校昌黎先生外集卷之七考異音釋附
  hash: sha256:8a43b9b513511fe0ab3ecf962d8747759e8def0d89aa74a9705302a06b81d6ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_049-1a}
body:
  text: 順宗實録二起二月盡二月二月甲子上御丹鳯門大赦天下自貞元二十一年二月二十四日昧爽巳前大辟巳下罪無輕重常赦所不原者咸赦原之諸色人中有才行兼茂明於理躰者經術精深可為師法者逹於吏理可使從政者宜委常參官各舉所知其在外者長吏精加訪擇具名聞奏仍優禮發遣舊事宫中有要市外物令官吏主之與人為市隨給其直外物下或有間字貞元末以官者為使抑買人物稍不如本估末年不復行文書置白望數百人於兩市并要閙坊閲人所賣物但稱宫市即斂手付與真偽不復可辨無敢問所從來其論價之髙下者率用百錢物買人直數千錢物其論疑當作與論仍索進奉門户并腳價錢將物詣市至有空手而歸者名為宫市而實奪之嘗有農夫以驢負柴至城賣遇宦者稱官市取之才與絹數尺又就索門户仍邀以驢送至內農夫涕泣以所得絹付之不肯受曰須汝驢送柴至內農夫曰我有父母妻子待此然後食今以柴與汝不取直而歸汝尚不肯我有死而巳遂歐宦者待或作得有死或作必死街吏擒以聞詔黜此宦者而賜農夫絹十匹然宫市亦不為之改易諌官御史數奏疏諌不聽上𥘉登位禁之至大赦又眀禁又貞元中要乳母皆令選寺觀婢以充之而給與其直例多不中選寺觀次當出者賣産業割與地買之貴有姿貌者以進其徒苦之至是亦禁焉地上與字恐誤或賣産業是本文後改作割地而傳者不夫舊文又誤增與字貞元末五坊小兒張捕鳥雀於閭里皆為暴橫以取錢物至有張羅網於門不許人出入者或有張井上者使不得汲水近之輒曰汝驚供奉鳥雀痛歐之出錢物求謝乃去或相聚飲食於肆醉飽而去賣者或不知就索其直多𬒳歐罵或時留蛇一囊為質曰此蛇所以致鳥雀而捕之者今留付汝幸善飼之勿令飢渴賣者愧謝求哀乃攜而去上在春宫時則知其弊常欲奏禁之至即位遂推而行之人情大恱春或作東乙丑停鹽鐡使進獻舊鹽鐵錢物悉入正庫一助經費其後主此務者稍以時市珍玩時新物充進獻以求恩澤其後益甚歲淮錢物謂之羡餘而經入益少至貞元末逐月有獻焉謂之月進至是乃罷遂或作逐非是命右金吾將軍兼中丞田景度持節告哀於吐蕃以庫部貟外熊執易為副兵部郎中兼中丞元季方告哀于新羅且册立新羅嗣王主客貟外郎兼殿中監馬于為副二月庚午朔出後宫三百人辛未以翰林待詔王伾為翰林學士壬申以故相撫州别駕薑公輔為吉州刺史前戶部侍郎判度支江州别駕蘇辨為忠州刺史追故相忠州刺史陸贄郴州别駕鄭餘慶前京兆尹杭州刺史韓皋前諌議大夫道州刺史陽城赴京師德宗自貞元十年巳後不復有赦令左降官雖有名德才望以微過忤旨譴逐者一去皆不復敘用至是人情大恱而陸贄陽城皆未聞追詔而卒於遷所士君子惜之聞下或有於字癸酉出後宫并教坊女妓六百人聽其親戚迎于九仙門百姓相聚歡呼大喜景戍詔曰檢校司空平章事杜佑可檢校司徒平章事充度支并鹽鐵使以浙西觀察李錡為浙西節度檢校刑部尚書賜徐州軍額曰武寧制曰朕新委元臣綜釐重務爰求二職固在能臣起居舍人王叔文精識瓌材寡徒少欲質直無隱沈深有謀其忠也盡致君之大方其言也逹為政之要道凡所詢訪皆合大猷冝繼前勞佇光新命可度支鹽鐵副使依前翰林學士本官賜如故賜如或作餘如𥘉叔文既專內外之政與其黨謀曰判度支則國賦在手可以厚結諸用事人取兵士心以固其權驟使重職人心不服藉杜佑雅有會計之名位重而務自全易可制故先令佑主其名而除之為副以專之藉更作籍或無籍字除之疑當作除巳以户部尚書判度支王紹為兵部尚書以吏部郎中李鄘為御史中丞武元衡為左庶子𥘉叔文黨數人貞元末巳為御史在臺至元衡為中丞薄其人待之鹵莾皆有所憾而叔文又以元衡在風憲欲使附巳使其黨誘以權利元衡不為之動叔文怒故有所授庚寅制下或有曰字門下侍郎守吏部尚書平章事賈耽可檢校司空兼左僕射守門下侍郎平章事鄭珣瑜可守吏部尚書守中書侍郎平章事髙郢可守刑部尚書守尚書左丞平章事韋執誼可守中書侍郎並依前平章事癸巳詔曰萬國之本屬在元良主器之重歸于長子所以基社稷而固邦統古之制也廣陵王某孝友溫恭慈仁忠恕慱厚以容物寬明而愛人祗服訓詞言皆合雅講求典學禮必從師居有令聞動無違德朕獲纘丕緒祗若大猷惟懷永圖用建儲二以承宗廟以奉粢盛爰舉舊章俾膺茂典宜册為皇太子改名某仍令所司擇日備禮册命𥘉廣陵王名從水傍享至册為皇太子始改從今名丁酉吏部尚書平章事鄭珣瑜稱疾去位其日珣瑜方與諸相會食於中書故事丞相方食百寮無敢謁見者叔文是日至中書欲與執誼計事令直省通執誼直省以舊事告叔文叱直省直省懼入白執誼執誼逡巡慙赧竟起迎叔文就其閣語良久宰相杜佑髙郢珣瑜皆停筋以待郢下或有鄭字有報者云叔文索飯韋相巳與之同餐閣中矣佑郢等心知其不可畏懼叔文執誼莫敢出言或無不字非是珣瑜獨歎曰吾豈可復居此位顧左右取馬徑歸遂不起前是左僕射賈耽以疾歸第未起珣瑜又繼去二相皆天下重望相次歸卧叔文執誼等益無所顧忌逺近大懼焉朱文公校昌黎先生外集卷之七
