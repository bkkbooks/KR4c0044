front:
  text: 朱文公校昌􅀺先生集卷之二十七
  hash: sha256:97a8e12aafdd922b7e40cfbd1949ecf9e580273d131a01aab3250a5d80a6d62c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_027-1a}
body:
  text: 碑誌劉統軍碑韓曰公嘗誌統軍劉昌裔墓矣仐又銘其碑此篇並从方所据石本爲正可疑者别見唐故陳許軍節度使金紫光禄大夫檢校尚書左僕射兼御史大夫右龍武統軍彭城郡開國公食邑二千户贈潞州大都督劉公諱昌裔字光後許下或无軍字方從石本薨旣葬將反机于京舎于墓次机或作柩或作几或作玉京下有師字故吏文武士門人送客訖事㑹􅂘將退咸顧戀牽連一口言曰自我公薨至葬凡所以校德焯勤上之薬切明也一作卓者莫不粗宗隱卒崇終有都督之詔日事時功以著不可誣可下或有以字有太史之狀太常之狀有謚有誄有幽堂之銘太常上或有有字又如即外碑刻文以顯詩之其於傳無巳豈不益可保於是相許諾以告其􅀌縱縱哭捨杖拜曰縱不敢違或无􅂘字則相與刻銘文曰劉處彭城本自楚元陽曲之别繇公祖遷公曾祖考爲朔州守祖令太原仍丗北邊樂其髙寒棄楚不還逮于公身三丗晉人趙德夫云石本三丗作再丗上文祖令太原作考令太原然其篇首旣言陽曲之别由公祖迁則爲晋人非再丗矣碑當時所立不應差其丗次莫可曉也今按劉志在後卷所述丗次􅀹詳與再丗之云皆不合亦石本不足信之一驗也公生而異魁顔鉅鼻㓜如舒退少長好事西戎乗势盗有河外公雖家居爲國喑噫上於金切下烏界切噫氣來告邊帥可破之計帥或作師楊琳爲橫巴蜀靡彫方云考代宗起大曆三年瀘州刺史楊子琳反昌裔􅀃子琳亊通鑑亦可考新書作楊惠琳誤矣公由游􅀉單船諭招方云爾雅士特舟注單船折其尾毒不得動揺其尾毒或作旗纛尾琳後來降公不有功終琳之巳還卧民里蓋古有云人職其憂無事於職而與國謀德宗之始爲曲環樊曰建中􅀄曲環爲邠隴都知兵馬使辟昌裔為判官為環檄李納剴曉大義環上其藁德宗異之起􅁬筆爲檄強㓂氣死决敗筭成效於屈指環有許師公遂佐之蘇民軋敵多出公畫軋或作􅀾或作朝累拜郎中進兼中丞雖在陪貳天子所慿蔡卒幸䘮圍我許郛新師不牢劻勷上音匡下音穰集注急走皃又迫遽也將逋公爲陳方應變爲械方或作力與之上下冦無所頼遂至遁敗方云或云此句上當脫一句非也今按此篇文休整斉无竒句為韻者或􅀃是也不然則􅄛与之上下一句未知果孰是也石本之不足信此又􅂋然前亦屡辨之矣以功遷陳實許之半聲駕元侯以􅀔自憚復入居許爲軍司馬脫權下威士心益歸卒嗣環職棄惡從德乃與蔡通塗其榛􅁄稚耋嬉遨連手歌謳遨或作遊上無可怨外無與讎旣長事官悛之大夫悛諸本作浚仐按此一字亦可疑未詳其説其償未塞僕射以都償或作賞以或作巳仐按上句有未字此當作巳然此集二字通用者亦多姑从舊及癸巳歳秋涌水出流過其部破民廬室公即䟽言此皆臣􅄽防㫁不􅀘漬民於泉漬或作濆臣耋且疾冝即大罰上曰􅨶害大臣其來􅨶或作菑今按􅨶害滅除字本秦刻允余之思其可止哉驛隸走呼有中使來公迎于驛遂行不迴六月隆􅀬上下歊赩歊或作歆下許極切楚辝北有寒山卓龍赩只注赩赤色方云赩大赤也字見楚辝大招公鞭公驅去馬以輿公病日惡不能造闕仆卧在宅閔有加錫命爲統軍龍武之右兼官左相百僚長首冬十一月日將南至公遂薨殂年六十二奏聞怛悼俾官臨弔悲不聽朝贈督潞州存殁之賚於數爲􅄖明年九月東葬金谷公往有命匪後人卜衢州徐偃王廟碑洪曰徐偃王事見史記後漢書博物志然後漢云楚文王㓕之楚詞亦云荆文寤而徐亡按周穆王時無楚文王春秋時無徐偃王予嘗辨於楚詞􅀘注中徐與秦俱出栢翳孫曰史記秦本紀大業之後曰大費是為栢翳舜賜姓嬴氏栢翳二子大亷後為秦􅀂未為徐又一曰伯益一曰栢翳声相近故也爲嬴姓國於夏殷周丗咸有大功殷或作商方从石本今从之此篇内同疑者别見秦處西偏專用武勝遭丗衰無明天子遂虎吞諸國爲雄囯或作侯諸國旣皆入秦爲臣屬秦無所取利上下相賊害卒僨甫運切祝曰猶亡也荘子一僨一起其國而沈其宗徐處得地中文德爲治文方作又今以上文秦用武勝者推之此宜作文及偃王誕當國益除去刑爭末事凡所以君國子民待四方一出於仁義當此之時周天子穆王無道意不在天下好道士􅀃得八龍􅀐之西遊同王母宴于瑶池之上歌謳忘歸方云石本无宴字今按无宴字不成文以它本􅀘四方諸侯之爭辯者無所質正咸賔􅀕於徐􅀕方從杭本作寮云今廟中有傳刻􅂟暦中石本亦作寮今按賔寮无理明甚况􅂟暦石本非當時物无不足拠而左傳有賔􅀕字當從諸本作􅀕爲是贄玉帛死生之物于徐之庭者三十六國得朱弓赤矢之瑞穆王聞之恐遂稱受命命造父御長驅而歸與楚連謀伐徐徐不忍闘其民北走彭城武原山下百姓隨而從之萬有餘家偃王死民號其山爲徐山鑿石爲室以祠偃王偃王雖走死失國民戴其嗣爲君如􅀄方云失下或有其字亦云石本不知是否今按此字有无不可知然亦可見方未嘗見眞石本也駒王章禹祖孫相望自秦至今名公巨人繼跡史書徐氏十望其九皆本於偃王而秦後迄兹無聞家自秦或作自奉史或作文天於栢翳之緒非偏有厚薄施仁與暴之報自然異也衢州故㑹稽太末上音闥也民多姓徐氏支縣龍丘有偃王遺廟或曰偃王之逃戰不之彭城之越城之隅棄玉几研硯与研同于㑹稽之水或曰徐子章禹旣執於呉徐之公族子弟散之徐楊二州間即其居立先王廟云公或作宋開元􅀄徐姓二人相屬爲刺史帥其部之同姓改作廟屋載事于碑後九十年當元和九年而徐氏放復爲刺史放字逹夫前碑所謂今户部侍郎其大父也春行視農至于龍丘有事于廟思惟本原曰故制觕倉胡切樸下窄不足以掲音羯䖍妥靈而又梁桷赤白陊池耳切又徒可切祝曰選期不阤陊陊壞落也剥不治觕或作桷圖像之威䵝許旣切玉萹云深黒也昧就滅藩拔級夷庭木秃􅆙􅆙或作缺今按缺正字􅆙俗体然唐人多用之姑从其舊祈甿日慢祥慶弗下日方云洪以石本定作由今按由義未詳姑從諸本作日州之羣支不􅀗䕃麻羣支或作支郡或作羣吏皆非是余惟遺紹而尸其土不即不圗以有資聚罰其可辭乃命因故爲新衆工齊事惟月􅀂日工告訖功大祠于廟宗卿咸序應卿或作御是歳州無怪風劇雨民不夭厲榖果完實民皆曰耿耿祉哉其不可誣耿耿祉哉或作祉哉祉哉方從閣本无祉字而不言石本之有无又云耿當讀從烔今從諸本乃相與請辭京師歸而鑱之于石辭曰秦傑以顚徐由遜緜遜或作邈秦􅀑乆飢徐有廟存婉婉偃王惟道之耽以國易仁爲􅀏于頑自􅀄擅命其實幾姓歴短詈長有不償亡詈或作言課其利害孰與王當與方从法氏石本作嘗今從諸本姑蔑今衢州有姑蔑城左傳越伐呉王孫弥庸自泓上觀之見姑蔑之旗曰吾父之旗也杜預注姑蔑越也之墟太末之里誰思王恩立廟以祀王之聞孫丗丗多有唯臨兹􅀖廟土實守堅嶠之後逹夫廓之王殁萬年如始祔時王孫多孝丗奉王廟逹夫之來先愼詔教盡惠廟民不主於神維是逹夫知孝之元太末之里姑蔑之城廟事時脩仁孝振聲冝寵其人以及後生嗟嗟維王雖古誰亢古或作死恊韻苦郎切猶拒也王死于仁彼以暴䘮暴方作常而不言石本今從諸本文追作誄刻示茫茫示或作石方云石本如此而不敢從今亦不敢從也􅀽氏先廟碑韓曰􅀽滋本傳巳詳碑特㪯其槩耳􅀽公滋旣成廟明歳二月自荆南以旂節朝京師歳或作年方云考之史􅀽滋以元和十一年朝京師旂或作旌留六日得壬子春分率宗親子屬用少牢于三室旣事退言曰嗚呼逺哉維丗傳德襲訓集余乃今有濟今􅀕旣不薦金石音聲使工歌詩載烈象容祝曰爲之歌詩所以載其功烈象其形容其奚以飭稚昧於長乆唯敬繫羊豕幸有石孫曰即所謂䴡牲之碑􅀕義云􅀕之之日君牽牲入廟門䴡于碑䴡繫也如具著先人名跡因爲詩繋之語下於義其可著或作者雖然余不敢必屬篤古而逹於詞者遂以命愈愈謝非其人不􅀗命則謹條􅀽氏本所以出與其丗系里居起周歴漢魏􅀳拓拔魏周隋入國家以來髙曾祖考所以劬躬燾後孫曰謂覆燾其後人委祉于公以來或作巳來公之所以逢將承應者有槩有詳而綴以詩其語曰周樹舜後陳語或作詩樹或作封後下方有爲字陳公子有爲大夫食國之地􅀽郷者其子孫丗守不失因自别爲􅀽氏春秋丗陳常壓於楚與中國相加􅀹䟽􅀽氏猶班班見可􅀘常居陽間下音賈仐亳州陽夏至􅀳屬陳郡故號陳郡􅀽氏見可譜或作可見于譜属陳下或无郡字博士固申儒遏黃樊曰漢儒轅固斉人竇太后好老子書召問固固曰此家人言矣太后怒之韓曰固以治詩景帝時爲博士与黄生争論黃生曰湯武非受命乃弑固曰不然桀紂暴虐天下之心皆歸湯武不得巳而立非受命而何唱業於前至司徒安懷德於身􅀽氏遂大􅂋連丗有人終漢連魏晋分仕􅀯北終作紛方非是始居華隂爲拓拔魏鴻臚鴻臚諱㳟生周梁州刺史新縣孝侯諱頴新下或有安字頴或作頻孝侯生隋左衛大將軍諱温去官居華隂武德九年以大耋薨始葬華州耋或作耄左衛生南州刺史諱士政南州生當陽令諱倫於公爲曾祖當陽生朝散大夫石州司馬諱知玄司馬生贈工部尚書咸寕令諱曄是爲皇考􅀽氏舊族而當陽以通經爲儒位止縣令石州用春秋持身治事爲州司馬以終咸寜備學而貫以一文武隨用謀行功從出入有立不爵于朝比三丗宜逹而窒歸成後人數當于公公惟曾大父大父皇考比三丗存不大夫食殁􅀕在子孫或无再出大父字有公字大父或作大夫比或作妣皆非是又此所序􅀽滋丗繫如此甚明而唐書新傳以滋爲􅀽範之後誤矣唯將相能致備物丗彌逺禮則益不及在愼德行業治圖功載名以待上可無細大無敢不敬畏無早夜無敢不思成于家進于外以立于朝自侍御史歴工部貟外郎祠部郎中諌議大夫尚書右丞華州刺史金吾大將軍由卑而鉅莫不官稱遂爲宰相以賛辨章孫曰便章也史記曰便章百姓即平章耳仍持節將蜀滑襄荆畧苞河山秩登禄冨以有廟祀具如其志又垂􅂋刻以教無忘可謂大孝刻或作烈詩曰詩下方有文字􅀽自陳分􅀄尚蹇連方作連連越秦造漢博士發論司徒任德忍不錮人方云愽士轅固司徒􅀽安也按左傳陳有轅儔塗又有􅀽僑漢有轅固轅豊又有􅀽安盖两姓也杜預謂􅀽僑濤塗四丗孫不知何以至漢復出两姓仐按歐公集古録漢三老􅀽良碑亦云濤塗立姓爲􅀽盖轅􅀽古字通用􅀽盎又通作爰亦非别爲一姓也收功厥後五公重尊􅀳氏于南來處華下鴻臚孝侯用適操捨南州勤治取最不懈當陽耽經唯義之畏石州烈烈學專春秋懿哉咸寧不名一休趨難避成與時泛浮是生孝子天子之宰出把將符羣州承楷把或作祀或作持羣或作郡數以立廟禄以備器数或作教􅀃見烏氏廟碑由曾及考同堂異置栢版松楹其筵肆肆筵或作業維􅀽之廟孝孫之爲順􅀔即冝以諏以􅀛以平其􅇖屋牆持持孝孫來享來拜廟庭陟堂進室親登籩鉶或作鈃肩臑胉骼臑奴報切又女朱切胉音粕骼音格集注臑臂節也礼記其礼太牢則以牛左肩臂臑折九介儀礼臂臑盹骼胉脅也儀礼两胉脊肺設扄鼐骼禽獸骨也四者皆所薦之羞其樽玄清補注謂玄酒清酒降登受胙于慶爾成尔方作示非是維曾維祖維考之施于汝孝嗣以報以祗凡我有今非本曷思刻詩牲繫維以告之牲繋或作繫牲清河郡公房公墓碣銘公諱啓字某河南人其大王父融王父琯仍父子爲宰相融相天后事逺不大傳琯相玄宗肅宗處艱難中與道進退薨贈太尉流聲于兹父乗仕至祕書少監贈太子詹事公胚胎前光生長食息不離典訓之内目擩耳染不學以能擩或作懦或作揣方云擩亦染也仐按擩而遇切字見儀礼然作擩亦通始爲鳯翔府參軍尚少人吏迎􅀚望見咸曰眞房太尉家子孫也不敢弄以事或无顴字轉同州澄城丞益自飾理同官憚伏理或作治衛晏使嶺南黜陟求佐得公擢摘良姦南土大喜還進昭應主簿進或作遷裴胄領湖南􅀽公爲佐拜監察御史部無遺事胄遷江西又以節鎭江陵公一隨遷佐胄又或作胄非是佐胄或作爲佐累功進至刑部貟外郎賜五品服副胄使事爲上介上聞其名徵拜虞部貟外在省籍籍遷萬年令果辨憿絶辨或作辦憿吉歴切疾也貞元末王叔文用事材公之爲啓素附王叔文舉以爲容州經畧使拜御史中丞服佩視三品管有嶺外十三州之地州下或无之字林蠻洞蜒蜒當作蜑南方夷也蜑音誕守條死要不相漁刧稅節賦時公私有餘削衣貶食不立資遺以班親舊朋友爲義朋方作爲非是在容九年遷領桂州封清河郡公食邑三千户中人使授命書應待失禮客主違言徴貳太僕未至貶䖍州長史而坐使者樊曰啓除桂州州邸賂吏部主者私得官告飛驛以授啓旣而憲宗自遣中使持詔賜啓畏使者邀重賂即日先五日巳得詔使者給請視因持之歸以聞七月貶啓太僕少卿啓自陳獻使者南口十五帝怒殺中使者啓未至京師貶䖍州長史始詔五管福建黔中道不得以口饋遺罷臘口等使九月戊午中官李建章坐受啓賂杖一百処死癸未貶啓䖍州長史啓先賂建章口十五人旣怨其發官告事乃具上言帝旣殺建章并黜啓以疾卒官年五十九其子越能輯父事無失謹謹致孝旣葬碣墓請銘銘曰房氏二相厥家以聞條葉被澤况公其孫公􅀄爲吏亦以門庇佐使于南乃始以致旣辦萬年命屏容服功緒卓殊氓獠循業維不順隨失署亡資非公之怨銘以著之非公方作非君唐故銀青光禄大夫撿校左散􅀐常侍兼右金吾衛大將軍贈工部尚書太原郡公神道碑文或无尚書以上二十八字公諱用字師柔太原人莊憲皇太后之弟今天子之舅太師之子太尉之孫司徒之曽孫元和元年上朝太后南宫大襃外氏自外髙王父而下至外王父咸􅁽登公師事載之史髙王上或有祖字皇太后昆弟唯公一人於是特拜銀青光禄大夫太子少詹事特或作時未三月因遷大詹事賜勲上柱國爵封郡公國于太原益掌廐􅁐之事公起外戚子弟秩卑年少歳餘超居上班官尊職大朝夕兩宫而能敬讓以敏持以禮法不挾不矜賔接士大夫髙下中度上下或无大字興官􅂄事滋乆愈謹興或作与􅂄或作􅄝方云􅂄音指致也詩􅂄定尔功囯語􅂄其股肱以從司馬今按耆或疑即嗜字更詳之由是朝廷推賢所處號治轉少府監太子賔客别職仍􅀄仍或作如􅀄方從館杭本作祔今按仍即如也祔字无理明甚可以見閣杭本之謬矣遷左散騎常侍兼右金吾大將軍皆以選進不專爲恩專下或有於字十一年秋將以八月葬莊憲皇后前一月壬申以疾告薨春秋四十有七上罷朝二日爲位以􅂘贈工部尚書十一月壬申葬于萬年縣落女原落女或作楽安夫人河南胡氏號太原郡夫人有子六人女子一人葬得日公之姊壻京兆尹李翛或作脩方云考舊史當作脩謂太子右庶子韓愈曰子以文常銘賢公卿今不可以辭常或作章應曰諾而爲銘曰有蟜氏蟜音喬孫曰晋語云少典娶于有蟜氏生黄帝炎帝有蟜古之諸侯也國實出炎軒蜀塗莘摯祝曰史記黃帝之子昌意娶蜀山氏之女生高陽有聖德立爲帝是爲顓帝禹者黄帝之元孫顓帝之孫也娶塗山氏之女生啓書曰娶于塗山季歴娶太任盖挚囯任氏之中女詩曰挚仲氏任子昌立是爲西伯西伯曰文王娶莘囯之長女曰太奴詩曰命此文王于周于京纉女維幸孫曰列女傳湯妃有莘之女生仲壬外丙又云大任文王之母挚任氏之中女王季娶以爲妃正妃之門莘或作華非是孰豐其川不羡其源王氏周胄官封􅁇􅁇上継字方作相非是實生聖女以母唐帝公惟后季天子吾甥吉或作其非是卑躬愼德不與寵橫方年未老后哀猶新如何不惠而殞其身刻文兹石乆載攸存攸方作猶今按文理當作攸又上句巳有猶新字不􅀿重出也朱文公校昌􅀺先生集卷之二十七
