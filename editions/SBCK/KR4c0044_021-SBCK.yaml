front:
  text: 朱文公校昌􅀺先生集卷之二十一考異音釋附
  hash: sha256:0371428505bb774da396285dc1646a883b95158cab0621f8c1b098b8025ba9cf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_021-1a}
body:
  text: 序送區􅁽序方云洪謂區􅁽即區弘考其始末非也陽山天下之窮處也陸有丘陵之險虎豹之虞江流悍急横波之石廉利侔劒㦸舟上下失􅀔破碎淪溺者往往有之江上或有水有字廉或作其縣郭無居民官無丞尉夾江荒茅篁竹之間小吏十餘家皆鳥言夷面荒茅篁竹蜀本作荒榛茅竹篁諸本作叢方云漢書􅃊助傳谿谷之間篁竹之中顔日竹田曰篁始至言語不通畫地爲字然後可告以出租賦奉期約語方作􅀃不下有相字是以賔客游從之士無所爲而至士或作事愈待罪於斯且半歳矣有區音歐區治子之後後漢末有長沙區景生者誓言相好自南海挐舟而來升自賔階儀觀甚偉坐與之語文義卓然方無矣字􅀚或作冠莊周云逃空虚者聞人足音跫巨㳟切行声然而喜矣況如斯人者豈易得哉虚或作谷斯或作其方無斯字皆非是入吾室聞詩書仁義之􅀃欣然喜􅀂有志於其間也與之翳嘉林坐石磯投竿而漁陶然以樂􅀂能遺外聲利而不厭乎貧賤也欣然下或有以字於或作乎間或作聞楽上方無以字厭下方無乎字今按欣然喜陶然楽當為一例故諸本皆有以字而方本皆無然􅀼詳其文􅀔之緩急恐上句應無而下句應有也故定從此本歳之􅀄吉歸拜其親酒壷旣傾序以識别吉或作告方云毛氏詩傳云􅀄吉朔日也此盖通言歳首也拜或作覲送張道士序張道士嵩髙之隱者通古今學有文武長材􅀉迹老子法中爲道士以養其親髙方作南下同隱方作有道今按有道語似太重當且作􅀮九年聞朝廷將治東方貢賦之不如法者三獻書不報長揖而去方下或有諸侯字京師士大夫多爲詩以贈而屬愈爲序詩曰大匠無棄材㝷尺各有施況當營都邑杞梓用不疑張侯嵩山來面有熊豹姿開口論利害劒鋒白差差白或作自非是恨無一人捶爲國笞羌夷捶方作箠詣闕三上書臣非黄冠師臣有膽與氣不忍死茅茨又不媚􅀏語不能伴兒嬉乃著道士服衆人莫臣知臣有平賊䇿狂童不難治其言簡且要陛下幸聽之天空日月髙下照理不遺或是章奏繁裁擇未及斯方从閣杭作期非是寧當不竢報歸䄂風披披答我事不爾吾親屬吾思昨宵夢􅀝門手取連環持今日有書至又言歸何時霜天熟柿栗收拾不可遲嶺北梁可構寒魚下清伊或作漪今按伊水在嵩北􅀂前兩處作嵩南即此處不可作伊􅀂彼作嵩髙則此乃可作伊耳漪字雖可通用然本不从水只是語助辭如書断断猗大斈作􅀆莊子猶為人猗亦是此􅀋故􅀃文水部無之但因伐檀漣漪淪漪故俗遂加水用之而韓公亦有含風漪之句則此作漪亦未可知今上文旣作嵩髙則此且作伊亦無害􅀂有它證見得上文果當作南則此􅁍當改為漪矣旣非公家用且復還其私從容進退間無一不合疑時有利不利雖賢欲奚爲但當勵前操富貴非公誰送髙閑上人序苟可以寓其巧智使機應於心不挫於氣則神完而守固雖外物至不膠於心堯舜禹湯治天下養叔治射庖丁治牛師曠治音聲扁鵲治病僚之於丸孫日莊子市南冝僚弄丸而兩家之難觧秋之於弈伯倫之於酒樂之終身不厭奚暇外慕夫外慕徙業者皆不造其堂不嚌其胾嚌在誼切胾側吏切補注嚌嘗也胾大脔也礼左殽右胾者也徒或作從非是往時張旭善草書樊曰旭蘇州呉都人新史張顚傳􅄝酒毎大醉呌呼狂走乃下筆或以頭濡墨而書旣醒自以爲神不治他伎時或作者善方作喜非是喜怒窘窮憂悲愉佚怨恨思慕酣醉無聊不平有動於心必於草書焉發之喜怒文􅁐作喜焉草書怒焉草書不平監本作平生皆非是或无焉字􅀚於物見山水崖谷鳥獸蟲魚草木之花實日月列星風雨水火雷霆霹􅆮歌舞戰闘天地事物之變可喜可愕一寓於書故旭之書變動猶􅀑神不可端倪以此終其身而名後丗或无猶字非是今閑之於草書有旭之心哉不得其心而遂其跡未見其能旭也爲旭有道利害必明無遺錙銖情炎於中利欲闘進有得有䘮勃然不釋然後一決於書而後旭可幾也情方作精而下或无後字今閑師浮屠氏一死生解外膠諸本並作膠方从杭歐謝本作繆云繆莫侯切猶綢繆也莊子内韄者不可繆而捉義盖同此今按膠者黏著之物而其力之潰敗不黏爲觧今以下文頽墮潰敗之語反之當定作膠是其爲心必泊然無所起其於丗必淡然無所嗜泊與淡相遭頽墮委靡潰敗不可収拾則其於書得無􅁚之然乎二所下方从杭本皆有於字非是敗方作散然吾聞浮屠人善幻多技能善方从閣作喜今按善幻􅀃巳見第四卷酬崔少府詩閑如通其術則吾不能知矣閑下或有師字方云此篇用意皆本於莊子所称宋元君昼圗有一史後至解衣槃礴羸郭注云内足者神間而意定又云王彦法謂退之此数語乃深得祖師向上体歇一路其見處勝裴休逺甚今按韓公本意但謂人必有不平之心欎積之乆而後發之則其氣勇决而伎必精今髙閑旣无是心則其爲伎冝其潰敗委靡而不能竒但恐其善幻多伎則不可知耳此自韓公所見非如畫史祖師之􅀃也送殷貟外序唐受天命爲天子凡四方萬國不問海内外無小大咸臣順於朝方从閣抗无萬字今按如此則与下文不相應文杭本無於字皆非是時節貢水土百物大者特來小者附集元和睿聖文武皇帝旣嗣位悉治方内就法度十二年詔曰四方萬國惟囬鶻於唐最親奉職􅀹謹丞相其選宗室四品一人持節往賜君長告之朕意又選學有經法通知時事者一人與之爲貳法或作術由是殷侯侑自太常博士遷尚書虞部貟外郎兼侍御史朱衣象笏承命以行杭本無命字非是朝之大夫莫不出餞酒半右庶子韓愈執盞言曰殷大夫今人適數百里出門惘惘有離别可憐之色持􅀍入直三省丁寧顧婢子語刺刺不能休今子使萬里外國獨無幾微出於言面豈不眞知輕重大丈夫哉殷大夫或作殷侯持或作襆入直三省方云洪􅂟善謂唐无三省持􅀍入直當爲句絕三息暫反省息井切朱新仲云唐以侍中兩令爲三省長官張籍􅀉白舎人詩三省比年名望重􅀃者以唐无三省非也􅀂不言三省不知入直何所以上下文考之朱􅀃爲長刺刺方云洪􅂟善云刺音慮逹切樊云刺七迹切􅀂如供讀則當以戾爲義顧婢子語何戾耶潘岳閣道謡和嶠刺促不得休語意皆同此當以七迹切爲正丞相以子應詔眞誠知人士不通經果不足用於是相屬爲詩以道其行云人下或有矣字送楊少尹序昔䟽廣受二子以年老一朝辭位而去䟲或作踈方云漢書作䟽今按䟽正字踈俗躰也于時公卿設供張祖道都門外車數百兩道路􅀚者多歎息泣下共言其賢張或作帳方云謂供具張設也音竹亮切公送石弘序張上東門只用張字况二䟽本傳自可考漢書如髙祖留沛張飲黥布傳張御食飲皆謂張設也漢史旣傳其事而後丗工畫者又圗其迹至今照人耳目赫赫􅀂前日事國子司業楊君巨源方以能詩訓後進一旦以年滿七十亦白丞相去歸其郷或无一旦二字丗常􅀃古今人不相及今楊與二䟽其意豈異也及方从閣杭本作方及上或别有方字其意豈異也或作豈其異意邪皆非是予沗在公卿後遇病不能出不知楊侯去時城門外送者幾人車幾兩馬幾疋或无幾人字疋或作駟道邊􅀚者亦有歎息知其爲賢以否以与通用之例前巳屡見此爲最明白者而太史氏又能張大其事爲傳􅁇二䟽蹤跡否不落莫否方从閣本无蹤跡否三字非是或但无否字亦非見今丗無工畫者而畫與不畫固不論也然吾聞楊侯之去丞相有愛而惜之者白以爲其都少尹不絶其禄惜下方从閣杭本无之字白或作署或无白字又爲歌詩以勸之京師之長於詩者亦屬而和之又不知當時二䟽之去有是事否古今人同不同未可知也不下或无同字中丗士大夫以官爲家罷則無所於歸或无於字非是楊侯始冠舉於其郷歌鹿鳴而來也郷或作家今之歸指其樹曰某樹吾先人之所種也某水某丘吾童子時所釣遊也郷人莫不加敬誡子孫以楊侯不去其郷爲法古之所謂郷先生没而可􅀕於社者其在斯人歟其在斯人歟二語方从閣杭本皆無在字送權秀才序伯樂之廐多良馬卞和之匱多美玉卓犖瓌怪之士宜乎遊汴之塩鉄日爲酒殺羊享賔客府或作父李生則尚與其弟學讀書習文辭以舉進士爲業愈於太􅀓府年最少故得交李生父子間公薨軍亂軍司馬從事皆死侍御亦􅀍讒爲民日南日或作山方云仁鈞以讒流爱州其後五年愈又貶陽山令今愈以都官􅀰守東都省侍御自衡州刺史爲親王長史亦留此掌其府事官下或有貟外字王下或有府字亦留此方無以此二字􅇔作收皆非是此謂東都盖李亦分司也李生自湖南從事請告來覲於時太傳府之士惟愈與河南司録周君獨存其外則李氏父子相與爲四人君下或有巢字外下方無則字子下方无相字離十三年幸而集處得燕而舉一觴相屬此天也非人力也侍御與周君於今爲先輩成德李生温然爲君子有詩八百篇傳詠於時成或作盛李上或有􅀂字惟愈也業不益進行不加修顧惟未死耳往拜侍御謁周君抵李生退未甞不發媿也方无退字往時侍御有無盡費於朋友及今則又不忍其三族之寒飢聚而舘之䟽逺畢至寒飢或作飢寒至方從文􅁐作在今按在乃至字之誤書史之互用者如此方本則當作至而治道不至多言不至斈古兵法之類以官書所引考之􅁍當作在也禄不足以養李生雖欲不從事於外其􅀔不可得巳也飬下或有為字巳或作止重李生之還者皆爲詩愈最故故又爲序云或作序之或作之序送石處士序孫曰洪字濬川洛陽人罷黄州録事参軍退居于洛陽十年不仕及是爲河陽参謀或有赴洛陽参謀字謀或作謨或有詩字河陽軍節度御史大夫烏公爲節度之三月求士於從事之賢者有薦石先生者公曰先生何如曰先生居嵩邙􅗉榖之間冬一裘夏一􅁑食朝夕飯一盂􅂼一盤或无食字人與之錢則辭請與岀游未嘗以事辭􅂆之仕不應事辝或作亊免不上或有則字坐一室左右圖書與之語道理辨古今事當否論人髙下事後當成敗􅀂河决下流而東注􅀂駟馬駕輕車就熟路而王良造父爲之先後也􅀂燭照數計而􅀛卜也東上方无而字或并无下流而東注五字热或作夷􅁲或作兆大夫曰先生有以自老無求於人其肯爲某來邪從事曰大夫文武忠孝求士爲國不私於家方作爲家方今㓂聚於􅁪師環其疆農不耕収財粟殫亡吾所處地歸輸之塗治法征謀宜有所出収蜀本作牧帰方从閣杭本作師今按當从諸本作帰而讀作匱謂漕運也所出方从閣杭本作生出先生仁且勇􅀂以義請而疆委重焉其何􅀃之辭於是譔書詞具馬幣卜日以授使者求先生之廬而請焉先生不告於妻子不謀於朋友冠帶出見客拜受書禮於門内朋友方从閣杭本作其朋宵則沐浴戒行事載書􅁽問道所由或无則字事或作李告行於常所來往晨則畢至張上東門外張下或有筵於二字或只有别字酒三行且起有執爵而言者曰大夫眞能以義取人先生眞能以道自任決去就爲先生别又酌而祝曰凡去就岀處何常惟義之歸遂以爲先生壽貞閣作其非是方从閣杭本无為先生别以下十二字今按此閤杭本由有二去就字而脫其中字遂使下句全无文理方从之誤矣又酌而祝曰使大夫􅁪無變其􅀄無務富其家而飢其師無甘受佞人而外敬正士無味於謟言惟先生是聽以能有成功保天子之寵命或无敬字謟或作諍皆非是方无是字又祝曰使先生無圖利於大夫而私便其身圗方从閤本作固先生起拜祝辭曰敢不敬蚤夜以求從祝規不下或有祇字於是東都之人士咸知大夫與先生果能相與以有成也遂各爲歌詩六韻退愈爲之序云退或作遣蜀本云送詩元本具於此今附第四卷末送温處士赴河陽軍序伯樂一過冀北之野而馬羣遂空夫冀北馬多天下伯樂雖善知馬安能空其羣邪多下或有於字能下或有遂字解之者曰吾所謂空非無馬也無良馬也伯樂知馬遇其良輒取之羣無留良焉苟無良雖謂無馬不爲虚語矣苟无下或有􅇔其二字雖下方从閤杭本無謂字東都固士大夫之冀北也恃才能深藏而不市者洛之北涯曰石生其南涯曰温生恃或作懷市或作賈大夫烏公以鈇􅃏鎭河陽之三月以石生爲才以禮爲羅羅而致之幕下未數月也以温生爲才於是以石生爲媒以禮爲羅又羅而致之幕下東都雖信多才士朝取一人焉拔其􅀹暮取一人焉拔其􅀹自居守河南尹以及百司之執事與吾輩二縣之大夫政有所不通事有所可疑奚所諮而處焉諮或作􅢻處或作取士大夫之去位而巷處者誰與嬉遊小子後生於何考德而問業焉搢紳之東西行過是都者無所禮於其廬􅀂是而稱曰大夫烏公一鎭河陽而東都處士之廬無人焉豈不可也夫南面而聽天下其所託重而恃力者惟相與將耳相爲天子得人於朝廷將爲天子得文武士於幕下方无朝字求内外無治不可得也方从閤杭蜀本无内外二字或作内外求无理皆非是愈縻於兹不能自引去資二生以待老今皆爲有力者奪之其何能無介然於懷邪或无自字方从閤杭本无之字生旣至拜公於軍門其爲吾以前所稱爲天下賀以後所稱爲吾致私怨於盡取也方从杭蜀本无至字其或作其留守相公首爲四韻詩歌其事愈因推其意而序之或作焉送鄭尚書序鄭􅁠字復常嶺之南其州七十其二十二隸嶺南節度府其四十餘分四府府各置帥然獨嶺南節度爲大府大府始至方从閤杭本无下大府字四府必使其佐啓問起居謝守地不得即賀以爲禮歳時必遣賀問致水土物大府帥或道過其府府帥必戎服左握刀右屬弓矢帕莫白切詳見元和聖德詩考異注首袴鞾許茹切迎郊郊上或有于字及旣至大府帥先入據舘或无先字帥守屏􅀂將趨入拜庭之爲者大府與之爲讓至一再乃敢改服以賔主見適位執爵皆興拜不許乃止一下或更有至字䖍􅀂小侯之事大國有大事諮而後行諮或作咨隸府之州離府逺者至三千里懸隔山海使必數月而後能至蠻夷悍輕易怨以變其南州皆岸大海多洲島颿音凡風一日踔􅃙角切又􅃙教切踸踔疾行皃也數千里漫瀾不見蹤迹颿或作飄控御失所依險阻結黨仇機毒矢以待將吏撞搪上徒工切下音唐搪揬也呼號以相和應蜂屯蟻雜不可爬梳好則人怒則獸黨仇或作仇黨或无將字􅐡梳或作把䟽故常薄其征入簡節而踈目時有所遺漏不究切之長養以兒子至紛不可治乃草薙音替又音雉而禽獮息淺切殺也秋田曰獮之盡根株痛㫁乃止其海外雜國􅀂躭浮羅流求毛人夷亶之州林邑扶南眞臘于陀利之屬躭音耽孫曰山海經海外有毛民之囯郭璞云呉孫􅁠黄龍二年使人浮海來夷州亶州在海中所在絕逺卒不可至但得夷州数千人還孫曰林邑一日環玉在交州南海行三千里眞臘一日吉蔑在林邑西此去京師二万七百里東南際天地以萬數州或作洲或時候風潮朝貢蠻胡賈人舶音白交海中胡或作夷􅀂嶺南帥得其人則一邊盡治不相宼盗賊殺無風魚之災水旱癘毒之患外國之貨日至珠香象犀玳瑁竒物溢於中國不可勝用故選帥常重於他鎭非有文武威風知大體可畏信者則不幸往往有事長慶三年四月以工部尚書鄭公爲刑部尚書兼御史大夫往踐其任鄭公嘗以節鎭襄陽入帥滄景德棣歴河南尹華州刺史皆有功德可稱道甞或作常入朝爲金吾將軍散􅀐常侍工部侍郎尚書家屬百人無數畒之宅僦屋以居可謂貴而能貧爲仁者不富之效也貴而能貧方云此左氏語􅁠本傳云用度豪侈復与此異何邪今按通監􅁠家多姫妾禄薄不能贍因李訓干王守澄求節鎭得廣州此語盖譏之也及是命朝廷莫不恱將行公卿大夫士苟能詩者咸相率爲詩以美朝政以慰公南行之思韻必以來字者所以祝公成政而來歸疾也祝上或无以字或祝下有使字送水陸運使韓侍御歸所治序方云考食貨志憲宗用李絳議以韓重華爲振武京西營田和糴水陸運使振武乃單于大都䕶府故地後改名振武重華後名約預甘露之禍洪謂唐志無所考非也今按漢書王遵傳有治所字此所治字當也六年冬振武軍吏走驛馬詣闕告饑公卿廷議以轉運使不得其人宜選才幹之士往換之方无轉字吾族子重華適當其任至則岀贓罪吏九百餘人脫其桎梏給耒耜與牛使耕其傍便近地以償所􅀒釋其粟之在吏者四十萬斛不徴吏得去罪死假種糧齒平人有以自效莫不涕泣感奮相率盡力以奉其令而又爲之奔走經營相原隰之宜指授方法爲下方无之字故連二歳大熟吏得盡償其所亡失四十萬斛者而私其􅑿餘得以蘇息軍不復饑私其下方有有字其或作有今按此皆非是或果有有字則當在其字上君曰此未足爲天子言請益募人爲十五屯屯置百三十人而種百頃令各就髙爲堡東起振武轉而西過雲州界極於中受降城出入河山之際或作險六百餘里屯堡相望㓂來不能爲暴人得肆耕其中少可以罷漕輓之費朝廷從其議秋果倍収歳省度支錢千三百萬八年詔拜殿中侍御史錫服朱銀或作朱金方云銀緋唐五品服其冬來朝奏曰得益開田四千頃則盡可以給塞下五城矣田五千頃法當用人七千臣令吏於無事時督習弓矢爲戰守備因可以制虜庶幾所謂兵農兼事務一而兩得者也或无幾字務一或作一務兩得或作得兩大臣方持其議吾以爲邊軍皆不知耕作開口望哺有司常僦人以車船自他郡往輸乗沙逆河逺者數千里人畜死蹄踵交道費不可勝計中國坐耗而邊吏􅁪苦食不繼坐耗或作坐見耗虚或作坐耗虚方从閤杭本定今君所請田皆故秦漢時郡縣地其課績又巳驗白􅀂從其言其利未可遽以一二數也今天子方舉羣䇿以収太平之功寧使士有不盡用之歎懷竒見而不得施設也君又何憂而中臺士大夫亦同言侍御韓君前領三縣紀綱三州奏課常爲天下第一行其計於邊其功烈又赫赫如此使盡用其䇿西北邊故所没地可指期而有也聞其歸皆相勉爲詩以推大之而屬余爲序送鄭十校理序涵宰相餘􅂟之子祕書御府也天子猶以爲外且逺不得朝夕視始更聚書集賢殿别置校讎官曰學士曰校理士下方无曰字常以寵丞相爲大學士其他學士皆逹官也校理則用天下之名能文學者苟在選不計其秩次惟所用之名下或有上字又或有而字由是集賢之書盛積盡秘書所有不能處其半書日益多官日益重四年鄭生􅆂始以長安尉選爲校理人皆曰是宰相子能㳟儉守教訓好古義施於文辭者如是而在選公卿大夫家之子弟其勸耳矣家下方有選字非是愈爲慱士也始事相公於􅀕酒分教東都生也事相公於東太學今爲郎於都官也又事相公於居守居上或之於字三爲屬吏經時五年觀道德於前後聽教誨於左右可謂親薫而炙之矣方无後字其髙大逺宻者不敢隱度論也其勤巳而務博施以已之有欲人之能不知古君子何如耳方无耳字或作爾今生始進仕􅀗重語於天下而慊慊􅀂不足眞能守其家法矣其在門者可進賀也門下或有下字求告來寕朝夕侍側東都士大夫不得見其面於其行日分司吏與留守之從事竊載酒肴席定鼎門外盛賔客以餞之司下或有郎字旣醉各爲詩五韻且屬愈爲序詩洛字詩下或有曰字注洛上或有得字相公倦合鼎分正新邑洛正或作政才子冨文華校讎天禄閣孫曰天禄獸名漢時有貢此獸者因以名閣以藏秘書壽觴嘉節過歸􅀐春衫薄衫方作和鳥哢音弄郭璞云鳥吟正交加楊花共紛泊親交誰不羡去去翔寥廓親交或作交親韋侍講盛山十二詩序孫曰韋侍講處厚字德載自考功郎中貶開州刺史盛山郡名講或作御或作盛山唱和詩序韋侯昔以考功副郎守盛山人謂韋侯美士考功顯曹盛山僻郡奪所宜處納之惡地以枉其材韋侯將怨且不釋矣或曰不然夫得利則躍躍以喜不利則戚戚以泣􅀂不可生者豈韋侯謂哉躍躍方从閣杭本无下躍字以下句偶之非是不利不下或有得字謂哉上或有之字韋侯讀六藝之文以探周公孔子之意又妙能爲辭章可謂儒者藝下方无之字探杭作深子下方无之字皆非是夫儒者之於患難苟非其自取之其拒而不受於懷也􅀂築河堤以障屋霤其容而消之也􅀂水之於海冰之於夏日其翫而忘之以文辭也􅀂奏金石以破蟋蟀之鳴蟲飛之聲况一不快於考功盛山一出入息之間哉未幾果有以韋侯所爲十二詩遺余者其意方且以入谿谷上巖石追逐雲月不足日爲事讀而歌詠之令人欲棄百事往而與之游不知其出於巴東以屬朐䏰也或无方字歌詠或作詠歌朐䏰方云􅀃文䖝名漢中有朐䏰縣地下多此䖝因以爲名朐從肉句声考其義當作􅃳蠢唐韻音蠢潤刘禹錫音屈忍漢書朐音劬通典曰開州漢之朐䏰地也樊曰前漢志作朐䏰巴東郡縣名也洪曰地理志開州盛山郡義寕二年置天宝元年更名朐䏰故城在今䕫州雲安縣西于時應而和者凡十人方云樊謂考下文只六人一日和者十人而時集闕下者六人耳及此年韋侯爲中書舎人侍講六經禁中諸本作及此年閣本作明年方从杭本作時年云謂此時之年也韋以元和十一年刺盛山韓以長􅂟一年作序閣本作明年由時字訛也今按作明年則非實作時年則不詞當從諸本作及此年則无可疑矣諸本禁中下有名處厚字和者通州元司馬爲宰相洋州許使君爲京兆忠州白使君爲中書舎人李使君爲諌議大夫黔府嚴中丞爲祕書監温司馬爲起居舎人皆集闕下和者下六人諸本亦各書其名云元司馬名稹許使君名康佐白使君居易李使君景儉􅃊中丞武温司馬造方以閣杭本并上文名処厚共刪十四字云蜀本側書稹康佐居易景儉造五名獨􅃊不書其名今考􅃊謂􅃊謨時爲祕書監楽天集有制詞可考諸本改作􅃊武蜀本又作少監皆非也李景儉自楚州召還温造自朗州召還今皆不著其郡亦􅏱文也於是盛山十二詩與其和者大行於時聮爲大卷家有之焉山下方有之字慕而爲者將日益多則分爲别卷韋侯俾余題其首石鼎聮句詩序閣本无此篇方云洪􅂟善曰張文潜本校與諸本特異盖原於蔡文忠也然増損太多不知得於何本今姑以杭蜀本爲正今按張本多可取當附見以備参考元和七年十二月四日衡山道士軒轅彌明自衡下來下或作山舊與劉師服進士衡湘中相識將過太白知師服在京夜抵其居􅀫知下師服張本作劉或无夜字有校書郎侯喜新有能詩聲夜與劉􅀃詩彌明在其側貌極醜白􅂡黒面長頸而髙結喉中又作楚語方云蔡張本皆作長頸而結喉无髙与中字唐子西日結古䯻字也髙結當句斷漢陸賈傳尉佗魁結顔曰讀爲椎䯻云一撮之䯻其形如椎髙結語原此今按古語自有城中好髙結不必引椎結也但道士之首加冠不作椎結讀結爲䯻而以喉属下句者虽有据而非是盖長頸故見其結喉之髙而此髙結喉中又作楚語也不然則當從蔡張本刪髙中二字喜視之􅀂無人彌明忽軒衣張眉指鑪中石鼎謂喜曰子云能詩能與我賦此乎云方作之又无能詩二字非是劉往見衡湘間人􅀃云年九十餘矣方本年上有其字无矣字解捕逐􅀑物拘囚蛟螭虎豹不知其實能否也方无觧字觧張作能拘囚張作罔兩不上方有然字而无其字或无否字見其老頗貌敬之不知其有文也聞此􅀃大喜即援筆題其首兩句次傳於喜喜踊躍即綴其下云云張无􅀃字即方作旣於下兩喜字張本並作侯方无下字道士啞烏格切􅀏声然􅀏曰子詩如是而巳乎即䄂手竦肩􅀝北牆坐謂劉曰吾不解丗俗書子爲我書䄂方从杭蜀本作抽倚或坐旁或无坐字觧或作能後同子為上方有弟字我書下有吾句字因髙吟曰龍頭縮菌蠢上求宛切退縮皃張衡曰芝房菌蠢生其隈豕腹漲彭亨􅀄不似經意詩㫖有似譏喜不似張本作似非疑當乙作似不二子相顧慙駭欲以多窮之即又爲而傳之喜喜思益苦務欲壓道士毎營度欲出口吻聲鳴益悲操筆欲書將下復止竟亦不能竒也二子張作一人喜下方无思字度下或无欲字欲書張作而書畢即傳道士道士髙踞大唱曰劉把筆吾詩云云或无詩字張本作刘進士把筆則又髙吟云云其不用意而功益竒此从張本下四字方作益切竒出非是或疑其當作􅀂不可附􅀃語皆侵劉侯喜益忌之劉與侯皆巳賦十餘韻彌明應之如響皆頴脫含譏諷夜盡三更二子思竭不能續因起謝曰尊師非丗人也某伏矣願爲弟子不敢更論詩侵刘下方无侯字夜盡三更諸本在不能續之下下更有一子二字此从張本方从杭蜀本文粹无益忌至譏諷二十四字及思竭不能續五字但有喜字属上句又盡作益二子二字下便連因起謝張本又以尽為盖而一本併无盡益盖三字今按方本簡􅃊諸本重復然簡􅃊者似於亊理有所未盡而重􅃨者乃得見其曲折之詳但今恐有漏落故且从諸本及張本而方本固在其中但方本語侵刘喜刘旣書姓喜不當独書名恐刘下本有侯字而下文别有喜字之誤也諸本喜益忌之之下復云刘与侯皆巳賦十餘韻語亦太冗張本夜盡三更四字属於含譏諷之下固善然似不􅀂移於喜益忌之之下此皆未敢自以為然讀者詳之非丗人也或无丗字或作非丗人能出也張本某下有等字伏或作服道士奮曰不然章不可以不成也奮下或有髯字或有目字或有然字今按恐或有髯字又謂劉曰把筆來吾與汝就之或无來字方无吾与汝就之五字即又唱出四十字爲八句書訖使讀讀畢謂二子曰章不巳就乎二子齊應曰就矣張无即字出或作書非是訖使方作止即下讀字張本作之属上句方无不字道士曰此皆不足與語此寧爲文邪吾就子所能而作耳非吾之所學於師而能者也吾所能者子皆不足以聞也獨文乎哉吾語亦不當聞也吾閉口矣此皆或作子皆就下方无子字作下或有之字耳方作矣吾所能或作吾所聞語下張本有子字二子大懼皆起立牀下拜曰不敢他有問也願聞一言而巳張无皆字先生稱吾不解人閒書敢問解何書請聞此而巳道士寂然􅀂無聞也方无敢問解何書五字請聞下十三字張本但存寂然二字无十一字累問不應二子不自得即退就座道士􅀝牆睡鼻息如雷鳴二子怛當割切悲惨也然失色不敢喘斯須曙鼓􅕣􅕣音彤皷声二子亦困遂坐睡喘上張本有少字方无遂坐睡三字及覺日巳上驚顧覔道士不見上張本作出方无驚字即問童奴奴曰天且明道士起出門􅀂將便旋然奴怪乆不返即出到門覔無有也童張本作僮奴曰上張有僮字張无到門字覔下有之字二子驚惋烏貫切驚歎也自責􅀂有失者間遂詣余言余不能識其何道士也嘗聞有􅀮君子彌明豈其人耶韓愈序石鼎聮句詩或无此題巧匠斵山骨刳中事煎烹師服直柄未當權塞口且吞聲喜龍頭縮菌蠢豕腹漲彭亨弥明外苞乾蘚文中有暗浪驚師服在冷足自安方从杭蜀文粹作安自足旣无文理對偶又差方本誤改多􅀋此遭焚意彌貞喜謬當鼎鼐間妄使水火爭弥明大似烈士膽圎如戰馬纓師服上比香爐尖下與鏡面平喜秋􅀲未落蔕凍芋強抽萌弥明一塊元氣閉細泉幽竇傾師服不值輸寫處焉知懷抱清喜方當洪鑪然益見小器盈弥明睆睆華綰切潮本作皖莊子睆睆然有􅅶之中一作宛宛無刃迹團團􅀋天成師服遥疑􅀛􅀒圗岀曝曉正晴喜旁有􅀟耳穿􅀟或作􅃗上爲􅀌䯻撑諸本此下无弥明字今按此似二子譏道士之詞恐实非弥明語或訝短尾銚徒弔切又似無足鐺􅀄耕切燒器師服可惜寒食毬擲此傍路坑喜何當出􅁅灺徐也切燭烬也無計離缾罌弥明陋質荷斟酌狹中愧提擎師服豈能煑仙藥但未汙羊羮喜形模婦女􅀏度量兒童輕弥明徒示堅重性示方作爾不過升合盛師服過方作合合或作斗盛或作成傍似廢轂仰傍方作仍側見折軸横喜時於蚯蚓竅微作蒼蠅鳴弥明以兹翻溢愆以兹或作忽罹實􅀒任使誠師服常居顧眄地敢有漏洩情喜寧依暖􅀬弊不與寒凉并弥明區區徒自效􅃈􅃈不足呈喜諸本此下无喜字迥旋但兀兀開闔惟鏗鏗師服全勝瑚璉貴空有口傳名豈比爼豆古不爲手所撜方云撜徒庚切博雅曰揬也淮南子子路撜溺而受牛謝注撜㪯也平上声通洪本一作掁磨礱去圭角浸􅃳著光精願君莫嘲誚此物方施行四韻並弥明所作又年譜云或謂軒轅寓公姓弥明寓公名盖以文滑稽耳是不然刘侯雖皆公門人然不應譏誚如是之甚且言弥明形貌声音之陋亦豈公自詞耶而列仙傳又有弥明傳要必有是人矣今按此詩句法全􅀋韓公而或者所謂寓公姓名者盖軒轅反切近韓字弥字之義又與愈字相􅀋即張籍所譏与人爲无实駮雜之􅀃者也故竊意或者之言近是洪氏所疑容皃声音之陋乃故爲幻語以資􅀏謔又以乱其事实使讀者不之斍耳
