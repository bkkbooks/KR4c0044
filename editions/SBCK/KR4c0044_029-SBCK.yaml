front:
  text: 朱文公校昌􅀺先生集卷之二十九考異音釋附
  hash: sha256:9517f2e159c7bd859250fb17e89fcff60f110b4fb461198d8a629d0b0e1039da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_029-1a}
body:
  text: 碑誌唐故朝散大夫商州刺史除名徙封州董府君墓誌公諱溪字惟深丞相贈太師隴西㳟惠公第二子十九歳明兩經獲第有司沈厚精敏未嘗有子弟之過賔接門下推舉人士侍側無虚口退而見其人淡􅀂與之無情者太師賢而愛之父子閒自爲知巳諸子雖賢莫敢望之太師累踐大官大或作从非是臻宰相致平治終始以禮號稱名臣晨昏之助蓋有頼云太師之平汴州師下或无之字年考益高挈持維綱鋤削荒纇音耒祝曰􅁝節淮南子明月之珠不能無纇纇或作頑納之大和而巳其囊篋細碎無所遺漏繄公之功上介尚書左僕射陸公長源齒差太師標望絶人聞其所爲毎稱舉以戒其子楊凝孟叔度以材德顯名朝廷或作於朝及來佐幕府佐或作往詣門請交屏所挾爲或作屏弃所挾太師薨始以祕書郎選參軍京兆府法曹選或作迁日伏階下與大尹爭是非大尹屢黜巳見大或並作太歳中奏爲司録參軍與一府政以能拜尚書度支貟外郎遷倉部郎中萬年令兵誅􅁪州改度支郎中攝御史中丞爲糧料使兵罷遷商州刺史糧料吏有忿爭相牽告者事及於公因徴下御史獄因方作􅂋云漢韓安囯傳由此􅂋結於漢當用此義今按此召對私耳与方所引者不􅀋當只作因公不與吏辨一皆引伏受垢除名徙封州元和六年五月十二日死湘中年四十九州下方本无年月日但於湘中下云年􅀂干仐以􅄯本定按唐書元和七年立遂王爲太子亦与下文相應明年立皇太子有赦令許歸葬其子居中始奉䘮歸元和八年十一月甲寅葬于河南河南縣萬安山下太師墓左夫人鄭氏祔公凡再娶皆鄭氏女生六子四男二女長曰全正惠而早死次曰居中好學善爲詩張籍稱之次曰從直曰居敬尚小直下或有次字長女嫁呉郡陸暢其季女後夫人之子公之母弟全素孝慈友弟公坐事棄同官令歸公殁比葬三年哭泣如始䘮者大臣髙其行白爲太子舎人􅀅葬舎人與其季弟澥户買切問銘於太史氏韓愈􅀅葬下方有中字今以上文考之无者爲是然丗系表全素太子中書舎人通典中舎一云中書舎人又安知全素不自舎人迁中舎邪今按中字有則前後皆當有无則皆當无不應前无而後有也審如方􅀃此志亦必是未迁時作况它本自有无中字者今姑从之不必曲爲之説也愈則爲之銘辭曰物以乆弊或以轢音歴車所踐也毀考致要歸孰有彼此由我者吾不我者天斯而以然其誰使然貞曜先生墓誌先生孟郊湖州武康人也唐元和九年歳在甲午八月巳亥巳或作乙方云考唐曆是月无乙亥也貞曜先生孟氏卒無子其配鄭氏以告愈走位哭且召張籍㑹哭走或作赴位或作泣明日使以錢如東都供葬事諸嘗與往來者咸來哭弔嘗或作常韓氏遂以書告興元尹故相餘􅂟閠月樊宗師使水陸運從事試恊律郎親拜其母於門内陸下或有轉字門下方无内字母卒五年而鄭公以節領興元軍奏爲其軍參謀試大理評事挈其妻行之興元次于閿郷或无之興元字暴疾卒年六十四買棺以歛以二人輿歸鄷郢皆在江南十月庚申樊子合凡贈賻而葬之洛陽東其先人墓左以餘財附其家而供圯或无而共祀字有以俟字或无供祀字有俟字將葬張籍曰先生掲德振華於古有光賢者故事有易名况士哉或无古有光字杭本无賢者下十字如曰貞曜先生則姓名字行有載不待講􅀃而明皆曰然遂用之待或作從非是􅀄先生所與俱學同姓簡於丗次爲叔父由給事中􅀚察浙東曰生吾不能㪯死吾知恤其家銘曰於戯貞曜維執不猗方无戯字执或作持或无維执不猗一句或此句在維出不訾之下維出不訾訾凡数義集韻云思也思不􅁛意也惟前漢書訾讀与皆同顔師古注多財也􅀂日不貲削貧也猗亦二義詩那云􅀝欤歎辝也莭南山云有实其猗鄭氏注􅀝也􅀂日不猗則无所􅀝也東野中立不􅀝而以貧出仕卒至於无所施爲止用昌其詩名意如是而巳維卒不施以昌其詩蘇子瞻嘗㪯此以問王定囯當昌其身耶昌其詩也來詩下語不契作詩答之有云昌身如飽腹飽尽還復飢昌詩如膏面爲人作容姿不如昌其氣欎鬰老不衰虽云老不衰却懷安所之不如昌其志志一氣自隨餋之塞天地孟朝不吾欺公謂東野昌其詩而東坡乃云不如昌其志盖蘇嘗讀東野詩有未足當韓豪之句不爲所取也唐故祕書少監贈絳州刺史獨􅀌府君墓誌銘君諱郁字古風河南人常州刺史贈禮部侍郎憲公諱及之第二子憲公躬孝踐行篤實而辨於文􅂆飭指誨以進後生名声垂延紹德惟克君生之年憲公殁丗與其兄㓪畜於伯父氏始微有知則好斈問咨禀教飭不煩提諭月開日益卓然早成年二十四登進士第時故相太常􅁠公掌出詔文望臨一時望或作迎登君于門歸以其子帰或作妻選授奉禮郎楊於陵爲華州署君鎮囯軍判官奏授恊律郎方从􅄯本无奉礼至奏授十八字朋遊益附華問弥大元和元年對詔策拜右拾遺二年兼職史館四年䙴右􅀘闕詔中貴人承璀將兵誅王承宗河北君奏䟽諌召見問狀有言動聽其後上將有所相不可於衆君與起居舎人李約交章指摘事以不行五年遷起居郎爲翰林斈士愈􅀍親信有所􅀘助􅁠公旣相君以嫌自列改尚書考功貟外郎復史館職七年以考功知制誥入謝因賜五品服八年遷駕部郎中職如􅀄􅁠公去相復入翰林九年以疾罷尋迁祕書少監即閑于郊閑下或有居字十年正月病遂殆甲午輿歸卒於其家贈絳州刺史􅄯本有上五字本或繫於年四十下方並无年四十男子二人長曰某早死次曰天官始十歳有至性聞呼父官與聞弔客至輒號泣以絶女子一人夫人天水􅁠氏贈太子太保貞孝公臯之承孫故相今太常德輿之女承孫字未詳㣧􅂟配良是似是冝是似方作是以今按是似是宜承上句言胤􅂟而似配良而宜也方似作以非是四月已酉其兄右拾遺㓪以䘮東葬河南壽安之甘泉郷家塋憲公墓側將以五月壬申窆家或作􅃁謂愈曰子知吾弟乆敢屬以銘知或作与乆或作友銘曰於古風襮布谷切又音愽又黼領也衣表也詩繡衣朱儤謂衣領之在外者順而裏方於下或有平字仐按上篇四言不應首句爲三字此乃雜言或有此三字句也不耀其章其剛不傷戴美丗令而年再不贏惟後之成戴或作載令或作命仐按此言載前人之羙而丗其令德也唐故虞部貟外郎張府君墓誌銘尚書虞部貟外郎安定張君諱季友字孝􅁠年五十四病卒東都明年兄子塗與其弟􅁃掞等謢柩歸葬長安縣馬額原夫人北海唐氏之封明下或无年字或作月􅁃掞或作庚揆前事塗進韓氏門伏􅂘庭下曰叔父且死幾於不能言矣或无曰字張目而言曰吾不可無告韓君别藏而不得韓君記猶不葬也張目方从杭本无目字云後漢􅃊光傳良乆張目熟眎然此恐當从杭本爲正仐按方知古有張目字而必以杭本爲正殊不可曉今从諸本我皇甫媪何疾衘未决皇甫母病果死得解遷留司虞部貟外郎孝􅁠爲人孝謹與人語恐傷之而時嶷嶷有立與孝􅁠游者極衆而獨以其死累余可尚也巳是爲銘此下或注銘亡二字或注疑闕銘詞字唐故檢校尚書左僕射右龍武軍統軍劉公墓誌銘一本撿佼上有金紫光禄大夫字僕射下有兼御史大夫字統軍下有知軍亊上柱囯彭城郡開国公食邑二千户贈潞州大都督字公諱昌裔字光後本彭城人曾大父諱承􅂟朔州刺史大父巨敖好讀老子莊周書爲太原晋陽令再丗宦北方宦或作官樂其土俗遂著籍太原之陽曲曰自我爲此邑人可也何必彭城父訟贈右散􅀐常侍訟或作誦仐按名訟无理疑避諱而改公少好斈問始爲児時重遟音稺不戯􅁪􅀂有所思念計畫及壯自試以開吐蕃􅀃干邊將不售入三蜀從道士游乆之蜀人苦楊琳㓂掠公單船往􅀃琳感欷雖不即降約其徒不得爲虐洪云唐史昌裔傳云入蜀楊惠琳反昌裔説之惠琳之乱在夏州歳月相逺惠琳亊詳見崔寜傳琳降公常隨琳不去琳死脫身亡沈浮河朔之間建中中曲環招起之爲環檄李納指摘切刻納悔恐動心􅁪魏皆疑惑氣懈環封奏其本德宗稱焉環之㑹下濮州戰白塔救寕陵㐮邑擊李希烈陳州城下公常在軍間環領陳許軍公因爲陳許從事以前後功勞累遷撿校兵部郎中御史中丞營田副使呉少誠乗環䘮引兵叩城留後上官􅀃咨公以城守所以能擒誅叛將爲抗拒令敵人不得其便􅀃或作悅与舊史合擒方作檢今按此謂安囯寕謀以城降賊昌裔宻計漸之當作擒圍解拜陳州刺史韓全義敗引軍走陳州求入保公自城上揖謝全義曰公受命詣蔡何爲來陳公無恐賊必不敢至我城下明日領􅀐歩十餘抵全義營全義驚喜迎拜歎息殊不敢以不見舎望公改授陳許軍司馬上官􅀃死拜金紫光禄大夫撿校工部尚書代􅀃爲節度使命界上吏不得犯蔡州人曰俱天子人奚爲相傷少誠吏有來犯者捕得縛送曰妄稱彼人公宜自治之少誠慙其軍亦禁界上暴者兩界耕桑交跡吏不何問何或作呵方云漢賈􅁩傳大譴大何衛綰傳不孰何顔曰何即問也何上或有可字亦非是今按過秦論云陳利兵而誰何顔注云問之曰此爲誰人何人也亦此義封彭城郡開國公就拜尚書右僕射元和七年得疾視政不時八年五月涌水出他界過其地防穿不􅀘没邑屋流殺居人拜䟽請去職即罪詔還京師即其日與使者俱西大􅀬旦暮馳不息疾大發左右手轡止之公不肯曰吾恐不得生謝天子上益遣使者勞問勑無亟行至則不得朝矣天子以爲㳟即其家拜檢校左僕射右龍武軍統軍知軍事十一月某甲子薨年六十二某下或有日字下同上爲之一日不視朝贈潞州大都督命郎弔其家郎下或有中字明年某月某甲子葬河南某縣某郷某原公不好音聲不大爲居宅於諸帥中獨然夫人邠國夫人武功蘇氏子四人嗣子光禄主簿縱斈於樊宗師士大夫多称之長子元一朴直忠厚便弓馬爲淮南軍衙門將便方作使非是次子景陽㬌長皆㪯進士葬得日相與選使者哭拜階上使來乞銘銘曰提將之符尸我一方配古侯公維德不爽平声祝曰楚詞厉而不爽些注楚人謂羮敗曰爽我銘不亡後人之􅂟洪曰爽􅂟皆當叶韻􅀂讀􅀂霜􅂟讀􅀂羗又离騷云慶夭悴而䘮榮沈存中云古人諧声如慶字多与章字叶韻孝孫有慶万壽无疆􅁰稷稲梁農夫之慶是也集韻並収入平声朱文公校昌􅀺先生集卷之二十九
