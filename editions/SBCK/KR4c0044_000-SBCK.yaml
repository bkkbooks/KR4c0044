body:
  text: 音釋如集中考異巳載者更不重出昌黎先生集諸家姓氏丹陽洪氏興祖撰年譜辨證東蜀樊氏汝霖著公志及年譜註眉山孫氏汝聽全解臨卭韓氏諄全解文溪祝氏充全解晦庵朱氏熹撰考異留畊王氏伯大著音釋姓氏畢朱文公校昌􅀺先生集序此集今丗本多不同惟近歳南安軍所刋方氏校定本號爲精善别有舉正十卷論其所以去取之意又它本之所無也然其去取多以祥符杭本嘉祐蜀本及李謝所據館閣本爲定而􅀹尊館閣本雖有謬誤往往曲從它本雖善亦弃不録至於舉正則又例多而詞寡覧者或頗不能曉知故今輒因其書更爲校定悉考衆本之同異而一以文􅀔義理及它書之可證驗者决之苟是矣則雖民間近出小本不敢違有所未安則雖官本古本石本不敢信又各詳著其所以然者以爲考異十卷庶幾去取之未善者覧者得以叄伍而筆削焉方云序只云目爲昌􅀺先生集諸本亦多無文字者今从之後凡从方氏者不復論所不同者乃著之門人李漢編方云蜀本作朝議郎行尚書屯田貟外郎史館修撰上柱國賜緋魚袋李漢編今本或有并序二字非是周情孔思千態萬貌卒澤於道德仁義炳如也洞視萬古愍惻當丗遂大拯頽風教人自爲時人始而驚中而􅀏且排先生益堅終而翕然隨以定嗚呼先生於文摧陷廓清之功比於武事閣本作土非是可謂雄偉不常者矣常方从杭本作賞云取漢書功蓋天下者不賞之語今按不賞乃蒯徹教韓信背叛之語而唐太宗亦甞自言武德末年實有功髙不賞之懼施之於此旣不相似且非臣子所宜言者李亦未必敢取以爲用也當从諸本爲正長慶四年冬先生殁門人隴西李漢或無隴西二字辱知最厚且親遂収拾遺文無所失墜方云左傳國語多用失墜字或作墜失或無失字者皆非得賦四古詩二百一十聮句十一律詩一百六十雜著六十五書啓序九十六哀辭􅀕文三十九碑誌七十六筆硯鱷魚文三表狀五十二揔七百或作七百一十六或作七百三十八方氏考其数皆不合而姑從閣本杭本以爲唐本舊如此旣非文義所繫今亦不能深考并目録合爲四十一卷目爲昌􅀺先生集傳於代又有注論語十卷傳學者順宗實録五卷列於史書不在集中先生諱愈字退之官至吏部侍郎餘在國史本傳韓柳二先生文集行丗乆矣唐季歴代以来儒人文士莫不宗之以為文章之模範序記之矜式惜乎舊板漫滅續集遺闕讀者憾焉本堂廣求訪到善本卷集全備宗玉喜不自勝命工鼎新綉􅎚以廣其􅀓使四方文學君子得覩二先生之全文不致湮没豈不偉歟幸鑑嵗舍戊長十月吉旦書林王宗玉謹識汪季路書逵頃在成都見樊澤之所藏盤谷序碑本云得之邵公㴉作横卷刻字畫甚新略無殘闕處家中所藏本乃刻之方石殘闕殊甚其下方十餘字不復存字體絶不相􅀋自是兩本家中本有後語集古録金石録本亦皆有之記得樊本無之洪慶善所見似亦與家中本同惟樂且無央不同以上文意觀之恐舊自作無殃也大氐家所藏本與方本所記多同但藂茂盤旋友人於峕可以稼五處家本所闕而天子二字家本似續改刻耳又嘗以所見樊本及家本校今方本所不同者五處如不可幸而致不樊作弗家本闕大丈夫不遇夫下樊本有之字家本闕僥倖樊本家本僥並作徼不祥樊本家本不皆作弗飲則食樊本同家本闕田氏先廟碑海外二字方氏蓋从石本而不著其􅀃櫜兠則石本省卜作櫜方作橐者誤也右季路所見二石本與方氏所記無大同異但央二本皆作央恐作殃者爲是蓋作殃則與樂爲兩事中閒可用且字作央則與樂爲一事中閒不容著且字也僥倖據經傳當作徼字它亦不必改也今録此書以見石本未必可據况方氏所見又出傳録而非其眞耶田碑櫜字雖無石本亦亡可疑方本之誤則其考之有未詳耳朱文公校昌􅀺先生集凡例一正文及篇次係按方崧卿本而用諸本參校杭係監本閣係館閣本石係石刻本洪係洪興祖本又有潮本蜀本泉本晁本一考異舉方作者係按方崧卿本而舉方云者並是方崧卿舉正全文方有舉正十卷刋行一注方作或作及非是或注用事及用字出處並是考異全文其間有注一作者係今例别用他本增入一小圈下今按云云者並是考異全文一句讀下或一兩字下各有考異今例並緫附於一章之下一一章或有兩今按云云者又分其一於小章或句断之下今例一段無再出今按一考異於正文本字或一字或二字並皆提起如本字在章末其下即入注脚則不復再出或二四字或全句例同一考異有厶字或作厶字者今例並提起正文本字如上文或有字相犯則於本字上更連舉一字以别之如上字又相犯則連舉下字一考異有或無厶字者今例上文只有一字則止云或無厶字如上文有兩字相犯則云厶下或無厶字如上字又相犯則云厶上或無厶字或上下字又皆相犯則連舉二字以别之厶上或有厶字厶下或有厶字例亦同一律詩一聮如上下句係附兩意則各附考異及注脚於毎句之下如兩句只是一意則併附於一聮之下碑銘墓誌聯句􅀕文例同一考異或於篇目下云恐非公作今刪去者今例亦但存其篇目而不載其文一正文或有疑字並依考異文从囗右凡例十二條乃南劒官本所載按朱文公校昌􅀺集又著考異十卷在正集之外自爲一書留畊王先生倅南劒時併將考異附於正集本文之下以便􅀚覧故其凡例如此留畊先生又集諸家之善更定音釋援據的當音訓詳明猶未附入正集仍於逐卷之左空其下方㠯待竄補是雖足見先生之謙德而􅀚者未免即此較彼其於披閱又未爲便今本宅所刋係將南劒州官本爲據併將音釋附正集焉使􅀚者一目可盡而文義粲然亦先生發明此書之本心也幸鍳朱文公校昌􅀺先生集目録李漢編集卷之一賦感二鳥賦復志賦閔已賦别知賦古詩元和聖德詩琴操十首南山詩謝自然詩秋懷詩十首赴江陵途中􅀉三學士詩暮行河堤上詩夜歌重雲江漢長安交遊者岐山下二首卷之二古詩北極一首贈李觀此日足可惜贈張籍幽懷君子法天運落葉歸彭城醉後醉贈張秘書同冠峽送惠師送靈師縣齋有懷合江亭陪杜侍御遊湘西寺岳陽樓送文暢師荅張徹薦士喜矦喜至贈張籍張徹古風駑驥馬猒榖出門嗟哉董生行烽火汴州亂利劒齪齪卷之三古詩河之水二首山石天星汴泗交流忽忽鳴鴈龍移雉帶箭條山蒼贈鄭兵曹桃源圗東方半明贈唐衢貞女峽贈矦喜古意八月十五夜謁衡嶽廟岣嶁山永貞行洞庭湖阻風李花杏花感春四首寒食出遊憶昨行卷之四古詩劉生詩鄭羣贈簟豐陵行遊青龍寺贈崔補闕贈崔立之送區弘三星行剥啄行青青水中蒲三首孟東野失子陸渾山火縣齋讀書題新竹晚菊落齒哭楊兵部凝陸歙州參苦寒赤藤杖歌酬崔十六少府送矦參謀東都遇春感春五首酬裴十六功曹燕河南府秀才送李翶送石處士送湖南李正字卷之五古詩辛卯年雪醉留東野李花二首招􅀭之罘􅀉盧仝酬司門盧四雲夫院長望秋作誰氏子河南令舎池臺送無本師歸范陽石鼓歌雙鳥詩贈劉師服題炭谷湫祠堂聽潁師彈琴送陸暢歸江南送進士劉師服東歸嘲魯連子贈張籍調張籍盧郎中雲夫􅀉示盤谷子歌以和之􅀉皇甫湜病中贈張十八雜詩􅀉崔二十六立之月蝕詩效玉川子作孟生詩射訓狐將歸贈孟東野房蜀客答孟郊從仕短燈檠歌送劉師服卷之六古詩符讀書城南示爽人日城南登髙病鴟華山女讀皇甫湜公安園池詩書其後二首路傍堠食曲河驛過南陽瀧吏贈别元十八協律六首􅀄南食貽元十八恊律􅀫曾江口示姪孫湘二首答柳柳州食蝦蟇别趙子除官赴闕至江州􅀉鄂岳李大夫南山有髙樹行一首贈李宗閔猛虎行卷之七古詩雪後􅀉崔二十六丞公送僧澄􅀚獻山南鄭相公樊貟外和武相公詠孔雀感春三首行香贈盧李二中舎人晚􅀉張十八助教周郎博士題張十八所居酬盧給事曲江荷花和錢七盆池所植記夢南内朝賀歸呈同官朝歸雜詩四首讀東方朔雜事譴瘧􅀑示兒庭楸翫月喜張十八以王六至和李相公攝事南郊和裴僕射相公假山與張十八同效阮歩兵送諸􅁑覺往隨州讀書南溪始泛三首卷之八聮句城南聮句㑹合聮句闘雞聮句納凉聮句秋雨聮句征蜀聮句同􅀫聮句莎柵聮句雨中􅀉孟刑部聮句逺遊聮句晚秋郾城夜㑹聮句卷之九律詩凡八十五首題楚昭王廟􅀫龍宫灘义魚招張功曹李貟外􅀉紙筆次同冠峽答張十一功曹郴州祈雨湘中酬張十一功曹郴口又贈二首題木居士二首晚泊江口湘中別盈上人喜雪獻裴尚書春雪聞棃花發贈劉師命春雪閒早梅早春雪中聞鸎棃花下贈劉師命和歸工部送僧約入関詠馬木芙蓉題張十一旅舎三詠榴花井蒲萄峽石西泉梁國惠康公主挽歌二首和崔舎人詠月二十韻詠雪贈張籍酬王二十舎人雪中見􅀉送侯喜學諸進士作精衛衘石塡海酬振武胡十二大夫和盧庫部元日朝廻寒食直歸遇雨送李六協律歸荆南題百葉桃花春雪戯題牡丹盆池五首芍藥奉和虢州劉給事三堂二十一詠并序新亭流水竹洞月臺渚亭竹溪北湖花島柳溪西山竹逕荷池稻畦柳巷花源北樓鏡潭􅀌嶼方橋梯橋月池遊城南十六首欝神題于賔客莊晚春落花楸樹二首風折花枝贈同遊贈張十八助敎題韋氏莊晚雨出城把酒嘲少年楸樹遣興卷之十律詩凡八十首送李尚書赴㐮陽八韻和席八十二韻和武相公早春聞鸎太安池闕遊太平公主山莊晚春大行皇太后挽歌詞三首廣宣上人頻見過閑遊二首酬馬侍郎􅀉酒和侯協律詠笋過鴻溝送張侍郎贈刑部馬侍郎和裴相公女几山下作郾城晚飲贈馬侍郎及馮李二貟外酬别留後侍郎同李二十八夜次襄城同李二十八野􅀫西界過襄城􅀫神􅀛招李二十八馮十七次硤石和李司勲過連昌宫次潼関􅀉張十二閣老使君次潼関上都統相公桃林夜賀晉公送李貟外院長分司東都和晋公破賊回重拜台司獨釣四首枯樹元日酬馬尚書去年元日之什詠燈花同侯十一祖席前字秋字送鄭尚書赴南海答道士􅀉樹雞左遷至藍関示姪孫湘武関西逢配流吐蕃次鄧州界題臨瀧寺酬韶州張使君惠書二章題秀禪師房將至韶州􅀉張使君借圖經過始興江口感懷韶州留别張使君量移􅀽州酬張韶州次石頭驛􅀉王中丞遊西林寺題蕭郎中舊堂自􅀽州還京次安陸􅀉周隨州題廣昌館􅀉隨州周貟外酒中留上襄陽李相公題層峯驛梁賀張十八秘書得裴司空馬杏園送張徹雨中􅀉張愽士侯主簿和張侍郎酬馬尚書早春遊楊尚書林亭奉使常山次太原夕次壽陽驛題呉郎中詩後鎭州􅀄歸同水部張貟外曲江春遊􅀉白舎人和水部張貟外宣政衙賜櫻桃詩早春呈水部張貟外二首送桂州嚴大夫酬馬僕射見􅀉之作奉使鎮州酬裴司空鎭州路上酬裴司空重見􅀉和僕射裴相公感恩言志和僕射相公朝廻見􅀉和李相公題蕭家林亭和杜相公太清宫卷之十一雜著原道原性原毀原人原􅀑行難對禹問雜􅀃四首讀荀子讀鶡冠子讀儀禮讀墨子卷之十二雜著獲麟解師􅀃進學解本政守戒圬者王承福傳五箴五首并序後漢三賢賛三首諱辯訟風伯伯夷頌卷之十三雜著子産不毀郷校頌釋言愛直贈李君房别張中丞傳後叙河中府連理木頌汴州東西水門記燕喜亭記徐泗濠三州節度掌書記㕔石記畫記藍田縣丞㕔壁記新修滕王閣記科斗書後記卷之十四雜著書鄆州溪堂詩猫相乳進士䇿問十三首爭臣論改葬服議學生代齋郎議禘祫議顔子不貳過論與李秘書論小功不稅書大學生何蕃傳答張籍書重答張籍