front:
  text: 晦庵先生朱文公韓文考異序南安韓文出莆田方氏近丗號爲佳本予讀之信然然猶恨其不盡載諸本同異而多折􅂨於三本也原三本之見信杭蜀以舊閣以官其信之也則宜然如歐陽公之言韓文印本􅀄未必誤多爲校讎者妄改亦謂如羅池碑改歩爲渉田氏廟改天明爲王明之􅀋耳觀其自言爲兒童時得蜀本韓文於隨州李氏計其􅀊月當在天禧中年且其書巳故弊脫略則其摹印之日與祥符杭本蓋未知其孰先孰後而嘉祐蜀本又其子孫明矣然而猶曰三十年間聞人有善本者必求而改正之則固未甞必以舊本爲是而悉從之也至於秘閣官書則亦民間所獻掌故令史所抄而一時館職所校耳其所傳者豈真作者之手藁而是正之者豈盡劉向揚雄之倫哉讀者正當擇其文理意義之善者而從之不當但以地望形勢爲重輕也抑韓子之爲文雖以力去陳言爲務而又必以文從字順各識其職爲貴讀者或未得此權度則其文理意義正自有未易言者是以予於此書姑考諸本之同異而兼存之以待覽者之自擇區區妄意雖或竊有所疑而不敢偏有所廢也郡齋近刋朱文公校定昌黎集附以考異而音辯則舊所刋也初讀者未免求之音辯質诸校本既字不盡同且音讹事多缺此書有集注有補注有辨證有全觧音通句釋引物連􅀋雖若加詳而扵本文間亦抵捂余頗病之今悉􅀙校本更定音訓因旁摭诸家注觧劫本文用事者枚举而記其凡有未俻則訪诸士友博極此書者併記之意其間阙逸尚多也昔黄太史有云杜詩韓文無一字無來處竊謂必盡􅀁云而後可讀二文公之書過不自料附所甞記録於逐卷之左而空其下方以待來者竄釋兾更相緝續於音辯或有補云寳慶三年季夏既望承議郎特􅄈􅏔通判南剱州軍州兼􅃹内勸農事王伯大謹書
