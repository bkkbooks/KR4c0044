  text: 朱文公校昌􅀺先生集卷之十九考異音釋附
  hash: sha256:0f430ff8301d2f427beb5801a6e631569b56477d2757c472451ebfe522304ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_019-1a}
body:
  text: 書序與鄭相公書鄭餘􅂟时鎭㒷元再奉示問皆縁孟家事樊日元和九年三月以鄭餘􅂟為㒷元尹餘􅂟辟孟郊参謀郊挈其妻行至閬郷暴卒辭㫖惻惻憂慮深逺竊有以見大人君子篤於仁愛終始不倦伏讀感欷不知所喻舊与孟往還數人昨巳共致百千巳來㝷巳至東都計供葬事外尚有餘資今裴押衙所送二百七十千足以益業爲遺孀音霜樊日是歳十月葬郊其費皆出鄭相及東野旧往還者以其餘財贍給其家郊元子妻鄭氏永乆之賴孟氏兄弟在江東未至先与相識亦甚循善所慮才幹不足任事鄭氏兄弟惟最小者在東都固如所示不可依仗孟之深友太子舎人樊宗師孟下或有氏字比持服在東都今巳外除經營孟家事不啻如巳前後人所与及裴押衙所送錢物並委樊舎人主之營致生業必棄絶之罪於門下誠不忍竒寳横棄道側而閤下篋櫝尚有少闕不滿之処猶足更容輙冐言之退増汗懾篋或作匱方云无闕字謹狀與鄂州柳中丞書公綽时觀察鄂岳淮右殘孽尚守巢窟或作窟巢環㓂之師殆且十萬瞋目語難方云此用荘子語杭蜀本作難語非自以爲武人不肯循法度頡頑作氣􅀔竊爵位自尊大者肩相磨地相属也不聞有一人援桴鼓誓衆而前者但日令走馬来求賞給助㓂為声􅀔而已日方作月閤下書生也詩書礼楽是習仁義是修法度是束一旦去文就武鼓三軍而進之陳師鞠旅親与為辛苦慷􅁣感激同食下卒將二州之牧樊日元和十年詔公綽以兵五千􅀠安州刺史李聽討吳元済公綽曰朝廷謂吾書生不知兵耶請自行許之引兵渡江扺安州聽以軍礼迎謁公綽謂日以公丗將曉兵吾且欲署聀以兵法從亊聴日唯命以都知兵馬使中軍先􅄡行營都虞􅃸三牒受之選卒六千属聽戒其部將日行􅩌事一央都將聴􅀍恩威遂尽力當时服其知權十􅌰家有疾病公綽厚給之人皆感激故毎􅀾皆捷以壯士氣斬所乗馬樊日公綽所乗馬躡杀圉人公綽命杀馬以􅀕或日圉人不自備耳良馬可惜公綽日材良性駑必杀之補注柳氏叙訓及新旧唐史並以杀馬為公綽為襄陽莭度使时事司馬温公考異正引公此書證之去乃鄂岳时亊以􅀕踶大計切又徒􅀆切一作蹄漢武帝詔馬奔踶而致千里死之士雖古名將何以加兹此由天資忠孝欎於中而大作於外動皆中於機㑹以取勝於當丗而為戎臣師豈常習於威暴之事而楽其闘􅀾之危也哉愈誠怯弱不適於用聽於下風竊自増氣誇於中朝稠人廣衆㑹集之中或无㑹集二字所以羞武夫之顔令議者知將國兵而爲人之司命者不在彼而在此也而在方无而字臨敵重愼誡輕出入良用自愛以副見慕之徒之心而果為國立大功也幸甚幸甚不宣食或作用非是或无之徒二字方无下之字愈再拜又一首愈愚不能量事􅀔可否比常念淮右以靡弊困頓三州之地蛟蚋蟻蟲之聚感兇竪喣濡飲食之惠提童子之手坐之堂上奉以爲帥出死力以抗逆明詔戰天下之兵乗機逐利四出侵暴屠燒縣邑賊殺不辜環其地數千里莫不􅀍其毒洛汝襄荆許潁淮江爲之騷然丞相公卿士夫夫勞於圖議啚或作囯兆是握兵之將熊羆貙虎之士畏懦䠞􅀅六切促也蹜莫肯杖戈爲士卒前行者獨閤下􅁬然率先楊兵界上將二州之守親出入行間與士卒均辛苦生其氣􅀔見將軍之鋒頴凛然有向敵之意用儒雅文字章句之業取先天下武夫関其口而奪之氣愚􅀄聞時方食不斍棄七箸起立豈以爲閤下眞能引􅀌軍單進與死㓂角逐爭一旦僥倖之利哉真或作直非是或无单字就令如是亦不足貴其所以服人心在行事適機宜而風采可畏愛故也是以前狀輙述鄙誠眷惠手翰還答益増欣悚惠下或有賜字夫一衆人心力耳目使所至如時雨三代用師不出是道閤下果能充其言継之以無倦得形便之地甲兵足用雖國家故所失地旬歳可坐而得歳或作月况此小㓂安足置齒牙間勉而卒之以俟其至幸甚夫逺徴軍士行者有羇旅離别之思居者有怨曠騷動之憂本軍有饋餉煩費之難地主多姑息形迹之患急之則怨緩之則不用命浮􅀉􅀌懸形势銷弱又與賊不相諳委臨敵恐駭難以有功􅀂召募土人召或作占必得豪勇與賊相熟知其氣力所極無望風之驚愛護郷里勇於自戰徴兵滿萬不如召募数千閣下以爲何如儻可上聞行之否計巳與裴中丞相見行營事宜不惜時賜示及幸甚不宣愈再拜答魏愽田僕射書季冬極寒伏惟僕射尊體動止萬福即日愈􅀩􅊵􅀩恩改職事不任感懼諸本无􅀩􅊵二字方从閣本今按􅀩免者􅀩田之庇而得遣免也連上文為句􅀩恩者􅀩上於乆故游從之中伏􅀩恩奬知待最深最厚無有比者方无伏字比或作倫懦弱昏塞不能􅁬勵出竒少答所遇拜辭之後切念旬朔不即􅀗侍言笑東望殞涕有兒女子之感或无子字方云史記非兒女子所知爲児女子所詐當有子字獨􅀫直舎無可告語展轉歔欷不能自禁華州雖實百郡之首重於藩維然閣下居之則爲失所愚以爲苟慮有所及宜密以上聞不宜以踈外自待不下或无宜字接過客俗子絶口不桂時事務爲崇深以拒止嫉妬之口親近藥物方書動作歩超以致和宣滯爲國自愛副鄙陋拳拳之心幸甚幸甚謹奉狀不宣愈再拜尹不臺參答友人書或作与友人論京尹不臺参書洪日長􅂟三年六月以公爲京兆尹兼御史大夫敕放䑓参後不得爲例按魏氏春秋云故事御史中丞与洛陽令相遇則分路而行以士主多逐捕不欲稽留然非唐制也順宗实錄云故事尹与御史相遇尹下道避尹尚避御史豈有不䑓参之理當時敕放䑓参後不爲例則知故事須䑓参也唐本事須䑓参下云亦是何典故赤令尚與中丞分道而行何况京尹聖恩以爲然便令宣與李紳不用䑓参今本顚倒不可讀當從唐本樊日時宰相􅁖御史中丞李紳欲逐之特詔公不䑓参以激紳二果劾奏公公以詔自解文刺紛然宰相以䑓府不協遂罷公爲兵部侍􅀰而出紳爲江西􅀚察使紳朝辝位訴帝復留紳爲兵部侍郎公復爲吏部按正元十八年公爲四門博士時薦士十人於陸傪李紳在焉紳昧其平昔之薦而劾公公旣不言而丗亦未有辨之者又謂公蹙紳以附逢吉独王黄州荅丁晋公書以謂曲在紳盖公論也所示情眷之至不勝悚荷臺參實奏云容桂􅀚察使帶中丞尚不臺參或无使字京尹郡國之首所管神州赤縣官帶大夫豈得􅁍不如事須臺參聖恩以爲然便令宣與李紳不用臺參亦是何典故赤令尚與中丞分道而行何况京尹方云吕丞相本改定亦是以下十九字綴於事須䑓参之下仍於􅁍不如下􅄈中丞二字􅂟善云今本顚倒不可讀當从唐本不知洪所謂唐本者何本也閣杭蜀本只同今文姑以闕疑可也一日不用䑓参巳下當再出䑓参二字義亦自通今按二􅀃皆未安後􅀃雖差勝然文意似亦未足當闕之以俟知者人見近事習耳目所熟稍殊異即怪之其於道理有何所傷聖君使行即是故事自古豈有定制也停推廵縁府中􅄶迫是實􅀂别差人即是妄􅀃豈有此事小人言不可信􅀋如此亦在大賢斟酌而断之流言止於智者正謂此耳客多自修報狀不得或作不及自修报或作不及修报狀伏惟照察照方作昭今按唐人書帖用照察字亦多送陸歙州詩序或無詩字或作送陸貟外出刺歙州詩并序方云陸傪也洪云一本自此下爲第二十卷貞元十八年二月十八日祠部貟外郎陸君岀刺歙州朝廷夙夜之賢都邑游居之良齎咨涕洟咸以爲不當去歙大州也刺史尊官也由郎官而往者前後相望也當今賦出於天下江南居十九宣使之所察歙爲富州宰臣之所薦聞天子之所選用其不輕而重也較然矣如是而齎咨涕洟以爲不當去者陸君之道行乎朝廷則天下望其賜刺一州則專而不能咸咸或作或而属下句方从閣本作咸而属上句今按莊子有周徧咸之語方本得之先一州而後天下豈吾君與吾相之心哉先上諸本有謂字方从閣本云杭本訛咸作或然尚无謂字蜀本始作或爲今本易爲作謂訛轉甚也於是昌黎韓愈道願留者之心而泄其思作詩曰我衣之華􅀆我佩之光陸君之去􅀆誰與翶翔諸本如此方从閣杭本光翔下皆有􅀆字去下无􅀆字今按古詩賦有句二用韵及語助者賡歌是也有隔句用韵及􅀆而􅀆在上句之未韵在下句之末者騷經是也有隔句用韵而上句不韵不􅀆下句押韵有􅀆者橘頌之􅀋是也今此詩方本􅀂用賡敬之例則華光有弓而不韵其去字一句又并无也􅀂用騷經之例則光翔當用韵而不當有􅀆華虽可以有􅀆而去復不可以无􅀆也􅀂用橘頌之例則下三句爲合而首句不當有􅀆也韓公深於騷者不應如此盖方所从之本失之也今定从諸本以騷經及賈􅁩吊屈首章爲例􅀂欲以橘頌爲例則止去方本首句一􅀆字􅀹爲簡便但无此本不敢以意創耳歛此大惠􅀆施于一州今其去矣胡不爲留我作此詩歌于逵道無疾其驅天子有詔送孟東野序大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趍也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得巳者而后言其謌也有思其􅂘也有懷凡出乎口而爲聲者其皆有弗平者乎樂也者欎於中而泄於外者也擇其善鳴者而假之鳴金石絲竹匏土革木八者物之善鳴者也維天之於時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推􅐁其必有不得其平者乎鳥下方从閣本有獸字非是敓古奪字或作奪其於人也亦然人聲之精者爲言文辭之於言又其精也方从閣杭蜀本去又字而取下句尢字足戓一句不成文理􅀃見下條􅀹擇其善鳴者而假之鳴按上文巳再言擇其善鳴者而假之鳴矣則此又言人声之精者爲言而文詞又其精者故􅀹擇其善鳴者而假之鳴又字尤字正是関鍵血脉首尾相應処方以三本之誤遂去又字而以􅀹字属上句不唯此句不成文理又使此篇語无次第其誤􅀹甚今悉正之其在唐虞咎陶禹其善鳴者也而假以鳴在下或有於字假下或有之字􅇪弗能以文辝鳴又自假於韶以鳴弗方作不而无能字夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而逺傳曰天將以夫子爲木鐸其弗信矣乎其末也莊周以其荒唐之辝鳴辝或作􅀃下或有於楚二字方云荘子􅀩人􅀩梁地也且辝楚威王之䀻未嘗仕於楚也楚大國也其亡也以屈原鳴臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老聃申不害韓非眘到田駢鄒衍户佼音絞又古爻切魯人啇君師之鞅死入蜀著書二十篇号户子孫武張儀蘇秦之属皆以其術鳴秦之興李斯鳴之漢之時司馬遷相如揚雄最其善鳴者也其下魏􅀳氏鳴者不及於古然亦未嘗絶也其下方无其字然亦未嘗絶也諸本皆有此句方从閤本刪去今按有此一句文意乃足閣本脫也就其善者其聲清以浮其節數以急其辝􅁋以哀其志㢮以肆善下或有鳴字浮方从諸本作淳唯蜀本及文􅁐作浮今按此數句皆言魏晋以下文章之病不應用淳字以美之諸本皆誤数以急㢮以肆二句諸本皆如此方从謝本刪去二以字今按自其声至此四句當爲二列其苐二苐四句古本偶皆脫一字而方必从之遂使句之短長参差不斉而不可讀正与上李巽書相似其意以爲必如是然後爲古而不知所謂古者不在是也其爲言也亂雜而無章將天醜其德莫之顧邪何爲乎不鳴其善鳴者也諸本如此方从閤本以乱爲詞又從閤杭本刪去􅀅天以下十九字今按方本極无理盖因乱而誤為辝又因辝而轉作詞耳今當改詞爲乱又􅀘十九字文意乃足唐之有天下陳子昻蘇源明元結李白杜甫李􅀚皆以其所能鳴其存而在下者孟郊東野始以其詩鳴其髙出魏晋不懈而及於古其他浸􅁋乎漢氏矣魏晋方作晋魏或无古字氏矣方从閤本无此二字皆非是從吾遊者李翶張籍其􅀹也三子者之鳴信善矣方无信字或作善鳴皆非是左傳云克巳復礼仁也信善哉公虽未必用此語然亦偶合也抑不知天將和其聲而使鳴國家之盛邪抑將窮餓其身思愁其心腸而使自鳴其不幸邪三子者之命則懸乎天矣方从閤杭蜀􅁐則下有有字非是􅀂果有有字即天下當有者字更詳之其在上也奚以喜其在下也奚以悲東野之役於江南也有􅀂不釋然者故吾道其命於天者以解之釋或作懌然者方作者然云顧命王不懌或作不釋釋猶開釋也按嘉祐本作不釋然者其語本出荘子方与或本皆誤也以觧方无以字非是送許郢州序或作送許史君刺郢州序仍注仲輿二字或作志雍樊云志雍安陸許氏貞元九年進士終監察御史愈嘗以書自通於于公累數百言公下或有頔字其大要言先逹之士得人而託之則道德彰而名問流後進之士得人而託之則事業顯而爵位通要下或有也字問或作聞下有矜乎能上有矜乎位雖􅁪相求而喜不相遇于公不以其言爲不可復書曰足下之言是也諸本无喜字方从閤杭蜀􅁐得之于公身居方伯之尊蓄不丗之材而能與卑鄙庸陋相應荅如影響是非忠乎君而樂乎善以國家之務爲巳任者乎丗下或有出字出下或有羣字愈雖不敢私其大恩抑不可不謂之知巳􅁪矜而誦之情巳至而事不從小人之所不爲也故於使君之行道刺史之事以爲于公贈凡天下之事成於自同而敗於自異爲刺史者􅁪私於其民不以實應乎府爲􅀚察使者􅁪急於其賦不以情信乎州繇是刺史不安其官􅀚察使不得其政財巳竭而歛不休人巳窮而賦愈急其不去爲盗也亦幸矣賦方作怒以上下文考之非是誠使刺史不私於其民􅀚察使不急於其賦方无下其字以上句考之非是刺史曰吾州之民天下之民也惠不可以獨厚􅀚察使亦曰某州之民天下之民也歛不可以獨急如是而政不均令不行者未之有也以獨急或无以字其前之言者于公旣巳信而行之矣今之言者其有不信乎前下方无之字非是今疑其字當作某縣之於州猶州之於府也有以事乎上有以臨乎下同則成異則敗者皆然也非使君之賢其誰能信之信方作從以上文考之非是愈於使君非燕游一朝之好也故其贈行不以頌而以規送竇從事序踰甌閩而南皆百越之地甌方作越以下文重出越字考之非是或无甌字亦非越或作粤於天文其次星紀其星牽牛連山隔其隂鉅海敵其陽敵一作歊氣上烝也方从閤􅁐作􅃻云敲横擿也謂鉅海􅃻蕩其南也今按􅃻徴扣也字書訓以横擿而漢書注又訓擿爲發動盖不以杖末􅁬擊但以杖身徴扣而發動之所謂横擿也海之爲物最鉅其所震蕩豈徴扣之謂邪閤本盖誤而方必爲曲􅀃以附之殊不可曉作歊亦非是但當作敵乃當抵對捍之意与上句隔字正相對也是維島居卉服之民風氣之殊著自古昔氣方从閤蜀本作俗今按島居卉服巳見其民俗之陋因又言此以見其風氣之􅁖自是兩事故下文云民俗旣迁風氣亦隨也閤蜀皆誤古方作在非是唐之有天下號令之所加無異於逺近民俗旣遷風氣亦隨雪霜時降癘疫不興瀕海之饒固加於􅀄疫或作疾方云瀕濵也􅂐文无賔字漢志瀕南山又瀕河十郡只用􅁼字加於方作如其今以上文考之此當言其氣俗旣変生物益蕃之意􅀂云固如其􅀄則􅁍是未曽変矣方本非是是以人之之南海者􅀂東西州焉之之諸本无復出之字方从閤杭蜀􅁐得之􅀂或作如皇帝臨天下二十有二年臨下或有御字詔工部侍郎趙植爲廣州刺史盡牧南海之民署從事扶風竇平平以文辝進於其行也其族人殿中侍御史牟合東都交遊之能文者二十有八人賦詩以贈之於是昌黎韓愈嘉趙南海之能得人壯從事之答於知我不憚行之逺也我或作巳行之逺文􅁐如此諸本之或作於或作我於行逺方无行之二字皆非是又樂貽周之愛其族叔父能合文辝以寵榮之作送竇從事少府平序貽上或有其宗二字上巳日燕太學聽彈琴詩序與衆樂之之謂樂樂而不失其正又樂之􅀹也尤方从閤本作光四方無闘爭金革之聲京師之人旣庻且豊天子念致理之艱難樂居安之閑暇肈置三令節洪曰舊史云貞元四年九月詔正月晦日三月三日九月九日三節日冝任文武官僚選勝地追賞爲楽五年正月詔以二月一日爲中和節代正月晦日備三令節数此序在正元壬午癸未間公爲四門博士其云肇置三令節盖謂徳宗朝始置耳詔公卿羣有司至于其日率厥官屬飲酒以樂所以同其休宣其和感其心成其文者也方无屬字三月􅀄吉實惟其時司業武公下或有少儀二字於是緫太學儒官三十有六人列燕于􅀕酒之堂罇爼旣陳肴羞惟時醆􅕸序行獻酬有容歌風雅之古辭斥夷狄之新聲襃衣危冠與與如也與與或作愉愉方从杭蜀本云詩我􅁰與與淮南子善用兵者陵其與與皆音餘今按論語有此全句有儒一生魁然其形抱琴而來歴階以昇儒一或作一儒以或作而坐于罇爼之南鼓有虞氏之南風賡之以文王宣父之操孫曰賡續也樊曰文王操見史記孔子斈琴於師㐮宣父操如將帰猗蘭亀山也優游夷愉廣厚髙明追三代之遺音想舞雩之詠歎及暮而退皆充然􅀂有得也有下或有所字武公於是作歌詩以美之命屬官咸作之命四門博士昌黎韓愈序之送齊皡下第序皥或作曎方云考唐宰相丗系表當作皡古之所謂公無私者其取捨進退無擇於親踈逺邇惟其宜可焉其下之視上也亦惟視其舉黜之當否不以親踈逺邇疑乎其上之人下或有也字或无之人二字而有也字故上之人行志擇誼坦乎其無憂於下也或无故字或无之字下之人尅巳愼行確乎其無惑於上也是故爲君不勞而爲臣甚易見一善焉可得詳而舉也見一不善焉可得明而去也方从閤杭蜀􅁐无詳明二字及道之衰上下交疑於是乎舉讎舉子之事載之傳中而稱美之而謂之忠或无下而字見一善焉􅀂親與邇不敢舉也見一不善焉􅀂䟽與逺不敢去也方无上敢字衆之所同好焉矯而黜之乃公也衆之所同惡焉激而舉之乃忠也衆下或皆有人字於是乎有違心之行有怫志之言有内媿之名􅀂然者俗所謂良有司也然或作是膚受之訴不行於君巧言之誣不起於人矣烏虖今之君天下者不亦勞乎爲有司者不亦難乎爲人嚮道者不亦勤乎烏虖方云猶嗚呼也古文於乎烏虖嗚呼皆一義或作於是乎非是爲有方无爲字爲人嚮道諸本皆同但嚮或作鄉方从閤􅁐以人爲仁殊无文理盖所謂人者指應㪯者而言爲之作嚮道者謂指引其道路所嚮如公之於侯喜侯雲長之徒是巳其作郷者亦音向与兵書所謂以鄉人為導者音義皆不同也是故端居而念焉非君人者之過也則曰有司焉則非有司之過也則曰今㪯天下人焉則非今㪯天下人之過也蓋其漸有因其本有根生於私其親成於私其身以已之不直而謂人皆然其親其下或有所字其植之也固乆其除之也实難非百年必丗不可得而化也非知命不惑不可得而改也巳矣乎其終能復古乎􅀂髙陽斉生者其起予者乎斉生之兄爲時名相出藩于南之兄方元之字于下方从杭􅁐有鎮字公閣本无今按斉映以貞元七年由桂管改江西是時淇州只為江西觀察使至咸通中乃有鎮南之号耳杭􅁐皆誤朝之碩臣皆其舊交斉生㪯進士有司用是連枉斉生斉生不以云乃曰我之未至也有司其枉我哉其枉或作豈枉方从閣杭蜀本得之我􅀅利吾器而俟其時耳抱􅀒其業東歸於家吾觀於人有不得志則非其上者衆矣亦莫計其身之短長也􅀂斉生者旣至矣而曰我未也不以閔於有司其不亦鮮乎哉既至矣方作既不得志矣今按上文曰我之未至也下文日我未也則此作至為是未下或有至字吾用是知斉生後日誠良有司也能復古者也公無私者也知命不惑者也送陳密序太斈生陳密請於余曰密承訓於先生今􅀅歸覲其親不得朝夕見願先生賜之言密􅀅以爲戒覲或作拜密来太斈㪯明經累年不􅀗選是弗利於是科也􅀗下或有其字今􅀅易其業而三礼樊日唐制取士有明經科而明經之别有五經有三經有二經有三礼有三傳有史科凡礼記春秋左氏傅為大經詩周礼儀礼為中經易尚書春秋公羊傳為小經孫曰三礼科正元五年二月置是習願先生之張之也密􅀅以爲郷榮方无以字余媿乎其言遺之言曰子之業信習矣其容信合於礼矣其下或有仪字非是抑吾所見者外也夫外不足以信内子誦其文則思其義習其儀則行其道則􅀅謂子君子也爵禄之来也不可辭矣科寕有利不利邪謂其習其或並无其字送李愿歸盤谷序樊日東坡云歐陽公言晋无文章惟陶渊明帰去来一萹而巳余亦謂唐无文章惟韓退之送李愿帰盤谷一萹而巳平生欲效此作一萹毎执筆􅂺罷因自􅀏日不􅀂且放教退之独歩唐人䟦序後云云昌黎韓愈知名之士髙愿之䝨故叙而送之云云樊日按正元十七年歳在辛巳欧陽公集古錄云當時退之官尚未㫫其道未為當時所宗师故但云知名士然當時送愿者為不少而独刻此序盖其文章巳重於時也方云此序正元十七年作公年􅅻三十四耳太行之陽有盤谷盤谷之間泉甘而土肥草木藂茂居民鮮少或曰謂其環兩山之間故曰盤或曰是谷也宅凼而势阻􅀮者之所盤旋友人李愿居之盤下諸本皆有旋字珙氏石本杭本同或作􅁊方从樊氏石本閣蜀􅁐剛去今按两石本不同􅀃見下條友人諸本及洪氏石本皆作友方云樊氏石本作有今按校此書者以印本之不同而取正於石本今石本乃又不同如此則又未知其孰是也然以理推之則作有者為无理故今特詳著之以見所謂石本者之不足信也愿之言曰人之稱大丈夫者我知之矣利澤施于人名聲昭于峕施于諸本于作於方从石本坐于廟朝進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各执其物夾道而疾馳喜有賞怒有刑文􅁐賞作賜樊氏石本无此六字才畯滿前道古今而譽盛德入耳而不煩曲眉豊頰清聲而便体秀外而惠中飄輕􅅂翳長䄂粉白黛緑者列屋而閑居妬寵而􅀒恃爭妍而取怜大丈夫之遇知於天子用力於當丗者之所爲也天子諸本作主上方从石本為上諸本有所字方从石本刪去下文於時者之所為也同此吾非惡此而逃之是有命焉不可幸而致也窮居而閑処升髙而望逺諸本如此方从石閣􅁐作逺望坐茂樹以終日濯清泉以自㓗採於山美可茹釣於水鮮可食起居無時惟適之安蜀本及洪氏石本之作所方从􅁐粹樊氏石本作之今按此二石本不同又足以見所謂石本者之难信矣然以理推之作之為是諸舊本亦多同者與其有譽於前孰􅀂无毀於其後與其有楽於身孰􅀂無憂於其心与其下諸本並有有字方从石本刪去車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者之所爲也我則行之伺候於公卿之門奔走於形势之途足􅀅進而趑趄口􅀅言而囁嚅趑取私切趄音狙囁之舌切又而舌切需女居切又音如赼趄行不進皃囁需不敢出口也処穢汙而不羞觸刑辟而誅戮穢汙方从諸本作汙穢今用石本改不羞樊本作弗差辟樊石本作法徼倖於萬一老死而後止者其於爲人賢不肖何如也昌􅀺韓愈聞其言而壯之與之酒而爲之歌曰盤之中維子之宫盤之土可以稼諸本作惟子之稼方从石閤如此盤之泉可濯可沿石閣杭本沿作湘方从石本云洪氏以爲作湘者石本磨㓕或以閣本意之也然此文自如往而復以上皆二語一韵以稼叶土此類囯多以容叶深以詩七月易􅁪卦小象考之亦合古韵独湘不可与泉叶按公論語筆解以浴于沂作沿于沂政与此沿同義今只以沿爲正今按方以古韵為据舎所信之石杭閤本而去相从沿其􅀃當矣然必以筆觧爲􅀃又似太拘今丗所傳筆觧盖未必韓公本眞也又按洪云石本在済源張端家皆缺裂不全惟可濯可湘一句甚明又与方引洪氏磨滅之􅀃不同不知何故姑記之以俟知者然其大槩只爲从湘字耳政使实然亦不足取其􅀃詳於下條云盤之阻誰爭子所窈而深廓其有容繚而曲如往而復嗟盤之楽􅀆楽且無殃殃方从洪校石本作央又云樊本只作殃然閣杭蜀本皆作央王逸注离騷云央尽也巳也方又云此文如叢作藂俊作畯時作峕皆石本字也今按作殃於義爲得又按此萹諸校本多从石本而樊洪兩石巳自不同未知孰是其有同者亦或无理未可尽信按欧公集古跋尾云盤谷序石本正元中所刻以集本校之或小不同疑刻石誤然以其當時之物姑存之以為佳玩其小大不足校也詳公此言最為通論近丗論者專以石本為正如水門記溪堂詩予巳論之南海廟刘統軍碑之􅀋亦然其謬可考而知也虎豹逺跡􅀆蛟龍遁藏􅀑神守護􅀆呵禁不祥禁或作禦飲則食􅀆壽而康无不足􅀆奚所望則或作且膏吾車􅀆秣吾馬従子于盤􅀆終吾生以徜徉上音常下音羊猶徘徊也送牛堪序此篇或在後卷之首方从閣杭蜀本置此以明經㪯者誦数十萬言又約通大義徴辝引􅀋旁岀入他經者又誦数十萬言其爲業也勤矣登第於有司者去民畒而就吏禄由是進而累爲卿相者常常有之其爲􅀗也亦大矣然吾未甞聞有登第於有司而進謝於其門者豈有司之待之也抑以公不以情㪯者之望於有司也亦將然乎門上或无其字其進而謝於其門也則爲私乎抑無乃人亊之未思或者不能㪯其礼乎􅀂牛堪者思慮足以及之材質足以行之而又不聞其往者其將有以哉或无將字違衆而求識立竒而取名非堪心之所存也由是而􅀚之􅀂堪之用心其至於大官也不爲幸矣堪太斈生也余博士也博士師屬也於其登第而歸􅀅榮於其郷也能無􅀃乎朱文公校昌黎先生集卷之十九
