front:
  text: 是命烜氏候清夜或將祀圎丘於玄冬或將􅀕方澤於朱夏祀方作􅀕􅀕或作祀持鑑而精氣韓曰淮南子積隂之寒氣為水水氣之精者為月旁射照月而隂靈樊曰謝荘月賦日以陽德月以隂灵潜下視而不見謂合道於希夷挹之則􅄹方同功於造化應於有生於無生或作声形象未分徒騁離婁之目光華暗至如還合浦之珠旣齊芳於酒醴詎比賤於潢汚芳方作髙云礼夏尚明水商尚醴周尚酒今作斉芳非今按明水當在酒醴之上不應反言斉髙此盖以其都无臭味嫌不足於芬芳故有斉芳之語方􅀃非是明德惟馨玄功不宰于以表誠潔于以戒荒怠苟失其道殺牛之􅀕何爲如得其宜明水之薦斯在宜方作情薦或作為不引而自致不行而善至雖辭麴蘖之名實處罇罍之器降於圎魄殊匪金莖之露岀自方諸乍似鮫人之淚匪或作非露或作靈乍方作巳將以賛于隂德配夫陽燧音遂配上或有非獨二字夫或作于夜寂天清煙消氣明桂華吐耀兎影騰精兔影或作玉兔騰方作流聊設監以取水伊不注而能盈霏然而象的爾而呈始漠漠而霜積漸㣲㣲而浪生而象或作垂象或作无象的方作酌漠漠而方作茫茫以豈不以德恊于坎同􅀋則感形藏在空氣應則通同方作有今按同􅀋与氣應對属差互恐當作􅀋同在或作於鶴鳴在隂之理不謬虎嘯于谷之義可崇理方作論虎方作武義方作道今按作虎為是但當時程試避諱當作武耳足以驗聖賢之無黨知天地之至公足以驗聖賢方作庶令知聖真黨或作窮知方作驗竊比大羮之遺味幸希薦於廟中
