front:
  text: 朱文公校昌黎先生集卷之四考異音釋附
  hash: sha256:0cee64526bd34b552b610be8e099e949a36f99bb5129584d0bed01d3c5d80f46
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_004-1a}
body:
  text: 古詩劉生詩或无詩字生名師命其姓劉自少軒輊下竹二切韓曰詩云戍車旣安如輊如軒又馬援傳居前不能令人䡖居後不能令人軒非常儔幹或作軼棄家如遺來逺遊東走梁宋曁楊州曁或作墮遂淩大江極東陬下將侯切東陬謂越也洪濤舂天禹穴幽越女一􅀏三年留南逾横嶺入炎州或作洲青鯨髙磨波山浮鯨或作鮮今按青義未詳疑是長字之誤怪魅炫曜推蛟虬魅或作媚堆或作推非是山㺑讙譟猩猩游㺑或作獠非是方云㺑蘇遭切神異經西方深山有人長尺餘袒身捕􅿐蟹以食名曰山㺑囯語注作㺐公䏈句亦有中矢􅀋妖摻游或作愁方云此詩二州字二游字視古用韵後人誤改也毒氣爍體黄膏流問胡不歸良有由美酒傾水䏑之夜切与炙同又側吏切肥牛妖歌慢舞爛不収倒心廻腸爲青眸千金邀顧不可酬乃獨遇之盡綢繆瞥然一餉成十秋餉或作曏非是昔鬚未生今白頭五管嶺南有經略軍謂之五管容廣邕桂安南歷徧無賢侯廻望萬里還家羞陽山窮邑惟猿猴手持鈞竿逺相投我爲羅列陳前修芟蒿斬蓬利鋤耰天星廻環數􅂊周文學穰穰豊也如两切囷去輪切祝曰倉􅁃也藏也倉圎曰囷礼記修囷倉倉稠車輕御良馬力優咄哉識路行勿休韓曰終篇盖有且諷且􅂆之意上云問胡不帰良有由即先之以越女一􅀏三年留継以妖􅁔慢舞爛不収則知刘生所寓皆不羈也往取將相酬恩讎鄭羣贈簟羣嘗以侍御史佐裴均江陵孫曰羣字洪之時以殿中侍御史佐裴均江陵軍公自陽山量移法曹与羣同僚樊云唐孔幾私記云退之豊肥善睡每來吾家必命枕簟而沈存中筆談丗畫韓退之小靣而美髯着紗㡌此乃江南韓熈載尔熈載謚文靖江南人謂之韓文公因此遂誤以爲退之退之肥而少髯此詩有腰腹空大及慢膚多汗之語信然蘄州笛竹韓云蘄州在今洧南其地出竹本用為笛今以之爲簟耳天下知笛或作簟鄭君所寳尤瓌竒􅂝來當晝不得卧一府傳看黄琉璃體堅色净又藏節盡眼凝滑無瑕疵盡或作蒲法曹貧賤衆所易腰腹空大何能爲自從五月困暑濕如坐深甑遭蒸炊手磨䄂拂心語口慢膚多汗眞相宜日暮歸來獨惆悵有賣直欲傾家資誰謂故人知我意卷送八尺含風漪於離切水紋呼奴掃地鋪未了光彩照耀驚童兒青蠅側翅蚤音早抱朴子曰蚤蝨攻君卧不獲安蝨避肅肅疑有清飈吹倒身甘寢百疾愈却願天日􅁪炎曦明珠清玉選張衡四愁詩美人贈我貂䄡䄖何以報之明月珠美人贈我錦綉段何以报之青玉案不足報贈子相好無時衰閤本无時作時无非是豐陵行順宗時羽衛煌煌一百里一或作三方云以長安志考之非是曉出都門葬天子群臣􅄂沓馳後先宫官穰穰來不巳是時新秋七月􅀄金神按節炎氣除清風飄飄輕􅀨灑偃蹇旂斾卷以舒逾梁下坂笳鼓咽方作沸今按作唯乃響又見悲切之意也嵽嵲絰臬二音山小而不安皃遂走玄宫閭方云選注天子后妃所葬墓曰玄宮閭謂玄宫前之寓閭也閭或作虚非是哭聲訇呼宏切天百馬噪幽吹晝閉空靈輿皇帝孝心深且逺資送禮備無贏餘設官置衛鎖嬪妓孫曰唐制諸陵皆置宮殿列曹設嬪妃侍衛如平生杜甫橋陵詩云宮女晚知曙祠臣朝見星韓曰終篇言三代舊制存諸書當時之礼必有不合於古者故云供養朝夕象平居飬或作送臣聞神道尚清淨三代舊制存諸書墓藏廟􅀕不可亂欲言非職知何如遊青龍寺贈崔太􅀘闕諸本太作羣秋灰􅀄吹季月管日出卯南暉景短友生招我佛寺行正值萬株紅葉滿韓曰東坡甞謂此句􅀄不曉其故及觀小􅀃鄭䖍寓青龍寺貧无􅁓取柿葉斈書九月柿葉赤而实紅退之詩謂此光華閃壁見神􅀑壁或作璧赫赫炎官張火傘然雲燒樹火實駢金烏下啄赬虬􅆑赬音檉赤色韓曰上䏈詠村葉之紅而光華之粲然下䏈詠柹实之赤而日光之交映火傘赬虬皆􅃺其紅而取喻之工如此魂翻眼倒忘處所倒或作暈赤氣冲融無間斷有如流傳上古時九輪孫云淮南子日堯時十日並出草木焦枯堯命羿仰射十日申其九鳥皆死九輪謂九日車輪也照燭乾坤旱二三道士席其間靈液屢進頗􅀺盌音椀孫曰頗黎玉名其色赤出西域亦作坡黎祝曰盌􅀃文小盂也選逸珠􅄹盌此謂食柿也忽驚顔色變韶稚忽方作勿非是韶或作離方云韶有美義不必易字却信靈仙非怪誕桃源迷路竟茫茫􅀥下古曲名歌曰棗下纂二朱實離離宛其落矣化為枯枝人生不能行楽死何以虚謚為悲歌徒纂纂前年嶺隅郷思發躑躅成山開不筭去歳羈帆湘水明霜楓千里隨歸伴猿呼鼯嘯鷓鴣啼嘯或作笑非是惻耳酸腸難濯澣惻或作側非是思君􅂝手安能得今者相從敢辭􅂴由來鈍騃語駭切寡參尋騃或作駭非是况是儒官飽閑散惟君與我同懷抱鋤去陵谷置平坦年少得途未要忙時清諌䟽􅀹宜罕何人有酒身無事誰家多竹門可欵韓曰後漢孔融甞曰坐上客常滿樽中酒不空吾无亊矣晋王子猷好竹呉中士大夫家有好竹欲觀之便出輿造竹下諷嘯良乆蔡寛夫云此一對􅀹閑逺有味須知節候即風寒幸及亭午猶妍暖南山逼冬轉清痩刻畫圭角出崖窽音疑空也莊子道大窽當憂復􅀍氷雪埋汲汲來窺誡遲緩贈崔立之評事崔侯文章苦趯敏髙浪駕天輸不盡曽從関外來上都外或作内非是隨身卷軸車連軫止忍切車後木孫曰連軫言数車相接朝爲百賦猶鬱怒暮作千詩轉遒緊揺毫擲簡自不供頃刻青紅浮海蜃音腎能吐氣為楼䑓海中春夏間見祝曰大蛤也前漢海旁蜃氣象樓䑓才豪氣猛易語言往往蛟螭雜螻蚓上音楼下音引丘蚓也知音自古稱難遇丗俗乍見那妨哂勿嫌法官未登朝猶勝赤尉長趍尹時命雖乖心轉壯技能虚富家逾窘念昔塵埃兩相逢争名齟齬持矛楯音貭兵器子時專楊誇觜距專或作擅余始張軍嚴韅靷上曉見切下以忍切駕牛具在背曰韅在胷曰靷爾來但欲保封疆莫學龐㳙怯孫臏音牝竄逐新歸厭聞閙齒髮早衰嗟可閔頻􅀩怨句刺棄遺豈有閑官敢推引深藏篋笥時一發戢戢巳多如東筍可憐無益費精神有似黄金擲虚牝洪曰牝谿谷也殷仲文曰哀壑可虚牝當今聖人求侍從拔擢􅂎梓収楛音戸木名可以為矢簳箘音窘美竹東馬嚴徐巳奮飛枚皐即召窮且忍復聞王師西討蜀霜風冽冽摧朝菌音窘地䉦朝生暮死韓曰莊子朝菌不知晦朔走章馳檄在得賢燕雀紛拏要鷹隼竊料二􅂗必處一豈比􅁪人長蠢蠢勸君韜養待徴招不用雕琢愁肝腎牆根菊花好沽酒錢帛縱空衣可準暉暉簷日暖且鮮摵摵山責切隕落也盧子諒曰摵摵芳葉零又潘岳秋思賦庭樹摵以濯落井梧踈更殞髙士例須憐麴蘖丈夫終莫生畦畛能來取醉任喧呼死後賢愚俱泯泯送區弘南歸區或作歐歸或作征方云區烏侯切唐韵區冶子之後漢王莽漙有中郎區博穆昔南征軍不歸虫沙猿鶴伏以飛抱朴子云周穆王南征三軍之衆一朝尽化君子為猿為鶴小人為虫為沙造化權輿作周昭王南征皆未詳本何据也孫曰伏謂猿虫飛謂沙鶴洶洶許拱切水声洞庭莽音姥楚辝夕擥中州之􅀫莽王逸注云草經冬不死者楚名曰宿莽翠微或作江洶洞庭􅀫莾微九疑湘中記零陵營道縣九山相似行者疑惑故名九疑曰荒是非豈以此耶鑱鋤衘切險也天荒是非鑱或作巉方云九疑言攙天洪濤言春天皆竒語也野有象犀水貝璣分散百寳人士稀言山川之美散為百宝獨人物稀少士或作亊非是我遷于南日周圍言曰一周匝公正元十九年冬謫陽山明年冬弘来故云日周圍來見者衆莫依稀爰有區子熒熒暉區子方作子區觀以彛訓或從違我念前人譬葑菲落以斧引以纆徽上音墨下音暉孫曰即今梓匠所引以正木者引以或作斧引洪本纆作墨方从唐閤杭本亡張文潜云古人作七言詩其句脉多上四字而下以三字成之退之乃変句脉以上三下四如落以斧引以纆徽雖欲梅舌不可捫是也今按此言纆徽謂木工所用之繩墨也然周易作徽纆乃為墨索所以拘罪人者恐公所用别有据也雖有不逮驅騑騑詩四牡騑騑注行不正之皃或採于薄叢薄也漁于磯音幾磧也服役不辱言不譏從我荆州來京畿離其母妻絶因依嗟我道不能自肥道不或作不道非是子雖勤苦終何希王都觀音貫闕􅀟巍巍騰蹋衆駿事鞍鞿佩服上色紫與緋獨子之節可嗟唏与敎同哀而不泣母附書至妻􅀉衣開書柝衣淚痕晞開書折衣或作開緘發封淚痕方作痕淚非是雖不勑還情庶幾朝暮盤羞惻庭闈幽房無人感伊威尔雅委䑕也詩伊威在室人生此難餘可祈子去矣時若發機矣或作呉非是句法見上張文潜􅀃蜃沈海底氣昇霏彩雉野伏朝扇翬音揮五采雉扇或作羽非是盖宫扇以雉尾為之翬文彩皃此言雉伏於野而其羽可用為朝廷之儀与上下二句為一􅀋也處子窈窕王所妃蜃沈止所妃此二句君子不患人不我知之意苟有令德隱不腓下音肥孫曰百卉貝腓腓病也言苟有令德雖在􅀮約不以為病況今天子鋪德威鋪或作輔非是蔽能者誅薦受禨音幾祥也出送撫背我涕揮行行正直愼脂韋楚辝如脂如韋注脂韋柔弱皃業成志樹來頎頎音祈祝曰詩碩人頎頎言儀表長䴡絞好頎頎然我當爲子言天扉三星行三星斗牛箕洪曰三星行剥琢行皆元和􅀄召為囯子博士時作樊曰蘇内翰云吾平生遭口語无数盖生时与退之相似吾命在牛斗間而身宫亦在箕故其詩曰我生之辰月􅀫􅀯斗且曰无善名以聞无􅁖声以攘今謗吾者或云死或云仙退之之言良非虚耳我生之辰方从閤本之下有三字云請斗牛与箕也今按辰時也詩云我辰安在方􅀃非是月􅀫南斗牛奮其角箕張其口牛不見服箱詩記注服駕也箱車箱也兩較之内謂之箱是車内容物之処服箱猶言駕車也斗不挹酒漿箕獨有神靈無時停簸􅀭無善名巳聞無惡聲巳讙諸本巳並作以方从唐閤本云讙如諸將尽讙之讙此詩叶餘於除叶讙於聞今本易讙爲攘以求叶揚韻非也名聲相乘音䋲􅀘注曆象有増减率遟速積故有乗除之法除得失少有餘三星各在天什伍東西陳嗟汝牛與斗汝獨不能神剥啄行剥剥啄啄有客至門我不出應客去而嗔從者語我子胡爲然我不厭客困于語言諸本此下有我嗟子誠一語閤本同方从唐杭蜀本删去閤本衍盖下語誤入欲不出納以堙其源空堂幽幽有秸音戞秸稾書三百里納秸服有莞音丸又九还切蒲也秸莞所以爲席詩下莞上簟門以兩板叢書於閒窅窅音窈深皃深塹其墉甚完墉或作容非是彼謂塹与墉寕可隳此謂堂也不可干從者語我嗟子誠難子雖云爾其口益蕃益或作實口益或作益實我爲子謀有萬其全凡今之人急名與官子不引去與爲波瀾与方作以云韓文与多作以他文見者非一詩之子帰不我以注以猶与也今按陸宣公奏議亦然如云未審云云以否之􅀋是也然當作与爲正雖不開口雖不開関變化咀嚼有􅀑有神今去不勇其如後艱我謝再拜汝無復云往追不及來不有年諸本作來可待焉方从閤杭蜀本云公􅀕十二兄文其不有年以􅀘我愆同此義也青青水中蒲三首諸本作一首方从閤本今按楽府亦作三首青青水中蒲下有一􅀟魚君今上隴去我在與誰居青青水中蒲長在水中居􅀉語浮萍草相隨我不如青青水中蒲葉短不出水婦人不下堂行子在萬里孟東野失子并序黃魯直甞書此詩遺石君美君美失子云時以觀覧可用乱思而紓哀究􅀚物理其實如此太槩因果耳退之救丗弊故併因果而言然此一叚文意乃是􅄺盤中佛語退之甞言不能无所不讀未有能為大儒者其弗信矣乎魯直所云如此東野連産三子不數日輒失之幾老念無後以悲其友人昌􅀺韓愈懼其傷也推天假其命以喻之失子將何􅀹吾將上尤天女實主下人與奪一何偏何或作以方云莊子等彼与此一何偏也彼於女何有乃令蕃且延蕃或作繁此獨何罪辜生死旬日閒上呼無時聞滴地淚到泉地祇爲之悲瑟縮乆不安乃呼大靈􅀛􅀐雲欵叩也天門問天主下人薄厚胡不均天曰天地人由來不相関吾懸日與月吾繫星與辰日月相噬囓星辰踣音匐唐志曰踣顛仆也而顚吾不女之罪知非女由因因或作縁方云此詩如因与鰥今本皆以韻不叶而誤刋也今按作縁亦通未必誤改也且物各有分孰能使之然有子與無子禍福未可原魚子滿母腹或作肚一一欲誰憐細腰不自乳舉族長􅀌鰥或作懸鴟梟啄母腦母死子始翻或作蕃蝮蛇上音覆孫曰細腰滿盧也蜂属无雌雄取桑虫或阜䘇子抱成巳子注曰梟一名鴟亦名流離食母許愼曰梟不孝鳥也祝曰蝮一名虺毒蛇也螫手則斷生子時坼裂腸與肝好子雖云好未還恩與勤惡子不可􅀃鴟梟蝮蛇然有子且勿喜無子固勿歎上聖不待教賢聞語而遷下愚聞語惑雖敎無由悛大靈頓頭受即日以命還地祇謂大靈女往告其人東野夜得夢有夫玄衣巾孫曰玄夫大靈􅀛以其巾衣玄故曰玄夫􅀛一名玄衣督郵史記􅀛䇿傳宋元王夢一大夫衣玄繡之衣而乗輜車闖丑禁切馬出門皃然入其户三稱天之言再拜謝玄夫収悲以歡忻陸渾山火和皇甫湜用其韻諸本作次韻和皇甫湜陸渾山火方从閤杭蜀本皇甫湜字持正睦州新安人爲陸渾尉洪曰一作次韵非是刘貢父云唐人􅆳和詩有次韵依其次用韵用波之韻不必次之退之和陸渾山火是也皇甫􅀘官古賁渾賁或作陸方从杭蜀本云賁音陸字本公羊傳時當玄冬澤乾源玄或作大山在谷狠相吐吞風怒不休何軒軒擺磨出火以自燔有聲夜中驚莫原天跳地踔救教切祝曰後漢踔宇宙而遺俗注猶越也孫曰跳踔皆震動之皃顚乾坤赫赫上照窮崖垠截然髙周燒四垣神焦􅀑爛無逃門三光弛隳不復或作暇暾他昆切日出皃祝曰楚辝暾將出􅀆東方虎熊麋豬逮猴猿水龍鼉音駝祝曰􅀋魚有足皮可以冒鼓􅀛魚與黿音元似鼈而形大鴉鴟一名鳶鵰鷹雉或作鴈鹰鵠鵾似雞三足而大選鴐鵝鴻鵾燖徐塩切湯中爚肉也儀礼推燖者有膚炰音庖含毛炙物詩毛炰胾羮煨烏恢切􅀘注筆墨間録上句正柏梁躰後山作七字詩上東坡襲此躰􅠉孰飛奔􅠉於刀切埋物􅁅中令熟也方作爊非是孰一作熟祝融顓頊氏有子曰􅀺為火官火行於冬猶祝融告休而帰也告休酌卑尊錯陳齊玫闢華園玫或作收非是洪曰謂火斉玫瑰也闢或作闡芙蓉披猖塞鮮繁千鐘萬鼓咽耳喧攅雜啾嚄上即由切下胡伯切樊曰雜乱声廣韵啾唧小声嚄噴大喚自山狂谷狠下言火之盛如此神􅀑焦爛三光不暾鳥獸為炮燖祝融之神所以錯陳斉玫張鍾鼓塤箎而御之也沸篪塤沸或作咈非是􅊮幢絳􅏧紫纛旛旛或作番炎官熱屬朱􅃣褌音昆祝曰親身裳前漢相如目著犢鼻禈髹音休漆赤多黒少選列髹彤之繡桷其肉皮通䏶音陛臀方云祝季賔謂䏶當作䯗按䏶从肉从骨一也刘備髀中肉消亦通用頺胷垤腹車掀音軒祝曰手㪯物也左氏乃掀公以出於淖轅或作轅掀緹音提祝曰赤色也周礼赤緹用羊顔靺莫拜切祝曰赤韋也詩云韎韐有奭股豹兩鞬居言切孫曰馬上盛弓矢器以豹皮爲之董卓有力過人双帶两鞬左右馳射霞車虹蚓虹或作紅非是蚓音胤引索日轂轓音蕃車大箱也丹㽔縓七絹切祝曰縓絳色尓雅一染謂之縓蓋緋繙廣䪨風吹旗皃㠾音鴛孫曰繙㠾乱皃紅帷赤幕羅脤膰上音蜃下符爰切韓曰脤膰􅀕肉也􅎺池波風肉陵屯􅎺音荒韓曰血也左氏士刲羊亦无􅎺也陵或作陵洪曰陵屯字見莊子當从陵樊澤之曰􅎺若池波若風肉若陵屯方云􅎺如他而波風肉如陵之屯聚也今按列子生於陵屯注謂髙處莊子音義云阜也洪􅀃得之樊􅀃􅎺池肉陵屯方􅀃波風皆得之而樊􅀃波如風方􅀃肉如陵之屯聚則誤矣合二􅀃而言之曰如􅎺池之波風肉之陵屯乃為善耳谽呀鉅壑頗黎盆谽或作豁方云大皃字見上林賦少陵詩亦有餘光散谽呀呀虚加切孫曰鉅壑谽呀狀如頗黎盆也頗􅀺西囯赤玉名今按漢書注谽呀澗谷形容也豆登孫曰木豆謂之豆瓦豆謂之登豆登五山者以五岳為豆登瀛四樽者以四瀆為酒樽也樊曰自􅊮憧以下皆言祝融御火其車御飲食之盛如此五山瀛四罇熈熈釂醻釂子肖切飲尽謂之釂礼記長者㪯未釂少者不敢飲醻与酧同主人進客曰醻􅀏語言雷公擘山海水翻齒牙嚼齧舌腭反腭音咢冝作齶口中齗也出字􅀃反音翻電光䃸磹上先念切下徒念切電光也赬目䁔音暄大目頊􅁳月令冬其帝顓頊其神玄􅄀水神也収威避玄根或謂水隂根陽火也斥棄輿馬背厥孫洪曰水生木木生火水之於火猶祖視孫也縮身潜喘拳肩跟音根足踵祝曰選突到投而跟絓君臣謂頊㝠也相憐加愛恩命黒螭偵音檉又丑鄭切伺也問也焚其元首也謂為火焚天􅀜悠悠不可援音􅀽援引夢通上帝血面論樊曰詩意謂火旣用事則頊冝黒精之君玄􅁳水官之臣當縮身潜喘而君臣乃命黒螭問其事於祝融而火焚其首黒螭所以血面而訴於上帝也側身欲進叱於閽帝賜九河湔音煎洗也祝曰手澣之也涕㾗涕或作淚又詔巫陽宋玉招魂云帝告巫陽曰有人在下我欲輔之魂魄离散汝筮与之注巫陽天帝女也反其魂徐命之前問何􅁈火行於冬古所存我如禁之絶其飱一作餐飲食也帝告黒螭云然女丁婦壬傳丗婚杭本女作夫方云董彦逺日當作女丁夫壬引東山少連曰玄􅁳之子曰壬夫娶祝融氏之女曰丁芊俱斈水仙是為温泉之神洪曰丁火也壬水也火女也水男也丁女而為婦於壬故曰女丁婦壬一作夫丁婦壬亦通夫丁者壬也言壬為丁夫也婦壬者丁也言丁為壬婦也今按丁為陽中之隂壬為隂中之陽故言女之丁者為婦於壬以見水火之相配今術家亦言丁与壬合洪氏二􅀃皆是一朝結讎柰後昆時行當反愼藏蹲音存踞也左氏蹲甲而射之視桃著花韓曰月令仲春始雨水桃始華漢書云來春桃花水盛可小騫音愆􅃜少一作騫月及申酉利復怨音􅁈祝曰古楽府空􅀒百年怨孫曰申七月酉八月水生於申火死於酉此玄􅄀復怨之时助汝五龍從九鯤溺厥邑囚之崑崙之或作出河水所自出皇甫作詩止睡昏樊曰從公斈文者多矣惟李翶習之得公之正皇甫提特正得公之竒持正甞語人曰書之文不竒易可謂竒矣豈礙理傷聖乎如龍􅀾于野其血玄黄見豕􅀒途載􅀑一車突如其來如焚如死如棄如何等語也今此詩黒螭五龍九鴡等語其与易龍􅀾于野何異韓曰詳此詩始則言火势之盛次則言祝融之御火其下則水火相尅相済之􅀃也辭誇出眞遂上焚要余和増怪又煩雖欲悔舌不可捫音門抚持縣齋讀書出宰山水縣讀書松桂林桂或作竹方云舊本多作竹桂蕭條􅂢末事邂逅得􅀄心哀狖音柚獸名如猿醒俗耳清泉㓗塵襟詩成有共賦共方作与非是酒熟無􅀌斟樊曰在湯山作也公甞曰陽山天下之窮処又曰縣郭无居民官无丞尉小吏十餘家審此則有共賦无􅀌斟其孰与楽此乎及觀公集區􅁽區弘竇存亮刘師命軰皆自逺方來从公則外户之屦蒲矣青竹時黙釣白雲日幽尋南方本多毒北客􅁪懼侵讁譴甘自守滯留愧難任投章􅀋縞帶縞素也孫曰左氏傳呉季札聘于鄭見子産与之縞帶子産亦献紵衣焉呉貴縞鄭貴紵各一献所貴也佇答此詩當是隨与交朋望其報章也逾兼金答或作益非是孫曰價倍於常謂之兼金韓曰選雜体詩承榮重兼金廵華過盈瑱新竹筍􅄈南堦竹日日成清閟縹普召切青黄色節巳儲霜儲或作除黄苞猶揜翠出欄抽五六當户羅三四髙標陵秋嚴貞色奪春媚稀生巧􅀘林併出疑爭地疑爭或作全遮縱横乍依行爛漫忽無次風枝未飄吹露粉先涵淚露或作霧何人可㰎翫清景空瞪宅耕切直視又登􅀿切選偃仰瞪盻視晚菊少年飲酒時踊躍見菊花今來不復飲毎見􅁪咨嗟佇立摘滿手行行把歸家此時無與語棄置柰悲何奈悲方作悲奈落齒去年落一牙今年落一齒俄然落六七落􅀔殊未巳餘存皆動揺存或作在盡落應始止憶􅀄落一時但念豁可恥及至落二三始憂衰即死毎一將落時懔懔􅁪在巳义牙妨食物顚倒怯漱水終焉捨我落意與崩山比与或作欲今來落旣熟見落空相似餘存二十餘次第知落矣儻常歳落一或作一落自足支兩紀如其落併空與漸亦同指人言齒之落壽命理難恃我言生有涯長短俱死爾人言齒之豁左右驚諦視我言莊周云木鴈各有喜語訛黙固好嚼廢軟還美因歌遂成詩時用詫妻子哭楊兵部凝陸歙州參部或作曹人皆期七十皆或作生􅂊半豈蹉跎併出知巳淚併或作数自然白髮多晨興爲誰慟還坐乆滂沱論文與晤語或作新墳与􅀫草巳矣可如何可或作鬲或作復苦寒此詩意盖有所諷德宗正元十九年春公爲四門博士作四時各平分一氣不可兼隆寒奪春序顓頊固不廉太昊弛維綱或作施網維非是畏避但守謙遂令黄泉下萌牙夭勾尖草木不復抽百味失苦甜凶飈攪宇宙攪或作擾鋩刃甚割砭悲廉切日月雖云尊不能活烏蟾羲和韓曰廣雅日御也孫云山海經云東南海之外甘泉之間有羲和囯有女子曰羲和是生十日爲帝悅妻常浴日於甘泉送日出恇音匡亦怯也怯頻窺覘痴廉切窺視頻或作煩炎帝持祝融呵嘘不相炎而我當此時恩光何由沾肌膚生鱗甲衣􅀍如刀鐮音廉列子擁鐮帶索氣寒鼻莫齅血凍指不拈濁醪沸入喉口角如銜箝音黔馬口中鐡將持􅎅著食觸指如排籖音僉祝曰銳也選雞人司漏傳更籖侵鑪不覺暖熾炭屢巳添巳或作以探湯無所益何况纊與縑虎豹僵穴中蛟螭死幽潜熒惑䘮􅄤次六龍孫曰六龍曰御也冰脫髯芒碭下音宕又一作踢非是大包内生􅀋恐盡殱啾啾䆫間雀不知已微纎舉頭仰夭鳴所願晷刻淹不如彈射死却得親炰燖鸞皇苟不存爾固不在占其餘蠢動儔俱死誰恩嫌恩或作思伊我稱最靈不能女覆苫女覆諸本皆作安寑方从唐本及蔡謝校本云韓文古本汝皆作女杭本尚作女今訛自閤本也女指上文禽雀而言苫蓋也言我最靈而下能汝覆盖也義為是祝曰凶服者以苫為覆悲哀激憤歎五藏難安恬難或作誰非是中宵􅀝牆立淫淚何漸漸天王哀無辜王或作子或作公惠我下顧瞻褰旒去耳纊音曠塞耳調和進梅鹽賢能日登御黜彼傲與憸生風吹死氣豁逹如褰簾懸乳零落墮晨光入前簷雪霜頓銷釋土脉膏且黏豈徒蘭蕙榮施及艾與蒹日萼孫曰日照花萼鐐鑠鮮明皃行鑠鑠風條坐䄡䄡處占切揺動皃祝曰相如日㪯惟幄之䄡䄡荀子是䄡䄡者何也楚辝張絳帷以䄡䄡天乎苟其能吾死意亦厭和虞部盧四汀酬翰林錢七徽赤藤杖歌諸本无四七字方从閤蜀本仍側注二名赤藤爲杖丗未窺臺郎尚書郎也篇末南宮清深禁闈密孫曰南宮謂虞部禁闈謂翰林始􅂝自滇池囯名樊曰前漢西南夷傳夜郞最大其西滇也方三百里滇王掃宫避使者避或作迎或作邀方云當如避道之避今按上言掃宫則當為避􅃕之避跪進再拜語嗢咿上乙骨切下音伊夷語也􅀃文嗢咽也咿字林内悲也繩橋韓曰以竹索為橋也竹索曰笮西南夷尋之以度水拄過免傾墮性命造次􅀩扶持途經百國皆莫識君臣聚觀逐旌麾共傳滇神出水獻赤龍拔鬚血淋漓又云羲和操火鞭暝到西極睡所遺幾重包裹自題署不以珍怪誇荒夷歸來捧贈同舎子浮光照手欲把疑諸本同方獨从蜀本作照把欲手疑云擅弓有手弓列子有手劒史記有手旗義同此諸本多誤今按方􅀃手義固為有據然諸本云照手欲把則是未把之時光巳照手故欲把而疑之也今云照把則是巳把之矣又欲手之而復疑之何耶况公之詩衝口而出自然竒偉豈必﨑嶇偪反假此一字而后為工乎大抵方意專主竒澁故其所取多􅀋此空堂晝眠􅀝牖户飛電著壁孫曰以杖􅀝户牖飛電誤以為蛟螭而捜索之言其色赤也補注東坡鐡拄杖詩也谷笻竹杖賛皆用此詩搜蛟螭南宫清深禁闈密闈或作圍方云南宮指盧禁闈指錢也白楽天詩遽列謙垣升禁闈洪引繚繞宮牆圍禁林以釋此誤又閤本密作客亦非是唱和有􅀋吹塤篪妍辭麗句不可繼見􅀉聊且慰分司公時分司東都崔十六少府攝伊陽以詩及書見投因酬三十韻酬下或无三十韻字而有之字崔君􅀄來時相識頗未慣但聞赤縣尉不比􅀶士慢賃屋得連牆得或作往往來忻莫間我時亦新居觸事苦難辦􅂼飱要同喫諸本飱多作餐方从蜀本云此詩用􅂼飱朝餐字多相亂他詩亦然􅀃文飱謂晡時食餐吞也飱或作飡餐或作湌故字多相亂漢髙后紀賜餐錢王莽傳設飱粥顔師古曰古餐食字也又曰飱古飱字而皆以千安切讀之則非詩不素飱􅀆鄭玄讀如魚飱之飱音孫當以此為正今按飱或當作餐􅀃見平淮西碑破襖請來綻􅀘縫也祝曰古楽府新衣誰當補故衣誰當綻謂言安堵後貸借音迹更何患不知􅀌遺多舉族仰薄宦有時未朝餐得米日巳晏隔墻聞讙呼衆口極鵝鴈前計頓􅆾張居然見眞贗僞物字亦作鴈韓非子􅀃林斉伐魯索䜛鼎魯以其鴈往斉人曰鴈也魯人曰眞也又温公考異宋太宗泰始元年華願兒言於廢帝曰官爲鴈天子嬌兒好眉眼袴脚凍兩于下晏切骨脛骨捧書隨諸兄累累力追切兩角丱古患切揔角兩角或作角尚或作角两冬惟茹寒韲秋始識􅀲瓣問之不言􅏇飫若厭芻豢才名三十年乆合居給諌白頭趨走裏閉口絶謗訕府公河南尹鄭餘慶也舊同􅂁拔擢宰山澗􅀉詩雜詼俳歩皆切戯也有􅀋􅀃鵬鷃上言酒味酸冬衣竟未擐音患祝曰左氏躬擐甲胄衣或作裘下言人吏稀惟足彪與虥下士限切孫曰彪虎文虥虎之淺毛者祝曰尓雅虎竊毛謂之貓注竊淺也又言致豬鹿此語乃善幻善方作是今按漢書西域傳有善眩之語顔注云眩讀与幻同眩相詐惑也即今吞刀吐火植􅀲種樹屠人截馬之術韓公盖用此語方从閤本誤矣三年國子師腸肚習藜莧侯襇切菜也習或作集非是况住洛之涯魴音房江東呼爲鯿鱒才本切似鯶而鱗細韓曰詩九罭之魚鱒魴言大魚也可罩汕上都教切下音訕詩南有嘉魚注􅇁􅇁籗取魚之器仙仙摷今之撩􅅈也尓雅巢謂之仙籗謂之􅇁肯效屠門嚼孫曰亘譚新論曰人聞長安楽則出門西向而􅀏知肉味美則對屠門而大爵曹子建書曰過屠門而大嚼雖不得肉貴且快意乆嫌弋者􅆲􅆲或作纂非是方云􅆲見楊子鴻飛冥二弋人何􅆲焉古本及後漢書皆然盖􅆲取之義也然今本楊子亦作慕非也謀拙日焦拳活計似鋤剗方云本或作鏟謂削平之也選海賦鏟臨崖之阜公此詩用今韻剗属上声疑當以鏟為正男寒澁詩書妻瘦剰腰襻普患切衣襻也又衣系也周庾信鑑賦裙斜假襻妻或作女爲官不事職厥罪在欺謾或作慢方云字見禹貢傳漢書面謾亦皆音慢行當自劾去漁釣老葭薍五患切尓雅葭蘆菼亂注蘆葦也菼􅯈似葦而小歳窮寒氣驕冰雪滑磴棧上諌切木道音問難屢通何由覿清盼或作盻方云李大白詩君子枉清盻詩美目盼􅀆以目美言也左顧右盻以眄視言也盻本作盼眄通作盻今四字多不分當以蜀本為正今按盼匹莧切目黒白分也眄莫見切从省作䀎眄睞顧視也盻五礼切見孟子恨視也此詩當作眄然作盼亦通猶言青眼也送侯參謀赴河中幕侯繼時從王鍔辟憶昔􅀄及第各以少年稱君頥始生鬚我齒清如氷爾時心氣壯百事謂已能方云用中庸人一能之巳百之之語別本作巳者非一别詎幾何詎或作遽或作距方云字林曰詎未知詞也潘岳悼亡詩尔􅀕詎幾時忽如隔晨興我齒豁可鄙君顔老可憎相逢風塵中相視迭嗟矜幸同學省官末路再得朋東司絶教授遊宴以爲􅁪胡登切常也秋漁䕃密樹夜博然収績開史牒翰飛上音寒羽也詩翰飛戾天逐溟鵬男兒貴立事流景不可乗歳老隂沴音戾妖氣作雲頽雪翻崩别䄂拂落水征車轉崤音爻左氏傳崤有二陵焉陵勤勤酒不進勉勉恨巳仍送君出門歸愁腸若牽繩黙坐念語􅀏癡如遇寒蠅䇿馬誰可適晤言誰爲應音膺當也席塵惜不掃或作拂殘罇對空凝對或作醑非是信知後㑹時日月屢環絙下居登切環循環絙大索又急也生期理行役歡緒絶難承􅀉書惟在頻無恡簡與繒竹帛也東都遇春少年氣眞狂眞方作直有意與春競行逢二三月九州花相映川原曉服鮮桃李晨糚靚疾政切或作靘靘青黒色方云靚莊字見子虚賦郭璞曰粉白黛黒也荒乗不知疲醉死豈辭病飲噉徒感切或作嘬惟所便平声文章􅀝豪横爾來曾幾時白髮忽滿鏡舊遊喜乖張新軰足嘲評音病評量心腸一變化腸或作腹羞見時節盛得閑無所作貴欲辭視聽深居疑避仇黙卧如當暝朝曦入牖來鳥喚昏不醒鳥一作烏爲生鄙計筭鹽米告屢罄告屡或作屡告坐疲都忘音望起冠側􅂴復正幸􅀩東都官獲離機與穽乖慵遭傲僻漸染生避性旣去焉能追有來猶莫聘有船魏王池池名在長安洪曰河南志云洛水經尚善旌盖二坊之北南益為池深處至数頃水鳥洋泳荷芰翻覆為都城之勝正􅀚中以賜魏王泰故號魏王池往往縱􅀌泳縱或作從或作泛水容與天色此處皆緑浄此或作比岸樹共紛披渚牙相緯經音徑懷歸苦不果即事取幽迸取或作最貪求匪名利所得亦巳併巳或作以悠悠度朝昏落落􅂢季孟落落或作落魄非是羣公一何賢上戴天子聖謀謨収禹績或作跡四面出雄勁轉輸非不勤稽逋有軍令在庭百執事奉職各祗敬我獨胡爲哉胡一作何坐與億兆慶譬如籠中鳥仰給活性命爲詩告友生􅀒愧終究竟感春五首分司東都作辛夷洪曰辛夷樹髙数丈江南地煖正月開北地寒二月開􅀄發如筆北人呼為木筆其花最早南人呼為迎春苕溪漁􅀮曰木筆迎春自是两種木筆色紫叢生二月方開迎春白色髙樹立春巳開然則辛夷乃此花耳髙花最先開髙花或作花髙方云以未章辛夷花房忽全開言之則此爲髙處之花先開矣何遜詩有岩樹落髙花青天露坐始此廻巳呼孺人戞音秸篨之也礼大夫妻曰孺人韓曰選恨賦左對孺人右顧稚子鳴瑟更遣稚子傳清盃選壯軍興不爲用坐狂朝論無由陪如今到死得閑處還有詩賦歌康哉洛陽東風幾時來川波岸柳春全廻宫門一鎻不復啓唐都長安以洛爲東都故有宮門一鎻之句宫門不啓故九陌无往來之塵埃也雖有九陌無塵埃䇿馬上橋朝日出樓閣赤白正崔嵬􅀌吟屢闋莫與和寸恨至短誰能裁春田可耕時巳催王師北討何當廻放車載草農事濟車或作軍非是戰馬苦飢誰念哉蔡州納節舊將死是年彰義節度呉少誠卒起居諌議孫曰裴度以河南府功曹召爲起居舎人孟簡孔戣皆為諌議大夫聮翩來朝廷未省有遺䇿肯不垂意缾與罍孫曰公以自喻也前隨社尹杜兼拜表廻􅀏言溢口何歡咍呼來切􅀏也孔丞孔戡别我適臨汝風骨峭峻遺塵埃峭峻或作峭峭音容不接祗隔夜凶計詎可相尋來天公髙居􅀑神惡欲保性命誠難哉辛夷花房忽全開韓曰未篇言辛夷花之盛如此元微之有問韓貟外求辛夷花詩韓貟外家好辛夷開時乞取两三枝折枝為贈君莫惜縱君不折風亦吹豈此耶將衰正盛須頻來須頻或作頻頻非是清晨輝輝燭霞日薄暮耿耿和煙埃朝明夕暗巳足歎况乃滿地成摧頽迎繁送謝别有意誰肯留念少環廻酬裴十六功曹廵府西驛塗中見􅀉或无􅂗字方云裴十六度也舊云裴諗非度時為河南府功曹公時分同東都相公鄭餘慶也時元和元年罷相出為河南尹罷論道聿至活東人至方作來活或作治非是御史裴度也時度為監察御史宻䟽論􅁠倖忤㫖出為河南府功曹坐言事作吏府中塵遂令河南治今古無儔倫四海日富庶道途隘蹄輪府西三百里候舘亭驛孫曰周礼五十里有市有候館所以候賔客之館同魚鱗相公謂御史勞子去自廵是時山水秋光景何鮮新哀鴻鳴清耳􅀫霧褰猶開也髙旻褰或作浥非是遺我行旅詩軒軒有風神譬如黄金盤照耀荆璞眞我來亦巳幸事賢友其仁事賢謂餘􅂟友仁謂裴度持竿洛水側􅀌坐屢窮辰多才自勞苦方作苦勞云苦勞語見吕強傳今按語势當作勞苦大抵公詩多自胷􅁭流出未必故用古人語也無用祗因循多才謂裴度无用公自謂辭免期匪逺行行及山春燕河南府秀才得生字時元和五年冬房式尹東京公為河南令權德輿為相吾皇紹祖烈天下再太平詔下諸郡國歳貢郷曲英元和五年冬房公尹東京功曹上言公或作上其言是月當登名月或作日非是乃選二十縣試官得鴻生碩儒也羣儒􅀒巳材相賀簡擇精怒起簸羽翮引吭下浪切又音杭咽也選引圎吭之纎婉吐鏗轟此都自周公文章􅁇名聲章一作物自非絶殊􅀹難使耳目驚今者遭震薄不能出聲鳴鄙夫忝縣尹愧慄難爲情惟求文章寫不敢妬與爭還家勑妻兒具此煎炰烹柿紅蒲萄紫肴果相扶檠或作擎芳荼茶也茶之嫩者雀舌鳥觜夌顆皆出蜀中張孟陽登成都楼詩芳荼冠六州出蜀門諸本荼多作茶方从潮館本云尓雅曰檟苦荼音徒郭璞注木小似栀子早取者為茶晚取者為茗唐韻茶宅加反俗作茶大抵茶与荼古音相近如今言搽与塗亦通用也今按茶与荼今人語不相近而方云相近者莆田語音然也雖出俚俗亦由音本相近故与古暗合耳今建人謂口為苦走為祖亦此􅀋方言多如此云好酒濃且清何能充歡燕庶以露厥誠昨聞詔書下方作來權公作􅀖禎音貞祥也文人得其職文一作大一作丈文道當大行隂氣攪短日冷雨澁不晴勉哉戒徒馭家國遲音治待也子榮送李翶翶字習之隴西人娶公兄弇之女楊於陵為廣州刺史表翺佐其府廣州萬里途山重江逶迤行行何時到誰能定歸期揖我出門去顔色異􅁪時雖云有追送或作迎送方云詩有客薄言追之鄭云追送也足跡歷余所經悠悠子當返􅀌游懷耿介旅􅀫夢婉娩宛晩二音媚也風土稍殊音魚蝦日異飯親交俱在此誰與同息偃朱文公校昌􅀺先生集卷之四
