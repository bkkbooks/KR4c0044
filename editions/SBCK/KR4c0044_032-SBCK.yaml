front:
  text: 朱文公校昌􅀺先生集卷之三十二考異音釋附
  hash: sha256:00f5b9f572e0d6279685dc698dfb43e216c016f22c9b351e491c4b4f2fa019d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_032-1a}
body:
  text: 碑誌司徒兼侍中中書令贈太尉許國公神道碑銘韓􅁎姓以國氏國下或有爲字今按以囯氏春秋傳語其先有自潁川徙陽夏者其地於今爲陳之太康太康之韓其稱蓋乆然自公始大著公諱弘公之父曰海爲人魁偉沈塞以武勇游仕許汴之間寡言自可不與人交衆推以爲鉅人長者交或作校方云以上文自可言之作不与人交爲是今以下文長者言之又似作不与人校爲是更詳之鉅上方无爲字或无以鉅人三字而爲上有之字或併無以爲鉅人四字官至游擊將軍贈太師娶郷邑劉氏女生公是爲齊國太夫人夫人之兄曰司徒玄佐有功建中貞元之間􅃨出夫人字或作斉囯功下或有於字爲宣武軍帥有汴宋亳潁四州之地兵士十萬人公少依舅氏讀書習􅀐射事親孝謹偘偘自將不縱爲子弟華靡遨放事偘偘或作侃侃字与偘同縱或作從出入敬恭軍中皆目之嘗一抵京師就明經試退曰此不足發名成業復去從舅氏學將兵數百人悉識其材鄙怯勇指付必堪其事司徒歎竒之兵下或有將字士卒屬之欲切心諸老將皆自以爲不及方无皆字司徒卒去爲宋南城將比六七歳汴軍連亂不定貞元十五年劉逸淮死軍中皆曰此軍司徒所樹必擇其骨肉爲士卒所慕頼者付之肉下或有而字今見在人莫如韓甥且其功最大而材又俊即柄授之而請之於天子天子以爲然遂自大理評事拜工部尚書代逸淮爲宣武軍節度使悉有其舅司徒之兵與地其舅或作舅氏當此時陳許帥曲環死而呉少誠反方无而字自將圍許求援於逸淮㗖之以陳歸汴使數輩在館公悉驅出斬之選卒三千人㑹諸軍擊少誠許下少誠失􅀔以走河南無事公曰自吾舅殁五亂於汴者吾苗薅樊曰淮南子云聖人之用兵也櫛髮媷苗所去者少而所利者多而髪櫛之幾盡然不一揃刈不足令震駴方云我即東兵以取曹師道懼不敢動弘正以濟兵以或作以兵非是誅呉元濟也命公都統諸軍曰無自行以遏北冦公請使子公武以兵萬三千人㑹討蔡下歸財與糧以濟諸軍卒擒蔡姦三千淮西碑作二千於是以公爲侍中而以公武爲鄜坊丹延節度使師道之誅公以兵東下進圍考城克之遂進迫曹曹冦乞降鄆部旣平公曰吾無事於此其朝京師天子曰大臣不可以暑行其秋之待公曰君爲仁臣爲恭可矣遂行旣至獻馬三千匹絹五十萬匹他錦紈綺纈又三萬金銀器千而汴之庫廐錢以貫數者尚餘百萬絹亦合百餘萬匹馬七千糧三百萬斛兵械多至不可數五十或作七千􅀄公有汴承五亂之後掠賞之餘且歛且給􅁪無􅀫儲至是公私充塞至於露積下子智切王幹秩俸布帛皆露積腐爛不垣􅀄公下或有之字无上或无􅁪字􅁽拜司徒兼中書令進見上殿拜跪給扶賛元經體不治細微天子敬之元下或有老字非是元和十五年今天子即位公爲􅃁宰又除河中節度使在鎮三年以疾乞歸復拜司徒中書令病不能朝以長慶二年十二月三日薨於永崇里第年五十八天子爲之罷朝三日贈太尉賜布粟年五十八或作年八十方考新舊史定从今本方无天子爲之四字布粟或作布帛方云按舊史实賜米千石其葬物有司官給之京兆尹監護明年七月某日葬于萬年縣少陵原京城東南三十里楚國夫人翟氏祔子男二人長曰肅元某官次曰公武某官肅元早死公之將薨公武暴病先卒公哀傷之月餘遂薨無子以公武子孫紹宗爲主後汴之南則蔡北則鄆二冦患公居閒爲巳不利卑身佞辭求與公好薦女請昏使日月至旣不可得則飛謀釣謗以閒染我公先事候情壞其機牙姦不得發卑或作畢至旣方作旣至非是不可下或无得字釣或作鈞染或作諜先事候情或作先得事情候或作後王誅以成最功定次孰與髙下公子公武與公一時俱授弓􅃏處藩爲將疆土相望公武以母憂去鎭公母弟充自金吾代將渭北公以司徒中書令治蒲于時弟充自鄭滑節度平宣武之亂以司空居汴自唐以來莫與爲比公之爲治嚴不爲煩止除害本不多敎條與人必信吏得其職賦入無所漏失人安樂之在所以冨公與人有畛域不爲戯狎人得一􅀏語重於金帛之賜畛或作軫非是其罪殺人不發聲色問法何如不自爲輕重故無敢犯者或无自爲字非是其銘曰在貞元丗汴兵五猘居例切祝曰猘狂犬也自刘元佐死汴州五乱將得其人衆乃一愒丘例切祝曰愒息也与憇同詩不尚愒焉其人爲誰韓姓許公磔其梟狼養以雨風桑􅂖􅁬張厥壤大豐貞元元孫命正我宇公爲臣宗處得地所河流兩壖盗連爲羣雄唱雌和首尾一身公居其間爲帝督姦察其嚬呻與其睨眴上音詣下音荀祝曰眩也又目動貌淮南子視焉无眴邪視出左顧失視右顧而跽巨几切蔡先鄆鉏三年而墟槁乾四呼終莫敢濡常山成德軍幽都幽州孰陪孰扶陪或作悖或作􅀝天施不留其討不逋許公預焉其賚何如賚或作頼悠悠四方旣廣旣長無有外事朝廷之治許公來朝車馬干戈相乎將乎威儀之多將則是矣相則三公釋師十萬歸居廟堂上之宅憂公譲太宰養安蒲坂萬􅀖絶等有弟有子提兵守藩一時三侯人莫敢扳又音班引也春秋傳扳引而立之与攀同生莫與榮殁莫與令刻文此碑以鴻厥慶柳子厚墓誌銘子厚諱宗元七丗祖􅂟爲拓跋魏侍中封濟隂公或无拓跋二字曽伯祖奭爲唐宰相與禇遂良韓瑗俱得罪武后死髙宗朝髙或作中朝或作時皇考諱鎭以事母棄太常博士求爲縣令江南其後以不能媚權貴失御史權貴人死乃復拜侍御史號爲剛直所與游皆當丗名人游上方无与字子厚少精敏無不通逹逮其父時雖少年巳自成人能取進士第嶄士咸切又士咸切選嶄絶峯殊狀注險峻皃楚辝何山石之嶄巖注石髙皃然見頭角衆謂柳氏有子矣其後以博學宏詞授集賢殿正字或作授校書郎方云柳集可考或本非是此下方有藍田尉三字今按三字下文已見不當重出儁傑廉悍議論證據今古出入經史百子今古或作古今踔敕角切前漢非有踔絶之能注髙逺也厲風發率常屈其座人名聲大振一時皆慕與之交諸公要人爭欲令出我門下交口薦譽之貞元十九年由藍田尉拜監察御史順宗即位拜禮部貟外郎遇用事者得罪例出爲刺史或作貞元十九年拜監察御史王叔文韋執誼用事拜尚書礼部貟外郎且將大用遇叔文等敗例出爲刺史今按方本得婉微之体它本則幾乎罵矣疑􅀄本直書後乃更定也􅀂从􅀄本則上文須􅀘藍田尉三字未至又例貶州司馬居閑益自刻苦務記覧爲詞章汎濫停蓄爲深博無涯涘而自肆於山水間水下或有之字元和中嘗例召至京師又偕出爲刺史而子厚得柳州旣至歎曰是豈不足爲政邪因其土俗爲設教禁州人順頼其俗以男女質錢約不時贖子本相侔則没爲奴婢子厚與設方計悉令贖歸其􅀹貧力不能者令書其傭足相當則使歸其質􅀚察使下其法於他州比一歳免而歸者且千人衡湘以南爲進士者皆以子厚爲師其經承子厚口講指畫爲文詞者悉有法度可􅀚其召至京師而復爲刺史也中山劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將拜䟽願以柳易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州白上或作上白改下或无刺字嗚呼士窮乃見節義今夫平居里巷相慕恱酒食游戯相徴逐詡詡虚甫切語也強􅀏語以相取下握手出肺肝肉示指天日涕泣誓生死不相背􅀒眞􅀂可信一旦臨小利害僅如毛髪比反眼􅀂不相識落䧟穽不一引手救反擠之又下石焉者皆是也救下或有而字此宜禽獸夷狄所不忍爲而其人自視以爲得計聞子厚之風亦可以少媿矣少上方无以字子厚前時少年勇於爲人不自貴重顧藉謂功業可立就故坐廢退旣道又無相知有氣力得位者推挽故卒死於窮裔材不爲丗用道不行於時也死或或作厄道上或或有而字使子厚在臺省時自持其身巳能如司馬刺史時亦自不斥斥時有人力能舉之且必復用不窮時有或作而有力能方作解或能下復出解字皆非是然子厚斥不乆窮不極雖有出於人其文學辭章必不能自力以致必傳於後如今無疑也力以或作以力或无致必二字皆非是雖使子厚得所願爲將相於一時以彼易此孰得孰失必有能辯之者子厚以元和十四年十一月八日卒年四十七以十五年七月十日歸葬萬年先人墓側十八日月或作十月五日七月上或有秋字或无十日字子厚有子男二人長曰周六始四歳季曰周七子厚卒乃生女子二人皆㓜其得歸葬也費皆出觀察使河東裴君行立費或作資行立有節槩立然諾下立字或作重與子厚結交子厚亦爲之盡竟頼其力葬子厚於萬年之墓者舅弟盧遵遵涿竹角切上谷有涿縣涿或作可或作為人性謹順學問不厭自子厚之斥遵從而家焉逮其死不去家下或无焉字旣往葬子厚又將經紀其家庶幾有始終者銘曰是惟子厚之室旣固旣安以利其嗣人下旣字或作且唐故昭武校尉守左金吾衛將軍李公墓誌銘公諱道古字某曹成王子其先王明以太宗子王曹絶輒復封五丗而至成王成王諱皐有功建中貞元間王諱上或无成字非是以多才能能行賞誅爲名至今追數當時内外文武大臣成王必在其間或无成王字公以進士舉及第献文輿三十卷拜校書郎集賢斈士四迁至宗正丞憲宗即位選擢宗室迁尚書司門貟外郎以選爲利隨唐睦州刺史迁少宗正元和九年以御史中丞持節鎮黔中十一年來朝迁鎮鄂州以鄂岳道兵㑹平淮西以功加御史大夫十三年徴拜宗正轉左金吾上即位以先朝時甞信妄人柳泌能燒水銀爲不死藥薦之必或作賁經云新舊史李干墓志石本皆作泌泌以故起閭閻氓爲刺史不效貶循州司馬其年九月三日以疾卒于貶所年五十三月下或有十字長慶元年詔曰左降而死者還其官以葬遂以其年某月日葬于東都某縣其年或作某年月上无某字公三娶元配韋氏諱脩脩生子紘紘爲進士斈脩方並作循斈或作㪯女貢嫁崖氏夫人隋雍州牧鄖音云公叔􅁉五丗孫父士佺蓬山令次配崔氏諱葯乙角切又音約白正其葉謂之葯生綽紹綰女㑹嫁鄭氏季毗夫人父昭嘗爲京兆尹今夫人韋氏無子父光憲光禄卿其葬用古今禮以元配韋氏夫人祔而葬次配崔氏夫人於其域異墓或无用古今礼至而葬十四字非是公宗室子生而貴富能斈問以中科取名方无生字非是善自傾下以交豪傑身死賣宅以葬銘曰太支於今其尚有封太或作本非是尚方作上當公弟兄未續又亡弟兄或作兄弟其迁于南年及始衰誰黜不復而以䘮歸誰或作雖海豊弥弥万里于畿載其始終以哀表之唐故朝散大夫尚書庫部郎中鄭君墓誌銘君諱羣字弘之丗爲滎陽人君或作公其祖於元魏時有假封㐮城公者子孫因稱以自别此下或有君其後也四字今按下文有君其季也此有則不應重出曽祖匡時晉州霍邑令祖千尋彭州九隴丞父迪鄂州唐年令娶河南獨􅀌氏女生二子君其季也以進士選以上方有君字吏部考功所試判爲上等授正字自鄠縣尉拜監察御史佐鄂岳使裴均之爲江陵以殿中侍御史佐其軍均之徴也迁虞部貟外郎之徵或作戸徵非是均鎭㐮陽復以君爲㐮府左司馬刑部貟外郎副其支度使事均卒李夷簡代之因以故職留君歳餘拜復州刺史迁祠部郎中迁上或有方字非是㑹衢州無刺史方選人君願行宰相即以君應詔方无㑹字或无方字君願行作行願者治衢五年復入爲庫部郎中行及揚州遇疾居月餘以長慶元年八月二十四日卒春秋六十或无居字即以其年十一月二十二日從葬於鄭州廣武原先人之墓次君天性和樂居家事人與待交遊􅀄持一心未嘗変節有所緩急曲直薄厚踈數也不爲翕翕􅀬亦不爲崖岸斬絶之行􅀬或作然斬或作嶄俸禄入門與其所過逢吹笙彈箏飲酒舞歌詼調醉呼連日夜不厭費盡不復顧問方无此上六字或分挈以去一無所愛惜不爲後日毫髪計留也遇其空無時客至清坐相看或竟日不能設食客主各自引退亦不爲辭謝看或作對看下方无或字與之遊者自少及老未嘗見其言色有􅀂憂歎者豈列禦㓂莊周等所謂近於道者邪其治官守身又極謹愼不挂於過差去官而人民思之身死而親故无所怨議哭之皆哀又可尚也􅀄娶吏部侍郎京兆韋肈女生二女一男長女嫁京兆韋詞次嫁蘭陵蕭儧詞或作嗣宗儧或作讃後娶河南少尹趙郡李則女生一女二男其餘男二人女四人皆㓜嗣子退思韋氏生也四或作一銘曰再鳴以文進塗闢佐三府治藹厥蹟郎官郡守愈著白官或作中洞然渾樸絶瑕謫樸或作璞甲子一終反玄宅唐故朝散大夫越州刺史薛公墓誌銘公諱戎字元夫其上祖懿爲晉安西將軍實始居河東公之四丗祖嗣汾隂公諱德儒爲隋㐮城郡書佐以卒隋上或无爲字㐮城有子二人皆貴其後皆蕃以大而其季􅀹盛官至邠州刺史邠州諱宝胤有子九人皆有名位其最季諱縑爲河南令以卒縑或作謙方云丗系表作縑河南有子四人其長諱同卒官湖州長史贈刑部尚書尚書娶呉郡陸景融女有子五人皆有名蹟其逹者四人公於倫次爲中子仁孝慈愛忠厚而好學不應徴舉沈浮閭巷間不以事自累爲貴常州刺史李衡遷江西􅀚察使曰州客至多莫賢元夫吾得與之俱足矣使下或无曰字即署公府中職公不辝譲年四十餘始脫􅄄衣爲吏衡迁給事中齊映自桂州以故相代衡爲江西公因留佐映治桂或作睦方云考傳當作桂治方作始属下文非是映卒湖南使李巽福建使柳冕交表奏公自佐詔以公與冕在冕府累迁殿中侍御史冕使公攝泉州冕文書所條下有不可者公輒正之冕惡其異於巳懷之未發也遇馬揔以鄭滑府佐忤中貴人貶爲泉州别駕冕意欲除揔附上意爲事使公按置其罪公歎曰公乃以是待我我始不願仕者正爲此耳不許冕遂大怒囚公於浮圖寺而致揔獄事聞逺近值冕亦病且死不得巳俱釋之冕死後使至奏公自副又副使事於浙東府轉侍御史元和四年徴拜尚書刑部貟外郎迁河南令歷衢湖常三州刺史所至以廉貞寛大爲稱朝廷嘉之某年拜越州刺史兼御史中丞浙東􅀚察使某年或作元和十二年正月二十二日方云前巳云元和四年此不當復出年號它銘亦无書除授月日者或本非是史下方无兼字至則悉除去煩弊儉出薄入以致和富部刺史得自爲治無所牽制四境之内竟歳無一事公篤於恩義尽用其禄以周親舊之急有餘頒施之内外親無踈逺皆家歸之疾病去官長慶元年九月庚申至於蘇州以卒春秋七十五卒上或有病字奏至天子爲之罷朝或无奏至二字贈左散􅀐常侍使臨弔􅀕之士大夫多相弔者大夫或作人以其年十一月庚申葬于河南偃師先人之兆次以韋氏夫人祔其或作明公凡再娶先夫人京兆韋氏後夫人趙郡李氏皆先卒子男二人曰沂曰洽長生九歳而㓜七歳矣沂或作泝方云丗系表作泝女四人皆巳嫁愈旣與公諸昆弟善又嘗代公令河南公之葬也故公弟集賢殿學士尚書刑部侍郎放屬余以銘故字疑當在上文公之字上刑或作兵其文曰薛氏近丗莫盛公門公倫五人咸有顯聞公之􅀄志不以事累或作不累以事僶俛以隨亦貴於位無怨無惡中以自寳或作中人以自方云此文四句一韻古音寳与壽叶寳或作貴或作實不能百年􅂚足謂壽公宜有後有二稚子其祐成之公食廟祀朱文公校昌黎先生集卷之三十二
