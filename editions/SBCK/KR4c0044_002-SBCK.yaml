front:
  text: 朱文公校昌􅀺先生集卷之二考異音釋附
  hash: sha256:b0152af2942d4c1aa11db06e91e0a15f82fda479e7e784ec14e8328398148b29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_002-1a}
body:
  text: 古詩北極一首贈李􅀚北極有羇羽南溟有沈鱗川源浩浩隔影響兩無因風雲一朝㑹變化成一身誰言道里逺里方作理非是陶詩云不怨道里長正作里感激疾如神我年二十五求友昧其人哀歌西京市乃與夫子親所尚苟同趨尚或作向趨方云孟子云三子者不同道其趨一也注趨讀如趣賢愚豈異倫方爲金石姿萬丗無緇磷音鄰無爲兒女態兒女或作女兒非是燋悴悲賤貧此日足可惜一首贈張籍洪曰此詩􅄂用韻又疊用韻歐陽公云退之工於用韻得寛韻則波瀾橫溢泛入傍韻如此日足可惜之􅀋是也得窄韻則不復旁出因難見巧如病中贈張十八之􅀋是也此日足可惜此酒不足嘗不足或作不可捨酒去相語去方作須今按湏字無理或是復字傳寫誤尓共分一日光念昔未知子孟君自南方自矜有所得言子有文章我名屬相府欲徃不得行或作驤思之不可見百端在中腸維時月􅅎死冬日朝在房韓曰朝旦也月令孟冬之月日在房驅馳公事退聞子適及城或作墻方云此詩視古用韻不入今韻者多爲後斈以意妄改呉才老云詩人用行字韻二十有五無叶今讀者此詩後用東去趍彭城諒知有所成皆庚韻也何獨於此疑之命車載之至引坐於中堂開懷聽其􅀃往往副所望音亡孔丘殁巳逺仁義路乆荒紛紛百家起詭怪相披猖乱也長老守所聞後生習爲常少詩詔切知誠難得純粹古巳亡古一作固譬彼植園木有根易爲長留之不遣去館置城西旁歳時未云幾浩浩􅀚湖江未或作来江或作湘非是方云植園木以喻籍之始从斈也􅀚湖江以喻其成也衆夫指之􅀏謂我知不明兒童畏雷電魚鼈驚夜光州家舉進士選試繆所當馳辭對我䇿章句何煒音偉光也煌相公董晋也朝服立工席歌鹿鳴禮終樂亦闋苦穴切終也記曰爵卒而楽闋相拜送於庭之子去須􅁷赫赫流盛名竊喜復竊嘆竊喜復或作慷􅁣仍諒知有所成人事安可􅁪奄忽令我傷聞子髙第日正從相公䘮孫曰正元十五年髙郢知㪯籍登第是歳三月晋卒愈護其䘮行哀情逢吉語倘怳上音敞下許昉切􅀘注相如曰聽敞怳而亡聞注耳不諦也惝或作􅐞方云楚詞逺遊作惝怳相如傳作敞怳難爲雙暮􅀫偃師縣名今在洛州西徒展轉在牀諸本作展轉在空床仐按或當从諸本夜聞汴州亂遶壁行徬徨我時留妻子時留或作乃弃倉卒不及將相見不復期零落甘所丁驕兒未絶乳念之不能忘忽如在我所或作其側所或作前或作側耳若聞啼聲中途安得返一日不可更俄有東來􅀃我家免罹殃乗船下汴水東去趨彭城徐州地孫曰公妻子先在徐州從䘮朝至洛方無朝字洛下有陽字今按朝至洛盖用洛誥語又下文云日西入軍門則此當作朝至洛明矣還走不及停還或作旋假道經盟津出入行澗岡日西入軍門羸馬㒹且僵音姜什也主人願少留延入陳壷觴卑賤不敢辭忽忽心如狂飲食豈知味絲竹徒轟轟平明脫身去决若驚鳬翔黄昏次汜音似汜水在河南城皐縣水欲過無舟航過或作濟號呼乆乃至夜濟十里黄中流上灘潬灘方作沙潬或作澤方云郭璞曰江東人呼水中沙堆為潬潬即灘也今按下句便有沙字恐只當作灘二字複出如上句言舟航之􅀋沙水不可詳驚波暗合沓星􅀫爭翻芒轅馬蹢躅鳴諸本或作馬乏復悲鳴或作馬蹢濁鳴悲左右泣僕童甲午憩時門左傳昭十九年鄭大水龍􅃲于時門之外洧渊杜氏注云時門鄭城門也臨泉窺闘龍東南出陳許陂澤平茫茫方作茫茫平云用古䪨今按此詩固用古䪨然皆因其語势之自然未甞作意捨此而用彼也諸本只作陂澤平茫茫韵諸語恊本無不可若作陂澤茫茫平却斍不響不應以欲用古韵之故牽挽而強就之也又按别本平或作路而或作何者語意尤勝讀者詳之道邊草木花紅紫相低昻百里不逢人角角雄雉鳴角方云音谷見集韵雄雉或作雉雛行行二月暮乃及徐南疆下馬歩堤岸上船拜吾兄洪曰公有三兄皆早丗見於集中者雲卿之子俞紳卿之子岌皆公從兄或曰吾兄謂張籍非也誰云經艱難艱或作險百口無夭殤或作横方云楚詞強死者為國殤三字全語亦見列子僕射南陽公張建封也宅我睢音綏水名在徐州孫云二月末公至徐州泗濠節度使張建封以公爲節度推官祝曰公與孟東野書云主人與余有故居余符離睢上即此也水陽篋中有餘衣盎烏浪切盆也中有餘糧閉門讀書史讀或作閱䆫戸忽巳凉諸本多作清風䆫户凉或作䆫户風已涼或作䆫户清風凉今按公以二月末到徐不知此詩何時作若夏即當作清風䆫户凉若秋即當作䆫户風巳凉日念子來遊子豈知我情别離未爲乆辛苦多所經對食毎不飽共言無倦聽連延三十日晨坐逹五更我友二三子友方作有宦遊在西京東野窺禹穴李翶􅀚濤江蕭條千萬里㑹合安可逢淮之水舒舒楚山直叢叢子又捨我去我懷焉所窮焉或作安男兒不再壯百歳如風狂方作狂風今按方亦強用古韻之過不如只作風狂語势􅀹徤髙爵尚可求無爲守一郷幽懷幽懷不能寫能或作可行此春江潯音尋水涯選弭節乎江潯適與佳節㑹士女競光隂凝䊋耀洲渚䌓吹蕩人心人方作神非是閒􅀜林中鳥亦知和爲音諸本作知時爲和音非是然今本疑亦有誤或恐爲是其字豈無一罇酒自酌還自吟但悲時易失四序迭相侵我歌君子行視古猶視今君子法天運君子法天運四時可前知可或作毎小人惟所遇寒暑不可期利害有常􅀔取捨無定姿焉能使我心皎皎逺憂疑落葉一首送陳羽或作葉落篇首同非是落葉不更息㫁蓬無復歸飄颻終自異邂逅暫相依悄悄深夜語悠悠寒月輝誰云少年别流淚各霑衣歸彭城天下兵又動太平竟何時訏音吁大也謨者誰子無乃失所宜前年􅀜中旱閭井多死飢方作饑去歳東郡水郡或作洛方云非也舊紀貞元十五年秋鄭滑大水生民爲流屍上天不虚應禍福各有隨我欲進短䇿無由至彤墀彤或作丹刳肝以爲紙瀝血以書辭上言陳堯舜下言引龍􅇪言詞多感激文字少葳蕤上音逶下音緌盛皃選文物共葳蕤葳或作萎方云紛葳㽔以馺遝見陸機文賦今按葳蕤巳見楚詞一讀巳自怪再尋良自疑食芹􅀃文芹楚葵也列子宋有出大自曝於日謂其妻曰􅀒日之暄人莫知者以献吾君將有重賞又有喜食芹者對郷豪􅁛之郷豪取而嘗之蜇於口慘於腹衆哂而怨之其人大慙晋山濤為吏部郎㪯嵇康自代康恨不知巳移書責之曰野人有快炙背而美芹欲献之至尊雖有區區之意亦巳踈矣願足下勿似之雖云美獻御固巳癡緘封在骨髓耿耿空自竒昨者到京城屢陪髙車馳周行多俊異議論無瑕疵見待頗異禮未能去毛皮到口不敢􅄍徐徐俟其􅇖虚宜切楊子曰􅇖可抵乎􅇖罅􅂩也歸來戎馬閒驚顧似覉雌􅀌雌也枚乗曰日暮則迷鳥覉雌􅀫焉連日或不語終朝見相欺相方作我見相或作相見今按此三家三本疑皆有誤乗閒輙􅀐馬茫茫詣空陂遇酒即酩酊君知我爲誰醉後煌煌東方星柰此衆客醉􅀄喧或忿爭或作紛爭方作爭紛中静雜嘲戲雜或作惟方云雜以嘲戯選典論全語淋漓身上衣漓或作浪顚倒筆下字人生如此少酒賤且勤置醉贈張秘書方云今本下或注徹字徹元和四年進士此詩元和􅀄作徹猶未第公五六年間皆在東都此詩盖在長安日作非徹也人皆勸我酒我若耳不聞今日到君家呼酒持􅂆君爲此座上客方作士非是及余各能文君詩多態度藹藹春空雲東野動驚俗天葩吐竒芬張籍學古淡軒鶴避雞群鶴方及諸本皆作昻今按此言張籍斈古淡而不驚於綺靡如以乗軒之鶴而反避雞羣也又軒鶴乃與天葩之句相偶阿買趙堯夫曰或問魯直阿買是退之何人荅云退之姪必有據而云不識字頗知書八分樊曰秦壞古文有八體其一􅀠書今八分也詩成使之寫亦足張吾軍所以欲得酒爲文俟其醺酒味旣冷冽酒氣又氛氲上音芬下於云切祝云氣也冷或作冷氣或作煙氛或作氤方云氛氲盛皃字見選雪賦性情漸浩浩諧􅀏方云云此誠得酒意餘外徒􅌭紛亂也長安衆冨兒盤饌羅羶葷音熏臭菜不解文字飲惟能醉紅裙雖得一餉樂有如聚飛蚊今我及數子固無蕕與薫險語破􅀑膽補注開元天寳遺事李果爲洛陽令有劉兼者過其境夜聞人外語声曰古今正人李令是也见其行事令人破瞻開户視之無物乃􅀑神也髙詞嫓匹詣切祝曰爾雅妃嫓也注相偶嫓也嫓或作動皇墳至寳不雕琢或作瑑神功謝鋤耘方今向太平元凱承華勛吾徒幸無事庶以窮朝曛音薫日入也同冠峽南方二月半春物亦巳少維舟山水間晨坐聽百鳥􅀫雲尚含姿朝日忽升曉羇旅感和鳴囚拘念輕矯和鳴或作陽和方云和鳴輕矯皆指百鳥而言也潺湲淚乆迸乆或作交詰曲思増繞行矣且無然蓋棺事乃了送惠師惠師浮屠者乃是不羇人鄒陽上呉王書使不羇之士與牛馬同皂注不羇無所拘繫也又司馬迁傳少􅀒不羇之才十五愛山水超然謝朋親或作同􅀮淪脫冠翦頭髮頭或作短按下對蹤塵當作頭髮飛歩遺蹤塵飛或作􅀌發跡入四明梯空上秋旻遂登天台望韓日天台山名在台州衆壑皆嶙峋上音鄰下音荀深崖皃選階楯峋嶙鯨戲側脩鱗自來連州寺曽未造城闉音因詩出其闉闍闉城上重門日􅂝青雲客青或作春方云李白詩多用青雲客字探勝窮崖濵太守邀不去或作往或作得羣官請徒頻或作其志信不羣囊無一金資翻謂富者貧謂或作爲昨日忽不見我令訪其鄰奔波自追及波或作走把手問所因顧我却興歎我却或作却我君寜異於民離合自古然辭别安足珍吾聞九疑好􅀘注山海經曰蒼梧之川其中有九疑山漢武廵狩祀舜于此孫曰其山九疑相似故名九疑韓曰九疑山在零陵營道縣零陵今永州而營道則􅀠道州矣夙志今欲伸欲或作願斑竹啼舜婦清湘沈楚臣衡山與洞庭此固道所循尋崧方抵洛歴華遂之秦浮游靡定處偶往即通津吾言孫曰公自謂子當去子道非吾遵江魚不池活野鳥難籠馴吾非西方教憐子狂且醇吾嫉惰遊者憐子愚且諄章倫切誠也去矣各異趣何爲浪霑巾浪或作淚送靈師佛法入中國爾來六百年齊民逃賦役髙士著幽禪官吏不之制紛紛聽其然制或作禁紛紛或作紛紜耕桑日失􅀠朝署時遺賢靈師皇甫姓胤胄本蟬聮孫曰㣧継也胄系也謂姓氏所出蟬聮連續之皃􅀘注南史宋王鈞七葉之中爵位相継人人有集沈約語人云自開闢以來未有爵位蝉䏈人才相継如王氏之盛者少小渉書史早能綴文篇中間不得意失跡成延遷逸志不拘教軒騰㫁牽攣圍碁􅃲白黒生死隨機權六博在一擲梟盧叱迴旋梟或作呼或作􅦻楚辝宋玉招䰟菎蔽象碁有六博王逸注云投六箸行六碁故爲六博也宋劉􅁉與劉毅樗蒲毅以爲不能􅁉惡之因按五木旣而四子俱黒其一子轉躍未定􅁉厲声喝之即成盧毅意殊不快也宋玉招䰟有成梟而牟呼五白梟勝也社詩􅃝跣不肯成梟盧廣韵􅦻子樗蒲采名唐李文公集五木經甿采六開塞搭秃撅􅦻則裊冝從􅦻戰詩誰與敵浩汗横戈鋋音延小矛􅀾詩或作爭􅀾或作文􅀾或作詩􅀾方云􅀾詩􅀾文唐人語也白樂天􅀾文重掉鞅刘夢得􅀾文矛㦸深誰与方作与誰非是飲酒盡百􅊦側眼切杯也嘲諧思逾鮮􅊦或作醆或作琖後放此逾或作愈有時醉花月髙唱清且緜髙唱清或作清唱髙四座咸寂黙杳如奏湘絃尋勝不憚險黔江黔州有黔江縣屢洄沿上音回下音縁泝流而上曰洄從流而下曰沿瞿塘五六月驚電讓歸船讓或作攘非是姚令威云譲責怒也方云此只謂帰舟急於驚電耳譲如厥大誰與譲之讓怒水忽中裂千尋墮幽泉尋或作潯今按潯與尋同環迴􅀔益急仰見團團天下團字一作圎投身豈得計性命甘徒􅂢浪沬蹙翻涌漂浮再生全同行二十人二諸本作三䰟骨俱坑填靈師不掛懷冒渉道轉延開忠二州牧方云魏道輔謂二牧韋處厚白居易也二公出守在元和末此詩作於貞元二十年間攷其時非也詩賦時多傳失職不把筆珠璣爲君編強留費日月密席羅嬋姢昨者至林邑使君數開筵逐客三四公盈懷贈蘭荃音詮香草湖游泛漭沆上音莽下胡朗切深大也西京賦滄也漭沆湖或作湘方云此言在林邑日非相地也今按湖游對溪宴乃切溪宴駐潺湲别語不許出行􅅂動遭牽鄰州競招請書札何翩翩十月下桂嶺縣名在賀州乘寒恣窺縁落落王貟外爭迎獲其先自從入賔館占恡乆能專吾徒頗􅂝􅀍頗或作或􅀍或作之接􅀫窮歡妍聽􅀃兩京事分明皆眼前縱横雜謡俗瑣屑咸羅穿材調眞可惜朱丹韓曰陶徽詩對酒展塵編朱黄加釋注孫曰磨研猶琢磨也在磨研方將歛之道且欲冠其顚韶陽李太守髙歩陵雲煙得客輒忘食開囊乞繒錢繒或作緡手持南曹叙唐制吏部貟外郎一人掌判南曹王仲舒自吏部貟外郎貶方云謂王貟外仲舒也墓志云所為文章無丗俗氣字重青瑶䥴子全切祝曰鑚也斲也古氣參􅂏繫方作象今按杜詩前哲垂􅂏繫髙標摧太玄維舟事干謁披讀頭風痊音詮孫曰典略曰張繡反曹操令記室陳琳草檄檄成呈太祖太祖先苦頭風是日疾發讀琳所作而愈翕然起日此愈我病還如舊相識還如或作頗似傾壷暢幽悁於縁切祝曰憂悒也通也詩中心悁悁以此復留滯歸驂音參驂馬幾時鞭縣齋有懷少小尚竒偉平生足悲吒陟駕切嘆也郭璞詩撫心獨悲吒猶嫌子夏儒肯學樊遲稼事業窺皐稷或作稷卨文章蔑曹謝濯纓起江湖綴珮雜蘭麝悠悠指長道去去䇿髙駕誰爲傾國媒樊曰漢李延年傳北方有佳人絶丗而獨立一頋傾人城再顧傾人囯上嘆息日丗豈有此人乎平王公主因言延年有女弟上召見實妙䴡善舞由是得幸是爲李夫人自許連城價樊曰史記連城謂十五城秦所以易趙璧者史記􅀄隨計吏貢屢入澤宫射雖免十上勞韓曰􅀾囯䇿蘇秦􅀃秦惠王書十上而􅀃不行資用乏絶去秦而帰何能一戰霸能或作曽人情忌殊異丗路多權詐多或作重蹉跎顔遂低摧折氣愈下冶長信非罪侯生侯嬴也孫曰史記魏有隱士侯嬴公子無忌虚左迎之嬴有客朱亥在市屠中嬴引車入市見之其客睥睨乆立徒􅀐皆竊駡侯生或遭罵懷書出皇都衘淚渡清灞音霸灞水也選控灞乗滻身將老寂寞志欲死閑暇朝食不盈腸冬衣􅂊掩髂枯駕切祝曰腰骨前漢折脅拉髂軍書旣頻召戎馬乃連跨大梁從相公彭城赴僕射弓箭圍狐兎絲竹羅酒䏑兩府變荒凉荒或作炎方云此言董晋張建封相継殂謝也三年就休假求官去東洛去或作來或作去官來東洛方云此謂貞元十五十六年冬如京調官也犯雪過西華塵埃紫陌春韓曰唐人樂府云紫陌青門三十六宫春晝永風雨靈臺夜名聲荷朋友援引乏姻婭音亜孫曰尓雅两壻相謂曰婭雖陪彤庭臣雖方作偶或作仰陪或作偶皆非是孫曰彤庭丹墀謂御史也詎縱青冥靶音霸轡革王襃曰王良執靶􅁳或作雲寒空聳危闕曉色曜脩架􅂢軀辰在丁鎩所介切鳥羽病也選鵉翮有時鎩翮時方䄍音乍年終􅀕公貶山陽以其年十二月投荒誠職分領邑幸寛赦湖波翻日車韓曰淮南子日乗車駕以六龍羲和爲御杜詩西江浸日車嶺石坼天罅虚訝切孔也毒霧􅁪熏晝炎風毎燒夏雷威固巳加􅄓􅀔仍相借氣象杳難測聲音吁可怕夷言聽未慣越俗循猶乍循或作脩非是指摘兩憎嫌睢盱上音􅈥下音吁視上逆皃祝曰視不明也列子老子而睢睢而盱盱而誰與居互猜訝祗縁恩未報豈謂生足藉嗣皇永正元年順宗即位新繼明新方作帝非是率土日流化惟思滌瑕垢長去事桑柘斸陟玉切斫也嵩開雲扄壓潁抗風榭禾麥種滿地梨􅀥栽繞舎兒童稍長成雀䑕得驅嚇音罅詾嚇莊子鴟得腐䑕鵷雛過之仰而視之日嚇注怒而拒物声官租日輸納村酒時邀迓閑愛老農愚歸弄小女姹陟駕切少女也後漢姹女工数錢如今便可爾何用畢婚嫁樊曰後漢向平字子平􅀮居不仕建武中男女嫁娶畢敕官事勿相罔當如我死也合江亭諸本作題合江亭􅀉刺史鄒君方从閤杭蜀本篇内三處注文亦用蜀本孫曰亭在衡州􅀒郭今之石鼓頭即其地也地形特異崛起於二水之間旁有朱陵仙府唐人題刻散滿岩上公自陽山量移江陵過衡山紅亭枕湘江紅或作江方作洪今按歐本作紅鮑云當作紅其作洪者声存而字訛也蒸水㑹其左瞰臨眇空闊緑淨不可唾維昔經營􅀄􅀖君實王佐洪曰謂故相斉映所作翦林遷神祠買地費家貨費或作匱梁棟宏可愛宏或作横結構麗匪過伊人去軒騰兹宇遂頽挫老郎來何暮髙唱乆乃和洪曰謂字文炫又増其制樹蘭盈九畹音宛楚辝予旣滋蘭之九畹栽竹逾萬个或作箇方云史記貨殖傳竹竿万个古書皆作个字漢功臣表始出箇字長綆汲滄浪音郎幽蹊下坎坷口个切坎坷地不平波濤夜俯聽雲樹朝對卧􅀄如遺宦情終乃最郡課人生誠無幾誠方作成非是事往悲豈柰乃个切語助或作那蕭條緜歳時契闊􅁇庸懦勝事誰復論醜聲日巳播中丞黜凶邪天子閔窮餓君侯至之􅀄閭里自相賀淹滯樂閑曠勤苦􅂆慵惰爲余掃塵階塵方作東非是命樂醉衆座窮秋感平分新月憐半破願書巖上石勿使泥塵涴烏卧切泥着物也泥塵或作塵泥陪杜侍御遊湘西兩寺獨􅀫有題一首因獻楊常侍諸本無兩字及一首因三字楊常侍慿也時􅀚察湖南長沙千里平勝地猶在險况當江闊處斗起􅀔匪漸深林髙玲瓏上音苓下音籠玉声也一曰明皃青山上琬琰以冉切青玉也上或作生路窮臺殿闢佛事煥且儼剖竹走泉源開廊架崖广音􅌂因岩爲屋廊一作廓是時秋之殘之或作􅀄暑氣尚未歛羣行忘後先朋息棄拘檢朋或作困客堂喜空凉空或作風華榻有清簟澗􅂼煑蒿芹水果剥菱芡音儉雞頭伊余夙所慕陪賞亦云忝幸逢車馬歸獨􅀫門不掩山樓黒無月漁火燦星􅀧夜風一何喧杉檜屢磨颭聀琰切風動物也磨或作摩方云古摩磨通猶疑在波濤怵惕夢成魘於琰切睡中魘静思屈原沈逺憶賈誼貶椒蘭離騷經注蘭楚懷王弟司馬子蘭椒楚大夫椒也爭妬忌絳灌共䜛謟誰令悲生腸坐使淚盈臉翻飛乏羽翼乏或作摧指摘困瑕玷困或作因非是珥音餌曹植戴蝉珥貂珥挿也漢官儀曰侍中冠金蝉有貂韓曰珥貂分陜謂楊以常侍鎮長沙貂藩維重政化􅀋分陜禮賢道何優奉己事苦儉大厦棟方隆巨川檝行剡音琰銳利行或作􅀄經營誠少暇遊宴固已歉歐本行歉俗字當作慊方云古書􅂬欣之􅀋或从心或从欠多通用旅程愧淹留徂歳嗟荏苒平生毎多感柔翰遇頻染展轉嶺猿鳴曙燈青睒睒音陜燈方作光􅆋􅆋或作􅆋􅆋今按曉光不青作灯是也岳陽樓别竇司直竇庠時以武昌幕􅁠岳州洞庭九州閒厥大誰與讓南匯羣崖水匯或作維北注何奔放瀦爲七百里吞納各殊狀自古澄不清環混無歸向炎風日捜攪幽恠多冗長音仗選陸機曰故無取乎冗長軒然大波起宇宙隘而妨音訪妨礙也玉篇云害也一作放巍峩拔嵩華騰踔較健壯踔或作躍方云選呉都賦騰踔飛超聲音一何宏轟輵車萬兩輵諸本作􅮣或作揭方定作輵云丘􅁑切車声也楊雄羽獵賦所謂皇車幽輵是也杭蜀本作渇盧仝月蝕詩亦有推蕩轟渇不知唐人何以訛輵爲渇也今本多作磕砰磅轟磕上林賦語磕与輵音義一也猶疑帝軒轅張樂就空曠蛟螭音摛无角如龍而黄露筍簴縞練吹組帳組或作祖今按鮑昭詩組帳􅀭春風􅀑神非人丗節奏頗跌踼上徒結切下徒浪切放逸也陽施見誇麗隂閉感悽愴感或作咸朝過冝春口􅀽州唐日冝春郡極北缺堤障過或作迴北方作地夜䌫巴陵洲岳州唐曰巴陵郡叢芮而銳切草生皃纔可傍蒲浪切近也星河盡涵泳俯仰迷下上餘瀾怒不巳喧聒鳴甕盎明登岳陽樓輝煥朝日亮飛廉風伯戢其威清晏息纎纊音曠纎纊細綿也息或作自方云按海賦輕塵不飛纎羅不動息字爲勝泓烏宏切水深澄湛凝緑物影巧相況江豚時出戯􅀃文江豚一名鱄䱐欲風則踊驚波忽蕩瀁波或作没時當冬之孟􅂩竅縮寒漲前臨指近岸側坐眇難望滌濯神魂醒幽懷舒以暢主人孩童舊孩童一作童孩握手乍忻悵憐我竄逐歸相見得無恙音􅃞病也李陵曰霍与上官无恙乎開筵交履舄韓曰史滑稽傳履舄交錯盃盤狼藉爛漫倒家釀音讓劉曰見何次道飲酒使人欲傾家釀盃行無留停或作停留髙柱補注琴柱送清唱中盤進橙栗投擲傾脯歡窮悲心生婉孌不能忘音望念昔始讀書志欲干覇王于放切二屠龍莊子朱萍漫斈屠龍於支離益殫千金之家三年後成而无所用其巧破千金爲藝亦云亢孫曰髙也愛才不擇行觸事得䜛謗前年出官由或作日以前卷上􅕭豈其由之語推之作由者是但恐此與彼語意不同則只作日亦通此禍最無妄公卿採虚名擢拜識天仗姦猜畏彈射食亦切公時爲御史爲王叔文之黨所排逐斥逐恣欺誑新恩移府庭移或作趨逼側潘岳曰駢闐偪側又子虚賦云偪側秘節厠間也諸將于嗟苦駑緩但懼失冝當追思南渡時魚腹甘所葬嚴程迫風帆劈箭上音僻又轉麥切􅀃文劈破也入髙浪顚沈在須􅁷忠鯁誰復諒生還真可喜剋巳自懲創剋或作刻庶從今日後粗識得與䘮事多改前好趣有獲新尚誓耕十畒田不取萬乗相細君知􅁞織稚子巳能餉行當掛其冠生死君一訪送文暢師北遊昔在四門館晨有僧來謁補注聞見録云歐陽公於詩主退之不主子美劉仲原父毎不然之公日一美老夫清晨梳白頭玄都道士來相訪有俗氣退之决不道也仲原父曰亦退之昔在四門館晨有僧來謁句之􅀋耳公賞其辯自言本呉人少小學城闕巳窮佛根源粗識事輗五雞切軏五骨切車轅端曲木攣拘漢鄒陽書能越挛拘之語潘安仁賦陋吾人之拘挛屈吾眞或作身戒轄胡轄切車軸頭鐡左氏巾車脂轄詩云載脂載轄思逺發薦紳秉筆徒聲譽耀前閥音罰閥閱家丗也後漢声榮光耀於門閥從求送行詩求或作來屢造忍顛蹶今成十餘卷浩汗羅斧鉞先生公自謂閟窮巷未得窺􅙑劂上居綺切下音厥祝曰刻鏤刀也淮􅀯子􅙑劂无跡人巧之妙楚詞握􅙑劂而不用揚雄甘泉賦般僅棄其􅙑劂或云剞作􅙑字見傅毅琴賦當考又聞識大道何路􅀘剠刖剠与黥同莊子庸詎詎造物者不息我剠而􅀘我劓韓曰公詩意謂文暢旣祝髪為僧欲􅀘其剠則而反之􅀄庸可得乎出其囊中文滿聽實清越謂僧當少安草序頗排訐上論古之􅀄所以施賞罰下開迷惑胷窙豁斸株橜音掘株橜木根列子吾處若橜株抅注橜株抅斷木也言序所以排訐釋氏而告以聖人之道者如以刃而􅓯株橜也方云何遜詩窙豁下岩呀窙音孝氣上烝也校本一用西京賦作孝豁恐非今按一本作豁注云開逹貌西京賦李善无注而篇韻以為宫殿貌祝氏音義作豁開逹貌潘岳登虎牢賦幽谷豁以窙寥今亦末詳孰是且从方氏作孝僧時不聽􅉷荘子是黄帝之所聽瑩也䟽聽瑩疑惑皃不聽瑩則無所疑矣此所以若飲水救渇也若飲水救暍音謁傷暑也或作渇方云公詩用今韻者未甞逾韻此詩三十三韻不應獨旁取此一韻个按方􅀃不知何以見此詩用今韻當考風塵一出門時日多如髮三年竄荒嶺守縣坐深樾音日兩木交隂之下日樾徴租聚異物或作物異非是詭製怛巾韈製或作制怛或作恒方云恒驚也幽窮共誰語共或作与思想甚含噦於月切逆氣礼記噦噫昨來得京官照壁喜見蝎音歇韓曰江南舊元蝎樊曰蘇内翰謫黄州五年離泗州北行岸上聞騾䭾声欣然日不聞此声乆矣退之照壁喜見蝎不虚語也况逢舊親識或作識知親或作相無不比鶼音兼尓雅曰南方有比翼鳥不比不飛其名謂之鶼公竄逐新帰見蝎猶喜况相識乎无不比之鶼蟨矣蟨音厥見後岠虚注長安多門户弔慶少休歇而能勤來過重惠安可掲孫曰㪯也重惠或作惠重方云母丘檢詩􅁨責重山岳誰能爲我擔与此義同當今聖政􅀄恩澤完􅛺狘上許出切下許月切祝曰飛走皃記鳯以爲畜故鳥不獝麟以爲畜故獸不狘完或作寛胡爲不自暇飄戾逐鸇鷢其月切似鷹尾上白善捕䑕僕射領北門威德壓胡羯音訐胡種相公鎭幽都竹帛爛勲伐酒􅂣舞閨姝獵􅀐圍邊月韓曰李恢秋月詞云邊月破鏡飛開張篋中寳自可得津筏音伐海中浮從兹冨裘馬寜復茹藜蕨音厥余期報恩後謝病老耕垡音伐孫曰耕起士謂之垡祝曰与撥同囯語王耕二撥庇身指蓬茅逞志縱獫方驗切大長喙猲許竭切祝曰短喙犬日猲出尓雅詩曰載獫猲猲僧還相訪來山藥煑可掘答張徹筆墨間録劉澗云答張徹一詩尤竒䴡辱贈不知報我歌爾其聆首叙始識面次言後分形道途緜萬里日月垂十齡浚郊浚音峻孫曰正元十五年宣武軍乱殺留後陸長源避兵亂雎岸是歳公至彭城節度使張建卦居之於睢水上連門停諸本作庭閤本作停而方从諸本按停猶居也上對乱字冝用停字乃的後又有洞庭字或未必重押也肝膽一古劒波濤兩浮萍漬墨竄舊史磨丹注前經義􅁐手祕寳文堂耳驚霆暄晨躡露舄暑夕眠風櫺結友子讓抗請師我慙丁􅀄味猶噉与啖同祝日顧愷之啖蔗從尾至本云漸入佳境蔗遂通斯建瓴上紀偃切下音零見漢髙纪注瓴盛水瓶也居髙屋之上颷卑遥切風也韓曰楚詞忽飈騰􅀆浮雲颭伶俜普丁切補注伶傳行不正選少伶俜而偏􅀌悔狂巳咋音責囓也指垂誡仍鐫銘峨豸宅買切祝曰獬豸獸似牛而一角知曲直善觸御史冠用之忝備列伏蒲孫曰元帝欲廢太子史丹伏青蒲上泣涕諌帝愧分經孫曰分别涇渭以明清濁微誠慕横草孫曰漢終軍云軍无横草之功横於草野謂􅀾也􅃈力摧撞筳音廷孫曰東方朔傳以􅃹窺天以蠡測海以筳橦鍾从丱恐未是諸本筳从艸方云當从竹繀絲筦也見東方朔客難疊雪走商嶺飛波航洞庭下險疑墮并守官􅀋拘囹音令圄也官或作宮荒餐茹獠音老祝曰夷别名孫曰獠南夷蠱虫毒自峩豸下皆言自監察御史貶陽山時事蠱幽夢感湘靈刺史肅􅆱蔡孫曰言刺史爲人所信肅如蓍蔡蔡大􅀛也吏人沸蝗􅑺音􅄀􅀧綴簿上字趨蹌閤前鈴補注羊祜出鎮南夏鈴閤之下侍衛不過十数人頼其飽山水得以娯瞻聽紫樹雕斐斖音尾祝曰文色皃選彤雲斐尾以翼檽彤一作雜碧流滴瓏玲映波鋪逺錦挿地列長屏愁狖余救切祝曰狖形似猿酸骨死或作怨怪花醉魂馨潜苞絳實坼幽乳翠毛零乳或作孔赦行五百里月變三十蓂音􅁳孫曰丗紀堯時有草夾階而生於庭隨月凋榮毎月朔日生一莢至望則落一莢月小則餘一莢漸階羣振鷺入學誨螟蛉音苓桑上青虫也楊子以喻七十子肖仲尼元和六年公自江陵法曹召爲囯子博士故云苹甘謝鳴鹿罍滿慙罄缾問冏抱瑚璉飛飛聮鶺鴒魚鬛欲脫背孫云言將化爲龍虬光或云劒也先照硎光先或作精光豈獨出醜􅀋方當動朝廷勤來得晤語勿憚宿寒㕔薦士薦東野於鄭餘慶也東野正元十一年爲溧陽尉時鄭餘慶尹河南公作是詩薦之周詩三百篇雅麗理訓誥雅䴡或作䴡雅理或作埋今按二字皆未安恐必有誤曽經聖人手議論安敢到五言出漢時蘇李韓曰選李陵与蘇武詩注云五言詩自陵始也首更號東都漸瀰漫大皃派别百川導孫曰謂風雅之体如百川之分也建安能者七孫曰建安漢献帝年號典論曰今之文人孔融陳琳王粲徐幹阮瑀應瑒劉楨斯七予者於斈无所遺於辝无所假卓犖變風操孫曰風謂風雅操琴操之􅀋亦詩也逶迤抵晉宋氣象日凋耗中間數鮑謝孫曰謝靈運謝朓或日二謝通称鮑昭字明逺謝朓字玄暉李觀評孟郊詩云平處下顧二謝比近最清奥齊梁及陳隋衆作等蟬噪搜春摘花卉㳂襲傷剽強最也盗國朝盛文章子昻補注薦士詩与送東野序盛言子昻李杜餘皆不在其列始髙蹈勃興得李杜萬􅀋困陵􅁀後來相繼生亦各臻閫奥或作方云舊本作奥今本以重韵誤刋也班固傳究先聖之閫奥有窮者孟郊受材實雄驁音傲敖也􅄀觀洞古今象外逐幽好横空盤硬語横空或作縱横安帖力排奡孫曰論語奡盪舟言多力能陸地行舟􅀘注臨川云吟詩各有所得清水出芙蓉天然去彫飾此李白所得也或看翡翠蘭苕上未掣鯨鯢碧海中此杜甫所得也橫空盤硬語安帖力排奡此韓愈所得也敷柔肆紆餘屈曲皃古詩日山澤紛紆餘奮猛卷海潦榮華肖天秀捷疾逾響報捷或作健逾或作愈行身踐規矩甘辱恥媚竈孟軻分邪正眸子看瞭眊杳然粹而清或作精可以鎭浮躁酸寒溧音栗宣州陽尉五十㡬何耄孜孜營甘旨辛苦乆所冒俗流知者誰指注競嘲慠聖皇索遺逸髦士日登造廟堂有賢相鄭餘慶也愛遇均覆燾况承歸與張郊嘗爲帰登張建封所知二公迭嗟悼青􅁳送吹嘘強箭射魯縞音槁韓曰漢韓安囯傳強努之末力不能穿鲁縞孫曰縞素也曲阜之俗善作之尤爲輕師故曰魯縞胡爲乆無成使以歸期告霜風破佳菊嘉節迫吹帽念將决焉去感物増戀嫪盧到切集注恡物也声􅀋云姻嫪恋惜也􅀃文云固也彼微水中荇尚煩左右芼音冒擇也魯侯國至小廟鼎猶納郜幸當擇珉玉石次玉也寜有棄珪瑁音冒孫曰周礼天子執瑁悠悠我之思擾擾風中纛音導補注楚王曰寡人之心揺揺然如懸旌詩意取此纛以犂牛尾爲之繫於左騑選黄屋左纛上言愧無路日夜惟心禱鶴翎不天生變化在啄菢薄報切鳥伏􅆑謂之菢通波非難圗尺地易可漕善善不汲汲後時徒悔懊於倒切恨也晋史門生驚懊者累日救死具八珍韓曰礼記内則入珍謂淳母炮豚性牂擣珍積熬肝膋也不如一簞音单楚与晋戰或人誰玉一簞酒王傾酒於水上与軍士共飲犒不或作无微詩公勿誚㣲或作数愷悌神所勞即到切喜侯喜至贈張籍張徹韓曰公􅀄謫陽山令元和改元自江陵􅁺召囯子博士其从遊如喜如籍如徹皆㑹都下詩以是作昔我在南時數君長在念揺揺不可止諷詠日喁噞上音顒下音驗孫曰魚口動也韓曰張衡曰喁噞浮沉如以膏濯衣毎漬垢逾染又如心中疾箴石非所砭波驗切孫云􅀃文以石刺病常思得遊處至死無倦厭无或作不地遐物竒怪水鏡孫曰水鏡一名蜮陸機䟽云一名射影江淮水皆有之人在岸上影見水中投人影則殺之涵石劒荒花窮漫亂幽獸工騰閃礙日不忍窺忽忽坐昬墊音店溺也逢神多所祝豈忘靈即驗依依夢歸路歷歷想行店今者誠自幸所懷無一欠孟生去雖索孫曰离也侯氏來還歉􅀃巳見上欹眠聽新詩屋角月􅃩豔眠或作枕月或作日雜作承閒聘雜方作新按上句巳云聽新詩不應此句便重出新字當作雜作承間聘盖謂間出它文也交驚舌㸦舚他念切樊曰􅀃文吐舌皃交或作文㸦或作牙皆誤㸦俗互字也􅌭紛指瑕疵拒捍阻城塹阻城方作城阻非是以余經摧挫固請發鈆槧七艷切韓曰王充論衡斷木爲槧西京雜記暢子雲好事常懷鈆提槧从諸計吏訪殊方絶域之語鉛墨槧牘也居然妄推譲見謂􅅡天􅆋天或作黔非是比踈語徒妍悚息不敢占呼奴具盤飱或作餐飣餖上丁定切下音豆貯食也魚菜贍人生但如此朱紫安足僣古風樊曰安史之後方鎮相望於内地大者連州十餘小者不下日四兵驕則逐帥帥強則叛上不廷不貢往往而是故托古風以寓意􅀚詩意當在德宗之丗与烽火相爲表裏云今日􅂚不樂幸時不用兵無曰旣蹙矣乃尚可以生日或作日以或作勞非是彼州之賦去汝不顧此州之役去我奚適去我方作我去奚或作爰皆非是一邑之水可走而違天下湯湯曷其而歸好我衣服甘我飲食無念百年聊樂一日駑驥洪曰唐本有贈歐陽詹字或作駑􅂹吟示歐陽詹􅉟集有荅韓十八駑􅂹吟駑駘誠齷齪上音渥下音擉或作􅐅選小人自齷齪市者何其稠力小苦易制價微良易酬苦或作良良或作誠渴飲一斗水飢食一束芻嘶鳴當大路志氣若有餘騏驥生絶域自矜無匹儔牽驅入市門行者不爲留借問價幾何黄金比嵩丘老杜騘馬行朝來夕試華軒下未斍千金滿髙價借問行幾何咫尺視九州飢食玉山禾渇飲醴泉流問誰能爲御諸本作借問誰能御方从杭蜀本及歐陽詹集如此曠丗不可求惟昔穆天子乗之極遐遊王良執其轡造父挾其輈挾諸本作夾此从詹集今按左傳頴考叔挾輈以走當作挾因言天外事韓曰周穆王西極有化人來王敬事之遂肆意逺遊駕八駿之乘主車則造父爲馭􅀫于崑崙之阿赤水之陽别日升崑崙之上以觀黄帝之宫遂賔于西王母孫云天外事即謂崑崙池事非中囯所見者也茫惚使人愁茫或作怳或作荒方云詹集作慌古慌与茫通駑駘謂騏驥餓死余爾羞餓或作飢有能必見用有德必見収孰云時與命通塞皆自由騏􅂹不敢言低徊但垂頭人皆劣騏􅂹共以駑駘優喟余獨興歎才命不同謀􅀉詩同心子爲我商聲謳商声秋声也記曰愛者冝􅁔啇選諒懷詩素質游商声悽愴傷我心詩或作言商或作髙馬猒榖此詩及其下出門皆未得志之辝馬猒榖􅀆士不猒糠籺音纈又胡骨切麄屑爲籺土􅀍文繡􅀆士無䄈􅄄裋或作短方云前漢貨殖傳实用裋字董彦逺洪慶善皆甞辨古无短􅄄字按䄈􅄄字两漢如賈􅁩貢禹貨殖傳班彪刘平張衡傅凡六見无有作短字者班彪王命論短􅄄之襲漢書作裋文選則用丁􅃹切是唐儒方两用之故少陵詩以長纓短􅄄為對而史記孟甞君傳与􅀾囯䇿墨子語盖皆傳冩之訛公好古最深當以短為正今按􅀾囯䇿鄰有短褐一作裋史記士不得短􅄄司馬貞曰短亦音竪班彪王命論短􅄄之襲韋昭曰短當為䄈裋襦也字皆正作短注中乃云䄈字竪音又淮􅀯子亦云巫馬期才衣短褐而髙誘无􅀃則亦末必皆傳冩之誤也又柳子厚亦甞用之則安知韓公之必不然乎今两存之以俟知者彼其得志􅀆不我虞一朝失志􅀆其何如巳焉哉嗟嗟乎鄙夫出門長安百萬家出門無所之豈敢尚幽獨與丗實參差古人雖巳死書上有其辭其或作遺開卷讀且想千載若相期出門各有道我道方未夷且於此中息天命不吾欺命或作誠嗟哉董生行淮水出桐栢山東馳遥遥千里不能休遥遥一作悠悠淝水淝音􅏂水名在庐江出其側不能千里百里入淮流百上或无里字壽州屬縣有安豐唐貞元時元下或有年字縣人董生召南隱居行義於其中召或作邵刺史不能薦天子不聞名聲爵禄不及門門外惟有吏日來徴租更索錢方无更字非是嗟哉董生朝出至夜歸讀古人書盡日不得息或山而樵或水而漁而方並作於非是入厨具甘旨上堂問起居父母不慼慼妻子不咨咨方从閤杭蜀本作羞羞云此詩以三嗟哉易韵以羞叶居視古用韵也今按咨字自与居叶方於毛頴傳資字論之矣何獨於此而疑之邪羞羞韵雖可叶然殊无理而可􅀏方之主此又其酷言三本之誤也或恐本是嗟字叶音子余反而誤作羞字耳然亦不如且作咨字之見成穩當也嗟哉董生孝且慈董召南壽州安豊人公甞有送董生游河北序且日董生㪯進士甞不得志於有司而此詩叙其孝且慈如此東坡姚氏三瑞堂詩云君不見董召南􅀮居行義孝且慈天公亦恐无人知故令雞狗相哺児又令韓老為作詩尓來三百年名与淮水肥人不識惟有天翁知方无有字非是生祥下瑞無時期家有狗乳出求食雞來哺其兒啄啄庭中拾虫蟻哺之不食鳴聲悲傍徨躑躅乆不去以翼來覆待狗歸嗟哉董生誰將與儔時之人夫妻相虐兄弟爲讎食君之禄而令父母愁亦獨何心嗟哉董生無與儔或作誰將与儔或作將无与儔或作誰与儔今按上句誰將与儔疑而問之之詞也此云无与儔荅而决之之詞也烽火登髙望烽火誰謂塞塵飛王城富且樂􅂚不事光輝勿言日巳暮相見恐行稀願君熟念此秉燭夜中歸我歌寕自感乃獨淚霑衣汴州亂汴州城門朝不開汴州自大暦後多兵董晋卒軍司馬陸長源揔留後事八日而軍乱殺長源等監軍俱文珍宻召宋州刺史刘逸凖使揔後務朝廷從之賜名全諒公時巳從晋䘮出汴四日實正元十五年二詩盖譏德宗姑息之政云天狗狀如犬流星有声其下正地􅀋狗必有破軍殺將之兆墮地聲如雷健兒爭誇殺留後誇或作誘連屋累棟燒成灰累棟或作累累諸侯咫尺不能救􅀌士何者自興哀母從子走者爲誰大夫夫人留後兒昨日乗車􅀐大馬坐者起趨乗者下廟堂不肯用干戈肯或作敢嗚呼奈汝母子何利劒利劒光耿耿佩之使我無邪心故人念我寡徒侶寡或作无徒或作儔持用贈我比知音我心如氷劒如雪不能刺䜛夫使我心腐劒鋒折决雲莊子􅀃劒上决浮雲下絶地紀中㫁開青天噫劒與我俱變化晋雷煥事歸黄泉齪齪齪齪當丗士所憂在飢寒但見賤者悲不聞貴者歎音灘大賢事業異逺抱非俗􅀚報國心皎㓗念時涕汍瀾妖􅁎坐左右柔指發哀彈酒肴雖日陳感激寕爲􅂬秋隂欺白日欺方作蔽今按作蔽固古語然作欺􅀹有味也泥潦不少乾河堤决東郡老弱隨驚湍天意固有屬誰能詰其端属或作謂或作以詰方作語今按謂以語不若作属詰為深切願辱太守薦得充諌諍官諌諍方作争臣今按争臣下更著官字語復非是排雲呌閶闔天門也楚詞排閶闔而望予披腹呈琅玕致君豈無術自進誠獨難卷終
