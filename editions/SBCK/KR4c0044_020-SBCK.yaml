front:
  text: 朱文公校昌􅀺先生集卷之二十考異音釋附
  hash: sha256:d27de6cd07efda96a2f788bf76d64f69f9fa4d256d351d92f77baeef5e8ac02c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_020-1a}
body:
  text: 序送董邵南序南下或有遊河北三字燕趙古稱多感􅁣悲歌之士董生舉進士連不得志於有司懷抱利器欎欎適兹土吾知其必有合也董生勉乎哉夫以子之不遇時苟慕義彊仁者皆愛惜焉矧燕趙之士出乎其性者哉然吾嘗聞風俗與化移易吾惡知其今不異於古所云邪聊以吾子之行卜之也於吾方从閣本作於吾云或作聞而无邪字今按萹首云古称多感慨悲􅁔之士諸本作古所云語乃相應作吾所聞猶為近之而語势巳微舛矣􅀂曰吾所云則都无来歴不成文字必是謬誤无疑也然此篇言燕趙之士仁義出於其性乃故反其詞以深譏其不臣而習乱之意故其卒章又為道上威德以警動而招徠之其旨微矣讀者詳之董生勉乎哉吾因子有所感矣爲我弔望諸君之墓而觀於其市復有昔時屠狗者乎爲我謝曰明天子在上可以出而仕矣贈崔復州序有地數百里趨走之吏自長史司馬巳下數十人其禄足以仁其三族及其朋友故舊樂乎心則一境之人喜不樂乎心則一境之人懼丈夫官至刺史亦榮矣丈上或有大字雖然幽逺之小民其足跡未嘗至城邑苟有不得其所能自直於郷里之吏者鮮矣况能自辨於縣吏乎方无苟有二字或无有字能自辨於縣吏者鮮矣况能自辨於刺史之庭乎由是刺史有所不聞小民有所不宣賦有常而民産無􅁪水旱癘疫之不期民之豐約懸於州句縣令不以言連帥不以信民就窮而歛愈急吾見刺史之難爲也州或作前縣下或有復出縣字皆非是崔君爲復州其連帥則于公崔君之仁足以蘇復人于公之賢足以庸崔君有刺史之榮而無其不爲者將在於此乎崔君之仁上或有愈以爲三字愈嘗辱于公之知而舊游于崔君慶復人之將􅀩其休澤也於是乎言贈張童子序子下或有兵曹字天下之以明二經舉於禮部者歳至三千人始自縣考試定其可舉者然後升於州若府其不能中科者不與是数焉州􅀂府緫其屬之所升又考試之如縣加察詳焉定其可舉者然後貢於天子而升之有司其不能中科者不與是數焉謂之郷貢有司者揔州府之所升而考試之加察詳焉第其可進者以名上於天子而藏之屬之吏部歳不及二百人謂之出身能在是選者厥惟艱哉二經章句僅數十萬言其傳注在外皆誦之又約知其大􅀃或无大字繇是舉者或逺至十餘年然后與乎三千之數而升於禮部矣又或逺至十餘年然後與乎二百之數而進於吏部矣班白之老半焉昏塞不能及者皆不在是限有終身不得與者焉之老二字或作者張童子生九年自州縣逹禮部一舉而進立於二百之列百下或有人字又二年益通二經有司復上其事繇是拜衛兵曹之命人皆謂童子耳目明逹神氣以靈余亦偉童子之獨出于等夷也童子請於其官之長隨父而寧母􅀊八月自京師道陜南至號東及洛師北過太河之陽九月始來及鄭洛师或作洛陽及鄭方作反鄭云此序疑作於鄭序云愈与童子俱陸公之門人是童子以貞元八年升于礼部又二年拜衛兵曹盖十年也公十年曽往河陽省墳墓見􅀕老成文序當作於此時童子豈或鄭人邪今按反字諸本多作及字盖自洛東出便可至鄭今以北過何陽故九月始及鄭童子未必為鄭人也自朝之聞人以及五都之伯長羣吏皆厚其餼賂或作謌詩以嘉童子童子亦榮矣聞或作文方云五都當謂雍陕􅉑蒲洛羣吏方以閣􅁐本定蜀本訛作郡吏今本併訛吏為縣其失逺矣雖然愈將進童子於道使人謂童子求益者非欲速成者夫少之與長也異􅀚少之時人惟童子之異及其長也將責成人之禮焉与或作於礼上方无之字成人之禮非盡於童子所能而巳也然則童子宜暫息乎其巳斈者而勤乎其未斈者可也愈與童子俱陸公之門人也慕回路二子之相請贈與處也故有以贈童子与処上或有出字非是方云礼子路去鲁謂顔子曰何以贈我顔子請曰何以処我義不當有出字也送浮屠文暢師序人固有儒名而墨行者問其名則是校其行則非可以與之游乎儒名方作名儒非是如有墨名而儒行者問之名則非校其行而是可以與之游乎之名或作其名而是或作則是揚子雲稱在門牆則揮之在夷狄則進之吾取以為法焉浮屠師文暢喜文章其周遊天下凡有行必請於搢紳先生以求咏歌其所志方无浮屠師三字喜下或有為字謌方作哥貞元十九年春􅀅行東南柳君宗元為之請解其装得所得叙詩累百餘篇非至篤好其何能致多如是邪請或作序所下或无得字惜其無以聖人之道告之者而徒㪯浮屠之􅀃贈焉告下方无之字夫文暢浮屠也如欲聞浮屠之􅀃當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物亊為之盛其心有慕焉亊為或作礼楽心下或有必字拘其法而未能入故楽聞其􅀃而請之如吾徒者宜當告之以二帝三王之道日月星辰之行天地之所以著􅀑神之所以幽人物之所以蕃江河之所以流而語之不當又爲浮屠之􅀃而瀆告之也行上或有所以字江河方作河江瀆告之方无瀆之二字民之􅀄生固􅀂禽獸夷狄然聖人者立然后知宫居而粒食親親而尊尊生者養而死者藏粒或作榖是故道莫大乎仁義教莫正乎礼楽刑政大方作過大乎或作過於正方作大施之於天下萬物得其宜措之於其躬休安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於􅁽中國之人丗守之今浮屠者孰爲而孰傳之邪為下或有之字夫鳥俛而啄仰而四顧夫獸深居而簡出懼物為之已害也猶且不脫焉弱之肉彊之食脫或作免今吾与文暢安居而暇食􅄖游以生死與禽獸異者寕可不知其所自邪夫不知者非其人之罪也知而不爲者惑也恱乎故不能即乎新者弱也知而不以告人者不仁也告而不以实者不信也不為上方无而字為下或有之字恱或作或弱或作溺告人或作告之余旣重柳請又嘉浮屠能喜文辭於是乎言請或作詩非是送楊支使序或作送楊八弟支使帰府愈在京師時嘗聞當今藩翰之賔客惟宣州為多賢嘗或作常與之游者二人隴西李博清河崔羣二人下或有焉字羣與博之為人吾知之道不行於主人与之処者非其􅀋虽有享之以季氏之富不一日留也方无於字於下或有其字以羣􅀶論之凡在宣州之幕下者虽不尽與之遊皆可信而得其爲人矣尽方作得或别有得字在尽字下愈未嘗至宣州而楽頌其主人之賢者以其取人信之也今中丞之在朝愈日侍言於門下其来而鎭茲土也而鎭或无而字䥊或作領有問湖南之賔客者愈曰知其客可以信其主者宣州也知其主可以信其客者湖南也去年冬奉詔為邑於陽山然後得謁湖南之賔客於幕下於是知前之信之也不失矣及儀之之來也聞其言而見其行則向之所謂羣与博者吾何先後焉儀之智足以造謀材足以立事忠足以勤上惠足以存下本或无於是知以下十七字一本并无聞其言而見其行七字方从閣杭録幕下即云及支使之來也聞其言而見其行是知前之信之也不失矣支使智足以造謀今按此数本互有得失而方􅀹踈畧独今所定詳宻有序目及羣博乃与上文相應而又侈之以詩書六藝之斈先聖賢之德音以成其文以附其質宜乎從事於是府而流声实於天朝也䝨方作人夫楽道人之善以勤其歸者乃吾之心也勤或作􅂆謂我為邑長於斯而媚夫人云者不知言者也工乎詩者􅁔以繫之送何堅序坚下本或有帰道州字何於韓同姓為近於或作与集注按何氏出周成王母弟唐叔虞後十二代孫食采於韓韓為秦所滅子孫分散居於江淮晋以韓為何遂為何氏堅以進士㪯於吾為同業其在太斈也吾爲博士堅爲生生博士爲同道其識堅也十年爲故人生博土或作生与博士同姓而近也同業也同道也故人也於其不得願而歸其可以無言邪不上或有志字堅道州人道之守陽公賢也或无賢字方云此謂陽城道有湖南爲屬州湖南楊公又賢也或无湖南又字楊作陽皆非是方云此謂楊慿也堅爲民堅又賢也湖南得道爲屬道得堅爲民堅歸唱其州之父老子弟服陽公之令道亦唱其縣與其比州服楊公之令楊或作陽非是吾聞鳥有鳯者􅁪出於有道之國當漢時黄霸爲潁川是鳥實集而鳴焉􅀂史可信堅歸吾將賀其見鳯而聞其鳴也巳川下或有守字是鳥或作是鳯鳥也史或作使或无巳字送廖道士序五岳於中州衡山最逺南方之山巍然髙而大者以百數獨衡爲宗最逺而獨爲宗其神必靈或无之字或无髙字独衡下方有山字衡之南八九百里地益髙山益峻水清而益駛或无峻水清而益五字非是駛或作駃音決其最髙而横絶南北者嶺郴之爲州在嶺之上測其髙下得三之二焉測如周礼側土深之測方作側下别有南字皆非是中州清淑之氣於是焉窮氣之所窮盛而不過必蜿蟺上於元切又音宛下市衍切又音善祝日選虬竜騰􅋮以蜿蟺蜿蜓也蟺蚯蚓也又屈曲皃扶輿相如日扶輿􅀝靡郭璞注淮􅀯所謂曽折摩地扶輿􅀝委也磅礴而鬱積磅音旁薄音薄祝日莊子將磅礴万物以為一注磅礴猶混同也釋文旁字又作磅沈佺期西岳詩磅礴壓洪源孫曰蜿蟺扶輿磅礴欎積皆氣積之皃州下方有之字穷下无盛字衡山之神旣靈而郴之爲州又當中州清淑之氣蜿蟺扶輿磅礴而鬱積其水土之所生神氣之所感白金水銀丹砂石英鍾乳橘柚之包竹箭之美千㝷之名材不能獨當也鬱上或无而字方无英及橘柚之包五字當下或有竒字非是意必有魁竒忠信材德之民生其閒樊日柳子厚送廖有方序云交州多南金珠璣瑇􅈘象犀其産皆竒怪至於草木亦殊異吾嘗恠陽德之炳燿徳發於紛葩瓌䴡而罕鍾乎人今廖生剛徤重厚孝弟忠信以質乎中而文乎外固鍾於陽德者耶子厚之序与公此作其意一同而吾又未見也其無乃迷惑溺没於佛老之學而不出邪學或作教廖師郴民而學於衡山氣專而容寂多藝而善遊豈吾所謂魁竒而迷溺者邪迷下或有惑没字廖師善知人􅀂不在其身必在其所與遊訪之而不吾告何也於其别申以問之送王秀才序或作進士王含吾少時讀醉郷記樊日王績字元功隋未大儒通之弟也著醉郷記以次刘伶酒德頌含其子孫也私怪隱居者無所累於丗而猶有是言豈誠旨於味邪及讀阮籍陶濳詩乃知彼雖偃蹇不欲與丗接然猶未能平其心或爲事物是非相感發於是有託而逃焉者也乃上或有然後字或為方作不為感發方无發字􅀂顔氏子或无子字操瓢與簞曽參歌聲孫日荘子云曽子曳縰而􅁔啇頌声蒲天地􅀂出金石􅀂出金石彼得聖人而師之汲汲毎􅀂不可及其於外也固不暇尚何麴蘖之託而昏􅁳之逃邪吾又以爲悲醉郷之徒不遇也何下或有事字為字疑衍建中􅀄天子嗣位有意貞􅀚開元之丕績在廷之臣争言事當此時醉郷之後丗者邪送陳秀才彤序讀書以爲學纉言以爲文非以誇多而闘靡也盖學所以爲道文所以爲理耳非以或无以字苟行事得其宜出言適其要雖不吾面吾將信其富於文學也潁川陳彤始吾見之楊湖南門下之下或有於字頎然其長薫然其和吾目其貌耳其言因以得其爲人及其乆也果􅀂不可及夫湖南之於人不輕以事接争名者之於藝不可以虚屈吾見湖南之禮有加而同進之士交譽也又以信吾信之不失也如是而又問焉以質其學䇿焉以考其文則何信之有諸本何下有不字方本亦然舊讀此序嘗怪則何不信之有以下文意断絕不相承應毎竊疑之後見謝氏手校眞本卷首用建炎奉使之印未有題字云用陳无巳所傳歐公定本讎正乃删去此一不字􅀄亦未曉其意徐而讀之方斍此字之爲疑去之而後一篇之血脉始復通貫因得釋去舊疑嘗謂此於韓集最爲有功但諸本怃皆不及方拠謝本爲多而亦独遺此字豈亦不嘗見其眞本耶嘗以告之又不見信故今特刪不字而復詳著其􅀃云故吾不徴於陳而陳亦不出於我此豈非古人所謂可爲智者道難與俗人言者􅀋邪凡吾從事於斯也乆未見舉進士有如陳生而不如志者於其行姑以是贈之志上或有其字方从閣本送王秀才序或作王塤吾常以爲孔子之道大而能􅀶門弟子不能徧􅀚而盡識也故學焉而皆得其性之所近方无為字大而下方有其字其後離散分處諸侯之國又各以所能授弟子原逺而末益分方从閣本作引今按以分爲引盖草書之誤然幸有它本可證方乃不取而独信其誤何哉蓋子夏之學其後有田子方子方之後流而爲莊周故周之後喜稱子方之爲人故下方有莊字荀卿之書語聖人必曰孔子子弓孫曰荀子非十二子篇云无置錐之地而王公不能与之争名在一大夫之位則一君不能独畜一囯不能独容是聖人之不得势者也仲尼子弓是也儒效篇云非大儒莫之能立仲尼子弓是也子弓之事業不傳惟太史公書弟子傳有姓楚元王傳因仰而言曰夫和平之音淡薄而愁思之聲要妙讙愉之辭難工而窮苦之言易好也之音或作者之語非是是故文章之作􅁪發於羇旅草野至􅀂王公貴人氣滿志得非性能而好之則不暇以爲全􅀂方作􅀂至氣滿志得方作氣得志滿今僕射裴公開鎭蠻荆統郡惟九方无僕射裴三字常侍楊公領湖之南壤地二千里方无之字德刑之政並勤爵禄之報兩崇乃能存志乎詩書寓辭乎詠歌往復循環有唱斯和搜竒抉怪雕鏤文字與韋布里閭憔悴專一之士較其毫􅁵分寸鏗鏘發金石幽眇感􅀑神信所謂材全而能鉅者也􅀑神方作神􅀑兩府之從事與部屬之吏屬而和之苟在編者咸可􅀚也冝乎施諸樂章紀諸􅁽書在或作有非是從事曰子之言是也告於公書以爲荆潭唱和詩序送幽州李端公序李益時佐凼州劉済幕今相囯李藩也元年元和元年今相國李公爲吏部貟外郎年下或有春字洪玉父云是年春公猶在江陵安得有偕朝道語愈嘗與偕朝道語幽州司徒公之賢曰某前年􅀍詔告禮幽州德宗崩以藩爲告哀使故至幽州入其地迓勞之使里至毎進益㳟里或作累或作狎及郊司徒公劉济也紅帓首鞾許戈切亦作靴袴握刀左右雜佩帓或作帕方从杭本刀下有在字而讀連下文左字爲句謝本又挍作在右今按􅀂如方意則當云左握刀右雜佩矣不應云握刀在左亦不應唯右有佩也在爲衍字无疑杭本誤也礼䟽云帶劔之法在左右手抽之爲便則刀不當在右謝本亦非矣左右雜佩當自爲一句内則所謂左右佩用者也弓䩨服韔丑亮切韔或作在方从閣杭蜀􅁐作張引􅀃文云弓施弦爲張又云服弓衣也今按韔服皆弓室也然詩云言韔其弓又曰交韔二弓則韔字又可通作虚字用矣此弓韔服謂納弓於服耳况弓之施弦与否於服无利害作張非是矢揷房交云左傳抽天納房房箭舎也俯立迎道左方从閣杭本道作賔非是某禮辭曰公天子之宰禮不可如是及府又以其服即事某又曰公三公不可以將服承命卒不得辭卒上或有及館又如是一句方从閣杭􅁐粹无之今按此據次第當有此句但下文云上堂即客階坐必東嚮􅀂至館如此即是常礼不足言唯在府如此乃見其尊事天子使者不敢以主礼自居之意當从方本爲是上堂即客階坐必東向偕下方複出即客二字云文粹亦有即字則知古本誠然也今按􅃨岀二字古本虽有然不知是何文理不足爲正也愈曰國家失太平於今六十年夫十日十二子相配數窮六十其將復平句平必自幽州始亂之所出也平作乎今按若作乎字而属上句則下文不應便重出如開元時乎下句但云必自幽州始而上无平字即又不成文理今定作平仍属下句今天子大聖司徒公勤於禮庻幾帥先河南北之將來覲奉職如開元時乎李公曰然今李公旣朝夕左右必數數爲上言元年之言殆合矣端公歳時來壽其親東都東都之大夫士莫不拜于門其爲人佐甚忠意欲司徒公功名流千萬歳請以愈言爲使歸之獻方无復岀東都字大夫士或作士大夫朱文公校昌黎先生集卷之二十
