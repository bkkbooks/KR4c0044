front:
  text: 朱文公校昌􅀺先生集卷之二十六考異音釋附
  hash: sha256:fd602dd5a0a1b1d648c68e4b5b00382eedab7ff56a579ef080c7d8e1fdc24e00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_026-1a}
body:
  text: 碑誌唐朝散大夫贈司勲貟外郎孔君墓誌銘方无郎字韓曰孔子三十六丗孫昭義節度盧從史有賢佐曰孔君諱戡字君勝從史爲不法君隂爭不從則於㑹肆言以折之從史羞面頸發赤抑首伏氣不敢出一語以對頸一作顔伏或作吐方云叔孫通傳所謂伏抑首者也作吐非今按漢􅀓言㐲仰首言㐲地而抑首也此言㐲氣猶言屏氣耳与漢傳語異立爲君更令改章辭者前後累数十坐則與從史􅀃古今君臣父子道順則受成福逆􅂺危辱誅死曰公當爲彼不得爲此從史常聳聽喘汗死下或有且字常或作當非是居五六歳益驕有悖語君爭无改悔色則悉引從亊空一府往爭之色或作意亦通作也非是從史雖羞退益甚君泣語其徒曰吾所爲止於是不能以有加矣以有或作有以遂以疾辭去卧東都之城東酒食伎楽之燕不與當是時天下以爲賢論士之宜在天子左右者皆曰孔君孔君云方无者字皆上方从閣本有唯字或无復出孔君字或􅃨出云字㑹宰相李公鎭揚州首奏起君君猶卧不應猶或作独從史讀詔曰是故舎我而從人耶即誣奏君前在軍有某事上曰吾知之矣奏三上乃除君衛尉丞分司東都詔始下門下給亊中吕元膺封還詔書上使謂吕君曰吾豈不知戡也行用之矣明年元和五年正月將浴臨汝之湯泉壬子至其縣食遂卒年五十七公卿大夫士相弔於朝処士相弔於家君卒之九十六日詔縛從史送闕下数以違命流于日南遂朝贈君尚書司動貟外郎蓋用嘗欲以命君者信音伸其志其年八月甲申從葬河南河隂之廣武原南下或有府字隂下或有郷字廣武原方作某地云唐河南府无河隂縣今按元和郡囯志河南府有河隂縣君於爲義􅀂􅄝欲勇不顧前後於利與禄則畏避退処如怯夫然始㪯進士第自金吾衛録事爲大理評事佐昭義軍上下或有及字軍下或有帥字軍帥死從史自其軍諸將代爲帥或无自其字請君曰從史起此軍行伍中凡在幕府唯公無分寸私分或作方非是公苟留唯公之所欲爲君不得巳留一歳再奏自監察御史至殿中侍御史君或作居從史􅀄聽用其言得不敗後不聽信惡益聞君棄去遂敗祖某某官贈某官父某某官贈某官諸本作祖如圭皇海州司户贈工部貟外郎父岑父皇著作郎贈駕部貟外郎方从蜀本云仐本所紀父祖官聀多誤盖後人續増公諸志皆載三丗此只言父祖巳非考丗系表及孔戣志此以如珪作如圭郎中作貟外郎著作佐郎為郎又非也駕部乃戡贈官此以為其父所贈又非也今按此姑从方本无大利害但方詆諸本止載二丗為不入例而其所拠之本此志亦只載二丗云駕部乃戡所戡官而戡实贈司勲皆非是丗表戣志与此志文亦未知其熟為得失恐皆未足以判其是非也君始娶弘農楊氏女卒又娶其舅宋州刺史京兆韋屺女皆有婦道凡生一男四女皆㓜前夫人從葬舅姑兆次卜人曰今兹歳未可以祔從卜人言不祔君母兄戣音逵尚書兵部貟外郎母弟戢殿中侍御史以文行稱朝廷將葬以韋夫人之弟前進士楚材之狀授愈曰請爲銘銘曰允義孔君兹惟其藏更千萬年無敢壞傷方从杭本无傷字今按此傷字諸本皆有文理音韵皆无可疑方氏特以杭本脱漏遂不之信寕使此銘為歇後語而不肯以諸本􅀘之故中散大夫河南尹杜君墓誌銘或无散字君方作尹杜氏自戴侯畿始分戴侯之子恕爲幽州刺史今居京兆諸杜其後也其季寛孝廉郎中寛後三丗曼爲河東太守葬其父洹水之陽方无之陽字其後丗皆從葬洹水及正倫爲太宗宰相猶封㐮陽公太宗始詔葬京兆㐮陽公無子以兄正藏子志靜後遂嗣襄陽公生僑爲懷州長史棄官老沁水上爲富家卒葬懷州武陟長史生損爲左司郎中卒贈少大理或作大理少􅀸大理生廙音異大理或作少卿爲鄭州録亊參軍死思明乱贈吏部郎中公諱謙字某郎中第三子㪯進士第司徒北平王燧戰河北掌書記累官至監察御史其後佐徐泗州軍遂至濠州刺史徐泗州軍乱以兵甲三千人防淮道不絶晁本如此方及諸本甲三千人四字皆在下文金魚之下而魚下復有兵字殊无理甲字以疑衍或當在兵字上姑闕以竢知者有功加御史中丞賜紫衣金魚入爲刑部郎中以能官拜蘇州刺史旣辭行上書曰李錡且反必且奏族臣上固爱其才書奏即除吏部郎中或无中字遂爲給亊中出爲商州刺史金商防禦使改河南少尹行大尹事半歳拜大尹元和四年十一月二十二日无疾暴薨年六十明年二月甲午從葬懷州夫人常山郡君張州彭州刺史贈礼部侍郎蔇九利切之女生子男三人柔立爲天長主簿詞立爲壽州參軍誼立爲順宗挽郎女一人順上或无爲字將葬公之母兄太斈愽士冀與公之夫人及子男女謀曰葬宜有銘凡與我弟游而有文者誰乎遂來請銘銘曰杜氏大家丗有􅂋人承継綿綿以及公身始爲進士乃篤朋友及作大官克施克守及作或作乃作纂辭奮筆涣􅀂不思公牒盈前􅀏語指麾禄以給求食以㑹同不畜不收庫廐虚空事在于人日逺日忘在于一作不在何以傳之刻此銘章唐銀青光禄大夫守左散􅀐常侍致仕上柱囯㐮陽郡王平陽路公神道碑銘平陽或作陽平方从石本云攷唐丗系表當从平陽今按此篇多従方氏所㨿石本惟路氏逺有代序自隋尚書兵部侍郎諱衮四代而至冀公衮或作充方从石本云閣杭本丗表作兖代或並作丗冀公諱嗣㳟以小邑蕭関令發聞開元受賜更名書于太史令下或有問字賜或作錫治行灵州終功南􅀖享有丕祉紹開厥家官至兵部尚書封冀囯公薨贈尚書右僕射司空治或作始或无司空字公諱應字從衆冀公之嫡子用大臣子謹飭擢至侍御史著作郎選刺䖍州選或作迁割餘雩都作縣安逺以利人屬餘或作􅀠人或作民下同鑿敗灘石以平贛古暗切又音感水名在豫章唐史云鑿贛石挭嶮以通州道梗陶甓而城罷人屡築詔嗣冀封又加尚書屯田郎中進服色遂臨于温築隄岳城横陽界中二邑得上田除水害上田或作上苗拜尚書兵部郎中兼御史中丞淮南軍司馬改刺廬州又甓其城人不歳苫或作苦入爲尚書職方郎中兼御史中丞佐塩鐵使使江東有功用半歳歴常州遷至宣歙池觀察使進封襄陽郡王或作公非是至則出倉米下其估半以􅅒餓人蜀闢誅行軍千五百人於蜀蜀闢或作刘闢或蜀下别有刘字李錡將反以聞置郷兵萬二千人錡反命將期以卒救湖常坐牢江東心錡以無助敗縛作響山亭營軍于左右權丞相善之鑱其􅀃響山石居宣響山宣州山名五年以疾去位校其倉得石者五十萬餘府得錢千者八十萬石者方无者字公之爲州逢水旱喜賤出與人歳熟以其得収常有贏利故在所人不病飢而官府畜積人或並作民贏或作餘元和六年天子憫公疾不可煩以職即其処拜左散􅀐常侍以其禄居其歳九月望薨于東都正平里第年六十七歳上或无其字年上或有享字明年葬京兆萬年少陵原夫人滎陽鄭氏祔旣其子臨漢縣男貫與其弟賞貞謀曰宜有刻也旣下或有而字告於叔父御史大夫鄜坊丹延􅀚察使恕因其族弟進士羣以來請銘遂以其事銘曰冀公之封維艱就功㐮陽継大啓慶自躬于䖍洎温厥緒旣作以及職方遂都􅀖伯朝夕人事下完上实師于其郷鄰宼逼屈營居響山牆屋脩施脩諸本皆然方弃不録而直作循字説見首篇襃功刻表丞相之辭功方作加受代而家叙䟽及邇病不能廷食禄卒齒凡代大家維難其保凡代一作凡丗旣􅂋旣願戒于終咎願或作碩伊我㐮陽克愼以有延􅂌後承莫不率守承或作丞有墓于原維樹在經在或作有以告無期愽士是銘愽士或作傳丗按公是时正爲愽士或作非是烏氏廟碑銘元和五年天子曰盧從史始立議用師于􅁪乃隂與㓂連夸謾兇驕出不遜言其執以來其四月中貴人承璀七罪切即誘而縛之其下皆甲以出操兵趨譁牙門都將烏公重胤當軍門叱曰天子有命從有常敢違者斬從下或有者字於是士皆歛兵還營卒致從史京師壬辰詔用烏公爲銀青光禄大夫河陽軍節度使兼御史大夫封張掖郡開國公居三年河陽稱治詔贈其父工部尚書且曰其以廟享其以或作以其即以其年營廟于京師崇化里軍佐竊議曰先公旣位常伯而先夫人無加命號名差卑於配不宜語聞詔贈先夫人劉氏沛國太夫人八年八月廟成三室同宇祀自左領府君而下作主于第乙巳升于廟三室同宇方云史記谓陽五帝庿同宇韋昭曰謂上同下異也宇一作牢兆今按後漢以來公私廟制皆爲同堂異室方説是也烏氏著於春秋譜於丗本列於姓􅁐在莒者存在齊有餘枝鳴皆爲大夫斉下或有者字餘下或有有字秦有􅀗爲大官其後丗之江南者家鄱陽處北者家張掖或入夷狄爲君長唐􅀄察爲左武衛大將軍實張掖人其子曰令望爲左領軍衛大將軍孫曰􅀩爲中郎將是生贈尚書諱承玼字某贈下或有工部字玼或作治方云新史承玼有傳字德􅃳重胤傳亦云承玼子也温公考異嘗加辨正宋樊本皆作承玼盖許孟容嘗爲承玼碑石本猶傳於丗新傳盖本此也烏氏自莒齊秦大夫以來皆以材力􅂋及武德以來始以武功爲名將家開元中尚書管平盧先鋒軍屬破奚契丹属或作屡今按属以連属之意從戰捺奴􅂚切禄走可突干諸本多作突于或作汗于方从許碑定从干云可突干契丹之勇將也新傳奚契丹入宼承玼破於捺禄山又􅀾白城承玼按隊出其右斬首万計可突干奔北渤海擾海上至馬都山吏民逃徙失業尚書領所部兵塞其道壍原累石綿四百里深髙皆三丈宼不得進民還其居歳罷運錢三千萬餘或无擾海字方从李本增云新傳亦考累或作壘許碑云武藝出海濵至馬都山屠䧟邑公以本營土馬防遏要害武藝即渤海主也黒水室南曰契丹以􅀐五千來屬麾下邊威益張其後與耿仁智謀􅀃史思明降思明復叛尚書與兄承恩謀殺之事發族夷尚書獨走免許碑承恩承玼之從父兄也李光弼以聞詔拜冠軍將軍守右威衛將軍檢校殿中監封昌化郡王石嶺軍使石嶺或作左領方云杭蜀粹与許碑新傳皆作石嶺積粟厲兵出入耕戰以疾去職貞元十一年二月丁巳薨于華隂告平里年􅀂干許碑年九十六即葬於其地二子大夫爲長季曰重元爲某官銘曰烏氏在唐有家於􅀄左武左領二祖紹居左領或作右領中郎少卑屬于尚書不償其勞乃相大夫授我戎節制有壃墟制有或作有其壃或作疆數備禮登以有宗廟方无数字登下有壇字今按数備礼登数字乃名位不同礼亦異数之数言制数旣備礼亦増崇也􅀽氏廟碑所謂数以立廟亦是此意􅀂如方本即上句巳言授節不􅀿至此始言登壇况登壇又與立廟不相関乎作廟天都以致其孝右祖左孫爰響其報蜀本文苑作左祖右孫今按廟制以四爲上方本爲是云誰其子其有無孫其有或作就其克對無羞乃惟有人克方作光念昔平盧爲艱爲瘁大夫承之危不棄義四方其平士有怠息來覲來齋以饋􅁰稷唐故河東節度􅀚察使滎陽鄭公神道碑文河東節度使贈尚書右僕射鄭公葬在滎陽索上元和八年六月庚子太史尚書比部郎中護軍韓愈刻其墓碑曰司馬氏遷江南有鄭豁者仕慕容垂國爲其太子少保其孫简當拓拔魏爲滎陽太守後簡者號其族爲南祖南祖之鄭入唐有爲利之景谷令者曰嘉範於公爲曾祖是生撫俗爲泗之徐城令徐城生公之父曰洪卒官涼之户曹參軍涼之或作涼州公諱儋都甘切少依母家隴西李氏舉止異凡兒其舅吏部侍郎季􅀸謂其必能再立鄭氏季或作李謂下或有曰字方本謂作曰其必作必其稍長能自課學明左氏春秋課或作謀今按蜀志岀師表自謀字文選亦作自課恐公用此語以進士選爲太原參軍事對直言䇿拜京兆髙陵尉考府之進士能第上下以實不姦樊僕射澤以襄陽兵戰淮西公以參謀留府能任後事戸曹殯于涼涼地入西戎自景谷徐城三丗皆未還滎陽葬公解官舉五䘮爲三墓葬索東徐城墓無表公能㓜長哀感心求不置以得舊人指告其處公能下或有使字方无哀字云自少而長求之不置也今按心字當属下句其後爲大理丞太常博士遷起居郎尚書司封吏部二郎中能官舉其名德宗晚節儲將於其軍以公爲河東軍司馬能以無心處嫌間卒用有就間或作問非是或无卒字有就或作其􅀃非是貞元十六年將􅀃死即詔授司馬節節度河東軍方云考􅃊綬傳將􅀃李􅀃也或无即詔字馬下或无􅃨出節字除其官爲工部尚書太原尹兼御史大夫北都留守公之爲司馬用寛廉平正得吏士心及昇大帥持是道不變昇方作升帥或作師部將有因貴人求要職者公不用用老而有功無􅀔而逺者削四鄰之交賄省姱嬉之大燕校講民事施罷不竢日姱或作誇校講或作講校用能以十月成政氓征就寛軍給以饒氓或作賦或作民十七年疾廢朝夕八月庚戍薨享年六十一天子爲之不能臨朝者三日或无能字贈尚書右僕射即以其年十月辛卯葬索上疾比薨醫問交道比葬弔贈賜使者相及凡河東軍之士與太原之氓吏及旁九郡百邑之鰥寡外夷狄之統於府者聞公之薨皆􅂘曰吾其如何軍下或无之字或作之軍氓方作民公與賔客朋遊飲酒必極醉投壷博弈窮日夜􅀂樂而不厭者平居簾閣據几終日不知有人與或作爲􅀂方從閣蜀本作苦今按二本之无文理有如此者而方皆从之可怪也别自號白雲翁方云令狐楚嘗爲太原從事唐志有表奏七卷目號白雲孺子盖以媚儋也名人魁士昌氏春秋云疾斈而不能爲魁士名人者未之有也鮮不與善好樂後進及門接引皆有恩意与善属上句好楽属下句方从蜀本以善爲其而連好楽而句又云名人魁士吕氏春秋語今按蜀本无理又如此而方从之然不言閣柆本則二本固與它本同矣方最信此三本今旣自有不同方乃舎二本之明白而从一本之訛謬則其取舎又自不可曉者非獨古本誤之也始娶范陽盧氏女生仁本仁約仁載皆有文行二季舉進士皆早死仁本爲後子獨存不樂舉選年三十餘始佐河陽軍後娶趙郡李氏生三女二夫人凡三男五女長女嫁遼東李繁䌓亦名臣子有才學遺命二夫人各别爲墓不合葬系曰士常患􅀔卑不能推功德及人常或作嘗下同常患貧無以奉所欲得患下或有势字􅀂鄭公者勤一生以得其位而曾不得須􅁷有焉雖然􅀚其所旣立其可知巳嗚呼哀哉魏博節度􅀚察使沂國公先廟碑銘或有田氏字别本云朝議郎守尚書比部郎中史舘修撰護軍韓愈奉勑撰歐陽公曰自天聖以來斈者多讀韓文而患集本舛訛推予家本更校時人共傳號爲善本及後集録古文得韓文之刻石如羅池黄陵廟碑之􅀋以校予家集本舛謬猶多􅀂田弘正碑則尤甚盖由諸本不同往往妄加改易今以碑校印本􅀄未必誤多爲校讎者妄改易之乃知文字之傳乆而轉失其真者多矣則校讎之際决於取舎不可不謹也元和八年十一月壬子上命丞相元衡丞相吉甫丞相絳召太史尚書比部郎中韓愈至政事堂傳詔曰田弘正始有廟京師朕惟弘正先祖父厥心靡不嚮帝室訖不得施乃以教付厥子維弘正衘訓事嗣朝夕不怠事嗣或作嗣亊嗣下或有于字此篇今亦从方本所據石本以能迎天之休顯有丕功維父子繼忠孝予維寵嘉之是以命汝愈銘欽哉惟時臣愈承命悸恐明日詣東上閤門拜䟽辭謝不報退伏念昔者魯僖公能遵其祖伯禽之烈周天子實命其史臣克作爲駉古熒切駜皮必切泮閟之詩使聲于其廟以假魯陵今天子嘉田侯服父訓不違用康靖我國家服上或有能字靖或作静蓋寵銘之所以休寧田氏之祖考而臣適執筆􅀠太史奉明命其可以辭或无隷字謹案魏博節度使銀青光禄大夫檢校工部尚書兼魏州大都督府長史御史大夫沂國公田弘正北平盧龍人州或作愽或无兼字故爲魏博諸將忠孝畏愼田季安卒其子㓜弱用故事代父人吏不附迎弘正於其家使領軍事弘正籍其軍之衆與六州之人還之朝廷悉除河北故事比諸州故得用爲帥巳而復贈其父故滄州刺史兵部尚書母夫人鄭氏梁國太夫人得立廟􅀕三代曾祖都水使者府君􅀕􅀄室祖安東司馬贈襄州刺史府君􅀕二室兵部府君􅀕東室其銘曰唐繼古帝海外受制此據石本外或作内受或作臣狎于太寜燕盗以驚狎或作治羣黨相維河北失平號登元和大聖載營風揮日舒咸順指令嶪嶪音業山髙魏土嬰兒戯兵嬰児謂懷諌吏戎愁毒莫保􅆎頸或作領人曰田侯其德可􅀝呌譟奔趨乗門請起田侯攝事奉我天明天或作王方云左傳范氏中行氐反易天明注言不事君也又云二三子順天明公語出此束縛弓戈考校度程提壃与疆同籍户來復􅀖經提或作提帝欽良臣曰維錫予嗟我六州始復故􅀄告慶于宗以降命書于宗或作宗廟以降或作降以旌節有韜豹尾神旗櫜兠戟纛以長魏師櫜方作蜀本作櫜石本同但省文耳今按櫜謂弓服橐乃囊之无底者非兵仗也當从石本田侯稽首臣愚不肖迨兹有成祖考之教帝曰俞哉維汝忠孝予思乃父追秩夏卿嫓德娠賢媲匹詣切娠之刃切又音身嫓配也娠孕也言梁囯配兵部之德娠賢謂生弘正也左氏后緍方娠梁國是榮田侯作廟相方視阯見于􅆱􅀛祖考咸喜暨曁音忌果毅也礼戎容曁曁田侯兩有文武訖其外庸謂外庸之訖則當入爲輔相可作承輔承或作氶咨汝田侯勿亟勿遲覲饗式時爾祖爾思饗或作嚮爾祖爾思方作祖考之思或作爾祖之思朱文公校昌􅀺先生集卷之二十六
