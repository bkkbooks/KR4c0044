front:
  text: 朱文公校昌黎先生外集卷之二
  hash: sha256:610e35e9214a1bbd9f7827d2f7b42d33aeb71e026510ed6360e6fe2fd6879a83
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_044-1a}
body:
  text: 上賈滑州書賈耽以貞元二年為滑州刺史此篇方从蜀􅁐愈儒服者不敢用他術十進術或作藝又惟古執贄之禮竊整頓舊所著文一十五章以爲贄而喻所以然之意於此章或作首下同曰豐山上有鍾焉視日山海經云豊山有九鍾和霜鳴注云霜降則鍾鳴人所不可至霜旣降則鏗然鳴蓋氣之感非自鳴也或无旣字愈年二十有三讀書學文十五年言行不敢戾於古人或无有字三或作二讀書斈文十五年洪云公与邢尚書書云生七歳而讀書十三而能文二十有五而擢第於春官愚固泯泯不能自計周流四方無所適歸固或作故非是伏惟閤下昭融古之典義含和發英作唐德元簡棄詭􅀃保任皇極是宜小子刻心悚慕又焉得不感而鳴哉和或作華元或作臣方云周書注元德之首也徒以獻策闕下方勤行役且有􅀒薪之疾不得稽首軒階遂拜書家僕待命于鄭之逆旅僕或作僮逆上或无之字伏以小子之文可見於十五章之内小子之志可見於此書與之進敢不勉與之退敢不從方作退進退之際實惟閤下裁之上考功崔虞部書或作上考功宏詞官虞部崔貟外書愈不肖行能誠無可取行巳頗僻與時俗異態抱愚守迷固不識仕進之門廼與羣士爭名競得失行人之所甚鄙求人之所甚利其爲不可雖童昬實知之失一或无行字如執事者不以是爲念援之幽窮之中推之髙顯之上是知其文之或可而不知其人之莫可也知其人之或可而不知其時之莫可也不知其人上方有是字旣以自咎又歎執事者所守異於人人句廢耳任目華實不兼故有所進故有所退以方作巳廢上或有之字不疑當作必今按人字属上句且執事始考文之明日浮囂之徒巳相與稱曰某得矣某得矣問其所從來必言其有自一日之間九変其􅀃凡進士之應此選者三十有二人其所不言者數人而巳而愈在焉不言方作不云及執事旣上名之後三人之中其二人者固所傳聞矣華實兼者也果竟得之而又升焉或无其字固上或有則字果或作畢下同其一人者則莫之聞矣實與華違行與時乖果竟退之如是則可見時之所與者時之所不與者之相逺矣然愚之所守竟非偶然故不可變竟非或作慬非故或作固凡在京師八九年矣足不跡公卿之門名不譽於大夫士之口或无譽字於或作一或无士字始者謬爲今相國所第此時惟念以爲得失固有天命不在趍時而偃仰一室嘨歌古人今則復疑矣未知夫天竟如何命竟如何由人乎哉不由人乎哉未上或有又字或无夫字天竟或作天意人乎或並作乎人欲事干謁則患不能小書困於投刺欲上或有夫字於或作乎欲斈爲佞則患言訥詞直卒事不成爲方作于患下或有於字卒或作則徒使其躬儳焉而不終日其躬方本如此而㪯正躬作窮蓋誤而諸本作如方云蜀本作而今本皆以表記語刋作如然不知古而如同意此語不當以如似之義讀之唐人惟韓栁知此子厚荅韋中立書假而以僕年先吾子与公此文是也董彦逺曰春秋書星隕如雨左氏室如縣磬是皆以如爲而風俗通囯人望君而望歳鄒陽書白頭而新是皆以而爲如按家語君入廟如右荀子作而右楽府艾如張亦作艾而張今人所用漣而攷之李善文選乃連而也实用易之泣血漣如爲義去古益逺字義多失惟韓栁文時見一二因爲詳之今按孟子望道而未之見亦是此例方言又有而如古字通用之􅀃然陸德明論當時語音之失有曰此人則而如靡異盖不以爲然也然則此而字湏讀爲如乃爲正耳董引室如縣磬乃拠左傳作罄字而杜預注云如而也言居室而資糧縣尽故其􅀃如此囯語則作縣磬而韋昭注云府藏空虚但有榱梁如縣磬左傳蓋借罄爲磬而杜氏誤解囯語則正作磬字而韋􅀃得之董氏所引不足拠以爲􅀃今併論之附見于此是以勞思長懷中夜起坐度時揣巳廢然而返雖欲從之求由也巳又常念古之人日巳進今之人日巳退常方作嘗夫古之人四十而仕其行道爲學旣巳大成而又之死不倦故其事業功德老而益明死而益光故詩曰雖無老成人尚有典刑言老成之可尚也可上或有人字又曰樂只君子德音不巳謂死而不亡也巳或作忘亡或作忘方作巳夫今之人務利而遺道其學其問以之取名致官而巳方无夫字遺或仁違問上或无其字得一名獲一位則棄其業而役役於持􅁠者之門故其事業功德日以忘月以削老而益昏死而遂亡位或作官忘方作亡愈仐二十有六矣距古人始仕之年尚十四年豈爲晚哉今下或有年始字豈上或有矣夫字行之以不息要之以至死不有得於今必有得於古不有得於身必有得於後用此自遣且以爲知已者之報執事以爲如何哉其信然否也爲如或作謂如仐所病者在於窮約無僦屋賃僕之資無緼􅂁糲食之給驅馬出門不知所之斯道未䘮天命不欺豈遂殆哉豈遂困哉竊惟執事之於愈也無師友之交無乆故之事無顔色言語之情卒然振而發之者必有以見知爾故盡暴其所志不敢以黙执亊下方有者字愈下方无也字顔色言語方作言語顔色尓或作耳以黙或作黙黙又懼執事多在省非公事不敢以至是則拜見之不可期獲侍之無時也是以進其􅀃如此庶執事察之也至下或有於字期下或有也字庶或作幸與張徐州薦薛公達書此篇方本有之今疑非公作當刪與少室李拾遺書諸本室下有山字李下有渤字方从蜀􅁐新書云此書作於元和三年公時尚為博士新書云洛陽令誤也十二月某日愈頓首方无此八字伏承天恩詔河南敦諭拾遺公朝廷之士引頸東望􅀂景星鳯皇之始見也爭先覩之爲快拾遺公新書作遺公萹内並同方今天子仁聖小大之事皆出宰相樂善言如不得聞小大㪯正作大小恐誤事或作士自即大位巳來於今四年凡所施者無不得宜者或作爲凡所施者新書作凡所出而施者勤儉之聲寛大之政幽閨婦女草野小人皆飽聞而厭道之草或作山人新書作子愈不通於古請問先生丗非太平之運歟加又有非人力而至者愈方作某於作于无丗字非作匪新書作兹非太平丗欤年榖熟衍符貺委至􅀂干紀之姦不戰而拘纍彊梁之兇銷鑠縮栗迎風而委伏其有一事未就正自視􅀂不成人四海之所環無一夫卑而兵者新書无自字視或作是非是而兵或作与兵􅀂此時也拾遺公不疾起與天下之士君子樂成而亨之斯無時矣􅀂上或有未有字昔者孔子知不可爲而爲之不巳足跡接於諸侯之國即可爲之時自藏深山牢関而固距即與仁義者異守矣或无足跡字想拾遺公冠帶就車惠然肯來舒所蓄積以􅀘綴盛德之有闕遺利加於時名垂於將來踊躍悚企傾刻以冀闕遺方作遺闕新書无有遺二字利下或无加字加於新書作加于垂下亦无於字傾或作頃又竊聞朝廷之議必起拾遺公使者往􅀂不許即河南必継以行或无即字拾遺徴君􅀂不至必加髙秩如是則辭少就多傷於廉而害於義拾遺公必不爲也則或作即新書无則字善音愈今本作瘦傳冩之誤陳壽起又廢卒亦無所至王隱謗退死家習鑿齒無一足孫日鑿齒字彦威㐮陽人以脚疾廢居里巷符堅稲㐮陽大􅀃之与諸鎮書日昔晋平呉利在二陸仐獲江南獲士􅅻一人有半耳崔浩范曄赤誅魏収夭絶宋孝王誅死足下所稱呉兢亦不聞身貴而今其後有聞也赤或作赤族二字夭或作天或无仐其字或无其後字夫爲史者不有人禍則有天刑豈可不畏懼而輕爲之哉唐有天下二百年矣聖君賢相相踵其餘文武之士立功名跨越前後者不可勝數豈一人卒卒能紀而傳之邪士上或尤之字能上或无􅃨出卒字方云司馬迁傳卒卒无湏􅁷之間顔日促遽之意也僕年志巳就衰退不可自敦率或无就字敦率方云猶敦勉也或作敢爲或无此二字仐按此二字恐有脫誤宰相知其無他才能不足用哀其老窮齟齬無所合不欲令四海内有戚戚者猥言之上苟加一職榮之耳非必督責迫蹙令就功役也他上方無無字就下或有其字賤不敢逆盛指行且謀引去且傳聞不同善惡隨人所見傳聞或作傳云聞見甚者附黨憎愛不同巧造語言鑿空構立善惡事迹於仐何所承受取信而可草草作傳記令傳萬丗乎方无乎字􅀂無鬼神豈可不自心慙愧􅀂有􅀑神將不福人僕雖騃亦粗知自愛實不敢率爾爲也自心上或有可字非是或无心字夫聖唐鉅跡及賢士大夫事皆磊磊軒天地决不沈没或无聖字方从文􅁐决下有必字又云蜀本作落落掀天地而无必字又按决或作决地或作抉地今按古潮本軒亦作掀而无必字盖因栁子厚書云所云磊磊軒天地者决必沈没故諸本或誤加必字耳今從柳集作軒從潮本去必字今館中非無人將必有作者勤而纂之後生可畏安知不在足下亦宜勉之將必或作必將或脫不在二字愈再拜與大顛師書此書諸本皆无唯嘉祐小杭本有之其篇次在此与作召顛作巔師作知尚方本列於石刻之首今從杭本附此而名篇從方氏杭本又注云唐元和十四年刻石在潮陽靈山禅院宋􅂟曆丁亥江西􅀽陟丗弼得此書疑之因之滁用謁欧陽永叔永叔覧之日实退之語它意不及也方本略載其語又録欧公集古録跋尾云文公与顛師書丗所罕傳予以集録古文其求之博盖乆而後獲其以繫辭爲大傳謂著山林与著城郭无異等語宜爲退之之言其後書吏部侍郎潮州刺史則非也盖退之自刑部侍郎貶潮州後移􅀽州召爲囯子􅀕酒迁兵部侍郎乆之始迁吏部而流俗相傳但知爲韓吏部尔顛師遺記虽云長􅂟中立盖并韓書皆囯􅀄重刻故謬爲附益年方又注云今石刻乃元祐七年重立又云按公三簡皆邀速常語耳􅀄无崇信佛法之􅀃妄者旁沿别譔荅問等語以肆誣謗要當存此簡以觧後丗之惑今按杭本不知何人所注疑􅀽自書也更以跋尾参之其記欧公之語不謬矣而東坡􅄂說乃云韓退之喜大顛如喜澄􅀚文暢意非信佛法也而或者妄撰退之与大顛書其詞凡鄙虽退之家奴僕亦无此語仐一士人又於其末妄題云欧陽永叔謂此文非退之不能作又誣永叔矣蘇公此語盖但見集注之出於或人而未見跋尾之爲欧公親筆也二公皆号一代文宗而其去取不同如此覧者不能无惑然方氏尽載欧語而略不及蘇􅀃其所可見至吕伯恭乃於文鑑特著蘇􅀃以備乙覧則其同異之間又益後人之惑矣以余考之所傳王書最後一篇实有不成文理処但深味其間語意一二文势抑揚則恐歐􅀽方意誠不爲過但意或是旧本亡逸僧徒所記不真致有脫誤欧公特􅀚其大槩故但取其所可取而未暇及其所可疑蘇公乃斍其所可疑然亦不能􅀕其爲誤而直斥以爲凡鄙所以其論虽各有以而皆未能无所未尽也􅀂乃後之君子則又往往不能究其本根其附欧􅀃者旣未必深知其所以爲可信其主蘇氏者亦未必果以其􅀃爲然也徒幸其言可爲韓公觧紛􅀂有􅀘於丗教故特表而出之耳皆非可与实亊而求是者也至如方氏虽附欧􅀃然亦未免曲爲韓諱殊不知其言旣曰乆聞道德又曰側承道髙又曰所示廣大深逈非造次可諭又曰論甚宏博安得謂􅀄无崇信其􅀃之意邪韓公之事余於荅孟簡書盖已論其詳矣故不復論特從方本載此三書於别集并録欧公二語而附蘇􅀃方􅀃於其後且爲全載書文於此而考其同異訂其謬誤如左方以爲讀者以此􅀚之則其决爲韓公之文而非它人之所能作无疑矣方氏所拠石本与杭本又自不同則疑傳冩之訛而欧公所疑官称之誤亦爲得之但愚意猶恐當時旣謫刺逺州亦未必更帶侍郎旧官也方氏所駁丗俗僞造誣謗之書即仐所謂别傳者洪氏辨證云别傳載公与大顚往復之語深詆退之其言多近丗經義之􅀃又僞作永叔跋云使退之復生不能自觧免呉源明云徐君平見介甫不喜退之故作此文方氏又云周端礼曰徐安囯自言年二十三四時戯爲此今悔之无及然則其爲徐作无疑矣但君平字安道而方云安國未知便是君平否耳然靈山石刻張繫所撰其間載韓公問大顛云西囯一真之法何不教人顛云教人達性离无明貪嗔驕慢不生嫉妬此亦釋子常言􅀄无難觧但韓公素所未聞而頗中其病文虽不尽觧而適亦有㑹於心耳又載韓公青云人生貴賤各有定分何得以三塗之􅀃誑人而顛荅云公何不常守侍郎之任而來此爲宫耶則恐其有謬誤或其徒所附益也愈啓方无此二字孟夏漸􅀬惟道體安和􅀬下或有㐲字愈弊劣無謂坐事貶官到此乆聞道德切思見顔切杭作竊方㨿石本如此切乃懇切之意此下大率多從石本云縁昨到來未獲參謁儻能暫垂見過實爲多幸杭本无倘能以下十字巳帖縣令具人船奉迎日乆竚瞻帖杭作貼乆當作夕竚方拠石本作佇不宣愈白方拠石本无愈白字仐拠石本此下具衘姓名下云上顛師四月七日愈啓方无此二字海上窮處無與話言側承道髙思獲披接專輒有此咨屈儻惠能降喻非所敢望也惠字疑衍或下有然字而併在能字之下諸本及石本皆誤至此一二日却歸髙居亦無不可旦夕渇望杭本无倘惠以下二十七字而有此旬來晴明不甚热倘能乗間一訪实謂幸也十八字今按此旬以下乃下篇語定從石本不宣愈白方㨿石本无愈白字今㨿石本与前書同但云六月􅀄三日愈啓方无此二字惠匀至辱答問珍悚無巳所示廣大深逈非造次可諭爾作量易大傳曰書不盡言言不盡意然則聖人之意其終不可得而見邪方㯫石本意作旨无而字邪作也仐按易实作意邪而无終而二字大抵石本亦自多誤也後放此如此而論讀來一百遍一字疑衍蘇氏所謂凡鄙盖指此等処耳不如親見顔色隨問而對之易了方拠石本如此但无親字今按親下當有見字而两本皆闕故不敢増而空其処以待知者杭但云不如親面而對之是亦蘇氏所謂凡鄙者然親字乃方本之闕文面字乃問字之誤筆而又脫去曰顔色随易了六字耳此旬來晴明旦夕不甚􅀬儻能乗閑一訪幸甚旦夕馳望杭本巳見上萹此不復出愈聞道無疑滯行止繫縳苟非所戀著則山林閑寂與城郭無異此從杭本但郭作皇仐㨿欧公語從方本方拠石本止下有所字縳下有爱恋字所下无恋字及則字而著字下復出著字及与字異下有邪字皆非是其用邪字尤不當律令亦所謂凡鄙者也但或疑非字下當有有字言於行止繫縳􅀂无所恋著則静閙一致語尤明白三或又疑非當作有則語意賔主尤順然未知孰是又諸本皆无不敢輒増改也大顛師論甚宏博而必守山林義不至城郭顛杭見上方无師字杭无義字城作州自激修行獨立空矌無累之地者非通道也自方作似然細考之与下文激修行四字皆可疑方又以也爲矣而井非通道四字萬於行字之下又以独為自而立下有於字皆非是勞於一來安於所適道故如是於杭作于適方拠石本与杭本並作識今得真石本考之乃如此然則方之所考亦不詳矣盖適猶便也与唯適之安之語用字略同言一來虽劳而旣來則當随其所便无如不安也道故如是即所以結上文道无疑滯之意方以如為此亦石本誤不宣愈頓首方拠石本无末三字仐拠石本与前二書同但云大顛禅師七月十五日不知韓公之於大顛旣聞其語而爲礼益恭如此何也朱文公校昌黎先生外集卷之二
