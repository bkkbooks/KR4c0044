front:
  text: 朱文公校昌黎先生集卷之十五考異音釋附
  hash: sha256:d5b64527b5397db16f61759d13d49d742772d9d2895909a7d03112e60894bc33
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_015-1a}
body:
  text: 書與孟東野書東野或作郊與足下别乆矣以吾心之思足下知足下懸懸於吾也以吾或作以余方从閣蜀本云除下文江湖予楽也一語餘並作吾各以事牽不可合并其於人人非足下之爲見而日與之處足下知吾心樂否也其於人人或无下人字􅀃見前卷荅張藉書或作它人非是方无此四字之処方作人処吾言之而聽者誰歟吾唱之而和者誰歟言無聽也唱無和也獨行而無徒也是非無所與同也足下知吾心樂否也无聽无和上或並有之而字行下方无而字与同方作以同􅀃巳見前足下才髙氣清行古道處今丗無田而衣食事親左右無違足下之用心勤矣足下之處身勞且苦矣混混與丗相濁獨其心追古人而從之从之方作从今之人云謝以貞元本定今按上語与丗相濁即是從今之人更着二字則贅而不詞矣舊書之不足據有如此者故特詳著其語云足下之道其使吾悲也使上方无其字去年春脫汴州之亂幸不死無所於歸遂來于此於或作与方作以今按送楊少尹序亦有此語主人與吾有故哀其窮居吾于符離雎上及秋將辭去因􅀍留以職事黙黙在此行一年矣到今年秋聊復辭去江湖余樂也與足下終幸矣李習之娶吾亡兄之女期在後月朝夕當來此張籍在和州居䘮家甚貧恐足下不知故具此白冀足下一來相視也自彼至此雖逺要皆舟行可至速圖之吾之望也春且盡時氣向􅀬惟侍奉吉慶愈眼疾比劇甚無聊不復一一尽時方本作時尽向作日今按方本无文理盖其意信本而不信理好竒而不喜常故其所取毎得乖戾暗澁之語虽此等无利害極分明処亦不能􅊵是可歎巳愈再拜答竇秀才書竇下或有存亮字愈白愈少駑怯於他藝能自度無可努力又不通時事而與丗多齟齬念終無以樹立遂發憤篤專於文學學不得其術不得上一有而字凡所辛苦而僅有之者皆符於空言而不適於實用又重以自廢是故學成而道益窮年老而智愈困智或作身今又以罪黜於朝廷逺宰蠻縣愁憂無聊瘴癘侵加喘喘焉無以冀朝夕足下年少才俊辭雅而氣銳雅或作清當朝廷求賢如不及之時當道者又皆良有司操數寸之管書盈尺之􅁓髙可以釣爵位循次而進亦不失萬一於甲科書方作尽循上或有􅀂字或无万一二字今乃乗不測之舟入無人之地以相從問文章爲事舟或作川身勤而事左辭重而請約非計之得也左或作􅀹非是雖使古之君子積道藏德遁其光而不曜膠其口而不傳者遇足下之請懇懇猶將倒􅅒傾囷羅列而進也其光二字方作丗曜或作耀請或作情囷一作箘云􅀂愈之愚不肖又安敢有愛於左右哉顧足下之能足以自奮愈之所有如前所陳是以臨事愧恥而不敢答也錢財不足以賄左右之匱急文章不足以發足下之事業章不足或作章不可稛苦隕切囯語日稛載而歸稛絭束也一作管子小正篇諸侯之使垂槖而入稛載而歸載而往垂槖而歸足下亮之而巳愈白上李尚書書李下或有实字月日將仕郎前守四門博士韓愈謹載拜奉書尚書大尹閤下載或作再古字通用或无尚書二字愈來京師於今十五年所見公卿大臣不可勝數皆能守官奉職無過失而巳未見有赤心事上憂國如家如閤下者或无如家二字今年巳來不雨者百有餘日種不入土野無青草而盗賊不敢起榖價不敢貴百坊百二十司六軍二十四縣之人皆􅀂閤下親臨其家老姦􅀫贓銷縮摧沮䰟亡􅅎䘮影㓕跡絶非閤下條理鎮服宣布天子威德其何能及此愈也少從事於文學見有忠於君孝於親者雖在千百年之前猶敬而慕之况親逢閤下得不候於左右以求效其懇懇謹獻所爲文兩卷凡十五篇謹或作請非敢以爲文也以爲謁見之資也進退惟命愈恐懼再拜賀徐州張僕射白兎狀或注建封字狀或作書云伏聞今月五日營田廵官陳從政献瑞兎毛質皦白天馴其心皦或作全或作皎其始實得之符離安阜屯安阜方求名如唐孟元􅀭董作西華屯是也今按下云得之軍田則此屯字乃屯田之屯也屯之役天朝行遇之迫之弗逸人立而拱屯或作田弗或作不竊惟休咎之兆天所以啓斍于下依􅀋託喻事之纎悉不可圗驗非睿智博通孰克究明愈雖不敏請試辨之或无愈虽不敏一語兎隂􅀋也又窟居狡而伏逆象也今白其色絶其群也馴其心化我德也人立而拱非禽獸之事革而從人且服罪也得之符離符離實戎國名又附麗也戎方从閤杭本作我名下注絶句二字䴡或作离今按實我囯名不成文理漢書衛青傳討涌泥破符离晋均日二王号也所謂戎囯從或取此不在農夫之田而在軍田武德行也不戰而來之之道也有安阜之嘉名焉道下方无也字安阜或作革附或作安附嘉方作喜又无名字皆非是伏惟閤下股肱帝室藩垣天下方无閤下字四方其有逆亂之臣未血斧鑕之属畏威崩析歸我乎哉其事兆矣諸本多如此嘉祐杭本亦然方本之属作其属属下句析作析云漢終軍傳野獸井角明同本也衆支内时示无外也殆將有觧編髪前左祍而蒙化者又王夢謂論今南師􅀗白虎偃武㒷文之應也􅀗之者張武張而猛也公言盖祖此今按嘉祐諸本之析二字文理分明方氏但據蜀本而不復著諸本之同異其所定又皆誤盖其属師我事小不足言不􅀂逆乱之臣歸我之為大而可願也崩折亦不成文􅀂用論語分崩離折之語則當从木􅀂用史記折而入於魏之語則當從手二義皆通然旣有崩字則似本用論語中字也是宜具跡表聞以承答天意小子不惠猥以文句微識蒙念或无不惠二字念方从文􅁐作合全无文理云睹兹盛美焉敢避不讓之責而黙黙耶方从杭蜀􅁐作黙貨也亦不成文理愈再拜上兵部李侍郎書蜀本生異字或作異非是十二月九日將仕郎守江陵府法曹參軍韓愈謹上書侍郎閤下愈少鄙鈍於時事都不通䁱家貧不足以自活應㪯覔官凡二十年矣薄命不幸動遭讒謗進寸退尺卒無所成性本好文學好或作喜因困厄悲愁無所告語遂得究窮於經傳史記百家之􅀃沈潜乎訓義反復乎句讀礱磨乎事業而奮發乎文章凡自唐虞巳來編簡所存大之爲河海髙之爲山嶽文􅁐作泰山与上下句不􅁼非是方从三本云明之爲日月幽之爲􅀑神纎之爲珠璣華實変之爲雷霆風雨竒辭奥㫖靡不通逹惟是鄙鈍不通曉於時事學成而道益窮年老而智益困智或作身私自憐悼悔其􅀄心髮秃齒豁不見知已夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊􅁊㪯以相國叔向􅂝手以上然則非言之難爲聽而識之者難遇也難為属上句為或作其則属下句云伏以閤下内仁而外義行髙而德鉅尚賢而與能哀窮而悼屈方本仁下賢下无而字今諸此上下四句本或皆有而字者為正或皆无之或上二句无而下二句有者亦通而方本必於其第一第三句去之使其參差齟齬而不可讀以為古則不淳从為今則不響不識其何意也自江而西旣化而行矣今者入守内職爲朝廷大臣當天子新即位汲汲於理化之日岀言㪯事宜必施設宜或作計旣有聽之之明又有振之之力寗戚之歌􅎦子紅切􅎦明鄭大夫明之言不發於左右則後而失其時矣謹獻舊文一卷扶樹教道有所明白南行詩一卷舒憂娯悲雜以瓌怪之言時俗之好所以諷於口而聽於耳也如賜覧􅀚亦有可采干黷嚴尊伏増惶恐愈再拜答尉遲生書下或注汾字愈白尉遲生足下或无愈白二字夫所謂文者必有諸其中是故君子愼其實實之美惡其發也不揜本深而末茂形大而聲宏行峻而言厲心醇而氣和昭晣者無疑優游者有餘體不備不可以爲成人辭不足不可以爲成文愈之所聞者如是有問於愈者亦以是對今吾子所爲皆善矣謙謙然􅀂不足而以徴於愈愈又敢有愛於言乎抑所能言者皆古之道古之道不足以取於今吾子何其愛之異也或无復出古之道三字賢公卿大夫在上比肩始進之賢士在下比肩彼其得之必有以取之也也上方无之字子欲仕乎其往問焉皆可學也􅀂獨有愛於是而非仕之謂則愈也嘗學之矣請􅁇今以言答楊子書方云此書荅楊敬之凌之子也所謂逺其兄甚者謂誨之誨之馮之子柳子厚所爲􅀃車者也辱書并示表記述書辭等五篇比於東都略見顔色未得接言語心固巳相竒但不敢果於貌定果於或作果以知人堯舜所難又嘗服宰予之誡故未敢决然决亦不敢忽然忘也舜方作帝到城巳來不多與人還往友朋之中所敬信者平昌孟東野東野吃吃􅀃足下不離口崔大敦詩不多見毎毎􅀃人物亦以足下爲處子之秀近又得李七翶書亦云足下之文逺其兄甚李下或无七字甚下或有矣字夫以平昌之賢其言一人固足信矣况又崔與李􅁇至而交􅀃邪故不待相見相信巳熟旣相見不要約巳相親審知足下之才充其容也今辱書乃云云是所謂以黄金注重外而内惑也然恐足下少年與僕老者不相􅀋尚須驗以言故具白所以而今而後不置疑於其閒可也所以下或復有以字非是閒上方无其字􅀂曰長育人才則有天子之大臣在􅀂僕者守一官且不足以修理况如是重任邪學問有暇幸時見臨愈白至鄧州北􅀉上襄陽于相公書或注順字音迪伏蒙示文武順聖樂辭唐德宗以後方鎮多製樂舞以献頔献順聖樂曲其曲將半行綴皆伏一人舞于中又令女妓爲佾舞雄徤壯妙號文武順聖楽天保樂詩讀蔡琰胡笳辭詩後漢蔡琰字文姫中郎將邕之女㒷平中没於南匈奴十二年移族從并與京兆書保或作寶移族從以下八字方从閤杭本如此云頔丗雄朔易時移群從古数爲京兆人以書修敬於京兆尹李實刘夢得集有代李井荅書可考諸本或以從并爲徙并非也今按刘集代實荅頔第二書也其曰移族從者頔与京兆書外别有移群從書移非移居之移乃移文之移盖始去其舊郷故移書以曉其宗族群從也自幕府至鄧之北境凡五百餘里自庚子至甲辰凡五日庚上或無自字手披目視口詠其言心惟其義且恐且懼忽􅀂有亡不知鞍馬之勤道途之逺也夫澗谷之水深不過咫尺丘垤之山髙不能踰㝷丈人則狎而翫之人則方作則人或無則字及至臨泰山之懸崖窺巨海之驚瀾莫不戰掉悼慄眩惑而自失悼或作㑧或作惶或作憚方云􅀃文悼懼也陳楚謂懼曰悼陸士衡表五情震悼所觀變於前所守易於内亦其理宜也閤下􅀒超卓之竒材蓄雄剛之俊德渾然天成無有畔岸而又貴窮乎公相威動乎區極區或作樞天子之毗諸侯之師故其文章言語與事相侔憚赫􅀂雷霆浩汗􅀂河漢正聲諧韶護勁氣沮金石惮赫或作変化方云閣蜀録粹皆作燀赫字小訛也惮丹末切与怛同荘子聲侔􅀑神憚赫千里豐而不餘一言約而不失一辭其事信其理切孔子之言曰有德者必有言信乎其有德且有言也或无之言字􅀭子雲曰商書灝灝爾周書噩噩爾信乎其能灝灝而且噩噩也雲下或有言字昔者齊君行而失道管子請釋老馬管仲隰朋從威公伐孤竹迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道見韓子而隨之隨上方無而字樊遲請學稼孔子使問之老農夫馬之智不賢於夷吾農之能不聖於尼父然且云爾者聖賢之能多農馬之知專故也然下或有則字非是今愈雖愚且賤其從事於文實專且乆則其賛王公之能而稱大君子之美不爲僣越也伏惟詳察愈恐懼再拜爲分司郎官上鄭尚書相公啓愈啓伏􅂪仁恩猥賜示問猥或作俯方無今按言猥􅀂俯者事上之礼無者非是感戴戰悚􅀂無所容措悚或作猥然尚有厥誠須盡露於左右者敢避其煩黷懐不滿之意於受恩之地哉方无厥誠字黷或作瀆字通用方作黙則訛矣又連下句讀之其誤益甚愈幸甚三得爲屬吏朝夕不離門下出入五年方从杭蜀本无入字今按出入漢人語多有之公作㐮陽盧承志亦云出入十年方誤矣竊目計較受與報不宜在門下諸從事後較或作惟故事有當言未賞敢不言有不便於己輙吐私情閤下所宜憐也方从問本无於字非是分司郎官職事惟祠部爲煩且重愈獨判二年日與宦者爲敵相伺候罪過惡言詈辭狼藉公牒不敢爲恥實慮䧟禍故前者懷狀乞與諸郎官更判意雖甚專事似率爾言語精神不能自明不􅀩察允遽以慙歸僶俛日日遂踰累旬私圖其宜敢以病告鳲鳩平均歌於國風從事獨賢雅以怨刺伏惟俯加憐察幸甚幸甚閤无俯字録无俯察二字俯或作特今按得失之意巳論於篇首矣愈再拜爲河南令上留守鄭相公啓愈啓愈爲相公官属五年辱知辱愛伏念曽無絲毫事爲報荅效方从三本无伏字日夜思慮謀畫以爲事大君子當以道不宜苟且求容恱故於事未嘗敢疑惑宜行則行宜止則止止方並作尓按對上句行字義當作止方本无理不詞今改从衆受容受察不復進謝閤杭本无受容字非是自以爲如此眞得事大君子之道方无之字今雖􅂪沙汰爲縣固猶在相公治下未同去離門牆爲故吏爲形跡嫌疑改前所爲以自踈外於大君子固當不待煩􅀃於左右而後察也外下方从三本无於字非是人有告人辱罵其妹與妻爲其長者得不追而問之乎追而不至爲其長者得不怒而杖之乎坐軍營操兵守禦爲留守出入前後驅從者此眞爲軍人矣坐坊市賣餅又稱軍人則誰非軍人也愚以爲此必姦人以錢財賂將吏盗相公文牒竊注名姓於軍籍中以陵駕府縣此固相公所欲去奉法吏所當嫉雖捕繫杖之未過也陵駕方云字見選沈休文論嫉下或有矣字未上方从三本无之字非是未下或有至字或作不至過昨聞相公追捕所告受辱罵者愚以爲大君子爲政當有􅁠變始似小異要歸於正耳軍吏紛紛入見告屈爲其長者安得不小致爲之之意乎長下方从三本无者字非是未敢以此仰疑大君子及見諸從事􅀃則與小人所望信者少似乖戾雖然豈敢生疑於萬一方无於字必諸從事與諸將吏未能去朋黨心蓋覆黤黮上鄔感切下它感切甚黒也刘伶客至詩黤黮元夜隂韓曰青黒色不以眞情狀白露左右小人受私恩良乆安敢閉蓄以爲私恨不一二陳道伏惟相公憐察幸甚幸甚受私或作私受今按私受非是然此七字爲句語亦太煩又下語便有私恨字不應重複如此疑北私字是􅄛文也愈無適時才用漸不喜爲吏得一事爲名可自罷去不啻如棄涕唾無一分顧藉心方从閤本名字在罷字下而名字下更有一罷字杭本无名字可自作自可亦无下罷字今按此句諸本皆不可讀但别本作得一事爲名可自罷去比閤本只移一名字去一罷字比杭本但増一名字倒一自字而文義通暢畧无疑滯今从之又按此二書誤字尢多而閤杭蜀本又爲特甚不知何故如此大氐公於朝廷或抵上官論時事及職事則皆如公狀之体不用古文竒語此二篇亦其類也切意讀者厭其无竒而輒改之故其多誤至此顧失大君子纎芥意如丘山重守官去官惟今日指揮愈惶懼再拜上朱文公校昌􅀺先生集卷之十五
