front:
  text: 朱文公校昌黎先生集卷之三十六考異音釋附
  hash: sha256:93bfbe95e81c06308ef83ee56612e97ccb948939313af0fc6415048c5e28b9dc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_036-1a}
body:
  text: 􅄂文瘞硯銘鉻或作文隴西李觀元賔始從進士貢在京師或貽之硯旣四年悲歡窮泰未嘗廢其用凡與之試藝春官賔二年登上第行于褒谷此下或有聞字役者劉胤誤墜之地毀焉乃匣歸埋于京師里中昌黎韓愈其友人也賛且識云土乎質陶乎成器復其質非生死􅀋全斯用毀不忍棄斯閤作期非是埋而識之仁之義硯乎硯乎與瓦礫異毛頴􅀓洪曰退之毛頴傳柳子厚以爲怪予以爲子虗烏有之比其流出於莊周寓言舊史云愈作毛頴傳談戯不近人情此文章之甚紕繆者天下有識者固少而舊史所見如此可發一笑樊曰李肇囯史􅀘謂公此傳其文尤髙不下遷史談薮亦謂此傳似太史公筆毛頴者中山人也其先明眎与視同礼兎曰明視佐禹治東方土句養萬物有功因封於卯地死爲十二神治方作理土方作吐属下句云孔氏周書注曰土能吐生百榖義取此今按東方卯位此正爲下文封於卯地死爲十二神而言也然兎与卯皆不属土与方所引孔說不合又不見其所吐何者可飬万物兼治東方爲句語意亦似未足唯參同契云兔者吐生光則兎乃有吐義然似亦只与下文當吐而生之􅀃相表裏止是自吐其子而无吐飬万物之意未見其必可据也􅀂作治東方土而自爲一句但以平水土而言則於語􅀔无闕而下句飬万物有功爲奏庶鮮食之義意亦自明故今且从諸本其以十二物爲十二神相承巳乆亦未見所從來并闕之以竢知者嘗曰吾子孫神明之後不可與物同當吐而生巳而果然當吐而生見本草明眎八丗孫䨲乃侯切􅀘注兔子也論衡曰兔䑛毫而孕及其生子從口而出名曰嬎音販俗呼曰䨲丗傳當殷時居中山得神仙之術能匿光使物竊恒娥􅀐蟾蜍入月其後代遂隱不仕云䨲方云蜀本音奴鈎切尔雅兎子嬎郭注云俗呼曰䨲与同居東郭者曰㕙七旬切狡兎也狡而善走與韓盧爭能盧不及盧怒與宋鵲謀而殺之醢其家者下或有号東郭三字或有号東郭㕙而无曰字方云􅀃文狡兎曰㕙􅀾囯䇿作逡鵲或作促方云廣雅曰韓盧宋鹊犬属字林㹱音鵲宋良犬也秦始皇時􅀩將軍恬南伐楚次中山將大獵以懼楚中山在秦東北非伐楚所當次也此固寓言然亦不爲无失召左右庶長與軍尉以連山筮之得天與人文之兆方无右字非是筮者賀曰今日之獲不角不牙衣􅄄之徒缺口而長鬚八竅而趺音夫足跗居獨取其髦簡牘是資天下其同書秦其遂兼諸侯乎方云筮詞皆用古韻詩祈父予王之瓜牙靡所止爲古牙吾通髦与資亦然一云崔豹古今注䝉恬造筆以柘木爲管鹿毛爲柱羊毛爲􅀍非􅇠毫也公豈它有所自邪今按髦資与居書叶今北人語猶謂毛爲謨公作董生詩咨与書漁叶皆可證也遂獵圍毛氏之族拔其豪載穎而歸獻俘于章臺宫聚其族而加束縛焉豪方作毫非是下之毫同秦皇帝使恬賜之湯沐而封諸管城號曰管城子或无曰字日見親寵任事穎爲人強記而便敏自結繩之代以及秦事無不纂録隂陽卜筮占相醫方族氏山經地志字書圖畫九流百家天人之書及至浮圖老子外國之􅀃皆所詳悉又通於當代之務官府簿書市井貨錢註記惟上所使自秦皇帝及太子扶蘇胡亥丞相斯中車府令髙下及國人無不愛重皇上或有始字相下或有李字又善隨人意正直邪曲巧拙一隨其人雖見廢棄終黙不洩雖下或有後字惟不喜武士然見請亦時往累拜中書令與上益狎上嘗呼爲中書君上親决事以衡石自程雖宫人不得立左右獨頴與執燭者常侍上休方罷穎與絳人陳玄弘農虢州唐絳州貢墨虢州貢瓦硯會稽貢紙故借名之陶泓及㑹稽禇先生友善相推致其出處必偕上召穎三人者不待詔輒俱住上未嘗怪焉後因進見上將有任使拂拭之因免冠謝上見其髪秃又所摹畫不能稱上意摹方作謩上嘻􅀏曰中書君老而秃不任吾用嘻或作喜非是吾嘗謂君中書君今不中書邪君今君或作而對曰臣所謂盡心者因不復召歸封邑終于管城其子孫甚多散處中國夷狄皆冒管城惟居中山者能継父祖業太史公曰毛氏有兩族其一􅁎姓文王之子封於毛所謂魯衛毛聃者也戰國時有毛公毛遂獨中山之族不知其本所出子孫最爲蕃昌方无爲字春秋之成見絶於孔子而非其罪及蒙將軍拔中山之豪始皇封諸管城丗遂有名而􅁎姓之毛無聞豪方作毫非是諸或作之穎始以俘見卒見任使見或作幸秦之滅諸侯穎與有功賞不酬勞以老見踈秦眞少恩哉下邳侯革華傳方云閤本无此篇刘龍圗燁云或言此篇不􅀋退之文及得本校果无趙璘因話録謂革華傳称韓文公皆後人所誣是唐人巳知其僞然杭本文粹皆録洪謂始録於歐公非也今按此當全篇刪去送窮文洪曰予嘗見文宗備問云顓項髙辛時宫中生一子不着完衣号爲窮子其後正月晦死宫人葬之相謂曰今日送窮子自爾相承送之又唐四時宝鑑云髙陽氏子好衣弊食麋正月晦巷死丗作麋弃破衣是日祝於巷曰除貧也􅀘注張文潜曰公送窮文盖出子雲逐貧大槩擬前人文章如子雲解嘲擬宋玉笞客難退之進斈解擬子雲解嘲柳子厚晋問擬枚乗七發皆文章之美也􅄯无咎取公此文於續楚詞系之曰愈以屡窮不曹時􅀂有物焉爲之故託於鬼嘑彼窮我者車舡飲食謝而逺之而窮不可去也則燒車与舡延之上坐亦卒歸於正義云元和六年正月乙丑晦主人使奴星孫曰星公之奴名結柳作車縛草爲船載糗去从切又丘救切祝曰熬米尔雅云麥也周礼糗粉餈粻粻糧也之良切輿粻奴星或有􅃨出星字輿或作與牛繫軛下引帆上檣軛音厄車轅之前牛繋軛下言車引帆上檣言舡也三揖窮􅀑而告之曰聞子行有日矣鄙人不敢問所塗竊具船與車備載糗粻日下方无矣字竊或作躬日吉時良利行四方子飯一盂子啜一觴􅂝朋挈儔去故就新駕塵彍音霍又廓郭二音張弩也風與電爭先子無底滯之􅀹我有資送之恩子等有意於行乎屏息潜聽如聞音聲􅀂嘯􅀂啼􅒂呼虢切欻許勿切廣云暴起嚘於求切歎也嚶於耕切毛髪盡竪竦肩縮頸疑有而無乆乃可明􅀂有言者曰吾與子居四十年餘子在孩提吾不子愚子學子耕求官與名惟子是從不變于􅀄門神户靈我叱我呵包羞詭隨志不在他子遷南荒􅀬爍濕蒸我非其郷百􅀑欺陵太學四年朝齏暮鹽惟我保汝人皆汝嫌自􅀄及終未始背汝心無異謀口絶行語於何聽聞云我當去是必夫子信䜛有間於予也我􅀑非人安用車船鼻齅臭香糗粻可捐單獨一身誰爲朋儔子苟備知可數巳不不甫鳩切已与以同以人與與同子能盡言可謂聖智情狀旣露敢不迴避迴或作曲主人應之曰子以吾爲眞不知也邪子之朋儔非六非四朋儔方作儔朋六方作三非是在十去五滿七除二各有主張私立名字捩力結切拗捩也手覆羹轉喉觸諱凡所以使吾面目可憎語言無味者皆子之志也目方作皃其名曰智窮矯矯亢亢惡圓喜方羞爲姦欺不忍害傷其次名曰學窮傲數與名摘抉上它歴切下於决切摘發也抉出也杳微髙挹羣言執神之機又其次曰文窮曰文上或有名字不專一能怪怪竒竒不可時施秖以自嬉又其次曰命窮影與形殊面醜心妍利居衆後責在人先又其次曰交窮磨䏎戞骨吐出心肝企足以待寘我讎􅁈凡此五􅀑爲吾五患飢我寒我興訛造訕能使我迷人莫能間朝悔其行暮巳復然蠅營營蠅声詩營營青蠅狗苟驅去復還洪曰魏王思性急嘗執筆作書蠅集筆端驅去復來思怒逐蝇不得還乃取筆擲地言未畢五鬼相與張眼吐舌跳踉偃仆抵掌頓脚失􅀏相顧徐謂主人曰子知我名凡我所爲驅我令去小􅃛大癡􅀘注筆墨間録曰予讀抱朴子云小黠大愚洪駒父曰非也小􅃛大癡三囯志自有全文方云淮南子人不小斈不大迷不小慧不大愚又抱朴子凡人多以小􅃛而大愚人生一丗其乆幾何吾立子名百丗不磨小人君子其心不同惟乖於時乃與天通惟或作雖非是􅂝持琬琰易一羊皮飫於肥甘慕彼糠糜天下知子誰過於予雖遭斥逐不忍子踈謂予不信請質詩書主人於是垂頭䘮氣上手稱謝燒車與船延之上座之或作入鱷魚文鱷或作鰐朱居靖秀水間居録云鱷魚之􅃺龍呴虎􅀲蟹目鼉鱗尾長数尺未大如萁芒刺成鈎仍有膠䊀多於水濵潜伏人畜近以尾擊取盖猶象之任鼻也維年月日或作維元和十四年四月二十四日潮州刺史韓愈使軍事衙推秦濟以羊一豬一投惡谿之潭水以與鱷魚食而告之曰昔先王旣有天下列山澤罔繩擉􅀄朔切莊子冬則擉鼈于江是也刃以除蟲蛇惡物爲民害者驅而出之四海之外列新書作迾方云音力制反遮道也罔或作網或作綱方云莊子擉之言刺也字从手之外方无之字及後王德薄不能逺有則江漢之間尚皆棄之以與蠻夷楚越方无後王二字或无蛮字況潮嶺海之間去京師萬里哉潮方作湖而无海字或作嶺海而并无潮湖字今按此言潮州乃嶺海之間去京師逺也但公於潮州亦有􅀕太湖神文則只作䠒嶺亦通更詳之鱷魚之涵淹􅆑育於此亦固其所仐天子嗣唐位神聖慈武今字閤本在子下非是四海之外六合之内皆撫而有之況禹跡所揜揚州之近地朝州於古爲揚州之境刺史縣令之所治出貢賦以供天地宗廟百神之祀之壤者哉鱷魚其不可與刺史雜處此土也刺史受天子命守此土治此民而鱷魚睅户版切出目皃左傳曰睅其目然不安谿潭據處食民畜熊豕鹿麞以肥其身以種其子孫與刺史亢拒爭爲長雄睅然方云左氏睅其目睅目出皃安上或有下字不或作而或无處字今按此恐有脱誤疑當去睅然不去據溪潭食民畜云云乃是更詳之亢拒或无亢字長雄方云漢薛宣傳上黨少豪俊易長雄刺史雖駑弱亦安肯爲鱷魚低首下心伈伈睍睍上悉枕切下下􅂋切去恐懼皃睍小目皃爲民吏羞以偷活於此邪心或作身方作中云洪謂中身也礼曰文子其中退然囯語余亦執鬼中注身也今按二本皆通然意新史作心爲近故女之睍目出皃本或作睍睍息咨反視也方云或校作睆睆窮視皃荘子睆睆然在徽􅆞之中仐按恐當作睆爲是邪方作也且承天子命以來爲吏固其􅀔不得不與鱷魚辨鱷魚有知其聽刺史言方无言字潮之州大海在其南鯨鵬之大蝦蟹之細無不容歸以生以食鱷魚朝發而夕至也今與鱷魚約盡三日其率醜􅀋南徙于海以避天子之命吏三日不能至五日五日不能至七日七日不能是終不肯徙也是不有刺史聽從其言也不然則是鱷魚􅁳頑不靈刺史雖有言不聞不知也夫傲天子之命吏不聽其言不徙以避之與􅁳頑不靈而爲民物害者皆可殺與􅁳或无􅁳字而爲方无而字刺史則選材技吏民操強弓毒矢以與鱷魚從事或无吏字必盡殺乃止其無悔朱文公校昌黎先生集卷之三十六
