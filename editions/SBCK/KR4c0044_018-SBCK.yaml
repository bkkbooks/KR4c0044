front:
  text: 朱文公校昌􅀺先生集卷之十八考異音擇附
  hash: sha256:f4f4a025c07aea15841f142f6630c67cb630c9e59007fd1485280914d24caa15
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_018-1a}
body:
  text: 書與鳯翔邢部尚書書或作京西節度使邢尚書方亦如此而無下三字邢謂邢君牙也愈再拜布衣之士身居窮約不借􅀔於王公大人則無以成其志王公大人功業􅂋著不借譽於布衣之士則無以廣其名是故布衣之士雖甚賤而不謟王公大人雖甚貴而不驕其事􅀔相須其先後相資也今閤下爲王􅀲牙爲國藩垣威行如秋仁行如春戎狄棄申而逺遁朝廷髙枕而不虞是豈􅀒大丈夫平生之志願哉豈􅀒明天子非常之顧遇哉下豈上或有是字赫赫乎洸洸乎功業逐日以新名聲隨風而流或無洸洸乎三字宜乎讙呼海隅髙談之士奔走天下慕義之人使或願馳一傳或願操一戈納君於唐虞收地於河湟操上或無或願二字湟或作隍然而未至乎是者盖亦有􅀃云盖亦或作亦盖􅀃上有其字非是豈非待士之道未甚厚遇士之禮未甚優請粗言其事閤下試詳而聽之夫士之來也必有求於閤下夫以貧賤而求於富貴正其宜也閤下之財不可以徧施於天下在擇其人之賢愚而厚薄等級之可也假如賢者至閤下乃一見之愚者至不得見焉則賢者莫不至而愚者日逺矣或無日字假如愚者至閤下以千金與之賢者至亦以千金與之則愚者莫不至而賢者日逺矣亦方作又抗本無賢者至與之九字非是日或作亦欲求得士之道盡於此而巳欲求士之賢愚在於精鑒慱采之而巳得或作待已下或並有矣字精鑒於已固已得其十七八矣又博采於人百無一二遺者焉方無固字􅀂果能是道愈見天下之竹帛不足書閤下之功德天下之金石不足頌閤下之形容矣能或作行德下或有矣字愈也布衣之士也布上或有固字上下或無也字生七歳而讀書十三而能文二十五而擢第於春官以文名於四方前古之興亡未嘗不經於心也當丗之得失未嘗不留於意也常以天下之安危在邊常或作嘗故六月于邁來􅀚其師及至此都徘徊而不能去者誠恱閤下之義願少立於堦墀之際望見君子之威儀也此上方無至字不上方無而字能下或有速字去或作進不能去或作不敢遽進際或作下居十日而不敢進者誠以左右無先爲容進下或有謁字誠字或在容字下容下或有也字方無以左至爲容七字皆非是懼閤下以衆人視之則殺身不足以㓕恥徒悔恨於無窮故先此書序其所以來之意閤下其無以爲狂而以禮進退之幸甚幸甚先下或有陳字書下方有陳字皆非是來之下或復有之字其無以或無其字或無以字洪氏家譜云公以正元八年壬申二十五􅀊中第十一年乙亥二十八􅀊上宰相書求官不得而歸出潼関作二鳥賦又據程致道􅀃旣出潼関因遊鳯翔上邢君牙書今按程􅀃大誤盖賦序言五月過潼関而此書言六月至鳯翔潼関在長安之東鳯翔在長安之西相距六百餘里豈有五月方東出潼関而六月遽能復西至鳯翔之理此書決非此年所作必是八年以後十年以前甞至鳯翔而有此書及岐山下等詩也愈再拜爲人求薦書某聞木在山馬在肆遇之而不顧者雖日累千萬人未爲不材與下乗也過方作過及至匠石過之而不睨伯樂遇之而不顧然後知其非棟梁之材超逸之足也以某在公之宇下非一日而又辱居姻婭之後是生于匠石之園長于伯樂之廐者也於是而不得知假有見知者千萬人亦何足云方無有字云下或有耳字或有爾字今幸頼天子毎􅀊詔公卿大夫貢士􅀂某等比咸得以薦聞􅀂下或有于字而無比字或無等字是以冒進其􅀃以累於執事亦不自量巳然執事其知某如何哉昔人有鬻馬不售於市者知伯樂之善相也從而求之伯樂一顧價増三倍某與其事頗相􅀋是故終始言之耳諸本皆如此方獨从閣杭本以其知某如何哉爲其如某何哉而無昔人以下四十三字今按此書本爲人求薦而杭本曰執事其如某何哉則似决以其人力不能薦巳矣故諸本或作執事其知某何如哉語意似弱而亦未有懇切必求之意又無結末收拾之語敢又継以鬻馬之􅀃文意方似粗足然亦重復無竒文意首尾不甚通暢恐尚有脫誤處更詳之某再拜應科目時與人書或作與韋舎人月日愈再拜天池之濵大江之濆音汾水際曰有怪物焉蓋非當鱗凡介之品彚匹儔也匹方作比其得水變化風雨上下于天不難也天下或有地字其不及水蓋㝷常尺寸之閒耳無髙山大陵曠塗絶險爲之関隔也然其窮涸不能自致乎水爲獱􅆩上音頻下音闥水狗也選獱􅆩􅠓瞲乎匳􅆰之􅀏者蓋十八九矣或無十字矣或作年方从謝本云唐㪯子礼部及弟例須守選選未蒲或就制㪯或書判拔萃方􅀗出仕此書謂其不及水盖尋常尺寸之間是專指宏詞試也言出之嗤􅀏者十而八九乃上宰相書所謂得其所者爭􅀏之是也本多作八九年其義非也如有力者哀其窮而轉運之蓋一舉手一投足之勞也然是物也􅀒其異於衆也且曰爛死於沙泥吾寕樂之􅀂俛首帖耳摇尾而乞憐者非我之志也是以有力者遇之熟視之􅀂無覩也其死其生固不可知也今又有有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎而轉方作而輸轉之清波或作轉致之波濤其哀之命也其不哀之命也知其在命而且鳴號之者亦命也鳴或作呼嗚下或有且字或作而鳴且號愈今者實有􅀋於是是以忘其踈愚之罪而有是􅀃焉閤下其亦憐察之答劉正夫書正或作嵒方云此書謂賢尊給事者劉伯芻也伯芻三子寛夫端夫巖夫無名正夫者故蜀本刋作嵒豈正夫即嵒夫邪今且從舊愈白進士劉君足下辱牋敎以所不及旣荷厚賜且愧其誠然幸甚幸甚凡舉進士者於先進之門何所不往方無凡字先進之於後輩苟見其至寕可以不答其意邪來者則接之舉城士大夫莫不皆然而愈不幸獨有接後輩名名之所存謗之所歸也接後輩下或有之字有來問者不敢不以誠答或問爲文宜何師必謹對曰宜師古聖賢人曰古聖賢人所爲書具存辭皆不同宜何師必謹對曰師其意不師其辭又問曰文宜易宜難必謹對曰無難易惟其是爾如是而巳非固開其爲此而禁其爲彼也諸本無爾如是字巳下有矣字謝校矣作爾或作耳夫百物朝夕所見者人皆不注視也及覩其異者則共觀而言之夫文豈異於是乎漢朝人莫不能爲文獨司馬相如太史公劉向揚雄爲之最然則用功深者其收名也逺􅀂皆與丗沈浮不自樹立雖不爲當時所怪亦必無後丗之傳也沈浮或作浮沈足下家中百物皆頼而用也然其所珍愛者必非常物夫君子之於文豈異於是乎今後進之爲文能深探而力取之以古聖賢人爲法者雖未必皆是要􅀂有司馬相如太史公劉向􅀭雄之徒出必自於此不自於循常之徒也後下或无進字􅀂上或无要字不下方无自字􅀂聖人之道不用文則巳用則必尚其能者能者非他能自樹立不因循者是也有文字來誰不爲文然其存於今者必其能者也顧常以此爲􅀃耳頋常或作必當或作頋當愈於足下沗同道而先進者又常從遊於賢尊給事旣辱厚賜又安得不進其所有以爲答也足下以爲何如或作如何愈白答殷侍御書方云殷侑也或注衘字非是某月日愈頓首辱賜書周覧累日竦然増敬蹙然汗出以慙愈於進士中粗爲知讀經書者一來應舉事隨日生雖欲加功竟無其暇遊從之􅀋相熟相同不教不學悶然不見巳缺日失月亡以至於老月或作日所謂無以自别於常人者毎逢學士眞儒歎息踧踖愧生於中顔變於外不復自比於人句前者蒙示新注公羊春秋前者或作前人非是又聞口授指略私心喜幸恨遭逢之晩願尽傳其學職事羈纒未得􅁇請怠惰因循不能自彊此冝在擯而不教者今反謂少知根本其辭章近古可令叙所注書惠出非望承命反側善誘不倦斯爲多方敢不喻所指八月益涼時得休假或作睱倘矜其拘綴不得走請務道之傳而賜辱臨執經座下􅀗卒所聞是爲大幸况近丗公羊學幾絶何氏後漢何休任城人太􅀓陳蕃辟與參政事蕃敗休坐廢銅乃作春秋公羊觧話妙得公羊本意作公羊墨守左氏膏肓榖梁廢疾墨守謂如墨翟之守城不可攻也於是鄭康成乃發墨守鍼膏盲起廢疾休見歎日康成入吾室操吾戈以伐我注外不見他書聖經賢傳屏而不省要妙之義無自而㝷非先生好之樂之味於衆人之所不味務張而明之其孰能勤勤綣綣􅀂此之至固鄙心之所最急者綣綣或作拳拳如遂蒙開釋章分句㫁其心曉然直使序所注挂名經端自託不腐其又奚辭將惟先生所以命辝或作詞愈再拜答陳商書方云唐志有商集十七卷愈白辱惠書語髙而㫖深三四讀尚不能通曉茫然増愧赧又不以其淺弊無過人知識且喻以所守幸甚知或作智且方作具愈敢不吐情實然自識其不足􅀘吾子所須也齊王好竽有求仕於齊者操瑟而往立王之門三年不得入方无者字叱曰吾瑟鼓之能使􅀑神上下吾鼓瑟合軒轅氏之律吕諸本皆如此方獨从閣杭本以律吕二字爲宫字云囯語琴瑟尚宫鐘尚羽重者从細輕者从大今按方氏所引囯語是也然凡作楽者八音並奏而其一音之中大者爲宫細者爲羽莫不皆有五声之序又以六律六吕節之然後声之大細得其次弟而不差書所謂声依永律和声而八音克諧是也其日琴瑟尚宫者非謂琴瑟只有宮声也但以􅁝声大細恐其掩於衆楽而不可聽故大其器使其声重大而與衆楽相稱耳其中固有五声而声必中律吕也方意似以琴瑟專爲宫声而不用它律吕者故特取此誤本耳今从諸本客罵之曰王好竽而子鼓瑟雖工如王不好何瑟字句絶諸本如此方獨以鼓爲瑟而爲句絶其下瑟字乃属下句曽本上亦作瑟而下作之皆非是是所謂工於瑟而不工於求齊也求斉或作竽或無也字皆非是今舉進士於此丗求禄利行道於此丗而爲文必使一丗人不好得無與操瑟立齊門者比歟求上或有也字道於下方无此字文雖工不利於求求不得則怒且怨不知君子必爾爲不也虽或作誠或虽上有誠字故區區之心則疑其有所未睹且於日用之間亦未見其有以存飬省察而躰之於身也是以雖其所以自任者不爲不重而其平生用力深処終不离乎文字言語之工至其好楽之私則又未能卓然有以自拔於流俗所與遊者不過一時之文七其於僧道則亦僅得毛干暢􅀚灵惠之流耳是其身心内外所立所資不越乎此亦何所據以爲息邪距詖之本而充其所以自任之心乎是以一旦放逐憔悴亡聊之中无復平日飲博過从之楽方且欎欎不能自遣而卒然見夫瘴海之濵異端之斈乃有能以義理自勝不爲事物侵亂之人與之語雖不尽觧亦豈不足以蕩滌情累而暫空其滯碍之懷乎然則凡此穪譽之言自不必諱而於公所謂不求其福不畏其禍不斈其道者􅀄亦不相妨也虽然使公於此能因彼稊稗之有秋而悟我􅁰稷之未熟一旦飜然反求諸身以尽聖賢之藴則所謂以理自勝不爲外物侵乱者將无復羡於彼而吾之所以自任者益恢乎其有餘地矣豈不偉哉及􅀕神至海上遂造其廬及來􅀽州留衣服爲别乃人之情非崇信其法求福田利益也孔子云丘之禱乆矣凡君子行巳立身自有法度聖賢事業具在方􅁽可效可師仰不愧天俯不愧人内不愧心積善積惡殃慶自各以其􅀋至􅂟下或無自字何有去聖人之道捨先王之法而從夷狄之教以求福利也詩不云乎愷悌君子求福不回傳又曰不爲威􅅥不爲利疚假如釋氏能與人爲禍祟非守道君子之所懼也况萬萬無此理崇或作福且彼佛者果何人哉其行事􅀋君子邪小人邪􅀂君子也必不妄加禍於守道之人如小人也其身巳死其􅀑不靈天地神祇昭布森列非可誣也布森方作森布令按公進平淮西碑狀亦有森列字可考又肯令其􅀑行胷臆作威福於其閒哉進退無所據而信奉之亦且惑矣或作非大惑欤且愈不助釋氏而排之者其亦有􅀃孟子云今天下不之楊則之墨楊墨交亂而聖賢之道不明則三綱淪而九法斁禮樂崩而夷狄横幾何其不爲禽獸也故曰能言距楊墨者皆聖人之徒也子下或有有字或復岀聖賢之道不明六字楊子雲云古者楊墨塞路孟子辭而闢之廓如也云或作日夫楊墨行正道廢且將數百年以至於秦卒㓕先王之法燒除其經坑殺學士天下遂大亂至方作涘非是其經或作經書或下有書字及秦㓕漢興且百年尚未知脩明先王之道其后始除挾書之律稍求亡書招學士經雖少得尚皆殘缺十亡二三尚皆方無尚字或作皆尚故學士多老死新者不見全經不能盡知先王之事各以所見爲守分離乖隔不合不公二帝三王羣聖人之道於是大壞後之學者無所㝷逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也孟子雖賢聖不得位空言無施雖切何􅀘然頼其言而今學者尚知宗孔氏崇仁義貴王賤覇而巳崇方作貴上又有知字今按宗上巳有知字王上又有貴字不應􅃨出方本非是其大經大法皆亡㓕而不救壞爛而不收所謂存十一於千百安在其能廓如也然向無孟氏則皆服左袵而言侏離上音朱後漢甫蛮傳衣裳班闌語言侏離注蛮夷語声也語不明之皃矣故愈嘗推尊孟氏以爲功不在禹下者爲此也向方作苟漢氏已來羣儒區區修􅀘百孔千瘡隨亂隨失其危如一髮引千鈞緜緜延延􅐛以微滅方無氏字於是時也而唱釋老於其閒鼓天下之衆而從之嗚呼其亦不仁甚矣甚方作耳釋老之害過於楊墨韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於巳壞之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖㓕死萬萬無恨天地􅀑神臨之在上質之在傍又安得因一摧折自毀其道以從於邪也而粗或作目粗籍湜輩雖屢指教不知果能不叛去否辱吾兄眷厚而不􅀗承命惟増慙懼死罪死罪愈再拜答吕毉山人書愈白惠書責以不能如信陵執轡者史記魏公子無忌封信陵􅀂魏有􅀮士侯嬴爲大梁夷門監者公子從車􅀐虚左自迎侯生攝弊衣冠直上載公子上坐欲以􅀚公子公子執轡愈㳟夫信陵戰國公子欲以取士聲􅀔傾天下而然耳如僕者自度􅀂丗無孔子不當在弟子之列僕下方無者字以吾子自山出有朴茂之美意恐未礱磨以丗事又自周後文弊百子爲書各自名家方无書各自各四字非是亂聖人之宗後生習傳雜而不貫貫或作實故設問以觀吾子其巳成熟乎將以爲友也其未成熟乎將以講去其非而趨是耳下熟乎或作熟邪趨下或有其字不如六國公子有市於道者也方今天下入仕惟以進士明經及卿大夫之丗耳其人率皆習熟時俗工於語言識形􅀔善候人主意方從閣本意下有在乎云意在謂意之所嚮也左氏晋君少安不在諸侯趙穿有寵而弱不在軍事漢書王莽意不在哀義祖此也今按但如諸本語意巳足不假在字爲音也政使能竒亦復幾何而巳不勝其贅矣此近丗所謂古文昔之弊而謂韓公爲之哉恐閣本􅀄亦失誤而方乃曲爲之􅀃以誤後人故不可以不辨或者又疑在亦草書者字之誤更詳之故天下靡靡日入於衰壞恐不復振起務欲進足下趨死不顧利害去就之人於朝以爭救之耳非謂當今公卿閒無足下輩文學知識也不得以信陵比然足下衣破衣繫麻鞋率然叩吾門吾待足下雖未盡賔主之道不可謂無意者破上方无衣字繋上方有脚字者下或有也字足下行天下得此於人蓋寡乃遂能責不足於我此眞僕所汲汲求者議雖未中節其不肯阿曲以事人者灼灼明矣阿曲方無曲字或作効俗或可上仍有効字或作効阿俗方將坐足下三浴而三熏之聽僕之所爲少安無躁愈頓首答渝州李使君書或注方古二字乖隔年多不􅀗數附書慕仰風味未嘗敢忘書下或有狀字使至連辱兩書告以恩情迫切不自聊賴連辱方作辱連􅁓重序河南事跡本末文字綢宻典實可㝷而推究之明萬萬無一可疑者欽想所爲益深勤企欽上方有重字豈以愈爲粗有知識可語以心而告之急哉是比數愈於人而收之何幸之大也於下或有古字愈雖無節槩知感激􅀂使在形􅀔親狎於要路有言可信之望雖百悔吝不敢黙黙知上疑脫一字信或作伸方云信音伸之下或無望字敢下方無􅃨出黙字今按衆本皆未安疑本用易有言不信之語􅀂作言有可信而讀如字則其義通矣更詳之今旣無由縁進言言之恐益累髙明是以􅀒所期待竊竊轉語於人不見成效此愈之罪也然不敢去心期之無巳以報見待惟且遟之勿遽􅂢罷幸甚去心或作忘去其心或無期之無巳四字􅂢或作止今按􅂢罷字疑衍又按此書題一作狀故其詞亦用俗躰不甚作文莊子云知其無可柰何而安之􅀂命者聖也傳曰君子竢命然無所􅀘益進其厭飫者祗増愧耳良務寛大愈再拜答元侍御書九月五日愈頓首微之足下前歳辱書論甄逢父濟識安禄山必反即詐爲喑棄去棄或作亡禄山反有名號又逼致之濟死執不起卒不汙禄山父子事又論逢知讀書刻身立行勤巳取足不干州縣斥其餘以救人之急足下繇是與之交欲令逢父子名迹存諸史氏方作事非是足下以抗直喜立事斥不得立朝失所不自悔喜事益堅微之乎子眞安而樂之者抗或作伉謹詳足下所論載校之史法􅀂濟者固當得附書附字疑衍盖済固合立傳下應言附書也今逢又能行身幸於方州大臣以摽白其先人事白方作目載之天下耳目徹之天子追爵其父第四品赫然驚人逢與其父俱當得書矣濟逢父子自吾人發春秋美君子樂道人之善夫苟能樂道人之善則天下皆去惡爲善善人得其所其功實大足下與濟父子俱宜牽聮得書足下勉逢令終始其躬而足下年尚彊嗣德有􅁇將大書特書屢書不一書而巳也愈旣承命又執筆以竢愈再拜朱文公校昌􅀺先生集卷之十八
