body:
  text: 雜著􅀗麟解方云李本云元和七年麟見東川疑公因此而作然李翺甞書此文以贈陸傪傪死於貞元十八年則此文非元和閒作也今按此文有激而託意之詞非必爲元和􅀗麟而作麟之爲靈昭昭也詠於詩書於春秋雜出於傳記百家之書雖婦人小子皆知其爲祥也書於或作載於然麟之爲物不畜於家不􅁪有於天下其爲形也不􅀋非若馬牛犬豕豺狼麋鹿然馬牛或作牛馬鹿然或作鹿之狀或無之字皆非是然則雖有麟不可知其爲麟也角者吾知其爲牛鬛者吾知其爲馬犬豕豺狼麋鹿吾知其爲犬豕豺狼麋鹿下或有也字惟麟也不可知不可知則其謂之不祥也亦冝雖然麟之出必有聖人在乎位麟爲聖人出也聖人者必知麟麟之果不爲不祥也又曰麟之所以爲麟者以德不以形下或有也字若麟之出不待聖人則謂之不祥也亦宜下或有也字或有哉字師􅀃古之學者必有師師者所以傳道受業解惑也人非生而知之者孰能無惑惑而不從師其爲惑也終不觧矣生乎吾前其聞道也固先乎吾吾從而師之閣本无此五字非是生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎庸方從閣杭作豈或并有二字而无夫字皆非是是故無貴無賤無長無少道之所存師之所存也方无也字嗟乎師道之不傳也乆矣欲人之無惑也難矣嗟上或有咨字非是古之聖人其出人也逺矣猶且從師而問焉今之衆人其下聖人也亦逺矣而恥學於師期作巳下或作去皆非是是故聖益聖愚益愚聖人之所以爲聖愚人之所以爲愚其皆出於此乎愛其子擇師而教之於其身也則恥師焉惑矣彼童子之師授之書而習其句讀者非吾所謂傳其道解其惑者也非上或有也字方云讀音豆周礼天官注徐邈讀馬融笛賦作句投徒闘切何休公羊序失其句讀不音山谷和黄冕仲詩只從如字句讀之不知惑之不解或師焉或不焉小學而大遺吾未見其明也巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則羣聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近䛕盛或作大安官盛語見中庸嗚呼師道之不復可知矣巫醫樂師百工之人君子不齒今其智乃反不能及其可怪也歟不齒或作鄙之其可或无其字聖人無常師孔子師郯子萇弘師襄老聃句絶郯子之徒其賢不及孔子方无孔子師郯子五字而以萇弘師㐮老􅅨六字連下句郯子之徒爲句曰校本一云郯子下當有数子二字其上當存孔子師三字爲是今按孔子見郯子在適周見萇弘老聃之前而聖人无常師本杜氏注問官名語故此上句旣叙孔子所師四人而再㪯郯子之徒則三子在其中矣方氏知當存孔子師字而不知當并存上郯子二字乃以下郯子二字属上句讀之而疑郯子之下更有数子二字誤矣孔子三人行則必有我師子下或有曰字方從杭本云論語本无則字曰字似不當有是故弟子不必不如師師不必賢於弟子故上或无是字聞道有先後術業有專攻如是而巳李氏子蟠年十七好古文六藝經傳皆通習之不拘於時學於余余嘉其能行古道作師􅀃以貽之斈上或有請字方无下余字進學解國子先生晨入太學招諸生立館下招或作召誨之曰業精于勤荒于嬉行成于思毀于隨方今聖賢相逢治具畢張拔去兇邪登崇畯良畢或作必畯或作俊方云古文尚書俊皆作畯公陀文石本多用畯字新舊史同上占小善者率一録名一藝者無不庸􅐡滿巴切􅐡或作把方云音義同羅剔抉於庚切刮垢磨光蓋有幸而􅀗選孰云多而不􅀭諸生業患不能精無患有司之不明之不或作不能非是行患不能成無患有司之不公言未旣有􅀏于列者曰先生欺余哉弟子事先生于兹有年矣年方作時云考舊史公時以聀方下迁盖非乆於愽士今按此文恐非聀方左迁時作􅀃見下三年愽士注先生口不絶吟於六藝之文手不停披於百家之編吟或作唫記事者必提其要纂言者必鉤其玄記或作紀貪多務得細大不􅂢焚膏油以􅁇晷􅁪兀兀以窮年先生之業可謂勤矣焚或作燒兀兀或作矻矻之下或有於字觝音㡳角觸排異端攘斥佛老􅀘苴子余切苴所以藉履罅呼訝切孔罅漏張皇幽眇方云衣弊不補履决不苴吕氏春秋語抗辝幽􅀃閎意眇旨見揚子雲解難尋墜緒之茫茫獨旁搜而逺紹障百川而東之迴狂瀾於旣倒先生之於儒可謂有勞矣茫茫或作芒芒障或作停方云礼記鯀鄣洪水音章或无有字沈浸醲郁含英咀華醲或作釀作爲文章其書滿家上規姚姒徐里切夏姓也姚舜姓也渾渾無涯無或作亡或作之非是周誥殷盤佶屈聱五交切韓曰廣雅謂不入人語也孫曰佶屈聱牙皆艱澁皃牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣文方作德或作儒或作得非是少始知學勇於敢爲長通於方左右具宜先生之於爲人可謂成矣具或作其或作且人上或无爲字然而公不見信於人私不見助於友跋前躓音致後動輒得咎躓多或㚄方云載㚄其尾􅀃文与躓義通暫爲御史遂竄南夷三年博士冗不見治平声遂或作逐年方作爲謂貞元末爲四門博士元和􅀄爲囯子博士今復下迁諸本多作三年樊謂公元和元年六月爲博士四年六月迁都官史謂三嵗爲眞盖三年也今按洪譜則樊􅀃爲是當作三年唐本詩注行狀皆有三年字何煩曲􅀃乎然洪亦附三爲之􅀃則又誤矣命與仇謀取敗幾時冬暖而兒號寒年豐而妻啼飢取方作其豊或作登頭童齒豁竟死何禆不知慮此而反教人爲先生曰吁子來前夫大木爲杗音盲尓雅杗瘤謂之梁􅀃文云杗屋大梁也細木爲桷左氏傳子尾抽桷繋扉法桷椽也詩松桷有梴欂櫨侏儒欂音薄櫨音盧三者皆屋上短柱欂下名枅櫨一名楶侏儒一名梲字或作株檽椳音隈户樞闑魚列切門限扂亭􅀧切門関牡楔音屑門兩傍木各得其宜施以成室者匠氏之工也或无冝字室下有屋字工作功方云淮南子曰賢王之用人也猶巧工之制木也大者以爲舟航梁棟小者以爲楫楔脩者以爲櫚榱短者以爲侏儒枅櫨无小大脩短皆得其所宜規矩方圎名有所施天下之物莫凶於雞毒烏頭也然而良醫蠧而藏之有所用也是故林莽之林猶不弃者而况於人乎公言盖祖此而宜施二字當爲一飾玉札丹砂赤箭青芝牛溲音痩馬勃敗鼓之皮七者皆薬名也玉泉一名玉扎生藍田山谷赤箭生陳倉山谷及太山少室青芝出泰山牛溲牛溺馬勃馬屁菌也生􅊜地及腐木上敗鼓皮主虫毒出本草俱収並蓄待用無遺者醫師之良也登明選公雜進巧拙紆音迂紆箇屈曲皃餘爲妍卓犖爲傑校短量長惟器是適者宰相之方也卓犖或作犖犖昔者孟軻好辯孔道以明轍環天下卒老于行荀卿守正大論是弘逃䜛于楚廢死蘭陵荀卿至是弘八字方从舊史如此又云文􅁐上文皆同惟是弘作以㒷盖囯􅀄以諱避也閤本亦只作大論以正爲王以論爲倫自杭本也而新史又易守爲宗其訛益甚矣是二儒者􅄍辭爲經舉足爲法絶􅀋離倫優入聖域其遇於丗何如也遇或作進今先生學雖勤而不繇其統言雖多而不要平声其中文雖竒而不濟於用行雖修而不顯於衆􅂋或作洎舊史四句皆无而字猶且月費俸錢歳靡与縻同􅅒粟俸或作奉子不知耕婦不知織乗馬從徒安坐而食从或作而非是踵常途之促促窺陳編以盗竊促促諸本多作役役方云促音齪公張署墓誌抑首促促就食与此同史記申屠嘉娖娖廉謹娖与促音義通集韻齪下二字皆出編或作篇然而聖主不加誅宰臣不見斥兹非其幸歟或无其字或作此非其利哉動而得謗名亦隨之投閑置散乃分之宜若夫商財賄之有亡計班資之崇􅋻音卑忘已量之所稱去声指前人之瑕疵是所謂詰匠氏之不以杙音杙莊子求狙猴之杙者斬杙橜也楹柱也杙小而楹大故以代自喻爲楹而訾音紫醫師以昌陽引年欲進其狶苓也狶音喜又音希昌陽本草昌蒲注生石磧上槪節者良生下􅊜地大根乃是昌陽不可服東坡云不知退之即以昌陽爲昌蒲耶抑謂其似是而非不可以引年也孫曰昌蒲味辛温无毒从服輕身不老延年益心智一名昌陽生上洛池澤及蜀郡􅃊道祝曰楚人呼猪爲狶狶苓乃猪苓也已量或作量巳非是師不或有不字今按本草昌蒲一名昌陽作不以者非是本政周之政文旣其弊也其方作有或无其字今按猶言旣而弊矣旣字又似及字後丗不知其承大敷古先遂一時之術以明示民遂或作逐民始惑教百氏之􅀃以興其言曰天下可爲也彼之政仁矣反於誼此之政敬矣戾於忠何居我其周從乎曰周不及殷其殷從乎曰夏曰虞曰陶唐曰三皇氏曰遂古之􅀄何居方无何字或无居字我或作吾今按何居凖檀弓音􅁎大率此篇僻澁必其少作今或有所未通闕之可也􅁀孽情飾􅁋志孽或作泰枝辭琢正紛紊紏射以僻民和以導民亂嗚呼道之去丗其終不復矣乎長民者發一號施一令民莫不悱芳尾切口悱悱也然非矣或无然非二字謂不可守遽變而從之譬將適千里及門而復後雖矻矻苦骨切矻矻堅也用心皃决不可曁方无後字曁或作洎原其始固有啓之者也聞於師曰古之君天下者化之不示其所以化之之道及其弊也易之不示其所以易之之道政以是得民以是淳其有作者知教化之所繇廢抑詭恠而暢皇極伏文貌而尚忠質恠或作􅀋茫乎天運窅音窈爾神化道之行也其庶巳乎守戒詩曰大􅀖維翰書曰以蕃王室諸侯之於天子不惟守土地奉職貢而已固將有以翰蕃之也今人有宅於山者知猛獸之爲害則必髙其柴楥而外施窞穽以待之楥方云籬也欄也字當从木宅於都者知穿窬之爲盗則必峻其垣牆而内固扃鐍古穴切孫云莊子曰固扃鐍扃関也鐍劒也以防之此野人鄙夫之所及非有過人之智而後能也今之通都大邑介於屈強衢物巨兩二切或作倔強之間而不知爲之備噫亦惑矣野人鄙夫能之而王公大人反不能焉豈材力爲有不足歟野下或无人鄙二字爲下或有之而二字或只有之字今詳文势疑爲字􅄛蓋以謂不足爲而不爲耳天下之禍莫大於不足爲句下或有而不爲三字今詳文势疑下足字衍下文不足爲者放此材力不足者次之足下或有爲字非是不足爲者敵至而不知材力不足者先事而思則其於禍也有間矣彼之屈強者帶甲荷戈不知其多少其緜地則千里而與我壌地相錯与上方无而字無有丘陵江河洞庭孟門之関其間又自知其不得與天下齒朝夕舉踵引頸冀天下之有事以乗吾之便頸或作領此其􅁀於猛獸穿窬也甚矣嗚呼胡知而不爲之備乎哉賁育之不戒童子之不抗魯雞之不期蜀雞之不支今夫鹿之於豹非不巍然大矣於或作與非是然而卒爲之禽者􅀲牙之材不同猛怯之資殊也曰然則如之何而備之曰在得人圬者王承福傳圬或作杇方云圬音烏左傳圬人以時塓館宫室杜注圬人􅂗者題語正本此􅀃不當用杇字今按論語作杇圬之爲技賤且勞者也有業之其色若自得者聽其言約而盡問之王其姓承福其名丗爲京兆長安農夫方无夫字天寳之亂發人爲兵持弓矢十三年有官勲棄之來歸䘮其土田手鏝母官切祝曰鏝杇具尓雅鏝謂之杇衣食餘三十年舎於市之主人而歸其屋食之當焉視時屋食之貴賤而上下其圬之傭以償之有餘則以與道路之廢疾餓者焉又曰粟稼而生者也若布與帛必􅅙績而後成者也其他所以養生之具皆待人力而後完也吾皆頼之然人不可徧爲宜乎各致其能以相生也故君者理我所以生者也方从閤杭本如此諸本以生或作以出令今按所以出令与原道意同似當从之然詳上文有三生字故此言君者理我之所以生者正承上文而言也若作出令則与上下文意皆不叶矣今當以方本爲正而百官者承君之化者也方从閤杭无也字非是任有小大惟其所能若器皿焉食焉而怠其事必有天殃故吾不敢一日捨鏝以嬉一日捨鏝或作捨鏝一日夫鏝易能可力焉又誠有功取其直雖勞無愧吾心安焉夫力易強而有功也心難強而有智也智上方无有字用力者使於人用心者使人亦其宜也吾特擇其易爲而無愧者取焉特或作故嘻吾操鏝以入貴冨之家有年矣挏或有於字有一至者焉又往過之則爲墟矣有再至三至者焉而往過之則爲墟矣問之其鄰或曰噫刑戮也或曰身旣死而其子孫不能有也或曰死而歸之官也問下或无之字死上或无日字吾以是觀之非所謂食焉怠其事而得天殃者邪焉下或有而字非強心以智而不足不擇其才之稱否而冐之者邪非多行可愧知其不可而強爲之者邪知其不可下杭本有能字蜀本能上又有強字方从閣本作知巳之不可能又无強字今按此􅂾本語意皆与上文不擇其才之爯否者相復又与本句多行可愧者不相承惟杭蜀本近是但能字亦未安而強字當在而字下耳今參取二本定爲知其不可而強爲之則其上下文之義皆暢矣將貴冨難守薄功而厚饗之者邪方无之字抑豐悴有時一去一來而不可常者邪吾之心憫焉是故擇其力之可能者行焉樂富貴而悲貧賤我豈異於人哉又曰功大者其所以自奉也􅀶妻與子皆養於我者也吾能薄而功小不有之可也我者閣作我􅀋有之閣作有小皆非是又吾所謂勞力者若立吾家而力不足則心又勞也者下或有也字一身而二任焉雖聖者不可能也愈始聞而惑之又從而思之蓋賢者也蓋所謂獨善其身者也然吾有譏焉謂其自爲也過多其爲人也過少其學楊朱之道者邪楊之与所證之文􅀄不相似况下文有嗚呼余乎則此于字皆是余字明矣嗚呼余乎其無知乎君子之棄而小人之歸乎知下或无乎字言箴不知言之人烏可與言知言之人黙焉而其意巳傳烏或作焉焉或作然幕中之辯人反以汝寪叛臺中之評人反以汝爲傾以汝方並作汝以今按近丗校本務爲新竒多作倒語文乖字逆幾􅀋歐陽公所譏石公操作字之怪殊失韓公立言本意今悉正之不敢从也汝不懲邪而呶呶女交切以害其生邪行箴行或作悔行與義乖言與法違後雖無害汝可以悔行也無邪言也無頗普禾切死而不死汝悔而何宜悔而休汝惡曷瘳宜休而悔汝善安在悔不可追悔不可爲思而斯得汝則弗思追諸本皆同而方从閤杭作止今按草書追字近似止字二本偶以轉冩致誤而方乃以好怪取之不復計其文義之通塞可一􅀏也好惡箴無善而好不􅀚其道無悖而惡不詳其故善方从杭蜀作悖今按二本盖由下句而誤方亦不頋文義而取之也前之所好今見其尤從也爲比捨也爲讎前之所惡今見其臧從也爲愧捨也爲狂維讎維比維狂維愧於身不祥於德不義不義不祥維惡之大幾如是爲而不顚沛齒之尚少庸有不思今其老矣不愼胡爲知名箴内不足者急於人知霈焉有餘厥聞四馳焉或作然今日告汝知名之法勿病無聞病其曄曄昔者子路惟恐有聞赫然千載德譽愈尊矜汝文章􅀒汝言語乗人不能揜以自取汝非其父汝非其師不請而教誰云不欺欺以賈音古憎揜以媒怨汝曽不寤以及於難小人在辱亦克知悔及其旣寜終莫能戒及其或作其及旣出汝心又銘汝前汝如不顧禍亦冝然禍亦方作辱則後漢三賢賛三首樊曰后漢王充王符中長綂三人者同傳公爲之賛各不滿百言而叙事畧无遺者王充者何㑹稽上虞本自元城爰來徙居師事班彪家貧無書閱書於肆市肆是遊一見誦憶遂通衆流閉門潜思論衡韓曰王充所爲論衡􅀄中士未有傳者蔡邕入呉始得之常祕以爲談助其後王良爲㑹稽太守亦得其書及滿許下時人称其才進或曰不見異人當得異書以修爲州治中自免歸歟同郡友人謝姓夷吾上書薦之待詔公車以病不行年七十餘乃作養性一十六篇肅宗之時終於永元王符節信安定臨涇好學有志爲郷人所輕或无爲字人或作里憤丗著論潜夫是名述赦之篇以赦爲賊良民之甚其㫖甚明甚或作急方云王符述敢篇曰今日賊良民之甚者莫大於数赦公全具此語皇甫度遼聞至乃驚衣不及帶屣履出迎豈若鴈門問鴈呼卿樊曰度遼將軍皇甫規解官歸安定郷人有以貫得鴈門太守者亦還家書刺謁規規卧不起旣入而間即前在􅀰食馬美乎有頃王符在門規素聞符名衣不及帶屣履出迎時人爲之語曰徒見三千石不如一逢掖不仕終家吁嗟先生仲長統公理山陽髙平或无仲字謂髙幹有雄志而無雄才諸上或有自字其後果敗以此有聲俶儻敢言語黙無常人以爲狂生俶或作攔方云俶与傳台州郡㑹召稱疾不就著論見情􅀄舉尚書郎後參丞相軍事卒不至于榮㪯下或有髙弟字今按本傳无髙弟字論􅀃古今發憤著書昌言是名友人繆襲稱其文章足􅁇西京文章方云考本傳當作才章公三賛未甚致立一語四十一終何其短邪嗚呼先生一下方有而字諱辯愈與李賀書李上方有進士二字非是􅂆賀舉進士賀舉進士有名與賀爭名者毀之此公自言嘗勸李賀舉進士而賀从已􅀃㪯進士有名称故与之争名者毀之也今方氏乃从諸本删去名字而以有字属下句遂使復出四字爲刺語而争各二字无所承故諸本亦有斍其誤者而并則四字以从自雖若小勝方本然要爲失韓公本指而不究毀者之情也方本又无之字亦非是方又云康駢劇談録謂公此文因元稹而發董彦逺謂賀死元和中使稹爲礼部亦不相及爭名盖當時同討者曰賀父名晉肅賀不舉進士爲是􅂆之舉者爲非聽者不察也和而唱之同然一辭或无也字皇甫湜曰若不明白子與賀且得罪方无若字愈曰然律曰二名不偏諱釋之者曰謂若言徴不稱在言在不稱徴是也律曰不諱嫌名釋之者曰謂若禹與雨立與蓲之􅀋是也蓲与丘同音烏蓲草名或无此注字今賀父名晉肅賀舉進士爲犯二名律乎爲犯嫌名律乎父名晉肅子不得舉進士若父名仁子不得爲人乎嫌名律乎下諸本皆有此二十字方从杭本去之非是夫諱始於何時作法制以教天下者非周公孔子歟周公作詩不諱若曰克昌厥後又曰駿發尓私若字方作周公孔子不偏諱二名若曰宋不足徴又曰某在斯若字方作孔子春秋不譏不諱嫌名若衛􅁊公名完本或无若字康王釗音招之孫實爲昭王曽參之父名晳曽子不諱昔若日昔者吾友又曰裼裘而弔若字方作曽子周之時有騏期漢之時有杜度此其子宜如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎期字度字下或並有者字方云董彦逺曰騏期以姓􅁐考之爲朞又李涪謂杜澡字伯度魏人以武帝諱謂杜度公誤用也然張仲景方自有杜度公所用或出此漢諱武帝名徹爲通不聞又諱車轍之轍爲某字也諱吕后名雉爲野雞不聞又諱治天下之治爲某字也或无下又諱一字方云顔氏家訓曰􅁊公名白傳有五皓之称萬王脩公詺長琴有脩短之目不聞謂布帛爲布皓呼腎陽爲腎盖有自也今按公言或与顔氏偶同未必用其語也今上章及詔不聞諱滸􅀔秉饑太祖名虎太宗名丗民代祖名昞玄宗名隆基也惟宦官宫妾乃不敢言諭及機以爲觸犯以論爲近代宗廟諱以機爲近玄宗廟諱士君子言語行事冝何所法守也言語或作立言今考之於經質之於律稽之以國家之典賀舉進士爲可邪爲不可邪或无㪯字為可下或无邪字方无邪爲二字凡事父母得如曽參可以無譏矣作人得如周公孔子亦可以止矣矣或並作也方並作邪今丗之士不務行曽參周公孔子之行而諱親之名則務勝於曽參周公孔子亦見其惑也夫周公孔子曽參卒不可勝勝周公孔子曽參乃比於宦者宮妾則是宦者宫妾之孝於其親賢於周公孔子曽參者耶宦者或並作宦官訟風伯訟或作䜛非是維兹之旱􅀆其誰之由我知其端􅀆風伯是􅀹旱上或无之字山升雲􅀆澤上氣雷鞭車􅀆電揺幟雨寖􅎊􅀆將墜風伯怒􅀆雲不得止寖寖或作侵侵將下或有欲字􅊙烏之仁􅀆念此下民閟其光􅀆不闘其神嗟風伯􅀆其獨謂何我於爾􅀆豈有其他獨或作將求其時􅀆修祀事羊甚肥􅀆酒甚旨食足飽􅀆飲足醉風伯之怒􅀆誰使雲屏屏􅀆吹使醨之氣將交􅀆吹使離之鑠之使氣不得化寒之使雲不得施氣不或作雲不雲不或作氣不嗟爾風伯􅀆欲逃其罪又何辭方无􅀆字又上或有其字上天孔明􅀆有紀有綱我今上訟􅀆其罪誰當我今或作今我天誅加􅀆不可悔風伯雖死􅀆人誰汝傷雖方作之非是汝或作尔伯夷頌士之特立獨行適於義而巳不顧人之是非皆豪傑之士信道篤而自知明者也一家非之力行而不惑者寡矣至於一國一州非之力行而不惑者蓋天下一人而巳矣若至於舉丗非之力行而不惑者則千百年乃一人而已耳若伯夷者窮天地亘萬丗而不顧者也㪯丗非之下方从杭粹及范文正公冩本无力行二字千下有五字云自周􅀄至唐貞元未幾二千年公言千五百年㪯其成也今按此篇自一家一囯以至㪯丗非之而不惑者汎􅀃有此三等人而伯夷之窮天地亘万丗而不頋又别是上一等人不可以此三者論也前三等人皆非有所指名故㪯丗非之而不頋者亦難以年数之实論其有無而且以千百年言之盖其大約如此耳今方氏以伯夷當之巳失全篇之大指至於計其年数則又捨其幾二千年全数之多而反促就千五百年竒数之少其誤益甚矣方􅀃不通文理大率􅀋此不可不辨昭乎日月不足爲明崒慈䘏切山髙皃乎泰山不足爲髙巍乎天地不足爲容也當殷之亡周之興微子賢也抱􅀕器而去之去下方无之字武王周公聖也從天下之賢士與天下之諸侯而往攻之未甞聞有非之者也从或作率与或作从彼伯夷叔齊者乃獨以爲不可殷旣滅矣天下宗周彼二子乃獨恥食其粟餓死而不頋繇是而言夫豈有求而爲哉信道篤而自知明也明下或有者字今丗之所謂士者或无所字一凡人譽之則自以爲有餘一凡人沮之則自以爲不足一凡人諸本兩句皆作凡一人唯范本並作一凡人乃与下文非聖人者相發明諸本非是彼獨非聖人而自是如此夫聖人乃萬丗之褾準也余故曰若伯夷者特立獨行窮天地亘萬丗而不頋者也準方作唯今按凖字从水準声俗作准方本誤也又按此篇之意所謂聖人正指武王周公而言也旣曰聖人則是固爲万丗之標準矣而伯夷者乃獨非之而自是如此是乃所以為窮天地亘万丗而不頋者也与丗之以一凡人之毀譽而遽為喜愠者有間矣近丗讀者多誤以伯夷為万丗標凖故因附見其􅀃云雖然㣲二子亂臣賊子接跡於後丗矣朱文公校昌黎先生集卷之十二
