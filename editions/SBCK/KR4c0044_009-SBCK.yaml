front:
  text: 朱文公校昌黎先生集卷之九考異音釋附
  hash: sha256:bbc93615c6bdfe18202ea0020ac214ebdaae4aef1531c7990a7712f8e7cfed18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_009-1a}
body:
  text: 律詩凡八十五首題楚昭王廟丘墳滿目衣冠盡墳或作園城闕連雲草樹荒猶有國人懷舊德一閒茅屋􅀕昭王􅀫龍宮灘浩浩復湯湯音商西清詩話魯直云退之裁聽水句尤見工所謂浩浩湯湯抑更􅀭者非諸客裏夜卧飽聞此聲安能周旋妙處如此耶灘聲抑更􅀭奔流疑激電驚浪似浮霜夢覺燈生暈宵殘雨送涼如何連曉語一半是思郷或作抵是􅀃家郷义魚招張功曹或无下四字义集注周官以時藉魚鄭云以􅒎刺泥中取之魚春岸闊此興在中宵大炬然如晝長船􅅞似橋深窺沙可數静搒音謗進舡也水無揺刃下那能脫刃或作手波間或自跳中鱗憐錦碎憐或作疑當目訝珠銷迷火逃翻近驚人去暫遥競多心轉細得雋音俊左傳得雋曰克語時囂潭罄知存寡舷音舡舷邊或作船平覺獲饒交頭疑湊餌駢首􅀋同條濡沫情雖密登門事巳遼事或作志盈車孫曰孔叢子衛人鈞魚於河得魚焉其大盈車欺故事飼犬上音伺食也孫曰塩鐡論曰彭蠡之濵以魚飼犬樊曰杜子美黄魚詩脂膏兼飼犬驗今朝血浪疑猶沸腥風逺更飄蓋江煙􅇈羃莫狄切深皃拂棹影寥寥疑或作迴􅆩去愁無食龍移懼見燒如棠名旣誤釣渭日徒消文客篤先賦篙工喜盡謡膾成思我友􅀚樂憶吾僚自可􅂢憂累何須強問鴞孫曰賈誼鵩賦曰問於子鵩余去何之楚人命鴞曰鵩不祥鳥也李貟外􅀉紙筆方云李伯康也伯康以貞元十九年寪郴州刺史􅁠德輿集有墓誌今按後卷􅀕文獲􅁓筆之双貿即謂此事投义魚之短韻亦指前篇也題是臨池後韓曰張芝伯英善草書凡家之衣帛必先書而染練之臨池斈書池水盡黒寸紙不遺韋仲將將之入聖分從起草孫曰漢制尚書郎掌天子制詔起草禁中餘兎尖針莫並繭淨韓曰淨準繭紙也羲之製蘭亭乘興而書用􅅙繭紙􅀘注建中􅀄日本使者興能獻方物興能善書其􅁓似繭而澤人莫能識雪難如莫怪殷勤謝虞卿正著書樊曰虞卿著虞氏春秋太史公曰虞卿非窮愁亦不能著書以自見於丗次同冠峽冠或作弄或作巫今日是何朝天晴物色饒晴或作清落英千尺墮遊絲百丈飄泄乳交巖脉懸流掲浪摽無心思嶺北猿鳥莫相撩笞張十一功曹唐本有張署􅀉公詩山淨江空水見沙哀猿啼處兩三家篔簹云當三音竹名也祝日選其竹則篔簹箖箊韓曰郭璞江賦桃枝篔簹實繁有叢競長纖纖笋躑躅閑開豔豔花閑或作􅀄未報恩波知死所莫令炎瘴送生涯吟君詩罷看􅀟􅁂斗覺霜毛一半加郴州祈雨乞雨女郎魂炰羞㓗且䌓廟開鼯䑕呌神降越巫言旱氣期銷蕩隂官想駿奔行看五馬入蕭䬃巳隨軒湘中酬張十一功曹休垂絶徼千行淚共泛清湘一葉舟今日嶺猿兼越鳥可憐同聽不知愁郴口又贈二首山作劒攅江寫鏡扁舟斗轉疾於飛廻頭􅀏向張公子終日思歸此日歸雪颭職琰切霜翻看不分雪或作雲雷驚電激語難聞沿涯宛轉到深處何限青天無片雲涯或作崖題木居士火透波穿不計春根如頭面榦如身偶然題作木居士便有無窮求福人寪神詎比溝中斷孫曰莊子百年之木破爲儀尊黄而文之其断在溝中比儀尊於溝中之断則美惡有間其失性一也遇賞還同㸑下餘後漢蔡邕呉人有燒桐以㸑者邕聞火烈之声知其良木因請而裁為琴果有美音其尾猶焦故人名爲焦尾琴云朽蠧不勝刀鋸力匠人雖巧欲何如晚泊江口郡城朝解纜江岸暮依村二女竹上淚􅀌臣水底䰟􅀟􅀟歸蟄燕一一呌羣猿廻首那聞語空㸔别䄂翻聞或作能湘中猿愁魚踊水翻波踊或作躍自古流傳是汨羅汨音覔在長沙羅縣故曰汨羅蘋藻滿盤無處奠空聞漁父叩舷歌盤或作舡舷或作舡别盈上人方云柳子厚集有誡盈住衡山中院山僧愛山出無期俗士牽俗來何時祝融峯下一廻首即是此生長别離喜雪獻裴尚書或无下四字􅀫雲寒不卷春雪堕如簁所宜切孫曰簁下物竹器或作篩騁巧先投􅂩潜光半入池半或作乱喜深將䇿試驚宻仰簷窺自下何曽汙増高未斍危斍或作見比心明可燭拂面愛還吹妬舞時飄䄂欺梅併壓枝地空迷界限砌滿接高卑浩蕩乾坤合霏微物象移爲祥矜大熟布澤荷平施為或作驗布或作市方云以上句為祥言之布澤為當巳分年華晚猶憐曙色隨氣嚴當酒換或作暖灑急聽牎知照曜臨􅀄日玲瓏滴晚澌晚或作曉聚庭㸔嶽聳掃路見雲披陣􅀔魚麗音離孫曰左傳鄭人為魚䴡之陣先偏後伍逺書文鳥􅂐韓曰尚書䟽蒼頡造書觀於鳥迹因而遂滋則謂之字竒縱􅂬羅豔􅃛列賀擁熊螭履弊行偏冷門扄卧更羸悲嘶間病馬或作鳥浪走信嬌兒竈靜愁煙絶絲䌓念鬢衰擬塩吟舊句授簡樊曰謝靈運雪賦曰梁孝王遊於兎園宻雪下授簡於司馬大夫曰抽子愁思騁子妍詞為我賦之慕前規捧贈同燕石孫曰閑子曰宋之愚人得燕石於梧䑓之東帰而藏之以為宝有客聞而􅀚之掩口而笑曰此燕石也与瓦磔不殊公言此者以自喻其詩多慙失所宜春雪㸔雪乗清旦㸔或作􅀚無人坐獨謡坐獨或作獨坐拂花輕尚起落地暖􅀄銷巳訝陵歌扇晋王珉侍人為白團扇􅁔還來伴舞􅆎灑篁留宻節宻或作半著柳送長條入鏡鸞窺沼行天馬沈存中云杜子美詩红稲啄餘鸚鵡粒碧梧栖老鳯凰枝語相反而意新退之雪詩入鏡鵉窺沼行天馬渡橋盖倣此体度橋徧堦憐可掬滿樹戯成揺江浪迎濤日風毛縱獵朝弄閑時細轉爭急忽驚飄城險疑懸布砧寒未擣綃莫愁隂景促夜色自相饒色或作月聞梨花發贈刘師命桃蹊惆悵不能過蹊或作溪紅豔紛紛落地多聞道郭西千樹雪欲將君去醉如何春雪閒早梅閒或作映梅將雪共春彩豔不相因逐吹能爭宻排枝巧妬新誰今香滿座獨使淨無塵芳意饒呈瑞寒光􅂇照人玲瓏開巳徧􅀧綴坐來頻那是俱疑似須知兩逼眞熒煌􅀄亂眼浩蕩忽迷神未許瓊華比從將玉樹親從將或作將從孫曰揚雄甘泉賦翠玉樹之青葱􅀆壁馬犀之璘㻞先期迎獻􅀊韓曰楚詞献􅀊發春更伴占兹辰或作晨願得長輝映輕㣲敢自珍微或作嚴早春雪中聞鸎諸本或在関詠馬之後朝鸎雪裏新雪樹眼前春帶澁先迎氣侵寒巳報人共矜初聽早誰貴後聞頻暫囀那成曲􅀌鳴豈及辰風霜徒自保桃李詎相親􅀉謝幽棲友辛勤不爲身梨花下贈劉師命方云蘇魏公云當録於古詩中洛陽城外清明節百花寥落梨花發今日相逢瘴海頭共驚爛熳開正月和歸工部送僧工部歸登也方云約荆州人詳見劉夢得集早知皆是自拘囚不學因循到白頭汝旣出家還擾擾何人更得死前休得或作向入􅀜詠馬歳老豈能充上駟力微當自慎前程不知何故翻􅋮首牽過関門妄一鳴妄或作忘木芙蓉新開寒露叢逺比水閒紅露方作路閒或作邊皆非是􅃩色寧相妬嘉名偶自同採江官渡晩搴木古祠空方從杭蜀館本官渡作秋節祠作辝又云閣本作秋江官渡晚寒木古祠空洪本校從採江官渡晚搴木古祠空按古詩有渉江採芙蓉正謂荷花又九􅁔搴芙蓉􅀆木未則謂搴之非其地也此以一花對喻謂將採之江則秋節已晚將搴之木則古辝所喻爲无益盖詩人強彼弱此意也今按方􅀃非是盖此詩言荷花与木芙蓉生不同処而色皆羙名又同故以採江搴木二事相對言者生処而九􅁔者􅀕神之辝故曰古祠也如此則此詩從頭至此六句意皆聮属然嘉祐杭本巳如此非洪意定也願得勤來看無令便逐風願得或作須􅂆題張十一旅舎三詠榴花五月榴花照眼明枝間時見子􅀄成可憐此地無車馬顚倒靑苔落絳英絳或作細井賈誼宅中今始見孫曰湘水記云賈誼宅中有一井誼所穿也杜詩長懷賈誼井依然􅁑洪山孫曰􅁑洪字稚川其井今在栁州下昔曽窺寒泉百尺空㸔影正是行人渴死時渇或作暍蒲萄新莖未徧半猶枯高架支離倒復扶復或作後若欲滿盤堆馬乳韓曰蜀本草云蒲萄有紫白二色又有似馬乳者莫辤􅄈竹引龍鬚若或作君峽石西泉西一作寒居然鱗介不能容石眼環環水一鍾聞􅀃旱時求得雨祗疑科斗是蛟龍梁國惠康公主挽􅁔梁或作涼方云考之史當作梁今按本或有詞字羊士諤集有梁國惠康公主挽􅁔詞二首注云時詔令百官進詩定謚芳聲逺移封大國新巽宫尊長女台室属良人河漢重泉夜梧桐半樹春孫曰梧桐半生半死半樹春以言公主死獨其夫王季友存尓龍轜音而祝曰轜䘮車名前漢此似轜車孫曰周礼王后五輅重翟錫回朱緫厭翟勒靣繢緫厭翟平時所乗車也非厭翟上於渉切下丁歴切雉羽飾車其羽相迫還輾禁城塵秦地吹簫女湘波鼓瑟妃佩蘭􅀄應夢奔月孫曰淮南子羿請不死之薬於西王母羿妻常娥竊而奔月是為蟾蜍竟淪輝竟或作競非是夫族迎䰟去宮官㑹葬歸從今沁園上七􆄺切孫曰沁水公主漢光武皇帝女竇憲恃女弟為皇后以賤直奪公主園沁者沁水公主園也草無復更芳菲和崔舎人詠月崔羣也門本無此篇三秋端正月今夜出東溟對日猶分􅀔騰天漸吐靈木高烝逺氣半上霽􅀌形赫奕當􅄤次虚徐度杳㝠長河晴散霧列􅀫音秀曙分螢浩蕩英華溢瀟踈物象泠或作零池邊臨倒照簷際送横經花樹參差見皐禽断續聆牖光窺寂寞􅻅影伴娉婷上晋丁切下徒寕切祝曰和色也杜詩赤節引娉婷幽坐㸔侵户閑吟愛滿庭輝斜通壁練彩碎射沙星清潔雲閒路空涼水上亭淨堪分顧兎孫曰楚詞厥利維何而顧兎在腹顧兎月中兎也細得数飄萍山翠相凝緑林煙共􅇈靑過隅驚桂側當午覺輪停属思摛霞錦追歡罄縹缾郡樓何處望隴笛此時聽右掖連台座重門限禁扄風䑓􅀚滉音晃滉一作洸瀁􅖅砌歩靑熒音螢選眩耀青熒獨有虞庠客無由拾落蓂孫曰白虎通曰日度得其分則蓂莢生於階間􅕴莢者樹名月一日一莢生十五日畢十六日一莢去三十日畢亦見帝王丗紀詠雪贈張籍樊曰此詩自松篁遭挫抑以下語專以譏時相終以意示張籍曰惟子能諳尓諸人得語哉又曰傳示及提孩其有所譏也審矣只見縱横落只或作祗寜知逺近來飄颻還自弄歴亂竟誰催座暖銷那怪池清失可猜􅉾中􅀄蓋底垤處遂成堆刘貢父云歐陽永叔与江鄰幾論此詩以隨車翻縞帶躍馬散銀盃爲不工而以拗中􅀄蓋底垤処遂成堆為勝且曰未知得韓意否慢有先居後慢或作漫輕多去却廻度前鋪瓦隴發本積牆隈發本或作奔發穿細時􅀟透乗危忽半摧舞深逢坎井集早值層臺砧練終宜擣階紈未暇裁城寒裝睥睨城上女墻樹凍裹莓苔裝或作粧裹或作覆片片勻如翦紛紛碎若挼奴回切定非燖鵠鷺其是屑瓊瑰緯繣上音徽下呼麥切緯繣垂戾也屈原曰忽緯繣其難遷觀朝蕚㝠茫矚晚埃當牎􅁪􅏮凛出户即皚皚五來切壓野榮芝菌壓或作潤傾都委貨財娥嬉䟽􅁪娥䟽游也華蕩瀁瀁或作漾胥伍子胥怒浪崔嵬磧七迹切迥疑浮地雲平想輾雷隨車翻縞帶逐馬散銀盃萬屋漫汗上音暪下音寒大水也合千株照曜開松篁遭挫抑或作折方云公時以栁間亊下迁疑􅀉意於時宰也今按此詩无􅀊月方􅀃恐未必然糞壤􅀗饒培隔絶門庭遽擠排陛級􅂊豈堪禆嶽鎭強欲效鹽梅􅀮匿瑕疵盡包羅委􅃈該誤雞宵呃喔厄喔二音雞声也誤或作悟驚雀暗徘徊浩浩過三暮悠悠市九垓風俗通十􅁐曰經十經曰垓囯語天子之田九垓以食兆民孫曰垓極也九州之極処曰垓鯨鯢陸死骨玉石火炎􅁅厚慮填溟壑高愁㨖音致刺也指也至也斗魁日輪理欲側坤軸壓將頽岸􅀋長蛇攪岸􅀋或作堰似攪或作擾陵猶巨象豗音􅁅闘也水官夸傑􅃛木氣怯肧鋪胚切懷胎一月也胎著地無由卷連天不易推他回切龍魚冷蟄苦虎豹餓號哀巧借奢華便專繩困約災威貪陵布􅀍光肯離金罍離或作􅄂賞玩􅂢他事歌謡放我才狂教詩硉矹上勒没切下音兀豪放皃興與酒陪鰓蘇來切兀或作杌陪鰓方云怒張皃字見潘岳射雉賦樊李校作毰毸惟子能諳耳諸人得語哉􅂇留風作黨勸坐火爲媒雕刻文刀利捜求智網恢莫煩相屬和傳示及提孩酬王二十舎人雪中見􅀉方云王涯爲舎人見王適墓誌本傳畧之今作仲舒非今按王二十涯亦見諱行録三日柴門擁不開階平庭滿白皚皚平庭或作庭平今朝蹋作瓊瑶跡爲有詩從鳯沼來從或作仙送侯喜已作龍鍾後時者􅂴於街裏蹋塵埃如今便别長官去直到新年衙日來長官或作官長非是學諸進士作精衛銜石填海山海經云赤帝之女溺於東海化為􅁈禽名曰精衛衘西山木石以填東海鳥有償􅁈者終年抱寸誠口衘山石細心望海波平渺渺功難見區區命巳輕人皆譏造次我獨賞專精豈計休無日惟應盡此生何慙刺客傳不著報讎名奉酬振武胡十二丈大夫諸本无奉字胡証也傳云河東人元和九年党項屢擾邉証以儒而勇由諌議大夫選拜振武軍節度使傾朝共羡寵光頻半􅀊遷騰作虎臣戎斾暫停辭社樹諸本作弩矢前驅煩縣令方从閤本云趙璘因話錄曰胡証建節赴振武過河中時趙宗儒為帥証時刺称百姓入謁獻詩曰詩書入京囯旌節過郷関若用今語亦非胡公敬桑梓之意閣本多岀於公晚嵗所定今按方意甚善但其言閤本為晚年所定者為无據耳里門先下敬郷人横飛玉盞家山曉逺蹀音牒􅉜蹀行皃謂行春也楚詞衆踕蹀而日進金珂塞草春自􅀏平王誇膽氣不離文字􅁂毛新奉和庫部盧四兄曹長元日朝廻盧汀也洪曰囯史譜云兩省相呼為閣者尚書丞􅀰相呼為曹長􅀰中貟外御史􅀘遺相呼為院長上兼下下不可兼上唯御史相呼為端公然退之呼庐庫部為曹長張功曹為院長則上下亦通称也天仗宵嚴建羽旄建或作樹春雲送色曉雞號金爐香動螭頭暗韓曰唐制起居􅀰舎人分侍左右夾香案立直第一螭首和墨濡筆即􅉾処時号螭頭見百官志玉佩聲來雉尾高孫曰雉尾扇名天子出則御者持之引於庭上樊曰唐制人君㪯動必以雉尾扇障面小團雉尾扇四方雉尾扇十二見儀衛志戎服上趨承北極儒冠列侍映東曹太平時節難身遇難身或作身難郎署何須歎二毛寒食直歸遇雨寒食時㸔度春遊亊巳違風光連日直隂雨半朝歸朝或作晴不見紅毬上孫曰刘向别録曰鞠黄帝所造本兵􅀔也或云起於􅀾囯鞠与毬同紅毬以紅帛爲之那論綵索飛孫曰古今藝術圗云北方山戎寒食日用鞦韆爲戯以習􅁿趫者綵索即謂鞦韆惟將新賜火孫曰周礼季春出火即賜火也向曙著朝衣送李六恊律歸荆南早日羇遊所春風送客歸柳花還漠漠江燕正飛飛歌舞知誰在賔僚逐使非宋亭池水緑莫忘蹋芳菲題百葉桃花知制誥時作百葉􅀟桃晚更紅窺牎映竹見玲瓏窺方作帰或作臨今从嘉祐杭本應知侍史歸天上應劭漢官儀曰尚書入直臺􅇬中給侍史一人女侍史二人皆選端正者侍史從至止車門还女侍史潔被服執香炉燒薫以从入䑓中給使護衣服也天上謂内庭公以考功郎中知制誥寓直禁掖故云故伴仙郎􅀫禁中春雪新年都未有芳華二月􅀄驚見草芽白雪却嫌春色晚故穿庭樹作飛花戯題牡丹幸自同開俱􅀮約何須相􅀝闘輕盈陵晨併作新粧面對客偏含不語情􅀟燕無機還拂掠游蜂多思正經營正方作近長年是事皆拋盡今日欄邊暫眼明盆池老翁真箇似童兒汲水埋盆作小池一夜青蛙鳴到曉恰如方口釣魚時方或作枋方云唐属衛州亘温敗枋頭乃其地也公此詩与送李愿詩只作方口今按公盤谷詩因及方口燕州則二如皆盤谷旁近之小地名耳盤谷在孟州済原縣孟州東過懷州乃至衛州而済原又在孟州西北四十里則遊盤谷者安得至衛州之祊頭乎方􅀃非是莫道盆池作不成洪曰刘貢父云退之古詩高卓至律詩虽可称善要有不工者老翁真箇似童皃此真諧語爲戯耳或云盆池詩有天工如拍岸才添水數瓶一夜青蛙鳴到曉非意到不能作也藕梢􅀄種巳齊生從仐有雨君須記來聽蕭蕭打葉聲有雨或作雨灑瓦沼晨朝水自清小蠱無數不知名忽然分散無蹤影惟有魚皃作隊行惟方作為泥盆淺小詎成池夜半青蛙聖得知聖或作听一聽暗來將伴侣不煩鳴喚闘雄雌池光天影共青青拍岸纔添水數缾且待夜深明月去試㸔涵泳幾多星明或作乗芍藥浩態狂香昔未逢紅燈爍爍緑盤籠紅灯喻花盤籠喻葉覺來獨對情驚恐身在仙宫第幾重情或作忽奉和􅉑州劉給事使君三堂新題二十一詠并序或无奉新題三字方云刘伯芻以元和八年出刺乳州白楽天有制詞􅉑州刺史宅連水池竹林往往爲亭臺島渚目其處爲三堂劉兄自給事中出刺此州在任逾􅀊職修人治州中稱無事頗復増飾從子弟而遊其間又作二十一詩以詠其事流行京師文士爭和之余與劉善故亦同作新亭湖上新亭好公來日出􅀄水文浮枕簟文一作紋瓦影䕃􅀛魚流水汩汩越筆切又音骨幾時休從春復到秋只言池未滿池滿強交流只或作祇竹洞竹洞何年有公􅀄斫竹開洞門無鎻鑰俗客不曽來月臺南館城隂闊東湖水氣多直須臺上㸔始奈月明何渚亭自有人知處那無歩往蹤莫教安四壁靣靣㸔芙蓉竹溪藹藹溪流慢慢或作漫梢梢岸篠長篠或作竹穿沙碧簳古旱切淨落水紫苞香北湖聞􅀃遊湖棹尋常到此廻應留醒心處凖擬醉時來凖或作准俗字花島蜂蝶去紛紛香風隔岸聞欲知花島處水上覔紅雲柳溪柳樹誰人種行行夾岸高莫將條繫纜著處有蟬號西山新月迎宵挂晴雲到晚留爲􅃒西望眼終是􅂴廻頭竹逕無塵從不掃有鳥莫令彈若要􅄈風月應除数百竿荷池風雨秋池上高荷蓋水繁未諳鳴摵摵那似卷翻翻稲畦罫布畦堪數罫或作卦布或作圃方云罫博局上方目也字見選傳奕論仐按愽局當云棊局桓譚新論守邊隅趍作罫以自生於小地枝分水莫尋魚肥知巳秀鶴没覺􅀄深柳巷柳巷還飛絮春餘㡬許時吏人休報亊公作送春詩花源或作原源上花􅀄發公應日日來丁寜紅與紫慎莫一時開莫或作勿北楼郡楼乗曉上盡日不能㢠晚色將秋至長風送月來鏡潭非鑄復非鎔泓澄忽此逢魚蝦不用避只是照蛟龍􅀌嶼朝遊􅀌嶼南暮戯􅀌嶼北所以􅀌嶼鳥與公盡相識方橋非閣復非船可居兼可過君欲問方橋方橋如此作方云白楽天皮日休詩皆自注曰音佐仐按廣韻作造也將􅍈切而荀子􅁏腐出虫魚枯生蠧貪利忘身禍烖乃作及亷范五袴之謡皆巳爲此音矣然讀如佐者又將􅍈切之訛而丗俗所用从人从故而切爲將祚者又字之俗作也梯橋乍似上青㝠􅀄疑躡菡蓞自無飛仙骨欲度何由敢月池寒池月下明新月池邊曲若不妬清妍却成相映燭遊城南十六首方云十六詩非一日作編者􅀋次賽神白布長衫紫領巾差科未動是閑人麥苗含穟桑生葚共向田頭樂社神題于賔客莊榆莢古協切榆莢亦謂之榆錢車前上尺遮切陸機云馬舄一名車前一名當道在牛跡中生蓋地皮薔薇蘸水筍穿籬馬蹄無入朱門跡縱使春歸可得知晩春草樹知春不乆歸草樹一作草木百般紅紫闘芳菲楊花榆莢無才思惟解漫天作雪飛落花巳分將身著地飛那羞踐蹋損光暉無端又􅀍春風誤吹落西家不得歸楸樹幾嵗生成爲大樹一朝纒繞困長藤誰人與脫青羅帔㸔􅄍高花萬萬層幸自枝條能樹立可煩蘿蔓作交加可或作何傍人不解尋根本却道新花勝舊花傍或作遊風折花枝浮􅃩侵天難就㸔清香撲地只遥聞只或作可春風也是多情思故揀䌓枝折贈君㨂或作折折或作將贈同遊諸本无此篇方云杭蜀本皆闕惟唐本有之且属在此喚起牎全曙催歸日未西洪曰魯直云吾兒時毎哦此詩而了不觧其意自出峽来吾年五十八矣時春曉偶憶此詩方悟之喚起催帰二禽名也古人於小詩用意精深如此況其大者乎盖其斈問渊源有五石六鷁之旨催帰子規也喚起声如人絡絲貟轉清亮偏於春曉鳴江南謂之春喚􅀘注復斎謾録云予甞讀唐顧渚記曰顧渚山中有鳥如鸜鵒而色蒼每至正二月作声曰春起也三四月云春去也採茶人呼為喚春鳥然則喚起之名唐人􅀃矣豫章不㪯為証何耶無心花裏鳥更與盡情啼贈張十八􅂇教喜君眸子重清朗􅂝手城南歴舊遊忽見孟生題竹處相㸔淚落不能收題韋氏莊昔者誰能比今來亊不同寂寞靑草曲散漫白榆風架倒藤全落籬崩竹半空寕須惆悵立翻覆本無窮須一作知晩雨廉纎晚雨不能晴方从蜀本作晚雨廉懴於律不諧當从諸本池岸草間蚯蚓鳴投竿跨馬蹋歸路􅂊到城門打鼓聲出城暫出城門蹋青草逺於林下見春山應須韋杜家家到祇有今朝一日閑把酒擾擾馳名者誰能一日閑我來無伴侣把酒對南山對或作謝嘲少年直把春償酒都將命乞音氣花祗知閑信馬不斍誤隨車楸樹青幢紫蓋立童童細雨浮煙作綵籠不得畫師來貌取定知難見一生中貌或作邈方云此猶少陵貌得山僧及童子之皃仐按皃音邈遣興遣或作逺㫁送一生惟有酒尋思百計不如閑莫憂丗事兼身事須着人間比夢間朱文公校昌􅀺先生文集卷之九
