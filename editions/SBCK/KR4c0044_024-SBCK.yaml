front:
  text: 朱文公校昌􅀺先生集卷之二十四考異音釋附
  hash: sha256:b13b40a54fbb65d9e966760223426f35fa6f5000f48fffcf375a435690225d8a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_024-1a}
body:
  text: 碑誌李元賔墓銘李􅀚字元賔方云謝從古本删字字今文粹亦然石本有之此文方從石本今並從之其先隴西人也或无也字始來自江之東年二十四舉進士三年登上第東下或有食太斈之禄五字又舉博學宏辭得太子校書一年書下或有又字年二十九客死于京師于或作於旣歛之三日友人博陵崔弘禮葬之于國東門之外七里歛下或无之字友上或有其字葬上或有賣馬字葬下或無之字郷曰慶義原曰嵩原慶義或作某郷嵩原或作某原友人韓愈書石以誌之辭曰人下或有昌􅀺字辭上或有其字巳虖元賔壽也者吾不知其所慕天也者吾不知其所惡生而不淑孰謂其壽謂其或作爲之死而不朽孰謂之夭謂之或作爲其巳虖元賔才髙乎當丗而行出乎古人才或作文出或作過巳虖元賔竟何爲哉竟何爲哉已虖元賔諸本無此再出四字方從石本今亦從之但方又云上竟字石本作意而邵公済嘗歎其句法之妙謂歐公而下好韓氏斈者皆未之見遂􅀙其􅀃定上字作志意之意下字作究竟之竟則予不識其何􅀃也竊意􅀂非當時誤刻即是後來字半磨滅而讀者不審遂傳此謬好事者又􅀙而夸大之使丗之愚而好怪者遂爲所惑其可􅀏也崔評事墓銘君諱翰字叔清博陵安平人安平或作平安方云今深州有安平縣曾大父知道仕至大理司直大父玄同爲刑部侍郎出刺徐相州同方作童非是或無相字父􅀝舉進士天寳之亂隱居而終君旣䘮厥父􅂝扶􅀌老託于大江之南卒䘮通儒書作五字句詩敦行孝悌詼諧縱謔卓詭不羈又善飲酒江南人士多從之遊卓詭方無此二字或作處丗皆非是貞元八年君生四十七年矣方云以卒日攷之七當作六自江南應節度使王栖曜命于鄜州旣至表授右衛胄曹參軍實參幕府事直道正言􅀘益弘多弘或作􅀹旣去職遂家于汝州汝州刺史呉郡陸長源引爲防禦判官表授試大理評事十二年相國隴西公作藩汴州而呉郡爲軍司馬隴西公以爲呉郡之從則賢也之􅀙或作􅀙事或併岀之字皆非是署爲觀察巡官實掌軍田鑿澮溝斬茭茅或作􅈋方云􅈋鳬葵也此兼水陸言之作茅自當爲陸田千二百頃水田五百頃或無爲字五百或作二千連歳大穰軍食以饒幕府以其功狀聞或無其字使者未復命以十五年正月五日寢疾終于家年五十有六矣隴西公賻贈有加自始有疾呉郡率幕府寮屬日一至其廬問焉其旣甚也日再往問焉其終也往哭焉比小歛大歛三哭焉方無大歛字今按上文并大歛計之乃得三􅂘方本非是於歛之二十日其妻與其子以君之䘮旋葬于汝州與方作以或無于字其二月某日遂葬于某縣某郷某原君内仁九族外盡賔客於其所止其來如歸苟親矣雖不肖收之如賢苟賢矣雖貧賤待之如貴人是故其殁也其弔者與其􅂘者其聲也必哀盡焉妻鄭氏也有子二人女一人吾聞位不稱德者有後嗚呼君其終有後乎德者下或有其終字銘曰朝之言嘻嘻夕之言怡怡偕入而出乗馬馳馬下或有而字一日不見而死吁其悲其下或有可字施先生墓銘貞元十八年十月十一日太學博士施先生士丐卒其寮太原郭伉買石誌其墓方無太原字昌􅀺韓愈爲之辭曰先生明毛鄭詩通春秋左氏傳善講􅀃朝之賢士大夫從而執經考疑者継于門継下或有往字太學生習毛鄭詩春秋左氏傳者皆其弟子貴游之子弟時先生之􅀃二經來太學帖帖坐諸生下恐不卒得聞帖帖或作怡怡下又有然字非是先生死二經生䘮其師仕於學者亡其朋故自賢士大夫老師􅀫儒新進小生聞先生之死哭泣相弔歸衣服貨財先生年六十九在太學者十九年由四門助教爲太學助教由助教爲博士太學由四下十八字此從諸本方從杭本無爲太斈助教由助教八字云盖言由四門助教至爲博士於太斈故也􅀂從今文則下太斈字贅矣仐按此旣言其在太斈者十九年則所歴官不應但一再遷而巳當從諸本爲是但下太斈二字疑衍不然則或在博士上或在下文當去下然無所據不敢􅂺改姑存之以俟知者秩滿當去諸生􅂺拜䟽乞留下或有或乞遷三字或留或遷凡十九年不離太學方云杭本無凡下八字今按上文巳云在太斈者十九年則此八字誠爲重􅃨然欲去之則或留或遷語􅀔未尽又不知公意果如何仐亦論而闕之不敢定其去留也祖曰旭􅀽州宜春尉父曰婼丑畧切豪州定逺丞豪方作豪􅀃巳見前按此誌在元和之前去水爲是妻曰太原王氏先先生卒子曰友直明州鄮縣主薄鄮或作鄞曰友諒太廟齋郎系曰先生之祖氏自施父其後施常事孔子以彰讎爲博士延爲太尉太尉之孫始爲呉人曰然曰續亦載其跡續或作績先生之興公車是召纂序前聞于光有曜古聖人言其㫖密微箋注紛羅顚倒是非紛方作分聞先生講論如客得歸得或作有卑讓肫肫岀言孔揚方云中庸曰肫肫其仁鄭注肫讀如誨尔諄諄之諄􅝴誠皃今其死矣誰嗣爲宗爲或作其縣曰萬年原曰神禾高四尺者先生墓邪考功貟外盧君墓銘銘或作表愈之宗兄故起居舎人君樊曰柳子厚先友記云韓㑹昌黎人善清言有文章名最高然以故多謗至起居郎貶官卒則起居舎人君㑹也以道德文學伏一丗伏或作服其友四人其一范陽盧君東美少未出仕皆在江淮間天下大夫士謂之四䕫方無少字韓曰永泰中㑹與盧東美張正則崔造爲友好談經済之畧常以王佐自許時人号爲四䕫舊史載於崔造傳新史亦具載之而摭言乃以何長師李華盧東美韓衢爲四夔非是其義以爲道可與古之夔臯者侔故云爾䕫臯或作臯䕫後同或曰夔嘗爲相丗謂相䕫四人者雖處而未仕天下許以爲相故云大暦􅀄御史大夫李栖筠由工部侍郎爲浙西􅀚察使當是時中國新去亂仕多避處江淮間仕或作士嘗爲顯官得名聲以老故自任者以千百數大夫莫之取獨晨衣朝服從􅀐吏入下里舎請盧君方無晨字君時始任戴冠通詩書與其羣日講􅀃周公孔子以相磨礱浸灌婆娑嬉遊未有捨所爲爲人意旣起從大夫天下未知君者惟竒大夫之取人也不常必得人其知君者謂君之從人也非其常守必得其從知上方無其字其後爲太常博士監察御史河南府司録考功貟外郎年􅀂干而終在官舉其職􅀂干或作五十四夫人李姓隴西人君在配君子無違德配上或有作字君殁訓子女得母道甚或作甚得母道後君二十年年六十六而終二十或作􅀂干十六或作十四將合葬其子暢命其孫立曰乃祖德烈靡不聞然其詳而信者宜莫􅀂吾先人之友先人之友無在者起居丈有季曰愈能爲古文業其家文或作又是必能道吾父事業汝其往請銘焉父下或有之字立於是奉其父命奔走來告愈謂立曰子來宜也行不可一二舉且吾之生也後不與而祖接不得詳也得下或有其字其大者莫􅀂衆所與觀所與衆寡兹可以審其德矣乃祖未出而處也天下大夫士以爲與古之䕫臯者侔且可以爲相其德不旣大矣乎大夫或作之講􅀃周公孔子樂其道不樂從事於俗得所從不擇外内奮而起其進退不旣合於義乎擇或作釋銘如是可以示於今與後也歟立拜手曰唯唯君祖子輿濮州濮陽令父同舒州望江令夫人之祖延宗鄆州司馬父進成鄜州洛交令君祖下三十四字或但言君祖某某官父某某官夫人之祖某某官父某某官夫人下或无之字男三人暢申易女三人皆嫁爲士人妻士下或无人字墓在河南緱氏縣梁國之原緱氏下七字或作某縣某原其年月日或无此四字非是元和二年二月十日云十下或有四字施州房使君鄭夫人殯表夫人之先出於周方无之字仐按此篇之文平易明白宜有之字以鄭爲氏因􅀄侯曾祖諱隨祖諱玠厥考諱絳咸垂休歸于房宗生九子左右黍稷祠春秋道順德嚴顯且􅁉宜壽而富今何謬冨或作貴永貞冬至前四日寓殯墳此非其丘清邊郡王楊燕竒碑文􅄯本作清郡王楊公神道碑公諱燕竒字燕竒字上或无竒字弘農華隂人也大父知古祁州司倉烈考文誨天寳中實爲平盧衙前兵馬使盧下或有軍字位至特進檢校太子賔客封弘農郡開國伯丗掌諸蕃互市恩信著明夷人慕之禄山之亂公年幾二十進言於其父曰大人守官宜不得去王室在難某其行矣宜或作義其父爲之請於戎帥遂率諸將校之子弟各一人閒道趨闕變服詭行日倍百里天子嘉之特拜左金吾衛大將軍貟外置賜勲上柱國寳應二年春詔從僕射田公平劉展又從下河北大暦八年帥師納戎帥勉于滑州九年從朝于京師建中二年城汴州功勞居多二年或作二歳三年從攻李希烈先登貞元二年從司徒劉公復汴州十二年與諸將執以城叛者歸之于京師事平授御史大夫食實封百户賜繒綵有加封下或有五字十四年年六十一五月某日終于家自始命左金吾大將軍凡十五遷爲御史大夫職爲節度押衙右廂兵馬使兼馬軍先鋒兵馬使右或作左階爲特進勲爲上柱國爵爲清邊郡王食虚邑自三百户至三千户眞食五百户終焉或无自字或无五字公結髮從軍四十餘年或作歳敵攻無堅城守必完臨危蹈難歔欷感發乗機應㑹捷出神怪不畏義死不榮幸生故其事君無疑行其事上無間言􅀄僕射田公其母隔於冀州公獨請往迎之經營賊城出入死地卒致其母田公德之約爲父子故公始姓田氏田公終而後復其族焉嗣子通王屬良禎以其年十月庚寅葬公于開封縣魯陵岡隴西郡夫人李氏祔焉通王德宗之子諶以貞元中領宣武及河東節葬月或作二月或作三月或作八月或作十月方云燕竒卒於五月作二三月者誤矣但八月十月皆有庚寅不知孰是大抵此碑多誤不曉所以僕射田公田神功也神功以上元二年平刘展此作宝應二年舊傳神功大暦八年冬覲闕廷信􅀫而終此作九年皆差也夫人清夷郡太守祐之孫漁陽郡長史獻之女柔嘉淑明先公而殂有男四人女三人後夫人河南郡夫人雍氏某官之孫某官之女有男一人女二人咸有至性純行夫人同仁均養親族不知異焉男一人女二人或作男二人女一人女上或有有字一亦无有字君子於是知楊公之德又行於家也銘曰烈烈大夫逢時之虞大夫或作丈夫感泣辭親從難于秦維兹爰始遂勤其事四十餘年或禆或專攻牢保危爵位巳隮旣明且愼終老無隳魯陵之岡蔡河在側在或作之烝烝孝子思顯勲績斵石于此式垂後嗣河南少尹裴君墓誌銘公諱復字茂紹復或作稷方云唐丗系表集古録皆作復河東人曾大父元簡大理正大父曠御史中丞京畿採訪使父虬以有氣略敢諌諍爲諌議大夫方无有字事諍二字或作言或无諍字引正大疑有寵代宗朝屢辭官不肯拜卒贈工部尚書公舉賢良拜同官尉僕射南陽公開府徐州召公主書記三遷至侍御史入朝歴殿中侍御史累遷至刑部郎中遷或作選非是疾病改河南少尹輿至官􅀂干日卒實元和三年四月二十三日享年五十夫人博陵崔氏少府監頲之女男三人璟質皆旣冠其季始六歳曰充郎充或作彦方云丗系表作望郎卜葬得公卒之四月壬寅遂以其日葬東都芒山之隂杜翟村公㓜有文年十四上時雨詩代宗以爲能將召入爲翰林學士尚書公請免曰願使卒學方无使字丁後母䘮上使臨弔又詔尚書公曰父忠而子果孝吾加賜以厲天下終䘮必且以爲翰林詔或作謂林下或有斈士字其在徐州府能勤而有勞在朝以㳟儉守其職居䘮必有聞待諸弟友以善教館􅊔妹畜􅀌甥能别而有恩而有或作而以歴十一官而無宅於都無田於野無遺資以爲葬斯其可銘也巳銘曰裴爲顯姓入唐􅀹盛支分族離各爲大家方云此銘以家叶離方言罹謂之羅羅謂之罹盖古音通也今按詩兎爰及楚詞多此􅀋惟公之系德隆位細曰子曰孫厥聲丗􅁇子或作祖􅀳陽之色愉愉翼翼色或作邑無外無私㓜壯􅀂一何壽之不遐而禄之不多謂必有後其又信然耶國子助教河東薛君墓誌銘石本有河東字方本无然此後方多從石本今亦從之君諱公逹字大順薛姓字大順或作字某曾祖曰希莊撫州刺史贈大理卿祖曰元暉果州流溪縣丞贈左散􅀐常侍祖下十六字方云閤杭蜀本皆闕推監本与石本同今按方氏所校專據三本而謂今本皆不足取今此数字乃三本所无而今有者若非偶有石本則必以爲後人校増而不之信矣故知今本与閤杭蜀􅁐粹不同者未必皆无所自也􅀚者詳之父曰播尚書禮部侍郎侍郎命君後兄據據爲尚書水部郎中贈給事中據或作授君少氣髙爲文有氣力務出於竒以不同俗爲主始舉進士不與先軰揖作胡馬及圎丘詩京師人未見其書皆口相傳以熟及擢第􅀘家令主簿佐鳯翔軍或无及擢弟三字軍帥武人君爲作書奏讀不識句傳一幕以爲􅀏不爲變笑下或有君字後九月九日大㑹射設標的髙出百數十尺㑹下或有命字令曰中酬錦與金􅀂干一軍盡射莫能中或无盡字能中下或有者字君執弓􅆎二矢指一矢以興指或作挾閤本无指一矢三字仐按下文三發三中考之閤本之謬明矣揖其帥曰請以爲公歡遂適射所一座皆起隨之或无皆字射三發連三中或无射字的壞不可復射中輒一軍大呼以􅀏連三大呼􅀏帥益不喜即自免去後佐河陽軍任事去害興利功爲多拜恊律郎益棄竒與人爲同今天子修太學官有公卿言詔拜國子助教分教東都生元和四年年􅕊七二月十四日疾暴卒􅕊七石本如此下二十一日亦然方著其􅀃而不及改今正之君再娶􅀄娶琅邪王氏後娶京兆韋氏或无􅀄娶以下十二字凡産四男五女男生輒即死或无産字即字自給事至君後再絶皆有名或无皆有名三字然三字之義未詳而方氏亦不著石本之有无姑闕以俟知者遺言曰以公儀之子巳巳後我巳巳後我或作爲已後今按此云巳巳者必其子之小字也其年閏三月廿二日廿說見上弟試太子通事舎人公儀京兆府司録公幹以君之䘮歸試下七字或作某官京下五字或作殿中侍御史以五月十五日葬于京兆府萬年縣少陵原合祔王夫人塋以君下二十八字或作以君之䘮葬京兆某縣銘曰官不遂歸譏於時不下或有能字非是譏或作議石本逸身不得年又將尤誰丗再絶而紹􅀕以不隳監察御史元君妻京兆韋氏夫人墓誌銘諸本无京兆以上九字夫人諱叢字茂之姓韋氏茂方作成仐以名義推之當作茂其上七丗祖父封龍門公龍門之後丗率相􅁇爲顯官夫人曾祖父諱伯陽自萬年令爲太原少尹副留守北都卒贈秘書監或无北都字其大王父迢以都官郎爲嶺南軍司馬卒贈同州刺史王考夏卿以太子少保卒贈左僕射保下或无卒字僕射娶裴氏臯女或无僕射字臯爲給事中臯父宰相耀卿夫人於僕射爲季女愛之爲上或有少字非是選壻得今御史河南元稹選上或有其字稹時始以選校書秘書省中校上或有授字非是其後遂以能直言䇿第一拜左拾遺果直言失官又起爲御史舉職無所顧夫人固前受教於賢父母得其良夫又及教於先姑氏固或作因父上方无賢字得上或有及字及或作受皆非是率所事所言皆從儀灋言或作動年二十七以元和四年七月九日卒卒三月得其年之十月十三日葬咸陽從先舅姑兆銘曰詩歌碩人爰叙宗親女子之事有以榮身夫人之先累公累卿有赫外祖相我唐明有或作於祖或作舅非是歸逢其良夫夫婦婦獨不與年而卒以夭實生五子一女之存銘于好辭以永於聞好或作理韓文二十四卷終
