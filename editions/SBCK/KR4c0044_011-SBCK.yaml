front:
  text: 子之所謂道德云者去仁與義言之也一人之私言也公言私言下或者有者字或惟下句有之周道衰孔子没火于秦黃老于漢佛于晉魏梁隋之間或无黄字晋魏梁隋諸本作晋宋斉梁魏隋文􅁐作晋梁魏隋蜀本作魏晋宋梁斉方從閣杭本云􅀯㪯唱梁北㪯魏隋也其言道德仁義者不入于楊則入于墨不入于老則入于佛墨下諸本有不入墨則入于老二語于入于彼必出于此入者主之出者奴之必上方有則字主方作王今按作主乃与下文三䪨皆叶作王非是入者附之出者汙之二者字或皆作則附或作隆皆非是噫後之人其欲聞仁義道德之􅀃孰從而聽之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也爲孔子者習聞其􅀃樂其誕而自小也亦曰吾師亦甞云爾諸本甞下有師之字不惟舉之於其口而又筆之於其書噫後之人雖欲聞仁義道德之􅀃其孰從而求之甚矣人之好怪也不求其端不訊其末惟怪之欲聞古之爲民者四今之爲民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盗也古之時人之害多矣有聖人者立然後教之以相生養之道或无以字爲之君爲之師驅其蟲蛇禽獸而處之中土寒然后爲之衣飢然后爲之食木處而以通其有無通方作同爲之醫薬以済其夭死爲之葬埋􅀕祀以顚土處而病也然後爲之宮室爲之工以贍其器用爲之賈長其恩愛爲之禮以次其先後爲之樂以宣其壹欎爲之政以率其怠勌爲之刑以鋤其強梗壹或作湮或作堙方云按史記賈誼傳獨堙欝其誰語漢書作壹欎壹常作集韻音咽欎不得泄也平入声通用湮与亦音義同也作壹字則非今按字書壹壷吉凶在壷中不得泄也即今之氤氲字壹湮古盖通用故漢書但作壹耳相欺也爲之符玺斗斛權衡以信之相奪也爲之城郭甲兵以守之方无􅁠衡字非是害至而爲之備患生而爲之防今其言曰聖人不死大盗不止剖斗折衡而民不爭剖或作掊嗚呼其亦不思而巳矣如古之無聖人人之􅀋㓕乆矣何也無羽毛鱗介以居寒􅀬也無爪牙以爭食也是故君者出令者也臣者行君之令而致之民者也民者出粟米麻絲作器血通貨財以事其上者也致之或作致其非是麻絲或作絲麻萹内並同君不出令則失其所以爲君臣不行君之令而致之民民不出粟米麻絲作器皿通貨財以事其上則誅臣不下諸本有能字无而致之民四字而句下有則失其所以為臣一語今其法曰必棄而君臣去而父子禁而相生養之道以求其所謂清淨寂㓕者嗚呼其亦幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也帝之與王其號名殊其所以爲聖一也名下或有雖字夏葛而冬裘渴飲而飢食其事殊其所以爲智一也事下或有雖字今其言曰􅂚不爲太古之無事是亦責冬之裘者曰􅂚不爲葛之之易也責飢之食者曰曷不爲飲之之易也其言或作之言飢之或作飢而傳曰古之欲明明德於天下者先治其國欲治其國者先濟其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有爲也今也欲治其心而外天下國家方作囯家天下句下㓕皆有者字皆非是其天常子焉而不父其父臣焉而不君其君民焉而不事其亊孔子之作春秋也諸侯用夷禮則夷之進於中國則中國之經曰夷狄之有君不如諸夏之亡詩曰戎狄是膺荆舒是懲進上或有夷而字今也舉夷狄之法而加之先王之教之上幾何其不胥而爲夷也夫所謂先王之教者何也愽愛之謂仁行而宜之之謂義由是而之焉之謂道足乎巳無待於外之謂德其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賔主昆弟夫婦其服麻絲其居宫室其食粟米果􅂼魚肉文或作書或作教果􅂼或作􅂼果其爲道易明而其爲教易行也或无而字而下方无其字是故以之爲巳則順而祥以之爲人則愛而公以之爲心則和而平以之爲天下國家無所處而不當是故生則得其情死則盡其常郊焉而天神假廟焉而人􅀑饗曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也何上方无也字今按曰斯道也何道也是問詞而曰斯吾所謂道也以下乃荅語也斯道也何道也或作斯何道也斯吾所謂道也或作斯道也吾所謂之道也又或无所謂字皆非是堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與􅀭也擇焉而不精語焉而不詳由周公而上上而爲君故其亊行由周公而下下而爲臣故其􅀃長然則如之何而可也何而方作何其今侒此句復是問詞其下乃荅語曰不塞不流不止不行人其人火其書廬其居明先王之道以道之鰥寡􅀌獨廢疾者有養也其亦庻乎其可也
