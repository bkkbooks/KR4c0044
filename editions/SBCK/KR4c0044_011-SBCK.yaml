body:
  text: 原性方作性原今按原道原人原􅀑之例作原性為是又此五原篇目旣同當是一時之作与兵部李侍郎書所謂舊文二卷扶樹教道有所明白者疑即此諸篇也然則皆是江陵以前所作程子獨以原性為少作恐其考之或未詳也性也者與生俱生也情也者接於物而生也性之品有三而其所以爲性者五情之品有三而其所以爲情者七而其或皆无而字性者情者方並无者字皆非是曰何也或无曰字曰性之品有上中下三上焉者善焉而巳矣中焉者可導而上下也下焉者惡焉而巳矣其所以爲性者五曰仁曰禮曰信曰義曰智方從閣杭蜀本云礼信去仁為近諸本多作曰仁曰義曰礼曰智曰信今按方本以五行相生之序而言諸本以四方相對一位居中而言理皆可通但切意諸本語陳而韓公亦頗尚異恐方本或得之上焉者之於五也主於一而行於四行於方作行之中焉者之於五也一不少有焉則少反焉其於四也混不上諸本无一字方䙕閣杭朝本作一也而并属下句云一謂仁也言不少存乎仁則少畔乎仁蜀本倒一也二字杭蜀反皆作及非也今按也一二字當從蜀本而以也字属上句一字属下句方及諸本皆非也方以一為仁亦非是此但言中人之性於五者之中其二者或偏多或偏少其四者亦雜而不純耳反字則方得之下焉者之於五也反於一而悖於四性之於情視其品情之品有上中下三其所以爲情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處其中其中或作於中非是中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也亡与上方有无字非是情之於性視其品孟子之言性曰人之性善荀子之言性曰人之性惡􅀭子之言性曰人之性善惡混夫始善而進惡與始惡而進善與始也混而今也善惡皆舉其中而遺其上下者也得其一而失其二者也与諸本多作欤善惡下又有欤字今按二与字皆當讀如字而為句首猶言及也作欤而為句絶者皆非左傳夫弗及而􅁨与可憂而楽与憂而弗害皆取􅁨之道也語势亦相似叔魚之生也其母視之知其必以賄死􅀭食我食音嗣叔向生子伯石母視之及堂聞其声而還日是􅉘狼之声也非是莫䘮羊古氏矣伯石食我字也食邑於􅀭之生也叔向之母聞其號也知必滅其宗越椒之生也子文以爲大戚知若敖姓也楚子良生子越椒子文曰是子弗殺必㓕若敖之族氏之􅀑不食也人之性果善乎或无大字后稷之生也其母無灾其始匍匐也則岐岐然嶷嶷然文王之在母也母不憂旣生也􅀓不勤旣學也師不煩人之性果惡乎不憂上或无母字堯之朱舜之均文王之管蔡習非不善也而卒爲姦瞽叟之舜鯀之禹習非不惡也而卒爲聖人之性善惡果混乎聖下或有人字属上句故曰三子之言性也㪯其中而遺其上下者也得其一而失其二者也曰然則性之上下者其終不可移乎終上或无其字曰上之性就學而愈明下之性畏威而寡罪是故上者可教而下者可制也其品則孔子謂不移也教方作斈曰今之言性者異於此何也性下或有情字曰今之言者雜佛老而言也雜佛老而言也者奚言而不異言也者或无也字今按此篇之言過荀楊逺甚其言五性􅀹善但三品之􅀃太拘又不知性之本善而其所以或善或惡者由其禀氣之不同爲未尽耳原毀方作毁原􅀃已見上古之君子其責已也重以周其待人也輕以約重以周故不怠輕以約故人樂爲善聞古之人有舜者其爲人也仁義人也求其所以爲舜者責於巳曰彼人也予人也彼能是而我乃不能是早夜以思去其不如舜者就其如舜者古之人或无人字下同早或作蚤聞古之人有周公者其爲人也多才與藝人也求其所以爲周公者責於已曰彼人也予人也彼能是而我乃不能是方從閣本无求其所以字只作責於巳為周公者今按閣本不成文理而方從之誤矣早夜以思去其不如周公者就其如周公者去其下十三字方從阁本作求其所以為周公者而為之舜大聖人也後丗無及焉周公大聖人也後丗無及焉是人也乃曰不如舜不如周公吾之病也是不亦責於身者重以周乎身或作巳其於人也曰彼人也能有是是足爲良人矣能善是是足爲藝人矣善方作有非是取其一不責其二即其新不究其舊責或作取恐恐然惟懼其人之不得爲善之利一善易修也一藝易能也其於人也乃曰能有是是亦足矣曰能善是是亦足矣或无此八字非是不亦待於人者輕以約乎不上或有是字今之君子則不然方无則不然字其責人也詳其待巳也廉詳故人難於爲善廉故目取也少巳未有善曰我善是二亦足矣巳未有能曰我能是是亦足矣外以欺於人内以欺於心未少有得而止矣不亦待其身者已廉乎其身或作於巳其於人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也㪯其一不計其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責於人者巳詳乎夫是之謂不以衆人待其身而以聖人望於人吾未見其尊巳也是之或作如是方无之字雖然爲是者有本有原怠與忌之謂也原上或无有字怠者不能修而忌者畏人修吾常試之矣甞試語於衆曰某良士某良士其應者必其人之與也不然則其所踈逺不與同其利者也不然則其畏也不若是強者必怒於言懦者必怒於色矣又甞語於衆曰某非良士某非良士其不應者必其人之與也不然則其所踈逺不与同其利者也不然則其畏也不若是強者必􅀃於言懦者必􅀃於色矣不應下或无者字非是是故事修而謗興德高而毀來嗚呼士之處此丗而望名譽之光道德之行難巳將有作於上者得吾􅀃而存之其國家可幾而理歟此下或无丗字非是巳或作矣作或作仕或作化欤或作也原人或作仁形於上者謂之天形於下者謂之地命於其兩間者謂之人形於上日月星辰皆天也形於下草木山川皆地也命於其兩間夷狄禽獸皆人也曰然則吾謂禽獸人可乎曰非也人可上或有曰字指山而問焉曰山乎曰山可也山有草木禽獸皆㪯之矣指下或有􅀯字非是指山之一草而問焉曰山乎曰山則不可或无曰山乎三字故天道乱而日月星辰不得具行地道乱而草木山川不得其平人道乱而夷狄禽獸不得其情方无故字天者日月星辰之主也地者草木山川之主也人者夷狄禽獸之主也主而􅁀之不得其爲主之道矣是故聖人一視而同仁篤近而㪯逺仁或作人非是原􅀑有嘨於梁從而燭之無見也斯􅀑乎曰非也􅀑無聲有立於堂從而視之無見也斯􅀑乎曰非也􅀑無形有觸吾躬從而執之無得也斯􅀑乎曰非也􅀑無声與形安有氣􅀑无声与形上或有􅀑无氣三字非是曰􅀑無聲也無形也無氣也果無􅀑乎曰有形而無聲者物有之矣土石是也有声而無形者物有之矣風霆是也有聲與形者物有之矣人獸是也無声與形者物有之矣􅀑神是也曰然則有怪而與民物接者何也曰是有二有􅀑有物有怪或作見怪二下或有􅀃字或有􅀃字而无有􅀑有物四字漠然無形與聲者􅀑之常也民有忤於天有違於民有爽於物逆於倫而感於氣上民字或作人下民字或作時於是乎􅀑有形於形有慿於聲以應之而下殃禍焉皆民之爲之也其旣也又反乎其常有不或作有之為下或无之字曰何謂物曰成於形與声者土石風霆人獸是也反乎無聲與形者􅀑神是也不能有形與聲不能無形與聲者物怪是也反乎或作反其非是或无不能有形与声六字或无不能无形与声六字故其作而接於民也無􅁪故有動於民而爲禍亦有動於民而爲福本或先言為福亦有動於民而莫之爲禍福適丁民之有是時也作原􅀑方從閣蜀无作字命按古書萹題多喜後者如荀字諸賦正此􅀋也但此萹前巳有題不􅀿復出故且從諸本有作字行難或問行孰難曰捨我之矜從尓之稱孰能之曰陸先生參何如曰先生之賢聞天下是是而非非聞下或有於字貞元中自越州徴拜祠部貟外郎京師之人日造焉閉門而拒之滿街愈甞往閒客席甞或作常閒或作問客或作賢席下或有坐定二字先生矜語其客曰某胥也某商也其生某任之其死某誄音孫曰某任之謂所㪯所任之人也任保任也誄累也人生有德行死而後累引其行其爲誄今之行狀是也之某與某可人也可或作何方從問謂􅁐作可云可人見礼記鄭住曰丗人可也今按方昭是也然詩下文韓公之語似以陸公雖套任誄此人復自任於有罪則頗有擇其門地之意而以詹引之力自多者恐後作何字語势乃可更詳之任與誄也非罪歛皆曰然也或有之罪一作過曰上或有應字愈曰某之胥某之商其得任與誄也有由乎抑有罪不足任而誄之邪任而誄方作計而任而或作与先生曰否吾惡其􅀄不然任與誄也何􅀹愈曰苟如是先生之言過矣昔者􅃹敬子取盗二人爲大夫於公趙文子斈􅃹庫之士七十有餘家夫惡求其􅀄先生曰不然彼之取者賢也愈曰先生之所謂賢者大賢欤抑賢於人之賢欤齊也􅀳也且有二與七十而可謂今之天下無其人邪而可上或有焉字邪上或有也字先生之選人也已詳先生曰然愈曰聖人不丗出賢人不時出千百􅀊之間倘有焉不幸而有出於胥商之族者先生之􅀃傳吾不忍赤子之不得乳於其母也先生曰然聖人貴人人方皆作之或并有人之二字出出或作丗生百􅍲或作百年乳於或作於字他日又往坐焉或无坐字先生曰今之用人也不詳位乎朝者吾取某與某而巳在下者多干朝凡吾與者若千人愈曰先生之與者盡於此乎其皆賢乎抑猶有㪯其多而缺其少乎方无其皆賢乎四字秋或作没少或作細或作一少下方有者字令按此言人之才或不全備維斈其可取之多而略其可弃之少也先生曰固然吾敢求其全其方作於今按作其語意為近但陸公此句正不敢必求全才之意而下文韓公又以太詳而不早㑹之殊不可曉當更考之愈曰由宰相至百執事凡幾位由一方至一州凡幾位先生之得者無乃不足充其位邪其位下或有也字不早圖之一朝而㪯焉令雖詳其後用也必粗㪯焉或作索之詳下或有且微字罪是先生曰然子之言孟軻不如文錄作退語其人曰乃今吾見孟軻亂莫上或无人字乱或作禍禹之後四百年然後得桀亦四百年然後得湯與伊尹湯與伊尹不可待而傳也持或作得與其傳不得聖人而爭且亂孰若傳諸子雖不得賢猶可守法諸或作之字住方從閣作法守非是曰孟子之所謂天與賢則與賢天與子則與子者何也曰孟子之心以爲聖人不苟私於其子以害天下求其􅀃而不得從而爲之辭雜􅀃四首或作三首其一作題崔山君傳龍嘘氣成雲雲固弗靈於龍也虚上或有之字然龍乘是氣茫洋窮乎玄閒薄日月伏光景感震電神変化水下土汩陵谷雲亦靈怪矣哉氣下或有而字雲龍之所能使爲靈也靈方從閣本作雲非是若龍之靈則非雲之所能使爲靈也然龍弗得雲無以神其靈矣失其所慿依信不可欤弗或作不方无信字非是異哉其所慿依乃其所自爲也易曰雲從龍旣曰龍雲從之矣善醫者不視人之􅇤肥察其脉之病否而已矣醫下或有人字善計天下者不視天下之安危察其紀綱之理亂而巳矣綱下方无之字理乱或作乱否天下者人也安危者肥􅇤也紀綱者脉也脉不病雖􅇤不害脉病而肥者死矣通於此􅀃者其知所以爲天下乎紀綱或作綱织所以閣无以字夏殷周之衰也諸侯作而􅀾伐日行矣傳数十王而天下不傾者紀綱存焉耳作或作僣秦之王天下也無分􅀔於諸侯聚兵而焚之傳二丗而天下傾者紀綱亡焉耳丗方作帝是故四支雖無故不足恃也脉而巳矣四海雖無事不足矜也紀綱而巳矣四海或作天不憂其所可恃懼其所可矜善醫善計者謂之天扶與之諸本或无天字扶或作持仐按此句未詳疑有誤字易曰視履考样善醫善計者爲之善計方无善字談生之爲崔山君傳稱鶴言者豈不怪哉之或作云而无為字非是然吾􅀚於人其能盡吾性而不􅀋於禽獸異物者希矣將憤丗嫉邪長往而不來者之所爲乎昔之聖者其首有若牛者其形有若蛇者其喙有若鳥者其貌有若􅂪倛音期祝云荀子曰仲尼之狀面如􅂪倛注云方相也其首豪茸然故曰蒙倛韓侍􅀰云四目為方相两目為蒙倛韓侍郎正謂公也按楊倞注荀子時為大理評事公為刑部侍郎此語豈親授於公耶者彼皆貌似而心不同焉可謂之非人邪聖者或作聖人或并有人者二字鳥閣作馬方云尸子禹長頸烏喙閣本訛也即有平脅曼膚祝曰楚詞平脅曼膚何以肥之汪謂紂也顔如渥丹美而狼者樊曰左氏傳宋公子佐惡而婉太子座美而良貌則人其心則禽獸又惡可謂之人邪皃或作面皃上或有其字由下方无獸字邪或作也方云列子包羲女牛尾虎鼻皆有非人之􅃺而有大酬神農夏后氏蛇身人面人之德夏桀殷紂魯如楚穆􅃺皃七敎皆同而有禽獸之心公意亦如此耳然則􅀚貌之是非不若論其心與其行事之可否爲不失也方從閣杭无可否字非是怪神之事孔子之徒不言余將特取其憤丗嫉邪而作之故題之云爾丗有伯樂然後有千里馬千里馬常有而伯樂不常有或无下千里字故雖有名馬祗辱於奴􅀠人之手駢死於槽􅇫之閒不以千里稱也或无人字馬之千里者一食或盡粟一石食馬者不知其能千里而食也是馬也雖有千里之能食不飽力不足才美不外見且欲與常馬等不可得安求其能千里也食馬上或有今之字而食下疑脫一石字馬也方无也字且欲或无且字且或作而今按且字恐當在等字下䇿之不以其道食之不能盡其材鳴之而不能通其意執䇿而臨之曰天下無馬嗚呼其眞無馬邪其眞不知馬也二无字下諸本皆有良字閣杭本皆脫其眞无馬邪五字知或作識而无也字讀荀下或有子字始吾讀孟軻書然後知孔子之道尊聖人之道易行王易王霸易霸也以爲孔子之徒没尊聖人者孟氏而巳晚得􅀭雄書益尊信孟氏因雄書而孟氏益尊則雄者亦聖人之徒歟雄下或有也字聖人之道不傳于丗周之衰好事者各以其􅀃于時君紛紛籍籍相乱六經與百家之􅀃錯雜其下或有所能字然老師大儒猶在火于秦黄老于漢或无黄字其存而醇者孟軻氏而止耳􅀭雄氏而止耳或作矣一无􅀭雄氏而止耳一句及得荀氏書於是又知有荀氏者也考其辝時若不粹要其歸與孔子異者鮮矣抑猶在軻雄之閒乎時下或有有字不下或有醇字抑下或有其字孔子刪詩書筆削春秋合於道者著之離於道者黜去之故詩書春秋無疵或无黜字去下或无之字余欲削荀氏之不合者附于聖人之籍亦孔子之志歟孟氏醇乎醇者也荀與􅀭大醇而小庛方從閤无乎醇字或无乎醇者三字而有如字皆非是􅀭方作雄非是讀鶡冠子鶡音􅂚楚人居深山以鶡鳥羽爲冠曰鶡冠子班固曰道家者流冠子十有九篇其詞雜黄老刑名九方作六云今鶡冠子自博選至武靈王問凡十九篇此只云十六篇未詳今按方盖不見或本巳作九也或无雜字非是其􅀶選篇四稽五至之􅀃當矣使其人遇時援其道而施於國家功德豈少哉至或作至遇下或有其字功上或有其字學問篇稱賤生於無所用中流失船一壷尓雅壺􅉚也囯語云苦􅉚不才共濟而巳注云佩􅉚可以渡水千金者余三讀其辭而悲之文字脫謬爲之正三十有五字乙者三㓕者二十有二注十有二字云壺或作􅉚音義同滅方作成注下或有者字讀儀禮余嘗苦儀禮難讀又其行于今者盖寡㳂襲不同復之無由考于今誠無所用之其方作且用之或作用云然文王周公之法制粗在於是孔子曰吾從周謂其文章之盛也古書之存者希矣百氏雜家尚有可取况聖人之制度邪存上方无之字家或作􅀃尚下方无有字於是掇其大要竒辭奥旨著于篇學者可􅀚焉方无斈字惜乎吾不及其時進退揖讓于其閒嗚呼盛哉讀墨子孫曰墨子名翟宋大夫漢藝文志云著書七十二篇云云樊曰丗之斈者因臨川王氏詩孔墨必相用自古寕有此之語意謂孟子排楊墨公排釋老旣自比孟子不當有相用之􅀃然必知孟子帰斯受之意然後識讀墨之旨補注或問伊川先生曰退之讀墨篇如何曰此篇意亦甚好但言不謹嚴便有不是処至若言孔子尚同兼愛与墨子同則甚不可也儒譏墨以上同兼愛上賢明􅀑上或皆作尚方从閤本云考墨子本書及漢藝文志當作上而孔子畏大人居是􅀖不非其大夫春秋譏專臣不上同哉孔子泛愛親仁以博施濟衆爲聖不兼愛哉孔子賢賢以四科進襃弟子疾殁丗而名不稱不上賢哉孔子􅀕如在譏􅀕如不􅀕者曰我􅀕則受福不明􅀑哉儒墨同是堯舜同非桀紂同修身正心以治天下國家奚不相恱如是哉余以爲辯生於末學各務售其師之􅀃非二師之道本然也孔子必用墨子墨子必用孔子不相用不足爲孔墨朱文公校昌黎先生文集卷之十一
