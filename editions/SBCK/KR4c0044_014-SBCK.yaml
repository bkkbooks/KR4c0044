body:
  text: 雜著鄆州谿堂詩并序此篇方多从石本憲宗之十四年始定東平三分其地孫曰謂析李師道所據十三州為三鎮馬㧾鄆曹濮等州觀察使薛平青州刺史王遂沂州刺史以華州刺史禮部尚書兼御史大夫扶風馬公爲鄆音運秦為薛郡地漢為東平囯曹濮音卜古昆吾之墟節度􅀚察等使鎮其地公下或有㧾字旣一年褒其軍號曰天平軍上即位之二年召公入且將用之以其人之安公也復歸之鎮安下或有於字此句或作以彼之人安於公也上之三年公爲政於鄆曹濮也適四年矣治成制定衆志大固惡絶於心仁形於色竱心一力以供國家之職竱心一力或作竭心力竱或作竭一或作戮方云竱旨兖切專也囯語竱本肇末于時沂宻始分而殘其師方云沂帥王遂也洪日謂十四年沂海將王弁殺其􅀚察使王遂自称留後其後幽鎮魏不恱於政相扇継變謂長􅂟元年幽州盧龍軍都知兵馬使朱克融囚其節度使張洪靖以反成德軍大將王廷湊殺其節度田弘正以反二年魏博節度使田布自殺兵馬使史憲誠自称留後復歸於舊於政或作于政方云謂張弘靖􅀍囚田弘正史憲誠皆為下所殺徐亦乗􅀔逐帥自置同於三方置或作署或置上有署字方云此謂崔羣為王智㒷所逐也惟鄆也截然中居四鄰望之􅀂防之制水恃以無恐閤杭蜀及諸本皆有四鄰望之一句方从石本刪去今按文势及當時亊實皆當有此句􅀂其无之則下文所謂恃以无恐者為誰恃之邪大凡為人作文而身或在逺无由親視摹刻旣有脫誤又以毀之重勞遂不能改􅀂此者盖親見之亦非獨古為然也方氏最信閤杭蜀本雖有謬誤往往曲从今此三本幸皆不誤而反為石本脫句所奪甚可􅀏也然而皆曰鄆爲虜巢且六十年將彊卒武曹濮於鄆州大而近方云曹濮於鄆自爲一句或作於曹濮州非是軍所根柢皆驕以易怨而公承死亡之後掇拾之餘剥膚椎髓公私掃地赤立新舊不相保持萬目睽睽持或作恃公於此時能安以治之其功爲大􅀂幽鎮魏徐之亂不扇而變此功反小何也公之始至衆未孰化以武則忿以憾以恩則横而肆或无以憾二字或作而撼一以爲赤子一以爲龍蛇憊蒲拜切病也心罷音疲精磨以􅀊月然後致之難也及教之行衆皆戴公爲親父母夫叛父母從􅄷讎非人之情故曰易下或有也字於是天子以公爲尚書右僕射封扶風縣開國伯以褒嘉之或无公及封字縣或作郡公亦樂衆之和知人之恱而侈上之賜也於是爲堂於是居之西北隅號曰谿堂以饗士大夫通上下之志旣饗其從事陳曽謂其衆言公之畜此􅀖其勤不亦至乎此􅀖之人纍力隹切繫也􅀃文綴得理也公之化惟所令之不亦順乎上勤下順遂濟登兹不亦休乎昔者人謂斯何今者人謂斯何雖然斯堂之作意其有謂而喑無詩歌是不考引公德而接􅀖人於道也德下或无而字乃使來請其詩曰帝奠九壥与㕓同有葉有年有荒不條河岱之閒不或作有及我憲考一收正之收或作牧視􅀖選侯以公來尸公來尸之人始未信公不飲食以訓以徇孰饑無食孰呻孰歎孰􅁈不問不得分願孰爲􅀖蟊亡侯切螣也節根之􅑺蟊或作蛑音義同羊狠狼貪以口覆城吹之喣之摩手拊之箴之石之膊音粕而磔陟格切􅀃文薄脯􅈩之屋上左氏成二年傳龍人囚靈蒲就魁殺而膊諸城上磔閃也張也箴或作針之凡公四封旣富以疆謂公吾父孰違公令可以師征不寜守􅀖師方从石本作帥今按平淮西碑云屡㒷師征作師為是石本或誤未可知也公作谿堂播播流水淺有蒲蓮深有蒹葦公以賔燕其鼔駭駭方云此詩十一章以令叶強以駭叶水皆古音也令有平声一讀公獨􅀌郁墓志亦見淮􅀯子勿驚勿駭方物將自理勿撓勿櫻万物將自清駭古音自与理叶也周官注疾雷擊鼓日駭西京賦所謂駭雷鼓是也今按古音之􅀃甚善呉才老􅀘音􅀘韻二書其􅀃甚詳駭水叶韻如􅃹子宫如牛鳴盎中徴如􅀒豕斍而駭亦一證也沙隨程可乆曰呉􅀃虽多其例不過四声互用切響通用二條而巳此􅀃得之如通其􅀃則古書虽不尽見今可以例推也公燕谿堂賔校醉飽流有跳魚岸有集鳥旣歌以舞其鼔考考公在谿堂公御琴瑟公曁賔賛稽經諏律稽考也􅓪訪也施詩智切用不差人用不屈谿有薲􅋎上音苹下音􅀌孫日􅀃文薲苹也􅋎凋胡也周礼魚宜􅋎有􅀛有魚公在中流右詩左書無我斁徒故切又音亦遺於子孫二失字下或並有之字今夫功德如是祥祉如是其善持之也可知巳旣巳或無此二字因叙之爲貓相乳􅀃云下或有爾字非是進士䇿問十三首問書稱汝則有大疑謀及乃心謀及卿士以至于庻人􅀛筮考其從違以審吉凶則是聖人之舉事興爲無不與人共之者也吉凶方从蜀本作凶吉今按經傳凡言吉凶者多先吉而後凶惟協韻諧声則或倒用而近丗好竒之士不問可否一例倒用則失之矣此􅀋當徐讀而从其声之諧者不能悉論也於易則又曰君不宻則失臣臣不宻則失身幾事不宻則害成而春秋亦有譏漏言之詞如是則又似不與人共之而獨運者下或有也字書與易春秋經也聖人於是乎盡其心焉耳矣其文相戾悖如此欲人之無疑不可得巳是二􅀃者其信有是非乎抑所指各殊而學者不之能察也諒非深考古訓讀聖人之書者其何能辨之方作也此固吾子之所宜無讓君願承救焉誰下或无者字者下方有也字問古之人有云夏之政尚忠殷之政尚敬而周之政尚文是三者相循環終始􅀂五行之與四時焉原其所以爲心皆非故立殊而求異也各適於時救其弊而巳矣夏殷之書存者可見矣夏殷下或無之字非是至周之典籍咸在考其文章其所尚􅀂不相逺然焉所謂二者之異云乎逺下方無然字焉或作烏今按當有然字而焉字属下句但其下疑當有一有字作烏亦通其下疑或有一睹字抑其道深微不可究欤將其詞􅀮而難知也不然則是􅀃爲謬矣周之後秦漢蜀呉魏晉之興與霸亦有尚乎無也或無㒷与字􅀚其所爲其亦有意云爾循環之􅀃安在吾子其爲所􅀮焉問夫子之序帝王之書而繫以秦魯及次列國之風而宋魯獨稱頌焉秦穆之德不踰於二霸穆或作鲁非是宋魯之君不賢乎齊晉其位等其德同升黜取捨如是之相逺亦將有由乎願聞所以辨之之􅀃問夫子旣没聖人之道不明盖有楊墨者始侵而乱之其時天下咸化而從焉孟子辝而闢之則旣廓如也或無其時字或無則字今其書尚有存者其道可推而知不可乎或無知字非是其所守者何事其不合於道者幾何孟子之所以辭而闢之者何􅀃之者或作之也今之學者有學於彼者乎有近於彼者乎其巳無傳乎其無乃化而不自知乎其無傳也則善矣如其尚在將何以救之乎尚在方从閣杭􅁐作在尚无將字今按􅀂乆方本則尚何以救之乎乃是恐不及救之意与比上下文不相入其􅀃非是諸生學聖人之道必有能言是者其無所爲讓問所貴乎道者不以其便於人而得於巳乎當周之衰管夷吾以其君霸九合諸侯一匡天下戎狄以微京師以尊四海之内無不受其賜者天下諸侯奔走其政令之不暇而誰與爲敵此豈非便於人而得於已乎人下方无而字巳作身今據上文及詳語􅀔方􅀃非是秦用商君之法人以富國以彊諸侯不敢抗及七君而天下爲秦使天下爲秦者商君也而後代之稱道者咸羞言管商氏何哉庸非求其名而不責其實歟願與諸生論之無惑於舊􅀃名下或无而字其实或作於实舊或作記非是句下或有焉字問夫子之言盍各言爾志盍上或有曰字又曰居則曰不吾知也如或知爾則何以哉今之舉者不本於郷不序於庠一朝而羣至乎有司有司之不之知也宜矣不之或无之字今將自州縣始請各誦所懷聊以􅀚諸生之志死者可作其誰與歸此下或有又曰居是􅀖也六字事其大夫之賢者友其士之仁者敢問諸生之所事而友者爲誰乎而或作所爲或作其所謂賢而仁者其事如何哉言及之而不言亦君子之所不爲也方无之所二字問春秋之時百有餘國皆有大夫士詳於傳者無國無賢人焉其餘皆足以充其位不聞有無其人而闕其官者聞下或無有字春秋之後其書􅀹詳以至于呉蜀魏下及晉氏之亂國分如錙側時切銖市朱切讀其書亦皆有人焉魏字或在晉下謂元魏尓盖不然也三囯之魏豈應畧而不言乎今天下九州四海其爲土地大矣國家之舉士内有明經進士外有方維大臣之薦其餘以門地勲力進者又有倍於是其爲門户多矣有倍或作加倍而自御史䑓尚書省以至于中書門下省咸不足其官豈今之人不及於古之人邪何求而不得也夫子之言曰十室之邑必有忠信如丘者焉誠得忠信如聖人者而委之以大臣宰相之事有不可乎委之以方作以委之非是况於百執事之微者哉古之十室必有任宰相大臣者今之天下而不足士大夫於朝其亦有􅀃乎問夫子曰潔浄精微易教也今習其書不識四者之所謂盍舉其義而陳其數焉問易之􅀃曰乾健也易上或有周字􅀃下或有者字今考乾之爻在􅀄者曰潜龍勿用在三者曰夕􅅥􅀂厲无咎在四者亦曰无咎在上曰有悔卦六位一勿用二苟得无咎一有悔安在其爲健乎二或作一非是又曰乾以易知坤以簡能乾之四位旣不爲易矣坤之爻又曰龍戰于野戰之於事其足爲簡乎野下或有其而玄黄四字易六經也學者之所宜用心願施其詞陳其義焉或无所字非是問人之仰魚向切恃也而生者榖帛榖帛豊無飢寒之患然後可以行之於仁義之途措之於安平之地此愚智所同識也者下或有在字豊上或有旣字今天下榖愈多而帛愈賤人愈困者何也愈賤方作益賤而字疑當在賤字下但此正与張中丞􅀓後城壞而其徒皆死云云者相􅀋恐公自有此一種句法也耕者不多而榖有餘􅁞者不多而帛有餘有餘宜足而反不足此其故又何也將以救之其􅀃如何問夫子言堯舜垂衣裳而天下理又曰無爲而理者其舜也歟書之􅀃堯曰親九族又曰乎章百姓又曰恊和萬􅀖又曰曆象日月星辰敬授人時又曰洪水懷山襄陵下人其咨人或作民此試進士當避諱作民者非是夫親九族平百姓和萬􅀖則天道授人時愁水禍非無事也而其言曰垂衣裳而天下理者何也於舜則曰慎五典又曰叙百揆又曰賔四門又曰齊七政又曰􅀋上帝禋六宗望山川徧羣神又曰恊時月正日同律度量衡五載一廵狩又曰分十二州封山濬川恤五刑典三禮彰施五色岀納五言封諸本作隨非是嗚呼其何勤且煩如是而其言曰無爲而理者何也將亦有深辭􅀮義不可曉邪抑其年代巳逺失其傳邪二三子其辨焉抑其下或有所字非是巳逺或作逺矣方无巳字問古之學者必有師所以通其業成就其道德者也德下或无者字由漢氏巳來師道日微氏或作代方无巳字然猶時有授經傳業者及于今則無聞矣德行􅀂顔囬言語􅀂子貢政事􅀂子路文學􅀂子游猶且有師非獨如此雖孔子亦有師問禮於老􅆅問樂於萇弘是也方无雖字今之人不及孔子顔回逺矣而且無師无下或有所字然其不聞有業不通而道德不成者何也或無而字問食粟衣於旣切下同帛服仁行義以竢死者二帝三王之所守聖人未之有改焉者也今之􅀃者有神仙不死之道不食粟不衣帛薄仁義以爲不足爲是誠何道邪聖人之於人猶父母之於子二於字或皆作于有其道而不以教之不仁其道雖有而未之知不智仁與智且不能又烏足爲聖人乎烏或作焉不然則􅀃神仙者妄矣爭臣論爭或作諌方云曰本及歐公与范司諌書温公通鑑皆作爭或問諌議大夫陽城於愈可以爲有道之士乎哉學廣而聞多不求聞於人也行古人之道居於晉之鄙晉之鄙人薫其德而善良者幾千人大臣聞而薦之天子以爲諌議大夫子下或无以字人皆以爲華陽子不色喜或无人字及色字皆非是居於位五年矣視其德如在野彼豈以富貴移易其心哉在下或有草字移易方作易移愈應之曰是易所謂􅁪其德貞而夫子凶者也惡音烏得爲有道之士乎哉在易蠱之上九云不事王侯髙尚其事蹇之六二則曰王臣蹇蹇匪躬之故夫不以所居之時不一而所蹈之德不同也之時之德方並无之字􅀂蠱之上九居無用之地而致匪躬之節以蹇之六二在王臣之位而髙不事之心則冒進之患生曠官之刺興志不可則而􅀹不終無也蹇上或有以字亊下或有上字􅀹下或有之字終或作絶或作始皆非是今陽子在位不爲不乆矣聞天下之得失不爲不熟矣天子待之不爲不加矣而未嘗一言及於政今陽子下或有實一匹夫四字或作實一介之夫下再出陽子二字或作實匹夫陽子亦再見及下方无於字視政之得失􅀂越人視秦人之肥瘠音籍忽焉不加喜戚於其心問其官則曰諌議也問其禄則曰下大夫之秩也問其政則曰我不知也有道之士固如是乎哉夫下方元之字且吾聞之有官守者不得其職則去有言責者不得其言則去今陽子以爲得其言言乎哉得其言而不言與不得其言而不去無一可者也乎上或无復出言字按此語正謂陽子􅀂自謂得其言則何不言乎哉或本非是陽子將爲禄仕乎古之人有云仕不爲貧而有時乎爲貧謂禄仕者也宜乎辭尊而居卑辭富而居貧􅀂抱􅀜擊柝者可也蓋孔子嘗爲委於爲切吏矣嘗爲乗田矣亦不敢曠其職必曰㑹計當而巳矣必曰牛羊遂而巳矣􅀂陽子之秩禄不爲卑且貧章章明矣而如此其可乎哉秩禄或作禄秩或曰否非􅀂此也夫陽子惡訕上者惡爲人臣招音翹其君之過而以爲名者故雖諌且議使人不得而知焉方云舊本招下注音翹二字武子好尽言以招人過見囯語漢書五行志蘇林讀招爲翹招㪯也朱元憲曰考它書未􅀗爲翹之意作音者當有所據今按吕氏春秋孔子之勁能招囯門之関注招㪯也又過秦論招八州而朝同列蘇林亦音翹書曰爾有嘉謨嘉猷則入告尓后于内尓乃順之于外曰斯謨斯猷惟我后之德夫陽子之用心亦􅀂此者愈應之曰􅀂陽子之用心如此滋所謂惑者矣滋或作兹非是入則諌其君出則使人知者大臣宰相者之事非陽子之所宜行也夫陽子本以布衣􅀮於蓬蒿之下方无本以字主上嘉其行誼擢在此位官以諌爲名誠宜有以奉其職使四方後代知朝廷有直言骨鯁之臣天子有不􅆫賞從諌如流之美庻岩穴之士聞而慕之束帶結髪願進於闕下而伸其辭􅀃致吾君於堯舜熈鴻號於無窮也􅀂書所謂則大臣宰相之事非陽子之所宜行也且陽子之心將使君人者惡聞其過乎是啓之也是啓或作其咎非是或曰陽子之不求聞而人聞之不求用而君用之不得巳而起守其道而不變何子過之深也愈曰自古聖人賢士皆非有求於聞用也有下或有心字閔其時之不平人之不乂得其道不敢蜀善其身而必以兼濟天下也必方作不孜孜矻矻音窟死而後巳故禹過家門不入孔席不暇暖而墨突不得黔門下或有而字彼二聖一賢者豈不知自安佚之爲樂哉誠畏天命而悲人窮也夫天授人以賢聖才能豈使自有餘而巳誠欲以􅀘其不足者也􅀘上方本有自字者下無也字云自者指言天之所授也義為長今按韓公之意乃言天生聖賢非但使之自有餘也乃欲以􅀘衆人之不足耳故下文云云方􅀃非是耳目之於身也耳司聞而目司見聽其是非視其險易然後身得安焉聖賢者時人之耳目也時人者聖賢之身也目下或无也字且陽子之不賢則將役於賢以奉其上矣􅀂果賢則固畏天命而閔人窮也惡音烏得以自暇逸乎哉則將或作且􅀅於賢或作於身皆非是或曰吾聞君子不欲加諸人而惡訐以爲直者或无欲字􅀂吾子之論直則直矣無乃傷于德而費於辭乎好尽言以招音翹人過國武子之所以見殺於齊也吾子其亦聞乎愈曰君子居其位則思死其官未得位則思修其辭以明其道我將以明道也非以爲直而加人也且國武子不能得善人而好盡言於亂國是以見殺而好尽言於乱囯方本作而言尽言尽言於乱國今按方本殊无文理傳曰惟善人能受盡言謂其聞而能改之也子告我曰陽子可以爲有道之士也今雖不能及巳陽子將不得爲善人乎哉或无哉字改葬服議經曰改葬緦春秋榖梁傳亦曰改葬之禮緦㪯下􅃡也此皆謂子之於父母其他則皆無服何以識其必然經次五等之服小功之下然後著改葬之制更無輕重之差以此知惟記其最親者其他無服則不記也􅀂主人當服斬衰其餘親各服其服則經亦言之不當惟云緦也云一作言傳称舉下􅃡者􅃡猶逺也下謂服之最輕者也以其逺故其服輕也最䡖下或无者也字女下或无其字江熈曰禮天子諸侯易服而葬以爲交於神明者不可以純凶况其􅃡者乎或无其字是故改葬之禮其服惟輕以此而言則亦明矣衛司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦旣葬而除之不忍無服送至親也非父母無服無服則弔服而加麻此又其著者也文子又曰䘮服旣除然後乃葬則其服何服乃葬下或有者字或有也字子思曰三年之䘮未葬服不變除何有焉未下或有除字非是然則改葬與未葬者有異矣古者諸侯五月而葬大夫三月而葬士逾月無故未有過時而不葬者也過時而不葬謂之不能葬春秋譏之下而不葬或无而字􅀂有故而未葬雖出三年子之服不變此孝子之所以著其情先王之所以必其時之道也雖有其文未有著其人者以是知其至少也方无是字改葬者爲山崩水涌毀其墓及葬而禮不備者􅀂文王之葬王季以水齧其墓魯隱公之葬惠公以有宋師太子少葬故有闕之􅀋是也諸本无故字方从舊監本云考之左氏當有䘮事有進而無退有易以輕服無加以重服殯於堂則謂之殯瘞於野則謂之葬近代巳來事與古異或游或仕在千里之外或子㓜妻稚而不能自還稚下方无而字甚者拘以隂陽畏忌遂葬於其土及其返葬也逺者或至數十年近者亦出三年其吉服而從於事也乆矣又安可取未葬不變服之例而反爲之重服歟在䘮當葬猶宜易以輕服况旣逺而反純凶以葬乎􅀂果重服是所謂未可除而除不當重而更重也而除下或有之字更下或无重字非是或曰䘮與其易也寜戚雖重服不亦可也曰不然易之與戚則易固不如戚矣雖然未􅀂合禮之爲㦤也儉之與奢則儉固愈於奢矣雖然未􅀂合禮之爲懿也過猶不及其此􅀋之謂乎或曰經称改葬緦而不著其月數則似三月而後除也子思之對文子則曰旣葬而除之今宜如何似或作以非是曰自啓至于旣葬而三月則除之未三月則服以終三月也啓下或有賔字至下或无旣字今按礼有自啓至于反哭之語方本是也曰妻爲夫何如曰如子或无日如二字非是無弔服而加麻則何如曰今之弔服猶古之弔服也省試學生代齋郎議諸本此下有貞元十年應博斈宏詞九字齋郎職奉宗廟社稷之小事盖士之賤者也執豆籩駿奔走以役于其官之長不以德進不以言􅀭盖取其人力以備其事而巳矣奉宗廟社稷之小事執豆籩駿奔走亦不可以不敬也於是選大夫士之子弟未爵命者以塞貟塡関而教之行事子上或无之字其勤雖小其使之不可以不報也必書其歳歳旣乆矣於是乎命之以官而授之以事其亦微矣哉學生或以通經㪯或以能文稱其微者至於習法律知字書皆有以賛於教化可以使令於上者也自非天姿茂異曠日經乆以所進業發聞於郷閭称道于朋友薦於州府而升之司業則不可得而齒乎國學矣所進或作進所方本作進以進或作道然則奉宗廟社稷之小事任力之小者也賛於教化可以使令於上者德藝之大者也其亦不可移易明矣或无然字稷下或无之字今議者謂學生之無所事謂齋郎之幸而進不本其意因謂可以代任其事而罷之盖亦不得其埋矣亦或作以今夫齋郎之所事者力也學生之所事者德與藝也以德藝㪯之而以力役之是使君子而服小人之事且非國家崇儒􅂆學誘人爲善之道也此一􅀃不可者也抑又有大不可者焉宗廟社稷之事雖小不可以不專敬之至也古之道也今􅀂以學生兼其事及其歳時日月然後授其宗彜罍洗其周旋必不合度其進退必不得宜其思慮必不固其容貌必不莊此其無他其事不習而其志不專故也非近於不敬者歟又有大不可者其是之謂歟莊此下其字疑􅄛非上或有此字􅀂知此不可將令學生􅁪掌其事而隳壤其本業則是學生之教加少學生之道益貶而齋郎之實猶在齋郎之名苟無也知此戓作知其教或作教大凡制度之改政令之變利於其舊不什則不可爲巳又况不如其舊哉什或作然方云此商君傳所謂利不百不変法工不什不易器是也如下方有於字考之於古則非訓稽之於今則非利㝷其名而求其實則失其宜失或作去非是故曰議罷齋郎而以學生薦享亦不得其理矣文􅁐此篇前後有議曰謹議四字禘祫議方校作祫禘今按篇内皆作禘祫方誤也右今月十六日勑㫖宜令百僚議限五日内聞奏者將仕郎守國子監四門􅀶士臣韓愈謹献議曰伏以陛下追孝祖宗肅敬祀事宗下方有廟字今按此等公家文字或施於君上或布之吏民只用當時体式直述事意乃易曉而通行非如詩篇等於戯劇銘記期於乆逺可以時岀竒怪而无所拘也故韓公之文虽日高古然於此等処亦未甞敢故為新巧以失莊敬平易之体但其間反覆曲折􅀃尽亊理便是真文章它人自不能及耳方本非是後皆倣此凡在擬議不敢自專在或作有擬方作疑聿求厥中延訪羣下然而禮文繁漫所執各殊自建中之􅀄迄至今歳屡經禘祫未合適從臣生遭聖明涵泳恩澤雖賤不及議而志切效忠切方作在今按官不及議而自言則作切為是今輒先㪯衆議之非然後申明其􅀃一曰献懿唐武德始立四廟宣簡公㦤王景皇帝元皇帝開元中乃詔宣皇帝為献祖元皇帝為懿祖廟主宜永藏之夾室臣以爲不可廟或作之夫祫者合也毀廟之主皆當合食於太祖献懿二祖即毀廟主也今雖藏於夾室至禘祫之時豈得不食於太廟乎名曰合􅀕而二祖不得􅀕焉不可謂之合矣􅀕焉方作登焉詳上下文作登非是二曰献懿廟主宜毀之瘞之臣又以爲不可諸本毀下或无之字或毀之下再有宜字今按上之字疑當作而謹按禮記天子立七廟一壇一墠音善其毀廟之主皆藏於祧廟雖百代不毀祫則陳於太廟而饗焉自魏晉巳降始有毀瘞之議事非經據竟不可施行今國家德厚流光創立九廟以周制推之献懿二祖猶在壇墠之位况於毀瘞而不禘祫乎三曰献懿廟主宜各迁於其陵所臣又以爲不可二祖之􅀕於京師列於太廟也二百年矣今一朝遷之豈惟人聽疑惑抑恐二祖之靈眷顧依遲不即饗於下國也遟諸本作違方从閣杭蜀􅁐云新史与文粹作依違以意改也甘泉賦徠祗郊陻神所依􅀆徘徊招揺靈屖迡􅀆屖音栖迡与遟同皆徐行也顔曰言神乆留安処不即去也四曰獻懿廟主宜附於興聖廟而不禘祫臣又以爲不可傳曰􅀕如在景皇帝雖太祖其於屬乃獻懿之子孫也虽下方有爲字其於方作於其今欲正其子東向之位廢其父之大􅀕固不可爲典矣父之或作父子父下或并有子之字皆非是五曰獻懿二祖宜别立廟於京師臣又以爲不可夫禮有所降情有所殺是故去廟爲祧去祧爲壇去壇爲墠去墠爲􅀑漸而之逺其􅀕益稀方无去璮去墠四字之逺作逺之今詳四字􅀕法本文之猶適也言漸而適逺也方本皆誤昔者魯立􅌆宫春秋非之以爲不當取巳毀之廟旣藏之主而復築宫以􅀕今之所議與此正同又雖違禮立廟至於禘祫也合食則禘無其所廢􅀕則於義不通此五􅀃者皆所不可其所方作所主義或作經或作礼今按此言􅀂作別廟則不當禘於太廟又不當禘於别廟故云禘无其所􅀂以无可禘祫之所而遂直廢其􅀕則於義又有不可通者故其􅀃如此方本誤也故臣􅀶采前聞求其折中以爲殷祖玄王周祖后稷太祖之上皆自爲帝又其代數巳逺不復􅀕之故太祖得正東向之位子孫從昭穆之列禮所称者蓋以紀一時之宜非傳於後代之法也盖以方作盖曰或无於字傳曰子雖齊聖不先父食蓋言子爲父屈也景皇帝雖太祖也其於獻懿則子孫也當禘祫之時獻祖宜居東向之位景皇帝宜從昭穆之列祖以孫尊孫以祖屈求之神道豈逺人情之神或作神之非是又常􅀕甚衆合􅀕甚寡則是太祖所屈之􅀕至少所伸之􅀕至多比於伸孫之尊廢祖之􅀕不亦順乎衆或作頻方云新書陳京傳亦作衆今按韓公本意献祖爲始祖其主當居􅀄室百丗不迁懿祖之主則當迁於太廟之西夾室而太祖以下以次列於諸室四時之享則唯懿祖不与而献祖太祖以下各􅀕於其室室自爲尊不相降厭所謂所伸之􅀕常多者也禘祫則唯献祖居東向之位而㦤祖太祖以下皆序昭穆南北相向於前所謂祖以孫尊孫以祖屈而所屈之􅀕常少者也韓公礼斈精深盖諸孺所不及故其所議獨深得夫孝子慈孫報本反始不忘其所由生之本意眞可爲万丗之通法不但可施於一時也程子以爲不可漫觀者其謂此􅀋也欤但其文字簡􅃊讀者或未遽曉故切推之以尽其意云事異殷周禮從而變非所失禮也所字疑􅄛臣伏以制禮作樂者天子之職也陛下以臣議有可采粗合天心断而行之是則爲禮議下方有爲字如以爲猶或可疑乞召臣對面陳得失庶有發明謹議省試顔子不貳過論論曰登孔氏之門者衆矣三千之徒四科之目孰非由聖人之道爲君子之儒者乎目方作夫由或作曰其於過行過言亦云鮮矣而夫子舉不貳過惟顔氏之子其何故哉請試論之夫聖人抱誠明之正性根中庸之正德苟發諸中形諸外者不惟思慮莫匪規矩不善之心無自入焉可擇之行無自加焉故惟聖人無過所謂過者非謂發於行彰於言人皆謂之過而後爲過也所上方有故字非是生于其心則爲過矣故顔子之過此􅀋也不貳者蓋能止之于始萌絶之於未形不貳之於言行也中庸曰自誠明謂之性自明誠謂之敎自誠明者不勉而中不思而得從容中道聖人也無過者也自明誠者擇善而固執之者也明誠者上或无自字不勉則不中不思則不得不貳過者也故夫子之言曰回之爲人也擇乎中庸得一善則拳拳服膺而不失之矣又曰顔氏之子其殆庻幾乎言猶未至也而孟子亦云顔子具聖人之體而微者皆謂不能無生于其心而亦不􅁀之於外考之於聖人之道差爲過耳亦不或无亦字顔子自惟其􅀂是也於是居陋巷以致其誠飲一瓢以求其志或无飲字不以富貴妨其道不以􅀮約易其心確乎不拔浩然自守知髙堅之可尚忘鑚仰之爲勞任重道逺竟莫之致是以夫子歎其不幸短命今也則亡謂其不能與已並立於至聖之域􅀚敎化之大行也不然夫行發於身加於人言發乎迩見乎逺或无不然字下或併无夫字苟不愼也敗辱隨之而後思欲不貳過其於聖人之道不亦逺乎而夫子尚肯謂之其殆庻幾孟子尚復謂之具體而微者哉則顔子之不貳過盡在是矣謹論方无謹論字與李祕書論小功不稅書秘書官称也或无書字而以秘爲人名及論作問又稅下无書字者皆非是刘敞原父之論曰曽子曰小功不稅則是逺兄弟終无服也而可乎韓子嘗吊於人見其貌戚其意哀而其服吉者問之曰何也曰小功不稅也是以葬子疑之而作小功不稅之書夫之子之疑是也彼人之爲非也然而小功不稅礼也韓子曰君子於其骨肉死則悲哀而爲之服者豈牽於外哉聞其死則悲哀豈有間於新故死哉甚矣韓子之逹於礼而近之也雖然疑之未尽也求之不得也夫爲服者至親之恩以朞断其殺至于大功兄弟之恩以小功止其殺至于緦外親之服以緦窮其殺至于􅃝􅊵聖人之制礼豈苟言情哉亦著於文而巳矣大功稅小功不稅其文至于是也兄弟之服不過小功外親之服不過緦其情至于是也因其情而爲之文親踈之殺見矣故礼大功以上不謂之兄弟兄弟有加而大功无加无加者親親也有加者報之也親親者稅不親親者不稅是亦其情也且礼專爲情乎亦爲文乎如專爲情也則至親不可以朞断小功不可以不稅如爲文也則至親之朞断小功之不稅一也夫曽子韓子隆於情而不及文失礼之指而疑其􅀃虽然韓子疑之是也彼人之爲非也何以言之邪小功虽不稅亦不吉服而巳矣記曰聞逺兄弟之䘮旣除䘮而后聞之則免祖哭之成踊夫􅀂是奚其吉哉故曰彼人之爲非也韓子疑之是也小功不稅礼也然則免􅃝成踊其巳矣乎猶有加焉曰我未之聞也虽然降而无服者麻不稅是亦降而无服巳哀之以其麻哭之以其情逾月然後巳其亦愈乎吉也曾子稱小功不稅則是逺兄弟終無服也而可乎鄭玄注云以情責情以情上諸本有是字方云鄭注无此語只云以巳恩怪之今之士人遂引此不追服小功不上或有而字小功服最多親則叔父之下殤與適音的孫之下殤與昆弟之下殤尊則外祖父母常服則從祖祖父母禮沿人情其不可不服也明矣功服或作功之服或无常字古之人行役不踰時各相與處一國其不追服雖不可猶至少人方作時又无相字非是然各字亦疑誤今之人男岀仕女出嫁或千里之外家貧訃告不及時則是不服小功者􅁪多而服小功者􅁪鮮矣君子之於骨肉死則悲哀而爲之服者豈牽於外哉豈下或有有字聞其死則悲哀豈有閒於新故死哉今特以訃告不及時聞死出其日數則不服其可乎愈常怪此近出弔人見其顔色慼慼􅀋有䘮者而其服則吉問之則云小功不稅者也慼慼或作慼容􅀋下或有於字䘮或作服稅下方无者字禮文殘缺師道不傳不識禮之所謂不稅果不遣服乎無乃别有所指而傳注者失其宗乎伏惟兄道德純明躬行古道如此之􅀋必經於心而有所决定不惜示及幸甚幸甚泥水馬弱不敢出不果鞠躬親問而以書悚息尤深弱作溺愈再拜太學生何蕃傳方本无太斈生字傳作書云此文緫於書􅀋當从舊本今按此當作傳而入書類未詳其􅀃但其之士必有待然後能有所立獨何蕃歟吾是以言之無亦使其無傳焉无下或无亦字答張籍書籍遺公書云古之胥敎誨㪯動言語无非相示以義非苟相䛕恱而已執事不以籍愚暗時称發其善教所不及施誠相与不間塞於他人之􅀃是近於古人之道也籍仐不復以義是執等而拒􅂬来者烏所謂承人以古人之道欤須承論於執事嘗以爲丗俗陵靡不及古昔盖聖人之道廢㢮之所爲也宣尼没後楊朱墨翟恢詭異􅀃于惑人聽孟軻作書而正之聖人之道復存于丗秦氏㓕斈漢重以黄老之術教人使人䆮惑楊雄作法言而辨之聖人之道猶明及漢衰末西域浮屠之法入于中囯中囯之人丗丗譯而廣之黄老之術相㳂而熾天下之言善者推二者而已矣昔者聖人以天下生生之道曠乃物其金木水火士榖薬之用以厚之因人資善乃明乎仁義之德以教之俾人有常故治生相存而不殊今天下資於生者咸備聖人之器用至於人倩則溺乎異斈而不由乎聖人之道使君臣父子夫婦朋友之義沉于丗而􅀖家継乱固仁人之所痛也自楊子雲作法言至今近千載莫有言聖人之道者言之者誰執事焉耳習俗者聞之多怪而不信徒相爲訾終无禆於教也執事聦明文章与孟軻揚雄相􅀂盍爲一書以㒷存聖人之道使時之人後之人知其去絶異斈之所爲乎􅂚可俯仰於俗􅅝囂爲多言之徒哉然􅁒㪯聖人之道者其身亦宜由之也比見執亊多尚駮雜无實之􅀃使人陳之於前以爲􅂬此有以累於令德又商論之際或不容人之短如任私尚勝者亦有所累也先王存六藝自有常矣有德者不爲猶以爲損况爲博塞之戯与人競財乎君子固不爲也今執亊爲之以廢棄時日竊實不識其然且執事言論文章不謬於古人今所爲或有不出於丗之守常者竊未爲得也願執亊絶􅀶塞之好棄无實之談弘廣以接天下士嗣孟軻楊雄之作辨楊墨老釋之􅀃使聖人之道復見於唐豈不尚哉籍誠知之以材識頑鈍不敢竊居作者之位所以咨於執亊而為之尓􅀂執事守章句之斈因循于時置不朽之盛衰与夫不知言亦无以異矣籍再拜愈始者望見吾子於人人之中固有異焉上人字或作衆仐按人人乃衆人之義此篇下文及後与孟東野書别本歐陽詹哀詞皆有之然不見於它書疑當時俗語也及聆其音聲接其辭氣則有願交之志因縁幸㑹遂得所圗豈惟吾子之不遺抑僕之所遇有時焉耳近者嘗有意吾子之闕焉無言意僕所以交之之道不至也意吾子下或再出吾子字非是言下方无意字今乃大得所圗脫然􅀂沈痾去體灑然􅀂執􅀬者之濯清風也然吾子所論排釋老不􅀂著書嚻嚻多言徒相爲訾􅀂僕之見則有異乎此也見上或有所字夫所謂著書者義止於辭耳宣之於口書之於簡何擇焉孟軻之書非軻自著軻旣殁其徒萬章公孫丑相與記軻所言焉耳或作者耳僕自得聖人之道而誦之排前二家有年矣不知者以僕爲好辯也然從而化者亦有矣聞而疑者又有倍焉頑然不入者親以言諭之不入則其􅀚吾書也固將無得矣爲此而止吾豈有愛於力乎哉无下或有所字得下或无矣字然有一􅀃化當丗莫􅀂口傳來丗莫􅀂書又懼吾力之未至也未至方作不能或至下更有至之不能四字三十而立四十而不惑吾於聖人旣過之猶懼不及矧今未至固有所未至耳請待五六十然後爲之冀其少過也吾子又譏吾與人人爲無實駮􅄂之􅀃此吾所以爲戯耳比之酒色不有間乎吾子譏之似同浴而譏祼䄇也与下或无復出人字􅀃見上䄇方作体􅀂商論不能下氣或似有之當更思而悔之耳博塞之譏敢不承敎其他俟相見薄晩須到公府言不能盡或无言字愈再拜重答張籍書籍遺公第二書云籍不以其愚輒進􅀃於執事執事以導進之分復賜還荅曲折敎之使昏塞者不失其明然猶有所見頋復於執事以畢其􅀃焉夫老釋惑乎生人乆矣誠以丗相㳂化而莫之知所以久惑乎尓執亊材識明曠可以任著書之事故有告焉今以爲言諭之不入則觀書亦无所得爲此而止未爲至也一処一位在一卿其不知聖人之道可以言諭之不入乃舎之猶有巳化者爲證也天下至廣民事至衆豈可資一人之口而親諭之者近而不入則􅃕之逺而有可諭者又豈可以家至而􅀃之乎故曰莫􅀂爲書爲書而知者則可以化乎天下矣可以傳於後丗矣􅀂以不入者而止爲書則爲聖人之道奚傳焉士之壮也或􅀙事於要劇或旅遊而不安宅或偶時之䘮乱皆不皇有所爲况有疾疚吉凶虞其間哉是以君子汲汲於所欲爲恐終无所􅂋於後􅀂皆待五六十而後有所爲則或有遺恨矣今執事虽參於戎府當四海弭兵之際􅄖游无事不以此時著書而曰俟後或有不及􅂚可追乎天之与人性度巳有器也不必老而後有成立者昔顔子之庻幾豈待五六十乎執亊目不覩聖人而究聖人之道材不譲於顔子矣今年巳踰之􅂚懼於年未至哉顔子不著書者以其从聖人之後聖人巳有定制故也􅀂顔子獨立於丗必有所云著也古之斈君臣父子之道必資於師師之賢者其徒数千人或數百人是以没則紀其師之􅀃以為書􅀂孟軻者是巳傳者猶以孟軻自論集其書不云没後其徒為之也後軻之丗發明其斈者楊雄之徒咸自作書今師友道䘮侵不及楊雄之丗不自論著以㒷聖人之道欲待孟軻之門人必不可冀矣君子發言㪯足不逺於理未嘗闻以駮雜无实之􅀃爲戯也執事毎見其􅀃亦拊抃呼􅀏是撓氣害性不得其正矣苟正之不得􅂚所不至焉或以爲中不失正將以苟恱於衆是戯人也是玩人也非示人以義之道也吾子不以愈無似意欲推而納諸聖賢之域而或作之拂其邪心増其所未髙謂愈之質有可以至於道者浚其源導其所歸漑其根將食其實此盛德者之所辭譲况於愈者哉德下或无者字抑其中有宜復者故不可遂巳昔者聖人之作春秋也旣深其文辭矣然猶不敢公傳道之口授弟子至於後丗然後甚書出焉其所以慮患之道微也或无然後二字今夫二氏之所宗而事之者下乃公卿輔相吾豈敢昌言排之哉乃或作及今按此言其下者猶是公卿輔相盖微詞以見上自天子亦宗事二氏之意擇其可語者誨之猶時與吾悖其聲嘵嘵馨公切􅀂遂成其書則見而怒之者必多矣必且以我爲狂爲惑其身之不能恤書於吾何有此句書於方作於書仍无吾字今按書於吾何有言無􅀘也方本誤夫子聖人也且曰自吾得子路而惡聲不入於耳其餘輔而相者周天下猶且絶糧於陳畏於匡毀於叔孫奔走於齊魯宋衛之郊其道雖尊其窮也亦甚矣窮方作躬甚作窮皆非是甚又或作至頼其徒相與守之卒有立於天下向使獨言之而獨書之其存也可冀乎今夫二氏行乎中土也蓋六百年有餘矣其植根固其流波漫非所以朝令而夕禁也自文王没武王周公成康相與守之禮樂皆在及乎夫子未乆也自夫子而及乎孟子未乆也自孟子而及乎􅀭雄亦未乆也下二及乎方並作至乎句下无也字然猶其勤􅀂此其困􅀂此而後能有所立吾其可易而爲之哉其爲也易則其傳也不逺故余所以不敢也然􅀚古人得其時行其道則無所爲書書者皆所爲不行乎今而行乎後丗者也書者上或有爲字或无丗字今吾之得吾志失吾志未可知竢五六十爲之未失也天不欲使兹人有知乎則吾之命不可期如使兹人有知乎非我其誰哉其行道其爲書其化今其傳後必有在矣吾子其何遽戚戚於吾所爲哉其何或作又何前書謂吾與人商論不能下氣􅀂好勝者然雖誠有之抑非好已勝也好已之道勝也非好已之道勝也已之道乃夫子孟軻楊雄所傳之道也論上或无商字方云考張藉本書实有􅀂好下或有巳字或无然字或无非好已之道勝也一語雄下方无所傳也三字皆非是􅀂不勝則無以爲道吾豈敢避是名哉􅀂上方有傳者二字以方作所皆非是夫子之言曰吾與回言終日不違如愚則其與衆人辨也有矣駮雜之譏前書尽之吾子其復之昔者夫子猶有所戯詩不云乎善戯謔􅀆不爲虐􅀆記曰張而不弛文武不能也惡害於道哉吾子其未之思乎能字本皆作爲方云考之記實日張而不弛文武不能也弛而不張文武不爲也則此爲字當作能字乃是但李本云論衡嘗引此以􅼒董伸舒不窺園事正作爲字疑公自用論衡非用戴礼也今按作爲无理必有脫誤不然不應舎前漢有理之礼記而信後漢无理之論衡也况公明言記日而无論衡之云且又安知論衡之不誤哉今据公本語依礼記定作能字惡害於道哉惡或作豈於下或有爲字一本作鳥害其爲道哉孟君將有所適思與吾子别庶幾一來愈再拜朱文公校昌􅀺先生集卷之十四
