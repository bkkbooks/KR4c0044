  text: 朱文公校昌􅀺先生文集卷之一
  hash: sha256:2a544b947035f922a48aa32cbc82cb23906cd712e3dea917daf56ab47ddd25e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_001-1a}
body:
  text: 晦庵朱先生考異留畊王先生音釋宋莒公云馮章靖親校舊每卷首具列卷中篇目馮悉以朱墨滅殺之惟存其都凡集外别有目録一卷今按李漢所作序云揔七百首并目録合四十一卷則正與馮合賦感二鳥賦并序集註正元十一年公以前進士三上宰相書不報東歸感所獻二鳥而賦之時宰相趙憬賈耽盧邁也貞元十一年一或作五方云以諸譜考之作一爲是五月戊辰愈東歸癸酉自潼音同潼関在華隂􅀜出息于河之隂時始去京師有不遇時之歎見行有籠白烏白鸜鵒而西者號於道曰某􅁟之守音狩某官使使䟽吏切者進於天子東西行者皆避路莫敢正目焉西下閣杭本無行字方云考之禮記及公送温造序當有因竊自悲幸生天下無事時承先人之遺業不識干戈耒耜攻守耕穫之勤讀書著文自七􅀊至今凡二十二年其行巳不敢有愧於道於杭作之非是其間音閑居思念前古當今之故亦僅志其一二大者焉選舉於有司與百十人偕進退十或作千方云此專爲選舉而言也貞元九年應宏詞者僅三十二人作十爲是退上或再有偕字曽不得名薦書齒下士于朝以仰望天子之光明方从閣本名上有列字名下有於字今按嘉祐杭本與謝本並無此二字語簡而意已足方本非是今是鳥也惟以羽毛之異以下或有其字非有道德智謀承顧問賛教化者乃反得蒙採擢薦進光耀如此此下諸本有可以人而不如鳥乎一句方从閣本文粹删去今按諸本所有之句乃全用大斈傳中語而意則異矣二本無之豈公晚覺其陋而自削之歟抑後之傳者爲賢者諱而删之也方从二本意則厚矣然凡讀書者但當据其本文實事考評得失以自警戒乃爲有益正不必曲爲隱諱以啓文過飾非之習也今此一句恐或公所自刋故且从方本云故爲賦以自悼且明夫遭時者雖小善必逹不遭時者累善無所容焉其辭曰吾何歸乎此句或在苟有食其從之下吾將旣行而後思誠不足以自存苟有食其從之苟或作敬非是出國門而東騖音務馳也觸白日之隆景時返顧以流涕念西路之羌永羌或作差今按作差固謬然羌乃發語之詞施之句内似亦未安以上文反顧流涕之語推之則西路乃長安之路而此字當爲浸漸愈益之意不知的是何字又恐或是逾字過潼􅀜而坐息窺黃流之奔猛黄流或作流黄感二鳥之無知方蒙恩而入幸惟進退之殊異増余懷之耿耿彼中心之何嘉之或作其嘉或作憙非是徒外飾焉是逞焉或作而余生命之湮阨音厄曽二鳥之不如汨音聿又音骨􅀃文水流也楚詞汨余若將不及東西與南北􅁪十年而不居􅁪或作亘而或作以方云􅁪居鄧切與亘竟之亘同班固叙傳􅁪以年歳選詩徙􅀝􅁪漏窮辱飽食其有數况䇿名於薦書䇿方从閣杭作榮云公上宰相書非苟没於利榮於名也與此義通今按唐人䇿字俗體从竹从宋亦有只从艸者與榮字絶相近故閣本作榮盖傳冩之誤耳方引榮於名亦與此語意不相似於或作與亦非是時所好之爲賢庸有謂余之非愚昔殷之髙宗得良弼於宵寐或云昔上當有在字或是念字由上句未有愚字相似而脫也孰左右者爲之先信天同而神比先下或有容字信或作容皆非是方云漢酈食其傳沛公吾所願從遊莫爲我先韓語祖此及時運之未來或兩求而莫致雖家到而戸􅀃祇以招􅀹而速累􅀃或作曉蓋上天之生余亦有期於下地盍求配於古人獨怊悵上音超悵恨也於無位惟得之而不能乃􅀑神之所戯幸年歳之未暮庶無羡於斯􅀋惟方作雖今按上文之意若日天之生我必有所用何不力慕古人如傳􅀃之徒而獨怊悵於無位耶惟或者苟得其位而不能追配古人但如二鳥之空被榮寵乃是􅄦神之所戯耳故幸年歳之未晚而庶幾無慕於斯􅀋也斯􅀋盖并指二鳥與彼得之而不能者而言也推字正是斡轉處作雖即無力矣能或作􅀌亦非是復志賦并序樊曰其句法歩􅀋離騷往往相似􅄯無咎嘗取此賦於變騷愈旣從隴西公孫曰董晋也正元十二年七月以東都留守董􅀳爲宣武軍節度使平鄧惟㳟之亂辟公爲其府推官詳見晋行狀平汴州其明年七月有􅀒薪之疾退休于居作復志賦其辭曰居悒悒音邑憂也選云良増悒悒之無解􅀆獨長思而永歎音灘騷云心鬰鬰之􅁨思􅀆獨永歎乎増傷解或作辝豈朝食之不飽􅀆寧冬裘之不完昔余之旣有知􅀆誠坎軻音可坎軻不平易皃選坎軻多苦辛而艱難當歳行之未復􅀆從伯氏以南遷凌大江之驚波􅀆過洞庭之漫漫至曲江而乃息􅀆逾南紀韓曰唐一行以天下山河之象存乎兩戒分南紀比紀韶在南紀之外詩滔滔江漢南國之紀之連山嗟日月其幾何􅀆􅂝􅀌􅊔音釐而北旋􅀌􅊔謝作嫠􅀌值中原之有事􅀆將就食於江之南方从閣本無將字於下有大字或又無之字今詳文􅀔皆非是始專專於講習􅀆非古訓爲無所用其心方从閣本古作詁爲作焉非是窺前靈之逸迹􅀆靈一作修超􅀌舉而幽尋旣識路又疾驅􅀆孰知余力之不任音壬堪也考古人之所佩􅀆閱時俗之所服閱杭作闕非是忽忘身之不肖􅀆謂青紫其可拾之或作而又或作之者皆非是自知者爲明􅀆故吾之所以爲惑吾下或有志字非是擇吉日余西征􅀆亦旣造夫京師旣或作冀君之門不可逕而入􅀆遂從試於有司逕或作徑惟名利之都府􅀆羌起羊切騷云羌衆人之所仇羌楚人發語端詞猶言卿何爲也字衆人之所馳羌或作差非是所或作四競乗時而附􅀔􅀆紛變化其難推附􅀔或作射利或只附字作射字全純愚以靖處􅀆將與彼而異宜欲奔走以及事􅀆顧􅀄心而自非朝騁騖乎書林􅀆夕翶翔乎藝􅁐騁或作馳方云楚詞朝騁騖乎江皐作馳非是諒却歩以圖前􅀆不浸近而逾逺哀白日之不與吾謀􅀆至今十年其猶􅀄豈不登名於一科􅀆曾不􅀘其遺餘進旣不獲其志願􅀆退將遁而窮居排國門而東出􅀆􅁣余行之舒舒􅁣或作嗟時慿髙以廻顧􅀆涕泣下之交如之或作而戾音荔至也洛師而悵望􅀆聊浮游以躊躇假大􅀛以視兆􅀆求幽貞之所廬大或作火甘潜伏以老死􅀆不顯著其名譽音欤非夫子之洵美􅀆吾何爲乎浚音峻衛邑詩干旄在浚之都之都小人之懷惠􅀆猶知獻其至愚固余異於牛馬􅀆寧止乎飲水而求芻伏門下而黙黙􅀆竟歳年以康娯下而或作下之時乗閒以獲進􅀆顔垂歡而愉愉音俞和恱也而或作之仰盛德以安窮􅀆又何忠之能輸昔余之約吾心􅀆誰無施而有獲方从閣本誰作惟下又有德字云李本謂陳無已去德字今本復訛惟爲誰其誤甚矣今按此句本用楚詞孰無施而有報孰不殖而有穫之語詞意旣有自來又与上下文􅀔相應故嘉祐杭本與諸本多如此乃是韓公本文相傳巳乆非陳以意定也閣本之繆如此而方信之反以善本爲誤今不得而不辨也又嘉祐杭本也多有之而其不同處方皆不録豈其偶未見耶抑忽之而不觀也嫉貪佞之洿與汚同濁􅀆曰吾其旣勞而後食方無旣字非是懲此志之不脩􅀆愛此言之不可忘脩方作循云唐人書脩近循楚詞亦有誤者今按唐人書字之誤方􅀃是也然此乃脩誤作循非循誤作脩也脩猶脩好脩怨之脩盖因舊増新之意耳情怊悵以自失􅀆心無歸之茫茫之或作而茍不内得其如斯􅀆孰與不食而髙翔抱􅀜之阨與隘同音又一作厄陋􅀆有肆志之揚揚諸本多作陽陽方云後漢孔嵩傳云晨門肆志於抱関史記晏嬰傳志氣揚揚公當是用此語詩君子陽陽則注謂無所用其心非公所用字也伊尹之樂於畎畒􅀆焉貴冨之能當恐誓言之不固􅀆斯自訟以成章斯或作聊訟或作誦往者不可復􅀆冀來今之可望音亡閔已賦􅀘注公甞佐董晋于汴未幾晉薨尋佐張建封于徐建封又薨罷去居洛賦云甞未安而既危指此此所以賦閔已也余悲不及古之人􅀆伊時􅀔而則然而或作􅀆獨閔閔其􅂚已閔閔或作悶悶渚本句下有􅀆字下文隔句皆有􅀆字今按洪慶善云歐宋皆無􅀆字後皆復添或云咸通本復志賦與此賦皆無􅀆字未知孰是憑文章以自宣昔顔氏之庶幾在隱約而平寛固哲人之細事夫子乃嗟歎其賢惡飲食乎陋巷亦足以頥神而保年閣本無食字非是有至聖而爲之依歸又何不自得於艱難何下或有苦字曰余昬昬其無􅀋望夫人其巳逺逺或作還方云詩小雅焦贑易林逺字皆叶平声讀作還者非行舟檝而不識四方渉大水之漫漫勤祖先之所貽勉汲汲於前修之言雖舉足以蹈道哀與我者爲誰衆皆捨而已用忽自惑其是非下土茫茫其廣大余壹不知其可懷壹本多作豈方云閣杭本作壹舊監本潮本尚作一訛壹爲豈自蜀本也檀引云予壹不知夫䘮之踊也韓語盖原此就水草以休息􅁪未安而旣危乆拳拳其何故亦天命之本宜本或作所惟否泰之相極咸一得而一違閣本作衰非是君子有失其所小人有得其時聊固守以静俟誠不及古之人􅀆其焉悲諸本多無􅀆字别知賦送楊儀之韓曰公以御史言旱饑得罪黜爲連之陽山令連有唐屬湖南道時楊儀之以湖南支使來公爲此賦以别之余取友於天下將歳行之兩周下何深之不即上何髙之不求紛擾擾其旣多咸喜能而好修紛或作伊紛擾或作伊紛其或作而咸方作或非是寧安顯而獨裕顧阨窮而共愁窮或作塞惟知心之難得斯百一而爲収之或作而斯或作在百一或作一旦皆非是方云陸機嘆逝賦得十一於千百韓用此意歳癸未而遷逐侣蟲蛇於海陬將侯切隅也侣或作旅遇夫人之來使闢公館而羅羞而或作以索微言於亂志發􅀌􅀏於羣憂物何深而不鏡理何隱而不抽鏡或作考始參差以異序卒爛漫莫半切又謨官切並大水而同流以或作於爛漫本或作爛熳或作瀾漫云大水也何此歡之不可恃遂駕馬而廻輈張流切車轅也遂或作卒而或作以山磝磝􅀄交切尓雅山多小石日㟼其相軋樹蓊蓊音翁又烏孔切草木盛其相摎居由切絞也祝曰儀礼殤之絰者不樛垂注不絞其帶之垂者雨浪浪音郎其不止雲浩浩其常浮磝磝或作嶅嶅樛或作繆雲或作雪浩浩或作活活其或皆作而知來者之不可以數音朔哀去此而無由方無者字或無之字皆非是而或作以􅀝郭郛音孚而掩涕空盡日以遲留而或作其古詩元和聖德詩并序樊曰憲宗即位劒南劉闢自􅁛留後元和元年正月以髙崇文爲左神䇿行營節度使討闢九月克成都十月闢伏誅二年正月己丑朝献于太清宫庚寅朝享於太廟辛卯祀昊天上帝於郊丘還宫大赦天下補注穆伯長日退之元和聖德詩淮西碑柳雅章之􅀋皆辝􅃊義偉制作如經能崒然聳唐德於盛漢之表筆墨間録云此序乃司馬迁之文非相如文也臣愈頓首再拜言此下或有日字臣伏見皇帝陛下即位巳來誅流姦臣孫曰永貞元年貶王伾王叔文韓泰韋執誼也朝廷清明無有欺蔽外斬楊惠琳劉闢以収夏蜀東定青徐孫曰青謂平盧節度李師道奉表詣京師徐謂徐帥張建封子上表請代皆正元元和間積年之叛海内怖駭不敢違越郊天告廟神靈歡喜風雨晦明無不從順晦明或作明晦太平之期適當今日臣􅀩􅀍恩澤日與羣臣序立紫宸殿陛下或無陛字親望穆穆之光而其職業又在以經籍教導國子而或作况誠宜率先作歌詩以稱道盛德不可以辭語淺薄不足以自效爲解或作懈或作辝皆非是方云自左傳請以曹爲解迁固相承用之非一輙依古作四言元和聖德詩一篇凡千有二十四字指事實録具載明天子文武神聖以警動百姓耳目傳示無極警或作驚方云洪日驚流俗妄改也史記尊寵樂毅以警動燕斉義當用此其詩曰皇帝即阼或作祚方云史記文紀有皇帝即阼一全語實用阼字今按阼謂東階也作祚非是物無違拒曰􅊙而􅊙曰雨而雨維是元年有盗在夏欲覆其州以踵近武近或作其皇帝曰嘻豈不在我􅀒鄙爲艱縱則不可出師征之其衆十旅十或作千方云按此專紀楊惠琳之乱也時􅃊綬在河東表請討之詔與天德軍合擊未甞它出師也十旅爲征今按周礼五人爲伍五伍爲两四两爲卒五卒爲旅則一旅五百人而十旅五千人也方􅀃得之亦見以順討逆師不在衆之意軍其城下告以福禍腹敗枝披不敢保聚擲首陴音脾城上女墻也外降下江切丨幡夜竪疆外之險莫過蜀土韋皐去鎭劉闢守後血人于牙不肯吐口人或作入非是開庫㗖士曰隨所取曰方作日今按此乃述其誘㗖士卒之詞方本非是汝張汝弓汝鼓汝鼓上鼓字或作伐或作桴或作擊汝爲表書求我帥汝事始上聞在列咸怒皇帝曰然嗟逺士女苟附而安則且付與讀命於庭讀或作續非是出節少府朝發京師夕至其部闢喜謂黨汝振而伍蜀可全有此不當受不當或作當不非是萬牛臠力轉切炙之夜切與䏑同記母嘬炙或作肉萬甕行酒以錦􅅶股以紅帕􅀘注實錄曰禹㑹塗山之夕大風雷震有甲兵卒千餘人其不􅀍甲者以紅綃怕袜其額自此遂爲軍容之服首方云荆公本音麥潮本亦然方言注絡頭怕頭也音貃今多讀作莫轄切公送李益鄭權序皆用此語或作帓字盖二音通讀今按集韻帕莫白切無莫轄音帓莫􅁑切帶也方􅀃誤有惟音匡怯也其兇有餌其誘兇方作􅇩仐按此二句盖言有畏其􅁀者有貟其利者故從之者衆耳非本心樂從也方本非是其出穰穰如羊切多也隊以萬數遂刼東川遂據城阻皇帝曰嗟其又可許爰命崇文分卒禁禦有安其驅無暴我野日行三十徐壁其右壁或作辟闢黨聚謀鹿頭是守崇文奉詔進退規矩規或作合戰不貪殺擒不濫數方云杭本三舘本文粹作藍縷唐本作襤褸蜀本始作濫數校本多从之今姑存其舊今按藍縷無理濫数盖用左傳数俘之語蜀本得之它本皆誤四方節度整兵頓馬上章請討俟命起坐請或作乞皇帝曰嘻無汝煩苦嘻嘆辝也方作嘉非是荆并洎梁孫曰荆謂荆南節度使裴均并謂河東節度嚴綬梁謂西道節度使嚴礪也在國門户出師三千各選爾醜四軍謂荆并梁及崇文之師齊作殷其如阜殷其或作殷殷或作其殷或拔其角或脫其距拔或作披長驅洋洋無有齟齬音語齒不相當八月壬午闢棄城走載妻與妾包裹稚乳是日崇文入處其宇日或作曰分散逐捕搜原剔藪闢窮見窘無地自處俯視大江不見洲渚遂自顚倒若杵投􅍫取之江中枷脰音豆頸也械手婦女纍纍啼哭拜叩來獻闕下以告廟社周示城市咸使觀覩解脫攣力全切係也索夾以砧斧方云砧當作拈與椹同􅀾囯策范雎曰臣之􅇩不足以當椹質要不足以待斧鉞是也婉婉音宛順也弱子赤立傴於武切僂音縷曲躬牽頭曵足先斷􅆎膂次及其徒體骸撐丑庚切拄冢􅁃切末乃取闢駭汗如寫方云音湑蓼蕭詩用韻如此或作雨非是揮刀紛紜爭刌趍本切細切也膾脯爭或作猶刌或作切皆非是義理有刌肺樊曰此詩蘇黄門曰此持憲宗命崇文誅一劉闢耳其言何􅃈屑之甚謂之造語工則可謂之得雅體未也詩載文王伐崇武王伐紂固自有體退之獨不到此耶亦其少年所爲文也按公時年四十不可謂少大抵德不足則夸憲宗功烈固偉比文武則有間矣王荆公甞論詩曰周頌之詞約約所以爲􅃊德盛故也魯頌之詞侈侈所以爲夸德不足故也是詩其魯頌之謂欤優賞將吏扶珪綴組帛堆其家粟塞其􅁃塞下其字方作倉非是以上句偶之可見哀憐陣殁􅅒給􅀌寡贈官封墓周帀宏􅄎經戰伐地寛免租簿施令酬功急疾如火天地中間莫不順序幽􅁪青魏或作魏幽􅁪青東盡海浦南至徐蔡區外雜虜怛威赧德踧踖上音蹙下音昔行而謹敬蹈舞諸本怛作烜赧作赫又作服方以文録定烜作怛以唐閣蜀文定赫作赧云公上尊號表有怛威愧德意與此同掉徒弔切擲也棄兵革私習簋簠來請來覲十百其耦或作數皇帝曰吁伯父叔舅各安爾位訓厥甿畮甿或作田正月元日􅀄見宗祖躬執百禮登降拜俯薦于新宫于或作饗新或作閟非是視瞻梁梠音吕楣也桷端連綿木名選㮰梠縁邊慼見容色淚落入爼侍祠之臣助我惻楚乃以上辛􅀘注穀梁傳曰自正月至三月郊之時也我以十二月下辛卜正月上辛不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣礼記郊之用辛也注云言人君當齋戒自新耳於郊用牡除于國南鱗筍毛簴上思尹切下國許切孫曰筍簴所以掛鍾磬也横曰筍飾以鱗屬植曰簴飾以羸屬祝曰周礼梓人爲筍簴廬幕周施開掲磊砢上落猥切下魯可切石多皃相如日水石磊砢又石縱横皃祝曰選金玉磊砢獸盾順允切孫曰以木爲之而畫龍文相合載之以蔽馬騰挐女加切牽引也圎壇帖妥吐火切安也天兵四羅旂常婀娜旂或作旗上於可切下奴可切美也曹植曰華容婀娜駕龍十二周礼馬八尺以上爲龍天子之駕馬十有二閑魚魚雅雅晋史劉棪傳洛中雅雅有三嘏宵昇于丘昇或作升方云楚詞升皆作昇它凖此奠璧獻斚音賈玉爵衆樂驚作轟豗上呼宏切下音􅁅轟羣車聲選轟轟闐闐豗相擊也選磊匒匌而相豗融冶樂声紫熖嘘呵火氣紫或作柴髙靈孫曰天神之有靈者下墮羣星從坐錯落侈哆昌者切􅀃文張口也詩巷伯哆􅀆侈􅀆注大皃日君月妃煥赫婐㛂上烏果切下五果切身好弱皃祝曰樂府婐􅛭戯金闕煥赫謂日君婐􅛭謂月妃瀆􅀑􅄥鴻上莫孔切下胡孔切廣大皃選濛鴻沆茫嶽祇嶪峩上音業下音我山髙皃後漢増槃嶪峩飫沃羶薌沃羶或作羶燎孫曰亦作香羶羊臭薌榖氣今按飫沃之義未詳或云當作飫厭亦未有所据也羶薌字見禮記云産祥降嘏鳯皇應奏舒翼自拊赤麟黄龍逶於爲切陀徒何切容與之皃結紏麟或作鱗逶或作頽卿士庶人黃童白叟踊躍歡呀虚加切張口皃失喜噎歐上一結切下烏后切􅂬或作嘆歐或作嘔方云嘔俗字也乾清坤夷境落褰音愆或作騫舉帝車廻來日正當午方云校本作日始東吐盖疑郊祀回車不應至午也然諸本皆同姑从之幸丹鳯門大赦天下滌濯剗楚簡切削也磢􅀄两切瓦石洗物選飛勞相磢磨滅瑕垢續功臣嗣拔賢任耇孩養無告仁滂施厚皇帝神聖通逹今古今或作先或作通今逹古聽聦視明或作視聽聦明一似堯禹洪曰盖取禮記似重有憂者黄魯直云退之文老社詩無一字無來處後人讀書少故謂韓杜自作此語耳生知法式動得理所天􅃬皇帝爲天下主并包畜養無異細鉅億載萬年敢有違者皇帝儉勤盥音貫澡也濯陶瓦孫曰盥濯以陶瓦之器言其儉也斥遣浮華好此綈音題厚繒也紵勑戒四方侈則有咎天錫皇帝多麥與黍無召水旱耗于雀䑕耗于或作無耗億載萬年有富無窶羣羽切貧也方作冨有無窶或作冨有貧窶或作無有貧窶皆非是皇帝正直别白善否擅命而狂旣翦旣去盡逐羣姦靡有遺侶天錫皇帝厖臣碩輔博問遐觀以置左右億載萬年無敢余侮余方作有非是皇帝大孝慈祥悌友怡怡愉愉奉太皇后浹于族親濡及九有天錫皇帝與天齊壽登兹太平無怠永乆億載萬年爲父爲母愽士臣愈職是訓詁孫曰尓雅有釋詁釋訓釋詁者釋古今之異辭釋訓者辨物之形皃訓詁即歌詩也作爲歌詩以配吉甫琴操十首并序韓云按琴操十有二公取其十如下所作是也惟水仙懷陵操乃伯牙所作公削之爲之詞者各注于下唐子西云琴操非古詩非騷辝惟退之爲得体退之琴操柳子厚不能作也孫曰風俗通云琴曲曰操操者言窮阨猶不失其操也將歸操孔子之趙聞殺鳴犢作孫曰孔子將西見趙簡子聞竇鳴犢之死臨河歎日美哉水洋洋乎丘之不済此命也夫事見史記諸本題義下皆有子注方云閣本只存題義唐本注與題義皆不出蜀本於注云上増又曰二字與題義皆夾注寫以此見雖題義亦後人以琴操續􅀘也歐宋荆公皆用閣本今按歐本云此効蔡邕作十操事跡皆出蔡邕琴操云狄之水􅀆其色幽幽秋蜀本作秋今按水經河水至東阿茌平等縣東北流四瀆津注云津西有四瀆祠東對四瀆口河水東分済水受河盖滎口水斷不通始自是出與清水合沛瀆自河入済水徑周通故有四瀆之名昔趙殺鳴犢孔子臨河歎而作歌曰狄之水􅀆風􅀭波舟楫顛倒更相加歸來歸來胡爲斯案臨済故狄也是濟所逕得其通稱也又云済水逕臨済縣南詳此則是済水自滎澤之下潜流至此四瀆津口而後復出河又東分一支與之合流以過臨済而爲狄水故孔子臨河不済而􅁔詠狄水即此東分之河復出之済也然此皆斉地今在済鄆之間史記以為孔子自衛將西見趙簡子則其道不當出此此又不可曉者今姑闕之以俟深於地理者正焉我將濟􅀆不得其由渉其淺􅀆石齧我足乗其深􅀆龍入我舟我濟而悔􅀆將安歸尤歸􅀆歸􅀆無與石􅃲􅀆無應龍求帰􅀆帰􅀆諸本􅀆作乎猗蘭操孔子傷不逢時作孫曰古琴操云習習谷風以隂以雨之子于帰逺送于野何彼蒼天不得其所逍遥九州無有定處丗人闇蔽不知賢者年紀逝邁一身將老蘭之猗猗揚􅀭其杳不採而佩於蘭何傷今天之旋其􅂚爲然我行四方以日以年雪霜貿貿音茂不明薺麥韓曰西京雜記日建亥之月隂氣之極萕麥始生之茂子如不傷我不爾覯見也孫曰言我如萕麥之茂當雪霜之時不改其操子如見傷而用我可也子如不傷我無自貶以見子之義薺麥之茂薺麥之有孫曰茂而能傲霜雪萕麥之固有君子之傷君子之守韓曰君子居可傷之時不易其守亦猶萕麥之有也􅀛山操孔子以季􅁊子受齊女樂諫不從望􅀛山而作􅀛山魯山也詩奄有􅀛蒙在太山博縣韓曰古琴操云予欲望魯􅀆􅀛山蔽之手無斧柯柰􅀛山何􅀛之氛􅀆不能雲雨氛或作氣雲或作爲或雲上有爲字􅀛之枿亦作蘖五割切前漢三枿之起李廵曰槁木之餘􅀆不中梁柱不下或有能字非是方云太玄經梁不中柱不隆大厦㣲中平声讀今按此但言其木不堪作梁柱耳與太玄中字意異當只作去声讀文意乃恊􅀛之大􅀆祇以奄魯知將隳􅀆哀莫余伍知或作如孫曰言魯將􅈥壞哀而憐之者莫余若也周公有􅀑􅀆嗟余歸輔􅀑或作思余帰方作帰余皆非是大抵方意尚異不問文義之如何惟作倒語者則必取之如下文我􅃎于家莫尓余追皆此􅀋也越裳操周公作韓本注事見後漢南蛮志交趾之南有越裳云古琴操曰於戯嗟嗟非旦之力乃文王之德雨之施物以孳或作滋我何意於彼爲自周之先其艱其勤以有疆宇私我後人我祖在上四方在下厥臨孔威敢戯以侮孰荒于門孰治于田孫曰言豈有荒于門而能治于田者乎故必四海旣均而後越裳是臣也四海旣均越裳是臣拘幽操文王羑里作上音酉漢地理志河内蕩隂縣有羑里城孫曰事見史記周本紀琴録曰文王見拘羑里憂愁无聊援琴而鼓之號曰拘幽操詞曰殷道溷溷浸濁煩􅀆朱紫相合不别分􅀆迷乱声色信䜛言􅀆炎炎之虐使我愆􅀆幽閉牢穽由其言􅀆遘我四人憂勤勤􅀆目窈窈􅀆其凝其盲目窈窈方作窈揜揜或作目揜揜今按下文有耳字正與目字相對窈窈二字比之揜揜似亦差勝耳肅肅􅀆聽不聞聲朝不日出􅀆夜不見月與星日上或有見字有知無知􅀆爲死爲生嗚呼臣罪當誅􅀆天王聖明伊川曰退之作琴操有日臣罪當誅􅀆天王聖明道文王意中事前後之人道不到此徐仲車言退之拘幽操云臣罪當誅􅀆天王聖明可謂知文王之心矣凱風七子之母猶不能安其室而云母氏聖善我無令人重自責也岐山操周公爲太王作祝曰岐山在岐州今有岐山縣詩居岐之陽太王古公亶父也我家于􅃎方作我􅃎于家非是自我先公伊我承序敢有不同諸本序作緒方云商書丕氶基緒然國語亦有奔走氶序註謂氶受事業次第也今按序謂傳授次第漢書多云朕承天序是也緒猶言統系方引商書之言是也二字義雖不同然用之於此似亦兩通但國語承序乃謂氶受政役之次第與漢書字同而意異方作序而引以爲􅀃則誤矣今狄之人將土我􅆠民爲我戰誰使死傷彼岐有岨石山載􅁟我往獨處爾莫余追無思我悲方云岨與阻同楚詞漢書多用岨字今以平聲讀之非也尔或作人尓莫方作莫尓非是履霜操尹吉甫子伯竒無罪爲後母譛而見逐自傷作樊曰尹􅁻甫之子伯竒所作也吉甫聽其後妻之言逐之伯竒編芰荷而衣採楟花而食清朝履霜而自傷無罪見放逐乃援琴而鼓之見古樂府觧題其詞曰朝履霜􅀆採晨寒考不明其心􅀆信䜛言􅀌恩離别􅀆摧肺肝何辜皇天􅀆遭斯愆痛殁不同􅀆恩有偏誰􅀃碩􅀆知此􅁈父􅀆兒寒母􅀆兒飢兒罪當笞逐兒何爲兒在中野以􅀫以處四無人聲誰與兒語兒寒何衣兒飢何食兒行于野履霜以足母生衆兒有母憐之獨無母憐兒寧不悲兒寕方作母寕非是雉朝飛操牧犢子七十無妻見雉􅀟飛感之而作牧犢或作沐瀆樊曰呉兢樂府古題觧云舊􅀃斉宣王時牧犢子七十無妻出薪于野見雉雌雄相隨意動心怨因援琴而歌以自傷其声中絶魏武帝宫人有盧女者七歳入漢宫斈鼓琴能傳此曲崔豹古今注牧犢子斉宣王時人五十無妻出薪於野見雉雄雌相逐而飛乃作詞曰雉朝飛􅀆鳴相和雌雄群遊􅀆山阿我獨何命􅀆未有家時將暮􅀆可柰何嗟嗟暮􅀆可柰何雉之飛于朝日羣雌􅀌雄意氣横出或無氣字當東而西當啄而飛隨飛隨啄羣雌粥粥集注記曰粥粥若無能或謂當作音祝􅀃文呼雞重言之杜詩誰話雞翁嗟我雖人曽不如彼雉雞生身七十年無一妾與妃馬大年云别本彼作此無雞字而下語妃音嫓與雉叶别鵠操商陵穆子娶妻五年無子父母欲其改娶其妻聞之中夜悲嘯穆子感之而作崔豹古今注云云其詞曰將乖比翼隔天端山川悠逺路漫漫攬衾不􅄰食忘飱後遂爲夫妻雄鵠衘枝來雌鵠啄泥歸巢成不生子大義當乖離江漢水之大鵠身鳥之㣲更無相逢日且可繞樹相隨飛且或作安又無繞樹二字皆非是方云李陵詩長當爲此别且復立斯湏又古樂府與子如黄鵠將别復徘徊亦此意也殘形操曾子夢見一狸不見其首作事見琴録其詳未聞曽子一作魯子有獸維狸􅀆我夢得之其身孔明􅀆而頭不知吉凶何爲􅀆覺坐而思巫咸韓曰離騷巫咸將夕降􅀆懷椒糈而要之注巫咸古神巫也張衡思玄賦抨巫咸使占夢上天􅀆識者其誰南山詩或無詩字凡百有二韻樊曰東方朔曰終南山天下之大阻也其山多玉石金銀銅鉄䂊章檀柘異物之􅀋不可勝原百工取給萬姓所仰足也洪曰此詩似上林子虚賦才力小者不可到也􅀘注潜溪詩眼云孫莘老甞謂老杜北征勝退之南山詩王平甫以謂南山勝北征終不能相服時山谷尚少乃曰若論工巧則北征不及南山若書一代之事以與國風雅頌相爲表裏則北征不可無而南山雖不作未害也二公之論遂定吾聞京城南茲維羣山囿言群山聚此東西兩際海方云史記春申君上秦昭王書王之地一經兩海太康地記日河北得水為河塞外得水為海今按此與史記但皆極言其廣耳不必曲引塞外之􅀃也巨細難悉究山經及地志茫昧非受授團辭試提挈挂一念萬漏挂一念或作一念挂非是孫曰集也山經地志旣不詳欲團集其詞而試挈提之又恐掛一漏萬也欲休諒不能粗叙所經覯甞昇崇丘望甞或作常戢戢相輻湊也見相湊晴明出稜魯登切角縷脉碎分繡蒸嵐相澒洞胡孔切澒或作鴻方云淮南子澒濛􅟾洞王褒簫賦􅀭雄羽獵賦所用皆同唐人始兼用之杜詩鴻洞半炎方澒洞不可掇是也表裏忽通透無風自飄簸音播又音跛融液煦柔茂横雲時平凝􅀧􅀧露數岫天空浮脩眉空或作宇孫曰言逺山横如脩眉也韓曰選洛神賦脩眉䏈姢注脩長也西京雜記文君絞好眉色如望逺山又外傳趙飛燕妹名合德為薄眉號逺山黛濃緑畫新就􅀌撐有巉絶海浴褰鵬噣音晝鳥口補注已上叙南山大槩春陽潜沮子魚切又去声洳音如䧟􅊜地又去声濯濯吐深秀吐深或作深吐巖巒雖嵂崒上音律下昨没切山峻也史記隆崇嵂崒輭俗作軟弱􅀋含酎音宙醇酒夏炎百木盛䕃欎增埋覆神靈日歊歔上音枵下音虚氣出也雲氣爭結構秋霜喜刻轢音曆車所踐也或作鑠方云史記酷吏􅀓刻轢宗室磔卓立陟格切裂也記大儺旁磔孫曰言言草木皆暮山卓然獨立也癯音劬瘠也痩參差相疊重剛耿陵宇宙冬行雖幽墨冰雪工琢鏤雪或作路新曦音希日光選隆暑方赫曦照危峨億丈􅁪髙袤莫候切廣也危或作峞方云􅁪居鄧切或作亘明昬無停態頃刻異狀候􅀘注巳上叙四時変態西南雄太白􅀘注子厚云雍州西南界于梁其山日太白其地常寒又諺云武功太白去天三百突起莫間簉祝曰左氏僖子使助還氏之簉注簉副倅也嵇康日承間簉之藩都配德運唐土德太白在西南坤位故云配德運分宅占丁戊亦坤位逍遥谷名越坤位坤或作地詆音邸詆訶訐䧟乾竇音豆穴也孫曰言太白非特占西南坤位而巳又侵及西北乾位故日䧟乾竇按藩都至乾竇四句未詳其義空虚寒兢兢風氣較搜漱朱維方燒日隂霰蘇佃切雨雪􅄂緃騰糅女救切雜也昆明孫曰昆明池漢武帝時作在長安西南周圍四十里大池北去覿偶晴晝緜䏈窮俯視倒側困清漚烏􅃸切乆漬㣲瀾動水面踊躍躁猱奴刀切猴也狖音柚䑕属善旋躁或作蹂驚呼惜破碎仰喜呀玉篇虚牙切唅牙張口皃不仆敷救切又匹候切倒也頓也補注已上言南山方隅連亘之所前尋徑杜墅神与切孫曰即杜陵也在長安万年縣東南韓曰唐宰相杜佑與同列宴於樊川别墅即此也墅田廬也坌蒲悶切塵也後漢益氣坌涌徑或作經方云當如夜徑澤中之徑柱或作社非是坌或作忿蔽畢原孫曰周文武葬處在今咸陽縣西北或曰文王子封於畢此其地也陋﨑嶇上音祈下音區上軒昻始得觀覽冨行行􅀘注上夏良切下户庚切或謂皆如字謝惠連詩行行道轉逺又古詩行行重行行將遂窮嶺陸煩互走音奏勃然思坼裂擁掩難恕宥巨靈與夸蛾夸音誇列子云帝命夸蛾氏二子􅀒太行王屋二山一厝朔東一厝雍南自此冀之南漢之隂无隴断焉逺賈音古期必售承呪切賣去手蛾或作娥方云考列子當作蛾賈或作雇還疑造物意固護蓄精祐力雖能排斡烏括切又音管轉也楚詞斡維焉繫雷電怯呵詬呼漏切怒也罵也攀縁脫手足蹭蹬上七鄧切下音鄧失道也選増蹬窮波抵積甃測救切茫如試矯首堛塞上普逼切士塊亦雅云塊堛也塞填塞生怐愗上冦下茂愚也楚詞宋玉九辯云直怐暓而自若按集韻通作轂霧鄙吝心不明也威容䘮蕭爽近新迷逺舊拘官計日月欲進七可又因縁窺其湫音秋湫者龍所居也南山有炭谷湫凝湛閟隂嘼音嗅亦作畜樊曰作獸者非礼運曰龍以為嘼謂湫中蛟也秋懷詩云其下澄湫水有蛟寒可罾即此也洪曰嘼畜産也或作獸魚蝦可俯掇丁括切拾也神物安敢冦林柯有脫葉欲墮鳥驚救樊曰其湫如鏡靣葉落恐其汚即鳥衘去盖其神物之靈如此公題炭谷湫祠堂所謂魚鱉蒙擁護者此也爭衘彎環飛投棄急哺鷇音冦鳥生湏哺日鷇自食日雛尓雅生哺鷇生噣鷇旋歸道迴睨音詣視也逹枿壯復奏逹或作逺方云盧仝月蝕詩頭戴弁冠髙逹枿吁嗟信竒怪峙質能化貿音茂易也前年遭譴謫蓮山謫探歴得邂逅􅀄從藍田縣名今在雍州有關入顧眄勞頸脰時天晦大雪淚目苦矇瞀音茂目不明莊子予適有瞀病注風眩冒乱峻􅂗拖長冰直上若懸溜褰衣歩推馬顛蹶顛仰倒蹶失脚也退且復扶冨切又也返也蒼黄忘遐睎音希視逺所矚音燭亦視也選西瞩與遊歎纔左右杉䇸咤陟駕切噴也記無咤食蒲蘇杲耀攅在完切聚也楚辝匍匐􅀆叢攅介冑專心憶平道脫險逾避臭逾或作迩非是吕氏春秋日人有大臭者其兄弟親戚皆無能與居者昨來逢清霽􅀫願忻始副始方作所非是自前年遭譴謫以後讀之可見崢鋤耕切嶸音宏山峻也馮衍日觀壷日之峥嶸楚辝下峥嶸而無地躋冡頂倐閃雜鼯鼬吾又二音虫似䑕尔雅謂之飛生能􅀘䑕前低劃音畫忽麥切錐刀曰劃前漢劃崇墉開闊爛漫堆衆皺方从蜀人韓仲韶本作云石蟇也二鶕皆取喻謂髙而羣峯飛馳如鼯鼬之奔低而堆阜分布如衆之列於義爲近今按此蜀本之誤沈元用本亦然皆非是盖此但言登山之時叢薄蔽翳方與虫獸羣行而忽至上頂則豁然見前山之低雖有髙陵深谷但如皺物㣲有蹙摺之文耳此最爲善形容者非登髙山臨曠野不知此語之爲工也况此句衆皺爲下文諸或之綱領而諸或乃衆皺之條目其語意接連文势開闔有不可以毫釐差者若如方說則不唯失其統紀乱其行列而鼯鼬動物山體常静絶無相似之理石蟇之與堆阜雖略相似然自髙頂下視猶若成堆則亦不爲甚小而末足見南山之極髙矣其與下文諸或踈宻工拙又有逈然不侔者未論古人但使今時舉子稍能布置者巳不爲此又况韓子文氣筆力之盛􅀜鍵紀律之嚴乎大抵今人於公之文知其力去陳言之爲工而不知其文從字順之爲貴故其好怪失常􅀋多如此今旣定从諸本而復備論其􅀃以曉􅀚者云或連若相從或蹙若相􅃲或妥若弭伏或竦若驚雊音遘雉鳴或散若瓦解胡買切散也或赴若輻湊輻方作輪今按輪者轂輻之通名其湊於轂者輻而巳當作輻或翩若船遊翩或作泛或决若馬驟或背若相悪或向若相佑或亂若抽筍或嵲吾結切山小而不安皃選嶮􅇖屹嵲若注炙音疚灼也或錯若繪畫或繚力少切又音僚繚繞也若􅂐籕音宙􅂐籕之文或羅若星離或蓊若雲逗音豆遛住也或浮若波濤或碎若鋤耨奴豆切􅘥器或如賁育孟賁夏育楊子注皆衛人或云秦之勇士倫賭勝勇前購孫云以財而求也先強􅀔巳出後鈍嗔䛠譳上音闘下音耨不能言也玉篇言不正也或如帝王尊叢集朝賤㓜雖親不䙝狎雖逺不悖謬或如臨食案肴核紛飣餖上丁定切下音豆貯食也紛或作分又如遊九原墳墓包槨柩或纍若盆甖或掲音訐若㽅豆或作登豆尓雅木豆謂之豆瓦豆謂之登或覆若曝鼈或頽若寢獸寢或作窮非是又或作偃或蜿一丸切楚辝日駕八龍之蜿蜿蟠蜿龍皃又日龍屈􅀆蜿蟤若藏龍或翼若􅅮鷲音就陸機云鴡鳩目上骨露幽人謂之鷲祝曰鳥名山海經云景山多鷲黒色多力或齊若友朋或隨若先後友朋或作迎随随或作差方云方言日先後猶娣姒也釋名日以來先後言也校本不詳此義而以先後爲虚字遂改友朋爲迎随以偶之又避重􅃨而改随字爲差字其誤甚矣今按史記見神於先後宛若即謂娣姒也或迸若流落或顧若􅀫留上音秀下音霤漢武帝􅀫留海上史記􅀫留之數日無所見或戾若仇讎或密若婚媾或儼若峨冠或翻若舞䄂舞或作㪯或屹魚乞切屹山皃若戰陣或圍若蒐狩或靡然東注或偃然北首或如火熺音僖熾也與熹同選耀華屋而熾洞房熖或作煙或若氣饙餾上音分下音溜蒸飯也尓雅饙餾稔也注􅧮飯爲饙饙熟爲餾或行而不輟或遺而不収音狩獲也或斜而不􅀝或弛而不彀張弓也或赤若秃鬝丘閑切又客八切祝曰􅁂秃皃孫曰頭瘡或燻若柴槱余救切積火以燎詩薪之槱之或如􅀛拆兆或若卦分繇音宙韓曰占辝或前横若剥或後斷若姤延延離又屬夬夬叛還遘喁喁音顒魚口也呉越春秋云天下喁喁魚闖丑禁切馬出門皃公羊云開之則闖然注出頭皃萍落落月經􅀫音秀列星也誾誾樹牆垣巘巘語偃切詩陟則在巚架庫廐方云巚山形如甑也姚令威云恐當作䡾䡾魏都賦四門䡾䡾參參削劒㦸煥煥衘瑩琇音秀詩充耳琇瑩注美石也敷敷花披蕚闟闟音翕闟闟或作闟闟屋摧霤力救切屋水祝日屋簷也又水流也悠悠舒而安兀兀狂以狃女救切習也前漢姦有所隱則狃而寖廣超超出猶奔蠢蠢駭不懋補注巳上並叙其經歴所見之伏大哉立天地經紀肖營腠音輳肖象也謂象營衛腠理厥􅀄孰開張僶音泯僶俛一作俛仰俛誰勸侑音宥􅂆食創兹朴而巧戮力忍勞疚得非施斧斤無乃假詛呪鴻荒竟無傳功大莫酬僦即就切賃也前漢或不償其僦費無或作誰又作莫莫或作豈嘗聞於祠官芬苾降歆嗅許救切謂神饗之也或作齅依字當作齅斐然作歌詩惟用賛報酭音又言助報酭之曲謝自然詩果州南充縣寒女謝自然童騃語駭切廢也無所識但聞有神仙輕生學其術乃在金泉山繁華榮慕絶父母慈愛􅂢凝心感魑魅慌惚難具言一朝坐空室雲霧生其間如聆笙竽韻來自㝠㝠天白日變幽晦蕭蕭風景寒簷楹蹔明滅蹔或作氣五色光屬聮觀者徒傾駭躑躅上直炙切下厨玉切祝云不進皃楚詞待天明􅀆立躑躅詎敢前湏􅁷自輕舉飄若風中煙茫茫八紘音宏淮南子曰九州之外有八夤八夤之外有八紘大影響無由縁里胥上其事郡守驚且歎或作􅀚或作􅂬驅車領官吏甿俗爭相先入門無所見冠屨同蛻音稅楚詞済江海􅀆蛻蟬蟬皆云神仙事灼灼信可傳余聞古夏后象物知神姦山林民可入民或作人方云公文石本用民字多只爲字不成不盡避也魍魎左傳王孫滿日夏之方有德也鑄鼎象物使民知神姦故入川澤山林螭魅罔兩莫能逢之莫逢旃逶迤不復振後丗恣欺謾幽明紛雜亂人􅀑更相殘秦皇雖篤好漢武洪其源自從二主來此禍竟連連木石生怪變狐狸騁妖患音還離騷屡離􅁨而逢患莫能盡性命安得更長延盡或作保方云嵇康飬生論導飬得理以盡性命人生處萬􅀋知識最爲賢柰何不自信反欲從物遷往者不可悔􅀌魂抱深􅁈來者猶可誡余言豈空文空或作虚人生有常理男女各有倫寒衣及飢食在紡績耕耘紡或作蚕下以保子孫上以奉君親苟異於此道皆爲棄其身噫乎彼寒女永託異物群感傷遂成詩或作詠昧者宜書紳秋懷詩十一首樊曰秋懷十一首文選詩体也唐人最重文選斈公以六經之文爲諸儒唱文選弗論也獨於李邢墓誌曰能暗記論語尚書毛詩左傳文選而公詩如自許連城價傍砌看紅薬眼穿長訝双魚断之句皆取諸文選故此詩往往有其体䆫前兩好樹衆葉光薿薿音擬祝曰茂也詩􅁰稷薿薿秋風一披拂䇿䇿時節耳目去所憎去或作无清曉卷書坐南山見髙稜其下澄湫水澄或作通或作有或作古或作石有蛟寒可曽音曽惜哉不得往豈謂吾無能離離掛空悲慼慼抱虚警露泫秋樹髙泫或作滴或作啼或作泣方云謝靈運詩花上露猶泫謝恵連泫泫露􅄹條王僧逹詩秋還露泫柯古詩於露用泫字非一仐按擅弓孔子泫然流涕則泫為流涕之皃於下句虫弔對偶􅀹切蟲弔寒夜永歛退就新懦趨營悼前猛歸愚識夷塗愚或作懦汲古得脩綆名浮猶有恥味薄眞自幸庶幾遺悔尤即此是幽屏必郢切僻也張衡曰雜挿幽屏今晨不成起端坐盡日景蟲鳴室幽幽方作幽室中今按當作室幽幽乃與下句相偶月吐䆫冏冏居永切韓曰䆫牖明也孫綽曰冏冏秋月明吐一作照䘮懷若迷方列子秦人逢氏子有迷罔之疾天地四方寒暑无不倒錯者浮念劇含梗古杏切塵埃慵伺候文字浪馳騁尚須勉其頑王事有朝請前漢呉王濞使人為秋請孟康曰律春日朝秋日請秋夜不可晨秋日苦易暗我無汲汲志何以有此憾寒雞空在棲缺月煩屢瞰苦濫切視也楚詞馮崑崙以瞰霧露有琴具徽絃再鼓聽愈淡古聲乆埋滅無由見眞濫低心逐時趨低或作吾盖草書之誤而失其半苦勉祗能暫有如乗風船一縱不可䌫音濫用以維舟選繫纜臨江楼不如覷文字丹鈆音㳂粉筆也事􅀧勘豈必求贏餘所要石與甔都濫切小甖也韓曰斉東此海岱之間謂之甔列子狀若甔甀揚子家无擔石之儲通用卷卷落地葉隨風走前軒鳴聲若有意顚倒相追奔空堂黄昬暮我坐黙不言童子自外至吹燈當我前問我我不應饋我我不餐退坐西壁下坐或作下讀詩盡數編作者非今士相去時巳千其言有感觸使我復悽酸顧謂汝童子置書且安眠丈夫屬有念夫或作人今按宋本亦作人􅀃者謂丈人者尊長之称古楽府所謂丈人且安坐是也此為答童子而自称故其言如此更詳之事業無窮年霜風侵梧桐衆葉著樹乾空堦一片下琤楚耕切玉聲琤或作瑲若摧琅玕上音郎下音干謂是夜氣滅望舒月也淮南子月御曰望舒离騷前望舒使先驅又􅀘註張載曰望舒四五團聞葉声琤然誤謂望舒之霣其團也霣于敏切墜也其團青冥無依􅀝飛轍危難安驚起出户視􅀝楹乆汍瀾上音丸下音䦨選揮筆涕汍瀾憂愁費晷景日月如跳丸迷復不計逺計或作記爲君駐塵鞍暮暗來客去群囂各収聲悠悠偃宵寂斖斖音尾進也美也前漢児生斖斖抱秋明丗累忽進慮進或作連外憂遂侵誠強懷張不滿弱念缺巳盈巳或作易詰屈避語穽㝠茫觸心兵敗虞千金弃得比寸草榮知恥足爲勇晏然誰汝令誰一作惟鮮鮮霜中菊旣晚何用好揚揚弄芳蝶􅀭揚或作陽陽爾生還不早東坡詩云勿訝昌􅀺公恨尔生不早謂此語也運窮兩值遇婉孌上音宛下力兖切詩婉􅀆變􅀆注婉少皃孌好皃死相保西風蟄龍蛇衆木日凋槁由來命分爾泯滅豈足道赴江陵途中􅀉贈王二十􅀘闕李十一拾遺李二十六貟外翰林三學士或作􅀉三斈士題下注王二十􅀘闕李十一拾遺李二十六貟外方云蜀本无翰林字三斈士王涯李建李程也􅀌臣昔放逐血泣追愆􅀹血泣或作泣血或作血泫汗漫上捍下幔淮南子徙􅀝于汗漫之宇又曰吾與汗漫期于九垓之外注汗漫不可知云也不省識怳如乗桴浮或自疑上䟽上䟽豈其由或云自疑當作疑自謂疑由上䟽也故下文云上䟽豈其由當乙是年京師旱田畒少所収上憐民無食征賦半巳休征或作兵有司恤經費未免煩徴求冨者旣云急貧者固巳流傳聞閭里閒赤子弃渠溝持男易斗粟掉臂莫肯酬我時出衢路餓者何其稠其或作為親逢道邉死方云閣本作道邉死而从杭蜀作道死者今按古人謂尸為死左傳生拘石乞而問白公之死漢書何處求子死且古語又有直如弦死道􅁁之􅀃韓公盖兼用之此乃閣本之善而方反不从殊不可曉佇立乆咿嚘佇立或作停馬歸舎不能食有如魚中鉤中或作佳方从蜀本作出云選文賦若遊魚衘鉤而出重淵之深公語原此今按韓公末必用選語况其語乃魚出淵非魚出鉤也不若作挂為近然第五卷送劉師服詩有魚中鉤之語則此出字乃是中字之誤而尚存其彷彿耳今乃作中適㑹除御史誠當得言秋拜䟽移閤門爲忠寧自謀上陳人疾苦無令絶其喉或作􅃸下陳畿甸内陳或作言内方作事根本理宜優積雪驗豐熟幸寛待􅅙麰音牢來麰麥也天子惻然感司空正元十九年三月杜佑檢校司空同中書門下平章歎綢繆直留莫彪二切詩綢繆束薪注猶􅅶綿也謂言即施設乃反遷炎州反或作返州本又作洲方云古本只作州樊曰遷炎州謂貶陽山也舊史言公自監察御史上章数千言極論宫市德宗怒貶陽山令量移江陵府法曹參軍新史亦云上䟽論宫市今詩自序其得罪之由大抵言京師旱􅏇未甞言宫市惟皇甫持正神道碑云関巾旱飢先生力言天下根本專政者惡之出為陽山令正與詩意合持正當時從公遊者知公之不以論宫市而出審矣同宫盡才俊偏善柳與劉時柳宗元刘禹錫皆爲御史或慮語言􅂥傳之落􅁈讎二子不宜爾將疑斷還不方鳩切未定之辭中使臨門遣頃刻不得留病妺卧床褥妹或作姝分知隔明幽悲啼乞就别百請不頷頭弱妻抱稚子出拜忘慙羞僶俛不􅂞顧行行詣連州朝爲青雲士暮作白首囚商山季冬月冰凍絶行輈春風洞庭浪出没驚􅀌舟逾嶺到所任低顔奉君侯酸寒何足道隨事生瘡疣贅也荘子曰附贅垂疣逺地觸途異吏民似猨猴生獰尼耕切惡也李賀猛虎行乳孫哺子教得生獰多忿很多或作知辭舌紛嘲啁上陟交切下張流切鳥声也白日屋簷下雙鳴闘鵂鶹上音休下音留孫曰訓狐也有蛇􅀋兩首有蠱群飛游蠱或作蟲方云鮑明逺詩吹蟲病行暉李善曰吹蠱飛蠱也窮冬或揺扇盛夏或重裘􅄓音貝海風也南人呼為貝嶺南録異云嶺嶠夏秋雄風日颶發日午至夜半止起最可畏訇音轟大声選声訇其若振哮許交切祝曰豕驚声越絶書声若哮虎簸陵丘雷霆助光怪氣象難比侔癘疫忽潜遘十家無一瘳猜嫌動置毒對案輙懷愁前日遇恩赦私心喜還憂果然又覊縶陟立切祝曰係馬也不得歸耡耰音憂摩田器此府雄且大騰凌盡戈矛棲棲法曹椽何處事卑陬生平企仁義所學皆孔周早知大理官不列三后儔何况親犴音岸漢書義曰鄉亭之獄日犴獄􅃻丘交切搒音彭谷永曰搒笞㿊於炮蛒發姦偷懸知失事􅀔恐自罹􅆯罘上子邪切下音浮兎網湘水清且急凉風日脩脩胡爲首歸路旅泊尚夷猶楚辝君不行􅀆夷猶注猶豫也昨者京使至者或作日嗣皇孫曰正元二十一年順宗内禅憲宗即位也傳冕旒赫然下明詔首罪誅共吺或作兠方吺古文兠字也復聞顚夭輩韓謂當時杜黃裳鄭餘慶之徒爲相峨冠進鴻疇孫曰鴻大也疇謀也班行再肅穆璜半壁也周礼以玄璜礼北方珮鳴琅璆上音郎下音求璆琳尓雅注美玉琅玕注云似珠也佇継貞􅀚烈邊封脫兠鍪音牟三賢推侍從卓犖吕角切持逹也左思曰卓犖觀羣書傾枚鄒髙議參造化方作物非是清文煥皇猷恊心輔齊聖致理同毛輶音由詩曰德輶如毛小雅詠鳴鹿食苹音平水草貴􅊯􅊯音幽鹿鳴遺風邈不嗣豈憶甞同禂甞方作常方云禍與幬同床帳也或作儔或作稠皆非是韓曰裯被也樊曰公於三賢有同裯之舊故望之以鹿鳴之風也失志早衰換前期擬蜉蝣上房尤切下夷周切祝曰渠略也生糞土中朝生暮死自從齒牙缺始慕舌爲柔淮南子曰老子斈商容見舌而知柔注云刘向􅀃􅁐常從有疾老子往問焉張其口而示老子曰吾舌存乎老子曰然吾歯存乎老子曰亡子知之乎老子曰舌之存也豈非以其柔乎歯之亡也豈非以其剛乎曰嘻是巳因疾鼻又塞漸能等薫猶深思罷官去畢命依松楸音秋孫曰松楸舊隴也空懷焉能果但見歳巳遒音酋盡也殷湯閔禽獸觧網祝蛛蝥賈誼新書湯見設網者四面乃去其三面祝曰蛛蝥作網欲左左欲右右吾受其犯令者士民聞之曰德及禽獸而况我乎雷煥掘寳劒􅁈氛銷斗牛氛或作氣兹道誠可尚誰能借前籌殷勤謝吾友吾或作朋明月非暗投暮行河堤上暮行河堤上四顧不見人衰草際黃雲感歎愁我神夜歸􅀌舟卧展轉空及晨謀計竟何就嗟嗟丗與身夜歌静夜有清光閑堂仍獨息念身幸無恨志氣方自得樂哉何所憂所憂非我力或作可悲我才力重雲一首李􅀚疾贈之天行失其度方作天行令失度云公詩語多用此一体今按諸本皆作天行失其度文意自通公詩虽間有如方􅀃者然亦不專以此爲竒也隂氣來干陽重雲閉白日方作日夜非是炎燠成寒凉小人但咨怨君子惟憂傷飲食爲减少方作尚爲减非是身體豈寕康此志誠足貴懼非職所當職或作識方云張衡同聲􅁔賤妾職所當藜羮尚如此肉食安可嘗窮冬百草死幽桂乃芬芳且况天地間大運自有常􅂆君善飲食鸞鳯本髙翔江漢一首荅孟郊江漢雖云廣乗舟渡無艱或作難流沙信難行馬足常往還凄風結衝波狐裘能禦寒終宵處幽室華燭光爛爛或作炎炎方云楚辝爛字叶平声九章曰曽枝剡棘圓果􅅮􅀆青黃􅄂楺文章爛􅀆苟能行忠信行或作存可以居夷蠻嗟余與夫子此義毎所敦何爲復見贈繾綣上音遣下苦逺切不相離皃詩以謹繾綣在不諼許元切忘也長安交遊者一首贈孟郊長安交遊者貧富各有徒親朋相過時過或作遇亦各有以娯或作亦有以􅂬娯陋室有文史髙門有笙竽何能辨榮悴且欲分賢愚岐山下二首諸本只作一首方云自日暮邊火驚以上爲苐一篇丗有􅈅畦瑕語一書謂子斉􅀄應㪯韓公賞之爲作舟穴五色羽子斉姓程字昔範嘗著中謩謩卷見因話録則下詩似當為别篇第前詩題以岐山下此必遊鳯翔日作然四語亦不成篇此詩載之卷未疑有脫誤誰謂我有耳不聞鳯皇鳴朅丘傑切去也來岐山下日暮邉鴻驚鴻方作火今按上文言不聞鳯鳴則此當作鴻丹穴五色羽其名爲鳯皇昔周有盛德此鳥鳴髙岡和聲隨祥風窅窕相飄揚窅窕或作窅窅或作窈窕方本作窅窕而㪯正改窕為窈按窅即窈字旣連用之不應異躰或是窅字一作窈耳聞者亦何事但知時俗康自從公旦死公或作姬千載閟其光吾君亦勤理遲音治祝曰待也漢書側席遲士爾一來翔朱文公校昌􅀺先生集卷之一
