body:
  text: 書上宰相書正月二十七日前郷貢進士韓愈謹伏光範門下再拜獻書相公閤下書下或有于字方云時宰相趙憬賈耽盧邁也詩之序曰菁菁者莪樂育材也君子能長育人材則天下喜樂之矣或作也其詩曰菁菁者莪在彼中阿旣見君子樂且有儀􅀃者曰菁菁者盛也莪微草也阿大陵也言君子之長育人材􅀂大陵之長育微草能使之菁菁然盛也或无也字旣見君子樂且有儀云者天下美之之辭也其三章曰旣見君子􅃬我百朋􅀃者曰百朋多之之辭也或无下百朋字言君子旣長育人材又當爵命之賜之厚禄以寵貴之云爾賜之賜或作􅃬之或作以其卒章曰汎汎楊舟載沈載浮旣見君子我心則休􅀃者曰載載也沈浮者物也載載也或作載者載也或作載者舟也或作載舟也言君子之於人才無所不取􅀂舟之於物浮沈皆載之云爾旣見君子我心則休云者言􅀂此則天下之心美之也心上或无之字君子之於人也旣長育之又當爵命寵貴之而於其才無所遺焉孟子曰君子有三樂王天下不與存焉其一曰樂得天下之英才而敎育之此皆聖人賢士之所極言至論古今之所宜法者也然則孰能長育天下之人材將非吾君與吾相乎孰能敎育天下之英才將非吾君與吾相乎然則下或无孰能至相乎十七字方云歐本二存此則与後相應然亦无孰長人三字則非是幸今天下無事小大之官各守其職或作所錢榖甲兵之問不至於廟堂論道經􅀖之暇捨此宜無大者焉今有人生二十八年矣名不著於農工商賈之版其業則讀書著文歌頌堯舜之道雞嗚而起孜孜焉亦不爲利或無而字其所讀皆聖人之書揚墨釋老之學無所入於其心其所著皆約六經之㫖而成文抑邪與正辨時俗之所惑与或作㒷居窮守約方天守字亦時有感激怨懟音墜竒怪之辭以求知於天下亦不悖於敎化妖􅁋䛕佞譸張譸音輈張誑也之􅀃無所出於其中四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畒之宫其可懷宫或作宅方云一畒之宫本儒行語公苗蕃誌无宫以歸今本亦誤今按二字无大利害公用儒行語亦或有之然謂其專用宮字而不得更用宅字則固矣遑遑乎四海無所歸恤恤乎飢不得食寒不得衣濵於死而益固得其所者爭􅀏之忽將棄其舊而新是圖求老農老圃而爲師悼本志之變化中夜涕泗交頥雖不足當詩人孟子之謂抑長育之使成材其亦可矣教育之使成才其亦可矣子之下或有所字抑又聞古之君子相其君也之字或在君子下或子下别有之字一夫不􅀗其所􅀂已推而内之溝中今有人生七年而學聖人之道以修其身積二十年不得巳一朝而毀之是亦不􅀗其所矣十下或有一字伏念今有仁人在上位􅀂不往告之而遂行是果於自棄而不以古之君子之道待吾相也其可乎寧往告焉􅀂不得志則命也其亦行矣志上或有其字今疑志字衍洪範曰凡厥庶民有猷有爲有守汝則念之不恊于極不罹于咎皇則受之二不字方並作弗也而康而色曰予攸好德汝則􅃬之福是皆與善之辭也抑又聞古之人有自進者而君子不逆之矣曰予攸好德汝則􅃬之福之謂也君上或无而字抑又聞上之設官制禄必求其人而授之者非苟慕其才而富貴其身也方无貴字蓋將用其能理不能用其明理不明者耳下之修已立誠必求其位而居之者非苟没於利而榮於名也没或作役方云囯語重耳不没於利主没貪也蓋將推巳之所餘以濟其不足者耳然則上之於求人下之於求位交相求而一其致焉耳一其致或作其致一苟以是而爲心則上之道不必難其下下之道不必難其上可舉而舉焉不必讓其自舉也譲下或有於字可進而進焉不必廉於自進也於下或有其字抑又聞上之化下得其道則􅂆賞不必徧加乎天下而天下從焉化上方无之字則方作其疑當併有則其字因人之所欲爲而遂推之之謂也方作矣今天下不由吏部而仕進者幾希矣主上感傷山林之士有逸遺者屡詔内外之臣旁求於四海而其至者蓋闕焉求下方有儒雅字雅亦或作士豈其無人乎哉亦見國家不以非常之道禮之而不來耳家下方有之字彼之處隱就閒者亦人耳其耳目鼻口之所欲其心之所樂其體之所安豈有異於人乎哉今所以惡衣食窮體膚麋鹿之與處猨狖之與居固自以其身不能與時從順俯仰故甘心自絶而不悔焉从方作俗今按後卷与馮􅀫書云委曲从順向風承意則諸本作从順者固韓公常用之語也方本語意拙澁非是而方聞國家之仕進者必舉於州縣然後升於禮部吏部聞下或有今字試之以繡繪雕琢之文考之以聲􅀔之逆順章句之短長中其程式者然後得從下士之列雖有化俗之方安邊之畫不繇是而稍進萬不有一得焉進下或有者字彼惟恐入山之不深入林之不宻其影響昧昧惟恐聞於人也惟恐或作之恐或无此二字今􅀂聞有以書進宰相而求仕者而宰相不辱焉而薦之天子而爵命之而布其書於四方進或作上而宰而爵或並无而字而復出天子二字方无於字枯槁沈溺魁閎寛通之士必且洋洋焉動其心峨峨焉纓其冠于于焉而來矣此所謂􅂆賞不必徧加乎天下而天下從焉者也因人之所欲爲而遂推之之謂者也伏惟覧詩書孟子之所指念育才􅃬福之所以考古之君子相其君之道而忘自進自舉之罪思設官制禄之故以誘致山林逸遺之士庻天下之行道者知所歸焉歸上方有依字小子不敢自幸其嘗所著文輒採其可者􅀂干首録在異卷冀辱賜􅀚焉或无敢字或无冀字冀辱或作伏垂干黷尊嚴伏地待罪愈再拜後十九日復上書二月十六日前郷貢進士韓愈謹再拜言相公閤下向上書及所著文後待命凡十有九日不得命恐懼不敢逃遁不知所爲方无向字及逃字从乃復敢自納於不測之誅以求畢其􅀃而請命於左右愈聞之蹈水火者之求􅊵於人也不惟其父兄子弟之慈愛然後呼而望之也將有介於其側者雖其所憎怨苟不至乎欲其死者則將大其聲疾呼而望其仁之也仁或作人而之下有救字或作人而下无之字今按此􅀂作人之救則正与下句全字爲對而下文再曡其語亦以二字相對但斍其語差凡故今且从方本注彼介於其側者聞其聲而見其事不惟其父兄子弟之慈愛然後往而全之也雖有所憎怨苟不至乎欲其死者則將狂奔盡氣濡手足焦毛髮救之而不辭也􅀂是者何哉其􅀔誠急而其情誠可悲也愈之彊學力行有年矣愚不惟道之險夷愚上或有其字而愚下有也字也又或作甚或有其字而无也甚二字行且不息以蹈於窮餓之水火其旣危且亟矣大其聲而疾呼矣後廿九日復上書三月十六日前郷貢進士韓愈謹再拜言相公閤下愈聞周公之爲輔相其急於見賢也方一食三吐其哺方一沐三捉其髪輔相下或有也字其急或无其字捉或作握也當是時天下之賢才皆巳舉用姦邪䜛佞欺􅀒之徒皆巳除去姦下方有人字无欺字非是四海皆巳無虞九夷八蠻之在荒服之外者皆巳賔貢之在或无之字天災時變昆蟲草木之妖皆巳銷息天下之所謂禮樂刑政敎化之具皆巳脩理風俗皆巳敦厚動植之物風雨霜露之所霑􅀍者皆巳得宜休徴嘉瑞麟鳯􅀛龍之属皆巳備至而周公以聖人之才慿叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢於周公而巳豈復有賢於時百執事者哉豈復有所計議能􅀘於周公之化者哉然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以􅀒成王託周公之意不得於天下之心託周公疑此周公字當是囯字意下方有以字如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則將不暇食與沐矣豈特吐哺捉髮爲動而止哉維其如是故于今頌成王之德而稱周公之功不衰今閤下爲輔相亦近耳天下之賢才豈盡㪯用姦邪䜛佞欺􅀒之徒豈盡除去方无侫欺字四海豈盡無虞九夷八蠻之在荒服之外者豈盡賔貢天災時變昆蟲草木之妖豈盡銷息天下之所謂禮樂刑政敎化之具豈盡脩理風俗豈盡敦厚動植之物風雨霜露之所霑􅀍者豈盡得宜休徴嘉瑞麟鳯􅀛龍之属豈盡備至其所求進見之士雖不足以希望盛德至比於百執事豈盡出其下哉其所稱􅀃豈盡無所􅀘哉至比或作如比今雖不能如周公吐哺捉髪亦宜引而進之察其所以而去就之不宜黙黙而巳也愈之待命四十餘日矣餘日或作日餘書再上而志不得通足三及門而閽人辭焉惟其昏愚不知逃遁故復有周公之􅀃焉閤下其亦察之或无此六字古之士三月不仕則相弔故出疆必載質然所以重於自進者以其於周不可則去之魯於魯不可則去之齊於齊不可則去之宋之鄭之秦之楚也之魯之斉之下或並有於字則去之宋方无則字今天下一君四海一國舎乎此則夷狄矣去父母之􅀖矣故士之行道者不得於朝則山林而已矣道下一有也字山林者士之所獨善自養而不憂天下者之所能安也如有憂天下之心則不能矣故愈毎自進而不知愧焉書亟上足數及門而不知止焉寕獨如此而巳惴惴焉惟不得出大賢之門下是懼亦惟少垂察焉不得上或有恐字瀆冒威尊惶恐無巳威尊或作尊威无巳方作无文非是愈再拜答侯繼書韓曰正元八年継与公同登進士第十一年公上宰相書不報遂東歸作是書且云懼足下以字退歸因謂不復能自強不息故因書奉曉公時自勵如此此其所以卒爲唐儒宗斈者仰之如山斗云裴子自城來得足下一書明日又於崔大處得足下陜音閃漢弘農之陜縣州所留書翫而復之不能自休㝷知足下不得留僕又爲考官所辱欲致一書開足下并自舒其所懷含意連辭將發復巳卒不能成就其􅀃開或作聞及得足下二書凡僕之所欲進於左右者足下皆以自得之方无以字今按以巳通晋宋人書帖多用以字僕雖欲重累其辭諒無居足下之意外者故絶意不爲虽欲或作虽復方无之意二字行自念方當逺去潜深伏隩音郁水内日隩與時丗不相聞行或作亦當或作將隩或作奥或无丗字今按行疑當作復雖足下之思我無所窺㝷其聲光故不得不有書爲别非復有所感發也僕少好學問自五經之外百氏之書未有聞而不求得而不􅀚者然其所志惟在其意義所歸至於禮樂之名數隂陽土地星辰方藥之書未嘗一得其門户方无方薬二字雖今之仕進者不要此道然古之人未有不通此而能爲大賢君子者子下或有事字者下或有也字僕雖庸愚毎讀書輒用自愧今幸不爲時所用無朝夕役役之勞將試學焉力不足而後止猶將愈於汲汲於時俗之所爭旣不得而怨天尤人者此吾今之志也此句或无今字懼足下以吾退歸因謂我不復能自彊不息方无我字故因書奉曉冀足下知吾之退未始不爲進而衆人之進未始不爲退也或无兩之字不爲方並作為不旣貨馬即求船東下二事皆不過後月十日有相問者爲我謝焉月十日或只作旬字方无我字此下或有愈再拜字答崔立之書斯立足下僕見險不能止動不得時䫟頓狼狽失其所操持困不知變以至辱於再三君子小人之所憫笑天下之所背而馳者也方无至字及也字足下猶復以爲可敎貶損道德乃至手筆以問之扳援古昔辭義髙逺且進且􅂆足下之於故舊之道得矣之於上或无之字得下或有之字雖僕亦固望於吾子不敢望於他人者耳然尚有似不相曉者非故欲發余乎不然何子之不以丈夫期我也方无之字不能黙黙聊復自明自明或作明白僕始年十六七時未知人事讀聖人之書以爲人之仕者皆爲人耳非有利乎已也及年二十時苦家貧衣食不足謀於所親然後知仕之不唯爲人耳及來京師見有舉進士者人多貴之僕誠樂之就求其術或出禮部所試賦詩䇿等以相示賦詩或作詩賦僕以爲可無學而能因詣州縣求舉有司者好惡出於其心四舉而後有成亦未即得仕司下或无者字聞吏部有以􅀶學宏辭選者人􅀹謂之才且得美仕就求其術或出所試文章亦禮部之􅀋私怪其故然猶樂其名因又詣州府求舉凡二試於吏部一旣得之而又黜於中書雖不得仕人或謂之能焉退自取所試讀之乃􅀋於徘優者之辭顔忸怩而心不寕者數月退下或有因字􅀋於或作􅀋乎旣巳爲之則欲有所成就書所謂恥過作非者也所成方无此二字或无所字因復求舉亦無幸焉乃復自疑以爲所試與得之者不同其程度及得􅀚之余亦無甚愧焉夫所謂􅀶學者豈今之所謂者乎夫所謂宏辭者豈今之所謂者乎誠使古之豪傑之士􅀂屈原孟軻司馬迁相如􅀭雄之徒進于是選必知其懷慙乃不自進而巳耳或无相如二字設使與夫今之善進取者競於蒙昧之中僕必知其辱焉或无進者三字然彼五子者且使生於今之丗其道雖不􅂋於天下其自􅀒何如哉五或作数生或作出肯與夫斗筲者決得失於一夫之目而爲之憂樂哉故凡僕之汲汲於進者其小得蓋欲以具裘􅁑養窮􅀌其大得蓋欲以同吾之所樂於人耳具或作完窮􅀌或作􅀌窮其他可否自計巳熟誠不待人而後知今足下乃復比之獻玉者以爲必竢工人之剖然後見知於天下雖兩刖足不爲病且無使勍者再剋誠足下相勉之意厚也玉人或作良工方无見字兩刖或作刖两刖足下或有而字病方作痛或作疾尅或作刖下同然仕進者豈捨此而無門哉足下謂我必待是而後進者尤非相悉之辭也後進或作後辰尤非方作非尤非是僕之玉固未嘗献而足固未嘗刖足下無爲爲我戚戚也或无足下字或无復出爲字或併无二爲字非是方今天下風俗尚有未及於古者邊境尚有􅀍甲執兵者境或作地或无境字主上不得怡而宰相以爲憂僕雖不賢亦且潜究其得失或无其字致之乎吾相薦之乎吾君上希卿大夫之位下猶取一障而乗之􅀂都不可得猶將耕於寛閑之野釣於寂寞之濵求國家之遺事考賢人哲士之終始終上或有所字作唐之一經垂之於無窮誅姦䛕於旣死發潜德之幽光二者將必有一可足下以爲僕之玉凡幾献而足凡幾刖也又所謂勍者果誰哉再尅之刑信如何也冊或作形士固信於知巳微足下無以發吾之狂言信或作伸吾下或无之字愈再拜答李翊書六月二十六日或无此六字愈白李生足下生之書辭甚髙而其間何下而恭也而恭或作之恭非是能如是誰不欲告生以其道道德之歸也有日矣況其外之文乎外或作餘非是抑愈所謂望孔子之門牆而不入于其宫者焉足以知是且非邪者下或有也字焉或作鳥雖然不可不爲生言之生所謂立言者是也或无者字生所爲者與所期者甚似而幾矣抑不知生之志蘄勝於人而取於人邪將蘄至於古之立言者邪取於人或无於字下三語同蘄勝於人而取於人則固勝於人而可取於人矣將蘄至於古之立言者則無望其速成無誘於􅀔利言者下或有邪字非是養其根而竢其實加其膏而希其光根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也抑又有難者愈之所爲不自知其至猶未也至或作志雖然學之二十餘年矣始者非三代兩漢之書不敢􅀚非聖人之志不敢存餘年方作年餘兩或作秦處􅀂忘行􅀂遺儼乎其􅀂思茫乎其􅀂迷當其取於心而注於手也惟陳言之務去戞戞乎其難哉其􅀚於人不知其非􅀏之爲非笑也人下或有也字如是者亦有年猶不改然後識古書之正僞與雖正而不至焉者昭昭然白黒分矣而務去之乃徐有得也當其取於心而注於手也汨汨然來矣其􅀚於人也􅀏之則以爲喜譽之則以爲愛以其猶有人之􅀃者存也二則字下或並有心字如是者亦有年然後浩乎其沛然矣吾又懼其雜也迎而距之平心而察之其皆醇也然後肆焉後或作后雖然不可以不養也行之乎仁義之途游之乎詩書之源無迷其途無絶其源終吾身而巳矣源或作府无絶其源亦作无虚其府氣水也言浮物也水大而物之浮者大小畢浮氣之與言猶是也氣盛則言之短長與聲之髙下者皆宜雖如是其敢自謂幾於成乎雖幾於成其用於人也奚取焉雖然待用於人者其肖於器邪用與舎屬諸人或无邪字而有則時用焉四字或併有邪字君子則不然處心有道行已有方用則施諸人舎則傳諸其徒垂諸文而爲後丗法如是者其亦足樂乎其無足樂也施諸或作垂諸也方作乎有志乎古者希矣志乎古必遺乎今吾誠樂而悲之上古字下或有人字亟稱其人所以􅂆之非敢褒其可褒而貶其可貶也問於愈者多矣念生之言不志乎利聊相爲言之愈白重答翊書荅下或有李字愈白李生生之自道其志可也其所疑於我者非也人之來者雖其心異於生其於我也皆有意焉君子之於人無不欲其入於善入方从杭本作人非是寜有不可告而告之孰有可進而不進也言辭之不酬禮貌之不答雖孔子不得行於互郷宜乎余之不爲也方从三本无於字非是余或作愈苟來者吾斯進之而巳矣鳥待其禮踰而情過乎雖然生之志求知於我邪求益於我邪其思廣聖人之道邪其欲善其身而使人不可及邪其何汲汲於知而求待之殊也其思上或有求字及邪或作及也賢不肖固有分矣生其急乎其所自立而無患乎人不已知未嘗聞有響大而聲微者也况愈之於生懇懇邪屬有腹疾無聊不果自書属卞或无有字不下方无果字愈白代張籍與李浙東書或作浙東觀察李中丞或注巽字月日前某官某謹東向再拜寓書浙東􅀚察使中丞李公閤下寓或作献或无使字籍聞議論者皆云方今居古方伯連帥之職生一方得專制於其境内者惟閤下心事犖犖與俗輩不同籍固以藏之胷中矣云上方无皆字云下方无方字又无簡字近者閤下從事李恊律翶到京師籍於李君友也友上或有朋字不見六七年聞其至馳往省之問無恙外不睱出一言且先賀其得賢主人李君曰子豈盡知之乎吾將盡言之言下无之字數日籍益聞所不聞不聞或作未嘗籍私獨喜常以爲自今巳後不復有如古人者於今忽有之巳或作以退自悲不幸兩目不見物無用於天下退下或有而字胷中雖有知識家無錢財寸歩不能自致今去李中丞五千里何由致其身於其人之側開口一吐出胷中之竒乎因飲泣不能語人或作身非是方无能字旣數日復自奮曰無所能人乃宜以盲廢有所能人雖盲當廢於俗輩不當廢於行古人之道者曰或作目非是所能或並无所字浙水東七州戸不下數十萬不盲者何限十方作百李中丞取人固當問其賢不賢不當計盲與不盲也計下或有其字當今盲於心者皆是􅀂籍自謂獨盲於目爾其心則能别是非􅀂賜之坐而問之其口固能言也别上或有計字是非方作非是幸未死實欲一吐出心中平生所知見閤下能信而致之於門邪方无心中字或无見字致或作置字籍又善於古詩樊日白楽天贈復詩云張君何為者業文三十春亢工楽府詞斈代少其倫字使其心不以憂衣食亂閤下無事時一致之座側使跪進其所有閤下慿几而聽之未必不如聽吹竹彈絲􅃻金擊石也於或作為進其或作進籍方云校本一云􅃻當憐敵唐人多使敵字如盧仝詩敵金摐玉擊或作材或无之今按方云敵字甚怪所引盧仝詩當亦是誤本耳夫盲者業專於藝必口故樂工皆盲諸本專字在必字下今从文􅁐但文􅁐必作也而下缺一字疑是精字更詳之籍儻可與此輩比並乎或无籍字或无比乎二字今按並字疑倫使籍誠不以蓄妻子憂飢寒亂心有錢財以濟醫藥其盲未甚庶幾其復見天地日月因得不廢則自今至死之年皆閤下之賜幾下或无其字賜下或有也字閤下濟之以巳絶之年賜之以旣盲之視其恩輕重大小籍宜如何報也閤下裁之度之裁下或无之字籍慙見音腆面靣慙再拜答李秀才書李下或有師􅃬字方注圗南字愈白故友李􅀚元賔十年之前示愈别呉中故人詩六章其首章則吾子也盛有所稱引元賔行峻㓗清其中狹隘不能苞容於㝷常人不肯苟有論􅀃因究其所以於是知吾子非庸衆人苞或作包或有復出庸字或作庸庸之衆時吾子在呉中其後愈出在外無因縁相見元賔旣殁其文益可貴重思元賔而不見見元賔之所與者則如元賔焉杭本无旣没以下八字非是与方作以仐按方以以与可通用故从杭本作以然孰􅀂从諸本之為正邪今者辱惠書及文章􅀚其姓名元賔之聲容怳􅀂相接讀其文辭見元賔之知人交道之不汚文辝方从閤杭本作命辝云元賔所命意於辞也今按此文辝指李生所作耳非謂元賔之辝也正使实謂元賔之辝作命辝亦无理甚矣子之心有似於吾元賔也矣或作乎於或作乎子之言以愈所爲不違孔子不以􅅣雕爲工將相從於此愈敢自愛其道而以辭譲爲事乎然愈之所志於古者不惟其辭之好好其道焉爾讀吾子之辭而得其所用心將復有深於是者與吾子樂之况其外之文乎与或作欤属上句非是愈頓首答陳生書生下或有啇字或注師􅃬字愈白陳生足下今之􅀒名譽享􅂋榮者在上位幾人足下求速化之術不於其人乃以訪愈是所謂借聽於聾求道於盲雖其請之勤勤敎之云云未有見其得者也或无有字今按有字或當在此句其字下愈之志在古道又甚好其言辭􅀚足下之書及十四篇之詩亦云有志於是矣而其所問則名所慕則科故愈疑於其對焉雖然厚意不可虚辱聊爲足下誦其所聞蓋君子病乎在已而順乎在天待已以信而事親以誠所謂病乎在已者仁義存乎内彼聖賢者能推而廣之而我蠢焉爲衆人蠢焉或作蠢然所謂順乎在天者貴賤窮通之來平吾心而隨順之不以累于其􅀄謂下閤杭本无順字非是所謂待已以信者已果能之人曰不能勿信也已果不能人曰能之勿信也孰信哉信乎巳而巳矣方从閤杭本无果下至信也十字文録併上已字亦无今按此閤杭本之謬全无文理而方信之誤矣所謂事親以誠者盡其心不夸於外先乎其質後乎其文者也後上或有而字盡其心不夸於外者不以已之得於外者爲父母榮也名與位之謂也先乎其質者行也後乎其文者飲食㫖甘以其外物供養之道也行上或有文字㫖甘或作甘㫖道下或有者字非是誠者不欺之名也待於外而後爲養薄於質而厚於文斯其不􅀋於欺歟果􅀂是子之汲汲於科名以不得進爲親之羞者惑也速化之術如是而巳古之學者惟義之問誠將學於太學愈猶守是􅀃而竢見焉猶或作獨見下或有知字方云見胡甸切公時爲􅀶士也愈白與李翺書与或作荅使至辱足下書歡愧來并不容于心或无足下字嗟乎子之言意皆是也僕雖巧􅀃何能逃其責邪然皆子之愛我多重我厚不酌時人待我之情而以子之待我之意使我望於時人也僕之家本窮空重遇攻刼衣服無所得養生之具無所有家累僅三十口攜此將安所歸託乎捨之入京不可也挈之而行不可也足下將安以爲我謀哉此句方无將字此一事耳足下謂我入京城有所益乎謂上或有誠字城或作誠僕之有子猶有不知者時人能知我哉之下或有所字持僕所守驅而使奔走伺候公卿閒開口論議其安能有以合乎驅方作執今後作驅即属下句作執即属上句詳下文亦有復驅之使就其故地之文而待守執三字語太繁復故當以驅為正僕在京城八九年無所取資日求於人以度時月當時行之不覺也今而思之如痛定之人思當痛之時不知何能自處也今年加長矣復驅之使就其故地是亦難矣長下或有巳字非是所貴乎京師者不以明天子在上賢公卿在下布衣韋帶之士談道義者多乎不以上或有得字以僕遑遑於其中能上聞而下逹乎其知我者固少知而相愛不相忌者又加少内無所資外無所從終安所爲乎知下或无我字資上方无所字從或作縱嗟乎子之責我誠是也愛我誠多也今天下之人有如子者乎或无今字自堯舜巳耒士有不遇者乎無也子獨安能使我㓗清不洿而處其所可樂哉方无处字非不願爲子之所云者力不足􅀔不便故也爲或作僕於此豈以爲大相知乎累累隨行役役逐隊飢而食飽而嬉者也飽而嬉或作飽而悲方从杭本作而悲云悲者悲其不得所從故也皆非是其所以止而不去者以其心誠有愛於僕也然所愛於我者少不知我者猶多吾豈樂於此乎哉將亦有所病而求息於此也所愛或作其爰少上或有尤字非是知下方有於字猶或作尤非是吾下或无豈字嗟乎子誠愛我矣子之所責於我者誠是矣然恐子有時不暇責我而悲我不暇悲我而自責且自悲也及之而後知履之而後難耳孔子稱顔回一簞食一瓢飲人不堪其憂回也不改其樂孔子上或有昔者字瓢飲下或有在陋巷字彼人者有聖者爲之依歸而又有簞食瓢飲足以不死其不憂而樂也豈不易哉聖上或无有字依上方无之字若僕無所依歸無簞食無瓢飲無所取資則餓而死其不亦難乎子之聞我言亦悲矣嗟乎子亦愼其所之哉離違乆年還侍左右當日􅌚喜故専使馳此候足下意并以自解此候方从杭本作候此今按此与与孟東野書春且持尽相似􅀃巳見於彼矣愈冉拜未文公校昌􅀺先生集卷之十六
