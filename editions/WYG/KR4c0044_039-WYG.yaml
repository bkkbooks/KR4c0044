front:
  text: 三十九
  hash: sha256:7b0b97a622fca679317b65abe6ca71ca68aac16e8f41f1618e2c522489bdf2e6
body:
  text: 宋王伯大重編表狀論捕賊行賞表臣愈言臣伏見六月八日勅以狂賊傷害宰臣擒捕未獲陛下悲傷震悼形於寢食特降詔書明立條格云有能捉獲賊者賜錢萬貫仍加超授今下手賊等四分之内已得其三其餘兩人盖不足計根尋踪跡知自承宗再降明詔絶其朝請又與王士則士平等官八日之制無不行者士則士平或作士平士則獨有賞錢尚未給賜羣情疑惑未測聖心獨上或有内字聞初載錢置市之日市中觀者日數萬人巡繞瞻視咨嗟歎息既去復來以至日暮百姓小人重財輕義不能深達事體但見不給其賞便以為朝廷愛惜此錢不守言信自近傳逺無由辯明且出賞所以求賊今賊已誅斬若無人捉獲國家何因得此賊而正刑法也承宗何故而賜誅絶也士則士平何故與美官也因或作由三事既因獲賊獲賊必有其人不給賞錢實亦難曉假如聖心獨有所見審知不合加賞其如天下百姓及後代乆逺之人哉方無之人字况今元濟承宗尚未擒滅兩河之地大半未收隴右河西皆没戎狄所宜大明約束使信在言前號令指麾以圖功利况自陛下即位已來繼有丕績已或作以下同斬楊惠琳收夏州斬劉闢收劍南東西川斬李錡收江東縛盧從史收澤潞等五州威徳所加兵不汙刃收魏博等六州致張茂昭張愔收易定徐泗濠等五州創業以來列聖功徳未有能髙於陛下者可謂赫赫巍巍光照前後矣此由天授陛下神聖英武之徳為巨唐中興之君由上或有皆字宗廟神靈所共祐助勉强不已守之以信或作道則故地不足收而太平不難致如乘快馬行平路遲速進退自由其心有所欲往無不可者於此之時特宜示人以信孔子欲存信去食人非食不生尚欲捨生以存信况可無故而輕棄也昔秦孝公用商鞅為相欲富國强兵行令於國恐人不信立三丈之木于市南門募人有能徙置北門者與五十金有一人徙之輒與五十金秦人以君言為必信法令大行國富兵强無敵天下三丈之木非難徙也徙之非有功也孝公輒與之金者所以示其言之必信也言為必信言之必信方從閣杭本兩句皆無信字無理甚明亦足以見二本之謬矣昔周成王尚小與其弟叔虞為戲削梧葉為珪曰以晉封汝其臣史佚因請擇日立叔虞為侯成王曰吾與之戲耳史佚曰天子無戲言言之則史書之禮成之樂歌之於是遂封叔虞于晉擇方從杭本作澤又見杭本之謬昔漢髙祖出黄金四萬斤與陳平恣其所為不問出入令謀項羽平用金間楚數年之間漢得天下論者皆言漢髙祖深達於利能以金四萬斤致得天下達或作逺以此觀之自古以來未有不信其言而能有大功者亦未有不費少財而能收大利者也方無亦未至利者十三字今按文意上文引秦孝公周成王事故此以未有不信而能成大功結之又引漢髙祖事故此以未有不小費而能收大利結之不可欠闕方本但以酷信閣本之故不問可否直行刪去舉正亦不復載殊為無理今悉補而足之臣於告賊之人本無恩義彼雖獲賞了不關臣所以區區盡言不避煩黷者欲令陛下之信行於天下也告或作捕伏望恕臣愚陋僻憃之罪而收其懇欵誠至之心天下之幸非臣之幸也謹奉表以聞臣愈誠惶誠恐論佛骨表臣某言伏以佛者夷狄之一法耳自後漢時流入中國上古未嘗有也伏以或作臣伏聞或作臣聞流上舊史有始字新史流作始昔者黄帝在位百年年百一十嵗或作一百十少昊在位八十年年百嵗或作一百顓頊在位七十九年年九十八嵗新史無八字方云考之世紀非也帝嚳音酷髙辛氏在位七十年年百五嵗帝堯在位九十八年年百一十八嵗百五嵗百一十八嵗二語上或皆有一字帝舜及禹年皆百嵗新史舜下有在位字方云以上多帝王世紀之文此時天下太平百姓安樂夀考然而中國未有佛也而下方有此時二字舊史無然而此三字今從新史其後殷湯亦年百嵗湯孫太戊在位七十五年武丁在位五十九年書史不言其年夀所極推其年數盖亦俱不減百嵗五十九年新舊史無九字脱也言方作定新舊史皆無年所極三字方本無推其年數四字今從新舊史方本俱下有年字二史併無俱字周文王年九十七嵗武王年九十三嵗穆王在位百年此時佛法亦未入中國非因事佛而致然也入或作至漢明帝時始有佛法明帝在位纔十八年耳或無耳字其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促惟梁武帝在位四十八年前後三度捨身施佛宗廟之祭不用牲牢晝日一食止於菜果其後竟為侯景所逼餓死臺城國亦尋滅八或作九方云新舊史梁書亦可考晝新舊史作盡事佛求福乃更得禍乃或作反乃更或作乃反由此觀之佛不足事亦可知矣事上或有信字新舊史無事字有信字髙祖始受隋禪則議除之當時羣臣材識不逺不能深知先王之道古今之宜推闡聖明以救斯弊其事遂止臣常恨焉材識新舊史作識見知新舊史作究聖明或作明聖伏惟睿聖文武皇帝陛下神聖英武數千百年已來未有倫比即位之初即不許度人為僧尼道士又不許創立寺觀不上方無即字創上方無許字新舊史創作别臣常以為髙祖之志必行於陛下之手今縱未能即行豈可恣之轉令盛也常新舊史作當時二字新史無轉字今聞陛下令羣僧迎佛骨於鳳翔御樓以觀舁入大内又令諸寺遞迎供養臣雖至愚必知陛下不惑於佛作此崇奉以祈福祥也迎新史作加或作相直以年豐人樂徇人之心為京都士庶設詭異之觀戲玩之具耳安有聖明若此而肯信此等事哉年豐人樂新舊史作豐年之樂或無設字然百姓愚冥易惑難曉茍見陛下如此將謂真心事佛皆云天子大聖猶一心敬信百姓何人豈合更惜身命云上或無皆字敬信新史作信向何人新舊史作微賤豈合更惜方無豈合字而有於佛二字舊史無更字今從新史焚頂燒指百十為羣解衣散錢自朝至暮轉相倣傚惟恐後時老少奔波棄其業次焚頂上新史有以至字舊史有所以字謝本作以至無故新舊史焚作灼燒作燔少作幼業次作生業若不即加禁遏更歴諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也或無臠字夫佛本夷狄之人與中國言語不通衣服殊製口不言先王之法言身不服先王之法服不知君臣之義父子之情佛上新舊史無夫字下或有者字不言新舊史作不道假如其身至今尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賔一設賜衣一襲衛而出之於境不令惑衆也新舊史無至今二字奉下或無其字而出之於或無而於二字或無之字惑下舊史有於字新史惑作貳誤也况其身死已乆枯朽之骨凶穢之餘豈宜令入宫禁令新舊史作以孔子曰敬鬼神而逺之古之諸侯行弔于其國尚令巫祝先以桃茢音列祝曰記君臨臣喪以巫祝桃茢惡之也鄭注桃鬼所惡茢葦苕可掃不祥祓除不祥然後進弔今無故取朽穢之物親臨觀之巫祝不先桃茢不用羣臣不言其非御史不舉其失臣實恥之祓閣杭蜀本作拂乞以此骨付之有司投諸水火永絶根本斷天下之疑絶後代之惑付下方無之字新舊史作付之水火無有司投諸四字或無代字後新史作前使天下之人知大聖人之所作為出於尋常萬萬也豈不盛哉豈不快哉新史無此二語佛如有靈能作禍祟凡有殃咎宜加臣身上天鑒臨臣不怨悔無任感激懇悃之至祟或作福謹奉表以聞臣某誠惶誠恐潮州刺史謝上表或無刺史字臣某言臣以狂妄戇愚不識禮度上表陳佛骨事言涉不敬正名定罪萬死猶輕新史作莫塞陛下哀臣愚忠恕臣狂直謂臣言雖可罪心亦無他特屈刑章以臣為潮州刺史既免刑誅又獲禄食聖恩𢎞大天地莫量破腦刳心豈足為謝臣某誠惶誠恐頓首頓首臣以正月十四日䝉恩除潮州刺史即日奔馳上道經陟嶺海水陸萬里正上或有今年字上道或作就路以今月二十五日到州上訖與官吏百姓等相見具言朝廷治平天子神聖威武慈仁子養億兆人庶無有親疎逺邇方無具字雖在萬里之外嶺海之陬待之一如畿甸之間輦轂之下有善必聞有惡必見早朝晚罷兢兢業業惟恐四海之内天地之中一物不得其所故遣刺史面問百姓疾苦茍有不便得以上陳面或作親國家憲章完具為治日乆守令承奉詔條違犯者鮮雖在蠻荒無不安泰聞臣所稱聖徳惟知鼓舞讙呼不勞施為坐以無事臣某誠惶誠恐頓首頓首臣所領州在廣府極東界上去廣府雖云纔二千里然來往動皆經月過海口下惡水濤瀧壯猛難計程期經舊史作逾程期新舊史作期程􅄓風鰐魚患禍不測州南近界漲海連天毒霧瘴氛日夕發作州南近界或作州之南境臣少多病年纔五十髮白齒落理不乆長加以罪犯至重所處又極逺惡憂惶慙悸死亡無日單立一身朝無親黨居蠻夷之地與魑魅為羣茍非陛下哀而念之誰肯為臣言者為羣新舊史作同羣臣受性愚陋人事多所不通惟酷好學問文章未嘗一日暫廢實為時輩所見推許舊史無所見字許或作表臣於當時之文亦未有過人者至於論述陛下功徳與詩書相表裏作為歌詩薦之郊廟紀泰山之封鏤白玉之牒鋪張對天之閎休揚厲無前之偉蹟編之乎詩書之䇿而無愧措之乎天地之間而無虧雖使古人復生臣亦未肯多讓乎新舊史並作於雖使作縱臣亦新舊史並無亦字多讓新史無多字杭本併無二字尤非是伏以大唐受命有天下四海之内莫不臣妾南北東西地各萬里大新史作皇自天寶之後政治少怠文致未優武剋不剛孽臣姦𨽻蠧居棊處揺毒自防外順内悖父死子代以祖以孫如古諸侯自擅其地不貢不朝六七十年變舊史作復孽或作嬖不貢不朝新舊史作不朝不貢四聖傳序以至陛下陛下即位已來躬親聴斷旋乾轉坤關機闔闢雷厲風飛日月所照天戈所麾莫不寧順大宇之下生息理極寧新舊史作從髙祖創制天下其功大矣而治未太平也太宗太平矣而大功所立咸在髙祖之代非如陛下承天寶之後接因循之餘六七十年之外赫然興起南面指麾而致此巍巍之治功也巍下方無之字治功作功治宜定樂章以告神明東巡泰山奏功皇天具著顯庸明示得意使永永年代服我成烈年下方無代字舊史年代作萬年當此之際所謂千載一時不可逢之嘉㑹際或作時一上或有之字而臣負罪嬰舋自拘海島戚戚嗟嗟日與死迫曾不得奏薄伎於從官之内𨽻御之間窮思畢精以贖罪過懐痛窮天死不閉目瞻望宸極魂神飛去罪過新舊史作前過去或作送非是伏惟皇帝陛下天地父母哀而憐之無任感恩戀闕慙惶懇迫之至謹附表陳謝以聞賀册尊號表臣某言臣伏聞宰相公卿百官及關輔百姓耆耋等以陛下功崇徳鉅天成地平宜加號於殊常以昭示於來代陳請懇至句于載于三代方作載陳請懇至于再于三或作載陳情欵懇到再三非是陛下仰稽乾符俯順人志乃以新秋首序令月吉辰發揚鴻休膺受顯册天人合慶日月揚光環海之間含生之類歡欣踊躍以歌以舞合或作交環海之間或作寰海之中以歌以舞或作以舞以歌臣某誠懽誠喜頓首頓首臣聞體仁長人之謂元發而中節之謂和無所不通之謂聖妙而無方之謂神長上方有以字無人字妙而或作妙筭下同經緯天地之謂文戡定禍亂之謂武先天不違之謂法天道濟天下之謂應道伏惟元和聖丈神武法天應道皇帝陛下子育億兆視之如傷可謂體仁以長人矣喜怒以類刑賞不差可謂發而中節矣明照無私幽隠畢達可謂無所不通矣發號出令雲行雨施可謂妙而無方矣三光順軌草木遂長可謂經緯天地矣除剗冦盜宇縣清夷可謂戡定禍亂矣風雨以時祥瑞輻輳可謂先天而天不違矣國内無饑寒四夷皆朝貢可謂道濟天下矣國下或無内字朝上或無皆字衆美備具名實相當赫赫巍巍超今冠古方當議明堂辟雍之事撰泰山梁父之儀摉三代之逸禮補百王之漏典時乘六龍肆覲東后議或作講或上别有謂字撰下或有集字微臣幸生聖代觸犯刑章假息海隅死亡無日瞻望宸極心魂飛揚有永棄之悲無自新之望曾不得與鳥獸率舞蠻夷縱觀為比銜酸抱痛且恥且慙無任感恩戀闕懇迫彷徨之至與或作如彷徨或作傍惶謹奉表陳賀以聞袁州刺史謝上表或無刺史字臣某言臣以去年正月上疏論佛骨事先朝恕臣愚直不加大罪自刑部侍郎貶授潮州刺史伏遇其年七月十三日恩赦至其年十月二十四日凖例量移改授袁州刺史以今月八日到任上訖臣某誠懽誠喜頓首頓首伏以州小地狹税賦及時人安吏循閭里無事微臣惟當布陛下維新之澤守國家太平之規勸以耕桑使無怠惰而已臣以愚陋無堪累䝉朝廷奬用掌誥西掖司刑南宫顯榮頻煩稱效寂蔑又䝉赦其罪累授以方州徳重恩𢎞身微命賤無階答謝惟積慙惶無任感恩慙惕之至謹差軍事副將郝泰奉表陳謝以聞賀皇帝即位表臣某言伏聞皇帝陛下以閏正月三日虔奉遺詔昭升大位或無三日二字升方作承天地神祗永有依歸華夏蠻貊永有承事神人交慶日月貞明臣某誠歡誠喜頓首頓首臣聞王者必為天所相為人所歸上符天心下合人志然後奄有四海以君萬邦伏惟皇帝陛下承列聖之丕績當中興之昌運爰自主鬯春宫齒胄國學孝友之美實形四方英偉之姿乆動羣聴及初嗣位遐邇莫不歡心爰降詔書老幼或至垂泣或作涕舉用俊乂流竄姦邪雖虞舜之去四兇舉十六相不能過也天下翹首以望太平天下傾心以觀至化臣某誠歡誠喜頓首頓首臣聞昔者堯舜以吁嗟君臣相戒以致至治周文王以憂勤日中不食以和萬民故能澤流無窮名配日月伏惟皇帝陛下儀而象之以永多福天下幸甚天下幸甚微臣往因言事得罪先朝守郡逺方拘限條制不獲奔走稱慶闕庭無任欣歡踊躍感恩戀闕之至守郡或作僻守制方作例謹奉表以聞賀赦表臣某言伏奉二月五日制書大赦天下常赦所不原者咸䝉除罪與之更始令得自新方無䝉字恩浹幽明慶溢寰海臣某誠歡誠喜頓首頓首臣聞王者必於嗣位之始降非常之恩所以象徳乾坤同明日月伏惟皇帝陛下文思聰明聖神睿哲發號出令雲行雨施懼刑政之或差憐鰥寡之重困知事乆之滋弊慮法訛之益姦罪人悉原墜典咸舉生恩既及于四海和氣遂充於八紘臣某誠懽誠喜頓首頓首微臣往因論事獲譴海隅旋沐朝奬待罪山郡未離貶竄之地忽逢曠蕩之恩踊躍欣歡實倍常品限以官守不獲隨例稱慶闕廷無任感恩戀闕之至謹奉表陳賀以聞賀册皇太后表臣某言伏承閏正月二十七日皇太后光膺令典受册宫闈歡心始自於内朝孝理遂形於寰海臣某誠歡誠喜頓首頓首皇太后夙贊先皇弼成至化誕生明聖纘繼鴻休華胥實贊于軒圖文母有光於周道恭惟懿徳克配前芳皇帝陛下出震承乾垂衣御極式展臣子之志以明教化之源禮命載崇華夷同慶因待罪外郡不獲隨例稱賀闕廷無任踊躍欣歡之至賀或作慶謹奉表陳賀以聞賀慶雲表臣某言臣所領州今月十六日申時有慶雲見於西北至暮方散臣及舉州官吏百姓等無不見者五采五色光華不可徧觀非煙非雲孫曰史記天官書若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲容貌鉅能詳述抱日増麗浮空不收既變化而無窮亦巻舒而莫定斯為上瑞實應太平臣某誠歡誠喜頓首頓首謹按沈約宋書云慶雲五色者太平之應又據孝經援神契曰王者徳至山陵則慶雲出故皇帝因之以紀事虞舜由之而作歌陵或作澤又按季夏六月土王用事其日丙戌亦主於土西北方者京師所在土為國家之徳祥見京師之位既徴於古又驗於今王方作正今按歴家四季之月土王用事各十八日今云六月明當作王景戌以歴推之十六日也伏惟皇帝陛下徳合覆載道光軒虞嗣位之初禎祥繼至昇平之符既兆仁夀之域以躋以或作已微臣往在先朝以論事得罪身居貶黜之地目覩殊常之慶抃躍欣幸實倍常情伏乞宣付史官以彰聖徳所致瞻戀闕庭心魂飛馳無任欣抃踊躍之至馳下或有並圖奉進四字或附於下文奉表陳賀之下謹差某官奉表陳賀以聞舉張惟素自代狀一首國子監中散大夫守左散騎常侍上柱國賜紫金魚表張惟素右伏凖建中元年正月五日制常參官上後三日舉一人自代者前件官文學治行衆所推與累歴中外資序已深序或作考和而不同静而有守敦厚退讓可以訓人臣所不如輒舉自代謹録奏聞舉韓泰自代狀袁州使持節漳州諸軍事守漳州刺史韓泰右伏凖建中元年正月五日制常參官及刺史授上訖三日内舉一人自代者前件官詞學優長才器端實早登科第亦更臺省往因過犯貶黜至今十五餘年自領漳州悉心為治官吏懲懼不敢為非百姓安寧並得其所臣在潮州之日與其州界相接臣之政事逺所不如乞以代臣庶為允當謹録奏聞慰國哀表臣某言伏奉正月二十七日詔書大行皇帝奄棄萬國承詔哀惶號踊無地伏惟聖情何可堪處大行皇帝功濟寰區仁霑動植奉諱之日率土崩心凡在臣子不勝殞裂伏惟陛下痛貫宸極聖情難居臣拘守逺郡不獲匍匐奉慰瞻望闕庭且悲且戀謹奉表陳慰以聞舉薦張籍狀或有國子監字登仕郎守祕書省校書郎張籍右件官學有師法文多古風沈黙静退介然自守聲華行實光映儒林臣當司見闕國子監博士一員生徒籍其訓導伏乞天恩特授此官以彰聖朝崇儒尚徳之道謹録奏聞伏聴勅旨請上尊號表或有國子監字臣某言臣得所管國子太學廣文四門及書筭律等士館學生沈周封等六百人狀或無得字稱身雖賤微然皆以選擇得備學生讀六藝之文脩先王之道粗有知識皆由上恩今天子整齊乾坤出入神聖或無今字經營乎無為之業游息乎混元之宫不謀於庭不戰於野坐收冀部旋定幽都析木天街星宿清潤北嶽醫閭神鬼受職補註後山詩話退之上尊號曰析木天街云云子曽子賀赦曰鈎陳太微星緯咸若崑崙渤澥濤波不驚世莫能輕重之也析木天街北嶽醫閭方云皆以幽冀言也天文志昴為天街屬冀州自尾十度至南斗十一度為析木屬幽州北嶽恒山在定州恒陽在古冀州之域也醫閭周禮職方氏幽州其鎮醫閭也今按此長慶元年劉摠納士之時也地彌天區界軼海外舜之十有二州周之千七百國章亥所步禹契所書四面輻輳各修貢職章亥所步山海經云禹使大章步自東極至于西垂二億三萬三千五百里七十一步又使竪亥自南極盡於北垂二億三萬三千五百里七十一步西戎之首北虜之渠怛威愧徳失據狼狽收其種落逃遁逺去來獻羊馬千里不絶功既如此徳又如彼或作如何非是爰初嗣位首去姦嬖隨所顧指應時清寧嬖或作孹哀天下之鰥寡釋四海之欝結左右前後莫匪俊良小大之材咸盡其用無所誅詰一和以仁由是五榖嵗登百瑞時見六府三事惟序惟歌昔者媧皇殺黒龍以濟冀州孫曰淮南子女媧煉五色石以補蒼天斷鰲足以立四極殺黒龍以濟冀州積蘆灰以止淫水堯誅九嬰以定下土孫曰淮南子堯使羿誅鑿齒於疇華之野殺九嬰於㐫水之上血兵刓五官切剸也刃僅就厥功以方吾君一何逺也媧皇殺黒龍堯誅九嬰二事並見淮南子堯之在位七十餘載戒飭咨嗟以致平治孔子之聖自云三年有成今自嗣位已來嵗有餘耳臻此功徳其何捷哉置郵傳命未足以諭以非常之功襲尋常之號以冠古之美屈守文之名臣子之誠闕而不奏天號人稱不滿事實斯亦縉紳先生之過也臣子或作臣下謂臣官居師長不言謂何考其所陳中於義理天人合願不謀而同非臣之愚所敢隠蔽輒冒死以聞伏乞天恩特允誠志令公卿大夫得竭心慮取正於經以定大號有司備禮擇日以頒天下幸甚天下幸甚臣某誠惶誠恐方本無臣某下六字舉韋顗自代狀一首尚書兵部中散大夫守大理少卿驍騎尉韋顗右伏凖建中元年正月五日制常參官上後三日舉一人自代者前件官學識該達器量𢎞深朝惟直道代仰清節顯映班序十五年餘夷險一致風猷益茂屈居少列未副羣情文昌政本侍郎官重尚徳之舉顗宜當之乞迴臣所授庶弭官謗謹録奏聞謹奏别本韓文考異巻三十九欽定四庫全書别本韓文考異巻四十宋王伯大重編表狀論孔戣致仕狀方無孔戣字某官某右臣與孔戣同在南省為官數得相見或無同字戣為人守節清苦議論平正今年纔七十筋力耳目未覺衰老憂國忘家用意深逺所謂朝之耆徳老成人者臣知戣上疏求致仕故往看戣戣為臣言已䝉聖主允許伏以陛下優賢尚齒見戣頻上三疏言詞懇到重違其意遂即許之此誠陛下仁徳之至然如戣輩在朝不過三數人實可為國愛惜自古以來及聖朝故事年雖八九十但視聴心慮茍未昏錯尚可顧問委以事者雖求退罷無不慇懃留止優以禄秩不聴其去以明人君貪賢敬老之道也禮大夫七十而致事若不得謝則必賜之几杖安車禮下或有曰字致事方作致仕今按禮記作事七十求退人臣之常禮若有徳及氣力尚壯則君優而留之不必年過七十盡許致事也詩曰雖無老成人尚有典刑此言老成人重於典刑不可不惜而留也今戣幸無疾疹但以年當致事據禮求退陛下若不聴許亦無傷於義而有貪賢之美况左丞職事亦極清簡若戣尚以繁要為辭自可别授秩崇而務少者今中外之臣有年過於戣尚未得退戣獨何人得遂其願其或作所然人皆求進戣獨求退尤可賢重臣所領官無事不敢請對或無領字䝉陛下厚恩茍有所見不敢不言伏望聖恩特垂察納舉馬總自代狀京兆府銀青光禄大夫檢校尚書右僕射兼戸部尚書馬總右伏凖建中元年正月五日制常參官上後三日舉一人自代者伏以近者京尹用人稍輕所以市井之間盜賊未斷郊野之外疲瘵尚多方無近者至所以十字市井作畿甸前件官文武兼資寛猛得所累更方鎮皆有功能若以代臣實為至當謹録奏聞謹奏賀雨表臣某言臣聞聖人之徳與天地通誠發於中事應於外始聞其語今見其真臣誠歡誠喜頓首頓首伏以季夏以來雨澤不降臣職司京邑祈禱實頻青天湛然旱氣轉甚陛下憫兹黎庶有事山川中使纔出於九門隂雲已垂於四野龍神效職雷雨應期雷或作雲嘉榖奮興根葉肥潤抽莖展穗不失時宜人和年豐莫大之慶微臣幸䝉寵任獲覩殊祥慶抃歡呼倍於常品無任踊躍之至謹奉表陳賀以聞賀太陽不虧狀司天臺奏今月一日太陽不虧右司天臺奏今日辰卯間太陽合虧陛下敬畏天命克已修身誠發於中災銷於上自卯及已當虧不虧及或作至雖隔隂雲轉更明朗比於常日不覺有殊天且不違慶孰為大臣官忝京尹親覩殊祥欣感之誠實倍常品謹奉狀賀以聞狀下或有陳字舉張正甫自代狀尚書兵部再除日通議大夫守右散騎常侍上柱國南陽縣開國子食邑三百戸賜紫金魚袋張正甫右臣䝉恩除尚書兵部侍郎伏凖建中元年正月五日制常參官上後三日舉一人自代者前件官稟正直之性懐剛毅之姿嫉惡如仇讎見善若饑渇備更内外灼有名聲年齒雖髙氣力逾勵力或作志甘貧苦節不愧神明可謂古之老成朝之碩徳乆處散地實非所宜乞以代臣以副公望袁州申使狀使司牒州牒右自今月二日後每奉公牒牒尾故牒字皆為謹牒字有異於常初不敢陳論以為錯誤今既頻奉文牒前後並同在愈不勝戰懼之至伏乞仁恩特令改就常式以安下情國子監論新注學官牒國子監應令新注學官等牒凖今年赦文委國子祭酒選擇有經藝堪訓導生徒者以充學官近年吏部所注多循資序不考藝能至令生徒不自勸勵伏請非專誦經傳博涉墳史及進士五經諸色登科人不以比擬其新受官受或作授上日必加研試然後放行上副聖朝崇儒尚學之意具狀牒上吏部仍牒監者謹牒黄家賊事宜狀一臣去年貶嶺外刺史其州雖與黄家賊不相隣接然見往來過客并諳知嶺外事人所説至精至熟一或作右或有伏以字諳或作諸其賊並是夷獠亦無城郭可居依山傍險自稱洞主衣服言語都不似人尋常亦各營生急則屯聚相保比縁邕管經畧使多不得人徳既不能綏懐威又不能臨制侵欺虜縳以致怨恨蠻夷之性易動難安遂至攻劫州縣侵暴平人或復私讎或貪小利或聚或散終亦不能為事近者征討本起於裴行立陽旻此兩人者本無逺慮深謀意在邀功求賞此下或有時字亦縁見賊未屯聚之時將謂單弱立可摧破争獻謀計惟恐後時朝廷信之遂允其請自用兵已來已經二年前後所奏殺獲計不下一二萬人方無下已字今按恐當刪上已字萬上或無二字儻皆非虚賊已尋盡至今賊猶依舊足明欺罔朝廷邕容兩管因此凋弊殺傷疾患十室九空因或作内經二字患或作疫百姓怨嗟如出一口陽旻行立相繼身亡實由自邀功賞造作兵端人神共嫉以致殃咎自方作身嫉或作怒陽旻行立事既已往今所用嚴公素者亦非撫御之才不能别立規模依前還請攻討素或作集如此不已臣恐嶺南一道未有寧息之時一昨者併邕容兩管為一道深合事宜或無併字然邕州與賊逼近容州則甚懸隔其經畧使若置在邕州與賊隔江對岸兵鎮所處物力必全一則不敢輕有侵犯一則易為逐便控制今置在容州則邕州兵馬必少賊見勢弱易生奸心伏請移經畧使於邕州其容州但置刺史其實為至便一比者所發諸道南討兵馬例皆不諳山川不伏水土逺鄉羇旅疾疫殺傷伏或作服臣自南來見説江西所發共四百人曽未一年其所存者數不滿百方無者字岳鄂所發部三百人其所存者四分纔一續添續死每發倍難若令於邕容側近召募添置千人便割諸道見供行營人數粮賜均融充給所費既不増加而兵士又皆便習長有守備不同客軍守則有威攻則有利一自南討已來賊徒亦甚傷損察其情理厭苦必深大抵嶺南人稀地廣賊之所處又更荒僻假如盡殺其人盡得其地在於國計不為有益容貸羈縻比之禽獸來則捍禦去則不追亦未虧損朝廷事勢以臣之愚若因改元大慶赦其罪戾遣一郎官御史親往宣諭必望風降伏讙呼聴命呼方作呌仍為擇選有材用威信諳嶺南事者為經略使處理得宜自然永無侵叛之事有方作其理或作置應所在典貼良人男女等狀方無在字或又無等字方云二狀皆袁州進今按狀云往任袁州刺史方説非是應所在典貼良人男女等此是狀首標目所論事與前巻賀白龜狀體正同猶今之貼黄及狀眼也方本刪去非是右凖律不許典貼良人男女作奴婢驅使臣往任袁州刺史日檢責州界内得七百三十一人並是良人男女凖律計傭折直一時放免責或作到計上或有例字原其本末或因水旱不熟或因公私債負遂相典貼漸以成風名目雖殊奴婢不别鞭笞役使至死乃休既乖律文實虧正理袁州至小尚有七百餘人天下諸州其數固當不少今因大慶伏乞令有司重舉舊章一皆放免仍勒長吏嚴加檢責如有隠漏必重科懲則四海蒼生孰不感荷聖徳右前件如前謹具奏聞伏聴勅旨論淮西事宜狀方無狀字右臣伏以淮西三州之地自少陽疾病去年春夏以來圖為今日之事有職位者勞於計慮撫循奉所役者修其器械防守金帛粮畜耗於賞給勞於或作勞其非是耗於或作匱於執兵之卒四向侵掠農夫織婦擕持幼弱餉於其後雖時侵掠小有所得力盡筋疲不償其費餉或作飽非是又聞畜馬甚多自半年已來皆上槽櫪譬如有人雖有十夫之力自朝及夕常自大呼跳躍初雖可畏其勢不乆必自委頓乘其力衰三尺童子可使制其死命况以三小州殘弊困劇之餘而當天下之全力其破敗可立而待也待下方有之字非是然所未可知者在陛下斷與不斷耳夫兵不多不足以必勝必勝之師必在速戰方云必或作取兵多而戰不速則所費必廣兩界之間疆土之上日相攻劫必有殺傷近賊州縣徴役百端農夫織婦不得安業或時小遇水旱百姓愁苦當此之時則人人異議以惑陛下之聴下或有矣字陛下持之不堅半塗而罷傷威損費為弊必深所以要先决於心詳度本末事至不惑然可圖功然新史作乃方云然猶然後也下文然可集事然擬許其承繼皆一義今按此盖當時俗體如此故公狀中用之不欲改也為統帥者盡力行之於前而參謀議者盡心奉之於後内外相應其力乃成昔者殷髙宗大聖之主也以天子之威伐背叛之國三年乃尅不以為遲志在立功不計其所費背叛或作叛背傳曰斷而後行鬼神避之遲疑不斷未有能成其事者也臣謬承恩寵獲掌綸誥地親職重不同庶寮輒竭愚誠以效裨補謹條次平賊事宜一一如後一諸道發兵或三二千人勢力單弱羈旅異鄉賊不相諳委望風懾懼難便前進便方作更所在將帥以其客兵難處使先不存優恤待之既薄使之又苦處下或有㫖字不下或有撫字皆非是或被分割隊伍𨽻屬諸頭士卒本將一朝相失心孤意怯難以有功又其本軍各須資遣道路遼逺勞費倍多士卒有征行之艱閭里懐離别之思今聞陳許安唐汝夀等州與賊界連接處村落百姓悉有兵器小小俘刧皆能自防習於戰鬬識賊深淺既是土人䕶惜鄉里比來未有處分猶願自備衣粮共相
