body:
  text: 酬司門盧四兄雲夫院長望秋作長安雨洗新秋出極目寒鏡開塵函終南曉望蹋龍尾龍尾陂長安地名倚天更覺青巉巉祖衘切髙也自知短淺無所補從事久此穿朝衫歸來得便即遊覽暫似壯馬脫重銜曲江地名唐號芙蓉園荷花葢十里江湖生自思莫緘自思或作思自或作思目非是樂遊孫曰漢宣帝神爵間起樂遊苑在杜陵西北今呼為樂遊廟下矚無逺近緑槐萍合不可芟白首寓居誰借問平地寸步扄雲巗扄或作局一作屈雲夫吾兄有狂氣嗜好與俗殊酸鹹日來省我不肯去論詩說賦相諵諵女咸切諵諵語聲望秋一章已驚絶猶言低抑避謗讒抑或作徊若使乗酣騁雄怪造化何以當鐫劖鉏衘切斷也嗟我小生值强伴怯膽變勇神明鑒音監馳坑跨谷終未悔為利而止真貪饞饞饕也孫曰言拘於利禄而不遊此山是為貪饞之人矣髙揖羣公謝名譽逺追甫白感至諴樓頭完月不共宿完或作見或作皎也今按月蝕詩有完完上天東之句言月圓此亦同意以下句就缺推之可見其柰就缺行攕攕或作纎纎方云㩥蜀音所咸切詩摻摻女手説文與石經皆作㩥㩥誰氏子呂氏子炅見李素墓誌非癡非狂誰氏子去入王屋稱道士白頭老母遮門啼挽斷衫袖留不止翠眉新婦年二十載送還家哭穿市或云欲學吹鳯笙方作皇非是所慕靈妃嫓蕭史孫曰列仙傳秦穆公時有蕭史善吹簫公女弄玊好之公以妻焉遂教弄玉作鳯鳴居數十年吹鳯凰聲鳯來止其屋公為作鳯凰臺夫妻處其上一旦皆隨鳯凰去又云時俗輕尋常力行險怪取貴仕神仙雖然有傳說知者盡知其妄矣聖君賢相安可欺乾死窮山竟何俟嗚呼余心誠豈弟願徃教誨究終始誨方作悔奇今按作悔非是大抵方意以為主比類可見罰一勸百政之經不從而誅未晚耳誰其友親能哀憐寫吾此詩持送似或作以非是河南令舍池臺灌池纔盈五六丈築臺不過七八尺七八或作六七欲將層級壓籬落未許波瀾量斗石規摹雖巧何足誇景趣不逺真可惜景或作指長令人吏逺趨走巳有蛙黽武幸切又母耿切蛙属助狼藉方云藉從草說文曰草不編狼藉今本從竹漢陸賈傳名聲籍甚孟康曰狼藉甚盛葢古字如藉田皆只作藉而從草從竹則㳂義以生此當以藉為正送無本師歸范陽即賈島也即賈島集注劉公嘉話云島初赴舉京師一日於馬上得句云鳥宿池邊樹僧敲月下門初欲作推字練之未定不覺衝尹時韓吏部權京尹左右擁至前具告所以韓立馬良久曰作敲字佳矣遂與為布衣交有詩曰孟郊死葬北邙山日月風雲頓覺閒天恐文章渾斷絶再生賈島在人間葉又摭言云島嘗騎驢天衢時秋風正厲黃可掃島忽吟曰落葉滿長安卒求一聯不可得因唐突京尹劉栖楚被繫一夕而得釋新史云島字浪仙范陽人初為浮屠名無本來東都愈教其為文遂去浮屠舉進士當其苦吟及值公卿大夫不知覺也一日見京兆尹跨驢尹詰責之久乃得釋其意與摭言合而嘉話等集所云公與島詩東坡云世俗無知者所託非退之語洪氏亦云按送無本時公為河南尹不應至是方相知又島初為浮屠後乃舉進士此云後改名無本乃傳者之誤又樊氏云按此詩元和六年冬作而是年秋東野亦有詩與無本云長安秋聲乾木葉相號悲時東野尚無恙何以云死葬邙山耶若以為公為京尹始識島故云則公為尹在長慶三年而是年何以有此作也無本於為文身大不及膽吾嘗示之難勇往無不敢蛟龍弄角牙造次欲手攬衆鬼囚大幽下覷襲𤣥窞𤣥黒也窞徒感切說文坎中小坎天陽熙四海注視首不頷胡感切頤也作方云季本頷顉說文顉低頭也列子巧夫顉其頤顉今按說文顉五感切引衛獻公頷之而巳為證則與字自不同也然左傳今本只作頷未詳其說或疑下有顑頷字此不當重押則作顉為是然顑頷字見楚詞云顑虎感古湛二切頷戸感魚檢二切食不飽面黃貌則亦與不頷義不同也鯨鵬相摩窣蘇骨切亦摩也前漢書媻姍勃窣上金堤兩舉快一噉夫豈能必然固巳謝黯黮上烏感切下徒感切黒也楚辭云尚黯黮而有瑕孫曰庸暗貌狂詞肆滂葩狂貌低昻見舒慘姦窮怪變得徃徃造平澹蜂蟬碎錦纈紋繒蟬蜂蟬或作風或作蟬翼不今按此與下句對未詳其説緑池披菡蓞上音撼下音禫垤披用荆公本定或作或作低方从閤本作坏皆非是唯披坏聲相近耳孫曰詩有蒲菡萏爾雅荷芙蕖其花曰菡萏芝英擢荒蓁或作榛孤翮起連菼吐敢切孫曰爾雅菼薍郭璞注云似葦而小連菼叢葦也家住幽都逺未識氣先感來尋吾何能無殊嗜昌歜徂感切孫曰菖蒲葅也文王嗜昌歜孔子聞而食之出呂氏春秋又左氏享有昌歜始見洛陽春桃枝綴紅糝遂來長安里時卦轉習坎老懶無鬬心乆不事鈆槧欲以金帛酬舉室常顑頷上呼感切下乎感切離騷曰常顑頷以何傷韓曰顑食不飽貌頷靣黃色孫曰言欲酬以金帛則我家常飢貧也念當委我去霜雪刻以㦧痛也禮記中心􅉃怛獰飈狂風也攪空衢天衢也摺攪一作天地與頓撼孫曰摇撼也言獰飈之起天地亦且揺撼也勉率吐歌詩慰女别後覽石鼓歌樊曰歐陽文忠公集古録云石皷文在岐陽初不見稱於世至唐人始盛稱之而韋應物以為周文王之皷至宣王時刻爾韓退之直以為宣王之鼓今在鳯翔縣孔子廟鼓有十先時散棄于野鄭餘慶始置于廟而亡其二皇祐四年向傳師求於民間得之十皷乃足其文可見者四百六十有五磨滅不識者過半然其可疑者四退之好古不妄者予姑取以為信耳至于字畫亦非史籕不能作也文忠所跋如此孫曰石鼔文可見者其畧曰我車既攻我馬既同又曰我車既好我馬既騊君子員獵員獵員㳺麋鹿速速君子之求又左驂幡幡右驂騝騝秀弓時射麋豕孔庶又曰其魚維何維鱮維鯉何以櫜之維楊維栁櫜音髙說文曰囊也分又筆墨閒録此歌全仰止杜子美李潮八小篆歌才薄將奈石皷何即子美云潮乎潮乎奈爾何快劒斫㫁生蛟鼍即子美云快劍長㦸森相向張生手持石鼓文勸我試作石鼓歌少陵無人謫仙死才薄將奈石鼓何周綱陵遅四海沸宣王憤起揮天戈大開明堂受朝賀諸侯劒珮鳴相磨蒐于岐陽騁雄俊蒐疎鳩切今岐山縣舊曰岐陽萬里禽獸皆遮羅萬或作百鐫功勒成告萬世成或作盛方云封岱勒成東都賦語鑿石作鼓隳嵯峨山髙貌從臣才藝咸第一揀選撰刻留山阿揀或作簡撰或作譔雨淋日炙野火燎鬼物守䕶煩撝呵撝音麾指撝呵或作訶公從何處得紙本處方作士毫髪盡備無差訛辭嚴義宻讀難曉字體不類𨽻與科諸本皆同方从蜀粹作蝌公今按蝌乃科之俗體後人以重韻而誤改耳方知韓不避重韻乃疑於此何耶斗孫曰𨽻書秦始皇時程邈所定施於公府也科謂科書魯㳟王時壊孔子宅得書論語孝經人不知古文謂之科斗文字年深豈免有缺畫或作劃快劒斫斷生蛟鼍唐何切韓曰快劍斫斷以下皆狀石鼓文如此鸞翔鳯翥衆仙下珊瑚碧樹交枝柯碧樹或作幽碧瑚孫曰班固西都賦云珊瑚碧樹周阿而生廣雅曰珊珠也説文云生于海中色赤碧樹碧玉樹也淮南子曰崑崙山有碧玊樹在其北韓曰晉武帝賜王愷珊瑚樹髙二尺餘許枝柯扶疎世所罕比金繩鐵索鎻紐壯紐音狃結也古鼎躍水龍騰梭龍騰或作騰龍韓曰梭織具也樊曰晉陶侃少時漁于澤網得一梭掛于壁少頃雷雨化為龍而去陋儒編詩不收入二雅褊迫無委蛇收一作得蛇一作佗叶上於為切下音移祝曰毛詩韵補音唐何切詩注行可從迹也孫曰平易之貌孔子西行不到秦掎摭摭或作拾掎音奇摭之石切來俊臣掎摭諸武星宿遺羲娥孫曰羲娥日月也羲和日御嫦娥月御韓曰詩意謂石皷文不編於詩而二雅不載孔子言詩小者具述而此文獨遺是猶掎摭星宿而遺日月也嗟予好古生苦晚對此涕淚雙滂沱憶惜初䝉博士徴其年始改稱元和故人從軍在右輔為我量度掘臼科孫曰謂安石皷處濯冠沐浴告祭酒如此至寶存豈多氊包席裹可立致十鼓只載數駱駝駱或作䭷依字當作槖薦諸太廟比郜鼎光價豈止百倍過聖恩若許留太學諸生講解得切磋觀經鴻都尚填咽孫曰漢靈帝元和元年始置鴻都門學熹平四年詔諸儒正五經議郎蔡邕為古文篆𨽻三體書之刻石于太學門外碑始立觀覽及謩寫者車乘日千兩填塞街陌鴻都觀經葢二事公倂用之坐見舉國來奔波剜一九切刻削苔剔蘚露節角安置妥帖平不頗大厦深簷與葢覆經厯久逺期無他中朝大官老於事官或作夫詎肯感激徒媕上音庵下音阿不决之貌牧童敲火牛礪角誰復著手為摩挲音娑後漢蘓子訓至長安摩挲銅人日銷月鑠就埋沒六年西顧空吟哦羲之俗書趂姿媚樊曰周宣王時史籕始變大篆為籕書石鼓文籕書也秦變古為篆為𨽻今又變為楷世俗書耳非古書也補注王得臣塵史云王右軍書多不講偏旁此退之所謂俗書趂姿媚者也數紙尚可博白鵝繼周八代争戰罷無人收拾理則那那何也左傳犀兕尚多棄甲則那方今太平日無事柄任儒術崇丘軻任或作用安能以此上論列願借辯口如懸河石鼓之歌止於此嗚呼吾意其蹉跎雙鳥詩集註蘇内翰作李太白畵像詩有曰化為二鳥鳴相酬一鳴一止三千秋或者遂謂此詩為李杜作栁仲塗雙鳥詩解云韓之為心憂夫道也履行非孔氏者為夷矣故垂言以刺之釋老俱夷而教殊故曰雙鳥自栁仲塗為二氏說行于世洪慶善祖述其意而箋之而朱文公謂公為巳與孟郊說見考異注雙鳥海外來飛飛到中州來飛飛方作飛飛來一鳥落城市一鳥集岩幽集或作巢不得相伴鳴爾來三千秋兩鳥各閉口萬象銜口頭春風捲地起百鳥皆飄浮兩鳥忽相逢百日鳴不休有耳䀨皆聾有口反自羞百舌記曰反舌無聲注百舌也舊饒聲從此恒低頭恒或作且非是得病不呻喚泯黙至死休雷公告天公百物須膏油自從兩鳥鳴或作䀨䀨亂雷聲收諸本同但蜀本聲作光閤本作雷聲三伏收皆誤而方獨从唐本作䀨雷聲伏收則不成文理矣鬼神怕嘲詠造化皆停留化方作化草木有微情挑抉下於說切桃撥也示九州蟲䑕誠微物不堪苦誅求不停兩鳥鳴百物皆生愁不停兩鳥鳴自此無春秋不停兩鳥鳴日月難旋輈不停兩鳥鳴大法尖九疇周公不為公孔丘不為丘天公怪兩鳥各捉一處囚百蟲與百鳥然後鳴啾啾百鳥方从閣杭蜀本作七鳥云栁謝荆公皆作七鳥謂月令七十二候之蟲鳥也蘇耆開譚録亦見今按百蟲即上文之蟲䑕百鳥即上文所言皆飄浮者耳與七十二候初不相闗也且使果為七十二候之鳥而但云七鳥則詞既有所不備又鳥既為七而蟲獨為百於例亦有所不通今細考之豈以草書百字有似於七而致誤邪初不必過為之說也兩鳥既别處閉聲省愆尤朝食千頭龍暮食千頭牛朝飲河生塵暮飲海絶流還當三千秋更起鳴相酬方云栁仲塗有此詩解一篇傳於世謂指釋老也然以歐公感三子詩及東坡李太白畫像贊考之葢專為李杜而作己今按釋老李杜之說恐亦未然舊嘗竊意此但公為孟郊作耳落城市者巳也集岩幽者孟也初亦不能無疑而近見葛氏韻語陽秋已有此説矣讀者詳之贈劉師服服或作命羡君齒牙牢且㓗大肉硬餅如刀截我今呀豁落者多所存十餘皆兀臲音臬不安貌匙抄爛飯穏送之合口軟嚼如牛呞音癡食巳久㐲出嚼也妻兒恐我生悵望盤中不飣栗與棃祗今年纔四十五後日懸知漸莽鹵上莫古切下音魯杭本作鹵莽方云鹵莽本莊子然唐人多倒用之栁子厚沉昏莽鹵又食貧甘莽鹵自樂天養生仍莽鹵始覺琵琶絃莽鹵所用同也朱顔皓頸訝莫親此外諸餘誰更數憶昔太公仕進初口含兩齒無贏餘虞翻十三比豈少遂自惋恨形於書惋烏慣切吁嘆也見比或作皆或作此方从蜀夲云太公兩齒事古本荀子虞翻吳志只載其上書謂臣年耳順髪白齒落豈在當時猶有可考也耶丈夫命存百無害誰能㸃檢形骸外巨緡東釣儻可期與子共飽鯨魚膾鯨音勍莊子任公子為大釣巨縯五十犗以為餌持竿東海已而大魚食之自淛河以東莫不厭若魚者題炭谷湫祠堂時公在京師所歐本云在京兆之南終南之下祈雨之也南山秋懐詩皆見之萬物都陽明幽暗鬼所寰嗟龍獨何智出入人鬼間不知誰為助若執造化闗厭處平地水巢居挿天山列峯若攢指石盂仰環環巨靈髙其捧保此一掬慳西京賦注云華山本與首陽同一山河神巨靈以手擘開其掬上掬謂以手捧物一掬言小也詩云不盈一森沉固含蓄本以儲隂奸謂龍也猶南山詩所謂疑湛閉隂獸也魚鼈䝉擁䕶羣嬉傲天頑翾翾翾許緣切小飛也揚子曰朱鳥翾翾棲託禽飛飛一何閑祠堂像侔真擢玉紆烟鬟羣怪儼伺候恩威在其顔我來日正中悚惕思先還寄立尺寸地敢言來途艱吁無吹毛刃血此牛蹄殷殷烏閒切孫曰吹毛良劍也牛蹄蹄涔小水也言我豈無吹毛之劍血此牛蹄水令殷乎言欲殺此龍也殷赤黑色左傳左輪朱殷注云血深也至令乘水旱鼓舞寡與鰥林叢鎮㝠㝠窮年無由刪妍英花也雜豔實星瑣音鎖玉也黃朱班妍或作研瑣或作鎻石級皆險滑顛躋莫牽攀龍區雛衆碎付與宿已頒大也棄去可柰何吾其死茅菅菅音奸草名聽潁師彈琴潁師若是道士則潁字是姓當从水是僧則潁字是名當从禾西清詩話云六一居士嘗問東坡琴詩孰優坡答以退之聴潁師琴公曰此祗是琵琶耳吴僧義海以琴名世或以六一語問海海曰歐陽公一代英偉然斯語誤矣昵昵兒女語至失勢一落千丈强皆指下絲聲妙處惟琴則然琵琶格上聲烏能爾耶退之深得其趣未易譏評洪氏亦曰或云浮雲栁絮無根蔕天地闊逺隨飛揚此泛聲也謂輕非絲重非木也啾喧百鳥羣忽見孤鳯凰泛聲中寄指聲也躋攀分寸不可上吟繹聲也失勢一落千丈強厯聲也善琴者云此數聲最難工歐文忠公以為琵琶聲東坡嘗作聴琴詩文忠公不及見二公之論似未必然昵昵兒女語昵昵或作妮妮或作呢呢恩怨相爾汝劃然變軒昻勇士赴敵場浮雲栁絮無根蔕天地闊逺隨飛揚喧啾百鳥羣忽見孤鳯凰躋攀分寸不可上失勢一落千丈強嗟余有兩耳未省聽絲篁自聞潁師彈起坐在一旁或作傍或作牀推手遽止之濕衣淚滂滂潁乎爾誠能無以氷炭置我腸乎或作師方云李賀亦有聴潁師琴歌韓曰當是琴操必有感於公者故聴終而悲焉送陸暢歸江南洪曰暢字達夫娶董溪女溪丞相董晉第二子貶死湘中事見墓誌公嘗為董晉從事舉舉江南子方云唐人以舉止端麗為舉舉名以能詩聞樊曰暢貢舉年對雪落句云天人寧底巧剪水作花飛崔諫議林亭云蟬噪入雲樹風開無主花及登蘭省遇雲陽公主下降暢為儐相有詠簾詠行障催粧等作内人以暢吴音才思敏㨗以詩嘲之暢酬曰粉靣仙郎選聖朝獨逢秦女學吹簫須教翡翠聞王毋不奈烏鳶噪鵲橋觀此可見其能詩矣一來取髙第官佐東宫軍迎婦丞相府誇映秀士羣鸞鳴桂樹間鸞鳴或作鳴鸞觀者何繽紛上四賔切下音芬交雜也揚雄曰繽紛徃來人事喜顛倒旦夕異所云蕭蕭青雲幹遂逐荆棘焚嵗晚鴻鴈過鄉思見新文踐此秦闗雪家彼呉洲雲悲啼上車女骨肉不可分感槩都門别丈夫酒方醺我實門下士力薄蚋與蚊受恩不即報永負湘中墳不即或作即不方云暢董晉子溪之婿也公嘗佐董晉幕今按暢字達夫嘗著蜀道易詩送進士劉師服東歸猛虎落檻穽坐食如孤㹠㹠與豚同本落一作知食或作貪荆公如作茹㹠或作豚方從閤本云此乃司馬遷所謂猛虎在檻穽之中摇尾而求食也今按方說是也然則坐當作求矣但本皆作坐故未敢改耳丈夫在富貴豈必守一門公心有勇氣公口有直言柰何任理沒不自求騰軒僕本亦進士頗嘗究根源由來骨鯁材喜被軟弱吞低頭受侮笑隠忍硉兀寃侮笑方作笑侮硉兀或作矹硉巨硉音律硉兀危石也選江賦碧沙演沲而徃來石硉兀以前却泥雨城東路夏槐作雲屯還家雖闕短或作短闕指日親晨飱􅂝持令名歸自足貽家尊時節不可翫親交可攀援音爰勉來取金紫勿久休中園嘲魯連子韓曰魯連齊人太史公亦有取焉公嘲之之意不悉其安在意必有所諷於當時後世有不得而窺者魯連細而黠而方作兒有似黃鷂子弋照切鷂鷙鳥也田巴兀老蒼兀一作元人孫曰巴齊之辨者辨於祖丘議於稷下一日而服千有徐刼弟子曰魯連謂刼曰臣願當田子使不得復說連徃見田巴云云巴於是杜口易業終身不談憐汝矜爪觜開端魯連要驚人雄誇田巴吾厭矣髙拱禪鴻聲若輟一盃水輟或作叕獨稱唐賢顧未知之耳孫曰以天下與人於堯舜何足道者而仲連以唐虞為賢葢未知之耳公今按此詩洪説已詳然之意必有為而作也贈張籍吾老著讀書諸本著作嗜方云著如髙士著幽禪少忤著遊宴之著餘事不掛眼有兒雖甚憐教示不免簡君來好呼出踉蹡上音郎下音鏘又上音亮下七醬反急行貌潘岳曰已踉蹡而徐來越門限懼其無所知見則先愧赧昨因有縁事上馬挿手版笏也唐輿服志八座尚書執笏者自筆綴手版頭其餘王公卿士俱執手版正主於敬留君住㕔食使立侍盤􅊦爵也薄暮歸見君迎我笑而莞與莞爾而笑同指渠相賀言此是萬金産吾愛其風骨粹美無可揀試將詩義授如以肉貫丳初限切炙肉丳開袪袪衣袂猶開懐露毫末自得髙蹇嵼蹇或作􅑬簡上基展切下所切山曲屈貌選連崗岩以􅑬嵼楚詞思蹇嵼之不擇我身蹈丘軻爵位不早綰固宜長有人文章紹編剗感荷君子德怳若乘朽棧朽一作杇乘朽棧謂驚喜也召令吐所記解摘了瑟僴遐板切曽子云詩云瑟兮僴兮恂慄也顧視窻壁間親戚競覘矕武板切竊視貌説文目矕矕也喜氣排寒冬逼耳鳴睍睆上胡顯切下戸板切詩曰睍睆黃鳥如今更誰恨便可耕灞滻音産滻水出藍田谷霸陵入灞灞滻二水司馬相如上林賦曰終始灞滻出入涇渭調張籍李杜文章在集註退之有取於李杜如薦士腸句留東野望秋石鼓等詩每致意焉然未若此詩之專美也光熖萬丈長諸本熖作艷方云西京賦光熖爥天庭不知羣兒愚那用故謗傷魏道輔云公作此詩為元微之發葢元禎作李杜優劣論先杜後李故耳黄魯直云吾友黄介讀李杜優劣論曰論文正不當如此予以為知言蚍蜉上音毗下音浮大蟻也撼大樹可笑不自量伊我生其後舉頸遥相望夜夢多見之晝思反微茫徒觀斧鑿痕不矚治水航想當施手時巨刃磨天揚垠崖劃崩豁乾坤擺雷硠垠方作根擺一作罷硠音郎山崩聲左思曰拉獵雲硠韓曰硠磕石聲郭璞江賦巴東之峽夏禹疏鑿絶岸萬丈壁立霞駮又云􅀈如地裂豁若天開觸曲崖以縈繞駭崩浪而相礧詩意謂李杜文章如禹疏鑿江峽雖有迹可尋而當時運量之巧則今不可得而覩矣惟此兩夫子家居率荒凉帝欲長吟哦故遣起且僵翦翎送籠中使㸔百鳥翔平生千萬篇金薤垂琳琅韓曰金薤書也古有薤葉書詳見􅒖嶁山詩注琳琅石也言李杜文章播於金石云爾仙官勅六丁道書陽官六甲隂官六丁六丁者六甲中丁神也雷電下取將補注異人記云上元中台州道士王逺知善易知人死生禍福作易總十五巻一日雷雨雲霧中一老人語逺知曰所泄者書何在上帝命吾攝六丁雷電追取上方秘文自有飛天保衛金科秘藏𤣥都汝何者輒藏緗帙逺知曰青丘元老傳授也流落人間者流或作留方云孔毅父嘗曰漢霍去病傳諸將留落不偶今世俗皆作流落如江摠詩流落今如此少陵詩流落意無窮皆只作流落字葢留謂遲留流謂飄流自不可拘以一義也太山一豪芒豪方作亳云李本作豪按孟子莊子秋毫之末班固答賔戲銳思豪芒之内字皆作豪然楚詞秋毫㣲而見容王逸曰銳毛為毫是豪字通今按毫俗字當作豪為正我願生兩翅方作願生兩翅翎捕逐出八荒精誠忽交通百怪入我腸刺七亦切手㧞鯨牙舉瓢酌天漿魏道輔云髙至於酌天漿幽至於㧞鯨牙其思􅄨深逺如此詎止於曹劉沈宋之間邪騰身跨汗漫猶茫洋也淮南子若上與汗漫期於九垓之上不著織女襄襄駕也是或作相非顧語地上友經營無太忙乞音氣後漢乞楊生師君飛霞珮與我髙頡頏上胡結切下音航韓曰詩頡之頏之飛而上曰頡下曰頏盧郎中雲夫寄示送盤谷子詩兩章歌以和之兩或作二杜東坡云退之尋常詩自謂不及老此詩獨不減子美云昔尋李愿向盤谷正見髙崖巨壁爭開張是時新晴天井溢孫曰天井闗名在太行山上水經曰天井溪出天井闗北流注白水世謂之北流泉誰把長劒倚太行孫曰水自天井順瀉而下如長劍之倚山韓曰宋玉曰長劍耿耿倚天外行音航衝風吹破落天外破或作波非是吹楚詞衝風起兮水揚波吹破謂此長劍之水飛雨水漂散如雨白日灑洛陽東蹈燕川地名食曠野有饋木蕨芽滿筐馬頭溪溪名深不可厲以衣渡水由膝已上曰厲借車載過水入箱平沙緑浪榜音謗進船也與傍同又此孟切楚詞齊呉榜以擊汰方口地名鴈鴨飛起穿垂楊窮探極覽頗恣橫物外日月本不忙歸來辛苦欲誰為坐令再徃之計墮眇芒或作渺茫閉門長安三日雪推或作堆書撲祝曰擲也蜀志云未嘗不撲之于地筆歌慨慷下音康韓曰魏武帝慨當以慷憂思難忘選中矯厲而慨慷注抑揚意氣也旁無壯士遣屬和逺憶盧老詩顛狂開緘忽覩送歸作字向紙上皆軒昻又知李侯竟不顧方冬獨入崔嵬髙山貌謂盤谷也藏我今進退幾時决十年蠢蠢隨朝行家請官供不報答何異雀䑕偷太倉行抽手版付丞相不待彈劾還耕桑還方作歸寄皇甫湜敲門驚晝睡問報睦州吏睦或作乃手把一封書上有皇甫字拆書放牀頭涕與淚垂四或作泗方从唐本及范謝校本云董令升編嚴陵集亦定作四垂四葢以涕與淚分言之猶石皷所謂對此涕泗滂沱也昏昏還就枕惘惘夢相值悲哉無竒術安得生兩翅病中贈張十八中虛得暴下避冷卧北窻不蹋曉鼓朝安眠聴逄逄皷聲也潮諸本作逢逢方云蜀本音部江切字當作逄如今按本作逢葢逢从夆逢从夅音義各異然古書逄䝉逄丑父闗龍逢字皆只作逄而音蒲江切疑逢有蒲紅一音而音蒲江者由蒲紅而差也當考籍也處閭里抱能未施邦文章自娛戲金石日擊撞龍文百斛鼎孫曰秦武王與孟說舉文龍之鼎扛舉也筆力可獨扛談舌久不掉非君亮誰䨇亮或作諒扶几導之言几或作机曲節初摐摐音窓前漢摐金皷此字从手或作摐摐从禾方云从手者博雅云撞也子虛賦摐金皷从木者自木名也半塗喜開鑿𣲖别失大江吾欲盈其氣不令見麾幢牛羊滿田野孫曰漢匈奴將十萬騎入武川塞見畜布野而無人牧怪之引去解斾束空杠音江旗干傾樽與斟酌四壁堆甖缸音江西都賦金缸銜壁注燈也𤣥帷隔雪風照鑪釘音定明釭夜闌縱捭闔上音擺鬼谷子有捭闔篇哆昌者切脣下垂口疎眉龎多毛貌勢侔髙陽翁坐約齊橫降胡江切酈商髙陽人也齊王田橫懼誅入海居島中髙帝使商持節具告以詔意横謝使者乃自殺連日挾所有形軀頓胮肛上匹江切下許江切脹大貌將歸乃徐謂將歸方作歸將云逺于將之毛傳將行也故古人以送將歸為三事焉今按楚詞言秋之可悲如在逺行之處而登山臨水以送欲歸之人愈覺羇旅之牢落故其意象慘戚而無聊耳將字與詩文同字異安得強為一說而謂送將歸為三事乎必為三事而可顛倒言之則楚詞之與此詩皆不復成文理矣予言得無哤音龎語雜亂曰哤管子四民雜處則其言哤廻軍與角逐軍或作君非是斫樹收窮龎皮江切孫臏减竈偽走涓逐之臏度涓夜至之處伏弩萬人見火則發乃斫樹書云龎涓死于此樹下涓至果舉火讀之弩發涓死韓曰公始也扶几導籍使之言且匿其麾幢解斾束杠而示之弱籍乃縱其捭闔如酈生之下齊既連日挾其所有其後乃為公所敗是猶孫臏之收龎涓也雌聲吐欵要酒壺綴羊腔苦江切肫羊張鷟云案後一腔陳猪肉君乃崑崙渠籍乃嶺頭瀧閭江切奔湍譬如蟻垤微詎可陵崆㟅或作玩方云㟅字見南都賦蜀本苦江五江二切今本作坑字書未見南都賦曰其山則崆㟅嶱嵑幸願終賜之一作願終賜之教斬㧞枿牙葛切芽也與樁株江切樁橛也從此識歸處韓曰籍既為公所敗乃自以為嶺頭之瀧不足以方崑崙之渠蟻垤之微不足以陵崆㟅之山願終受教於公而公於是導其所歸也東流水淙淙土江切水聲也雜詩古史散左右詩書置後前豈殊蠧書蟲蠧書或作書蟲生死文字間古道自愚憃陟降切愚也蠢或作戅或作古言自包纒當今固殊古誰與為欣歡獨􅂝無言子共昇崑崙顛長風飄􅁭裾遂起飛髙圓下視禹九州禹方作㝢一塵集豪端遨嬉未云幾下巳億萬年向者夸奪子萬墳厭其巔方從唐杭本作墳今按方所從本葢後人以重韻而誤改之說見石鼓歌惜哉抱所見白黑未及分慷慨為悲咤陟駕切淚如九河翻指摘相告語雖還今誰親翩然下大荒被髪騎騏驎或作麒麟方云古書如戰國䇿多用麒麟字其義一也潮孫曰謂復仙去樊曰東坡為公州廣碑詞終篇多取此意寄崔二十六立之西城員外丞心跡兩屈竒屈或作崛或作倔方云淮南子聖人無屈奇之服髙誘曰屈短奇長也言服之不中漢廣川士掦雄傳選西征賦皆只用屈奇字今按漢書注屈奇異也其勿反徃嵗戰詞賦不將勢力隨下駐入省門左右驚紛披紛或作分傲兀坐試席深叢見孤羆文如翻水成初不用意為四座各低靣不敢捩眼窺捩力結切拗也又苕溪詩話云音麗琵琶撥也謂左右窺升階揖侍郎知舉者立之中正元四年進士第知舉侍郎劉太真歸舍日未歌佳句喧衆口考官敢瑕疵或作􅀈方云避重韻而誤改也連年收科第若摘頷底髭廻首卿相位通途無他岐途或作逵或作達豈論校書郎立之登第後除秘書省校書郎袍笏光參差童稚見稱說祝身得如斯儕輩妬且熱喘如竹筒吹老婦願嫁女約不論財貲約不或作不約貲或作資方云亦避重韵之誤此詩用二疵字二斯字不獨此也老翁不量分累月笞其兒攪攪爭附託攪攪或作擾擾無人角雄雌由來人間事翻覆不可知安有巢中鷇音冦鳥生子須母哺曰鷇燕雀之屬挿翅飛天陲駒麛音迷鹿子著陟畧切爪牙猛虎借與皮汝頭有韁音姜馬組繫汝脚有索縻䧟身泥溝間誰復禀指撝不脫吏部選可見偶與竒又作朝士貶得非命所施客居京城中十日營一炊逼迫走巴巒恩愛座上離昨來漢水頭始得完孤羇桁掛新衣裳桁音行又下良切韓曰衣椸也周庾信對燭賦燈前桁衣凝不亮盎棄食殘糜茍無飢寒苦那用分髙卑憐我還好古宦途同險巇毎旬遺我書竟嵗無差池上楚宜切兩相差左傳何敢差池新篇奚其思風幡肆逶迤幡或作旛又論諸毛功劈水㸔蛟螭劈或作擘雷電生睒䁑二字或从日說見永貞行貌上音閃下音釋韓曰疾視選忘其所以睒睗孫曰睒暫見也言雷電睒爍見其光如日角鬛相撑披或云枝方云亦以重韻而誤改也属我感窮景抱華不能摛蜀本作把筆不能摛不能或作能不方从杭本云班固答賔戲摛藻如春華葢公得崔詩正當冬月故感窮景而不能摛發其春華耳上丈諸毛乃謂筆也既隠其詞則此不應又直言之故作把筆者亦非也今按方本及說皆是但其詞有未足者故今畧為補之論諸毛功必是為毛潁傳而發但蜀本之誤不待以此為辨而自明矣唱來和相報愧歎俾我疵疾移切黒病又寄百尺綵緋紅相盛衰巧能喻其誠巧或作功方从唐蜀本云列子矜巧能脩名譽達今按巧能喻其誠言崔遺我書并新篇綵帛巧於能其意猶言工於某事云爾非以巧能為二字相連如列子之意也方說誤矣深淺抽肝脾開展放我側方餐涕垂匙朋交日凋謝存者逐利移子寧獨迷誤綴綴意益彌舉頭庭樹豁頭或作頸狂飈巻寒曦迢逓山水隔何由應塤箎别來就十年君馬記騧音𤓰黄馬黑啄曰騧驪音離馬深黑色曰驪長女當及事誰助出􅍤音稅佩巾所以拭物縭音离緌也詩親結其縭諸男皆秀朗幾能守家規文字銳氣在輝輝見旌麾摧腸與慼容或作居或作眉方云居當為容字之訛也眉特以意定耳慼作蹙亦通孟子其容有蹙能復持酒巵我雖未耋老髪秃骨力羸所餘十九齒飄颻盡浮危𤣥花著兩眼視物隔褷䙰上所宜切下吕之切衣方云䙰褷毛羽初生貌字本海賦然䙰字字書無从者惟王維詩有獨立何日是嵇康琴賦作離纚古樂府作王蓰陸羽茶經作麗簁義皆通今此作褷䙰豈古連綿字或可倒用不然褷字自入韵豈傳者誤耶姚令威曰唐本作視物劇隔褷不知謝本何以不出通今按所見謝本實校作劇隔褷下注澄字然義亦未恐當作視劇隔褷䙰物字乃劇之訛而又重出遂去䙰考字以就五言耳然亦無据不如且从方説徐更參燕席謝不詣游鞍懸莫騎敦敦凭書案敦敦或作孜孜方从閤杭本作敦音都回切譬彼鳥黏黐丑知切用以黏鳥且吾聞之師不以物自隳孤豚眠糞壤眠方作服或作伏不慕太廟犧孫曰莊子或䀻於莊子應其使曰子見夫犧牛乎衣以文綺食以蒭菽及其牽而入於太廟雖欲為孤豚其可得乎君㸔一時人幾輩先騰馳過半黑頭死隂蟲食枯骴音疵殘骨歡華不滿眼歡或作權咎責塞兩儀觀名計之利或作實猶今按此句難曉切意計校也言觀其所得之虛名而校之以實利不足相補也詎足相陪禆符支切補也增也仁者耻貪冒受禄量所宜無能食國惠豈異哀癃罷音皮倦也久欲辭謝去休令衆睢睢音隋視上逆也又衆目所視莊子而睢睢而盱盱而誰與居况又嬰疹疾又或作自疹音軫說文唇瘍也寧保軀不貲即移切後漢書云不足以償不貲之身不能前死罷内實慙神祗舊籍在東都茅屋枳棘籬還歸非無指灞渭揚春凘音斯觧氷也水方云流氷為澌从非生兮耕吾疆死也埋吾陂也一作兮文書自傳道不仗史筆垂不或作奚夫子固吾黨新恩釋銜羇去來伊洛上相待安公胡切魚罟箄音卑取魚竹器江東呼小籠為箄我有雙飲􅊦其銀得朱提上音殊下音時孫曰漢縣名属犍為郡有朱提山出銀綱祝曰漢朱提銀八兩為一流直一千五百八十他銀一流直一千是為銀貨二品黃金塗物象雕䥴妙工倕音垂莊子工倕旋而盡規矩倕人名堯時共工乃令千里鯨么麽㣲螽斯麽母果切細小貌班彪么麽不及數子螽之中切蝗類以股鳴者孫曰言工人之巧能使千里鯨魚小如螽斯也猶能爭明月擺掉出𣺌瀰野草花葉細不辨薋菉葹離騷經薋菉葹以盈室王逸注薋音咨蒺藜也菉音緑王蒭也葹音施枲耳也韓曰三者皆惡草以喻讒佞綿緜相紏結狀似環城陴音陴城上垣四隅芙蓉樹擢豔皆猗猗長也鯨以興許應切君身或作興居狀或作狀興居皆非是荆公本作狀君身近之方从唐本作興君身乃得其正葢興猶比也君指崔立之而言失所逢百罹月以喻夫道僶勉勵莫虧莫或作其草木明覆載妍醜齊榮萎醜或作臭願君恒御之行止雜燧觽上音遂下許規切内雜方作親或作新皆非是但洪本云澄作雜燧山見則言當常御此􅊦雜於所佩燧觽之間也此乃得之異日期對舉當如合分支通鑑元魏熙平元年立法在軍有功者行臺給劵當中竪裂一支給勲人一支送門下以防偽巧今人亦謂析産符契為分支帳即此義也公以雙􅊦之一贈崔故末句如此月蝕詩效玉川子作方云李本無詩字洪曰或謂館中本效作刪注彦章本同元和庚寅斗挿子月十四日三更中四或作五森森萬木夜僵立森森方作臨臨殊無義理按盧詩乃作森森葢自森轉而為林也今改作森森寒氣負奰頑無風負虚器切奰平秘切西京賦曰巨靈負奰負負奰諸本作贔負或作負贔方曰盧詩雖作負然公多不用盧本語贔負用力貌負奰亦大貌詩傳不醉而怒謂之負贔義尤長今按諸本不同未知孰是姑兩存之月形如白盤完完上天東諸本作貌貌或作皃皃方从杭范荆公本作完亦今按完字說見酧盧雲夫望秋詩洪本云古書完多誤作皃此又轉寫為貌耳忽然有物來噉之不知是何蟲如何至神物遭此狼狽凶狽音貝神異經云狽無前足附狼而行選亦狼狽而可星如撒沙出攅集爭强雄撒方作云側手擊也盧詩作拆今本从之非也此今按側手擊沙於義不通公于盧語固有損益然改字却無文理當只作撒油燈不照席是夕吐􅆋如長虹如長或作長如玉川子涕泗下中庭獨行獨下或有自字念此日月者為天之眼睛此猶不自保吾道何由行嘗聞古老言疑是蝦蟇精徑圓千里納女腹何處養女百醜形把沙行貌脚手鈍誰使女解縁青㝠把或作􅐡音義同黄帝有四目諸本黃作皇方从杭本云帝王世紀謂黃帝用力牧常先等分掌四方各如已視故號黃帝四目一曰李賢後漢注漢人書黃多作皇皇字亦通洪以皇帝為堯則非也帝舜重其明今天祗兩目何故許食使偏盲堯呼大水浸十日不惜萬國赤子魚頭生女於此時若食日雖食八九無嚵名嚵徂銜切祝曰說文小􅀈也嚵或作饞赤龍黒鳥燒口熱黑鳥未詳或謂日中三足鳥也鳥一作烏翎鬛倒側相搪音棠搪突也撐婪盧含切與惏同楚辭衆皆競進以貪婪注愛財曰貪愛食曰婪酣大肚遭一飽饑腸徹死無由鳴後時食月罪當死天羅天網也磕帀何處逃汝刑磕音搕磕帀者周帀也或磕帀或作匝磕或作匌作或無汝字玉川子立於庭而言曰地行賤臣仝或作今方云汪本云仝字當句㫁亦與盧詩合再拜敢告上天公上天或作天上臣有一寸刃可刳凶蟇腸無梯可上天天階無由有臣蹤寄牋東南風天門西北祈風通丁寧附耳莫漏洩薄命正直飛亷慵呉氏春秋云風師曰飛亷漢書音義云飛亷能致風東方青色龍牙角何呀呀音牙小兒忿争聲從官百餘座此下或有從應二字荆公刪去嚼啜煩官家月蝕汝不知安用為龍窟天河赤鳥司南方尾秃翅觰沙觰或作􅀈方云觰陟加切角上張也字亦作􅡬作􅀈訛月蝕於汝頭汝口開呀呀或作齖齖方云齖齒不正也音牙與開口義不合此當音呼加切唐韻唅呀張口皃也韻今詳或改此字亦避重而誤也蝦蟇掠汝兩吻過忍學省事不以汝觜啄蝦蟇於莵上音烏下音徒楚人謂虎為於莵蹲於西旗旄衛毿㲚參沙一音長毛貌既從白帝祠又食於䄍禮有加禮記䄍禮迎虎謂其食田豕忍令月被惡物食枉於汝口挿齒牙烏龜怯姦怕寒縮頸以殻自遮終令夸蛾抉汝出夸苦爪切列子帝命夸蛾氏二子負山注葢有力者扶蛾或作娥方从列子校抉方作非是卜師燒錐鑚灼滿板如星羅此外内外官漢天文志經星常宿中外官百十八名七百八十三星𤨏細不足科臣請悉掃除慎勿許語令啾譁併光全耀歸我月盲眼鏡淨無纎瑕全或作金瑕或作霞皆非是弊蛙拘送主府官弊或作斃字今按弊蛙猶卓茂言敝人也不然則當改从斃葢此時蛙雖未斃而其罪亦當死矣帝箸下腹嘗其皤皤音婆腹下白皃蹠或作蹯皤腹下白處也蹯足也當作皤依前使兎操杵臼玉階桂樹閑婆娑姮娥還宫室方作堂太陽有室家禮記曰君之與后猶日之與月天雖髙耳屬地感臣赤心使臣知意臣知方作知臣悟今按下文云雖無明言潜喻厥㫖則此句乃謂天感臣心使臣黙知天意耳諸本多作使知臣意非是其下所云有氣有形以下即天意也雖無明言潜喻厥㫖明或作口有氣有形皆吾赤子雖忿大傷忍殺孩稚大或作天還女月明安行于次盡釋衆罪以蛙磔死磔竹客切裂也方云盧詩新史以為譏元和逆黨然稽之嵗月不合葢元和初宦官已横恣故譏之非為逆黨也今按盧韓二詩必有所為而作但未有以見其所指為何人何事耳新史固謬方說恐亦未必然也孟生詩諸本孟下有先字方云此詩以篇首二字為題今本誤也孟郊答韓愈别因獻張徐州詩云富别愁在顔貧别愁銷骨懶磨青銅鑑畏見新白髪古樹春無花子規啼有血離絃不堪聴一聴四五絶世途非一險俗慮有千結有客步大方驅車獨迷轍故人韓與李逸輪雙皎㓗哀我摧折歸贈詞從横設徐方國東樞元戎天下傑禰衡投刺遊王粲吟詩謁髙情無遺照明抱開曉月在上不理寃有皆為雪願為奇草木永向君地列願為古琴瑟永向君前發欲識丈夫心曾將孤劍說孟生江海士生一作郊古貌又古心嘗讀古人書謂言古猶今嘗或作常作詩三百首窅黙咸池音諸本窅作㝠方云李習之與張建封書引公此語亦用窅字騎驢到京國欲和薰風琴豈識天子居九重鬰沉沉一門百夫守無籍不可尋門籍孫曰為二尺竹牒記其年紀名字物色縣之宫門案省相應乃得入也晶光前漢太陽之晶晶亦光也蕩相射旗㦸翩以森遷延乍却走驚怪靡自任如林切甚也舉頭㸔白日泣涕下霑襟朅來遊公卿莫肯低華簪諒非軒冕族應對多差參萍蓬風波急桑榆日月侵柰何從進士此路轉嶇嶔上音區下音欽山不平皃范曅曰隨山上嶇嶔是也異質忌處羣孤芳難寄林誰怜松桂性競愛桃李隂朝悲辭樹葉夕感歸巢禽顧我多慷慨窮簷時見臨簷或作閻方云考荀子史記子貢傳閻字為正清宵静相對髪白聆苦吟聆或作耻或作怜採蘭束哲南陔詩言採其蘭言念親思歸也起幽念眇然望東南起或作赴望或作思秦吳秦長安吴東野所居脩且阻兩地無數金我論徐方牧方一作州好古天下欽竹實鳯所食德馨神所歆求觀衆丘小必上泰山岑力簪切山小而髙求觀衆流細必泛滄溟深溟或作海子其聴我言可以當所箴既獲則思返無為久滯淫卞和試三獻琴操卞和得玉獻楚懷王遭刖獻平王又刖平王之子立復獻之中果有玉封陵陽侯期子在秋砧射訓狐有鳥夜飛名訓狐名或作呼訓唐五行志休留一名訓狐或曰狐其聲也因以名之矜凶挾狡誇自呼乘時隂黑止我屋聲勢慷慨非常麄安然大喚誰畏忌喚或作唳方云曹子建鷂雀賦不肯首服烈頸大喚造作百怪非無須聚鬼徴妖自朋扇擺掉栱音拱大拭選栾拱天矯而交結桷方作角頹塈音洎塗慈母抱兒怕入席那暇更䕶雞窠雛我念乾坤德泰大卵此惡物常勤劬縱之豈即遽有害斗柄行拄西南隅誰謂停奸計尤劇尤或作猶意欲唐突羲和烏侵更厯漏氣彌厲何由僥倖休須㬰咨余徃射豈得已候女兩眼張睢盱梟驚墮梁蛇走竇一夫斬頸羣雛枯夫館本作矢方云或謂矢何以能斬頸也鮑明逺詩黄間潛彀盧天直遂刎繡頸碎錦翼詩人之語顧隨所用耳今按方說雖有理然以詩考之似只是公親徃射而梟夜墮梁故佐之者得以刀斬其頸耳不必改字强說也將歸贈孟東野房蜀客蜀客名次卿君門不可入勢利互相推借問讀書客胡為在京師舉頭未能對閉眼聊自思倐忽十六年終朝苦寒飢宦途竟寥落鬢髪坐差池潁水清且寂箕山坦而夷如今便當去咄咄無自疑疑或作癡亦通方作女無癡則誤矣答孟郊東郊集有别公詩此篇所以答也汴州别愈詩云不歛濁水瀾空滯此汴河坐見此岸水盡為還海波四時不在家弊服斷線多逺客獨憔悴春英各婆娑汴水遶曲流野桑無直柯但為君子心歎息終匪佗洪云規模背時利文字覷天巧此效東野酬奬樊宗師云梁惟西南屏山厲水刻屈此效宗師黃魯直云子瞻詩妙一世乃云效庭堅體盖退之戯效東野宗師之比以文滑稽耳規模背時利模或作謨或作謀文字覷天巧人皆餘酒肉子獨不得飽纔春思巳亂始秋悲又攪朝餐動及午夜諷恒至卯名聲暫羶腥腸肚鎮煎煼初爪切熬也字抗本煼作熖俗也古心雖自鞭世路終難拗弱拒喜張臂猛挐閑縮爪見倒誰肯扶從嗔我當齩五巧切交齒也選口齩霜刃樊曰此聫即公誌子厚墓所謂落穽不一引手救反擠之而下石焉者是也縁上世路而言之從仕居閒食不足從仕力難任兩事皆害性一生恒苦心黃昏歸私室惆悵起歎音棄置人間世或作事古來非獨今短燈檠歌本或作燈檠方云姚令威曰古詩燈檠昏魚目讀檠為去聲集韻檠渠映切有足所以凡物又檠音平聲榜也非燈檠字韓詩牆角君㸔短檠棄亦誤也按燈檠昏魚目乃唐彦謙詩李商隱詩亦有九技燈檠夜珠圓是唐人固以去聲讀也然白樂天詩有鉄檠移燈背自注曰檠去聲讀則知唐人本二聲通用古檠只用檠字晉宋諸人集尚可考長檠八尺空自長短檠二尺便且光黃簾緑幕朱户閉風露氣入秋堂凉裁衣寄逺淚眼暗搔頭頻挑移近床太學儒生東魯客二十辭家來射策夜書細字綴語言兩目眵尺支切目汁凝昏頭雪白此時提携當案前携方作挈看書到曉那能眠一朝富貴還自恣長檠髙張照珠翠髙張或作熖髙珠或作朱吁嗟世事無不然牆角君㸔短檠棄送劉師服夏半隂氣始浙然雲景秋浙或作晰亦作晳方作晢云明也之世切髙唐賦晰兮若姣姬揚袂障目而望所思晰與晢同故今本訛為浙也今按浙為淅厯凄凉之義晢為明又此詩上云隂氣始下云雲景秋則與晢義不相應而宜為淅瀝之意矣盖由淅而誤為晣又因晣而轉為晢也蟬聲入客耳驚起不可留草草具盤饌不待酒獻酬待方作持士生為名累有似魚中鈎齎財入市賣貴者恒難售音讐宣帝每買餅所從買家輒大讐讐與售同也豈不畏顦顇或作從憔悴為功忌中休勉哉耘其業以待嵗晚收别本韓文考異巻五欽定四庫全書别本韓文考異巻六宋王伯大重編
