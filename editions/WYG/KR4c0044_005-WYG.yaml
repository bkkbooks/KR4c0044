front:
  text: 豈無農夫親耒耜先生抱才終大用宰相未許終不仕假如不在陳力列立言垂範亦足恃苖裔當䝉十世宥豈謂貽厥無基阯或作址方云阯字見漢疏廣傳故知忠孝生天性㓗身亂倫安足擬昨晚長鬚來下狀隔牆惡少韓曰荀子無亷耻而嗜乎飲食可謂惡少者也惡難似每騎屋上下窺闞或作瞰渾舍驚怕走折趾憑依婚媾欺官吏不信令行能禁止先生受屈未曾語忽此來告良有以嗟我身為赤縣令操權不用欲何俟立召賊曹呼伍伯方作五百之今按伍伯見古今注什伍長也作五百非盡取䑕軰尸諸市先生又遣長鬚來如此處置非所喜况又時當長養節都邑未可猛政理先生固是余所畏度量不敢窺涯涘牀史切放縱是誰之過歟效尤戮僕愧前史買羊沽酒謝不敏偶逢明月曜桃李補注即前李花詩日光赤色至玉皇家四句是也先生有意許降臨更遣長鬚致雙鯉
