seq: 3
front:
  text: 子言五山曰根株不相連著
  hash: sha256:cf55833eeaedff972a8c26b29e26655e463a36bd021f0bc93f07136526af2569
body:
  text: 八月十五夜贈張功曹著纎雲四巻天無河清風吹空月舒波波月光沙平水息聲影絶沙平方作平沙非是一杯相屬之欲切漢灌夫傳及飲酒酣夫起舞屬蚡師古曰屬付也猶今之舞訖相勸君當歌君歌聲酸辭且苦不能聽終涙如雨洞庭連天九疑髙蛟龍出没猩鼯音吾䑕名一曰飛生號十生九死到官所幽居黙黙如藏逃下牀畏蛇食畏藥海氣濕蟄熏腥臊濕方作温非是昨者州前槌大鼓嗣皇順宗即位貞元二十一年正月繼聖登夔皋赦書一日行萬里罪從大辟皆除死方云荆公與謝本作除徙下文已有遷者追回流者還則除死為當遷者追囘流者還滌瑕蕩垢朝清班朝清或作清朝方云唐本作朝清盖言追還之人皆得滌瑕垢而朝清班惟巳為使家所抑故只量移江陵也州家申名使家抑坎軻秖得移荆蠻秖或作只它詩皆然判司功曹卑官不堪説卑官一作官卑未免捶楚韓曰老杜送髙書記詩脱身簿尉中始與捶楚辭孫曰公時遷為江陵府法曹塵埃間同時軰流多上道天路幽險難追攀君歌且休聽我歌我歌今與君殊科杭本如此言張之歌詞酸苦而巳直歸之于命盖反騷之意而其詞氣抑揚頓挫正一篇轉換用力處也方从諸本我下去歌字而君下著豈字全失詩意使一篇首尾不相運掉無復精神又不著花本之異盖考之亦未詳耶一年明月今宵多明月一作月明人生由命非由他託何切非我也有酒不飲奈明何謁衡嶽廟遂宿嶽寺題門樓或無廟字公兩謫南方初自陽州北還過衡在永貞元年八月過潭適當殘秋陪杜侍御遊湘西寺詩云是時秋向殘是也今云我來正逢秋雨節故知此詩自山陽還時作後自潮州還移刺袁州則元和十五年十月盖未嘗過衡據袁州謝表云去年正月貶授潮州刺史其年十月凖例量移云云即自潮徑當來袁又未嘗遇秋雨節時也蘇東坡觀海市詩云潮陽太守南遷歸喜見石廪堆祝融捔言之耳五嶽祭秩皆三公皆或作比非是四方環鎮嵩當中火維地荒足妖怪天假神柄神衡山之神專其雄噴雲泄霧藏半腹雖有絶頂誰能窮我來正逢秋雨節隂氣晦昧無清風清方作晴則今按淸風興羣隂伏無清風雨意未已也晴字非是潜心黙禱若有應豈非正直能感通非方作即非是能感方作感能矣今按若從方讀則此句為吃羌語須㬰静掃衆峯出仰見突兀撐青空紫盖連延接天柱衡山有五峰紫盖天柱石廩祝融芙蓉石廪一名石囷石廪騰擲堆祝融森然魄動下馬拜松栢一逕趍靈宫栢或作桂粉墻丹柱動光彩鬼物圖畫填青紅升堦傴僂薦脯酒欲以菲薄明其衷廟令老人識神意令一作内睢盱上許圭切下香于切顧視貌偵丑鄭切侯也伺能鞠躬手持盃珓導我擲珓方从唐本作校云廣韻作珓字古者以土為之也朝野僉載作珓角與校音義皆相近魏野有詠竹校子詩只作校字荆楚嵗時記又作敎今按當從廣韻及衆本云此最吉餘難同竄逐蠻荒幸不死衣食纔足甘長終侯王將相望久絶神縱欲福難為功夜投佛寺上髙閣星月揜映雲朣朧方云選秋興賦月朣朧而含光从日者非今按字書二字从日當更考之猿鳴鐘動不知曙杲杲寒日生於東岣嶁山東坡中隠堂詩岣嶁何須到韓公浪自悲謂此詩也岣嶁上音矩下音縷山尖神禹碑盛洪之荆州記曰南嶽周回數百里昔禹登而祭之又徐靈期南嶽記曰夏禹導水通瀆刻石書名山之髙南嶽文云髙四千一十丈南嶽即衡山也字青石赤形模竒科斗拳身薤音械古文似科斗薤書如薤葉倒披倒或作葉方从蜀本云衡陽舊刻亦然魏都賦云華蓮重葩而倒披薤今按岣嶁者衡山南麓别峯之名薤倒披者古有倒書見歐公集古録目唐𤣥度十體書方得之矣然今衡山寔無此碑此詩所記盖當時傳聞之誤故其卒章自為疑詞以見㣲意劉禹錫寄吕衡州書亦云嘗聞祝融峰上有神禹銘古石琅玕姿秘文螭虎形盖亦得於傳聞也鸞飄鳯泊拏奴加切又女書切皆以象其碑之摹刻虎螭事嚴跡秘鬼莫窺道人獨上偶見之我來咨嗟涕漣洏上音連下音而涕流貌千搜萬索何處有森森緑樹猿猱悲猱或作啼永貞行韓曰貞元二十一年徳宗崩順宗即位病㾦不能視朝王伾王叔文用事四月䇿皇太子八月立為皇帝是為憲宗順宗為太上皇改元永貞此詩載太皇謂順宗小人謂叔文元臣故老謂杜佑髙郢鄭玽瑜等嗣皇謂憲宗也君不見太皇諒隂指順宗即位之時未出令小人乘時偷國柄北軍百萬虎與貔音毗天子自将非他師或作時一朝奪印付私黨孫曰是嵗王叔文以金吾大將軍范希朝為左右神䇿諸行營節度以韓泰為其行軍司馬叔文欲奪取宦官兵權以自固籍希朝老將使主帥而實以泰專其事人情疑懼懍懔朝士何能為狐鳴梟噪争署置暘睒跳踉上音迢下音梁得意喜躍之貌相嫵媚上音武下音眉相媚悦也䁑睒或作睒閃方云䁑睒獸狂視貌字見吴都賦夜作詔書朝拜官超資越序曽無難公然白日受賄賂火齊下音劑韓曰珠名選班固西都賦翡翠火齊流耀含英注珠也樊曰火齊狀如雲母色如紫金有光耀别之則如蟬翼積之則如紗縠之重沓詳見南史祝曰文選磊落漫衍乎其側磊落堆金盤元臣故老不敢語晝卧王叔文用事一日諸相㑹食叔文至中書欲與韋執誼計事執誼起迎諸相停箸以待有頃報叔文索飯已與韋相同飡閣中矣杜佑髙郢懼不敢言鄭珣瑜獨歎曰吾豈可復居此位索馬徑歸卧不起涕泣何汍瀾董賢三公誰復惜三或作一非是侯景九錫行可歎國家功髙徳且厚天位未許庸夫干嗣皇卓犖信英主文如太宗武髙祖膺圖受禪登明堂共流幽州鯀死羽四門肅穆賢俊登數君謂栁宗元劉禹錫之𩔖匪親豈其朋郎官孫曰時貶禮部員外郎栁宗元邵州司封郎中韓􅈌池州屯田員外郎劉禹錫連州刺史皆自郎官遷謫清要為世稱荒郡廹野嗟可矜湖波連天日相騰蠻俗生梗瘴癘烝江氛嶺祲音浸妖氣昏若凝一蛇兩頭見未曾怪鳥鳴喚令人憎鳴喚或作争鳴蠱蟲羣飛夜撲燈雄虺毒螫墮股肱食中置藥肝心崩左右使令詐難憑慎勿浪信常兢兢吾嘗同僚補註退之與子厚禹錫最厚善江陵途中寄三學士詩云同官盡才俊偏善栁與劉情可勝嘗或作常非是具書目見韓曰公先以言事出為陽山令故書所目見告之非妄徴嗟爾既往宜為懲洞庭湖阻風贈張十一署永貞元年自陽山徙掾江陵十月過洞庭湖作或云赴陽山時非也公江陵途中詩序初赴陽山云春風洞庭浪而此詩首云十月隂氣盛可知其非矣十月隂氣盛北風無時休蒼茫洞庭岸與子維雙舟霧雨晦爭泄波濤怒相投大雞斷四聽斷方从杭蜀本作絶今按此句既有絶字則下一句不應便復出方為杭蜀所誤比多矣今但刋正不能悉論而論其最著者一二以曉觀者糧絶誰與謀相去不容步險如礙山丘清談可以飽夢想接無由男女喧左右飢啼但啾啾非懐北歸興何用勝羇愁雲外有白日寒光自悠悠能令暫開霽過是吾無求李花贈張十一署或作李有花江陵城西二月尾花不見桃惟見李風揉雨練雪羞比揉或作柔非是波濤翻空杳無涘翻空方作相翻非是君知此處花何似白花倒燭天夜明羣雞驚鳴官吏起金烏海底初非來朱輝散射青霞開迷魂亂眼看不得迷魂亂眼或作迷亂入眼入又作人皆非是照耀萬樹繁如堆念昔少年著遊燕對花豈省曾辭盃省曾辭或作曾辟酒非是自從流落憂感集欲去未到先思㢠祗今四十已如此後日更老誰論哉力􅂝一樽獨就醉獨或作共非是不忍虛擲委黄埃委或作隨杏花居鄰北郭古寺孫曰江陵所居之隣空杏花兩株能白紅曲江滿園不可到看此寜避雨與風二年流竄出嶺外所見草木多異同冬寒不嚴地恒泄陽氣發亂無全功無全閤本作全無非是浮花浪蘂鎮長有纔開還落瘴霧中山榴躑躅上直炙切下厨玉切韓曰本草注躑躅樹生髙三四尺花似山石榴少意思照耀黄紫徒為業鷓鴣鉤輈下張流切孫曰鉤輈鷓鴣聲祝曰嶺春記鷓鴣自呼曰鉤輈李羣玉詩又聽鉤輈格磔聲猿呌歇杳杳深谷攅青楓杳杳或作杳靄豈如此樹一來翫若在京國情何窮今旦胡為忽惆悵惆或作怊後倣此萬片飄泊隨西東明年更發應更好更發一作花發道人孫曰謂寺僧樊曰八年六月公召拜國子博士明年花發時公為博士于京矣莫忘鄰家翁感春四首我所思兮在何所情多地遐兮徧處處東西南北皆欲往千山隔兮萬山阻孫曰張衡四愁詩我所思兮在泰山欲往從之梁甫艱我所思兮在桂林欲往從之湘水深我所思兮在漢陽欲往從之隴坂長我所思兮在鴈門欲往從之雪紛紛公云取此春風吹園雜花開朝日照屋百鳥語三盃取醉不復論一生長恨奈何許諸本奈作春方从杭蜀本云古樂府奈何許石闕生口中銜碑不得語皇天平分成四時春氣漫誕最可悲雜花粧林草盖地白日座上傾天維傾謂傾側風動而然西京賦振天維衍地絡一本注云天維謂春光照灼如維㡩之張舉也蜂喧鳥咽留不得紅蕚萬片從風吹豈如秋霜雖惨冽慘或作凛方以西京賦氷霜慘冽定作慘摧落老物樊曰晉宣帝嘗疾張皇后往省帝曰老物可憎又曰老物不足惜誰惜之為此徑須沽酒飲自外天地棄不疑近憐老杜無檢束爛漫長醉多文辭屈原離騷二十五樊曰屈原賦二十五篇盖離騷經一九歌十一天問一九章九逺遊十居漁父各一凢二十五篇不肯餔啜糟與醨惜哉此子巧言語不到聖處寜非癡韓曰聖處謂酒清者為聖人先儒云公以原介於莊周司馬遷之間其感春云云盖與屈原之懲于諷諌而傷其違聖之達節也幸逄堯舜明四目條理品彚皆得冝平明出門暮歸舍酩酊馬上韓曰晉山簡毎出嬉遊兒童歌曰日夕倒載歸酩酊無所知時時能騎馬倒著白接離知為誰閤杭蜀本作誰為方从諸本云按公後詩有遇酒即酩酊公知我為誰即此義也此今按方氏此論最公使他處皆如則無可議矣朝騎一馬出瞑就一牀卧詩書漸欲抛節行久已惰方作破非是冠欹感髪禿語誤驚齒墮孤負平生心孤或作辜已矣知何奈乃个切元􅍬立部伎詩云古人邪正知誰奈作諸本皆同無可疑者荆公本奈作那李本知如亦無大異獨方从閤本作巳知無可奈乃不成文理故今定以諸本我恨不如江頭人我恨方从杭本作奈我閤本無奈字亦無恨字蜀作我奈今按杭蜀本盖因前篇之未有奈字而誤也閤本亦少一字皆非是今从監本長網横江遮紫鱗獨宿荒陂射鳬鴈賣納租賦官不嗔歸來歡笑對妻子衣食自給寧羞貧今者無端讀書史智慧只足勞精神閤本如此為當方乃不从而以足為是又不可曉也畫蛇著足無處用兩鬢雪白趨埃塵乾愁漫解坐自累與衆異趣誰相親數盃澆腸雖暫醉皎皎萬慮醒還新百年未滿不得死且可勤買抛青春買或作置樊曰酒名也唐人名酒多以春杜子美有麯米春裴鉶作傳亦有松醪春寒食日出遊張十一院長見示病中憶花九篇寒食日出遊夜歸因以投贈張十一院長即工曹署樊曰國史補云外郎遺補相呼為院長補注公與張同自御史貶官又同為江陵椽公法曹參軍張功曹叅軍元和元年李花初發君始病我往看君花轉盛走馬城西惆悵歸不忍千株雪相映邇來又見桃與棃交開紅白如争競可憐物色阻攜手空展霜縑音兼祝曰絲繒也古樂府云新人工織縑故人工織素吟九詠紛紛落盡泥與塵不共新粧比端正桐華最晚今已繁君不强起時難更闗山逺别固其理寸步難見始知命憶昔與君同貶官夜渡洞庭看斗柄豈料生還得一處引袖拭淚悲且慶各言生死兩追隨生死方作死生直置心親無貌敬念君又署南荒吏路指鬼門樊曰容州北流縣南三十里有二石相對闊三十歩俗號鬼門闗諺曰鬼門闗十人九不還幽且夐休正切逺也三公盡是知音人曷不薦賢陛下聖囊空甑倒誰救之我今一食日還併自然憂氣損天和安得康强保天性斷鶴兩翅鳴何哀縶驥四足氣空横戸孟切今朝寒食行野外縁楊市岸蒲生迸生或作芽宋玉庭孫曰宋玉楚人故居在江陵韓曰杜詩曽聞宋玉宅毎欲到荆州荆州即江陵也邊不見人輕浪參差魚動鏡自嗟孤賤足瑕疵特見放縱荷寛政飲酒寜嫌􅊦底深題詩尚倚筆鋒勁明宵故欲相就醉故或作固有月莫愁當火令洪曰此詩春末夏初故云火令方云非也此謂寒食禁火耳火令字見周禮魏武帝亦有寒食禁火令但東坡嘗為李公擇書此詩作燈火令又不知其所據何本也今按方説是也此言夜行有月故不憂當寒食禁火之令耳坡讀亦誤憶昨行和張十一或作和張十一憶昨行憶昨夾鍾之吕初吹灰上公禮罷元侯迴上洪作杜云杜佑自淮南入朝也方作杜云此為荆帥裴均罷社而享客也官今按方説是也但以上為社則未然左傳云五行之封為上公祀為貴神其土正曰后土在家則祀中霤在野則為社故杜注用幣于社云以請于上公則上公即社神也况此句内又自以元矦為對耶車載牲牢甕舁音余對舉也酒並召賔客延鄒枚腰金首翠謂娼姬之服光照耀絲竹逈發清以哀青天白日花草麗玉斚屢舉傾金罍張君名聲座所屬起舞先醉長松摧宿酲未解舊痁失亷切瘧疾左傳曰痁作而伏作舊痁方作店字此今按此句内上有宿酲字則當為舊痁明矣方誤深室静卧聞風雷自期殞命在春序屈指數日憐嬰孩危辭苦語感我耳淚落不揜何漼漼徂回切選指季豹而漼焉注涕泣垂貌念昔從君渡湘水湘或作湖大㠶夜劃窮髙桅吾回切檣竿陽山鳥路出臨武驛馬拒地驅頻隤三舘本作搥方云博雅搥擡也亦有義馳今按方義暗僻不可曉此但言當謫官時驛發遣而山路險惡故羸馬拒地不進被驅而屡至傾隤耳隤或取虺隤字然其義但為不能升髙之病又似未必然也踐蛇茹蠱不擇死忽有飛詔從天來伾文未揃崖州韋執誼也熾揃或作剪謝校以剪方云説文揃㓕也史記西南夷賛有揃剽字雖得赦宥恒愁猜近者三姦悉破碎集註元和元年正月順宗即位二月大赦公自陽山徙椽江陵三姦方用事其年八月憲宗立伾貶開州司馬叔文渝州司戸並員外置十一月繼貶執誼崖州司馬及是三姦始悉破碎焉羽窟無底幽黄能集註能有兩音奴來切者三足鼈也奴登切者熊属足似鹿者也左傳堯殛鯀于羽山其神化為黄熊以入于羽淵國語作黄能音賢能之能東海人祭禹廟不用能肉及鼈為饌疑鯀化為二物則兩音亦可通用眼中了了見鄉國知有歸日眉方開今君縱署天涯吏縱或作從署今按張署墓志邕管張為判官也投檄北去何難哉無妄之憂勿藥喜一善自足禳千灾頭輕目朗肌骨徤古劔新斸磨塵埃殃銷禍散百福併從此直至耉與鮐音台樊曰詩黄耉鮐背箋云台之言鮐也大老則背有鮐文耉或作耆嵩山東頭伊洛岸勝事不假須穿栽或作裁君當先行我待滿沮溺可繼窮年推他回切韓曰取禮記三推九推之意别本韓文考異巻三欽定四庫全書别本韓文考異巻四宋王伯大重編
