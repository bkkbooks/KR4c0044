front:
  text: 麟解
  hash: sha256:835cbb95b8519ab2a49cd32d2d7fdeef62270e89a3a41121ebe6b06626a2f9ed
body:
  text: 方云李本云元和七年麟見東川疑公因此而作然李翺甞書此文以贈陸傪傪死於貞元十八年則此文非元和間作也今按此文有激而托意之詞非必為元和獲麟而作麟之為靈昭昭也詠於詩書於春秋雜出於傳記百家之書雖婦人小子皆知其為祥也書於或作載於然麟之為物不畜於家不恒有於天下其為形也不類非若馬牛犬豕豺狼麋鹿然馬牛或作牛馬鹿然或作鹿之狀或無之字皆非是然則雖有麟不可知其為麟也角者吾知其為牛鬛者吾知其為馬犬豕豺狼麋鹿吾知其為犬豕豺狼麋鹿下或有也字惟麟也不可知不可知則其謂之不祥也亦宜雖然麟之出必有聖人在乎位麟為聖人出也聖人者必知麟麟之果不為不祥也又曰麟之所以為麟者以徳不以形下或有也字若麟之出不待聖人則謂之不祥也亦宜下或有也字或有哉字師説古之學者必有師師者所以傳道授業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之閣本無此五字非是生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎庸方從閣杭作豈或并有二字而無夫字皆非是是故無貴無賤無長無少道之所存師之所存也方無也字嗟乎師道之不傳也乆矣欲人之無惑也難矣嗟上或有咨字非是古之聖人其出人也逺矣猶且從師而問焉今之衆人其下聖人也亦逺矣而恥學於師且或作巳下或作去下非是是故聖益聖愚益愚聖人之所以為聖愚人之所以為愚其皆出於此乎愛其子擇師而敎之於其身也則恥師焉惑矣彼童子之師授之書而習其句讀者非吾所謂傳其道解其惑者也非上或有也字方云讀音豆周禮天官注徐邈讀馬融笛賦作句投徒闘切何休公羊序失其句讀不音山谷和黄冕仲詩只從如字句讀之不知惑之不解或師焉或不焉小學而大遺吾未見其明也巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則羣聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近䛕盛或作大語官盛語見中庸嗚呼師道之不復可知矣巫醫樂師百工之人君子不齒今其智乃反不能及其可怪也歟不齒或作鄙之其可或無其字聖人無常師孔子師郯子萇𢎞師襄老􅆅句絶郯子之徒其賢不及孔子方無孔子師郯子五字而以萇𢎞師襄老􅆅六字連下句郯子之徒為句曰校本一云郯子下當有數子二字其上當存孔子師三字為是今按孔子見郯子在適周見萇𢎞老􅆅之前而聖人無常師本杜氏注問官名語故此上句既叙孔子所師四人而再舉郯子之徒則三子在其中矣方氏知當存孔子師字而不知當并存上郯子二字乃以下郯子二字屬上句讀之而疑郯子之下更有數子二字誤矣孔子三人行則必有我師子下或有曰字方從杭本云按論本無則字曰字似不當有是故弟子不必不如師師不必賢於弟子故上或無是字聞道有先後術業有專攻如是而巳李氏子蟠年十七好古文六藝經傳皆通習之不拘於時學於余余嘉其能行古道作師説以貽之學上或有請字方無下余字進學解國子先生晨入太學招諸生立館下招或作召誨之曰業精於勤荒於嬉行成於思毁於隨方今聖賢相逢治具畢張拔去兇邪登崇畯良畢或作必畯或作俊方云古文尚書俊皆作畯公陀文石本多用畯字新舊史同上占小善者率以錄名一藝者無不庸爬滿巴切爬或作把方云音義同羅剔抉於庚切刮垢磨光葢有幸而獲選孰云多而不揚諸生業患不能精無患有司之不明之不或作不能非是行患不能成無患有司之不公言未既有笑於列者曰先生欺余哉弟子事先生於兹有年矣年方作時云考舊史公時以職方下遷葢非乆於博士今按此文恐非職方左遷時作説見下三年博士注先生口不絶吟於六藝之文手不停披於百家之編吟或作唫記事者必提其要纂言者必鉤其𤣥記或作紀貪多務得細大不捐焚膏油以繼晷恒兀兀以窮年先生之業可謂勤矣焚或作燒兀兀或作矻矻之下或有於字觝音底角觸排異端攘斥佛老補苴子余切苴所以藉履方云衣敝不補履決不苴罅呼呀切孔鏬漏張皇幽眇吕氏春秋語抗辭幽說閎意眇㫖見揚子雲解難尋墜緒之茫茫獨旁搜而逺紹障百川而東之迴狂瀾於既倒先生之於儒可謂有勞矣茫茫或作芒芒障或作停方云禮記鯀鄣洪水音章或無有字沈浸醲郁含英咀華醲或作釀作為文章其書滿家上規姚姒徐里切夏姓也姚舜姓也渾渾無涯無或作亡或作之非是周誥殷盤佶屈聱五交切韓曰廣雅謂不入人語也孫曰佶屈聱牙皆艱澁也牙春秋謹嚴左氏浮誇易奇而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣文方作徳或作儒或作得非是少始知學勇於敢為長通於方左右具宜先生之於為人可謂成矣具或作其或作且人上或無為字然而公不見信於人私不見助於友跋前躓言致後動輙得咎躓多或㚄方云載㚄其尾説文與躓同暫為御史遂竄南夷三年博士冗不見治平聲遂或作逐年方作為謂貞元末為四門博士元和初為國子博士今復下遷諸本多作三年樊謂公元和元年六月為博士四年六月遷都官史謂三嵗為真葢三年也今按洪譜則樊説為是當作三年唐本詩注行狀皆有三年字何煩曲説乎然洪亦附三為之説則又誤矣命與仇謀取敗幾時冬暖而兒號寒年豐而妻啼飢取方作其豐或作登頭童齒豁竟死何裨不知慮此而反敎人為先生曰吁子來前夫大木為杗音肓爾雅杗瘤謂之梁説文云杗屋大梁也細木為桷左氏傳子尾抽桷撃扉注桷椽也詩松桷有梴欂櫨侏儒欂音薄櫨音盧三者皆屋上短柱欂一名枅櫨一名楶株儒一名棁字或作株檽椳音隈户樞闑魚列切門限扂亭㸃切門闗壯楔音屑門兩傍木各得其宜施以成室者匠氏之工也或無宜字室下有屋字工作功方云淮南子曰賢王之用人也猶巧工之制木也大者以為舟航梁棟小者以為楫楔脩者以為櫚欀短者以為株儒枅櫨無小大脩短皆得其所宜規短方圓各有所施天下之物莫凶於雞毒烏頭也然而良醫蠧而藏之有所用也是故林莽之材猶不棄者而况於人乎公言葢祖此而宜施二字當為一餙玉札丹砂赤箭青芝牛溲音瘦馬勃敗鼓之皮七者皆藥名也玉泉一名玉札生藍田山谷赤箭生陳倉山谷及泰山少室青芝出泰山牛溲牛溺馬勃馬屁菌也生濕地及腐木上敗鼓皮主蟲毒出本草俱収並蓄待用無遺者醫師之良也登明選公雜進巧拙紆音迂紆回屈曲貌餘為妍卓犖為傑校短量長惟器是適者宰相之方也卓犖或作犖犖昔者孟軻好辯孔道以明轍環天下卒老於行荀卿守正大論是𢎞逃讒於楚廢死蘭陵荀卿至是𢎞八字方從舊史如此又云文苑上文皆同惟是𢎞作以興葢國初以諱避也閤本亦只作大論以正為王以論為倫自杭本也而新史又易守為宗其訛益甚矣是二儒者吐辭為經舉足為法絶類離倫優入聖域其遇於世何如也遇或作進今先生學雖勤而不繇其統言雖多而不要平聲其中文雖竒而不濟於用行雖修而不顯於衆顯或作洎舊史四句皆無而字猶且月費俸錢嵗靡與縻同廩粟俸或作奉子不知耕婦不知織乘馬從徒安坐而食從或作而非是踵常途之促促窺陳編以盜竊促促諸本多作役役方云促音齪公張署墓誌抑首促促就食與此同史記申屠嘉娖娖亷謹娖與促音義通集韻齪下二字皆出編或作篇然而聖主不加誅宰臣不見斥兹非其幸歟或作其字或作此非其利哉動而得謗名亦隨之投閒置散乃分之宜若夫商財賄之有亡計班資之崇庳音卑忘已量之所稱去聲指前人之瑕疵是所謂詰匠氏之不以杙音弋莊子求狙猴之杙者斬之杙橜也楹柱也杙小而楹大故以杙自喻為楹而訾醫師以昌陽引年欲進其狶苓也狶音喜又音希昌陽本草昌蒲注生石磧上概節者良生下濕地大根乃是昌陽不可服東坡云不知退之即以昌陽為昌蒲耶抑謂其似是而非不可以引年也孫曰昌蒲味辛温無毒乆服輕身不老延年益心智一名昌陽生上洛池澤及蜀郡嚴道祝曰楚人呼猪為狶狶苓乃猪苓也已量或作量巳非是師下或有不字今按本草昌蒲一名昌陽作不以者非是本政周之政文既其弊也其方作有或無其字今按猶言既而弊矣既字又似及字後世不知其承大敷古先遂一時之術以明示民遂或作逐民始惑敎百氏之説以興其言曰天下可為也彼之政仁矣反於誼此之政敬矣戾於忠何居我其周從乎曰周不及殷其殷從乎曰夏曰虞曰陶唐曰三皇氏曰遂古之初何居方無何字或無居字我或作吾今按何居凖檀弓音姬大率此篇僻澁必其少作今或有所未通闕之可也暴孽情飾滛志孽或作泰枝辭琢正紛紊紏射以僻民和以導民亂嗚呼道之去世其終不復矣乎長民者發一號施一令民莫不悱芳尾切口悱悱也然非矣或無然非二字謂不可守遽變而從之譬將適千里及門而復後雖矻矻苦骨切矻矻堅也用心貌決不可暨方無後字暨或作洎原其始固有啟之者也聞於師曰古之君天下者化之不示其所以化之之道及其弊也易之不示其所以易之之道政以是得民以是淳其有作者知敎化之所繇廢抑詭怪而暢皇極伏文貌而尚忠質怪或作類茫乎天運窅音窈爾神化道之行也其庶矣乎守戒詩曰大邦維翰書曰以蕃王室諸侯之於天子不惟守土地奉職貢而已固將有以翰蕃之也今人有宅於山者知猛獸之為害則必髙其柴楥而外施窞穽以待之楥方云籬也欄也字當從木宅於都者知穿窬之為盜則必峻其垣墻而内固扃鐍古冗切孫云莊子曰固扃鐍扃闗也鐍劒也以防之此野人鄙夫之所及非有過人之智而後能也今之通都大邑介於屈强衢物巨兩二切或作倔强之間而不知為之備意亦惑矣野人鄙夫能之而王公大人反不能焉豈材力為有不足歟野下或無人鄙二字為下或有之而二字或只有之字今詳文勢疑為字衍葢以謂不足為而不為耳天下之禍莫大於不足為句下或有而不為三字今詳文勢疑下足字衍下文不足為者放此材力不足者次之足下或有為字非是不足為者敵至而不知材力不足者先事而思則其於禍也有間矣彼之屈强者帶甲荷戈不知其多少其緜地則千里而與我壤地相錯與上方無而字無有丘陵江河洞庭孟門之闗其間又自知其不得與天下齒朝夕舉踵引頸冀天下之有事以乘吾之便頸或作領此其暴於猛獸穿窬也甚矣嗚呼胡知而不為之備乎哉賁育之不戒童子之不抗魯雞之不期蜀雞之不支今夫鹿之於豹非不巍然大矣於或作與非是然而卒為之禽者爪牙之材不同猛怯之資殊也曰然則如之何而備之曰在得人圬者王承福傳圬或作杇方云圬音烏左傳圬人以時塓館宮室杜注圬人塗者題語正本此説不當用杇字今按論語作杇圬之為技賤且勞者也有業之其色若自得者聴其言約而盡問之王其姓承福其名世為京兆長安農夫方無夫字天寳之亂發人為兵持弓矢十三年有官勲棄之来歸喪其土田手鏝母官切祝曰鏝杇具爾雅鏝謂之杇衣食餘三十年舍於市之主人而歸其屋食之當焉視時屋食之貴賤而上下其圬之傭以償之有餘則以與道路之廢疾餓者焉又曰粟稼而生者也若布與帛必蠶績而後成者也其他所以養生之具皆待人力而後完也吾皆頼之然人不可徧為宜乎各致其能以相生也故君者理我所以生者也方從閤杭本如此諸本以生或作以出令今按所以出令與原道意同似當從之然詳上文有三生字故此言君者理我之所以生者正承上文而言也若作出令則與上下文意皆不叶矣今當以方本為正而百官者承君之化者也方從閤杭無也字非是任有小大惟其所能若器皿焉食焉而怠其事必有天殃故吾不敢一日捨鏝以嬉一日捨鏝或作捨鏝一日夫鏝易能可力焉又誠有功取其直雖勞無愧吾心安焉夫力易强而有功也心難强而有智也智上方無有字用力者使於人用心者使人亦其宜也吾特擇其易為而無愧者取焉特或作故嘻吾操鏝以入貴富之家有年矣入下或有於字有一至者焉又往過之則為墟矣有再至三至者焉而往過之則為墟矣問之其鄰或曰噫刑戮也或曰身既死而其子孫不能有也或曰死而歸之官也問下或無之字死上或無曰字吾以是觀之非所謂食焉怠其事而得天殃者耶焉下或有而字非强心以智而不足不擇其才之稱否而冒之者耶非多行可愧知其不可而强為之者耶知其不可下杭本有能字蜀本能上又有强字方從閤本作知已之不可能又無强字今按此數夲語意皆與上文不擇其才之稱否者相復又與本句多行可愧者不相承惟杭蜀本近是但能字亦未安而强字當在而字下耳今參取二本定為知其不可而强為之則其上下文之義皆暢矣將富貴難守薄功而厚饗之者耶方無之字抑豐悴有時一去一來而不可常者耶吾之心憫焉是故擇其力之可能者行焉樂富貴而悲貧賤我豈異於人哉又曰功大者其所以自奉也博妻與子皆養於我者也吾能薄而功小不有之可也我者閤本作我類有之閤作有小皆非是又吾所謂勞力者若立吾家而力不足則心又勞也者下或有也字一身而二任焉雖聖者不可能也愈始聞而惑之又從而思之葢賢者也葢所謂獨善其身者也然吾有譏焉謂其自為也過多其為人也過少其學楊朱之道者耶楊之道不肯拔我一毛而利天下而夫人以有家為勞心不肯一動其心以畜其妻子其肯勞其心以為人乎哉楊之上或有然字非是畜或作蕃雖然其賢於世之患不得之而患失之者以濟其生之欲貪邪而亡道以喪其身者其亦逺矣亡或作忘又其言有可以警余者故余為之傳而自鑒焉鑒方作覽或作覺今疑自鑒或當作日覽五箴并序人患不知其過既知之不能改是無勇也方無是字余生三十有八年三或作四方從閤杭蜀本云洪樊辨證詳矣髮之短者日益白齒之揺者日益脱聰明不及於前時道徳日負於初心二於字或並作于其不至於君子而卒為小人也昭昭矣作五箴以訟其惡云游箴余少之時將求多能蚤夜以孜孜余今之時既飽而嬉蚤夜以無為余方從閤杭蜀本並作于云左傳于民生之不易于勝之不可保杜注于曰余今按方云不為無据然與所證之文初不相似况下文有嗚呼余乎則此于字皆是余字明矣嗚呼余乎其無知乎君子之棄而小人之歸乎知下或無乎字言箴不知言之人烏可與言知言之人黙焉而其意已傳烏或作焉焉或作然幕中之辯人反以汝為叛臺中之評人反以汝為傾以汝方並作汝以今按近世校本務為新竒多作倒語文乖字逆幾類歐陽公所譏石公操作字之怪殊失韓公立言本意今悉正之不敢從也汝不懲邪而呶呶女交切以害其生耶行箴行或作悔行與義乖言與法違後雖無害汝可以悔行也無邪言也無頗普禾切死而不死汝悔而何宜悔而休汝惡曷瘳宜休而悔汝善安在悔不可追悔不可為思而斯得汝則弗思追諸本皆同而方從閤抗作止今按草書追字近似止字二本偶以傳寫致誤而方乃以好怪取之不復計其文義之通塞可一笑也好惡箴無善而好不觀其道無悖而惡不詳其故善方從杭蜀作悖今按二本葢由下句而誤方亦不顧文義而取之也前之所好今見其尤從也為比捨也為讐前之所惡今見其臧從也為愧捨也為狂維讐維比維狂維愧於身不祥於徳不義不義不祥維惡之大幾如是為而不顛沛齒之尚少庸有不思今其老矣不慎胡為知名箴内不足者急於人知霈焉有餘厥聞四馳焉或作然今日告汝知名之法勿病無聞病其􅓮􅓮昔者子路惟恐有聞赫然千載徳譽愈尊矜汝文章負汝言語乘人不能揜以自取汝非其父汝非其師不請而敎誰云不欺欺以賈音古憎揜以媒怨汝曽不寤以及於難小人在辱亦克知悔及其既寧終莫能戒及其或作其及既出汝心又銘汝前汝如不顧禍亦宜然禍亦方作辱則後漢三賢賛三首樊曰後漢王充王符仲長統三人者同傳公為之賛各不滿百言而叙事畧無遺者王充者何㑹稽上虞本自元城爰来徙居師事班彪家貧無書閲書於肆市肆是遊一見誦憶遂通衆流閉門潜思論衡韓曰王充所為論衡初中土未有傳者蔡邕入呉始得之常祕以為談助其後王良為㑹稽太守亦得其書及滿許下時人稱其才進或曰不見異人當得異書以修為州治中自免歸歟同郡友人謝姓夷吾上書薦之待詔公車以病不行年七十餘乃作養性一十六篇肅宗之時終於永元王符節信安定臨涇好學有志為鄉人所輕或無為字人或作里憤世著論潜夫是名述赦之篇以赦為賊良民之甚其㫖甚明甚或作急方云王符述赦篇曰今日賊良民之甚者莫大於數赦公全具此語皇甫度遼聞至乃驚衣不及帶屣履出迎豈若雁門問雁呼卿樊曰度遼將軍皇甫規解官歸安定鄉人有以貫得雁門大守者亦還家書刺謁規規卧不起既入而問卿前在郡食雁美乎有頃王符在門規素間符名衣不及帶屣履出迎時人為之語曰徒見二千石不如一逢掖不仕終家吁嗟先生仲長統公理山陽髙平或無仲字謂髙幹有雄志而無雄才諸上或冇自字其後果敗以此有聲俶儻敢言語黙無常人以為狂生俶或作攔方云俶與傳合州郡㑹召稱疾不就著論見情初舉尚書郎後參丞相軍事卒不至於榮舉下或有髙弟字今按本傳無髙弟字論説古今發憤著書昌言是名友人繆襲稱其文章足繼西京文章方云考本傳當作才韓公三賛未甚致立一語四十一終何其短耶嗚呼先生一下方有而字諱辯愈與李賀書李上方有進士二字非是勸賀舉進士賀舉進士有名與賀争名者毁之此公自言甞勸李賀舉進士而賀從巳説舉進士有名稱故與之爭名者毁之也今方氏乃從諸本刪去名字而以有字屬下句遂使復出四字為剩語而爭名二字無所承故諸本亦有覺其誤者而并刪四字以從有雖若小勝方本然要為失韓公本指而不究毁者之情也方本又無之字亦非是方又云康駢劇談錄謂公此文因元稹而發董彦逺謂賀死元和中使稹為禮部亦不相及爭名葢當時同計者曰賀父名晉肅賀不舉進士為是勸之舉者為非聴者不察也和而唱之同然一辭或無也字皇甫湜曰若不明白子與賀且得罪方無若字愈曰然律曰二名不徧諱釋之者曰謂若言徴不稱在言在不稱徴是也律曰不諱嫌名釋之者曰謂若禹與雨丘與蓲之類是也蓲與丘同音烏蓲草名或無此注字今賀父名晉肅賀舉進士為犯二名律乎為犯嫌名律乎父名晉肅子不得舉進士若父名仁子不得為人乎嫌名律乎下諸本皆有此二十字方從杭本去之非是夫諱始於何時作法制以敎天下者非周公孔子歟周公作詩不諱若曰克昌厥後又曰駿發爾私若字方作周公孔子不偏諱二名若曰宋不足徴又曰某在斯若字方作孔子春秋不譏不諱嫌名若衛􅁊公名完本或無若字康王釗音招之孫實為昭王曽參之父名晳曽子不諱昔若曰昔者吾友乂曰裼裘而弔若字方作曽子周之時有騏期漢之時有杜度此其子宜如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎期字度字下或並有者字方云董彦逺曰騏期以姓苑考之為朞又李涪謂杜澡字伯度魏人以武帝諱謂杜度公誤用也然張仲景方自有杜度公所用或出此漢諱武帝名徹為通不聞又諱車轍之轍為某字也諱呂后名雉為野雞不聞又諱治天下之治為某字也或無下又諱二字方云顔氏家訓曰􅁊公名白傳有五皓之稱萬王名長琴有脩短之目不聞謂布帛為布皓呼䁂腸為腎脩公言葢有自也今按公言或與顔氏偶同未必用其語也今上章及詔不聞諱滸勢秉饑太祖名虎太宗名世民代宗名昞𤣥宗名隆基也惟宦官宫妾乃不敢言諭及機以為觸犯以諭為近代宗廟諱以機為近𤣥宗廟諱士君子言語行事宜何所法守也言語或作立言今考之於經質之於律稽之以國家之典賀舉進士為可耶為不可耶或無舉字為可下或無邪字方無邪為二字凡事父母得如曾參可以無譏矣作人得如周公孔子亦可以止矣矣或並作也方並作耶今世之士不務行曽參周公孔子之行而諱親之名則務勝於曽參周公孔子亦見其惑也夫周公孔子曾參卒不可勝勝周公孔子曽參乃比於宦官宮妾則是宦官宮妾之孝於其親賢於周公孔子曽參者耶宦者或並作宦官訟風伯訟或作䜛非是維兹之旱兮其誰之由我知其端兮風伯是尤旱上或無之字山升雲兮澤上氣雷鞭車兮電搖幟雨􅎊􅎊兮將墜風伯怒兮雲不得止􅎊􅎊或作侵侵將下或有欲字暘烏之仁兮念此下民閟其光兮不鬪其神嗟風伯兮其獨謂何我於爾兮豈有其他獨或作將求其時兮脩祀事羊甚肥兮酒甚㫖食足飽兮飲足醉風伯之怒兮誰使雲屏屏兮吹使醨之氣將交兮吹使離之鑠之使氣不得化寒之使雲不得施氣不或作雲不雲不或作氣不嗟爾風伯兮欲逃其罪又何辭方無兮字又上或有其字上天孔明兮有紀有綱我今上訟兮其罪誰當我今或作今我天誅加兮不可悔風伯雖死兮人誰汝傷雖方作之非是汝或作爾伯夷頌士之特立獨行適於義而巳不顧人之是非皆豪傑之士信道篤而自知明者也一家非之力行而不惑者寡矣至於一國一州非之力行而不惑者葢天下一人而巳矣若至於舉世非之力行而不惑者則千百年乃一人而已耳若伯夷者窮天地亘萬世而不顧者也舉世非之下方從杭粹及范文正公冩本無力行二字千下有五其字云自周初至唐貞元未幾二千年公言千五百年舉成也今按此篇自一家一國以至舉世非之而不惑者泛説有此三等人而伯夷之窮天地亘萬世而不顧又别是上一等人不可以此三者論也前三等人皆非有所指名故舉世非之而不顧者亦難以年數之實論其有無而且以千百年言之葢其大約如此耳今方氏以伯夷當之巳失全篇之大指至於計其年數則又捨其幾二千年全數之多而反促就千五百年竒數之少其誤益甚矣方説不通文理大率類此不可不辨昭乎日月不足為明崒慈䘏切山髙兒乎泰山不足為髙巍乎天地不足為容也當殷之亡周之興㣲子賢也抱祭器而去之去下方無之字武王周公聖也從天下之賢士與天下之諸侯而往攻之未嘗聞有非之者也從或作率與或作從彼伯夷叔齊者乃獨以為不可殷既滅矣天下宗周彼二子乃獨恥食其粟餓死而不顧由是而言夫豈有求而為哉信道篤而自知明也明下或有者字今世之所謂士者或無所字一凡人譽之則自以為有餘一凡人沮之則自以為不足一凡人諸本兩句皆作凡一人唯范本並作一凡人乃與下文非聖人者相發明諸本非是彼獨非聖人而自是如此夫聖人乃萬世之標凖也余故曰若伯夷者特立獨行窮天地亘萬世而不顧者也凖方作唯今按凖字從水凖聲俗作准方本誤也又按此篇之意所謂聖人正指武王周公而言也既曰聖人則是固為萬世之標凖矣而伯夷者乃獨非之而自是如此是乃所以為窮天地亘萬世而不顧者也與世之以一凡人之毁譽而遽為喜愠者有間矣近世讀者多誤以伯夷為萬世標凖故因附見其説云别本韓文考異巻十二欽定四庫全書别本韓文考異巻十三宋王伯大重編雜著子産不毁鄉校頌我思古人伊鄭之僑以禮相國人未安其敎遊于鄉之校衆口囂囂安或作知方云此以敎叶僑與囂車牽詩用韵如此或謂子産毁鄉校則止曰何患焉可以成美夫豈多言亦各其志善也吾行不善吾避維善維否我於此視川不可防言不可弭下塞上聾邦其傾矣既鄉校不毁而鄭國以理在周之興養老乞言及其巳衰謗者使監成敗之迹昭哉可觀哉或作然維是子産執政之式維其不遇化止一國誠率是道相天下君交暢旁達施及無垠君或作者交暢旁達方從三本作旁暢交達非是達或作通於虖四海所以不理有君無臣誰其嗣之我思古人理下或有者字釋言此元和二年春作宰相鄭絪翰林學士李吉甫中書舍人裴垍也洪曰國語云驪姬使奄楚以環釋言注云以言自解釋也退之作釋言取此元和元年六月十日方無十日字愈自江陵法曹詔拜國子博士始進見今相國鄭公公賜之坐方無下公字且曰吾見子某詩吾時在翰林職親而地禁不敢相聞今為我寫子詩書為一通以來我下或有盡字而無為一通以字或無為我字而有盡字一方作二愈再拜謝退録詩書若干篇擇日時以獻若干方作著于獻下或有之字今按著于篇雖古語然施之於此似不相入且公亦未必特用此語以為奇也於後之數月有來謂愈者曰子獻相國詩書乎曰然曰有為讒於相國之座者曰韓愈曰相國徴余文余不敢匿相國豈知我哉子其慎之或無為字慎下方無之字愈應之曰愈為御史得罪徳宗朝同遷于南者凡三人獨愈為先収用相國之賜大矣百官之進見相國者或立語以退而愈辱賜坐語相國之禮過矣以或作巳四海九州之人自百官巳下欲以其業徹相國左右者多矣皆憚而莫之敢獨愈辱先索相國之知至矣賜之大禮之過知之至是三者於敵以下受之宜以何報况在天子之宰乎敵以或作敵巳方云國語自敵以下則有讐注敵體也今人多用敵已字者非宰下或有相字人莫不自知凡適於用之謂才堪其事之謂力愈於二者雖日勉焉而不迨束帶執笏立士大夫之行不見斥以不肖幸矣其何敢敖於言乎或無乎字夫敖雖凶徳必有恃而敢行愈之族親鮮少無扳音攀引也聨之勢於今不善交人無相先相死之友於朝無宿資蓄貨以釣聲勢宿資蓄貨或作宿貨蓄資弱於才而腐於力不能奔走乘機抵􅇖虚宜切以要權利夫何恃而敖若夫狂惑喪心之人蹈河而入火妄言而罵詈者則有之矣而愈人知其無是疾也雖有讒者百人相國將不信之矣愈何懼而慎歟相國或作宰相或無歟字既累月又有來謂愈曰有讒子於翰林舍人李公與裴公者子其慎歟愈曰二公者吾君朝夕訪焉以為政於天下而階太平之治或作理居則與天子為心膂出則與天子為股肱四海九州之人自百官巳下其孰不願忠而望賜不下或有能字非是愈也不狂不愚不蹈河而入火病風而妄罵不當有如讒者之説也雖有讒者百人二公將不信之矣愈何懼而慎既以語應客夜歸私自尤曰咄當没切市有虎而曽參殺人讒者之效也詩曰取彼讒人投畀豺虎豺虎不食投畀有北有北不受投畀有昊傷於讒疾而甚之之辭也又曰亂之初生譛始既㴠亂之又生君子信讒始疑而終信之之謂也孔子曰逺佞人夫佞人不能逺則有時而信之矣今我恃直而不戒禍其至哉徐又自解之曰市有虎聴者庸也曽參殺人以愛惑聰也巷伯之傷亂世是逢也聰或作聴非是亂世方作世亂今三賢方與天子謀所以施政於天下而階太平之治聴聰而視明公正而敦大夫聰明則聴視不惑公正則不邇讒邪敦大則有以容而思彼讒人者孰敢進而為讒哉聴視或作視聴進而或作而進雖進而為之亦莫之聴矣我何懼而慎方無而慎字既累月上命李公相客謂愈曰子前被言於一相今李公又相子其危哉方無哉字愈曰前之謗我於宰相者翰林不知也後之謗我於翰林者宰相不知也今二公合處而㑹言若及愈必曰韓愈亦人耳彼敖宰相又敖翰林其將何求必不然吾乃今知免矣既而讒言果不行宰相或皆作相國乃今或作今乃又無矣字既下方無而字愛直贈李君房别左右前後皆正人也欲其身之不正烏可得耶烏或作焉吾觀李生在南陽公之側有所不知知之未嘗不為之思有所不疑疑之未嘗不為之言勇不動于氣義不陳乎色乎或作于南陽公舉措施為不失其宜天下之所窺觀稱道洋洋者抑亦左右前後有其人乎公下或有之字有其方作其有凡在此趨公之庭議公之事者吾既從而遊矣或無此字今按此下疑當有而字言而公信之者謀而公從之者四方之人則既聞而知之矣李生南陽公之甥也人不知者將曰李生之托婚於富貴之家將以充其所求而止耳故吾樂為天下道其為人焉今之從事於彼也吾為南陽公愛之為南上或有能字又未知人之舉李生於彼者何辭彼之所以待李生者何道又或作且舉不失辭待不失道雖失之此足愛惜而得之彼為歡忻於李生道猶若也舉之不以吾所稱待之不以吾所期李生之言不可出諸其口矣吾重為天下惜之惜或作愛張中丞傳後叙元和二年四月十三日夜愈與呉郡張籍閱家中舊書得李翰所為張巡傳巡上方無張字翰以文章自名為此𫝊頗詳宻然尚恨有闕者不為許逺立傳又不載雷萬春事首尾逺雖才若不及巡者開門納巡位本在巡上授之柄而處其下無所疑忌竟與巡俱守死成功名城䧟而虜與巡死先後異耳開上或疑當有然字兩家子弟材智下不能通知二公志以為巡死而逺就虜疑畏死而辭服於賊逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎當其圍守時外無蜉蚍音孚音毗䖝浮蟻子之援所欲忠者國與主耳而賊語以國亡主滅語方校作悟滅下或有悟之字今按悟字無理且從諸本作語若果合有悟字即是誤字之訛但以字上若有語字或悟字或語之字或誤之字即滅字下皆不當復有誤之字若以字上無此四種字即滅字下皆當有誤之字逺見救援不至而賊来益衆必以其言為信外無待而猶死守人相食且盡雖愚人亦能數日而知死處矣逺之不畏死亦明矣烏有城壊其徒俱死獨蒙愧恥求活雖至愚者不忍為嗚呼而謂逺之賢而為之耶其徒上方有而字或又疑而字當在死字之下邪上方無之字説者又謂逺與巡分城而守城之䧟自逺所分始以此詬逺此又與兒童之見無異詬或作語非是人之將死其藏腑必有先受其病者引繩而絶之其絶必有處觀者見其然從而尤之其亦不達於理矣小人之好議論不樂成人之美如是哉如巡逺之所成就如此卓卓猶不得免其他則又何説當二公之初守也寧能知人之卒不救棄城而逆遁茍此不能守雖避之他處何益之卒或無之字及其無救而且窮也將其創楚良切傷也殘餓羸之餘雖欲去必不達二公之賢其講之精矣守一城捍天下以千百就盡之卒戰百萬日滋之師蔽遮江淮沮遏其勢天下之不亡其誰之功也之不或無之字非是當是時棄城而圖存者不可一二數所矩切擅彊兵坐而觀者相環也不追議此而責二公以死守亦見其自比於逆亂設滛辭而助之攻也攻或作功非是愈嘗從事於汴徐二府屢道於兩府間府或作親祭於其所謂雙廟者其老人往往説巡逺時事云南霽雲之乞救於賀蘭也方無之字賀蘭嫉巡逺之聲威功績出巳上不肯出師救愛霽雲之勇且壯不聴其語彊畱之具食與樂延霽雲坐霽雲慷慨語曰雲來時睢音綏宋州也陽之人不食月餘日矣雲雖欲獨食義不忍雖食且不下咽坐下或無霽雲字非是因拔所佩刀斷一指血淋漓以示賀蘭一座大驚皆感激為雲泣下雲知賀蘭終無為雲出師意即馳去將出城抽矢射佛寺浮圖矢著直畧切其上甎半箭曰吾歸破賊必滅賀蘭此矢所以志也箭或作笴歸或作師非是愈貞元中過泗州船上人猶指以相語城䧟賊以刃脇降巡巡不屈即牽去將斬之又降霽雲雲未應或無霽字巡呼雲曰南八男兒死耳不可為不義屈雲笑曰欲將以有為也公有言雲敢不死即不屈欲將或疑衍一字張籍曰有于嵩者少依於巡及巡起事嵩常在圍中及巡或作及其常方作嘗籍大厯中於和州烏江縣見嵩嵩時年六十餘矣或無下嵩字以巡初嘗得臨渙縣尉好學無所不讀或無嘗字籍時尚小粗問巡逺事不能細也云巡長七尺餘鬚髯若神嘗見嵩讀漢書謂嵩曰何為乆讀此乆或作又嵩曰未熟也巡曰吾於書讀不過三徧終身不忘也因誦嵩所讀書盡巻不錯一字嵩驚以為巡偶熟此巻因亂抽他帙以試無不盡然嵩又取架上諸書試以問巡巡應口誦無疑嵩從巡乆亦不見巡常讀書也為文章操紙筆立書未嘗起草起方作有樊曰巡開元二十四年進士劉夢得嘉話載其謝加金吾表有云主辱臣死當臣致命之時惡稔罪盈是賊滅亡之日激勵將士賦詩有云裹瘡猶出陣飲血更登陴又夜聞笛聲詩有云營開星月近戰苦陣雲深觀此則巡之文章可見矣一本作未嘗有草新添巡守睢陽詩全章云接戰春來苦孤城日漸危合圍侔月暈分守效魚麗屢厭黄塵起時將白羽麾裏瘡猶出陣飲血更登陴忠信應難敵堅貞自不移無人報天子心計欲何施初守睢陽時士卒僅萬人城中居人户亦且數萬巡因一見問姓名其後無不識者或無户字巡怒鬚髯輒張及城䧟賊縳巡等數十人坐且將戮巡起旋其衆見巡起或起或泣或起或作猶起巡曰汝勿怖死命也衆泣不能仰視巡就戮時顔色不亂陽陽如平常逺寛厚長者貌如其心與巡同年生月日後於巡呼巡為兄死時年四十九呼巡或作呼之嵩貞元初死於亳宋間或傳嵩有田在亳宋間武人奪而有之嵩將詣州訟理為所殺嵩無子張籍云嵩將上或有而字為下或有其字皆非是河中府連理木頌司空咸寧王渾瑊也尹蒲之七年木連理生于河之東邑野夫來告且曰吾不知古殆氣之交暢也維吾王之徳交暢者有五是其應乎殆或作始或無五字皆非是訓戎奮威蕩戮凶回舉政宣和人則咸嘉入踐台階庶尹克司來帥熊羆四方作儀閔仁鰥寡不寧燕息仁或作人非是人樂王徳祝年萬億府有羣吏王有從事異體同心歸民于理異體或作上下非是體方作事天子是嘉俾錫勞王王拜稽首天子之光庶徳昭融神斯降祥殊本連理之柯同榮異壟之禾方云三館本潮本之柯皆作枝柯仍與下文同榮為一句今本木作禾由枝字訛也今按殊本連理之柯即今所頌之木也同榮異壟之禾即書所謂異畆同穎之嘉禾也葢追為前白之預言而泛舉其類耳司馬相如所謂雙鮥共抵之獸其句法亦類此如方所定則理乖語贅句分而韻不恊失之逺矣吾傒之産兹土也乆矣方無之字今按之字疑當作其今欲明于大君紀于策書王抑余也冶金伐石埀耀無極王余抑也欲或作將王余抑也或作余抑王也或依上文作王抑余也方從三本定此今按抑余余抑葢互文以叶韻耳作余抑王固無理作王抑余亦重復無它竒當從方本為是奮肆姁媮上音劬下音俞美態也不知所如願託頌詞長言之於康衢頌曰木何為兮此祥洵厥美兮在吾王洵方作詢非是願封植兮永固俾斯人兮不㤀斯或作其人或作民汴州東西水門記并序貞元十四年正月戊子隴西公命作東西水門或無隴西二字非是方云董晉本仲舒之裔自廣川徙隴西故云越三月辛已朔水門成三日癸未大合樂設水嬉㑹監軍軍司馬賔佐僚屬將校熊羆之士肅四方之賔客以落之士女龢古和字㑹闐郭溢郛既卒事其從事昌黎韓愈請紀其成績其詞曰維汴州河水自中注厥初距河為城其不合者誕寘聨鎖于河宵浮晝湛舟不潜通距或作拒不合或作弗合湛或作沈舟不方作舟用方並從石本今按上下文意葢言置鎖雖足以禁舟之潜通然未免虧疏宣洩之患故須作水門耳諸本作舟不潜通者是也今上文既言置鎖而下文乃云舟用潜通則是鎖為虚設而其下句亦不應著然字矣若以為誤則石本乃當時所刻不應有誤然亦安知非其書者之誤刻者之誤况或非所親見則又安知非傳者之誤耶其説之未盡者又見於溪堂盤谷等篇覽者詳之然其襟抱虧疏風氣宣洩邑居弗寧訛言屢騰歴載巳來孰究孰思皇帝御天下十有八載此邦之人遭逢疾威嚚童噭嘑上音呌下音呼皆聲也嚚童李迺刼衆阻兵懍懍栗栗若墜若覆時維隴西公受命作藩爰自洛京單車來臨遂拯其危遂去其疵拯或作持弗肅弗厲薫為大和神應祥福五榖穰熟既庶而豐人力有餘監軍是咨司馬是謀諸本及石本皆有此二句方從閤本刪去云閤本葢公晚年所定當從之今詳此二語疑後人惡監軍二字而刪之耳方氏直謂閤本為公晚年所定不知何據而云然以今觀之其舛誤為最多疑為初出未校之本前已辨之詳矣大抵館閣藏書不過取之民間而諸儒畧以官課校之耳豈能一一精善過於私本世俗但見其為官本便尊信之而不復問其文理之何如巳為可笑今此乃復造為改定之説以鉗衆口則又可笑之甚也乃作水門為邦之郛以固風氣以閈冦偷閈或作扞黄流渾渾飛閣渠渠因而飾之匪為觀遊天子之武維隴西公是布天子之文維隴西公是宣文方以石閣蜀本作醇今按此記方氏多以石本固當據信但上條用字大誤而此醇字亦未安耳河之沄沄有君切轉流也源于崑崙天子萬祀公多受祉乃伐山石刻之日月尚俾來者知作之所始燕喜亭記燕或作宴此記方亦多從石本太原王𢎞中在連州與學佛人景常元慧游佛下或有之字慧下或有者字異日從二人者行於其居之後丘荒之間止髙而望得異處焉斬茅而嘉樹列發石而清泉激輦糞壤燔椔翳燔或作焚椔側師切詩作之屏之其椔其翳注曰木立死曰椔自斃曰翳却立而視之出者突然成丘䧟者呀虛加切張口皃然成谷窪烏𤓰切一曰窊也老子窪則盈者為池而缺者為洞若有鬼神異物隂來相之自是𢎞中與二人者晨往而夕忘歸焉乃立屋以避風雨寒暑避或作禦寒上或有禦字或作立屋以避風雨既除寒暑既去或作以禦風雨以除寒暑方從石本云左傳吾儕小人皆有闔廬以避燥濕寒暑既成愈請名之其丘曰竢徳之丘蔽於古而顯於今有竢之道也其丘上或有名字有竢下或有徳字其石谷曰謙受之谷瀑音暴又步木切曰振鷺之瀑谷言徳瀑言容也其土谷曰黄金之谷瀑曰秩秩之瀑谷言容瀑言徳也洞曰寒居之洞志其入時也池曰君子之池虚以鍾其美盈以出其惡也泉之源曰天澤之泉出髙而施下也合而名之以屋曰燕喜之亭取詩所謂魯侯燕喜者頌也名或作言者頌方從石閣杭蜀本如此或作頌者今按頌字疑衍文於是州民之老聞而相與觀焉方從石閣杭本如此或無老字而或作者州民之老或作州民之老民非是曰吾州之山水名天下然而無與燕喜者比經營於其側者相接也而莫直其地凡天作而地藏之以遺其人乎名下或有於字其側方以石本無其字直或作多或作宜皆非是方云直音值當也史記樗里子墓正直其北匃奴傳諸將居東方直上谷直讀如字地藏方從石本無地字其人方以石本無其字𢎞中自吏部郎貶秩而來部下或有侍字或無郎字皆非是次其道途所經自藍田入商洛田下或有山字涉淅湍方云今鄧州有淅川縣以淅水得名今按淅音錫其縣本楚之淅邑漢書所謂淅酈者也湍亦水名在鄧州穰縣臨漢水升峴胡典切首以望方城出荆門下岷音民江過洞庭上湘水行衡山之下由郴音琛踰嶺蝯􅀈音袖所家魚龍所宮極幽遐瑰詭之觀宜其於山水飫聞而厭見也蝯或作猿瑰或作瓌也或作之方從石本無也字今其意乃若不足傳曰智者樂水仁者樂山𢎞中之德與其所好可謂恊矣智以謀之仁以居之吾知其去是而羽儀於天朝也不逺矣遂刻
