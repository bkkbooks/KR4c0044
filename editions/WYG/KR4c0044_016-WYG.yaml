body:
  text: 後廿九日復上書三月十六日前鄉貢進士韓愈謹再拜言相公閣下愈聞周公之為輔相其急於見賢也方一食三吐其哺方一沐三捉其髪輔相下或有也字其急或無其字捉或作握當是時天下之賢才皆已舉用姦邪讒佞欺負之徒皆已除去姦下方有人字無欺字非是四海皆已無虞九夷八蠻之在荒服之外者皆已賓貢之在或無之字天災時變昆蟲草木之妖皆已銷息天下之所謂禮樂刑政教化之具皆已修理風俗皆已敦厚動植之物風雨霜露之所霑被者皆已得宜休徴嘉瑞麟鳯龜龍之屬皆已備至而周公以聖人之才憑叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢於周公而已豈復有賢於時百執事者哉豈復有所計議能補於周公之化者哉然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以負成王託周公之意不得於天下之心託周公疑此周公字當是國字意下方有以字如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則将不暇食與沐矣豈特吐哺捉髪為勤而止哉維其如是故於今頌成王之徳而稱周公之功不衰今閣下為輔相亦近耳天下之賢才豈盡舉用姦邪讒佞欺負之徒豈盡除去方無佞欺字四海豈盡無虞九夷八蠻之在荒服之外者豈盡賓貢天災時變昆蟲草木之妖豈盡銷息天下之所謂禮樂刑政教化之具豈盡修理風俗豈盡敦厚動植之物風雨霜露之所霑被者豈盡得宜休徴嘉瑞麟鳯龜龍之屬豈盡備至其所求進見之士雖不足以希望盛徳至比於百執事豈盡出其下哉其所稱説豈盡無所補哉至比或作如比今雖不能如周公吐哺捉髪亦宜引而進之察其所以而去就之不宜黙黙而已也愈之待命四十餘日矣餘日或作日餘書再上而志不得通足三及門而閽人辭焉惟其昏愚不知逃遁故復有周公之説焉閣下其亦察之或無此六字古之士三月不仕則相弔故出疆必載質然所以重於自進者以其於周不可則去之魯於魯不可則去之齊於齊不可則去之宋之鄭之秦之楚也之魯之齊之下或並有於字則去之宋方無則字今天下一君四海一國舎乎此則夷狄矣去父母之邦矣故士之行道者不得於朝則山林而已矣道下一有也字山林者士之所獨善自養而不憂天下者之所能安也如有憂天下之心則不能矣故愈毎自進而不知愧焉書亟上足數及門而不知止焉寧獨如此而已惴惴焉惟不得出大賢之門下是懼亦惟少垂察焉不得上或有恐字瀆冒威尊惶恐無已威尊或作尊威無已方作無文非是愈再拜答侯繼書韓曰正元八年繼與公同登進士第十一年公上宰相書不報遂東歸作是書且云懼足下以吾退歸因謂不復能自强不息故因書奉曉公時自勵如此此其所以卒為唐儒宗學者仰之如山斗云裴子自城来得足下一書明日又於崔大處得足下陜音閃漢𢎞農之陜縣州所留書翫而復之不能自休尋知足下不得留僕又為考官所辱欲致一書開足下并自舒其所懷含意連辭将發復已卒不能成就其説開或作聞及得足下二書凡僕之所欲進於左右者足下皆以自得之方無以字今按以已通晉宋人書帖多用以字僕雖欲重累其辭諒無居足下之意外者故絶意不為雖欲或作雖復方無之意二字行自念方當逺去潛深伏隩音郁水内曰隩與時世不相聞行或作亦當或作将隩或作奥或無世字今按行疑當作復雖足下之思我無所窺尋其聲光故不得不有書為别非復有所感發也僕少好學問自五經之外百氏之書未有聞而不求得而不觀者然其所志惟在其意義所歸至於禮樂之名數隂陽土地星辰方藥之書未嘗一得其門户方無方藥二字雖今之仕進者不要此道然古之人未有不通此而能為大賢君子者子下或有事字者下或有也字僕雖庸愚毎讀書輒用自愧今幸不為時所用無朝夕役役之勞将試學焉力不足而後止猶将愈於汲汲於時俗之所爭既不得而怨天尤人者此吾今之志也此句或無今字懼足下以吾退歸因謂我不復能自彊不息方無我字故因書奉曉冀足下知吾之退未始不為進而衆人之進未始不為退也或無兩之字不為方並作為不既貨馬即求船東下二事皆不過後月十日有相問者為我謝焉月十日或只作旬字方無我字此下或有愈再拜字答崔立之書斯立足下僕見險不能止動不得時顛頓狼狽失其所操持困不知變以至辱於再三君子小人之所憫笑天下之所背而馳者也方無至字及也字足下猶復以為可教貶損道徳乃至手筆以問之扳援古昔辭義髙逺且進且勸足下之於故舊之道得矣之於上或無之字得下或有之字雖僕亦固望於吾子不敢望於他人者耳然尚有似不相曉者非故欲發余乎不然何子之不以丈夫期我也方無之字不能黙黙聊復自明自明或作明白僕始年十六七時未知人事讀聖人之書以為人之仕者皆為人耳非有利乎已也及年二十時苦家貧衣食不足謀於所親然後知仕之不唯為人耳及来京師見有舉進士者人多貴之僕誠樂之就求其術或出禮部所試賦詩策等以相示賦詩或作詩賦僕以為可無學而能因詣州縣求舉有司者好惡出於其心四舉而後有成亦未即得仕司下或無者字聞吏部有以博學宏辭選者人尤謂之才且得美仕就求其術或出所試文章亦禮部之類私怪其故然猶樂其名因又詣州府求舉凡二試於吏部一既得之而又黜於中書雖不得仕人或謂之能焉退自取所試讀之乃類於徘優者之辭顔忸怩而心不寧者數月退下或有因字類於或作類乎既已為之則欲有所成就書所謂恥過作非者也所成方無此二字或無所字因復求舉亦無幸焉乃復自疑以為所試與得之者不同其程度及得觀之余亦無甚愧焉夫所謂博學者豈今之所謂者乎夫所謂宏辭者豈今之所謂者乎誠使古之豪傑之士若屈原孟軻司馬遷相如楊雄之徒進於是選必知其懷慙乃不自進而已耳或無相如二字設使與夫今之善進取者競於䝉昧之中僕必知其辱焉或無進取二字然彼五子者且使生於今之世其道雖不顯於天下其自負何如哉五或作數生或作出肯與夫斗筲者決得失於一夫之目而為之憂樂哉故凡僕之汲汲於進者其小得盖欲以具裘葛養窮孤其大得盖欲以同吾之所樂於人耳具或作完窮孤或作孤窮其他可否自計已熟誠不待人而後知今足下乃復比之獻玉者以為必竢工人之剖然後見知於天下雖兩刖足不為病且無使勍者再尅誠足下相勉之意厚也工人或作良工方無見字兩刖或作刖兩刖足下或有而字病方作痛或作疾尅或作刖下同然仕進者豈捨此而無門哉足下謂我必待是而後進者尤非相悉之辭也後進或作後辰尤非方作非尤非是僕之玉固未嘗獻而足固未嘗刖足下無為為我戚戚也或無足下字或無復出為字或併無二為字非是方今天下風俗尚有未及於古者邉境尚有被甲執兵者境或作地或無境字主上不得怡而宰相以為憂僕雖不賢亦且潛究其得失或無其字致之乎吾相薦之乎吾君上希卿大夫之位下猶取一障而乘之若都不可得猶将耕於寛閒之野釣於寂寞之濱求國家之遺事考賢人哲士之終始終上或有所字作唐之一經垂之於無窮誅姦䛕於既死發潛徳之幽光二者将必有一可足下以為僕之玉凡㡬獻而足凡㡬刖也又所謂勍者果誰哉再尅之刑信如何也刑或作形士固信於知巳微足下無以發吾之狂言信或作伸吾下或無之字愈再拜答李翊書六月二十六日或無此六字愈白李生足下生之書辭甚髙而其問何下而恭也而恭或作之恭非是能如是誰不欲告生以其道道徳之歸也有日矣况其外之文乎外或作餘非是抑愈所謂望孔子之門牆而不入於其宮者焉足以知是且非邪者下或有也字焉或作烏雖然不可不為生言之生所謂立言者是也或無者字生所為者與所期者甚似而㡬矣抑不知生之志蘄勝於人而取於人邪将蘄至於古之立言者邪取於人或無於字下三語同蘄勝於人而取於人則固勝於人而可取於人矣将蘄至於古之立言者則無望其速成無誘於勢利言者下或有邪字非是養其根而竢其實加其膏而希其光根之茂者其實遂膏之沃者其光􅓮仁義之人其言藹如也抑又有難者愈之所為不自知其至猶未也至或作志雖然學之二十餘年矣始者非三代兩漢之書不敢觀非聖人之志不敢存餘年方作年餘兩或作秦處若忘行若遺儼乎其若思茫乎其若迷當其取於心而注於手也惟陳言之務去戛戛乎其難哉其觀於人不知其非笑之為非笑也人下或有也字如是者亦有年猶不改然後識古書之正偽與雖正而不至焉者昭昭然白黒分矣而務去之乃徐有得也當其取於心而注於手也汩汩然来矣其觀於人也笑之則以為喜譽之則以為憂以其猶有人之説者存也二則字下或並有心字如是者亦有年然後浩乎其沛然矣吾又懼其雜也迎而距之平心而察之其皆醇也然後肆焉後或作后雖然不可以不養也行之乎仁義之途游之乎詩書之源無迷其途無絶其源終吾身而已矣源或作府無絶其源亦作無虚其府氣水也言浮物也水大而物之浮者大小畢浮氣之與言猶是也氣盛則言之短長與聲之髙下者皆宜雖如是其敢自謂㡬於成乎雖㡬於成其用於人也奚取焉雖然待用於人者其肖於器邪用與舎屬諸人或無邪字而有則時用焉四字或併有邪字君子則不然處心有道行已有方用則施諸人舎則傳諸其徒垂諸文而為後世法如是者亦足樂乎其無足樂也施諸或作垂諸也方作乎有志乎古者希矣志乎古必遺乎今吾誠樂而悲之上古字下或有人字亟稱其人所以勸之非敢褒其可褒而貶其可貶也問於愈者多矣念生之言不志乎利聊相為言之愈白重答翊書答下或有李字愈白李生生之自道其志可也其所疑於我者非也人之来者雖其心異於生其於我也皆有意焉君子之於人無不欲其入於善入方從杭本作人非是寧有不可告而告之孰有可進而不進也言辭之不酬禮貌之不答雖孔子不得行於互鄉宜乎余之不為也方從三本無於字非是余或作愈茍来者吾斯進之而已矣烏待其禮踰而情過乎雖然生之志求知於我邪求益於我邪其思廣聖人之道邪其欲善其身而使人不可及邪其何汲汲於知而求待之殊也其思上或有求字及邪或作及也賢不肖固有分矣生其急乎其所自立而無患乎人不已知未嘗聞有響大而聲微者也况愈之於生懇懇邪屬有腹疾無聊不果自書屬下或無有字不下方無果字愈白代張籍與李浙東書或作浙東觀察李中丞或注巽字月日前某官某謹東向再拜寓書浙東觀察使中丞李公閣下寓或作獻或無使字籍聞議論者皆云方今居古方伯連帥之職坐一方得専制於其境内者惟閣下心事犖犖與俗輩不同籍固以藏之胸中矣云上方無皆字云下方無方字又無得字近者閣下從事李協律翺到京師籍於李君友也友上或有朋字不見六七年聞其至馳往省之問無恙外不暇出一言且先賀其得賢主人李君曰子豈盡知之乎吾将盡言之言下無之字數日籍益聞所不聞不聞或作未嘗籍私獨喜常以為自今巳後不復有如古人者於今忽有之已或作以退自悲不幸兩目不見物無用於天下退下或有而字胸中雖有知識家無錢財寸步不能自致今去李中丞五千里何由致其身於其人之側開口一吐出胷中之竒乎因飲泣不能語人或作身非是方無能字既數日復自奮曰無所能人乃宜以盲廢有所能人雖盲當廢於俗輩不當廢於行古人之道者曰或作目非是所能或並無所字浙水東七州户不下數十萬不盲者何限十方作百李中丞取人固當問其賢不賢不當計盲與不盲也計下或有其字當今盲於心者皆是若籍自謂獨盲於目爾其心則能别是非若賜之坐而問之其口固能言也别上或有計字是非方作非是幸未死實欲一吐出心中平生所知見閣下能信而致之於門邪方無心中字或無見字至或作置字籍又善於古詩樊曰白樂天贈籍詩云張君何為者業文三十春尤工樂府詞學代少其倫使其心不以憂衣食亂閣下無事時一致之座側使跪進其所有閣下憑几而聽之未必不如聽吹竹彈絲敲金撃石也於或作為進其或作進籍方云校本一云敲當作敵唐人多使敲字如盧仝詩敵金縱玉撃或作材或無之今按方云敲字甚怪所引盧仝詩當亦是誤本耳夫盲者業専於藝必精故樂工皆盲諸本専字在必字下今從文苑但文苑必作也而下缺一字疑是精字更詳之籍儻可與此輩比並乎或無籍字或無比乎二字今按並字疑倫使籍誠不以蓄妻子憂饑寒亂心有錢財以濟醫藥其盲未甚庶㡬其復見天地日月因得不廢則自今至死之年皆閣下之賜㡬下或無其字賜下或有也字閣下濟之以已絶之年賜之以既盲之視其恩輕重大小籍宜如何報也閣下裁之度之裁下或無之字籍慙靦音腆面慙再拜答李秀才書李下或有師錫字方注圖南字愈白故友李觀元賓十年之前示愈别吳中故人詩六章其首章則吾子也盛有所稱引元賓行峻潔清其中狹隘不能包容於尋常人不肯茍有論説因究其所以於是知吾子非庸衆人苞或作包或有復出庸字或作庸庸之衆時吾子在吳中其後愈出在外無因縁相見元賓既殁其文益可貴重思元賓而不見見元賓之所與者則如元賓焉杭本無既殁以下八字非是與方作以今按方以以與可通用故以杭本作以然孰若從諸本之為正邪今者辱惠書及文章觀其姓名元賓之聲容怳若相接讀其文辭見元賓之知人交道之不汚文辭方從閣杭本作命辭云元賓所命意於辭也今按此文辭指李生所作耳非謂元賓之辭也正使實謂元賓之辭作命辭亦無理甚矣子之心有似於吾元賓也矣或作乎於或作乎子之言以愈所為不違孔子不以雕琢為工将相從於此愈敢自愛其道而以辭讓為事乎然愈之所志於古者不惟其辭之好好其道焉爾讀吾子之辭而得其所用心将復有深於是者與吾子樂之况其外之文乎與或作歟屬上句非是愈頓首答陳生書生下或有商字或注師錫字愈白陳生足下今之負名譽享顯榮者在上位㡬人足下求速化之術不於其人乃以訪愈是所謂借聽於聾求道於盲雖其請之勤勤教之云云未有見其得者也或無有字今按有字或當在此句其字下愈之志在古道又甚好其言辭觀足下之書及十四篇之詩亦云有志於是矣而其所問則名所慕則科故愈疑於其對焉雖然厚意不可虚辱聊為足下誦其所聞盖君子病乎在已而順乎在天待已以信而事親以誠所謂病乎在巳者仁義存乎内彼聖賢者能推而廣之而我蠢焉為衆人蠢焉或作蠢然所謂順乎在天者貴賤窮通之来平吾心而隨順之不以累於其初謂下閣杭本無順字非是所謂待巳以信者巳果能之人曰不能勿信也巳果不能人曰能之勿信也孰信哉信乎已而已矣方從閣杭本無果下至信也十字文録併上巳字亦無今按此閣杭本之謬全無文理而方信之誤矣所謂事親以誠者盡其心不夸於外先乎其質後乎其文者也後上或有而字盡其心不夸於外者不以已之得於外者為父母榮也名與位之謂也先乎其質者行也後乎其文者飲食㫖甘以其外物供養之道也行上或有文字㫖甘或作甘旨道下或有者字非是誠者不欺之名也待於外而後為養薄於質而厚於文斯其不類於欺歟果若是子之汲汲於科名以不得進為親之羞者惑也速化之術如是而已古之學者惟義之問誠将學於太學愈猶守是説而竢見焉猶或作獨見下或有知字方云見胡甸切公時為博士也愈白與李翺書與或作答使至辱足下書歡愧来并不容於心或無足下字嗟乎子之言意皆是也僕雖巧説何能逃其責邪然皆子之愛我多重我厚不酌時人待我之情而以子之待我之意使我望於時人也僕之家本窮空重遇攻刼衣服無所得養生之具無所有家累僅三十口攜此将安所歸託乎捨之入京不可也挈之而行不可也足下将安以為我謀哉此句方無将字此一事耳足下謂我入京城有所益乎謂上或有誠字城或作誠僕之有子猶有不知者時人能知我哉之下或有所字持僕所守驅而使奔走伺候公卿間開口論議其安能有以合乎驅方作執今按作驅即屬下句作執即屬土句詳下文亦有復驅之使就其故地之文而持守執三字語太繁復故當以驅為正僕在京城八九年無所取資日求於人以度時月當時行之不覺也今而思之如痛定之人思當痛之時不知何能自處也今年加長矣復驅之使就其故地是亦難矣長下或有已字非是所貴乎京師者不以明天子在上賢公卿在下布衣韋帶之士談道義者多乎不以上或有得字以僕遑遑於其中能上聞而下達乎其知我者固少知而相愛不相忌者又加少内無所資外無所從終安所為乎知下或無我字資上方無所字從或作縱嗟乎子之責我誠是也愛我誠多也今天下之人有如子者乎或無今字自堯舜已来士有不遇者乎無也子獨安能使我潔清不洿而處其所可樂哉方無處字非不願為子之所云者力不足勢不便故也為或作如僕於此豈以為大相知乎累累隨行役役逐隊饑而食飽而嬉者也飽而嬉或作飽而悲方從杭本作而悲云悲者悲其不得所從故也皆非是其所以止而不去者以其心誠有愛於僕也然所愛於我者少不知我者猶多吾豈樂於此乎哉将亦有所病而求息於此也所愛或作其愛少上或有尤字非是知下方有於字猶或作尤非是吾下或無豈字嗟乎子誠愛我矣子之所責於我者誠是矣然恐子有時不暇責我而悲我不暇悲我而自責且自悲也及之而後知履之而後難耳孔子稱顔回一簞食一瓢飲人不堪其憂回也不改其樂孔子上或有昔者字瓢飲下或有在陋巷字彼人者有聖者為之依歸而又有簞食瓢飲足以不死其不憂而樂也豈不易哉聖上或無有字依上方無之字若僕無所依歸無簞食無瓢飲無所取資則餓而死其不亦難乎子之聞我言亦悲矣嗟乎子亦慎其所之哉離違久年還侍左右當日歡喜故専使馳此候足下意并以自解此候方從杭本作候此今按此與與孟東野書春且時盡相似説巳見於彼矣愈再拜别本韓文考異巻十六欽定四庫全書别本韓文考異巻十七宋王伯大重編書上張僕射書九月一日愈再拜受牒之明日在使院中有小吏持院中故事節目十餘事来示愈其中不可者有自九月至明年二月之終皆晨入夜歸非有疾病事故輒不許出當時以初受命不敢言古人有言曰人各有能有不能若此者非愈之所能也愈下或無之字抑而行之必發狂疾上無以承事於公忘其将所以報徳者下無以自立喪失其所以為心夫如是則安得而不言忘或作望非是喪或作哀或校作衷皆非是凡執事之擇於愈者非為其能晨入夜歸也必将有以取之茍有以取之雖不晨入而夜歸其所取者猶在也或無将字與而字所取下亦無者字下之事上不一其事上之使下不一其事量力而任之度才而處之其所不能不彊使為是故為下者不獲罪於上為上者不得怨於下矣或作也孟子有云今之諸侯無大相過者以其皆好臣其所教而不好臣其所受教諸本皆如此閣本二教字並作命方從杭蜀苑教作受命所受教作所受命云考孟子上語當作受命今按依孟子則上語不當有受字下語不當有以字而二命字本皆作教童而習者皆能知之不知方氏何據而云考孟子上語當作受命也今之時與孟子之時又加逺矣皆好其聞命而奔走者不好其直已而行道者聞命而奔走者好利者也直已而行道者好義者也未有好利而愛其君者未有好義而忘其君者文苑而愛作而能愛而忘作而不愛二語並無者字今之王公大人惟執事可以聞此言惟愈於執事也可以此言進此言進方作言此言或作言此事愈䝉幸於執事其所從舊矣若寛假之使不失其性加待之使足以為名寅而入盡辰而退申而入終酉而退終方作中率以為常亦不廢事天下之人聞執事之於愈如是也聞下或無執事之三字必皆曰執事之好士也如此好或作待杭蜀文苑只此句有也字餘並無今從之執事之待士以禮如此執事之使人不枉其性而能有容如此執事之欲成人之名如此執事之厚於故舊如此又将曰韓愈之識其所依歸也如此閣本惟此句有也字餘並無今從之韓愈之不諂屈於富貴之人如此韓愈之賢能使其主待之以禮如此則死於執事之門無悔也能上方無賢字則上或有茍如此三字若使隨行而入逐隊而趨言不敢盡其誠道有所屈於巳方無所字天下之人聞執事之於愈如此皆曰執事之用韓愈之其窮収之而已耳韓愈之事執事不以道利之而已耳茍如是雖日受千金之賜一嵗九遷其官感恩則有之矣将以稱於天下曰知已知已則未也或無復出知已二字伏惟哀其所不足矜其愚不録其罪察其辭而垂仁採納焉哀下方有察字按下文合有察字此不當有愈恐懼再拜答胡生書或作胡直均方注直均均或作鈞考登科記直鈞貞元十九年進士也愈頓首胡生秀才足下雨不止薪芻價益髙生逺客懷道守義非其人不交得無病乎斯須不展思想無已斯須或作頃渇或作傾渇皆非是愈不善自謀口多而食寡然猶月有所入以愈之不足知生之窮也至於是而不悔非信道篤者其誰能之所示千百言略不及此而以不屢相見為憂謝相知為急謀道不謀食樂以忘憂者生之謂矣顧無以當之如何當或作答夫别是非分賢與不肖公卿貴位者之任也愈不敢有意於是如生之徒於我厚者知其賢時或道之於生未有益也未有下或有所字不知者乃用是為謗不敢自愛懼生之無益而有傷也如之何若曰彼有所合吾不利其求則庶可矣方無其字今按後巻答陳商書云文雖工不利於求則此其字亦當作於生又離鄉邑去親愛甘辛苦而不厭者本非為是也如之何愈之於生既不變矣戒生無以示愈者語於人用息不知者之謗生慎從之語方作謂講禮釋友二篇比舊尤佳或作嘉方作加志深而喻切因事以陳辭古之作者正如是爾愈頓首與于襄陽書七月三日将仕郎守國子四門博士韓愈謹奉書尚書閣下士之能享大名顯當世者莫不有先逹之士負天下之望者為之前焉士之上或有夫字達或作進士之能垂休光照後世者亦莫不有後進之士負天下之望者為之後焉莫為之前雖美而不彰莫為之後雖盛而不傳是二人者未始不相須也然而千百載乃一相遇焉豈上之人無可援音袁下之人無可推他回切記曰上弗援下弗推歟何其相須之殷而相遇之疎也其故在下之人負其能不肯諂其上上之人負其位不肯顧其下故髙材多戚戚之窮盛位無赫赫之光是二人者之所為皆過也未嘗干之不可謂上無其人未嘗求之不可謂下無其人愈之誦
