body:
  text: 芍藥歌方從蜀本刪去今恐是公少作姑存之丈人庭中開好花更無凡木爭春華翠莖紅蕊天力與此恩不屬黄鍾家温馨熟美鮮香起似笑無言習君子霜刀翦汝天女勞何事低頭學桃李嬌癡婢子無靈性競挽春衫來比並靈性或作性靈欲將雙頰一晞紅緑窓磨偏青銅鏡晞或作稀一罇春酒甘若飴音怡丈人此樂無人知花前醉倒歌者誰楚狂小子韓退之海水水下方有詩字海水非不廣鄧林列子夸父逐日渴欲得飲云膏肉所浸生鄧林鄧林彌廣數千里焉豈無枝風波一蕩薄魚鳥不可依海水饒大波鄧林多驚風豈無魚與鳥巨細各不同海有吞舟鯨鄧有垂天鵬茍非鱗羽大蕩薄不可能我鱗不盈寸我羽不盈尺一木有餘陰一泉有餘澤我將辭海水濯鱗清泠池我將辭鄧林刷羽䝉籠枝海水非愛廣鄧林非愛枝風波亦常事鱗羽自不宜或作不自疑我鱗日已大我羽日已修風波無所苦還作鯨鵬遊贈崔立之此篇方從文苑昔者十日雨子桑苦寒飢哀歌坐空屋不怨但自悲桑苦寒或作來寒且方云考莊子實作子桑屋或作房其友名子輿忽然憂且思褰裳觸泥水裹飯往食之入門相對語天命良不宜好事漆園吏書之存雄辭千年事已逺二子情可推我讀此篇日正當雨雪時吾身固已困吾友復何為薄粥不足裹深泥諒難馳曽無子輿事空賦子桑詩或無此二句贈河陽李大夫四海失巢穴兩都困塵埃感恩由未報惆悵空一來由未或作未能方作能未今按由猶古字通裘破氣不煖馬羸鳴且哀裘破或作破裘氣或作竟馬羸或作羸馬主人情更重空使劍鋒摧苦寒歌黄昏苦寒歌夜半不能休夜半或作半夜豈不有陽春節氣聿其周或作嵗聿不其周節氣或作氣節君何愛重裘兼味養大賢何愛下疑有脱字養字或作成字氷食葛製神所憐神所或作誠可填窓塞户慎勿出暄風暖景明年日或作需明年非是贈同遊者已見正集請遷𤣥宗廟議方從蜀本舊志或無廟字非是方云舊史禮儀志長慶四年五月禮儀使奏樊云時穆宗當祔公豈以吏部侍郎為禮儀使邪右禮儀使奏謹按周禮天子七廟三昭三穆與太祖之廟而七尚書咸有一德亦曰七世之廟可以觀德尚書至觀德十六字舊史闕荀卿子曰有天下者祭七代有一國者祭五代或無卿字曰上或有亦字祭七代或作事七世祭五代或作事五世或作祭五廟則知天子上祭七廟典籍通規祖功宗德不在其數廟或作代國朝九廟之制法周之文太祖景皇帝始為唐公肇基天命義同周之后稷髙祖神堯皇帝創業經始化隋為唐義同周之文王太宗文皇帝神武應期造有區夏義同周之武王應或作膺武王下或有也字其下三昭三穆謂之親廟與太祖而七四時常饗自如禮文伏以今年宗廟遞遷𤣥宗明皇帝在三昭三穆之外是親盡之祖雖有功德新主入廟禮合祧藏太廟中第一夾室每至禘袷之嵗合食如常藏下或有遷字或作祧遷藏太廟中中下或有從字謹議范蠡招大夫種詩之序議别本韓文考異外集巻一欽定四庫全書别本韓文考異外集巻二宋王伯大重編上賈滑州書賈耽以貞元二年為滑州刺史此篇方從蜀本愈儒服者不敢用他術干進術或作藝又惟古執䞇之禮竊整頓舊所著文一十五章以為䞇而喻所以然之意於此章或作首下同曰豐山上有鐘焉祝曰山海經云豐山有九鐘和霜鳴注云霜降則鐘鳴人所不可至霜既降則鏗然鳴蓋氣之感非自鳴也或無既字愈年二十有三讀書學文十五年言行不敢戾於古人或無有字三或作二讀書學文十五年洪云公與邢尚書書云生七嵗而讀書十三而能文二十有五擢第於春官愚固泯泯不能自計周流四方無所適歸固或作故非是伏惟閣下昭融古之典義含和發英作唐德元簡棄詭説保任皇極是宜小子刻心悚慕又焉得不感而鳴哉和或作華元或作臣方云周書注元德之首也徒以獻策闕下方勤行役且有負薪之疾不得稽首軒階遂拜書家僕待命于鄭之逆旅僕或作僮逆上或無之字伏以小子之文可見於十五章之内小子之志可見於此書與之進敢不勉與之退敢不從方作退進退之際實惟閣下裁之上考功崔虞部書或作上考功宏詞官虞部崔員外書愈不肖行能誠無可取行已頗僻與時俗異態抱愚守迷固不識仕進之門迺與羣士爭名競得失行人之所甚鄙求人之所甚利其為不可雖童昏實知之失下或無行字如執事者不以是為念援之幽窮之中推之髙顯之上是知其文之或可而不知其人之莫可也知其人之或可而不知其時之莫可也不知其人上方有是字既以自咎又歎執事者所守異於人人句廢耳任目華實不兼故有所進故有所退以方作已廢上或有之字不疑當作必今按人字屬上句且執事始考文之明日浮囂之徒已相與稱曰某得矣某得矣問其所從來必言其有自一日之問九變其説凡進士之應此選者三十有二人其所不言者數人而已而愈在焉不言方作不云及執事既上名之後三人之中其二人者固所傳聞矣華實兼者也果竟得之而又升焉或無其字固上或有則字果或作畢下同其一人者則莫之聞矣實與華違行與時乖果竟退之如是則可見時之所與者時之所不與者之相逺矣然愚之所守竟非偶然故不可變竟非或作僅非故或作固凡在京師八九年矣足不跡公卿之門名不譽於大夫士之口或無譽字於或作一或無士字始者謬為今相國所第此時惟念以為得失固有天命不在趍時而偃仰一室嘯歌古人今則復疑矣未知夫天竟如何命竟如何由人乎哉不由人乎哉未上或有又字或無夫字天竟或作天意人乎或並作乎人欲事干謁則患不能小書困於投刺欲上或有夫字於或作乎欲學為佞則患言訥詞直卒事不成為方作于患下或有於字卒或作則徒使其躬儳焉而不終日其躬方本如此而舉正躬作窮蓋誤而諸本作如方云蜀本作而今本皆以表記誤刋作如然不知古如而同意此語不當以如似之義讀之唐人惟韓栁知此子厚答韋中立書假而以僕年先吾子與公此文是也董彥逺曰春秋書星隕如雨左傳室如縣罄是皆以如為而風俗通國人望君而望嵗鄒陽書白頭而新是皆以而為如按家語君入廟如右茍子作而右樂府艾如張亦作艾而張今人所用漣洏攷之李善文選乃連而也實用易之泣血漣如為義去古益逺字義多失惟韓栁文時見一二因為詳之今按孟子望道而未之見亦是此例方言又有而如古字通用之説然陸德明論當時語音之失有曰北人則而如靡異蓋不以為然也然則此而字須讀為如乃為正耳董引室如縣磬乃據左傳作罄字而杜預注云如而也言居室而資糧縣盡故其説如此國語則作縣磬而韋昭注云府藏空虚但有榱梁如縣磬左傳蓋借罄為磬而杜氏誤解國語則正作磬字而韋説得之董氏所引不足據以為説今併論之附見于此是以勞思長懷中夜起坐度時揣已廢然而返雖欲從之末由也已又常念古之人日已進今之人日已退常方作甞夫古之人四十而仕其行道為學既已大成而又之死不倦故其事業功德老而益明死而益光故詩曰雖無老成人尚有典刑言老成之可尚也可上或有人字又曰樂只君子德音不已謂死而不亡也已或作忘亡或作忘方作已夫今之人務利而遺道其學其問以之取名致官而已方無夫字遺或作違問上或無其字得一名獲一位則棄其業而役役於持權者之門故其事業功德日以忘月以削老而益昏死而遂亡位或作官亡方作忘愈今二十有六矣距古人始仕之年尚十四年豈為晚哉今下或有年始字豈上或有矣夫字行之以不息要之以至死不有得於今必有得於古不有得於身必有得於後用此自遣且以為知已者之報執事以為如何哉其信然否也為如或作謂如今所病者在於窮約無僦屋賃僕之資無緼袍糲食之給驅馬出門不知所之斯道未喪天命不欺豈遂殆哉豈遂困哉竊惟執事之於愈也無師友之交無久故之事無顏色言語之情卒然振而發之者必有以見知爾故盡暴其所志不敢以黙執事下方有者字愈下方無也字顔色言語方作言語顔色爾或作耳以黙或作黙黙又懼執事多在省非公事不敢以至是則拜見之不可期獲侍之無時也是以進其説如是庶執事察之也至下或有於字期下或有也字庶或作幸與張徐州薦薛公達書此篇方本有之今疑非公作當刪與少室李拾遺書諸本室下有山子李下有渤字方從蜀苑新書云此書作於元和三年公時尚為博士新書云洛陽令誤也十二月某日愈頓首方無此八字伏承天恩詔河南敦諭拾遺公朝廷之士引頸東望若景星鳯皇之始見也爭先覩之為快拾遺公新書作遺公篇並内同方今天子仁聖小大之事皆出宰相樂善言如不得聞小大舉正作大小恐誤事或作士自即大位已來于今四年凡所施者無不得宜者或作為凡所施者新書作凡所出而施者勤儉之聲寛大之政幽閨婦女草野小人皆飽聞而厭道之草或作山人新書作子愈不通於古請問先生世非太平之運歟加又有非人力而至者愈方作某於作于無世字非作匪新書作兹非太平世歟年榖熟衍符貺委至若干紀之姦不戰而拘纍彊梁之兇銷鑠縮栗迎風而委伏其有一事未就正自視若不成人四海之所環無一夫甲而兵者新書無自字視或作是非是而兵或作與兵若此時也拾遺公不疾起與天下之士君子樂成而享之斯無時矣若上或有未有字昔者孔子知不可為而為之不已足跡接於諸侯之國即可為之時自藏深山牢闗而固距即與仁義者異守矣或無足跡字想拾遺公冠帶就車惠然肯來舒所蓄積以補綴盛德之有闕遺利加於時名垂于將来踊躍悚企傾刻以冀闕遺方作遺闕新書無有遺二字利下或無加字加於新書作加于垂下亦無于字傾或作頃又竊聞朝廷之議必起拾遺公使者往若不許即河南必繼以行或無即字拾遺徵君若不至必加髙秩如是則辭少就多傷於亷而害於義拾遺公必不為也則或作即新書無則字善人斯進其類皆有望於拾遺公拾遺公儻不為起使衆善人不與斯人施也或無使字也或作者今按此句疑有誤由拾遺公而使天子不盡得良臣君子不盡得顯位人庶不盡被惠利其害不為細人庶或作庶人必望審察而逺思之務使合於孔子之道幸甚而下或有長字逺新書作諦愈再拜答劉秀才論史書方從蜀苑六月九日韓愈白秀才方無此九字或有某月日韓愈白劉君足下辱問見愛教勉以所宜務敢不拜賜愚以為凡史氏褒貶大法春秋已備之矣為或作謂後之作者在據事跡實録則善惡自見或復出實録二字見下或有矣字然此尚非淺陋偷惰者所能就況褒貶邪孔子聖人作春秋辱於魯衛陳宋齊楚卒不遇而死齊太史氏兄弟㡬盡或無氏字左丘明紀春秋時事以失明司馬遷作史記刑誅班固瘐死孫曰和帝永元初洛陽令种兢以事捕固固死獄中洪曰漢律囚以飢寒死曰瘐孟堅死獄中故云瘐
