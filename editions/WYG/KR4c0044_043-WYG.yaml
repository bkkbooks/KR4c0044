seq: 43
front:
  text: 是命烜氏俟清夜或將祀圓丘於𤣥冬或將祭方澤於朱夏祀方作祭祭或作祀持鑑而精氣韓曰淮南子積陰之寒氣為水水氣之精者為月旁射照月而陰靈樊曰謝莊月賦日以陽德月以陰靈潛下視而不見謂合道於希夷挹之則盈方同功於造化應於有生於無生或作聲形象未分徒騁離婁之目光華暗至如還合浦之珠既齊芳於酒醴詎比賤於潢汚芳方作髙云禮夏尚明水商尚醴周尚酒今作齊芳非都今按明水當在酒醴之上不應反言齊髙此蓋以其無臭味嫌不足於芬芳故有齊芳之語方説非是明德惟馨𤣥功不宰于以表誠潔于以戒荒怠茍失其道殺牛之祭何為如得其宜明水之薦斯在宜方作情薦或作為不引而自致不行而善至雖辭麴蘖之名實處罇罍之器降於圓魄殊匪金莖之露出自方諸乍似鮫人之淚匪或作非露或作靈乍方作已將以贊于陰德配夫陽燧音遂配上或有非獨二字夫或作干夜寂天清烟消氣明桂華吐耀兎影騰精兎影或作玉兎騰方作流聊設監以取水伊不注而能盈霏然而象的爾而呈始漠漠而霜積漸微微而浪生而象或作垂象或作無象的方作酌漠漠而方作茫茫以豈不以德協于坎同類則感形藏在空氣應則通同方作有恐今按同類與氣應對屬差互當作類同在或作於鶴鳴在陰之理不謬虎嘯于谷之義可崇理方作論虎方作武義方作道試今按作虎為是但當時程避諱當作武耳足以驗聖賢之無黨知天地之至公足以驗聖賢方庶令知聖賢黨或作窮知方作驗竊比大羮之遺味幸希薦於廟中
  hash: sha256:09b384c2c31dc73b06ea5d91c92840e588e874ac4b1369bc94d3d0cfac35b3f6
