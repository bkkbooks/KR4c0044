body:
  text: 與鳯翔邢部尚書書或作京西節度使邢尚書方亦如此而無下三字邢謂邢君牙也愈再拜布衣之士身居窮約不借勢於王公大人則無以成其志王公大人功業顯著不借譽於布衣之士則無以廣其名是布衣之士雖甚賤而不諂王公大人雖甚貴而不驕其事相須其先後相資也今閣下為王牙爪為國藩垣威行如秋仁行如春戎狄棄甲而逺遁朝廷髙枕而不虞是豈負大丈夫平生之志願哉豈負明天子非常之顧遇哉下豈上或有是字赫赫乎洸洸乎功業逐日以新名聲隨風而流或無洸洸乎三字宜乎讙呼海隅髙談之士奔走天下慕義之人使或願馳一傳或願操一戈納君於唐虞收地於河湟操上或無或願二字湟或作隍然而未至乎是者蓋亦有說云蓋亦或作亦蓋說上有其字非是豈非待士之道未甚厚遇士之禮未甚優請粗言其事閣下試詳而聴之夫士之來也必有求於閣下夫以貧賤而求於富貴正其宜也閣下之財不可以徧施於天下在擇其人而厚薄等級之可也假如賢者至閣下乃一見之愚者至不得見焉則賢者莫不至而愚者日逺矣或無日字假如愚者至閣下以千金與之賢者至亦以千金與之則愚者莫不至而賢者日逺矣亦方作又杭本無賢者至與之九字非是日或作亦欲求得士之道盡於此而已欲求士之賢愚在於精鑒博采之而已得或作待巳下或並有矣字精鑒於已固已得其十七八矣又博采於人百無一二遺者焉方無固字若果能是道愈見天下之竹帛不足書閣下之功徳天下之金石不足頌閣下之形容矣能或作形徳下或有矣字愈也布衣之士也布上或有固字士下或無也字生七嵗而讀書十三而能文二十五而擢第於春官以文名於四方前古之興亡未嘗不經於心也當世之得失未嘗不留於意也常以天下之安危在邊常或作嘗故六月于邁來觀其師及至此都徘徊而不能去者誠悅閣下之義願少立於堦墀之際望見君子之威儀也此上方無至字不上方無而字能下或有速字去或作進不能去或作不敢遽進際或作下居十日而不敢進者誠以左右無先為容進下或有謁字誠字或在容字下容下或有也字方無以左至為容七字皆非是懼閣下以衆人視之則殺身不足以滅恥徒悔恨於無窮故先此書序其所以來之意閣下其無以為狂而以禮進退之幸甚幸甚先下或有陳字書下方有陳字皆非是來之下或復有之字其無以或無其字或無以字洪氏家譜云公以貞元八年壬申二十五嵗中第十一年乙亥二十八歳上宰相書求官不得而歸出潼闗作二鳥賦又據程致道說既出潼闗因遊鳯翔上邢君牙書今按程說大誤蓋賦序言五月過潼闗而此書言六月至鳯翔潼闗在長安之東鳯翔在長安之西相距六百餘里豈有五月方東出潼闗而六月遽能復西至鳯翔之理此書決非此年所作必是八年以後十年以前嘗至鳯翔而有此書及岐山下等詩也愈再拜為人求薦書某聞木在山馬在肆遇之而不顧者雖日累千萬人未為不材與下乘也遇方作過及至匠石過之而不睨伯樂遇之而不顧然後知其非棟梁之材超逸之足也以某在公之宇下非一日而又辱居姻婭之後是生於匠石之園長於伯樂之廐者也於是而不得知假有見知者千萬人亦何足云方無有字云下或有耳字或有爾字今幸賴天子每嵗詔公卿大夫貢士若某等比咸得以薦聞若下或有于字而無比字或無等字是以冐進其說以累於執事亦不自量已然執事其知某如何哉昔人有鬻馬不售於市者知伯樂之善相也從而求之伯樂一顧價增三倍某與其事頗相類是故終始言之耳諸本皆如此方獨從閣杭本以其知某如何哉為其如某何哉而無昔人以下四十三字今按此書本為人求薦而杭本曰執事其如某何哉則似决以其人力不能薦已矣故諸本或作執事其知某何如哉語意似弱而亦未有懇切必求之意又無結末收拾之語故又繼以鬻馬之說文意方似粗足然亦重復無竒文意首尾不甚通暢恐尚有脫誤處更詳之某再拜應科目時與人書或作與韋舎人月日愈再拜天池之濱大江之濆音汾水際曰有怪物焉葢非常鱗凡介之品彚匹儔也匹方作比其得水變化風雨上下於天不難也天下或有地字其不及水蓋尋常尺寸之間耳無高山大陵曠塗絶險為之闗隔也然其窮涸不能自致乎水為獱獺上音頻下音闥水狗也選獱獺睒瞲乎匳空之笑者蓋十八九矣或無十字矣或作年方从謝本云唐舉子禮部及第例須守選選未滿或就制舉或書判拔萃方獲出仕此書謂其不及水蓋尋常尺寸之間是專指宏詞試也言世之嗤笑者十而八九乃上宰相書所謂得其所者爭笑之是也本多作八九年其義非也如有力者哀其窮而轉運之葢一舉手一投足之勞也然是物也負其異於衆也且曰爛死於泥沙吾寧樂之若俛首帖耳搖尾而乞憐者非我之志也是以有力者遇之熟視之若無覩也其死其生固不可知也今又有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎而轉方作而輸轉之清波或作轉致之波濤其哀之命也其不哀之命也知其在命而且鳴號之者亦命也鳴或作呼鳴下或有且字或作而鳴且號愈今者實有類於是是以忘其疎愚之罪而有是說焉閣下其亦憐察之答劉正夫書正或作嵒方云此書謂賢尊給事者劉伯芻也伯芻三子寛夫端夫巖夫無名正夫者故蜀本刋作嵒豈正夫即嵒夫邪今且從舊愈白進士劉君足下辱牋教以所不及既荷厚賜且愧其誠然幸甚幸甚几舉進士者於先進之門何所不徃方無凡字先進之於後輩茍見其至寧可以不答其意邪來者則接之舉城士大夫莫不皆然而愈不幸獨有接後輩名名之所存謗之所歸也接後輩下或有之字有來問者不敢不以誠答或問為文宜何師必謹對曰宜師古聖賢人曰古聖賢人所為書具存辭皆不同宜何師必謹對曰師其意不師其辭又問曰文宜易宜難必謹對曰無難易惟其是爾如是而已非固開其為此而禁其為彼也諸本無爾如是字已下有矣字謝校矣作爾或作耳夫百物朝夕所見者人皆不注視也及覩其異者則共觀而言之夫文豈異於是乎漢朝人莫不能為文獨司馬相如太史公劉向揚雄為之最然則用功深者其收名也逺若皆與世沈浮不自樹立雖不為當時所怪亦必無後世之傳也沈浮或作浮沈足下家中百物皆賴而用也然其所珍愛者必非常物夫君子之於文豈異於是乎今後進之為文能深探而力取之以古聖賢人為法者雖未必皆是要若有司馬相如太史公劉向揚雄之徒出必自於此不自於尋常之徒也後下或無進字若上或無要字不下方無自字若聖人之道不用文則已用則必尚其能者能者非他能自樹立不因循者是也有文字來誰不為文然其存於今者必其能者也顧常以此為説耳顧常或作必當或作顧當愈與足下忝同道而先進者又常從遊於賢尊給事既辱厚賜又安得不進其所有以為答也足下以為何如或作如何愈白答殷侍郎書方云殷侑也或注銜字非是某月日愈頓首辱賜書周覽累日竦然增敬蹙然汗出以慙愈以進士中粗為知讀經書者一來應舉事隨日生雖欲加功竟無其暇遊從之類相熟相同不教不學悶然不見已缺日失月亡以至於老月或作日所謂無以自别於常人者每逢學士真儒歎息踧踖愧生於中顔變於外不復自比於人句前者蒙示新注公羊春秋前者或作前人非是又聞口授指略私心喜幸恨遭逢之晚願盡傳其學職事羈纒未得繼請怠惰因循不能自彊此宜在擯而不教者今反謂少知根本其辭章近古可令敘所注書惠出非望承命反側善誘不倦斯為多方敢不喻所指八月益凉時得休假或作暇倘矜其拘綴不得走請務道之傳而賜辱臨執經座下獲卒所聞是為大幸況近世公羊學幾絶何氏後漢何休任城人太傅陳蕃辟與㕘政事蕃敗休坐廢錮乃作春秋公羊解話妙得公羊本意作公羊墨守左氏膏盲穀梁廢疾墨守謂如墨翟之守城不可攻也於是鄭康成乃發墨守鍼膏盲起廢疾休見歎曰康成入吾室操吾戈以伐我注外不見他書聖經賢傳屏而不省要玅之義無自而尋非先生好之樂之味於衆人之所不味務張而明之其孰能勤勤綣綣若此之至固鄙心之所最急者綣綣或作拳拳如遂蒙開釋章分句斷其心曉然直使序所注挂名經端自託不腐其又奚辭將惟先生所以命辭或作詞愈再拜答陳商書方云唐志有商集十七巻愈白辱惠書語髙而旨深三四讀尚不能通曉茫然增愧赧又不以其淺弊無過人知識且喻以所守幸甚知或作智且方作具愈敢不吐情實然自識其不足補吾子所須也齊王好竽有求仕於齊者操瑟而徃立王之門三年不得入方無者字叱曰吾瑟鼓之能使鬼神上下吾鼓瑟合軒轅氏之律呂諸本皆如此方獨以閣杭本以律呂二字為宮字云國語琴瑟尚宮鐘尚羽重者从細輕者从大今按方氏所引國語是也然凡作樂者八音並奏而其一音之中大者為宮細者為羽莫不皆有五聲之序又以六律六呂節之然後聲之大細得其次第而不差書所謂聲依永律和聲而八音克諧是也其曰琴瑟尚宮者非謂琴瑟只有宮聲也但以絲聲太細恐其掩於衆樂而不可聽故大其器使其聲重大而與衆樂相稱耳其中固有五聲而聲必中律呂也方意似以琴瑟專為宮聲而不用它律呂者故特取此誤本耳今从諸本客駡之曰王好竽而子鼓瑟雖工如王不好何瑟字句絶諸本如此方獨以鼓為瑟而為句絶其下瑟字乃屬下句曾本上亦作瑟而下作之皆非是是所謂工於瑟而不工於求齊也求齊或作竽或無也字皆非是今舉進士於此世求祿利行道於此世而為文必使一世人不好得無與操瑟立齊門者比歟求上或有也字道於下方無此字文雖工不利於求求不得則怒且怨不知君子必爾為不也雖或作誠或雖上有誠字故區區之心每有來訪者皆有意於不肖者也略不辭讓遂盡言之惟吾子諒察言下方無之字愈白與孟尚書書孟下一有簡字愈白行官自南廻過吉州得吾兄二十四日手書數番忻悚兼至未審入秋來眠食何似伏惟萬福來示云有人傳愈近少信奉釋氏此傳之者妄也或無吉州二字下云被吾兄二十四日手示披讀數番方从閣杭本無行官至來示三十八字但云蒙惠書今按閣杭乃節本諸本乃其本文今从之信此傳之方从閣杭蜀本無此四字潮州時有一老僧號大顛頗聰明識道理逺地無可與語者故自山召至州郭留十數日無下方有所字無與者字實能外形骸以理自勝不為事物侵亂與之語雖不盡解要自胷中無滯礙以為難得因與來徃要自至難得十一字諸本皆如此方从閣杭蜀本刪胷中無滯礙五字自又或作且今按此書稱許大顛之語多為後人妄意隐避刪節太過故多脫落失其正思如上兩條猶無大利害若此語中刪去五字則要自以為難得一句不復成文理矣蓋韓公之學見於原道者雖有以識夫大用之流行而於本然之全體則疑其有所未睹且於日用之間亦未見其有以存養省察而體之於身也是以雖其所以自任者不為不重而其平生用力深處終不離乎文字言語之工至其好樂之私則又未能卓然有以自拔於流俗所與遊者不過一時之文士其於僧道則亦僅得毛干暢觀靈惠之流耳是其身心内外所立所資不越乎此亦何所據以為息邪距詖之本而充其所以自任之心乎是以一旦放逐憔悴無聊之中無復平日飲博過从之樂方且鬱鬱不能自遣而卒然見夫瘴海之濱異端之學乃有能以義理自勝不為事物侵亂之人與之語雖不盡解亦豈不足以蕩滌情累而暫空其滯礙之懷乎然則凡此稱譽之言自不必諱而於公所謂不求其福不畏其禍不學其道者初亦不相妨也雖然使公於此能因彼稊稗之有秋而悟我黍稷之未熟一旦飜然反求諸身以盡聖賢之蘊則所謂以理自勝不為外物侵亂者將無復羨於彼而吾之所以自任者益恢乎其有餘地矣豈不偉哉及祭神至海上遂造其廬及來袁州留衣服為别乃人之情非崇信其法求福田利益也孔子云丘之禱久矣凡君子行已立身自有法度聖賢事業具在方册可效可師仰不愧天俯不愧人内不愧心積善積惡殃慶自各以其類至慶下或無自字何有去聖人之道捨先王之法而從夷狄之教以求福利也詩不云乎愷悌君子求福不回傳又曰不為威惕不為利疚假如釋氏能與人為禍祟非守道君子之所懼也况萬萬無此理祟或作福且彼佛者果何人哉其行事類君子邪小人邪若君子也必不妄加禍於守道之人如小人也其身已死其鬼不靈天地神祇昭布森列非可誣也布森方作森布今按公進平淮西碑狀亦有森列字可考又肯令其鬼行胷臆作威福於其間哉進退無所據而信奉之亦且惑矣或作非大惑歟且愈不助釋氏而排之者其亦有說孟子云今天下不之楊則之墨楊墨交亂而聖賢之道不明則三綱淪而九法斁禮樂崩而夷狄横幾何其不為禽獸也故曰能言距楊墨者皆聖人之徒也子下或有有字或復出聖賢之道不明六字揚子雲云古者楊墨塞路孟子辭而闢之廓如也云或作曰夫楊墨行正道廢且將數百年以至於秦卒滅先王之法燒除其經坑殺學士天下遂大亂至方作涘非是其經或作經書或下有書字及秦滅漢興且百年尚未知脩明先王之道其後始除挾書之律稍求亡書招學士經雖少得尚皆殘缺十亡二三尚皆方無尚字或作皆尚故學士多老死新者不見全經不能盡知先王之事各以所見為守分離乖隔不合不公二帝三王羣聖人之道於是大壞後之學者無所尋逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也孟子雖賢聖不得位空言無施雖切何補然賴其言而今學者尚知宗孔氏崇仁義貴王賤霸而已崇方作貴上又有知字今按宗上已有知字王上又有貴字不應復出方本非是其大經大法皆亾滅而不救壊爛而不收所謂存十一於千百安在其能廓如也然向無孟氏則皆服左袵而言侏離上音朱後漢南蠻傳衣裳斑闌言語侏離注蠻夷語聲也語不明之貌矣故愈嘗推尊孟氏以為功不在禹下者為此也向方作茍漢氏已來羣儒區區脩補百孔千瘡隨亂隨失其危如一髮引千鈞緜緜延延寖以微滅方無是字於是時也而唱釋老於其間鼓天下之衆而從之嗚呼其亦不仁甚矣甚方作耳釋老之害過於楊墨韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於已壞之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在傍又安得因一摧折自毁其道以從於邪也而粗或作且粗籍湜輩雖屢指教不知果能不叛去否辱吾兄眷厚而不獲承命惟增慙懼死罪死罪愈再拜答名毉山人書愈白惠書責以不能如信陵執轡者史記魏公子無忌封信陵君魏有隱士侯嬴為大梁夷門監者公子從車騎虚左自迎侯生攝弊衣冠直上載公子上坐欲以觀公子公子執轡愈恭夫信陵戰國公子欲以取士聲勢傾天下而然耳如僕者自度若世無孔子不當在弟子之列僕下方無者字以吾子自山出有朴茂之美意恐未礱磨以世事又自周後文弊百子為書各自名家方無書各自名四字非是亂聖人之宗後生習傳雜而不貫貫或作實故設問以觀吾子其已成熟乎將以為友也其未成熟乎將以講去其非而趨是耳下熟乎或作熟邪趨下或有其字不如六國公子有市於道者也方今天下入仕惟以進士明經及卿大夫之世耳其人率皆習熟時俗工於語言識形勢善候人主意方从閣本意下有在字云意在謂意之所嚮也左氏晉君少安不在諸侯趙穿有寵而弱不在軍事漢書王莽意不在哀義祖此也今按但如諸本語意已足不假在字為竒也政使能竒亦復幾何而已不勝其贅矣此近世所謂古文昔之弊而謂韓公為之哉恐閣本初亦失誤而方乃曲為之說以誤後人故不可以不辨或者又疑在亦草書者字之誤更詳之故天下靡靡日入於衰壞恐不復振起務欲進足下趨死不顧利害去就之人於朝以爭救之耳非謂當今公卿間無足下輩文學知識也不得以信陵比然足下衣破衣繫麻鞋率然叩吾門吾待足下雖未盡賓主之道不可謂無意者破上方無衣字繫上方有脚字者下或有也字足下行天下得此於人蓋寡乃遂能責不足於我此真僕所汲汲求者議雖未中節其不肯阿曲以事人者灼灼明矣阿曲方無曲字或作効俗或阿上仍有効字或作効阿俗方將坐足下三浴而三熏之聽僕之所為少安無躁愈頓首答渝州李使君書或注方古二字乖隔年多不獲數附書慕仰風味未嘗敢忘書下或有狀字使至連辱兩書告以恩情迫切不自聊賴連辱方作辱連紙重序河南事跡本末文字綢密典實可尋而推究之明萬萬無一可疑者欽想所為益深勤企欽上方有重字豈以愈為粗有知識可語以心而告之急哉是比數愈於人而收之何幸之大也於下或有古字愈雖無節槩知感激若使在形勢親狎於要路有言可信之望雖百悔吝不敢默黙知上疑脫一字信或作伸方云信音伸之下或無望字敢下方無複出黙字今按衆本皆未安疑本有易有言不信之語若作言有可信而讀如字則其義通矣更詳之今既無由縁進言言之恐益累髙明是以負所期待竊竊轉語於人不見成效此愈之罪也然不敢去心期之無已以報見待惟且遲之勿遽捐罷幸甚去心或作忘去其心或無期之無已四字捐或作止今按捐罷字疑衍又按此書題一作狀故其詞亦用俗體不甚作文荘子云知其無可奈何而安之若命者聖也傳曰君子竢命然無所補益進其厭飫者祗增愧耳良務寛大愈再拜答元侍御書九月五日愈頓首微之足下前歳辱書論甄逢父濟識安禄山必反即詐為喑棄去棄或作亡禄山反有名號又逼致之濟死執不起卒不汚禄山父子事又論逢知讀書刻身立行勤已取足不干州縣斥其餘以救人之急足下繇是與之交欲令逢父子名迹存諸史氏方作事非是足下以抗直喜立事斥不得立朝失所不自悔喜事益堅微之乎子真安而樂之者抗或作伉謹詳足下所論載校之史法若濟者固當得附書附字疑衍葢濟固合立傳不應言附書也今逢又能行身幸於方州大臣以摽白其先人事白方作目載之天下耳目徹之天子追爵其父第四品赫然驚人逢與其父俱當得書矣濟逢父子自吾人發春秋美君子樂道人之善夫茍能樂道人之善則天下皆去惡為善善人得其所其功實大足下與濟父子俱宜牽聮得書足下勉逢令終始其躬而足下年尚彊嗣徳有繼將大書特書屢書不一書而已也愈既承命又執筆以竢愈再拜别本韓文考異卷十八欽定四庫全書别本韓文考異巻十九宋王伯大重編書序與鄭相公書鄭餘慶時鎮興元再奉示問皆縁孟家事樊曰元和九年三月以鄭餘慶為興元尹餘慶辟孟郊參謀郊挈其妻行至閿鄉因暴卒辭旨惻惻憂慮深逺竊有以見大人君子篤於仁愛終始不倦伏讀感欷不知所喻舊與孟徃還數人昨已共致百千已來尋已至東都計供葬事外尚有餘資今裴押衙所送二百七十千足以益業為遺孀音霜樊曰是嵗十月𦵏郊其費皆出鄭相及東野舊徃還者以其餘財贍給其家郊無子妻鄭氏永久之賴孟氏兄弟在江東未至先與相識亦甚循善所慮才幹不足任事鄭氏兄弟惟最小者在東都固如所示不可依仗孟之深友太子舎人樊宗師孟下或有氏字比持服在東都今已外除經營孟家事不啻如已前後人所與及裴押衙所送錢物並委樊舎人主之營致生業必能不失利宜候孟氏兄弟到分付成事庶可靜守無大闕敗伏惟不至逺憂續具一一諮報不宣諮或作咨愈再拜與袁相公書袁滋先鎮襄陽後鎮荆南不知此書的在何時也伏聞賓位尚有闕員幸蒙不以常輩知遇恒不自知愚且賤思有論薦竊見朝議郎前太子舎人樊宗師孝友聰明家故饒財身居長嫡悉推與諸弟諸弟皆優贍有餘而宗師妻子常寒露饑餒宗師怡然處之無有難色窮究經史章通句解至於隂陽軍法聲律悉皆研極原本又善為文章詞句刻深獨追古作者為徒不顧世俗輕重通微曉事可與晤語與或作以又習於吏職識時知變非如儒生文士止有偏長退勇守專未為宰物者所識年近五十遑遑勉勉思有所試閤下倘引而致之密加識察有少不如所言愈為欺罔大君子便宜得棄絶之罪於門下誠不忍竒寳横棄道側而閤下篋櫝尚有少闕不滿之處猶足更容輒冐言之退增汗懾篋或作匱方云無闕字謹狀與鄂州栁中丞書公綽時觀察鄂岳淮右殘孽尚守巢窟或作窟巢環宼之師殆且十萬瞋目語難方云此用荘子語杭蜀本作難語非自以為武人不肯循法度頡頏作氣勢竊爵位自尊大者肩相摩地相屬也不聞有一人援桴鼓誓衆而前者但日令走馬來求賞給助宼為聲勢而已日方作月閤下書生也詩書禮樂是習仁義是修法度是束一旦去文就武鼓三軍而進之陳師鞠旅親與為辛苦慷慨感激同食下卒將二州之牧樊曰元和十年詔公綽以兵五千隸安州刺史李聽討呉元濟公綽曰朝廷謂吾書生不知兵邪請自行許之引兵渡江抵安州聽以軍禮迎謁公綽謂曰以公世將曉兵吾且欲署職以兵法從事聽曰唯命以都知兵馬使軍中先鋒行營都虞候三牒受之選卒六千屬聽戒其部將曰行營事一决都將聽被恩威遂盡力當時服其知權士卒家有疾病公綽厚給之人皆感激故每戰皆捷以壯士氣斬所乘馬樊曰公綽所乘馬躡殺圉人公綽命殺馬以祭或曰圉人不自僃耳良馬可惜公綽曰馬材良性毒必殺之補註栁氏敘訓及新舊唐史並以殺為公綽為襄陽節度使時事司馬温公考異正引公此書証之云乃鄂岳時事以祭踶死之士踶夫計切又徒兮切一作蹄漢武帝詔馬奔踶而致千里雖古名將何以加兹此由天資忠孝鬱於中而大作於外動皆中於機㑹以取勝於當世而為戎臣師豈常習於威暴之事而樂其鬭戰之危也哉愈誠怯弱不適於用聽於下風竊自增氣誇於中朝稠人廣衆㑹集之中或無㑹集二字所以羞武夫之顔令議者知將國兵而為人之司命者不在彼而在此也而在方無而字臨敵重慎誡輕出入良用自愛以副見慕之徒之心而果為國立大功也幸甚幸甚不宣命或作用非是或無之徒二字方無下之字愈再拜又一首愈愚不能量事勢可否比常念淮右以靡弊困頓三州之地蚊蚋蟻蟲之聚感兇竪喣濡飲食之惠提童子之手坐之堂上奉以為帥出死力以抗逆明詔戰天下之兵乗機逐利四出侵暴屠燒縣邑賊殺不辜環其地數千里莫不被其毒洛汝襄荆許潁淮江為之騷然丞相公卿士大夫勞於圖議圖或作國非是握兵之將熊羆貙虎之士畏懦䠞將六切促也蹜莫肯杖戈為士卒前行者獨閤下奮然率先揚兵界上將二州之守親出入行間與士卒均辛苦生其氣勢見將軍之鋒頴凜然有向敵之意用儒雅文字章句之業取先天下武夫闗其口而奪之氣愚初聞時方食不覺棄匕箸起立豈以為閤下真能引孤軍單進與死宼角逐爭一旦僥倖之利哉真或作直非是或無單字就令如是亦不足貴其所以服人心在行事適機宜而風采可畏愛故也是以前狀輒述鄙誠眷惠手翰還答益增欣悚惠下或有賜字夫一衆人心力耳目使所至如時雨三代用師不出是道閤下果能充其言繼之以無倦得形便之地甲兵足用雖國家故所失地旬嵗可坐而得嵗或作月况此小宼安足置齒牙間勉而卒之以俟其至幸甚夫逺徴軍士行者有羇旅離别之思居者有怨曠騷動之憂本軍有饋餉煩費之難地主多姑息形迹之患急之則怨緩之則不用命浮寄孤懸形勢銷弱又與賊不相諳委臨敵恐駭難以有功若召募土人召或作占必得豪勇與賊相熟知其氣力所極無望風之驚愛䕶鄉里勇於自戰徴兵滿萬不如召募數千閤下以為何如儻可上聞行之否計已與裴中丞相見行營事宜不惜時賜示及幸甚不宣愈再拜答魏博田僕射書季冬極寒伏惟僕射尊體動止萬福即日愈蒙免蒙恩改職事不任感懼諸本無蒙免二字方從閣本今按蒙免者蒙田之庇而得遣免也連上文為句蒙恩者蒙上之恩而改職事也連下文為句使至奉十一月十二日示問欣慰殊深賛善十一郎行已附狀伏計尋上達愈雖未獲拜識嘗承僕射眷私猥辱薦聞待之上介事雖不允受賜實多頃者又蒙不以文字鄙薄令譔廟碑見遇殊常荷徳尤切安有書問稍簡遂敢自疎比所與楊書記書葢縁久闕附狀求因間粗述下情或無求字間或作閑今按此謂楊書記書因田之間為述已意也忽奉累紙示問辭意重疊捧讀再三但增慙悚僕射公忠賢徳為内外所宗位望益尊謙巽滋甚謬承知遇欣荷實深伏望照察限以官守拜奉未由無任馳戀謹因使廻奉狀不宣謹狀與華州李尚書書呂本注綘字方云以史考之綘以元和十年二月出刺華州又公與綘同年故曰久故蜀本注實字非是比來不審尊體動止何似比或作夜乍離闕庭伏計倍增戀慕愈於久
