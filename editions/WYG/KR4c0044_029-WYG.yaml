seq: 29
front:
  text: 水陸運從事試協律郎親拜其母於門内陸下或有轉字門下方無内字母卒五年而鄭公以節領興元軍奏為其軍叅謀試大理評事挈其妻行之興元次于閿鄉或無之興元字暴疾卒年六十四買棺以歛以二人輿歸酆郢皆在江南十月庚申樊子合凡贈賻而葬之洛陽東其先人墓左以餘財附其家而供祀或無而供祀字有以俟字或無供祀字有俟字將葬張籍曰先生掲得振華於古有光賢者故事有易名況士哉或無古有光字杭本無賢者下十字如曰貞曜先生則姓名字行有載不待講說而明皆曰然遂用之待或作從非是初先生所與俱學同姓簡於世次為叔父由給事中觀察浙東曰生吾不能舉死吾知恤其家銘曰於戲貞曜維執不猗方無戲字執或作持或無維執不猗一句或此句在維出不訾之下維出不訾訾凡數義集韻云思也思不稱意也惟前漢書訾讀與貲同顔師古注多財也若曰不貲則貧也猗亦二義詩那云猗歟歎辭也前南山云有實其猗鄭氏注倚也若曰不猗則無所倚也東野中立不倚而以貧出仕卒至於無所施為止用昌其詩銘意如是而巳維卒不施以昌其詩蘇子瞻嘗舉此以問王定國當昌其身邪昌其詩也來詩下語不契作詩荅之有云昌身如飽腹飽盡還復飢昌詩如膏面為人作容姿不如昌其氣欝欝老不哀雖云老不衰却懐安所之不如昌其志志一氣自隨養之塞天地孟軻不吾欺公謂東野昌其詩而東坡乃云不如昌其志葢蘇嘗讀東野詩有未足當韓豪之句不為所取也
  hash: sha256:224bf58259dd6d391ecd075192ec51c26e6447f2821cf000ee397b3447401b28
