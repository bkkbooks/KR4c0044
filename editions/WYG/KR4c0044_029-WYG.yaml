body:
  text: 唐故秘書少監贈絳州刺史獨孤府君墓誌銘君諱郁字古風河南人常州刺史贈禮部侍郎憲公諱及之第二子憲公躬孝踐行篤實而辨於文勸飭指誨以進後生名聲垂延紹德惟克君生之年憲公殁世與其兄朗畜於伯父氏始微有知則好學問咨禀教飭不煩提諭月開日益卓然早成年二十四登進士第時故相太常權公掌出詔文望臨一時望或作迎登君于門歸以其子歸或作妻選授奉禮郎楊於陵為華州署君鎮國軍判官奉授恊律郎方从􅄯本無奉禮至奏授十八字朋逰益附華問彌大元和元年對詔䇿拜右拾遺二年兼職史館四年遷右補闕詔中貴人承璀將兵誅王承宗河北君奏疏諫召見問狀有言動聴其後上將有所相不可於衆君與起居舍人李約交章指摘事以不行五年遷起居郎為翰林學士愈被親信有所補助權公既相君以嫌自别改尚書考功員外郎復史館職七年以考功知制誥入謝因賜五品服八年遷駕部郎中職如初權公去相復入翰林九年以疾罷尋遷祕書少監即閑于郊閑下或有居字十年正月病遂殆甲午輿歸卒於其家贈絳州刺史晁本有上五字本或繫於年四十下方並無年四十男子二人長曰某早死次曰天官始十嵗有至性聞呼父官與聞弔客至輒號泣以絶女子一人夫人天水權氏贈太子太保貞孝公臯之承孫故相今太常徳輿之女承孫字未詳𦙍慶配良是似是宜是似方作是以今按是似是宜承上句言𦙍慶而似配良而宜也方似作以非是四月已酉其兄右拾遺朗以喪東葬河南夀安之甘泉鄉家􅉷憲公墓側將以五月壬申窆家或作冡謂愈曰子知吾弟久敢屬以銘知或作與久或作友銘曰於古風襮布谷切又音博又黼領也衣表也詩繡衣朱襮謂衣領之在外者順而裏方於下或有乎字今按上篇四言不應首句為三字此乃雜言或有此三字句也不耀其章其剛不傷戴美世令而年再不贏惟後之成戴或作載令或作命今按此言載前人之美而世其令徳也唐故虞部員外郎張府君墓誌銘尚書虞部員外郎安定張君諱季友字孝權年五十四病卒東都明年兄子塗與其弟庾掞等護柩歸葬長安縣馬額原夫人北海唐氏之封明下或無年字或作月庾掞或作庚揆前事塗進韓氏門伏哭庭下曰叔父且死幾於不能言矣或無且字張目而言曰吾不可無告韓君别藏而不得韓君猶不葬也張目方從杭本無目字云後漢嚴光傳良久張目熟眎然此恐當从杭本為正今按方知古有張目字而必以杭本為正殊不可曉今从諸本塗為書致吾意已而自署其末與封敢告以請愈既與為禮發書云云其末有複語千萬永訣八字方無末有字名日月與封皆孝權迹名下或有與字孝權與余同年進士其上世有暠者當宇文時為車騎大將軍鄜城太守卒葬河北謚曰忠公至孝權間五世矣孝權大父諱孝先太子通事舍人孝先或作奉先父諱庭光贈綏州刺史綏州之卒孝權葢尚小杭本史下無綏州字非是母曰太原縣君卒既葬孝權守墓樹松柏三年而後歸卒上方有複出縣君字選為河南府文學或無府字去官徐州使拜章請為判官授協律郎孝權始不痛絶詔下大悔即詐稱疾不言三年元和初徐使死孝權疾即日已試判入髙等授鄠縣尉明年故相趙宗儒鎮荆南以孝權為判官拜監察御史經二年拜真御史明年分司東臺轉殿中按皇甫氏子母病不侍走京師求試職宰相怒曰吾故皇甫氏御史助所善相戲法侮我皇甫媪何疾䘖未决皇甫母病果死得解遷留司虞部員外郎孝權為人孝謹與人語恐傷之而時嶷嶷有立與孝權㳺者極衆而獨以其死累余可尚也已是為銘此下或注銘亡二字或注疑闕銘詞字唐故檢校尚書左僕射右龍武軍統軍劉公墓誌銘一本檢校上有金紫光禄大夫字僕射下有兼御史大夫字統軍下有知軍事上柱國彭城郡開國公食邑二千户贈路州大都督字公諱昌裔字光後本彭城人曽大父諱承慶朔州刺史大夫巨敖好讀老子莊周書為太原晉陽令再世宦北方宦或作官樂其土俗遂著籍太原之陽曲曰自我為此邑人可也何必彭城父訟贈右散騎常侍訟或作誦今按名訟無理疑避諱而改公少好學問始為兒時重遲音穉不戲恒若有所思念計畫及壯自試以開吐蕃説干邉將不售入三蜀從道士㳺久之蜀人苦楊琳冦掠公單船往説琳感欷雖不即降納其徒不得為虐樊云唐史昌裔傳云入蜀楊恵琳反昌裔説之惠琳之亂在缺夏州嵗月相逺惠琳事詳見崔寧傳琳降公常隨琳不去琳死脱身亡沉浮河朔之間建中中曲環招起之為環檄李納指摘切刻納悔恐動心􅁪魏皆疑惑氣懈環封奏其本徳宗稱焉環之㑹下濮州戰白塔救寧陵襄邑撃李希烈陳州城下公常在軍間環領陳許軍公因為陳許從事以前後功勞累遷檢校兵部郎中御史中丞營田副使吳少誠乗環喪引兵叩城留後上官説咨公以城守所以能擒誅叛將為抗拒令敵人不得其便説或作悦與舊史合擒方作檢今按此謂安國寧謀以城降賊昌裔宻計斬之當作擒圍解拜陳州刺史韓全義敗引軍走陳州求入保公自城上揖謝全義曰公受命詣蔡何為來陳公無恐賊必不敢至我城下明日領騎步十餘抵營全義驚喜迎拜歎息殊不敢以不見舍望公改授陳許軍司馬上官説死拜金紫光禄大夫檢校工部尚書代説為節度使命界上吏不得犯蔡州人曰俱天子人奚為相傷少誠吏有來犯者捕得縳送曰妄稱彼人公宜自治之少誠慙其軍亦禁界上暴者兩界耕桑交跡吏不何問何或作呵方云漢賈誼傳大譴大呵顔綰傳不孰何顔曰何即問也何上或有可字非是今按過秦論云陳利兵而誰何言注云問之曰此為誰人何人也亦此義封彭城郡開國公就拜尚書右僕射元和七年得疾視政不時八年五月涌水出他界過其地防穿不補没邑屋流殺居人拜疏請去職即罪詔還京師即其日與使者俱西大熱旦暮馳不息疾大發左右手轡止之公不肯曰吾恐不得生謝天子上益遣使者勞問勅無亟行至則不得朝矣天子以為恭即其家拜檢校左僕射右龍武軍統軍知軍事十一月某甲子薨年六十二某下或有日字下同上為之一日不視朝贈潞州大都督命郎弔其家郎下或有中字明年某月某甲子葬河南某縣某鄉某原公不好音聲不大為居宅於諸帥中獨然夫人邠國夫人武功蘇氏子四人嗣子光禄主簿縱學於樊宗師士大夫多稱之長子元一朴直忠厚便弓馬為淮南軍衙門將便方作使非是次子景陽景長皆舉進士葬得日相與選使者哭拜階上使來乞銘銘曰提將之符尸我一方配古侯公維徳不爽平聲祝曰楚詞厲而不爽些注楚人謂美敗曰爽我銘不亡後人之慶洪曰爽慶皆當叶韻爽讀若霜慶讀若羌又離騷云慶悴而喪榮沈存中曰古人諧聲如慶字多與章字叶韻孝孫有慶萬夀無疆黍稷稻粱農夫之慶是也集韻並收入平聲别本韓文考異巻二十九欽定四庫全書别本韓文考異巻三十宋王伯大重編
