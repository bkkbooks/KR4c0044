seq: 22
front:
  text: 在期謂此㑹之難又授縞紵以託心左氏襄二十九年吴季札過鄭見子産如舊相識與之縞帶子産獻紵衣焉示兹誠之不謬授方作援儻後日之北遷約窮歡於一晝雖掾俸之酸寒要拔貧而為富何人生之難信捐斯言而莫就始訝信於暫踈遂承凶於不救承或作成見明旌之低昻尚遲疑於别袖明方從諸本作銘此從閣本字見檀弓鄭注云神明之旌憶交酬而迭舞奠單杯而哭柩美夫君之為政不橈志於讒構橈或作僥或作撓從手皆非是遭脣舌之紛羅獨陵晨而孤雊彼憸人之浮言雖百車其何詬車方作年今按後漢書馮衍出妻書云詞語百車韓盖用此作年非是洞古往而髙觀固邪正之相寇幸竊睹其始終敢不明白而蔽覆神乎來哉辭以為侑尚饗
  hash: sha256:fe0a187d095196c4d801cadda864ac07c1af16203910329829d4cad5dd129ba4
