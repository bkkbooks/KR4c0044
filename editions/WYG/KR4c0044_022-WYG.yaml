body:
  text: 祭薛助教文維元和四年嵗次已丑後三月二十一日景寅朝散郎守國子博士韓愈太學助教侯繼謹以清酌之奠祭于亡友國子助教薛君之靈散墓志石本作議繼下或有等字薛君之靈晁本作河東薛君七官之靈嗚呼吾徒學而不見施設禄又不足以活身天於此時奪其友人同官太學日得相因奈何永違祇隔數晨笑語為别慟哭來門來或作東藏棺蔽帷欲見無縁皎皎眉目在人目前酌以告誠庶㡬有神嗚呼哀哉尚饗祭虞部張員外文維年月日愈等謹以清酌庶羞之奠敬祭于亡友張十三員外之靈文苑作元和十年晁本作維元和十年月日中書舍人王涯考功郎中知制誥韓愈禮部侍郎崔羣京兆尹許季同考功員外郎庾承宣河中節度判官殿中侍御史邢册等方云六人皆張季友之同年也嗚呼往在貞元俱從賔薦司我明試時維邦彦各以文售幸皆少年羣遊旅宿其歡甚焉出言無尤有獲同喜他年諸人莫有能比倐忽逮今二十餘嵗存皆衰白半亦辭世外纒公事内迫家私中宵興歎無復昔時如何今者又失夫子今者或作於今懿德柔聲永絶心耳廬親之墓終喪乃歸陽瘖避職妻子不知分司憲臺風紀由振遂遷司虞以播華問不能老夀孰究其因託嗣於宗天維不仁託嗣或作嗣託酒食備設靈其降止論德叙情以視諸誄尚饗祭河南張員外文樊曰張署維年月日彰義軍行軍司馬守太子右庶子兼御史中丞韓愈謹遣某乙以庶羞清酌之奠祭于亡友故河南縣令張十二貟外之靈或無守太子右庶子字貞元十九君為御史余以無能同詔並跱跱或作峙方云選潘岳關中詩列營綦跱注跱立也亦作峙君德渾剛標髙掲已有不吾如唾猶泥滓余戇而狂年未三紀乗氣加人無挾自恃彼婉孌者實憚吾曹側肩帖耳有舌如刀我落陽山以尹鼯猱君飄臨武臨武縣在郴州山林之牢嵗弊寒兇雪虐風饕顛於馬下我泗君咷音桃號咷雪虐方從杭本作嘯虎云以顛於馬下言之由虎聲懽也風饕謂虎貪風而嘯不已虎近於虐訛自此也饕或作號今按杭本全然不成文理以上語嵗弊寒兇言之八字相偶當為雪虐明甚夜息南山同卧一席守𨽻防夫觝頂交跖音隻足下頂或作項非是洞庭漫汗粘天無壁風濤相豗呼回切中作霹靂追程盲進颿船箭激颿或作㠶或作飄南上湘水屈氏所沈上或作之二妃行迷淚蹤染林山哀浦思鳥獸呌音余唱君和百篇在吟君止于縣我又南踰把􅊦相飲後期有無期宿界上一又相語自别㡬時遽變寒暑遽或作復方作徧枕臂欹眠加余以股僕來告言虎入廐處無敢驚逐以我􅐒去􅐒音䝉樊曰公貞元十九年與張俱令南方明年冬㑹宿臨武界上虎入公廐取􅐒去􅐒驢子也虎寅屬也公載張語云云巳而順宗即位皆改江陵府掾公法曹張工曹君云是物不駿於乗虎取而往來寅其徴寅方作夤今按寅為辰名夤乃夤縁之義當改作寅說見下條我預在此與君俱膺猛獸果信惡禱而憑獸蜀本作首方云李本校作孟首不知得之何本也葛魯卿云􅐒不駿虎取之則亨也不待禱而有憑也今按洪謝本皆作孟首謂正月孟春之首也張言來寅其徴以虎為寅神故言來嵗寅月當有徵驗孟首果得歸也然且作猛獸亦通余出嶺中君竢州下偕掾江陵非余望者郴山竒變其水清寫泊砂倚石有遌下吴故切又音咢一作楚詞重華不可遌注逢也或曰心不欲見而見曰遌無捨衡陽放酒熊咆音庖熊聲虎嘷音豪虎聲不存令章罰籌蝟毛不存或作存不罰或作罪方云唐人㑹飲以籌記罰劉夢得詩罰籌長樹纛是也今按令章謂酒令違令則以籌記其罰也委舟湘流往觀南嶽雲壁潭潭穹林攸擢雲方作天避風太湖七日鹿角太或作大鹿角洞庭湖中地名元㣲之有鹿角詩湖旁至今有鹿角巡檢司也鉤登大鮎奴兼切楚詞鱣鮎兮延延注鮎鰋也怒頰豕豞許角切豞或作豹非是方云豞豕聲臠盤炙酒羣奴餘啄走官皆下首下凥髙上苦刀切祝曰髖也漢東方朔凥益髙下馬伏塗從事是遭予徴博士君以使巳相見京師過願之始分教東生君掾雍於用切首兩都相望音忘於别何有解手背面遂十一年君出我入如相避然生濶死休吞不復宣生濶死休或作生死休咎非是刑官屬郎引章許奪或作奮訐方作許奪今按奪謂爭執不與猶今言定奪公事也墓志云守法爭議棘棘不阿即此事也方本無義或本亦非權臣不愛南昌是斡今按墓志張自刑部出刺䖍州然則昌當作康明條謹獄氓獠張絞切又力道切户歌用遷澧音禮澧州水名浦為人受瘥瘥昨何切病也孫曰署自䖍州改澧州刺史民稅出雜産物與錢尚書有經數觀察使牒州徴錢陪數經署曰刺史可為法不可貪官害民留牒不肯從竟以代罷還家東都起令河南屈拜後生憤所不堪屢以正免身伸事蹇竟死不昇孰勸為善丞相南討余辱司馬議兵大梁走出洛下哭不憑棺奠不親斝不撫其子𦵏不送野望君傷懐有隕如瀉望君或作定居非是銘君之績納石壤中爰及祖考紀德事功中方作下紀方作已事或作著今按上文已有下韻則此不當則有下字巳字亦無文理下當作中已當作紀無疑也事功作著功於理亦順但下文便有外著後世則重出著字又似可疑姑從舊本作事盖紀其德紀其事紀其功也又恐或是序字以似而誤然無所據不敢輙改也外著後世鬼神與通君其奚憾不余鑒衷嗚呼哀哉尚饗祭左司李員外太夫人文維年月日某官某等謹以清酌庶羞之奠敬祭于某縣太君鄭氏尊夫人之靈某等或作某乙等胄于茂族配此德門克成厥家享有全福為婦為母再朝中宫搢紳推榮宗黨是則某等幸隨令子同服官僚庶展哀誠式陳牢醴尚饗祭薛中丞文方云此祭薛存誠也唐史有傳維年月日文苑作元和九年某官某乙等謹以清酌庻羞之奠祭于亡友故御史中丞贈刑部侍郎薛公之靈公之懿德茂行可以勵俗清文敏識足以發身宗族稱其孝慈友朋歸其信義累昇科第亟踐班行左掖南臺孫曰北齊號御史臺為南臺樊曰左掖則給事中南臺則御史中丞共傳故事詩人墨客爭諷新篇羽儀朝廷輝映中外長途方騁大限俄窮聖上軫不憗之悲具僚興云亡之歎况某等忘言斯乆知我俱深青春之遊白首相失來陳薄奠詎盡哀誠嗚呼哀哉尚饗祭裴太常文維年月日愈等謹以庶羞清酌之奠敬祭于故太常裴二十一兄之靈文苑作元和九年晁本月日下具給事中李逢吉給事中孟簡吏部侍郎張惟素吏部侍郎張賈禮部郎中史館修撰韓愈等五人朝廷之重莫過乎禮雖經䇿具存而精通盖寡自郊丘故事宗廟時宜大君之所旁求丞相之所卒問羣儒拱手宗祝醉心兄皆指陳根源斟酌通變莫不允符天㫖克協神休至乎公卿􅃣昏士庶䘮祭疑皆響答問必實歸從我者足為軌儀異我者無逃指笑動為時法言比古經獨立一朝髙視千古而又驅馳朋執僶俛宗親檐石之儲常空於私室方丈之食每盛於賔筵檐諸本多作甔方云舊本多作檐公秋懐詩用甔字按後漢明帝紀生無檐石之儲檐字本此郭璞方言注甔石之儲實用甔字前漢蒯通揚雄傳皆只作詹貨殖傳醬千儋顔曰儋人儋之見一儋兩甖丁濫切贈必固辭求無不應孰云具美而不永年某等早接遊從實欽道義致誠薄奠以訣終天鳴呼哀哉尚饗潮州祭神文五首􅄯本第一首題作祭潮神文第二首題作又祭止雨文第三題祭城隍文第四題祭界石神文第五不立題維年月日潮州刺史韓愈謹差攝潮陽縣尉史虛已以特羊庶羞之奠告于大湖神之靈愈承朝命為此州長今月二十五日至治下凡大神降依庇貺斯人者皆愈所當率徒屬奔走致誠親執祀事於廟庭下今以始至方上奏天子思慮不能專一冠衣不淨潔與人吏未相識知牲糈下先旅切又音所孫曰糈祀神米也離騷巫成將夕降兮懐椒糈而要之酒食噐皿觕與粗同潮本云一作損弊不能嚴清又未卜日時不敢自薦見使攝潮陽縣尉史虛已以告神其降監尚饗維年月日潮州刺史韓愈謹以清酌腵脩之奠祈于大湖神之靈腵或作時丁喚切記曰大饗尚腵修今按若作時則脩當作羞曰稻既穟矣而雨不得熟以獲也或無以獲字非蠶起且眠矣而雨不得老以簇也千木切廣云蠶簇也嵗且盡矣稻不可以復種而蠶不可以復育也農夫桑婦將無以應賦稅繼衣食也非神之不愛人刺史失所職也方無之字百姓何罪使至極也神聰明而端一聽不可濫以惑也刺史不仁可坐以罪惟彼無辜惠以福也劃劙上忽麥切又音畫下力支切又音麗祝曰劃劙解也分剖也孫曰刮去也雲隂巻月日也月日或作日月非是幸身有衣口得食給神役也口上或有而字得或作有充上之須脫刑辟也選牲為酒以報靈德也吹撃管鼓侑香潔也拜庭跪坐如法式也庭方作廷不信當治疾殃殛也神其尚饗維年月日潮州刺史韓愈謹以柔毛剛鬛孫曰記曰羊曰柔毛豕曰剛鬛清酌庻羞之奠祭于城隍之神間者以淫雨將為人災無以應貢賦供給神明上下獲罪罰之故乃以六月壬子奔走分告乞晴于爾明神下或再出爾字屬下句明神閔人之不辜若饗若答饗或作響糞除天地山川清風時興白日顯行蠶穀以豋人不咨嗟咨方作疵惟神之恩夙夜不敢忘怠謹卜良日躬率將吏薦兹血毛清酌嘉羞侑以音聲以謝神貺神其饗之方作兹維年月日潮州刺史韓愈謹遣耆夀成㝢以清酌少牢之奠告于界石神之靈此五字或作界石之神曰惟封部之内山川之神􅂶庥于人庥或作庇官則置立室宇備具服器奠饗以時滛雨既霽蠶穀以成織婦耕男忻忻衎衎是神之庥庇于人也敢不明受其賜謹選良月吉日齋潔以祀神其鑒之尚饗鑒之方作鑒兹維年月日潮州刺史韓愈謹以清酌庶羞之奠祭于大湖之神惟神降依兹土以庇其人今兹無有水旱雷雨風火疾疫為災各寧厥宇以供上役長吏免被其譴賴神之德夙夜不敢忘謹具食飲躬齋洗奏音聲以獻以樂以謝厥賜不敢有所祈尚饗别本韓文考異巻二十二欽定四庫全書别本韓文考異巻二十三宋王伯大重編祭文袁州祭
