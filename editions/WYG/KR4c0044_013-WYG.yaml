seq: 13
front:
  text: 石以記方從石本無而字
  hash: sha256:16f79e6a033cf8213c05cfcaa897910112ac7d1bab2ded50465d4225ff00877f
body:
  text: 徐泗豪三州節度掌書記㕔石記豪諸本作濠石或作壁洪云地理志濠初作豪元和三年改為濠據退之作記時尚為豪作濠誤矣方云通典以為州名字本作濠今按顔魯公干錄字様及唐韵亦皆作豪而元和郡國志云濠字中間誤去水元和三年字又加水皆與地理志合但通典偶脱中間去水一節耳此濠字當以洪氏作豪書記之任亦難矣元戎整齊三軍之士統理所部之甿以鎮守邦國賛天子施敎化整或作摠士或作事守或作定而又外與賔客四鄰交其朝覲䀻問慰薦祭祀祈祝之文與所部之政三軍之號令升黜凡文辭之事皆出書記祈或作所非閎辨通敏兼人之才莫宜居之閎或作宏然皆元戎自辟然後命於天子後方作后茍其帥之不文則其所辟或不當亦其理宜也南陽公自御史大夫豪夀廬三州觀察使授節移鎮徐州歴十一年而掌書記者三人者下或有凡字其一人曰髙陽許孟容入仕於王朝今為尚書禮部郎中其一人曰京兆杜兼今為尚書禮部員外郎觀察判官其一人隴西李博自前鄉貢進士授祕書省校書郎方為之隴上或有曰字南陽公文章稱天下其所辟實所謂閎辨通敏兼人之才者也後之人茍未知南陽公之文章吾請觀於三君子茍未知三君子之文章吾請觀於南陽公可知矣人茍下或有有字蔚乎其相章炳乎其相輝志同而氣合魚川泳而鳥雲飛也章方作扶或作華泳或作伏方無也字愈樂是賔主之相得也故請刻石以記之而䧟置于壁間俾來者得以覽觀焉記下或無之字來上或無俾字畫記雜古今人物小畫共一巻騎而立者五人騎而被甲載兵立者十人兵下或無立字一人騎執大旗前立騎下或有而字騎而被甲載兵行且下牽者十人騎且負者二人騎執器者二人騎擁田犬者一人騎而牽者二人騎而驅者三人執覊居宜切靮音的馬韁立者二人騎而下倚馬臂隼而立者一人騎而驅涉者二人徒而驅牧者二人徒下方無而字驅牧方作騎牧今按徒則非騎矣方誤坐而指使者一人甲胄手弓矢鈇銊植者七人甲胄執幟植者十人負者七人偃寢休者二人甲胄坐睡者一人方涉者一人方無方字坐而脱足者一人方本坐上有方涉二字寒附火者一人雜執器物役者八人奉壷矢者一人舍而具食者十有一人具或作目十上或有二字挹且注者四人牛牽者二人二或作三驢驅者四人一人杖而負者負下方無者字今按一人字疑在負者之下婦人以孺子載而可見者六人婦人方作婦女而無以字載而上下者三人孺子戯者九人凡人之事三十有二為人大小百二十有三而莫有同者焉事下或有主字為或作焉屬上句非是馬大者九匹於馬之中又有上者下者又有上者下者方以杭本作亦有馬之下者焉蜀本同但又作亦閤本作亦有馬焉今按此句三本皆無理唯别本作又有上者下者而無焉字乃與上下文意相屬今從之行者牽者牽方作奔或併無四字今按牽謂牽而行也後有走者則奔者為重復當存牽而去奔涉者陸者或無陸者二字今按此承涉者則陸為方出水也不當無翹者顧者鳴者寢者訛者立者人立者或無人立者二字非是齕音纈又胡没切齧也者飲者溲者陟者降者痒磨樹者嘘者嗅者喜相戲者怒相踶齧五結切者喜下或有而字秣者騎者驟者走者載服物者載狐兎者凡馬之事二十有七為馬大小八十有三而莫有同者焉為或作焉屬上句非是牛大小十一頭十下或有有字橐駝三頭橐或作駱下同方云漢書子虚賦注橐駝者言其可負橐而駝物故以名驢如橐駝之數而加其一焉隼一犬羊狐兔麋鹿共三十旃車三兩雜兵器弓矢旌旗刃劒矛楯食飲切弓服矢房甲胄之屬缾盂簦音登又都滕切笠之長柄也史記虞卿躡蹻擔簦是也笠葢也笠筐筥錡釡錡其綺切方曰筐圓曰筥皆以竹為之三足曰錡無足曰釡飲食服用之器壷矢博奕之具二百五十有一皆曲極其妙方從閣杭本用下有投壺二字而無器字非是貞元甲戌年余在京師甚無事同居有獨孤生申叔者或無有字始得此畫而與余彈棊沈存中云彈棊有譜一巻其局方二尺中心髙如覆盂其巔為小壺四角㣲引起李商隠詩玉作彈棋局中心亦不平謂其中髙也白樂天詩彈棊局上事最妙是長斜謂抹角斜彈一發過半局今譜中有此法栁子厚序棊用二十四局者即此戯也余幸勝而獲焉意甚惜之以為非一工人之所能運思葢藂集衆工人之所長耳雖百金不願易也工下或皆無人字藂或作叢明年出京師至河陽與二三客論畫品格因出而觀之座有趙侍御者君子人也見之戚然若有感然感上或有所字或無若有感然四字少而進曰噫余之手摸也摸上或有所字或作手之所摹也亡之且二十年矣余少時常有志乎兹事得國本絶人事而摸得之遊閩中而喪焉居閒處獨時往來余懐也以其始為之勞而夙好之篤也來上或有日字為上方無始字今以下文夙好之語推之當有今雖遇之力不能為已且命工人存其大都焉余既甚愛之又感趙君之事因以贈之而記其人物之形狀與數而時觀之以自釋焉藍田縣丞㕔壁記丞之職所以貳令於一邑無所不當問其下主簿尉主簿尉乃有分職丞位髙而偪例以嫌不可否事文書行吏抱成案詣丞巻其前鉗以左手右手摘紙尾雁鶩行以進平立聣音詣丞曰當署雁或作鳬曰下或有丞字丞涉筆占位署惟謹涉或作濡目吏問可不可吏曰得則退不敢畧省漫不知何事官雖尊力勢反出主簿尉下諺數慢必曰丞至以相訾謷上將此切下牛刀切謷不省語也前漢聲謷謷説文云不省人也丞之設豈端使然哉諺或作劾或作該方以文苑云謂諺語之所舉計者以丞為慢之最且至以相訾謷也數所矩切博陵崔斯立種學績文以蓄其有泓涵演以淺切長流也迤日大以肆􅉼或作澄大以或作以大貞元初挟其能戰藝於京師再進再屈於人杭本無再進二字文苑無下再字而屈下一字皆作千字方云斯立貞元四年進士六年中博學宏詞再進而屈千人也今按杭苑皆脱字方以苑為誤但唐人試宏詞者甚少如貞元九年僅三十二人而已作千人恐非是或疑千當作其如云屈其坐人也然無所據姑放穆天子傳闕其處以俟知者元和初以前大理評事言得失黜官再轉而為丞兹邑始至喟曰官無卑顧材不足塞職既噤巨禁切不得施用又喟曰丞哉丞哉余不負丞而丞負余則盡枿五割切去牙角一躡故跡破崖岸而為之喟下或皆有然字負余上方有喜字云喜音詐吏切黄霸傳少學律令喜為吏岸下方無而字為之方作為文而讀連下句曰為文丞言猶文具也今按文丞不成文理方説之僻類如此丞㕔故有記壊漏汚不可讀按丞字或疑為衍文斯立易桷與瓦墁母官切治壁悉書前任人名氏庭有老槐四行南墻鉅竹千挺儼立若相持挺方云從本説文挺一枚也水㶁㶁音虢循除鳴斯立痛掃溉對樹二松日哦其間日下或有吟字有問者輒對曰余方有公事子姑去考功郎中知制誥韓愈記新修滕王閣記愈少時則聞江南多臨觀之美而滕王閣獨為第一有瑰偉絶特之稱則或作嘗臨觀或作登臨特方從閣本作時非是及得三王所為序賦記等注或云王勃作游閣序王緒作賦今中丞王公為從事日作修閣記或並無壯其文辭益欲往一觀而讀之以忘吾憂繫官于朝願莫之遂十四年以言事斥守掲陽或無事字掲或作朝便道取疾以至海上又不得過南昌而觀所謂滕王閣者其冬以天子進大號加恩區内移刺袁州袁於南昌為屬邑於上方無袁字私喜幸自語以為當得躬詣大府受約束於下執事及其無事且還儻得一至其處竊寄目償所願焉諸本皆同方獨從文苑無及其無事且還儻得一至其處十二字而償作賞下又増適字今按叙事當如諸本乃有曲折而其先公後私不以遊覽雜乎受命之重尤得事大府之體與聘禮既受饔飱然後請觀乃從下門而入意亦相似如方所定則皆失之而竊寄目賞語意生澁適所願亦不若償字之穏也至州之七月詔以中書舍人太原王公為御史中丞觀察江南西道洪江饒䖍吉信撫袁悉屬治所八州之人前所不便及所願欲而不得者公至之日皆罷行之行上文苑有而字非是大者驛聞小者立變春生秋殺陽開隂閉生方從文苑作施今按下字對偶文苑亦非是令修於庭户數日之間而人自得於湖山千里之外日或作月吾雖欲出意見論利害聴命於幕下而吾州乃無一事可假而行者又安得捨已所事以勤館人則滕王閣又無因而至焉矣或無矣字其嵗九月人吏浹和公與監軍使燕于此閣文武賔士皆與在席酒半合辭言曰此屋不修且壊前公為從事此邦適理新之公所為文實書在壁理或作治所上方無公字今三十年而公來為邦伯適及期月公又來燕於此公烏得無情哉烏或作胡方以杭苑作乎今按作乎語意輕脱不類公文亦非寮屬所以施於其長者葢本作烏自烏而胡又自胡而訛耳大抵此篇文苑多誤公應曰諾於是棟楹梁桷板檻之腐黑撓折者葢瓦級甎之破缺者赤白之漫漶上莫半切下胡館切赤白繪畫之色前漢為其泰漫漶而不可知注漫漶不分别貌不鮮者治之則巳破方作故鮮或作圭説見祭湘君夫人文今按瓦甎堅物破缺乃不可用而故則無甚害也且修屋而盡易其故則是新作而非修之謂矣作故非是無侈前人無廢後觀工既訖功公以衆飲而以書命愈曰子其為我記之而下或有賞焉字子下或無其字愈既以未得造觀為歎竊喜載名其上詞列三王之次有榮耀焉乃不辭而承公命其江山之好登望之樂雖老矣如獲從公遊尚能為公賦之元和十五年十月某日袁州刺史韓愈記某或作五科斗書後記愈叔父名雲卿仕終禮部侍郎李習之誌其妻母墓曰禮部君好立節義有大功於昭陵其文章出于時而官不甚髙習之妻雲卿孫女也當大歴世文辭獨行中朝天下之欲銘述其先人功行取信來世者咸歸韓氏於時李監陽冰獨能篆書而同姓叔父擇木善八分擇木代宗時官禮部尚書杜子美李潮八分歌云尚書韓擇木騎曹蔡有鄰開元以來數八分者同姓方從閤蜀本如此或只作配善或作葢或作葢能非是今按禮云五世袒免殺同姓也公於擇木已無服矣故以同姓言之不問可知其人不如是者不稱三服故三家傳子弟往來貞元中愈事董丞相幕府於汴州識開封令服之者陽冰子授余以其家科斗孝經漢衛宏官書兩部合一巻愈寳蓄之而不暇學服之或作復之官書方云新唐志作字書考之杜林傳及陳蕃傳注非也後來京師為四門博士識歸公歸公好古書能通之愈曰古書得其據依葢可講方無其字據依或作依據方云左氏無所據依因進其所有書屬歸氏元和來愈亟不獲讓嗣為銘文薦道功徳思凡為文辭宜畧識字方無道字識下或有古字因從歸公乞觀二部書得之留月餘張籍令進士賀拔恕寫以留愈或無愈葢得其十四五而歸其書歸氏十一年六月四日右庶子韓愈記别本韓文考異巻十三欽定四庫全書别本韓文考異巻十四宋王伯大重編雜著鄆州谿堂詩并序此篇方多从石本憲宗之十四年始定東平三分其地孫曰謂析李師道所據十三州為三鎮馬總鄆曹濮等州觀察使薛平青州刺史王遂沂州刺史以華州刺史禮部尚書兼御史大夫扶風馬公為鄆音運秦為薛郡地漢為東平國曹濮音卜古昆吾之墟節度觀察等使鎮其地公下或有總字既一年褒其軍號曰天平軍上即位之二年召公入且将用之以其人之安公也復歸之鎮安下或有於字此句或作以彼之人安於公也上之三年公為政於鄆曹濮也適四年矣治成制定衆志大固惡絶於心仁形於色竱心一力以供國家之職竱心一力或作竭心力竱或作竭一或作戮方云竱旨兖切專也國語竱本肇末于時沂密始分而殘其帥方云沂帥王遂也洪曰謂十四年沂海将王弁殺其觀察使王遂自稱留後其後幽鎮魏不悦於政相扇繼變謂長慶元年幽州盧龍軍都知兵馬使朱克融囚其節度使張洪靖以反成徳軍大将王廷湊殺其節度田𢎞正以反二年魏博節度使田布自殺兵馬使史憲誠自稱留後復歸於舊於政或作于政方云謂張𢎞靖被囚田𢎞正史憲誠皆為下所殺徐亦乘勢逐帥自置同於三方置或作署或置上有署字方云此謂崔羣為王智興所逐也惟鄆也截然中居四鄰望之若防之制水恃以無恐閤杭蜀及諸本皆有四鄰望之一句方从石本刪去今按文勢及當時事實皆當有此句若其無之則下文所謂恃以無恐者為誰恃之邪大凡為人作文而身或在逺無由親視摹刻既有脱誤又以毁之重勞遂不能改若此者葢親見之亦非獨古為然也方氏最信閤杭蜀本雖有謬誤往往曲從今此三本幸皆不誤而反為石本脱句所奪甚可笑也然而皆曰鄆為虜巢且六十年将彊卒武曹濮於鄆州大而近方云曹濮於鄆自為一句或作於曹濮州非是軍所根柢皆驕以易怨而公承死亡之後掇拾之餘剥膚椎髓公私掃地赤立新舊不相保持萬目睽睽持或作恃公於此時能安以治之其功為大若幽鎮魏徐之亂不扇而變此功反小何也公之始至衆未熟化以武則忿以憾以恩則横而肆或無以憾二字或作而憾一以為赤子一以為龍蛇憊蒲拜切病也心罷音疲精磨以嵗月然後致之難也及教之行衆皆戴公為親父母夫叛父母從仇讐非人之情故曰易下或有也字於是天子以公為尚書右僕射封扶風縣開國伯以褒嘉之或無公及封字縣或作郡公亦樂衆之和知人之悦而侈上之賜也於是為堂於其居之西北隅號曰谿堂以饗士大夫通上下之志既饗其從事陳曽謂其衆言公之畜此邦其勤不亦至乎此邦之人纍力佳切繫也説文綴得理也公之化惟所令之不亦順乎上勤下順遂濟登兹不亦休乎昔者人謂斯何今者人謂斯何雖然斯堂之作意其有謂而喑無詩歌是不考引公徳而接邦人於道也徳下或無而字乃使来請其詩曰帝奠九壥與㕓同有葉有年有荒不條河岱之間不或作有及我憲考一收正之收或作牧視邦選侯以公来尸公来尸之人始未信公不飲食以訓以狥孰饑無食孰呻孰歎孰寃不問不得分願孰為邦蟊亡侯切螣也節根之螟蟊或作蛑音義同羊狠狼貪以口覆城吹之喣之摩手拊之箴之石之膊音粕而磔陟格切説文薄脯膊之屋上左氏成二年傅龍人囚靈蒲就魁殺而膊諸城上磔閃也張也箴或作針之凡公四封既富以彊謂公吾父孰違公令可以師征不寧守邦師方从石本作帥今按平淮西碑云屢興師征作師為是石本或誤未可知也公作谿堂播播流水淺有蒲蓮深有蒹葦公以賓燕其鼓駭駭方云此詩十一章以令叶强以駭叶水皆古音也令有平聲一讀公獨孤郁墓志亦見淮南子勿驚勿駭萬物将自理勿撓勿攖萬物将自清駭古音自與理叶也周官注疾雷撃鼓曰駭西京賦所謂駭雷鼓是也今按古音之説甚善吳才老補音補韻二書其説甚詳駭水叶韻如管子宮如牛鳴盎中徴如負豕覺而駭亦一證也沙隨程可久曰吳説雖多其例不過四聲互用切饗通用二條而已此説得之如通其説則古書雖不盡見今可以例推也公燕谿堂賓校醉飽流有跳魚岸有集鳥既歌以舞其鼓考考公在谿堂公御琴瑟公暨賓贊稽經諏律稽考也諏訪也施詩智切用不差人用不屈谿有薲苽上音苹下音孤孫曰説文薲苹也苽凋胡也周禮魚宜苽有龜有魚公在中流右詩左書無我斁徒故切又音亦遺此邦是庥音休爾雅曰䕃貓相乳蜀本乳下有説字司徒北平王家貓有生子同日者其一死焉或作其一母死或作其母一死有二子飲於死母母且死其鳴咿咿其一方乳其子若聞之起而若聽之走而若救之走下方無而字銜其一置于其棲又往如之反而乳之若其子然噫亦異之大者也方無也字夫貓人畜也非性於仁義者也方從閤杭無仁字非是其感於所畜者乎哉北平王牧人以康伐罪以平伐或作罰非是理隂陽以得其宜國事既畢家道乃行父父子子兄兄弟弟雍雍如也愉愉如也視外猶視中一家猶一人夫如是其所感應召致其亦可知矣易曰信及豚魚非此類也夫非此或作亦其非是愈時獲幸於北平王客有問王之徳者愈以是對客曰夫禄位貴富人之所大欲也得之之難未若持之之難也得之於功或失於徳得之於身或失
