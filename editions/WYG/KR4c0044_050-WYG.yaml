body:
  text: 戊申詔曰惟先王光有天下必正我邦本以立人極建儲貳以承宗祧所以啟迪大猷安固洪業斯前代之令典也皇太子某體仁秉哲恭敬温文德協元良禮當上嗣朕奉若丕訓憲章前式惟承社稷之重載考春秋之義授之匕鬯以奉粢盛爰以令辰俾膺茂典今册禮云畢感慶交懷思與萬方同其惠澤自貞元二十一年二月二十四日已後至四月九日昧爽已前天下應犯死罪者特降從流流已下遞減一等文武常叅并州府縣官子為父後者賜勲兩轉古之所以教太子以茂選師傅以翼輔之法於訓詞而行其典禮左右前後罔非正人是以教諭而成德也給事中陸質中書舍人崔樞積學懿文守經據古夙夜講習庶協于中並充皇太子侍讀天下孝子順孫先旌表門閭者委所管州縣各加存䘏庚戌封皇太子長子寧等六人皆為王癸酉當作丑贈吐蕃弔祭使工部侍郎兼御史大夫史館修撰張薦禮部尚書薦字孝舉代居深州之陸澤祖文成博學工文詞性好詼諧七登文學科薦聰明強記歴代史傳無不貫通為太師顏真卿所稱賞遂知名大厯中江東觀察表薦之江或作浙授左司禦率府兵曹參軍兼史館修撰貞元初為太常博士四年迴紇求和親使送咸安公主入迴紇以薦為判官改授殿中侍御史累遷諫議大夫十一年册迴紇子薦以秘書少監持節為使還久之遷秘書監二十年吐蕃贊普死以薦為工部侍郎兼御史大夫持節弔贈卒于赤嶺東迴紇辟吐蕃傳歸其柩辟字恐誤前後三使異國自始命至卒常兼史職在史館二十年著宰輔傳畧五服圖記寓居録靈怪集等景寅罷閩中萬安監先是福建觀察栁冕久不遷欲立事迹以求恩寵立或作以乃奏云閩中南朝放牧之地畜羊馬可使孳息請置監許之收境中畜産令吏牧其中收或作牧羊大者不過十斤馬之良者估不過數千不經時輒死又斂百姓苦之逺近以為笑至是觀察閻濟美奏罷之丁夘命焚容州所進毒藥可殺人者可或作所五月已已史作戊辰無五月字以杭州刺史韓臯為尚書左丞左或作右辛未史作五月已已以右金吾大將軍范希朝為檢校右僕射兼右神䇿京西諸城鎮行營兵馬節度使叔文欲專兵柄藉希朝年老舊將故用為將帥使主其名而尋以其黨韓泰為行軍司馬專其事主或作在甲戌以度支郎中韓泰守兵部郎中兼中丞充左右神策京西都栅行營兵馬節度行軍司馬賜紫乙亥追改為檢校兵部郎中職如故甲申史作丁丑以萬年令房啟為容州刺史兼御史中丞初啟善於叔文之黨因相推致遂獲寵于叔文求進用或無因字叔文以為容管經畧使使行約至荆南授之云脱不得荆南即與湖南故啟宿留於江陵久之方行至湖南又久之而叔文與執誼爭權數有異同故不果尋聞皇太子監國啟惶駭奔馳而往是日以郴州員外司馬鄭餘慶為尚書左丞是日史作癸未乙酉以尚書左丞韓臯為鄂岳觀察武昌軍節度使以尚下十八字史作以右丞韓臯為鄂岳沔蘄團練觀察使仍日係甲辰下初臯自以為前輩舊人累更重任頗以簡倨自髙嫉叔文黨謂人曰吾不能事新貴人臯從弟􅋫幸於叔文以告叔文故出之辛邜以王叔文為户部侍郎職如故賜紫初叔文欲依前帶翰林學士宦者俱文珍等惡其專權削去翰林之職叔文見制書大驚謂人曰叔文日時至此商量公事若不得此院職事即無因而至矣王伾曰諾即疏請不從再疏乃許三五日一入翰林去學士名又與歸登同日賜紫内出衫笏賜登而叔文不霑文珍等所惡獨不得賜今按而叔文下數句重復不可讀疑因後來修改已増新字而不去舊文如買乳母之例也蓋上文已有俱文珍等惡其專權之句則此不當更有文珍等所惡五字有不霑字則不當更有獨不得賜四字若并有此九字則上不當有不霑字且此文珍等字上亦合更有脱字謬誤甚明今當削去文珍等以下九字則語意明白無復可疑矣由此始懼以衢州别駕令狐峘為秘書少監峘國子祭酒德棻𤣥孫進士登第司徒楊綰未達時遇之以為賢為禮部修史引峘入史館自華原尉拜拾遺累遷起居舍人大厯八年劉晏為吏部尚書奏峘為刑部員外判南曹累遷至禮部侍郎峘之判南曹晏為尚書楊炎為侍郎峘得晏之舉分闕必擇其善者與晏而以惡者與炎炎固已不平至峘為禮部而炎為相有杜封者故相鴻漸之子求補𢎞文生炎甞出杜門下託峘以封峘謂使者曰相公欲封成其名乞署封名下一字峘因得以記焉炎不意峘賣之署名屬峘峘明日疏言宰相炎迫臣以威臣從之則負陛下不從即炎當害臣即或作則德宗以問炎炎具道所以德宗怒曰此姦人不可奈欲杖而流之炎救解乃黜為衡州别駕貞元初李泌為相以左庶子史館修撰徵至則與同職孔述睿爭競細碎數侵述睿述睿長告以讓不欲爭告或作者也長告謂長假泌卒竇參為相惡其為人貶吉州别駕改吉州刺史齊映除江西觀察過吉州峘自以前輩懷怏怏不以刺史禮見入謁從容步進不袜首屬戎器或無袜字或又作抹非是映以為恨去至府奏峘舉前刺史過失鞫不得真無政事不宜臨郡貶衢州别駕上即位以秘書少監徵未至卒峘在史館修𤣥宗實録一百巻撰代宗實録三十巻雖頗勤苦然多遺漏不稱良史初德宗將厚奉元陵事峘時為中書舍人兼史職奏疏諫請薄其葬有答詔優奬元和三年以修實録功追贈工部尚書是月以襄州為襄府按元和郡國志作襄陽大都督府襄下當有陽字徙臨漢縣於古城曰鄧城縣别本韓文考異外集巻八欽定四庫全書别本韓文考異外集巻九宋王伯大重編
