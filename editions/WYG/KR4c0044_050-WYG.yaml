front:
  text: 順宗實録三起四月盡五月夏四月乙已上御宣政殿册皇太子册曰建儲貳者必歸于冢嗣固邦本者允屬於元良咨爾元子廣陵王某幼挺岐嶷長標洵淑佩詩禮之明訓宣忠孝之𢎞規居惟保和動必循道識達刑政器合温文愛敬奉於君親仁德聞于士庶神祗龜筮罔不協從是用命爾為皇太子於戲惟我烈祖之有天下也功格上帝祚流無窮光纘洪業逮予十葉䖍恭寅畏日慎一日付爾以承祧之重勵爾以王鬯之勤以貞萬國之心以揚三善之德爾其尊師重傅親賢逺佞非禮勿踐非義勿行對越天地之耿光丕承祖宗之休烈可不慎歟時上即位已久而臣下未有親奏對者内外盛言王伾王叔文專行斷決日有異説又屬頻雨皆以為羣小用事之應至將册禮之夕雨乃止迨行事之時天氣清朗有慶雲見識者以為天意所歸及覩皇太子儀表班行既退無不相賀至有感泣者
  hash: sha256:e25aa1e0c9c9c79df0ba46423820baa1b4c1303fea51da819c81a7a832d72c98
