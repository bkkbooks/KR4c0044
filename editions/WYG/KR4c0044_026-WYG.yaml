body:
  text: 碑誌唐朝散大夫贈司勲貟外郎孔君墓誌銘方無郎字六韓曰孔子三十世孫昭義節度盧從史有賢佐曰孔君諱戡字君勝從史為不法君隂争不從則於㑹肆言以折之從史羞面頸發赤抑首伏氣不敢出一言以對頸一作顔伏或作吐方云叔孫通傳所謂伏抑首者也作吐非氣今按漢傳言伏抑首伏也靣抑首也此言伏猶言屏氣耳與漢傳語異立為君更令改章辭者前後累數十坐則與從史說古今君臣父子道順則受成福逆輙危辱誅死曰公當為彼不得為此從史常聳聽喘汗死下或有且字常或作當非是居五六嵗益驕有悖語君争無改悔色則悉引從事空一府往争之色或作意亦通作也非是從史雖羞退益甚君泣語其徒曰吾所為止於是不能以有加矣以有或作有以遂以疾辭去卧東都之城東酒食伎樂之燕不與當是時天下以為賢論士之宜在天子左右者皆曰孔君孔君云方無者字皆上方從閣本有唯字或無複出孔君字或復出云字㑹宰相李公鎮揚州首奏起君君猶卧不應猶或作獨從史讀詔曰是故舍我而從人耶即誣奏君前在軍有某事上曰吾知之矣奏三上乃除君衞尉丞分司東都詔始下門下給事中吕元膺封還詔書上使謂吕君曰吾豈不知戡也行用之矣明年元和五年正月將浴臨汝之湯泉壬子至其縣食遂卒年五十七公卿大夫士相弔於朝處士相弔於家君卒之九十六日詔縛從史送闕下數以違命流于日南遂詔贈君尚書司勲員外郎盖用嘗欲以命君者信音伸其志其年八月甲申從𦵏河南河隂之廣武原南下或有府字隂下或有鄉字廣武原方作某地云唐河南府無河隂縣河今按元和郡國志河南府有隂縣君於為義若嗜欲勇不顧前後於利與禄則畏避退處如怯夫然始舉進士第自金吾衛錄事為大理評事佐昭義軍士下或有及字軍下或有帥字軍帥死從史自其軍諸將代為帥或無自其字請君曰從史起此軍行伍中凡在幕府唯公無分寸私分或作方非是公茍留唯公之所欲為君不得已留一嵗再奏自監察御史至殿中侍御史君或作居從史初聽用其言得不敗後不聽信惡益聞君棄去遂敗祖某某官贈某官父某某官贈某官諸本作祖如圭皇海州司戸贈工部貟外郎父岑父皇著作郎贈駕部貟外郎方從蜀本云今本所紀父祖官職多誤盖後人續增公諸志皆載三世此只言父祖已非考世系表及孔戣志此以如珪作如圭郎中作貟外郎著作佐郎為郎又非也駕部乃戡贈官此以為其父所贈又非也今按此姑從方本無大利害但方詆諸本止載二世為不入例而其所據之本此志亦只載二世云駕部乃戡所贈官而戡實贈司勲皆非是世表戣志與此志文亦未知其孰為得失恐皆未足以判其是非也君始娶𢎞農楊氏女卒又娶其舅宋州刺史京兆韋屺女皆有婦道凡生一男四女皆幼前夫人從𦵏舅姑兆次卜人曰今兹嵗未可以祔從卜人言不祔君母兄戣音逵尚書兵部貟外郎母弟戢殿中侍御史以文行稱朝廷將葬以韋夫人之弟前進士楚材之狀授愈曰請為銘銘曰允義孔君兹惟其藏更千萬年無敢壊傷方從杭本無傷字今按此傷字諸本皆有文理音韻皆無可疑方氏特以杭本脫漏遂不之信寧使此銘為歇後語不肯以諸本補之故中散大夫河南尹杜君墓誌銘或無散字君方作尹杜氏自戴侯畿始分戴侯之子恕為幽州刺史今居京兆諸杜其後也其季寛孝亷郎中寛後三世曼為河東太守葬其父洹水之陽方無之陽字其後世皆從葬洹水及正倫為太宗宰相猶封襄陽公太宗始詔葬京兆襄陽公無子以兄正藏子志静後遂嗣襄陽公生僑為懐州長史棄官老沁水上為富家卒葬懐州武陟長史生損為左司郎中卒贈少大理或作大理少卿大理生廙音異大理或作少卿為鄭州録㕘軍死思明亂贈吏部郎中公諱兼字某郎中第三子舉進士第司徒北平王燧戰河北掌書記累官至監察御史其後佐徐泗州軍遂至濠州刺史徐泗州軍亂以兵甲三千人防淮道不絶晁本如此方及諸本甲三千人四字皆在下文金魚之下而魚下復有兵字殊無理甲字亦疑衍或當在兵字上姑闕以竢知者有功加御史中丞賜紫衣金魚入為刑部郎中以能官拜蘇州刺史既辭行上書曰李錡且反必且奏族臣上固愛其才書奏即除吏部郎中或無中字遂為給事中出為商州刺史金商防禦使改河南少尹行大尹事半嵗拜大尹元和四年十一月二十日無疾暴薨年六十明年二月甲午從葬懐州夫人常山郡君張氏彭州刺史贈禮部侍郎蔇九利切之女生子男三人柔立為天長主簿詞立為夀州㕘軍誼立為順宗挽郎女一人順上或無為字將葬公之母兄太學博士冀與公之夫人及子男女謀曰葬宜有銘凡與我弟游而有文者誰乎遂來請銘銘曰杜氏大家世有顯人承繼綿綿以及公身始為進士乃篤朋友及作大官克施克守及作或作乃作纂辭奮筆渙若不思公牒盈前笑語指麾禄以給求食以㑹同不畜不收庫廐虛空事在于人日逺日忘在于一作不在何以傳之刻此銘章唐銀青光禄大夫守左散騎常侍致仕上柱國襄陽郡王平陽路公神道碑銘平陽或作陽平方從石本云攷唐世系表當從平陽今按此篇多從方氏所據石本惟路氏逺有代序自隋尚書兵部侍郎諱衮四代而至冀公衮或作充方以石本云閣杭本世表作衮代或並作世冀公諱嗣㳟以小邑蕭關令發聞開元受賜更名書於太史令下或有問字賜或作錫治行靈州終功南邦享有丕祉紹開厥家官至兵部尚書封冀國公薨贈尚書右僕射司空治或作始或無司空字公諱應字從衆冀公之嫡子用大臣子謹飭擢至侍御史著作郎選刺䖍州選或作遷割餘雩都作縣安逺以利人屬餘或作𨽻人或作民下同鑿敗灘石以平贛右暗切又音感水名在豫章唐史云鑿贛石挭嶮以通川道梗陶甓而城罷人屢築詔嗣冀封又加尚書屯田郎中進服色遂臨于温築隄岳城横陽界中二邑得上田除水害上田或作上苗拜尚書兵部郎中兼御史中丞淮南軍司馬改刺廬州又甓其城人不嵗苫或作苦入為尚書職方郎中兼御史中丞佐鹽鐵使使江東有功用半嵗歴常州遷至宣歙池觀察使進封襄陽郡王王或作公非是至則出倉米下其估半以廩餓人蜀闢誅行軍千五百人於蜀蜀闢或作劉闢或蜀下别有劉字李錡將反以聞置鄉兵萬二千人錡反命將期以卒救湖常坐牢江東心錡以無助敗縛作嚮山亭營軍于左右權丞相善之鑱其說嚮山石居宣嚮山宣州山名五年以疾去位校其倉得石者五十萬餘府得錢千者八十萬石者方無者字公之為州逢水旱喜賤出與人嵗稔以其得收常有贏利故在所人不病飢而官府畜積人或並作民贏或作餘元和六年天子憫公疾不可煩以職即其處拜左散騎常侍以其禄居其嵗九月望薨于東都正平里年六十七嵗上或無其字年上或有享字明年葬京兆萬年少陵原夫人滎陽鄭氏祔既其子臨漢縣男貫與其弟賞貞謀曰宜有刻也既下或有而字告於叔父御史大夫鄜坊丹延觀察使恕因其族弟進士羣以來請銘遂以其事銘曰冀公之封維艱就功襄陽繼大啓慶自躬于䖍洎温厥緒既作以及職方遂都邦伯朝夕人事下完上實師于其鄉鄰冦逼屈營居嚮山牆屋修施修諸本皆然方弃不錄而直作循字說見首篇褒功刻表丞相之辭功方作加受代而家叙䟽及邇病不能廷食禄卒齒凡代大家維艱其保凡代一作凡世既顯既願戒于終咎願或作碩伊我襄陽克慎巳有延畀後承莫不率守承或作丞有慕于原維樹在經在或作有以告無期博士是銘博士或作傳世本按公是時正為博士或非是烏氏廟碑銘元和五年天子曰盧從史始立議用師于恒乃隂與冦連夸謾兇驕出不遜言其執以來其四月中貴人承璀七罪切即誘而縳之其下皆甲以出操兵趨譁牙門都將烏公重􅏷當軍門叱曰天子有命從有賞敢違者斬從下或有者字於是士皆歛兵還營卒致從史京師壬辰詔用烏公為銀青光禄大夫河陽軍節度使兼御史大夫封張掖郡開國公居三年河陽稱治詔贈其父工部尚書且曰其以廟享其以或作以其即以其年營廟于京師崇化里軍佐竊議曰先公既位常伯而先夫人無加命號名差卑於配不宜語聞詔贈先夫人劉氏沛國太夫人八年八月廟成三室同宇祀自左領府君而下作主于第乙巳升于廟三室同宇方云史記渭陽五帝廟同宇韋昭曰謂上同下異也宇字一作牢非今按後漢以來公私廟制皆為同堂異室方說是也烏氏著於春秋譜於世本列於姓苑在莒者存在齊有餘枝鳴皆為大夫齊下或有者字餘下或有有字秦有獲為大官其後世之江南者家鄱陽處北者家張掖或入夷狄為君長唐初察為左武衛大將軍實張掖人其子曰令望為左領軍衛大將軍孫曰蒙為中郎將是生贈尚書諱承玼字某贈下或有工部字玼或作治方云新史承玼有傳字德潤重􅏷傳亦云承玼子也温公考異嘗加辨正宋樊本皆作承玼盖許孟容嘗為承玼碑石本猶傳於世新傳盖本此也烏氏自莒齊秦大夫以來皆以材力顯及武德以來始以武功為名將家開元中尚書管平盧先鋒軍屬破奚契丹屬或作屢之今按屬以連屬意從戰捺奴曷切祿走可突干諸本多作突于或作汗于方從許碑定從干云可突干契丹之勇將也新傳奚契丹入冦承玼破於捺禄山又戰白城承玼按隊出其右斬首萬計可突干奔北渤海擾海上至馬都山吏民逃徙失業尚書領所部兵塞其道塹原累石綿四百里深髙皆三丈冦不得進民還其居嵗罷運錢三千萬餘或無擾海字方从李本増云新傳亦考累或作壘許碑云武藝出海濵至馬都山屠䧟邑公以本營士馬防遏要害武藝即渤海王也黒水室韋二國名以騎五千來屬麾下邊威益張其後以耿仁智謀說史思明降思明復叛尚書與兄承恩謀殺之事發族夷尚書獨走免許碑承恩承玼之從父兄也李光弼以聞詔拜冠軍將軍守右威衛將軍檢校殿中監封昌化郡王石嶺軍使石嶺或作左領方云杭蜀粹與許碑新傳皆作石嶺積粟厲兵出入耕戰以疾去職貞元十一年二月丁已薨于華隂告平里年若干許碑年九十六即葬于其地二子大夫為長季曰重元為某官銘曰烏氏在唐有家于初左武左領二祖紹居左領或作右領中郎少卑屬于尚書不償其勞乃相大夫授我戎節制有壃墟制有或作有其壃或作疆數備禮登以有宗廟方無數字登下有壇字今按數備禮登數字乃名位不同禮亦異數之數言制數既備禮亦增崇也袁氏廟碑所謂數以立廟亦是此意若如方本即上句已言授節不應至此始言登壇況登壇又與立廟不相關乎作廟天都以致其孝右祖左孫爰響其報蜀本文苑作左祖右孫為今按廟制以四為上方本是云誰其子其有無孫其有或作孰其克對無羞乃惟有人克方作光念昔平盧為艱為瘁大夫承之危不棄義四方其平士有怠息來覲來齋以饋黍稷唐故河東節度觀察使滎陽鄭公神道碑文河東節度使贈尚書右僕射鄭公葬在滎陽索上元和八年六月庚子太史尚書比部郎中䕶軍韓愈刻其墓碑曰司馬氏遷江南有鄭豁者仕慕容垂國為其太子少保其孫簡當拓抜魏為滎陽太守後簡者號其族為南祖南祖之鄭入唐有為利之景谷令者曰嘉範於公為曾祖是生撫俗為泗之徐城令徐城生公之父曰洪卒官涼之戸曹㕘軍涼之或作涼州公諱儋都甘切少依母家隴西李氏舉止異凡兒其舅吏部侍郎季卿謂其必能再立鄭氏季或作李謂下或有曰字方本謂作曰其必作必其稍長能自課學明左氏春秋課或作謀亦今按蜀志出師表自謀字文選作自課恐公用此語以進士選為太原㕘軍事對直言策拜京兆髙陵尉考府之進士能第上下以實不姦樊僕射澤以襄陽兵戰淮西公以叅謀留府能任後事户曹殯于涼涼地入西戎自景谷徐城三世皆未還滎陽𦵏公解官舉五䘮為三墓𦵏索東徐城墓無表公能㓜長哀感心求不置以得舊人指告其處公能下或有使字方無哀字云自幼而長求之不置也今按心字當屬下句其後為大理丞太常博士遷起居郎尚書司封吏部二郎中能官舉其名德宗晚節儲將於其軍以公為河東軍司馬能以無心處嫌間卒用有就間或作問非是或無卒字有就或作其說非是貞元十六年将說死即詔授司馬節節度河東軍方云考嚴綬傳將說李說也或無即詔字馬下或無復出節字除其官為工部尚書太原尹兼御史大夫北部留守公之為司馬用寛亷平正得吏士心及昇大帥持是道不變昇方作升帥或作師部將有因貴人求要職者公不用用老而有功無勢而逺者削四鄰之交賄省姱嬉之大燕校講民事施罷不竢日姱或作誇校講或作講校用能以十月成政氓征就寛軍給以饒氓或作賦或作民十七年疾廢朝夕八月庚戌薨享年六十一天子為之不能臨朝者三日或無能字贈尚書右僕射即以其年十月辛卯𦵏索上疾比薨醫問交道比葬弔贈賜使者相及凡河東軍之士與太原之氓吏及旁九郡百邑之鰥寡外夷狄之統於府者聞公之薨皆哭曰吾其如何軍下或無之字或作之軍氓方作民公與賔客朋遊飲酒必極醉投壺博奕窮日夜若樂而不厭者平居簾閣據几終日不知有人與或作為若方從閣蜀本作苦而今按二本之無文理有如此者方皆從之可怪也别自號白雲翁方云令狐楚嘗為太原從事唐志有表奏七巻自號白雲孺子盖以媚儋也名人魁士吕氏春秋云疾學而不能為魁士名人者未之有也鮮不與善好樂後進及門接引皆有恩意與善属上句好樂屬下句方從蜀本以善為其而連好樂兩句又云名人魁士吕氏春秋語今按蜀本無理又如此而方從之然不言閣杭本則二本固與它本同矣方最信此三本今既自有不同方乃舍二本之明白而從一本之訛謬則其取舍又有不可曉者非獨古本誤之也始娶范陽盧氏女生仁本仁約仁載皆有文行二季舉進士皆早死仁本為後子獨存不樂舉選年三十餘始佐河陽軍後娶趙郡李氏生三女二夫人凡三男五女長女嫁遼東李繁繁亦名臣子有才學遺命二夫人各别為墓不合葬系曰士常患勢卑不能推功德及人常或作嘗下同常患貧無以奉所欲得患下或有勢字若鄭公者勤一生以得其位而曾不得須臾有焉雖然觀其所既立其可知巳嗚呼哀哉魏博節度觀察使沂國公先廟碑銘或有田氏字撰别本云朝議郎守尚書比部郎中史館修䕶軍韓愈奉勅撰歐陽公曰自天聖以來學者多讀韓文而患集本舛訛惟予家本更校時人共傳號為善本及後集錄古文得韓文之刻石如羅池黄陵廟碑之類以校予家集本舛謬猶多若田𢎞正碑則尤甚盖由諸本不同往往妄加改易今以碑校印本初未必誤多為校讐者妄改易之乃知文字之傳乆而轉失其真者多矣則校讐之際決於取舍不可不謹也元和八年十一月壬子上命丞相元衡丞相吉甫丞相絳召太史尚書比部郎中韓愈至政事堂傳詔曰田𢎞正始有廟京師朕惟𢎞正先祖父厥心靡不嚮帝室訖不得施乃以教付厥子維𢎞正銜訓事嗣朝夕不怠事嗣或作嗣事嗣下或有于字本此篇今亦從方本亦據石以能迎天之休顯有丕功維父子繼忠孝予維寵嘉之是以命汝愈銘欽哉惟時臣愈承命悸恐明日詣東上閣門拜䟽辭謝不報退伏念昔者魯僖公能遵其祖伯禽之烈周天子實命其史臣克作為駉古熒切駜皮必切泮閟之詩使聲于廟以假魯陵今天子嘉田侯服父訓不違用康靖我國家服上或有能字靖或作靜盖寵銘之所以休寧田氏之祖考而臣適執筆𨽻太史奉明命其可以辭或無𨽻字謹案魏博節度使銀青光禄大夫檢校工部尚書兼魏州大都督府長史御史大夫沂國公田𢎞正北平盧龍人州或作博或無兼字故為魏博諸將忠孝畏慎田季安卒其子㓜弱用故事代父人吏不附迎𢎞正於其家使領軍事𢎞正籍其軍之衆與六州之人還之朝廷悉除河北故事比諸州故得用為帥巳而復贈其父故滄州刺史兵部尚書母夫人鄭氏梁國太夫人得立廟祭三代曾祖都水使者府君祭二室兵部府君祭東室其銘曰唐繼古帝海外受制此據石本外或作内受或作臣狎于太寧燕盗以驚狎或作治羣黨相維河北失平號登元和大聖載營風揮日舒咸順指令嶪嶪音業山髙魏土嬰兒戱兵嬰兒謂懐諫吏戎愁毒莫保腰頸或作領人曰田侯其德可以呌譟奔趨乗門請起田侯攝事奉我天明天或作王方云左傳范氏中行氏反易天明注言不事君也又云二三子順天明公語出此束縛弓戈考校度程提壃與疆同籍户來復邦經提或作堤帝欽良臣曰維錫予嗟我六州始復故初告慶于宗以降命書于宗或作宗廟以降或作降以旌節有韜豹尾神旗櫜兠戰纛以長魏師櫜方作槖蜀本作櫜石本同但省文耳今按櫜謂弓服槖乃囊之無底者非兵仗也當從石本田侯稽首臣愚不肖迨兹有成祖考之教帝曰俞哉維汝忠孝予思乃父追秩夏卿嫓德娠賢嫓匹詣切娠之刃切又音身嫓配也娠孕也言梁國配兵部之德娠賢謂生𢎞正也左氏后緍方娠梁國是榮田侯作廟相方視阯見于蓍龜祖考咸喜暨暨音忌果毅也禮戎容暨暨田侯兩有文武訖其外庸謂外庸之訖則當入為輔相可作承輔承或作丞咨汝田侯勿亟勿遲覲饗式時爾祖爾思饗或作嚮爾祖爾思方作祖考之思或作爾祖之思别本韓文考異巻二十六欽定四庫全書别本韓文考異巻二十七宋王伯大重編碑誌劉統軍碑
