front:
  text: 鯨戲側脩鱗自來連州寺曽未造城闉音因詩出其闉闍闉城上重門日􅂝青雲客青或作春方云李白詩多用青雲客字探勝窮崖濵太守邀不去或作往或作得羣官請徒頻或作其志信不羣囊無一金資翻謂富者貧謂或作為昨日忽不見我令訪其隣奔波自追及波或作走把手問所因顧我却興歎我却或作却我君寜異於民離合自古然辭别安足珍吾聞九疑好補註山海經曰蒼梧之川其中有九疑山漢武廵狩祀舜于此孫曰其山九峰相似故名九疑韓曰九疑山在零陵營道縣零陵今永州而營道則𨽻道州矣夙志今欲伸欲或作願斑竹啼舜婦清湘沈楚臣衡山與洞庭此固道所循尋崧方抵洛歴華遂之秦浮游靡定處偶往即通津吾言孫曰公自謂子當去子道非吾遵江魚不池活野鳥難籠馴吾非西方敎憐子狂且醇吾嫉惰遊者憐子愚且諄章倫切誠也去矣各異趣何為浪霑巾浪或作淚
