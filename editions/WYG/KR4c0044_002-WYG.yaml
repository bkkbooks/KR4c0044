body:
  text: 送靈師佛法入中國爾來六百年齊民逃賦役髙士著幽禪官吏不之制紛紛聽其然制或作禁紛紛或作紛紜耕桑日失𨽻朝署時遺賢靈師皇甫姓𦙍胄本蟬聮孫曰𦙍繼也胄系也謂姓氏所出蟬聮連續之貌補注南史宋王鈞七葉之中爵位相繼人人有集沈約語人云自開闢以來未有爵位蝉聯人才相繼如王氏之盛者少小涉書史早能綴文篇中間不得意失跡成遷延逸志不拘敎軒騰斷牽攣圍碁鬬白黒生死隨機權六博在一擲梟盧叱廻旋梟或作呼或作􅦻楚辭宋玉招魂菎蔽象碁有六博王逸注云投六箸行六碁故為六博也宋劉裕與劉毅摴蒱毅以為不能裕惡之因按五木既而四子俱黒其一子轉躍未定裕厲聲喝之即成盧毅意殊不快也宋玉招魂有成梟而牟呼五白梟勝也杜詩􅃝跣不肯成梟盧廣韵子樗蒲采名唐李文公集五木經甿采六開塞搭秃撅􅦻側梟冝從􅦻戰詩誰與敵浩汗横戈鋋音延小矛戰詩或作爭戰或作文戰或作詩戰方云戰詩戰文唐人語也白樂天戰文重棹鞅劉夢得戰文矛㦸深誰與方作與誰非是飲酒盡百􅊦側眼切杯也嘲諧思逾鮮􅊦或作醆或作琖後放此逾或作愈有時醉花月髙唱清且緜髙唱清或作清唱髙四座咸寂黙杳如奏湘絃尋勝不憚險黔江黔州有黔江縣屢泂沿上音囘下音縁泝流而上曰洄從流而下曰沿瞿塘五六月驚電讓歸船讓或作攘非是姚令威云讓責怒也方云此只謂歸舟急於驚電耳讓如厥大誰與讓之讓怒水忽中裂千尋墮幽泉尋或作潯同今按潯與尋環廻勢益急仰見團團天下團字一作圓投身豈得計性命甘徒捐浪沬蹙翻涌漂浮再生全同行二十人諸本二作三魂骨俱坑填靈師不掛懐冒涉道轉延開忠二州牧方云魏道輔謂二牧韋處厚白居易也二公出守在元和末此詩作於貞元二十年間攷其時非也詩賦時多傳失職不把筆珠璣為君編强留費日月密席羅嬋姢昨者至林邑使君數開筵逐客三四公盈懐贈蘭荃音荃香草湖游泛漭沆上音莽下胡朗切深大也西京賦滄池漭沆湖或作湘方云此言在林邑日非湘地也今按湖游對溪晏乃切溪宴駐潺湲别語不許出行裾動遭牽鄰州競招請書札何翩翩十月下桂嶺縣名在賀州乘寒恣窺縁落落王貟外爭迎獲其先自從入賔館占恡久能專吾徒頗􅂝被頗或作或被或作之接宿窮歡妍聽説兩京事分明皆眼前縱横雜謡俗𤨏屑咸羅穿材調真可惜朱丹韓曰陶徽詩對酒展塵編朱黄加釋注磨孫曰磨研猶琢也在磨研方將歛之道且欲冠其顛韶陽李太守髙步陵雲烟得客輙忘食開囊乞繒錢繒或作緡手持南曹敘唐制吏部員外郎一人掌判南曹王仲舒自吏部員外郎貶方云謂王員外仲舒也墓志云所為文章無世俗氣字重青瑶䥴子全切祝曰鑚也斵也古氣參彖繫方作象垂今按杜詩前哲彖繫髙標摧太𤣥維舟事干謁披讀頭風痊音詮孫曰典畧曰張綉反曹操令記室陳琳草檄檄成呈太祖太祖先苦頭風是日疾發讀琳所作而愈翕然起曰此愈我病還如舊相識還如或作頗似傾壺暢幽悁於縁切祝曰憂悒也通也詩中心悁悁以此復留滯歸驂音參驂馬幾時鞭縣齋有懐少小尚竒偉平生足悲吒陟駕切嘆也郭璞詩撫心獨悲吒猶嫌子夏儒肯學樊遲稼事業窺臯稷或作稷咼文章蔑曹謝濯纓起江湖綴珮雜蘭麝悠悠指長道去去䇿髙駕誰為傾國媒樊曰漢李延年傳北方有佳人絶世而獨立一顧傾人城再顧傾人國上嘆息曰世豈有此人乎平王公主因言延年有女弟上召見實妙麗善舞由是得幸是為李夫人自許連城價樊曰史記連城謂十五城秦所以易趙璧者初隨計吏貢屢入澤宫射雖免十上勞韓曰戰國䇿蘓秦説秦惠王書十上而説不行資用乏絶去秦而歸何能一戰霸能或作曽人情忌殊異世路多權詐多或作重蹉跎顔遂低摧折氣愈下冶長信非罪侯生侯嬴也孫曰史記魏有隠士侯嬴公子無忌虛左迎之嬴有客朱亥在市屠中嬴引車入市見之其客睥睨久立從騎皆竊罵侯生或遭罵懐書出皇都銜淚渡清灞音霸灞永也選控灞乘滻身將老寂寞志欲死閑暇朝食不盈腸冬衣纔掩髂枯駕切祝曰腰骨前漢折脇拉髂軍書既頻召戎馬乃連跨大梁從相公彭城赴僕射弓箭圍狐兎絲竹羅酒䏑兩府變荒凉荒或作炎方云此言董晉張建封相繼殂謝也三年就休假求官去東洛去或作來或作去官來東洛方云此謂貞元十五十六年冬如京調官也犯雪過西華塵埃紫陌春韓曰唐人樂府云紫陌青門三十六宫春晝永風雨靈臺夜名聲荷朋友援引乏姻婭音亞孫曰爾雅兩壻相謂曰婭雖陪彤庭臣雖方作隅或作仰陪或作偶皆非是孫曰彤庭丹墀謂御史也詎縱青㝠靶音霸轡革王襃曰王良執靶𡨕或作雲寒空聳危闕曉色曜脩架捐軀辰在丁鎩所介切鳥羽病也選鸞翮有時鎩翮時方䄍音乍年終祭公貶山陽以其年十二月投荒誠職分領邑幸寛赦湖波翻日車韓曰淮南子日乘車駕以六龍羲和為御杜詩西江浸日車嶺石圻天罅虛訝切孔也毒霧恒熏晝炎風毎燒夏雷威固已加􅄓勢仍相借氣象杳難測聲音吁可怕夷言聽未慣越俗循猶乍循或作脩非是指摘兩憎嫌睢盱上音隳下音吁視上逆貌祝曰視不明也列子老子而睢睢而盱盱而誰與居互猜訝祇縁恩未報豈謂生足藉嗣皇永貞元年順宗即位新繼明新方作帝非是率土日流化惟思滌瑕垢長去事桑柘斸陟玉切砍也嵩開雲扃壓潁抗風榭禾麥種滿地梨棗栽繞舍兒童稍長成雀䑕得驅嚇音罅詾嚇莊子鴟得腐䑕鵷雛過之仰而視之曰嚇注怒而拒物聲官租日輸納村酒時邀迓閑愛老農愚歸弄小女姹陟駕切少女也後漢姹女工數錢如今便可爾何用畢婚嫁樊曰後漢向平字子平隠居不仕建武中男女嫁娶畢敕誡家事勿相闗當如我死也合江亭諸本作題合江亭寄刺史鄒君方從閣杭蜀本篇内三處注文亦用蜀本孫曰亭在衡州負郭今之石皷頭即其地也地形特異崛起於二水之間旁有朱陵仙府唐人題刻散滿岩上公自陽山量移江陵過衡山紅亭枕湘江紅或作江方作洪者今按歐本作紅鮑云當作紅其作洪聲存而字訛也蒸水㑹其左瞰臨眇空闊緑浄不可唾維昔經營初邦君實王佐洪曰謂故相齊映所作翦林遷神祠買地費家貨費或作匱梁棟宏可愛宏或作横結構麗匪過伊人去軒騰兹宇遂頽挫老郎來何暮髙唱久乃和洪曰謂宇文炫又増其制樹蘭盈九畹音宛楚辭予既滋蘭之九畹栽竹逾萬个或作箇方云史記貨殖傳竹竿萬个古書皆作个字漢功臣表始出箇字長綆汲滄浪音郎幽蹊下坎坷口个切坎坷地不平波濤夜俯聽雲樹朝對卧初如遺宦情終乃最郡課人生誠無幾誠方作成非是事往悲豈奈乃个切語助或作那蕭條緜嵗時契闊繼庸懦勝事誰復論醜聲日已播中丞黜凶邪天子閔窮餓君侯至之初閭里自相賀淹滯樂閑曠勤苦勸慵惰為余掃塵階塵方作東非是命樂醉衆座窮秋感平分新月憐半破願書巖上石勿使泥塵涴烏卧切泥着物也泥塵或作塵泥陪杜侍御遊湘西兩寺獨宿有題一首因獻楊常侍諸本無兩字及一首因三字楊常侍憑也時觀察湖南長沙千里平勝地猶在險况當江闊處斗起勢匪漸深林髙玲瓏上音芩下音籠玉聲也一曰明貌青山上琬琰以冉切青玉也上或作生路窮臺殿闢佛事煥且􅌂剖竹走泉源開廊架崖广音􅌂因岩為屋廊一作廓是時秋之殘之或作初暑氣尚未歛羣行忘後先朋息棄拘檢朋一作困客堂喜空凉空或作風華榻有清簟澗蔬煑蒿芹水果剥菱芡音儉雞頭伊余夙所慕陪賞亦云忝幸逢車馬歸獨宿門不掩山樓黑無月漁火燦星㸃夜風一何喧杉檜屢磨颭職琰切風動物也磨或作摩方云古摩磨通猶疑在波濤怵􅅥夢成魘於琰切睡中魘静思屈原沈逺憶賈誼貶椒蘭離騷經注蘭楚懐王弟司馬子蘭椒楚大夫椒也争妬忌絳灌共讒謟誰令悲生腸坐使淚盈臉翻飛乏羽翼乏或作摧指摘困瑕玷困或作因非是珥音餌曹植戴蝉珥貂珥挿也漢官儀曰侍中􅃣金蝉有貂韓曰珥貂分陜謂楊以常侍鎮長沙貂藩維重政化類分陜禮賢道何優奉巳事苦儉大厦棟方􅂭巨川檝行剡音琰鋭利行或作初經營誠少暇遊宴固巳歉歐本作歉俗字當作慊方云古書歡欣之類或從心或從欠多通用旅程愧淹留徂嵗嗟荏苒平生每多感柔翰遇頻染展轉嶺猿鳴曙燈青睒睒音陜燈方作光睒睒或作燄燄今按曉光不青作燈是也岳陽樓别竇司直竇庠時以武昌幕權岳州洞庭九州間厥大誰與讓南匯羣崖水匯或作維北注何奔放瀦為七百里吞納各殊狀自古澄不清環混無歸向炎風日搜攪幽怪多冗長音仗選陸機曰故無取乎冗長軒然大波起宇宙隘而妨音訪妨礙也玉篇云害也一作放巍峩㧞嵩華騰踔較徤壯踔或作躍方云選吴都賦騰踔飛超聲音一何宏轟輵車萬兩輵諸本作􅮣或作掲方定作輵云丘葛切車聲也揚雄羽獵賦所謂皇車幽輵足也杭蜀本作渇盧仝月蝕詩亦有推蕩轟渇不知唐人何以訛輵為渇也今本多作磕砰磅轟磕上林賦語磕與輵音義一也猶疑帝軒轅張樂就空曠蛟螭音摛無角如龍而黄露筍簴縞練吹組帳組或作祖組今按鮑昭詩帳揚春風鬼神非人世節奏頗跌陽上徒結切下徒浪切放逸也陽施見誇麗隂閉感悽愴感或作咸朝過冝春口袁州唐曰宜春郡極北缺堤障過或作廻北方作地夜䌫巴陵洲岳州唐曰巴陵郡叢芮而鋭切草生皃纔可傍蒲浪切近也星河盡涵泳俯仰迷下上餘瀾怒不已喧聒鳴甕盎明登岳陽樓輝煥朝日亮飛亷風伯戢其威清晏息纎纊音曠纎纊細綿也息或作自方云按海賦輕塵不飛纎羅不動息字為勝泓烏宏切水深澄湛凝緑物影巧相况江豚時出戲説文江豚一名鱄䱐欲風則踊驚波忽蕩瀁波或作没時當冬之孟隙竅縮寒漲前臨指近岸側坐眇難望滌濯神魂醒幽懐舒以暢主人孩童舊孩童一作童孩握手乍忻悵憐我竄逐歸相見得無恙音様病也李陵曰霍與上官無恙乎開筵交履舄韓曰史滑稽傳履舄交錯盃盤狼籍爛漫倒家釀音讓劉曰見何次道飲酒使人欲傾家釀盃行無留停或作停留髙柱補注琴柱送清唱中盤進橙栗投擲傾脯􅀢歡窮悲心生婉孌不能忘音望念昔始讀書志欲干覇王于放切二屠龍莊子朱萍漫學屠龍於支離益殚千金之家三年技成而無所用其巧破千金為藝亦云亢孫曰髙也愛才不擇行觸事得讒謗前年出官由或作日以前巻上䟽豈其由之語推之作由者是但恐此與彼語意不同則只作日亦通此禍最無妄公卿採虛名擢拜識天仗姦猜畏彈射食亦切公時為御史為王叔文之黨所排逐斥逐恣欺誑新恩移府庭移或作趨逼側潘岳曰駢闐偪側又子虛賦云偪側秘節厠閒也諸將于嗟苦駑緩但懼失冝當追思南渡時魚腹甘所葬嚴程廹風㠶劈箭上音僻又轉麥切説文劈破也入髙浪顚沈在須㬰忠鯁誰復諒生還真可喜剋已自懲創剋或作刻庶從今日後粗識得與喪事多改前好趣有獲新尚誓耕十畝田不取萬乘相細君知蠶織稚子已能餉行當掛其冠生死君一訪送文暢師北遊昔在四門館晨有僧來謁補注聞見録云歐陽公於詩主退之不主子美劉仲原父毎不然之公曰子美老夫清晨梳白頭𤣥都道士來相訪有俗氣退之决不道也仲原父曰亦退之昔在四門館晨有僧乘謁句之類耳公賞其辨自言本吴人少小學城闕已窮佛根源粗識事輗五雞切軏五骨切車轅端曲木攣拘漢鄒陽書能越攣拘之語潘安仁賦陋吾人之拘攣屈吾真或作身戒轄胡轄切車軸頭鐡左氏申車脂轄詩云載脂載轄思逺發薦紳秉筆徒聲譽耀前閥音罰閥閲家世也後漢聲榮光耀於門閥從求送行詩求或作來屢造忍顚蹶今成十餘巻浩汗羅斧鉞先生公自謂閟窮巷未得窺剞劂上居綺切下音厥祝曰刻鏤刀也淮南子剞劂無跡人巧之妙楚辭握剞厥而不用揚雄甘泉賦般僅弃其剞厥或云剞作欹字見傅毅琴賦當考又聞識大道何路補剠刖剠與黥同莊子庸詎知造物者不息我剠而補我劓韓曰公詩意謂文暢既祝髪為僧欲補其剠刖而反之初庸可得乎出其囊中文滿聽實清越謂僧當少安草序頗排訐上論古之初所以施賞罰下開迷惑胸窙豁斸株橜音掘株橜木根列子吾處若橜株抅注橜株抅斷木也言序所以排訐釋氏而告以聖人之道者如以刃而斸株橜也方云何遜詩窙豁下岩呀窙音孝氣上烝也校本一用西京賦作孝豁恐非篇今按一本作􅂒豁注云開逹貌西京賦李善無注而韵以為宫鮸貌祝氏音義作􅂒豁開逹貌潘岳登虎牢賦幽谷豁以窙寥今亦未詳孰是且從方氏作窙僧時不聽瑩莊子是黄帝之所聽瑩也䟽聴瑩疑惑貌不聽瑩也則無所疑矣此所以若飲水救渇若飲水救暍音謁傷暑也或作渇方云公詩用今韻者未嘗逾韻此詩三十三韻不應獨旁取此一韵今按方說不知何以見此詩用今韻當考風塵一出門時日多如髮三年竄荒嶺守縣坐深樾音曰兩木交隂之下曰樾徴租聚異物或作物異非是詭製怛巾韈製或作制怛或作恒方云怛驚也幽窮共誰語共或作與思想甚含噦于月切逆氣禮記噦噫昨來得京官照壁喜見蝎音歇韓曰江南舊無蝎樊曰蘇内翰謫黄州五年離泗州北行岸上聞騾䭾聲欣然曰不聞此聲久矣退之照壁喜見蝎不虛語也况逢舊親識或作識知親或作相無不比鶼音兼爾雅曰南方有比翼鳥不比不飛其名謂之鶼公竄逐新歸見蝎猶喜况相識乎無不比之鶼蟨矣蟨音厥見後岠虛注長安多門戸弔慶少休歇而能勤來過重惠安可掲孫曰舉也重惠或作惠重方云毌丘儉詩憂貴重山岳誰能為我擔與此義同當今聖政初恩澤完䎀狘上許出切下許月切祝曰飛走貌記鳯以為畜故鳥不獝麟以為畜故獸不狘完或作寛胡為不自暇飄戾逐鸇鷢其月切似鷹尾上白善捕䑕僕射領北門威徳壓胡羯音訐胡種相公鎮幽都竹帛爛勲伐酒場舞閨姝獵騎圍邊月韓曰李恢秋月詞云邊月破鏡飛開張篋中寶自可得津筏音伐海中浮從兹富裘馬寜復茹藜蕨音厥余期報恩後謝病老耕垡音伐孫曰耕起土謂之垡祝曰與撥同國語王耕一撥庇身指蓬茅逞志縱獫方檢切犬長喙猲許竭切祝曰短喙犬曰猲出爾雅詩曰載獫猲獢僧還相訪來山藥煑可掘答張徹筆墨閒録劉澗云答張徹一詩尤竒麗辱贈不知報我歌爾其聆首敘始識面次言後分形道途緜萬里日月垂十齡浚郊浚音峻孫曰貞元十五年宣武軍亂殺留後陸長源避兵亂睢岸是嵗公至彭城節度使張建封居之於睢水上連門停諸本作亭閤本作停而方從諸本又按停猶居也上對亂字宜用停字乃的後有洞庭字或未必重押也肝膽一古劔波濤兩浮萍漬墨竄舊史磨丹注前經義苑手祕寶文堂耳驚霆暄晨躡露舄暑夕眠風櫺結友子讓抗請師我慙丁初味猶噉與啖同祝曰顧愷之啖蔗從尾至本云漸入佳境蔗遂通斯建瓴上紀偃切下音零見漢髙紀注瓴盛水瓶也居髙屋之上建瓴水言其易也捜竒日有富嗜善心無寜石梁平侹侹音挺説文長貌沙水光泠冷乘枯摘野豔沈細抽潜腥遊寺去陟巘陟或作登尋徑返穿汀徑或作巫非是縁雲竹竦竦失路麻㝠㝠滛潦忽翻野平蕪眇開溟防泄塹夜塞懼衝城晝扃及去事戎轡相逢宴軍伶孫曰伶樂官軍伶軍中樂觥秋縱兀兀獵旦馳䮐䮐古螢切祝曰馬腹幹肥張旦或作晏從賦孫曰謂徹赴舉試也漢書以臣錯充賦始分手朝京忽同舲音零舡有忩牖樊曰是年以徐州從事朝正京師與徹同行急時促暗棹戀月留虛亭畢事駈傳馬安居守忩螢梅花灞水别宫燭驪山醒驪力馳切韓曰杜詩軍吏囘宫燭筆墨間録曰劉澗云酒醒極有風味省選逮投足鄉賔尚摧翎音零鳥羽樊曰二句謂徹下第也塵祛又一摻所咸切詩曰摻執子之手兮孫曰摻􅅂執􅃑而别也淚眥音漬目際也列子拂眥揚眉而望之還雙熒洛邑得休告華山窮絶陘音形連山中絶倚岩睨海浪引袖拂天星日駕此迴轄金神所司刑泉紳拖脩白石劔攅髙青磴都鄧切岩磴選石磴㵼紅泉蘚澾音闥孫云澾滑也拳跼音局韓曰踡跼楚辭云踡跼顧而不行梯飈卑遥切風也韓曰楚詞忽飈騰兮浮雲颭伶俜普丁切補註伶俜行不正選少伶俜而偏孤悔狂已咋音責囓也指垂誡仍鐫銘峨豸宅買切祝曰獬豸獸似牛而一角知曲直善觸御史冠用之忝備列伏蒲孫曰元帝欲廢太子史丹伏青蒲上泣涕諌帝愧分涇孫曰分别涇渭以明清濁㣲誠慕横草孫曰漢終軍云軍無横草之功横於草野謂戰也𤨏力繀撞筳音廷孫曰東方朔傳以管窺天以蠡測海以筳撞鐘從草恐未是諸本筳從草方云當從竹繀絲筦也見東方朔客難疊雪走商嶺飛波航洞庭下險疑墮井守官類拘囹音令圄也官或作宫荒餐茹獠音老祝曰夷别名孫曰獠南夷蠱蟲毒自峩豸下皆言自監察御史貶陽山時事蠱幽夢感湘靈刺史肅蓍蔡孫曰言刺史為人所信肅如蓍蔡蔡大龜也吏人沸蝗螟音㝠㸃綴簿上字趨蹌閤前鈴補註羊祜出鎮南夏鈴閣之下侍衛不過十數人頼其飽山水得以娱瞻聽紫樹雕斐斖音尾祝曰文色皃選彫雲斐尾以翼檽彤作雜碧流滴瓏玲映波鋪逺錦挿地列長屏愁􅎜余救切祝曰􅎜形以猿酸骨死或作怨怪花醉魂馨潜苞絳實圻幽乳翠毛零乳或作孔赦行五百里月變三十蓂音㝠孫曰世紀堯時有草夾階而生於庭隨月凋榮毎月朔日生一莢至望則落一莢月小則餘一莢漸階羣振鷺入學誨螟蛉音苓桑上青蟲也揚子以喻七十子肖仲尼元和六年公自江陵法曹召為國子博士故云苹甘謝鳴鹿罍滿慙罄缾冏冏抱瑚璉飛飛聮鶺鴒魚鬛欲脱背孫曰言將化為龍虬光或云劍也先照硎光先或作精光豈獨出醜類方當動朝廷勤來得晤語勿憚宿寒㕔薦士薦東野於鄭餘慶也東野貞元十一年為漂陽尉時鄭餘慶尹河南公作是詩薦之周詩三百篇雅麗理訓誥雅麗或作麗雅理或作埋誤今按二字皆未安恐必有曽經聖人手議論安敢到五言出漢時蘇李韓曰選李陵與蘇武詩注云五言詩自陵始也首更號東都漸瀰漫大皃𣲖别百川導孫曰謂風雅之體如百川之分也建安能者七孫曰建安漢獻帝年號典論曰今之文人孔融陳琳王粲徐幹阮瑀應瑒劉楨斯七子者於學無所遺於詞無所假卓犖變風操孫曰風謂風雅操琴操之類亦詩也逶迤扺晉宋氣象日凋耗中間數鮑謝孫曰謝靈運謝眺或曰二謝通稱鮑昭字明逺謝眺字𤣥暉季觀評孟郊詩云平處下顧二謝比近最清奥齊梁及陳隋衆作等蟬噪捜春摘花卉㳂襲傷剽强掠也盜國朝盛文章子昻補注薦士詩與送東野序盛言子昻李杜餘皆不在其列始髙蹈勃興得李杜萬類困陵暴後來相繼生亦各臻閫奥或作􅀈方云舊本作奥今本以重韻誤刻也班固傳究先聖之閫奥有窮者孟郊受材實雄驁音傲敖也㝠觀洞古今象外逐幽好横空盤硬語横空或作縱横妥帖力排奡孫曰論語奡盪舟言多力能陸地行舟補注臨川云吟詩各有所得清水出芙蓉天然去彫飾此李白所得也或看翡翠蘭苕上未掣鯨鯢碧海中此杜甫所得也横空盤硬語妥帖力排奡此韓愈所得也敷柔肆紆餘屈曲貌古詩曰山澤泉紆餘奮猛巻海潦榮華肖天秀捷疾逾響報捷或作徤逾或作愈行身踐規矩甘辱耻媚竈孟軻分邪正眸子看瞭眊杳然粹而清或作精可以鎮浮躁酸寒溧音栗宣州陽尉五十幾何耄孜孜營甘㫖辛苦久所冐俗流知者誰指注競嘲慠聖皇索遺逸髦士日登造廟堂有賢相鄭餘慶也愛遇均覆燾况承歸與張郊嘗為歸登張建封所知二公迭嗟悼青㝠送吹噓强箭射魯縞音槁韓曰漢韓安國傳强努之末力不能穿魯縞孫曰縞素也曲阜之俗善作之尤為輕故曰魯縞胡為久無成使以歸期告霜風破佳菊嘉節廹吹㡌念將决焉去感物増戀嫪盧到切集注恡物也聲類云姻嫪戀惜也説文云固也彼㣲水中荇尚煩左右芼音冐擇也魯侯國至小廟鼎猶納郜幸當擇珉玉石次玉也寜有棄珪瑁音冒孫曰周禮天子執瑁悠悠我之思擾擾風中纛音導補注楚王曰寡人之心摇摇然如懸旌詩意取此纛以犂牛尾為之懸於左騑選黄屋左纛上言愧無路日夜惟心禱鶴翎不天生變化在啄菢薄報切鳥伏卵謂之菢通波非難圖尺地易可漕善善不汲汲後時徒悔懊於到切恨也晉史門生驚懊者累日救死具八珍韓曰禮記内則八珍謂淳母炮豚性䍧㹗珍漬􅆈肝膋也不如一簞音單楚與晉戰或人餽王一簞酒王傾酒於水上與軍士共飲犒不或作無㣲詩公勿誚㣲或作数愷悌神所勞即到切喜侯喜至贈張籍張徹韓曰公初謫陽山令元和改元自江陵椽召國子博士其從遊如喜如籍如徹皆㑹都下詩以是作昔我在南時數君長在念揺揺不可止諷詠日喁噞上音顒下音驗孫曰魚口動也韓曰張衡曰喁噞浮沈如以膏濯衣毎漬垢逾染又如心中疾箴石非所砭波驗切孫曰説文以石刺病常思得遊處至死無倦厭無或作不地遐物竒怪水鏡孫曰水鏡一名蜮陸機䟽云一名射影江淮水皆有之人在岸上影見水中投人影則殺之涵石劒荒花窮漫亂幽獸工騰閃礙日不忍窺忽忽坐昬墊音店弱也逢神多所祝豈忘靈即騐依依夢歸路歴歴想行店今者誠自幸所懐無一欠孟生去雖索孫曰離也侯氏來還歉説已見上欹眠聽新詩屋角月豔豔眠或作枕月或作日雜作承閒聘雜方作新按上句已云聽新詩不應此句便重出新字當作雜雜作承間聘盖謂間出它文也交驚舌㸦舚他念切樊曰説文吐舌兒交或作文㸦或作牙皆誤㸦俗互字也繽紛指瑕疵拒捍阻城塹阻城方作城阻非是以余經摧挫固請發鉛槧七艷切韓曰王充論衡斷木為槧西京雜記揚子雲好事常懐鈆提槧從諸計吏訪殊方絶域之語鉛墨槧牘也居然妄推讓見謂爇天燄天或作黔非是比踈語徒妍悚息不敢占呼奴具盤飱或作餐飣餖上丁定切下音豆貯食也魚菜贍人生但如此朱紫安足僣古風樊曰安史之後方鎮相望于内地大者連州十餘小者不下三四兵驕則逐帥帥强則叛上不廷不貢往往而是故托古風以寓意觀詩意當在徳宗之世與􅇏火相為表裏云今日曷不樂幸時不用兵無曰既蹙矣乃尚可以生曰或作曰以或作勞非是彼州之賦去汝不顧此州之役去我奚適去我方作我去奚或作爰皆非是一邑之水可走而違天下湯湯曷其而歸好我衣服甘我飲食無念百年聊樂一日駑驥洪曰唐本有贈歐陽詹字或作駑驥吟吟示歐陽詹詹集有答韓十八駑驥駑駘誠齷齪上音渥下音擉或作􅐅選小人自齷齪市者何其稠力小苦易制價㣲良易酬苦或作良良或作誠渇飲一斗水飢食一束芻嘶鳴當大路志氣若有餘騏驥生絶域自矜無匹儔牽驅入市門行者不為留借問價幾何黄金比嵩丘老杜驄馬行朝來夕試華軒下未覺千金滿髙價借問行幾何咫尺視九州飢食玉山禾渇飲醴泉流問誰能為御諸本作借問誰能御方從杭蜀本及歐陽詹集如此曠世不可求惟昔穆天子乘之極遐遊王良執其轡造父挾其輈挾諸本作夾此從詹集當今按左傳潁考叔挾輈以走作挾因言天外事韓曰周穆王西極有化人來王敬事之遂肆意遠遊駕八駿之乘主車則造父為馭宿于崑崙之阿赤水之陽别日升崑崙之上以觀黄帝之宫遂賓于西王母孫云天外事即謂崑崙池事非中國所見者也茫惚使人愁茫或作怳或作荒方云詹集作慌古荒與茫通駑駘謂騏驥餓死余爾羞餓或作飢有能必見用有徳必見收孰云時與命通塞皆自由騏驥不敢言低徊但垂頭人皆劣騏驥共以駑駘優喟余獨興歎才命不同謀寄詩同心子為我商聲謳商聲秋聲也記曰愛者冝歌商選詠懐詩素質游商聲悽愴傷我心詩或作言商或作髙馬猒榖此詩及其下出門皆未得志之辭馬猒榖兮士不猒糠籺音纈又胡骨切麄屑為籺士被文繡兮士無裋褐䄈或作短方云前漢貨殖傳實用䄈字董彦逺洪慶善皆嘗辨古無䄈褐字按䄈褐字兩漢如賈誼貢禹貨殖傳班彪劉平張衡傳凡六見無有作短字者班彪王命論短褐之襲漢書作䄈文選則用丁管切是唐儒方兩用之故少陵詩以長纓短褐為對而史記孟嘗君傳與戰國䇿墨子語盖皆傳冩之訛公好古最深當以䄈為正今按戰國策鄰有短褐一作䄈史記士不昭得短褐司馬貞曰短亦音豎班彪王命論短褐之襲韋曰短當為䄈䄈􅃭也字皆正作短注中乃云䄈字豎音又淮南子亦云巫馬期才衣短褐而髙誘無説則亦未必皆傳冩之誤也又栁子厚亦嘗用之則安知韓公之必不然乎今兩存之以俟知者彼其得志兮不我虞一朝失志兮其何如已焉哉嗟嗟乎鄙夫出門長安百萬家出門無所之豈敢尚幽獨與世實參差古人雖已死書上有其辭其或作遺開巻讀且想千載若相期出門各有道我道方未夷且於此中息天命不吾欺命或作誠嗟哉董生行淮水出桐栢山東馳遥遥千里不能休遥遥一作悠悠淝水音肥水名在廬江出其側不能千里百里入淮流百上或無里字夀州屬縣有安豐唐貞元時元下或有年字縣人董生召南隠居行義於其中召或作邵刺史不能薦天子不聞名聲爵禄不及門門外惟有吏日來徴租更索錢方無更字非是嗟哉董生朝出耕夜歸讀古人書盡日不得息或山而樵或水而漁而方並作于非是入㕑具甘㫖上堂問起居父母不慼慼妻子不咨咨方以閣杭蜀本作羞羞云此詩以三嗟哉易韻以羞叶居視古用韻也今按咨字自與居叶方于毛潁傳資字論之矣何獨于此而疑之邪羞羞韻雖可叶然殊無理而可笑方之主此又其酷信三本之誤也或恐本是嗟字叶音子余反而誤作羞字耳然亦不如且作咨字之見成穏當也嗟哉董生孝且慈董召南夀州安豐人公嘗有送董生游河北序且曰董生舉進士嘗不得志于有司而此詩叙其孝且慈如此東坡姚氏三瑞堂詩云君不見董召南隠居行義孝且慈天公亦恐無人知故令鷄狗相哺兒又令韓老為作詩爾來三百年名與淮水肥人不識惟有天翁知方無有字非是生祥下瑞無休期家有狗乳出求食雞來哺其兒啄啄庭中拾蟲蟻哺之不食鳴聲悲傍徨躑躅久不去以翼來覆待狗歸嗟哉董生誰將與儔時之人夫妻相虐兄弟為讎食君之禄而令父母愁亦獨何心嗟哉董生無與儔或作誰將與儔或作誰與儔儔今按上句誰將與儔疑而問之之詞也此云無與答而决之之詞也烽火登髙望烽火誰謂塞塵飛王城富且樂曷不事光輝勿言日已暮相見恐行稀願君熟念此秉燭夜中歸我歌寜自感乃獨淚霑衣汴州亂汴州城門朝不開汴州自大歴後多兵董晋卒軍司馬陸長源總留後事八日而軍亂殺長源等監軍俱文珍宻召宋州刺史劉逸凖使總後務朝廷從之賜名全諒公時已從晋喪出汴四日實貞元十五年二詩盖譏徳宗姑息之政云天狗狀如犬流星有聲其下止地類狗必有破軍殺將之兆墮地聲如雷徤兒爭誇殺留後誇或作誘連屋累棟燒成灰累棟或作累累諸侯咫尺不能救孤士何者自興衰毋從子走者為誰大夫夫人留後兒昨日乘車騎大馬坐者起趨乘者下廟堂不肯用干戈肯或作敢嗚呼奈汝母子何利劒利劔光耿耿佩之使我無邪心故人念我寡徒侣寡或作無徒或作儔持用贈我比知音我心如氷劔如雪不能刺讒夫使我心腐劒鋒折决雲莊子説劍上决浮雲下絶地紀中斷開青天噫劔與我俱變化晉雷煥事歸黄泉齪齪齪齪當世士所憂在飢寒但見賤者悲不聞貴者歎音灘大賢事業異逺抱非俗觀報國心皎㓗念時涕汍瀾妖姫坐左右柔指發哀彈酒肴雖日陳感激寜為歡秋隂欺白日欺方作蔽欺今按作蔽固古語然作尤有味也泥潦不少乾河堤次東郡老弱隨驚湍天意固有屬誰能詰其端属或作謂或作以詰方作語属今按謂以語不若作詰為深切願辱太守薦得充諌諍官諫諍方作爭臣官今按爭臣下更著字語復非是排雲呌閶闔天門也楚詞排閶闔而望予披腹呈琅玕致君豈無術自進誠獨難别本韓文考異巻二欽定四庫全書别本韓文考異巻三宋王伯大重編古詩河之水二首寄子姪老成河之水去悠悠我不如水東流我有孤姪在海陬或作隅方云古音隅五侯切分與流通三年不見兮使我生憂日復日夜復夜三年不見汝使我鬢髮未老而先化河之水悠悠去我不如水東注我有孤姪在海浦三年不見兮使我心苦采蕨于山緡武中切韓曰釣魚繳魚于淵方作泉今按以淵為泉避諱也依例當作􅘢我徂京師不逺其還其或作而山石山石犖确上力角切下音覺磽确也行徑㣲黄昏到寺蝙蝠上布田切下甫服切伏翼也一名仙䑕飛昇堂坐階新雨足或作定非是芭蕉葉大支即梔字子肥僧言古壁佛畵好以火來照所見稀所見或作見所非是鋪牀拂席置羮飯踈糲蘭末切糲麄而粺精列子食則粢糲亦足飽我飢夜深静卧百蟲絶清月出嶺光入扉天明獨去無道路出入髙下窮烟霏山紅澗碧紛爛漫時見松􅇫皆十圍􅇫或作櫟方云選南都賦楓槐櫨􅇫李善曰􅇫與櫟同當流赤足蹋澗石水聲激激風吹衣吹或作生人生如此自可樂或作可自得自可方作自得或作可自皆非是豈必局束為人鞿音饑馬絡也楚詞今雖好修姱以鞿覊兮注韁在口曰覊前漢是猶以鞿而御悍突為人鞿言為人所拘縶也嗟哉吾黨二三子安得至老不更歸天星送楊凝郎中賀正天星牢落雞喔咿上音渥下音伊雞聲也僕夫起餐車載脂脂以滑車正當窮冬寒未巳借問君子行安之㑹朝元正無不至受命上宰須及期侍從近臣有虛位公今此去歸何時或作何時歸汴泗交流贈張僕射建封貞元十五年公在徐州張建封幕汴水徐之西泗水徐之南故以名篇汴泗交流郡城角築場千步平如削築或作斸方云詩九月築場圃謂築堅以為場也短垣三面繚逶迤擊鼓騰騰樹赤旗新秋朝凉未見日秋或作雨公早結束來何為分曹决勝約前定百馬攅在丸切聚也蹄近相映毬驚杖奮合且離紅牛纓紱黄金羈側身轉臂著馬腹霹靂應手神珠馳超遥散漫兩閒暇揮霍奮迅也枚乘曰蜿墠揮霍紛紜争變化發難得巧意氣麤讙聲四合壯士呼此誠習戰非為劇豈若安坐行良圖當今忠臣不可得公馬莫走須殺賊忽忽忽忽乎余未知生之為樂也生之為方作為生之非是願脱去而無因安得長翮大翼如雲生我身乘風振奮出六合絶浮塵死生哀樂兩相棄是非得失付閒人鳴鴈公在徐州與孟東野書有曰去年脱汴州之亂遂來于此主人與余有故居余符離睢水上及秋將辭去云云主人謂張建封公在徐鬱鬱不得志見於書與詩者如此嗷嗷鳴鴈鳴且飛上鳴字或作鴻窮秋南去春北歸去寒就暖識所依或作處非是天長地闊棲息稀風霜酸苦稻梁鴻鴈前輩多使稲梁事盖出戰國䇿廣絶交論云分鴈騖之稲梁又杜甫詩自古稻梁多不足㣲毛羽摧落身不肥毛羽或作羽毛徘徊反顧羣侣違哀鳴欲下洲渚非江南水濶朝雲多朝方作朔矣今按既云江南則不應言朔雲兼作朝雲語亦差響草長沙軟無網羅閑飛静集鳴相和違憂懐惠性匪他惠一作息凌風一舉君謂何龍移此詩謂南山湫也湫初在平地一日風雷移居山上其山下湫遂化為土公題炭谷詩曰厭處平地上巢居挿天山天昏地黑蛟龍移雷驚電激雄雌隨激或作撃方云雷奔電激班固西都賦語雄雌或作雌雄清泉百丈化為土魚鱉枯死吁可悲雉帶箭此詩公佐張僕射于徐從獵而作也讀之其狀如在目前盖冩物之妙者原頭火燒静兀兀野雉畏鷹出復没出復方作伏欲而今按雉出復没射者彎弓不肯輕發正是形容持滿命中之巧毫釐不差處改作伏欲神采索然矣將軍欲以巧伏人盤馬彎弓惜不發地形漸窄觀者多雉驚弓滿勁箭加衝人决起百餘尺紅翎白鏃作木切相傾斜將軍仰笑軍吏賀五色爾雅雉五色皆備曰暈離披馬前墮條山蒼歐本注云中條山在黄河之曲今蒲中也條山蒼河水黄浪波沄沄去浪波或作波浪松栢在山岡山或作高贈鄭兵曹罇酒相逢十載前君為壯夫我少年罇酒相逢十載後我為壯夫君白首我材與世不相當戢鱗委翅無復望當今賢俊皆周行君何為乎亦遑遑亦或作獨盃行到君莫停手破除萬事無過酒桃源圖孫曰武陵郡朗州國朝改為鼎州洪曰淵明叙桃源初無神仙之説梁任安貧為武陵記亦祖述其語耳淵明云先世避秦時亂而安貧云曩以避秦人之亂邑人相率携妻孥隠此厥後絶不外通何人世之多遷貿也後人不深考因謂秦人至晉猶不死遂以為地仙洪駒父云荆公桃源行東坡和桃源詩皆得之王摩詰退之劉夢得諸人以為神仙者非是神仙有無何眇芒或作渺茫桃源之説誠荒唐流水盤廻山百轉生綃數幅垂中堂武陵晉太康中武陵人捕魚從溪行忘路逺近逢桃林夾岸無雜花果云秦人避世于此太守好事者題封逺寄南宫下南宫先生忻得之波濤入筆驅文辭文工畫妙各臻極異境怳惚移於斯架巖鑿谷開宫室接屋連墻千萬日嬴顛劉蹶了不聞地坼天分非所恤種挑處處惟開花川原近逺蒸紅霞近逺或作逺近初來猶自念鄉邑嵗久此地還成家漁舟之子來何所物色相猜更問語大蛇中斷喪前王羣馬南渡開新主聽終辭絶共悽然自説經今六百年當時萬事皆眼見不知幾許猶流傳爭持酒食來相饋禮數不同樽俎異月明伴宿玉堂空骨冷魂清無夢寐夜半金雞啁哳陟鎋切又陟頡切鳴火輪飛出客心驚人間有累不可住依然離别難為情船開棹進一廻顧萬里蒼蒼烟水暮世俗寜知偽與真至今傳者武陵人東方半明韓曰此詩與煌煌東方星興寄頗同盖指順宗即位不能親政而憲宗在東宫之時也樊曰公億昨行所謂伾文未剪崖州熾雖得赦宥常愁猜近者三姦悉破碎羽穴無㡳幽黄能義與此詩同惟此詩曰東方半明所以㣲其詞如此盖風人之託物也東方半明大星没半或作未方以閤本云洪慶善曰舊本作半明今蜀本題語亦作半明既云大星没則不應未明也傳本多習於詩人成語而不攷其意義故也獨有太白配殘月嗟爾殘月勿相疑同光共影須㬰期殘月暉暉太白睒睒音挾太元經明復睒天中獨爛也或作睒睒方云字當从日雞三號音毫杜詩曰初鳴度必三更五㸃贈唐衢集註衢從退之遊舊史附公傳末新史削之舊史云衢應進士久而不第能為歌詩意多感激見人文章有所傷激讀訖必哭涕泗不能巳毎與人言論既别發聲一號音辭悲切聞者莫不涕下故世稱唐衢善哭白樂天亦甞贈以詩略云賈誼哭時事阮籍哭路岐唐生今亦哭異代同其悲虎有爪兮牛有角虎可搏兮牛可觸奈何君獨抱竒材手把鋤犂餓空谷當今天子急賢良匭函孫曰唐武后垂拱二年命銅為匭置之廟堂東曰延恩南曰招諫西曰伸寃北曰通𤣥朝出開明光漢殿名也胡不上書自薦達坐令四海如虞唐貞女峽連州桂陽縣江盤峽束春湍豪雷風戰闘魚龍逃懸流轟轟射水府一㵼百里翻雲濤漂船擺補買切間也石萬瓦裂咫尺性命輕鴻毛鴻或作於或作如贈侯喜吾黨侯生字叔􅙝或作起方云起之古文也呼我持竿釣温水洛水在河南易乾鑿度曰王者有盛徳之應則洛水先温故號温洛平明鞭馬出都門盡日行行荆棘裏温水㣲茫絶又流深如車轍闊容輈蝦蟇跳過雀兒浴此縱有魚何足求我為侯生不能已盤針擘粒投泥滓晡時堅坐到黄昏到或作至手倦目勞方一起暫動還休未可期蝦行蛭音質水蛭也賈誼曰夫豈從蝦與蛭螾渡似皆疑舉竿引線忽有得一寸纔分鱗與鬐音頎莊子曰驚揚而奮鬐或作鰭今按鬐馬鬛也當作鰭然莊子作鬐則亦可通用也是日侯生與韓子良久歎息相看悲我今行事盡如此此事正好為吾規半世遑遑就舉選一名始得紅顔衰始或作已非是人間事勢豈不見徒自辛苦終何為便當提㩗妻與子南入箕潁箕山名潁水名許由巢父隠處無還時叔􅙝君今氣方鋭我言至切君勿嗤君欲釣魚須逺去大魚豈肯居沮洳上音疽下音茹漸濕地肯或作有非是古意韓曰華山記云山頂有池生千葉蓮花服之羽化因曰華山觀公詩意與前詩皆有興寄其曰古意㫖深逺矣而孫氏引李肇國史補言愈好竒登華山絶峯發狂慟哭沈顔作登華㫖畧曰仲尼悲麟悲不在麟也墨翟泣絲泣不在絲也又引公答張徹詩云洛邑得休告華山窮絶陘以實國史補之云質之校本乃大不然姑存之太華胡化切峯頭玉井蓮開花十丈藕如船冷比雪霜甘比蜜一片入口沈痾痊我欲求之不憚逺青壁無路難夤縁方从唐本作五月壁路難攀縁云鮑溶集有陪公登華山詩盖五月也夤或作攀今按公此詩本以古意名篇非登山紀事之詩也且太華之險千古屹立所謂削成五千仞者豈獨五月然後難攀縁哉若以句法言之則五月壁路之與青壁無路意象工拙又大不侔亦不待識者而知其得失矣方氏泥于古本牽于旁証而不尋其文理乃去此而取彼其亦誤矣原其所以盖縁五月本是青字唐本誤分為二而讀者不曉因復削去無字遂成此謬今以諸本為正安得長梯上摘實下種七澤司馬相如子虛賦楚有七澤其小者名雲夢方九百里根株連列
