body:
  text: 送汴州監軍俱文珍序并詩韓曰董晉為宣武軍節度使俱文珍為監軍公為觀察推官文珍將如京師作序詩而送之樊曰此序不入正集李漢以文珍故為公諱耶今之天下之鎮陳留為大屯兵十萬連地四州左淮右河抱負齊楚濁流浩浩舟車所同故自天寶已來當藩垣屏翰之任有弓矢鈇鉞之權皆國之元臣天子所左右屏翰方作翰屏其監統中貴必材雄德茂榮耀寵光能俯達人情仰喻天意者然後為之故我監軍俱公輟侍從之榮受腹心之寄奮其武毅張我皇威遇變出奇先事獨運偃息談笑危疑以平天子無東顧之憂方伯有同和之美危疑方作疑危十三年春將如京師相國隴西公飲餞於青門之外謂功德皆可歌之也於或作于或無青字命其屬咸作詩以頌繹之詩曰奉使羌池靜臨戎汴水安或作閒非是沖天鵬翅闊報國劍鋩寒曉日驅征騎春風詠采蘭孫曰東晢補亡詩曰循彼南陔言采其蘭采蘭以養親也誰言臣子道忠孝兩全難送浮屠令縱西遊序方無浮屠字縱下有上人二字其行異其情同君子與其進可也方無進字非是令縱釋氏之秀者又善為文又上或有而字浮遊徜徉跡接天下藩維大臣文武豪士令縱未始不褰衣而負業往造其門下衣或作裳其有尊行美德建功樹業令縱從而為之歌頌典而不諛麗而不淫其有中古之遺風與樹或作植有中或作中有古下或有人字風下或有可字乗閒致密促席接膝譏評文章商較人士浩浩乎不窮愔愔乎深而有歸或無乗閒致密四字而有及字人士或作士人或作人事於是乎吾忘令縱之為釋氏之子也其來也雲凝其去也風休方懽而已辭雖義而不求吾於令縱不知其不可也盍賦詩以道其行與路鵠秀才序方云送路鵠贈别二序語意無倫脱誤不可讀如曰自河南令為博士於公所歴官次亦不合故併闕之今從其説刪去贈别序説已見上送毛仙翁十八兄序方云直諫表論顧威狀之蠡外集者翁序皆最未見決非公文表狀亦不録足以知其果偽也今並從方本刪去别本韓文考異外集巻三欽定四庫全書别本韓文考異外集巻四宋王伯大重編通解洪曰通解釋
