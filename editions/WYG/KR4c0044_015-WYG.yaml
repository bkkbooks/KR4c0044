body:
  text: 與孟東野書東野或作郊與足下别久矣以吾心之思足下知足下懸懸於吾也以吾或作以余方从閣蜀本云除下文江湖予樂也一語餘並作吾各以事牽不可合并其於人人非足下之為見而日與之處足下知吾心樂否也其於人人或無下人字説見前巻答張籍書或作他人非是方無此四字之處方作人處吾言之而聽者誰歟吾唱之而和者誰歟言無聽也唱無和也獨行而無徒也是非無所與同也足下知吾心樂否也無聽無和上或並有之而字行下方無而字與同方作以同説巳見前足下才髙氣清行古道處今世無田而衣食事親左右無違足下之用心勤矣足下之處身勞且苦矣混混與世相濁獨其心追古人而從之從之方作從今之人云謝以貞元本是今按上語與世相濁即是從今之人更著二字則贅而不詞矣舊書之不足據有如此者故特詳著其語云足下之道其使吾悲也使上方無其字去年春脱汴州之亂幸不死無所於歸遂来于此於或作與方作以今按送楊少尹序亦有此語主人與吾有故主人謂張建封也哀其窮居吾于符離睢上及秋将辭去因被留以職事是年秋建封辟公為幕職黙黙在此行一年矣到今年秋聊復辭去江湖余樂也與足下終幸矣李習之娶吾亡兄之女習之翺也公亡兄即禮部郎中雲卿之子弇也期在後月朝夕當来此張籍在和州居喪家甚貧恐足下不知故具此白冀足下一来相視也自彼至此雖逺要皆舟行可至速圖之吾之望也春且盡時氣向熱盡時或作時盡向作日惟侍奉吉慶愈眼疾比劇甚無聊不復一一愈再拜答竇秀才書竇下或有存亮字公時以言事黜為山陽令貞元二十年作愈白愈少駑怯於他藝能自度無可努力又不通時事而與世多齟齬上牀吕切又壯所切下音語念終無以樹立遂發憤篤専於文學學不得其術不得上一有而字凡所辛苦而僅有之者皆符於空言而不適於實用又重以自廢是故學成而道益窮年老而智愈困按智或作身今又以罪黜於朝廷逺宰蠻縣貞元十有九年公以言事出為山陽令故云逺宰蠻縣愁憂無聊瘴癘侵加喘喘焉無以冀朝夕足下年少才俊辭雅而氣鋭雅或作清當朝廷求賢如不及之時當道者又皆良有司操數寸之管書盈尺之紙髙可以釣爵位循次而進亦不失萬一於甲科書方作盡循上或有若字或無萬一二字今乃乘不測之舟入無人之地以相從問文章為事舟或作川身勤而事左辭重而請約非計之得也左或作尤非是雖使古之君子積道藏徳遁其光而不曜膠其口而不傳者遇足下之請懇懇猶将倒廩傾囷羅列而進也其光二字方作世曜或作耀請或作情囷一作箘云若愈之愚不肖又安敢有愛於左右哉顧足下之能足以自奮愈之所有如前所陳是以臨事愧恥而不敢答也錢財不足以賄左右之匱急文章不足以發足下之事業章不足或作章不可稛若隕切國語曰稛載而歸稛絭束也一作管子小正篇諸侯之使垂槖而入稛載而歸載而往垂槖而歸足下亮之而已愈白上李尚書書李下或有實字月日将仕郎前守四門博士韓愈謹載拜奉書尚書大尹閣下載或作再古字通用或無尚書二字愈来京師於今十五年所見公卿大臣不可勝數皆能守官奉職無過失而已未見有赤心事上憂國如家如閣下者或無如家二字今年已来不雨者百有餘日種不入土野無青草而盜賊不敢起穀價不敢貴百坊百二十司六軍二十四縣之人皆若閣下親臨其家老姦宿贓銷縮摧沮魂亡魄喪影滅跡絶非閣下條理鎮服宣布天子威徳其何能及此愈也少從事於文學見有忠於君孝於親者雖在千百年之前猶敬而慕之况親逢閣下得不候於左右以求效其懇懇謹獻所為文兩巻凡十五篇謹或作請非敢以為文也以為謁見之資也進退惟命愈恐懼再拜賀徐州張僕射白兔狀或注建封字狀或作書云伏聞今月五日營田巡官陳從政獻瑞兔毛質皦白天馴其心皦或作全或作皎其始實得之符離安阜屯安阜方屯名如唐孟元揚董作西華屯是也今按下云得之軍田則此屯字乃屯田之屯也屯之役夫朝行遇之迫之弗逸人立而拱屯或作田弗或作不竊惟休咎之兆天所以啓覺于下依類託喻事之纎悉不可圖驗非睿智博通孰克究明愈雖不敏請試辨之或無愈雖不敏一語兎隂類也又窟居狡而伏逆象也今白其色絶其羣也馴其心化我徳也人立而拱非禽獸之事革而從人且服罪也得之符離符離實戎國名又附麗也戎方從閤杭本作我名下注絶句二字麗或作离今按實我國名不成文理漢書衛青傳討涌泥破符離晋均曰二王號也所謂戎國從或取此不在農夫之田而在軍田武徳行也不戰而来之之道也有安阜之嘉名焉道下方無也字安阜或作革附或作安附嘉方作喜又無名字皆非是伏惟閣下股肱帝室藩垣天下方無閣下字四方其有逆亂之臣未血斧鑕之屬畏威崩析歸我乎哉其事兆矣諸本多如此嘉祐杭本亦然方本之屬作其屬屬下句析作折云漢終軍傳野獸井角明同本也衆支内時示無外也殆将有解編髮前左衽而䝉化者又王夢謂論今南師獲白虎偃武興文之應也獲之者張武張而猛也公言盖祖此今按嘉祐諸本之析二字文理分明方氏但據蜀本而不復著諸本之同異其所定又皆誤盖其屬師我事小不足言不若逆亂之臣歸我之為大而可願也崩析亦不成文若用論語分崩離析之語則當從木若用史記折而入於魏之語則當從手二義皆通然既有崩字則似本用論語中字也是宜具跡表聞以承答天意小子不惠猥以文句微識䝉念或無不惠二字念方從文苑作合全無文理云睹兹盛美焉敢避不讓之責而黙黙耶方从杭蜀苑作黙貨也亦不成文理愈再拜上兵部李侍郎書蜀本注巽字或作異非是十二月九日将仕郎守江陵府法曹參軍韓愈謹上書侍郎閣下愈少鄙鈍於時事都不通曉家貧不足以自活應舉覔官凡二十年矣薄命不幸動遭讒謗進寸退尺卒無所成性本好文學好或作喜因困厄悲愁無所告語遂得究窮於經傳史記百家之説沈潛乎訓義反復乎句讀礱磨乎事業而奮發乎文章凡自唐虞已来編簡所存大之為河海髙之為山嶽文苑作泰山與上下句不類非是方从三本云明之為日月幽之為鬼神纎之為珠璣華實變之為雷霆風雨竒辭奥㫖靡不通達惟是鄙鈍不通曉於時事學成而道益窮年髙而智益困智或作身私自憐悼悔其初心髮秃齒豁不見知已夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難為聽而識之者難遇也難為屬上句為或作其則屬下句云伏以閣下内仁而外義行髙而徳鉅尚賢而與能哀窮而悼屈方本仁下賢下無而字今按此上下四句本或皆有而字者為正或皆無之或上二句無而下二句有者亦通而方本必於其第一第三句去之使其參差䶜齬而不可讀以為古則不淳以為今則不響不識其何意也自江而西既化而行矣今者入守内職為朝廷大臣當天子新即位汲汲於理化之日出言舉事宜必施設宜或作計既有聽之之明又有振之之力寗戚之歌鬷子紅切鬷明鄭大夫明之言不發於左右則後而失其時矣謹獻舊文一巻扶樹教道有所明白南行詩一巻舒憂娛悲雜以瓌怪之言時俗之好所以諷於口而聽於耳也如賜覽觀亦有可采干黷嚴尊伏増惶恐愈再拜答尉遲生書下或注汾字愈白尉遲生足下或無愈白二字夫所謂文者必有諸其中是故君子慎其實實之美惡其發也不揜本深而末茂形大而聲宏行峻而言厲心醇而氣和昭晰者無疑優游者有餘體不備不可以為成人辭不足不可以為成文愈之所聞者如是有問於愈者亦以是對今吾子所為皆善矣謙謙然若不足而以徴於愈愈又敢有愛於言乎抑所能言者皆古之道古之道不足以取於今吾子何其愛之異也或無復出古之道三字賢公卿大夫在上比肩始進之賢士在下比肩彼其得之必有以取之也也上方無之字子欲仕乎其往問焉皆可學也若獨有愛於是而非仕之謂則愈也嘗學之矣請繼今以言答楊子書方云此書答楊敬之凌之子也所謂逺其兄甚者謂誨之憑之子栁子厚所為説車者也辱書并示表記述書辭等五篇比於東都略見顔色未得接言語心固已相竒但不敢果於貌定果於或作果以知人堯舜所難又嘗服宰予之誡故未敢決然決亦不敢忽然忘也舜方作帝到城已来不多與人還往朋友之中所敬信者平昌孟東野東野吃吃説足下不離口崔大敦詩不多見毎毎説人物亦以足下為處子之秀近又得李七翺書亦云足下之文逺其兄甚李下或無七字甚下或有矣字夫以平昌之賢其言一人固足信矣况又崔與李繼至而交説邪故不待相見相信已熟既相見不要約已相親審知足下之才充其容也今辱書乃云云是所謂以黄金注重外而内惑也然恐足下少年與僕老者不相類尚須驗以言故具白所以而今而後不置疑於其間可也所以下或復有以字非是間上方無其字若曰長育人才則有天子之大臣在若僕者守一官且不足以修理况如是重任邪學問有暇幸時見臨愈白至鄧州北寄上襄陽于相公書或注頔或音迪伏䝉示文武順聖樂辭唐徳宗以後方鎮多製樂舞以獻頔獻順聖樂曲其曲将半行綴皆伏一人舞于中又令女妓為佾舞雄健壯妙號文武順聖樂天保樂詩讀蔡琰胡笳辭詩後漢蔡琰字文姬中郎将邕之女興平中没于南匈奴十二年移族從并與京兆書保或作寳移族從以下八字方从閣杭本如此云頔世雄朔易時移羣從古數為京兆人以書修敬於京兆尹李實劉夢得集有代李尹答書可考諸本或以從并為徙并非也今按劉集代實答頔第二書也其曰移族從者頔與京兆書外别有移羣從書移非移居之移乃移文之移盖始去其舊鄉故移書以曉其宗族羣從也自幕府至鄧之北境凡五百餘里自庚子至甲辰凡五日庚上或無自字手披目視口詠其言心惟其義且恐且懼忽若有亡不知鞍馬之勤道途之逺也夫澗谷之水深不過咫尺丘垤之山髙不能踰尋丈人則狎而翫之人則方作則人或無則字及至臨泰山之懸崖窺巨海之驚瀾莫不戰掉悼慄眩惑而自失悼或作悸或作惶或作憚方云説文悼懼也陳楚謂懼曰悼陸士衡表五情震悼所觀變於前所守易於内亦其理宜也閣下負超卓之竒材蓄雄剛之俊徳渾然天成無有畔岸而又貴窮乎公相威動乎區極區或作樞天子之毗諸侯之師故其文章言語與事相侔憚赫若雷霆浩汗若河漢正聲諧韶濩勁氣沮金石憚赫或作變化方云閤蜀録粹皆作憚赫字小訛也憚丹未切與怛同荘子聲侔鬼神憚赫千里豐而不餘一言約而不失一辭其事信其理切孔子之言曰有徳者必有言信乎其有徳且有言也或無之言字楊子雲曰商書灝灝爾周書噩噩爾信乎其能灝灝而且噩噩也雲下或有言字昔者齊君行而失道管子請釋老馬管仲隰朋從威公伐孤竹迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道見韓子而隨之隨上方無而字樊遲請學稼孔子使問之老農夫馬之智不賢於夷吾農之能不聖於尼父然且云爾者聖賢之能多農馬之知専故也然下或有則字非是今愈雖愚且賤其從事於文實専且久則其贊王公之能而稱大君子之美不為僭越也伏惟詳察愈恐懼再拜為分司郎官上鄭尚書相公啓愈啓伏䝉仁恩猥賜示問猥或作俯方無今按言猥若俯者事上之禮無者非是感戴戰悚若無所容措悚或作猥然尚有厥誠須盡露於左右者敢避其煩黷懷不滿之意於受恩之地哉方無厥誠字黷或作瀆字通用方作黙則訛矣又連下句讀之其誤益甚愈幸甚三得為屬吏朝夕不離門下出入五年方從杭蜀本無入字今按出入漢人語多有之公作襄陽盧承志亦云出入十年方誤矣竊自計較受與報不宜在門下諸從事後較或作惟故事有當言未嘗敢不言有不便於已輒吐私情閣下所宜憐也方从閣本無於字非是分司郎官職事惟祠部為煩且重愈獨判二年日與宦者為敵相伺候罪過惡言詈辭狼藉公牒不敢為恥實慮陷禍故前者懷狀乞與諸郎官更判意雖甚専事似率爾言語精神不能自明不䝉察允遽以慙歸僶俛日日遂踰累旬私圖其宜敢以病告鳲鳩平均歌於國風從事獨賢雅以怨刺伏惟俯加憐察幸甚幸甚閣無俯宇録無俯察二字俯或作特今按得失之意已論於篇首矣愈再拜為河南令上留守鄭相公啓愈啓愈為相公官屬五年辱知辱愛伏念曽無絲毫事為報答效方從三今無伏字日夜思慮謀畫以為事大君子當以道不宜茍且求容悦故於事未嘗敢疑惑宜行則行宜止則止止方並作爾按對上句行字義當作止方本無理不詞今改从衆受容受察不復進謝閤杭本無受容字非是自以為如此真得事大君子之道方無之字今雖䝉沙汰為縣固猶在相公治下未同去離門牆為故吏為形跡嫌疑改前所為以自疎外於大君子固當不待煩説於左右而後察也外下方從三本無於字非是人有告人辱罵其妹與妻為其長者得不追而問之乎追而不至為其長者得不怒而杖之乎坐軍營操兵守禦為留守出入前後驅從者此真為軍人矣坐坊市賣餅又稱軍人則誰非軍人也愚以為此必姦人以錢財賂将吏盜相公文牒竊注名姓於軍籍中以陵駕府縣此固相公所欲去奉法吏所當嫉雖捕繫杖之未過也陵駕方云字見選沈林休文論嫉下或有矣字未上方从三本無之字非是未下或有至字或作不至過昨聞相公追捕所告受辱罵者遇以為大君子為政當有權變始似小異要歸於正耳軍吏紛紛入見告屈為其長者安得不小致為之之意乎長下方从三本無者字非是未敢以此仰疑大君子及見諸從事説則與小人所望信者少似乖戾雖然豈敢生疑於萬一方無於字必諸從事與諸将吏未能去朋黨心蓋覆黤黮上鄔感切下他感切甚黒也劉伶客至詩黤黮元夜隂韓曰青黑色不以真情状白露左右小人受私恩良久安敢閉蓄以為私恨不一二陳道伏惟相公憐察幸甚幸甚受私或作私受今按私受非是然此七字為句語亦太煩又下語便有私恨字不應重複如此疑此私字是􅄛文也愈無適時才用漸不喜為吏得一事為名可自罷去不啻如棄涕唾無一分顧藉心方從閣本名字在罷字下而名字下更有一罷字杭本無名字可自作自可亦無下罷字今按此句諸本皆不可讀但别本作得一事為名可自罷去比閣本只移一名字去一罷字比杭本但増一名字倒一自字而文義通暢略無凝滯今从之又按此二書誤字尤多而閣杭蜀本又為特甚不知何故如此大抵公於朝廷或抵上官論時事及職事則皆如公状之體不用古文竒語此二篇亦其類也竊意讀者厭其無竒而輒改之故其多誤至此顧失大君子纎芥意如丘山重守官去官惟今日指揮愈惶懼再拜上别本韓文考異巻十五欽定四庫全書别本韓文考異巻十六宋王伯大重編書上宰相書正月二十七日前鄉貢進士韓愈謹伏光範門下再拜獻書相公閣下書下或有于字方云時宰相趙憬賈耽盧邁也詩之序曰菁菁者莪樂育材也君子能長育人材則天下喜樂之矣或作也其詩曰菁菁者莪在彼中阿既見君子樂且有儀説者曰菁菁者盛也莪微草也阿大陵也言君子之長育人材若大陵之長育微草能使之菁菁然盛也或無也字既見君子樂且有儀云者天下美之之辭也其三章曰既見君子錫我百朋説者曰百朋多之之辭也或無下百朋字言君子既長育人材又當爵命之賜之厚禄以寵貴之云爾賜之賜或作錫之或作以其卒章曰汎汎楊舟載沈載浮既見君子我心則休説者曰載載也沈浮者物也載載也或作載者載也或作載者舟也或作載舟也言君子之於人材無所不取若舟之於物浮沈皆載之云爾既見君子我心則休云者言若此則天下之心美之也心上或無之字君子之於人也既長育之又當爵命寵貴之而於其才無所遺焉孟子曰君子有三樂王天下不與存焉其一曰樂得天下之英才而教育之此皆聖人賢士之所極言至論古今之所宜法者也然則孰能長育天下之人材将非吾君與吾相乎孰能教育天下之英才将非吾君與吾相乎然則下或無孰能至相乎十七字方云歐本本存此則與後相應然亦無孰長人三字則非是幸今天下無事小大之官各守其職或作所錢穀甲兵之問不至於廟堂論道經邦之暇捨此宜無大者焉今有人生二十八年矣名不著於農工商賈之版其業則讀書著文歌頌堯舜之道雞鳴而起孜孜焉亦不為利或無而字其所讀皆聖人之書楊墨釋老之學無所入於其心其所著皆約六經之㫖而成文抑邪與正辨時俗之所惑與或作興居窮守約方無守字亦時有感激怨懟音墜竒怪之辭以求知於天下亦不悖於教化妖滛䛕佞譸張譸音輈張誑也之説無所出於其中四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畆之宫其可懷宮或作宅方云一畆之宮本儒行語公苗蕃志無宮以歸今本亦誤今按二字無大利害公用儒行語亦或有之然謂其専用宮字而不得更用宅字則固矣遑遑乎四海無所歸恤恤乎饑不得食寒不得衣濱於死而益固得其所者爭笑之忽将棄其舊而新是圖求老農老圃而為師悼本志之變化中夜涕泗交頥雖不足當詩人孟子之謂抑長育之使成材其亦可矣教育之使成才其亦可矣子之下或有所字抑又聞古之君子相其君也之字或在君子下或子下别有之字一夫不獲其所若已推而内之溝中今有人生七年而學聖人之道以修其身積二十年不得已一朝而毁之是亦不獲其所矣十下或有一字伏念今有仁人在上位若不往告之而遂行是果於自棄而不以古之君子之道待吾相也其可乎寧往告焉若不得志則命也其亦行矣志上或有其字今疑志字衍洪範曰凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之二不字方並作弗也而康而色曰予攸好徳汝則錫之福是皆與善之辭也抑又聞古之人有自進者而君子不逆之矣曰予攸好徳汝則錫之福之謂也君上或無而字抑又聞上之設官制禄必求其人而授之者非茍慕其才而富貴其身也方無貴字盖将用其能理不能用其明理不明者耳下之修已立誠必求其位而居之者非茍没於利而榮於名也没或作役方云國語重耳不没於利注没貪也盖将推已之所餘以濟其不足者耳然則上之於求人下之於求位交相求而一其致焉耳一其致或作其致一茍以是而為心則上之道不必難其下下之道不必難其上可舉而舉焉不必讓其自舉也讓下或有於字可進而進焉不必亷於自進也於下或有其字抑又聞上之化下得其道則勸賞不必徧加乎天下而天下從焉化上方無之字則方作其疑當併有則其字因人之所欲為而遂推之之謂也方作矣今天下不由吏部而仕進者㡬希矣主上感傷山林之士有逸遺者屢召内外之臣旁求於四海而其至者盖闕焉求下方有儒雅字雅亦或作士豈其無人乎哉亦見國家不以非常之道禮之而不来耳家下方有之字彼之處隱就閒者亦人耳其耳目鼻口之所欲其心之所樂其體之所安豈有異於人乎哉今所以惡衣食窮體膚麋鹿之與處猨􅀈之與居固自以其身不能與時從順俯仰故甘心自絶而不悔焉从方作俗今按後巻與馮宿書云委曲从順向風承意則諸本作从順者固韓公常用之語也方本語意拙澁非是而方聞國家之仕進者必舉於州縣然後升於禮部聞下或有今字吏部試之以繡繪雕琢之文考之以聲勢之逆順章句之短長中其程式者然後得從下士之列雖有化俗之方安邉之畫不繇是而稍進萬不有一得焉進下或有者字彼惟恐入山之不深入林之不宻其影響昧昧惟恐聞於人也惟恐或作之恐或無此二字今若聞有以書進宰相而求仕者而宰相不辱焉而薦之天子而爵命之而布其書於四方進或作上而宰而爵或並無而字或並無天子二字方無於字枯槁沈溺魁閎寛通之士必且洋洋焉動其心峨峨焉纓其冠于于焉而来矣此所謂勸賞不必徧加乎天下而天下從焉者也因人之所欲為而遂推之之謂者也伏惟覽詩書孟子之所指念育才錫福之所以考古之君子相其君之道而忘自進自舉之罪思設官制禄之故以誘致山林逸遺之士庶天下之行道者知所歸焉歸上方有依字小子不敢自幸其嘗所著文輒採其可者若干首録在異巻冀辱賜觀焉或無敢字或無冀字冀辱或作伏垂干黷尊嚴伏地待罪愈再拜後十九日復上書二月十六日前鄉貢進士韓愈謹再拜言相公閣下向上書及所著文後待命凡十有九日不得命恐懼不敢逃遁不知所為方無向字及逃字从乃復敢自納於不測之誅以求畢其説而請命於左右愈聞之蹈水火者之求免於人也不惟其父兄子弟之慈愛然後呼而望之也将有介於其側者雖其所憎怨茍不至乎欲其死者則将大其聲疾呼而望其仁之也仁或作人而之下有救字或作人而下無之字今按此若作人之救則正與下句全字為對而下文再疊其語亦以二字相對但覺其語差凡故今且從方本注彼介於其側者聞其聲而見其事不惟其父兄子弟之慈愛然後往而全之也雖有所憎怨茍不至乎欲其死者則将枉奔盡氣濡手足焦毛髪救之而不辭也若是者何哉其勢誠急而其情誠可悲也愈之彊學力行有年矣愚不惟道之險夷愚上或有其字而愚下有也字也又或作甚或有其字而無也甚二字行且不息以蹈於窮餓之水火其既危且亟矣大其聲而疾呼矣閣下其亦聞而見之矣方作歟其将往而全之歟抑将安而不救歟不下或有之字有来言於閣下者曰有觀溺於水而爇於火者有可救之道而終莫之救也閣下且以為仁人乎哉不然若愈者亦君子之所宜動心者也或謂愈子言則然矣宰相則知子矣如時不可何謂愈下或有曰字愈竊謂之不知言者誠其材能不足當吾賢相之舉耳材方作才能不或作不能而無足字相上或無賢字若所謂時者固在上位者之為耳非天之所為也位者下方無之字又無也字或併無之為耳非四字之為耳三字或作為之耳皆非是前五六年時宰相薦聞尚有自布衣䝉抽擢者與今豈異時哉且今節度觀察使及防禦營田諸小使等尚得自舉判官無間於已仕未仕者或無使及二字非是間或作聞或作間况在宰相吾君所尊敬者而曰不可乎古之進人者或取於盜或舉於管庫今布衣雖賤猶足以方於此情隘辭蹙不知所裁亦惟少垂憐焉憐下或有察字愈再拜
