body:
  text: 尹不臺參答友人書或作與友人論京尹不臺參書洪曰長慶三年六月以公為京兆尹兼御史大夫敕放臺參後不得為例按魏氏春秋云故事御史中丞與洛陽令相遇則分路而行以事主多逐捕不欲稽留然非唐制也順宗實録云故事尹與御史相遇尹下道避尹尚避御史豈有不臺參之理當時敇放臺參後不為例則知故事須臺參也夫唐本事須臺參下云亦是何典故赤令尚與中丞分道而行况京尹聖恩以為然便令宣與李紳不用臺參今本顛倒不可讀當從唐本樊曰時宰相惡御史中丞李紳欲逐之特詔公不臺參以激紳紳果劾奏公公以詔自解文刺紛然宰相以臺府不協遂罷公為兵部侍郎而出紳為江西觀察使紳朝辭泣訴帝復留紳為兵部侍郎公復為吏部按貞元十八年公為四門博士時薦士十人於陸傪李紳在焉紳昧其平昔之薦而劾公公既不言而世亦未有辨之者又謂公蹙紳以附逢吉獨王黄州荅丁晉公書以謂曲在紳葢公論也所示情眷之至不勝悚荷臺參實奏云容桂觀察使帶中丞尚不臺參或無使字京尹郡國之首所管神州赤縣官帶大夫豈得却不如事須臺參聖恩以為然便令宣與李紳不用臺參亦是何典故赤令尚與中丞分道而行何况京尹方云吕丞相本改定亦是以下十九字綴於事須臺參之下仍於却不如下添中丞二字慶善云今本顛倒不可讀當從唐本不知洪所謂唐本者何本也閣杭蜀本只同今文姑以闕疑可也一曰不用臺參已下當再出臺參二字義亦自通今按二說皆未妥後說雖差勝然文意似亦未足當闕之以俟知者人見近事習耳目所熟稍殊異即怪之其於道理有何所傷聖君使行即是故事自古豈有定制也停惟巡縁府中褊迫是實若别差人即是妄說豈有此事小人言不可信類如此亦在大賢斟酌而斷之流言止於智者正謂此耳客多自修報状不得或作不及自修報或作不及修報状伏惟照察照方作昭今按唐人書帖用照察字亦多送陸歙州詩序或無詩字或作送陸員外刺歙州詩并序方云陸傪也洪云一本自此下為第二十巻貞元十八年二月十八日祠部員外郎陸君出刺歙州朝廷夙夜之賢都邑游居之良齎咨涕洟咸以為不當去歙大州也刺史尊官也由郎官而徃者前後相望也當今賦出於天下江南居十九宣使之所察歙為富州宰臣之所薦聞天子之所選用其不輕而重也較然矣如是而齎咨涕洟以為不當去者陸君之道行乎朝廷則天下望其賜刺一州則專而不能咸咸或作或而屬下句方從閤本作咸而屬上句今按莊子有周徧咸之語方本得之先一州而後天下豈吾君與吾相之心哉先上諸本有謂字方從閤本云杭本訛咸作或然尚無謂字蜀本始作或謂今本易為作謂訛轉甚也於是昌黎韓愈道願留者之心而泄其思作詩曰我衣之華兮我佩之光陸君之去兮誰與翺翔諸本如此方從閤杭本光翔下皆有兮字去下無兮字今按古詩賦有句句用韻及語助者賡歌是也有隔句用韻及兮而兮在上句之末韻在下句之末者騷經是也有隔句用韻而上句不韻不兮下句押韻有兮者橘頌之類是也今此詩方本若用賡歌之例則華光有兮而不韻其去字一句又并無也若用騷經之例則光翔當用韻而不當有兮華雖可以有兮而去復不可以無兮也若用橘頌之例則下三句為合而首句不當有兮也韓公深於騷者不應如此葢方所從之本失之也今定從諸本以騷經及賈誼弔屈首章為例若欲以橘頌為例則止去方本首句一兮字尤為簡便但無此本不敢以意創耳歛此大惠兮施於一州今其去兮胡不為留我作此詩歌於逵道無疾其驅天子有詔送孟東野序大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得已而後言其謌也有思其哭也有懐凡出乎口而為聲者其皆有弗平者乎樂也者鬱於中而泄於外者也擇其善鳴者而假之鳴金石絲竹匏土革木八者物之善鳴者也維天之於時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推􅐁其必有不得其平者乎鳥下方從閤本有獸字非是􅐁古奪字或作奪其於人也亦然人聲之精者為言文辭之於言又其精也方從閤杭蜀本去又字而取下句尤字足成一句不成文理說見下條尤擇其善鳴者而假之鳴按上文已再言擇其善鳴者而假之鳴矣則此又言人聲之精者為言而文辭又其精者故尤擇其善鳴者而假之鳴又字尤字正是闗鍵血脈首尾相應處方以三本之誤遂去又字而以尤字屬上句不唯此句不成文理又使此篇語無次第其誤尤甚今悉正之其在唐虞咎陶禹其善鳴者也而假以鳴在下或有於字假下或有之字夔弗能以文辭鳴又自假於韶以鳴弗方作不而無能字夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而逺傳曰天將以夫子為木鐸其弗信矣乎其末也莊周以其荒唐之辭鳴辭或作說下或有於楚二字方云莊子蒙人蒙梁地也且辭楚威王之聘未嘗仕於楚也楚大國也其亡也以屈原鳴臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老聃申不害韓非眘到田駢鄒衍尸佼音絞又古爻切魯人商君師之鞅死入蜀著書二十篇號尸子孫武張儀蘇秦之屬皆以其術鳴秦之興李斯鳴之漢之時司馬遷相如揚雄最其善鳴者也其下魏晉氏鳴者不及於古然亦未嘗絶也其下方無其字然亦未嘗絶也諸本皆有此句方從閤本刪去今按有此一句文意乃足閤本脫也就其善者其聲清以浮其節數以急其辭淫以哀其志弛以肆善下或有鳴字浮方從諸本作淳唯蜀本及文苑作浮今按此數句皆言魏晉以下文章之病不應用淳字以美之諸本皆誤數以急弛以肆二句諸本皆如此方從謝本刪去二以字今按自其聲至此四句當為二列其第二第四句古本偶皆脫一字而方必以從之遂使句之短長參差不齊而不可讀正與上李巽書相似其意以為必如是然後為古而不知所謂古者不在於是也其為言也亂雜而無章將天醜其徳莫之顧邪何為乎不鳴其善鳴者也諸本如此方從閤本以亂為詞又從閤杭本刪去將天以下十九字今按方本極無理葢因亂而誤為辭又因辭而轉作詞耳今當改辭為亂又補十九字文意乃足唐之有天下陳子昂蘇源明元結李白杜甫李觀皆以其所能鳴其存而在下者孟郊東野始以其詩鳴其髙出魏晉不懈而及於古其他浸淫乎漢氏矣魏晉方作晉魏或無古字氏矣方從閤本無此二字皆非是從吾遊者李翺張籍其尤也三子者之鳴信善矣方無善字或作善鳴皆非是左傳云克已復禮仁也信善哉公雖未必用此語然亦偶合也抑不知天將和其聲而使鳴國家之盛邪抑將窮餓其身思愁其心腸而使自鳴其不幸邪三子者之命則懸乎天矣方從閤杭蜀苑則下有有字非是若果有有字即天下當有者字更詳之其在上也奚以喜其在下也奚以悲東野之役於江南也有若不釋然者故吾道其命於天者以解之釋或作懌然者方作者然云顧命王不懌或作不釋釋猶開釋也按嘉祐本作不釋然者其語本出莊子方與或本皆誤也以解方無以字非是送許郢州序或作送許使君刺郢州序仍註仲輿二字或作志雍樊云志雍安陸許氏貞元九年進士終監察御史愈嘗以書自通於于公累數百言公下或有頓字其大要言先進之士得人而託之則道徳彰而名問流後進之士得人而託之則事業顯而爵位通要下或有也字問或作聞下有矜乎能上有矜乎位雖恒相求而喜不相遇于公不以其言為不可復書曰足下之言是也諸本無喜字方從杭蜀苑得之于公身居方伯之尊蓄不世之材而能與卑鄙庸陋相應答如影響是非忠乎君而樂乎善以國家之務為已任者乎世下或有出字出下或有羣字愈雖不敢私其大恩抑不可不謂之知已恒矜而誦之情已至而事不從小人之所不為也故於使君之行道刺史之事以為于公贈凡天下之事成於自同而敗於自異為刺史者恒私於其民不以實應乎府為觀察使者恒急於其賦不以情信乎州繇是刺史不安其官觀察使不得其政財已竭而歛不休人已窮而賦愈急其不去為盜也亦幸矣賦方作怒以上下文考之非是誠使刺史不私於其民觀察使不急於其賦方無下其字以上句考之非是刺史曰吾州之民天下之民也惠不可以獨厚觀察使亦曰某州之民天下之民也歛不可以獨急如是而政不均令不行者未之有也以獨急或無以字其前之言者于公既已信而行之矣今之言者其有不信乎前下方無之字非是當今疑其字作某縣之於州猶州之於府也有以事乎上有以臨乎下同則成異則敗者皆然也非使君之賢其誰能信之信方作從以上文考之非是愈於使君非燕游一朝之好也故其贈行不以頌而以規送竇從事序踰甌閩而南皆百越之地甌方作越以下文重出越字考之非是或無甌字亦非越或作粤於天文其次星紀其星牽牛連山隔其隂鉅海敵其陽敵一作敲氣上烝也方從閤苑作敲云敲横擿也謂鉅海敲蕩其南也今按敲微扣也字書訓以横擿而漢書注又訓擿為發動蓋不以杖末奮擊但以杖身微扣而發動之所謂横擿也海之為物最鉅其所震蕩豈微扣之謂邪閣本蓋誤而方必為曲說以附之殊不可曉作敲亦非是但當作敵乃當抵對捍之意與上句隔字正相對也是維島居卉服之民風氣之殊著自古昔氣方從閤蜀本作俗今按島居卉服已見其民俗之陋因又言此以見其風氣之惡自是兩事故下文云民俗既遷風氣亦隨也閤蜀皆誤古方作在非是唐之有天下號令之所加無異於逺近民俗既遷風氣亦隨雪霜時降癘疫不興瀕海之饒固加於初疫或作疾方云瀕濱也篆文無濱字漢志瀕南山又瀕河十郡只用瀕字加於方作如字今以上文考之此當言其氣俗既變生物益蕃之意者云固如其初則却是未曾變矣方本非是是以人之之南海者若東西州焉之之諸本無復出之字方從閤杭蜀苑得之若或作如皇帝臨天下二十有二年臨下或有御字詔工部侍郎趙植為廣州刺史盡牧南海之民署從事扶風竇平平以文辭進於其行也其族人殿中侍御史牟合東都交遊之能文者二十有八人賦詩以贈之於是昌黎韓愈嘉趙南海之能得人壯從事之答於知我不憚行之逺也我或作已行之逺文苑如此諸本之或作於或作我於行逺方無行之二字皆非是又樂貽周之愛其族叔父能合文辭以寵榮之作送竇從事少府平序貽上或有其宗二字上已日燕太學聽彈琴詩序與衆樂之之謂樂樂而不失其正又樂之尤也尤方從閤作光四方無鬭爭金革之聲京師之人既庶且豐天子念致理之艱難樂安居之閑暇肇置三令節洪曰舊史云貞元四年九月詔正月晦日三月三日九月九日三節日宜任文武官僚選勝地追賞為樂五年正月詔以二月一日為中和節代正月晦日備三令節數此序在貞元壬午癸未間公為四門博士其云肇置三令節葢謂徳宗朝始置耳詔公卿羣有司至於其日率厥官屬飲酒以樂所以同其休宣其和感其心成其文者也方無屬字三月初吉實惟其時司業武公下或有少儀二字於是總太學儒官三十有六人列燕於祭酒之堂罇俎既陳肴饈惟時醆斚序行獻酬有容歌風雅之古辭斥夷狄之新聲裒衣危冠與與如也與與或作愉愉方從杭蜀本云詩我黍與與淮南子善用兵者陵其與與皆音餘今按論語有此全句有儒一生魁然其形抱琴而來厯階以升儒一或作一儒以或作而坐於罇俎之南鼓有虞氏之南風賡之以文王宣父之操孫曰賡續也樊曰文王操見史記孔子學琴於師襄宣父操如將歸猗蘭龜山也優游夷愉廣厚髙明追三代之遺音想舞雩之詠歎及暮而退若充然若有得也有下或有所字武公於是作歌詩以美之命屬官咸作之命四門博士昌黎韓愈序之送齊皥下第序皥或作曎方云考唐宰相世系表當作皥古之所謂公無私者其取捨進退無擇於親疎逺邇惟其宜可焉其下之視上也亦惟視其舉黜之當否不以親疎逺邇疑乎其上之人下或有也字或無之人二字而有也字故上之人行志擇誼坦乎其無憂於下也或無故字或無之字下之人尅已慎行確乎其無惑於上也是故為君不勞而為臣甚易見一善焉可得詳而舉也見一不善焉可得明而去也方從閤杭蜀苑無詳明二字及道之衰上下交疑於是乎舉讎舉子之事載之傳中而稱美之而謂之忠或無下而字見一善焉若親與邇不敢舉也見一不善焉若疎與逺不敢去也方無上敢字衆之所同好焉矯而黜之乃公也衆之所同惡焉激而舉之乃忠也衆下或皆有人字於是乎有違心之行有怫志之言有内媿之名若然者俗所謂良有司也然或作是膚受之訴不行於君巧言之誣不起於人矣烏虖今之君天下者不亦勞乎為有司者不亦難乎為人嚮道者不亦勤乎烏虖方云猶嗚呼也古文於乎烏虖嗚呼皆一義或作於是乎非是為有方無為字為人嚮道諸本皆同但嚮或作鄉方從閤苑以人為仁殊無文理蓋所謂人者指應舉者而言為之作嚮道者謂指引其道路所嚮如公之於侯喜侯雲長之徒是已其所嚮者亦因向與兵書所謂以鄉人為導者音義皆小同也是故端居而念焉非君人者之過也則曰有司焉則非有司之過也則曰今舉天下人焉則非今舉天下人之過也蓋其漸有因其本有根生於私其親成於私其身以已之不直而謂人皆然其親其下或有所字其植之也固久其除之也實難非百年必世不可得而化也非知命不惑不可得而改也已矣乎其終能復古乎若高陽齊生者其起予者乎齊生之兄為時名相出藩于南之兄方無之字于下方從杭苑有鎮字公閤本無今按齊映以貞元七年由桂管改江西是時洪州只為江西觀察使至咸通中乃有鎮南之號耳杭苑皆誤朝之碩臣皆其舊交齊生舉進士有司用是連枉齊生齊生不以云乃曰我之未至也有司其枉我哉其枉或作豈枉方從閤杭蜀本得之我將利吾器而俟其時耳抱負其業東歸於家吾觀於人有不得志則非其上者衆矣亦莫計其身之短長也若齊生者既至矣而曰我未也不以閔於有司其不亦鮮乎哉既至矣方作既不得志矣今按上文曰我之未至也下文曰我未也則此作至為是未下或有至字用是知齊生後日誠良有司也能復古者也公無私者也知命不惑者也送陳密序太學生陳密請於余曰密承訓於先生今將歸覲其親不得朝夕見願先生賜之言密將以為戒覲或作拜密來太學舉明經累年不獲選是弗利於是科也獲下或有其字今將易其業而三禮樊曰唐制取士有明經科而明經之别有五經有三經有二經有三禮有三傳有史科凡禮記春秋左氏傳為大經詩周禮儀禮為中經易尚書春秋公羊傳為小經孫曰三禮科貞元五年二月置是習願先生之張之也密將以為鄉榮方無以字余媿乎其言遺之言曰子之業信習矣其容信合於禮矣其下或有儀字非是抑吾所見者外也夫外不足以信内子誦其文則思其義習其儀則行其道則將謂子君子也爵禄之來也不可辭矣科寧有利不利邪謂其習其或並無其字送李愿歸盤谷序樊曰東坡云歐陽公言晉無文章惟陶淵明歸去來一篇而已余亦謂唐無文章惟韓退之送李愿歸盤谷一篇而已平生欲效此作一篇每執筆輒罷因自笑曰不若且放教退之獨步唐人跋序後云云昌黎韓愈知名之士髙愿之賢故序而送之云云樊曰按貞元十七年嵗在辛巳歐陽公集古録云當時退之官尚未顯其道未為當時所宗師故但云知名士然當時送愿者為不少而獨刻此序蓋其文章已重於時也方云此序貞元十七年作公年纔三十四耳太行之陽有盤谷盤谷之間泉甘而土肥草木藂茂居民鮮少或曰謂其環兩山之間故曰盤或曰是谷也宅幽而勢阻隱者之所盤旋友人李愿居之盤下諸本皆有旋字洪氏石本杭本同或作桓方從樊氏石本閤蜀苑刪去今按兩石本不同說見下條友人諸本及洪氏石本皆作友方云樊氏石本作有今按校此書者以印本之不同而取正於石本今石本乃又不同如此則又未知其孰是也然以理推之則作有者為無理故今特詳著之以見所謂石本者之不足信也愿之言曰人之稱大丈夫者我知之矣利澤施于人名聲昭于時施于諸本于作於方從石本坐于廟朝進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賞怒有刑文苑賞作賜樊氏石本無此六字才畯滿前道古今而譽盛徳入耳而不煩曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而閒居妬寵而負恃爭妍而取憐大丈夫之遇知於天子用力於當世者之所為也天子諸本作主上方從石本為上諸本有所字方從石本刪去下文於時者之所為也同此吾非惡此而逃之是有命焉不可幸而致也窮居而閒處升髙而望逺諸本如此方從石閤苑作逺望坐茂樹以終日濯清泉以自潔採於山美可茹釣於水鮮可食起居無時惟適之安蜀本及洪氏石本之作所方從苑粹樊氏石本作之今按此二石本不同又從足見所謂石本者之難信矣然以理推之作之為是諸舊本亦多同者與其有譽於前孰若無毁於其後與其有樂於身孰若無憂於其心與其下諸本並有有字方從石本刪去車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者之所為也我則行之伺候於公卿之門奔走於形勢之途足將進而趑趄口將言而囁嚅趑取私切趄音徂囁之舌切又而舌切嚅女居切又音如趑趄行不進貌囁嚅不敢出口也處汙穢而不羞觸刑辟而誅戮穢汙方從諸本作汙穢今用石本改不羞樊本作弗差辟樊石本作法徼倖於萬一老死而後止者其於為人賢不肖何如也昌黎韓愈聞其言而壯之與之酒而為之歌曰盤之中維子之宮盤之土可以稼諸本作惟子之稼方從石閣如此盤之泉可濯可沿石閣杭本沿作湘方從石本云洪氏以為作湘者石本磨滅或以閣本意之也然此文自如徃而復以上皆二語一韻以稼叶土此類固多以容叶深以詩七月易恒卦小象考之亦合古韻獨湘不可與泉叶按公論語筆解以浴于沂作沿于沂政與此沿同義今直以沿為正今按方以古韻為据舎所信之石杭閣本而去湘從沿其說當矣然必以筆解為說又似太拘今世所傳筆解葢未必韓公真本也又按洪云石本在濟源張端家皆缺裂不全惟可可湘一句甚明又與方引洪氏磨滅之說不同不知何故姑記之以俟知者然其大槩只為從湘字耳政使實然亦不足取其說詳於下條云盤之阻誰爭子所窈而深廓其有容繚而曲如徃而復嗟盤之樂兮樂且無殃殃方從洪校石本作央又云樊本只作殃然閣杭蜀本皆作央王逸注離騷云央盡也已也方又云此文如叢作藂俊作畯時作旹皆石本字也今按作殃於義為得又按此篇諸枝本多從石本而樊洪兩石已自不同未知孰是其有同者亦或無理未可盡信按歐公集古跋尾云盤谷序石本貞元中所刻以集本校之或小不同疑刻石誤然以其當時之物姑存之以為佳玩其小大不足校也詳公此言最為通論近世論者專以石本為正如水門記溪堂詩予已論之南海廟劉統軍碑之類亦然其謬可考而知也虎豹逺跡兮蛟龍遁藏鬼神守䕶兮呵禁不祥禁或作禦飲則食兮壽而康無不足兮奚所望則或作且膏吾車兮秣吾馬從子于盤兮終吾生以徜徉送牛堪序此篇或在後巻之首閣杭蜀本置此公時為四門慱士堪為太學生在貞元十九年云以明經舉者誦數十萬言又約通大義徴辭引類旁出入他經者又誦數十萬言其為業也勤矣登第於有司者去民畝而就吏禄由是進而累為卿相者常常有之其為獲也亦大矣然吾未嘗聞有登第於有司而進謝於其門者門上或無其字豈有司之待之也抑以公不以情舉者之望於有司也亦將然乎其進而謝於其門也則為私乎抑無乃人事之未思或者不能舉其禮乎若牛堪者思慮足以及之材質足以行之而又不聞其徃者其將有以哉違衆而求識衆一作俗立竒而取名非堪心之所存也由是而觀之若堪之用心其至於大官也不為幸矣堪太學生也余博士也博士師屬也於其登第而歸將榮其鄉也能無說乎别本韓文考異巻十九欽定四庫全書别本韓文考異巻二十宋王伯大重編
