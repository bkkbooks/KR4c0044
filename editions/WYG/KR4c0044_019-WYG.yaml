front:
  text: 故游從之中伏蒙恩奬知待最深最厚無有比者方無伏字比或作倫懦弱昏塞不能奮勵出竒少答所遇拜辭之後切念旬朔不即獲侍言笑東望殞涕有兒女子之感或無子字方云非兒女子所知為兒女子所詐當有子字獨宿直舎無可告語展轉歔欷不能自禁華州雖實百郡之首重於藩維然閤下居之則為失所愚以為茍慮有所及宜密以上聞不宜以疎外自待不下或無宜字接過客俗子絶口不挂時事務為崇深以拒止嫉妬之口親近藥物方書動作步趣以致和宣滯為國自愛副鄙陋拳拳之心幸甚幸甚謹奉狀不宣愈再拜
