body:
  text: 序送董邵南序南下或有遊河北三字燕趙古稱多感慨悲歌之士董生舉進士連不得志於有司懐抱利器鬱鬱適茲土吾知其必有合也董生勉乎哉夫以子之不遇時茍慕義彊仁者皆愛惜焉况燕趙之士出乎其性者哉然吾嘗聞風俗與化移易吾惡知其今不異於古所云邪聊以吾子之行卜之也於古方從閣本作於吾云或作聞而無邪字今按篇首云古稱多感慨悲歌之士諸本作古所云語乃相應作吾所聞猶為近之而語勢已微舛矣若曰吾所云則都無來厯不成文字必是謬誤無疑也然此篇言燕趙之士仁義出於其性乃故反其辭以深譏其不臣而習亂之意故其卒章又為道上威徳以警動而招徠之其旨㣲矣讀者詳之董生勉乎哉吾因子有所感矣為我弔望諸君之墓而觀於其市復有昔時屠狗者乎為我謝曰明天子在上可以出而仕矣贈崔復州序有地數百里趨走之吏自長史司馬已下數十人其禄足以仁其三族及其朋友故舊樂乎心則一境之人喜不樂乎心則一境之人懼丈夫官至刺史亦榮矣丈上或有大字雖然幽逺之小民其足跡未嘗至城邑茍有不得其所能自直於鄉里之吏者鮮矣况能自辨於縣吏乎方無茍有二字或無有字能自辨於縣吏者鮮矣况能自辨於刺史之庭乎由是刺史有所不聞小民有所不宣賦有常而民産無恒水旱癘疫之不期民之豐約懸於州句縣令不以言連帥不以信民就窮而歛愈急吾見刺史之難為也州或作前縣下或有復出縣字皆非是崔君為復州其連帥則于公崔君之仁足以蘇復人于公之賢足以庸崔君有刺史之榮而無其不為者將在于此乎崔君之仁上或有愈以為三字愈嘗辱于公之知而舊游於崔君慶復人之將蒙其休澤也於是乎言贈張童子序子下或有兵曺二字天下之以明二經舉於禮部者嵗至三千人始自縣考試定其可舉者然後升於州若府其不能中科者不與是數焉州若府總其屬之升又考試之如縣加察詳焉定其可舉者然後貢於天子而升之有司其不能中科者不與是數焉謂之鄉貢有司者總州府之所升而考試之加察詳焉第其可進者以名上於天子而藏之屬之吏部歳不及二百人謂之出身能在是選者厥惟艱哉二經章句僅數十萬言其傳注在外皆誦之又約知其大說或無大字繇是舉者或逺至十餘年然後與乎三千之數而升於禮部矣又或逺至十餘年然後與乎二百之數而進於吏部矣班白之老半焉昏塞不能及者皆不在是限有終身不得與者焉之老二字或作者張童子生九年自州縣達禮部一舉而進立於二百之列百下或有人字又二年益通二經有司復上其事繇是拜衞兵曹之命人皆謂童子耳目明達神氣以靈余亦偉童子之獨出於等夷也童子請於其官之長隨父而寧母嵗八月自京師道陜南至虢東及洛師北過大河之陽九月始來及鄭洛師或作洛陽及鄭方作反鄭云此序疑作於鄭序云愈與童子俱陸公之門人是童子以貞元八年升于禮部又二年拜衛兵曹葢十年也公十年曾徃河陽省墳墓見祭老成文序當作於此時童子豈或鄭人邪今按反字諸本多作及字蓋自洛東出便可至鄭今以北過河陽故九月始及鄭童子未必為鄭人也自朝之聞人以及五都之伯長羣吏皆厚其餼賂或作謌詩以嘉童子童子亦榮矣聞或作文方云五都當謂雍陜虢蒲洛羣吏方以閣杭本定蜀本訛作郡吏今本併訛吏為縣其失逺矣雖然愈將進童子於道使人謂童子求益者非欲速成者夫少之與長也異觀少之時人惟童子之異及其長也將責成人之禮焉與或作於禮上方無之字成人之禮非盡於童子所能而已也然則童子宜暫息乎其已學者而勤乎其未學者可也愈與童子俱陸公之門人也慕回路二子之相請贈與處也故有以贈童子與處上或有出字非是方云禮子路去魯謂顔子曰何以贈我顔子請曰何以處我義不當有出字也送浮屠文暢師序人固有儒名而墨行者問其名則是校其行則非可以與之游乎儒名方作名儒非是如有墨名而儒行者問之名則非校其行而是可以與之游乎之名或作其名而是或作則是揚子雲稱在門牆則揮之在夷狄則進之吾取以為法焉浮屠師文暢喜文章其周遊天下凡有行必請於縉紳先生以求咏歌其所志方無浮屠師三字喜下或有為字謌方作哥貞元十九年春將行東南栁君宗元為之請解其裝得所得敘詩累百餘篇非至篤好其何能致多如是邪請或所敘所下或無得字惜其無以聖人之道告之者而徒舉浮屠之說贈焉告下方無之字夫文暢浮屠也如欲聞浮屠之說當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物事為之盛其心有慕焉事為或作禮樂心下或有必字拘其法而未能入故樂聞其說而請之如吾徒者宜當告之以二帝三王之道日月星辰之行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之說而瀆告之也行上或有所以字江河方作河江瀆告之方無瀆之二字民之初生固若禽獸然聖人者立然後知宮居而粒食親親而尊尊生者養而死者藏粒或作穀是故道莫大乎仁義教莫正乎禮樂刑政大方作過大乎或作過於正方作大施之於天下萬物得其宜措之於其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於册中國之人世守之今浮屠者孰為而孰傳之邪為下或有之字夫鳥俛而啄仰而四顧夫獸深居而簡出懼物之為已害也猶且不脫焉弱之肉彊之食脫或作免今吾與文暢安居而暇食優游以生死與禽獸異者寧可不知其所自邪夫不知者非其人之罪也知而不為者惑也悅乎故不能即乎新者弱也知而不以告人者不仁也告而不以實者不信也不為上方無而字為下或有之字悅或作或弱或作溺告人或作告之余既重栁請又嘉浮屠能喜文辭於是乎言請或作詩非是送楊支使序或作送楊八弟支使歸府愈在京師時嘗聞當今藩翰之賓客惟宣州為多賢嘗或作常與之遊者二人隴西李博清河崔羣二人下或有焉字羣與博之為人吾知之道不行於主人與之處者非其類雖有享之以季氏之富不一日留也方無於字於下或有其字以羣博論之凡在宣州之幕下者雖不盡與之游皆可信而得其為人矣盡方作得或别有得字在盡字下愈未嘗至宣州而樂頌其主人之賢者以其取人信之也今中丞之在朝愈日侍言於門下其來而鎮兹土也而鎮或無而字鎮或作領有問湖南之賓客者愈曰知其客可以信其主者宣州也知其主可以信其客者湖南也去年冬奉詔為邑於陽山然後得謁湖南之賓客於幕下於是知前之信之也不失矣及儀之之來也聞其言而見其行則向之所謂羣與博者吾何先後焉儀之智足以造謀材足以立事忠足以勤上惠足以存下本或無於是知以下十七字一本并無聞其言而見其行七字方從閣杭録幕下即云及支使之來也聞其言而見其行是知前之信之也不失矣支使智足以造謀今按此數本互有得失而方尤疎略獨今所定詳密有序目及羣博乃與上文相應而又侈之以詩書六藝之學先聖賢之徳音以成其文以附其質宜乎從事於是府而流聲實於天朝也賢方作人夫樂道人之善以勤其歸者乃吾之心也勤或作勸謂我為邑長於斯而媚夫人云者不知言者也工乎詩者歌以繫之送何堅序堅下本或有歸道州字何於韓同姓為近於或作與集注按何氏出周成王母弟唐叔虞後十二代孫食采於韓韓為秦所滅子孫分散居於江淮晉以韓為何遂為何氏堅以進士舉於吾為同業其在太學也吾為博士堅為生生博士為同道其識堅也十年為故人生博士或作生與博士同姓而近也同業也同道也故人也於其不得願而歸其可以無言邪不上或有志字堅道州人道之守陽公賢也或無賢字方云此謂陽城道於湖南為屬州湖南楊公又賢也或無湖南又字楊作陽皆非是方云此謂楊憑也堅為民堅又賢也湖南得道為屬道得堅為民堅歸唱其州之父老子弟服陽公之令道亦唱其縣與其比州服楊公之令楊或作陽非是吾聞鳥有鳯者恒出於有道之國當漢時黄霸為潁川是鳥實集而鳴焉若史可信堅歸吾將賀其見鳯而聞其鳴也已川下或有守字是鳥或作是鳯鳥也史或作使或無已字送廖道士序五岳於中州衡山最逺南方之山巍然髙而大者以百數獨衡為宗最逺而獨為宗其神必靈或無之字或無髙字獨衡下方有山字衡之南八九百里地益高山益峻水清而益駛或無峻水清而益五字非是駛或作駃音決其最高而横絶南北者嶺郴之為州在嶺之上測其高下得三之二焉測如周禮測土深之測方作側下别有南字皆非是中州清淑之氣於是焉窮氣之所窮盛而不過必蜿蟺上於元切又音宛下市衍切又音善祝曰選虬竜騰驤以蜿蟺蜿蜒也蟺蚯蚓也又屈曲貌扶輿相如曰扶輿倚靡郭璞注淮南所謂曾折靡地扶輿猗委也磅礴而鬱積磅音旁礴音薄祝曰莊子將磅礴萬物以為一注磅礴猶混同也釋文旁字又作磅沈佺期西嶽詩磅礴壓洪源孫曰蜿蟺扶輿磅礴鬱積皆氣積之貌州下方有之字窮下無盛字衡山之神既靈而郴之為州又當中州清淑之氣蜿蟺扶輿磅礴而鬱積其水土之所生神氣之所感白金水銀丹砂石英鍾乳橘柚之包竹箭之美千尋之名材不能獨當也鬱上或無而字方無英及橘柚之包五字當下或有其字非是意必有魁竒忠信材徳之民生其間樊曰栁子厚送廖有方序云交州多南金珠璣瑇瑁象犀其産皆竒怪至於草木亦殊異吾嘗怪陽徳之炳燿徒授於紛葩瓌麗而罕鍾乎人今廖生剛健重厚孝弟忠信以質乎中而文乎外固鍾於陽徳者邪子厚之序與公此作其意一也而吾又未見也其無乃迷惑溺沒於佛老之學而不出邪學或作教廖師郴民而學於衡山氣專而容寂多藝而善遊豈吾所謂魁竒而迷溺者邪迷下或有惑沒字廖師善知人若不在其身必在其所與遊訪之而不吾告何也於其别申以問之送王秀才序或作進士王含吾少時讀醉鄉記樊曰王績字无功隋末大儒通之弟也著醉鄉記以次劉伶酒徳頌含其子孫也私怪隠居者無所累於世而猶有是言豈誠旨於味邪及讀阮籍陶潛詩乃知彼雖偃蹇不欲與世接然猶未能平其心或為事物是非相感發於是有託而逃焉者也乃上或有然後字或為方作不為感發方無發字若顔氏子或無子字操瓢與簞曾參歌聲孫曰荘子云曾子曳縰而歌商頌聲滿天地若出金石若出金石彼得聖人而師之汲汲每若不可及其於外也固不暇尚何麯蘖之託而昏㝠之逃邪吾又以為悲醉鄉之徒不遇也何下或有事字為字疑衍建中初天子嗣位有意貞觀開元之丕績在廷之臣爭言事當此時醉鄉之後世又以直廢廷上或有朝字吾既悲醉鄉之文辭而又嘉良臣之烈思識其子孫方無又字今子之來見我也無所挾吾猶將張之况文與行不失其世守渾然端且厚惜乎吾力不能振之而其言不見信於世也於其行姑與之飲酒其世方作於世於其或作於是送孟秀才序或注琯字今年秋見孟氏子琯於郴年甚少禮甚度手其文一編甚鉅退披其編以讀之盡其書無有不能吾固心存而目識之矣識音志矣方作也其十月吾道於衡潭以之荆累累見孟氏子焉其所與偕盡善人長者吾益以竒之吾益或作余益今將去是而隨舉於京師雖不有請猶將彊而授之以就其志况其請之煩邪彊而方作彊有非是京師之進士以千數其人靡所不有吾常折肱焉其要在詳擇而固交之善雖不吾與吾將彊而附不善雖不吾惡吾將彊而拒茍如是其於髙爵猶階而升堂又况其細者邪送陳秀才彤序讀書以為學纉言以為文非以誇多而鬭靡也葢學所以為道文所以為理耳非以或無以字茍行事得其宜出言適其要雖不吾面吾將信其富於文學也潁川陳彤始吾見之楊湖南門下之下或有於字頎然其長薫然其和吾目其貌耳其言因以得其為人及其久也果若不可及夫湖南之於人不輕以事接爭名者之於藝不可以虛屈吾見湖南之禮有加而同進之士交譽也又以信吾信之不失也如是而又問焉以質其學策焉以考其文則何信之有諸本何下有不字方本亦然舊讀此序嘗怪則何不信之有以下文意斷絶不相承應每竊疑之後見謝氏手校真本巻首用建炎奉使之印末有題字云用陳無已所傳歐公定本讐正乃刪去此一不字初亦未曉其意徐而讀之方覺此字之為疑去之而後一篇之血脉始復通貫因得釋去舊疑嘗謂此於韓集最為有功但諸本既皆不及方㨿謝本為多而亦獨遺此字豈亦不嘗見其真本邪嘗以告之又不見信故今特刪不字而復詳著其說云故吾不徴於陳而陳亦不出於我此豈非古人所謂可為智者道難與俗人言者類邪凡吾從事於斯也久未見舉進士有如陳生而不如志者於其行姑以是贈之志上或有其字方從閣本送王秀才序或作王塤吾嘗以為孔子之道大而能博門弟子不能徧觀而盡識也故學焉而皆得其性之所近方無為字大而下方有其字其後離散分處諸侯之國又各以其能授弟子原逺而末益分方從閣本作引今按以分為引蓋草書誤然幸有他本可證方乃不取而獨信其誤何哉蓋子夏之學其後有田子方子方之後流而為莊周故周之後喜稱子方之為人故下方有莊字荀卿之書語聖人必曰孔子子弓孫曰荀子非十二子篇云無置錐之地而王公不能與之爭名在一大夫之位則一君不能獨畜一國不能獨容是聖人之不得勢者也仲尼子弓是也儒效篇云非大儒莫之能立仲尼子弓是也子弓之事業不傳雖太史公書弟子傳有姓名字曰馯音寒姓也臂子弓子弓受易於商瞿卿下或無之字名字或作名耳方云子弓史記作子𢎞漢書作子弓又云商瞿授子庸子庸授子弓傳授之序與此不同孟軻師子思子思之學葢出曾子自孔子沒羣弟子莫不有書獨孟軻氏之傳得其宗故吾少而樂觀焉書上或有師字非是吾或作余太原王塤示余所為文好舉孟子之所道者與之言信悅孟子而屢賛其文辭夫沿河而下茍不止雖有遲疾必至於海如不得其道也雖疾不止終莫幸而至焉遲疾或作疾遲幸或作得故學者必慎其所道道於楊墨老莊佛之學而欲之聖人之道猶航斷港絶潢以望至於海也故求觀聖人之道必自孟子始今塤之所由既幾於知道如又得其船與檝知沿而不止嗚呼其可量也哉荆潭唱和詩序此謂裴均楊憑唐藝文志有裴均荆潭唱和集一巻諸本作裴垍非也從事有示愈以荆潭酬和詩者愈既受以卒業或作集方云卒業字見漢楚元王傳因仰而言曰夫和平之音淡薄而愁思之音要妙讙愉之辭難工而窮苦之言易好也之音或作之語非是是故文章之作恒發於羇旅草野至若王公貴人氣滿志得非性能而好之則不暇以為至若方作若至氣滿志得方作氣得志滿今僕射裴公開鎮蠻荆統郡惟九方無僕射裴三字常侍楊公領湖之南壤地二千里方無之字徳刑之政並勤爵禄之報兩崇乃能志存乎詩書寓辭乎詠歌徃復循環有唱斯和搜竒抉怪雕鏤文字與韋布里閭惟悴專一之士較其毫釐分寸鏗鏘發金石幽眇感鬼神信所謂材全而能鉅者也鬼神方作神鬼兩府之從事與部屬之吏屬而和之茍在編者咸可觀也宜乎施諸樂章紀諸册書在或作有非是從事曰子之言是也告於公書以為荆潭唱和詩序送幽州李端公序李益時佐幽州劉濟幕今相國李藩也元年元和元年今相國李公為吏部貟外郎年下或有春字洪玉父云是年春公猶在江陵安得有偕朝道語愈嘗與偕朝道語幽州司徒公之賢曰某前年被詔告禮幽州徳宗崩以藩為告哀使故至幽州入其地迓勞之使里至每進益恭里或作累或作狎及郊司徒公劉濟也紅帓首鞾許戈切亦作靴袴握刀左右雜佩帓或作帕方從杭本刀下有在字而連讀下文左字為句謝本又校作在右今按若如方意則當云左握刀又雜佩矣不應云握刀在左亦不應唯右有佩也在為衍字無疑杭本誤也禮疏云帶劒之法在左右手抽之為便則刀不當在右謝本亦非矣左右雜佩當自為一句内則所謂左右佩用者也弓䩨服䩨丑亮切韔或作在方從閣杭蜀苑作張引說文云弓施弦為張又云服弓衣也今按韔服皆弓室也然詩云言韔其弓又曰交韔二弓則韔字又可通作虛字用矣此弓韔服謂納弓於服耳况弓之施弦與否於服無利害作張非是矢插房方云左傳抽夫納房房箭舎也俯立迎道左方從杭閣本道作賓非是某禮辭曰公天子之宰禮不可如是及府又以其服即事某又曰公三公不可以將服承命卒不得辭卒上或有及館又如是一句方從閣杭苑粹無之今按此據次第當有此句但下文云上堂即客階坐必東嚮若至館如此即是常禮不足言唯在府如此乃見其尊事天子使者不敢以主禮自居之意當從方本為是上堂即客階坐必東向階下方復出即客二字云文粹亦有即字則知古本誠然也今按復出二字古本雖有然不知是何文理不足為正也愈曰國家失太平於今六十年夫十日十二子相配數窮六十其將復平句平必自幽州始亂之所出也平方作乎今按若作乎字而為上句則下文不應便重出如開元時乎下句但云必自幽州始而上無平字即又不成文理今定作平仍屬下句今天子大聖司徒公勤於禮庶幾帥先河南北之將來覲奉職如開元時乎李公曰然今李公既朝夕左右必數數為上言元年之言殆合矣端公嵗時來壽其親東都東都之大夫士莫不拜於門其為人佐甚忠意欲司徒公功名流千萬嵗請以愈言為使歸之獻方無復出東都字大夫士或作士大夫别本韓文考異巻二十欽定四庫全書别本韓文考異巻二十一宋王伯大重編序送區冊序方云洪謂區冊即𢎞考其始末非也陽山天下之窮處也陸有丘陵之險虎豹之虞江流悍急横波之石廉利侔劒㦸舟上下失勢破碎淪溺者徃徃有之江上或有水有字亷或作其縣郭無居民官無丞尉夾江荒茅篁竹之間小吏十餘家皆鳥言夷面荒茅篁竹蜀本作荒榛茅竹篁諸本作叢方云漢書嚴助傳谿谷之間篁竹之中顔曰竹田曰篁始至言語不通畫地為字然後可告以出租賦奉期約語方作說不下有相字是以賓客遊從之士無所為而至士或作事愈待罪於斯且半嵗矣有區音歐區冶子之後後漢末有長沙區景生者誓言相好自南海挐舟而來升自賓階儀觀甚偉坐與之語文義卓然方無矣字觀或作冠莊周云逃空虗者聞人足音跫旦恭切行聲然而喜矣况如斯人者豈易得哉虚或作谷斯或作其方無斯字皆非是入吾室聞詩書仁義之說欣然喜若有志於其間也與之翳嘉林坐石磯投竿而漁陶然以樂若能遺外聲利而不厭乎貧賤也欣然下或有以字於或作乎間或作聞樂上方無以字厭下方無乎字今按欣然喜陶然樂當為一例故諸本皆有以字而方本皆無然竊詳其文勢之緩急恐上句應無而下句應有也故定從此本嵗之初吉歸拜其親酒壺既傾序以識别吉或作告方云毛氏詩傳云初吉朔日也此葢通言嵗首也拜或作覲送張道士序張道士嵩髙之隱者通古今學有文武長材寄迹老子法中為道士以養其親高方作南下同隠方作有道隠今按有道語似太重當且作九年聞朝廷將治東方貢賦之不如法者三獻書不報長揖而去方下或有諸侯字京師士大夫多為詩以贈而屬愈為序詩曰大匠無棄材尋尺各有施况當營都邑杞梓用不疑張侯嵩山來面有熊豹姿開口論利害劒鋒白差差白或作自非是恨無一尺捶為國笞羌夷捶方作箠詣闕三上書臣非黄冠師臣有膽與氣不忍死茅茨又不媚笑語不能伴兒嬉乃著道士服衆人莫臣知臣有平賊策狂童不難治其言簡且要陛下幸聽之天空日月髙下照理不遺或是章奏繁裁擇未及斯方以杭作期非是寜當不竢報歸袖風披披答我事不爾吾親屬吾思昨宵夢倚門手取連環持今日有書至又言歸何時霜天熟柿栗收拾不可遲嶺北梁可構寒魚下清伊或作漪今按伊水在嵩北若前兩處作嵩南即此處不可作伊若彼作嵩髙則此乃可作伊耳漪字雖可通用然本不以水只是語句辭如書斷斷猗大學作兮荘子猶為人猗亦是此類故說文水部無之但因伐檀連漪淪漪故俗遂加水用之而韓公亦有含風漪之句謂此作漪亦未可知今上文既作嵩髙則此且作伊亦無害若有他證見得上文果當作南則此却當改為漪矣既非公家用且復還其私從容進退間無一不合宜時有利不利雖賢欲奚為但當勵前操富貴非公誰送高閑上人序茍可以寓其巧智使機應於心不挫於氣則神完而守固雖外物至不膠於心堯舜禹湯治天下養叔治射庖丁治牛師曠治音聲扁鵲治病僚之於丸孫曰莊子市南宜僚弄丸而兩家之難解秋之於奕伯倫之於酒樂之終身不厭奚暇外慕夫外慕徙業者皆不造其堂不嚌其胾嚌在誼切胾側吏切補注嚌嘗也胾大臠也禮左殽右胾者也徙或作從非是往時張旭善草書樊曰旭蘇州吳都人新史張顛傳嗜酒每太醉呌呼狂走乃下筆或以頭濡墨而書既醒自以為神不治他伎時或作者善方作喜非是喜怒窘窮憂悲愉佚怨恨思慕酣醉無聊不平有動於心必於草書焉發之喜怒文苑作喜焉草書怒焉草書不平監本作平生皆非是或無焉字觀於物見山水崖谷鳥獸蟲魚草木之花實日月列星風雨水火雷霆霹靂歌舞戰鬬天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世或無猶字非是今閑之於草書有旭之心哉不得其心而逐其跡未見其能旭也為旭有道利害必明無遺錙銖情炎於中利欲鬬進有得有喪勃然不釋然後一决於書而後旭可幾也情方作精而下或無後字今閑師浮屠氏一死生解外膠諸本並作膠方從杭歐謝本作繆云繆莫侯切猶綢繆也莊子内韄者不可繆而捉義葢同此今按膠者黏著之物而其力之潰敗不黏為解今以下文頽墮潰敗之語反之當定作膠是其為心必泊然無所起其於世必淡然無所嗜泊與淡相遭頽墮委靡潰敗不可收拾則其於書得無象之然乎二所下方從杭本皆有於字非是敗方作散然吾聞浮屠人善幻多技能善方從閣作善今按善幻說已見第四巻酬崔少府詩閑如通其術則吾不能知矣閑下或有師字方云此篇用意皆本於莊子所稱宋元君畫圖有一史後至解衣槃礴嬴郭注云内足者神數而意定又云士彦法謂退之此數語乃深得祖師向上體歇一路其見處勝裴休逺甚今按韓公本意但謂人必有不平之心鬱積之久而後發之則其氣勇決而伎必精今髙閑既無是心則其為伎宜其潰敗委靡而不能竒但恐其善幻多伎則不可知耳此自韓公所見非如畫史祖師之說也送殷員外序唐受天命為天子凡四方萬國不問海内外無小大咸臣順於朝方從閣杭無萬字今按如此則與下文不相應又杭本無於字皆非是時節貢水土百物大者特來小者附集元和睿聖文武皇帝既嗣位悉治方内就法度十二年詔曰四方萬國惟回鶻於唐最親奉職尤謹丞相其選宗室四品一人持節徃賜君長告之朕意又選學有經法通知時事者一人與之為貳法或作術由是殷侯侑自太常博士遷尚書虞部貟外郎兼侍御史朱衣象笏承命以行杭本無命字非是朝之大夫莫不出餞酒半右庶子韓愈執盞言曰殷大夫今人適數百里出門惘惘有離别可憐之色持被入直三省丁寧顧婢子語刺刺不能休今子使萬里外國獨無幾微出於顔面豈不真知輕重大丈夫哉殷大夫或作殷侯持或作襆入直三省方云洪慶善謂唐無三省持被直入當為句絶三息暫反省息井切朱新仲云唐以侍中兩令為三省長官張籍寄白舎人詩三省比年名望重說者以唐無三省非也若不言三省不知入直何所以上下文考之朱說為長刺刺方云洪慶善云刺音慮達反樊云刺七迹切若如洪讀則當以類為義顧婢子語何戾耶潘岳閣道謡和嶠刺促不得休語意皆同此當以七迹切為正丞相以子應詔真誠知人士不通經果不足用於是相屬為詩以道其行云人下或有矣字送楊少尹序昔疏廣受二子以年老一朝辭位而去疏或作踈方云漢書作疏今按疏正字踈俗體也于時公卿設供張祖道都門外車數百兩道路觀者多歎息泣下共言其賢張或作帳方云謂供具張設也音竹亮切公送石𢎞序張上東門只用張字况二疏本傳自可考漢書如髙祖留沛張飲黥布傳張御食飲皆謂張設也漢史既傳其事而後世工畫者又圖其迹至今照人耳目赫赫若前日事國子司業楊君巨源方以能詩訓後進一旦以年滿七十亦白丞相去歸其鄉或無一旦二字世常說古今人不相及今楊與二疏其意豈異邪及方從閣杭本作古及上或别有方字其意豈異也或作豈其異意邪皆非是予忝在公卿後遇病不能出不知楊侯去時城門外送者幾人車幾兩馬幾疋或無幾人字疋字或作駟道邊觀者亦有歎息知其為賢以否以與通用之例前已屢見此為最明白者而太史氏又能張大其事為傳繼二疏蹤跡否不落莫否方從閣本無蹤跡否三字非是或但無否字亦非見今世無工畫者而畫與不畫固不論也然吾聞楊侯之去丞相有愛而惜之者白以為其都少尹不絶其祿惜下方從閣杭本無之字曰或作署或無白字又為歌詩以勸之京師之長於詩者亦屬而和之又不知當時二疏之去有是事否古今人同不同未可知也不下或無同字中世士大夫以官為家罷則無所於歸或無於字非是楊侯始冠舉於其鄉歌鹿鳴而來也鄉或作家今之歸指其樹曰某樹吾先人之所種也某水某丘吾童子時所釣遊也鄉人莫不加敬誡子孫以楊侯不去其鄉為法古之所謂鄉先生沒而可祭於社者其在斯人與其在斯人與二語方從閣杭本皆無在字送權秀才序伯樂之廐多良馬卞和之匱多美玉卓犖瓌怪之士宜乎遊於大人君子之門也怪或作奇相國隴西公既平汴州西下或有董字天子命御史大夫呉縣男為軍司馬縣或作郡方云非也造晉祭文石本可考下同門下之士權生實從之來權生之來固若常人耳之來下或有觀字其文辭引物連類窮情盡變宫商相宣金石諧和寂寥乎短章舂容乎大篇如是者閲之累日而無窮焉和方從閣杭蜀苑作聲云晉范啟謂孫綽天台山賦曰恐為金石非中宮商故文章以諧聲為尚公進平淮西表曰叢雜乖戾律呂失次亦謂此也今按諧和即謂其聲之和耳若作諧聲却犯本字而語意亦不活方說非是閲或作聞愈嘗觀於皇都每年貢士至千餘人或與之遊或得其文若權生者百無一二焉如是而將進於明有司重之以吳縣之知其果有成哉於是咸賦詩以贈之送湖南李正字序或作送李􅀈判官正字歸湖南方云􅀈之父仁鈞也貞元中愈從太傅隴西公平汴州李生之尊府以侍御史管汴之鹽鐵日為
