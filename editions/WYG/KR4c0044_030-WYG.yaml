body:
  text: 碑誌唐故監察御史衛府君墓誌銘樊曰公此誌自與弟中行别以下至可餌以不死造語雄奇所謂唯陳言之務去者也君諱某字某或作諱之𤣥字造微中書舍人御史中丞諱某之子某或作晏贈太子洗馬諱某之孫某或作璿方云按元和姓纂晏三子長子𤣥次中立次中行汪彦章云王仲一本謂此衛中立墓誌中立字退之非之𤣥也家世習儒學詞章昆弟三人俱傳父祖業從進士舉君獨不與俗為事樂弛置自便不下方有興字云讀去聲非是或疑此與字當作以更詳之弛或作施父中丞薨既三年與其弟中行别曰若既克自敬勤及先人存趾美進士續聞成宗唯服任遂功為孝子在不怠我恨已不及假令今得不足自貰音謝又音世或作貴作貫我聞南方多水銀丹砂雜他奇藥爊於刀切又音禄煉也煨也為黄金可餌以不死今於若丐我我即去遂踰嶺阨於革刼塞也南出藥貴不可得以干容帥帥且曰若能從事於我可一日具許之得藥試如方不效曰方良是我治之未至耳留三年藥終不能為黄金而佐帥政成以功再遷監察御史帥遷于桂從之帥坐事免君攝其治厯三時夷人稱便新帥將奏功君捨去南海馬大夫使謂君曰幸尚可成兩濟其利君雖益厭然不能無萬一冀至南海未幾竟死年五十三子曰某某或作景微元和十年十二月某日歸塟河南某縣某鄉某村祔先塋某縣某鄉某村諸本作伊闕縣伊國鄉髙都村於時中行為尚書兵部郎號名人而與余善請銘或無於字郎下或有中字銘曰嗟惟君篤所信方云信音新漢武悼李夫人賦申以信兮要無有弊精神以弃餘賈於人脱外累自貴珍訊來世述墓文唐故河南令張君墓誌銘君諱署字某河間人大父利貞有名𤣥宗世為御史中丞舉彈無所避由是出為陳留守領河南道採訪處置使數嵗卒官皇考諱郇以儒學進官至侍御史郇或作詢君方質有氣形貌魁碩長於文詞以進士舉博學宏詞為校書郎自京兆武功尉拜監察御史為幸臣所讒與同軰韓愈李方叔三人俱為縣令南方三年逢恩俱徙掾江陵半嵗邕管奏君為判官改殿中侍御史不行拜京兆府司録諸曹白事不敢平面視共食公堂抑首促促就哺歠揖起趍去無敢闌語促促或作旦旦方云促如齪齪之促本或作娖娖闌或作間縣令丞尉畏如嚴京兆事以辦治辧或作幹京兆改鳯翔尹以節鎮京西請與君俱改禮部員外郎為觀察使判官帥它遷君不樂久去京師謝歸用前能拜三原令嵗餘遷尚書刑部員外郎守法争議棘棘不阿方从諸本無議字及下棘字而云晁本校増此二字阿或作撓今按歐公常疑此句有脱字不知晁氏以何本校也詳其文理當有此字故从之改䖍州刺史民俗相朋黨不訴殺牛牛以大耗或無不訴字又多捕生鳥雀魚鼈可食與不可食相買賣時節脱放期為福祥君視事一皆禁督立絶祥下或有事字或無視字二字或但有事字使通經吏與諸生之旁大郡學鄉飲酒喪婚禮張施講説民吏觀聴從化大喜經吏或作經史度支符州折民户租嵗徴緜六千屯比郡承命惶怖立期日惟恐不及事被罪君獨疏言治迫嶺下民不識蠶桑月餘免符下民相扶擕守州門呌讙為賀改灃州刺史民税出雜産物與錢尚書有經數觀察使牒州徵民錢倍經君曰刺史可為法不可貪官害民留噤不肯從竟以代罷可為法疑必有脱誤或為字當作守觀察使使劇吏案簿書十日不得毫毛罪吏或作史改河南令而河南尹適君平生所不好者君年且老當日日拜走仰望階下不得已就官數月大不適即以病辭免公卿欲其一至京師君以再不得意於守令恨曰義不可更辱又奚為於京師間竟閉門死年六十或無閉門二字君娶河東栁氏女二子昇奴胡師將以某年某月某日塟某所其兄將作少監昔請銘於右庶子韓愈昔或作者方云李遜赴襄陽送行詩有著作郎張昔愈前與君為御史被讒俱為縣令南方者也最為知君銘曰誰之不如而不公卿奚養之違以不久生唯其頏頏以世厥聲鳯翔隴州節度使李公墓誌銘一本上有唐故字度下有觀察使開府儀同三司檢校户部尚書贈尚書左僕射字公諱惟簡或作某字某司空平章事贈太傅之子太傅初姓張氏肅宗時舉恒趙深冀易定六州戰卒五萬人馬五千匹以歸聴命天子嘉之賜姓曰李更其名寳臣名下或有曰字立其軍號之曰成徳由是姓李氏太傅死公兄弟讓嗣公竟棄其家自歸京師及兄死家覆有司設防守徳宗如奉天守卒出公即馳歸與母韓國夫人鄭氏拜訣屬家徒隨走所幸道與賊遇七鬭乃至有功遷太子諭徳加御史中丞從幸梁州天黑失道識焦中人聲得見徳宗於􅉦厔上音輈下音窒雍縣名屬鳯翔西上曰卿有母可隨我耶可或作何曰臣以死從衛及幸還録功封武安郡王號元從功臣王或作公方云考之史當作王圖其形御閣而以神威將軍居北軍衛居或作為衛或作御久乃加御史大夫丁韓國憂去官累遷神威大將軍加工刑二曹尚書天威統軍又改户部尚書金吾大將軍有長上萬國俊者以軍勢奪興平人地吏憚莫敢治上方作尚新史蜀本作上今按長上葢衛卒之號猶今言長人也當从蜀本及公為金吾興平人曰久聞李將軍為人公平庶能直吾屈即齎縣牒來見公發視立杖國俊廢之以地還興平人聞者莫不稱歎於是天子以公材果可任用治人將兵無所不宜元和六年即以公為鳯翔隴州節度使户部尚書兼鳯翔尹隴州地與吐蕃接舊常朝夕相伺更入攻抄人吏不得息公以為國家於夷狄當用長筭邉將當承上㫖謹條教方作務非是蓄財榖完吏農力以俟不宜規小利起事盗恩禁不得妄入其地益市耕牛鑄鎛釤鉏斸鎛音博釤山監切鉏陟初切又仕葅切與耡同去穢助苗斸陟玉切集注詩痔乃錢鎛注田器也釤大鎌也斸大鋤也以給農之不能自具者丁壯興勵興或作愈嵗増田數十萬畝連八嵗五種俱熟公私有餘販者負入褒斜音邪孫曰梁州記萬石城沂漢上七里有褒谷南口曰褒北口曰斜長四百七十里褒水通沔斜水通渭選右界上褒斜船循渭而下首尾相繼不絶十三年公與忠武軍節度使司空光顔邠寧節度使尚書釗俱來朝上為之燕三殿張百戲公卿侍臣咸與方云唐麟徳殿有三面故曰三殿既事勅還公因進曰臣幸得宿衞四十餘年或無得字今年老斥外任不勝慕戀願得死輦下天子加慰遣焉斥或作許或作訴還鎮告疾其夏五月戊子薨年五十五訃至上悼愴罷朝遣郎中臨弔贈尚書左僕射以其年十一月景申葬萬年鳯棲原萬年下或冇縣字夫人博陵郡崔氏河陽尉鎬之孫大理評事可觀之女賢有法度賢下或有而字公有四子長曰元孫三原尉次曰元質彭之濛陽尉曰元立興平尉曰元本河南參軍皆愿敏好善元立元本皆崔氏出葬得日嗣子元立與其昆弟四人請銘於韓氏曰先人嘗有託於夫子也愈曰太傅功在史氏記僕射以孤童囚羈京師或無記字童下方有子字今按翟方進傳無者為是卒能以忠為節自顯取爵位立名績使天下拭目觀父母與榮焉既忠又孝法宜銘或無銘字銘曰太傅之顯自其躬興僕射童羈孰與之朋遭國之難以節自發致其勤艱以復考烈孝由忠立爵名隨之銘此𤣥石維昧之詒唐故中散大夫少府監胡良公墓神道碑此篇從方氏石本疑者别出蜀本注牛僧孺撰墓志陳鴻撰謚張籍撰行狀今按方本無中散大夫良五字又它神道碑不著墓字唯此有之亦變例也少府監胡公者諱珦字潤博年七十九以官卒明年八月十四日葬京兆奉先夫人天水趙氏祔焉八月或作七月或無十四日字其子逞廼巡遇述遷造或無廼字或無巡字與公壻廣文博士吳郡張籍以公之族出行治厯官夀年為書出下或有處文二字非是使人自京師南走八千里至閩南兩越之界上請為公銘刻之墓碑於潮州刺史韓愈曰胡姓本出安定後徙清河於今為宗城屬具州河下或有複出清河字大父諱秀武后時以文材徵為麟臺正字父宰臣用進士卒官平陽冀氏令贈潭州大都督或無官字公早孤能自勸學立節槩非其身力不以衣食勸或作勤凡一試進士二即吏部選皆以文章占上第樂為儉勤自刻削不干人以矯時弊樂方作出非是及為富平尉一府稱其斷决建中四年侍郎趙賛為度支使薦公為監察御史主餽給渭橋以東軍洗手奉職不以一錢假人賊平有司考覆羣吏多坐貶死考覈方或作覈考或無貶或無死字獨公以清苦能檢飭無漏失遷河南倉曹魏公賈躭以節鎮鄭滑以公佐觀察事檢校尚書工部員外郎以剛直齟齬不阿忤權貴除獻陵髙祖陵令居陵下七年市置田宅務種樹為業以自給教授子弟業下方無以字杭併無以自給字子弟或作弟子貞元十一年吏部大選以公考選人藝學以勞遷奉先令以治辧遷尚書膳部郎中改坊州刺史州經亂無孔子廟公至則命築宫造祭器率博士生講讀以時如法以祠人吏聚觀歎息生下或有徒字遷舒州刺史州嵗大熟麥一莖數穗閭里歌舞之或無舞字考功以聞遷尚書駕部郎中數以事犯尚書李㢲㢲時主鹽鐵事富驕恃勢以語丞相丞或作宰由是退公為鳯翔少尹㢲死遷少大理改少詹事元和十二年朝廷以公年老能自秪力事職不懈可嘉拜少府監兼知内中尚明年以病卒方無病字非是公始以進士孤身旅長安致官九卿為大家七子皆有學守女嫁名人年幾八十堅悍不衰事可傳載可謂成徳謂或作為非是銘曰朅朅丘竭切武壯貌胡公既果以方挾藝射科每發如望音忘人求於人我已為之自始訖終不降色辭因官立事隨有可載發跡餽軍遭讒府介軍或作運去居陵下為吏為隠坊舒之政于兹有靳或作歎守官駕部名昇巳屈昇或作升已或作民躋于少府甚宜秩物不配其有君子恥之少府古卿公優止之刻文碑石以顯公行維公後人無怠嗣慶維公或作維彼唐故相權公墓碑上之元和六年其相曰權公諱徳輿字載之其本出自殷帝武丁武丁之子降封於權權江漢間國也周衰入楚為權氏楚滅徙秦而居天水略陽苻秦之王中國其臣有安丘公翼者有大臣之言後六世至平凉公文誕為唐上庸太守荆州大都督長史焯有聲烈焯或作綽平凉曽孫諱倕贈尚書禮部郎中以藝學與蘇源明相善卒官羽林軍録事參軍於公為王父郎中生贈太子太保諱臯以忠孝致大名去官累以官徵不起追謚貞孝是實生公公在相位三年其後以吏部尚書授節鎮山南年六十以薨贈尚書左僕射謚文公以薨以或作六方考舊史云當作公生三嵗知變四聲知或作能四嵗能為詩七嵗而貞孝公卒來弔哭者見其顔色聲容皆相謂權氏世有其人及長好學孝敬祥順貞元八年以前江西府監察御史徵拜博士朝士以得人相慶改左補闕章奏不絶譏排姦倖與陽城為助轉起居舍人遂知制誥凡撰命詞九年以類集為五十巻天下稱其能十八年以中書舍人典貢士拜尚書禮部侍郎薦士於公者其言可信不以其人布衣不用即不可信雖大官勢人交言一不以綴意奏廣嵗所取進士明經在得人不以員拘轉户兵吏三曹侍郎太子賔客復為兵部遷太常卿天下愈推為鉅人長徳時天子以為宰相宜參用道徳人因拜禮部尚書同中書門下平章事公既謝辭不許其所設張舉措必本於寛大以幾教化多所助與方作為或無此一字今按助與如後救于頔事之類是也作為非是維匡調娛不失其正中於和節不為聲章因善與賢不矜主已矜或作務以吏部尚書留守東都東方諸帥有利病不能自請者公常與疏陳不以露布不以或無不字露布或作布露復拜太常轉刑部尚書考定新舊令式為三十編舉可長用方無長字其在山南河南勤于選付治以和簡人以寧便以疾求還十三年某月甲子道薨于洋之白草奏至天子痌傷為之不御朝痌或作痛郎官致贈錫官居野處上下弔哭皆曰善人死矣其年某月日塟河南北山在貞孝東五里月下或有某字公由陪屬升列年除嵗遷以至公宰人皆喜聞若巳與有無忌嫉者于頔坐子殺人失位自囚親戚莫敢過門省顧朝莫敢言者顧下或有者字朝上或有在字公將留守東都為上言曰頔之罪既貰不竟宜因賜寛詔公下或有時字曰下或有于字上曰然公為吾行諭之頔以不憂死前後考第進士及庭所䇿試士踵相躡為宰相達官與公相先後其餘布處臺閣外府凡百餘人自始學至疾未病未嘗一日去書不觀或無未病二字公既以能為文辭擅聲於朝多銘卿大夫功徳或無能字然其為家不視簿書未嘗問有亡費不偫餘視或作親問下或有其字諸本偫作待或作諸公娶清河崔氏女其父造嘗相徳宗號為名臣徳或作代方考宰相表云當作徳既塟其子監察御史璩音渠纍然服喪來有請服喪或作喪服方無來字乃作銘文或無銘字曰權在商周世無不存無或作次滅楚徙秦嬴劉之間甘泉始侯以及安丘詆訶浮屠皇極之扶貞孝之生鳯鳥不至或作至世爵位豈多半塗以税以或作已夀考豈多四十而逝惟其不有以惠厥後是生相君為朝徳首行世祖之文世師之祖或作師師或作推或作祖流連六官出入屏毗無黨無讎舉世莫疵人所憚為公勇為之憚為或作憚焉其所競馳公絶不窺其方作人競作共絶作有今按作絶乃與上文勇字相應孰克知之徳將在斯克或作先刻詩墓碑以永厥垂平淮西碑并序樊曰宰相裴度為淮西宣慰處置等使公為行軍司馬蔡平隨度還朝詔撰平淮西碑公以吳元濟之平由度能固天子意得不赦卒擒之多歸度功而李愬特以入蔡功居第一愬妻唐安公主女也出入禁中訴碑不實帝詔斲其文更命翰林學士叚文昌為之見舊史公傳及新史吳元濟傳文昌之文見姚鉉文粹其與公作不待較而明蘇内翰録臨江驛小詩云淮西功業冠吾唐吏部文章日月光千載斷碑人膾炙不知世有叚文昌盡之矣陳無巳曰龍圖孫學士覺喜論文謂退之淮西碑叙如書銘如詩又云少㳺謂元和聖徳詩於韓文為下與淮西碑如出兩手葢其少作也商隠讀韓碑詩元和天子神武姿彼何人哉軒與羲誓将上雪列聖恥坐法宫中朝四夷淮西有賊五十載封狼生貙貙生羆不據山河據平地長戈利矛日可麾帝得聖相相曰度賊斫不死神扶持腰懸相印作都統陰風慘淡天王旗愬武古通作牙爪儀曹外郎載筆隨行軍司馬智且勇十四萬衆猶虎貔入蔡縳賊獻太廟功無與比恩不訾帝曰汝度功第一汝從事愈宜為辭愈拜稽首蹈且舞金石刻畫臣能為古今世稱大手筆此事不繫於職司當仁自古有不避言訖屢頷天子頥公退齋戒坐小閤濡染大筆何淋漓㸃竄堯典舜典字塗改清廟生民詩文成破體書在紙清晨再拜鋪丹墀表曰臣愈昧死上詠神聖功書之碑碑髙三丈字如手負以靈龜蟠以螭句竒語重喻者少讒之天子言其私長繩百尺拽碑倒麄砂大石相磨治公之斯文若元氣先時已入人肝脾湯盤孔鼎有述作今無其器存其辭嗚呼聖皇及聖相相與烜爀流淳熈公之斯文不示後曷與三五相攀追願書萬本頌萬過口角流沫右手胝傳之七十有三代以為封禪玉檢明堂基天以唐克肖其徳聖子神孫繼繼承承於千萬年敬戒不怠全付所覆四海九州罔有内外悉主悉臣髙祖太宗既除既治髙宗中睿休養生息至于𤣥宗受報收功極熾而豐物衆地大孽牙其間肅宗代宗徳祖順考以勤以容大慝適去稂莠不薅奴豆切又奴毛切薅器也以刺地除草詩以薅荼蓼相臣將臣文恬武嬉習熟見聞以為當然睿聖文武皇帝既受羣臣朝帝下或有陛下字非是乃考圖數貢方無乃字數色阻切祝曰謂考與地之廣狹計貢賦之至與不至曰嗚呼天既全付予有家本傳次在予予不能事事其何以見于郊廟羣臣震懾奔走率職方無奔率二字明年平夏綏銀節度留後李惠琳叛兵馬使張承金討斬之又明年平蜀劒南節度韋臯卒行軍司馬劉闢自稱留後東川節度髙崇文擒劉闢以獻又明年平江東又明年平澤潞蜀下方有西川字云劉闢求都統三川方圍梓州而敗亂固不及他郡也今按既圍梓州則亂已及東川矣方説非是鎮州招討使吐突承璀執昭義節度盧從史歸京師遂定易定義成節度張茂昭以易定二州歸于有司致魏博貝衛澶相魏博節度田𢎞正以所管六州歸于有司無不從志皇帝曰不可究武予其少息究或作窮九年蔡將死蔡人立其子元濟以請不許遂燒舞陽犯葉襄城以動東都放兵四刼城上或有等字洪云此謂葉與襄城耳等字非是皇帝歴問于朝一二臣外或作外臣方从杭苑無外字今按此句若作外臣則當時朝臣自以伐蔡為不可非獨外臣也若作一二臣則當時舉朝之臣皆以伐蔡為不可又非獨一二人也考之下文所謂一二臣同不為無助者又正指武元衡裴度一二人賛伐蔡之謀者而言則此乃謂唯一二臣以為可而其外羣臣皆以為不可耳諸本作外臣及無外字皆非是唯作臣外者得之皆曰蔡帥之不廷授于今五十年帥或作師于或作於傳三姓四將其樹本堅兵利卒頑不與他等因撫而有順且無事大官臆决唱聲萬口和去聲附并為一談牢不可破并或作併皇帝曰惟天惟祖宗所以付任予者庶其在此予何敢不力天上或有夫字非是或無何况一二臣同不為無助不上或有國字曰光顔汝為陳許帥維是河東魏博郃音合在同州縣名陽三軍之在行者汝皆將之郃或作涇非是曰重𦙍汝故有河陽懷今益以汝維是朔方義成陜益鳯翔延慶七軍之在行者汝皆將之延慶本或作鄜延寧慶曰𢎞汝以卒萬二千屬而子公武往討之屬下方有集字或在公武下皆非是曰文通汝守夀維是宣武淮南宣歙浙西四軍之行于夀者汝皆將之西上或有徐泗字四或作五皆非是曰道古汝其觀察鄂岳曰愬汝帥唐鄧隨各以其兵進戰曰度汝長御史其往視師曰度惟汝予同汝遂相予以賞罰用命不用命曰𢎞汝其以節都統諸軍節下或冇度字諸方作討今按前輩有引左傳討其軍實為討軍之證者恐未必然若必作討則秦之罘刻石自有遂發討師之語而晉官有都督征討諸軍事皆足為證不必引左傳却不相似也但公所作韓𢎞碑但云都統諸軍則作討者為誤矣不可以偶有旁證而强引以从之也曰守謙汝出入左右汝惟近臣其往撫師汝惟或作惟汝曰度汝其往衣服飲食予士衣去聲食音嗣無寒無飢以既厥事遂生蔡人方無服飲字或無服字有飲字或無衣服字寒下或無無字賜汝節斧通天御帶衛卒三百凡兹廷臣汝擇自從惟其賢能無憚大吏庚申予其臨門送汝曰御史予閔士大夫戰甚苦自今以往非郊廟祠祀其無用樂祀下或無其字顔𦙍武合攻其北大戰十六得柵城縣二十三降人卒四萬或無人字方云此謂降其民與卒也故下語皆不再出人卒字今按莊子云人卒雖衆公語亦有自也道古攻其東南八戰降萬三千再入申破其外城降下或有卒字文通戰其東十餘遇降萬二千愬入其西得賊將輒釋不殺用其策戰比有功比或作皆十二年八月丞相度至師都統𢎞責戰益急顔𦙍武合戰益用命元濟盡并其衆洄曲以備師或作帥非是洄方作廻今按洄與史合十月壬申愬用所得賊將自文城因天大雪疾馳百二十里用半夜到蔡破其門取元濟以獻盡得其屬人卒馳或作走辛巳丞相度入蔡以皇帝命赦其人淮西平大饗賚功師還之日因以其食賜蔡人凡蔡卒三萬五千其不樂為兵願歸為農者十九悉縱之斬元濟京師方無歸字濟下或有於字冊功𢎞加侍中愬為左僕射帥山南東道顔𦙍皆加司空公武以散騎常侍帥鄜音浮坊丹延道古進大夫文通加散騎常侍方云考之史及叚文昌碑皆合一本無大夫文通加五字非是道古時巳為中丞故不復言御史也今按道古墓志亦可考丞相度朝京師道封晉國公進階金紫光禄大夫以舊官相或無道字或作進或無國字而以其副總為工部尚書領蔡任既還奏羣臣請紀聖功被之金石皇帝以命臣愈帝下或無以字臣愈再拜稽首而獻文曰唐承天命遂臣萬邦或作方孰居近土襲盗以狂往在𤣥宗崇極而圮部鄙切毁也在方作居云唐人多以在為居公本政亦曰居我其周從是也今按以在為居亦草書之誤本政居字已論於本篇方説非是河北悍驕河南附起四聖不宥屢興師征有不能克益戍以兵夫耕不食婦織不裳輸之以車為卒賜糧外多失朝曠不嶽狩百𨽻怠官事亡其舊百𨽻怠官或作百司怠官亡或作忘帝時繼位顧瞻咨嗟惟汝文武孰恤予家既斬吳蜀旋取山東吳蜀方作蜀吳取或作出魏將首義六州降從淮蔡不順自以為强提兵呌讙欲事故常始命討之遂連姦鄰陰遣刺客來賊相臣方戰未利内驚京師羣公上言莫若惠來公或作臣帝為不聞與神為謀乃相同徳以訖天誅乃方作及非是乃敕顔𦙍愬武古通咸統於𢎞各奏汝功奏方作走非是三方分攻祝曰謂顔𦙍武攻其北道古攻其東南文通戰其東也五萬其師大軍北乗厥數倍之常兵時曲軍士蠢蠢既翦陵雲蔡卒大窘勝之邵陵郾城來降勝或作遂自夏入秋復屯相望入或作及復或作複兵頓不勵告功不時帝哀征夫命相往釐士飽而歌馬騰於槽試之新城賊遇敗逃盡抽其有聚以防我西師躍入道無留者􅋕􅋕音額弋貌書罔書夜􅋕􅋕注肆惡蔡城其壃千里壃或作疆既入而有莫不順俟帝有恩言相度來宣誅止其魁釋其下人釋其或作釋于蔡之卒夫投甲呼舞蔡之婦女迎門笑語蔡人告飢船粟往哺蔡人告寒賜以繒布賜以方作詔賜非是始時蔡人禁不往來今相從戲里門夜開始時蔡人進戰退戮今旰而起左飱右粥旰方作眠飱或作粲方云舊史皆作飱今按還予授子之粲兮傳云粲餐也史記粲未及下咽酒未及濡脣漢書令其禆将傳粲則餐字亦有義公祭鄭夫人文念寒而衣念飢而餐同以衣對餐也或當作餐為之擇人以收餘憊收或作牧選吏賜牛教而不税蔡人有言始迷不知今乃大覺差前之為蔡人有言天子明聖不順族誅順保性命汝不吾信視此蔡方孰為不順往斧其吭古郎切喉也凡叛有數聲勢相倚吾强不支汝弱奚恃其告而長而父而兄或作及汝父兄奔走偕來同我太平偕來方作來偕淮蔡為亂天子伐之既伐而飢天子活之始議伐蔡卿士莫隨既伐四年小大並疑不赦不疑由天子明凡此蔡功惟斷乃成既定淮蔡四夷畢來既定淮蔡或作淮蔡既定遂開明堂坐以治之别本韓文考異巻三十欽定四庫全書别本韓文考異巻三十一宋王伯大重編碑誌南海神廟碑
