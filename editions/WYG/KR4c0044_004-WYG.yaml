body:
  text: 古詩劉生詩或無詩字生名師命其姓劉自少軒輊下竹二切韓曰詩云戎車既安如輊如軒又馬援傳居前不能令人輊居後不能令人軒非常儔輊或作軼棄家如遺來逺遊東走梁宋暨揚州暨或作堕遂凌大江極東陬下將侯切東陬謂越也洪濤舂天禹穴幽越女一笑三年留南逾横嶺入炎州或作洲青鯨髙磨波山浮鯨或作鮮長今按青義未詳疑是字之誤怪魅炫耀堆蛟虬魅或作媚堆或作推非是山㺑讙譟猩猩游㺑或作獠非是方云㺑蘇遭切神異經西方深山有人長尺餘袒身捕􅀈蟹以食名曰山㺑國語注作㺐公聯句亦有中矢類妖㺑游或作愁方云此詩二州字二游字視古用韵後人誤改也毒氣爍體黄膏流問胡不歸良有由美酒傾水䏑之夜切與炙同又側吏切肥牛妖歌慢舞爛不收倒心迴腸為青眸千金邀顧不可酬乃獨遇之盡綢繆瞥然一餉成千秋餉或作曏非是昔鬂未生今白頭五管嶺南有經畧軍謂之五管容廣邕桂安南歴徧無賢侯迴望萬里還家羞陽山窮邑惟猿猴手持釣竿逺相投我為羅列陳前修芟蒿斬蓬利鋤耰天星迴環數纔周文學穰穰豊也如兩切囷去輪切祝曰倉庾也藏也倉圓曰囷禮記修囷倉倉稠車輕御良馬力優咄哉識路行勿休韓曰終篇盖有且諷且勸之意上云問胡不歸良有由即先之以越女一笑三年留繼以妖歌慢舞爛不收則知劉生所寓皆不羈也往取將相酬恩讐鄭羣贈簟羣嘗以侍御史佐裴均江陵孫曰羣字洪之時以殿中侍御史佐裴均江陵軍公自陽山量移法曹與羣同僚樊云唐孔幾私記云退之豐肥善睡毎來吾家必命枕簟而沈存中筆談世韓退之小面而美髯着紗㡌此乃江南韓熈載爾熈載諡文靖江南人謂之韓文公因此遂誤以為退之退之肥而少髯此詩有腰腹空大及慢膚多汗之語信然蘄州笛竹韓云蘄州在今洧南其地出竹可用為笛今以之為簟耳天下知笛或作簞鄭君所寶尤􅅛竒携來當晝不得卧一府傳看黄琉璃體堅色静又藏節盡眼凝滑無瑕疵盡或作滿法曹貧賤衆所易腰腹空大何能為自從五月困暑濕如坐深甑遭蒸炊手磨袖拂心語口慢膚多汗真相宜日暮歸來獨惆悵有賣直欲傾家資誰謂故人知我意巻送八尺含風漪於離切水紋呼奴掃地鋪未了光彩照耀驚童兒青蠅側翅蚤音早抱朴子曰蚤蝨攻君卧不獲安蝨避肅肅疑有清飈吹倒身甘寢百疾愈却願天日恒炎曦明珠清玉選張衡四愁詩美人贈我貂襜褕何以報之明月珠美人贈我錦繡叚何以報之青玉案不足報贈子相好無時衰閤本無時作時無非是豐陵行順宗時羽衛煌煌一百里一或作三方云以長安志考之非是曉出都門𦵏天子羣臣雜沓馳後先宫官穰穰來不已是時新秋七月初金神按節炎氣除清風飄飄輕雨灑偃蹇旂斾巻以舒逾梁下坂笳鼓咽方作沸悲今按作咽乃響又見切之意也嵽嵲絰臬二音山小而不安貌遂走𤣥宫閭方云選注天子后妃所𦵏墓曰𤣥宫閭謂𤣥宫前之寓閭也閭或作虛非是哭聲訇呼宏切天百鳥噪幽坎晝閉空靈輿皇帝孝心深且逺資送禮備無贏餘設官置衛鎻嬪妓孫曰唐制諸陵皆置宫殿列曹設嬪妃侍衛如平生杜甫橋陵詩云宫女晚知曙祠臣朝見星韓曰終篇言三代舊制存諸書當時之禮必有不合於古者故云供養朝夕象平居養或作送臣聞神道尚清浄三代舊制存諸書墓藏廟祭不可亂欲言非職知何如遊青龍寺贈崔太補闕諸本太作羣秋灰初吹季月管日出卯南暉景短友生招我佛寺行正值萬株紅葉滿韓曰東坡嘗謂此句初不曉其故及觀小説鄭䖍寓青龍寺貧無紙取柿葉學書九月柿葉赤而實紅退之詩謂此光華閃壁見神鬼壁或作璧赫赫炎官張火傘然雲燒樹火實駢金烏下啄頳虬卵頳音檉赤色韓曰上聮詠柿葉之紅而光華之粲然下聯詠柿實之赤而日光之交映火傘頳虬皆狀其紅而取喻之工如此魂翻眼倒忘處所倒或作暈赤氣冲融無間斷有如流傳上古時九輪孫云淮南子曰堯時十日並出草木焦枯堯命羿仰射十日中其九烏皆死九輪謂九日車輪也照燭乾坤旱二三道士席其間靈液屢進頗黎盌音椀孫曰頗黎玉名其色赤出西域亦作波黎祝曰盌説文小盂也選逸珠盈盌此謂食柿也忽驚顔色變韶稚忽方作勿非是韶或作離方云韶有美義不必易字却信靈仙非怪誕桃源迷路竟茫茫棗下古曲名歌曰棗下纂纂朱實離離宛其落矣化為枯枝人生不能行樂死何以虛諡為悲歌徒纂纂前年嶺隅鄉思發躑躅成山開不算去嵗羇㠶湘水明霜楓千里隨歸伴猿呼鼯嘯鷓鴣啼嘯或作笑非是惻耳酸腸難濯澣惻或作側非是思君􅂝手安能得今者相從敢辭懶由來鈍騃語駭切寡參尋騃或作駭非是况是儒官飽閒散惟君與我同懐抱鋤去陵谷置平坦年少得途未要忙時清諌䟽尤宜罕何人有酒身無事誰家多竹門可欵韓曰後漢孔融嘗曰坐上客嘗滿樽中酒不空吾無事矣晉王子猷好竹吴中士大夫家有好竹欲觀之便出輿造竹下諷嘯良久蔡寛夫云此一對尤閒逺有味須知節候即風寒幸及亭午猶妍暖南山逼冬轉清痩刻畫圭角出崖窽音欵空也莊子道大窽當憂復被氷雪埋汲汲來窺誡遲緩贈崔立之評事崔侯文章苦捷敏髙浪駕天輸不盡曽從闗外來上都外或作内非是隨身巻軸車連軫止忍切車後木孫曰連軫言數車相接朝為百賦猶鬰怒暮作千詩轉遒𦂳揺毫擲簡自不供頃刻青紅浮海蜃音腎能吐氣為樓臺海中春夏間見祝曰大蛤也前漢海旁蜃氣象樓臺才豪氣猛易語言往往蛟螭雜螻蚓上音樓下音引蚯蚓也知音自古稱難遇世俗乍見那妨哂勿嫌法官未登朝猶勝赤尉長趍尹時命雖乖心轉壯技能虛富家逾窘念昔塵埃兩相逢争名齟齬持矛楯音盾兵噐子時專場誇觜距専或作擅余始張軍嚴韅靷上曉見切下以忍切駕牛具在背曰韅在胷曰靷爾來但欲保封疆莫學龎涓怯孫臏音牝竄逐新歸厭聞閙齒髪早衰嗟可閔頻䝉怨句刺棄遺豈有閒官敢推引深藏篋笥一時發戢戢已多如束筍可憐無益費精神有似黄金擲虛牝洪曰牝谿谷也殷仲文曰哀壑可虛牝當今聖人求侍從㧞擢杞梓收楛音戸木名可以為矢簳箘音窘美竹東馬嚴徐已奮飛枚皐即召窮且忍復聞王師西討蜀霜風冽冽摧朝菌音窘地蕈朝生暮死韓曰莊子朝菌不知晦朔走章馳檄在得賢燕雀紛拏要鷹隼竊料二塗必處一豈比恒人長蠢蠢勸君韜養待徴招不用雕琢愁肝腎牆根菊花好沽酒錢帛縱空衣可凖暉暉簷日暖且鮮摵摵山責切隕落也盧子諒曰摵摵芳葉零又潘岳秋思賦庭樹摵以濯落井梧踈更殞髙士例須憐麹蘖丈夫終莫生畦畛能來取醉任喧呼死後賢愚俱泯泯送區𢎞南歸區或作歐歸或作征方云區烏侯切唐韻區冶子之後漢王莽傳有中郎區博穆昔南征軍不歸蟲沙猿鶴伏以飛抱朴子云周穆王南征三軍之衆一朝為化君子為猿為鶴小人為蟲為沙造化權輿作周昭王南征皆未詳本何据也孫曰伏謂猿蟲飛謂沙鶴洶洶許拱切水聲洞庭莽音姥楚詞夕擥中州之宿莽王逸注云草經冬不死者楚名曰宿莽翠㣲或作江洶洞庭宿莽㣲九疑湘中記零陵營道縣九山相似行者疑惑故名九疑曰荒是非豈以此耶鑱鋤銜切險也天荒是非鑱或作巉方云九疑言鑱天洪濤言舂天皆竒語也野有象犀水貝璣分散百寶人士稀言山川之美散為百寳獨人物稀少士或作事非是我遷于南日周圍言曰一周匝公貞元十九年冬謫陽山明年冬𢎞來故云日周圍來見者衆莫依稀爰有區子熒熒暉區子方作子區觀以彛訓或從違我念前人譬葑菲落以斧引以纆徽上音墨下音暉孫曰即今梓匠所引以正木者引以或作斧引洪本纆作墨方从唐閤杭本亡張文潜云古人作七言詩其句脉多上四字而下以三字成之退之乃變句脉少上三下四如落以斧引以纆徽雖欲悔舌不可捫是也徽今按此言纆徽謂木工所用之䋲墨也然周易作纆乃為墨索所以拘罪人者恐公所用别有据也雖有不逮驅騑騑詩四牡騑騑注行不止之貌或採于薄叢薄也漁于磯音幾磧也服役不辱言不譏從我荆州來京畿離其母妻絶因依嗟我道不能自肥道不或作不道非是子雖勤苦終何希王都觀音貫闕雙巍巍騰蹋衆駿事鞍鞿佩服上色紫與緋獨子之節可嗟唏與欷同哀而不泣母附書至妻寄衣開書拆衣淚㾗晞開書拆衣或作開緘發封涙痕方作痕涙非是雖不勅還情庶幾朝暮盤羞惻庭闈幽房無人感伊威爾雅委䑕也詩伊威在室人生此難餘可祈子去矣時若發機矣或作吴非是句法見上張文潜説蜃沈海底氣昇霏彩雉野伏朝扇翬音揮五彩雉扇或作羽非是盖宫扇以雉尾為之翬文彩貌此言雉伏於野而其羽可用為朝廷之儀與上下二句為一類也處子窈窕王所妃蜃沈止所妃此二句君子不患人不我知之意茍有令徳隠不腓下音肥孫曰百卉具腓腓病也言茍有令徳雖在隠約不以為病况今天子鋪徳威鋪或作輔非是蔽能者誅薦受禨音幾祥也出送撫背我涕揮行行正直慎脂韋楚詞如脂如韋注脂韋柔弱貌業成志樹來頎頎音祈祝曰詩碩人頎頎言儀表長麗絞好頎頎然我當為子言天扉三星行三星斗牛箕洪曰三星行剥啄行皆元和初召為國子博士時作樊曰蘇内翰云吾平生遭口語無數盖生時與退之相似吾命在牛斗間其身官亦在箕故其詩曰我生之辰月宿南斗且曰無善名以聞無惡聲以穰今謗吾者或云死或云仙退之之言良非虛耳我生之辰方从閤本之下有三字云謂斗牛與箕也今按辰時也詩云我辰安在方説非是月宿南斗牛奮其角箕張其口牛不見服箱詩記注服駕也箱車箱也兩較之内謂之箱是車内容物之處服箱猶言駕車也斗不挹酒漿箕獨有神靈無時停簸揚無善名已聞無惡聲已讙諸本已並作以方從唐閤本云讙如諸將盡讙之讙此詩叶餘于除叶讙于聞今本易讙為攘以求叶揚韻非也名聲相乘音䋲補註厯象有増减率遲速積故有乘除之法除得失少有餘三星各在天什伍東西陳嗟汝牛與斗汝獨不能神剥啄行剥剥啄啄有客至門我不出應客去而嗔從者語我子胡為然我不厭客困于語言諸本此下有我嗟子誠一語閤本同方从唐杭蜀本删去閤本衍盖下語誤入欲不出納以堙其源空堂幽幽有秸音戞秸槀書三百里納秸服有莞音丸又丸還切蒲也秸莞所以為席詩下莞上簟門以兩板叢書於間窅窅音窈深貌深塹其墉甚完墉或作容非是彼謂塹與墉寜可隳此謂堂也不可干從者語我嗟子誠難子雖云爾其口益蕃益或作實口益或作益實我為子謀有萬其全凡今之人急名與官子不引去與為波瀾與方作以云韓文與多作以他文見者非一詩之子歸不我以注以猶與也之今按陸宣公奏議亦然如云未審云云以否類是也然當作與為正雖不開口雖不開闗變化咀嚼有鬼有神今去不勇其如後艱我謝再拜汝無復云往追不及來不有年諸本作來可待焉方从閤杭蜀本云公祭十二兄文其不有年以補我愆同此義也青青水中蒲三首諸本作一首方从閤木今按樂府亦作三首青青水中蒲下有一雙魚君今上隴去我在與誰居青青水中蒲長在水中居寄語浮萍草相隨我不如青青水中蒲葉短不出水婦人不下堂行子在萬里孟東野失子并序黄魯直嘗書此詩遺石君美君美失子云時以觀覽可用亂思而紓哀究觀物理其實如此大槩因果耳退之救世弊故併因果而言然此一叚文意乃是湼盤中佛語退之嘗言不能無所不讀未有能為大儒者其弗信矣乎魯直所云如此東野連産三子不數日輙失之幾老念無後以悲其友人昌黎韓愈懼其傷也推天假其命以喻之失子將何尤吾將上尤天女實主下人與奪一何偏何或作以方云莊子奪彼與此一何偏也彼於女何有乃令蕃且延蕃或作繁此獨何罪辜生死旬日間上呼無時聞滴地淚到泉地祗為之悲瑟縮久不安乃呼大靈龜騎雲欵叩也天門問天主下人薄厚胡不均天曰天地人由來不相闗吾懸日與月吾繫星與辰日月相噬囓星辰踣音匐唐志日踣顛仆而顛吾不汝之罪知非汝由因因或作縁方云此詩如因與鰥今本皆以韻不叶而誤刋也今按作縁亦通未必誤改也且物各有分孰能使之然有子與無子禍福未可原魚子滿母腹或作肚一一欲誰憐細腰不自乳舉族長孤鰥或作懸鴟梟啄母腦母死子始翻或作蕃蝮蛇上音覆孫曰細腰滿盧也蜂属無雌雄取桑蟲或阜螽子抱成已子注曰梟名䲭亦名流離食母許慎曰梟不孝鳥也祝曰蝮一名虺毒蛇也螫手則斷生子時坼裂腸與肝好子雖云好未還恩與勤惡子不可説鴟梟蝮蛇然有子且勿喜無子固勿歎上聖不待敎賢聞語而遷下愚聞語惑雖敎無由悛大靈頓頭受即日以命還地祗謂大靈女往告其人東野夜得夢有夫𤣥衣巾孫曰𤣥夫大靈龜以其巾衣𤣥故曰𤣥夫龜一名𤣥衣督郵史記龜䇿傳宋元王夢一大夫衣𤣥繡之衣而乘輜車闖丑禁切馬出門貌然入其户三稱天之言再拜謝𤣥夫收悲以歡忻陸渾山火和皇甫湜用其韻諸本作次韻和皇甫湜陸渾山火方从閤杭蜀本皇甫湜字持正睦州新安人為陸渾尉洪曰一作次韻非是劉貢父云唐人賡和詩有次韻依其次用韻用彼之韻不必次之退之和陸渾山火是也皇甫補官古賁渾賁或作陸方从杭蜀本云賁音陸字本公羊傳時當𤣥冬澤乾源𤣥或作大山狂谷狠相吐吞風怒不休何軒軒擺磨出火以自燔有聲夜中驚莫原天跳地踔救敎切祝曰後漢踔宇宙而遺俗注猶越也孫曰跳踔皆震動之貌顛乾坤赫赫上照窮崖垠截然髙周燒四垣神焦鬼爛無逃門三光弛隳不復或作暇暾他昆切日出貌祝曰楚辭暾將出兮東方虎熊麋豬逮猴猿水龍鼉音駝祝曰類魚有足皮可冐鼓龜魚與黿音元似鼈而形大鴉䲭一名鳶鵰鷹雉或作鴈鷹鵠鵾似鷄三足而大選鴐鵝鴻鵾燖徐鹽切湯中爚肉也儀禮推燖者有膚炰音庖含毛炙物詩毛炰胾羮煨烏恢切補註筆墨間録上句正栢梁體後山作七字詩上東坡襲此體􅠉孰飛奔􅠉於刀切埋物灰中令熟也方作爊非是孰一作熟祝融顓頊氏有子曰黎為火官火行於冬猶祝融告休而歸也告休酌卑尊錯陳齊玫闢華園玫或作收非是洪曰謂火齊玫瑰也闢或作闡芙蓉披猖塞鮮繁千鐘萬鼓咽耳喧攅雜啾嚄上即由切下胡伯切樊曰雜亂聲廣韻啾唧小聲嚄噴大喚自山狂谷狠下言火之盛如此神鬼焦爛三光不暾鳥獸為炮燖祝融之神所以錯陳齊玫張鐘鼓塤箎而御之也沸箎塤沸或作咈非是彤幢絳㫋紫纛旛旛或作番炎官熱屬朱冠禈音昆祝曰親身裳前漢相如自著犢鼻禈髹音休漆赤多黒少選列髹彤之繡桷其肉皮通䏶音陛臀方云祝季賔謂䏶當作䯗按䏶从肉从骨一也劉備髀中肉消亦通用頺胸垤腹車掀音軒祝曰手舉物也左氏乃掀公以出於淖轅或作轅掀緹音提祝曰赤色也周禮赤緹用羊顔韎莫拜切祝曰赤韋也詩云韎韐有奭股豹兩鞬居言切孫曰馬上盛弓矢噐以豹皮為之董卓有力過人雙帶兩鞬左右馳射霞車虹蚓虹或作紅非是蚓音𦙍引索日轂轓音蕃車大箱也丹蕤縓七絹切祝曰縓絳色爾雅一染謂之縓盖緋繙廣韵風吹旗貌㠾音鴛孫曰繙㠾亂貌紅帷赤幕羅脤膰上音蜃下符䖍切韓曰脤膰祭肉也􅎺池波風肉陵屯􅎺音荒韓曰血也左氏士刲羊亦無􅎺也陵或作凌洪曰陵屯字見莊子當从陵樊澤之曰􅎺若池波若風肉若陵屯方云􅎺如池而波風肉如陵之屯聚也説今按列子生於陵屯注謂髙處莊子音義云阜也洪得之樊説􅎺池肉陵屯方説波風皆得之而樊説波如風方説肉如陵之屯聚則誤矣合二説而言之曰如􅎺池之波風肉之陵屯乃為善耳谽呀鉅壑頗黎盆谽或作􅣲方云大貌字見上林賦少陵詩亦有餘光散谽呀呀虛加切孫曰鉅壑谽呀狀如頗黎㿽也頗黎西國赤玉名今按漢書注谽呀澗谷形容也豆登孫曰木豆謂之豆瓦豆謂之登豆登五山者以五嶽為豆登瀛四樽者以四瀆為酒樽也樊曰自彤幢以下皆言祝融御火其車御飲食之盛如此五山瀛四罇熈熈釂醻釂子肖切飲盡謂之釂禮記長者舉未釂少者不敢飲醻與酧同主人進客曰醻笑語言雷公擘山海水翻齒牙嚼齧舌腭反腭音咢冝作齶口中齗也出字説反音翻電光䃱磹上先念切下徒念切電光也赬目䁔音暄大目頊𡨕月令冬其帝顓頊其神𤣥𡨕水神也收威避𤣥根或謂水隂根陽火也斤棄輿馬背厥孫洪曰水生木木生火水之於火猶祖視孫也縮身潜喘拳肩跟音根足踵祝曰選突到投而跟絓君臣謂頊㝠也相憐加愛恩命黒螭偵音檉又丑鄭切伺也問也焚其元首也謂為火焚天闗悠悠不可援音袁援引夢通上帝血面論樊曰詩意謂火既用事則頊𡨕黒精之君𤣥㝠水官之臣當縮身潜喘而君臣乃命黒螭問其事於祝融而火焚其首黒螭所以血面而訴於上帝也側身欲進叱於閽帝賜九河湔音煎洗也祝曰手澣之也涕痕涕或作涙又詔巫陽宋玉招魂云帝告巫陽曰有人在下我欲輔之魂魄離散汝筮與之注巫陽天帝女也反其魂徐命之前問何寃火行於冬古所存我如禁之絶其飱一作餐飲食也帝告黒螭云然女丁婦壬傳世婚杭本女作夫方云董彦逺曰當作女丁夫壬引東山少連曰𤣥𡨕之子曰壬夫娶祝融氏之女曰丁女俱學水仙是為温泉之神洪曰丁火也壬水也火女也水男也丁女而為婦於壬故曰女丁婦壬一作夫丁婦壬亦通夫丁者壬也言壬為丁夫也婦壬者丁也言丁為壬婦也為今按丁為陽中之隂壬為隂中之陽故言女之丁者婦於壬以見水火之相配今術家亦言丁與壬合洪氏二説皆是一朝結讎奈後昆時行當反慎藏蹲音存踞也左氏蹲甲而射之視桃著花韓曰月令仲春始雨水桃始華漢書云來春桃花水盛可小騫音愆虧少一作鶱月及申酉利復怨音寃祝曰古樂府空負百年怨孫曰申七月酉八月水生於申火死於酉此𤣥𡨕復怨之時助汝五龍從九鵾溺厥邑囚之崑崙之或作出河水所自出皇甫作詩止睡昏樊曰從公學文者多矣惟李翺習之得公之正皇甫湜持正得公之竒持正嘗語人曰書之文不竒易可謂竒矣豈礙理傷聖乎如龍戰于野其血𤣥黄見豕負途載鬼一車突如其來如焚如死如棄如何等語也此詩黒螭五龍九鵈等語其與易龍戰于野何異韓曰詳此詩始則言火之盛次則言祝融之御火其下則水火相克相濟之説也辭誇出真遂上焚要余和增怪又煩雖欲悔舌不可捫音門撫持縣齋讀書出宰山水縣讀書松桂林桂或作竹方云舊本多作竹桂蕭條捐末事邂逅得初心哀􅎜音柚獸名如猿醒俗耳清泉潔塵􅁭詩成有共賦共方作與非是酒熟無孤斟樊曰在陽山作也公嘗曰陽山天下之窮處又曰縣郭無居民官無丞尉小吏十余家審此則有共賦無孤斟其孰與樂此乎及觀公集區册區𢎞竇存亮劉師命軰皆自逺方來从公則外户之屨滿矣青竹時黙釣白雲日幽尋南方本多毒北客恒懼侵謫譴甘自守滯留愧難任投章類縞帶縞素也孫曰左氏傳吴季札聘于鄭見子産與之縞帶子産亦獻紵衣焉吴貴縞鄭貴紵各一獻所貴也紵答此詩當是隨與交朋望其報章也逾兼金答或作益非是孫曰價倍於常謂之兼金韓曰選雜體詩承榮重兼金廵華過盈瑱新竹筍添南堦竹日日成清閟縹普召切青黄色節已儲霜儲或作除黄苞猶揜翠出欄抽五六當戸羅三四髙標陵秋嚴貞色奪春媚稀生巧補林併出疑争地疑争或作全遮縱横乍依行爛熳忽無次風枝未飄吹露粉先涵淚露或作霧何人可攜翫清景空瞪宅耕切直視又登應切選偃仰瞪盼視晚菊少年飲酒時踊躍見菊花今來不復飲每見恒咨嗟佇立摘滿手行行把歸家此時無與語棄置奈悲何奈悲方作悲奈落齒去年落一牙今年落一齒俄然落六七落勢殊未巳餘存皆動揺存或作在盡落應始止憶初落一時但念豁可耻及至落二三始憂衰即死毎一將落時懔懔恒在已叉牙妨食物顛倒怯潄水終焉捨我落意與崩山比與或作欲今來落既熟見落空相似餘存二十餘次第知落矣儻常嵗落一或作一落自足支兩紀如其落併空與漸亦同指人言齒之落夀命理難恃我言生有涯長短俱死爾人言齒之豁左右驚諦視我言莊周云木鴈各有喜語訛黙固好嚼廢軟還美因歌遂成詩時用詫妻子哭楊兵部凝陸歙州參部或作曹人皆期七十皆或作生纔半豈蹉跎併出知已淚併或作數自然白髪多晨興為誰慟還坐久滂沱論文與晤語或作新墳與宿草已矣可如何可或作兩或作復苦寒四時各平分一氣不可兼隆寒奪春序顓頊固不亷太昊弛維綱或作施綱雜非是畏避但守謙遂令黄泉下萌牙天勾尖草木不復抽百味失苦甜凶飈攪宇宙攪或作擾鋩刃甚割砭悲亷切日月雖云尊不能活烏蟾羲和韓曰廣雅日御也孫云山海經云東南海之外甘泉之間有羲和國有女子曰羲和是生十日為帝悦妻常浴日于甘泉送日出恇音匡亦怯也怯頻窺覘痴亷切窺覘頻或作煩炎帝持祝融呵噓不相炎而我當此時恩光何由沾肌膚生鱗甲衣被如刀䥥音亷列子擁䥥帶索氣寒鼻莫齅血凍指不拈濁醪沸入喉口角如銜箝音黔馬口中鐡將持匕箸食觸指如排籖音僉祝曰鋭也選雞人伺漏傳更籖侵爐不覺暖熾炭屢已添已或作以探湯無所益何况纊與縑虎豹僵穴中蛟螭死幽潜熒惑喪躔次六龍孫曰六龍日御也木脱髯芒碭下音宕又一作踢非是大包内生類恐盡殱啾啾窻間雀不知已㣲纎舉頭仰天鳴所願晷刻淹不如彈射死却得親炰燖鸞皇茍不存爾固不在占其餘蠢動儔俱死誰恩嫌恩或作思伊我稱最靈不能女覆苫女覆諸本皆作安寢方从唐本及蔡謝校本云韓文古本汝皆作女杭本尚作女今訛自閤本也女指上文禽雀而言苫盖也言我最靈而不能汝覆盖也義為是祝曰凶服者以苫為覆悲哀激憤歎五藏難安恬難或作誰非是中宵倚牆立滛涙何漸漸天王哀無辜王或作子或作公惠我下顧瞻褰旒去耳纊音曠塞耳調和進梅鹽賢能日登御黜彼傲與憸生風吹死氣豁達如褰簾懸乳零落墮晨光入前簷雪霜頓銷釋土脉膏且黏豈徒蘭蕙榮施及艾與蒹日蕚孫曰日照花蕚鑠鑠鮮明貌行鑠鑠風條坐襜䄡處占切摇動貌祝曰相如曰舉帷幄之䄡䄡荀子是䄡䄡者何也楚辭張綘帷以䄡䄡天乎茍其能吾死意亦厭和虞部盧四汀酬翰林錢七徽赤藤杖歌諸本無四七字方从閤蜀本仍側注二名赤藤為杖世未窺臺郎尚書郎也篇末南宫清深禁闈宻孫曰南宫謂虞部禁闈謂翰林始􅂝自滇池國名樊曰前漢西南夷傳夜郎最大其西滇池方三百里滇王掃宫避使者避或作迎或作邀方云當如避道之避今按上言掃宫則當為避舍之避跪進再拜語嗢咿上乚骨切下音伊夷語也説文嗢咽也咿字林内悲也繩橋韓曰以竹索為橋也竹索曰笮西南夷尋之以渡水拄過免傾墮性命造次䝉扶持途經百國皆莫識君臣聚觀逐旌麾共傳滇神出水獻赤龍㧞鬚血淋漓又云羲和操火鞭􅊕到西極睡所遺幾重包裹自題署不以珍怪誇荒夷歸來捧贈同舍子浮光照手欲把疑諸本同方獨从蜀本作照把欲手疑云檀弓有手弓列子有手劍吏記有手旗義同此諸本多誤未今按方説手義固為有據然諸本云照手欲把則是把之時光已照手故欲把而疑之也今云照把則是已把之矣又欲手之而復疑之何耶况公之詩衝口而出自然竒偉豈必﨑嶇偪仄假此一字而後為工乎大抵方意專主竒澁故其所取多類此空堂晝眠倚牖戸飛電著壁孫曰以杖倚戸牖飛電誤以為蛟螭而捜索之言其色赤也補注東坡鐡拄杖詩山谷笻竹杖讃皆用此詩捜蛟螭南宫清深禁闈宻闈或作圍方云南宫指盧禁闈指錢也白樂天詩遽列諌垣升禁圍洪引繚繞宫牆圍禁林以釋此誤又閤本宻作客亦非是唱和有類吹塤箎妍辭麗句不可繼見寄聊且慰分司公時分司東都崔十六少府攝伊陽以詩及書見投因酬三十韻酬下或無三十韻字而有之字崔君初來時相識頗未慣但聞赤縣尉不比博士慢賃屋得連牆往來忻莫間我時亦新居觸事苦難辦􅂼飱要同喫諸本飱作餐方从蜀本云此詩用􅂼飱朝餐字多相亂他詩亦然説文飱謂晡時食餐吞也飱或作飡餐或作飱故字多相亂漢高后紀賜餐錢王莾傳設飱粥顔師古曰古餐飡字也又曰飡古飱字而皆以千安切讀之則非詩不素飱兮鄭𤣥讀如魚飱之飱音孫當以此為正今按飱或當作餐説見平淮西碑破襖誰來綻補縫也祝曰古樂府新衣誰當補故衣誰當綻謂言安堵後貸借音迹更何患不知孤遺多舉族仰薄宦有時未朝餐得米日已晏隔墻聞讙呼衆口極鵝鴈前計頓乖張居然見真贗偽物也亦作鴈韓非子説林齊伐魯索讒鼎魯以其鴈往齊人曰鴈也魯人曰真也又温公考異宋太宗始元年華願兒言于廢帝曰官為鴈天子嬌兒好眉眼袴脚凍兩骭下宴切脛骨捧書隨諸兄累累力追切兩角丱古患切總角兩角或作角尚或作角兩冬惟茹寒虀秋始識𤓰瓣問之不言飢飫若厭芻豢才名三十年久合居給諌白頭趨走裏閉口絶謗訕府公河南尹鄭餘慶也舊同袍㧞擢宰山澗寄詩雜詼俳歩皆切戲也有類説鵬鷃上言酒味酸冬衣竟未擐音患祝曰左氏躬擐甲胄衣或作裘下言人吏稀惟足彪與虥下士限切孫曰彪虎文虥虎之淺毛者祝曰爾雅虎竊毛謂之猫注竊淺也又言致豬鹿此語乃善幻善方作是傳今按漢書西域有善眩之語顔注云眩讀與幻同眩相詐惑也即今吞刀吐火植𤓰種樹屠人截馬之術韓公盖用此語方从閤本誤矣三年國子師腸肚習藜莧侯襇切菜也是習或作集非况住洛之涯魴音房江東呼為鯿鱒才本切似鯶而鱗細韓曰詩九罭之魚鱒魴言大魚也可罩汕上都敎切下音訕詩南有嘉魚注罩罩籗取魚之噐汕汕摷今之撩罟也爾雅巢謂之汕籗謂之罩肯效屠門嚼孫曰亘譚新論曰人聞長安樂則出門西向而笑知肉味美則對屠門而大嚼曹子建書曰過屠門而大嚼雖不得肉貴且快意久嫌弋者篡篡或作纂非是方云篡見揚子鴻飛㝠㝠弋人何篡焉古本及後漢書皆然盖篡取之義也然今本揚子亦作纂非也謀拙日焦拳活計似鋤剗方云本或作鏟謂削平之也選海賦鏟臨崖之阜公此詩用今韻剗属上聲疑當从鏟為正男寒澁詩書妻庾剰腰襻普患切衣襻也又衣系也周痩信鑑賦裙斜假襻妻或作女為官不事職厥罪在欺謾或作慢方云字見禹貴傳漢書靣謾亦皆音慢行當自劾去漁釣老葭亂五患切爾雅葭蘆菼薍注蘆葦也菼薍似葦而小嵗窮寒氣驕氷雪滑磴棧上揀切木道音問難屢通何由覿清盼或作盼太云李太白詩君子枉青盼詩美作盼兮以目美言也左顧右盻以眄視言也盻本作盼眄通作盼今四字多不分當以蜀本為正睞今按盼匹莧切目黒白分也眄莫見切从省作眄眄顧視也盻五禮切見孟子恨視也此詩當作盻然也作盼亦通猶言青眼送侯參謀赴河中幕侯繼時從王鍔辟憶昔初及第各以少年稱君頥始生鬚我齒清如水爾時心氣壯百事謂巳能方云用中庸人一能之巳百之之語别本作已者非一别詎幾何詎或作遽或作距方云字林曰詎未知詞也潘岳悼亡詩爾祭詎幾時忽如隔晨興我齒豁可鄙君顔老可憎相逢風塵中相親迭嗟矜幸同學省官末路再得朋東司絶敎授遊宴以為恒胡登切常也秋漁䕃宻樹夜博然明燈雪逕抵樵叟扺或作詆樵或作講皆非是此但言偶逢之耳風廊折談僧陸渾在洛州縣名也桃花閒有湯沸如烝三月崧少歩崧一作嵩孫曰戴延之西征記嵩山東為大室西為少室相去十七里嵩其搃名也謂之室者以其下有石室焉躑躅花名一名羊躑躅餘見上杏花詩注紅千層洲沙厭晚坐洲沙或作沙洲嶺壁窮晨昇晨或作朝沈㝠不計日為樂不可勝遷滿一已異方作畢非是乖離坐難憑行行事結束人馬何蹻其略切泮水曰其馬蹻蹻馬逝也騰感激生膽勇從軍豈嘗曽洸洸音光韓曰武夫洸洸司徒公時王鍔檢校司徒為河南尹天子爪與肱爪一作股提師十萬餘四海欽風稜魯登切河北兵未進未或作始方云時討王承宗而吐突承璀督師逗遛不進作始者非蔡州帥新薨曷不請掃除活彼黎與烝鄙夫誠怯弱受恩愧徒𢎞猶思脱儒冠棄死取先登又欲面言事上書求詔徴侵官固非是妄作譴可懲惟當待責免耕斸竹足切斫也歸溝塍音乘稻田畦班固西都賦溝塍刻􅍢今君得所附或作行得所非是勢若脱韝音鉤韝臂捍以皮為之所以臂鷹鷹檄筆無與讓幕謀耳其膺職或作識非是收績開史牒翰飛上音寒羽也詩翰飛戻天逐溟鵬男兒貴立事流景不可乘嵗老隂沴音戾妖氣作雲頹雪翻崩别袖拂落水征車轉崤音爻左氏傳崤有二陵焉陵勤勤酒不進勉勉恨已仍送君出門歸愁腸如牽繩黙坐念語笑癡如遇寒蠅䇿馬誰可適晤言誰為應音膺當也席塵惜不掃或作拂殘罇對空凝對或作醑非是信知後㑹時日月屢環絙下居登切環循環絙大索又急也生期理行役歡緒絶難承寄書惟在頻無恡簡與繒竹帛也東都遇春少年氣真狂真方作直有意與春競行逢二三月九州花相映川原曉服鮮桃李晨粧靚疾政切或作靘靘青黒色方云靚莊見子虛賦郭璞曰粉白黛黒也荒乘不知疲醉死豈辭病飲噉徒感切或作嘬惟所便文章倚豪横爾來曾幾時白髪忽滿鏡舊遊喜乖張新軰足嘲評音病評量心腸一變化腸或作腹羞見時節盛得閒無所作貴欲辭視聽深居疑避仇黙卧如當暝朝曦入牖來鳥喚昏不省鳥一作烏為生鄙計筭鹽米告屢罄告屢或作屢告坐疲都忘音望起冠側懶復正幸䝉東都官獲離機與穽乖慵遭傲僻漸染生避性既去焉能追有來猶莫騁有船魏王池池名在長安洪曰河南志云洛水經尚善旌盖二坊之北南溢為池深處至數頃水鳥洋泳荷芰翻覆為都城之勝貞觀中以賜魏王泰故號魏王池往往縱孤泳縱或作從或作泛水容與天色此處皆緑净此或作比岸樹共紛披渚牙相緯經音徑懐歸苦不果即事取幽迸取或作最貪求匪名利所得亦已併已或作以悠悠度朝昏落落捐季孟落落或作落魄非是羣公一何賢上戴天子聖謀謨收禹績或作跡四面出雄勁轉輸非不勤稽逋有軍令在庭百執事奉職各祗敬我獨胡為哉胡一作何坐與億兆慶譬如籠中鳥仰給活性命為詩告友生負愧終究竟感春五首分司東都作辛夷洪曰辛夷樹髙數丈江南地煖正月開北地寒二月開初發如筆北人呼為木筆其花最早南人呼為迎春苕溪漁隠曰木筆迎春自是兩種木筆色紫叢生二月方開迎春白色髙樹立春已開然則辛夷乃此花耳髙花最先開髙花或作花髙方云從末章辛夷花房忽全開言之則此為髙處之花先開矣何遜詩有岩樹落髙花青天露坐始此廻已呼孺人戞音秸轢之也禮大夫妻曰孺人韓曰選恨賦左對孺人右顧稚子鳴瑟更遣稚子傳清盃選壯軍興不為用坐狂朝論無由陪如今到死得閒處還有詩賦歌康哉洛陽東風幾時來川波岸栁春全廻宫門一鎻不復啓唐都長安以洛為東都故有宫門一鎻之句宫門不啓故九陌無往來之塵埃也雖有九陌無塵埃䇿馬上橋朝日出樓閣赤白正崔嵬孤吟屢闋莫與和寸恨至短誰能裁春田可耕時已催王師北討何當廻放車載草農事濟車或作軍非是戰馬苦飢誰念哉蔡州納節舊將死是年彰義節度吴少誠卒起居諌議孫曰裴度以河南府功曹召為起居舍人孟簡孔戣皆為諌議大夫聫翩來朝廷未省有遺䇿肯不垂意缾與罍孫曰公以自喻也前隨杜尹杜兼拜表迴笑言溢口何歡咍呼來切笑也孔丞孔戡别我適臨汝風骨峭峻遺塵埃峭峻或作峭峭音容不接祇隔夜凶訃詎可相尋來天公高居鬼神惡欲保性命誠難哉辛夷花房忽全開韓曰末篇言辛夷花之盛如此元㣲之有問韓貟外求辛夷花詩韓貟外家好辛夷開時乞取兩三枝折枝為贈君莫惜逢君不折風亦吹豈此耶將衰正盛須頻來須頻或作頻頻非是清晨輝輝燭霞日薄暮耿耿和煙埃朝明夕暗巳足歎况乃滿地成摧頽迎繁送謝别有意誰肯留念少環㢠酬裴十六功曹廵府西驛途中見寄或無塗字方云裴十六度也舊云裴諗非度時為河南府功曹公時分司東都相公鄭餘慶也時元和元年罷相出為河南尹罷論道聿至活東人至方作來活或作治非是御史裴度也時度為監察御史宻䟽論權倖忤旨出為河南府功曹坐言事作吏府中塵遂令河南治今古無儔倫四海日富庶道途隘蹄輪府西三百里候館亭驛孫曰周禮五十里有市有候舘所以候賔客之館同魚鱗相公謂御史勞子去自廵是時山水秋光景何鮮新哀鴻鳴清耳宿霧褰猶開也髙旻褰或作浥非是遺我行旅詩軒軒有風神譬如黄金盤照耀荆璞真我來亦已幸事賢友其仁事賢謂餘慶友仁謂裴度持竿洛水側孤坐屢窮辰多才自勞苦方作苦勞云苦勞語見吕强傳出今按語勢當作勞苦大抵公詩多自胷襟流未必故用古人語也無用祗因循多才謂裴度無用公自謂辭免期匪逺行行及山春燕河南府秀才得生字時元和五年冬房武尹東京公為河南令權徳輿為相吾皇紹祖烈天下再太平詔下諸郡國嵗貢鄉曲英元和五年冬房公尹東京功曹上言公或作上其言是月當登名月或作日非是乃選二十縣試官得鴻生碩儒也羣儒負己材相賀簡擇精怒起簸羽翮引吭下浪切又音杭咽也選引圓吭之纎婉吐鏗轟此都自周公文章繼名聲章一作物自非絶殊尤難使耳目驚今者遭震薄不能出聲鳴鄙夫忝縣尹愧慄難為情惟求文章冩不敢妬與争還家勅妻兒具此煎炰烹柿紅蒲萄紫肴果相扶檠或作擎芳荼茶也茶之嫩者雀舌鳥嘴菱顆皆出蜀中張孟陽登成都樓詩芳荼冠六州出蜀門諸本荼多作茶方从潮館本云爾雅曰檟苦荼音徒郭璞注木小似梔子早取者為茶晚取者為茗唐韻茶宅加反俗作荼大抵茶與荼古音相近如今言搽與塗亦通用也音今按茶與荼今人語不相近而方云相近者莆田語然也雖出俚俗亦由音本相近故與古暗合耳今建人謂口為苦走為相亦此類方言多如此云好酒濃且清何能充歡燕庶以露厥誠昨聞詔書下方作來權公作邦禎音貞祥也文人得其職文一作大一作丈文道當大行隂氣攪短日冷雨澁不晴勉哉戒徒馭家國遲音治待也子榮送李翺翺字習之隴西人娶公兄弇之女楊於陵為廣州刺史表翺佐其府廣州萬里途山重江逶迤行行何時到誰能定歸期揖我出門去顔色異恒時雖云有追送或作迎送方云詩有客薄言追之鄭云追送也足跡絶自兹人生一世間不自張與施譬如浮江木縱横豈自知寜懐别時苦勿作别後思送石處士赴河陽幕或注得起字石洪也元和五年烏重裔辟洪置幕府公嘗有序長把種樹書史記始皇紀秦皇焚書所不去者卜筮醫藥種樹之書人云避世士忽騎將軍馬自號報恩子風雲入壯懐雲入或作雷開泉石别幽耳鉅鹿師欲老常山險猶恃鉅鹿邢州也常山鎮州也元和四年節度使王承宗反詔中人吐突承璀以兵討之無功五年遂赦王承宗鎮州今真定府豈惟彼相憂固是吾徒耻去去事方急酒行可以起送湖南李正字歸或作送李正字歸湖南或作李判官請李礎父仁鈞時為親王府長史礎自胡南告來省公嘗有序送之此其詩也東都作長沙長沙郡入楚深洞庭值秋晚人隨鴻鴈少江共蒹葭逺歴歴余所經悠悠子當返孤游懐耿介旅宿夢婉娩宛晚二音媚也風土稍殊音魚蝦日異飯親交俱在此誰與同息偃别本韓文考異巻四欽定四庫全書别本韓文考異巻五宋王伯大重編古詩辛卯年雪元和六年春寒氣不肯歸河南二月末雪花一尺圍崩騰相排姊抺切逼也孫曰排宻也龍鳯交橫飛波濤何飄揚天風吹旛旂白帝盛羽衛鬖髿或作㲚上音參又蘇含切下音沙髮垂貌祝曰選緑苔鬖髿乎砌上振裳衣白霓先啓途從以萬玉妃翕翕陵厚載譁譁弄隂機生平未曾見何暇議是非或云豐年祥飽食可庶幾善禱吾所慕誰言寸誠微醉留東野昔年因讀李白杜甫詩長恨二子不相從吾與東野生並世如何復躡二子蹤東野不得官白首誇龍鍾方云依字當作躘踵盧仝詩盧子躘踵也賢愚總莫驚韓子稍姦黠自慙青蒿倚長松低頭拜東野願得終始如駏蛩上音巨下音卭樊曰孔叢子北方有獸名曰蟨愛蛩蛩駏驉食得甘草必齧以遺蛩蛩駏驉見人將來必負蟨以走蟨非愛駏蛩也為其假足也二獸亦非心愛蟨也為其得甘草而遺之也夫禽獸猶知比假而相報也况士君子之欲名利者乎東野不􅂞頭有如寸筳撞鉅鐘吾願身為雲東野變為龍四方上下逐東野雖有離别無由逢離别或作别離李花二首諸夲作一首方云此二詩也自當春天地争奢華以下分焉意義甚明編者誤合之樊曰此詩自夜領張徹投盧仝而下狀極李花之妙矣蘇内翰梅詩舉此云縞裙練恱玉川家肝膽清新冷不邪穠李争春猶辦此更教踏雪㸔梅花亦一奇也平旦入西園梨花數株若矜夸旁有一株李顔色慘慘似含嗟問之不肯道所以獨繞百帀至日斜忽憶前時經此樹正見芳意初萌牙或作芽方云漢傳如朱草萌牙事有萌牙無用芽字柰何趂酒不省録不見玉枝攅霜葩枝或作杖泫胡畎切流也然為汝下雨淚無由反斾羲和車東風來吹不改顔蒼茫夜氣生相遮氷盤夏薦碧實脆斥去不御慙其花斥去或作片雲或作雲去或作斥逐方云張衡思𤣥賦斥西施而不御韓語原此或本皆誤也當春天地爭奢華洛陽園苑尤紛挐或作拏方云董彦逺云挐從如今人從奴唐韻以挐為或體非也考相如子虚賦王逸九思皆只作挐今按説文拏從奴牽引也挐從如持也古書作拏盖通用誰將平地萬堆雪將方作准剪刻作此連天花日光色照未明月暫入都交加夜領張徹投盧仝乘雲共至玉皇家長姬香御四羅列縞白色裙練􅍤始銳切佩巾詩無感我􅍤兮無等差静濯明䊋有所奉顧我未肯置齒牙清寒瑩骨肝膽醒一生思慮無由邪招楊之罘方云之罘元和十一年進士閤本作之果字訛也柏生兩石間萬嵗終不大野馬不識人難以駕車葢柏移就平地馬羈入廐中馬思自由悲柏有傷根容傷根柏不死千丈日以至千或作百日以或作不難以或作巳馬悲罷還樂振迅矜鞍轡迅或作方云振迅字見七月詩傳鮑昭鶴賦之罘音浮南山來文字得我驚館置使讀書日有求歸聲我令之罘歸失得柏與馬失得方作失待或作實待或作實失理令按三本皆無理唯嘉祐杭本作失得似頗有而舉正不收葢其意曰失得之計觀於柏馬可見云爾之罘别我去計出柏馬下我自之罘歸入門思而悲之罘别我去能不思我為洒掃縣中居引水經竹間嚻譁所不及何異山中閑前陳百家書食有肉與魚先王遺文章綴緝實在余禮稱獨學陋易貴不逺復作詩招之罘晨夕抱飢渴寄盧仝玉川先生洛城裏破屋數間而巳矣一奴長鬚不裹頭一婢赤脚老無齒辛勤奉養十餘人上有慈親下妻子先生結髪憎俗徒閉門不出動一紀至令鄰僧乞米送僕忝縣尹能不耻令或作今非是尹一作令俸錢供給公私餘時致薄少助祭祀勸參留守謁大尹樊曰唐洛城有東都留守有河南尹公誌盧登封墓曰為書告留守與河南尹是時鄭餘慶留守東都李素以少尹行大尹事言語纔及輒掩耳水北山人得名聲去年去作幕下士水南山人又繼徃孫曰謂洛水之南北也在洛陽城中水北石洪水南温造元和五年烏重𦙍為河陽三城節度使辟石洪温造為從事鞍馬僕從塞閭里從或作夫少室山人孫曰李渤字濬之刻志於學與仲兄涉皆隠盧山乆之徙終南少室山元和元年以左拾遺召不至四年河南尹遣吏持詔敦促又不赴公為河南令遺渤書譬說渤善公言始出家于東都索價髙兩以諫官徴不起彼皆刺口論世事有力未免遭驅使先生事業不可量惟用法律自繩巳春秋三傳束髙閣三方作五或作左巳今按鄒夾春秋世無傳而當世見行三傳作五左皆非也此孫曰晋杜乂殷洪並才名冠世更翼弗之重語人曰軰宜束之髙閣俟天下太平然後議其任耳獨抱遺經究終始抱方作把非是徃年弄筆嘲同異孫曰仝與馬異結交詩云仝不仝異不異是謂大同而小異仝自仝異自異是謂仝不徃兮異不至怪辭驚衆謗不巳近來自說尋坦途猶上虚空跨緑駬虚空或作青雲方云緑駬今本二字皆從馬按穆天子傳荀列史漢皆作緑耳郭璞注穆傳猶魏時鮮卑獻黄耳馬是以耳色言也此詩豈以重韻妄刋耶去嵗生兒名添丁仝有添丁詩意令與國充耘耔音子擁苗本國家丁口連四海
