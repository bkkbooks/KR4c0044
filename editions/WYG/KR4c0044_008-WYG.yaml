body:
  text: 同宿聯句韓曰此詩召為國子博士後與東野同宿而作自從别君來逺出遭巧譖愈斑斑落春淚浩浩浮秋浸郊毛竒覩象犀羽怪見鵩音服不祥鳥賈誼為長沙傳鵩入其舍鴆愈鴆直禁切毒鳥朝行多危棧方作桅或作軛理今按上言朝行即桅字無當作棧夜臥饒驚枕郊生榮今分踰死棄昔情任愈鵷音寃鵷雛似鳳行參綺陌雞唱聞清禁郊山晴指髙標槐蜜騖長䕃愈直辭一以薦巧舌千皆􅤉郊􅤉巨禁切牛舌下病匡鼎惟説詩桓譚不讀䜟愈逸韻何嘈嗷上音曹下音敖衆口聲也髙名俟沽賃郊紛葩歡屢填曠朗憂早滲愈滲所禁切孫曰言忘其憂如物滲漏也朗或作亮方云張恊士命野曠朗而無塵潘岳寡媍賦愬空宇兮曠朗為君開酒膓顛倒舞相飲郊飲音䕃曦光霽曙物景曜鑠宵祲愈祲音浸曜光鑠宵祲祥氣儒門雖大啓奸首不敢闖義泉雖至近盜索不敢沁七鴆切沁水出上黨不敢沁言不敢及也清琴試一揮白鶴呌相喑音䕃鳴相應也又兒泣不止曰喑或作相呌吟吟去聲讀趙徳麟本同音閤本作音欲知心同樂雙繭抽作絍郊絍汝鴆切祝曰後漢安得織絍孫曰言二人同心相樂如雙繭作絍絲也莎柵聯句河南谷名冰溪時咽絶斷續聲也風櫪孫曰櫪木名亦作操風櫪為風所吹軒舉飄揚也方軒舉愈此處不斷腸定知無斷處郊雨中寄孟刑部幾道聨句孟簡集注孟簡字幾道徳州平昌人以新舊傳考之未嘗為刑部史豈逸之耶新傳言其為倉部員外以不附王叔文徙他曹或者他曹即刑部也秋潦淹轍跡淹或作無髙居限參拜愈耿耿蓄良思遥遥仰嘉話郊一晨長隔嵗百歩逺殊界愈逺或作還商聽謂聽秋聲也饒清聳悶懐空抑噫郊噫烏界切噫氣也商或作髙悶或作閟非是美君知道腴逸歩謝天械愈爵位冠冕之属吟馨鑠紛雜抱照瑩疑怪郊撞宏聲不掉不振也輸邈瀾逾殺愈簷瀉碎江喧街流淺溪邁郊念初相遭逢幸免因媒介祛煩類決癰愜興劇爬疥爬或作瓟方云今字書瓟匏也無瓟音然文選把搔無巳把蒲巴切則知唐字今不出者多研文較幽𤣥呼博騁雄快今君軺音遥説文小車軺或作春方馳伊我羽巳鎩所拜切鳥羽病顔延之詠嵇康曰鸞翮有時鎩温存感深惠琢切奉明誡愈誡或作戒方云説文誡敕也戒警也漢谷永傳猶嚴父之明誡後漢西域傳蹙國減士經有明誡此語當用誡字至下文伸誡則當用戒字今按謝本下文實作申戒迨兹更凝情暫阻若嬰瘵側界切勞疾欲知相從盡靈珀韓曰琥珀也虞翻曰琥珀拾芥樊曰謂無所遺拾纎芥拾或作据非是欲知相益多或作從益神藥銷宿憊徳符仙山岸永立難欹壊氣涵秋天河有朗無驚湃郊湃普拜切滂湃祥鳳遺蒿鷃雲韶掩夷靺草拜切東夷樂周禮鞮鞻氏掌四夷之樂法東方曰靺南方曰任西方曰株離北方曰禁爭名求鵠如射之志鵠徒騰口甚蟬喝於邁切蟬嘶聲未來聲巳赫始鼔敵前敗鬬場再鳴先孫曰左氏傳州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴杜預注云比於雞鬬勝而先鳴今言再鳴先者葢取此事遐路一飛届遐或作霞東野繼竒躅脩綸懸衆犗音戒樊曰莊子任公子為大鈎巨緇十五犗為餌投竿東海犗騬牛也穿空細丘垤照日陋菅蒯愈垤蟻塜也孫曰左氏雖有絲麻無棄菅蒯菅蒯茅属可以為布丘垤菅蒯公以日喻也小生何足道積慎如觸蠆丒邁切愔愔揖淫切安靜貌左氏曰祈招之愔愔左思曰靡靡愔愔安靜也抱所諾翼翼自申戒申方作伸戒説見上聖書空勘讀勘方作甚盜食敢求嘬楚夬切禮記無嘬炙謂一舉盡臠惟當騎欵叚緩馬也馬援曰乘下澤車御欵叚馬足矣豈望覿珪玠弱操愧筠杉微芳比蕭薤何以驗髙明柔中有剛夬逺遊聨句樊曰逺遊送東野之江南也聨句凡四十韻東野二十公十九李習之一習之之詩見于世者此而巳大率詩非其所長也習之李翺也别腸車輪轉一日一萬周郊離思春冰泮瀾浸不可收愈馳光忽以迫飛轡誰能留愈取之詎灼灼此去信悠悠翺取或作前楚客宿江上夜魂棲浪頭棲或作㨗曉日生逺岸水芳綴孤舟村飲泊好木飲或作館方云東野幽居詩有嘉木偶良酌芳隂庇清彈館字非也野􅂼拾新柔獨含悽悽别中結鬱鬱愁人憶舊行樂鳥吟新得儔郊憶舊方作意憶新方作忻皆非是靈瑟時窅窅霠猿上於金切霠雲覆日也霠猿謂猿在雲間也夜啾啾憤濤氣尚盛恨竹淚空幽長懐絶無巳多感良自尤即路渉獻嵗歸期𦕈涼秋兩歡日牢落孤悲坐綢繆愈觀怪忽蕩漾叩竒獨㝠搜海鯨吞明月裴氏廣州記鯨鯢目即明月珠浪島沒大漚音甌浮漚或作浮我有一寸鈎欲釣千丈流良知忽然逺壯志鬱無抽郊魍魅暫出沒魅或作魎蛟螭互蟠蟉力幽切蟠蟉龍貌昌言拜舜禹舉颿音凡船上幔或作帆凌斗牛吳楚分野在江南懐糈丁音切離騷巫咸將夕降兮懐椒糈而要之糈精米所以饗神屈原五月五日自投泪羅而死楚人哀之毎至此日以竹筒貯米投水祭之方云語見離騷祭神米也蜀本作精非是餽賢屈乘桴追聖丘飄然天外歩豈肯區中囚愈肯或作有楚些蘓介切楚語助辭待誰弔賈辭緘恨投翳明孫曰謂掩翳其明也弗可曉弗或作不祕魂安可求氣毒放逐域蓼茶蓼芳菲花開貌疇田疇雜芳菲疇當春忽凄涼不枯亦颼飀貉謡衆猥欵貉或作豹欵或作誶方从杭蜀本云欵音鳥來切楚詞九章欵秋冬之緒風又楊子始皇方獵六國而剪牙欵王逸曰欵嘆也方言曰欵然也南楚凡言然曰欵元次山有欵乃曲亦音靄今按方説是也欵説文亞改切又烏來切譍也史記項羽紀作唉亦音鳥來反説文同黄魯直讀欵乃為襖靄誤矣今或冩作欵字亦誤乃却當音襖也巴語相咿㗀與嚘同方云字書無㗀字公寄三學士用咿嚘字征蜀聨句用咿吻字考之字書咿嚘為正黙誓去外俗嘉願還中州江生孫曰水微漲也行既樂躬輦自相勠音留孫曰并力也躬輦自推車樊曰言水行可樂則躬輦為勞矣飲醇趣明代味腥孫曰醇謂醇徳以酒為喻故云飲醇明代盛世也腥楚越之食也謝荒陬郊陬隅也馳深鼓利檝趨險驚蜚輶蜚或作飛繫石沉靳尚按楚詞上官大夫靳尚楚之讒臣譛屈原於懐王者開弓射鴅吺孫曰史記鴅吺即驩兠字古文尚書亦以驩兠為鴅吺堯放之於崇山靳尚鴅吺皆在南方恐其為鬼為祟故欲沉射之也路暗執屏翳上歩丁切樊曰司馬長卿大人賦時若曖將混濁兮召屏翳誅風伯刑雨師將雨路暗故欲執屏翳戮之應劭曰天神使也波驚戮陽侯樊曰楊雄反離騷日陵陽侯之素波兮豈吾纍之獨見許應劭曰陽侯古之諸候有罪自投江其神為大波廣泛信縹眇髙行恣浮游外患蕭蕭去中悒稍稍瘳振衣造雲闕跪坐陳清猷徳風變讒巧仁氣銷戈矛仁或作和方云仁氣見禮記名聲照四海淑聞無旹休旹或作肯方云旹古時字作肯誤也歸哉孟夫子歸去無夷猶愈晉左思吳都賦輕禽狡獸周章夷猶夷猶猶豫也楚辭君不見兮夷猶歸去方作君歸或作歸興晚秋郾城夜㑹聨句集注元和十二年十月裴度受命平淮右以郾城為行蔡州治所公為行軍司馬李正封為判官其詩與正封作於郾城葢九月間蔡未平時也詩凡百韻東野死後公所與聨句者惟此可見耳方云杭蜀本題只此洪曰今本有上王中丞盧院長者非從軍古云樂樊曰王仲宣詩從軍有苦樂但問所從誰談笑青油幕孫曰廣雅幕帳也宋劉瑀與顔峻書曰朱脩之三代判兵一朝居青油幕下作謝宣明面向人青油幕謂將幕也以青油縑為之燈明夜觀音貫棊月暗秋城柝正封上中丞方从古本如此諸本無上中丞三字羈客方寂歴驚烏時落泊語闌壯氣衰酒醒寒砧作愈奉院長方以古本如此諸本無奉院長三字遇主貴陳力夷㐫匪兼弱百牢犒輿師千户千户候也購首惡正封平生耻論兵末暮晚年末或作未方云顔延年詩幼壯困孤介末暮謝幽貞不輕諾徒然感恩義誰復論勲爵愈多士賊中將士被沾汚小夷施毒蠚丑畧切虫行貌何當鑄劒㦸或作鉅鉟相與歸臺閣正封室婦歎鳴鸛古玩切詩東山曰鸛鳴于垤婦嘆于室家人祝喜鵲終朝考蓍龜何日親烝礿愈灼音藥間使斷津梁間或作問方云間使漢書蒯通張騫傳屢見潛軍索林薄紅塵羽書靖孫曰羽檄也檄者以木簡為書有急事則插雞羽其上謂之羽檄紅塵羽書靖者謂羽書稀少紅塵不起也大水沙囊涸正封銘山子所工插羽余何怍未足煩刀俎沛公軍㶚上來見項王至鴻門樊噲曰人方為刀俎我為魚肉言賊不足以煩刀俎誅夷祇應輸管鑰愈樊曰國語越王勾踐使大夫種行成于吳曰請委管鑰屬國家以身隨之孫曰言賊不足以煩刀俎但當輸送其管鑰而已雨矢逐天狼韓曰楚詞舉長矢兮射天狼天狼星名以喻貪殘電矛驅海若電矛謂矛㦸如電海若海神矛或作刀靈誅天誅固無縱力戰誰敢却正封峨峩雲梯天黎切諸葛亮攻郝昭於陳倉以雲梯衝車臨城中昭以火箭射之乃燒之翔赫赫火箭著連空隳雉堞音牒域垣也公羊曰五板而堵五堵而雉照夜焚城郭愈軍門宣一令廟筭建三畧兵法黄石公三畧謂上中下三畧也雷鼓掲千槍或作鎗方云蒼頡篇曰刈木兩頭鋭者是也槍字為正浮橋交萬筰正封筰或作莋方云莋當從竹音昨説文曰筊也西南夷以竹索為橋尋以渡水是也少陵詩有連笮動嫋娜字亦作笮蹂野馬雲騰映原旗火鑠方云校本一云鑠當作爍疲氓墜將拯殘虜狂可縛愈摧鋒若貙兕超乘秦師過周北門超車者三百乘如猱玃音攫大猿逢掖服翻慙漫莫干切或作曼莊子垂漫胡之纓曼胡纓武士纓名也胡纓可愕正封星殞聞雊雉雊古豆切唐景龍初有大星殞于西南聲如雷野雉皆驚雊星殞者賊敗亡之兆師興隨唳鶴唳音戾苻堅以百萬入㓂謝𤣥謝石以八干拒之堅大敗衆奔聞風聲鶴唳皆以為王師巳至虎豹貪犬羊鷹鸇憎鳥雀愈憎或作讋燒陂除積聚灌壘失依託失或作去憑軾諭昏迷執殳征暴虐正封倉空戰卒飢月黑探兵錯黒或作暗兇徒更蹈藉逆族相㗖嚼愈軸轤亘淮泗斾旌連夏鄂大野縱氐羌長河浴騮駱正封東西競角逐逺近施矰繳音勺孫曰謂結絲于矢繳生絲縷也顔師古日繳弋射其矢為矰人怨童聚謡天殃鬼行瘧愈漢刑支郡黜周制閑田削閑作間漢支郡如楚王削東海趙王削常山是也周制諸侯有功者間田以禄之有削地者歸之間田侯社退無功鬼薪文帝三嵗刑曰鬼薪言取薪給宗廟也懲不恪正封余雖司斧鑕音質斧也孫曰公為行軍司馬主罰情本尚丘壑且待獻俘囚終當返耕穫愈藁街陳鈇鉞孫曰漢長安街也長安邸在其中誅罰人於此鈇􅀢斫刀也桃塞西京賦曰北有重險桃林之塞興錢鎛上子踐切銚也鎛鎒也農器地理畫封疆天文掃寥廓正封天子憫瘡痍將軍禁鹵掠策勲封龍􅋕歸獸獲麟脚愈獲方作獵云龍􅋕平原縣名劉氏音額崔浩音洛此詩用魏闕秦闗龍頟麟脚皆借對也獸或作騎麟脚見子虛賦獲射麋脚麟韋昭曰持引其脚也家語謂魯西狩子鉏商麟折其前足載以歸豈用此耶作今按歸獸用書序語對䇿勲為切但當獸狩義耳詰誅敬王怒給復音福前漢民産子復注云不役使也哀人瘼澤髪解兠牟或作鍪方云古通用酡顔傾鑿落正封酡音陀酡面赭楚詞美人既醉朱顔酡鑿落飲器樂天詩銀含鑿落錢金屑琵琶槽安存惟恐晚安存或作存安洗雪不論昨暮鳥巳安巢春蠶看滿箔愈箔音泊以竹為箔所以盛蠶聲明動朝闕光寵耀京洛旁午降絲綸中堅擁鼓鐸正封孫曰漢光武與王尋戰衝其中堅中堅謂大將居中以堅鋭自輔故云中堅此言裴度凱旋擁鼓鐸而歸也宻坐列珠翠髙門塗粉雘䟦朝猶言舉朝也賀書飛塞路歸鞍躍愈魏闕横雲漢秦闗束岩㟧音咢崖也拜迎羅櫜鞬居言切以藏矢晉重耳曰右属櫜鞬以與君周旋左傳問遺結囊橐正封江淮永清晏宇宙重開拓是日號昇平此年名作噩愈元和二年嵗在丁酉洪赦方下究或作救雞冠子上情不下究淮南子號令不能下究漢燕王旦傳主恩不得下究作究為是武颷亦旁魄歩角切封禪書曰旁魄四塞廣被也南據定蠻陬北攫空朔漠正封儒生愜教化愜方作怯武士猛刺斫上七亦切孫登呼楊駿曰刺刺斫斫吾相兩優游他人雙落莫愈印從負鼎佩門為登壇鑿再入更顯嚴顯或作深方云顯嚴見吕氏春秋九遷彌謇諤正封賔筵盡狐趙導騎多衛霍國史擅芬芳官娃分綽約愈娃於洼切集注宮女也風俗通曰楚人謂美色為娃分賜也綽約柔弱貌莊子肌膚若冰雪綽約若處子宫或作官非是丹掖列鵷鷺洪鑪衣狐狢摛文揮月毫講劒淬霜鍔正封命衣備藻火賜樂兼拊搏兩廂鋪􅉊毺上音衢下山芻切風俗通曰織毛褥謂之􅉊毺五鼎調勺藥愈方云勺藥五味之和也子虛賦及文選凡四見皆音酌畧姚令威曰後語有仍祈却老藥此當異讀帶垂倉玉佩轡蹙黄金絡誘接謂登龍謂或作諭趨馳狀傾藿正封藿音霍葵類能向日青娥眉也翳長袖紅頰吹鳴籥儻不忍辛勤何由恣歡謔愈惟當早富貴豈得蹔寂寞但擲顧笑金仍祈却老藥正封殁廟配罇斚生堂合毊音喬爾雅大磬謂之毊鑮音博爾雅大鐘謂之鑮安行庇松篁髙臥枕莞蒻愈莞音菅蒻音弱所以為席菅草蒻蒲也莞或作菅洗沐恣蘭芷楚詞浴蘭湯兮沐芳華割烹厭脾臄其虐切詩曰嘉肴脾臄喜顔非忸怩達志無隕穫正封隕或作殞方云見儒行篇詼諧酒席展慷慨戎裝著斬馬祭旄纛孫曰以旄牛尾大如斗繫馬軛上謂之旄纛師行則用之炰羔禮芒屩愈草屨也史記虞卿躡屩擔簦禮謂禮士山多離隠豹野有求伸蠖音獲屈伸虫也推選閲羣材薦延搜一鶚正封左右供謟譽親交獻諛噱其畧切説文大笑也選嗢噱終日名聲載揄揚權勢實熏灼愈熏或作薫方云詩憂心如熏毛傳熏灼也漢谷永傳潘岳西征賦皆用無作薫者道舊生感激當歌發酬酢羣孫輕綺紈下客豐醴酪正封窮天貢賝與琛同異市海賜酺音蒲又音歩醵其虐切合錢飲酒作樂鼓還槌從禽弓始彍愈彍音廓説文曰弩滿也取歡移日飲求勝通宵博五白孫曰博齒也韓曰屈原曰成梟而中呼五白注五白五木也劉豫與毅樗蒲裕厲聲叱五木即成盧氣爭呼六竒心運度正封恩澤誠布濩音䕶祝曰布露也前漢布濩閎澤樊曰封禪頌非惟如之我布濩之嚚頑已簫勺音酌諸本簫作蕭方漢房中歌蕭勺羣慝晉灼曰簫舜樂勺周樂言以樂征伐也顔師古曰教化行則逆亂之徒交散也告成上云亭封禪書伏羲至湯封泰山禪云云黄帝封泰山禪亭亭云亭二山名也考古垂矩彠憂縛切度也馬融曰規摹矩彠古封禪之君或禪云云或禪亭亭前堂清夜吹東第良晨酌池蓮折秋房院竹翻夏籜正封五狩朝恒岱三畋宿楊柞音昨長楊五柞漢宫名楊雄曰振師五柞習馬長楊農書乍討論馬法長懸格愈格音各孫曰武帝時有善相馬者東京門獻作銅馬法此説思非格亦廢也馬法司馬法字見楊雄美新懸或作廢雪下收新息蔡州縣名陽生十月也過京索應劭曰京縣名今有大索小索亭收或作牧方云漢書索皆音山客切惟文選功臣賛有桑各一音爾牛時寢訛我僕或歌咢正封五各切孫曰詩或歌或咢比于琴瑟曰歌徒擊鼔曰咢帝載載功也書熙帝之載彌天地臣辭劣螢爝音爵炬火也劣或作勿為詩安能詳庶用存糟粕愈存方作等别本韓文考異巻八欽定四庫全書别本韓文考異巻九宋王伯大重編
