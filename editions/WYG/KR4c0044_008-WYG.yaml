front:
  text: 皆以匡音為正詞今按本或作狂獽楚作􅀈攘􅚃竄脱趫起囂切善走也選㨗趫夫之敏手㨗或作徤甪黠岩鉤踔直角切巽也又知教切狙猿水漉雜鱣螖音滑蟚螖似蟹而小漉或作䍡方云亦紕也之今按上句鉤字當讀如鈎致鈎投奅匹貌切音砲石聲閙䃔音穹䃧音隆砲石聲填隍􅢼􅀈愈莫八切􅀈呼八切徤貌又無憚也隍或作湟􅢼鳥歸切又作傶方云蜀本作􅢼烏皆切當作崴威字不見字書埤蒼崴㠢不平也吳都賦隠巔崴㠢五臣曰排積也於填隍之義亦合於今按隍湟通用易城復隍一作徨睛死不閉獷鈎猛切獰犬貌眼困逾䎵莫八切惡視也爇燒城也堞音牒城上豆熇呼本切又音壑熱也歊許嬌切熺音僖熾也抉門上音夬排也左傳縣門發人紇抉之以出門者是也呀拗䦪上於絞切下乙轄切門扇也天刀封未坼酋膽懾前揠跧梁上酋所切跧伏於梁上排郁縮恐懼歛縮貌排或作非闖竇揳音屑不可正也窋竹律切説文物在宂中窡丁刮切又丁滑切穴中見也迫脇聞雜驅咿呦音幽呌寃􅞨郊􅞨與刖同方蜀本􅞨五刮切與跀同樊本只作跀今􅞨字不入刮音非窮區指清夷兇部坐雕鎩音殺漢書鉏耰不敵長鎩雕鎩剪除也卭文卭蜀地名文織之有文者裁斐斖音尾文章貌巴豔蜀之美女收婠妠上烏八切下女刮切小兒肥貌椎肥牛呼牟音牟説文曰牛鳴子厚牛賦曰牟然而鳴黄鐘滿脰載實駝鳴􅕫乙割切實重也􅕫駝聲荆公詩云槖垂鈴棧駝鳴􅕫節擁棠郊虎視眈聖靈閔頑嚚燾養草䕓玉篇音察草有毒用殺魚下書遏雄虓乎交切虎聲遏雄虓令將帥無多殺也解罪弔攣瞎愈瞎許轄切攣手攣病瞎目病戰血時銷洗劒霜夜清刮漢棧罷囂闐獠江上張絞切獠江蜀江也息澎汃上音朋下音八切湍聲選砏汃輣軋戍寒絶朝乘方云乘猶乘塞乘障之乘守也或作來非是刀暗歇宵詧與察同方云刀刀斗也晝炊夜擊諸本多誤又此二語諸本多綴於厚麩枯之下古本乃綴於息澎汃之下今從古本葢此詩自斾亡多空杠以下每人皆五韵亦可考也今按刀斗之刀與刀劍之刀古書葢一字但以音别之耳始去杏飛蜂及歸栁嘶􅘪音札爾雅􅘪蜻似蟬而小廟獻繁馘音幗截耳級樂聲洞椌楬郊椌苦江切楬栝轄切祝曰珠達也禮記聖人作木以為椌楬注椌楬祝敔也臺圖煥丹𤣥郊告儼匏稭音戞藁本也祭天以為席漢志其席藁鞂字同念齒慰黴黧上音眉下音黎祝曰垢腐貌楚辭顔黴黧以沮敗孫曰齒嵗也黴黧面黑也念其嵗老有黴黧者則慰安之視傷悼瘢痆女黠切瘡痕休輸任訛寢詩或寢或訛訛動也報力厚麩秳或作􅀈又或作秣方云秸户秳切説文曰春粟不潰也今本多作􅀈􅀈與稭一物不當兩出公歡鐘晨撞室宴絲曉扴音戞絲琴瑟扴繫也宴或作晏盃盂酬酒醪箱篋饋巾帓莫轄切帓帶也小臣昧戎經維用賛勲劼愈劼格八切勤也書汝劼毖殷獻臣
