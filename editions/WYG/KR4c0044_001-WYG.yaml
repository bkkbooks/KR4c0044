body:
  text: 宋王伯大重編賦感二鳥賦并序集註貞元十一年公以前進士三上宰相書不報東歸感所獻二而賦之時宰相趙憬賈盧邁也貞元十一年一或作五方去以諸譜考之作一為是五月戊辰愈東歸癸酉自潼音同潼闗在華陰闗出息于河之陰時始去京師有不遇時之歎見行有籠白烏白鸜鵒而西者號於道曰某土之守音狩某官使使疏吏切者進於天子東西行者皆避路莫敢正目焉西下閣杭本無行字方云考之禮記及公送温造序當有因竊自悲幸生天下無事時承先人之遺業不識干戈耒耜攻守耕獲之勤讀書著文自七嵗至今凡二十二年其行已不敢有愧於道於杭作之非是其間音閑居思念前古當今之故亦僅志其一二大者焉選舉於有司與百十人偕進退十或作千方云此專為選舉而言也貞元九年應宏詞者僅三十二人作十為是退上或再有偕字曾不得名薦書齒下士于朝以仰望天子之光明方从閣本名上有列字名下有於字簡今按嘉祐杭本與謝本並無此二字語而意已足方本非是今是鳥也惟以羽毛之異以下或有其字非有道徳智謀承顧問賛教化者乃反得蒙採擢薦進光耀如此此下諸本有可以人而不如鳥乎一句方从閣本文粹刪去矣今按諸本所有之句乃全用大學傳中語而意則異二本無之豈公晚覺其陋而自削之歟抑後之傳者為賢者諱而刪之也方从二本意則厚矣然凡讀書者但當据其本文實事考評得失以自警戒乃為有益正不必曲為隠諱以啟文過飾非之習也今此一句恐或公所自刋故且从方本云故為賦以自悼且明夫遭時者雖小善必逹不遭時者累善無所容焉其辭曰吾何歸乎此句或在茍有食其從之下吾將既行而後思誠不足以自存茍有食其從之茍或作敬非是出國門而東騖音務馳也觸白日之隆景時返顧以流涕念西路之羌永羌或作差固今按作差謬然羌乃發語之詞施之句内似亦未安以上文反顧流涕之語推之則西路乃長安之路而此字當為浸漸愈益之意不知的是何字又恐或是逾字過潼闗而坐息窺黄流之奔猛黄流或作流黄感二鳥之無知方䝉恩而入幸惟進退之殊異増余懐之耿耿彼中心之何嘉之或作其嘉或作憙非是徒外飾焉是逞焉或作而余生命之湮阨音厄曽二鳥之不如汩音聿又音骨説文水流也楚詞余若將不及東西與南北恒十年而不居恒或作亘而或作以方云恒居鄧切與亘竟之亘同班固敘傳恒以年嵗選詩徙倚恒漏窮辱飽食其有數况策名於薦書䇿方从閣杭作榮云公上宰相書非茍沒於利榮於名也與此義通今按唐人策字俗體从竹從宋亦有只从草者與榮字絶相近故閣本作榮葢傳寫之誤耳方引榮於名亦與此語意不相似於或作與亦非是時所好之為賢庸有謂余之非愚昔殷之髙宗得良弼於宵寐或云昔上當有在字或是念字由上句未有愚字相似而脫也孰左右者為之先信天同而神比先下或有容字信或作容皆非是方云漢酈食其傳沛公吾所願從遊莫為我先韓語祖此及時運之未來或兩求而莫致雖家到而户說祗以招尤而速累說或作曉葢上天之生余亦有期於下地盍求配於古人獨怊悵上音超悵恨也於無位惟得之而不能乃鬼神之所戲幸年嵗之未暮庶無羡於斯類惟方作雖慕今按上文之意若曰天之生我必有所用何不力古人如傳說之徒而獨怊悵於無位耶惟或者茍得其位而不能追配古人但如二鳥之空被榮寵乃是鬼神之所戲耳故幸年嵗之未晚而庶幾無慕於斯類也斯類葢并指二鳥與彼得之而不能者而言也惟字正是斡轉處作雖即無力矣能或作歸亦非是復志賦并序樊曰其句法步類離騷往往相似晁無咎嘗取此賦于變騷愈既從隴西公孫曰董晉也貞元十二年七月以東都留守董晉為宣武軍節度使平鄧惟恭之亂辟公為其府推官詳見晉行狀平汴州其明年七月有負薪之疾退休于居作復志賦其辭曰居悒悒音邑憂也選云良増悒悒之無解兮獨長思而永歎音灘騷云心鬰鬱之憂思兮獨永歎乎増傷解或作辭豈朝食之不飽兮寜冬裘之不完昔余之既有知兮誠坎軻音可坎軻不平易貌選坎軻多苦卒而艱難當嵗行之未復兮從伯氏以南遷凌大江之驚波兮過洞庭之漫漫至曲江而乃息兮逾南紀韓曰唐一行以天下山河之象存乎兩戒分南紀北紀韶在南紀之外詩滔滔江漢南國之紀之連山嗟日月其幾何兮攜孤嫠音釐而北旋孤嫠謝作嫠孤值中原之有事兮將就食於江之南方從閣本無將字於下有大字或又無之字今詳文勢皆非是始專專於講習兮非古訓為無所用其心方從閣本古作詁為作焉非是窺前靈之逸迹兮靈一作修超孤舉而幽尋既識路又疾驅兮孰知余力之不任音壬堪也考古人之所佩兮閲時俗之所服閲方作闕非是忽忘身之不肖兮謂青紫其可拾之或作而又或作之者皆非是自知者為明兮故吾之所以為惑吾下或有志字非是擇吉日余西征兮亦既造夫京師既或作冀君之門不可逕而入兮遂從試於有司逕或作徑惟名利之都府兮羌起羊切騷云羌衆人之所仇羌楚人發語端詞猶言卿何為也字衆人之所馳羌或作差非是所或作四競乘時而附勢兮紛變化其難推附勢或作射利或只附字作射字全純愚以靖處兮將與彼而異宜欲奔走以及事兮顧初心而自非朝騁騖乎書林兮夕翺翔乎藝苑騁或作馳方云楚詞朝騁騖乎江皋作馳非是諒却步以圖前兮不浸近而逾逺哀白日之不與吾謀兮至今十年其猶初豈不登名於一科兮曽不補其遺餘進既不獲其志願兮退將遁而窮居排國門而東出兮慨余行之舒舒慨或作嗟時憑髙以迴顧兮涕泣下之交如之或作而戾音茘至也洛師而悵望兮聊浮游以躊躇假大龜以視兆兮求幽貞之所廬大或作火甘潜伏以老死兮不顯著其名譽音歟非夫子之洵美兮吾何為乎浚音峻衛邑詩經孑孑干旟在浚之都之都小人之懐惠兮猶知獻其至愚固余異於牛馬兮寜止乎飲水而求芻伏門下而黙黙兮竟嵗年以康娱下而或作下之時乘間以獲進兮顔垂歡而愉愉音俞和悅也而或作之仰盛徳以安窮兮又何忠之能輸昔余之約吾心兮誰無施而有獲方從閣本誰作惟下又有徳字云李本謂陳無已去徳字今本復訛惟為誰其誤甚矣之今按此句本用楚詞孰無施而有報孰不殖而有獲語詞意既有自來又與上下文勢相應故嘉祐杭本與諸本多如此乃是韓公本文相傳已久非陳以意定也閣本之繆如此而方信之反以善本為誤今不得而不辨也又嘉祐杭本世多有之而其不同處方皆不録豈其偶未見耶抑忽之而不觀也嫉貪佞之洿與汚同濁兮曰吾其既勞而後食方無既字非是懲此志之不修兮受此言之不可忘修方作循云唐人書修近循楚詞亦有誤者今按唐人書字之誤方說是也然此乃修誤作循非循誤作修也修猶修好修怨之修葢因舊増新之意也情怊悵以自失兮心無歸之茫茫之或作而茍不内得其如斯兮孰與不食而髙翔抱闗之阨與隘同音又一作厄陋兮有肆志之揚揚諸本多作陽陽方云後漢孔嵩傳云晨門肆志於抱闗史記晏嬰傳志氣揚揚公當是用此語詩君子陽陽則注謂無所用其心非公所用字也伊尹之樂於畎畆兮焉貴富之能當恐誓言之不固兮斯自訟以成章斯或作聊訟或作誦往者不可復兮冀來今之可望音亡閔已賦補注公嘗佐董晉于汴幾晉薨尋佐張建封于徐建封又薨罷去居洛陽賦此嘗未安而既危指此此所以賦閔已也余悲不及古之人兮伊時勢而則然而或作兮獨閔閔其曷已閔閔或作悶悶諸本句下有兮字下文隔句皆有兮字今按洪慶善云歐宋皆無兮字後皆復添或云感通本復志賦與此賦皆無兮字未知孰是憑文章以自宣昔顔氏之庶幾在隠約而平寛固哲人之細事夫子乃嗟歎其賢惡飲食乎陋巷亦足以頥神而保年閣本無食字非是有至聖而為之依歸又何不自得於艱難何下或有苦字曰余昬昬其無類望夫人其已逺逺或作還方云詩小雅焦贑易林逺字皆叶平聲讀作還者非行舟檝而不識四方涉大水之漫漫勤祖先之所貽勉汲汲於前修之言雖舉足以蹈道哀與我者為誰衆皆捨而已用忽自惑其是非下土茫茫其廣大余壹不知其可懐壹本多作豈方云閤杭本作壹舊監本潮本尚作壹訛壹為豈自蜀本也檀弓云子壹不知夫䘮之踊也韓語原此就水草以休息恒未安而既危久拳拳其何故亦天命之本宜本或作所惟否泰之相極咸一得而一違閣本作衰非是君子有失其所小人有得其時聊固守以静俟誠不及古之人兮其焉悲諸本多無兮字别知賦送楊儀之韓曰公以御史言旱饑得罪黜為連之陽山令連在唐屬湖南道時楊儀之以湖南支使來公為此賦以别之余取友於天下將嵗行之兩周下何深之不即上何髙之不求紛擾擾其既多咸喜能而好修紛或作伊紛擾或作伊紛其或作而咸方作或非是寜安顯而獨裕顧阨窮而共愁窮或作塞惟知心之難得斯百一而為收之或作而斯或作在百一或作一旦皆非是方云陸機嘆逝賦得十一於千百韓用此意嵗癸未而遷逐侣蟲蛇於海陬將侯切隅也侣或作旅遇夫人之來使闢公館而羅羞而或作以索微言於亂志發孤笑於羣憂物何深而不鏡理何隠而不抽鏡或作考始參差以異序卒爛漫莫半切又謨官切並大水而同流以或作於爛漫本或作爛熳或作瀾漫云大水也何此歡之不可恃遂駕馬而迴輈張流切車轅也遂或作卒而或作以山磝磝初交切爾雅山多小石曰磝其相軋樹蓊蓊音翁又烏孔切草木盛其相摎居由切絞也祝曰儀禮殤之絰者不摎垂注不絞其帶之垂者雨浪浪音郎其不止雲浩浩其常浮磝磝或作嶅嶅摎或作繆雲或作雪浩浩或作活活其或作而知來者之不可以數音朔哀去此而無由方無者字或無之字皆非是而或作以倚郭郛音孚而掩涕空盡日以遲留而或作其古詩元和聖徳詩并序樊曰憲宗即位劍南劉闢自稱留後元和元年正月以髙崇文為左神䇿行營節度使討闢九月克成都十月闢伏誅二年正月已丑朝獻于太清宫庚寅朝享於太廟辛夘祀昊天上帝於郊丘還宫大赦天下補注穆伯長曰退之元和聖徳詩淮西碑栁雅章之類皆辭嚴義偉制作如經能崒然聳唐徳於盛漢之表筆墨間録云此序乃司馬遷之文非相如文也臣愈頓首再拜言此下或有曰字臣伏見皇帝陛下即位已來誅流姦臣孫曰永貞元年貶王伾王叔文韓泰韋執誼也朝廷清明無有欺蔽外斬楊惠琳劉闢以收夏蜀東定青徐孫曰青謂平盧節度李師道奉表詣京師徐謂徐帥張建封子上表請代皆貞元元和積年之叛海内怖駭不敢違越郊天告廟神靈歡喜風雨晦明無不從順晦明或作明晦太平之期適當今日臣䝉被恩澤日與羣臣序立紫宸殿陛下或無陛字親望穆穆之光而其職業又在以經籍教導國子而或作况誠宜率先作歌詩以稱道盛徳不可以辭語淺薄不足以自效為解或作懈或作辭皆非是方云自左傳請以曹為解遷固相承用之非一輒依古作四言元和聖徳詩一篇凡千有二十四字指事實録具載明天子文武神聖以警動百姓耳目傳示無極警或作驚方云洪曰驚流俗妄改也史記尊寵樂毅以警動燕齊義當用此其詩曰皇帝即阼或作祚方云史記文紀有皇帝即阼一全語寔用阼字今按阼謂東階也作祚非是物無違拒曰暘而暘曰雨而雨維是元年有盗在夏欲覆其州以踵近武近或作其皇帝曰嘻豈不在我負鄙為艱縱則不可出師征之其衆十旅十或作千方云按此專紀楊惠琳之亂也時嚴綬在河東表請討之詔與天徳軍合擊未嘗它出師也十旅為正今按周禮五人為伍五伍為兩四兩為卒五卒為旅則一旅五百人而十旅五千人也方說得之亦見以順討逆師不在衆之意軍其城下告以福禍腹敗枝披不敢保聚擲首陴音脾城上女牆也外降下江切幡夜竪疆外之險莫過蜀土韋皐去鎮劉闢守後血人于牙不肯吐口人或作入非是開庫㗖士曰隨所取曰方作日今按此乃述其誘㗖士卒之詞方本非是汝張汝弓汝鼓汝皷上鼓字或作伐或作桴或作擊汝為表書求我帥汝事始上聞在列咸怒皇帝曰然嗟逺士女茍附而安則且付與讀命於庭讀或作續非是出節少府朝發京師夕至其部闢喜謂黨汝振而伍蜀可全有此不當受不當或作當不非是萬牛臠力轉切炙之夜切與䏑同記母嘬炙或作肉萬甕行酒以錦纒股以紅帕補註實録曰禹㑹塗山之夕大風雷震有甲兵卒千餘人其不被甲者以紅銷帕袜其額自此遂為軍容之服首方云荆公本音麥潮本亦然方言注絡頭帕頭也音貊今多讀作莫轄切公送李益鄭權序皆用此語或作帓字葢二音通讀今按集韻帕莫白切無莫轄音莫葛切帶也方說誤有恇音匡怯也其兇有餌其誘兇方作􅇩句今按此二葢言有畏其暴者有貪其利者故從之者衆耳非本心樂從也方本非是其出穰穰如羊切多也隊以萬數遂刼東川遂據城阻皇帝曰嗟其又可許爰命崇文分卒禁禦有安其驅無暴我野日行三十徐壁其右壁或作辟闢黨聚謀鹿頭是守崇文奉詔進退規矩規或作合戰不貪殺擒不濫數方云杭本三館本文粹作藍縷唐本作䄛蜀本始作濫數校本多從之今姑存其舊蜀今按藍縷無理濫數葢用左傳數俘之語本得之官本皆誤四方節度整兵頓馬上章請討俟命起坐請或作乞皇帝曰嘻無汝煩苦嘻嘆辭也方作嘉非是荆并洎梁孫曰荆謂荆南節度使裴均并謂河東節度使嚴綬梁謂西道節度使嚴礪也在國門户出師三千各選爾醜四軍謂荆并梁及崇文之師齊作殷其如阜殷其或作殷殷或作其殷或拔其角或脫其距拔或作披長驅洋洋無有齟齬音語齒不相當八月壬午闢棄城走載妻與妾包裹稚乳是日崇文入處其宇日或作曰分散逐捕搜原剔藪闢窮見窘無地自處俯視大江不見洲渚遂自顛倒若杵投臼取之江中枷脰音豆頸也械手婦女纍纍啼哭拜叩來獻闕下以告廟社周示城市咸使觀覩解脫攣力全切係也索夾以砧斧方云砧當作枮與椹同戰國策范睢曰臣之􅇩不足以當椹質要不足以待斧鉞是也婉婉音宛順也弱子赤立傴於武切僂音縷曲躬牽頭曳足先斷腰膂次及其徒體骸撑丑庚切拄冢庾切末乃取闢駭汗如寫方云音湑蓼蕭詩用韻如此或作雨非是揮刀紛紜爭刌趍本切細切也膾脯爭或作猶刌或作切皆非是儀禮有刌肺肝樊曰此詩蘓黄門曰此特憲宗命崇文誅一劉闢耳其言何瑣屑之甚謂之造語工則可謂之得雅體未也詩載文王伐崇武王伐紂固自有體退之獨不到此耶亦其少年所為文也按公時年四十不可謂少大抵徳不足則夸憲宗功烈固偉比文武則有間矣王荆公嘗論詩曰周頌之詞約約所以為嚴徳盛故也魯頌之詞侈侈所以為夸徳不足故也是詩其魯頌謂歟優賞將吏扶珪綴組帛堆其家粟塞其庾塞下其字方作倉非是以上句偶之可見哀憐陣歿廪給孤寡贈官封墓周帀宏溥經戰伐地寛免租簿施令酬功急疾如火天地中間莫不順序幽恒青魏或作魏幽恒青東盡海浦南至徐蔡區外雜虜怛威赧徳踧踖上音蹙下音昔行而謹敬蹈舞諸本怛作烜赧作赫又作服方以文録定烜作怛以唐閣蜀文定赫作赧云公上尊號表有怛威愧徳意與此同掉徒弔切擲也棄兵革私習簋簠來請來覲十百其耦或作數皇帝曰吁伯父叔舅各安爾位訓厥甿畮甿或作田正月元日初見宗祖躬執百禮登降拜俯薦于新宫于或作饗新或作閟非是視瞻梁梠音吕楣也桷端連綿木名選㮰梠縁邉慼見容色淚落入俎侍祠之臣助我惻楚乃以上辛補注穀梁傳曰自正月至三月郊之時也我以十二月下辛卜正月上辛不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣禮記郊之用辛也注云言人君當齋戒自新耳於郊用牡除于國南鱗筍毛簴上思尹切下國許切孫曰筍簴所以掛鐘磬也横曰筍飾以鱗屬植曰簴飾以羸屬祝曰周禮梓人為筍簴廬幕周施開掲磊砢上洛猥切下魯可切石多貌相如曰水石磊砢又石緃横貌祝曰選金玉磊砢獸盾順允切孫以木為之而畫龍文相合載之以蔽馬騰挐女加切牽引也圜壇帖妥吐火切安也天兵四羅旂常婀娜旂或作旗上於可切下奴可切美也曹植曰華容婀娜駕龍十二周禮馬八尺以上為龍天子之駕馬十有二閑魚魚雅雅晉書劉惔傳洛中雅雅有三嘏宵昇于丘昇或作升方云楚詞升皆作昇它準此奠璧獻斚音賈玉爵衆樂驚作轟豗上呼宏切下音灰轟羣車聲選轟轟闐闐豗相繫也選磊匒匌而相豗融冶樂聲紫熖嘘呵大氣紫或作柴髙靈孫曰天神之有靈者下墮羣星從坐錯落侈哆昌者切說文張口也詩巷伯哆兮侈兮注大貎日君月妃焕赫婐􅛭上烏果切下五果切身好弱貌祝曰樂府婐􅛭戲金闕焕赫謂日君婐􅛭謂月妃瀆鬼濛鴻上莫孔切下胡孔切廣大貎選濛鴻沆茫嶽祇嶪峩上音業下音我山髙貎後漢増槃嶪峩飫沃羶薌沃羶或作羶燎孫曰亦作香羶羊臭薌榖氣羶今按飫沃之義未詳或云當作飫厭亦未有所据也薌字見禮記云産祥降嘏鳳皇應奏舒翼自拊赤麟黄龍逶於為切陀徒何切容與之貎結糾麟或作鱗逶或作頽卿士庶人黄童白叟踊躍歡呀虛加切張口貌失喜噎歐上一結切下烏后切歡或作嘆歐或作嘔方云嘔俗字也乾清坤夷境落褰音愆或作騫舉帝車廻來日正當午方云校本作日始東土葢疑郊祀回車不應至午也然諸本皆同姑從之幸丹鳳門大赦天下滌濯剗楚簡切削也磢初兩切瓦石洗物選飛勞相磢磨滅瑕垢續功臣嗣拔賢任耉孩養無告仁滂施厚皇帝神聖通達今古今或作先或作通今達古聽聰視明或作視聽聰明一似堯禹洪曰葢取禮記一似重有憂者黄魯直云退之文老杜詩無一字無來處後人讀書少故謂韓杜自作此語耳生知法式動得理所天錫皇帝為天下主并包畜養無異細鉅億載萬年敢有違者皇帝儉勤盥音貫澡也濯陶瓦孫曰盥濯以陶瓦之器言儉也斥遣浮華好此綈音題厚繒也紵􅃯戒四方侈則有咎天錫皇帝多麥與黍無召水旱耗于雀䑕耗于或作無耗億載萬年有富無窶羣羽切貧也方作富有無窶或作富有貧窶或作無有貧窶皆非是皇帝正直别白善否擅命而狂既翦既去盡逐羣姦靡有遺侣天錫皇帝龎臣碩輔博問遐觀以置左右億載萬年無敢余侮余方作有非是皇帝大孝慈祥悌友怡怡愉愉奉太皇后浹于族親濡及九有天錫皇帝與天齊夀登兹太平無怠永久億載萬年為父為母博士臣愈職是訓詁孫曰爾雅有釋詁釋訓釋詁者釋古今之異辭釋訓者辨物之形貌訓詁即歌詩也作為歌詩以配吉甫琴操十首并序韓云按琴操十有二公取其十如下所作是也惟水仙懐陵操乃伯牙所作公削之為之詞者各注于下唐子西云琴操非古詩非騷辭惟退之為得體退之琴操栁子厚不能作也孫曰風俗通云琴曲曰操操者言窮阨猶不失其操也將歸操孔子之趙聞殺鳴犢作孫曰孔子將西見趙簡子聞竇鳴犢之死臨河歎曰美哉水洋洋乎丘之不濟此命也夫事見史記義諸本題義下皆有子注方云閣本只存題唐本注與題義皆不出蜀本于注云上増又曰二字與題義皆夾注寫以此見雖題義亦後人以琴操續補也歐宋荆公皆用閣本事今按歐本云此效蔡邕作十操跡皆出蔡邕琴操云狄之水兮其色幽幽狄蜀本作秋縣今按水經河水至東阿茌平等東北流四瀆津注云津西有四瀆祠東對四瀆口河水東分濟水受河葢滎口水㫁不通始自是出與清水合沛瀆自河入濟水徑周通故有四瀆之名昔趙殺鳴犢孔子臨河嘆而作歌曰狄之水兮風揚波舟檝顛倒更相加歸來歸來胡為斯案臨濟故狄也是濟所逕得其通稱也又云濟水逕臨濟縣南詳此則是濟水自滎澤之下潜流至此四瀆津口而後復出河又東分一支與之合流以過臨濟而為狄水故孔子臨河不濟而歌咏狄水即此東分之河復出之濟也然此皆濟也今在濟鄆之間史記以為孔子自衛將西見趙簡子則其道不當出此此又不可曉者今姑闕之以俟深於地理者正焉我將濟兮不得其由涉其淺兮石齧我足乘其深兮龍入我舟我濟而悔兮將安歸尤歸兮歸兮無與石鬬兮無應龍求歸兮歸兮諸本兮作乎猗蘭操孔子傷不逢時作孫曰古琴操云習習谷風以陰以雨之子于歸逺送于野何彼蒼天不得其所逍遥九州無有定處世人闇蔽不知賢者年紀逝邁一身將老蘭之猗猗揚揚其香不採而佩於蘭何傷今天之旋其曷為然我行四方以日以年雪霜貿貿音茂不明薺麥韓曰西京雜記云建亥之月陰氣之極薺麥始生之茂子如不傷我不爾覯見也孫曰言我如薺麥之茂當雪霜之時不改其操子如見傷而用我可也子如不傷我無自貶以見子之義薺麥之茂薺麥之有孫曰茂而能傲霜雪薺麥之固有君子之傷君子之守韓曰君子居可傷之時不易其守亦猶薺麥之有也龜山操孔子以季桓子受齊女樂諫不從望龜山而作龜山魯山也詩奄有龜䝉在太山博縣韓曰古琴操云予欲望魯兮龜山蔽之手無斧柯奈龜山何龜之氛兮不能雲雨氛或作氣雲或作為或雲上有為字龜之枿亦作蘖五割切前漢三枿之起李巡曰槁木之餘兮不中梁柱不下或有能字非是方云太𤣥經梁不中柱不隆大厦徴中平聲讀異今按此但言其木不堪作梁柱耳與太𤣥中字意當只作去聲讀文意乃恊龜之大兮祗以奄魯知將隳兮哀莫余伍知或作如孫曰言魯將隳壊哀而憐之者莫余若也周公有鬼兮嗟余歸輔鬼或作思余歸方作歸余皆非是大抵方意尚異不問文義之如何惟有倒語者則必取之如下文我􅃎于家莫爾余追皆此類也越裳操周公作韓本註事見後漢南蠻志交趾之南有越裳云古琴操曰於戲嗟嗟非旦之力乃文王之徳雨之施物以孶或作兹我何意於彼為自周之先其艱其勤以有疆宇私我後人我祖在上四方在下厥臨孔威敢戲以侮孰荒于門孰治于田孫曰言豈有荒于門而能治于田者乎故必四海既均而後越裳是臣也四海既均越裳是臣拘幽操文王羑里作上音酉漢地理志河内蕩陰縣有羑里城孫曰事見史記周本紀琴録曰文王見拘羑里憂愁無聊援琴而鼓之號曰拘幽操詞曰殷道圂圂浸濁煩兮朱紫相合不别分兮迷亂聲色信纔言兮炎炎之虐使我愆兮幽閉牢穽由其言兮遘我四人憂勤勤兮目窈窈兮其凝其盲目窈窈方作窈揜揜或作目揜揜今按下文有耳字正與目字相對窈窈二字比之揜揜似亦差勝耳肅肅兮聽不聞聲朝不日出兮夜不見月與星日上或有見字有知無知兮為死為生嗚呼臣罪當誅兮天王聖明伊川曰退之作琴操有曰臣罪當誅兮天王聖明道文王意中事前後之人道不到此徐仲車言退之拘幽操云臣罪當誅兮天王聖明可謂知文王之心矣凱風七子之母猶不能安其室而云母氏聖善我無令人重自責也岐山操周公為太王作祝曰岐山在岐州今有岐山縣詩居岐之陽太王古公亶父也我家于􅃎方作我􅃎于家非是自我先公伊我承序敢有不同諸本序作緒方云商書丕承基緒然國語亦有奔走承序注謂承受事業次第也今按序謂傳授次第漢書多云朕承天序是也緒猶言統系方引商書之言是也二字義雖不同然用之于此似亦兩通但國語承序乃謂承受政役之次第與漢書字同而意異方作序而引以為說誤矣今狄之人將土我疆民為我戰誰使死傷彼岐有岨石山載土我往獨處爾莫余追無思我悲方云岨與阻同楚詞漢書多用岨字今以平聲讀之非也爾或作人爾莫方作莫爾非是履霜操尹吉甫子伯竒無罪為後母譖而見逐自傷作樊曰尹吉甫之子伯竒所作也吉甫聽其後妻之言逐之伯竒編芰荷而衣採楟花而食清朝履霜而自傷無罪見放逐乃援琴而鼓之見古樂府解題其詞曰朝履霜兮採晨寒考不明其心兮信讒言孤恩離别兮摧肺肝何辜皇天兮遭斯愆痛殁不同兮恩有偏誰流顧兮知此寃父兮兒寒母兮兒飢兒罪當笞逐兒何為兒在中野以宿以處四無人聲誰與兒語兒寒何衣兒飢何食兒行于野履霜以足母生衆兒有母憐之獨無母憐兒寜不悲兒寜方作母寜非是雉朝飛操牧犢子七十無妻見雉雙飛感之而作牧犢或作沐瀆王樊云吴兢樂府古題解云舊說齊宣時牧犢子七十無妻出薪于野見雉雌雄相隨意動心怨因援琴而歌以自傷其聲中絶魏武帝宫人有盧女者七嵗入漢宫學鼓琴能傳此曲崔豹古今注牧犢子齊宣王時人五十無妻出薪于野見雉雄雌相逐而飛乃作詞曰雉朝飛兮鳴相和雌雄羣遊兮山阿我獨何命兮未有家時將暮兮可奈何嗟嗟暮兮可奈何雉之飛于朝日羣雌孤雄意氣横出或無氣字當東而西當啄而飛隨飛隨啄羣雌粥粥集註記曰粥粥若無能或謂當作音祝說文呼雞重言之杜詩誰話雞翁嗟我雖人曽不如彼雉雞生身七十年無一妾與妃馬年云别本彼作此無雞字而下語妃音嫓與雉叶别鵠操商陵穆子娶妻五年無子父母欲其改娶其妻聞之中夜悲嘯穆子感之而作崔豹古今注云云其詞曰將乘比翼隔天端山川悠逺路漫漫攬衾不􅄰食忘飱後遂為夫妻雄鵠銜枝來雌鵠啄泥歸巢成不生子大義當乖離江漢水之大鵠身鳥之微更無相逢日且可繞樹相隨飛且或作安又無繞樹二字皆非是方云李陵詩長當為此别且復立斯須又古樂府與子如黄鵠將别復徘徊亦此意也殘形操曾子夢見一狸不見其首作事見琴録其詳未聞曽子一作魯子有獸維狸兮我夢得之其身孔明兮而頭不知吉凶何為兮覺坐而思巫咸韓曰離騷巫咸將夕降兮懐椒糈而要之注巫咸古神巫也張衡思𤣥賦抨巫咸使占夢上天兮識者其誰南山詩或無詩字凡百有二韻樊曰東方朔曰終南山天下之大阻也其山多玉石金銀銅鐵豫章檀柘異物之類不可勝原百工取給萬姓所仰足也洪曰此詩似上林子虚賦才力小者不可到也補註潛溪詩眼云孫莘老嘗謂老杜北征勝退之南山詩王平甫以謂南山勝北征終不能相服時山谷尚少乃曰若論工巧則北征不及南山若書一代之事以與國風雅頌相為表裏則北征不可無而南山雖不作未害也二公之論遂定吾聞京城南兹維羣山囿言羣山聚此東西兩際海方云史記春申君上秦昭王書王之地水為河塞外得水為海一經兩海太原地記曰河北得今按此與史記但皆極言其廣耳不必曲引塞外之說也巨細難悉究山經及地志茫昧非受授團辭試提挈挂一念萬漏挂一念或作一念挂非是孫曰集也山經地志既不詳欲團集其詞而試挈提之又恐掛一漏萬也欲休諒不能粗敘所經覯嘗昇崇丘望嘗或作常戢戢相輻輳也見相湊晴明出稜魯登切角縷脈碎分繡蒸嵐相澒洞胡孔切澒或作鴻方云淮南子澒濛鴻洞王褒簫賦揚雄羽獵賦所用皆同唐人始兼用之杜詩鴻洞半炎方澒洞不可掇是也表裏忽通透無風自飄簸音播又音跛融液煦柔茂横雲時平凝㸃㸃露數岫天空浮脩眉空或作宇聨孫曰言逺山横如脩眉也韓曰選洛神賦脩眉姢注脩長也西京雜記文君姣好眉色如望逺山又外傳趙飛燕妹名合徳為薄眉號逺山黛濃緑畫新就孤撑有巉絶海浴褰鵬噣音口補注已上敘南山大槩春陽潜沮子魚切又去聲洳音如陷濕地又去聲濯濯吐深秀吐深或作深吐巖巒雖嵂崒上音律下昨沒切山峻也史記隆崇嵂崒輭俗作軟弱類含酎音宙醇酒夏炎百木盛蔭鬱増埋覆神靈日歊歔上音枵下音虚氣出也雲氣爭結構秋霜喜刻轢音厯車所踐也或作鑠方云史記酷吏傳刻轢宗室磔卓立陟格切裂也記大儺旁磔孫曰言草木皆落山卓然獨立也癯音劬瘠也瘦參差相疊重剛耿陵宇宙冬行雖幽墨冰雪工琢鏤雪或作路新曦音希光選隆暑方赫曦照危峨億丈恒髙袤莫候切廣也危或作峞方云恒居鄧切或作亘明昏無停態頃刻異狀候補注已上敘四時變態西南雄太白補注子厚云雍州西南界于梁其山太白其地常寒又諺云武功太白去天三百突起莫間簉祝曰左氏僖子使助還氏之簉注簉副倅也嵇康曰承間簉之藩都配徳運唐土徳太白在西南坤位故云配徳運分宅占丁戊亦坤位逍遥谷名越坤位坤或作地詆音邸詆訶訐陷乾竇音豆穴也孫曰言太白非特占西南坤位而已又侵及西北乾位故曰陷乾竇按藩都至乾竇四句未詳其意空虚寒兢兢風氣較捜漱朱維方燒陰霰蘓佃切雨雪雜縱騰糅女救切雜也昆明孫曰昆明池漢武帝時作在長安西南周圍四十里太池北去覿偶晴晝緜聨窮俯視倒側困清漚烏候切久漬微瀾動水面踊躍躁猱奴刀切猴也狖音柚鼠屬善旋躁或作猱驚呼惜破碎仰喜呀玉篇虚牙切唅牙張口皃不仆敷救切又匹候切倒也頓也補注已上言南山方隅連亘之所也前尋徑杜墅神與切孫曰即杜陵也在長安萬年縣東南韓曰唐宰相杜佑與同列宴于樊川别墅即此也墅田廬也坌蒲悶切塵也後漢益氣坌涌徑或作經方云當如夜徑澤中之徑杜或作社非是坌或作忿蔽畢原孫曰周文武葬處在今咸陽縣西北或曰文王子封於畢此其地也陋﨑嶇上音祈下音區上軒昻始得觀覽富行行補注上夏良切下户庚切或謂皆如字謝惠連詩行行道轉逺又古詩行行重行行將遂窮嶺陸煩互走音奏勃然思坼裂擁掩難恕宥巨靈與夸蛾夸音誇列子云帝命夸蛾氏二子負太行王屋二山一厝朔東一厝雍南自北冀之南漢之陰無隴斷焉逺賈音古期必售承切賣去也蛾或作娥方云考列子當作蛾賈或作雇還疑造物意固護蓄精祐力雖能排斡烏括切又音管轉也楚詞斡維焉繫雷電怯呵詬呼漏切怒也罵也攀縁脱手足蹭蹬上七鄧切下音鄧失道也選蹭蹬窮波抵積甃測救切茫如試矯首堛塞上普逼切土塊爾雅云塊堛也塞填塞生怐愗上冦下茂愚也楚詞宋玉九辨云直怐瞀而自若按集韻通作轂霧鄙吝心不明也威容䘮蕭爽近新迷逺舊拘官計日月欲進不可又因縁窺其湫音秋湫者龍所居也南山有炭谷湫凝湛閟陰嘼音嗅亦作畜樊曰作獸者非禮運曰龍以為嘼謂湫中蛟也秋懐詩云其下澄湫水有蛟寒可罾即此也洪曰嘼畜産也或作獸魚蝦可俯掇丁括切拾也神物安敢冦林柯有脫葉欲墮鳥驚救樊曰其湫如鏡面葉落恐其汚鳥即衘去葢其神物之靈如此公題炭谷湫祠堂所謂魚鱉蒙擁護者此也爭銜彎環飛投棄急哺鷇音冦鳥生須哺曰鷇自食曰雛爾雅生哺鷇生噣鷇旋歸道迴睨音詣視也達枿壯復奏達或作逺方云盧仝月蝕詩頭戴弁冠髙達枿吁嗟信竒怪峙質能化貿音茂易也前年遭譴謫連山謫探歴得邂逅初從藍田縣名今在雍州有闗入顧眄勞頸脰時天晦大雪淚目苦矇瞀音茂目不明莊子予適有瞀病注風眩冒亂峻塗拖長冰直上若懸溜褰衣步推馬顛蹶顛仰倒蹶失脚也退且復扶富切又也返也蒼黄忘遐睎音希視逺所矚音燭亦視也選西矚與遊嘆纔左右杉篁咤陟駕切噴也記無咤食蒲蘓杲耀攅在完切聚也楚辭匍匐兮叢攅介胄專心憶平道脫險逾避臭逾或作邇非是吕氏春秋曰人有大臭者其兄弟親戚皆無能與居者昨來逢清霽宿願忻始副始方作所非是自前年遭譴謫以役讀之可見峥鋤耕切嶸音宏山峻也馮衍曰觀壺日之峥嶸楚辭下峥嶸而無地躋冢頂倐閃雜鼯鼬吾又二音蟲似䑕爾雅謂之飛生能捕䑕前低劃音畫忽麥切錐刀曰劃前漢劃崇墉開闊爛漫堆衆皺方從蜀人韓仲韶本作􅀈云石蟇也二韻皆取喻謂髙而羣峯飛馳如鼯鼬之奔低而堆阜分布如衆􅀈之列於義為近登今按此蜀本之誤沈元用本亦然皆非是葢此但言山之時叢薄蔽翳方與蟲獸羣行而忽至上頂則豁然見前山之低雖有髙陵深谷但如皺物微有蹙摺之文耳此最為善形容者非登髙山臨曠野不知此語之為工也況此句衆皺為下文諸或之綱領而諸或乃衆皺之條目其語意接連文勢開闔有不可以毫釐差者若如方說則不唯失其統紀亂其行列而鼯鼬動物山體常静絶無相似之理石蟇之與堆阜雖畧相似然自髙頂下視猶若成堆則亦不為甚小而未足見南山之極髙矣其與下文諸或疎宻工拙又有逈然不侔者未論古人但使今時舉子稍能布置者已不為此又况韓子文氣筆力之盛闗鍵紀律之嚴乎大抵今人于公之文知其力去陳言之為工而不知其文從字順之為貴故其好怪失常類多如此今既定從諸本而復俻論其說以曉觀者云或連若相從或蹙若相鬬或妥若弭伏或竦若驚雊音遘雉鳴或散若瓦解胡買切散也或赴若輻湊輻方作輪轂今按輪者轂輻之通名其湊於者輻而已當作輻或翩若船遊翩或作汎或决若馬驟或背若相惡或向若相佑或亂若抽筍或嵲吾結切山小而不安貌選嶮巇屹嵲若注灸音炙灼也或錯若繪畫或繚力少切又音僚繚繞也若篆籕音宙篆籕之文或羅若星離或蓊若雲逗音豆遛住也或浮若波濤或碎若鋤耨奴豆切􅘥器或如賁育孟賁夏育楊子注皆衛人或云秦之勇士倫賭勝勇前購孫云以財而求也先強勢已出後鈍嗔䛠譳上音聞下音耨不能言也玉篇言不正也或如帝王尊叢集朝賤㓜雖親不䙝狎雖逺不悖謬或如臨食案肴核紛飣餖上丁定切下音豆貯食也紛或作分又如遊九原墳墓包槨柩或纍若盆甖或掲音訐若㽅豆或作登豆豆爾雅木豆謂之豆瓦謂之登或覆若曝鼈或頽若寢獸寢或作窮非是又或作偃或蜿一丸切楚詞曰駕八龍之蜿蜿蟠蜿龍貌又曰龍屈兮蜿蟤若藏龍或翼若搏鷲音就陸機云雎鳩目上骨露幽人謂之鷲祝曰鳥名山海經云景山多鷲黒色多力或齊若友朋或隨若先後友朋或作迎隨隨或作差方云方言曰先後猶娣姒釋名曰以來先後言也校本不詳此義而以先後為虚字遂改友朋為迎隨以偶之又避重復而改隨字為差字其誤甚矣今按史記見神于先後宛若即謂其娣姒也或迸若流落或顧若宿留上音秀下音霤漢武帝宿留海上史記宿留之數日無所見或戾若仇讐或宻若婚媾或儼若峨冠或翻若舞䄂舞或作舉或屹魚乞切屹山貌若戰陣或圍若蒐狩或靡然東注或偃然北首或如火熺音僖熾也與熹同選耀華屋而熾洞房熖或作煙或若氣饙餾上音分下音溜蒸飯也爾雅饙餾稔也注􅧮飯為饙饙熟為餾或行而不輟或遺而不收音狩獲也或斜而不倚或弛而不彀張弓也或赤若秃鬝丘閑切又客入切祝曰鬂秃貌孫曰頭瘡或燻若柴槱余救切積火以燎詩薪之槱之或如龜拆兆或若卦分繇音由韓曰占辭或前横若剥或後斷若姤延延離又屬夬夬叛還遘喁喁音顒魚口也吳越春秋云天下喁喁魚闖丑禁切馬出門貌公羊云開之則闖然注出頭貌萍落落月經宿音秀列星也誾誾樹牆垣巘巘語偃切詩陟則在巘架庫廐方云巘山形如甑也姚令威云恐當作䡾䡾魏都賦四門䡾䡾參參削劍㦸煥焕銜瑩琇音秀詩充耳琇瑩注美石也敷敷花披蕚闟闟音翕闟闟或作翕翕屋摧霤力救切屋水祝曰屋簷也又水流也悠悠舒而安兀兀狂以狃女救切習也前漢奸有所隠則狃而寖廣超超出猶奔蠢蠢駭不懋補注已上並序其經歴所見之狀大哉立天地經紀肖營腠音輳肖象也謂象營衛腠理厥初孰開張僶音泯僶俛一作俛仰俛誰勸侑音宥勸食創兹朴而巧戮力忍勞疚得非施斧斤無乃假詛呪鴻荒竟無傳功大莫酬僦即僦切賃也前漢或不償其僦費無或作誰又作莫莫或作豈嘗聞於祠官芬苾降歆嗅許救切謂神饗之也或作齅依字當作齅斐然作歌詩惟用贊報酭音又言助報酭之曲謝自然詩果州南充縣寒女謝自然童騃語駭切癡也無所識但聞有神仙輕生學其術乃在金泉山繁華榮慕絶父母慈愛捐凝心感魑魅慌惚難具言一朝坐空室雲霧生其間如聆笙竽韻來自㝠㝠天白日變幽晦蕭蕭風景寒簷楹蹔明㓕蹔或作氣五色光屬聨觀者徒傾駭躑躅上直炙切下厨玉切祝云不進貌楚詞待天明兮立躑躅詎敢前須臾自輕舉飄若風中煙茫茫八紘音宏淮南子曰九州之外有八夤八夤之外有八紘大影響無由縁里胥上其事郡守驚且歎或作觀或作歡驅車領官吏甿俗争相先入門無所見冠屨同蛻音稅楚詞濟江海兮蛻蟬蟬皆云神仙事灼灼信可傳余聞古夏后象物知神姦山林民可入民或作人方云公文石本用民字多只為字不成不盡避也魍魎左傳王孫滿曰夏之方有徳也鑄鼎象物使民知神姦故入川澤山林螭魅罔兩莫能逢之莫逢旃逶迤不復振後世恣欺謾幽明紛雜亂人鬼更相殘秦皇雖篤好漢武洪其源自從二主來此禍竟連連木石生怪變狐狸騁妖患音還離騷屢離憂而逢患莫能盡性命安得更長延盡或作保方云嵇康養生論導養得理以盡性命人生處萬類知識最為賢奈何不自信反欲從物遷往者不可悔孤魂抱深寃來者猶可誡余言豈空文空或作虚人生有常理男女各有倫寒衣及饑食在紡績耕耘紡或作蠶下以保子孫上以奉君親茍異於此道皆為棄其身噫乎彼寒女永託異物羣感傷遂成詩或作詠昧者宜書紳秋懐詩十一首樊曰秋懐詩十一首文選詩體也唐人最重文選學公以六經之文為諸儒唱文選弗論也獨於李邢墓誌曰能諳記論語尚書毛詩左傳文選而公詩如自許連城價傍砌看紅藥眼穿長訝雙魚斷之句皆取諸文選故此詩往往有其體窻前兩好樹衆葉光薿薿音擬祝曰茂也詩黍稷薿薿秋風一披拂策策鳴不已微燈照空牀夜半偏入耳愁憂無端來感歎成坐起天明視顔色與故不相似羲和驅日月或作白日疾急不可恃浮生雖多塗雖或作每趨死惟一軌胡為浪自苦得酒且歡喜白露下百草蕭蘭共雕悴雕或作憔或作凋方云荀子勞彫倅青青四牆下已復生滿地寒蟬暫寂寞蟋蟀鳴自恣運行無窮期禀受氣苦異適時各得所松栢不必貴彼時何卒卒蒼沒切祝曰忽也我志何曼曼音萬長也犀首公孫衍史記空好飲亷頗尚能飯樊曰亷頗趙將以讒奔魏其後趙王使使者視頗頗為之一飯斗米肉十斤被甲上馬以示可用使者還報曰亷將軍雖老尚善飯學堂日無事驅馬適所願茫茫出門路欲去聊自勸或作歎歸還閱書史或作簡書文字浩千萬陳跡竟誰尋陳或作塵方云莊子六經者先王之陳迹誰或作難賤嗜非貴獻韓曰負日之暄而欲獻君食芹之美而欲進御貴賤固有差矣詩意謂所嗜不與時偶丈夫意有在或作存女子乃多怨秋氣日惻惻秋空日凌凌上無枝上蜩下無盤中蠅豈不感時節耳目去所憎去或作無清曉巻書坐南山見髙稜其下澄湫水澄或作通或作有或作古或作石有蛟寒可罾音曽惜哉不得往豈謂吾無能離離掛空悲慼慼抱虚警露泫秋樹髙泫或作滴或作啼或作泣方云謝靈運詩花上露猶泫謝惠連泫泫露盈條王僧達詩秋還露泫柯古詩於露用泫字非一今按檀弓孔子泫然流涕則泫為流涕之皃於下句蟲弔對偶尤切蟲弔寒夜永斂退就新懦趨營悼前猛歸愚識夷塗愚或作懦汲古得修綆名浮猶有恥味薄真自幸庶幾遺悔尤即此是幽屏必郢切僻也張衡曰雜挿幽屏今晨不成起端坐盡日景蟲鳴室幽幽方作幽室中幽今按當作室幽乃與下句相偶月吐窻冏冏居永切韓曰窻牖明也孫綽曰冏冏秋月明吐一作照䘮懐若迷方列子秦人逢氏子有迷罔之疾天地四方無不倒錯者浮念劇含梗古杏切塵埃慵伺候文字浪馳騁尚須勉其頑王事有朝請前漢吴王濞使人為秋請孟康曰律春日朝秋曰請秋夜不可晨秋日苦易暗我無汲汲志何以有此憾寒雞空在棲缺月煩屢瞰苦濫切視也楚詞馮崑崙以瞰霧露有琴具徽絃再鼓聽愈淡古聲久埋滅無由見真濫低心逐時趨低或作吾葢草書之誤而失其半苦勉祗能暫有如乘風船一縱不可纜音濫用以維舟選繫纜臨江樓不如覷文字丹鈆音㳂粉筆也事㸃勘豈必求贏餘所要石與甔都濫切小甖也韓曰齊東北海岱之間謂之甔列子狀若甔甀揚子家無檐石之儲通用巻巻落地葉隨風走前軒鳴聲若有意顛倒相追奔空堂黄昬暮我坐黙不言童子自外至吹燈當我前問我我不應饋我我不餐退坐西壁下坐或作下讀詩盡數編作者非今士相去時已千其言有感觸使我復悽酸顧謂汝童子置書且安眠丈夫屬有念夫或作人說今按宋本亦作人者謂丈人者尊長之稱古樂府所謂丈人且安坐是也此為答童子而自稱故其言如此更詳之事業無窮年霜風侵梧桐衆葉著樹乾空堦一片下琤楚耕切玉聲琤或作蹌若摧琅玕上音郎下音干謂是夜氣㓕望舒月也淮南子月御曰望舒離騷前望舒使先驅又補注張載曰望舒四五團聞葉聲琤然誤謂望舒之霣其團也霣于敏切墜也其團青㝠無依倚飛轍危難安驚起出户視倚楹久汍瀾上音丸下音闌選揮筆涕汍瀾憂愁費晷景日月如跳丸迷復不計逺計或作記為君駐塵鞍暮暗來客去羣囂各收聲悠悠偃宵寂斖斖音尾進也美也前漢皃生斖斖抱秋明世累忽進慮進或作連外憂遂侵城強懐張不滿弱念缺已盈已或作易詰屈避語穽㝠茫觸心兵敗虞千金弃得比寸草榮知恥足為勇晏然誰汝令誰或作惟鮮鮮霜中菊既晚何用好揚揚弄芳蝶揚揚或作陽陽爾生還不早東坡詩云勿訝昌黎公恨爾生不早謂此語也運窮兩值遇婉孌上音宛下力衮切詩婉兮孌兮注婉少皃孌好貌死相保西風蟄龍蛇衆木日凋槁由來命分爾泯滅豈足道赴江陵途中寄贈王二十補闕李十一拾遺李二十六員外翰林三學士或作寄三學士題下注王二十補闕李十一拾遺李二十六員外方云蜀本無翰林字三學士王涯李建李程也孤臣昔放逐血泣追愆尤血泣或作泣血或作血泫汗漫上捍下慢淮南子徙倚于汗漫之宇又曰吾與汗漫期于九垓之外注汗漫不可知云也不省識怳如乘桴浮或自疑上疏上疏豈其由或云自疑當作疑自謂疑由上疏也故下文云上疏豈其由當乙是年京師旱田畝少所收上憐民無食征賦半已休征或作兵有司恤經費未免煩徴求富者既云急貧者固已流傳聞閭里間赤子弃渠溝持男易斗粟掉臂莫肯酬我時出衢路餓者何其稠其或作為親逢道邊死方云閣本作道邉死而從杭蜀作道死者漢今按古人謂尸為死左傳生拘石乞而問白公之死書何處求子死且古語又有直如弦死道邉之說韓公葢兼用之此乃閣本之善而方反不從殊不可曉佇立久咿嚘佇立或作停馬歸舍不能食有如魚中鉤中或作挂方從蜀本作出云選文賦若遊魚衘鉤而出重淵之深公語原此也今按韓公未必用選語况其語乃魚出淵非魚出鉤不若作挂為近然第五巻送劉師服詩有魚中鉤之語則此出字乃是中字之誤而尚存其彷彿耳今乃作中適㑹除御史誠當得言秋拜疏移閣門為忠寜自謀上陳人疾苦無令絶其喉或作糇下陳畿甸内陳或作言内方作事根本理宜優積雪驗豐熟幸寛待蠶麰音牟麰麰麥也天子惻然感司空貞元十九年三月杜佑檢校司空同中書門下平章歎綢繆直留莫彪二切詩綢繆束薪注猶纒綿也謂言即施設乃反遷炎州反或作返州本又作洲方云古本只作州樊曰遷炎州謂貶陽山也舊史言公自監察御史上章數千言極論宫市徳宗怒貶陽山令量移江陵府法曹參軍新史亦云上疏論宫市今詩自序其得罪之由大抵言京師旱饑未嘗言宫市惟皇甫持正神道碑云闗中旱饑先生力言天下根本專政者惡之出為陽山令正與詩意合持正當時從公遊者知公之不以論宫市而出審矣同官盡才俊偏善栁與劉時栁宗元劉禹錫皆為御史或慮語言洩傳之落寃讐二子不宜爾將疑斷還不方鳩切未定之辭中使臨門遣頃刻不得留病妹卧床褥妹或作姝分知隔明幽悲啼乞就别百請不頷頭弱妻抱稚子出拜忘慙羞僶俛不廻顧行行詣連州朝為青雲士暮作白首囚商山季冬月冰凍絶行輈春風洞庭浪出沒驚孤舟逾嶺到所任低顔奉君侯酸寒何足道隨事生瘡疣贅也莊子曰附贅垂疣逺地觸途異吏民似猨猴生獰尼耕切惡也李賀猛虎行乳孫哺子教得生獰多忿狠多或作知辭舌紛嘲啁上陟交切下張流切鳥聲也白日屋簷下雙鳴鬭鵂鶹上音休下音留孫曰訓狐也有蛇類兩首有蠱羣飛游蠱或作蟲方云鮑明逺詩吹蠱病行暉李善曰吹蠱飛蠱也窮冬或揺扇盛夏或重裘􅄓音貝海風也南人呼為貝嶺南録異云嶺㠐夏秋雄風曰􅄓發日午至夜半止起最可畏訇音轟大聲選聲訇􅀈其若振哮許交切祝曰豕驚聲越絶書聲若哮虎簸陵丘雷霆助光怪氣象難比侔癘疫忽潜遘十家無一瘳猜嫌動置毒對案輒懐愁前日遇恩赦私心喜還憂果然又羈縶陟立切祝曰係馬也不得歸耡耰音憂摩田器此府雄且大騰凌盡戈矛棲棲法曹椽何處事卑陬生平企仁義所學皆孔周早知大理官不列三后儔何况親犴音岸漢書義曰鄉亭之獄曰犴獄敲丘交切搒音彭谷永曰搒笞㿊於炮烙發姦偷懸知失事勢恐自罹罝罘上子邪切下音浮兔網湘水清且急凉風日修修胡為首歸路旅泊尚夷猶楚辭君不行兮夷猶注猶豫也昨者京使至者或作日嗣皇孫曰貞元二十一年順宗内禪憲宗即位也傳冕旒赫然下明詔首罪誅共吺或作兠方吺古文兠字也復聞顛夭輩韓謂當時杜黄裳鄭餘慶之徒為相峨冠進鴻疇孫曰鴻大也疇謀也班行再肅穆璜半壁也周禮以𤣥璜禮北方珮鳴琅璆上音郎下音求璆琳小雅注美玉琅玕注云似珠也佇繼貞觀烈邉封脫兠鍪音牟三賢推侍從卓犖吕角切特達也左思曰卓犖觀羣書傾枚鄒髙議參造化方作物非是清文焕皇猷協心輔齊聖致理同毛輶音由詩曰徳輶如毛小雅詠鳴鹿食苹音平水草貴呦呦音幽鹿鳴遺風邈不嗣豈憶嘗同禂嘗方作常方云禂與幬同床帳也或作儔或作稠皆非是韓曰禂被也樊曰公於三賢有同禂之舊故望之以鹿鳴之風也失志早衰换前期擬蜉蝣上房尤切下夷周切祝曰渠畧也生糞土中朝生暮死自從齒牙缺始慕舌為柔淮南子曰老子學商容見舌而知柔注云劉向說苑常從有疾老子徃問焉張其口而示老子曰吾舌存乎老子曰然吾齒存乎老子曰亡子知之乎老子曰舌之存也豈非以其柔乎齒之亡也豈非以其剛乎曰嘻是已因疾鼻又塞漸能等薫蕕深思罷官去畢命依松楸音秋孫曰松楸舊隴也空懐焉能果但見嵗已遒音酋盡也殷湯閔禽獸解網祝蛛蝥賈誼新書湯見設網者四面乃去其三面祝曰蛛蝥作網欲左左欲右右吾受其犯令者士民聞之曰徳及禽獸而况我乎雷焕掘寳劍寃氛銷斗牛氛或作氣兹道誠可尚誰能借前籌殷勤謝吾友吾或作朋明月非暗投暮行河堤上暮行河堤上四顧不見人衰草際黄雲感歎愁我神夜歸孤舟卧展轉空及晨謀計竟何就嗟嗟世與身夜歌静夜有清光閑堂仍獨息念身幸無恨志氣方自得樂哉何所憂所憂非我力或作可悲我才力重雲一首李觀疾贈之天行失其度方作天行令失度云公詩語多用此一體今按諸本皆作天行失具度文意自通公詩雖間有如方說者然亦不專以此為竒也陰氣來干陽重雲閉白日方作日夜非是炎燠成寒凉小人但咨怨君子惟憂傷飲食為减少方作尚為减非是身體豈寜康此志誠足貴懼非職所當職或作識方云張衡同聲歌賤妾職所當藜羮尚如此肉食安可嘗窮冬百草死幽桂乃芬芳且况天地間大運自有常勸君善飲食鸞鳳本髙翔江漢一首答孟郊江漢雖云廣乘舟渡無艱或作難流沙信難行馬足常徃還凄風結衝波狐裘能禦寒終宵處幽室華燭光爛爛或作炎炎方云楚辭爛字叶平聲九章曰曽枝剡棘圓果摶兮青黄雜揉文章爛兮茍能行忠信行或作存可以居夷蠻嗟余與夫子此義每所敦何為復見贈繾綣上音遣下苦逺切不相離兒詩以謹繾綣在不諼許元切忘也長安交遊者一首贈孟郊長安交遊者貧富各有徒親朋相過時過或作遇亦各有以娱或作亦有以歡娱陋室有文史髙門有笙竽何能辨榮悴且欲分賢愚岐山下二首諸本只作一首方云自日暮邉火驚以上為第一篇世有灌畦暇語一書謂子齊初應舉韓公賞之為作丹穴五色羽子齊姓程字昔範嘗著中謩三巻見因話録則下詩似當為别篇第前詩題以岐山下此必遊鳳翔日作然四語亦不成篇此詩載之巻末疑有脱誤誰謂我有耳不聞鳳皇鳴朅丘傑切去也來岐山下日暮邊鴻驚鴻方作火今按上文言不聞鳳鳴則此當作鴻丹穴五色羽其名為鳳皇昔周有盛徳此鳥鳴髙岡和聲隨祥風窅窕相飄揚窅窕或作窅窅或作窈窕方本作窅窕而舉正改窕為窈按窅即窈字既連用之不應異體或是窅字一作窈耳聞者亦何事但知時俗康自從公旦死公或作姬千載閟其光吾君亦勤理遲音治祝曰待也漢書側席遲士爾一來翔别本韓文考異巻一欽定四庫全書别本韓文考異巻二宋王伯大重編古詩北極一首贈李觀北極有羈羽南溟有沈鱗川源浩浩隔影響兩無因風雲一朝㑹變化成一身誰言道里逺里方作理非是陶詩云不怨道里長正作里感激疾如神我年二十五求友昧其人哀歌西京市乃與夫子親所尚茍同趨尚或作向趨方云孟子云三子者不同道其趨一也注趨讀如趣賢愚豈異倫方為金石姿萬世無緇磷音鄰無為兒女態兒女或作女兒非是憔悴悲賤貧此日足可惜一首贈張籍洪曰此詩雜用韻又叠用韵歐陽公云退之工於用韻得寛韻則波瀾横溢泛入傍韻如此日足可惜之類是也得窄韻則不復旁出因難見巧如病中贈張十八之類是也此日足可惜此酒不足嘗不足或作不可捨酒去相語去方作須今按須字無理或是復字傳冩誤矣共分一日光念昔未知子孟君自南方自矜有所得言子有文章我名屬相府欲往不得行或作驤思之不可見百端在中腸維時月魄死冬日朝在房韓曰朝旦也月令孟冬之月日在房驅馳公事退聞子適及成或作墻方云此詩視古用韻不入今韻者多為後學以意妄改吴才老云詩人用行字韻二十有五無叶今讀者此詩後用東去趍彭城諒知有所成皆庚韵也何獨於此疑之命車載之至引坐於中堂開懐聽其説往往副所望音亡孔丘殁已逺仁義路久荒紛紛百家起詭怪相披猖亂也長老守所聞後生習為常少詩詔切知誠難得純粹古巳亡古一作固譬彼植園木有根易為長留之不遣去館置城西旁嵗時未云幾浩浩觀湖江未或作來江或作湘非是方云植園木以喻籍之始從學也觀湖江以喻其成也衆夫指之笑謂我知不明兒童畏雷電魚鼈驚夜光州家舉進士選試繆所當馳辭對我䇿章句何煒音偉光也煌相公董晋也朝服立工席歌鹿鳴禮終樂亦闋苦穴切終也記曰爵卒而樂闋相拜送於庭之子去須㬰赫赫留盛名竊喜復竊嘆竊喜復或作慷慨仍諒知有所成人事安可恒奄忽令我傷聞子髙第日正從相公喪孫曰貞元十五年髙郢知舉籍登第是嵗三月晋卒愈䕶其喪行哀情逢吉語倘怳上音敞下許昉切補注相如曰聽敞怳而亡聞注耳不諦也倘或作􅐞方云楚詞逺遊作敞怳相如傳作敞怳難為雙暮宿偃師縣名今在洛州西徒展轉在牀諸本作展轉在空床今按或當從諸本夜聞汴州亂遶壁行徬徨我時留妻子時留或作乃棄倉卒不及將相見不復期零落甘所丁驕兒未絶乳念之不能忘忽如在我所或作其側所或作前或作側耳若聞啼聲中途安得返一日不可更俄有東來説我家免罹殃乘船下汴水東去趨彭城徐州地孫曰公妻子先在徐州從喪朝至洛方無朝字洛下有陽字軍今按朝至洛盖用洛誥語又下文云日西入門則此當作朝至洛明矣還走不及停還或作旋假道經盟津出入行澗岡日西入軍門羸馬顛且僵音姜仆也主人願少留延入陳壺觴卑賤不敢辭忽忽心如狂飲食豈知味絲竹徒轟轟平明脱身去决若驚鳬翔黄昏次汜音似氾水在河南城臯縣水欲過無舟航過或作濟號呼久乃至夜濟十里黄中流上灘潬灘方作沙潬或作澤方云郭璞曰江東人呼水中沙堆為潬潬即灘也今按下句便有沙字恐只當作灘二字複出如上句言舟航之類沙水不可詳驚波暗合沓星宿爭翻芒轅馬蹢躅鳴諸本或作馬乏復悲鳴或作馬蹢濁鳴悲左右泣僕童甲午憇時門左傳昭十九年鄭大水龍鬬于時門之外洧淵柱氏注云時門鄭城門也臨泉窺鬬龍東南出陳許陂澤平茫茫方作茫茫平云用古韵勢今按此詩固用古韵然皆因其語之自然未嘗作意捨此而用彼也諸本只作陂澤平茫茫韵與語恊本無不可若作陂澤茫茫平却覺不響不應以欲用古韵之故牽挽而强就之也又按别本平或作路又或作何者語意尤勝讀者詳之道邊草木花紅紫相低昻百里不逢人角角雄雉鳴角方云音谷見集韵雄雉或作雉雛行行二月暮乃及徐南疆下馬步堤岸上船拜吾兄洪曰公有三兄皆早世見于集中者雲卿之子俞紳卿之子岌皆公從兄或曰吾兄謂張籍非也誰云經艱難艱或作險百口無夭殤或作横方云楚詞强死者子為國殤三字全語意見列僕射南陽公張建封也宅我陮音綏水名在徐州孫云二月未公至徐州泗濠節度使張建封以公為節度推官祝曰公與孟東野書云主人與余有故居余符離睢上即此也水陽篋中有餘衣盎烏浪切盆也中有餘糧閉門讀書史讀或作閲窻戸忽已凉諸本多作清風窻户凉或作窻戸風已凉或作窻户清風凉今按公以二月末到徐不知此詩何時作若夏即當作清風窻户凉若秋即當作窻户風已凉日念子來遊子豈知我情别離未為久辛苦多所經對食每不飽共言無倦聽連延三十日晨坐達五更我友二三子友方作有宦遊在西京東野窺禹穴李翺觀濤江蕭條千萬里㑹合安可逢淮之水舒舒楚山直叢叢子又舍我去我懐焉所窮焉或作安男兒不再壯百嵗如風狂方作狂風只今按方亦强用古韵之過不如作風狂語勢尤徤髙爵尚可求無為守一鄉幽懐幽懐不能冩能或作可行此春江潯音尋水涯選弭節乎江潯適與佳節㑹士女競光隂凝䊋耀洲渚繁吹蕩人心人方作神非是間闗林中鳥亦知和為音諸本作知時為和音非是然今本疑亦有誤或恐為是其字豈無一罇酒自酌還自吟但悲時易失四序迭相侵我歌君子行視古猶視今君子法天運君子法天運四時可前知可或作毎小人唯所遇寒暑不可期利害有常勢取捨無定姿焉能使我心皎皎逺憂疑落葉一首送陳羽或作葉落篇首同非是落葉不更息斷蓬無復歸飄颻終自異邂逅暫相依悄悄深夜語悠悠寒月輝誰云少年别流涙各霑衣歸彭城天下兵又動太平竟何時訏音吁大也謨者誰子無乃失所宜前年闗中旱閭井多死飢方作饑去嵗東郡水郡或作洛方云非也舊紀貞元十五年秋鄭滑大水生民為流屍上天不虛應禍福各有隨我欲進短䇿無由至彤墀彤或作丹刳肝以為紙瀝血以書辭上言陳堯舜下言引龍䕫言詞多感激文字少葳蕤上音逶下音緌盛貌選文物共葳蕤葳或作萎方云紛葳蕤以馺遝見陸機文賦今按葳蕤已見楚詞一讀已自怪再尋良自疑食芹説文芹楚葵也列子宋有田夫自曝於日謂其妻曰負日之暄人莫知者以獻吾君將有重賞又有喜食芹者對鄉豪稱之鄉豪取而嘗之蟄於口慘於腹衆哂而怨之其人大慙晉山濤為吏部郎舉嵇康自代康恨不知已移書責之曰野人有快炙背而美芹欲獻之至尊雖有區區之意亦已踈矣顧足下多似之雖云美獻御固已癡緘封在骨髓耿耿空自竒昨者到京城屢陪髙車馳周行多俊異議論無瑕疵見待頗異禮未能去毛皮到口不敢吐徐徐俟其􅇖虚冝切揚子曰􅇖可扺乎􅇖罅隙也歸來戎馬閒驚顧似覉雌孤雌也枚乘曰日暮則迷鳥覉雌宿焉連日或不語終朝見相欺相方曰我見相或作相見疑今按此三家三本皆有誤乘閒輙騎馬茫茫詣空陂遇酒即酩酊君知我為誰醉後煌煌東方星奈此衆客醉初喧或忿爭或作紛争方作争紛中静雜嘲戲雜或作惟方云雜以嘲戲選典論全語淋漓身上衣漓或作浪顛倒筆下字人生如此少酒賤且勤置醉贈張秘書方云今本下或注徹字徹元和四年進士此詩元和初作徹猶未第公五六年間皆在東都此詩盖在長安日作非徹也人皆勸我酒我若耳不聞今日到君家呼酒持勸君為此座上客方作士非是及余各能文君詩多態度藹藹春空雲東野動驚俗天葩吐竒芬張籍學古淡軒鶴避雞羣鶴方及諸本皆作昂鶴今按此言張籍學古淡而不驚於綺靡如以乘軒之而反避鷄羣也又軒鶴乃與天葩之句相偶阿買趙堯夫曰或問魯直阿買是退之何人答云退之姪必有據而云不識字頗知書八分樊曰秦壊古文有八體其一𨽻書今八分也詩成使之冩亦足張吾軍所以欲得酒為文俟其醺酒味既冷冽酒氣又氛氲上音芬下于云切祝云氣也冷或作冷氣或作烟氛或作氤方云氛氲盛貌字見選雪賦性情漸浩浩諧笑方云云此誠得酒意餘外徒繽紛亂也長安衆富兒盤饌羅羶葷音熏臭莱不解文字飲惟能醉紅裙雖得一餉樂有如聚飛蚊今我及數子固無蕕與薫險語破鬼膽補注開元天寳遺事李果為洛陽令有劉兼者過其境夜聞人外語聲曰古今正人李令是也見其行事令人破胆開戸視之無物乃鬼神也髙詞嫓匹詣切祝曰爾雅妃嫓也注相偶嫓也嫓或作動皇墳至寶不雕琢或作瑑神功謝鋤耘方今向太平元凱承華勛吾徒幸無事庶以窮朝曛音薫日入也同冠峽南方二月半春物亦已少維舟山水間晨坐聴百鳥宿雲尚含姿朝日忽升曉羇旅感和鳴囚拘念輕矯和鳴或作陽和方云和鳴輕矯皆指百鳥而言也潺湲淚久迸久或作交詰曲思增繞行矣且無然盖棺事乃了送惠師惠師浮屠者乃是不羇人鄒陽上吴王書使不羇之士與牛馬同皂注不羇無所拘繫也又司馬遷傳少負不羇之才十五愛山水超然謝朋親或作同隠淪脱冠翦頭髪頭或作短按下對蹤塵當作頭髪飛步遺蹤塵飛或作孤發跡入四明梯空上秋旻遂登天台望韓曰天台山名在台州衆壑皆嶙峋上音隣下音旬深崖貌選階楯峋嶙祝云前漢岭巆嶙峋夜宿最髙頂舉頭看星辰光芒相照燭南北爭羅陳兹地絶翔走自然嚴且神㣲風吹木石澎湃上音彭下普拜切相如曰洶湧澎湃聞韶鈞夜半起下視夜半或作半夜或作中夜溟波銜日輪魚龍驚踊躍呌嘯成悲辛嘯或作咲方云選海賦及鮑謝詩多用呌嘯字怪氣或紫赤敲磨共輪囷去輪切屈曲也鄒陽曰輪囷離竒金鵶韓曰日也既騰翥章恕切騰舉六合俄清新常聞禹穴竒東去窺甌閩越俗不好古流傳失其真幽蹤邈難得聖路嗟長堙廻臨浙江濤屹起髙峨岷音旻二山壯志死不息洪曰謂伍子胥也千年如隔晨是非竟何有棄去非吾倫凌江詣廬嶽廬山在今江州浩蕩極遊廵崔崒没雲表陂陀上普河切下音沱廣云陂陀不平之意孫云言廬山上没雲表下浸湖淪淪岸也浸湖淪是時雨初霽懸瀑垂天紳天或作大方云宋之問詩雨巖天作帶雲壑樹披衣孟東野詩亦常用天紳字前年往羅浮羅浮山在廣州曾城博羅二縣之境步戞南海漘音脣補注水際也大哉陽徳盛榮茂恒留春鵬鶱墮長翮鶱或作騫方云鶱從鳥虛言切飛舉也從馬者起䖍切虧也今字多誤用故詳之
