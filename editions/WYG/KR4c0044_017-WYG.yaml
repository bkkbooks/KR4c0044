body:
  text: 與崔羣書自足下離東都凡兩度枉問尋承已達宣州主人仁賢同列皆君子雖抱羇旅之念亦且可以度日無入而不自得樂天知命者固前修之所以禦外物者也况足下度越此等百千輩豈以出處近逺累其靈臺邪方無百千輩三字今按諸本及詳文勢皆當有此三字但不知指何人而言耳宣州雖稱清涼髙爽然皆大江之南風土不並以北将息之道當先理其心心閑無事然後外患不入風氣所宜可以審備小小者亦當自不至矣或無無事二字患或作達方無不入二字皆非是足下之賢雖在窮約猶能不改其樂况地至近官榮禄厚親愛盡在左右者邪所以如此云云者以為足下賢者宜在上位託於幕府則不為得其所是以及之乃相親重之道耳非所以待足下者也也上或無者字僕自少至今從事於往還朋友間一十七年矣日月不為不久所與交往相識者千百人非不多其相與如骨肉兄弟者亦且不少或無所與二字或以事同或以藝取或慕其一善或以其久故或初不甚知而與之已密其後無大惡因不復決捨或其人雖不皆入於善而於巳巳厚雖欲悔之不可悔之下或有亦字不可或作可乎凡諸淺者固不足道深者止如此諸或作此或無諸字至於心所仰服考之言行而無瑕尤窺之閫奥而不見畛域明白淳粹輝光日新者惟吾崔君一人服或作伏言方作百又無尤字皆非是僕愚陋無所知曉然聖人之書無所不讀其精麤巨細出入明晦雖不盡識抑不可謂不渉其流者也以此而推之以此而度之誠知足下出羣拔萃無謂僕何從而得之也與足下情義寧須言而後自明邪自明或作明白非是所以言者懼足下以為吾所與深者多不置白黒於胷中耳為上方無以字既謂能粗知足下而復懼足下之不我知亦過也比亦有人説足下誠盡善盡美抑猶有可疑者僕謂之曰何疑疑者曰君子當有所好惡好惡不可不明上好惡字或作法非是然本字亦未安如清河者人無賢愚無不説其善伏其為人以是而疑之耳伏或作服或無耳字僕應之曰鳯凰芝草賢愚皆以為美瑞青天白日奴𨽻亦知其清明譬之食物至於遐方異味則有嗜者有不嗜者食上或有於字至於稻也梁也膾也䏑也豈聞有不嗜者哉疑者乃解解不解於吾崔君無所損益也於吾或作吾於非是或無所字自古賢者少不肖者多自省事已来又見賢者恒不遇不賢者比肩青紫賢者恒無以自存不賢者志滿氣得賢者雖得卑位則旋而死不賢者或至眉夀旋則作旅非是不知造物者意竟如何無乃所好惡與人異心哉或無異字非是又不知無乃都不省記任其死生夀夭邪未可知也人固有薄卿相之官千乘之位而甘陋巷菜􅃵者同是人也猶有好惡如此之異者况天之與人當必異其所好惡無疑也合於天而乖於人何害况又時有兼得者邪崔君崔君無怠無怠或作崔君無怠崔君無怠僕無以自全活者從一官於此轉困窮甚思自放於伊潁之上當亦終得之潁之方作潁水近者尤衰憊左車第二牙無故動搖脱去目視昏花尋常間便不分人顔色兩鬢半白頭髮五分亦白其一鬚亦有一莖兩莖白者亦白或作已白其一或無一字鬚或作鬢僕家不幸諸父諸兄皆康彊早世如僕者又可以圖於久長哉以此忽忽思與足下相見一道其懷小兒女滿前能不顧念或無小字或無女字滿下或有眼字能不方作不能非是足下何由得歸北来僕不樂江南官滿便終老嵩下足下可相就僕不可去矣珍重自愛慎飲食少思慮惟此之望愈再拜與陳給事書陳京也愈再拜愈之獲見於閣下有年矣始者亦嘗辱一言之譽貧賤也衣食於奔走不得朝夕繼見其後閣下位益尊伺候於門牆者日益進候下或無於字夫位益尊則賤者日隔伺候於門牆者日益進則愛博而情不専益尊或無益字日隔或無日字愈也道不加修而文日益有名夫道不加修則賢者不與文日益有名則同進者忌始之以日隔之疏加之以不専之望以不與者之心而聽忌者之説由是閣下之庭無愈之跡矣専上方從杭本有辱字忌者或作忌始生之跡上方有也字皆非是去年春亦嘗一進謁於左右矣温乎其容若加其新也若上或有其字也下或有矣字下句亦然皆非是或又疑加當作嘉乃與下文閔字為對屬乎其言若閔其窮也屬或作厲方從文苑云屬猶附屬連屬之屬決非厲字也退而喜也以告於人其後如東京取妻子又不得朝夕繼見及其還也亦嘗一進謁于左右矣邈乎其容若不察其愚也悄乎其言若不接其情也若上方並有其字愚或作言其情方作於情退而懼也不敢復進今則釋然悟翻然悔曰其邈也乃所以怒其来之不繼也其悄也乃所以示其意也示或作不盡不敏之誅無所逃避不敢遂進輒自疏其所以并獻近所為復志賦已下十首為一巻巻有標軸所為下方有文字下下或有賦字非是送孟郊序一首生紙寫不加装飾皆有楷字處楷下或無字字急於自解而謝不能竢更寫閣下取其意而略其禮可也意或作言愈恐懼再拜答馮宿書垂示僕所闕非情之至僕安得聞此言方無得字朋友道缺絶久無有相箴規磨切之道僕何幸乃得吾子諸本久下有矣字方從閣杭本云漢武紀夷狄無義所從来久語自此也今按矣字有無無利害姑從方本但未有以見其必用漢紀中語而決無此字耳僕常閔時俗人有耳不自聞其過懍懍然惟恐已之不自聞也而今而後有望於吾子矣然足下與僕交久僕之所守足下之所熟知在京城時囂囂之徒相訾百倍足下時與僕居朝夕同出入起居亦見僕有不善乎僕居或作並居方無僕字或無居字然僕退而思之雖無以獲罪於人亦有以獲罪於人者思下方無之字下獲字或作服今按二句皆云獲罪於人恐有誤字作服亦無理疑上句人字或是天字更詳之僕在京城一年不一至貴人之門人之所趨僕之所傲與已合者則從之遊不合者雖造吾廬未嘗與之坐造或作居此豈徒足致謗而已不戮於人則幸也追思之可為戰慄寒心故至此已来尅已自下雖不肖人至未嘗敢以貌慢之况時所尚者邪已或作以以此自謂庶㡬無時患不知猶復云云也聞流言不信其行嗚呼不復有斯人也君子不為小人之恟恟而易其行方無而字僕何能爾委曲從順向風承意汲汲恐不得合猶且不免云云命也可如何向或作望且下或有懽字或無可字然子路聞其過則喜禹聞昌言則下車拜車下或有而字古人有言曰告我以吾過者吾之師也過上或無吾字願足下不憚煩茍有所聞必以相告吾亦有以報子不敢虛也不敢忘也下或有愈再拜字與衛中行書同或作頓首與衛中行書大受足下辱書為賜甚大然所稱道過盛豈所謂誘之而欲其至於是歟不敢當不敢當其中擇其一二近似者而竊取之則於交友忠而不反於背面者少似近焉一下方無二字亦其心之所好耳行之不倦則未敢自謂能爾也不敢當不敢當或無此六字至於汲汲於富貴以救世為事者皆聖賢之事業知其智能謀力能任者也謀上方無能字謀下方有與字而屬下句如愈者又焉能之始相識時方甚貧衣食於人其後相見於汴徐二州僕皆為之從事日月有所入比之前時豐約百倍足下視吾飲食衣服亦有異乎然則僕之心或不為此汲汲也其所不忘於仕進者亦将小行其志耳此未易遽言也凡禍福吉凶之来似不在我惟君子得禍為不幸而小人得禍為恒君子得福為恒而小人得福為幸以其所為似有以取之也為幸方作為不幸非是必曰君子則吉小人則凶者不可也吉下或有而字賢不肖存乎已貴與賤禍與福存乎天名聲之善惡存乎人賢方作仁或無之字存乎已者吾将勉之存乎天存乎人者吾将任彼而不用吾力焉其所守者豈不約而易行哉足下曰命之窮通自我為之吾恐未合於道足下徴前世而言之則知矣若曰以道徳為巳任窮通之来不接吾心則可也窮居荒涼草樹茂宻出無驢馬則與人絶一室之内有以自娛足下喜吾復脱禍亂不當安安而居遲遲而来也而居方作於居非是上張僕射第二書愈再拜以撃毬事諫執事者多矣諫或作陳諫者不休執事不止此非為其樂不可捨其諫不足聽故哉閣杭蜀本如此而方從諸本哉作也今以下兩句推之作哉近是盖此非至故哉十五字當作一句讀之乃得其意或者又云哉字恐是邪字聲訛為也今作邪字讀之文理尤順諫不足聽者辭不足感心也心上或有人字樂不可捨者患不能切身也身上亦有人字今之言毬之害者必曰有危墮之憂有激射之虞墮或作墜下同小者傷面目大者殘形軀執事聞之若不聞者其意必曰進若習熟則無危墮之憂避能便捷則免激射之虞小何傷於面目大何累於形軀者哉愈今所言皆不在此其指要非以他事外物牽引相比也特以撃毬之間之事明之耳事上或無之字馬之與人情性殊異至於筋骸之相束血氣之相持安逸則適勞頓則疲者同也乘之有道步驟折中少必無疾老必後衰及以之馳毬於場蕩搖其心腑振撓其骨筋或作筋骨氣不及出入走不及迴旋逺者三四年近者一二年無全馬矣然則毬之害於人也決矣諸本皆如此方從杭本決下無矣字今按上句有矣字此句亦須有矣字語勢方殺杭本只是偶然脱漏不謂後人信之過甚而使韓公為是歇後不了之語也今當以諸本為正凡五藏之繫絡甚微坐立必懸垂於胷臆之間而以之顛頓馳騁嗚呼其危哉臆或作腹春秋傳曰夫有尤物足以移人茍非徳義則必有禍雖豈弟君子神明所扶持然廣慮之深思之亦養夀命之一端也雖或作推方無一字愈恐懼再拜與馮宿論文書或無論文字辱示初筮賦實有意思筮方作仕但力為之古人不難到但不知直似古人亦何得於今人也何下或有有字或有有字而無得字僕為文久每自則意中以為好則人必以為惡矣則人或作即人必下方無以字小稱意人亦小怪之大稱意即人必大怪之也亦上或有即字也上方無之宇時時應事作俗下文字下筆令人慙及示人則人以為好矣俗下方無文字二字而有者字則人方無則字小慙者亦䝉謂之小好大慙者即必以為大好矣不知古文直何用於今世也然以竢知者知耳直或作真方無今字然以或作然而昔楊子雲著太𤣥人皆笑之子雲之言曰世不我知無害也或無之言二字後世復有楊子雲必好之矣子雲死近千載竟未有楊子雲可歎也其時桓譚亦以為雄書勝老子或無為字老子未足道也子雲豈止與老子爭彊而已乎此未為知雄者未為方作不為其弟子侯芭頗知之以為其師之書勝周易師上或無其字然侯之他文不見於世不知其人果如何耳以此而言作者不祈人之知也明矣直百世以竢聖人而不惑質諸鬼神而不疑耳或作矣足下豈不謂然乎近李翺從僕學文頗有所得然其人家貧多事未能卒其業有張籍者年長於翺而亦學於僕其文與翺相上下一二年業之庶㡬乎至也長上或無年字㡬下方有至字然閔其棄俗尚而從於寂寞之道以之爭名於時也此下或有未知果能不叛去乎八字又或疑此句上有然字意無所承恐所増多八字當在然字之上未知是否久不談聊感足下能自進於此故復發憤一道從下或有而字非是愈再拜與祠部陸員外書外下或有薦士字陸傪字公休貞元十八年權徳輿典舉傪佐之公時為四門博士薦侯喜等十人于傪執事好賢樂善孜孜以薦進良士明白是非為已任方今天下一人而已愈之獲幸於左右其足跡接於門牆之間陞乎堂而望乎室者亦将一年於今矣或無跡字陞或作昇念慮所及輒欲不自疑外竭其愚而道其志况在執事之所孜孜為已任者得不少助而張之乎誠不自識其言之可采與否其事則小人之事君子盡心之道也天下之事不可遽數又執事之志或有待而為未敢一二言也今但言其最近而切者爾天下之事或作天下之士方云謂有待而為則事字為當執事之與司貢士者相知誠深矣誠或作識彼之所望於執事執事之所以待乎彼者可謂至而無間疑矣方無矣字彼之職在乎得人執事之志在乎進賢如得其人而授之所謂兩得其求順乎其必從也執事之知人其亦博矣夫子之言曰舉爾所知然則愈之知者亦可言已或作矣或作也文章之尤者有侯喜補註貞元十九年中進士第終國子主簿者侯雲長中貞元十八年進士第者喜之家在開元中衣冠而朝者兄弟五六人及喜之父仕不達棄官而歸喜率兄弟操耒耜而耕于野方無于野字地薄而賦多不足以養其親則以其耕之暇讀書而為文以干於有位者而取足焉其耕之暇方作非耕之時或作其暇之時喜之文章學西京而為也舉進士十五六年矣京或作漢或作漢西京雲長之文執事所自知其為人淳重方實可任以事其文與喜相上下有劉述古中貞元二十一年進士第者其文長於為詩文麗而思深當今舉於禮部者其詩無與為比而又工於應主司之試其為人温良誠信無邪佞詐妄之心邪佞詐妄方作邪妄詐偽或作邪妄詐佞彊志而婉容和平而有立其趨事静以敏著美名而負屈稱者其日已久矣方無矣字或作為日久矣有韋羣玉不見于登科記公之所薦十人九第而羣玉獨遺豈有司以京兆從子之故逺嫌畏譏矯而黜之耶者京兆之從子其文有可取者其進而未止者也其為人賢而有材志剛而氣和樂於薦賢為善材方作行今按賢即是有行方語為贅其在家無子弟之過居京兆之側遇事輒爭不從其令而從其義求子弟之賢而能業其家者羣玉是也能上方無而字凡此四子皆可以當執事首薦而極論者主司疑焉則以辨之問焉則以告之未知焉則殷勤而語之期乎有成而後止可也語或作論方無有之有沈杞者中貞元十八年進士第張苰者中元和二年進士第尉遲汾者中貞元十八年進士第李紳者中元和元年進士第㑹昌中為丞相張後餘者元和二年中第死李翊者中貞元十八年進士第或文或行皆出羣之才也苰或作𢎞與登科記同凡此數子與之足以收人望得才實主司疑焉則與觧之問焉則以對之廣求焉則以告之可也與解或作以解往者陸相公孫曰貞元八年陸贄知舉賈稜等二十三人登第公與焉司貢士考文章甚詳愈時亦幸在得中而未知陸之得人也方無亦字或無幸字其後一二年所與及第者皆赫然有聲原其所以亦由梁補闕肅王郎中礎佐之梁舉八人無有失者歐陽詹傳云詹與韓愈李觀李絳崔羣王涯馮宿庾承宣聨第皆天下選時稱龍虎榜舉八人疑此是也其餘則王皆與謀焉陸相之考文章甚詳也待梁與王如此不疑也梁與王舉人如此之當也至今以為美談人下方無如此字自後主司不能信人人亦無足信者故蔑蔑無聞蔑蔑或作蔑然今執事之與司貢士者有相信之資謀行之道惜乎其不可失也謀上或有與字方今在朝廷者多以遊讌娛樂為事獨執事眇然髙舉有深思長慮為國家樹根本之道宜乎小子之以此言聞於左右也愈恐懼再拜别本韓文考異巻十七欽定四庫全書别本韓文考異巻十八宋王伯大重編書
