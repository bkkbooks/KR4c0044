front:
  text: 此言久矣未嘗敢以聞於人矣下或有而字側聞閣下抱不世之才抱方從閣杭蜀本作苞云文選包多作苞陳寔碑所謂苞靈擢之純是也蜀世下仍有出字文苑有出人字今按韓公未必固用選語且從諸本作抱特立而獨行道方而事實立下方無而字巻舒不隨乎時文武唯其所用豈愈所謂其人哉抑未聞後進之士有遇知於左右獲禮於門下者豈求之而未得邪或無而字将志存乎立功而事専乎執主雖遇其人未遐禮邪将或作其何其宜聞而久不聞也愈雖不材其自處不敢後於恒人閣下将求之而未得歟古人有言請自隗始言下或有曰字非是愈今者惟朝夕芻米僕賃之資是急不過費閣下一朝之享而足也享或作宴如曰吾志存乎立功而事専乎報主雖遇其人未暇禮焉則非愈之所敢知也功下或無而字焉或作哉非是世之齪齪者既不足以語之以一作與方云以與義通磊磊竒偉之人又不能聽焉則信乎命之窮也謹獻舊所為文一十八首如賜覽觀亦足知其志之所存愈恐懼再拜
