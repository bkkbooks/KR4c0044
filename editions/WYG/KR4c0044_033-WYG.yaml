body:
  text: 唐正議大夫尚書左丞孔公墓誌銘孔子之後三十八世有孫曰戣字君嚴事唐為尚書左丞年七十三三上書去官天子以為禮部尚書禄之終身而不敢煩以政上上或無三字吏部侍郎韓愈常賢其能謂曰公尚壯上三留奚去之果方無韓字留下或有公字曰吾敢要君吾年至一宜去吾為左丞不能進退郎官唯相之為二宜去方從杭本無至字云洪引龔勝邴漢俱乞骸骨答詔古者有司年至則致事今大夫年至矣恐未必然今按洪所引漢書文理甚明方以欲從杭本之故遂以為未必然而不取殊不可曉今正之一本云君吾二字語尤健但如此則君下却少一吾字不敢輒補耳郎官或作郎中愈又曰古之老於鄉者將自佚非自苦閭井田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨來往也今異於是公誰與居且公雖貴而無留資何恃而歸曰吾負二宜去尚奚顧子言愈面嘆曰公於是乎賢逺於人於是或作是於於音烏或無賢字皆非是明日奏疏曰臣與孔戣同在南省數與相見相上方有孔戣字今按上下文孔戣字多此不宜有戣為人守節清苦論議正平或作平正平或作直年纔七十筋力耳目未覺衰老憂國忘家用意至到如戣輩在朝不過三數人陛下不宜茍順其求不留自助也不報明年長慶四年正月已未公年七十四告薨於家贈兵部尚書公始以進士佐三府官至殿中侍御史元和元年以大理正徴累遷江州刺史諫議大夫事有害于正者無所不言加皇太子侍讀改給事中言京兆尹阿縱罪人詔奪京兆尹三月之俸三上或無尹字權知尚書右丞明年拜右丞或作拜左丞或兩皆作左方云戣在元和中未嘗為左丞盖權知右丞事踰年而正除右丞長慶二年還自廣州乃為左丞耳新舊史戣傳皆誤南海碑石本可考也而山谷本於為尚書左丞之上從蜀本増一復字盖於元和兩次除授皆以誤作左丞故又誤謂長慶為再除也陳齊之又去拜右丞三字皆非改華州刺史明州嵗貢海蟲淡菜蛤蚶可食之屬自海抵京師道路水陸遞夫積功嵗為四十三萬六千人奏疏罷之改華州刺史或在罷貢海物之下方云華州乃輸貢之途此疏專為逓夫而言也新史亦可考或無可食二字下邽音圭令笞外按小兒繫御史獄公上疏理之詔釋下邽令而以華州刺史為大理卿外按或作按外孫曰元和十年以李絳代戣為華州以戣為大理卿今按唐㑹要每嵗冬以鷹犬出近畿習狩謂之外按使領徒數百恃恩恣横郡邑懼擾皆厚禮迎犒百姓畏之如冦盜元和九年裴寰為下邽令疾其擾人但據文供饋使者歸乃譛寰有慢言上大怒將以不敬論宰相武元衡中丞裴度懇救甚切乃釋之即此事也言小兒者盖以田獵應奉者謂之五坊小兒事見順宗實録㑹要亦有小使之名疑即此輩也十二年自國子祭酒拜御史大夫嶺南節度等使約以取足境内諸州負錢至二百萬悉放不收蕃舶之至泊步有下碇丁定切與矴同錘舟石之税始至有閲貨之燕犀珠磊落賄及僕𨽻公皆罷之賄方作財絶海之商有死于吾地者官藏其貨滿三月無妻子之請者盡没有之没下或無之字公曰海道以年計往復何月之拘茍有驗者悉推與之無筭逺近厚守宰俸而嚴其法嶺南以口為貨其荒阻處父子相縳為奴公一禁之或作博或無公一禁之四字有隨公吏得無名兒蓄不言官有訟者公召殺之吏上或有之字山谷諸黄世自聚為豪觀吏厚薄緩急或叛或從觀下或有察字非是容桂二管利其虜掠請合兵討之冀一有功有所指取當是時天子以武定淮西河南北用事者以破諸黄為類向意助之武定或作定武類或作願皆非是公屢言逺人急之則惜性命相屯聚為冦緩之則自相怨恨而散此禽獸耳但可自計利害不足與論是非恨下或有焉字無而散字或焉字在散字下此上或有况字方無耳字天子入先言遂斂兵江西岳鄂湖南嶺南㑹容桂之吏以討之被霧露毒相枕籍死百無一還安南乘勢殺都䕶李象古桂將裴行立容將楊旻皆無功數月自死嶺南囂然月或作日非是祠部嵗下廣州祭南海廟廟入海口為州者皆憚之不自奉事常稱疾命從事自代唯公嵗常自行官吏刻石為詩美之常自方作自常非是詩或作詞十五年遷尚書吏部侍郎公之北歸不載南物奴婢之籍不増一人長慶元年改右散騎常侍二年而為尚書左丞曽祖諱務本滄州東光令祖諱如珪海州司戸參軍贈尚書工部郎中皇考諱岑父祕書省著作佐郎贈尚書左僕射公夫人京兆韋氏父种大理評事有四子長曰温質四門博士遵孺遵憲温裕皆明經女子長嫁中書舍人平陽路隋其季者幼下温或作遵方云作温與傳合盖晚年皆從温世系表云四字皆從温非也今按上文長子已名温質則非晚年從温也豈以嫡庶為異耶然非要切不必强解公之昆弟五人載戡戢戵音衢公於次為第二公之薨戢自湖南入為少府監其年八月甲申戢與公子葬公于河南河隂廣武原先公僕射墓之左銘曰孔世八吾見其孫或作三十方云此銘皆以四言為句作三十非今按依字當作乖白而長身寡笑與言白或作自非是其尚類也莫與之倫也或作耶徳則多有請考于文故江南西道觀察使贈左散騎常侍太原王公墓誌銘或有中大夫洪州刺史兼御史中丞十二字公諱仲舒字𢎞中少孤奉其母居江南游學有名貞元十年以賢良方正拜左拾遺改右補闕禮部考功吏部三員外郎貶連州司戸參軍改夔州司馬佐江陵使改祠部員外郎復除吏部員外郎古無復字吏部員外下或無郎字遷職方郎中知制誥出為峽州刺史峽州説已見前遷廬州未至丁母憂服闋改婺州蘇州刺史闋方作缺改或作除徴拜中書舍人既至謂人曰吾老不樂與少年治文書得一道有地六七郡為之三年貧可富亂可治身安功立無愧於國家可也樂或作宜文書下或有事字日日語人丞相聞問語驗即除江南西道觀察使兼御史中丞至則奏罷𣙜酒錢九千萬以其利與民千或作十與民或作丐貧民方云諸本以後語誤入釀戸非盡貧民今按丐貧民一語下文已有不應再出方本是也但其説非是除酒𣙜盖與民共之使得自釀非直以錢九千萬與釀戸也又罷軍吏官債五千萬悉焚簿文書或無文字又出庫錢二千萬以丐貧民遭旱不能供税者禁浮屠及老子為僧道士不得於吾界内因山野立浮屠老子象禁方作學今按作學非是但下文自有浮屠老子字此不應重出且其文理亦不明白疑此自浮至為六字亦是衍文去之則文理通暢矣但無本可證不敢刪耳界下或無内字山或作出立或作去皆非是以其其字疑衍以其誑丐漁利奪編人之産編或作經今按以民為人盖避諱當作民乃是下求人利害與人吏約放此在官數年其蓄積錢餘於庫米餘於廩朝廷選公卿於外將徴以為左丞吏部已用薛尚書代之矣或無以字長慶三年十一月十七日未命而薨年六十二天子為之罷朝贈左散騎常侍逺近相弔以四年二月某日葬于河南某縣先塋之側公之為拾遺朝退天子謂宰相曰第幾人非王某耶是時公方與陽城更疏論裴延齡詐妄士大夫重之為考功吏部郎也下莫敢有欺犯之者非其人雖與同列未嘗比數收拾故遭讒而貶在制誥盡力直友人之屈不以權臣為意又被讒而出在或作及知二字元和初婺州大旱人餓死戸口亡十七八公居五年完富如初方無口字按劾羣吏奏其贓罪州部清整加賜金紫其在蘇州治稱第一公所至輒先求人利害廢置所宜閉閣草奏利或作之李云古本無利字神道碑周知俗之病亦無利字今按下文廢置所宜則此句合有利字古本偶皆脱漏不足為据又具為科條與人吏約事備一旦張下民無不抃呌喜悦或初若小煩旬嵗皆稱其便備下或有悉字或有復出事字今按文勢疑當有悉字在備字上公所為文章無世俗氣其所樹立殆不可學曽祖諱𤣥暕比部員外郎或無諱字下同祖諱景肅丹陽太守考諱政襄鄧等州防禦使鄂州採訪使贈工部尚書政或作謀工或作吏公先妣渤海李氏贈渤海郡太君或無太字公娶其舅女有子男七人初哲貞𢎞泰復洄初進士及第哲文學俱善其餘幼也長女壻劉仁師髙陵令次女壻李行脩尚書刑部員外郎脩或作循或作郎字銘曰氣鋭而堅又剛以嚴哲人之常又方作及哲人作若皆非是愛人盡已不倦以止乃吏之方與其友處順若婦女何徳之光墓之有石我最其迹萬世之藏之有或作中之最或作撮或作載方云集韻最撮之省文今按方説非也史漢功臣傳末總計其功皆以最字起之殿中少監馬君墓誌君諱繼祖司徒贈太師北平莊武王之孫少府監贈太子少傅諱暢之子生四嵗以門功拜太子舍人積三十四年五轉而至殿中少監年三十七以卒有男八人女二人始余初冠應進士貢在京師窮不自存以故人稚弟拜北平王于馬前王問而憐之因得見于安邑里第王軫其寒飢賜食與衣不下或有能字食上方無賜字云表記君子問人之寒則衣之問人之飢則食之食與衣皆去聲讀今按無賜字即不成文食衣並讀如字方云説非是召二子使為之主其季遇我特厚少府監贈太子少傅者也姆抱幼子立側眉眼如畫髮漆黒肌肉玉雪可念殿中君也方云畫胡麥切左思嬌女詩眉目粲如畫今按畫當音胡卦切左詩叶韻故爾髮下或有如字非是念或作憐方云姑記云王丞相於青疎臺中觀有兩三兒騎羊皆端正可念當是時見王於北亭猶髙山深林鉅谷龍虎變化不測傑魁人也或無鉅谷二字退見少傅翠竹碧梧鸞鵠停峙能守其業者也碧或作蒼業或作恭非是幼子娟於緑切好貌好静秀瑶環瑜珥蘭茁其芽稱其家兒也後四五年吾成進士去而東游哭北平王于客舍後十五六年吾為尚書都官郎分司東都而分府少傅卒哭之分府比見當時分司官之稱號或無此二字非是又十餘年至今哭少監焉嗚呼吾未耄老自始至今未四十年而哭其祖子孫三世于人世何如也句末六字疑衍人欲乆不死而觀居此世者何也李本云晁以道乙居字今按此篇末兩三句不可曉疑而字當作亦字何下當有如字盖誤冩著上文也然無别本可証姑闕以俟知者别本韓文考異巻三十三欽定四庫全書别本韓文考異巻三十四宋王伯大重編碑誌南陽樊紹述墓誌銘補註後山詩話歐陽公謂退之為樊宗師墓誌便似樊文其始出于司馬子長子長為長卿傳如其文惟其過之故兼之也樊紹述既卒且葬愈將銘之從其家求書得書號魁紀公者三十巻曰樊子者又三十巻春秋集傳十五巻表牋狀䇿書序傳紀誌説論今文讚銘凡二百九十一篇誌上方無紀字道路所遇及器物門里雜銘二百二十賦十詩七百一十九一十或作又十曰多矣哉古未嘗有也然而必出於巳不襲蹈前人一言一句樊曰國史補云元和之後文章則學竒于韓愈學澁于樊宗師退之作樊墓誌稱其為文不剽襲觀絳守居園池記誠然亦太竒澁矣本朝王晟劉忱皆為之註解如瑶翻碧瀲嵬眼傾耳等語皆前人所未道也歐陽公跋絳守居園池語云元和文章之盛極矣其竒怪至于如此又詩曰嘗聞紹述絳守居偶來登覽周四隅異哉樊子怪可吁心欲獨去無古初窮荒探幽入有無一語詰曲百盤紆孰云已出不剽襲包斷欲學盤庚書云云又何其難也必出入仁義其富若生蓄萬物畢具海含地負放恣横縱無所統紀然而不煩於繩削而自合也嗚呼紹述於斯術其可謂至於斯極者矣生而其家貴富長而不有其藏一錢長而方作而長妻子告不足顧且笑曰我道盖是也盖下疑有如字皆應曰然無不意滿嘗以金部郎中告哀南方還言某師不治罷之以此出為綿州刺史或無嘗字師或作帥方無出字以下文又出觀之宜有一年徴拜左司郎中又出刺絳州或無刺字綿絳之人至今皆曰於我有徳以為諫議大夫命且下遂病以卒年若干病以或作以病紹述諱宗師父諱澤嘗帥襄陽江陵官至右僕射贈某官祖某官諱泳自祖及紹述三世皆以軍謀堪將帥䇿上第以進紹述無所不學於辭於聲天得也得下或有地字或有地出字皆非是在衆若無能者嘗與觀樂問曰何如曰後當然已而果然後上方有某字非是銘曰
