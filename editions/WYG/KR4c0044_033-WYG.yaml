front:
  text: 守東都後佐留守司徒餘慶歴六府五公文武細麤不同自始及終於公無所悔望有彼此言者六府從事幾且百人有愿姦易險賢不肖不同公一接以和與信卒莫與公有怨嫌者言下或無者字其為郎官令守慎法寛惠不刻令守疑當作守令謂守法令也教誨於國學也嚴以有禮扶善遏過益明上下之分以躬先之恂恂愷悌得師之道遏或作盖過或作惡方云漢路温舒傳遏過者謂之妖言或無益字公一兄三弟常羣庠鞏常進士水部員外郎朗夔江撫四州刺史羣以處士徴自吏部郎中拜御史中丞出帥黔容以卒庠三佐大府自表先令為登州刺史鞏亦進士以御史佐淄青府皆有材名公子三人長曰周餘好善學文能謹謹致孝述父之志曲而不黷好善學文或作好學善文或作好古善文次曰某曰某皆以進士貢女子三人上某下或有少字愈少公十九嵗以童子得見於今四十年始以師視公而終以兄事焉公待我一以朋友不以幼壯先後致異公可謂篤厚文行君子矣其銘曰后緡音珉祝曰左傳曰昔有過澆滅夏后相后緡方娠逃自竇歸于有仍生少康克復舊物少康二子曰杼曰龍留居有仍遂為竇氏竇逃閔腹子夏以再家竇為氏聖愕樊曰史記孔子將西見趙簡子至于河聞竇鳴犢舜華之死臨河而嘆美哉洋洋乎丘之不濟此命也夫旋河犢少康二子曰龍龍六十九世孫鳴犢為晉大夫引比引以為比相嬰撥漢納孔軌鳴犢七世子孫嬰漢竇嬰相武帝太后好黄老而嬰務隆推儒術貶道家言此云撥漢納孔軌盖謂嬰撥漢家黄老之習而納之孔子之道左氏所謂納民於軌物前漢叙傳所謂伏周孔子之軌躅也撥一作發後去觀津安兄之子充葬觀津充之孫宣帝時以吏二千石徙平陵而家平陵而或作西遥遥厥緒夫子是承我敬其人我懐其徳作詩孔哀質于幽刻或作石
