body:
  text: 碑誌曹成王碑洪曰退之嘗云出為文詞宜畧識字如曹成王碑用剜鞣鏺掀掇筴􅝌等字是也王姓李氏諱臯字子蘭諡曰成其先王明孫曰太宗第十四子貞觀間封曹王以太宗子國曹絶復封傳五王至成王嗣封在𤣥宗世蓋於時年十七八紹爵三年而河南北兵作天下震擾王奉母太妃逃禍民伍得間走蜀從天子或無得字或無蜀從二字天子念之自都水使者拜左領軍衛將軍衛下或有大字轉貳國子秘書王生十年而失先王哭泣哀悲弔客不忍聞䘮除痛刮磨豪習委已於學痛下或有自字稍長重知人情急世之要恥一不通侍太妃從天子于蜀既孝既忠持官持身内外斬斬持身方作将身斬斬或作漸漸非是由是朝廷滋欲試之於民上元元年除温州長史行刺史事江東新刳於兵郡旱飢民交走死無弔交或作皆按唐人多用交字如陸宣公奏議云交駭物聽交下不存濟者之類意猶曰即今云爾王及州不解衣下令掊舊注被垢切撃也鎖擴門悉弃倉實與民活數十萬人擴或作横活下或有者字或無十字奏報升秩少府或無報字府下或有監字與平袁賊仍徙秘書兼州别駕部告無事兼方作處云考舊傳合今按成王本以温州長史行刺史事今兩奏功而得處州别駕又不行州事則於地望事權皆為左降矣以事理推之不應如此疑方本誤而諸本作兼本為是葢以舊官仍兼本州别駕以寵之爾下文又云部告無事則謂温州前此旱飢而今始無事也又云遷真于衡則是自行刺史事而為真刺史也其間不應復有處州一節明矣舊史亦承襲誤不足為據遷真于衡法成令修治出張施聲生勢長真或作鎮說見上施或作弛觀察使噎􅎱上烏結切下音墨胃寐三音祝曰噎妬也􅎱怒也史記王后亦以妬媦不嘗侍病不能出氣誣以過犯御史助之貶潮州刺史助或作効楊炎起道州相德宗還王于衡以直前謾或無于字或無前字王之遭誣在理念太妃老將驚而戚理或作治出則囚服就辯入則擁笏垂魚坦坦施施祝曰詩将其來施施注舒行也即貶于潮以遷入賀及是然後跪謝告實初觀察使虐使將國良往戍界方云閣杭蜀本蔡使下有殘字而無國字觀察使辛京杲也将國良王國良也馬大年所得柴氏善本無殘字良下有往字以虐字屬下句云良不願往而辛强使之也然按舊史云前使貪殘新史亦云前帥貪虐國良以富獲譴則馬說為非是國良只稱良猶南霽雲只稱雲李光顔只稱顔也下文亦可併考今按文勢則馬說為是虐使亦古語新史所載疑亦以碑語料其如此耳今从馬說但國良初見當全書二名其後乃可單出如霽雲光顔亦先全書後乃單出也良以武岡叛戍衆萬人戍或作成歛兵荆黔洪桂伐之二年尤張於是以王帥湖南將五萬士以討良為事王至則屏兵投良以書中其忌諱良羞畏乞降狐鼠進退羞或作為鼠或作疑新史狐作首王即假為使者從一騎踔五百里抵良壁鞭其門大呼我曹王來受良降良今安在良不得巳錯愕迎拜盡降其軍愕或作迕方云集韻愕逆各切相遇驚也或作遌𨽻作愕後漢寒朗傳二人錯愕不能對新舊史亦謂愕眙不敢動則此用愕字為正太妃薨王棄部隨䘮之河南𦵏及荆被詔責還責或作遣㑹梁崇義反王遂不敢辭以還升秩散騎常侍或無常侍字明年李希烈反或無李下四字遷御史大夫授節帥江西以討希烈命至王出止外舍禁無以家事關我裒兵大選江州羣能著直畧切職江方作洪州或作南方云考新舊史皆作洪今按洪州即江西帥治所若只大選洪州乃是未曾出門一步無足書者選兵江州葢為北向進討之勢故其下文遂攻蘄州道里亦便史承襲誤不足據當從諸本作江為是不然則以州為南猶勝作洪州也王親教之搏力勾卒音猝嬴越之法搏新史作團方作搏嬴或作方云樊澤之馬大年皆曰作羸非是嬴謂秦也越謂勾踐伐吳之兵法也今按搏徒官切團也楚詞云圜果搏兮古字通用而新書从今字也然秦紀越語世家皆無搏力勾卒之文不知諸家之說何所據惟蘇氏古史見之則恐或是反用此碑語也搏或疑是竱字亦未有據但摶力無理其誤無疑耳或疑杜牧之有以力摶力之語然杜後出韓公不當用其語也曹誅五畀五或作伍方云曹五字見馬融廣成頌曹伍相保是也馬大年云曹誅五畀敗則誅及其曹有獲則分畀其伍新書臯自将五百人教以秦兵團力法聫其賞罰弛張如一即約此碑語也畀或作卑艦步二萬人以與賊遌嘬楚快切祝曰嘬謂一舉盡臠禮記無嘬炙鋒蔡山踣音匐僵也之剜烏丸切又烏官切削也蘄之黄梅大鞣如又切一音柔祝曰鞣熟皮也又說文云耎也長平地名唐書曰臯授伊慎兵收黄梅次長平殺賊将斬級千餘攻蔡山拔之遂下蘄州長平鏺普活反祝曰說文鏺兩刃木柄可以刈草廣濟蘄州縣名廣濟掀音軿祝曰掀舉出也蘄春亦蘄州縣名蘄春撇祝曰選撇波而濟蘄水亦蘄州縣名蘄水撇音滅反撃也方誤作撇掇黄岡筴古業切又音夾祝曰廣韻筴箸也鍼箭具漢陽縣名屬沔州漢陽行跐音紫又氏切􅆜側駕切水岐流也一作文非是川還大搏音博又頗落切樊曰左傳成二年殺膞諸城上注膞傑也蘄水界中披普靡切祝曰廣韵披開也裂也安三縣拔其州斬偽刺史方云􅆜川唐屬沔州今漢陽地跐蹋也莊子跐黄泉而登大皇或無中字拔或作誅或作株馬本作誅今按左傳云又披其邑安三縣安州三縣也其州安州也此碑用字竒古有不可强通者當闕之以俟知者標匹遙切祝曰標木杪也光州有光山縣無北山恐誤光之北山􅞌他合切祝曰踏大食也說文云歠也有光化二縣名並屬隨州隨光化梏祝曰後漢梏羽羣注按字書從手即古文攪字謂攪擾也攪古巧切一作梏械也其州梏或作捁方云廣成頌散毛族梏羽羣李賢曰梏古酷切字從手即古攪字十抽一推后山談叢云唐令民二十成丁以下為推宋次道云推者稚也避髙宗諱而用耳呂縉叔云推者推也獨髻為推葢傳寫誤耳唐人初不諱嫌名也陳以呂說為是按史記漢書陸賈傳有魋結字注讀為推髻故唐令以推為未冠之稱此云十抽一推者十椎而取其一以為兵即杜詩所謂無丁而選中男者也然唐志但云十六為中而無推字㑹要亦然未詳其說救兵州東北屬鄉還開軍受降屬方作厲今按厲郷當屬亳州去安州尚逺當作屬大小之戰三十有二取五州十九縣民老幼婦女不驚市賈不變民下或有之字田之果榖下無一跡加銀青光禄大夫工部尚書改户部再換節臨荆及襄真食三百王之在兵天子西巡于梁希烈北取汴鄭東略宋圍陳西取汝薄東都薄或作亳非是王坐南方北向落其角距賊死咋仄革切聲大也不能入寸尺亡將卒十萬盡輸其南州亡或作上非是王始政於温終政於襄恒平物估賤歛貴出民用有經一吏軌民使令家聽户視姦宄無所宿一吏方从杭蜀本作吏一云一當如一民而重威之一吏一軌民用吉日辰良休也使令疑衍一字宿上或無所字非是今按方說一字是也但因沈存中說吉日辰良二句遂更不問是非毎有訛舛悉以遷就如此以一吏為吏一則無理之尤耳府中不聞急步疾呼治民用兵各有條次世傳為法任馬彛將慎將鍔將潛偕盡其力能任至潛九字或作慎馬彛伊慎王鍔將方云潛李伯潛也時馬彛掌幕府故不言将今从之偕盡其力能一作偕盡其功偕上或有王字其力方云力其非是今按能字合在盡字上薨贈右僕射元和初以子道古在朝更贈太子太師道古進士司門郎進士上或有登字下或有第遷字刺利隨唐陸徵為少宗正兼御史中丞以節督黔中朝京師改命觀察鄂岳蘄沔安黄提其師以伐蔡且行泣曰先王討蔡實取沔蘄安黄寄惠未亡寄或作其今余亦受命有事于蔡而四州適在吾封庶其有集受或作授州或作邑先王薨於今二十五年吾昆弟在而墓碑不刻無文其實有待子無用辭乃序而詩之詩或作請方無之字皆非是辭曰太支十三曹於弟季或亡或微曹始就事微或作徵二或字並作既或無下一字方云曹始封於貞觀二十一年時太宗十三子三早卒二貶死泰與愔亦皆遷降也曹之祖王畏塞絶遷曹方作明宋景文云豈有為人作銘而名其祖者當作曹方云明坐太子賢事降零陵王徙黔州都督謝祐逼殺之今按銘文四字未詳其義疑畏如畏厭溺之畏塞如其行塞之塞言見殺於閉塞之中而封絶於遷謫之時也方說近是而别圖云明徙黔州都督則不知明但徙黔州而為都督所殺遂誤以都督屬上句也零王黎公不聞僅存按新史明子後嗣王傑黎國公皆為武后所殺子父易封三王守名按史中宗神龍初以傑子𦙍為嗣曹王後明少子備自南還詔停𦙍而封備備薨復封𦙍所謂子父易封也𦙍薨子戢嗣自備至戢所謂三王守名也延延百載以有成王成王之作一自其躬文被明章武薦畯功蘇枯弱彊齦音懇祝曰廣韻云齦齧也謂屢破希烈之衆其姦猖蘇枯弱彊或作吹枯蘇僵以報于宗以昭于王或無此一句王亦有子方云或云語下脫一句按公為銘不必盡偶句用韵劉昌裔王仲舒碑可見今按劉碑脫句前已論之不可為法王碑雖可為例然彼文從韵叶無可疑者而此篤下文亦不可曉不知其果然否耳處王之所唯舊之視蹶蹶居衛切祝曰蹶蹶行遽也詩良士蹶蹶陛陛實取實似下陛字方作陞云陛陞猶階而升也今按方說無理作陛陛則韻叶故且從之然其義亦不可曉大抵此篇多不可曉今姑闕之刻詩其碑為示無止息國夫人墓誌銘貞元十五年靈州節度使御史大夫李公諱欒守邊有勞詔曰欒妻何氏可封息國夫人元和二年李公入為户部尚書薨夫人遂專家政公之男五人女二人而何氏出者二男一女夫人教養嫁娶如一雖門内親戚不覺有纎毫薄厚御僮使治居第生産皆有條序僮下或有僕字非是居卑尊間無不順適卑尊或作尊卑命服在躬承祀孔時年若干元和七年甲子日南至以疾卒明年八月庚寅葬河南河陽夫人曾祖某綏州刺史祖某潞州别駕父某晉州録事叅軍二男戡左威衛倉曹叅軍倉或作胄成左清道率府録事叅軍戡强以肅成敏以和或無戡下八字女子嫁興元叅軍鄭博古將葬戡與成以其事乞銘於其鄰韓愈愈乃為銘曰男主外事治不為異主或作子非是施于其家難甚吏治難甚或作甚難非是又況公侯族大而貴夫人是專厥聲惟懿昔在貞元有錫自天錫或作息方云葢以國封言之非也啟封備服以疇時勲時或作以婉婉夫人有籍宫門克承其後以嫁以婚隨𦵏東土在河之陽遙望公墳而不同藏試大理評事王君墓誌銘王荆公云退之善為銘如王適張徹銘尤竒也君諱適姓王氏好讀書懷竒負氣不肯隨人後選見功業有道路可指取有名節可以戾契致取下有或作而或本無之方云戾力結切契誥結切字本作通俗文曰多節目謂之方言作䜁詬賈誼傳詬亡節今按取下有字當屬上句言功業可指取而有之名節可以戾契而致之也不然則當作而困於無資地不能自出乃以干諸公貴人借助聲勢諸公貴人既志得皆樂熟軟媚耳目者不喜聞生語一見輙戒門以絶門下方無以字上初即位以四科募天下士君笑曰此非吾時邪即提所作書縁道歌吟趍直言試既至對語驚人不中第益困久之聞金吾李將軍年少喜士可撼年上或有惟簡字或無年字喜士或作喜事乃蹐資息切祝曰少步也詩不敢不蹐選屏氣跼蹐門告曰蹐或作踏天下竒男子王適願見將軍白事一見語合意往來門下盧從史既節度昭義軍張甚奴視法度士欲聞無顧忌大語有以君生平告者即遣客鉤致君曰狂子不足以共事立謝客李將軍由是待益厚奏為其衛胄曹叅軍充引駕仗判官盡用其言將軍遷帥鳳翔君隨往改試大理評事攝監察御史觀察判官櫛垢爬痒民獲蘇醒居歲餘如有所不樂一旦載妻子入閿音聞又云亡切舊注𢎞農胡縣有閿鄉前漢以胡閿鄉邪里聚為戾園注云闗字本從旻其後轉訛誤作門中受耳鄉南山不顧中書舍人王涯獨孤郁吏部郎中張惟素比部郎中韓愈比上或有太史字日發書問訊顧不可强起不即薦明年九月疾病輿醫京師或無疾字其月某日卒年四十四十一月某日即葬京城西南長安縣界中曾祖爽洪州武寧令祖微右衛騎曹叅軍父嵩蘇州崑山丞妻上谷侯氏處士髙女或無髙女二字非是今按侯髙事見李翺文集髙固竒士自方阿衡太師世莫能用吾言再試吏再怒去發狂投江水初處士將嫁其女懲曰吾以齟齬窮下或有瘁字一女怜之必嫁官人不以與凡子君曰吾求婦氏久矣唯此翁可人意且聞其女賢不可以失即謾謂媒嫗烏浩切女老稱吾明經及第且選即官人侯翁女幸嫁若能令翁許我請進百金為嫗謝諾許白翁諾許或作許諾翁曰誠官人邪取文書來君計窮吐實嫗曰無苦翁大人不疑人欺大或作丈我得一巻書粗若告身者我袖以往翁見未必取眎幸而聽我行其謀行或作施翁望見文書銜袖果信不疑曰足矣袖或作軸以女與王氏生三子一男二女男三歲夭死長女嫁亳州永城尉姚侹他頂切其季始十歲銘曰鼎也不可以柱之庾切韓曰淮南子曰柱不可以摘齒筐不可以持屋馬不可以服重牛不以進速銘取此意車馬也不可使守閭佩玉長裾不利走趍學或作曵祇繫其逢不繫巧愚不諧其須有銜不袪須或作願非是鑽石埋辭以列幽墟扶風郡夫人墓誌銘夫人馬暢之妻夫人姓盧氏范陽人亳州城父丞序之孫吉州刺史徹之女嫁扶風馬氏為司徒侍中莊武公之冡婦少府監西平郡王贈工部尚書之夫人初司徒與其配陳國夫人元氏惟宗廟之尊重繼序之不易序或作緒賢其子之才求婦之可與齊者内外親咸曰盧某舊門承守不失其初親下或有戚字其子女聞教訓有幽閑之德為公子擇婦宜莫如盧氏媒者曰然卜者曰祥夫人適年若干或作十四入門而媪御皆喜既饋而公姑交賀克受成福母有多子為婦為母莫不法式天資仁恕左右媵侍常䝉假與顔色人人莫不自在杖婢使數未嘗過二三雖有不懌未嘗見聲氣雖下或無有字元和五年尚書薨燧歿後以資甲天下暢以善殖財家益豐晚為豪倖侵牟又彚妻訟析產正元末神策中尉楊志廉奉使納田産至順宗復賜之中官往往逼取暢畏不敢吝以至窮困當時以暢厚畜為戒夫人哭泣成疾後二年亦薨年四十有六九年正月癸酉祔于其夫之封長子殿中丞繼祖孝友以類子下諸本有敖字或作榖晁本作長子繼祖殿中丞孝友嗣類本或孝友上有丞考二字方云此碑謂少府監者馬暢也暢子繼祖公嘗誌其墓新舊傳暢只有此一子世系表燧之子彚暢彚子赦敭暢子亦只有繼祖豈繼祖先名敖邪或敖字當刪今按馬少監墓誌云君諱繼祖則方說得之仍當更从晁本刪敖字但以其兄弟連名考之則又疑作敖為是而其下或有丞考二字者乃言敖能繼此中丞少傅而孝友似之也少監志云諱繼祖或是反用此志誤本補足而世系表又承襲誤然不可考姑從晁本而并著其所疑如此云葬有日言曰吾父友惟韓丈人視諸孤其往乞銘以其狀來愈曰日嘗聞乃公言然吾宜銘銘曰隂幽坤從維德之恒胡登切出為辨强乃匪婦能淑哉夫人夙有多譽來嬪大家不介父母或作母父有事賓祭酒食祇飭恊于尊章畏我侍側章或作卑方云漢廣州王傳皆尊章顔注猶言公姑也方作卑非是畏我侍側此句未詳畏我或作我之亦未安或疑畏當作慰及嗣内事亦莫有施齊其躬心小大順之夫先其歸其室有丘夫先其婦方作不失其歸或作夫其先歸今按下文有合𦵏字作夫先為是其室或作有室合葬有銘壼苦本切彛是攸殿中侍御史李君墓誌銘殿中侍御史李君名虚中字常容其十一世祖冲貴顯拓拔世舊注云據元和姓纂虛中乃冲入世孫父惲紂慎委損二切河南温縣尉娶陳留太守薛江童女生六子君最後生愛於其父母年少長喜學學無所不通少或作以或無少字最深於五行書以人之始生年月日所直日辰支干相生勝衰死王相並去聲太元經用事者王王所先者相注春則木王而火相也斟酌推人夀夭貴賤利不利輙先處其年時百不失一二王相或作相王其說汪洋奥美闗節開解萬端千緒叅錯重出美或作義學者就傳其法初若可取卒千忽切然失之星官厯翁莫能與其校得失進士及第試書判入等補秘書正字祕書下或有省字母䘮去官卒䘮選補太子校書河南尹奏疏授伊闕尉佐水陸運事故宰相鄭公餘慶繼尹河南以公為運佐如初宰相武公元衡之出劒南奏奪為觀察推官授監察御史未幾御史臺疏言行能髙不宜用外府即詔為真御史半歲分部東都臺遷殿中侍御史元和八年四月詔徵既至宰相欲白以為起居舍人經一月疽發背六月乙酉卒年五十二其年十月戊申葬河南洛陽縣距其祖澠音泯黽池縣名史記秦王與趙王飲于澠池池令府君僑墓十里君昆弟六人先君而歿者四人其一人嘗為鄭之滎澤尉嘗或作常非是信道士長生不死之説既去官絶不營人事故四門之寡妻孤孩與滎澤之妻子衣食百須皆由君出自初為伊闗尉佐河南水陸運使換兩使經七年不去所以為供給教養者及由蜀來輩類御史皆樂在朝廷進取君獨念寡稚求分司東出嗚呼其仁哉君亦好道士說於蜀得秘方能以水銀為黄金服之冀果不死將疾謂其友衛中行大受韓愈退之謂或作為非是曰吾夢大山裂流出赤黄物如金左人曰是所謂大還者今三矣三下或有年字君既歿愈追占其夢曰山者艮艮為背裂而流赤黄疽象也大還者大歸也其告之矣妻范陽盧氏鄭滑節度使兼御史大夫羣之女與君合德親戚無退一言退一或作一退或疑無字在退下男三人長曰初恊律或無協字或疑律下有郎字次曰彪其幼曰還適三歲女子九人銘曰不贏其躬以尚其後人贏或作嬴方云獨孤郁墓銘曰年再不嬴惟後之成義别本韓文考異巻二十八欽定四庫全書别本韓文考異巻二十九宋王伯大重編碑誌唐故朝散大夫商州刺史除名徙封州董府君墓誌公諱溪字惟深丞相贈太師隴西恭惠公第二子十九歲明兩經獲第有司沈厚精敏未嘗有子弟之過賓接門下推舉人士侍側無虛口退而見其人淡若與之無情者太師賢而愛之父子閒自為知巳諸子雖賢莫敢望之太師累踐大官大或作從非是臻宰相致平治終始以禮號稱名臣晨昏之助葢有賴云太師之平汴州師下或無之字年考益髙挈持維綱鋤削荒纇音耒祝曰絲節淮南子明月之珠不能無纇纇或作頑納之太和而巳其囊篋細碎無所遺漏繄公之功上介尚書左僕射陸公長源齒差太師標望絶人聞其所為每稱舉以戒其子楊凝孟叔度以材德顯名朝廷或作於朝及來佐幕府佐或作往詣門請交屏所挾為或作屏棄所挾太師薨始以秘書郎選叅軍京兆府法曹選或作遷日伏階下與大尹爭是非大尹屢黜巳見大或並作太歲中奏為司録參軍與一府政以能拜尚書度支貟外郎遷倉部郎中萬年令兵誅恒州改度支郎中攝御史中丞為糧料使兵罷遷商州刺史糧料吏有忿争相牽告者事及於公因徵下御史獄因方作顯云漢韓安國傳由此顯名於漢當用此義今按此召對私耳與方所引者不類當只作因公不與吏辨一皆引伏受垢除名徙封州元和六年五月十二日死湘中年四十九州下方本無年月日但於湘中下云年若干今以晁本定按唐書元和七年立遂王為太子亦與下文相應明年立皇太子有赦令許歸𦵏其子居中始奉䘮歸元和八年十一月甲寅葬于河南河南縣萬安山下太師墓左夫人鄭氏附公凡再娶皆鄭氏女生六子四男二女長曰全正慧而早死次曰居中好學善為詩張籍稱之次曰從直曰居敬尚小直下或有次字長女嫁吳郡陸暢其季友後夫人之子公之母弟全素孝慈友弟公坐事棄同官令歸公歿比葬三年哭泣如始䘮者大臣髙其行白為太子舍人將葬舍人與其季弟澥户買切問銘於太史氏韓愈将𦵏下方有中字今以上文考之無者為是然世系表全素太子中書舍人通典中舍一云中書舍人又安知全素不自舍人遷中舍邪今按中字有則前後皆當有無則皆當無不應前無而後有也審如方說此志亦必是未遷時作況它本自有無中字者今姑從之不必曲為之說也愈則為之銘辭曰物以久弊或以轢音歴車所踐也毁考致要歸孰有彼此由我者吾不我者天斯而以然其誰使然貞曜先生墓誌先生孟郊湖州武康人也唐元和九年歲在甲午八月已亥已或作乙方云考唐厯是月無乙亥也貞曜先生孟氏卒無子其配鄭氏以告愈走位哭且召張籍會哭走或作赴位或作泣明日使以錢如東都供葬事諸嘗與往來者咸來哭弔嘗或作常韓氏遂以書告興元尹故相餘慶閏月樊宗師使來弔告𦵏期徵銘下或有於愈字愈哭曰嗚呼吾尚忍銘吾友也夫興元人以幣如孟氏賻且來商家事人或作尹樊子使來速銘曰不則無以掩諸幽乃序而銘之先生諱郊字東野父庭玢音彬娶裴氏女而選為崑山尉生先生及二季酆郢而卒先生生六七年端序則見長而愈騫則見或作有法涵而揉之或作足内外完好色夷氣清可畏而親及其為詩劌目鉥心劌居衛切鉥時橘切又音述劌利傷也老子亷而不劌鉥長針也說文綦鍼也刃迎縷解刃或作物鉤章棘句搯擢胃腎搯音滔或作滔非是擢音濁拔也搯捾也刮也廣韵引周書師乃搯捾胃腎或作皆盡神施鬼設閒見層出唯其大翫於詞而與世抹摋或作採掇方從閣杭南唐本云字林抹摋掃滅也漢谷永傳末殺災異人皆刼刼我獨有餘有以後時開先生者曰吾既擠而與之矣其猶足存邪開或作聞擠或作儕年幾五十始以尊夫人之命來集京師從進士試既得即去間四年又命來選為溧陽尉迎侍溧上又下或有以字去尉二年而故相鄭公尹河南奏為
