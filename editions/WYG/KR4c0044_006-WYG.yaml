body:
  text: 古詩符讀書城南樊曰城南公别墅符公之子孟東野詩有喜符郎詩有遊城南韓氏莊之作按公墓誌及登科記公子曰㫤登進士第在長慶四年此云符疑為㫤之小字也木之就規矩在梓匠輪輿人之能為人由腹有詩書詩書勤乃有不勤腹空虛欲知學之力賢愚同一初同一或作一同非是由其不能學所入遂異閭兩家各生子提孩巧相如提或作啼非是巧或作兩少長聚嬉戲不殊同隊魚方云少讀如多少之少漢賈誼匈奴東平王傳三見公此詩與劉綂軍李虛中誌亦三用年至十二三頭角稍相疎二十漸乖張清溝映汗渠三十骨格成乃一龍一豬飛黃淮南子飛黃神馬也又選張景陽七命整頓雲輅驂飛黃騰踏去不能顧蟾蜍一為馬前卒鞭背生蟲蛆子魚切蟲也鞭背或作背上非是一為公與相潭潭府中居樊曰黃魯直嘗書此詩跋其後曰或謂韓公當開後生以性命之學不當誘之以富貴榮顯涪翁曰熙寧元豐間大儒之過也又何學焉孔子曰齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓于首陽之下民到于今稱之韓公之言其於勸奬之功異趣而熙寧元豐似指荆公而言然曰間云者又不專指荆公也問之何因爾或作耳學與不學歟金璧雖重寶費用難貯儲學問藏之身身在則有餘則或作即君子與小人不繫父母且子魚切語助不見公與相起身自犂鉏閤本作不見公與汝幸免自犂鉏今按閤本之謬有如此者它可盡信邪不見三公後寒饑出無驢荀子云雖王公大夫之子孫也不能属於禮義則歸之庶人雖庶人之子孫也積文學正身行能属於禮義則歸之卿相士大夫文章豈不貴經訓乃菑畬菑音淄畬音予耕也孫曰言文章當以經訓為本補注吕原明雜記云杜子美詩云文章一小技於道未為尊文者載道之器安得謂之小技顧所用何如韓退之詩曰文章豈不貴經訓乃菑畬此說有可取焉潢乎光切積水也潦無根源朝滿夕巳除人不通古今馬牛而􅁭裾行身陷不義况望多名譽時秋積雨霽方作闋新凉入郊墟燈火稍可親簡編可巻舒豈不旦夕念為爾惜居諸恩義有相奪作詩勸躊躇示爽韓曰譜系公子姪無名爽者疑為韓湘子字湘登長慶三年進士第宣城去京國里數逾三千念汝欲别我解裝具盤筵日昏不能散起坐相引牽冬夜豈不長達旦燈燭然座中悉親故誰肯捨汝眠念汝將一身西來曾幾年名科揜衆俊名科或作科名州考居吏前今從府公召府公又時賢時輩千百人孰不謂汝妍汝來江南近里閭故依然汝來或作此來故或作固昔日同戲兒看汝立路邊人生但如此但或作得其實亦可憐吾老世味薄因循致留連强顔班行内行胡郎切此詩當是知制誥時作何實非罪愆才短難自力懼終莫洗湔音箋臨分不汝誑有路即歸田宣城在江之南公有别業在焉上云閭里故依然謂此人日城南登髙荆楚嵗時記正月七日為人日董勛問禮俗正月一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人初正候纔兆涉七氣已弄七謂七日氣謂陽氣靄靄野浮陽暉暉水披凍聖朝身不廢佳節古所用親交既許來子妷亦可從妷或作姪盤蔬冬春雜罇酒清濁共令徴前事為令去聲韓曰劉貢父云唐人飲酒喜以令為罰今人以絲管謳歌為令即白傳所謂醉翻襴衫抛小令是也其舉故事物色為令即公所謂令徴前事為是也徴舉也觴詠新詩送扶杖凌圯址或作扯之市切基也刺船犯枯葑方用切菰根戀池羣鴨㢠廻釋嶠孤雲縱人生本坦蕩誰使妄倥􅘓上音控下音粽困皃直指桃李闌幽尋寧止重重再也幽尋或作尋幽云病鴟屋東惡水溝有鴟墮鳴悲青泥揜兩翅揜作淹又作渰拍拍欲飛皃不得離羣童呌相召瓦礫爭先之計校生平事殺却理亦宜奪攘不愧耻飽滿盤天嬉晴日占光景髙風送追隨或作恣追飛遂凌紫鳯羣肯顧鴻鵠卑遂或作擬紫或作鸞鴻鵠方作鴻鴈是今按紫鴻假對今者命運窮遭逢巧丸兒中汝要害處汝能不得施於吾乃何有不忍乘其危丐汝將命死丐或作救又作與方云丐兄弟死命冦恂傳語浴以清水池朝餐輟魚肉暝宿防狐狸自知無以致䝉德久猶疑飽入深竹叢飢來傍階基亮無責報心亮或作諒固以聴所為昨日有氣力飛跳弄藩籬今晨忽徑去徑或作勁曾不報我知僥倖非汝福天衢汝休窺京城事彈射豎子豈易欺勿諱泥坑辱泥坑乃良規良或作汝非是華山女街東街西講佛經撞鐘吹螺落戈切佛家用為樂器云閙宫庭廣張罪福資誘恊聴衆狎恰排浮萍資或作恣狎恰方云唐人語白樂天櫻桃詩洽恰舉頭千萬顆或作恰似非是黃衣道士亦講說座下寥落如明星華山女兒家奉道欲驅異教歸仙靈洗粧拭靣著冠帔白咽紅頰長眉青遂來昇座演真訣觀門不許人開扄不知誰人暗相報訇然振動如雷霆掃除衆寺人跡絶驊騮塞路連輜軿上音菑下音萍衣車也前後有蔽後漢輜軿曜日光觀中人滿坐觀外後至無地無由聴抽釵脱釧解環佩堆金疊玉光青熒諸本青作晶方云字本西都賦天門貴人傳詔召六宫願識師顔形玉皇頷首許歸去乘龍駕鶴來青㝠豪家少年豈知道來繞百市脚不停雲牎霧閤事慌惚重重翠幔深金屏仙梯難攀俗縁重浪慿青鳥樊曰漢光武故事七月七日上於承華殿齋正中忽有青鳥從西方來集上問東方朔朔曰此西王母欲來有頃王母至有三青鳥如鳥夾侍王母傍通丁寧青方作三云三鳥王母使見山海經楚詞九歎江文通雜詩今按陶詩云三青鳥則青字亦未為無據也或怪公排斥佛老不遺餘力而於華山茨獨假借如此非也此正譏其􅃷姿色假仙靈以惑衆又譏時君不察使失行婦人得入宮禁耳觀其卒章豪家少年雲牎霧閣翠幔金屏青鳥丁寧等語慢甚矣豈真以神仙處之哉讀皇甫湜公安園池詩書其後二首晉人目二子其猶吹一吷軒劣切又音血小聲也樊曰莊子惠子吹劍首者吷而巳堯舜人之所譽也道堯舜于戴晉人之前譬猶一吷也注疏戴姓晉人名梁之賢者區區自其下顧肯挂牙舌春秋書王法不誅其人身爾雅注蟲魚定非磊落人湜也困公安不自閑窮年枉智思掎摭糞壤汙穢豈有臧古本只如此一本不自閑上有其閑字糞壤下有問字方云蜀本間字下有糞壤多字豈字下有必字有字下有否字又一本無必字否字而臧字下有不臧字謝本窮年作至閑而注公近本増足八字不知所校之自語淺俗非韓文胡元任云我有一池已下當為别篇恐或然也今按此詩多不可曉當闕或云世有石本與今本同知舊本脫誤明矣謂有所增八字也然諸公校本皆不言不知果然否也誠不如兩忘但以一槩量我有一池水蒲葦生其間蟲魚沸相嚼日夜不得閑我初徃觀之其後益不觀觀之亂我意不如不觀完用將濟諸人捨得業孔顔百年詎幾時君子不可閑路傍堠堆堆路傍堠音后封堠也堆堆或作拆拆方从唐本作堠堠皆非是一雙復一隻迎我入秦闗送我入楚澤千以髙山遮萬以逺水隔逺方作大吾君勤聴治照與日月敵臣愚幸可哀臣罪庶可釋何當迎送歸緣路髙厯厯食曲河驛晨及曲河驛悽然自傷情悽或作凄羣烏巢庭樹烏或作鳥乳雀飛簷楹而我抱重罪孑孑萬里程親戚頓乖角或作𣙜圖史棄縱橫下負明義重明或作朋作按杜詩于公負明義朋非是上孤朝命榮殺身諒無補何用答生成用或作由過南陽南陽郭門外桑下麥青青行子去未巳春鳩鳴不停秦商邈既逺湖海浩將經孰忍生以慼吾其寄餘齡慼或作蹙瀧吏南行逾六旬始下昌樂瀧音雙水名樂昌本韶州縣昌樂諸本作樂昌方从杭蜀本云歐公嘗以劉仲章言攷歸舊本蔣穎叔云李君謂樂昌五里有昌山有樂石瀧在縣上五里今按歐云縣名樂昌瀧名昌樂也險惡不可狀唐本作樂昌險惡状非是船石相舂撞徃問瀧頭吏潮州尚幾里行當何時到土風復何似瀧吏垂手笑官何問之愚譬官居京邑或作譬如官居北何由知東呉東呉遊宦鄉官知自有由潮州㡳處所有罪乃竄流儂音農吴人稱我曰儂幸而負犯何由到而知官今行自到那遽妄問為妄或作妾非是不虞卒見困汗出愧且駭吏曰聊戲官儂嘗使徃罷嶺南大抵同官去道苦遼下此三千里有州始名潮惡溪瘴毒聚雷電常洶洶音胷水鳴聲楚辭聴水聲之洶洶鱷魚永州記曰鱷魚大者凢數丈善食人一生百卯及成形則有為蛇為龜為蛟者甚靈大於船牙眼怖殺儂州南數十里數十諸本作斗數謝本作數十方从閣本作十數云杭斗作鬬義同史記書盛山斗入海斗絶也不今以地里考之謝本為是此迥與斗入海文意絶同方說誤矣有海無天地海或作水􅄓其遇切一音貝風名風有時作掀音軒簸真差異化切事怪也事聖人於天下於物無不容比聞此州囚亦有生還儂官無嫌此州固罪人所徙本作官嫌此州惡固人之所徙官當明時來事不待說委李本作官當來時事不待說而委官不自謹慎宜即引分徃胡為此水邊神色久戃慌上他朗切下呼晃切失意皃楚辭云心戃慌而不我與㼚大缾甖小所任自有宜㼚音岡今江東通名大甕為㼚見方言或作瓬音倣周禮有瓬人義不相近官何不自量滿溢以取斯工農雖小人事業各有守不知官在朝有益國家不否字得無虱其閒諸本虱作風方从唐杭謝公洪謝本云商君二十六章大抵以仁義禮樂為虱官曰六虱成俗兵必大敗洪引阮籍語亦非也不武亦不文仁義飾其躬飾方作飭躬或作姦巧姦敗羣倫杭蜀本如此姦或作躬羣或作羣倫方从閤本作倫羣云謂敗其倫敗其羣也羣倫為無義今按倫羣不詞而冠乎羣倫乃揚子云語又正與其躬為對不可謂之無義叩頭謝吏言始慙今更羞厯官二十餘國恩竝未酬凡吏之所訶嗟實頗有之不即金木誅莊子列禦冦篇為外刑者金與木也注金謂刀鋸鈇鉞木謂箠楚桎梏敢不識恩私潮州雖云逺雖惡不可過雖惡方作惟皆今据洪謝本作雖下注澄字其義差長葢再叠上句雖逺人接下文而言也二字或又作惟思雖亦可通然與下文不相應於身實巳多敢不持自賀持或作特贈别元十八恊律六首或無别字樊澤之謂元十八集並見樂天集桂林伯裴行立也知識久去眼去或作絶吾行其既逺瞢瞢眉登切目不明貌莫訾省閤蜀本作毁方云史記膠西王傳遂為無訾省蘇非謂為無訾録無所省録也今按蘇注不可曉而顔注又以為不省訾財亦非是禮記不訾重器毋訾金玉成器注皆云思也詳此葢以訾為思慮計度之意云黙黙但寢飯子兮何為者冠珮立憲憲方云詩顯顯令德禮作憲憲校本多讀憲為顯詩又云無然憲憲傳曰猶欣欣也何氏之從學蘭蕙巳滿畹已或作以於何翫其光以至嵗向晚治惟尚和同無侯於謇謇音蹇諤也楚辭余固知謇謇之為患治惟或作時治或師絶學賢不以藝自輓音晚子兮獨如何能自媚婉娩金石出聲音宫室發闗楗其偃切老子善閕者無闗楗而不可開何人識章甫儒行丘少居魯衣縫掖之衣長居宋冠章甫之冠而知駿蹄踠下於阮切馬足蹉趺選踠足欝怒言無人識章甫并知此駿蹄也惜乎吾無居不得留息偃臨當背靣時裁詩示繾綣英英桂林伯實惟文武特逺勞從事謂元恊律賢來弔逐臣色南裔多山海道里屢紆直風波無程期所憂動不測子行誠艱難行方作徃我去未窮極臨别且何言有淚不可拭何或作無吾友栁子厚其人藝且賢吾未識子時已覽贈子篇寤寐想風采於今巳三年不意流竄路旬日同食眠旬日或作兼旬所聞昔巳多所得今過前如何又須别使我抱悁悁勢要情所重排斥則埃塵骨肉未免然又况四海人又况或作况又嶷嶷魚力切桂林伯矯矯居天切詩矯矯武臣注矯矯武貌義勇身生平所未識待我逾交親逾或作如遺我數幅書繼以藥物珍藥物防瘴癘書勸養形神形一作精不知四罪地豈有再起辰窮途致感激肝膽還輪囷下去輪切鄒陽傳蟠木根柢輪囷離竒輪困屈曲貌讀書患不多思義患不明患足巳不學巳或作以方云足已而不學史記周亞夫贊論既學患不行子今四美具實大華亦榮王官不可闕未宜後諸生嗟我擯南海無由助飛鳴南海方作海南寄書龍城守君驥何時秣峽山逢􅄓風雷電助撞捽上宅江切下昨没切相擊也乗潮簸扶胥地名在廣州見公南海神廟碑曰扶胥之口黃木之灣近岸指一髪兩巖雖云牢木石牙飛發屯門地名雖云髙亦映波浪没余罪不足惜子生未宜忽胡為不忍别感謝情至骨初南食貽元十八恊律鱟音后實如惠文骨眼相負行惠或作車山海經云鱟形如車文見玉篇骨李本云疑當作背嶺表録異鱟眼在背上雌負雄而行蠔音豪殻如石亦曰礪房相黏為山百十各自生方云字書無蠔字董彦逺云五代潘崇徹敗王逵兵于蠔石亦地名不應不見字書葢闕誤蒲魚或曰鷠魚也今廣州曰蒲魚尾如蛇口眼不相營方作縈蛤本草注云青蛙龜蛤長股蜲子皆蝦蟇類即是蝦蟇同實浪異名章舉有八脚身上有肉如魚亦曰章魚馬甲柱洪云即今之江瑶柱鬬以怪自呈其餘數十種莫不可歎驚我來禦魑魅自宜味南烹調以鹹與酸芼音冒釋也詩左右芼之以椒與橙調以或作調之腥臊始發越咀吞靣汗騂思營切赤色惟蛇舊所識實憚口眼獰開籠聴其去鬱屈尚不平賣爾非我罪不驗豈非情不祈靈珠報搜神記隋侯見傷蛇以藥活之其後蛇啣明月珠以報淮南子謂隋侯之珠是也幸無嫌怨并無方作不聊歌以記之又以告同行記或作寄宿曾江口示姪孫湘二首孫曰湘字北渚老成之子公兄弇之孫元和十四年公赴潮州作雲昏水奔流天水漭相圍三江謂曽江有三江合流今混為一不見江口滅無口其誰識涯圻暮宿投民村髙處水半扉犬雞俱上屋不復走與飛篙舟入其家暝聞屋中唏音希哀而不泣曰唏問知嵗常然知或作之哀此為生微海風吹寒晴波揚衆星輝仰視北斗髙不知路所歸舟行亡故道亡或作止屈曲髙林間林間無所有奔流但潺潺嗟我亦拙謀致身落南蠻茫然失所詣無路何能還答柳柳州食蝦蟇蝦蟇雖水居水特變形貌下水字或作未方作木云言于水族之中特異其形貌也不今按此字此說皆成文理闕之可也强號為蛙蛤於實無所校或作交或作效雖然兩股長其柰脊皴皰匹皃切玉篇云靣皮生氣也脊皴方作背脊跳躑雖云髙意不離濘淖上音佞下音閙泥也意方作竟竟今按文義作意為是下文又有不字不應複出鳴聲相呼和無理只取閙周公所不堪灑與洒同蟈氏掌去鼃黽焚牡鞠以灰洒之則死灰垂典教我棄愁海濵方作渚恒願眠不覺音教叵堪朋類多恒或作頗沸耳作驚爆音豹火裂端能敗笙磬仍工亂學校雖䝉句踐禮韓子越王伐吴欲人之輕死出見怒鼃乃為之式從者曰奚敬此王曰為其有氣故也勇士遂有以頭獻者竟不聞報效大戰元鼎漢武元鼎五年秋鼃蝦蟇鬬年孰强孰敗橈或作撓方云字从木左傳畏君之震師徒橈敗杜云橈曲也居然當鼎味豈不辱釣罩余初不下喉近亦能稍稍常懼染蠻夷失平生好樂方从唐本如此諸本或作平生性不樂閤本作不好好今按此句未詳當闕樂五教切祝曰欲也禮記有所樂補注張牧為猘犬所傷醫云宜食蝦蟇牧甚難之而君復何為甘食比豢豹獵較務同俗全身斯為孝哀哉思慮深未見許廻櫂謂未見其歸櫂楫也與棹同别趙子我遷於揭陽韋昭曰揭其逝切集注顔師古音竭漢屬南海郡廣州記云大庾始安臨賀桂陽揭陽為五嶺君先揭陽居揭陽去京華其里萬有餘不謂小郭中有子可與娛心平而行高兩通詩與書婆娑嬉遊貎晉陶侃為荆州刺史將歸顧謂王衍曰老子婆娑正坐諸君輩海水南􅉫弄明月珠及我遷宜春袁州元和十四年七月憲宗上尊號大赦天下十二月公自潮州量移袁州意欲擕以俱擺頭笑且言一作不可我豈不足歟又奚為於北徃來以紛如北或作此非是以或作各海中諸山中幽子隠士也頗不無相期風濤觀巳久不可渝又嘗疑龍蝦果誰雄牙鬚蚌蠃與螺同魚鼈蟲瞿瞿音衢又音屨詩狂夫瞿瞿注旡守貌以狙狙識一已忘十巳方作以又云山谷謝本以皆作已今从黃謝大同細自殊欲一窮究之時嵗屢謝除今子南且北豈非亦有圖人心未嘗同不可一理區或作驅宜各從所務未用相賢愚務或作好或作勝相一作分除官赴闕至江州寄鄂岳李大夫謂李程也盆城去鄂渚風便一日耳不枉故人書無因帆江水帆諸本作泛方从蜀本云帆去聲少陵詩浦㠶辰初發故人辭禮闈旌節鎮江圻而我竄逐者龍鍾初得歸别來已三嵗望望長迢遞咫尺不相聞平生那可計我齒落且盡君鬢白幾何鬢或作鬚年皆過半百來日苦無多少年樂新知衰暮思故友衰或作嵗譬如親骨肉寧免相可不我昔實愚憃或作戇方云愚憃見禮記漢書多用愚戇字戇今按說文憃丑江切陟絳切不能降色辭子犯亦有言臣猶自知之晉公子重耳亡外子犯從之反國及河子犯以璧授公子曰臣負覊絏從君行於天下臣之罪多矣臣猶自知之而况君乎公其務貰音世又音射貸也過我亦請改事左氏傳鄭伯逆楚之辭曰使改事君夷于九縣君之惠也孤之願也樊曰反復詩語若與李嘗有隙至是因謝之故舊無大故則不棄此公所以思之且請改事也桑榆儻可收願寄相思字古詩客從逺方來遺我一書札上言長相思下言久離别南山有髙樹行贈李宗閔韓曰據詩意鳯凰謂裴度挾丸子謂李德裕李紳元稹也據宗閔傳裴度伐蔡引為彰義觀察判官蔡平知制誥長慶初錢徽典貢舉宗閔托所親於徽李德裕李紳元槙共白徽取士不以實坐貶劍州刺史俄復為中書舍人由是嫌怨顯結縉紳之禍四十餘年不解此詩葢長慶初作也新史云宗閔初為裴度引用及度薦李德裕可為宰相宗閔遂與為怨韓愈作南山猛虎行據度薦德裕在公殁後五年史誤矣補注苕溪漁隠詩話云退之宗閔俱裴晉公征淮西時幕客也退之作南山猛虎行贈宗閔皆畧盡其終身然退之無恙時宗閔纔為中書舍人所為尚未暴白錢徽貶後元李之憾始結至其為相則退之死久矣遂有封川之行所謂前汝下視鳥各議汝瑕疵鳥雀從噪之虎不知所歸者何其明騐也校本謂猛虎行不為宗閔非南山有髙樹花葉何衰衰所追反微也方云考張衡南都賦當作蓑蓑上有鳯凰巢鳯凰乳且棲四旁多長枝羣鳥所托依黄鵠據其髙衆鳥接其卑接或作棲不知何山鳥羽毛有光輝飛飛擇所處正得衆所希上承鳯凰恩自期永不衰中與黃鵠羣不自隠其私下視衆鳥羣汝徒竟何為衆鳥方作羣鳥今按下有羣字不當復出不知挾丸子心黙有所規或作窺方云規圖也東坡五禽言去年麥不熟挾彈規我肉本公語也彈汝枝葉間汝翅不覺摧或言由黃鵠黃鵠豈有之慎勿猜衆鳥衆鳥不足猜或作疑無人語鳯凰汝屈安得知黃鵠得汝去婆娑舞貌弄毛衣方云閤本作婆婆方今按閤本之謬乃有如此之甚者雖不從而亦不敢明言其謬也前汝下視鳥各議汝瑕疵汝豈無朋匹有口莫肯開汝落蒿艾間幾時復能飛哀哀故山友中夜思汝悲路逺翅翎短不得持汝歸得或作能猛虎行諸本有贈李宗閔字方从唐閤蔡李本云蜀本總題誤以上題贈李宗閔四字綴猛虎行之上後人因之其寔後詩不為宗閔作也猛虎行樂府􅃇題非前詩類也新史又謂裴度薦李德裕宗閔怨之為作此詩薦事在太和三年公殁久矣不可据猛虎雖云惡亦皆有匹儕羣行深谷間百獸望風低身食黃熊父熊或作能奴來切非是下同子食赤豹麛擇肉於熊豹方作羆肯視兎與貍正晝當谷眠眼有百步威自矜無當對氣性縱以乖朝怒殺其子暮還食其妃匹儕四散走猛虎還孤棲狐鳴門兩旁兩方作四注云山谷本四作兩今按門只有兩旁作兩為是山谷葢以唐本定也烏鵲從噪之出逐猴入居諸本皆如此方从舊監本潮本倒此兩句又从杭蜀本以猴為猚云居當音姬傳本不考古音多以烏鵲從噪之一語易置於其上質之舊本非也猚音壘似㺅而大其今按詩意葢謂狐鳴鵲噪于外虎出逐之㺅乃入居宂而虎不知所歸耳狐鳴鵲噪能使虎出而不能使之失其歸猴既入宂則又不待鵲噪而後虎失所歸也方以舊本古韻之故必欲倒此二句而不顧其文理之不順不若諸本之為當也又猚字本作雖字雖見於禮經然非長有之物亦不若作猴之為明白而易知也方意務為艱澁大抵如此今皆不取虎不知所歸誰云猛虎惡中路正悲啼豹來衘其尾熊來攫音矍持也其頤猛虎死不辭但慚前所為虎坐無助死况如汝細微坐或作兕如或作知皆非是故當結以信親當結以私親故且不保人誰信汝為别本韓文考異巻六欽定四庫全書别本韓文考異巻七宋王伯大重編古詩雪後寄崔二十六丞公斯立藍田十月雪塞闗我興南望愁羣山攅天嵬嵬凍相映嵬嵬諸本作崔嵬君乃寄命於其問秩卑俸薄食口衆豈有酒食開容顔殿前羣公賜食罷驊騮周穆王馬蹋路驕且閑稱多量少鑒裁宻豈念幽桂遺榛菅上音臻下音官榛或作蓁幾欲犯嚴出薦口氣象硉兀上盧骨切硉兀髙亢皃兀或作矹未可攀歸來殞涕揜闗卧心之紛秩誰能刪詩翁憔悴斸荒棘斸陟王切斫也時元和十年十月孟郊已死洪曰詩翁指孟郊也清玊刻佩聯玦環玦古宂切韓曰玦如環而玦肉好如一謂之環孫曰三者喻孟郊詩之工也腦脂遮眼卧壯士洪曰謂張籍病眼大弨蚩招切弓弛也挂壁無由彎挂方作擐云擐貫也言擐于壁而不用也或作擐臂乾坤施惠萬物遂獨於數子懐偏慳朝欷詐計香衣二切戲欷也暮唶唶子夜切嘆也祝曰後漢遥望見春陵郭唶曰氣佳哉選咄唶令心悲不可解我心安得如石頑送僧澄觀浮屠西來何施為擾擾四海爭奔馳構樓架閣切星漢誇雄鬬麗止者誰僧伽樊曰李邕泗州普光王寺碑僧伽者龍朔中西來嘗縱觀臨淮發念置寺既成中宗賜名普光王以景龍四年三月二日示滅於京洪曰李太白僧伽歌云此僧本住南天竺為法頭陀來此國又云嗟子落泊江淮久罕遇真心說空有葢相遇于江淮也太白于豪傑中識郭子儀隠逸中識司馬承􅐃浮屠中識僧伽則其人可知後出淮泗上淮方作雄云雄言特出也今按上句巳有誇雄宇下句又云尤恢奇則此作雄非是勢到衆佛尤恢奇恢或作魁方云恢奇字見史記公孫洪傳此詩今本以恢為魁又惡上語意同遂易雄為淮非也今按作恢亦不免與上句相犯况淮之不可為雄自避上句誇雄字初不專為此耶越商胡賈脫身罪或作獻今從謝校珪璧滿船寧計資清淮無波平如席欄柱傾扶半天赤火燒水轉掃地空突兀便髙三百尺影沉潭底龍驚遁當晝無雲跨虛碧借問經營本何人道人澄觀名籍籍愈昔從軍大梁下徃來滿屋賢豪者屋或作日方云滿屋字見世說皆言澄觀雖僧徒公才吏用當今無後從徐州辟書至紛紛過客何由記人言澄觀乃詩人人言或作又言一座競吟詩句新向風長歎不可見我欲收歛加冠巾洛陽窮秋厭窮獨丁丁啄門疑啄木啄門或作打門疑或作如有僧來訪呼使前伏犀孫曰伏犀謂骨當額上入髪際韓曰伏犀貴相李固頂骨匿犀後為太尉即此揷腦髙頰權或作顴方从杭蜀本云選洛神賦𢎞敏俳文髙權長頭髙權古字只作權刋本不深考也頰古叶切靣頰也權輔骨也選輔承權頰惜哉已老無所及坐睨神骨空澘音刪然臨淮太守謂泗州刺史初到郡逺遣州民送音問好奇賞俊直難逢直或作實去去為致思從容山南鄭相公樊員外酬答為詩其末咸有見及語樊封以示愈依賦十四韻以獻鄭餘慶樊宗師也宗鄭餘慶元和九年為山南西道節度使樊師為副李肇國史補曰元和以後為文奇詭則學於韓愈苦澁則學于樊宗師公此詩及宗師墓誌語奇而澁皆所以效其體也梁維西南屏維或作惟山厲水刻屈禀生肖勦剛勦音巢輊㨗也方云荆公山谷本作勁云難諧在民物榮公鼎軸老方云餘慶封滎陽郡公作滎者非烹幹烹謂烹擊幹謂幹旋猶言宰制也力徤倔渠勿切强也幹或作鮮非是帝咨女予徃牙纛前􅽛坲上蒲悶切下音佛或作拂方云佛哱塵起貌字見楚辭九歎威風挾惠氣葢壤兩劘拂方云劘音摩子虛賦上摩蘭蕙下拂羽葢文選作靡賈山傳贊自下劘上序傳只作摩古摩靡劘字皆通用揚子劘虎牙莊子喜則交頸相靡漢衡山王贊臣下漸靡使然今集韻摩下不出靡字非也拂諸本作刜茫漫華黒閒指畫變怳歘許忽切暴起也即忽字華黑或作筆墨非是方云華陽黑水惟梁州謂山南所領也誠既富而美章彚音胃文采也霍炳蔚日延講大訓龜判錯衮黻孫曰定公八年公羊傳寳者何璋判白弓繡質龜青純何休注判半也半圭曰璋白藏天子青藏諸矦故曰判龜判謂圭玉也衮龍衮衣黻者繡兩已相背于裳也龜判言其所執衮黻言其所服錯雜也言講大訓者之多錯雜如此樊子坐賔署演孔刮老佛刮或作亂方云字見劇秦文金舂撼玊應孫曰舂撞也金玉相應以况樊鄭唱酧之作也厥臭香氣也劇蕙鬱欝金香草遺我一言重跽巨已切長跪受惕齋慄辭慳義卓濶孫曰言詞約而義富呀豁疚掊掘疚或作疾方云疚勞也呀虛加切掊彼垢切掘渠勿切掊擊也掘掘地也孫曰呀豁隙竅也因其隙竅疾加掊掘掊掘者討究也如新去耵矃雷霆逼􅄓䫻于聿切孫曰言讀此詩如新去耳中垢却聞雷霆􅄓䫻言驚恐不定也新或作初耵矃並上聲方云盯矃耳垢也从日非􅄓或作颷或作䬖䬖字書未見或與䬝同綴此豈為訓俚言紹莊屈此或作作孫曰言我綴此答詩豈以為訓乎俚下之言聊以紹莊周屈原而巳奉和武相公鎮蜀時詠使宅韋太尉所養孔雀武元衡韋臯也諸本無奉字穆穆鸞鳯友何年來止兹飄零失故態隔絶抱長思翠角髙獨聳金華煥相差坐䝉恩顧重畢命守堦墀感春三首作于元和十一年三月為中書舍人時也偶坐藤樹下暮春下旬間藤隂巳可庇蘂落還漫漫亹亹音尾翠色貌新葉大瓏瓏花落聲晚花乾青天髙寥寥兩蝶飛翻翻或作翩翩或作翩翻時節適當爾懐悲自無端黄黃蕪菁花孫曰方言云豐蕘蕪菁也陳楚謂之豐齊魯謂之蕘闗西謂之蕪菁趙魏之間謂之大芥蕪菁即蔓菁也桃李事巳退狂風簸枯榆音俞木名白枌也狼籍九衢内彺一作强春序一如此汝顔安足賴汝或作去誰能駕飛車相從觀海外孫曰飛車仙駕韓曰竒肱國人一臂能駕飛車从風逺行出山海經晨遊百花林朱朱兼白白栁枝弱而細懸樹垂百尺樹或作對左右同來人金紫貴顯劇或作極嬌童為我歌哀響跨箏笛跨或作誇非是艶姬蹋筵舞清眸刺劒㦸孫曰言眸子清朗如劍㦸之刺心懐平生友莫一在燕席死者長眇芒生者困乖隔生者或作生有少年真可喜老大百無益早赴街西行香贈盧李二中舍人盧汀李逢吉天街東西異祗命孫曰謂承詔也遂成游月明御溝曉御溝或作溝水蟬吟堤樹秋老僧情不薄僻寺境還幽寂寥二三子歸騎得相收寥或作寞晚寄張十八助教周郎博士張籍周况也或無郎字
