body:
  text: 栁子厚墓誌銘子厚諱宗元七世祖慶拓跋魏侍中封濟隂公或無拓跋二字曽伯祖奭為唐宰相與褚遂良韓瑗俱得罪武后死髙宗朝髙或作中朝或作時皇考諱鎮以事母棄太常博士求為縣令江南其後以不能媚權貴失御史權貴人死乃復拜侍御史號為剛直所與游皆當世名人游上方無與字子厚少精敏無不通達逮其父時雖少年巳自成人能取進士第嶄士減切又士咸切選嶄絶峯殊狀注險峻貌楚辭何山石之嶄巖注石髙貌然見頭角衆謂栁氏有子矣其後以博學宏詞授集賢殿正字或作授校書郎方云栁集可考或本非是此下方有藍田尉三字今按三字下文再見不當重出儶傑亷悍議論證據今古出入經史百子今古或作古今踔敇角切前漢非有踔絶之能注髙逺也厲風發率常屈其座人名聲大振一時皆慕與之交諸公要人争欲令出我門下交口薦譽之貞元十九年由藍田尉拜監察御史順宗即位拜禮部員外郎遇用事者得罪例出為刺史或作貞元十九年拜監察御史王叔文韋執誼用事拜尚書禮部員外郎且將大用遇叔文等敗例出為刺史今按方本得婉㣲之體他本則幾乎抹矣疑初本出書後乃更定也若從初本則上文須補藍田尉三字未至又例貶州司馬居閒益自刻苦務記覽為詞章泛濫停蓄為深博無涯涘而自肆於山水間水下或有之字元和中嘗例召至京師又偕出為刺史而子厚得栁州既至歎曰是豈不足為政邪因其土俗為設教禁州人順賴其俗以男女質錢約不時贖子本相侔則没為奴婢子厚與設方計悉令贖歸其尤貧力不能者令書其傭足相當則使歸其質觀察使下其法於他州比一嵗免而歸者且千人衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀其召至京師而復為刺史也中山劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無詞以白其大人且萬無母子俱往理請於朝將拜疏願以栁易播雖重得罪死不恨遇有以夢得事白上者夢得于是改刺連州白上或作上白改下或無刺字嗚呼士窮乃見節義今夫平居里巷相慕悦酒食遊戲相徴逐詡詡虚甫切語也强笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髮比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也救下或有而字此宜無知夷狄所不忍為而其人自視以為得計聞子厚之風亦可以少媿矣少上方無以字子厚前時少年勇於為人不自貴重顧籍謂功業可立就故坐廢退既退又無相知有氣力得位者推挽故卒死於窮裔材不為世用道不行於時也死或作尼道上或有而字使子厚在臺省時自持其身已能如司馬刺史時亦自不斥斥時有人力能舉之且必復用不窮時有或作而有力能方作解或能下復出解字皆非是然子厚斥不乆窮不極雖有出於人其文學辭章必不能自力以致必傳於後如今無疑也力以或作以力或無致必二字皆非是雖使子厚得所願為將相於一時以彼易此孰得孰失必有能辯之者子厚以元和十四年十一月八日卒年四十七以十五年七月十日歸葬萬年先人墓側十一月八日或作十月五日七月上或有秋字或無日十字子厚有子男二人長曰周六始四嵗季曰周七子厚卒乃生女子二人皆幼其得歸葬也費皆出觀察使河東裴君行立費或作資行立有節概立然諾下立字或作重與子厚結交子厚亦為之盡竟賴其力葬子厚於萬年之墓者舅弟盧遵遵涿竹角切上谷有涿縣涿或作可或作為人性謹順學問不厭自子厚之斥遵從而家焉逮其死不去家下或無焉字既往葬子厚又將經紀其家庶幾有始終者銘曰是惟子厚之室既固既安以利其嗣人下既字或作且唐故昭武校尉守左金吾衛將軍李公墓誌銘公諱道古字某曹成王子其先王明以太宗子曹絶輒復封五世而至成王成王諱臯有功建中貞元間王諱上或無成字非是以多才能能行賞誅為名至今追數當時内外文武大臣成王必在其間或無成王字公以進士舉及第獻文輿三十巻拜校書郎集賢學士四遷至宗正丞憲宗即位選擢宗室遷尚書司門員外郎以選為利隨唐睦州刺史遷少宗正元和九年以御史中丞持節鎮黔中十一年來朝遷鎮鄂州以鄂岳道兵㑹平淮西以功加御史大夫十三年徴拜宗正轉左金吾上即位以先朝時嘗信妄人栁泌能燒水銀為不死藥薦之泌或作賁經云新舊史李干墓志石本皆作泌泌以故起閭閻氓為刺史不效貶循州司馬其年九月三日以疾卒于貶所年五十三月下或有十字長慶元年詔曰左降而死者還其官以葬遂以其年某月日葬于東都某縣其年或作某年月上或無某字公三娶元配韋氏諱脩脩生子紘紘為進士學脩方作循學或作舉女貢嫁崔氏夫人隋雍州牧鄖音云公叔裕五世孫父士佺蓬山令次配崔氏諱葯乙角切又音約白芷其葉謂之葯生綽紹綰女嫁鄭氏季毗夫人父昭嘗為京兆尹今夫人韋氏無子父光憲光禄卿其葬用古今禮以元配韋氏夫人祔而葬次配崔氏夫人於其域異墓或無用古今禮至而葬十四字非是公宗室子生而貴富能學問以中科取名方無生字非是善自傾下以交豪傑身死賣宅以葬銘曰大支於今其尚有封大或作本非是尚方作上當公弟兄未續又亡弟兄或作兄弟其遷于南年及始衰誰黜不復而以喪歸誰或作雖海豐彌彌萬里于畿載其始終以哀表之唐故朝散大夫尚書庫部郎中鄭君墓誌銘君諱羣字𢎞之世為滎陽人君或作公其祖於元魏時有假封襄城公者子孫因稱以自别此下或有君其後也四字今按下文有君其季也有則不應重出之曽祖匡時晉州霍邑令祖千尋彭州九隴丞父迪鄂州唐年令娶河南獨孤氏女生二子君其季也以進士選以上方有君字吏部考功所試判為上等授正字自鄠縣尉拜監察御史佐鄂岳使裴均之為江陵以殿中侍御史佐其軍均之徴也遷虞部員外郎之徴或作戸徴非是均鎮襄陽復以君為襄府左司馬刑部員外郎副其支度使事均卒李夷簡代之因以故職留君嵗餘拜復州刺史遷祠部郎中遷上或有方字非是㑹衢州無刺史方選人君願行宰相即以君應詔方無㑹字或無方字君願行作行願者非治衢五年復入為庫部郎中行及揚州遇疾居月餘以長慶元年八月二十四日卒春秋六十或無居字即以其年十一月二十二日從葬於鄭州廣武原先人之墓次君天性和樂居家事人與待交遊初持一心未嘗變節有所緩急曲直薄厚疎數也不為翕翕熱亦不為崖岸斬絶之行熱或作然斬或作嶄俸禄入門與其所過逢吹笙彈筝飲酒舞歌詼調醉呼連日夜不厭費盡不復顧問方無此上六字或分挈以去一無所愛惜不為後日毫髮計留也遇其空無時客至清坐相看或竟日不能設食客主各自引退亦不為辭謝看或作對看下方無或字與之遊者自少及老未嘗見其言色有若憂歎者豈列禦冦莊周等所謂近于道者邪其治官守身又極謹慎不挂於過差去官而人民思之身死而親故無所怨議哭之皆哀又可尚也初娶吏部侍郎京兆韋肇女生二女一男長女嫁京兆韋詞次嫁蘭陵蕭瓚詞或作嗣宗贊或作讚後娶河南少尹趙郡李則女生一女二男其餘男二人女四人皆幼嗣子退思韋氏生也四或作一銘曰再鳴以文進塗闢佐三府治藹厥蹟郎官郡守愈著白官或作中洞然渾樸絶瑕謫樸或作璞甲子一終反𤣥宅唐故朝散大夫越州刺史薛公墓誌銘公諱戎字元夫其上祖懿為晉安西將軍實始居河東公之四世祖嗣汾隂公諱徳儒為隋襄城郡書佐以卒隋上或無為字襄城有子二人皆貴其後皆蕃以大而其季尤盛官至邠州刺史邠州諱寶𦙍有子九人皆有名位其最季諱縑為河南令以卒縑或作謙方云世系表作縑河南有子四人其長諱同卒官湖州長史贈刑部尚書尚書娶吳郡陸景融女有子五人皆有名蹟其達者四人公於倫次為中子仁孝慈愛忠厚而好學不應徴舉沈浮閭巷間不以事自累為貴常州刺史李衡遷江西觀察使曰州客至多莫賢元夫吾得與之俱足矣使下或無曰字即署公府中職公不辭讓年四十餘始脱褐衣為吏衡遷給事中齊映自桂州以故相代衡為江西公因留佐映治桂或作睦方云考傳當作桂治方作始屬下文非是映卒湖南使李㢲福建使栁冕交表奏公自佐詔以公與冕在冕府累遷殿中侍御史冕使公攝泉州冕文書所條下有不可者公輒正之冕惡其異于已懐之未發也遇馬總以鄭滑府佐忤中貴人貶為泉州别駕冕意欲除總附上意為事使公按置其罪公嘆曰公乃以是待我我始不願仕者正為此耳不許冕遂大怒囚公于浮圖寺而致總獄事聞逺近值冕亦病且死不得已俱釋之冕死後使至奏公自副又副使事於浙東府轉侍御史元和四年徴拜尚書刑部員外郎遷河南令歴衢湖常三州刺史所至以亷貞寛大為稱朝廷嘉之某年拜越州刺史兼御史中丞浙東觀察使某年或作元和十二年正月廿二日方云前已云元和四年此不當復出年號他銘亦無書除授月日者或本非是史下方無兼字至則悉除去煩弊儉出薄入以致和富部刺史得自為治無所牽制四境之内竟嵗無一事公篤於恩義盡用其禄以周親舊之急有餘頒施之内外親無疎逺皆家歸之疾病去官長慶元年九月庚申至於蘇州以卒春秋七十五卒上或有病字奏至天子為之罷朝或無奏至二字贈左散騎常侍使臨弔祭之士大夫多相弔者大夫或作人以其年十一月庚申葬于河南偃師先人之兆次以韋氏夫人祔其或作明公凡再娶先夫人京兆韋氏後夫人趙郡李氏皆先卒子男二人曰沂曰洽長生九嵗而幼七嵗矣沂或作泝方云世系表作泝女四人皆已嫁愈既與公諸昆弟善又嘗代公令河南公之葬也故公弟集賢殿學士尚書刑部侍郎放屬余以銘故字疑當在上文公之字上刑或作兵其文曰薛氏近世莫盛公門公倫五人咸有顯聞公之初志不以事累或作不累以事僶俛以隨亦貴於位無怨無惡中以自寶或作中人以自方云此文四句一韻古音寶與夀叶寶或作貴或作實不能百年曷足謂夀公宜有後有二稚子其祐成之公食廟祀别本韓文考異巻三十二欽定四庫全書别本韓文考異巻三十三宋王伯大重編碑誌楚國夫人墓誌銘韓𢎞妻楚國夫人姓翟氏故檢校御史大夫宋州刺史良佐之女今司徒兼中書令許國公之妻前鄜坊節度使散騎常侍兼御史大夫公武之母或無司字坊或作州非是夫人在家以孝友聰明為父母所偏愛選所宜歸以適韓氏韓氏族大且貴又太尉劉公甥内外尊顯又或作父非是公下或有之字夫人入門上下莫不贊賀或作賢事皇姑齊國太夫人肅恭誠至奉養不怠皇姑以夫人能盡婦道稱之六親能上或有為字其事夫義以順其教子愛以公司徒公曰我之能守貴富不危溢者楚國有助焉耳大夫領梁偏師卒就蔡功受節居藩為邦家令人父母之教然也夫人以元和十四年十一月一日薨于鄜之公府春秋若干大夫委節去位奉喪以居東都詔起之辭以羸毁不任即命又加喻勉固不變天子嗟嘆之起上或有再字固下或有守字長慶二年三月某日葬夫人于洛陽北山夫人生二子長曰肅元為太子司議郎以卒贈尚書主客郎中其次大夫公武也銘曰翟氏之先盖出宗周璜顯于魏以佐文侯髙陵翟方進封髙陵侯相漢義以家酬遷于南陽始自郎苗逮魏晉宋代不絶史以至夫人太守之子司徒之妻大夫之母公居河東子在鄜畤為王屏翰有壤千里公或作父非是公曰姑止以承我祀子曰母兮莫我撫已莫我或作莫慰文駟雕軒往來有煒莫尊于母莫榮于妻從古迄今孰盛與夷用昭厥裔篆此銘詩唐故國子司業竇公墓誌銘國子司業竇公諱牟字某或作字貽周六代祖敬逺嘗封西河公大父同昌司馬比四代仍襲爵名代或作世字同昌諱􅉙生皇考諱叔向官至左拾遺溧音栗水令贈工部尚書尚書於大歴初名能為詩文及公為文最長於詩孝謹厚重舉進士登第孝謹厚重又作孝愛謹厚佐六府五公八遷至檢校虞部郎中或無虞部字元和五年真拜尚書虞部郎中轉洛陽令都官郎中澤州刺史以至司業年七十四長慶二年二月丙寅以疾卒其年八月某日葬河南偃師先公尚書之兆次初公善事繼母家居未出學問於江東尚幼也名聲詞章行於京師人遲音穉其至及公就進士且試其輩皆曰莫先竇生于時公舅袁髙為給事中方有重名愛且賢公然實未嘗以干有司嘗下或有有字公一舉成名而東遇其黨必曰非我之才維吾舅之私其佐昭義軍也遇其將死公權代領以定其危後將盧從史重公不遣奏進官職公視從史益驕不遜偽疾經年舉音預祝曰舁車也歸東都從史卒敗死公不以覺㣲避去為賢告人公始佐崔大夫縱留
