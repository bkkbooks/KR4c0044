front:
  text: 我即東兵以取曹師道懼不敢動𢎞正以濟兵以或作以兵非是誅吳元濟也命公都統諸軍曰無自行以遏北冦公請使子公武以兵萬三千人㑹討蔡下歸財與粮以濟諸軍卒擒蔡姦三千淮西碑作二千於是以公為侍中而以公武為鄜坊丹延節度使師道之誅公以兵東下進圍考城克之遂進迫曹曹冦乞降鄆部既平公曰吾無事於此其朝京師天子曰大臣不可以暑行其秋之待公曰君為仁臣為恭可矣遂行既至獻馬三千匹絹五十萬匹他錦紈綺纈又三萬金銀器千而汴之庫廐錢以貫數者尚餘百萬絹亦合百餘萬匹馬七千粮三百萬斛兵械多至不可數五十或作七十初公有汴承五亂之後掠賞之餘且斂且給恒無宿儲至是公私充塞至於露積積子智切王幹秩俸布帛皆露積腐爛不垣初公下或有之字無上或無恒字册拜司徒兼中書令進見上殿拜跪給扶贊元經體不治細㣲天子敬之元下或有老字非是元和十五年今天子即位公為冡宰又除河中節度使在鎮三年以疾乞歸復拜司徒中書令病不能朝以長慶二年十二月三日薨於永崇里第年五十八天子為之罷朝三日贈太尉賜布粟年五十八或作八十方考新舊史定從今本方無天子為之四字布粟或作布帛方云按舊史賞賜米千石其葬物有司官給之京兆尹監護明年七月某日葬于萬年縣少陵原京城東南三十里楚國夫人翟氏祔子男二人長曰肅元某官次曰公武某官肅元早死公之將薨公武暴病先卒公哀傷之月餘遂薨無子以公武子孫紹宗為主後汴之南則蔡北則鄆二冦患公居閒為已不利卑身佞辭求與公好薦女請昏使日月至既不可得則飛謀釣謗以閒染我公先事候情壊其機牙姦不得發卑或作畢至既方作既至非是則上或無得字釣或作鈞染或作諜先事候情或作先得事情候或作後王誅以成最功定次孰與髙下公子公武與公一時俱授弓鉞處藩為將疆土相望公武以母憂去鎮公母弟充自金吾代將渭北公以司徒中書令治蒲于時弟充自鄭滑節度平宣武之亂以司空居汴自唐以來莫與為比公之為治嚴不為煩止除害本不多教條與人必信吏得其職賦入無所漏失人安樂之在所以富公與人有畛域不為戲狎人得一笑語重於金帛之賜畛或作軫非是其罪殺人不發聲色問法何如不自為重輕故無可犯者或無自為字非是其銘曰在貞元世汴兵五猘居例切祝曰猘狂犬也自劉元佐死汴州五亂將得其人衆乃一愒丘例切祝曰愒息也與憇同詩不尚愒焉其人為誰韓姓許公磔其臬狼養以雨風桑榖奮張厥壤大豐貞元元孫命正我宇公為臣宗處得地所河流兩壖盜連為羣雄唱雌和首尾一身公居其間為帝督姦察其嚬呻與其睨眴上音詣下音茍祝曰眩也又目動貌淮南子視焉無眴邪視也左顧失視右顧而跽巨几切蔡先鄆鉏三年而墟槁乾四呼終莫敢濡常山成徳軍幽都幽州孰陪孰扶陪或作悖或作倚天施不留其討不逋許公預焉其賚何如賚或作賴悠悠四方既廣既長無有外事朝廷之治許公來朝車馬干戈相乎將乎威儀之多將則是矣相則三公釋師十萬歸居廟堂上之宅憂公讓太宰養安蒲坂萬邦絶等有弟有子提兵守藩一時三侯人莫敢扳又音班引也春秋傳扳引而立之與攀同生莫與榮没莫與令刻文此碑以鴻厥慶
