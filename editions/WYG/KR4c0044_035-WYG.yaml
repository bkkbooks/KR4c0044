front:
  text: 三十五
  hash: sha256:adc7d6d8c5ca19cde8397e95c95e8a1c58f1e4a9cba3a03e6a23bf8a6a774a77
body:
  text: 宋王伯大重編碑誌盧渾墓誌銘渾公妻弟也然有銘而無誌焉前汝父母右汝兄兄上或有弟字或作後有汝兄方云渾於陵弟也兄弟惟二人汝從之居視汝如生遷汝居兮日月之良遷汝或作汝遷于三字汝居孔固兮後無有殃如不信兮視此銘章此方作於虢州司戸韓府君墓誌銘安定桓王五世孫叡素為桂州長史化行南方長或作刺方云考世系表李太白去思頌公墓誌行狀皆作長史有子四人最季曰紳卿文而能官嘗為揚州録事參軍事故宰相崔圓或作參軍二字圓狎愛州民丁某至顧省其家後大衙㑹日司録君趨以前大言曰請舉公過公與小民狎至至其家害於政或無複出至字圓驚謝曰録事言是圓實過乃自署罰五十萬錢由是遷涇陽令破豪家水碾利民田頃凡百萬君諱岌桂州君之孫司録君之子亦以能官名少而竒壯而强老而通閤本無而强老三字方以為脱以元和元年六月十四日卒年五十七五或作三娶京兆田氏女或無女字男曰家女曰門曰都皆幼或無曰門二字初君樂虢之土田山水求掾其州去官猶家之既卒因以其年九月某日葬州北十里崔長史墓西葬下或有于字銘曰凡兆于兹唯其家之材或作財今按此句未詳當有脱誤盖歸有時四門博士周况妻韓氏墓誌銘四門博士周况妻韓氏諱好或有復出好字尚書禮部郎中諱雲卿之孫開封尉諱俞之女開封娶趙氏生二女三男下開封字或作俞開封卓越豪縱不治資業喜酒色狗馬趙氏卒十一年而開封亦卒開封從父弟愈于時為博士或無弟字方云舊本皆有今按公父仲卿與開封之父雲卿為兄弟則公與開封固從父兄弟也乞分教東都生以收其拏於開封界中教畜之而歸其長女于周氏况况進士家世儒者或無復出况字曽祖諱延潭州長沙令祖諱晦常州參軍父諱良甫左驍衛兵曹參軍况立名行人士譽之韓氏嫁九年生一男一女年二十七以疾卒疾或作病葬長安城南鳳栖原其從父愈于時為中書舍人父下方本非是儀禮喪服篇有族曽祖父者曽祖之兄弟也其子為族祖父其孫為族父其曽孫為族兄弟有從祖祖父者祖父之兄弟也其子為從祖父其孫為從祖兄弟有世父叔父者父之兄弟也其子為從父兄弟今韓公於開封及虢州皆為從父弟矣於開封之女則公當為從祖父也此但云從父為脱一祖字方作從父弟尤誤今無别本不敢輒増祖字且從諸本去弟字為銘曰夫失少婦失或作喪子失壯母歸咎無處韓滂墓誌銘樊曰世系表老成二子湘大理丞滂寶雞丞按此誌云滂年十九死盖未嘗仕也表復誤矣滂韓氏子其先仕魏號安定桓王滂父老成厚謹以文為韓氏良子弟未仕而死有二子滂其季也其祖諱介為人孝友一命率府軍佐以卒二子百川老成老成為伯父起居舍人某後或無復出老成字或無某字起居有徳行言詞為世軌式滂既兄弟二人而率府長子百川早死無嗣其叔祖愈命滂歸後其祖或作早字滂清明遜悌以敏讀書倍文功力兼人倍與背同倍文謂背本暗記也周禮注倍文曰諷韓語盖本此洪譜以為作文盖不考此而誤改兼下文復有為文辭字亦不應重復如此也為文詞一旦竒偉驟長不類舊常吾曰爾得無假之人邪或無得字無人字退大喜謂其兄湘曰某違翁且踰年懼無以為見今翁言乃然可以為賀羣輩來見皆曰滂之大進不唯于文詞為人亦然方無文字詞下或有於字既數月得疾以死年十九矣死或作卒吾與妻哭之傷心三日而斂既斂七日權葬宜春郭南一里或無一字嗚呼其可惜也已銘曰天固生之邪偶自生邪或無之字天殺也邪其偶自死邪或無也字莫不歸於死夀何少多歸或作悲銘以送汝其悲奈何女挐壙銘女挐韓愈退之第四女也慧而早死愈之為少秋官言佛夷鬼其法亂治梁武事之卒有侯景之敗可一掃刮絶去不宜使爛熳為少或作少為非是方無武字刮方作削天子謂其言不祥斥之潮州漢南海掲陽之地或無漢字愈既行有司以罪人家不可留京師迫遣之或無可字女挐年十二病在席既驚痛與其父訣病或作疾方作在病無席字又輿致走道撼頓失食飲節死于商南層峰驛即瘞道南山下層峯或作密五年愈為京兆始令子弟與其姆音戊女師也記曰姆教婉娩聴從易棺衾歸女挐之骨于河南之河陽韓氏墓葬之京兆下或有尹字葬上或有而字女挐死當元和十四年二月二日和下或有之字其發而歸在長慶三年十月之四日其葬在十一月之十一日銘曰汝宗葬于是汝安歸之惟永寧河南緱氏主簿唐充妻盧氏墓誌銘夫人盧氏諱某蘭陵太守景柔八世孫父貽卒河南法曹法曹娶上黨苗氏太師晉卿兄女生三女三男方云考苗夫人志當云二男夫人最長法曹卒苗夫人嫁之唐氏充充明經或無復出充字宰相休憬曽姪孫出郄氏今按郄綺㦸反俗郤字與郄字相亂今流俗郗超字多作郄誤也外王父昻中書舍人夫人年若干嫁唐氏凡生男與女九人年四十二元和四年正月二十二日卒其年四月十五日葬河南府河南縣之大石山下銘曰夫人本宗世族之後率其先猷令徳是茂爰歸得家九子一母得或作其婉婉有儀柔静以和命不侔身兹其奈何刻銘墓石以告觀者觀或作親方云者音之戈切與何叶吳才老讀如此乳母墓誌銘樊曰唐志義有服為乳母服者其服緦麻韓曰葬乳母且為之銘自公始舊本作河南縣令韓愈乳母李氏乳母李徐州人李下或有氏字號正真入韓氏乳其兒愈入或作為下或有家字愈生未再周月孤失怙恃李憐不忍棄去視保益謹遂老韓氏及見所乳兒愈舉進士第歴佐汴徐軍見下或有其字徐下或有二州字入朝為御史國子博士尚書都官員外郎河南令娶婦生二男五女二或作三時節慶賀輒率婦孫列拜進夀節下或有受字輒上或有愈字年六十四元和六年三月十八日疾卒疾或作病或無疾字或作以疾卒卒三日葬河南縣北十五里愈率婦孫視窆封且刻其語于石納諸墓為銘語方作誌别本韓文考異巻三十五欽定四庫全書别本韓文考異巻三十六宋王伯大重編雜
