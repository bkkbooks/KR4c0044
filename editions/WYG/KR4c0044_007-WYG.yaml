front:
  text: 日薄風景曠薄或作落方云薄迫也國語今㑹日薄矣恐事之不集今詳語勢但如白樂天所謂旌旗無光日色薄耳方說非是出歸偃前詹晴雲如擘絮新月似磨鎌田野興偶動衣冠情久厭吾生可擕手歎息嵗將淹方云淹當作殗殘也淹延之義不可通用今人書殁作没殂作徂多互用李白詩東溪卜築嵗將淹又逺行嵗巳淹字皆訛知今按古字通用者多不知方何以此獨不可通用也
