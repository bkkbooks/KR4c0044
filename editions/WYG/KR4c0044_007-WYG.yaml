body:
  text: 題張十八所居君居泥溝上溝濁萍青青諸本上句作濁溝下句作泥濁蛙讙橋未掃讙或作喧蟬嘒呼惠切小聲云門長扄名秩後千品詩文齊六經端來問奇字漢書劉歆子棻嘗从揚雄學作奇字注云竒字古文之異者也為我講聲形周禮保章氏掌國子六書注云一曰指事二曰象形三曰諧聲四曰㑹意五曰轉注六曰假借形聲如江河之類張籍酧韓度子詩云西街幽僻處正與懶相宜尋寺獨行逺借書常送遅家貧無易事身病是閑時寂寞誰相問只應君自知樊曰寂寞字揚子雲事公詩落句用奇字籍詩落句用寂寞皆揚子雲事唐人酧答和意而巳奉酬盧給事雲夫四兄曲江荷花行見寄幷呈上錢七兄閤老張十八助教曲江在長安城昇道坊千頃秋波淨平鋪紅雲葢明鏡秋波方作波秋雲或作蕖方云紅雲明鏡皆喻也公三堂詩水上覔紅雲與此義同大明即含元宮宫中給事歸走馬來㸔立不正遺我明珠九十六寒光映骨睡驪目驪音離方从杭蜀本作離云光映骨而睡離目言讀盧詩之快也今按諸本葢用莊子取驪龍之珠者必遭其睡之語以目言之則又不止其頷下之珠矣方說不成文理况上文初無欲睡之意耶我今官閑得婆娑樊曰公時自中書舍人降太子右庶子問言何處芙蓉多撐舟昆明昆明池在長安西南周回四十里云度雲錦孫曰言芙蓉之盛云脚敲兩舷呌吳歌舷音賢船邊也孫曰晉夏統㑹稽人詣洛市藥㑹上巳王公以下並至浮橋統時在船中賈充令統作其土地間曲統以足扣舷引聲喉轉清激慷慨大風應至雷電晝㝠王公以下恐遂止之樊曰東坡詩脚扣兩舷歌小海亦是引用此事太白山髙三百里百或作十負雪崔嵬揷花裏孫曰謂太白山影見曲江荷花裏也玉山亦山名前却一作一前二却不復來曲江汀瀅音瑩小水水平盃水下方有不字非是我時相思不覺一㢠首天門孫曰謂君門九重也言盧雲夫給事宮中如在天上耳九扇相當開上界真人足官府孫曰謂上界真人猶有官府之事不如雲夫作地上散仙終日嬉遊也豈如散仙鞭笞鸞鳯終日相追陪方云仙下或有無字分兩句讀至笞字句絶又本或無鸞鳯二字皆非是奉和錢七兄曹長盆池所植錢徽翻翻江浦荷而今生在此今生方作生今非是擢擢菰音孤說文曰雕胡也葉長芳根復誰徙露濡兩鮮翠涵一作儒風蕩相磨倚但取主人知誰言盆盎是誰或作詎記夢夜夢神官與我言羅縷孫曰羅縷謂詳言之曹丕云羅縷豈闕辭道妙角與根方云按國語辰角見而雨畢天根見而水涸注辰角大星蒼龍之角天根亢氐之間所謂角與根也挈攜陬維口瀾翻今按上句言角根即辰卯二位二十八宿所起也此句言􅑍維通謂寅申巳亥之四隅也挈此四隅則周乎十二辰二十八宿之位矣淮南子天文訓云西南為背陽之維東南為嘗羊之維西北為􅕭通之維東北為報徳之維又地形訓云河水出崑崙東北􅑍赤水出其東南􅑍洋水出其西北􅑍亦邊隅之名也百二十刻須臾間方云董彦逺云世間只百刻百二十刻以星刻言也今按星紀之說未詳其㫖但漢哀帝嘗用夏賀良說漏刻以百二十為度矣我聴其言未云足捨我先度橫山腹先一作去我徒三人共追之一人前度安不危我亦平行蹋􅙚􅚤上丘召切下牛召切不安也神完骨蹻其虐切舉足高皃詩云小子蹻蹻脚不掉徒弔切驚掉也側身上視溪谷盲黒闇也杖撞玊版聲彭􅘑撞玉鐘聲神官見我開顔笑前對一人壯非少石壇坡陀可坐卧坡陀不平貌方云與送惠師詩坡陀字同語見楚詞招魂然唐人多通用坡陀字又郭璞子虚賦注音婆駝故蜀本作婆陀我手承頦户來切頤也肘拄座隆樓傑閣磊嵬髙天風飄飄吹我過壯非少者哦七言六字常語一字難樊曰魯直云只前句中哦字便是所難此乃為詩之法也我以指撮白玊丹行且咀噍行詰盤噍或作嚼方云字見大人賦與嚼音義通孫曰行且咀嚼謂咀嚼五丹行詰盤謂詰盤詩句詰盤反覆也口前截斷第二句孫曰謂仙人以巳詰盤之故遂不復吟第二句也綽虐顧我顔不歡乃知仙人未賢聖䕶短慿愚邀我敬我能屈曲自世間諸本能多作寧方从閣杭蜀本今按此言我若能屈曲从之則自居世間狥流俗矣安能從女居山間而又不免于屈曲乎猶栁下惠所云枉道而事人何必去父母之邦云爾方本為是安能從女巢神山山或作仙非是樊曰蘇内翰嘗曰李太白詩云遺我鳥跡書讀之了不聞太白尚氣乃自招不識字不如退之倔强云我寧屈曲自世間安能从女巢神山又云退之性氣雖出世間人亦不能容也南内朝賀歸呈同官洪曰唐長安有三内皇城在西北隅謂之西内東内曰大明宮在西内之東南内曰興慶宫在東内之南此詩朝賀南内也奉酧盧給事詩大明宫中給事歸即東内也薄雲蔽秋曦蔽或作户清雨不成泥罷賀南内衙歸凉曉淒淒内衙或作衙内非是曉或作晚緑槐十二街洪曰中朝事迹云天街兩畔槐樹俗號為槐街白樂天遊園詩云下視十二街緑槐間紅塵即此也渙散馳輪蹄余惟戅陟降切愚也書生孤身無所齎三黜竟不去致官九列齊豈惟一身榮佩玉冠簪犀滉蕩天門髙著籍朝厥妻文才不如人行又無町徒頂切田畔也畦問之朝廷事略不知東西况於經籍深豈究端與倪君恩太山重不見酬稗蒲賣切稊田黎切所職事無多又不自提撕自或作相明庭集孔鸞曷取於鳬鷖樹以松與栢不宜間蒿藜間或作問非是婉孌自媚好幾時不見擠貪食以忘軀尠音鮮少也不調鹽醯法吏多少年磨淬七内切出角圭將舉汝愆尤以為已階梯收身歸闗東期不到死迷朝歸峨峨進賢冠耿耿水蒼佩孫曰水蒼玉名禮記大夫佩水蒼玊而純組綬服章豈不好不與德相對顧影聴其聲頳顔汗漸平聲背進乏犬雞效又不勇自退坐食取其肥無堪等聾瞶長風吹天墟秋日萬里晒抵暮但昏眠不成歌慷慨愁嘆也魏武帝短歌行曰慨當以慷憂思難忘雜詩四首樊本作四本方曰以義考之鵲鳴聲楂楂以下當為此篇韓曰公時為右庶子而皇甫鏄程异之徒用事元和十一年也故此詩及東方朔雜事遣瘧鬼皆指事托物而作朝蠅不須驅暮蚊不可拍蠅蚊滿八區可盡與相格得時能幾時與汝恣啖咋音責凉風九月到掃不見蹤跡鵲鳴聲楂楂音查聲也烏噪聲擭擭烏虢切爭鬬庭宇間持身博彈射食亦切間或作聞非是持或作將云黃鵠能忍饑兩翅久不擘能忍方作忍長非是蒼蒼雲海路嵗晚將無獲嵗晚或作晚嵗截橑音老椽也楚詞桂楝兮蘭橑為欂櫨上音博下音盧韓曰長門賦施瑰木之欂櫨兮委參差以棟梁注拱斗之属斵楹以為椽束蒿以代之或作茨小大不相權雖無風雨災得不覆且顛解轡棄騏驥蹇驢鞭使前崑崙髙萬里嵗盡道苦邅張連切迥逺也停車卧輪下絶意於神仙雀鳴朝營食鳩鳴暮覓羣覓或作求獨有知時鶴雖鳴不縁身喑音瘖蟬終不鳴有抱不列陳喑或作瘖方云本草陶隠居曰啞蟬不能鳴者雌蟬也蛙黽鳴無謂閤閤蛙黽聲祗亂人讀東方朔雜事樊曰漢武帝内傳帝好長生七夕西王母降其宮有頃索桃七枚以四枚與帝自食三枚曰此桃三千年一實時東方朔從殿東廂朱烏牖中窺母母謂帝曰此窺牖皃嘗三來偷吾此桃昔為太山上仙宫令到方丈擅弄雷電激波揚風風雨失時隂陽錯迕致令蛟鯨陸行海水暴竭黃鳥宿淵于是九潦丈人乃言于太上遂謫人間其後朔一旦乘雲龍飛去不知所在洪曰退之不喜神仙此詩譏弄權挾恩者耳嚴嚴王母宫下維萬仙家方云古岩嚴通詩維石岩岩陸云本一作嚴是也此云下維萬仙家似當以岩岩為義噫欠為飄風噫烏界切欠或作吹方云聚氣為噫張口為欠說文欠張口氣悟也宋孟顗以亢聲大欠被劾舊本作噫歆噫歆警神聲也見鄭氏禮注音於其切者非濯手大雨沱方朔乃豎子驕不加禁訶加一作自偷入雷電室輷轟字衆車也輘曾登切或作輘方云輘宇見王褒簫賦又晉李顒雷賦皷訇輘之逸韻掉狂車王母聞以笑衛官助呀呀不知萬萬人生身埋泥沙簸頓五山踣音匐流漂八維蹉七何切流漂或作飄流維或作紘曰吾兒可憎柰此狡獪音㑹狡獪小皃戯何方朔聞不喜禠身絡蛟蛇瞻桓北斗柄兩手自相挼奴木切兩手相切摩羣仙急乃言百犯庸不科謂科其罪也向觀睥睨處莊子雖羿逢䝉不能睥睨注猶斜視也孫曰即謂瞻桓北斗也事在不可赦欲不布露言外口實諠譁或作欲不布露之言外口實譁言或作宮王母不得已顔嚬口齎嗟齎音咨或作咨嗟或作咨頷頭可其奏送以紫玊珂苦何切祝曰石次玉韓曰梁簡文帝詩桃花紫玉珂方朔不懲創挾恩更矜誇詆欺劉天子正晝溺殿衙溺徒帛切朔本傳醉入殿中誤遺殿上一旦不辭訣攝身凌蒼霞凌或作入為今按此詩亦必有而作譴瘧鬼樊曰後漢禮儀志季冬之月先臈一日大儺謂之逐疫注云漢舊儀顓頊氏有二子生而亡去為疫鬼一居江水是為􅒻鬼此詩首云屑屑水帝魂未云湛湛江水清歸居安汝妃此也屑屑水帝魂謝謝無餘輝如何不肖子尚奮􅒻鬼威乘秋作寒熱翁嫗烏遇切説文姆也所罵譏求食歐音嘔泄間不知臭穢非歐或作嘔泄或作洩方云嚴助傳夏時歐泄霍亂之病相属字正作歐泄醫師加百毒熏灌無停機灸音疚師施艾炷酷若獵火圍詛師毒口牙舌作霹靂飛符師弄刀筆丹墨交橫揮咨汝之胄出門戸何巍巍祖軒而父頊未沬於前徽孫曰謂前人之美沬或作昧或作法方云沬巳也離騷經芬至今猶未沬又選孝標書音徽未沬不脩其操行賤薄似汝稀豈不忝厥祖靦然不知歸靦他典切靣慚湛湛江水清歸居安汝妃清波為裳衣白石為門畿呼吸明月光手掉芙蓉旂降集隨九歌孫曰屈原所作以迎送神飲芳而食菲贈汝以好辭出汝去莫違示兒始我來京師止擕一束書辛勤三十年以有此屋廬此屋豈為華於我自有餘為方作無非是中堂髙且新四時登牢蔬登方作祭云中堂以供時祀而前榮以饌賔親也蔬今按公作袁氏先廟碑有親登邊鉶之語與登牢語意正同不必須作祭字乃為時祀也前榮補註沈氏筆談云退之示兒詩云屋翼謂之榮東西則有之未知前榮安在藝苑雌黄以為不然記云洗當東榮又升自東榮降自西北榮上林賦偓佺之徒暴於南榮則所謂榮者東西南北皆有之矣故李華含元殿賦又有風雨交四榮之説榮為屋擔即屋四垂也又謂之楣又謂之梠屋捛兩頭起者為榮孫曰前榮者揚雄甘泉賦云列宿施于上榮是也饌賔親冠婚之所於所或作依於或作依皆非是庭内無所有髙樹八九株有藤婁絡之婁或作縷方婁音縷莊子有巻婁者注巻婁者猶拘攣也春華夏隂敷東堂坐見山雲風相吹嘘松果連南亭外有𤓰芋區西偏屋不多槐榆翳空虛山鳥旦夕鳴有類澗谷居澗或作磵方云當作􅤝郭璞江賦幽􅤝阻李善曰􅤝與澗同主婦治北堂膳服適戚疎恩封髙平君子孫從朝裾或作車開門問誰來無非卿大夫無非方作非無非是不知官髙卑玊帶懸金魚問客之所為峩冠講唐虞峩或作巍酒食罷無為棊槊音朔與稍同洪曰唐人詩云星宿天圍棋冡子地握槊棊奕也槊愽也齊國朱世隆與元世攜握槊忽聞笑聲一局盡倒以相娛凡此座中人十九持鈞樞又問誰與頻莫與張樊如莫與或作莫若曾本作莫先來過亦無事考評道精麤蹮蹮音先躚躚徒行貌選䠥􅍷躚媚好也學子牆屏日有徒以能問不能其蔽豈可祛丘魚切禳却也嗟我不脩飾事與庸人俱嗟我或作我如卒今按作我如即與下文安能如此及章無迷厥初者相應但作嗟我則語勢差徤而義亦自通葢我不脩飾者非謙詞乃謂向使我不修飾則不能致此爵位居室交遊之盛耳然則我如者乃嗟我之注脚故今雖只从方本而我如二字亦讀者所當知也安能坐如此比肩於朝儒詩以示兒曹其無迷厥初按此篇所誇乃感二鳥符讀書之成效極致而上宰相書所謂行道憂世者則已不伏言矣其本心何如哉庭楸庭楸止五株楸或作樹方云以題語考之當作楸共生十步間各有藤繞之上各相鉤連下葉各垂地樹顛各雲連朝日出其東我常坐西偏或作邊夕日在其西我常坐東邊或作偏當晝日在上我在中央間或作焉方云此詩二連字三間字諸本刋鉤聮作鉤纒中央間作中間焉以求避重韻誤矣仰視何青青上不見纎穿朝暮無日時我且八九旋濯濯晨露香明珠何聯聯夜月來照之蒨蒨音倩草盛貌自生煙我已自頑鈍或作滯方作惰重遭五楸牽客來尚不見肯到權門前權門衆所趨有客動百千九牛亡一毛未在多少閒徃既無可顧不徃自可憐顧方作領或作得皆非是翫月喜張十八員外以王六秘書至王六王建也以或作與方云以與義通已見前今按以字或取能左右之之義前夕雖十五月長未滿規君來晤我時來一作未風露渺無涯浮雲散白石天宇開青池孤質不自憚中天為君施翫翫夜遂久亭亭曙將披况當今夕圎又以嘉客隨嘉一作佳惜無酒食樂但用歌嘲為和李相公攝事南郊覽物興懐呈一二知舊燦燦辰角曙市據切辰房星角東方宿名楚辭云角宿未没曜靈安藏亭亭寒露朝川原共澄映雲日還浮飄上宰嚴祀事清途振華鑣悲驕切馬銜圓丘峻且坦前對南山標村樹黃復緑中田稼何饒顧瞻想巗谷興歎倦塵囂音枵左傳曰湫隘囂塵不可以居倦或作巻惟彼顛瞑者方云瞑从目古眠字徐錯曰今俗别作眠非也莊子曰顛㝠于富貴之地司馬彪曰㝠音眠去公豈不遼去方作云非是為仁朝自治用靜兵以銷勿憚吐捉勤捉或作握方云字本史記今人用吐握本韓詩外傳也可歌風雨調聖賢相連少功德今宣昭和裴僕射相公假山十一韻裴謂裴度也假方作為公乎真愛山㸔山旦連夕猶嫌山在眼不得着脚厯枉語山中人匄我澗側石枉或作徃匄或作與有來應公須歸必載金帛當軒乍駢羅隨勢忽開坼有洞若神剜烏官切説文削也有巖類天劃終朝巖洞間歌鼓燕賔戚孰謂衡霍期近在王侯宅期或作奇方云選謝靈運詩逰當羅浮行息必廬霍期傅氏築已卑磻音盤谿石溪釣何激逍遥功德下不與事相摭樂我盛明朝或作時於焉傲今昔與張十八同效阮步兵一日復一夕夕或作日方云阮嗣宗詠懐詩近百篇其一六韻一首云一日復一夕一朝復一朝顔色改平常精神自損消其一七韻一首云一日復一朝一昏復一晨容色改平常精䰟自飄渝公詩效其體而又繹之曰一日復一日一朝復一朝然其題實自效一日復一夕始也後人以作詩語與題不相應併易作一日字實非也一日復一日一朝復一朝祗見有不如不見有所超食作前日味事作前日調不知久不死憫憫尚誰要於霄切富貴自縶拘貧賤亦煎焦俯仰未得所一世巳解鑣譬如籠中鶴六翮無所揺譬如兎得蹄或作跡何用東西跳還㸔古人書復舉前人瓢前人或作前日未知所究竟且作新詩謡送諸葛覺徃隨州讀書李繁時為隨州刺史鄴侯家多書揷架三萬軸一一懸牙籖音僉韓曰唐經籍志甲乙丙丁四部書各為一庫經書紅牙籖史書緑牙籖子書碧牙籖集書白牙籖以别之新若手未觸為人强記覽過眼不再讀偉哉羣聖文磊落載其腹行年餘五十出守數已六京邑有舊廬不容久食宿䑓閤多官貟無地寄一足我雖官在朝氣勢日局縮屢為丞相言雖懇不見録送行過滻水東望不轉目今子從之㳺學問得所欲入海觀龍魚矯翮遂黃鵠勉為新詩章月寄三四幅南溪始泛三首榜音謗刺也舟南山下或作溪上上上不得返幽事隨去多或作幽尋事隨去孰能量近逺隂沉過連樹藏昻抵橫坂石麤肆磨礪波惡厭牽挽或倚偏岸漁竟就平洲飯㸃㸃暮雨飄梢梢新月偃梢梢或作稍稍方云廣雅區區稍稍小也餘年懔無幾懍或作諒詳下對愴字明是懍字矣休日愴已晚自是病使然非由取髙蹇或作謇云南溪亦清駛疎吏切馬日行千里駛疾也或作駃洪曰作駃誤姑兩存之云而無檝與舟山農驚見之隨我觀不休不惟兒童輩或有杖白頭饋我籠中𤓰籠方作籬勸我此淹留我云以病歸此巳頗自由幸有用餘俸置居在西疇囷倉米榖滿未有旦夕憂上去無得得下來亦悠悠但恐煩里閭時有緩急投願為同社人鷄豚燕春秋足弱不能步自宜收朝蹟音迹祝曰詩念彼不蹟注不循道也羸形可輿致佳觀安可擲輿或作與可方作事非是即此南坂下久聞有水石拕舟入其間柁方作拖注今按漢書拕舟而入水云曳也音它溪流正清激隨波吾未能峻瀬乍可刺七迹切峻瀬方作瀬峻云鷺起若導吾前飛數十尺亭亭栁帶沙團團松冠璧栁帶松冠或作帶栁冠松方從閤本作帶栁松冠云此吉日良辰體也信今按亭亭帶栁沙無義且此兩句用對偶亦何害方閤本故曲為之説如此或本亦無義皆非是歸時還盡夜誰謂非事役别本韓文考異巻七欽定四庫全書别本韓文考異巻八宋王伯大重編聯句方云諸聨句多元和初作城南聯句聨句古無此法自退之始樊曰劉貢父云退之與孟東野聨句宏壯辨博似若出一手王深父云退之容有潤色呂氏童訓徐師川問山谷曰人言東野聨句大非平日所作恐是退之有所潤色山谷云退之安能潤色東野若東野潤色退之却有此理方云蜀木作一百五十韻今本因之然此詩實多三韻不可以為据竹影金瑣碎郊瑣或作鎖非是沈存中云乃日光非竹影洪曰日光在其中若曰日光金鎖碎則不可也泉音玉淙琤音一作聲淙藏宗士江二切琤楚耕切陸士衡詩曰山溜何泠泠飛泉潄鳴玉樊曰荆公詩云風泉隔屋撞哀玉竹月縁階貼碎金語本此瑠璃翦木葉愈翡翠開園英流滑隨仄歩郊搜尋得深行遥岑出寸碧愈逺目増雙明乾穟音遂禾秀乾滯徳也紛挂地郊紛或作絲或作紅化蟲枯挶莖挶居玉切韓曰挶持也孫曰化蟲蟲之變化者如蟬蟻之類枯挶莖者言化蟲巳枯尚挶持於草木之莖也木腐或垂耳愈草珠競駢蒲眠切並也睛浮虛有新斸郊摧扤饒孤撑方云扤動也字不當从木古樂府不見山顛倒摧扤下為薪囚飛黏網動愈盜啅接彈驚啅音卓鳥食也杜詩啾啾黄雀啅接彈言彈丸相接故驚也方云囚飛盜啅潮本作蟲飛雀啅此詩一體六語皆賦物而不言其名舊本並同上脱實自開坼郊牽柔誰繞縈禮䑕拱而立愈陸機云河東有大䑕能人立交前兩脚於頸上跳舞善鳴駭牛躅直六反躑躅也且鳴駭方作騃音俟説文馬行仡仡也詩儦儦俟俟韓詩作駓駓騃騃故西京賦云羣獸駓騃此當从俟音則於躅且鳴義為合也今按方説騃躅二字於牛義無取疑當从蜀本作駭而躅當作觸乃於牛有意又與上字相偶然無所据姑附于此蔬甲喜臨社郊時乃八月田毛田所生者謂之毛宅不毛是也樂寛征露螢不自暖愈凍蝶尚思輕孫曰尚欲飛也宿羽有先曉郊孫曰宿鳥有未曉而飛也食鱗時半横孫曰魚之食者半横水中菱翻紫角利愈翻作繁荷折碧圓傾楚膩食也鱣知連切口在頷下江東曰黄魚鮪亂郊獠羞螺蠏并獠張絞切又盧作切祝曰西南夷别名孫曰羞亦食也言水有鱣鮪螺蠏若獠羞然桑蠖烏郭切桑蟲也見虚指愈言空有迹耳穴貍聞鬬獰逗翳上音豆下於計切逗上也翳陰也孫曰言鳥止於林隂其翅相觸也翅相築郊擺幽尾交榜薄庚切孫曰擊也如蛇之類擺幽出僻其尾相擊也蔓涎孫曰謂蝸牛涎於蔓上角出縮愈樹啄啄木鳥頭敲鏗脩箭竹也褭金餌郊羣鮮沸池􅅅岸殻坼𤣥兆愈孫曰言岸有蟲壳拆開如立兆象野麰漸豐萌窰煙羃䟽島郊窰音由白烟羃覆也周禮羃人窰或作瑶沙篆印迴平孫曰言迴曲之平處洪曰華山有青柯平鐘藥平因地之平處以為名也㾕肌遭蚝七吏切毛蟲有毒刺愈刺七亦切㾕或作瘁方云見鬬雞篇啾耳聞雞生竒慮恣迴轉郊遐睎縱逢迎巔音顛山頂林戢歛也逺睫愈縹敷沼切祝曰青黄色孫曰夷樂也言望巔林觀縹氣戢目以夷情氣夷空情歸跡歸不得郊捨心捨還爭靈麻撮狗蝨愈孫曰胡麻也狀如狗蝨村稚啼禽猩孫曰言小兒之啼如猩猩爾雅猩猩小而好啼紅皺孫曰菓實皺而紅者脱者曰乾棗曬檐瓦郊檐或作簷黄團繫門衡洪曰𤓰蔞也一曰天𤓰衡門上木得雋徂兖切言豪俊左氏得雋曰克蠅虎韓曰崔豹古今注蠅豹即蠅虎徤愈相殘雀豹孫曰雀之鷙者以其勇徤故曰雀豹趟音棖洪曰跳躍貌玉篇䞴趟跟党也束枯樵指禿郊刈熟擔肩赬澁旋隨戀切皮巻臠愈巻求晚切脔力轉切不舒放也苦開腹彭亨孫伯野謂此二語與上二語意属一曰澁旋乃旋果實之澁者苦開乃破𤓰瓠之苦者也方言謂環而鐫之為旋巻脔見莊子彭亨方作膨脝又云古字只作彭亨毛詩傳炰烋猶彭亨是也機舂韓曰果碓也潺湲力郊吹簸飄颻精賽饌祭食木盤簇愈靸妖藤索絣靸恐合切絣北萌切孫曰靸小兒履絣以藤索為之樊曰此句與其下䟠䋲機婺疑為今之靸韆韓曰巳上泛言城南景物之盛靸妖或作妖靸絣或作帡或作耕方作併云今併字不入庚韻故學者疑之履今按靸廣韻云蘇合切小兒履也今猶以為鞋面䟽之名但用之於此句似無意義疑當作扱楚治切收也取也獲也妖謂狐狸之属能為妖媚者也絣當从系獄中以繩索急縛罪人之名也言捕取妖狐而以藤索縛之也荒學五六巻郊古藏四三塋音營墓域四三或作三四里儒拳足拜愈土怪家語季桓子穿井得土缶問孔子孔子曰土之怪者羵羊缶也閃眸瞬目偵候也蹄遁補復破郊絲窠掃還成暮堂蝙蝠沸愈破竈伊威盈伊威或作蛜蝛方云詩釋又曰或旁加蟲後人増也追此訊前主郊荅云皆冢卿上卿也敗壁剥寒月愈孫曰月自敗壁而入如剥破之狀折篁嘯遺笙孫曰風吹聲袿熏霏霏在郊綦跡微微呈袿或作桂綦或作棊皆非是方云袿音圭婦人上服也古樂府衣上香猶在握裡書未滅班偼妤賦俯視兮丹墀思君兮履綦綦履下飾也在或作炷呈或作星皆非是劒石猶竦檻愈獸材尚挐楹寳唾拾未盡郊玉啼墮猶鎗楚耕切唾或作碣啼方作題云蜀都賦玉題相輝題椽上飾也故曰墮猶鎗鎗墮聲本或作琤或云􅀈柱躓也與玉題意相類洪曰此以咳唾喻珠璣以啼泣喻玉筯也唾又作硾啼又作揥當今按上下文意皆婦女事洪説為是若作題即上句作碣然非文意乂躓乃柱礎亦非可拾之物也牕綃孫曰言牕紗中尚疑閟藏佳人也疑閟豔愈䊋燭巳銷檠緑髪韓曰細草孫曰緑苔也抽珉甃郊孫曰珉石之次玉者甃并甃眠甃美言之也言緑苔生於珉甃之上青膚孫曰青皮也韓曰苔蘚聳瑶楨音貞説文木也瑶楨美榦白蛾飛舞地愈幽蠧落書棚薄萌切博雅云閤也説文棧也蠧書蟲棚書架蠧一名蟬韓曰巳上言郊墟宅野之古廢惟惜集嘉詠郊吐芳類鳴嚶窺竒摘海異愈恣韻激天鯨天上鯤鯨激騰躍也腸胃繞萬象郊精神驅五兵蜀雄李杜拔愈李杜下對雷電未詳其説嶽力雷車轟大句斡𤣥造郊𤣥或作元髙言軋霄崢孫曰山之切雲者謂霄崢軋轢也芒端轉寒燠愈神助溢盃觥巨細各乘運愈湍潿湍急流潿濁不流韓曰巳上言昔人吟咏之工潿或作湋亦騰聲凌花咀粉蘂郊削縷穿珠櫻綺語洗晴雪愈嬌辭哢雛鸎酣歡雜弁珥郊珥音餌耳飾歡方作勸雜或作新方从閤本云昔涥于髠所謂前有墮珥後有遺簮當今按方意勸為勸酒之意然此皆形容詩語之工不作勸而作歡字則對價字為尤切繁價流金瓊􅔽蓞寫江調郊江或作紅方云選劉體𤣥詩悲發江南調謝靈運詩采菱調易急江南歌不緩李善皆引古江南詞江南可採蓮以舞之東野本集亦喜用江調字萎蕤綴藍瑛音英玉光方云萎蕤青花圓實亦名玉竹藍瑛藍田之玉也庖霜繪𤣥鯽愈浙玉炊香粳音更方云浙字從折之舌切魏文帝朝王朗曰不能效君昔在㑹稽所杭米古浙作折其從折者星厯切孟子所謂接浙而行是也本多作浙朝饌巳百態郊春醪又千名哀匏蹙駛景愈蹙駛或作缺蹙或作蹙缺洌清也唱凝餘晶日光疑猶遏也解魄不自主郊痺卑利切肌坐空瞠或作膛子今按莊瞠若乎其後膛丑庚切直見也言坐乆而無所見也扳援上音攀下音袁挽引也賤蹊絶愈孫曰謂賤者不可扳援而至也炫曜仙選更藂巧競採笑郊藂或作叢方云唐人多書叢作藂楚詞及舊本韓栁集皆然今本尚見一二姑存之駢鮮互探嬰桑變言桑樹變化却生蕪蔓忽蕪蔓愈樟音章裁斵也浪登丁登丁斵木之聲霞鬬謂雲霞相合也詎能極郊風期誰復賡誰復或作復誰臯神臯區扶帝壤愈瓌藴郁天京祥色被文彦郊良才插杉檉河栁隠伏饒氣象愈興潜示堆坑擘華西京賦注華山首陽本一山河神巨靈以手擘開其上以足蹈離其下中分為兩河因通流神物巨靈也露神物郊擁終儲地禎終終南山儲蓄也訏謨壯締結也始愈輔弼登階清泰階坌秀恣填塞郊呀靈畜渟達丁切水止也澄益大聨漢魏愈聨或作連肇初邁周嬴積照㴠徳鏡郊傳經儷音麗偶也金籝音盈笭也韋賢曰遺子黄金滿籝不如教子一經食音寺家行鼎鼐愈寵族飫弓旌奕制盡從賜郊盡或作書此句未詳殊私得逾程過法度也飛橋上架漢愈漢天河繚岸俯規瀛海也規或作窺方規度也東方朔傳規以為苑瀟碧逺輸委郊湖嵌口銜切費攜擎湖本作胡方云瀟碧竹也胡嵌石也萄苜上音陶下音目張騫使外國得蒲萄苜蓿從大漠愈苜或作首漠或作漢非是楓櫧音諸選云沙棠櫟櫧華楓枰櫨櫧或作儲至南荆嘉植鮮危朽郊膏理易滋榮理或作􅀈方云此以嘉植言也周禮其植物宜膏物鄭注云謂楊栁之属理致白如膏懸長巧紐翠愈紐或作細紐結也象曲善攅珩攅聚珩玉也善或作葢魚口星浮沒郊馬毛錦斑騂五方亂風土愈百種分鉏耕葩蘖相妬出郊蘖方作孽非是菲茸共舒情類招臻倜詭愈倜他歴切類物臻極也相如封禪書云竒物譎詭倜儻窮變翼萃伏衿纓翼禽属危望跨飛動郊㝠升躡登閎方云字見楊雄校獵賦蜀本登作竹育切宏屋嚮也春游轢靃靡愈靃音隨孫曰草木敷華皃轢踐也祝曰草木弱皃楚詞萍草靃靡彩伴䬃嫈嫇上音縈下音萌祝曰廣韻嫈嫇新婦貌遺燦飄的皪郊選珠翠的皪白狀淑顔洞精誠嬌應如在寤愈頽意若含酲鵷毳孫曰鴛鴦之羽以飾其衣帶詩毳衣如菼翔衣帶郊鵝肪截佩璜肪音方脂也孫曰玉書云白如截脂黑如純漆赤如雞冠黄如蒸栗璜半壁也文昇相照灼愈武勝屠攙音讒搶楚庚切祝曰彗星為攙搶注言謂之孛言其形孛孛似掃彗孫曰攙搶以喻㓂亂割錦不酬價郊構雲結屋於髙處有髙營通波牣鱗介愈牣方作仞云相如賦充仞其中古字作仞作牣非也今按詩及孟子皆作牣方説非是䟽畹䟽寛也富蕭蘅音行杜蘅香草大者曰杜若買養馴孔翠郊逺苞樹蕉栟音并栟櫚選栟櫚枸榔鴻頭排刺芡愈芡音儉補注方言曰南楚謂之雞頭北燕謂之䓈青徐淮泗之間謂之芡又云雞頭或謂之鴈頭鵠卵也攅聚也韓曰巳上言土地人物富華之盛瓌橙香橙也諸本作方云卵也納涼聯句盤有饋禽今本亦誤鶩廣雜良牧郊䝉休賴先盟罷旄奉瓌衛愈守封踐忠貞戰服脱明介郊朝冠飄彩紘爵勲逮僮𨽻愈簮笏自懐捐也繃北萌切小兒繃也以繒帛為之亦謂之襁乳下秀嶷嶷郊椒蕃言子孫多如椒蕃泣喤喤音横小兒啼聲詩其泣喤喤貌鑑其貌有光可以鑒也清溢匣愈眸光寒發硎館儒養經史郊綴戚觴孫甥考鐘饋肴核愈戞鼓侑牢牲飛膳自北下郊函珍極東烹如𤓰煮大卵愈比線茹芳菁海嶽錯口腹郊趙燕錫媌娙媌音茅娙五莖切美婦人也選燕趙多佳人媌或作媖一笑釋仇恨愈百金交弟兄貨至貊戎市郊呼傳鸜鵒令令鸚鵒傳呼也鸚或作鸚方云戎貊鸚鵡鸚鵒四物也或本非是順居無鬼瞰愈瞰音闞視也楊雄曰髙明之家鬼瞰其室抑横免官評官謗也韓曰已上言門地簮纓之家殺候肆凌翦郊籠原市罝紭音𢎞網綱羽空鳥被箭羽毛滿空顛雉鷃愈血路迸狐麖音京獸名一角牛尾其狀似麋折足去踸踔郊踸勅甚切踔直角切孫曰行不正貌莊子夔謂蚿曰吾以一足踸踔而行注踸踔自跳躑也蹙鬐怒䰃音彭鬤乃庚切䰃鬤言魚中鉤其怒如此鬤張兒躍犬疾翥飛舉貌鳥愈呀鷹甚飢䖟音盲筭蹄上林賦射麋角麟顔師古云持引其脚計其所獲也所謂筭蹄如此記功賞郊裂腦擒摚掁上音膛下音棖摚距也掁􅨄也諸本腦作􅠱擒作相摚作盪又作湯方从蜀本云􅠱腦字之誤或作掁􅨄也盪掁湯􅨄之義監本作摚掁摚距也義亦通而擒作相則非盪今按􅠱别本作脇疑傳冩之誤當作摚猛斃孫曰謂猛獸斃牛馬樂愈妖殘孫曰謂妖鳥殘滅梟􅀈惸􅀈或作鴿方云􅀈音格今鵂鶹也今按􅀈音柯額切爾雅􅀈鵋􅀈今鵂鶹也其音各者鳥水鳥也窟窮尚嗔視郊箭出方驚抨普耕切彈也連箱載已實愈礙轍棄仍嬴喘覷鋒刃㸃郊困衝株枿盲掃淨豁矌矌愈騁遥畧苹苹音平韓曰草聚生也選馳苹苹饞鉏咸切饕也楚牙切飽活臠郊惡嚼􅀈音博噍貌腥鯖音征廣韻煮魚煎食曰五候鯖韓曰已上言射獵之盛嵗律及郊至愈古音命韶韺音英帝嚳樂曰六英旗斾流日月郊孫曰畫日月於旗上流行也帳廬以帷為廬扶棟甍莫耕切屋棟磊落大皃奠鴻璧愈大璧周禮以蒼璧禮天是也參差席香藑音瓊爾雅葍藑茅楚詞索藑茅以莛蓴注靈草也孫曰香茅也席鋪也𤣥祇祉兆姓郊黑秬饛音䝉豐盛食滿貌豐盛慶流蠲瘥癘愈威暢捐䡴輣上尺容切下音彭韓曰後漢䡴輣撞城注䡴撞車也輣樓車也靈燔燔柴也望髙冏郊尸鼎切虛空也龍駕聞敲䬝音横車相擊聲或作䬖説已見上是惟禮之盛愈永用表其宏徳孕厚生植郊恩熙完刖剠與黥同已上言行郊祀之禮宅土盡華族愈運田閒强甿䕃庾森嶺檜郊啄場􅞪祥䳟音明孫曰䳟鳥名楊子鷦䳟遴集食其潔矣祝曰鷦䳟似鳳南方神鳥楚辭鷦䳟開路兮注智鳥也方云鷦䳟鳳也諸本多訛作鵬非畦肥翦韭薤愈陶固收盆甖利養積餘健郊孝思事嚴枋補彭切祭求神掘雲破嵽嵲愈雲或作靈採月漉坳泓寺砌砌石也上明鏡郊石明如鏡僧盂敲曉鉦音征鐃也似鈴而無舌泥象對騁怪愈鐵鐘孤舂鍠音横鐘聲舂撞也後漢鍠鍠鎗鎗注鐘鼓聲癭頸閙鳩鴿郊蛇于丸切垣亂蛷音求多足虫垣或作􅀈方云求蜿蜒於墻屋之間作􅀈非蠑音榮􅔼蝪葚桑葚黑老蠶蠋愈蠋音燭桑虫也麥黄韻鸝鶊上音离下音庚鸝鶊二鳥名鸝黄鸝庚倉庚韓曰巳上言民居寺宇之美韶曙韶妍也曙曉也曙或作署遟勝賞郊賢朋戒先庚朋方作明馳門填偪與逼側同仄愈競墅輾語箭切砯砰上披冰切下普耕切選砯岩皷作砰聲如雷列子砰然若聞雷霆之聲碎纈紅滿杏郊碎纈或作醉結方从閤本云曾本亦作碎唐小説裴晉公午橋有文杏百株立碎錦坊少陵詩内蘂繁於纈杜牧之詩花䲧團宫纈或云當作醉纈李長吉詩醉纈抛紅網稠凝碧浮􅄳徐盈切飴也䠞子六切蹋也繩覲娥婺愈上或作蹴覲或作觀娥婺美女也鬬草擷胡結切監本拮將取也潮本作擷拮或作祮璣珵音呈楚辭豈珵美之能當注美玉也粉汗澤廣額郊金星寳黶也墮連瓔瓔珞婦人頂飾鼻偷困淑郁愈郁香氣眼剽强盯􅟑上音掁下音萌玉篇視貌是節是時也飽顔色郊兹疆稱都城書饒書富也罄魚繭愈國史補云紙之好者有魚子紙晉王羲之用蚕繭紙紀盛播琴箏孫曰謂播之樂府韓曰巳上言里人遊觀之樂奚必事逺覿郊無端逐羇傖助庚切祝曰晉史吳人謂中州人曰傖羇傖謂謫陽山江陵時也將身親魍魅愈浮跡侣鷗鶄音精鶄腥味空奠屈郊天年徒羡彭天或作天驚魂見蛇蚓愈觸嗅值蝦蟛上音遐下音彭似蠏而小曰彭蜞幸得履中氣郊中和之氣沗從拂天棖孫曰天門也棖門兩旁木言自遷謫得歸朝廷也禮記上介拂棖歸私暫休暇愈驅明出庠􅓺明或作昵方云樊本作驅抳抳止輪木也時景元校作驅朋今按驅馳遟明而出太學也葢作此時公方為博士鮮意鮮新也竦輕暢郊連輝猶言連璧也照瓊瑩陶暄逐風乙愈乙鳥轄切説文𤣥鳥也齊魯之間謂之乙躍視舞晴蜻音精蜻蜓也風乙或作乙乙晴蜻或作蜻蜻皆非是足勝竒也言勝遊處自多詣郊心貪敵無勍渠京切强敵也始知樂名教愈何用苦拘儜尼耕切固也晉史不簡蚩儜拘儜拘束也又困弱貌畢景盡日也任詩趣郊焉能守䃘䃘愈䃘䃘與論語硜硜義同小謹之貌方云字書無䃘字按塩鐵論器多堅䃘又皇甫謚釋勸篇龍潜九淵䃘然執髙何令升晉書音義䃘口萌切不知字書何以逸之也㑹合聨句樊曰公召為國子博士與張籍張徹孟郊㑹京師而有此詩故郊有京遊歩方振謫夢意猶恟等語徹有馬辭虎豹怒舟出蛟鼉恐之句皆敘公南還意而公則云念難須勤追悔易勿輕踵其義一也韓曰黄魯直嘗云退之㑹合聨句四君子皆佳士意氣相入雜之成文世之文章之士少聨句葢筆力不能相追或成四公子棊耳離别言無期㑹合意彌重籍病添兒女戀老喪丈夫勇愈劒心猛氣也知未死或作謝詩思猶孤聳郊愁去劇箭飛讙來若泉涌徹析言析開析也貫事也多新貫析或作折攄抱無昔壅籍念難須勤追悔易勿輕踵愈吟巴山犖嶨或作嵤方云嶨音學山多大石也説楚波堆壟郊馬辭虎豹怒舟出蛟鼉恐徹狂鯨時孤軒起也幽狖音柚獸狀如猿雜百種愈瘴衣常腥膩蠻器多踈宂籍踈宂不堪也剥苔洪曰湘中斑竹方生斑每㸃上有青苔錢封之孫曰博物志云洞庭之山帝之二女居之涕下揮竹竹盡斑苕溪漁隠曰斑竹惟青湘間有未嘗有苔蕂梧間别有一種斑竹間有苔蘚封之弔班林角飯餌沉塚愈忽爾銜逺命歸歟舞新寵郊爾或作示非是歟或作還鬼窟脱幽妖天居覿清栱愈栱或作拱京遊歩方振謫夢意猶恟籍恟許拱切懼也詩書誇舊知酒食接新奉愈嘉言寫清越瘉病失肬與尤同結病也腫郊腫大也夏隂偶髙庇宵魄接虛擁愈魄方作魂本今按宵魄謂月方非是雪絃謂琴有陽春白雪之歌寂寂聽茗盌與椀同纎纎捧郊纎捧謂美婦之手馳輝燭浮螢幽響泄潜蛬愈蛬音拱爾雅曰蟋蟀蛬今促織也詩老獨何心江疾有餘尰郊尰音腫足腫我家本瀍榖瀍水名出河南穀城山有地介臯鞏皆河南地名史記韓獻成臯鞏休跡憶沈㝠楊子蜀莊沈㝠猶言隠淪也峨冠慙闒音榻或作闒或作溻􅀈愈􅀈音冗祝曰不肖也劣也司馬遷云在闒茸之中楚辭雜班駮與闒茸皆以茸為􅀈諸本此四句下無愈字方从唐蜀本增洪云退之家在洛陽嘗謫陽山今為博士則唐本為是􅀈一作􅀈升朝髙轡逸振物羣聽悚方云别本悚作竦嵇康琴賦竦衆聽而駭神徒言濯幽泌音祕詩泌之洋洋注泉水也誰與薙音替又音雉除草也荒茸籍茸音冗草生荒或作芒方云此漢敘傳所謂夷險芟荒是也芒字非朝紳鬱青緑馬飾曜珪珙音拱璧也孫曰謂銜轡之属珪珙以為飾也國讐未銷鑠我志蕩卭隴郊時劉闢亂蜀王師出征故云蕩卭隴也二山名君才誠倜儻時論方洶許拱切洶或作汹音凶溶音勇洶溶水貌格言多彪蔚懸解無梏拲上古沃切下音拱周禮上罪枯拲而桎張生得淵泉寒色拔山冡堅如撞羣金羣鍾也眇若抽獨蛹愈蛹音勇祝曰蚕化為之孫曰言微而不絶伊余何所擬跛鼈詎能踊塊然墮岳石飄爾罥巢氄郊罥音畎氄音冗罥網也氄鳥獸細毛也書鳥獸氄毛孫曰此聨甚言其危龍斾垂天衛雲韶凝禁甬孫曰甬道天子之居君胡眠安然朝鼓聲洶洶愈胡或作乎非是鬬雞聨句韓曰公與東野聨句詞意雄渾極其情態間以人才為喻兩皆傑作真歐陽文忠所謂韓孟於文詞兩雄力相當者也樊曰至若爭觀雲填道助呌波翻海則公詩之豪而一噴一醒然再接再礪乃則東野工處大雞昂然來小雞竦敬也而待愈崢嶸顛盛氣顛音田孫曰玉藻曰盛氣顛實揚休注云顛讀為闐揚讀為陽盛身中之氣使之闐滿如陽氣之休物也方云顛讀為闐見禮記洗刷凝鮮彩郊髙行若矜豪側睨如伺殆愈精光目相射劒㦸心獨在郊既取冠為胄復以距為鐓音隊孫曰鐓鍪柄下蹲禮記進矛㦸者前其鐓是也或作鎩漢書鉤㦸長鎩今按鎩廣韻所拜切於四聲不協然鐓乃刃下之平底者與距不相似亦未詳其説也天時得清寒地利挾爽塏愈塏音凱髙地磔毛各噤巨禁切口閉也㾕或作㾕或作瘴或作痒方从杭本云㾕所錦切寒病也義訓寒謂之㾕􅂒皮日休詩枕下聞澎湃肌上生㾕􅂒韓渥詩禁㾕餘寒酒半醒怒癭爭碨烏罪切碨磊不平也選磔磈磊而相摩磊俄膺忽爾低植立瞥疋蔑切而改郊腷膊上音愎下音粕古詩腷腷膊膊雞初鳴戰聲喧繽翻落羽皠七罪切白也中休事未決小挫勢益倍愈妬腸務生敵腸方作腹敵或作欺賊性專相醢裂血失鳴聲啄殷烏闌切赤黒色甚飢餒郊對起何急驚隨旋誠巧紿音怠欺也毒手飽李陽樊曰晉石勒與李陽隣居嵗常爭麻池相歐擊勒既即偽位召陽酣謔引陽臂笑曰孤昔日厭卿老拳卿亦飽孤毒手杜子美義鶻行所謂巨顙折老拳亦此事也神槌困朱亥愈史記魏朱亥為侯嬴薦於魏公子公子矯魏主令代晉鄙鄙合符疑之亥袖四十斤鐵椎椎殺晉鄙槌或作椎或作鎚方云謝本云貞元本毒手作尊拳尊拳劉伶語也邵公濟云善本神槌作袖搥於史記本文為合然晉祖納曰假有神錐必有神槌神槌尊拳豈皆借用字耶今按毒手是李陽本事中語而神槌字則朱亥事中無之故邵欲改神作袖以從本事然又属對不親切故方又欲從謝本借劉伶之尊拳以附李陽借祖納之神槌以附朱亥則兩句皆為兼用兩事而不偏枯耳然亦未敢遽改也今以其説未明復為詳説如此以俟考焉惻心我以仁碎首爾何罪獨勝事有然旁驚汗流浼郊知雄歡動顔怯負愁看賄爭觀雲填道助呌波翻海愈事爪深難解事或作爭方从唐本云館本作事李校同樊本作剚皆側吏切漢蒯通傳事刃公之腹中考功記葘蚤不齵則輪雖敝不匡鄭讀蚤為𤓰謂輻入牙中者葘聲如胾泰山平原人謂樹立物為葘公葢全用此二字也管子倳戰十萬又春有以剚耜事剚葘倳古音義同閤杭蜀本皆作爭其訛久矣嗔睛時未怠一噴一醒然樊曰雞用水噴神氣始醒再接再礪乃郊或作再礪乃鍜乃礪又或作勵皆非是樊曰接猶接戰也爭觀雲填道助呌波翻海則公詩之豪一噴一醒然再接再礪乃則東野工處頭垂碎丹砂翼搨拖錦綵搨或作榻方云字當從手選陳琳檄垂頭榻翼莫所憑恃五臣注搨歛也士獵切此當一以摧搨為義音他獵切軒軒猶軒昂也豁尚賈音古齊髙固之晉師桀石投人以徇衆曰欲勇者賈予餘勇賈買也餘清厲鳴聲也比歸凱愈選俊感收毛受恩慚始隗下五罪切毛遂郭隗也英心甘鬬死義肉耻庖宰君看鬬雞篇短韻有可採郊有或作亦或作言皆非是納涼聨句韓曰此篇敘久謫新召還為學官本末甚詳遞嘯取遥風微微近秋朔郊金柔氣尚低火老候愈濁愈熙熙炎光流竦竦髙雲擢愈閃紅孫曰電光也電光之閃有若蚴虬驚蚴於紏切又音憂龍類楚詞蒼龍蚴虬於左右虬或作蚪凝赤孫曰凝聚也赤氣之聚如山岳也聳山嶽目林恐焚燒耳井憶瀺灂上上咸切下才弱切瀺灂水聲前漢瀺灂霄墜仰懼失交泰非時結冰雹化鄧韓曰列子夸父逐日影於嵎谷之際渴欲得飲赴飲河渭河渭不足將北走飲大澤未至道渴而死棄其杖尸膏肉所浸化為鄧林渴且多奔河誠巳慤暍音暍祝曰字林暍傷暑也莊子暍者反求乎冷風道者誰子叩商叩擊也韓曰列子師商彈瑟當春而叩商絃以召南吕涼風忽至草木成實者何樂洗矣得滂沱洗或作洒方云古洗與洒通史記觀范雎之見者羣臣莫不洒然變色易容徐廣洗先典切洗矣猶洗然也感然鳴鸑鷟下土角切孫曰鸑鷟鳳属感言得滂沱則瑞應至嘉願茍未從嘉或作佳或作喜方云公後詩有嘉願還中州佳喜皆字訛也前心空緬邈清砌千迴坐冷瓌再三握煩懐却星星或作醒醒方云劉夢得詩自羞不是髙陽仙一夜星星騎馬回唐人星醒通用髙意還卓卓郊龍沈劇煮鱗劇方作極牛喘甚焚角蟬煩鳴轉喝於邁切祝曰聲嘶前漢正見秋蟬喝栁詩長楊流喝盡烏噪飢不啄晝蠅食案繁宵蚋肌血渥單絺厭巳褫長䈉音霎扇也孫曰方言扇自闗而東謂之䈉祝曰選屏輕箑字一作䈉或作箑倦還捉幸兹得佳朋於此䕃華桷青熒文簟施青或作清淡澉音敢韓曰選淡澉手足注淡澉猶洗滌也甘𤓰濯大壁孫曰華屋中壁也曠凝淨古畫壁上古畫竒駮犖上北角切下吕角切牛色雜又竒怪貌璧或作璧畫或作菁凄如羾寒門羾方云杭本作淜蜀本作珝淜今馮字徒渉也史記武紀所謂寒門者谷口也顔曰今治谷去甘泉八十里盛夏凛然此納涼詩也淜字自當又甘泉賦登桑欒而羾天門羾音貢至也諸校本多用此定栁文扣亦作珝又淮南子北方北極之山曰寒門故離騷連絶垠乎寒門若以珝言則寒門當用此義然前義為優今按方後説是葢谷口既非絶境未為極寒之地又不言有水則徒渉字亦無理當改作羾皓若攅玉璞掃寛延鮮飈汲冷漬香穱音捉稻田種麥又麥飯篚實摘林珍盤肴饋禽㲉㲉或作殻説巳見上空堂喜淹留貧饌羞齷齪愈齷齪菲薄也殷勤相勸勉左右加礱斵上音籠孫曰壁也即下言賈勇事加或作皆賈勇發霜硎爭前躍冰槊孫曰莊子庖丁解牛十九年而刀若新發於硎風俗通云矛長丈八者謂之槊皆以禦熱微然草根響先被詩情覺感衰悲舊改工異逞新貌誰言擯朋老孫曰謂擯棄于朋友而又加之以老也猶自將心學危簷不敢憑朽机懼傾撲音雹倒也机一作瓦青雲路難近黄鶴足仍鋜土角切玉篇云鎖足未能飲淵泉立滯呌芳葯郊葯音渥楚辭辛夷楣兮葯房木草楚人謂白芷曰葯與子昔睽離嗟余苦屯剥直道敗邪徑拙謀傷巧諑音卓韓曰楚詞謡諑謂余以善淫注諑猶讃也炎胡度氛氲熱石行犖硞音確犖硞石聲又多石貌痟飢夏尤甚瘧渴秋更數君顔不可覿君手無由搦女角切持也今來沐新恩庻見返鴻朴儒庠恣游息聖籍飽商㩁音確商畧也左思曰商㩁萬俗危行無低徊正言免咿喔上音伊下音渥楚詞屈原卜居曰將咿喔嚅唲以事婦人乎注强笑噱也車馬獲同驅酒醪欣共欶音朔説文吮也惟憂棄菅蒯上音姦下苦怪切左傳曰雖有絲麻無棄菅蒯敢望侍帷幄此志且何如希君為追都回切治玉琢愈秋雨聯句樊曰按詩云儒宫烟火濕此公為學官在京師時又云因思征蜀士葢憲宗元和初也萬木聲號呼百川氣交㑹郊庭翻樹離合離或作雜牖變景明藹愈潨聀戒切説文小水入大水㵼殊未終飛浮亦云泰郊牽懐到空山屬近也聴邇驚瀨愈簷垂白練直練或作龍渠漲清湘大郊甘津澤祥禾伏潤肥荒艾愈禾方作木非是伏或作服主人吟有歡客子歌無奈郊侵陽日沈𤣥剥節風搜兑愈坱圠上鳥朗切下音軋賈誼曰大均播物坱圠無垠應劭曰其氣坱圠非有限齊也張衡曰地勢坱圠注坱圠猶髙下也遊峽喧颼飀上音蒐下音留祝曰髙風也隋盧思道納涼賦動颼飀於翠帳臥江汰郊汰音太濤也微飄來枕前髙灑自天外愈蛬音拱蟋蟀也宂何迫迮或作窄方云義訓迫迮急也字見鴇羽詩箋蟬枝掃鳴噦郊援菊茂新芳援或作園逕蘭銷晚馤愈馤音藹香也地鏡時昏曉池星競漂沛郊讙呶尼交切尋一聲灌注咽羣籟愈儒宫煙火濕市舍煎熬忲郊忲音太奢也臥冷空避門衣寒屢循帶愈循或作脩方云李陵傳數數自循其力瓌又自循其髪顔注謂摩頂也梁范靜妻詩循帶易緩愁難却心之憂矣巨銷鑠水怒巳倒流隂繁恐凝害郊憂魚思舟檝魚或作虞非是感禹勤畎澮愈懐襄信可畏䟽決須有賴郊可畏方作不思非是䟽決謂禹決江䟽方作踈葢俗體也筮命或馮蓍卜晴將問蔡愈蔡大龜也晴或作情庭商家語曰齊有一足鳥名商羊童謡曰天將大雨商羊鼓舞今齊有之忽驚舞墉禜音榮孫曰墉城墉也禜祭名左氏曰日月星辰之神則雪霜風雨之不時於是乎禜之亦親酹郊氛醨孫曰氛醨謂雲氣稍薄也稍踈映氛或作氣雺亂上音謀下音茂爾雅天氣下地不應曰雺注言䝉昧也還擁薈詩薈兮蔚兮注雲興貌謂雲霧擁塞也隂旌孫曰亦謂雲氣如旌旗之狀時摎音劉顔師古云摎流猶周流也流帝鼓孫曰天帝之鼓謂雷霆也鎮訇磕上呼宏切下苦葢切大聲也選訇磕㗦嘈棗圃落青璣孫曰棗未熟而落如青璣也璣珠之不圓者𤓰畦爛文貝貧薪不燭竈富粟空填廥愈廥音澮芻藁藏秦俗動言利魯儒欲同丐深路倒羸驂弱途擁行􅋴音犬車轄毛羽皆遭凍離蓰不能翽羽飛聲方云離今本從竹非古樂府竹竿何嫋嫋魚尾何離蓰翻浪洗虚空傾濤敗藏葢郊吾人猶在陳僮僕誠自鄶音澮國名也孫曰左傳自鄶以下無譏焉注以其微也洪曰言吾人猶絶糧僮僕母足言者因思征蜀士未免濕戎斾安得發商飈廓然吹宿靄白日懸大野幽泥化輕􅙟音藹後漢軼埃􅙟之混濁戰場暫一乾賊肉行可膾愈捜心思有效抽策期稱最豈惟慮收穫亦以救顛沛郊禽情初嘯儔礎音楚負楹石色微收霈庶幾諧我願遂止無巳太愈征蜀聨句事見聖徳詩題注日王忿違慠與傲同日或作曰方云唐本閤本皆作日此語左傳漢史屢見入詩則自庾信始日余監推轂民願始天從是也有命事誅㧞蜀險豁闗防秦師縱横猾愈風旗帀地揚雷鼓轟天殺言鼓聲如雷轟天震動也竹兵彼皴音逡説文細皮起蜀以竹為弓矢脆鐵刃我鎗䶪郊䶪初八切齒利也刃或作刀方作力刑神咤㹈音釐㹈牛尾可為旄旄隂燄颭職琰切風吹也札甲也洪曰説者謂此聯盡雕刻之工而語仍壯刑神隂燄主我師而言犀札卑也夫差水犀之甲三千翻霓孫曰言旌旗動如虹霓也紛偃蹇塞野孫曰言兵衆塞野勢欲傾側也澒坱圠愈澒或作傾生獰競掣跌孫曰言生而惡者競相牽掣跌墮也癡突孫曰謂癡弱而突出者爭相填軋也爭填軋渴鬬信豗音灰相擊呶音譊噉奸何噢嗗郊噢音郁嗗烏八切奸賊黨噢嗗噉􅀢聲又飲聲更呼相簸蕩交斫雙缺􅀢五轄切器缺也亦曰齒缺火發激鋩音亡刃端腥血漂騰足滑愈漂或作飄飛猱奴刀切孫曰猱以喻軍士之壯無整陣言賊不得自整其陣無整陣翩鶻户骨切孫曰鶻鷙鳥邪戞邪擊也鶻亦以喻軍士有邪戞江倒沸鯨鯤山揺潰􅓔敕俱切獸似貍猰郊猰音軋孫曰猰㺄類江倒山揺喻蜀兵之敗中離分二三外變迷七八孫曰言蜀師敗或分為二三或㪚為七八逆頸盡徽索仇頭恣髠鬝格八切秃也怒鬚猶鬇鬡上士耕切下女耕切髪亂也斷臂仍􅤿􅧜愈􅤿方作敤云若果切擊也又云字書無敤字今按諸公所校本􅤿皆音蒲八切􅧜格八切與鬇鬡皆叠韻石潛設竒伏宂覷孫曰謂蜀兵雖敗尚有潜于石覷于宂者騪精察精或作幽中矢類妖㺑音杉妖㺑狂犬也跳鋒狀驚豽似狸蒼黑無前足能捕䑕與同方云豽蜀本音女滑切字當从豸㺅属今本多從犭从簡也蹋翻聚林嶺斗起成埃圿郊圿音戞垢圿也斾亡多空杠音江旗竿旗斾亡失尚有空杠也軸折鮮聯轄剟音掇削擊也膚浹瘡痍敗面碎剠㓤茶八切剥㓤也渾奔肆狂勷方云狂當作􅀈音匡本亦或作劻劻勷遽也故􅀈躟為行遽鬤為髪亂
