body:
  text: 故金紫光禄大夫檢校尚書左僕射同中書門下平章事兼汴州刺史充宣武軍節度副大使知節度事管内支度營田汴宋亳潁等州觀察處置等使上柱國隴西郡開國公贈太傅董公行狀題中或無支度二字曽祖仁琬皇任梁州博士祖大禮皇贈右散騎常侍父伯良皇贈尚書左僕射公諱晉字混成河中虞鄉萬歳里人少以明經上第宣皇帝居原州公在原州宰相以公善為文任翰林之選聞選下或有既以字召見拜秘書省校書郎入翰林為學士三年出入左右天子以為謹愿賜緋魚袋累升為衛尉寺丞出翰林以疾辭拜汾州司馬崔圓為揚州詔以公為圓節度判官攝殿中侍御史以軍事如京師朝天子識之拜殿中侍御史内供奉由殿中為侍御史入尚書省為主客員外郎由主客為祠部郎中先皇帝時兵部侍郎李涵如回紇下没切古匈奴也亦作鶻立可敦詔公兼侍御史賜紫金魚袋為涵判官回紇之人來曰唐之復土壃取回紇力焉約我為市馬既入而歸我賄不足我於使人乎取之市字絶句方以馬字屬上句而復出馬字連下文為句非是涵懼不敢對視公公與之言曰我之復土壃爾信有力焉吾非無馬而與爾為市為賜不既多乎公與或作公為與上方無而字爾之馬嵗至吾數所矩切皮而歸貲邊吏請致詰也至上方無五字而無吾字皆非是天子念爾有勞故下詔禁侵犯方無故字諸戎畏我大國之爾與也莫敢校焉爾之父子寧而畜馬蕃者非我誰使之於是其衆皆環公拜是下或無其字既又相率南面序拜皆兩舉手曰不敢復有意大國兩舉或作舉兩方云此用莊子盜跖大怒兩展其足也方無復字自回紇歸拜司勲郎中未嘗言回紇之事遷祕書少監歴太府太常二寺亞卿為左金吾衛將軍今上即位以大行皇帝山陵出財賦拜太府卿由太府為左散騎常侍兼御史中丞知臺事三司使選擢才俊有威風始公為金吾未盡一月拜太府未盡方作始盡九日又為中丞朝夕入議事於是宰相請以公為華州刺史拜華州刺史潼關防禦鎮國軍使朱泚之亂加御史大夫詔至于上所又拜國子祭酒兼御史大夫宣慰恒州於是朱滔自范陽以回紇之師助亂人大恐人下或有心字或有心字無大字公既至恒州恒州即日奉詔出兵與滔戰大破走之還至河中李懐光反上如梁州懐光所率皆朔方兵公知其謀與朱泚合也患之造懐光言曰公之功天下無與敵公之過未有聞于人某至上所言公之情上寛明將無不赦宥焉乃能為朱泚臣乎與敵上或有以字彼為臣而背其君茍得志于公何有且公既為太尉矣彼雖寵公何有加此彼不能事君能以臣事公乎公能事彼而有不能事君乎彼知天下之怒朝夕戮死者也故求其同罪而與之比公何所利焉或無故字公之敵彼有餘力不如明告之絶而起兵襲取之清宫而迎天子庶人服而請罪有司罪下或有於字雖有大過猶將揜焉如公則誰敢議語已懐光拜曰天賜公活懐光之命喜且泣公亦泣則又語其將卒如語懐光者將卒呼曰天賜公活吾三軍之命拜且泣公亦泣故懐光卒不與朱泚當是時懐光幾不反公氣仁語若不能出口及當事乃更疎亮捷給其詞忠其容貌温然故有言于人無不信下或有之字明年上復京師拜左金吾衛大將軍由大金吾為尚書左丞又為太常卿由太常拜門下侍郎平章事在宰相位凡五年所奏于上前者皆二帝三王之道由秦漢以降未嘗言以或作已退歸未嘗言所言於上者於人子弟有私問者公曰宰相所職繫天下句天下安危宰相之能與否可見欲知宰相之能與否如此視之其可凡所謀議於上前者不足道也故其事卒不聞或無復出天下二字以疾病辭於上前者不記退以表辭者八方許之記或作已拜禮部尚書制曰事上盡大臣之節又曰一心奉公於是天下知公之有言於上也初公為宰相時五月朔㑹朝天子在位公卿百執事在廷侍中贊百僚賀中書侍郎平章事竇參攝中書令當傳詔疾作不能事疾上或有辭字非是凡將大朝㑹當事者既受命皆先日習儀于時未有詔公卿相顧公逡巡進北面言曰攝中書令臣某病不能事臣請代某事於是南面宣致詔詞事已復位進退甚詳為禮部四年拜兵部尚書入謝上語問日晏謝下方有遷字問日晏三字或作移時復有入謝者上喜曰董某疾且損矣出語人曰董公且復相既二日拜東都留守判東都尚書省事充東都畿汝州都防禦使兼御史大夫仍為兵部尚書或無州字由留守未盡五月拜檢校尚書左僕射同中書門下平章事汴州刺史宣武軍節度副大使知節度事管内支度營田汴宋亳潁等州觀察處置等使或無田字汴州自大歴來多兵事劉𤣥佐益其師至十萬𤣥佐死子士寧代之畋遊無度其將李萬榮乘其畋也逐之或無畋遊字無度或作無幾方云考之傳士寧每畋獵數日方還或本非是萬榮為節度一年其將韓惟清張彦林作亂求殺萬榮不尅度下或有使字三年萬榮病風昏不知事其子乃復欲為士寧之故監軍使俱文珍與其將鄧惟恭執之歸京師而萬榮死詔未至惟恭權軍事公既受命遂行劉宗經韋𢎞景韓愈實從不以兵衛及鄭州逆者不至鄭州人為公懼或勸公止以待有自汴州出者言於公曰不可入公不對遂行宿圃田榮陽西圃田澤是也明日食中牟逆者至宿八角明日惟恭及諸將至遂逆以入者下或有至字非是以或作與及郛三軍緣道讙聲庶人壯者呼老者泣婦人啼遂入以居初𤣥佐死吳湊代之或無初字及鞏聞亂歸士寧萬榮皆自為而後命軍士將以為常故惟恭亦有志以公之速也不及謀遂出逆既而私其人觀公之所為以告曰公無為惟恭喜知公之無害已也委心焉進見公者退皆曰公仁人也聞公言者皆曰公仁人也環以相告故大和初𤣥佐遇軍士厚士寧懼復加厚焉至萬榮如士寧志懼下方有不字云士寧懼其無以繼也若去不字則下文皆衍今按士寧萬榮專命竊據故懼士卒之圖已而後加厚焉尋上下文未見其惜費而薄之之意也况以下文又加厚每加厚推之不字之衍甚切方説誤矣及韓張亂又加厚以懐之至于惟恭每加厚焉故士卒驕不能禦則置腹心之士幕於公庭廡下挾弓執劍以須日出而入前者去日入而出後者至寒暑時至則加勞賜酒肉故士下或有寧字非是公至之明日皆罷之貞元十二年七月也明日二字方作時非是八月上命汝州刺史陸長源為御史大夫行軍司馬楊凝自左司郎中為檢校吏部郎中觀察判官杜倫自前殿中侍御史為檢校工部員外郎節度判官孟叔度自殿中侍御史為檢校金部員外郎支度營田判官職事脩人俗化嘉禾生白鵲集蒼烏來巢嘉瓜同蔕聨實事下或有既字俗或作民蒼烏方云舊本多作蒼鳥家語蒼鳥鴈也瑞應圖有蒼也四方至者歸以告其帥小大威懐有所疑輒使來問有交惡者公與平之累請朝不許及有疾又請之且曰人心易動軍旅多虞及臣之生計不先定至于他日事或難期猶不許十五年二月三日薨于位上三日罷朝贈太傅使吏部員外郎楊於陵來祭弔其子贈布帛米有加公之將薨也命其子三日斂既斂而行於行之四日汴州亂故君子以公為知人或無既斂二字知或作智公之薨也汴州人歌之曰濁流洋洋有闢其郛闐道嚾呼公來之初今公之歸公在喪車又歌曰公既來止東人以完今公没矣人誰與安人誰或作其誰今按外集作其非是始公為華州亦有惠愛人思之公居處恭無妾媵不飲酒不謟笑好惡無所偏與人交泊如也未嘗言兵有問者曰吾志於教化享年七十六階累升為金紫光禄大夫勲累升為上柱國爵累升為隴西郡開國公娶南陽張氏夫人後娶京兆韋氏夫人皆先公終四子全道溪全素澥全道全素皆上所賜名全道為祕書省著作郎溪為祕書省祕書郎全素為大理評事澥為太常寺太祝皆善士有學行諸本溪作全湲澥作全澥方云考世系表董溪志溪澥皆無全字盖全道全素出於賜名也或無為大理評事五字謹具歴官行事狀伏請牒考功并牒太常議所謚牒史館請垂編録或無伏字謹狀或作狀上貞元十五年五月十八日故吏前汴宋亳潁等州觀察推官將仕郎試祕書省校書郎韓愈狀與汝州盧郎中論薦侯喜狀方無薦字云盧虔也喜嘗為虔作復黄陂記進士侯喜右其人為文甚古立志甚堅行止取捨有士君子之操家貧親老無援於朝在舉塲十餘年竟無知遇或無知字愈常慕其才而恨其屈與之還往嵗月已多嘗欲薦之於主司言之于上位名卑官賤其路無由觀其所為文未嘗不揜巻長歎主司或作有司長或作而去年愈從調選本欲攜持同行適遇其人自有家事迍邅上音屯下音鱣坎軻又廢一年事或作難及春末自京還怪其久絶消息五月初至此自言為閣下所知辭氣激揚面有矜色曰侯喜死不恨矣喜辭親入關羇旅道路見王公數百未嘗有如盧公之知我也王公下或有大人字或有貴人字比者分將委棄泥塗老死草野今胷中之氣勃勃然復有仕進之路矣愈感其言賀之以酒謂之曰盧公天下之賢刺史也未聞有所推引盖難其人而重其事今子欝為選首其言死不恨固宜也古所謂知已者正如此耳身在貧賤為天下所不知獨見遇於大賢乃可貴耳若自有名聲又託形勢此乃市道之事又何足貴乎子之遇知于盧公真所謂知已者也士之修身立節而竟不遇知已前古以來不可勝數或日接膝而不相知或異世而相慕以其遭逢之難故曰士為知已者死不其然乎不其然乎或無復出四字不其或作其不閣下既已知侯生而愈復以侯生言於閣下者非為侯生謀也感知已之難遇大閣下之徳而憐侯生之心故因其行而獻於左右焉謹狀論今年權停舉選狀右臣伏見今月十日勅今年諸色舉選宜權停者道路相傳皆云以嵗之旱陛下憐憫京師之人慮其乏食故權停舉選以絶其來者所以省費而足食也臣伏思之竊以為十口之家益之以一二人於食未有所費今京師之人不啻百萬都計舉者不過五七千人并其僮僕畜馬不當京師百萬分之一以十口之家計之誠未為有所損益分上或無萬字又今年雖旱去嵗大豐商賈之家必有儲蓄舉選者皆齎持資用以有易無未見其弊今若暫停舉選或恐所害實深一則逺近驚惶二則人士失業臣聞古之求雨之詞樊曰春秋威五年公羊傳曰大雩者何云云曰人失職歟然則人之失職足以致旱今縁旱而停舉選是使人失職而召災也臣又聞君者陽也臣者隂也獨陽為旱獨隂為水今者陛下聖明在上雖堯舜無以加之而羣臣之賢不及于古又不能盡心於國與陛下同心助陛下為理有君無臣是以乆旱以臣之愚以為宜求純信之士骨鯁之臣憂國如家忘身奉上者超其爵位置在左右如殷髙宗之用傅說周文王之舉太公齊桓公之拔寗戚漢武帝之取公孫𢎞清閑之餘時賜召問必能輔宣王化銷殄旱災公孫或無公字王化方作主化臣雖非朝官月受俸錢嵗受禄粟茍有所知不敢不言謹詣光順門奉狀以聞伏聴聖㫖御史臺上論天旱人饑狀韓曰公既上此疏專政者惡之十二月奏貶連州陽山縣令具神道碑右臣伏以今年已來京畿諸縣夏逢亢旱秋又早霜田種所收十不存一陛下恩踰慈母仁過春陽租賦之間例皆蠲免所徴至少所放至多上恩雖𢎞下困猶甚至聞有棄子逐妻以求口食折屋伐樹以納稅錢寒餒道途斃踣蒲北切又四豆切僵尸也溝壑有者皆已輸納無者徒被追徴臣愚以為此皆羣臣之所未言陛下之所未知者也臣竊見陛下憐念黎元同于赤子至或犯法當戮猶且寛而宥之况此無辜之人豈有知而不救又京師者四方之腹心國家之根本其百姓實宜倍加憂恤今瑞雪頻降來年必豐急之則得少而人傷緩之則事存而利逺伏乞特勅京兆府應今年税錢及草粟等在百姓腹内徴未得者並且停徴容至來年蠶麥庶得少有存立腹或作復方云徳宗十四年詔諸道州府應貞元八年至十一年兩税及𣙜酒錢在百姓腹内者並除放今按腹内謂應納而未納者嘗見國初時官文書元有此語如今言名下也臣至陋至愚無所知識或無知字受恩思效有言輒言無任懇欵慙懼之至謹録奏聞謹奏請復國子監生徒狀國子監應三館祝曰國子館太學館四門館學生等凖六典孫曰唐六典三十巻開元十年起居舍人陸堅被詔撰𤣥宗手冩六條曰理典教典禮典政典刑典事典至二十六年書成國子館學生三百人皆取文武三品已上及國公子孫從三品已上曽孫補充已或作以下同太學館學生五百人皆取五品已上及郡縣公子孫從三品已上曽孫補充或無從字四門館學生五百人皆取七品已上及侯伯子男子補充右國家典章崇重庠序近日趨競未復本源至使公卿子孫恥遊太學工商凡冗或處上庠今聖道大明儒風復振恐須革正以贊鴻猷今請國子館並依六典其太學館量許取長參官八品已上子弟充其四門館亦量許取無資廕有才業人充如有資廕不補學生應舉者請禮部不在收試限其新補人有冒廕者請牒送法司科罪縁今年舉期已近伏請去上都五百里内特許非時收補其五百里外且任鄉貢至來年春一時收補其廚粮度支先給二百七十四人今請凖新補人數量加支給謹具如前伏聴處分唐故贈絳州刺史馬府君行狀君諱某字某諱某或作諱彚其先為嬴姓當周之衰處晉為趙氏晉亡而趙氏為諸侯其後益大與齊楚韓魏燕為六國俱稱王其别子趙奢當趙時破秦軍閼與閼與地名有功號馬服君子孫由是以馬為氏方無時字梁有安州刺史侍中贈太尉岫岫生喬卿任襄州主簿國亂去官不仕喬卿生君才隋末為葪令燕王藝師之以有幽都之衆葪或作蒯苦懐切武徳初朝京師拜武侯大將軍封南陽郡公卒葬大梁新里趙郡李華刻碑頌之君才生珉為玉鈴衛倉曹參軍事贈尚書左僕射生季龍為嵐州刺史贈司空清河崔元翰銘其徳于碑在新里司空生燧為司徒侍中北平王贈太傅謚莊武莊武之勲勞在䇿書君其長子也少舉明經司徒公作藩太原授河南府參軍建中四年司徒公使將武人子弟才力之士三百人朝行在扞衛獻御服用物弓甲煮器幄幕奔走危難上嘉其勤超拜太常丞賜章服遷少府少監太僕少卿嘉方作喜司徒公之薨也刺臂出血書佛經千餘言期以報徳廬墓側植松栢終喪又拜太僕少卿疾病一年貞元十八年七月二十五日終于家凡年四十有五七或作十其弟少府監暢上印綬求追贈贈絳州刺史布帛百匹君在家行孝友待賔客朋友有信義其守官恭慎舉職其朝獻奉父命不避難其居喪有過人行初司徒公娶河南元氏封潁川郡夫人贈許國薨少府始孩顧託以其姪為繼室是為陳國夫人陳國無子愛君與少府如已生其薨也君與少府喪之猶實生已親負土封其墓陳國無子或作夫人無子夫人滎陽鄭氏王屋縣令况之女有賢行侍君疾逾年不下堂食菜飲水藥物必自擇將進輒先嘗方書本草恒置左右子男二人赦前左衛倉曹參軍敭音羊右清道率府胄曹參軍女子一人在室雖皆幼侍疾居喪如成人愈既世通家詳聞其世系事業今葬有期日從少府請掇其大者為行狀托立言之君子而圖其不朽焉復讎狀蜀本此狀首云元和六年九月富平縣人梁悦為父報仇殺人自投縣請罪勅復仇殺人固有彛典以其申寃請罪視死如歸自詣公門發於天性志在狥節本無求生寧失不經特從減死且决杖一百配流循州於是史官職方員外郎韓愈獻議云云方云公於時未為史官也此後人以史文増入閣本舊本皆無之右伏奉今月五日勅復讎據禮經則義不同天徴法令則殺人者死禮法二事皆王教之端有此異同必資論辯宜令都省集議聞奏者端上或有大字朝議郎行尚書職方員外郎上騎都尉韓愈議曰伏以子復父讎見於春秋見於禮記又見周官又見諸子史不可勝數未有非而罪之者也最宜詳於律而律無其條非闕文也盖以為不許復讎則傷孝子之心而乖先王之訓許復讎則人將倚法專殺無以禁止其端矣律無下方有有字夫律雖本於聖人然執而行之者有司也經之所明者制有司者也丁寧其義於經而深没其文於律者其意將使法吏一斷於法而經術之士得引經而議也將方作特周官曰凡殺人而義者令勿讎讎之則死義宜也明殺人而不得其宜者子得復讎也此百姓之相讎者也公羊傳曰父不受誅子復讎可也不受誅者罪不當誅也誅者上施於下之辭非百姓之相殺者也殺下方無者字又周官曰凡報仇讎者告於士殺之無罪言將復讎必先言於官則無罪也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自專訪議羣下臣愚以為復讎之名雖同而其事各異或百姓相讎如周官所稱可議于今者或為官所誅如公羊所稱不可行於今者為官下或有吏字又周官所稱將復讎先告于士則無罪者若孤稚羸倫為切弱抱微志而伺敵人之便恐不能自言於官未可以為斷于今也然則殺之與赦不可一例宜定其制曰凡有復父讎者事發具其事申尚書省尚書省集議奏聞或無有字申或作由下二字今按此合有由字但下字當作申又或是上字耳更詳之酌其宜而處之則經律無失其指矣一無律字謹議錢重物輕狀以舊記考乃長慶元年作右臣伏凖御史臺牒凖中書門下帖奉進止錢重物輕為弊頗甚帖或作牒詳求適變可以便人所貴緡貨通行里閭寛息宜令百寮隨所見作利害狀者臣愚以為錢重物輕救之之法有四一曰在物土貢夫五榖布帛農人之所能出也工人之所能為也人不能鑄錢而使之賣布帛榖米以輸錢於官是以物愈賤而錢愈貴也而錢或無而字今使出布之鄉租賦悉以布出綿絲百貨之鄉租賦悉以綿絲百貨去京百里悉出草三百里以粟五百里之内及河渭可漕入上在到切水運願以草粟租賦悉以聴之則人益農錢益輕榖米布帛益重草粟下或有米字農或作豐二曰在塞其隙無使之洩禁人無得以銅為器皿或無皿字禁鑄銅為浮屠佛像鐘磬者蓄銅過若千斤者鑄錢以為他物者皆罪死不赦禁錢不得出五嶺下或有復出五嶺字買賣一以銀盜以錢出嶺及違令以買賣者皆坐死五嶺舊錢聴人載出如此則錢必輕矣三曰更其文貴之使一當五而新舊兼用之凡鑄錢千其費亦千今鑄一而得五是費錢千而得錢五千可立多也四曰扶其病使法必立凡法始立必有病今使人各輸其土物以為租賦則州縣無見錢州縣無見錢而榖米布帛未重則用不足而官吏之禄俸月減其舊三之一各置鑄錢使新錢一當五者以給之輕重平乃止四法用錢必輕榖米布帛必重百姓必均矣謹録奏聞伏聴勅㫖謹奏别本韓文考異巻三十七欽定四庫全書别本韓文考異巻三十八宋王伯大重編
