front:
  text: 所謂道道其所道非吾所謂道也其所謂徳德其所徳非吾所謂徳也或無其所謂德四字非是凡吾所謂道徳云者合仁與義言之也天下之公言也老子之所謂道徳云者去仁與義言之也一人之私言也公言私言下或者有者字或惟下句有之周道衰孔子没火於秦黄老於漢佛於晉魏梁隋之間或無黄字晉魏梁隋諸本作晉宋齊梁魏隋文苑作晉梁魏隋蜀本作魏晉宋梁齊方從各杭本云南齊隋梁北齊魏隋也其言道徳仁義者不入於楊則入於墨不入於老則入於佛入於彼必出於此入者主之出者奴之入者附之出者汙之必上方有則字主方作王今按作主乃與下文三韵皆叶作王非是噫後之人其欲聞仁義道徳之説孰從而聴之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其説樂其誕而自小也亦曰吾師亦嘗云爾諸本嘗下有師之字不惟舉之於其口而又筆之於其書噫後之人雖欲聞仁羲道徳之説其孰從而求之甚矣人之好怪也不求其端不訊其末惟怪之欲聞古之為民者四今之為民者六古之教者處其一今之敎者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盗也古之時人之害多矣有聖人者立然後敎之以相生養之道或無以字為之君為之師驅其蟲蛇禽獸而處之中土寒然後為之衣飢然後為之食木處而顛土處而病也然後為之宮室為之工以贍其器用為之賈以通其有無通方作同為之醫藥以濟其夭死為之𦵏埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其壹鬱為之政以率其怠勌為之刑以鋤其强梗壹或作湮或作堙方云按史記賈誼傳獨堙鬱其誰語漢書作壹欝壹當作集韻音咽壼欝不得泄也平入聲通用湮與亦音義同也作壹字則非今按字書壹壷吉凶在壷中不得泄也即今之氤氲字壹湮古葢通用故漢書但作壹耳相欺也為之符璽斗斛權衡以信之相奪也為之城郭甲兵以守之方無權衡字非是害至而為之備患生而為之防今其言曰聖人不死大盜不止剖斗折衡而民不爭剖或作掊嗚呼其亦不思而已矣如古之無聖人人之類㓕乆矣何也無羽毛鱗介以居寒熱也無爪牙以爭食也是故君者出令者也臣者行君之令而致之民者也民者出粟米麻絲作器皿通貨財以事其上者也致之或作致其非是麻絲或作絲麻篇内並同君不出令則失其所以為君臣不行君之令而致之民則失其所以為臣民不出粟米麻絲作器皿通貨財以事其上則誅臣不下諸本有能字無而致之民四字而句下有則失其所以為臣一語今其法曰必棄而君臣去而父子禁而相生相養之道以求其所謂清浄寂滅者嗚呼其亦幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也帝之與王其號雖殊其所以為聖一也夏葛而冬裘渴飲而飢食其事雖殊其所以為智一也今其言曰曷不為太古之無事是亦責冬之裘者曰曷不為葛之之易也責飢之食者曰曷不為飲之之易也其言或作之言飢之或作肌而傳曰古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有為也今也欲治其心而外天下國家方作國家天下句下誠皆有者字皆非是滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之進於中國則中國之經曰夷狄之有君不如諸夏之亡詩曰戎狄是膺荆舒是懲進上或有夷而字今也舉夷狄之法而加之先王之敎之上幾何其不胥而為夷也夫所謂先王之敎者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂徳其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賔主昆弟夫婦其服麻絲其居宮室其食粟米果蔬魚肉文或作書或作敎果蔬或作蔬果其為道易明而其為敎易行也或無而字而下方無其字是故以之為已則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當是故生則得其情死則盡其常郊焉而天神假廟焉而人鬼饗曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也何上方無也字今按曰斯道也何道也是問詞而曰斯吾所謂道也以下乃答語也斯道也何道也或作斯何道也斯吾所謂道也或作斯道也吾所謂之道也又或無所謂字皆非是堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與楊也擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其説長然則如之何而可也何而方作何其今按此句復是問詞其下乃答語曰不塞不流不止不行人其人火其書廬其居明先王之道以道之鰥寡孤獨廢疾者有養也其亦庶乎其可也
