body:
  text: 原性方作性原今按原道原人原鬼之例作原性為是又此五原篇目既同當是一時之作與兵部李侍郎書所謂舊文二巻扶樹敎道有所明白者疑即此諸篇也然則皆是江陵以前所作程子獨以原性為少作恐其考之或未詳也性也者與生俱生也情也者接於物而生也性之品有三而其所以為性者五情之品有三而其所以為情者七而其或皆無而字性者情者方並無者字皆非是曰何也或無曰字曰性之品有上中下三上焉者善焉而巳矣中焉者可導而上下也下焉者惡焉而巳矣其所以為性者五曰仁曰禮曰信曰義曰智方從閣杭蜀本云禮信去仁為近諸本多作曰仁曰義曰禮曰智曰信今按方本以五行相生之序而言諸本以四方相對一位居中而言理皆可通但切意諸本語陳而韓公亦頗尚異恐方本或得之上焉者之於五也主於一而行於四行於方作行之中焉者之於五也一不少有焉則少反焉其於四也混不上諸本無一字方從閣杭潮本作一也而並屬下句云一謂仁也言不少存乎仁則少畔乎仁蜀本倒一也二字杭蜀反皆作及非也今按也一二字當從蜀本而以也字屬上句一字屬下句方及諸本皆非也方以一為仁亦非是此但言中人之性於五者之中其一者或偏多或偏少其四者亦襍而不純耳反字則方得之下焉者之於五也反於一而悖於四性之於情視其品情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處其中其中或作於中非是中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也亡與上方有無字非是情之於性視其品孟子之言性曰人之性善荀子之言性曰人之性惡楊子之言性曰人之性善惡混夫始善而進惡與始惡而進善與始也混而今也善惡皆舉其中而遺其上下者也得其一而失其二者也與諸本多作歟善惡下又有歟字今按二與字皆當讀如字而為句首猶言及也作歟而為句絶者皆非左傳夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也語勢亦相似叔魚之生也其母視之知其必以賄死揚食我食音嗣叔向生子伯石母視之及堂聞其聲而還曰是豺狼之聲也非是莫喪羊舌氏矣伯石食我字也食邑揚地之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為大戚知若敖姓也楚子良生子越椒子文曰是子弗殺必滅若敖之族氏之鬼不食也人之性果善乎或無大字后稷之生也其母無灾其始匍匐也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎不憂上或無母字堯之朱舜之均文王之管蔡習非不善也而卒為姦瞽叟之舜鯀之禹習非不惡也而卒為聖人之性善惡果混乎聖下或有人字屬上句故曰三子之言性也舉其中而遺其上下者也得其一而失其二者也曰然則性之上下者其終不可移乎終上或無其字曰上之性就學而愈明下之性畏威而寡罪是故上者可敎而下者可制也其品則孔子謂不移也敎方作學曰今之言性者異於此何也性下或有情字曰今之言者雜佛老而言也雜佛老而言也者奚言而不異言也者或無也字今按此篇之言過荀楊逺甚其言五性尤善但三品之説太拘又不知性之本善而其所以或善或惡者由其禀氣之不同為未盡耳原毁方作毁原説已見上古之君子其責已也重以周其待人也輕以約重以周故不怠輕以約故人樂為善聞古之人有舜者其為人也仁義人也求其所以為舜者責於巳曰彼人也予人也彼能是而我乃不能是早夜以思去其不如舜者就其如舜者古之人或無人字下同早或作蚤聞古之人有周公者其為人也多才與藝人也求其所以為周公者責於巳曰彼人也予人也彼能是而我乃不能是方從閣本無求其所以字只作責於巳為周公者今按閣本不成文理而方從之誤矣早夜以思去其不如周公者就其如周公者去其下十三字方從閣本作求其所以為周公者而為之舜大聖人也後世無及焉周公大聖人也後世無及焉是人也乃曰不如舜不如周公吾之病也是不亦責於身者重以周乎身或作巳其於人也曰彼人也能有是是足為良人矣能善是是足為藝人矣善方作有非是取其一不責其二即其新不究其舊責或作取恐恐然惟懼其人之不得為善之利一善易修也一藝易能也其於人也乃曰能有是是亦足矣曰能善是是亦足矣或無此人字非是不亦待於人者輕以約乎不上或有是字今之君子則不然方無則不然字其責人也詳其待已也亷詳故人難於為善亷故自取也少已未有善曰我善是是亦足矣已未有能曰我能是是亦足矣外以欺於人内以欺於心未少有得而止矣不亦待其身者巳亷乎其身或作於已其於人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不計其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責於人者已詳乎夫是之謂不以衆人待其身而以聖人望於人吾未見其尊已也是之或作如是方無之字雖然為是者有本有原怠與忌之謂也原上或無有字怠者不能修而忌者畏人修吾嘗試之矣嘗試語於衆曰某良士某良士其應者必其人之與也不然則其所疎逺不與同其利者也不然則其畏也不若是强者必怒於言懦者必怒於色矣又嘗語於衆曰某非良士某非良士其不應者必其人之與也不然則其所疎逺不與同其利者也不然則其畏也不若是强者必説於言懦者必説於色矣不應下或無者字非是是故事修而謗興徳髙而毁來嗚呼士之處此世而望名譽之光道徳之行難巳將有作於上者得吾説而存之其國家可幾而理歟此下或無世字非是已或作矣作或作仕或作化歟或作也原人或作仁形於上者謂之天形於下者謂之地命於其兩間者謂之人形於上日月星辰皆天也形於下草木山川皆地也命於其兩間夷狄禽獸皆人也曰然則吾謂禽獸人可乎曰非也人可上或有曰字指山而問焉曰山乎曰山可也山有草木禽獸皆舉之矣指下或有南字非是指山之一草而問焉曰山乎曰山則不可或無曰山乎三字故天道亂而日月星辰不得其行地道亂而草木山川不得其平人道亂而夷狄禽獸不得其情方無故字天者日月星辰之主也地者草木山川之主也人者夷狄禽獸之主也主而暴之不得其為主之道矣是故聖人一視而同仁篤近而舉逺仁或作人非原鬼有嘯於梁從而燭之無見也斯鬼乎曰非也鬼無聲有立於堂從而視之無見也斯鬼乎曰非也鬼無形有觸吾躬從而執之無得也斯鬼乎曰非也鬼無聲與形安有氣鬼無聲與形上或有鬼無氣三字非是曰鬼無聲也無形也無氣也果無鬼乎曰有形而無聲者物有之矣土石是也有聲而無形者物有之矣風霆是也有聲與形者物有之矣人獸是也無聲與形者物有之矣鬼神是也曰然則有怪而與民物接者何也曰是有二有鬼有物有怪或作見怪二下或有説字或有説字而無冇鬼有物四字漠然無形與聲者鬼之常也民有忤於天有違於民有爽於物逆於倫而感於氣上民字或作人下民字或作時於是乎鬼有形於形有慿於聲以應之而下殃禍焉皆民之為之也其既也又反乎其常有不或作有之為下或無之字曰何謂物曰成於形與聲者土石風霆人獸是也反乎無聲與形者鬼神是也不能有形與聲不能無形與聲者物怪是也反乎或作反其非是或無不能有形與聲六字或無不能無形與聲六字故其作而接於民也無恒故有動於民而為禍亦有動於民而為福本或先言為福亦有動於民而莫之為禍福適丁民之有是時也作原鬼方從閣蜀杭無作字今按古書篇題多喜後者如荀子諸賦正此類也但此篇前已有題不應復出故且從諸本有作字行難或問行孰難曰捨我之矜從爾之稱孰能之曰陸先生參何如曰先生之賢聞天下是是而非非聞下或有於字貞元中自越州徴拜祠部員外郎京師之人日造焉閉門而拒之滿街愈嘗往間客席嘗或作常間或作問客或作賢席下或有坐定二字先生矜語其客曰某胥也某商也其生某任之其死某誄音藟孫曰某任之謂所舉所任之人也任保任也誄累也人生有徳行死而後累引其行其為誄今之行狀是也之某與某可人也可或作何方從閣本死作可云可人見禮記鄭注曰世人可也今按方据禮記是也然誄下文韓公之語似以陸公雖套任誄此人復自任於有罪則頗有擇其門地之意而以詹引之力自多者恐後作何字語勢乃可更詳之任與誄也非罪歟皆曰然也或有之罪一作過曰上或有應字愈曰某之胥某之商其得任與誄也有由乎抑有罪不足任而誄之邪任而誄方作計而任而或作與先生曰否吾惡其初不然任與誄也何尤愈曰茍如是先生之言過矣昔者管敬子取盜二人為大夫於公趙文子舉管庫之士七十有餘家夫惡求其初先生曰不然彼之取者賢也愈曰先生之所謂賢者大賢歟抑賢於人之賢歟齊也晉也且有二與七十而可謂今之天下無其人邪而可上或有焉字邪上或有也字先生之選人也已詳先生曰然愈曰聖人不世出賢人不時出千百嵗之間倘有焉不幸而有出於胥商之族者先生之説傳吾不忍赤子之不得乳於其母也先生曰然聖人賢人人方皆作之或並有人之二字世出或作世生百嵗或作百年乳於或作於字他日又往坐焉或無坐字先生曰今之用人也不詳位乎朝者吾取某與某而已在下者多於朝凡吾與者若干人愈曰先生之與者盡於此乎其皆賢乎抑猶有舉其多而缺其少乎方無其皆賢乎四字缺或作没少或作細或作一少下方有者字今按此言人之才或不全備維舉其可取之多而畧其可棄之少也先生曰固然吾敢求其全其方作於今按作其語意為近但陸公此句正不敢必求全才之意而下文韓公又以太詳而不早圖之殊不可曉當考之愈曰由宰相至百執事凡幾位由一方至一州凡幾位先生之得者無乃不足充其位邪其位下或有也字不早圖之一朝而舉焉今雖詳其後用也也必粗舉焉或作索之詳下或有且㣲字非是先生曰然子之言孟軻不如文録作退語其人曰乃今吾見孟軻對禹問或問曰堯舜傳諸賢禹傳諸子信乎曰然然則禹之賢不及於堯與舜也歟曰不然堯舜之傳賢也欲天下之得其所也禹之傳子也憂後世爭之之亂也堯舜之利民也大禹之慮民也深利一作慮曰然則堯舜何以不憂後世曰舜如堯堯傳之禹如舜舜傳之得其人而傳之堯舜也無其人慮其患而不傳者禹也無其人下方有而不傳三字不傳者或作不得如巳者非是舜不能以傳禹堯為不知人禹不能以傳子舜為不知人堯以傳舜為憂後世禹以傳子為慮後世曰禹之慮也則深矣傳之子而當不淑則奈何之慮下或有民字曰時益以難理傳之人則爭未前定也傳之子則不爭前定也前定雖不當賢猶可以守法不前定而不遇賢則爭且亂天之生大聖也不數其生大惡也亦不數傳諸人得大聖然後人莫敢爭傳諸子得大惡然後人受其亂莫上或無人字亂或作禍禹之後四百年然後得桀亦四百年然後得湯與伊尹湯與伊尹不可待而傳也待或作得與其傳不得聖人而爭且亂孰若傳諸子雖不得賢猶可守法諸或作之守法方從閣作法守非是曰孟子之所謂天與賢則與賢天與子則與子者何也曰孟子之心以為聖人不茍私於其子以害天下求其説而不得從而為之辭雜説四首或作三首其一作題崔山君傳龍嘘氣成雲雲固弗靈於龍也嘘上或有之字然龍乘是氣茫洋窮乎𤣥閒薄日月伏光景感震電神變化水下土汩􅁜谷雲亦靈怪矣哉氣下或有而字雲龍之所能使為靈也靈方從閣本作雲非是若龍之靈則非雲之所能使為靈也然龍弗得雲無以神其靈矣失其所憑依信不可歟弗或作不方無信字非是異哉其所慿依乃其所自為也易曰雲從龍既曰龍雲從之矣善醫者不視人之􅇤肥察其脈之病否而已矣醫下或有人字善計天下者不視天下之安危察其紀綱之理亂而巳矣綱下方無之字理亂或作亂否天下者人也安危者肥􅇤也紀綱者脈也脈不病雖􅇤不害脈病而肥者死矣通於此説者其知所以為天下乎紀綱或作綱紀所以方無以字夏殷周之衰也諸侯作而戰伐日行矣傳數十王而天下不傾者紀綱存焉耳作或作替秦之王天下也無分勢於諸侯聚兵而焚之傳二世而天下傾者紀綱亡焉耳世方作帝是故四支雖無故不足恃也脈而已矣四海雖無事不足矜也紀綱而已矣四海或作天下憂其所可恃懼其所可矜善醫善計者謂之天扶與之諸本或無天字扶或作持今按此句未詳疑有誤字易曰視履考祥善醫善計者為之善計方無善字談生之為崔山君傳稱鶴言者豈不怪哉之或作云而無為字非是然吾觀於人其能盡吾性而不類於禽獸異物者希矣將憤世嫉邪長往而不來者之所為乎昔之聖者其首有若牛者其形有若蛇者其喙有若鳥者其貌有若䝉倛音期祝云荀子曰仲尼之狀面如䝉倛注云方相也其首蒙茸然故曰蒙倛韓侍郎云四目為方相兩目為蒙倛韓侍郎正謂公也按楊倞注荀子時為大理評事公為刑部侍郎此語豈親授於公耶者彼皆貌似而心不同焉可謂之非人邪聖者或作聖人或并有人者二字鳥閣作馬方云尸子禹長頸鳥喙閣本訛也即有平脇曼膚祝曰楚詞平脇曼膚何以肥之注謂紂也顔如渥丹美而狼者樊曰左氏傳宋公子佐惡而婉太子座美而狼貌則人其心則禽獸又惡可謂之人邪貌或作面貌上或有其字禽下方無獸字邪或作也方云列子包羲女媧神農夏后氏蛇身人面牛尾虎鼻皆有非人之狀而有大聖人之徳夏桀殷紂魯如楚穆狀貌七竅皆同而有禽獸之心公意亦如此耳然則觀貌之是非不若論其心與其行事之可否為不失也方從閣杭無可否字非是怪神之事孔子之徒不言余將特取其憤世嫉邪而作之故題之云爾世有伯樂然後有千里馬千里馬常有而伯樂不常有或無下千里字故雖有名馬祗辱於奴𨽻人之手駢死於槽櫪之閒不以千里稱也或無人字馬之千里者一食或盡粟一石食馬者不知其能千里而食也是馬也雖有千里之能食不飽力不足才美不外見且欲與常馬等不可得安求其能千里也食馬上或有今之字而食下疑脱一右字馬也方無也字且欲或無且字且或作而今按且字恐當在等字下䇿之不以其道食之不能盡其材鳴之而不能通其意執䇿而臨之曰天下無馬嗚呼其真無馬耶其真不知馬也二無字下諸本皆有良字閣杭本皆脱其真無馬耶五字知或作識而無也字讀荀下或有子字始吾讀孟軻書然後知孔子之道尊聖人之道易行王易王霸易霸也以為孔子之徒没尊聖人者孟氏而巳晚得楊雄書益尊信孟氏因雄書而孟氏益尊則雄者亦聖人之徒歟雄下或有也字聖人之道不傳於世周之衰好事者各以其説干時君紛紛籍籍相亂六經與百家之説錯雜其下或有所能字然老師大儒猶在火於秦黄老於漢或無黄字其存而醇者孟軻氏而止耳楊雄氏而止耳或作矣一無楊雄氏而止耳一句及得荀氏書於是又知有荀氏者也考其辭時若不粹要其歸與孔子異者鮮矣抑猶在軻雄之閒乎時下或有有字不下或有醇字抑下或有其字孔子刪詩書筆削春秋合於道者著之離於道者黜去之故詩書春秋無疵或無黜字去下或無之字余欲削荀氏之不合者附於聖人之籍亦孔子之志歟孟氏醇乎醇者也荀與楊大醇而小疵方從閣無乎醇字或無乎醇者三字而有如字皆非是楊方作雄非是讀鶡冠子鶡音曷楚人居深山以鶡鳥羽為冠曰鶡冠子班固曰道家者流冠子十有九篇其詞雜黄老刑名九方作六云今鶡冠子自博選至武靈王問凡十九篇此只云十六篇未詳今按方葢不見或本已作九也或無雜字非是其博選篇四稽五至之説當矣使其人遇時援其道而施於國家功德豈少哉至或作至遇下或有其字功上或有其字學問篇稱賤生於無所用中流失船一壺爾雅壺瓠也國語云苦瓠不才共濟而巳注云佩瓠可以渡水千金者余三讀其辭而悲之文字脱謬為之正三十有五字乙者三滅者二十有二注十有二字云壺或作瓠音義同滅方作成注下或有者字讀儀禮余嘗苦儀禮難讀又其行於今者葢寡沿襲不同復之無由考於今誠無所用之其方作且用之或作用云然文王周公之法制粗在於是孔子曰吾從周謂其文章之盛也古書之存者希矣百氏雜家尚有可取况聖人之制度耶存上方無之字家或作説尚下方無有字於是掇其大要奇辭奥㫖著於篇學者可觀焉方無學字惜乎吾不及其時進退揖讓於其間嗚呼盛哉讀墨子孫曰墨子名翟宋大夫漢藝文志云著書七十二篇云云樊曰世之學者因臨川王氏書孔墨必相用自古寧有此之語意謂孟子排楊墨公排釋者既自比孟子不當有相用之説然必知孟子歸斯受之意然後識讀墨之㫖補注或問伊川先生曰退之讀墨篇如何曰此篇意亦甚好但言不謹嚴便有不是處至若言孔子尚同兼愛與墨子同則甚不可也儒譏墨以上同兼愛上賢明鬼上或皆作尚方從閣本云考墨子本書及漢藝文志當作上而孔子畏大人居是邦不非其大夫春秋譏專臣不上同哉孔子泛愛親仁以博施濟衆為聖不兼愛哉孔子賢賢以四科進襃弟子疾沒世而名不稱不上賢哉孔子祭如在譏祭如不祭者曰我祭則受福不明鬼哉儒墨同是堯舜同非桀紂同修身正心以治天下國家奚不相悦如是哉余以為辨生於末學各務售其師之説非二師之道本然也孔子必用墨子墨子必用孔子不相用不足為孔墨别本韓文考異巻十一欽定四庫全書别本韓文考異巻十二宋王伯大重編雜著獲
