body:
  text: 律詩凡八十五首題楚昭王廟丘墳滿目衣冠盡墳或作園城闕連雲草樹荒猶有國人懐舊德一間茅屋祭昭王宿龍宫灘浩浩復湯湯音商西清詩話魯直云退之裁聽水句尤見工所謂浩浩湯湯抑更揚者非諳客裏夜臥飽聞此聲安能周旋妙處如此灘聲抑更揚奔流疑激電驚浪似浮霜夢覺燈生暈宵殘雨送涼如何連曉語一半是思鄉或作抵是説家鄉义魚招張功曹或無下四字义集注周官以時籍魚鄭云以义刺泥中取之魚春岸闊此興在中宵大炬然如晝長船縛似橋深窺沙可數靜搒音謗進舡也水無揺刃下何能脱刃或作手波間或自跳中鱗憐錦碎憐或作疑當目訝珠銷迷火逃翻近驚人去暫遥競多心轉細得雋音俊左傳得雋曰克語時囂潭罄知存寡舷音舡舷邊或作船平覺獲饒交頭疑湊餌駢首類同條濡沫情雖宻登門事已遼事或作志盈車孫曰孔叢子衛人釣魚於河得魚焉其大盈車欺故事飼犬飼音伺食也孫曰鹽鐵論曰彭蠡之濵以魚飼犬樊曰杜子美黄魚詩脂膏兼飼犬驗今朝血浪凝猶沸腥風逺更飄蓋江煙羃羃莫狄切深貌拂棹影寥寥疑或作迴獺去愁無食龍移懼見燒如棠名既誤釣渭日徒消文客驚先賦篙工喜盡謡膾成思我友觀樂憶吾僚自可捐憂累何須强問鴞孫曰賈誼鵩賦曰請問於鵩余去何之楚人命鴞曰鵩不祥鳥也李員外寄紙筆方云李伯康也伯康以貞元十九年為郴州刺史權徳輿集有墓誌今按後巻祭文獲紙筆之雙貿即謂此事投义魚之短韻亦指前篇也題是臨池後樊曰張芝伯英善草書凡家之衣帛必先書而後染練之臨池學書池水盡黒寸紙不遺韋仲將稱其草聖分從起草孫曰漢制尚書郎掌天子制詔起草禁中餘兎尖針莫並繭淨韓曰淨洋繭紙也羲之制蘭亭乘興而書用蠶繭紙補注建中初日本使者興能獻方物興能善書其紙似繭而澤人莫能識雪難如莫怪殷勤謝虞卿正著書樊曰虞卿著虞氏春秋太史公曰虞卿非窮愁亦不能著書以自見於世次同冠峽冠或作弄或作巫今日是何朝天晴物色饒晴或作清落英千尺墮遊絲百丈飄泄乳交巖脉懸流揭浪標無心思嶺北猿鳥莫相撩荅張十一功曹唐本有張署寄公詩山淨江空水見沙哀猿啼處兩三家篔簹云當二音竹名也祝曰選其竹則篔簹箖箊韓曰郭璞江賦桃枝篔簹實繁有叢競長纎纎笋躑躅閒開艷艷花閒或作初未報恩波知死所莫令炎瘴送生涯吟君詩罷看雙鬢斗覺霜毛一半加郴州祈雨乞雨女郎魂炰羞潔且繁廟開鼯䑕呌神降越巫言旱氣期銷蕩隂官想駿奔行看五馬入蕭䬃巳隨軒湘中酬張十一功曹休垂絶徼千行淚共泛清湘一葉舟今日嶺猿兼越鳥可憐同聽不知愁郴口又贈二首山作劒攅江寫鏡扁舟斗轉疾於飛迴頭笑向張公子終日思歸此日歸雪颭職琰切霜翻看不分雪或作雲雷驚電激語難聞沿涯宛轉到深處何限青天無片雲涯或作崖題木居士二首火透波穿不計春根如頭面幹如身偶然題作木居士便有無窮求福人為神詎比溝中斷孫曰莊子百年之木破為犧尊青黄而文之其斷在溝中比犧尊於溝中之斷則美惡有間其失性一也遇賞還同㸑下餘後漢蔡邕吳人有燒桐以㸑者邕聞火烈之聲知其良木因請而裁為琴果有美音其尾猶焦故人名為焦尾琴云朽蠧不勝刀鋸力匠人雖巧欲何如晚泊江口郡城朝解纜江岸暮依村二女竹上淚孤臣水底魂雙雙歸蟄燕一一呌羣猿迴首那聞語空看别袖翻聞或作能湘中猿愁魚踊水翻波踊或作躍自古流傳是汨羅汨音覔在長沙羅縣故曰汨羅蘋藻滿盤無處奠空聞漁父叩舷歌盤或作舡舷或作舡别盈上人方云栁子厚集有誡盈住衡山中院山僧愛山出無期俗士牽俗來何時祝融峯下一迴首即是此生長别離喜雪獻裴尚書或無下四字宿雲寒不巻春雪墮如簁所宜切孫曰簁下物竹器或作篩騁巧先投隙潛光半入池半或作亂喜深將策試驚宻仰簷窺自下何曾汙增髙未覺危覺或作見比心明可燭拂面愛還吹妬舞時飄袖欺梅併壓枝地空迷界限砌滿接髙卑浩蕩乾坤合霏微物象移為祥矜大熟布澤荷平施為或作驗布或作市方云以上句為祥言之布澤為當巳分年華晚猶憐曙色隨氣嚴當酒換或作暖灑急聽牕知照曜臨初日玲瓏滴晚澌晚或作曉聚庭看嶽聳掃路見雲披陣勢魚麗音麗孫曰左傳鄭人為魚麗之陣先偏後伍逺書文鳥篆韓曰尚書䟽蒼頡造書觀於鳥迹因而遂滋則謂之字竒縱歡羅豔黠列賀擁熊螭履敝行偏冷門扄臥更羸悲嘶聞病馬或作鳥浪走信嬌兒竈靜愁煙絶絲繁念鬢衰擬鹽吟舊句授簡樊曰謝惠連雪賦曰梁孝王遊於兔園宻雪下授簡於司馬大夫曰抽子秘思騁子妍詞為我賦之慕前規捧贈同燕石孫曰韓非曰宋之愚人得燕石于梧臺之東歸而藏之以為寳周客聞而觀之掩口而笑曰此燕石也與瓦礫不殊公言此者以自喻其詩多慙失所宜春雪看雪乘清旦看或作觀無人坐獨謡坐獨或作獨坐拂花輕尚起落地暖初銷巳訝凌歌扇晉王珉侍人為白團扇歌還來伴舞腰灑篁留宻節宻或作半著栁送長條入鏡鸞窺沼行天馬沈存中云杜子美詩紅稻啄餘鸚鵡粒碧梧棲老鳳凰枝語相反而音新退之雪詩入鏡鸞窺沼行天馬度橋葢倣此體度橋徧堦憐可掬滿樹戯成揺江浪迎濤日風毛縱獵朝弄閒時細轉爭急忽驚飄城險疑懸布砧寒未𢷬綃莫愁隂景促夜色自相饒色或作月聞梨花發贈劉師命桃蹊惆悵不能過蹊或作溪紅豔紛紛落地多聞道郭西千樹雪欲將君去醉如何春雪間早梅間或作映梅將雪共春彩豔不相因逐吹能爭宻排枝巧妬新誰令香滿座獨使淨無塵芳意饒呈瑞寒光助照人玲瓏開巳徧㸃綴坐來頻那是俱疑似須知兩逼真熒煌初亂眼浩蕩忽迷神未許瓊華比從將玉樹親從將或作將從孫曰揚雄甘泉賦翠玉樹之青葱兮璧馬犀之瞵㻞先期迎獻嵗韓曰楚詞獻嵗發春更伴占兹辰或作晨願得長輝映輕微敢自珍微或作嚴早春雪中聞鸎諸本或在入闗詠馬之後朝鸎雪裏新雪樹眼前春帶澁先迎氣侵寒巳報人共矜初聽早誰貴後聞頻暫囀那成曲孤鳴豈及辰風霜徒自保桃李詎相親寄謝幽棲友辛勤不為身梨花下贈劉師命方云蘇魏公云當録於古詩中洛陽城外清明節百花寥落梨花發今日相逢瘴海頭共驚爛熳開正月和歸工部送僧工部歸登也方云約荆州人詳見劉夢得集早知皆是自拘囚不學因循到白頭汝既出家還擾擾何人更得死前休得或作向入闗詠馬嵗老豈能充上駟力微當自慎前程不知何故翻驤首牽過闗門妄一鳴妄或作忘木芙蓉新開寒露叢逺比水間紅露方作路間或作邊皆非是豔色寧相妬嘉名偶自同採江官渡晚搴木古祠空方从杭蜀館本官渡作秋節祠作辭又云閤本作秋江官渡晚寒木古祠空洪本校從採江官渡晚搴木古祠空按古詩有渉江採芙蓉正謂荷花又九歌搴芙蓉兮木末則謂搴之非其地也此以一花對喻謂將採之江則秋色巳晚將搴之木則古辭所喻為無益葢詩人强彼弱此意也而今按方説非是葢此詩言荷花與木芙蓉生不同處色皆美名又同故以採江搴木二事相對言其生處而九歌者祭神之辭故曰古祠也如此則此詩從頭至此六句意皆聨属然嘉祐杭本巳如此非洪意定也願得勤來看無令便逐風願得或作須勸題張十一旅舍三詠榴花五月榴花照眼明枝間時見子初成可憐此地無車馬顛倒青苔落絳英綘或作細井賈誼宅中今始見孫曰湘水記云賈誼宅中有一井誼所穿也杜詩長懐賈誼井依然葛洪山孫曰葛洪字稚川其井今在栁州下昔曾窺寒泉百尺空看影正是行人渇死時渴或作暍蒲萄新莖未徧半猶枯髙架支離倒復扶復或作後若欲滿盤堆馬乳韓曰蜀本草云蒲萄有紫白二色又有似馬乳者莫辭添竹引龍鬚若或作君峽石西泉西一作寒居然鱗介不能容石眼環環水一鍾聞説旱時求得雨祇疑科斗是蛟龍梁國惠康公主挽歌梁或作涼方云考之史當作梁今按本或有詞字羊士諤集有梁國惠康公主挽歌詞二首注云特詔令百官進詩定謚芳聲逺移封大國新巽宫尊長女臺室屬良人河漢重泉夜梧桐半樹春孫曰梧桐半生半死半樹春存以言公主死獨其夫王季友爾龍轜音而祝曰轜䘮車名前漢此似轜車孫曰周禮王后五輅重翟錫面朱總厭翟勒面繢總厭翟平時所乘車也非厭翟上於渉切下丁歴切雉羽飾車其羽相迫還輾禁城塵秦地吹簫女湘波鼓瑟妃佩蘭初應夢奔月孫曰淮南子羿請不死之藥於西王母羿妻嫦娥竊而奔月是為蟾蜍竟淪輝竟或作競非是夫族迎魂去宫官㑹葬歸從今沁園上七鴆切孫曰沁水公主漢光武皇帝女竇憲恃女弟為皇后以賤直奪公主園沁者沁水公主園也草無復更芳菲和崔舍人詠月崔羣也閤本無此篇三秋端正月今夜出東溟對日猶分勢騰天漸吐靈末髙烝逺氣半上霽孤形赫奕當躔次虚徐度杳㝠長河晴散霧列宿音秀曙分螢浩蕩英華溢瀟踈物象泠或作零池邊臨倒照簷際送横經花樹參差見臯禽斷續聆牖光窺寂寞砧影伴娉婷上普丁切下徒寧切祝曰和色也杜詩赤節引娉婷幽坐看侵户閒吟愛滿庭輝斜通壁練彩碎射沙星清潔雲間路空涼水上亭淨堪分顧兎孫曰楚詞厥利維何而顧兎在腹顧兎月中兎也細得數飄萍山翠相凝緑林煙共􅇈青過隅驚桂側當午覺輪停属思摛霞錦追歡罄縹缾郡樓何處望隴笛此時聽右掖連臺坐重門限禁扄風臺觀滉音晃滉一作洗瀁冰砌歩青熒音螢選眩耀青熒獨有虞庠客無由拾落蓂孫曰白虎通曰日度得其分則蓂莢生於階間蓂莢者樹名月一日一莢生十五日畢十六日一莢去三十日畢亦見帝王世紀詠雪贈張籍樊曰此詩自松篁遭挫抑以下語專以譏時相終以意示張籍曰惟子能諳爾諸人得語哉又曰傳示及提孩其有所譏也審矣只見縱横落只或作祇寧知逺近來飄颻還自弄歴亂竟誰催座暖銷那怪池清失可猜坳中初葢底垤處遂成堆劉貢父云歐陽永叔與江鄰幾論此詩以隨車翻縞帶躍馬散銀盃為不工而以坳中初葢底垤處遂成堆為勝且曰未知得韓意否慢有先居後慢或作漫輕多去却迴度前舖瓦隴發本積墻隈發本或作奔發穿細時雙透乘危忽半摧舞深逢坎井集早值層臺砧練終宜𢷬階紈未暇裁城寒裝睥睨城上女墻樹凍裏莓苔裝或作粧裹或作覆片片勻如翦紛紛碎若挼奴回切定非燖鵠鷺其是屑瓊瑰緯繣上音徽下呼麥切緯繣垂戾也屈原曰忽緯繣其難遷觀朝蕚㝠茫瞩晚埃當牕恒凛凛出户即皚皚五來切壓野榮芝菌壓或作潤傾都委貨財娥嬉䟽恒娥䟽遊也華蕩瀁瀁或作漾胥伍子胥怒浪崔嵬磧七迹切迥疑浮地雲平想輾雷隨車翻縞帶逐馬散銀盃萬屋漫汗上音暪下音寒大水也合千珠照曜開松篁遭挫抑或作折方云公時以栁間事下遷疑寄意于時宰也説今按此詩無嵗月方恐未必然糞壤獲饒培隔絶門庭遽擠排陛級纔豈堪禆嶽鎮强欲效鹽梅隠匿瑕疵盡包羅委瑣該誤雞宵呃喔呃喔二音雞聲也誤或作悞驚雀暗徘徊浩浩過三暮悠悠帀九垓風俗通十苑曰經十經曰垓國語天子之田九垓以食兆民孫曰垓極也九州之極處曰垓鯨鯢陸死骨玉石火炎灰厚慮填溟壑髙愁㨖音致刺也指也至也斗魁日輪埋欲側坤軸壓將頽岸類長蛇攪岸類或作堰似攪或作擾陵猶巨象豗音灰鬬也水官夸傑黠木氣怯肧鋪胚切懐胎一月也胎著地無由巻連天不易推他回切龍魚冷蟄苦虎豹餓號哀巧借奢華便專繩困約災威貪陵布被光肯離金罍離或作雜賞玩捐他事歌謡放我才狂敎詩硉矹上勒沒切下音兀豪放貌興與酒陪鰓蘇來切兀或作杌陪鰓方云怒張貌字見潘岳射雉賦樊李校作毰毸惟子能諳耳諸人得語哉助留風作黨勸坐火為媒雕刻文刀利搜求智網恢莫煩相屬和傳示及提孩酬王二十舍人雪中見寄方云王涯為舍人見王適墓誌本傳畧之今作仲舒非今按王二十涯亦見諱行録三日柴門擁不開階平庭滿白皚皚平庭或作庭平今朝蹋作瓊瑶跡為有詩從鳳沼來從或作仙送侯喜巳作龍鍾後時者懶於街裏蹋塵埃如今便别長官去直到新年衙日來長官或作官長非是學諸進士作精衛銜石填海山海經云赤帝之女溺于東海化為寃禽名曰精衛銜西車山木石以填東海鳥有償寃者終年抱寸誠口銜山石細心望海波平渺渺功難見區區命巳輕人皆譏造次我獨賞專精豈計休無日惟應盡此生何慙刺客傳不著報讐名奉酬振武胡十二丈大夫諸本無奉字胡証也傳云河東人元和九年党項屢擾邊証以儒而勇由諫議大夫選拜振武軍節度使傾朝共羡寵光頻半嵗遷騰作虎臣戎斾暫停辭社樹諸本作弩矢前驅煩縣令方从閣本云趙璘因話録曰胡証建節赴振武過河中時趙中儒為帥証持刺稱百姓入謁獻詩曰詩書入京國旌節過鄉闗若用今語亦非胡公敬桑梓之意閣本多出於公晚嵗所定今按方意甚善但其言閣本為晚年所定者為無據耳里門先下敬鄉人横飛玉盞家山曉逺蹀音牒躞蹀行貌謂行春也楚詞衆踕蹀而日進金珂塞草春自笑平生誇膽氣不離文字鬢毛新奉和庫部盧四兄曹長元日朝迴盧汀也郎洪曰國史補云兩省相呼為閣老尚書丞相呼為曹長郎中員外御史補遺相呼為院長上兼下下不可兼上唯御史相呼為端公然退之呼盧庫部為曹長張功曹為院長則上下亦通稱也天仗宵嚴建羽旄建或作樹春雲送色曉雞號金爐香動螭頭暗韓曰唐制起居郎舍人分侍左右夾香案立直志第一螭首和墨濡筆即坳處時號螭頭見百官玉佩聲來雉尾髙孫曰雉尾扇名天子出則御者持之引於庭上樊曰唐制人君舉動必以雉尾扇障面小團雉尾扇四方雉尾扇十二見儀衛志戎服上趨承北極儒冠列侍映東曹太平時節難身遇難身或作身難郎署何須歎二毛寒食直歸遇雨寒食時看度春遊事已違風光連日直隂雨半朝歸朝或作晴不見紅毬上孫曰劉向别録曰􅀈鞠黄帝所造本兵勢也或云起於戰國鞠與毬同紅毬以紅帛為之那論綵索飛孫曰古今藝術圖曰北方山戎寒食日用鞦韆為戱以習輕趫者綵索即謂鞦韆惟將新賜火孫曰周禮季春出火即賜火也向曙著朝衣送李六協律歸荆南早日羇遊所春風送客歸栁花還漠漠江燕正飛飛歌舞知誰在賔僚逐使非宋亭池水緑莫忘蹋芳菲題百葉桃花知制誥時作百葉雙桃晚更紅窺牕映竹見玲瓏窺方作歸或作臨今從嘉祐杭本應知侍史歸天上應劭漢官儀曰尚書入直臺廨中給侍侍史一人女侍史二人皆選端正者史從至止車門還女侍史潔被服執香爐燒薫以從入臺中給使護衣服也天上謂内庭公以考功郎中知制誥寓直禁掖故云故伴仙郎宿禁中春雪新年都未有芳華二月初驚見草芽白雪却嫌春色晚故穿庭樹作飛花戯題牡丹幸自同開俱隠約何須相倚鬭輕盈陵晨併作新粧面對客偏含不語情雙燕無機還拂掠游蜂多思正經營正方作近長年是事皆抛盡今日欄邊暫眼明盆池老翁真個似童兒汲水埋盆作小池一夜青蛙鳴到曉恰如方口釣魚時方或作枋方云唐属衛州桓温敗枋頭乃其地也公此詩與送李愿詩只作方口之今按公盤谷詩因及方口燕州則二處皆盤谷旁近小地名耳盤谷在孟州濟原縣孟州東過懐州乃至衛州而濟原又在孟州西北四十里則遊盤谷者安得在衛州之枋頭乎方説非是莫道盆池作不成洪曰劉貢父云退之古詩髙卓至律詩雖可稱善要有不工者老翁真個似童兒此真諧語為戯耳或云盆池詩有天工如拍岸才添水數瓶一夜青蛙鳴到曉非意到不能作也藕梢初種巳齊生從今有雨君須記來聽蕭蕭打葉聲有雨或作雨洒瓦沼晨朝水自清小蟲無數不知名忽然分散無蹤影惟有魚兒作隊行惟方作為泥盆淺小詎成池夜半青蛙聖得知聖或作聽一聽暗來將伴侣不煩鳴喚鬭雄雌池光天影共青青拍岸纔添水數缾且待夜深明月去試看涵泳幾多星明或作乘芍藥浩態狂香昔未逢紅燈爍爍緑盤籠紅燈喻花盤籠喻葉覺來獨對情驚恐身在天宫第幾重情或作忽奉和虢州劉給事使君三堂新題二十一詠并序或無奉新題三字方云劉伯芻以元和八年出刺乳州白樂天有制詞虢州刺史宅連水池竹林往往為亭臺島渚目其處為三堂劉兄自給事中出刺此州在任逾嵗職修人治州中稱無事頗復增飾從子弟而遊其間又作二十一詩以詠其事流行京師文士爭和之余與劉善故亦同作新亭湖上新亭好公來日出初水紋浮枕簟紋一作文瓦影䕃龜魚流水汩汩越筆切又音骨幾時休從春復到秋只言池未滿池滿强交流只或作祇竹洞竹洞何年有公初斫竹開洞門無鎻鑰俗客不曾來月臺南館城隂闊東湖水氣多直須臺上看始奈月明何渚亭自有人知處那無歩往蹤莫教安四壁面面看芙蓉竹溪藹藹溪流慢慢或作漫梢梢岸篠長篠或作竹穿沙碧簳古旱切淨落水紫苞香北湖聞説遊湖棹尋常到此迴應留醒心處凖擬醉時來凖或作准俗字花島蜂蝶去紛紛香風隔岸聞欲知花島處水上覔紅雲栁溪栁樹誰人種行行夾岸髙莫將條繫纜著處有蟬號西山新月迎宵挂晴雲到晩留為遮西望眼終是懶迴頭竹逕無塵從不掃有鳥莫令彈若要添風月應除數百竿荷池風雨秋池上髙荷葢水繁未諳鳴摵摵那似巻翻翻稻畦罫布畦堪數罫或作卦布或作圃方云罫博局上方目也字見選博奕論今按博局當云棊局桓譚新論守邊隅趨作罫以自生于小地枝分水莫尋魚肥知巳秀鶴沒覺初深栁巷栁巷還飛絮春餘幾許時吏人休報事公作送春詩花源或作原源上花初發公應日日來丁寧紅與紫慎莫一時開莫或作勿北樓郡樓乘曉上盡日不能迴晩色將秋至長風送月來鏡潭非鑄復非鎔泓澄忽此逢魚蝦不用避只是照蛟龍孤嶼朝遊孤嶼南暮戲孤嶼北所以孤嶼鳥與公盡相識方橋非閣復非船可居兼可過君欲問方橋方橋如此作方云白樂天皮日休詩皆自注四音佐蠧今按廣韻作造也將祚切而荀子肉腐出虫魚枯生貪利忘身禍烖乃作及㢘范五袴之謡皆巳為此音矣然讀如佐者又將祚切之訛而世俗所用以人以故而切為將祚者又字之俗作也梯橋乍似上青㝠初疑躡菡蓞自無飛仙骨欲度何由敢月池寒池月下明新月池邊曲若不妬清妍却成相映燭遊城南十六首方云十六詩非一日所作編者類次賽神白布長衫紫領巾差科未動是閑人麥苗含穟桑生葚共向田頭樂社神題于賔客莊榆莢古偏切榆莢亦謂之榆錢車前上尺遮切陸機云馬舄一名車前一名當道在牛跡中生葢地皮薔薇蘸水筍穿籬馬蹄無入朱門跡縱使春歸可得知晚春草樹知春不久歸草樹一作草木百般紅紫鬬芳菲楊花榆莢無才思惟解漫天作雪飛落花巳分將身著地飛那羞踐蹋損光暉無端又被春風誤吹落西家不得歸楸樹幾嵗生成為大樹一朝纒繞困長藤誰人與脱青羅帔看吐髙花萬萬層幸自枝條能樹立可煩蘿蔓作交加可或作何傍人不解尋根本却道新花勝舊花傍或作遊風折花枝浮豔侵天難就看清香撲地只遥聞只或作可春風也是多情思故揀繁枝折贈君㨂或作折折或作將贈同遊諸本無此篇方云杭蜀本皆闕惟唐本有之且属在此喚起牕全曙催歸日未西洪曰魯直云吾兒時每哦此詩而不了解其意自出峽來吾年五十八矣時春曉偶憶此詩方悟之喚起催歸二禽名也古人於小詩用意精深如此况其大者乎葢其學問淵源有五石六鷁之㫖催歸子規也喚起聲如人絡絲圓轉清亮偏於春曉鳴江南謂之春喚補注復齋謾録云予嘗讀唐顧渚記曰顧渚山中有鳥如鸜鵒而色蒼每至正二月作聲云春起也三四月云春去也採茶人呼為喚春鳥然則喚起之名唐人説矣豫章不舉為証何耶無心花裏鳥更與盡情啼贈張十八助教喜君眸子重清朗攜手城南歴舊遊忽見孟生題竹處相看涙落不能收題韋氏莊昔者誰能比今來事不同寂寞青草曲散漫白榆風架倒藤全落籬崩竹半空寧須惆悵立翻覆本無窮須一作知晚雨㢘纎晚雨不能晴方从蜀本作晚雨亷纎於律不諧當從諸本池岸草間蚯蚓鳴投竿跨馬蹋歸路纔到城門打鼓聲出城暫出城門蹋青草逺於林下見春山應須韋杜家家到祇有今朝一日閑把酒擾擾馳名者誰能一日閑我來無伴侣把酒對南山對或作謝嘲少年直把春償酒都將命乞音氣花祇知閑信馬不覺誤隨車楸樹青幢紫葢立童童細雨浮煙作綵籠不得畫師來貌取定知難見一生中貌或作邈方云此猶少陵貌得山僧及童子之貌今按貌音邈遣興遣或作逺斷送一生惟有酒尋思百計不如閑莫憂世事兼身事須著人間比夢間别本韓文考異巻九欽定四庫全書别本韓文考異巻十宋王伯大重編律詩凡八十首諸本作七十九首方從蜀本送李尚書赴襄陽八韻得長字李遜也帝憂南國切改命付忠良壤畫星揺動旗分獸簸揚五營兵轉肅孫曰謂禁掖後漢張奐率五營士圍竇武千里地還方控帶荆門逺飄浮漢水長賜書寛屬郡或作部戰馬隔隣疆縱獵雷霆迅觀棊玉石忙風流峴胡典切樊曰羊祜每風景必造峴山置酒謂從事鄒湛曰自有宇宙便有此山首客花豔大堤倡韓曰宋隨王誕為襄陽郡聞諸女歌因為詞曰朝發襄陽城暮至大堤曲大堤諸女貌花豔驚郎目富貴由身致誰教不自强和席八十二韻席夔絳闕銀河曙東風右掖春韓曰應劭漢官儀中書為右曹稱西掖孫曰正門之兩旁曰掖官隨名共美花與思俱新綺陌朝遊間綾衾夜直頻孫曰漢官典職儀曰尚書郎入直供青綾白綾被直宿直也横門開日月髙閤切星辰庭變寒前草天銷霽後塵溝深通苑急栁色壓城勻綸綍謀猷盛方云李本校謀作謨然閤本只作謀考之周書作謀為是但謨古字作􅀢李涪刋誤曰舊作嘉謨今作嘉謀猶沈浮二音通也丹青步武親芳菲含斧藻孫曰文餘也楊子吾未見斧藻其徳若斧藻其楶者光景暢形神傍砌看紅藥樊曰謝眺中書省詩紅藥當堦翻紅藥芍藥也席八為舍人故公有此句巡池詠白蘋孫曰栁渾為吴興太守有江南曲云汀洲採白蘋日落江南春詩意以席比栁渾也多情懐酒伴懐或作怯餘事作詩人倚玉難藏拙玉或作市吹竽久混真坐慙空自老江海未還身和武相公早春聞鸎早晚飛來入錦城誰人教解百般鳴春風紅樹驚眠處似妬歌童作豔聲太安池闕遊太平公主山莊諸本無此題方從唐本太安池下增闕字而别出此題云晁本李謝本所校並同
