body:
  text: 瘞硯銘銘或作文隴西李觀元賔始從進士貢在京師或貽之硯既四年悲歡窮泰未嘗廢其用凡與之試藝春官實二年登上第行于襃谷此下或有間字役者劉􅉙誤墜之地毁焉乃匣歸埋于京師里中昌黎韓愈其友人也贊且識云土乎質陶乎成器復其質非生死類全斯用毁不忍棄斯閤作期非是埋而識之仁之義硯乎硯乎與瓦礫異毛頴傳洪曰退之毛頴傳栁子厚以為怪予以為子虛烏有之比其流出於莊周寓言舊史云愈作毛頴傳譏戱不近人情此文章之甚紕繆者天下有識者固少而舊史所見如此可發一笑樊曰李肇國史補謂公此傳其文尤髙不下遷史談藪亦謂此傳似太史公筆毛頴者中山人也其先明眎與視同禮兔曰明視佐禹治東方土句養萬物有功因封于卯地死為十二神治方作理土方作吐屬下句云孔氏之書注曰土能吐生百榖義取此今按東方卯位此正為下文封於卯地死為十二神而言也然兔與卯皆不屬土與方所引孔説不合又不見其所吐何者可養萬物兼治東方為句語意亦似未足惟參同契云兔者吐生光則兔乃有吐義然似亦只與下文當吐而生之説相表裏止是自吐其子而無吐養萬物之意未見其必可据也若作治東方土而自為一句但以平水土而言則於語勢無闕而下句養萬物有功為奏庶鮮食之義意亦自明故今且從諸本其以十二物為十二神相承已乆亦未見所從來并闕之以竢知者嘗曰吾子孫神明之後不可與物同當吐而生已而果然當吐而生見本草明眎八世孫䨲乃侯切補注兔子也論衡曰兔䑛毫而孕及其生子從口而出名曰嬎音販俗呼曰䨲世傳當殷時居中山得神仙之術能匿光使物竊姮娥騎蟾蜍入月其後代遂隠不仕云䨲方云蜀本音奴鈎切爾雅兔子嬎郭注云俗呼曰􅂒䨲與􅀈同居東郭者曰㕙七旬切狡兔也狡而善走與韓盧争能盧不及盧怒與宋鵲謀而殺之醢其家者下或有號東郭三字或有號東郭㕙而無曰字方云説文狡兔曰㕙戰國䇿作逡鵲或作促方云廣雅曰韓盧宋鵲犬屬字林促音鵲宋良犬也秦始皇時䝉將軍恬南伐楚次中山將大獵以懼楚中山在秦東北非伐楚所當次也此固寓言然亦不為無失召左右庶長與軍尉以連山筮之得天與人文之兆方無右字非是筮者賀曰今日之獲不角不牙衣褐之徒缺口而長鬚八竅而趺音夫足付居獨取其髦簡牘是資天下同其書秦其遂兼諸侯乎方云筮詞皆用古韻詩祈父予王之爪牙靡所止居古牙吾通髦與資亦然一云崔豹古今注䝉恬造筆以柘木為管鹿毛為柱羊毛為被非兔毫也公豈他有所自邪今按髦資與居叶今北人語猶謂毛為謨公作董生詩咨與書漁叶皆可證也遂獵圍毛氏之族拔其豪載頴而歸獻俘于章臺宫聚其族而加束縳焉豪方作毫非是下之毫同秦皇帝使恬賜之湯沐而封諸管城號曰管城子或無曰字日見親寵任事頴為人强記而便敏自結繩之代以及秦事無不纂録隂陽卜筮占相醫方族氏山經地志字書圖畫九流百家天人之書及至浮圖老子外國之説皆所詳悉又通于當代之務官府簿書市井貨錢注記惟上所使自秦皇帝及太子扶蘇胡亥丞相斯中軍府令髙下及國人無不愛重皇上或有知字相下或有李字又善隨人意正直邪曲巧拙一隨其人雖見廢棄終黙不洩雖下或有後字惟不喜武士然見請亦時往累拜中書令與上益狎上嘗呼為中書君上親決事以衡石自程雖宫人不得立左右獨頴與執燭者常侍上休方罷頴與綘人陳𤣥𢎞農虢州唐絳州貢墨虢州貢瓦硯㑹稽貢紙故借名之陶泓及㑹稽褚先生友善相推致其出處必偕上召頴三人者不待詔輒俱往上未嘗怪焉後因進見上將有任使拂拭之因免冠謝上見其髮秃又所摹畫不能稱上意摹方作謩上嘻笑曰中書君老而秃不任吾用嘻或作喜非是吾嘗謂君中書君今不中書邪君今君或作而對曰臣所謂盡心者因不復召歸封邑終于管城其子孫甚多散處中國夷狄皆冒管城惟居中山者能繼父祖業太史公曰毛氏有兩族其一姬姓文王之子封於毛所謂魯衛毛􅅨者也戰國時有毛公毛遂獨中山之族不知其本所出子孫最為蕃昌方無為字春秋之成見絶於孔子而非其罪及䝉將軍拔中山之豪始皇封諸管城世遂有名而姬姓之毛無聞豪方作毫非是諸或作之頴始以俘見卒見任使見或作幸秦之滅諸侯頴與有功賞不酬勞以老見疎秦真少恩哉下邳侯革華傳方云閤本無此篇劉龍圖煜云或言此篇不類退之文及得本校果無趙璘因話録謂革華傳稱韓文公皆後人所誣是唐人已知其偽然杭本文粹皆録洪謂始録於歐公非也今按此當全篇刪去送窮文洪曰予嘗見文宗備問云顓頊髙辛時宫中生一子不着完衣號為窮子其後正月晦死宫人葬之相謂曰今日送窮子自爾相承送之又唐四時寳鑑云髙陽氏子好衣弊食麋正月晦巷死世作麋弃破衣是日祝於巷曰除貧也補注張文潛曰公送窮文盖出子雲逐貧賦大概擬前人文章如子雲解嘲擬宋玉答客難退之進學解擬子雲解嘲栁子厚晉問擬枚乘七發皆文章之美也晁無咎取公此文於續楚詞系之曰愈以屢窮不遭時若有物馬為之故托於鬼嘑彼窮我者車船飲食謝而逺之而窮不可去也則燒車與船延之上坐亦卒歸於正義云元和六年正月乙丑晦主人使奴星孫曰星公之奴名結栁作車草為船載糗去從切又丘救切祝曰熬米爾雅云麥也周禮糗粉餈粻粻糧也之良切輿糧奴星或有復出星字輿或作與牛繫軛下引帆上檣軛音尼車轅之前牛繫軛下言車引帆上檣言船也三揖窮鬼而告之曰聞子行有日矣鄙人不敢問所塗竊具船與車備載糗粻日下方無矣字竊或作躬日吉時良利行四方子飯一盂子啜一觴攜朋挈儔去故就新駕塵彍音霍又廓郭二音張弩也風與電争先子無底滯之尤我有資送之恩子等有意于行乎屏息潛聴如聞音聲若嘯若啼􅒂呼虢切歘許勿切云暴起廣嚘於求切歎也嚶於耕切毛髮盡豎竦肩縮頸疑有而無乆乃可明若有言者曰吾與子居四十年餘子在孩提吾不子愚子學子耕求官與名惟子是從不變于初門神戸靈我叱我呵包羞詭道志不在他子遷南荒熱爍濕蒸我非其鄉百鬼欺陵太學四年朝虀暮鹽惟我保汝人皆汝嫌自初及終未始背汝心無異謀口絶行語於何聴聞云我當去是必夫子信讒有間于予也我鬼非人安用車船鼻齅臭香糗粻可捐單獨一身誰為朋儔子茍備知可數已不不甫鳩切已與以同以又與與同子能盡言可謂聖智情狀既露敢不迴避迴或作曲主人應之曰子以吾為真不知也邪子之朋儔非六非四朋儔方作儔朋六方作三非是在十去五滿七除二各有主張私立名字捩力結切拗捩也手覆羹轉喉觸諱凡所以使吾面目可憎語言無味者皆子之志也目方作貌其名曰智窮矯矯亢亢惡圓喜方羞為姦欺不忍害傷其次曰學窮傲數與名摘抉上他歴切下於决切摘發也抉出也杳㣲髙挹羣言執神之機又其次曰文窮曰文上或有名字不專一能怪怪竒竒不可時施祗以自嬉又其次曰命窮影與形殊面醜心妍利居衆後責在人先又其次曰交窮磨肌戛骨吐出心肝企足以待置我讎寃凡此五鬼為吾五患饑我寒我興訛造訕能使我迷人莫能間朝悔其行暮已復然蠅營營蠅聲詩營營青蠅狗茍驅去復還洪曰魏王思性急嘗執筆作書蠅集筆端驅去復來思怒逐蠅不得還乃取筆擲地言未畢五鬼相與張眼吐舌跳踉偃仆抵掌頓脚失笑相顧徐謂主人曰子知我名凡我所為驅我令去小黠大癡補注筆墨間録曰予讀抱朴子云小黠大愚洪駒父曰非也小黠大癡三國志自有全文方云淮南子人不小學不大迷不小慧不大愚乂抱朴子凡人多以小黠而大愚人生一世其乆幾何吾立子名百世不磨小人君子其心不同惟乖於時乃與天通惟或作雖非是攜持琬琰易一羊皮飫於肥甘慕彼糠糜天下知子誰過於予雖遭斥逐不忍子疎謂予不信請質詩書主人於是垂頭喪氣上手稱謝燒車與船延之上座之或作入鱷魚文鱷或作鰐朱居靖秀水閒居録云鱷魚之狀龍呴虎爪蟹目鼉鱗尾長數尺末大如箕芒刺成鈎仍有膠粘多於水濵潛伏人畜近以尾撃取盖猶象之任鼻也維年月日或作維元和十四年四月二十四云潮州刺史韓愈使軍事衙推秦濟以羊一猪一投惡谿之潭水以與鱷魚食而告之曰昔先王既有天下列山澤罔繩擉初朔切莊子冬則擉鼈於江是也刃以除蟲蛇惡物為民害者驅而出之四海之外列新書作迾方云音力制反遮道也罔作網或作綱方云莊子擉之言刺也字從手之外方無之字及後王徳薄不能逺有則江漢之間尚皆棄之以與蠻夷楚越方無後王二字或無蠻字况潮嶺海之間去京師萬里哉潮方作湖而無海字或作嶺海而并無潮湖字今按此言潮州乃嶺海之間去京師逺也但公於潮州亦有祭太湖神文則只作湖嶺亦通更詳之鱷魚之涵淹卵育于此亦固其所今天子嗣唐位神聖慈武今宇閤本在子下非是四海之外六合之内皆撫而有之况禹跡所揜揚州之近地潮州於古為揚州之境刺史縣令之所治出貢賦以供天地宗廟百神之祀之壤者哉鱷魚其不可與刺史雜處此土也刺史受天子命守此土治此民而鱷魚睅戸版切出目貌左傳曰睅其目然不安谿潭據處食民畜熊豕鹿麞以肥其身以種其子孫與刺史抗拒争為長雄睅然方云左氏睅其目睅目出貌安上或有下字不或作而或無處字今按此恐有脱誤疑當云睅然不去據溪潭食民豕畜云云乃是更詳之亢拒或無亢字長雄方云漢薛宣傳上黨少豪俊易長雄刺史雖駑弱亦安肯為鱷魚低首下心伈伈睍睍上悉枕切下胡典切伈懼貎睍小目貎為民吏羞以偷活於此邪心或作身方作中云洪謂中身也禮曰文子其中退然國語余左執鬼中注身也今按二本皆通然意新史作心為近故從之睍目出貌本或作睍睍息咨反視也方云或校作睆睆窮視貌莊子睆睆然在徽纆之中今按恐當作睆為是耶方作也且承天子命以來為吏固其勢不得不與鱷魚辯鱷魚有知其聴刺史言方無言字潮之州大海在其南鯨鵬之大蝦蟹之細無不容歸以生以食鱷魚朝發而夕至也今與鱷魚約盡三日其率醜類南徙于海以避天子之命吏三日不能至五日五日不能至七日七日不能是終不肯徙也是不有刺史聴從其言也不然則是鱷魚冥頑不靈刺史雖有言不聞不知也夫傲天子之命吏不聴其言不徙以避之與冥頑不靈而為民物害者皆可殺與冥或無冥字而為方無而字刺史則選材技吏民操强弓毒矢以與鱷魚從事或無吏字必盡殺乃止其無悔别本韓文考異巻三十六欽定四庫全書别本韓文考異巻三十七宋王伯大重編行狀
