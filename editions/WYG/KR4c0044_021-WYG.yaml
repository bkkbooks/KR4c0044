body:
  text: 送石處士序孫曰洪字濬州洛陽人罷黄州録事參軍退居于洛陽十年不仕及是為河陽參謀或有赴洛陽參謀字謀或作謨或有詩字河陽軍節度御史大夫烏公為節度之三月求士於從事之賢者有薦石先生者公曰先生何如曰先生居嵩邙瀍穀之間冬一裘夏一葛食朝夕飯一盂蔬一盤或無食字人與之錢則辭請與出游未嘗以事辭勸之仕不應事辭或作事免不上或有則字坐一室左右圖書與之語道理辨古今事當否論人髙下事後當成敗若河决下流而東注若駟馬駕輕車就熟路而王良造父為之先後也若燭照數計而龜卜也東上方無而字或並無下流而東注五字熟或作夷卜或作兆大夫曰先生有以自老無求於人其肯為某來邪從事曰大夫文武忠孝求士為國不私於家方作為家方今寇聚於恒師環其疆農不耕收財粟殫亡吾所處地歸輸之塗治法征謀宜有所出收蜀本作牧歸方從閣杭本作師今按當從諸本作歸而讀作匱謂漕運也所出方從閣杭本作生出先生仁且勇若以義請而彊委重焉其何說之辭於是譔書詞具馬幣卜日以授使者求先生之廬而請焉先生不告於妻子不謀於朋友冠帶出見客拜受書禮於門内朋友方從閣杭本作其朋宵則沐浴戒行事載書冊問道所由或無則字事或作李告行於常所來徃晨則畢至張上東門外張下或有筵於二字或只有别字酒三行且起有執爵而言者曰大夫真能以義取人先生真能以道自任決去就為先生别又酌而祝曰凡去就出處何常惟義之歸遂以為先生壽真閣作其非是方從閣杭本無為先生别以下十二字今按此閣杭本由有二去就字而脫其中字遂使下句全無文理方從之誤矣又酌而祝曰使大夫無恒變其初無務富其家而飢其師無甘受佞人而外敬正士無味於諂言惟先生是聽以能有成功保天子之寵命或無敬字諂或作諍皆非是方無是字又祝曰使先生無圖利於大夫而私便其身圖方從閣本作固先生起拜祝辭曰敢不敬蚤夜以求從祝規不下或作祗字於是東都之人士咸知大夫與先生果能相與以有成也遂各為歌詩六韻退愈為之序云退或作遣蜀本云送詩元本具於此今附第四巻末送溫處士赴河陽軍序伯樂一過冀北之野而馬羣遂空夫冀北馬多天下伯樂雖善知馬安能空其羣邪多下或有於字能下或有遂字解之者曰吾所謂空非無馬也無良馬也伯樂知馬遇其良輒取之羣無留良焉茍無良雖謂無馬不為虛語矣茍無下或有留其二字雖下方從閤杭本無謂字東都固士大夫之冀北也恃才能深藏而不市者洛之北涯曰石生其南涯曰温生恃或作懐市或作賈大夫烏公以鈇鉞鎮河陽之三月以石生為才以禮為羅羅而致之幕下未數月也以温生為才於是以石生為媒以禮為羅又羅而致之幕下東都雖信多才士朝取一人焉拔其尤暮取一人焉拔其尤自居守河南尹以及百司之執事與吾輩二縣之大夫政有所不通事有所可疑奚所諮而處焉諮或作咨處或作取士大夫之去位而巷處者誰與嬉遊小子後生於何考徳而問業焉縉紳之東西行過是都者無所禮於其廬若是而稱曰大夫烏公一鎮河陽而東都處士之廬無人焉豈不可也夫南面而聽天下其所託重而恃力者惟相與將耳相為天子得人於朝廷將為天子得文武士於幕下方無朝字求内外無治不可得也方從閣杭蜀本無内外二字或作内外求無理皆非是愈縻於兹不能自引去資二生以待老今皆為有力者奪之其何能無介然於懐邪或無自字方從閣杭本無之字生既至拜公於軍門其為吾以前所稱為天下賀以後所稱為吾致私願於盡取也方從杭蜀本無至字其或作具留守相公首為四韻詩歌其事愈因推其意而序之或作焉送鄭尚書序鄭權字復常嶺之南其州七十其二十二隸嶺南節度府其四十餘分四府府各置帥然獨嶺南節度為大府大府始至方從閣杭本無下大府字四府必使其佐啓問起居謝守地不得即賀以為禮嵗時必遣賀問致水土物大府帥或道過其府府帥必戎服左握刀又屬弓矢帕莫白切詳見元和聖徳詩考異注首袴鞾許茄切迎郊郊上或有于字及既至大府帥先入據館或無先字帥守屏若將趨入拜庭之為者大府與之為讓至一再乃敢改服以賓主見適位執爵皆興拜不許乃止一下或更有至字䖍若小侯之事大國有大事諮而後行諮或作咨隸府之州離府逺者至三千里懸隔山海使必數月而後能至蠻夷悍輕易怨以變其南州皆岸大海多洲島颿音凡風一日踔勑角切又勑教切踸踔疾行皃也數千里漫瀾不見蹤迹颿或作飄控御失所依險阻結黨仇機毒矢以待將吏撞搪上徒上切下音唐搪揬也呼號以相和應蜂屯蟻雜不可爬梳好則人怒則獸黨仇或作仇黨或無將字爬梳或作把疎故常薄其征入簡節而疏目時有所遺漏不究切之長養以兒子至紛不可治乃草薙音替又音雉而禽獮之息淺切殺也秋田曰獮之盡根株痛斷乃止其海外雜國若躭浮羅流求毛人夷亶之州林邑扶南真臘于陀利之屬躭音耽孫曰山海經海外有毛民之國郭璞云吳孫權黄龍二年使人浮海來夷州亶州在海中所在絶逺卒不可至但得夷州數千人還孫曰林邑一曰環玉在交州南海行三千里真臘一曰吉蔑在林邑西此去京師二萬七百里東南際天地以萬數州或作洲或時候風潮朝貢蠻胡賈人舶音白交海中胡或作夷若嶺南帥得其人則一邊盡治不相寇盜賊殺無風魚之災水旱癘毒之患外國之貨日至珠香象犀玳瑁竒物溢於中國不可勝用故選帥常重於他鎮非有文武威風知大體可畏信者則不幸徃徃有事長慶三年四月以工部尚書鄭公為刑部尚書兼御史大夫徃踐其任鄭公嘗以節鎮襄陽入帥滄景徳棣厯河南尹華州刺史皆有功徳可稱道嘗或作常入朝為金吾將軍散騎常侍工部侍郎尚書家屬百人無數畆之宅僦屋以居可謂貴而能貧為仁者不富之效也貴而能貧方云此左氏語權本傳云用度豪侈復與此異何耶今按通鑑權家多姬妾禄薄不能贍因李訓干王守澄求節鎮得廣州此語葢譏之也及是命朝廷莫不悅將行公卿大夫士茍能詩者咸相率為詩以美朝政以慰公南行之思韻必以來字者所以祝公成政而來歸疾也祝上或無以字或祝下有使字送水陸運使韓侍御歸所治序方云考食貨志憲宗用李絳議以韓重華為振武京西營田和糴水陸運使振武乃單于大都䕶府故地後改名振武重華後名約預甘露之禍洪謂唐志無所考非也今按漢書王遵傳有治所字此所治字當乙六年冬振武軍吏走驛馬詣闕告饑公卿廷議以轉運使不得其人宜選才幹之士徃換之方無轉字吾族子重華適當其任至則出贓罪吏九百餘人脫其桎梏給耒耜與牛使耕其􅅖便近地以償所負釋其粟之在吏者四十萬斛不徴吏得去罪死假種糧齒平人有以自效莫不涕泣感奮相率盡力以奉其令而又為之奔走經營相原隰之宜指授方法為下方無之字故連二嵗大熟吏得盡償其所亡失四十萬斛者而私其羸餘得以蘇息軍不復饑私其下方有有字其或作有今按此皆非是或果有有字則當在其字上君曰此未足為天子言請益募人為十五屯屯置百三十人而種百頃令各就髙為堡東起振武轉而西過雲州界極於中受降城出入河山之際或作險六百餘里屯堡相望寇來不能為暴人得肆耕其中少可以罷漕輓之費朝廷從其議秋果倍收嵗省度支錢千三百萬八年詔拜殿中侍御史錫服朱銀或作朱今方云銀緋唐五品服其冬來朝奏曰得益開田四千頃則盡可以給塞下五城矣田五千頃法當用人七千臣令吏於無事時督習弓矢為戰守備因可以制虜庶幾所謂兵農兼事務一而兩得者也或無幾字務一或作一務兩得或作得兩大臣方持其議吾以為邊軍皆不知耕作開口望哺有司常僦人以車船自他郡徃輸乗沙逆河逺者數千里人畜死蹄踵交道費不可勝計中國坐耗而邊吏恒苦食不繼坐耗或作坐見耗虛或作坐耗虛方從閣杭本定今君所請田皆故秦漢時郡縣地其課績又已驗白若從其言其利未可遽以一二數也今天子方舉羣策以收太平之功寧使士有不盡用之歎懐竒見而不得施設也君又何憂而中臺士大夫亦同言侍御韓君前領三縣紀綱三州奏課常為天下第一行其計於邊其功烈又赫赫如此使盡用其策西北邊故所沒地可指期而有也聞其歸皆相勉為詩以推大之而屬余為序送鄭十校理序涵宰相餘慶之子祕書御府也天子猶以為外且逺不得朝夕視始更聚書集賢殿别置校讐官曰學士曰校理上下方無曰字常以寵丞相為大學士其他學士皆達官也校理則用天下之名能文學者茍在選不計其秩次惟所用之名下或有上字又或有而字由是集賢之書盛積盡祕書所有不能處其半書日益多官日益重四年鄭生涵始以長安尉選為校理人皆曰是宰相子能恭儉守教訓好古義施於文辭者如是而在選公卿大夫家之子弟其勸耳矣家下方有選字非是愈為博士也始事相公於祭酒分教東都生也事相公於東太學今為郎於都官也又事相公於居守居上或無於字三為屬吏經時五年觀道徳於前後聽教誨於左右可謂親薰而炙之矣方無後字其髙大逺密者不敢隠度論也其勤已而務博施以已之有欲人之能不知古君子何如耳方無耳字或作爾今生始進仕獲重語於天下而慊慊若不足真能守其家法矣其在門者可進賀也門下或有下字求告來寜朝夕侍側東都士大夫不得見其面於其行日分司吏與留守之從事竊載酒肴席定鼎門外盛賓客以餞之司下或有下字既醉各為詩五韻且屬愈為序詩洛字詩下或有曰字注洛上或有得字相公倦台鼎分正新邑洛正或作政才子富文華校讐天禄閣孫曰天禄獸名漢時有貢此獸者因以名閣以藏祕書壽觴嘉節過歸騎春衫薄衫方作何鳥哢音弄郭璞云鳥吟正交加楊花共紛泊親交誰不羨去去翔寥廓韋侍講盛山十二詩序孫曰韋侍講處厚字徳載自考功郎中貶開州刺史盛山郡名講或作御或作盛山唱和詩序韋侯昔以考功副郎守盛山人謂韋侯美士考功顯曹盛山僻郡奪所宜處納之惡地以枉其材韋侯將怨且不釋矣或曰不然夫得利則躍躍以喜不利則戚戚以泣若不可生者豈韋侯謂哉躍躍方從閣杭本無下躍字以下句偶之非是不利不下或有得字謂哉上或有之字韋侯讀六藝之文以探周公孔子之意又妙能為辭章可謂儒者藝下方無之字探杭作深子下方無之字皆非是夫儒者之於患難茍非其自取之其拒而不受於懐也若築河隄以障屋霤其容而消之也若水之於海冰之於夏日其翫而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲况一不快於考功盛山一出入息之間哉未幾果有以韋侯所為十二詩遺余者其意方且以入谿谷上巖石追逐雲月不足日為事讀而歌詠之令人欲棄百事徃而與之游不知其出於巴東以屬朐䏰也或無方字歌詠或作詠歌朐䏰方云說文蟲名漢中有朐䏰縣地下多此蟲因以為名朐從肉句聲考其義當作潤蠢唐韻音蠢䦞劉禹錫音屈忍漢書朐音劬通典曰開州漢之朐䏰故址也樊曰前漢志作朐䏰巴東郡縣名也方云地理志開州盛山郡義寜二年置天寳元年更名朐䏰故城在今夔州雲安縣西于時應而和者凡十人方云樊謂考下文只六人一曰和者十人而時集闕下者六人耳及此年韋侯為中書舎人侍講六經禁中諸本作及此年閣本作明年方從杭本作時年云謂此時之年也韋以元和十一年刺盛山韓以長慶一年作序閣本作明年由時字訛也今按作明年則非實作時年則不詞當從諸本作及此年則無可疑矣諸本禁中下有名處厚字和者通州元司馬為宰相洋州許使君為京兆通州白使君為中書舎人李使君為諫議大夫黔府嚴中丞為祕書監溫司馬為起居舎人皆集闕下和者下六人諸本亦各書其名云元司馬名稹許使君名康佐白使君居易李使君景儉嚴中丞武溫司馬造方從閣杭本并上文名處厚共刪十四字云蜀本側書稹康佐居易景儉造五名獨嚴不書其名今考嚴謂嚴謨時為祕書監樂天集有制詞可考諸本改作嚴武蜀本又作少監皆非也李景儉自楚州召還温造自朗州召還今皆不著其郡亦闕文也於是盛山十二詩與其和者大行於時聯為大巻家有之焉山下方有之字慕而為者將日益多則分為别巻韋侯俾余題其首石鼎聯句詩序閣本無此篇方云洪慶善曰張文潛本校與諸本特異葢原於蔡文忠也然増損太多不知得於何本今姑以杭蜀本為正今按張本多可取當附見以備㕘考元和七年十二月四日衡山道士軒轅彌明自衡下來下或作山舊與劉師服進士衡湘中相識將過太白知師服在京夜抵其居宿知下師服張本作劉或無夜字有校書郎侯喜新有能詩聲夜與劉說詩彌明在其側貌極醜白鬚黑面長頸而髙結喉中又作楚語方云蔡張本皆作長頸而結喉無髙與中字唐子西曰結古髻字也髙結當句斷漢陸賈傳尉陀魁結顔曰讀為椎髻云一撮之髻其形如椎髙結語原此今按古語自有城中好髙結不必引椎結也但道士之首加冠不作椎結讀結為髻而以喉屬下句者雖有据而非是蓋長頸故見其結喉之髙而此髙結喉中又作楚語也不然則當從蔡張本刪髙中二字喜視之若無人彌明忽軒衣張眉指鑪中石鼎謂喜曰子云能詩能與我賦此乎云方作之又無能詩二字非是劉往見衡湘間人說云年九十餘矣方本年上有其字無矣字解捕逐鬼物拘囚蛟螭虎豹不知其實能否也方無解字解張作能拘囚張作罔兩不上方有然字而無其字或無否字見其老頗貌敬之不知其有文也聞此說大喜即援筆題其首兩句次傳於喜喜踴躍即綴其下云云張無說字即方作既於下兩喜字張本並作侯方無下字道士啞然鳥格切笑聲笑曰子詩如是而已乎即袖手聳肩倚北牆坐謂劉曰吾不解世俗書子為我書袖方從杭蜀本作抽倚或作旁或無坐字解或作能後同子能上方有弟字我書下有吾句字因髙吟曰龍頭縮菌蠢上求苑切退縮皃張衡曰芝房菌蠢生其隈豕腹漲彭亨初不似經意詩旨有似譏喜不似張本作似非又疑當一作似不二子相顧慙駭欲以多窮之即又為而傳之喜喜思益苦務欲壓道士每營度欲出口吻聲鳴益悲操筆欲書將下復止竟亦不能竒也二子張作一人喜下方無思字度下或無欲字欲書張作而書畢即傳道士道士髙踞大唱曰劉把筆吾詩云云或無詩字張本作劉進士把筆則又髙吟云云其不用意而功益竒此從張本下四字方作益切竒出非是或疑其當作句不可附說語皆侵劉侯喜益忌之劉與侯皆已賦十餘韻彌明應之如響皆頴脫含譏諷夜盡三更二子思竭不能續因起謝曰尊師非世人也某伏矣願為弟子不敢更論詩侵劉下方無侯字夜盡三更諸本在不能續之下下更有一子二字此從張本方從杭蜀本文粹無益忌至譏諷二十四字及思竭不能續五字但有喜字屬上句又盡作益二子二字不便連因起謝張本又以盡為蓋而一本併無盡益蓋三字今按方本簡嚴諸本重複然簡嚴者似於事理有所未盡而重複者乃得見其曲折之詳但今恐有漏落故且從諸本及張本而方本固在其中但方本語侵劉喜劉既書姓喜不當獨書名恐劉下本有侯字而下文别有喜字之誤也諸本喜益忌之之下復云劉與侯皆已賦十餘韻語亦太冗張本夜盡三更四字屬於含譏諷之下固善然似不若移於喜益忌之下此皆未敢自以為然讀者詳之非世人也或無世字或作非世人能出也張本某下有等字伏字或作服道士奮曰不然章不可以不成也奮下或有髯字或有目字或有然字今按恐或有髥字又謂劉曰把筆來吾與汝就之或無來字方無吾與汝就之五字即又唱出四十字為八句書訖使讀讀畢謂二子曰章不已就乎二子齊應曰就矣張無即字出或作書非是訖使方作止即下讀字張本作之屬上句方無下字道士曰此皆不足與語此寧為文邪吾就子所能而作耳非吾之所學於師而能者也吾所能者子皆不足以聞也獨文乎哉吾語亦不當聞也吾閉口矣此皆或作子皆就下方無子字作下或有之字耳方作以吾所能或作吾所聞語下張本有子字二子大懼皆起立牀下拜曰不敢他有問也願聞一言而已張無皆字先生稱吾不解人間書敢問解何書請聞此而已道士寂然若無聞也方無敢問解何書五字請問下十三字張本但存寂然二字無十一字累問不應二子不自得即退就座道士倚牆睡鼻息如雷鳴二子怛當割切悲慘也然失色不敢喘斯須曙鼓鼕鼕音彤鼓聲二子亦困遂坐睡喘上張本有少字方無遂坐睡三字及覺日已上驚顧覔道士不見上張本作出方無驚字即問童奴奴曰天且明道士起出門若將便旋然奴怪久不返即出到門覔無有也童張本作僮奴曰上張有童字張無到門字覔下有之字二子驚惋烏貫切驚歎也自責若有失者間遂詣余言余不能識其何道士也嘗聞有隠君子彌明豈其人耶韓愈序石鼎聯句詩或無此題巧匠斵山骨刳中事煎烹師服直柄未當權塞口且吞聲喜龍頭縮菌蠢豕腹漲彭亨彌明外苞乾蘚文中有暗浪驚師服在冷足自安方從杭蜀文粹作安自足既無文理對偶又差方本誤改多類此遭焚意彌貞喜謬當鼎鼐間妄使水火爭彌明大似烈士膽圓如戰馬纓師服上比香爐尖下與鏡面平喜秋瓜未落蔕凍芋強抽萌彌明一塊元氣閉細泉幽竇傾師服不值輸寫處焉知懐抱清喜方當洪鑪然益見小器盈彌明睆睆華綰切潮本作皖莊子睆睆然有纒之中亦作宛宛無刃迹團團類天成師服遙疑龜負圖出曝曉正晴喜旁有雙耳穿雙或作隻上為孤髻撑諸本此下無彌明字今按此似二子譏道士之詞恐實非彌明語或訝短尾銚徒弔切又似無足鐺初耕切燒器師服可惜寒食毬擲此傍路坑喜何當出灰灺徐也切燭燼也無計離瓶罌彌明陋質荷斟酌狹中愧提擎師服豈能煮仙藥但未汙羊羮喜形模婦女笑度量兒童輕彌明徒示堅重性示方作爾不過升合盛師服過方作合合或作斗盛或作成傍似廢轂仰傍方作仍側見折軸横喜時於蚯蚓竅微作蒼蠅鳴彌明以兹翻溢愆以兹或作忽罹實負任使誠師服常居顧眄地敢有漏洩情喜寧依暖熱弊不與寒凉并彌明區區徒自效𤨏𤨏不足呈喜諸本此下無喜字回旋但兀兀開闔惟鏗鏗師服全勝瑚璉貴空有口傳名豈比俎豆古不為手所撜方云撜徒庚切博雅曰探也淮南子子路撜溺而受牛謝注撜舉也平上聲通洪本一作掁磨礱去圭角浸潤著光精願君莫嘲誚此物方施行四韻並彌明所作又年譜云或謂軒轅寓公姓彌明寓公名葢以文滑稽耳是不然劉侯雖皆公門人然不應譏誚如是之甚且言彌明形皃聲音之陋亦豈公自詞耶而列仙傳又有彌明傳要必有是人矣今按此詩句法全類韓公而或者所謂寓公姓名者盖軒轅反切近韓彌字之義又與愈字相類即張籍所譏與人為無實駁雜之說者也故竊意或者之言近是洪氏所疑容皃聲音之陋乃故為幻語以資笑謔又以亂其事實使讀者不知覺耳若列仙傳則又好事者因此序而附著之尤不足以為据也别本韓文考異巻二十一欽定四庫全書别本韓文考異巻二十二宋王伯大重編祭文祭田横墓文貞元十一年九月愈如東京道出田横墓下十一年諸本或作十九年月下有十一日字如東京或作東如京洪氏曰東京洛陽也公以貞元十一年出長安至河陽而後如東都也十九年秋則公為御史是冬即貶陽山安得以九月出横墓下唐都長安亦不得云東如京也方從閣杭蜀本作東如京云田横墓在􅅯師户鄉洛陽東三十里今公自河陽道横墓下以入洛故云東如京也今按洪氏作如東京及考嵗月皆是方氏亦以京為洛陽但據三本必欲作東如京為誤耳今且未須别考它書只以其所引田横墓在洛陽東者論之則自墓下而走洛陽乃是西向安得言東如京乎況唐都長安謂洛陽為東京則可直謂之京則不可其理又甚明若據元和郡國志則河陽西南至河南府八十里其大勢亦不得云東如京也此又三本謬誤之一證故復表而出之感横義髙能得士因取酒以祭為文而弔之士下或有心字其辭曰事有曠百世而相感者余不自知其何心非今世之所稀孰為使余歔欷而不可禁今既博觀乎天下曷有庻㡬乎夫子之所為死者不復生嗟余去此其從誰死者或作死而生方作來皆非是當秦氏之敗亂得一士而可王何五百人之擾擾而不能脫夫子於劍鋩抑所寶之非賢亦天命之有常寶之或作寶者天或作大昔闕里之多士孔聖亦云其遑遑方從閣杭無其字非是茍余行之不迷雖顛沛其何傷自古死者非一夫子至今有耿光非方從閣杭作皆非是跽陳辭而薦酒䰟髣髴而來享歐陽生哀辭歐陽詹世居閩越自詹已上皆為閩越官至州佐縣令者累累有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕今上初故宰相常衮為福建諸州觀察使治其地治上或有往字非是衮以文辭進有名於時又作大官臨蒞其民鄉縣小民有能誦書作文辭者衮親與之為客主之禮吕及公本如此方從閣杭苑粹辭進下即屬鄉縣至者衮下又有故宰相字下乃屬有名至其民又屬親與云云顛倒錯亂全無文理方云三本如此不當輕改而其蔽如此今定從吕本方主下有人字鄉縣作縣鄉則尚有可取云觀游宴饗必召與之宴或作讌與讀為預或作預或疑與如字而之下當有俱字時未㡬皆化翕然化方據新傳作仕非是詹于時獨秀出衮加敬愛諸生皆推服閩越之人舉進士繇詹始建中貞元間余就食江南未接人事往往聞詹名閭巷間詹之稱於江南也乆久下或有矣字貞元三年余始至京師舉進士聞詹名尤甚余下或有年十九字聞方作則或云當并出則聞二字亦有理八年春遂與詹文辭同考試登第始相識自後詹歸閩中余或在京師他處不見詹乆者惟詹歸閩中時為然其他時與詹離率不歴嵗移時則必合合必兩忘其所趨久然後去故余與詹相知為深詹事父母盡孝道仁於妻子於朋友義以誠氣醇以方容貎嶷嶷魚力切岐嶷然其燕私善謔以和其文章切深喜往復善自道讀其書知其於慈孝最隆也十五年冬余以徐州從事朝正於京師詹為國子監四門助教將率其徒伏闕下舉余為博士㑹監有獄不果上或無監字監或作詹觀其心有益於余將忘其身之賤而為之也嗚呼詹今其死矣詹閩越人也父母老矣捨朝夕之養以來京師其心將以有得於是而歸為父母榮也以來或作而來有得或作在得或無於是字而冇複出將以冇得乎雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟詹雖未得位其名聲流於人人其德行信於朋友方作友朋雖詹與其父母皆可無憾也詹之事業文章李翺既為之傳故作哀辭以舒余哀以傳于後以遺其父母而解其悲哀以卒詹志云之傳或作之說或作之誌故上或有余字非是悲哀方作哀悲今按上文已連有兩哀字不應如此重複或當刪去此哀字詹志或作其志求仕與友兮逺違其鄉父母之命兮子奉以行友則既獲兮禄實不豐以志為養兮何有牛羊事實既修兮名譽又光父母忻忻兮常若在旁命雖云短兮其存者長終要必死兮願不永傷朋友親視兮藥物甚良親視或作視疾飲食孔時兮所欲無妨孔或作既夀命不齊兮人道之常在側與逺兮非有不同山川阻深兮魂魄流行祭祀則及兮勿謂不通哭泣無益兮抑哀自疆益或作救推生知死兮以慰孝誠嗚呼哀哉兮是亦難忘哉下或無兮字題哀辭後方本刪此四字或作題歐陽生哀辭後愈性不喜書自為此文惟自書兩通其一通遺清河崔羣羣與余皆歐陽生友也哀生之不得位而死哭之過時而悲友上或有之字其一通今書以遺彭城劉君伉君喜古文或無書字方無伉字下君字一作伉以吾所為合於古詣吾廬而來請者八九至而其色不怨志益堅方無至字凡愈之為此文盖哀歐陽生之不顯榮於前又懼其泯滅於後也今劉君之請未必知歐陽生其志在古文耳其志上或有之志字雖然愈之為古文豈獨取其句讀不類於今者邪雖然下或有茍愛吾文必求其義八字入字下又或有則進知於歐陽生矣必時觀十一字思古人而不得見學古道則欲兼通其辭通其辭者本志乎古道者也乎或作於方從三本無道字以上下文考之無道字即不成文理矣古之道不茍譽毁於人此下或有然則吾之所為文皆有實也十一字劉君好其辭則其知歐陽生也無惑焉獨孤申叔哀辭萬物之生誰非天邪明昭昏䝉誰使然邪行何為而怒居何故而憐邪怒或作怨或作思怒下或冇邪字居或作為胡喜厚其所可薄而恒不足於賢邪將下民之好惡與彼蒼懸邪或無蒼字抑蒼茫無端而蹔寓其問邪寓下或有於字死者無知吾為子慟而已矣如有知也子其自知之矣或無自字方無之字或無自字而有之字濯濯其英􅓮􅓮其光如聞其聲如見其容此句或作如處其旁非是方云以容叶光用古韻也烏虖逺矣何日而忘烏虖或作嗚呼祭穆員外文為崔侍御作晁本篇首題云維年月日故人博陵崔愬謹以清酌之奠祭于亡友穆六端公之靈方云豈穆員邪舊傳員卒檢校員外郎杜亞留守東郡辟為從事皆與此文合新傳員終侍御史故􅄯本稱端公也於乎建中之初予居于嵩携扶北奔避盜來攻奔或作歸晨及洛師相遇一時顧我如故眷然顧之如方作無眷或作睠子有令聞我來自山子之俊明我鈍而頑俊或作畯道既云異誰從知我我思其厚不知其可知其或作知而或作可而於後八年君從杜侯我時在洛亦應其招留守無事多君子僚罔有疑忌惟其嬉游草生之春鳥鳴之朝我轡在手君揚其鑣君居于室我既來即或以嘯歌或以偃側嘯或作詠誨余以義復我以誠復我方作我復今按下文云無非德聲則此二句專指穆也當作復我終日以語無非德聲以或作與主人信讒有惑其下殺人無罪誣以成過入救不從反以為禍赫赫有聞王命三司察我于獄相從係縲曲生何樂直死何悲曲或作直直或作曲二何或皆作可非是上懷主人主方作王非是内閔其私閔或作憫方作關皆非是進退之難君處之宜君或作居非是既釋于囚我來徐州道之悠悠思君為憂我如京師君居父䘮哭泣而拜言詞不通我歸自西君反吉服晤言無他往復其昔其疑當作如不日而違重我心惻自後聞君母䘮是丁痛毒之懷六年以并孰云孝子而殞厥靈今我之至入門失聲失方作哭酒肉在前君胡不餐升君之堂不與我言於乎死矣何日來還祭郴州李使君文補注筆墨間録云祭李郴州文尤雄竒維年月日將仕郎守江陵府法曹參軍韓愈謹以清酌庶羞之奠敬祭于故郴州李使君之靈文苑此篇首又云維元和元年嵗次丙戌二月乙未朔二十四日戊午將仕郎云云使君員外二兄之靈方云考之唐厯皆合古語有之白頭如新傾盖若舊顧意氣之何如何日時之足究何或作曷當貞元之癸未惕皇威而左授未或作酉今按癸未者貞元十九年貶山陽令時也伏荒炎之下邑嗟名頽而位仆歴貴部而西邁邇清光於暫覯於或作而言莫交而情無由既不賈而奚售莫或作若或作若而下無情字哀窮遐之無徒挐百憂以自副遐或作荒窮遐或作遐荒徒方作圖辱問訊之繆綢恒飽飢而愈疚接雄詞於章句窺逸跡於篆籀直右切孫曰周宣王太史造大篆因以為名苞黄甘而致貽獲紙筆之雙貿投义魚之短韻媿韜瑕而舉秀竢新命於衡陽費薪芻於館候空大庭以見處空音控憇水木之幽茂逞英心於縱博沃煩腸以清酹航北湖之空明覷鱗介之驚透宴州樓之豁逹衆管啾而並奏啾或作湫是方云選閒居賦啾啾而並奏得恩惠於新知脫窮愁於往陋窮方作寃輟行謀於俄頃見秋月之三彀逮天書之下降猶低廻以宿留上音秀下音溜念暌離之
