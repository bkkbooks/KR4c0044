front:
  text: 酒殺羊享賓客府或作父李生則尚與其弟學讀書習文辭以舉進士為業愈於太傅府年最少故得交李生父子間公薨軍亂軍司馬從事皆死侍御亦被讒為民日南日或作山方云仁鈞以讒流愛州其後五年愈又貶陽山令今愈以都官郎守東都省侍御自衡州刺史為親王長史亦留此掌其府事官下或有貟外字王下或有府字亦留此方無留此二字留作收皆非是此謂東都蓋李亦分司也李生自湖南從事請告來覲於是太傅府之士惟愈與河南司録周君獨存其外則李氏父子相與為四人君下或有巢字外下方無則字子下方無相字離十三年幸而集處得燕而舉一觴相屬此天也非人力也侍御與周君於今為先輩成徳李生溫然為君子有詩八百篇傳詠於時成或作盛李上或有若字惟愈也業不益進行不加修顧惟未死耳徃拜侍御謁周君􅔰李生退未嘗不發媿也方無退字徃時侍御有無盡費於朋友及今則又不忍其三族之寒飢而館之疏逺畢至寒飢或作飢寒至方從文苑作在今按在乃至字之誤書史之誤用者如此方本則當作至而治道不至多言不至學古兵法之類以它書所引考之却當作在也禄不足以養李生雖欲不從事於外其勢不可得已也養下或有為自已或作止重李生之還者皆為詩愈最故故又為序云或作序之或作之序
