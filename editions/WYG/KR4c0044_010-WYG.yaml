canonical_identifier: bkk:krp/KR4c0044/WYG/v1/juan/10
seq: 10
front:
  text: 公主當年欲占春故將臺榭押城闉押或作壓欲知前面花多少直到南山不屬人少或作處
  hash: sha256:9937d966be05ffa20fd8468464a807d0b8602cd0992f879cfea3221693595bb9
body:
  text: 晚春誰收春色將歸去將歸方作歸將非是慢緑妖紅半不存慢或作漫榆莢祇能隨栁絮等閒撩亂走空園大行皇太后挽歌詞三首方云此憲宗母莊憲皇后也樊本云諸本脱太字非是一紀尊名正三時孝養榮髙居朝聖主厚徳載羣生武帳虚中禁虛或作空𤣥堂掩太平秋天笳鼓歇松柏徧山鳴威儀備吉㐫文物雜軍容配地行新祭因山託故封鳳飛終不反劒化㑹相從張華延平津事補注王介甫曰此非君臣所宜言近於黷也樊曰莊憲後顯宗崩公故云謂近乎黷非也無復臨長樂空聞報曉鐘報曉或作曉暮追攀萬國來警衛百神陪畫翣所甲切韓曰王后輦車有翣羽葢所以禦風塵登秋殿容衣入夜臺孫曰容衣䘮服䘮大記飾棺君龍帷三池振容注云青質五色畫之於絞繒而垂之以為振容容衣葢謂此韓曰選陸士衡挽歌送子長夜臺夜臺謂閑墓雲隨仙馭逺風助聖情哀助方作動非是只有朝陵日䊋奩音産與匳同鏡奩也孫曰漢明帝謁原陵見太后鏡奩中物感動悲涕左右皆泣莫能仰視一暫開廣宣上人頻見過三百六旬長擾擾百或作十不衝風雨即塵埃久慚朝士無禆補慚方作為空愧髙僧數往來學道窮年何所得吟詩竟日未能迴天寒古寺遊人少紅葉牕前有幾堆閒遊二首雨後來更好繞池徧青青栁花閑度竹菱葉故穿萍故或作亂方云少陵詩潛龍故起雲沙上燕子故來頻皆用此字獨坐殊末厭孤斟詎能醒持竿至日暮幽詠欲誰聴兹遊苦不數再到遂經旬到或作至經或作兼萍蓋汙池淨藤籠老樹新林烏鳴訝客烏或作鸎岸竹長遮鄰子雲祇自守奚事九衢塵酬馬侍郎寄酒馬總一壺情所寄四句意能多秋到無詩酒其如月色何和候協律詠笋候喜竹亭人不到新筍滿前軒乍出真堪賞初多未覺煩或作繁方云公律詩不重用韻成行齊婢僕環立比兒孫驗長常攜尺愁乾屢側盆對吟忘膳飲偶坐變朝昏帶雨膏腴濕驕陽氣候温得時方張王方云莊子所謂王長其間是也並去聲讀公與劉夢得葡萄詩皆用張王字挾勢欲騰鶱見角牛羊沒看皮虎豹存攅生猶有隙散布忽無垠詎可持籌筭誰能以理言縱横公占地羅列暗連根狂劇時穿壁羣强幾觸藩深潛如避逐方作世逺去若追奔始訝妨人路還驚入藥園萌芽防寖大覆載莫偏恩巳復侵危砌非徒出短垣身寧虞瓦礫計擬揜蘭蓀音孫香草且歎髙無數庸知上幾畨短長終不較先後竟誰論外恨苞藏宻中仍節目繁暫須迴步履要取助盤飱或作餐方云盤飱寘璧左氏語穰穰疑翻地森森競塞門戈矛頭戢戢蛇虺首掀掀婦懦咨料㨂料或作聊方云料音聊量也張湛列子序且將料簡世所希有者兒癡謁盡髠侯生來慰我詩句讀驚魂我或作意屬和才將竭呻吟至日暾他昆切日或作欲方云楚詞九嘆日暾暾其西舍亦可以日入言也過鴻溝龍疲虎困割川原億萬蒼生性命存誰勸君王回馬首真成一擲賭乾坤送張侍郎方云張賈時自兵侍為華州閣本作侍御非司徒東鎮馳書謁丞相西來走馬迎宣武節度韓𢎞為司徒馳書謂已持書往謁𢎞也丞相謂宰相裴度為淮西宣慰處置等使走馬迎謂巳走馬迎度也兩府元臣今轉宻一方逋㓂不難平贈刑部馬侍郎馬總時副晉公東征紅旗照海壓南荒徴入中臺作侍郎中臺或作臺中非是暫從相公平小冦便歸天闕致時康奉和裴相公東征途經女几山下作或無奉字旗穿曉日雲霞雜方雲作紅雜作集今按對偶及文勢當从諸本山倚秋空劒㦸明敢請相公平賊後暫㩦諸吏上崢嶸郾城晚飲奉贈副使馬侍郎及馮李二員外郾音偃郾城縣在許州或無奉字馮李謂馮宿李宗閔也閣本馮宿時以都官李宗閔時以禮部並從征城上赤雲呈勝氣蔡末平數月前吳武陵自峽石望東南氣如旗鼓矛盾皆顛倒少頃黄白氣從西北出盤蜿相交告公曰今西北王師所在黄白喜氣也敗氣為賊賊必亡矣眉間黄色見歸期幕中無事惟須飲即是連鑣向闕時酬别留後侍郎或無酬字蔡平命馬總為留後為文無出相如右謀帥難居郤縠先歸去雪銷溱洧動西來旌斾拂晴天同李二十八夜次襄城李正封也周楚仍連接川原乍屈盤雲垂天不暖塵漲雪猶乾印綬歸台室旌旗别將壇欲知迎候盛騎火萬星攅同李二十八員外從裴相公野宿西界四面星辰著地明散燒煙火宿天兵不闗破賊須歸奏自趂新年賀太平過襄城郾城辭罷過襄城穎水嵩山刮眼明巳去蔡州三百里家人不用逺來迎宿神龜招李二十八馮十七龜下或有驛字荒山野水照斜暉啄雪寒鴉趂始飛夜宿驛亭愁不睡幸來相就葢征衣次硤石諸本硤作峽方云今陜縣也地理志可考數日方離雪今朝又出山試憑髙處望隠約見潼闗和李司勲過連昌宫或作李二十八司勲無過字樊曰連昌宫按志髙宗顯慶三年置然詩落句云云疑為明皇所作而元微之連昌宫辭大㮣亦詠明皇帝夾道疎槐出老根髙甍巨桷壓山原宫前遺老來相問今是開元幾葉孫次潼闗先寄張十二閤老使君張賈荆山巳去華山來日出潼闗四扇開出或作照扇或作面刺史莫辭迎候逺相公親破蔡州迴親或作新次潼闗上都統相公韓𢎞峯本無此篇闗下或有頭字一本在雨中寄張籍候喜詩後暫辭堂印執兵權盡管諸軍破賊年冠葢相望催入相待將功徳格皇天桃林夜賀晉公西來騎火照山紅夜宿桃林臘月中手把命珪兼相印一持重疊賞元功送李員外院長分司東都去年秋露下羇旅逐東征今嵗春光動驅馳别上京飲中相顧色送後獨歸情兩地無千里因風數寄聲晉公破賊回重拜台司以詩示幕中賔客愈奉和或作晉公自蔡州入賜途中重拜云云愈因和之南伐旋師太華東天書夜到冊元功將軍舊壓三司貴相國新兼五等崇鵷鷺欲歸仙仗裏熊羆還入禁營中長慚典午非材職或作識得就閒官即至公獨釣四首釣或作酌候家林館勝偶得入垂竿曲樹行藤角平池散芡盤羽沈知食駛或作怏或作􅀈緍細覺牽難聊取夸兒女榆條繫從鞍一逕向池斜池塘野草花雨多添栁耳水長減蒲芽坐厭親刑柄時為刑部侍郎偷來傍釣車坐厭方作厭坐云厭與偷為一義坐親刑柄來弄釣車為一説公詩多此體今按坐厭與偷來為對亦自親切乂况坐厭乃常用之語韋蘇州云坐厭淮南守此類極多方從誤本更為曲説不知語意之拙澁也太平公事少吏隠詎相賒獨往南塘上秋晨景氣醒露排四岸草風約半池萍鳥下見人寂魚來聞餌馨所嗟無可召不得倒吾缾秋半百物變溪魚去不來風能坼芡觜露亦染棃顋方云廣信晁氏舊藏印本能作稜亦作液一云山谷所定逺岫重疊出寒花散亂開所期終莫至日暮與誰迴枯樹老樹無枝葉風霜不復侵腹穿人可過皮剥蟻還尋寄託惟朝􅌲依投絶暮禽猶堪持改火樊曰論語鑚燧改火馬融曰周書月令有改火之文春取榆栁之火夏取棗杏之火季夏取桑柘之火秋取柞槱之火冬取檀槐之火一年之中鑚火各異木故曰改火也未肯但空心元日酬蔡州馬十二尚書去年蔡州元日見寄之什元日新詩已去年蔡州遥寄荷相憐今朝縱有誰人領自是三峰不敢眠峰或作冬方從唐本云華岳有三峰唐人守華者皆謂之三峰守葢公西歸經從之路馬詩必有所序述今不可得而詳也今按此詩并題皆不言經由華州所作方説既無所据又三峰不敢眠亦無文理今當闕之以俟知者詠燈花同侯十一或作同侯十一詠燈花侯十一喜也今夕知何夕花然錦帳中自能當雪暖那肯待春紅黄裏排金粟諸本黄作囊方云何遜詩金粟裏搔頭蜀人史彦升曰黄裏排金謂額間花鈿也又沈約宋書漢制乘輿翠葢黄裏所謂黄屋也諸本多引漢紀注實此義今按漢制黄屋與此詩文意不同疑史説誤釵頭綴玉蟲更煩將喜事來報主人公祖席前字此詩公自題其後云兩詩何處好就中何處佳何處惡舊注云以王涯徙袁州刺史而作方云按舊紀涯刺袁州元和三年四月也公時在東都故曰祖席落橋邊出詩前後注文舊本無之蜀本亦然又或二題前字秋字上皆有得字祖席落橋邊親交共黯然野晴山簇簇霜曉菊鮮鮮書寄相思處盃銜欲别前淮陽知不薄終願早迴船方云陽本作南洪本作陽云用汲黯事以後詩有淮南字隨筆以誤也秋字淮南悲木落而我亦傷秋而或作今况與故人别那堪羇宦愁榮華今異路風雨苦同憂莫以宜春逺江山多勝遊送鄭尚書赴南海番禺上音潘下音愚廣州有番禺縣軍府盛欲説暫停盃葢海旂幢出連天觀閣開衙時龍户集韓曰南部新書長安有龍户見水色則知有龍或引出但鰕魚而巳上日馬人來韓曰後漢馬援討尋邑蠻以不能還者數十人留于象林南援所鑄銅柱下南蠻呼為馬留人見新史南蠻傳風靜鶢鶋祝曰海鳥見左傳及國語去官亷􅑕蛤迴樊曰後漢孟嘗合浦還珠事貨通師子國師子國在西海中斜二千餘里國史補云師子國船最大梯而上下數丈皆積寳貨云云樂奏武王臺武或作越方云漢傳尉佗自稱南越武王事事皆殊異無嫌屈大才荅道士寄樹雞樹雞木耳大者軟濕青黄狀可猜欲烹還喚木盤迴煩君自入華陽洞韓曰茅居傳𤣥史之洞六十三所第八句曲山之洞曰金壇華陽之天直割乖龍左耳來取譬也左遷至藍闗示姪孫湘藍闗即秦之嶢闗在今藍田縣湘字北渚筆墨問録云公此詩仁且有禮非志仁義者不能也一封朝奏九重天夕貶潮州路八千欲為聖明除弊事肯將衰朽惜殘年欲或作本肯將或作豈將方作豈於朽方作暮惜方作計雲横秦嶺家何在雪擁藍闗馬不前擁方作揜今按方本此詩於暮計揜四字皆不如諸本之勝知汝逺來應有意好收吾骨瘴江邊武闗西逢配流吐蕃嗟爾戎人莫慘然戎或作胡湖南地近保生全地近或作近地我今罪重無歸望直去長安路八千次鄧州界潮陽南去倍長沙戀闕那堪又憶家心訝愁來惟貯火眼知别後自添花商顔樊曰漢溝洫志引洛水至商顔下江商山之顔譬人之額也暮雪逢人少鄧鄙春泥見驛賒早晚王師收海嶽普將雷雨發萌芽題臨瀧寺不覺離家已五千仍將衰病入瀧船潮陽未到吾能説海氣昏昏水拍天吾能或作人先或作先聞水或作浪晚次宣溪辱韶州張端公使君惠書敘别酬以絶句二章或無辱端公絶句字韶州南去接宣溪韶或作朝非是雲水蒼茫日向西客淚數行元自落元或作先鷓鴣休傍耳邊啼兼金那足比清文百首相隨愧使君那或作安百或作白俱是嶺南巡管内莫欺荒僻斷知聞題秀禪師房橋夾水松行百步竹牀莞席到僧家松或作船牀或作林暫拳一手支頭臥還把漁竿下釣沙頭或作頥約或作晚將至韶州先寄張端公使君借圖經或無端公字曲江山水聞來久恐不知名訪倍難願借圖經將入界每逢佳處便開看每或作亦過始興江口感懐憶作兒童隨伯氏南來今只一身存目前百口還相逐舊事無人可共論韶州留别張端公使君來往再逢梅栁新孫曰元和十四年正月公以論佛骨貶潮州三月至潮州十月量移袁州十五年正月至袁州其往來上下於韶皆梅栁新時也别離一醉綺羅春久欽江總文才妙韓曰陳後主欲以江總為太子詹事孔奐曰總文華之人太子何藉於此自歎虞翻骨相屯樊曰虞翻仕吴為騎都尉數犯顔諫爭孫權不説坐徙丹陽涇縣後又徙交州嘗云自恨疎節骨體不媚犯上獲罪當長沒海隅翻字仲翔以喻巳也鳴笛急吹爭落日清歌緩送欵行人諸本爭作催欵作感方從唐本云蜀本亦作爭李云二宋評此詩小宋疑感字誤大宋初不以為然後得善本始信巳知奏課當徴拜那復淹留詠白蘋量移袁州張韶州端公以詩相賀因酬之或無端公因三字或作量移袁州酧張韶州先寄詩賀或作量移袁州張韶州先詩見賀因酧之方云題語凡四易各有義也明時逺逐事何如遇赦移官罪未除北望詎令隨塞鴈南遷纔免葬江魚將經貴郡煩留客先惠髙文謝起予暫欲繫船韶石下上賔虞舜整冠裾次石頭驛寄江西王十中丞閣老仲舒憑髙試迴首試迴方作迴馬今按下句有馬字方本非是一望豫章城人由戀徳泣由或作猶馬亦别羣鳴寒日夕始照風江逺漸平風江或作江風黙然都不語應識此時情遊西林寺題蕭二兄郎中舊堂蕭兄有女出家諸本遊作題題作故無兄字及注方云蕭蕭存也存少與韓㑹梁肅友善惡裴延齡之為人棄官歸廬山廬山令猶有蕭存魏𢎞李渤同遊大林題名中郎韓曰蔡中郎邕女名琰字文姬興平中天下䘮亂為胡騎所獲曹操痛邕無嗣以金贖之因問曰聞夫人家先多書籍猶能記憶否曰昔亡父賜書四千巻流離塗炭罔有存者今所誦憶裁四百餘篇於是繕冩送之文無遺誤有女能傳業伯道樊曰鄧收字伯道為河南太守永嘉末以石勒之亂負妻而逃擔其兒及其弟子綏恐不能兩全乃謂其妻曰吾弟早亡惟有一息理不可絶乃棄其兒而逃曰幸而得存後當有子過江仕終尚書右僕射卒以無嗣時人義而哀之曰天道無知使鄧伯道無兒無兒可保家今按因話録作無人可主家偶到匡山即廬山蕭郎中名存字伯誠穎士之子與公兄㑹厚善公自少為存所知及自袁州還過存廬山故居廬而存諸子前死有一女為尼公為紀其家西林即江州山寺也曾住處幾行衰淚落煙霞方云因話録作今日匡山過舊隠空將衰淚對煙霞自袁州還京行次安陸先寄隨州周員外諸本如此但以隨為循方從唐本云自貶所䝉恩袁州除官還京凡多六字方云如淳漢紀注曰凡言除者除故官就新官也公誌鄭澹墓曰詔授司馬節度除其官為工部尚書與此同周員外周君巢也時為隨州刺史以經由道里考之作循非是今按諸本得之唐本既顛倒重復而方云又不可曉疑袁州字當在貶字上或注在所字下循州之辨則方得之或本袁州下有除官二字亦通隨又作復當考行行指漢東暫喜笑言同雨雪離江上蒹葭出夢中面猶含瘴色眼巳見華風嵗暮難相值酣歌未可終題廣昌館白水龍飛巳幾春偶逢遺跡問耕人逢或作尋丘墳發掘當官路何處南陽有近親路或作道寄隨州周員外隨或作循或作復説巳見上陸孟丘楊久作塵蜀本楊作陽方云公與陸長源孟叔度穎楊疑及周君巢同為董晉幕客故也同時存者更誰人金丹孫曰周好金丹服餌之術栁子厚集中有答周君巢論餌藥久夀書是也别後知傳得乞取刀圭救病身酒中留上襄陽李相公謂逢吉也諸本作醉中留别襄州李相公濁水汙泥清路塵孫曰曹子建詩君若清路塵妾若濁水泥浮沉各異勢㑹合念何時濁水汙泥公以自喻清路塵以喻逢吉也還曾同制掌絲綸眼穿長訝雙魚斷耳熱樊曰楊惲書云酒後耳熱仰天附缶而呼烏烏何辭數爵頻銀燭未銷牕送曙銷或作終或作殘牕或作雞金釵半醉座添春醉或作墜許彦周云退之詩酩酊馬上知為誰又云金釵半醉座添春乃知賦梅花不獨宋廣平知公不久歸鈞軸應許閒官寄病身去嵗自刑部侍郎以罪貶潮州刺史乘驛赴任其後家亦譴逐小女道死殯之層峰驛旁山下䝉恩還朝過其墓留題驛梁諸本只作題驛梁下有注字與此題少異方從唐本數條藤束木皮棺草殯荒山白骨寒驚恐入心身巳病扶舁沿路衆知難繞墳不暇號三帀設祭惟聞飯一盤致汝無辜由我罪百年慚痛淚䦨干賀張十八祕書得裴司空馬或作酬張祕書因騎馬贈詩司空逺寄養初成毛色桃花眼鏡明落日巳曾交轡語春風還擬並鞍行長令奴僕知飢渇須着賢良待性情旦夕公歸伸拜謝免勞騎去逐雙旌騎去或作去騎方云裴詩有他日著鞭能顧我之語故公云耳杏園送張徹侍御歸使或作侍郎無歸使字方從唐本云徹時以幽州判官趍朝半道有詔還之􅃯遷侍御史從張𢎞靖之請也杏園在長安城南其實徹已抵京但未朝見耳舊傳云續有張徹自逺使歸是也東風花樹下送爾出京城久抱傷春意新添惜别情歸來身巳病相見眼還明更遣將詩酒誰家逐後生雨中寄張博士籍侯主簿喜放朝還不報半路蹋泥歸半路方作夜半今按朝還無因至夜半作半路亦不可曉疑以雨放朝而有司失於闗報行至半路乃得報而歸也方本非是雨慣曾無節雷頻自失威見牆生菌徧憂麥作蛾飛嵗晚偏蕭索誰當救晉饑奉和兵部張侍郎酬鄆州馬尚書祇召途中見寄開緘之日馬帥巳再領鄆州之作張謂張賈諸本無奉和及鄆州作字别有奉和二字祇或作被來朝當路日承詔改轅時再領須句國句音劬樊曰須句韓之東平也左傳僖公二十一年邾人滅須句杜預注須句在東平仍遷少昊司韓曰秋帝少昊葢主刑而總加檢校刑部尚書故云暖風抽宿麥清雨巻歸旗補注石林詩話張文潛常與蔡天啓論韓栁五字警句文潛舉退之暖風抽宿麥清雨巻歸旗子厚壁空殘月曙門掩候虫秋皆集中第一賴寄新珠玉長吟慰我思早春與張十八博士籍遊楊尚書林亭寄第三閣老兼呈白馮二閣老諸本無十八字方从唐本云白居易馮宿也第三閣老楊于陵之子嗣復也白和詩只作楊舍人林池今按注本第三作三第云澄本如此然王沂公言行錄記楊大年呼沂公為第四㕔舍人疑前世遺俗自有此等稱呼洪本或未必然而此所遊乃嗣復家林亭故特以詩寄之而并呈白馮也但未知三人者其次第又如何耳牆下春渠入禁溝或作流云渠冰初破滿渠浮鳳池近日長先暖流到池時更不流更或作見奉使常山早次太原呈副使吳郎中或無早字方云公使鎮州吳刑以駕部郎中副行㓪㓪聞街鼓晨起似朝時翻翻走驛馬春盡是歸期地失喜禾處風存蟋蟀辭暮齒良多感無事涕垂頤夕次夀陽驛題吳郎中詩後或作夀陽驛題絶句方云蜀本亦注夕次字風光欲動别長安春半邊城特地寒不見園花兼巷栁馬頭惟有月團團鎮州初歸别來楊栁街頭樹擺弄春風只欲飛擺或作揺弄或作撼只或作祇還有小園桃李在留花不發待郎歸同水部張員外曲江春遊寄白二十二舍人或作同張水部籍遊曲江寄云云漠漠輕隂晚自開青天白日映樓臺天或作春曲江水滿花千樹有底忙時不肯來和水部張員外宣政衙賜百官櫻桃詩或作和張水部勅賜櫻桃詩漢家舊種明光殿炎帝還書本草經豈似滿朝承雨露共看傳賜出青㝠香隨翠籠力董切竹器也擎初到或作重或作出色映銀盤冩未停映或作照食罷自知無所報空然慙汗仰皇扄早春呈水部張十八員外二首閤本無此二首天街小雨潤如酥草色遥看近却無最是一年春好處絶勝煙栁滿皇都莫道官忙身老大即無年少逐春心憑君先到江頭看栁色如今深又深送桂州嚴大夫同用南字嚴謨也題下或有赴任二字蒼蒼森八桂森八閣本作八月桂或作樹方云山海經桂林八樹在賁禺東天台山賦八桂森挺以凌霜兹地在湘南地閣本作樹在或作近江作青羅帶補注東坡云退之詩江作青羅帶子厚詩海上羣山似劍鋩子瞻為之對云繫懣豈無羅帶水割愁還有劍鋩山山如碧玉篸祖含切與簮同釵簮也祝曰梁劉孝威詩金篸臨鬢斜户多輸翠羽家自種黄甘逺勝登仙去飛鸞不假驂假或作暇奉酬天平馬十二僕射暇日言懐見寄之作或無暇日言懐之作六字馬總時為鄆曹濮等州觀察使天平馬總軍曰天平篇什外政事亦無雙威令加徐土儒風被魯邦劉夢得天平軍壁記惟鄆在春秋須句之國涉漢為濟東葢禹貢兖州之域而曰威令加徐土者禹貢海岱及淮惟徐州而前漢以徐𨽻臨淮則徐亦魯也徐土魯邦字葢出詩常武閟宫之作云清為公論重寛得士心降嵗晏偏相憶長謡坐北牕奉使鎮州行次承天行營奉酬裴司空或有相公字竄逐三年海上歸逢公復此著征衣旋吟佳句還鞭馬恨不身先去鳥飛鎮州路上謹酬裴司空相公重見寄謹一作奉銜命山東撫亂師日馳三百自嫌遲風霜滿面無人識何處如今更有詩奉和僕射裴相公感恩言志或無奉文武成功後居為百辟師林園窮勝事鐘鼓樂清時擺落遺髙論雕䥴出小詩自然無不可范蠡爾其誰其或作為和僕射相公朝廻見寄或作迴朝或有裴字盡瘁年將久公今始暫閑事隨憂共減詩與酒俱還放意機衡外收身矢石間秋臺風日逈正好看前山奉和李相公題蕭家林亭逢吉樊曰李相公逢吉也蕭氏在唐最盛瑀嵩華復俛寘倣遇凡八葉宰相嵩第在城南布政坊寘第在城南永樂坊見長安志餘無所見山公孫曰襄陽記晉山簡為守峴山南習郁有佳園池簡每臨此池輙大醉而歸名之曰髙陽池時有童兒歌曰山公何所往來至髙陽池日夕倒載歸酩酊無所知自是林園主歎惜前賢造作時岩洞幽深門盡鎖不因丞相幾人知奉和杜相公太清宫紀事陳誠上李相公十六韻或作杜相公太清宫十六韻紀事陳誠上李相因和杜謂元㯋也天寳三年置耒耜興姬國輴欙上丑倫切下魯追切書予乘四載孔安國曰水乘舟陸乘車泥乘輴山乘欙輴樊曰史記漢書並作橇音蕝纍史記作橋漢書作挶音九足切建夏家在功誠可尚於道詎為華象帝威容大仙宗寳厯賒衛門羅㦸槊圖壁雜龍蛇禮樂追尊盛乾坤降福遐四真樊曰天寳元年親享𤣥元皇帝於新廟以莊子為南華真人文子為通𤣥真人列子為沖虛真人庚桑子為洞虛真人是為四真也皆齒列二聖樊曰初太清宫成命工於太白山採白石為𤣥元真像兖冕之服當扆南面元宗肅宗真容侍立左右皆朱衣朝服亦肩差陽月時之首隂泉氣末牙殿階鋪水碧階或作筵庭炬坼金葩紫極觀忘倦青詞奏不譁噌吰上音錚下音宏鐘聲相如賦曰聲噌吰而似鐘音宫夜闢嘈囐上才刀切下才曷切祝曰鼓聲東都賦奏嚴鼓之嘈囐鼓晨檛陟𤓰切擊也祝曰禰衡為漁陽摻檛蹀􅗿而前䙝味陳奚取味或作服非是本朝景靈宫天興殿祝以青詞薦以酒果用唐制也名香薦孔嘉垂祥紛可録俾夀浩無涯貴相山瞻峻清文玉絶瑕代工聲問逺攝事敬恭加皎潔當天月葳蕤捧日霞葳或作婁方從蜀本孫曰天日以喻君月霞以喻臣杜攝事在人君之側唱妍酬亦麗俛仰但稱嗟亦或作匪方云唱酧謂李杜稱嗟公自謂也别本韓文考異巻十欽定四庫全書别本韓文考異巻十一宋王伯大重編雜著原道補注山谷嘗曰文章必謹布置每見學者多告以原道命意曲折石介守道曰孔子之易春秋自聖人以來未有也吏部原道原仁原毁行難禹問佛骨表諍臣論自諸子以来未有也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂德仁與義為定名道與德為虚位故道有君子小人而德有凶有吉子下或有有字老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也非天下或有之字下小字方作罪云尸子曰井中視星所視不過數星今按韓公未必用尸子語正使用之作罪亦非文意彼以煦煦香句切小惠兒為仁孑孑為義其小之也則宜其
