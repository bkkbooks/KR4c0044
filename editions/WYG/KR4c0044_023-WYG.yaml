front:
  text: 神文三首
  hash: sha256:0383b457746d00aa19ac4b08dd9ca1ffcb6ac32612b4da97a51510d41cc1ce73
body:
  text: 晁本首篇題曰祭城隍文次題祭仰山神祈雨文次題又祭仰山神文維年月日袁州刺史韓愈謹告于城隍神之靈或無袁字下同刺史無治行無以媚于神祗以上或無無字天降之罰以久不雨苖且盡死刺史雖得罪百姓何辜罪下方有死字用今按死字不當又上句巳有不應重出盖因上句而誤也宜降疾咎于某躬身無令鰥寡蒙兹濫罰謹告或無躬字方云國語靡王躬身公用此也維年月日袁州刺史韓愈謹以少牢之奠祭于仰山之神曰神之所依者惟人人之所事者惟神今既大旱嘉穀將盡人將無以為命神亦將無所降依不敢不以告若守土有罪宜被疾殃於其身百姓可哀宜蒙恩憫以時賜雨使獲承祭不怠神亦永有飲食謹告維年月日袁州刺史韓愈謹以少牢之奠祭于仰山之神曰田穀將死而神膏澤之百姓無所告而神恤之刺史有罪而神釋之敢不有薦也尚饗祭柳子厚文維年月日韓愈謹以清酌庶羞之奠祭于亡友柳子厚之靈維年月日文苑作維某年嵗次庚子五月壬寅朔五日景午柳下或有君字嗟嗟子厚而至然邪自古莫不然我又何嗟人之生世如夢一覺其間利害竟亦何挍當其夢時有樂有悲及其既覺豈足追惟凡物之生不願為材為方作謂非是犧罇青黄韓曰莊子百年之木破為犧罇青黄而文之其斷在溝中比犧罇於溝中之斷則美惡有間矣其為失性均也乃木之災子之中棄天脫馽知立切祝曰馽羈馬絆也莊子連之以羈馽韓曰羈馬絡頭也羈玉佩瓊琚大放厥辭富貴無能磨滅誰紀子之自著表表愈偉表表或作表奏非是不善為斵血指汗顔巧匠旁觀縮手袖閒旁觀方作觀旁非是子之文章而不用世乃令吾徒掌帝之制子之視人自以無前一斥不復羣飛刺天飛或作非嗟嗟子厚今也則亡也則方作有今臨絶之音一何琅琅徧告諸友以寄厥子不鄙謂余亦託以死凡今之交觀勢厚薄余豈可保能承子託非我知子子實命我猶有鬼神寧敢遺墮寧或作予念子永歸無復來期設祭棺前矢心以辭嗚呼哀哉或無此四字尚饗祭湘君夫人文維元和十五年嵗次庚子十月某日朝散大夫守國子祭酒䕶軍賜紫金魚袋韓愈謹使前袁州軍事判官張得一此上四十四字或只作維年月日國子祭酒韓愈謹令張得一方從石本以清酌之奠敢昭告于湘君湘夫人二妃之神前嵗之春愈以罪犯黜守潮州或作陽方從石本懼以譴死且虞海山之波霧瘴毒為災以殞其命舟次祠下是用有禱于神神享其衷賜以吉卜曰如汝志䝉神之福啓帝之心去潮即袁今又獲位於朝復其章綬退思往昔實發夢寐凡卅年於今乃合卅或作三方從石本云此盖言卅年前常有夢寐非以貶日言之也今按上文但云前嵗之禱則實發夢寐者但謂不敢忘前嵗之吉卜耳此卅字未詳其義恐亦石本之誤也方說非是夙夜怵惕敢忘神之大庇怵或作悚伏以祠宇毁頓憑附之質丹青之飾暗昧不圭不稱靈明暗昧不圭或作暗昧不佳或作昧暗不蠲方從石本云圭與蠲同音集韻蠲潔也明也通作圭詩吉蠲為饎韓詩作吉圭周禮蜡氏令州里除不蠲注讀如吉圭為饎之圭陸音曰舊讀為圭吕氏春秋飲食必蠲潔髙誘亦讀作圭此類非一今作佳由圭字訛也靈明或作明靈方從石本外無四垣堂陛頽落牛羊入室居民行商不來祭享輒敢以私錢十萬修而作之萬下諸本有祈于邦伯四字方從石本舊碑斷折其半仆地文字缺滅幾不可讀謹修而樹之或無謹字廟成之後將求玉石仍刻舊文因銘其隂以大振顯君夫人之威神以報靈德俾民承事萬世不怠惟神其鑒之尚饗始將既修樹舊碑仍刻其文於新石因銘其隂舊碑石既多破落文不可盡識移之於新或失其真遂不復刻此四十二字石本附祭文後諸本皆有之方云此盖後人以碑本附入閣杭皆無之今按此必公自記故石本有之當附於此方但以閣杭本闕遂直刋去亦可惜也今從諸本而下一字書之祭竇司業文竇名牟公嘗誌其墓事見誌中維年月日兵部侍郎韓愈謹以清酌庻羞之奠祭于故國子司業竇君二兄之靈惟君文行夙成有聲江東魁然厚重長者之風一舉於鄉遂收厥功屢佐大侯以調兵戎詔曰予虞汝為郎中乃令洛陽嵗且四終惟刑之慎掌正𨽻僮命守髙平澤州髙平郡命副儒宫副或作制朱衣銀魚象服以崇錫榮考妣孝道上窮官不滿能亦云逹通踰七望八年孰非翁或作踰七八年孰非望公方從閣杭苑云竇卒年七十四在君無憾我意不充君之昆弟三以辭雄竇兄弟五人常牟羣庠鞏有聨珠集傳于世云文所謂三以辭雄盖竇常牟鞏俱第進士刺史郎中四繼三同謂牟庠相繼為澤州刺史四繼三同則常牟羣庠皆為之也於士大夫可謂顯融我之獲見實自童䝉既愛既勸在麻之蓬愛既或作愛誘非是自視雛鷇望君飛鴻四十年餘事如夢中諸本皆如此方從閣杭苑及南唐本作事半如夢云古夢音平去聲通石崇詩周公不足夢與可以守至冲叶今按事半如夢語意碎澁不如諸本之渾全而快健前人誤改當以重押中字之故不知公詩多不避也分宰河洛媿立竝躬俱官於學以纎臨洪惠許不酬報德以空許方作詩文今按惠許謂上愛勸而又稱許也死生莫接孰明我衷於祭告情文以自攻嗚呼哀哉尚饗祭侯主簿文方云此謂侯喜也蜀本注繼字非維年月日吏部侍郎韓愈謹遣男殿中省進馬佶致祭于亡友故國子主簿侯君之靈嗚呼惟子文學今誰過之子於道義困不捨遺困或作閔捨或作拾皆非是我狎我愛人莫與夷自始及今二紀于兹我或為文筆俾子持唱我和我問我以疑我釣我遊莫不我隨我寢我休莫爾之私朋友昆弟情敬異施惟我於子無適不宜棄我而死嗟我之衰相好滿目少年之時日月云亡今其有誰誰不富貴而子為羇我無利權雖怨曷為子之方𦵏我方齋祠方𦵏或作云𦵏哭送不可誰知我悲嗚呼哀哉尚饗祭竹林神文維年月日京兆尹兼御史大夫韓愈謹以酒脯之奠再拜稽首告于竹林之神曰天子不以愈為愚不能使尹兹大衆二十三縣之人今農既勤於稼有苗盈野而天不雨將盡槁以死農將無所食鬼神將無以為饗國家之禮天地百祀神祗不失其常惠天之人不失其和方無祀字惠天下或有下字方從閣杭本下今按此人字當為民字以避諱而用人字也句同人又無罪何為造兹旱虐以罰也虐方從閣杭蜀本在罰字下非是將俾尹者不仁不明不能承帝之勅以化正其下聞無香惟腥神于惠罰無差施罪瘠于尹愈身是甘是宜神于或作神之雨則時降神無爽其聰明永饗于人無媿尚饗曲江祭龍文維年月日京兆尹兼御史大夫韓愈謹以香果之奠敢昭告于東方青龍之神天作旱災嘉穀將槁乃於甲乙之日依准古法孫曰董仲舒求雨法甲乙日為青龍一長八尺居中為小龍七長各四丈於東方丙丁日為赤龍一長七丈小龍七長各三丈五尺戊巳日為黄龍一長五丈小龍七各長二丈五尺庚辛日為白龍一壬癸日為黒龍一皆倣此作神之象齋戒祀禱神其享祐之時降甘雨以恵兹人急急如律令時方作將非是祭馬僕射文維年月日吏部侍郎韓愈謹以清酌庻羞之奠敬祭于故僕射馬公十二兄之靈惟公𢎞大温恭全然德備天故生之其必有意將明將昌實艱初試佐戎滑臺滑州斥由尹寺適彼甌閩􅙠􅘕上魚列切下魚厥切又上音業下音屹跋躓上音拔下音致頓也顛而不踒於卧切足跌也乃得其地于泉于䖍始執郡符遂殿都殿切交州抗節番音潘禺去其螟蠧蠻越大蘇蠧或作螣擢亞秋官朝得碩士人謂其崇我勢始起東征淮蔡相臣是使公兼邦憲以副經紀殱彼大魁厥勲孰似丞相歸治留長蔡師茫茫黍稷昔實棘茨鳩鳴雀乳不見梟鴟惟蔡及許舊為血仇命公并侯耕借之牛束其弓矢禮讓優優始誅鄆戎厥墟麽么公往滌之兹惟樂郊惟東有猘惟西有虺顛覆朋隣我餘有㡬餘有或作有餘今按此用左氏身其餘㡬之語或本非是嵂崒中居斬其脊尾岱定河安惟公之韙猘音制虺許韙切嵂音律崒慈䘏切韙羽鬼切祝曰猘狂犬也虺􅔼也淮南子猘犬不自投於河孫曰十月沂州軍亂殺節度使王遂長慶元年七月盧龍軍亂囚節度使張𢎞靖成德軍殺節度使田𢎞正二年正月魏博節度使田希自殺三月寧武軍節度使崔羣為軍中所逐河岱兖鄆之境韙是也帝念厥功還公于朝陟于地官且長百僚度彼四方孰樂可據顧瞻衡鈞將舉以付衡鈞或作之餘惟公積勤以疾以憂及其歸時當謝之秋賀門未歸弔廬已萃門或作問門今按此用慶者在之語或本非是未燕于堂已哭于次昔我及公實同危事且死且生誓莫捐棄歸來握手曾不三四曾不濡翰酬酢文字曾不醉飽以勸酒胾側吏切奠以敘哀其何能致嗚呼哀哉尚饗弔武侍御所畫佛文方無弔字御史武君當年䘮其配歛其遺服櫛珥鞶脫櫛側瑟切珥乃吏切鞶音盤帨始銳切祝曰櫛梳也禮記咸盥潄櫛縰笄總珥耳璫也于篋月旦十五日則一出而陳之抱嬰兒以泣御史或作侍御鞶或作縏方云縏小囊鞶大帶也今按儀禮士昏禮庻母及門内施鞶注鞶囊也所以盛帨巾然則縏鞶字通有為浮屠之法者造武氏而諭之曰是豈有益邪方從閣杭作也非是吾師云人死則為鬼鬼且復為人隨所積善惡受報環復不窮也極西之方有佛焉其土大樂西下或無之字親戚姑能相為圖是佛而禮之願其往生莫不如意樊曰柳子厚永州龍興寺脩淨土院記中州之西有國曰身毒釋迦示現之地彼佛言曰西方有世界曰極樂佛號無是受如來其國無三惡八難衆寶以為飾其人無七纒九惱羣聖以為友有能誠心大歸願生是土者茍能念力具足則往生彼國然後出三界之外武君憮文甫切追憐也然辭曰吾儒者其可以為是既又逢月旦十五日復出其篋實而陳之其篋方無其字抱嬰兒以泣且殆而悔曰是真何益也吾不能了釋氏之信不又安知其不果然乎方無且字乎字或本且字在悔字下於是悉出其遺服櫛佩合若干種就浮屠師請圖前所謂佛者浮屠師受而圖之韓愈聞而弔之曰晢晢兮目存晢晢或作晳晳丁寧兮耳言忽不見兮不聞見下或有不有字或無兮字莽誰窮兮本源圖西佛兮道予懃以妄塞悲兮慰新魂新上或有斯字嗚呼奈何兮弔以兹文祭故陜府李司馬文李漢之父郱維年月日守國子祭酒賜紫金魚袋韓愈謹以清酌之奠祭于故陜府左司馬李公之靈曰公學以為耕文以為穫發憤孤身復續厥家孤或作善續或作績選于吏部亟以科進歴臨大邑惟政有聲惟或作為遂丞宗正日朝帝庭出輔陜都吏畏僚慕子婦諸孫盈于室堂公姑恱喜五福具有姑或作始非是大夫士家孰不榮羡如何不常以至大故嗚呼哀哉愈以守官不獲弔送昏姻之好以哀以悲敬致微禮公其歆之歆方作昭尚饗祭十二兄文公從兄岌也月日從父弟某官某乙謹以清酌庻羞之奠敢昭告于十二兄故虢州司户府君之靈或無故字嗚呼維我皇祖有孫八人孫曰皇祖叡素桂州長史樊曰其孫曰㑹曰介曰愈曰俞曰岌見於世系及公集才五人又有弇侍御史死平涼之盟其二人逸矣惟兄與我後死孤存奈何於今又棄而先生不偕居疾藥不親歛不摩棺瘞不繞墳趨奔束制生死虧恩奔或作生非是歸女教男反骨本原其不有年以補我愆長號送哀以薦此文尚饗尚上或有嗚呼字祭鄭夫人文維年月日愈謹於逆旅備時羞之奠再拜頓首敢昭祭于六嫂榮陽鄭氏夫人之靈維年月日􅄯本作貞元九年嵗次癸酉九月朔日方無謹於二字嗚呼天禍我家降集百殃我生不辰三嵗而孤蒙㓜未知鞠我者兄在死而生實維嫂恩未齓初靳切祝曰毁齒也周禮凡未齓者皆不為奴韓曰男八嵗而齓一年兄宦王官提擕負任去洛居秦念寒而衣念飢而飱疾疹音辰水火無灾及身疹或作沴劬勞閔閔保此愚庸年方及紀荐及凶屯兄罹讒口承命逺遷逺或作南窮荒海隅夭閼百年萬里故鄉幼孤在前相顧不歸泣血號天微嫂之力化為夷蠻水浮陸走丹旐翩然至誠感神返𦵏中原既克返塟遭時艱難百口偕行避地江濆口方作日云從閣杭蜀本然今按百日偕行無理當從口為是或以祭老成文有就食江南零丁孤苦之語疑不得有百口不知此亦通良賤而言闔門之衆耳未必實計百人也春秋霜露薦敬蘋蘩以享韓氏之祖考曰此韓氏之門視余猶子誨化諄諄爰來京師年在成人屢貢于王名迺有聞念兹頓頑非訓曷因頓或作鈍方云漢書陳平傳士之頑頓嗜利無耻者顔讀頓曰鈍感傷懷歸隕涕熏心茍容躁進不顧其躬祿仕而還以為家榮奔走乞假東西北南孰云此來迺睹靈車有志弗及長負殷勤嗚呼哀哉昔在韶州之行受命于元兄于或作於曰爾幼養于嫂䘮服必以朞今其敢忘天實臨之嗚呼哀哉日月有時歸合塋封終天永辭絶而復蘇伏惟尚饗祭十二郎文年月日方無日字文苑作貞元十九年五月二十六日季父愈聞汝䘮之七日乃能䘖哀致誠使建中逺具時羞之奠告汝十二郎之靈文苑郎下有子字可今按郎子是當時語雖不必存亦不不知也今謾補之嗚呼吾少孤及長不省所怙惟兄嫂是依中年兄殁南方吾與汝俱㓜從嫂歸葬河陽既又與汝就食江南零丁孤苦未嘗一日相離也吾上有三兄皆不幸早世承先人後者在孫惟汝在子惟吾兩世一身形單影隻嫂常撫汝指吾而言曰韓氏兩世惟此而已汝時尤小當不復記憶吾時雖能記憶亦未知其言之悲也吾年十九始來京城其後四年而歸視汝又四年吾往河陽省墳墓遇汝從嫂䘮來𦵏往上或無吾字又二年吾佐董丞相于汴州汝來省吾止一嵗請歸取其孥相下或有幕字明年丞相薨吾去汴州汝不果來是年吾佐戎徐州使取汝者始行吾又罷去汝又不果來佐上或有又字者上或有使字吾念汝從于東東亦客也不可以乆圖乆逺者莫如西歸將成家而致汝或有兩圖字一屬上句非是嗚呼孰謂汝遽去吾而殁乎謂或作為而下或有先字吾與汝俱少年以為雖暫相别終當乆與相處故捨汝而旅食京師以求斗斛之禄誠知其如此雖萬乗之公相吾不以一日輟汝而就也去年孟東野往吾書與汝曰吾年未四十而視茫茫而髪蒼蒼而齒牙動揺方云蜀人史彦昇云退之祭文視荒荒今俗本作茫茫非是陳後山詩平陳鄭毛視荒荒本此也今按古書如荒忽茫忽之類皆二字也意義多相近當存之念諸父與諸兄皆康彊而早世如吾之衰者其能乆存乎存方作在吾不可去汝不肯來恐旦暮死而汝抱無涯之戚也去或作知孰謂少者殁而長者存彊者夭而病者全乎嗚呼其信然邪其夢邪其傳之非其真邪或無其夢邪三字信也吾兄之盛德而夭其嗣乎汝之純明而不克蒙其澤乎少者彊者而夭殁長者衰者而存全乎未可以為信也夢也傳之非其真也非上或有者字東野之書耿蘭之報何為而在吾側也嗚呼其信然矣吾兄之盛德而夭其嗣矣汝之純明宜業其家者不克蒙其澤矣業或作榮所謂天者誠難測而神者誠難明矣明方作得非是所謂理者不可推而壽者不可知矣壽方作年雖然吾自今年來蒼蒼者或化而為白矣動揺者或脫而落矣蒼下或無者字毛血日益衰志氣日益微㡬何不從汝而死也志氣方作氣志死而有知其㡬何離其無知悲不㡬時而不悲者無窮期矣汝之子始十嵗吾之子始五嵗少而彊者不可保如此孩提者樊曰汝之子始十嵗謂湘也吾之子始五嵗謂昶也其後湘登長慶三年第昶登四年第昶生綰衮綰咸通四年衮七年進士天之所以昌韓之後如此孰謂不可冀其成立耶又可冀其成立耶十或作一方云老成二子曰湘曰滂滂以季子出繼則湘固宜十嵗也嗚呼哀哉嗚呼哀哉汝去年書云比得軟脚病往往而劇比或作此非是吾曰是疾也江南之人常常有之未始以為憂也南下或無之字憂下或無也字嗚呼其竟以此而殞其生乎抑别有疾而至斯乎斯下或有極字汝之書六月十七日也東野云汝殁以六月二日耿蘭之報無月日或作日月盖東野之使者不知問家人以月日如耿蘭之報不知當言月日或無如字言或作時如今按陸德明經典釋文序論當時語音之訛有曰而靡異則此如字即而字之轉耳不知當言月日者盖言耿蘭之報所以無月日者由其不知赴告之體當具月日以報也東野與吾書乃問使者使者妄稱以應之耳其然乎其不然乎東上或有盖字方無其不然乎一語今吾使建中祭汝弔汝之孤與汝之乳母彼有食可守以待終䘮則待終䘮而取以來如不能守以終䘮則遂取以來其餘奴婢並令守汝䘮或作葬吾力能改𦵏終𦵏汝於先人之兆然後惟其所願方無終𦵏二字願下或有焉字嗚呼汝病吾不知時汝殁吾不知日生不能相養以共居殁不能撫汝以盡哀斂不憑其棺窆波驗切下棺也不臨其穴憑上臨上或並有得字吾行負神明而使汝夭不孝不慈而不得與汝相養以生相守以死行或作何一在天之涯一在地之角生而影不與吾形相依死而䰟不與吾夢相接吾實為之其又何尤彼蒼者天曷其有極自今巳往吾其無意於人世矣當求數頃之田於伊潁之上以待餘年方作盡待今按或當作盡餘年教吾子與汝子幸其成長吾女與汝女待其嫁如此而巳嗚呼言有窮而情不可終汝其知也邪其不知也邪嗚呼哀哉或無此句尚饗祭周氏姪女文周况之妻維年月日十八叔叔母具時羞清酌之奠祭于周氏二十娘子之靈方無子字嫁而有子女子之慶纒疾中年又命不永今當長歸與一世違凡汝親戚孰能不哀撰此酒食以與汝訣汝曾知乎我念曷闋尚饗祭滂文樊曰老成二子湘滂於公為姪孫元和十四年春公自刑部侍郎出守潮州湘滂實從行冬公移袁滂至袁卒詳見公所墓誌維年月日十八翁及十八婆盧氏以清酌庻羞之奠祭于二十三郎滂之靈曰汝聰明和順出於輩流彊記好文又少與比將謂成長以興吾家如何不祥未冠而夭吾與盧氏痛傷可言可或作何思母之恩連呼以絶執兄之手勉以無悲情一何長命一何短權𦵏逺地孤魂無依瀝酒告情哀何有極尚饗祭李氏二十九娘子文維年月日十八叔翁及十八叔婆盧氏遣昶以庶羞之奠祭于李氏二十九娘之靈曰汝之警敏和静人莫及之静或作舒姿相豐端不見闕虧幼而孤露其然何為出從于人既相諧熈又暴以夭神何所疵生殺减益竟誰主尸我哀汝母孰慰窮嫠我憐汝兒誰與抱持念此傷心不能去離奠以送汝知乎不知尚饗祭張給事文徹維年月日兵部侍郎韓愈謹以清酌之奠祭于故殿中侍御史贈給事中張君之靈御上或無侍字惟君之先以儒名家逮君皇考再振厥華鄉貢進秀有司第之貢或作舉從事元戎謹職以治遂拜郎官以職王憲不長其年飛不盡翰乃生給事松貞玉剛幹父之業纂文有光屢辟侯府亦佐梁師前人是似耋吏嗟咨御史闕人奪之於朝大厦之構斧斤未操府遷幽都頑悖未孚繄君之賴乃奏乞留乃遷殿中朱衣象版惟義之趨豈利之踐虺豺發釁闔府屠割或作剥償其恨犯君獨髙脫露刀成林弓矢穰穰刀或作刄千萬為徒譟讙為狂君獨叱之上不負汝為此不祥將死無所雖愚何知慙屈變色君義不辱殺身就德天子嘉之贈官近侍歸於一死萬古是記我之從女為君之配君於其家行實髙世無所於𦵏輿䰟東歸於𦵏或作掩𦵏輿或作與誄以贈之莫知我哀嗚呼哀哉尚饗祭女挐女文挐或從奴方云古本祭文與壙銘皆作女挐重彦逺曰挐字傳寫之誤盖古文如紛挐等字無從奴者公最好古名其女不應用俗字也今按挐拏通說已見第五巻李花詩維年月日阿爹阿八使汝妳以清酒時果庶羞之奠祭于第四小娘子挐子之靈嗚呼昔汝疾極值吾南逐極或作亟蒼黄分散使汝驚憂我視汝顔心知死隔汝視我靣悲不能啼我既南行家亦隨譴扶汝上輿走朝至暮天雪冰寒傷汝羸肌天或作大汝或作女方云古本汝多作女通用撼頓險阻不得少息不能食飲又使渇飢死于窮山實非其命不免水火父母之罪使汝至此豈不縁我草𦵏路隅棺非其棺既瘞遂行誰守誰瞻䰟單骨寒無所託依人誰不死於汝即寃我歸自南乃臨哭汝汝目汝靣在吾眼傍汝心汝意宛宛可忘宛宛或作寃寃方云詩宛在水中央鄭注宛坐見貎逢嵗之吉致汝先墓無驚無恐安以即路飲食芳甘棺輿華好芳或作柔歸于其丘萬古是保尚饗别本韓文考異巻二十三欽定四庫全書别本韓文考異巻二十四宋王伯大重編
