canonical_identifier: bkk:krp/KR4c0044/WYG/v1/juan/31
seq: 31
front:
  text: 神或作東此篇方從石本集注此碑石刻其首云使持節袁州諸軍事守袁州刺史韓
  hash: sha256:dda3673c99e1eb5df1757049464baf996312f1714e19386f7b3520a6d1ecf944
body:
  text: 愈撰使持節循州諸軍事守循州刺史陳諫書并篆額其後元和十五年十月一日建海於天地間為物最鉅自三代聖王莫不祀事考於傳記而南海神次最貴在東北西三神河伯之上號為祝融洪曰太公金匱云南海之神曰祝融東海之神曰勾芒北海之神曰顓頊西海之神曰蓐收今按東海神名阿明南海祝融西海巨乗北海禺强亦見飬生雜書然公言南海神次最貴則是據太公書矣天寳中天子以為古爵莫貴於公侯故海嶽之祝犧幣之數放而依之所以致崇極於大神今王亦爵也而禮海嶽尚循公侯之事虚王儀而不用非致崇極之意也由是冊尊南海神為廣利王祝號祭式與次俱昇昇或作升武徳貞觀之制四海年别一祭各以五郊迎氣日祭之祀官以當界都督刺史充至是封王分命卿監十三人取三月十七曰時備禮兼冊祭其祭儀具開元禮因其故廟易而新之在今廣州治之東南海道八十里扶胥之口黄木之灣烏還切常以立夏氣至命廣州刺史行事祠下事訖驛聞而刺史常節度五嶺諸軍仍觀察其郡邑於南方事無所不統地大以逺故常選用重人既貴而富且不習海事又當祀時海常多大風將往皆憂戚既進觀顧怖悸故常以疾為解而委事於其副其來已久解或作辭故明宫齋廬上雨旁風無所葢障牲酒􅇤酸取具臨時水陸之品狼籍籩豆薦祼興俯不中儀式吏滋不供神不顧享供从石本方作恭誤盲風上眉庚切盲疾也月令盲風至怪雨發作無節人䝉其害方云或謂祕閣本盲作蝱字見吕氏春秋考石本只作盲月令盲風至注疾風也山海經符陽之山多怪風雨雲之所出也元和十二年始詔用前尚書左丞國子祭酒魯國孔公孔戣為廣州刺史兼御史大夫以殿都句切南服公正直方嚴中心樂易祗慎所職治人以明事神以誠内外殫盡不為表襮蒲報切又音博表襮衣領也至州之明年將夏祝冊自京師至吏以時告公乃齋祓視冊誓羣有司曰冊有皇帝名乃上所自署其文曰嗣天子某謹遣官某敬祭其上或有其字或作且字官上或有某字今按其上冝有且字然石本無之不欲増也官上某字石本無之或以為用左傳其官臣偃之語其恭且嚴如是敢有不承明日吾將宿廟下以供晨事明日吏以風雨白不聴於是州府文武吏士凡百數交謁更諫皆揖而退公遂陞舟風雨少弛櫂夫奏功雲陰解駮日光穿漏波伏不興省牲之夕載陽載陰將事之夜天地開除月星明穊方云穊凡利切説文稠也選何晏景福殿賦穊若幽星之纒連李善音古愛切蜀本作概非是五皷既作牽牛正中方云月令季春之月旦牽牛中上文言立夏行事正此時也公乃盛服執笏以入即事文武賔屬俯首聴位各執其職牲肥酒香罇爵净潔降登有數神具醉飽其或作具海之百靈祕怪慌惚畢出蜿蜿虵虵來享飲食慌或作恍蜿蜿或作蜒蜒享或作慕祝曰龍貌也選狀碗碗以蝹蝹史記驂赤螭青虯之幽蟉蜿蜓補注歐文忠公集古録云蜓蜓當從碑本作虵虵闔廟旋艫音盧舳艫祥飈卑遥切送颿音凡與㠶同旗纛旄麾飛揚晻藹上音掩下於葢切晻日無光藹木繁茂也選芳風晻藹鐃尼交切似鈴無舌有柄周禮以金鐃止皷是也鼓嘲轟髙管噭譟上吉弔切下桑到切噭吼也譟羣呼煩擾也武夫奮櫂工師唱和穹龜長魚躍踊後先乾端坤倪軒豁呈露祀之之嵗風災息滅人厭魚蟹五榖胥熟祀之方从石本作祝今按祝當作祀其理甚明或疑誤刻今改从諸本明年祀歸又廣廟宫而大之祀諸本石本皆同方作祝誤治其庭壇改作東西兩序齋庖之房百用具修明年其時公又固往不懈益䖍嵗仍太和耋艾歌詠始公之至盡除他名之税罷衣食於官之可去者四方之使不以資交以身為帥燕享有時賞與以節公藏私畜上下與足於是免屬州負逋之緡錢廿有四萬米四萬二千斛賦金之州耗金一嵗八百困不能償皆以丐之廿有四萬或作十有八萬廿方誤作二十三或作八加西南守長之俸誅其尤無良不聴令者由是皆自重慎法西南或作四面人士之落南不能歸者與流徙之胄百廿八族用其才良而廩其無告者其女子可嫁與之錢財令無失時廿方作二十嫁下方有者字石本無方誤也時或作所刑徳並流方地數千里不識盗賊山行海宿不擇處所事神治人其可謂備至耳矣或無其字或無耳字咸願刻廟石以著厥美而繫以詩乃作詩曰南海陰墟祝融之宅陰或作之即祀于旁帝命南伯吏惰不躬正自今公明用享錫右我家邦右或作祐惟明天子惟慎厥使我公在官神人致喜海嶺之陬既足既均胡不濡𢎞俾執事樞公行勿遲公無遽歸匪我私公神人具依今按此文石本今最易得而方本失考者凡五條然則它云石本者恐亦不能無謬也處州孔子廟碑此篇方从石本韓曰碑記不載年月日苐云朝散大夫國子祭酒賜紫金魚袋韓愈撰自天子至郡邑守長通得祀而徧天下者唯社稷與孔子為然而社祭土稷祭穀句龍與弃乃其佐享非其専主為或作焉然字屬下句而社方無而字句上方有而字皆非是又其位所不屋而壇豈如孔子用王者事巍然當座以門人為配自天子而下北面跪祭進退誠敬禮如親弟子者跪祭或作拜跪薦祭句龍弃祝曰禮記云云以功孔子以徳固自有次第哉自古多有以功徳得其位者不得常祀句龍棄孔子皆不得位而得常祀然其祀事皆不如孔子之盛所謂生人以來未有如孔子者其賢過於堯舜逺矣此其效歟不如或作無如人或作民以成作已孔或作夫郡邑皆有孔子廟或不能修事雖設博士弟子或役於有司名存實亡失其所業獨處州刺史鄴侯李繁繁鄴侯佖之子至官能以為先既新作孔子廟又令工改為顔子至子夏十人像今或作命顔子或作顔囘其餘六十子及後大儒公羊髙左丘明孟軻荀况伏生毛公韓生董生髙堂生楊雄鄭𤣥等數十人皆圖之壁子上或有二字選博士弟子必皆其人又為置講堂教之行禮肄習其中又為字或在其中字下置或作設置本錢廪米令可繼處以守廟成躬率吏及博士弟子入學行釋菜禮菜或作奠歐陽公曰釋奠釋菜祭之畧者也古者士之見師以菜為贄始入學者必釋菜以禮其先師其學官四時之祭乃皆釋菜釋奠有樂無尸而釋菜無樂則又其畧也故其禮亡焉而今釋奠幸存然亦無樂又不徧舉於四時獨春秋行事而巳蓍老歎嗟其子弟皆興於學鄴侯尚文其於古記無不貫達故其為政知所先後可歌也巳乃作詩曰惟此廟學鄴侯所作厥初庳下神不以宇生師所處亦窘寒暑生或作先乃新斯宫神降其獻講讀有常不誠用勸掲掲居謁切又音桀又音羯髙舉也元哲有師之尊羣聖嚴嚴大法以存像圖孔肖咸在斯堂以瞻以儀俾不惑忘惑或作或後之君子無廢成美琢詞碑石以贊攸始栁州羅池廟碑此篇本从石羅池廟者故刺史栁侯廟也栁侯為州不鄙夷其民動以禮法三年民各自矜奮兹土雖逺京師吾等亦天垊奮下或有曰字今按宜有曰字然石本無之不欲補也今天幸惠仁侯若不化服我則非人於是老少相教語莫違侯令凡有所為於其鄉閭及於其家皆曰吾侯聞之得無不可於意否莫不忖度而後從事凡令之期民勸趨之無有後先必以其時於是民業有經公無負租流逋四歸樂生興事宅有新屋步有新船步或作涉方云栁子厚鉄爐步志曰江之滸凡舟可縻而上下曰步今按孔戣志亦有泊步字池園潔修豬牛鴨雞肥大蕃息子嚴父詔婦順夫指嫁娶塟送各有條法出相弟長入相慈孝先時民貧以男女相質久不得贖盡没為𨽻我侯之至按國之故以傭除本息奪歸之大修孔子廟城郭巷道皆治使端正樹以名木栁民既皆悦喜巷道或作道巷嘗與其部將魏忠謝寧歐陽翼飲酒驛亭謂曰吾棄於時而寄於此與若等好也明年吾將死死而為神後三年為廟祀我及期而死三年孟秋辛夘侯降于州之後堂歐陽翼等見而拜之其夕夢翼而告曰館我於羅池其月景辰唐國諱丙故丙為景廟成大祭過客李儀醉酒慢侮堂上得疾扶出廟門即死明年春魏忠歐陽翼使謝寧來京師請書其事於石余謂栁侯生能澤其民死能驚動福禍之以食其土可謂靈也已福禍或作禍福作迎享送神詩遺栁民俾歌以祀焉而并刻之栁侯河東人諱宗元字子厚賢而有文章嘗位於朝光顯矣已而擯不用其辭曰荔子丹兮蕉黄蕉下或有葉字或有子字雜肴蔬兮進侯堂侯之船兮湖湘土人云栁人迎神其俗以一船兩旗置木馬偶人於舟作樂而導之登岸而趍於廟兩旗度中流兮風泊之待侯不來兮不知我悲侯乗駒兮入廟慰我民兮不嚬以笑鵝之山兮栁之水桂樹團團兮白石齒齒侯朝出㳺兮暮來歸春與猨吟兮秋鶴與飛或作秋與鶴飛今按歐公以此句為石木之誤沈存中云非也倒用鶴與兩字則語勢愈健如楚詞云吉日良辰也但此石本團團字初誤刻作團圓後鐫改之今尚可見則亦石本不能無誤之一證也北方之人兮為侯是非千秋萬嵗兮侯無我違福我兮夀我驅厲鬼兮山之左下無苦濕兮髙無乾秔古行切作粳稌徒古切稻也充羡兮蛇蛟結蟠言秔稌之穗如蛇蛟我民報事兮無怠其始自今兮欽于世世黄陵廟碑曽子開曰湘水出全瀟水出道二水至永合而為一以入洞庭黄陵廟在瀟湘之尾洞庭之口孫曰在覃之湘陰縣或云在岳州此篇方從石本湘旁有廟曰黄陵自前古立以祠堯之二女舜二妃者庭有石碑斷裂分散在地其文剥闕石或作古或無此字考圖記言漢荆州牧劉表景升之立題曰湘夫人碑今驗其文乃晉太康九年又其額曰虞帝二妃之碑非景升立者秦博士對始皇帝云湘君者堯之二女舜妃者也劉向鄭𤣥亦皆以二妃為湘君而離騷九歌既有湘君又有湘夫人王逸之解以為湘君者自其水神而謂湘夫人乃二妃也從舜南征三苗不及道死沅音元沅水出牂柯湘之間及或作返據下文當作及山海經曰洞庭之山帝之二女居之郭璞疑二女者帝舜之后不當降小水為其夫人因以二女為天帝之女方云石本書璞作樸唐人多然下文掲陽亦作楬楊小水或作小石方云考山海經作小水是也以余考之璞與王逸俱失也堯之長女娥皇為舜正妃故曰君其二女女英自宜降曰夫人也故九歌辭謂娥皇為君謂女英帝子各以其盛者推言之也帝上或有為字禮有小君君母明其正自得稱君也或無君母二字書曰舜陟方乃死傳謂舜昇道南方以死昇或作升或又曰舜死蒼梧二女從之不及溺死沅湘之間今謂竹書紀年帝王之沒皆曰陟陟昇也謂昇天也書曰殷禮陟配天言以道終其徳協天也書紀舜之沒云陟者與竹書周書同文也其下言方乃死者所以釋陟為死也地之勢東南下如言舜南巡而死宜言下方不得言陟方也以此謂舜死塟蒼梧於時二妃從之不及而溺者皆不可信溺下或有死字二妃既曰以謀語舜脱舜之厄成舜之聖堯死而舜有天下為天子二妃之力宜常為神食民之祭今之渡湖江者莫敢不進禮廟下湖或作潮非是又或作湘元和十四年春余以言事得罪黜為潮州刺史其地於漢南海之掲陽厲毒所聚懼不得脱死過廟而禱之其冬移袁州刺史明年九月拜國子祭酒使以私錢十萬抵岳州願易廟之圮桷腐瓦于刺史王堪長慶元年刺史張愉自京師往與愉故善刺史王堪上或有州字與上或有余字今按此合有余字然石本無之不欲補也謂曰丐我一碑石載二妃廟事且令後世知有子名愉曰諾既至州報曰碑謹具遂篆其事碑刻之唐故江南西道觀察使中大夫洪州刺史兼御史中丞上柱國賜紫金魚袋贈左散騎常侍太原王公神道碑銘王氏皆王者之後在太原者為姬姓或無之字春秋時王子成父敗狄有功因賜氏厥後世居太原至東漢隠士烈博士徵不就居祁縣因號所居鄉為君子下或有鄉字公其君子鄉人也魏晉涉隋世有名人國朝大王父𤣥暕音古限切歴御史屬三院止尚書郎生景肅守三郡終傳凉生生政襄鄧等州防禦使鄂州採訪使贈吏部尚書公尚書之第某子公諱仲舒字𢎞中蜀作諱𢎞中字某後墓志同今按上句巳有公字此不當再出當刪然無别本可據姑存之少孤奉母夫人家江南讀書著文其譽藹鬱當時名公皆折官位輩行下浪切願為交貞元初射䇿拜左拾遺與陽城合遏裴延齡不得為相徳宗初怏怏無奈久而嘉之方無而字之或作其下又有直字其後入閣徳宗顧列謂宰相曰第幾人必王某也果然月餘特改右補闕或無右字遷禮部考功吏部三員外郎在禮部奏議詳雅省中伏其能伏或作服在考功吏部提約明故吏無以欺同列有恃恩自得者衆皆媚承公嫉其為人不直視方無人字由此貶連州司户移䕫州司馬又移荆南因佐其節度事或無事字為㕘謀得五品服放跡在外積四年元和初收拾俊賢徵拜吏部員外郎未幾為職方郎中知制誥友人得罪斥逐後其家親知過門縮頸不敢視公獨省問為計度論議直其寃由是出為峽州刺史峽或作硤方云友人楊慿也轉廬州未至丁母夫人憂服除又為􅄔州刺史旱甚人死亡且盡公至多方救活天遂雨疫定比數年里閭完復制使出巡人填道迎顯公徳事具聞就加金紫顯或作頌轉蘇州變其屋居以絶火延隄松江路害絶阻滯火上或有其字阻或作沮秋夏賦調自為書與人以期吏無及門而集政成為天下守之最政或作化天子曰王某之文可思最宜為誥有古風豈可久以吏事役之復拜中書舍人既至京師儕流無在者視同列皆邈然少年益自悲而謂人曰豈可復治筆硯於其間哉上若未棄臣宜用所長在外久周知俗之利病方無利字非是俾治之當不自愧宰相以聞遂得觀察江南西道奏罷𣙜酤錢九千萬軍息之無已掌吏壊産猶不釋囚之公至脱械不問千或作十人遭水旱賦窘公曰我且減燕樂絶他用錢可足乎遂以代之方無足字代下無之字罷軍之息錢禁浮屠誆誘壊其舍以葺公宇息上或有日字三年法大成錢餘於庫粟餘於廩人享於田廬謳謡於道途天子復思且徵以代虚吏部左丞位以待之長慶三年十一月十七日薨于洪州年六十二上哀慟輟朝贈左㪚騎常侍某日歸塟於某處某既以公之徳刻而藏之墓矣子初又請詩以掲之享下或無於字既上或無某字某或作愈詞曰生人之治本乎斯文有事其末而忘其源切近昧陋道由是堙有志其本而泥古陳當用而迂乖戾不伸較是二者其過也均有美王公志儒之本達士之經秩秩而積涵涵而停韡為華英不矜不盈英為諸本作英而華英作英華孰播其馨孰發其明介然而居士友以傾敷文帝階擢列侍從以忠逺名有直有諷辨遏堅懇巨邪不用堅懇或作聖懇秀出班行乃動帝目帝省竭心恩顧日渥翔于郎署鶱於禁宻發帝之令簡古而蔚不比於權以直友寃敲撼挫揠竟遭斥奔久淹于外歴守大藩所至極思必悉利病萎枯以膏燠暍以醒暍或作腸坦之敞之必絶其徑浚之澄之使安其泳帝思其文復命掌誥公潜謂人此職宜少豈無凋郡庸以自效上籍其實俾統于洪藉或作籍逋之攸除姦訛革風袪蔽于日釋負于躬方乎所部禁絶浮屠乎或作平風雨順易秔稻盈疇人得其所乃恬乃謳所或作饒謳或作謡化成有代思以息勞虛位而竢奄忽滔滔維徳維績志于斯石日逺彌髙奄忽方作勿隨又云此銘有美王公不用韻末章三語分兩韻例又異也今按銘之卒章績石二句雖自叶韻而末句髙字仍與勞滔韻叶非有異别本韓文考異巻三十一欽定四庫全書别本韓文考異巻三十二宋王伯大重編碑誌司徒兼侍中中書令贈太尉許國公神道碑銘韓姬姓以國氏國下或有為字今按以國氏春秋傳語其先有自潁川走陽夏者其地於今為陳之太康太康之韓其稱盖乆然自公始大著公諱𢎞公之父曰海為人魁偉沈塞以武勇游仕許汴之間寡言自可不與人交衆推以為鉅人長者交或作校方云以上文自可言之作不與人交為是今以下文長者言之又似作不與人校為是更詳之鉅上方無為字或無以鉅人三字而為上有之字或併無以為鉅人四字官至游撃將軍贈太師娶鄉邑劉氏女生公是為齊國太夫人夫人之兄曰司徒𤣥佐有功建中貞元之間複出夫人字或作齊國功下或有於字為宣武軍帥有汴宋亳潁四州之地兵士十萬人公少依舅氏讀書習騎射事親孝謹偘偘自將不縱為子弟華靡遨放事偘偘或作侃侃字與偘同縱或作從出入敬恭軍中皆目之嘗一抵京師就明經試退曰此不足發名成業復去從舅氏學將兵數百人悉識其材鄙怯勇指付必堪其事司徒歎竒之兵下或有將字士卒屬之欲切心諸老將皆自以為不及方無皆字司徒卒去為宋南城將比六七嵗汴軍連亂不定貞元十五年劉逸淮死軍中皆曰此軍司徒所樹必擇其骨肉為士卒所慕賴庇者付之肉下或有而字今見在人莫如韓甥且其功最大而材又俊即柄授之而請之於天子天子以為然遂自大理評事拜工部尚書代逸淮為宣武軍節度使悉有其舅司徒之兵與地其舅或作舅氏當此時陳許帥曲環死而吳少誠反方無而宇自將圍許求援於逸淮㗖之以陳歸汴使數輩在館公悉驅出斬之選卒三千人㑹諸軍擊少誠許下少誠失勢以走河南無事公曰自吾舅没五亂于汴者吾苗薅樊曰淮南子云聖人之用兵也櫛髪薅苗所去者少而所利者多而髮櫛之幾盡然不一揃刈不足令震駴方云薅苗而髮櫛之淮南子語不下或無一字或作駭命劉鍔以其卒三百人待命于門數之以數與於亂自以為功并斬之以徇血流波道自是訖公之朝京師廿有一年莫敢有讙呶尼交切呌號于城郭者廿方作二十而下無有字李師古作言起事屯兵于曹以嚇音赫滑帥且告假道公使謂曰汝能越吾界而為盗邪有以相待無為空言作或作詐盜上方無為字滑師告急公使謂曰吾在此公無恐師或作帥前滑帥字疑亦當作師急或作及無上或安字有或告曰翦棘夷道兵且至矣請備之公曰兵來不除道也不為應師古詐窮變索遷延旋軍為下或有之字少誠以牛皮鞵與鞋同戸佳反材遺師古師古以鹽資少誠潜過公界覺皆留輸之庫曰此於法不得以私相餽田𢎞正之開魏博李師道使來告曰我代與田氏約相保援今𢎞正非其族又首變兩河事亦公之所惡我將與成徳合軍討之敢告非其方作其非非是公謂其使曰我不知利害知奉詔行事耳若兵北過河
