body:
  text: 與大顛師書此篇諸本皆無唯嘉祐小杭本有之其篇次在此與作召顛作顛師作和尚方本列於石刻之首今從杭本附此而名篇從方氏杭本又注云唐元和十四年刻石在潮陽靈山禪院宋慶厯丁亥江西袁陟世弼得此書疑之因之滁州謁歐陽永叔永叔覽之曰實退之語它竟不及也方本畧載其語又録歐公集古録跋尾云文公與顛師書世所罕傳予以集録古文其求之博蓋久而後獲其以繫辭為大傳謂著山林與著城郭無異等語宜為退之之言其後書吏部侍郎潮州刺史則非也蓋退之自刑部侍郎貶潮州後移袁州召為國子祭酒兼兵部侍郎久之始遷吏部而流俗傳但知為韓吏部爾顛師遺記雖云長慶中立蓋并韓書皆國初重刻故謬為附益爾方又注云今石刻乃元祐七年重立又云按公三簡皆邀速常語耳初無崇信佛法之説妄者旁沿别譔答問等語以肆誣謗要當存此簡以解後世之惑以今按杭本不知何人所注疑袁自書也更跋尾參之其記歐公之語不謬矣而東坡雜説乃云韓退之喜大顛如喜澄觀文暢意非信佛法也而或者妄撰退之與大顛書其詞凡鄙雖退之家奴僕亦無此語今一士人又於其末妄題云歐陽永叔謂此文非退之不能作又誣永叔矣蘇公此語蓋但見集注之出於或人而未見跋尾之為歐公親筆也二公皆號一代文宗而其去取不同如此覽者不能無惑然方氏盡載歐語而畧不及蘇説其意可見至呂伯㳟乃於文鑑特著蘇説以備乙覽則其同異之間又益後人之惑矣以余考之所傳三書最後一篇實有不成文理處但深味其間語意一二文勢抑揚則恐歐袁方意誠不為過但意或是舊本亡逸僧徒所記不真致有脱誤歐公特觀其大槩故但取其所可取而未暇及其所可疑蘇公乃覺其所可疑然亦不能察其為誤而直斥以為凡鄙所以其論雖各有所因而皆未能無所未盡也若乃後之君子則又往往不能究其本根其附歐説者既未必深知其所以為可信其主蘇氏者亦未必果以其説為然也徒幸其言可為韓公解紛若有補於世教故特表而出之耳皆非可與實事而求是者也至如方氏雖附歐説然亦未免曲為韓諱殊不知其言既曰久聞道德又曰側承道髙又曰所示廣大深逈非造次可諭又曰論甚宏博安得謂初無崇信其説之意邪韓公之事余於答孟簡書蓋已論其詳矣故不復論特從方本載此三書於别集并録歐公二語而附蘇説方説於其後且為全載書文於此而考其同異訂其謬誤如左方以為讀者以此觀之則其決為韓公之文而非它人之所能作無疑矣方氏所據石本與杭本又自不同則疑傳寫之訛而歐公所疑官稱之誤亦為得之但愚意猶恐當時既謫刺逺州亦未必更帶侍郎舊官也方氏所駁世俗偽造誣謗之書即今所謂别傳者洪氏辨證云别傳載公與大顛往復之語深詆退之其言多近世經義之説又偽作永叔跋云使退之復生不能自解免呉源明云徐君平見介甫不喜退之故作此文方氏又云周端禮曰徐安國自言年二十三四時戲為此今悔之無及然則其為徐作無疑矣但君平字安道而方云安國未知便是君平否耳然靈山石刻張繫所撰其間載韓公問大顛云西國一真之法何不教人顛云教人達性离無明貪嗔驕慢不生嫉妬此亦釋子常言初無難解但韓公素所未聞而頗中其病故雖不盡解而適亦有㑹於心耳又載韓公責云人生貴賤各有定分何得以三塗之説誑人而顛答云公何不常守侍郎之任而來此為官耶則恐其有謬誤或其徒所附益也愈啟方無此二字孟夏漸熱惟道體安和熱下或有伏字愈弊劣無謂坐事貶官到此久聞道德切思見顏切杭作竊方據石本如此切乃懇切之意此下大率多從石本云縁昨到來未獲參謁儻能暫垂見過實為多幸杭本無倘能以下十字已帖縣令具人船奉迎日久竚瞻帖杭作貼久當作夕竚方據石本作佇不宣愈白方據石無愈白字今據石本此下具銜姓名下云上顛師四月七日愈啟方無此二字海上窮處無與話言側承道髙思獲披接專輒有此咨屈儻惠能降喻非所敢望也惠字疑衍或下有然字而併在能字之下諸本及石本皆誤至此一二日却歸髙居亦無不可旦夕渴望杭本無倘惠以下二十七字而有此旬來晴明不甚熱倘能乗間一訪實謂幸也十八字今按此旬以下乃下篇語定從石本不宣愈白方據石本無愈白字今據石本與前書同但云六月初三日愈啟方無此二字惠勻至辱答問珍悚無已所示廣大深逈非造次可諭杭作量易大傳曰書不盡言言不盡意然則聖人之意其終不可得而見邪方據石本意作㫖無而字邪作也今按易實作意邪而無終而二字大抵石本亦自多誤也後放此如此而論讀來一百遍一字疑衍蘇氏所謂凡鄙蓋指此等處耳不如親見顏色隨問而對之易了方據石夲如此但無親字處今按親下當有見字而兩本皆闕故不敢増而空其以待知者杭但云不如親面而對之是亦蘇氏所謂凡鄙者然親字乃方本之闕文面字乃問字之誤筆而又脱去顔色隨易了六字耳此旬來晴明旦夕不甚熱倘能乗閒一訪幸甚旦夕馳望杭本已見上篇此不復出愈聞道無疑滯行止繫縛茍非所戀著則山林閒寂與城郭無異此從杭本但郭作隍今㨿歐公語從方本方據石本止下有所字下有愛戀字所下無戀字及則字而著字下伏出著字及與字異下有邪字皆非是其用邪字尤不當律令亦所謂凡鄙者也但或疑非字下當有有字言於行止繫縳若無所戀則静閙一致語尤明白耳或者又疑非當作有則語意賔主尤順然未知孰是又諸本皆無不敢輒増改也大顛師論甚宏愽而必守山林義不至城郭顛杭見上或無師字義字城作州自激修行獨立空曠無累之地者非通道也自方作似然細考之與下文激修行四字皆可疑方又以也為矣而并非通道四字屬於行字之下又以獨為自而立下有於字皆非是勞於一來安於所適道故如是於杭作于適方據石本與杭本並作識今得真石本考之乃如此然則方之所考亦不詳矣蓋適猶便也與唯適之安之語用字畧同言一來雖勞而既來則當隨其所便無處不安也道故如是即所以結上文道無疑滯之意方以如為此亦石本誤不宣愈頓首方據石本無未三字今據石本與前二書同但云大顛禪師七月十五日不知韓公之於大顛既聞其語而為禮益恭如此何也别本韓文考異外集巻二欽定四庫全書别本韓文考異外集巻三宋王伯大重編
