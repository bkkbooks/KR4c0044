  - {type: variant, offset: 7099, length: 0, content: '', WYG: 有此句巡池詠白蘋孫曰栁渾為吴興太守有江南曲云汀洲採白蘋日落江南春詩意以席比栁渾也多情懐酒伴懐或作怯餘事作詩人倚玉難藏拙玉或作市吹竽久混真坐慙空自老江海未還身和武相公早春聞鸎早晚飛來入錦城誰人教解百般鳴春風紅樹驚眠處似妬歌童作豔聲太安池闕遊太平公主山莊諸本無此題方從唐本太安池下增闕字而别出此題云晁本李謝本所}
