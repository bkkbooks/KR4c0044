  - {type: variant, offset: 7098, length: 0, content: '', WYG: 考異巻九欽定四庫全書别本韓文考異巻十宋王伯大重編律詩凡八十首諸本作七十九首方從蜀本送李尚書赴襄陽八韻得長字李遜也帝憂南國切改命付忠良壤畫星揺動旗分獸簸揚五營兵轉肅孫曰謂禁掖後漢張奐率五營士圍竇武千里地還方控帶荆門逺飄浮漢水長賜書寛屬郡或作部戰馬隔隣疆縱獵雷霆迅觀棊玉石忙風流峴胡典切樊曰羊祜每風景必造峴山置酒謂從事鄒湛曰自有宇宙便有此山首客花豔大堤倡韓曰宋隨王誕為襄陽郡聞諸女歌因為詞曰朝發襄陽城暮至大堤曲大堤諸女貌花豔驚郎目富貴由身致誰教不自强和席八十二韻席夔絳闕銀河曙東風右掖春韓曰應劭漢官儀中書為右曹稱西掖孫曰正門之兩旁曰掖官隨名共美花與思俱新綺陌朝遊間綾衾夜直頻孫曰漢官典職儀曰尚書郎入直供青綾白綾被直宿直也横門開日月髙閤切星辰庭變寒前草天銷霽後塵溝深通苑急栁色壓城勻綸綍謀猷盛方云李本校謀作謨然閤本只作謀考之周書作謀為是但謨古字作􅀢李涪刋誤曰舊作嘉謨今作嘉謀猶沈浮二音通也丹青步武親芳菲含斧藻孫曰文餘也楊子吾未見斧藻其徳若斧藻其楶者光景暢形神傍砌看紅藥樊曰謝眺中書省詩紅藥當堦翻紅藥芍藥也席八為舍人故}
