  - {type: variant, offset: 91, length: 12389, content: 集者不復載云韓愈字退之鄧州南陽人七丗祖茂有功於後魏封安定王父仲卿爲武昌令有美政旣去縣人刻石頌德終祕書郎李白作文公父仲卿去思碑云南陽人而公常自称昌黎李翶作公行狀亦云昌黎某人皇甫湜作墓誌不言郷里又作神道碑乃云上丗甞居南陽又隷延州之武陽而舊史亦但云昌黎厶今按新史蓋因李碑而加鄧州二字也然考漢書地理志有兩南陽其一河内脩武即左傳所謂晋啓南陽也其一南陽堵陽即荆州之南陽郡字與赭同在唐属鄧州者也元和姓纂唐書岀系表有兩韓氏其一漢弓髙侯頽當玄孫騫避乱居南陽郡之赭陽九丗孫河東太守術生河東太守純純四丗孫安之晋貟外郎二子潜恬隨司馬休之入後覣爲玄菟太守二子都偃偃生後魏中郎穎穎生播徙昌黎棘城其一則頽當裔孫㝷爲後漢隴西太守丗居穎川生司空稜後徙安定武安至後魏有常山太守武安成侯耆徙居九門生尚書令征南大將軍安定桓王茂茂生均均生睃睃生仁泰仁泰生叡素叡素生仲卿仲卿生㑹愈而中間甞徙陳留以此而推則公固潁川之族㝷後之後而不得承騫之系矣而洪㒷祖所撰年譜但以騫之後丗甞徙昌黎遂附新史之說蜀以赭陽爲均州小有不同耳及其再考二書而見公丗系之實則遂諱匿不敢復著仲卿㑹愈之名而直以爲不可考今固不得而據也唯方崧卿増攷引董逌說以爲騫乃韓瑗韓休之祖而公自出於㝷稜与二書合其論南陽則又云今孟懷州皆春秋南陽之地自漢至隋二州皆属河内郡唐顯慶中始以孟州隷河南府建中中乃以河南之四縣入河陽三城使其後又改爲孟州今河内有河陽縣韓氏岀居之故公每自言歸河陽省墳墓而女拏之銘亦曰歸骨于河南之河陽韓氏墓張籍祭公詩亦云舊瑩盟津北則知公爲河内之南陽人其說獨爲得之公詩所謂舊籍在東都我家本瀍穀則必以地近而後甞徙居耳但據此則公与昌黎之韓異派而毎以自称則又有不可曉者豈是時昌黎之族頗盛故隨称之亦若所謂言劉悉出彭城言李悉出隴西者邪然設使公派果出昌黎也則其去赭陽巳歴数丗其後又屡迁徙不應舎其近丗所居之士而逺指鄧州爲郷里也方又引孔武仲之說亦同董氏而王銍以爲公生於河中之永楽今永楽猶有韓文郷則其說爲巳詳盖其丗系雖有不可知者然南陽之爲河内脩武則无可疑者而新史洪譜之誤断可識矣愈生三歳而孤隨伯兄㑹貶官嶺表㑹卒㛐鄭鞠之李漢序云先生生於大暦三年戊申三嵗而孤見祭梗文及乳母誌㑹事見盧東美誌洪譜云盧志所謂宗兄乃太宗小宗之宗舊史以爲從父兄誤笑又云舊史大暦十二年夏五月起居舎人韓㑹坐元載貶官柳宗元先友記云㑹善清言有文章名最髙以故多謗曽旣卒公携家北歸葬㑹河陽建中貞无間復避地於江南韓氏有别業在宣城因就食焉見歐陽詹哀詞復志賦祭嫂及老成文示爽詩愈自知讀書日記數千百言比長盡能通六經百家學行狀云讀書能記它生之所習墓志云先生七嵗好斈言出成文厶今按復志賦云值中原之有事兮將就食於江之南始專專於講習兮非古訓爲无所用其心則公之爲斈正在就食江南時也擢進士第洪譜云貞元三年丙寅公年十九始至京師見祭老成文歐陽哀詞答崔立之書五年己巳有上賈滑州書六年庚午有河中府連理木頌七年辛未有送斉皡序八年壬申登進士第時年二十五見上邢君牙書唐科名記云貞元八年陸贄主司試明水賦御溝新栁詩公名在榜中見与陸貟外書舊史云太暦貞元間文士多尚古斈而獨孤及梁粛最称渊奥愈從其徒游銳意鑚仰而自振於一代洎㪯進士投文於公卿間故相鄭餘慶頗爲名譽由是知名是年有争臣論九年癸酉博斈宏詞試太清宫觀紫極舞賦顔子不貳過論見上考功崔虞部書及与韋舎人書十年甲戍有省試斈生代斎郎議方攷此議當繫十一年試宏詞下未詳是否洪譜又云是年甞歸河陽省墳墓見祭老成文有贈張童子序十一年乙亥又試宏詞見答崔立之書有三上宰相書皆不報是年去京師過潼関有感二鳥賦旣歸河陽有畫記遂自河陽如東都有祭田横文今按八年以後此年以前又甞遊鳯翔以書抵邢君牙不得意去有岐山詩洪程皆定爲此年六月誤矣㑹董晉爲宣武節度使表署觀察推官晉卒愈從䘮出不四日汴軍亂乃去依武寧節度使張建封建封辟府推官操行堅正鯁言無所忌董晉行狀云十二年七月晉拜宣武節度使受命遂行韓愈實從公行狀云董公辟公以行得試祕書省校書郎爲觀察推官墓誌云先生三十有一而仕神道碑云十四年用進士從董晉平汴州推官舊史作廵官洪譜云二狀載公入汴在十二年丙子与史合而志碑所記皆後二年殊不可曉豈今年辟公以行至十四年始有成命邪亦不應如是之緩也方攷蜀本樊本無三十一而仕之文但云歴官二十有七年尓然自公卒之年逆数之亦當以十四年三十一歲爲歴官之始故公入汴雖在十二年然水門記十四年正月作石本猶但称攝節度掌書記前進士韓愈是辟命猶未下也計必是年辟命乃下故碑志之言如此不當以命下之緩爲疑也厶今按公入汴之年洪方得之碑志所計年数若以命下之日言之亦未爲失但云十四年從董晉平汴州則誤矣又送俱文珍序亦在十三年安得言十四年乃入汴乎要當以公之自言及二狀二史通鑑爲正持正狂躁其攷之或有未審不足據也舊史之作廵官則程記巳辨其非乙矣洪譜又云十三年丁丑公在汴有復志賦送汴州監軍俱文珍序十四年戊寅公在汴有天星詩水門記楊燕竒碑十五年己卯董晉行狀云二月三日丞相薨公從䘮行四日而汴州乱有汴州乱詩歴官記云汴軍乱愈家在圍中㝷得脫下汴東趨彭城愈從䘮至洛还孟津渡汜水出陳許閒以二月暮抵徐州節度使張建封居之于符離睢上及秋將辭去建封奏爲節度推官試恊律郎至冬建封使愈朝正于京師見歐陽哀詞是年有此日足可惜汴泗交流詩答李翶書上建封書論晨入夜歸事後又有諫擊毬書賀白兎狀徐泗豪節度掌書記㕔石記崔翰墓志十六年庚辰春公朝正叵徐有歸彭城詩夏去徐西居於洛陽見孟東野書及題下邳李生壁按公与東野書欲至秋辝去而題李生壁在五月十四日則不待全秋而巳去徐矣舊史亦云公發言眞率无所畏避豈竟以此不合雖建封之知巳亦不能容邪公旣去徐而建封卒翌日徐軍乱見白楽天哀三良文在洛有与衛中行書冬公如京師調四門愽士洪譜云十七年辛巳公在京師從調選三月東還見与盧汝州薦侯喜狀將歸有贈孟東野房蜀客詩是年有送李愿歸盤谷序李楚金墓誌公自去年冬參調竟无所成而歸今年冬再往十八年壬午春始有四門博士之授爲博士日甞謁告歸洛因遊華山即答張徹詩所謂洛邑得休告華山窮絶陘者也李肇囯史𥙷云愈好竒与客登華山絶峯度不可返發狂慟哭爲書与家人别華隂令百計取之乃下沈顔作聲書以爲肇妄載豈有賢者輕命如此考公詩則知囯史𥙷乃實録也是年有送陸歙州序上巳日燕太斈聽弹琴序与崔羣書施士丐墓誌馬彚行狀遷監察御史上䟽極論宫市德宗怒貶陽山令有愛在民民生子多以其姓字之洪譜云十九年癸未公年三十六自愽士拜監察御史時有齒落哭楊兵曹陸歙州傪詩及与陳京給事書禘祫議論權停選㪯狀苗氏墓志又上李實書称前守四門博士時巳罷博士未受御史之命書云愈來京師於今十五年蓋公自貞元五年從鄭滑間復來京師至此十五年矣實録於實詆之不餘力而此書乃盛称其所長此又不可曉也方攷唐制凡居官以四考爲满公在官踰年耳不知何故而罷罷而復迁行狀墓碑皆只言選授四門博士迁監察御史而此書称前官又以文投贄於李實似若不得巳者是固甞罷博士而别迁也是嵗七月公猶任博士乞免停選狀謂臣雖非朝官月受俸銭可以考也罷免之由不可詳究然恐不至於媚實以求進也或云德宗未年不任宰相所取信者李實韋執誼輩耳公蓋未免於屈身以伸道也然公天旱人飢狀專指李實而言其脩實録又於實一辭不恕獨於此書抵牾如此又公年十九始來京師在貞元二年也至貞元十九年實十八年矣今云來京師於今十五年洪雖以再至言之其實牽合也併誌所疑以竢知者洪譜又云是時有詔以旱饑蠲租之半有司徴愈急公与張署李方叔上䟽言関中天下根本民急如是請寛民徭而免田租天子惻然卒爲幸臣所䜛貶連州陽山令幸臣李實也見進斈解及祭張署文舊史云愈甞上章数千言極論宫市之弊貶陽山令䟽今不傳則公之𬒳絀坐論此兩事也方攷云公陽山之貶寄三斈士詩叙𫐠其詳而行狀但云爲幸臣所惡岀宰陽山神道碑亦只云因䟽関中旱飢專政者惡之則其非爲論宫市明矣今公集有御史䑓論天旱人飢狀与詩正合况翶湜皆從公遊者不應公甞論宫市数千言而狀及碑誌略不一言及也然行狀且謂爲幸臣所惡而公詩云或自疑上䟽上䟽豈其由則是又未必皆上䟽之罪也又曰同官尽才俊偏善柳与劉或慮語言泄傳之落冤讎又岳陽楼詩云前年出官由此禍最無妄姦猜畏弹射斥逐恣欺誑是盖爲王叔文韋執誼等所排矣德宗晚年韋王之黨巳成是年𥙷闕張正買䟽諫它事得召見与所善者数人皆𬒳譴斥意公之岀有類此也憶昨行云伾文未揃崖州熾雖得赦宥常愁清是其爲叔文等所排豈不明甚特无所歸咎駕其罪於上䟽耳洪兼宫市旱飢两事言之而又不考韋王始末故爲申及之一洪譜又云以公詩攷之盖以十九年冬未貶官二十年甲申春始到陽山時有同冠峽貞女峽和張十一功曹送刘生謝李貟外諸詩及别知賦送楊八弟歸湖南序區冊序荅竇存亮書王弘中燕喜亭記改江陵法曹參軍洪譜及歴官記云二十一年乙酉正月丙申順宗即位二月甲子大赦八月辛丑改元永貞迁者皆追回愈爲觀察使所抑財徙江陵府法曹参軍見八月十五夜贈張功曹詩及張署墓志河南同官記洪又云公以今年春遇赦夏秋離陽山竢命於郴者三月至秋未始受法曹之命見祭李郴州文時有郴州祈雨及郴口諸詩自郴至衡有合江亭及謁衡岳廟詩自衡至潭有陪杜侍御遊湘西寺及湘中諸詩自此泛洞庭有阻風贈張十一詩至岳州有别竇司直詩赴江陵有途中寄翰林三斈士詩又有送孟琯序荆潭唱和序上李巽書鄭夫人殯表及五箴序云余生三十有八年則其箴盖是年作所謂幕中之辨盖謂在徐州時䑓中之評則謂爲御史時也元和𥘉權知國子博士分司東都三歳爲眞洪譜云永貞二年丙戍正月丙寅朔改元元和時憲宗即位之踰年也公年三十有九其春夏猶在江陵有李花寒食出游夜歸贈張十一鄭羣贈簟答張徹諸詩六月自江陵召拜囯子博士還朝後有豐陵行游青龍寺贈崔立之送文暢諸詩城南諸聮句及祭十二兄岌文并墓誌二年丁亥春公爲博士有元和聖德詩并釋言行狀云宰相有愛公文者將以文斈職処公有爭先者構公語以飛之公恐及難遂求分司東都而公作周况妻韓氏墓誌乃云從兄俞卒開封尉愈於時爲博士乞分教東都生以收其孥於開封界中教畜之飛語即釋言所觧之䜛而竟不能觧故以兄䘮爲辭而求去耳時宰相鄭絪翰林舍人李吉甫裴垍也公以夏永離京赴東都有酬裴十六途中見寄詩是年有張中丞傳後叙答馮宿書盧於陵墓誌三年戊子改眞博士見行狀有酬崔十六少府及東都遇春詩与少室李渤書裴復墓誌新史渤傳云洛陽令韓愈遺渤書公時爲博士五年方爲河南令未甞爲洛陽令也改都官貟外郎即拜河南令洪譜云四年巳丑公年四十二改都官貟外即守東都省神道碑云除尚書都官郎中分司判祠部行狀新舊史皆云貟外郎送李正字序亦但云都官郎碑文誤也方故公除都官六月十日也制辭亦作貟外郎一洪譜又云神道碑云中官号功曹使司京城觀寺尚書歛手失聀先生按六典尽索之以歸誅其無良時其出入禁譁衆以正浮屠歴官記云公判祠部日与宦者爲敵惡言罵辭狼籍公牒乃上書留守鄭餘慶乞与諸郎官更判不見允在東都有游嵩洛諸題名送李翺侯參謀和盧汀銭徽与竇韋㝷刘尊師諸詩送李正字歸湖南序并詩鄭涵校理序祭薛公逹文并墓誌京兆韋夫人墓誌河南府同官記五年庚寅授河南縣令神道碑云魏鄆幽鎮各爲留邸貯潜卒以橐罪士官无𬒳問者先生將擿其禁以壯朝廷断民署吏俟令目發留守尹大恐遽相禁有使還爲言憲宗恱曰韓愈助我者是後鄆邸果謀反東都將署留守以應淮蔡又有上留守鄭公啓時公以論事失鄭公意旣令河南軍人有罪公追而杖之留守不恱公以啓辨明旦力求去見集中行狀云改河南令日以聀分辨於留守及尹故軍士莫敢犯禁疑鄭公卒聽其言故軍人畏服如此也在河南有感春詩燕河南秀才序送石洪序并詩及月蝕招揚之罘河南令舎池䑓諸詩張圎墓碣盧殷墓誌遷職方貟外郎洪譜云六年辛卯行尚書聀方貟外郎是年春公尚在河南有送窮文辛卯年雪寄盧仝誰氏子諸詩送温造序乳母誌至京師有酬盧雲夫望秋作石鼓歌復仇狀盧丞房武畢墓誌華隂令柳澗有􅓧前刺史劾奏之未報而刺史罷澗諷百姓遮索軍頓役直後刺史惡之按其獄貶澗房州司馬愈過華以爲刺史隂相黨上䟽治之旣御史覆問得澗贓再貶封溪尉愈坐是復爲愽士洪譜云七年壬辰二月乙未以聀方貟外郎復爲國子博士年四十五舊史云愈因使過華上䟽理澗公自去年以來未甞出使或云即公赴聀方時過華覩其事遂䟽于朝尓進斈觧云三年博士冗不見治舊又作三爲博士按公貞元壬午授四門博士元和丙戍爲國子博士丁亥分教東都今年又自郎官下迁凡四爲博士矣此先言暫爲御史継言三爲博士則自丙戍而後三歴此官也若云三年則自元年夏赴召至四年春尚爲博士首尾巳四年矣方攷云丙戍𥘉除丁亥分教自不必釐而爲二其爲博七實三迁也當作三爲為是今按上句言暫爲御史而此言三年博士正以其居官之乆近爲言恐當作年爲是然亦未敢必也洪譜又云是年二月有論錢重物輕狀新志云自建中定两稅而物輕錢重民以爲患於是詔百官議革其弊方攷以爲此識在穆宗即位之𥘉通鑑附之長慶元年秋爲得其實今年𥘉无此議也惟㑹要載元和六年二月制謂建中後貨輕物重許諸道所納見銭五分量徴二分餘三分兼納實估匹段或當時有此議然亦非七年也况公六年二月尚在東都洪誤矣洪譜文云是年有石鼎聮句贈刘師服詩祭石洪文李素石洪墓誌路應神道碑旣才髙數黜官又下遷乃作進學解以自諭執政覧之竒其才改比部郎中史館修撰洪譜云此除在八年癸巳三月乙亥舊史云執政覧其文而憐之以其有史才故除是官時宰相武元衡李吉甫李絳也是年有答刘秀才論史書及烏氏田氏廟碑鄭儋神道碑李虚中董溪息國夫人墓誌轉考功知制誥洪譜云九年甲午十月甲子爲考功郎中依前史館修撰十二月戊午以考功知制誥是年有元微之書田弘正書送張道士序刘昌裔神道碑王適孟郊扶風郡夫人墓誌十年乙未公知制誥有和庫部盧曹長元日朝廻及寒食直歸遇雨二詩与李絳書進順宗實録狀舊史云愈撰實録繫簡不當叙亊拙於取舎按退之作史詳略各有意削去常事著其繫於政者其襃善貶惡之旨明甚當時議者非之卒竄定无全篇良可惜也史又云愈說禁中事頗切直内官惡之往往於上前言其不實此言是也是年有与柳公綽二書論淮西事宜狀說見眀年又有捕賊行賞表藍田縣丞㕔記獨孤郁衛之立墓誌徐偃王廟碑進中書舎人𥘉憲宗將平蔡命御史中丞裴度使諸軍按視及還具言賊可㓕與宰相議不合愈亦奏言淮西連年侵掠得不償費其敗可立而待然未可知者在陛下斷與不㫁耳執政不喜㑹有人詆愈在冮陵時爲裴均所厚均子鍔素無狀愈爲文章字命鍔謗語囂暴由是改太子右庶子洪譜云十一年丙申正月丙戍以考功郎中知制誥迁中書舎人丙申賜緋魚五月癸未降爲太子右庻子行狀云盗殺武元衡公以爲盗殺宰相而遽息兵其爲懦甚大兵不可以息以天下力取三州尚何不可与裴丞相議合故兵遂用而宰相有不便之者月满迁中書舎人後竟以它事改右庻子時宰相斈逢吉韋貫之也其云月满迁中書舎人者盖唐制䑓郎满􅍲則迁公以去年冬知制誥至今春竟一歲矣李漢云收拾遺文无所失墜公掌綸誥一年无一篇見收者失墜多矣唯後集有崔群戸部侍郎制一首尔厶今按行状通鑑洪譜論淮西事直状在去年知制誥持而神道碑新史則在迁中書舎人之後但行狀言公所論有殺宰相事乃在去年六月而狀中實无此語若狀果在六月之後則不應全不言及則是此狀不惟不在十一年正月之後亦不在十年六月之後也故通鑑直以繫於五月之下行狀叙亊雖實而記言則誤碑文新史固爲失之今當以通鑑爲正洪譜又云是年有酬盧雲夫曲江荷花行周况妻韓氏墓誌王用碑科斗書後記及度以宰相節度彰義軍宣慰淮西奏愈行軍司馬愈請乗遽先入汴說韓弘使恊力元濟平遷刑部侍郎行狀神道碑及舊史云十二年丁酉秋以兵老乆屯賊未㓕上命裴丞相為淮西節度使以招討之丞相請公以行賜三品衣魚爲行軍司馬從丞相居於郾城軍出潼関公請先乗遽至汴感說都統弘弘說用命師乗遂和公知蔡州精卒悉聚界上以拒官軍守城者率老弱且不過千人亟白丞相請以兵三千人間道以入必擒呉元済丞相未及行而李愬自唐州文城壘提其卒以夜入蔡州果得元済三軍之士爲公恨蔡州旣平布衣栢耆以計謁公公与語竒之遂白丞相日雀西滅王承宗膽破可不勞用衆宜使辯士奉相公書明禍福以招之彼必服丞相然之公口占爲書使栢耆神之以至鎮州承宗果大恐上表請割德棣二州以献遣子入侍丞相歸京師以功迁刑部侍郎詔公撰平淮西碑其辝多叙裴度事時先入蔡州擒元済李愬功第一愬不平之愬妻出入禁中因訢碑辝不實詔令磨公文命翰林斈士叚文昌重撰文勒石是年有送殷侑序祭張署文并墓誌及東征往還醻唱諸詩晚秋郾城夜㑹聮句爲刑部時有㪯錢徽自代狀十二年戍戌四月鄭餘慶爲詳定礼楽使奏韓愈李程爲副是年有李惟簡墓誌權德輿碑憲宗遣使者往鳯翔迎佛骨入禁中三日乃送佛祠王公士庶奔走膜唄至爲夷法灼體膚委珍貝騰沓係路愈聞惡之乃上表極諌帝大怒持示宰相將抵以死裴度崔羣曰愈言訐牾罪之誠宜然非内懷至忠安能及此願少寛假以來諌爭帝曰愈言我奉佛太過猶可容至謂東漢奉佛以後天子咸夭促言何乖刺耶愈人臣狂妄敢爾固不可赦於是中外駭懼雖戚里諸貴亦爲愈言乃貶潮州刺史旣至潮以表哀謝帝頗感悔欲復用之持示宰相曰愈前所論是大愛朕然不當言天子事佛乃年促耳皇甫鏄素忌愈直即奏言愈終狂䟽可且内移乃改袁州刺史𥘉愈至潮問民疾苦皆曰惡溪有鱷魚食民畜産且盡民以是窮數日愈自往視令其屬秦濟以一羊一豕投谿水而祝之是夕暴風震電起谿中數日水盡涸西徙六十里自是潮無鱷魚患袁人以男女爲隷過期不贖則没入之愈至悉計庸得贖所没歸之父母七百餘人因與約禁其爲隷洪譜云公以十四年已亥正月癸巳貶潮州刺史宰相疑馮宿草䟽出宿爲歙州刺史時宰相皇甫鏄程异也公之𬒳謫即日上道便道取疾以至海上據宜城驛記則以三月二日過官城據龍吏詩則以三月幾望至曲江據謝表則以三月二十五至潮州據祭文則以四月二十四日逐鱷魚其自曲江至潮以十許日行三千里盖瀧水湍急故也方攷乃云謝表及祭神文皆止云今月而逐鱷魚文正本皆但云年月日則公之到郡實不知何月日也兄自韶至廣雖爲順流而自廣之惠自惠之潮水陸相半要非旬日可到故公表亦云自潮至廣來往動皆經月則公到郡决非三月而逐鱷魚亦未必在四月二十四日也厶今按道里行程則方說爲是但与太顚第一書石本乃云匹月七日則又似實以三月二十五日到郡也未詳其說闕之可也㓋譜又云公自京師至潮有路旁堠至藍関示姪孫湘武關西逢配流吐蕃食曲河驛坎鄧州界過南陽隴吏題臨瀧寺至韶州寄張使君酬張使君惠書過始㒷江口感懷贈元十八協律𥘉南食貽元十八荅柳柳州食蝦蟇别趙子諸詩及宜城驛記潮州謝表祭鱷魚文請置鄉校牒賀冊尊號表是年七月己丑羣臣上尊號大赦十月己巳凖例量移改授袁州刺史召拜國子祭酒洪譜云十五年庚子閏正月穆宗即位公以今年春到袁途中有酬張韶州端公及韶州留别張使君二詩至袁有袁州謝上賀穆宗即位賀赦賀册皇太后賀慶雲五表㪯韓泰自代狀滕王閣記九月召拜囯子祭酒而閣記乃云十月袁州刺史者盖命下在九月受命在十月也有祭湘君夫人文祭文所謂復其章綬者公爲行軍司馬時賜金紫今爲祭酒始復其舊也自袁䞦京師有次石頭驛寄江西王中丞閣老仲舒詩至江州有寄鄂岳李天失程及題西林寺故萧二郎中舊堂詩因話録云䔥穎土子存字佰誠爲金部貟外郎悪裴延齡之爲人弃官帰庐山公少時嘗受金部賞知及經江州遊庐山訪金部故居因賦此詩留百縑以拯之行次安陸有寄隨州周貟外君巢二詩至棗陽縣有題廣昌館詩至㐮州有醉中留别李相公詩以冬暮至京師是年有南海廟碑与孟簡書論黄家賊事宜及典貼良人男女狀又論夷䝤請因改元大慶遣使宣諭仍擇經略使撫之又有柳子厚及姪孫滂祭文墓誌洪譜又云行狀云公入迁祭酒有直講能說礼而陋容斈官多豪族子擯之不得共食公命吏曰召直講來与祭酒共食斈官由此不敢賎直講奏儒生爲斈官日使㑹講生徒奔走聽聞者相喜曰韓公來爲祭酒囯子監不寂寞矣公在囯子有雨中寄張藉詩㪯張推素自代及請復囯子監生徒狀論新注斈官牒薦張藉狀請上尊號表轉兵部侍郎洪譜云此除在長慶元年辛丑七月時有㪯韋顗自代狀李郱張徹祭文李郱鄭羣薛戎墓誌今按方氏増攷論銭重物輕狀當在此年秋鎭州亂殺田弘正而立王廷湊詔愈宣撫旣行衆皆危之元稹言韓愈可惜穆宗亦悔詔愈度事從宜無必入愈曰安有受君命而滯留自顧遂疾驅入廷湊嚴兵迓之甲士陳庭旣坐廷湊曰所以紛紛者乃此士卒也愈大聲曰天子以公爲有將帥材故賜以節豈意同賊反邪語未終士前奮曰先太師爲國擊朱滔血衣猶在此軍何負朝廷乃以爲賊乎愈曰以爲爾不記先太師也若猶記之固善且爲逆與順利害不能逺引古事但以天寳來禍福爲爾等明之安禄山史思明李希烈梁崇義朱滔朱泚呉元濟李師道有若子若孫在乎亦有居官者乎衆曰無愈曰田公以魏博六州歸朝廷官中書令父子受旗節劉悟李祐皆大鎮此爾軍所共聞也衆曰弘正刻故此軍不安愈曰然爾曹害田公又殘其家矣復何道衆乃讙曰侍郎語是廷凑恐衆心動遽麾使去因泣謂愈曰今欲廷湊何所爲愈曰神策六軍之將如牛元翼比者不少但朝廷顧大體不可棄之公乆圍之何也廷湊曰即出之愈曰若爾則無事矣㑹元翼亦潰圍岀廷湊不追愈歸奏其語帝大恱轉吏部侍郎洪譜云良慶元年七月鎮州乱殺田弘正立王廷湊命深州刺史牛元翼節度深冀以討之十月命裴度爲鎮州四靣行營都招討使无翼爲廷湊所圍二年壬寅二月赦廷湊詔愈宣撫帰而牛元翼果出行狀云公還於上前奏与廷湊及三軍語上大恱日卿直向伊如此道由是有意大用授吏部待郎厶今按先太師謂故鎮帥王武俊也神道碑云方鎮反太原兵以輕利誘迴紇召先生禍福譬引虎齧臃血直今所患非兵不足遽䟽陳得失厶今按此数語不可曉它書亦皆无之未詳何謂恐有誤也洪譜又云是年有次壽陽驛次太原呈副使呉郎中次氶天營奉酬裴司空鎮州路上酬裴司空重見寄鎭州𥘉帰諸詩及韋侍講盛山詩序論変塩法事宜狀二年士寅九月轉吏部侍郎行狀云凡令史皆不鎻聽出入或問公公曰人所以畏鬼者以其不能見也鬼如可見則人不畏矣選人不得見令史故令史勢重聽其出入故势輕是年有鄆州谿堂詩竇同業祭文墓誌楚囯夫人墓誌黄陵廟碑時宰相李逢吉惡李紳欲逐之遂以愈爲京兆尹兼御史大夫特詔不䑓參而除紳中丞紳果劾奏愈愈以詔自解其後文刺紛然宰相以䑓府不恊遂罷愈爲兵部侍郎而出紳江西觀察使紳見帝得留愈亦復爲吏部侍郎洪譜云三年癸卯六月以吏部侍郎爲京兆尹兼御史大夫敕放䑓参後不得爲例十月癸巳爲兵部侍郎庚子爲吏部侍郎行狀云改京兆尹六軍將士皆不敢犯私相告曰是尚欲燒佛骨者安可忤故盗賊止遇旱米價不敢上李紳爲御史中丞械囚送府使以尹村杖之公曰安有此使帰其囚是時紳方幸旦夕且相宰相欲去之故以䑓与府不協爲請兩改其官紳旣復留公入謝上日卿与紳爭何事公因自辯数目復為吏部侍郎神道碑云復爲兵部侍郎銓不鎻入吏選父七十母六十身七十悉与二利取才財势路絶厶今按碑失兵部一節此兵字當作吏字不鎻入吏即謂前縱吏出生事三利取才未詳其義疑銓法有此語或是有脫誤也洪譜云公爲京兆有㪯馬揔自代狀賀雨及賀太陽不虧表祭竹林神曲江祭龍文再爲兵部有㪯張正甫自代狀是年有羅池廟碑送鄭權序并詩祭馬揔女挐文并李干女挐墓誌韓弘碑論孔戣致仕狀長慶四年卒年五十七贈禮部尚書謚曰文洪譜云四年甲辰正月敬宗即位二月有王仲舒碑四月有張徹墓誌八月有孔戣墓請是年公没年五十七行狀云得病滿百日假旣罷以十二月二日卒於靖安里第公属纊語曰厶伯兄德行髙曉方薬食必視本草年止於四十二某踈愚食不擇禁忌位爲侍郎年出伯兄十五嵗矣如又不足於何而足且獲終於牖下幸不至失大節以下見先人可謂荣矣明年張籍祭公詩有云去夏公請告養疾城南莊籍時官休罷两月同遊翔又曰共爱池上佳聮句舒遐情又曰公爲游溪詩唱詠多旣康城南莊在長安城南公之别墅也池上聮句集中无之遊溪詩即南溪始乏三首是也又曰公有曠逹識生死為一綱及當臨終晨意色亦不荒贈我珍重言傲然委衾裳其於死生之際如此神道碑云遺命䘮葬无不如礼俗習夷狄畫冩浮圖日以七数之及拘隂陽所謂吉凶一无汚我厶今按此事可見公之平生謹守礼法排斥異教自信之篤至死不変可以爲後丗法而譜下載盖不以爲然也愈性明銳不詭隨與人交終始不少變成就後進士往往知名經愈指授皆稱韓門弟子愈官顯稍謝遣凡内外親若交友無後者爲嫁遣孤女而䘏其家㛐鄭䘮爲服朞以報行狀云公氣厚性通論議多大体神道碑云朝有大獄大疑文武㑹同莫先發言先生援經引決考合傳記侃侃正色伏其所詞墓誌云公洞朗軒闢不施㦸級平居雖寢食未甞去書怠以爲枕餐以餄口講評孜孜以磨諸生恐不完美游以詼笑惸歌使皆醉義忘歸嗚呼可謂樂易君子鉅人者矣碑又云内外惸弱悉撫之一親以仁使男有官女有從不啻於巳生交於人巳而我負終不計死則庀其家均食剖資虽㣲弱待之如賢戚人詬笑之愈篤未甞一食不對客閨人或晝見其靣退祖指語以爲異事未甞宿貨餘財每曰吾前日解衣質食今存有巳多矣毎言文章自漢司馬相如太史公劉向揚雄後作者不丗出故愈深探本元卓然樹立成一家言其原道原性師說等數十篇皆奥衍閎深與孟軻揚雄相表裏而佐佑六經云至它文造端置辭要爲不襲蹈前人者然惟愈爲之沛然若有餘至其徒李翶李漢皇甫湜從而效之遽不及逺甚從愈游者若孟郊張籍亦皆自名於時墓誌云先生之作无圖无方至是歸工抉經之心執聖之權尚友作者跋邪觝異以扶孔氏存皇之極知人罪非我計茹古涵今无有端涯渾渾灝灝不可窺校及其酣放豪曲快字凌𥿄怪發鯨鏗春䴡驚耀天下然而栗宻窈眇章安句適精能之至入神出天嗚呼極矣後人无以加之矣姬氏巳來一人而止矣厶今按知人罪非我計此句中必有脫誤疑當云人知人罪非我所許方氏附録程子日韓愈亦近丗豪傑之士如原道之言錐不能尢病然自孟子以來能知此者獨愈而巳其日孟子醉乎醇又曰荀与揚也擇焉而不精語焉而不詳若无所見安能由千載之後判其得失若是之明也又曰退之晚年之文所見甚髙不可易而讀也古之斈者修德而巳有德則言可不斈而能此必然之理也退之乃以斈文之故日求其所未至故其所見及此其於爲斈之序虽若有所戾者然其言日軻之死不得其傳此非有所襲於前人之語又非鑿空信口率然而言之是必有所見矣若无所見則其所謂以是而傳者果何事邪人今按諸賢之論唯此二條爲能極其深処然復考諸臨川王氏之書則其詩有日紛紛易尽百年身㪯丗何人識道眞力去陳言誇未俗可憐无𥙷費精神其爲予奪乃有人不同者故甞折其衷而論之竊謂程子之意固爲得其大端而王氏之言亦自不爲无理盖韓公於道知其用之周於萬事而未知其体之具於吾之一心知其可行於天下而未知其本之當先於吾之一身也是以其言常詳於外而畧於内其志常極於逺大而其行未必能謹於細㣲虽知文与道有内外淺深之殊而終未能審其緩急重輕之序以決取舎虽知汲汲以行道済時抑邪与正爲事而或未免雜乎貪位慕禄之私此其見於文字之中信有如王氏所譏者矣但上氏虽能言此而其所謂道眞者實乃老佛之餘波正韓公所深詆則是楚虽失而斉亦未爲得耳故今兼存其說而因附以狂妄管窺之一二私竊以爲若以是而論之則於韓公之斈所以爲得失者庻幾其有分乎賛曰唐興承五代剖分王政不綱文弊質窮䵷俚混并天下巳定治荒剔蠹討究儒術以興典憲薫醲涵浸殆百餘年其後文章稍稍可述至貞元元和間愈遂以六經之文爲諸儒倡障隄末流反刓以樸剗僞以眞然愈之才自視司馬迁揚雄至班固以下不論也當其所得粹然一出於正刋落陳言横騖别驅汪洋大肆要之無抵牾聖人者其道盖自比孟軻以荀況揚雄爲未淳寕不信然至進諌陳謀排難䘏孤矯拂媮末皇皇於仁義可謂篤道君子矣自晋訖隋老佛顯行聖道不断如帶諸儒倚天下正議助爲怪神愈獨喟然引聖爭四海之惑雖蒙訕㗛跲而復奮始若未之信卒大顯於時昔孟軻拒揚墨去孔子才二百年愈排二家乃去千餘歲撥衰反正功與齊而力倍之所以過況雄爲不少矣自愈没其言大行學者仰之如泰山北斗云文録序趙德昌黎公聖人之徒歟其文髙出與古之遺文不相上下所履之道則堯舜禹湯文武周孔孟軻揚雄所授受服行之實也固巳不雜其傳由佛及聃莊楊之言不得干其思入其文也以是光於今大於後金石燋鑠斯文燦然德行道學文庶幾乎古蓬茨中手持目覧飢食渇飲沛然蒲飽頋非適諸聖賢之域而謬志於斯將所以盗其影響僻處無備得以所遇次之爲卷私曰文録實以師氏爲請益依歸之所云實或作寳記舊本韓文後歐陽文忠公予少家漢東漢東僻陋無學者吾家又貧無藏書州南有大姓李氏者其子彦輔頗好學予爲兒童時多游其家見其弊筐貯故書在壁間發而視之得唐昌黎先生文集六卷脫略顚倒無次第因乞李氏以歸讀之見其言深厚而雄愽然予猶少未能悉究其義徒見其浩然無涯若可愛是時天下學者楊劉之作號爲時文能者取科第擅名聲以誇榮當丗未嘗有道韓文者予亦方舉進士以禮部詩賦爲事年十有七試于州爲有司所黜因取所藏韓氏之文復閱之則喟然歎曰學者當至於是而止爾因怪時人之不道而頋巳亦未暇學徒時時獨念于予心以謂方從進士干禄以養親苟得禄矣當盡力於斯文以償其素志後七年舉進士及第官于洛陽而尹師魯之徒皆在遂相與作爲古文因出所藏昌黎集而𥙷綴之求人家所有舊本而校定之其後天下學者亦漸趨於古而韓文遂行于丗至于今盖三十餘年矣學者非韓不學也可謂盛矣嗚呼道固有行於逺而止於近有忽于往而貴于今者非惟丗俗好惡之使然亦其理有當然者故孔孟惶惶於一時而師法於千萬丗韓氏之文没而不見者二百年而後大施於今此又非特好惡之所上下盖其乆而愈明不可磨㓕雖蔽于暫而終耀于無窮者其道當然也予之始得於韓也當其沈没弃廢之時予固知其不足以追時好而取勢利於是就而學之則予之所爲者豈所以急名譽而干勢利之用哉亦志乎乆而巳矣故予之仕於進不爲喜退不爲懼者盖其志先定而所學者宜然也集本出於蜀文字刻畫頗精於今丗俗本而脫繆尤多凡三十年閒聞人有善本者必求而改正之其最後卷秩不足今不復𥙷者重増其故也予家藏書萬卷獨昌黎先生集爲舊物也嗚呼韓氏之文之道萬丗所共尊天下所共傳而有也予於此本特以其舊物而尤惜之泉本云吾少居漢東年十五六時於里人李堯輔家見一弊筐弃在壁角中有故事数十册因得韓文於其間皆脫落无次序吾畧讀之爱其文辨而意深當是時斈者方作時文天下之人无道韓文者予亦將㪯進立以觖禄利未暇斈也遂求於李氏而得之以帰𥙷次成秩而藏之数年始及第遂官于洛而得師魯与之遊因出韓文而㪯之自後天下斈者亦稍稍近古吾家所藏書万卷然獨韓文最爲舊物君為吾愛惜之可也今按泉州本乃生彦章所刻此序獨与諸本不同不知何據其所謂君者又不知爲何人也今井存之以俟知者潮州韓文公廟碑蘇文忠公匹夫而爲百丗師一言而爲天下法是皆有以參天地之化關盛衰之運其生也有自來其逝也有所爲矣故申吕自嶽降而傳說爲列星古今所傳不可誣也孟子曰吾善養浩然之氣是氣也寓於㝷常之中而塞乎天地之間卒然遇之則王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辯是孰使之然哉其必有不依形而立不恃力而行不待生而存不隨死而亡者矣故在天爲星辰在地爲河嶽幽則爲鬼神而明則復爲人此理之常無足怪者自東漢以來道䘮文弊異端並起歴唐正觀開元之盛輔以房杜姚宋而不能救獨韓文公起布衣談笑而麾之天下靡然從公復歸于正盖三百年於此矣文起八代之衰而道濟天下之溺忠犯人主之怒而勇奪三軍之帥此豈非參天地関盛衰浩然而獨存者乎盖嘗論天人之辨以謂人無所不至惟天不容僞智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精誠能開衡山之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇父鏄李逢吉之謗能信於南海之民廟食百丗而不能使其身一日安於朝廷之上盖其所能者天也其所不能者人也始潮人未知學公命進士趙德爲之師自是潮之士皆篤於文行延及齊民至于今號称易治信乎孔子之言君子學道則愛人而小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉而廟在刺史公堂之後民以出入爲艱前守欲請諸朝作新廟不果元祐五年朝散郎王君滌來守是邦凡所以養士治民者一以公爲師民旣恱服則出令曰願新公廟者聽民讙趨之卜地於州之城南七里期年而廟成或曰公去國萬里而謫于潮不能一歳而歸没而有知其不眷恋于潮也審矣軾曰不然公之神在天下者如水之在地中無所往而不在也而潮人獨信之深思之至焄蒿悽愴若或見之譬如鑿井得泉而曰水專在是豈理也哉元豐七年詔封公昌黎伯故榜曰昌黎伯韓文公之廟潮人請書其事于石因爲作詩以遺之使歌以祀公其詞曰公昔騎龍白雲郷手扶雲漢分天章天孫爲織雲錦裳飄然乗風來帝旁下與濁丗掃粃糠西游咸池略扶桑草木衣𬒳昭回光追逐李杜參翶翔汗流籍湜走且僵㓕没倒景不可望作書詆佛譏君王要觀南海窺衡湘歴舜九疑弔英皇祝融先驅海若藏約束鮫鱷如驅羊鈞天無人帝悲傷謳吟下招遣巫陽犦牲雞卜羞我觴於粲荔丹與蕉黄公不少留我涕滂翩然被髮下大荒朱文公校昌黎先生集傳卷終, WYG: ''}
