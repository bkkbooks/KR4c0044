  - {type: variant, offset: 0, length: 9411, content: 朱文公校昌黎先生文集卷之八考異音釋附聮句方云諸聮句多元和𥘉作城南聮句聮句古無此法自退之始樊曰刻貢父云退之與東野聮句宏壯辨傳似若不出一手王深父云退之容有潤色吕氏童訓徐師川問山谷曰人言東野聮句大非平日所作恐是退之有所潤色山谷云退之安能潤色東野若東野潤色退之却有此理方云蜀本作一百五十韻今本因之然此詩實多三韻不可以爲据竹影金瑣碎郊瑣或作鎻非是沈存中云乃日光非竹影也洪曰日光在其中若日日光金鎻碎則不可也泉音玉淙琤音一作声淙藏宗士江二切琤楚耕切陸士衡詩云山溜何泠泠飛泉潄鳴玉樊曰荆公詩云風泉隔屋撞哀玉竹月縁階貼碎金語本此瑠璃翦木葉愈翡翠開園英流滑隨仄歩郊捜尋得深行遥岑岀寸碧愈逺目増雙明乾穟音遂禾秀乾滯德也紛往地郊紛或作絲或作紅化蟲枯挶莖挶居玉切韓曰挶持也孫曰化虫虫之変化者如蟬蟻之類枯挶莖者言化虫已枯尚掲持於草木之莖也木腐或垂耳愈草珠競駢蒲眠切並也睛浮虚有新􅓯郊摧扤饒孤撑方云扤動也字不當从木古楽府不見山顚倒摧扤下爲薪囚飛黏網動愈盗啅接彈驚啅音卓鳥食也社詩啾啾黄雀啅接弹言弹丸相接故驚也方云囚飛盗啅潮本作虫飛雀啅此詩一体六語皆賦物而不言其名舊本並同上脫實自開坼郊牽柔誰繞縈禮䑕拱而立愈陸機云河東有大䑕能人立交前两脚於頸上跳舞善鳴駭牛躅直六反躑躅也且鳴駭方作騃音俟說文馬行仡仡也詩儦儦俟俟韓詩作騑騃騃故西京賦云羣獸騃此當从俟音則於躅且鳴義爲合也今按方說騃躅二字於牛義无取疑當从蜀本作駭而躅當作觸乃於牛有意又与上字相偶然无所据姑附于此𬞞甲喜臨社郊時乃八月田毛田所生者謂之毛宅不毛是也樂寛征露螢不自暖愈凍蝶尚思輕孫曰尚欲飛也宿羽有先曉郊孫曰宿鳥有未曉而飛也食鱗時牛横孫曰魚之食者半横水中菱翻紫角利愈翻或作繁荷折碧圎傾楚膩食亶知連切口在頷也魚下江東日黄魚鮪亂郊獠羞螺蠏并獠張絞切又盧作切祝曰西南夷别名孫曰羞亦食也言水有鱣鮪螺蠏若獠羞然桑蠖烏郭切桑虫也見虚指愈言空有迹耳穴貍聞闘獰逗翳上音豆下於計切逗上也翳隂也孫曰言鳥止於林隂其翅相觸也翅相築郊擺幽尾交榜薄庚切孫曰擊也如蛇之類擺於出僻其尾相繫也蔓涎孫曰謂蝸牛涎於蔓上角出縮愈樹啄啄木鳥頭𫾣鏗脩箭竹也褭金餌郊羣鮮沸池羮岸殻坼玄兆愈孫曰言岸有虫壳拆開如立兆象野麰漸豐萌窰煙羃䟽島郊窰音由白姻羃覆也周礼羃人窰或作瑶沙篆印廻平孫曰言廻曲之平処洪曰華山有青柯平鍾薬平因地之平処以為名也㾕肌遭蚝七吏切毛虫有毒刺愈刺七亦切㾕或作瘁方云見闘雞篇啾耳聞雞生竒慮恣廻轉郊遐睎縱逢迎巓音顚山頂林戢歛也逺睫愈縹敷沼切祝曰青黄色孫曰夷楽也言望巓林觀縹氣戢目以夷情氣夷空情歸跡歸不得郊捨心捨還爭靈麻撮狗蝨愈孫曰胡麻也狀如狗蝨村稚啼禽猩孫曰言小兒之啼如猩猩尓雅猩猩小而好啼紅皮孫曰菓实皺而紅芻者說者曰乾棗曬檐瓦郊檐或作簷黄團繫門衡洪曰瓜萎也一日天瓜衡門上木得雋徂兖切言豪俊左氏得雋曰克蠅虎韓曰崔豹古今住蝇豹即蠅虎健愈相殘雀豹孫曰雀之鷙者以其勇徤故曰雀豹趟音棖洪曰跳躍皃玉萹䞴趟跟党也束枯樵指秃郊刈熟擔肩赬澁旋随恋切皮卷脔愈卷求晩切脔力轉切不舒放也若開腹彭亨孫伯野謂此二語与上二語意属一日澁旋乃旋果实之澁者苦開乃破瓜瓠之苦者也方言謂環而䥴之為旋卷脔見莊子彭亨方作膨脝又云古字只作彭亨毛詩傳炰烋猶彭亨是也機㫪韓曰果碓也潺湲力郊吹簸飄颻精賽饌祭食木盤簇愈靸妖藤索絣靸恐合切絣北萌切孫曰靸小兒履絣以藤索為之樊曰此句与其下䟠繩機婺疑為今之靸韆韓曰已上泛言城南景物之盛靸妖或作妖靸絣或作帡或作耕方作併云今併字不入庚韻故斈者疑之今按靸廣韻云蘇合切小兒履也今猶以為鞋靣䟽屦之名但用之於此句似无意義疑當作投楚治切收也取也獲也妖謂狐狸之属能為妖媚者也絣當从系獄中以繩索急縛罪人之名也言捕取妖狐而以藤索縛之也荒學五六卷郊古藏四三塋音營墓域四三或作三四里儒拳足拜愈土怪家語季桓子穿井得土缶問孔子孔子曰土之怪者羵羊缶也閃眸瞬目偵候也蹄遁補復破郊絲窠掃還成暮堂蝙蝠沸愈破竈伊威盈伊威或作蛜蝛方云詩釋文曰或旁加䖝後人増也追此訊前主郊荅云皆冡卿上卿也敗壁剥寒月愈孫曰月自敢壁而入如剥破之狀折篁嘯遺笙孫曰風次声袿熏霏霏在郊綦跡微微呈袿或作桂綦或作棊皆非是方云袿音圭婦人上服也古楽府衣上香猶在握裏書未滅班倢行賦俯視兮丹墀思君兮履綦綦履下飾也在或作炷呈或作星皆非是劒石猶竦檻愈獸材尚挐楹寳唾拾未盡郊玉啼墮猶鎗楚耕切唾或作碣啼方作題云蜀都賦玉題相輝題椽上飾也故曰墮猶鎗鎗墮声本或作琤或云柱躓也与玉題意相類洪曰此以咳唾喻珠璣以啼泣喻玉筯也唾又作硾啼又作揥今按上下文意皆婦女事洪說爲是若作題即上句當作碣然非文意又躓乃柱礎亦非可抬之物也牎綃孫曰言牎紗中尚疑閟藏佳人也疑閟豔愈䊋燭巳銷檠緑髮韓曰細草孫曰緑苔也抽珉甃孫曰珉石之次玉者甃并甃珉甃羙言之也言緑苔生於珉甃之上青膚孫曰青皮也韓曰苔蘚聳瑶楨音眞說文木也瑶楨美幹白蛾飛舞地愈幽蠧落書棚薄萌切博雅云閣也說文棧也蠧書䖝棚書架蠧一名蟫韓曰已上言郊墟宅野之古廢惟惜集嘉詠郊吐芳類鳴嚶窺竒摘海異愈恣韻激天鯨天上鯤鯨激騰躍也腸胃繞萬象郊精神驅五兵蜀雄李杜拔愈李杜下對雷車未詳其說嶽力雷車轟大句斡玄造郊玄或作元高言軋宵崢孫曰山之切雲者謂霄崢軋轢也芒端轉寒燠愈神助溢盃觥巨細各乗運愈湍潿湍急流湋濁不流韓曰巳上言昔人吟詠之工潿或作湋亦騰聲凌花咀粉蘂郊削縷穿珠櫻綺語洗晴雪愈嬌辭哢雛鸎酣歡雜弁珥郊珥音餌耳飾歡方作勸雜或作新方从閣本云昔淳于髠所謂前有墮珥後有遺簮是也今按方意勸為勸酒之意然此皆形容詩語之工不當作勸而作歡字則對價字為尤切繁價流金瓊􅔽蓞寫江調郊江或作紅方云選刘体玄詩悲發江南調謝靈運詩采菱調易急江南歌不緩李善皆引古江南詞江南可採蓮以舞之東野本集亦喜用江詷字萎蕤綴藍瑛音英玉光方云萎㽔青花圓实亦名土竹藍瑛藍田之玉也庖霜鱠玄鯽愈浙玉炊香粳音更方云浙字從折之舌切魏文帝朝王朗曰不能效君昔在㑹稽折杭米古浙作折其從折者星歴切孟子所謂接浙而行是也本多作浙朝饌巳百態郊春醪又千名哀匏蹙駛景愈蹙駛或作缺蹙或作蹙缺洌清也唱凝餘晶日光疑猶遏也解魄不自主郊痺卑利切肌坐空瞠或作膛今按莊子瞠若乎其後瞠丑庚切直見也言坐乆而无所見也扳援上音攀下音袁挽引也賤蹊絶愈孫曰謂賤者不可扳援而至也炫曜仙選更藂巧竸採笑郊藂或作叢方云唐人多書叢作藂楚詞及舊本韓桞集皆然今本尚見一一一姑存之駢鮮互探嬰桑變言桑樹変化却生蕪蔓忽蕪蔓愈樟音章裁斵也浪登于登于斵木之声霞鬪謂雲霞相合也詎能極郊風期誰復賡誰復或作復誰皐神皐區扶帝壤愈瓌藴郁天京祥色𬒳文彦郊良才挿杉檉河柳隱伏饒氣象愈興潜示堆坑擘華西京聀注華山首陽本一山河神巨靈以手擘開其上以足蹈離其下中分為兩河因通流神物巨靈也露神物郊擁終儲地禎終終南山儲蓄也訏謨壯締結也始愈輔弼登階清㤗階坌秀恣塡塞郊呀靈畜渟逹丁切水止也澄益大聮漢魏愈聮或作連肇𥘉邁周嬴積照涵德鏡郊傳經儷音䴡偶也金籝音盈笭也韋賢曰遺子黄金滿籝不如教子一經食音寺家行鼎鼐愈寵族飫弓旌弈制盡從賜郊尽或作書此句未詳殊私得逾程過法度也飛橋上架漢愈漢天河繚岸俯規嬴海也規或作窺方規度也東方朔傳規以為苑瀟碧逺輸委郊湖嵌口衘切費攜擎湖本作胡方云瀟碧竹也胡嵌石也萄首上音陶下音目張騫使外囯得蒲萄首蓿從大漠愈首或作首漠或作漢非是楓櫧音諸選云沙棠檪櫧華楓枰櫨櫧或作儲至南荆嘉植鮮危朽郊膏理易滋榮理或作方云此以嘉植言也周礼其植物宜膏物鄭注云謂楊柳之属理致白如膏懸長巧紐翠愈紐或作細紐結也象曲善攅珩攅聚珩玉也善或作盖魚口星浮没郊馬毛錦斑騂五方亂風土愈百種分鉏耕葩蘖相妬出郊蘖方作孽非是菲茸共舒情類招臻倜詭愈倜他歴切類物臻極也相如封禪書云竒物譎詭倜儻窮変翼萃伏衿纓翼禽属危望跨飛動郊冥升躡登閎方云字見揚雄校獵賦蜀本登作竹肓切宏屋響也春游轢靃靡愈靃音隨孫曰草木敷華皃轢踐也祝曰章木弱皃楚詞萍草靃靡彩伴䬃嫈嫇上音縈下音萌祝曰廣韻嫈嫇新婦兒遺燦飄的皪郊選珠翠的皪白狀淑顔洞精誠嬌應如在寤愈頽意若含酲鵷毳孫曰鴛鴦之羽以飾其衣帶詩毳衣如菼翔衣帶郊鵝肪截佩璜肪音方脂也孫曰玉書云白如截肪黒如純漆赤如雞冠黄如蒸栗璜半璧也文昇相照灼愈武勝屠攙音讒搶楚庚切祝曰彗皇爲攙搶注亦謂之孛言其形孛孛似掃彗孫曰攙搶以喻冠乱割錦不酬價郊構雲結屋於髙處有高營通波牣鱗介愈牣方作仞云相如賦充仞其中古字作仞作牣非也今按詩及孟子皆作牣方說非是䟽畹䟽寛也冨蕭蘅音行杜蘅香草大者曰杜若買養馴孔翠郊逺苞樹蕉栟音并栟櫚選栟櫚枸榔鴻頭排刺芡愈芡音儉𥙷注方言曰南楚謂之雞頭比燕謂之䓈青徐淮泗之間謂之芡又云雞頭或謂之鴈頭鵠㲉㲉卵也攢聚也韓曰巳上言土地人物富華之盛瓌橙香橙也諸本㲉作殻方云㲉外也納凉聮句盤有饋禽㲉今本亦誤騖廣雜良牧郊䝉休頼先盟罷旄奉環衛愈守封踐忠貞戰服脫明介郊朝冠飄彩紘爵勲逮僮隷愈簮笏自懷捐也繃北萌切小兒繃也以繒帛爲之亦謂之襁乳下秀嶷嶷郊椒蕃言子孫多如椒蕃泣喤喤音横小兒啼声詩日其泣喤喤貌鑑其貌有光可以鑑也清溢匣愈眸光寒發硎館儒養經史郊綴戚觴孫甥考鍾饋肴核愈戞鼓侑牢牲飛膳自北下郊函珍極東烹如瓜煑大卵愈比線茹芳菁海嶽錯口腹郊趙燕錫媌娙媌音茅娙五莖切美婦人也選燕趙多佳人媌或作媖一笑釋仇恨愈百金交弟兄貨至貊戎市郊呼慱鸚鵒令令鸚鵒傳呼也鸚或作鸚方云戎貊鸚鵡鸚鵒四物也或本非是順居無鬼瞰愈瞰音闞視也揚雄曰髙明之家鬼瞰其室門抑横免官評宫謗也韓曰已上言門地簮纓之家殺候肆凌翦郊籠原市置紭音弘網綱羽空鳥𬒳箭羽毛滿空顚雉鷃愈血路迸狐麖音京獸名一角牛尾其狀似麋折足去踸踔郊踸敕甚切踔直角切孫曰行不正皃荘子夔謂蚿曰吾以一足踸踔而行注踸踔自跳躑也蹙鬐怒䰃音彭鬤乃庚切䰃鬤言魚中鈎其怒如此鬐張皃躍犬疾翥飛㪯皃鳥愈呀鷹甚飢䖟音肓筭蹄上林賦射麋脚麟顔師古云持引其脚計其所獲也所謂筭蹄如此記功賞郊裂腦擒摚掁上音膛下音棖摚距也振𣔻也諸本腦作􅠱擒作相摚作盪又作湯方从蜀本云􅠱腦字之或体掁揬也盪掁陽揬之義監本作摚掁摚距也義亦通而擒作相則非今按􅠱别本作脇疑傳寫之誤盪當作摚孫曰䳟鳥名楊子鷦䳟遴集食其潔矣祝曰鷦䳟似鳯南方神鳥楚辝鷦䳟開路兮注智鳥也方云鷦䳟鳯也諸本多訛作鵬畦肥翦韭薤愈陶固收盆甖利養積餘健郊孝思事嚴祊𥙷彭切祭求神掘雲破嵽嵲愈雲或作靈採月漉拗泓寺砌砌石也上明鏡郊石明如鏡僧盂𫾣曉鉦音征鐃也似鈴而无舌泥像對騁怪愈鐡鐘孤㫪鍠音横鍾声㫪撞也後漢鍠鍠鎗鎗注鍾鼓声癭頸閙鳩鴿郊蜿于丸切垣乱蛷音求多足虫垣或作方云謂蜿蜒於墻屋之間作非蠑音荣蜥蝪葚桑葚黒老𧖟蠋愈蠋音燭桑虫也麥黃韻鸝鶊上音离下音庚鸝鶊二鳥名鸝黄鸝庚倉庚韓曰已上言民居寺宇之美韶曙韶妍也曙曉也曙或作署遟勝賞郊賢朋戒先庚朋方作明馳門塡偪与逼側同仄愈競墅輾語箭切砯砰上披氷切下普耕切選砯岩鼓作砰声如雷列子砰然若聞雷霆之声碎纈紅滿杏郊碎纈或作醉結方从閣本云曽本亦作碎唐小說裴晋公午橋有文杏百株立碎錦坊少陵詩内蘂繁於纈杜牧之詩花䲧團宫纈或云當作醉大李長吉詩醉纈抛紅網稠凝碧浮餳徐盈切飴也䠞子六切蹋也繩覲娥婺愈娥或作蹴覲或作觀娥婺美女也闘草擷胡結切監本桔將取也潮本作拮擷或作祮璣珵音呈楚辝豈珵美之能當注美玉也粉汗澤廣額郊金星宝黶也墮連瓔瓔珞婦人項飾鼻偷困淑郁愈郁香氣眼剽強盯􅟑上音振下音萌玉篇視皃是節是時也飽顔色郊兹疆称都城書饒書富也罄魚繭愈囯史𥙷云𥿄之好者有魚子紙晋王羲之用蚕繭𥿄紀盛播琴箏孫曰謂播之樂府韓曰已上言里人遊觀之樂奚必事逺覿郊無端逐羇傖助庚切祝曰晋史呉人謂中州人曰傖羇傖謂謫陽山江陵時也將身親魍魅愈浮跡侣鷗鶄音精鶄腥味空奠屈郊天年徒羡彭天或作天驚魂見蛇蚓愈觸嗅值蝦蟛上音遐下音彭似蟹而小曰彭蜞幸得履中氣郊中和之氣忝從拂天棖孫曰天門也棖門兩旁木言自迁謫得帰朝廷也礼記十介拂桭歸私暫休暇愈驅明岀庠黌明或作眤方云樊本作驅抳抳土輪木也時景元校作驅朋今按驅馳遟明而出太斈也盖作此時公方爲博士鮮意鮮新也竦輕暢郊連輝猶言連璧也照瓊瑩陶暄逐風乙愈乙烏輕切說文玄鳥也斉魯之間謂之乙躍視舞晴蜻音精蜻蜒也風乙或作乙乙晴蜻或作蜻蜻皆非是足勝竒也言勝遊處自多詣郊心貪敵無勍渠京切強敵也始知樂名教愈何用苦拘儜尼耕切固也晋史不簡蚩儜拘濘拘束也又困弱皃畢景尽日也任詩趣郊焉能守䃘䃘愈䃘堅与論語硜䃘義同小謹之皃方云字書无䃘字按塩鐡論器多堅䃘又皇甫謐釋勸篇龍潜九淵䃘然執髙何令升晋書音義䃘口萌切不知字書何以逸之也㑹合聮句樊曰公召爲囯子愽士与張籍張徹孟郊㑹京師而有此詩故郊有京遊歩方振謫夢意猶恟等語徹有馬辭虎豹怒舟出蛟鼉恐之句皆叙公南還意而公則云念難須勤追悔易勿輕踵其義一也韓曰黄魯直甞云退之㑹合聮句四君子皆佳士意氣相入雜之成文丗之文章之士少聮句盖筆力不能祖追或成四公子棊耳離别言無期㑹合意弥重籍病添兒女戀老䘮丈夫勇愈劒心猛氣也知未死或作謝詩思猶孤聳郊愁去劇箭飛讙來若泉涌徹析言析開析也貫事也多新貫析或作折攄抱無昔壅籍念難須勤追悔易勿輕踵愈吟巴山犖嶨或作嵤方云嶨音斈山多大石也說楚波堆壟郊馬辭虎豹怒舟岀蛟鼉恐徹狂鯨時孤軒起也幽狖音柚獸狀如猿雜百種愈瘴衣常腥膩蠻器多踈冗籍踈冗不堪也剥苔洪曰湘中班竹方生珩毎點上有青苔錢封之孫曰博物志曰洞庭之山帝之二女居之涕下揮竹竹尽班苕溪漁隱曰班竹惟清湘間有未甞有苔藤梧間别有一種斑竹間有苔蘚封之弔斑林角飯餌沉塜愈忽爾銜逺命歸歟舞新寵郊尓或作示非是欤或作還鬼窟脫幽妖天居覿清栱愈栱或作拱京遊歩方振謫夢意猶恟籍恟許拱切懼也詩書誇舊知酒食接新奉愈嘉言寫清越瘉病失肬与疣同結病也腫郊腫大也夏隂偶髙庇宵魄接虚擁愈魄方作䰟今按宵魄謂月方本非是雪絃謂琴有陽春白雪之歌寂寂聽茗盌与椀同纎纎捧郊纎捧謂美婦之手馳輝燭浮螢幽響泄潜蛬愈蛬音拱尓雅曰蟋蟀蛬今促織也詩老獨何心江疾有餘尰郊尰音腫足腫我家本瀍榖瀍水名出河南榖城山有地介皐鞏皆河南地名史記韓獻成皐鞏休跡憶沈㝠揚子蜀荘沈㝠猶言隱淪也峨冠慙闒音搨或作闒或作溻愈音冗祝曰不肖也劣也司馬迁云在闒茸之中楚辝雜班駮与闒茸皆以茸爲諸本此四句下无愈字方从唐蜀本增洪云退之家在洛陽甞謫陽山今爲博士則唐本爲是一作升朝髙㘘逸振物羣聽悚方云别本悚作竦嵇康琴賦竦衆聽而駭神徒言濯幽泌音祕詩泌之洋洋注泉水也誰與薙音替又音雉除草也荒茸籍茸音冗草生荒或作芒方云此漢叙傳所謂夷險芟荒是也芒字非朝紳欎青緑馬飾曜珪珙音拱璧也孫曰謂衘轡之屬珪珙以爲飾也國讎未銷鑠我志蕩卭隴郊時刘闢乱蜀王師出征故云蕩卭隴也二山名君才誠倜儻時論方洶許拱切洶或作汹音凶溶音勇洶溶水皃格言多彪蔚懸解無梏拲上古沃切下音拱周礼上罪梏拲而桎張生得淵源寒色拔山冡堅如撞羣金羣鍾也眇若抽獨蛹愈蛹音勇祝曰蚕化爲之孫曰言微而不絶伊余何所擬跛鼈詎能踊塊然墮岳石飄爾罥巣氄郊罥音畎氄音冗罥網也氄鳥獸細毛也書鳥獸氄毛孫曰此聮甚言其危龍斾垂天衛雲韶凝禁甬孫曰甬道天子之居君胡眠安然朝鼓聲洶洶愈胡或作乎非是鬪雞聮句韓曰公与東野聮句詞意雄渾極其情態間以人才爲喻兩皆傑作真歐陽文忠所謂韓孟於文詞兩雄力相當者也樊曰至若爭觀雲塡道助呌破翻海則公詩之豪而一噴一醒然再接再砺乃則東野工處大雞昻然來小雞竦敬也而待愈崢嶸顚盛氣顚音田孫曰玉藻曰盛氣顚實揚休注云顚讀爲闐揚讀爲陽盛身中之氣使之闐滿如陽氣之休物也方云顛讀爲闐見礼記洗刷凝鮮彩郊髙行若矜豪側晲如伺殆愈精光目相射劒㦸心獨在郊旣取冠爲胄復以距爲鐓音隊孫曰鐓鍪柄下蹲礼記進矛㦸者前其鐓是也或作鎩漢書鉤㦸長鎩今按鎩廣韻所拜切於四声不協然鐓乃刃下之平底者与距不相似亦未詳其說也天時得清寒地利挾爽塏愈塏音凱髙地磔毛各噤巨禁切口閉也㾕或作或作瘴或作痒方從杭本云㾕所錦切寒病也義訓寒謂之㾕􅱵皮日休詩枕下聞彭湃肌上生㾕􅱵韓握詩禁㾕餘寒酒半醒怒癭爭碨烏罪切碨磊不平也選磔磈磊而相摩磊俄膺忽爾低植立瞥疋蔑切而改郊腷膊上音愎下音粕古詩腷腷膞膞雞初鳴戰聲喧􅌭翻落羽皠七罪切白也中休事未决小挫勢益倍愈妬腸務生敵腸方作腹敵或作欺賊性專相醢裂血失鳴聲啄殷烏䦨切赤黒色甚飢餒郊對起何急驚隨旋誠巧紿音怠欺也毒手飽李陽樊曰晋石勒与李陽鄰居歲常爭麻池相歐擊勒旣即僞位召陽酣謔引陽臂笑曰孤昔日厭卿老拳卿亦飽孤毒手杜子美義鶻行所謂巨顙拆老拳亦此事也神槌困朱亥愈史記魏朱亥爲侯嬴薦於魏公子公子矯魏主令代晋鄙鄙合符疑之亥䄂四十斤鉄椎椎殺晋鄙槌或作椎或作鎚方云謝本云貞元本毒手作尊拳尊拳劉怜語也郡公済云善本神槌作神搥於史記本文爲合然晋祖納曰假有神雖必有神槌神槌尊拳豈皆借用字耶今按毒手是李陽本事中語而神槌字則朱亥事中无之故卲欲改神作䄂以從本事然又属對不親切故方又欲從謝本借刘伶之尊拳以附李陽借祖納之神槌以附朱亥則兩句皆為兼用兩事而不偏枯耳然亦未敢遽改也今以其說未明復爲詳說如此以俟考焉惻心我以仁碎首爾何罪獨勝事有然旁驚汗流浼郊知雄欣動顔怯負愁㸔賄爭觀雲填道助呌波翻海愈事爪深難解事或作爭方從唐本云舘本作倳李校同樊本作剚皆側吏切漢蒯通傳事刃公之腹中考工記菑蚤不齵則輪虽敝不匡鄭讀蚤爲瓜謂輻入牙中者菑声如胾泰山平原人謂樹立物爲菑公盖全用此二字也管子倳戦十万又春有以剚耜事剚菑倳古音義同閣杭蜀本皆作爭其訛乆矣嗔睛時未怠一噴一醒然樊云雞用水噴神氣始醒再接再礪乃郊或作再礪乃鍜乃礪又或作勵皆非是樊曰接猶接戦也爭觀雲塡道助呌波翻海則公詩之豪一噴一醒然再接再礪乃則東野工處頭垂碎丹砂翼搨拖錦綵搨或作搨方云字當从手選陳琳檄垂頭搨翼莫所慿恃五臣注搨歛也士獵切此當一以摧搨爲義音他蠟切軒軒猶軒昻也尚賈音古斉高周之晋師桀石投人以徇衆曰欲勇者賈予餘勇賈買也餘清厲鳴声也比歸凱愈選俊感收毛受恩慙始隗下五罪切毛遂郭隗也英心甘闘死義肉恥庖宰君㸔闘雞篇短韻有可採郊有或作亦或作言皆非是納凉聮句韓曰此篇叙九謫新召还為斈官本末甚詳遞嘯取遥風㣲㣲近秋朔郊金柔氣相低火老候愈濁愈熈熈炎光流竦竦髙雲擢愈閃紅孫曰電光也電光之閃有若蚴虬驚蚴於紏切又音憂龍類楚詞蒼龍蚴虬於左右虬或作蚪凝赤孫曰凝聚也赤氣之聚如山岳也聳山嶽目林恐焚燒耳井憶瀺灂上士咸切下才弱切瀺灂水声前漢瀺灂霄墜仰懼失交泰非時結氷雹化鄧韓曰列子夸父逐日影於嵎谷之際渇欲得飲赴飲河渭河渭不足將北走飲大澤未至道渇而死弃其杖尸膏肉所浸化爲鄧林渇且多奔河誠巳慤暍音謁祝曰字林暍傷暑也莊子暍者反水乎冷風道者誰子叩商叩擊也韓曰列子師商弹琴當春而叩商絃以召南吕凉風忽至草木成實者何樂洗矣得滂沱洗或作浩方云古洗与洒通史記觀范睢之見者羣臣莫不洒然変色易容徐廣洗先典切洗矣猶洗然也感然鳴鸑鷟下士角切孫曰鸑鷟鳯属感言得滂沱則瑞應至嘉願苟未從嘉或作佳或作喜方云公後詩王嘉願還中州佳喜皆字訛也前心空𬗟邈清砌千迴坐冷環再三握煩懷却星星或作醒二方云劉夢得詩自羞不是高陽侣一夜星星騎馬回唐人星醒通用高意還卓卓郊龍沈劇煑鱗劇方作極牛喘甚焚角蝉煩鳴轉喝於邁切祝曰声嘶前漢正見秋蝉喝栁詩長楊流喝尽烏躁飢不啄晝蠅食案繁宵蚋肌血渥單絺厭已禠長䈉音霎扇也孫曰方言扇自関而東謂之䈉祝曰選屏輕箑字一作䈉或作箑倦還捉幸兹得佳朋於此䕃華桷青熒文簟施青或作清淡澉音敢韓曰選淡澉手足注澹澉猶洗滌也甘瓜濯大壁孫曰華屋中壁也曠凝淨古畫壁上古畫竒駮犖止比角切下吕角切牛色雜又竒怪皃壁或作璧畫或作書凄如羾寒門羾方云杭本作淜蜀本作珝淜今馮字徒涉也史記武紀所謂寒門者谷口也顔曰今治谷去甘泉八十里盛夏禀然此納凉詩也淜字自當又甘泉賦登椽栾而羾天門羾音貢至也諸校本多用此定栁文扣亦作珝又淮南子北方北極之山曰寒門故离騷連絶垠乎寒門若以珝言則寒門當用此義然前義為優今按方後說是蓋谷口旣非絶境未為極寒之地又不言有水則徒渉字亦无埋當改作羾皓若攅玉璞掃寛延鮮飈汲冷漬香穱音捉稲田種麥又麥飯篚實摘林珍盤肴饋禽㲉㲉或作殻說巳見上空堂喜淹留貧饌羞齷齪愈齷齪菲薄也殷勤相勸勉左右加礱斵上音籠孫曰壁也即下言賈勇事加或作皆賈勇發霜硎爭前曜冰槊孫曰莊子庖下觧牛十九年而刃若新發於硎風俗通云矛長丈八者謂之槊霜硎冰槊皆以禦熱㣲然草根響先𬒳詩情覺感衰悲舊改工異逞新貌誰言擯朋老孫曰謂擯弃於朋友而又加之以老也猶自將心學危簷不敢慿朽机懼傾撲音雹倒也机一作瓦青雲路難近黄鶴足仍鋜土角切玉篇云鎻足未能飲淵泉立滯呌芳葯郊葯音渥楚辝辛夷楣兮葯房本草楚人謂白芷曰葯與子昔睽離嗟余苦屯剥直道敗邪徑拙謀傷巧諑音卓韓曰楚詞謡諑謂余以善淫注諑猶譛也炎胡度氛氲熱石行犖硞音確犖硞石声又石多皃痟飢夏尤甚瘧渇秋更數君顔不可覿君手無由搦女角切持也今來沭新恩庻見返鴻朴儒痒恣游息聖籍飽商㩁音確商畧也左思曰商搉万俗危行無低徊正言免咿喔上音伊下音渥楚詞屈原卜居曰將喔咿嚅唲以事婦人乎注強笑噱也車馬獲同驅酒醪欣共欶音朔說文吮也惟憂棄菅蒯上音姦下苦怪切左傳曰虽有絲麻无弃菅蒯敢望侍帷幄此志且何如希君爲追都回切治玉琢愈秋雨聮句樊曰按詩云儒宫煙火􅊜此公謂斈官在京師時又云因思征蜀土盖憲宗元和𥘉也萬木聲號呼百川氣交㑹郊庭翻樹離合離或作雜牖變景明藹愈潨聀戎切說文小水入大水㵼殊未終飛浮亦云泰郊牽懷到空山屬近也聽邇驚瀬愈簷垂白練直練或作龍渠漲清湘大郊甘津澤祥禾伏潤肥荒艾愈禾方作木非是伏或作服主人吟有歡客子歌無奈郊侵陽日沈玄剥節風搜兊愈坱圠上烏朗切下音軋賈誼曰大鈞播物坱北无垠應劭曰其氣坱圠非有限斉也張衡曰地势坱圠注坱圠猶髙下也遊峽喧颼飀上音蒐下音留祝曰髙風也隋盧思道納涼賦動颼飀於翆帳卧江汰郊汰音太濤也微飄來枕前髙灑自天外愈蛬音拱蟋蟀也穴何迫迮或作窄方云義訓迫迮急也字見鴇羽詩箋蟬枝掃鳴噦郊援菊茂新芳援或作園逕蘭銷晚馤愈馤音藹香也地鏡時昏曉池星競漂沛郊讙呶尼交切尋一聲灌注咽羣籟愈儒宫煙火濕市舎煎熬忲郊忲音太奢也卧冷空避門衣寒屢循帶愈循或作脩方云李陵傳数數自循其刀環又自循其髮顔注謂摩順也梁范靜妻詩循帶易緩愁難却心之憂矣叵銷鑠水怒已倒流隂繁恐凝害郊憂魚思舟檝魚或作虞非是感禹勤畎澮愈懷襄信可畏䟽决須有頼郊可畏方作不思非是䟽决謂禹决江䟽河䟽方作踈盖俗体也筮命或馮蓍卜晴將問蔡愈蔡大亀也晴或作情庭商家語曰斉有一足鳥名商羊童謡曰天將大雨商羊鼓舞今斉有之忽驚舞墉禜音榮孫曰墉城墉也榮祭名左氏曰日月星辰之神則雪霜風雨之不時於是乎禜之亦親酹郊氛醨孫曰氣醨謂雲氣稍薄也稍踈映氛或作氣雺亂上音謀又音茂尓雅天氣下地不應曰雺註言蒙昧也還擁薈詩薈兮蔚兮注雲㒷兒謂雲霧擁塞也隂旌孫曰亦謂雲氣如旌旗之狀時摎音刘顔師古云摎流猶周流也流帝鼓孫曰天帝之鼓謂雷霆也鎭訇磕上呼宏切下苦盖切大声也選訇磕㗦嘈棗圃落青璣孫曰棗未熟而落如青璣也璣珠之不丸者瓜畦爛文具貧薪不燭竈富粟空塡廥愈廥音澮芻藁藏秦俗動言利魯儒欲同丐深路倒羸驂弱途擁行車犬音大車轄毛羽皆遭凍離蓰不能翽羽飛声方云離今本从竹非古楽府竹竿何嫋翽魚尾何離蓰翻浪洗虚空傾濤敗藏蓋郊吾人猶在陳僮僕誠自鄶音澮囯名也洪曰左傳自劊以下无譏焉注以其微也洪曰言吾人猶絶糧童僕母足言者因思征蜀士未免濕戎斾安得發商飈廓然吹宿靄白日懸大野幽泥化輕壒音藹後漢軼埃壒之混濁戰埸暫一乾賊肉行可膾愈捜心思有效抽䇿期稱最豈惟慮收穫亦以救顚沛郊禽情𥘉嘯儔礎音楚負楹石色微收霈庻幾諧我願遂止無巳太愈征蜀聮句事見聖徳詩題注日王忿違慠与傲同日或作曰方云唐本閣本皆作日此語左傳漢史屡見入詩則自庾信始日余濫推轂民願始天从是也有命事誅拔蜀險豁關防秦師縱横猾愈風旗帀地揚雷皷轟天殺言鼓声如雷轟天震動也竹兵彼皴音逡說文細皮起蜀以竹爲弓矢脆鐡刃我鎗䶪郊䶪𥘉八切歯利也刃或作刀方作力刑神咤㹈音釐㹈牛尾可爲旄旄隂𦦨颭職琰切風吹也札甲也洪曰說者謂此聮尽雕刻之工而語仍壯刑神隂𦦨主我師而言犀札甲也夫差水犀之甲三千翻霓孫曰言旌旗動如虹霓也紛偃蹇塞野孫曰言兵衆塞野勢欲傾側也澒坱圠愈澒或作傾生獰競掣跌孫曰言生而惡者競相牽掣跌墮也癡突孫曰謂癡弱而突出, WYG: ''}
