  - {type: variant, offset: 4670, length: 0, content: '', WYG: 欽定四庫全書别本韓文考異巻三十四宋王伯大重編碑誌南陽樊紹述墓誌銘補註後山詩話歐陽公謂退之為樊宗師墓誌便似樊文其始出于司馬子長子長為長卿傳如其文惟其過之故兼之也樊紹述既卒且葬愈將銘之從其家求書得書號魁紀公者三十巻曰樊子者又三十巻春秋集傳十五巻表牋狀䇿書序傳紀誌説論今文讚銘凡二百九十一篇誌上方無紀字道路所遇及器物門里雜銘二百二十賦十詩七百一十九一十或作又十曰多矣哉古未嘗有也然而必出於巳不襲蹈前人一言一句樊曰國史補云元和之後文章則學竒于韓愈學澁于樊宗師退之作樊墓誌稱其為文不剽襲觀絳守居園池記誠然亦太竒澁矣本朝王晟劉忱皆為之註解如瑶翻碧瀲嵬眼傾耳等語皆前人所未道也歐陽公跋絳守居園池語云元和文章之盛極矣其竒怪至于如此又詩曰嘗聞紹述絳守居偶來登覽周四隅異哉樊子怪可吁心欲獨去無古初窮荒探幽入有無一語詰曲百盤紆孰云已出不剽襲包斷欲學盤庚書云云又何其難也必出入仁義其富若生蓄萬物畢具海含地負放恣横縱無所統紀然而不煩於繩削而自合也嗚呼紹述於斯術其可謂至於斯極者矣生而其家貴富長而不有其藏一錢長而方作而長妻子告不足顧且笑曰我道盖是也盖下疑有如字皆應曰然無不意滿嘗以金部郎中告哀南方還言某師不治罷之以此出為綿州刺史或無嘗字師或作帥方無出字以下文又出觀之宜有一年徴拜左司郎中又出刺絳州或無刺字綿絳之人至今皆曰於我有徳以為諫議大夫命且下遂病以卒年若干病以或作以病紹述諱宗師父諱澤嘗帥襄陽江陵官至右僕射贈某官祖某官諱泳自祖及紹述三世皆以軍謀堪將帥䇿上第以進紹述無所不學於辭於聲天得也得下或有地字或有地出字皆非是在衆若無能者嘗與觀樂問曰何如曰後當然已而果然後上方有某字非是銘曰}
