  - {type: variant, offset: 0, length: 1264, content: 朱文公校昌黎先生集卷之五考異音釋附古詩辛卯年雪元和六年春寒氣不肯歸河南二月末雪花一尺圍崩騰相排拶姊抹切逼也孫曰排拶密拶也龍鳯交横飛波濤何飄揚天風吹旛旂白帝盛羽衛鬖髿或作㲚土音參又蘇含切下音沙髮垂貌祝曰選緑荅鬖髿乎斫上振裳衣白霓先啓途從以萬玉妃翕翕陵厚載譁譁弄隂機生平未曽見何暇議是非或云豐年祥飽食可庶幾善禱吾所慕誰言寸誠微醉留東野昔年因讀李白杜甫詩長恨二人不相從吾與東野生並丗如何復躡二子蹤東野不得官白首誇龍鍾方云依字當作躘踵盧仝詩盧子躘踵也賢愚緫莫驚韓子稍姦黠自慙青蒿倚長松低頭拜東野願得終始如駏蛩上音巨下音卭樊曰孔叢子北方有獸名曰蟨愛蛩蛩駏驉食得甘草必齧以遺蛩蛩駏驉見人將來必負蟨以走蟨非愛駏蛩也爲其假足也二獸亦非心愛蟨也爲其得甘草而遺之也夫禽獸猶知北假而相報也况士君子之欲名利者乎東野不廻頭有如寸筳撞鉅鍾吾願身爲雲東野變爲龍四方上下逐東野雖有離别無由逢離别或作别離李花二首諸本作一首方云此二詩也自當春天地争奢華以下分焉意義甚明編者誤合之樊曰此詩自夜領張徹投盧仝而下狀極李花之妙矣蘇内翰梅詩㪯此云縞裙練帨玉川家肝膽清新冷不邪穠李争春猶辦此更教踏雪看梅花亦一竒也平旦入西園棃花數株若矜夸旁有一株李顔色參慘似含嗟問之不肯道所以獨繞百市至日斜忽憶前時經此樹正見芳意𥘉萌牙或作芽方云漢傳如朱草萌牙事有萌牙无用芽字柰何趂酒不省録不見玉枝攅霜葩枝或作杖泫胡畎切流也然爲汝下雨淚無由反斾羲和車東風來吹不改顔蒼茫夜氣生相遮氷盤夏薦碧實脆斥去不御慙其花斥去或作片雲或作雲去或作斤逐方云張衡思玄賦斥西施而不御韓語原此或本皆誤也當春天地爭奢華洛陽園苑尤紛挐或作拏方云董彦逺云挐从如今人从奴唐韵以挐爲或躰非也考相如子虚賦王逸九思皆只作挐今按說文拏从奴牽引也挐从如持也古書作拏盖通用誰將平地萬堆雪將方作堆剪刻作此連天花日光赤色照未好明月暫入都交加夜領張徹投盧仝乘雲共至玉皇家長姬香御四羅列縞白色裙練帨始銳切佩巾詩无感我恱兮無等差静濯明䊋有所奉顧我未肯置齒牙清寒瑩骨肝膽醒一生思慮無由邪招揚之罘方云之罘元和十一年進士閤本作之果字訛也柏生兩石間萬歳終不大野馬不識人難以駕車蓋柏移就平地馬羈入廐中馬思自由悲柏有傷根容傷根柏不死千丈日以至千或作百日以或作不難以或作巳馬悲罷還樂振迅矜鞍轡迅或作頓方云振迅字見七月詩傳鮑昭鶴賦之罘音浮南山來文字得我驚館置使讀書曰有求歸聲我令之罘歸失得柏與馬失得方作失待或作實待或作實失今按三本皆无理唯嘉祐杭本作失得似頗有理而㪯正不収盖其意曰失得之計觀於柏馬可見云尓之罘别我去計出柏馬下我自之罘歸入門思而悲之罘别我去能不思我爲洒掃縣中居引水經竹間嚻譁所不及何異山中閑前陳百家書食有肉與魚先王遺文章綴緝實在余禮稱獨學陋易貴不逺復作詩招之罘晨夕抱飢渴寄盧仝玉川先生洛城裏破屋數間而巳矣一奴長鬚不裹頭一婢赤脚老無齒辛勤奉養十餘人上有慈親下妻子先生結髮憎俗徒閉門不出動一紀至令鄰僧乞米送僕忝縣尹能不恥令或作今非是尹一作令俸錢供給公私餘時致薄少助祭祀勸參留守謁大尹樊曰唐洛城有東都留守有河南尹公誌盧登封墓曰爲書告留守与河南尹是時鄭餘慶留守東, WYG: ''}
