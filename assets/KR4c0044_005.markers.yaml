  - {type: variant, offset: 8933, length: 0, content: '', WYG: 書放牀頭涕與淚垂四或作泗方从唐本及范謝校本云董令升編嚴陵集亦定作四垂四葢以涕與淚分言之猶石皷所謂對此涕泗滂沱也昏昏還就枕惘惘夢相值悲哉無竒術安得生兩翅病中贈張十八中虛得暴下避冷卧北窻不蹋曉鼓朝安眠聴逄逄皷聲也潮諸本作逢逢方云蜀本音部江切字當作逄如今按本作逢葢逢从夆逢从夅音義各異然古書逄䝉逄丑父闗龍逢字皆只作逄而音蒲江切疑逢有蒲紅一音而音蒲江者由蒲紅而差也當考籍也處閭里抱能未施邦文章自娛戲金石日擊撞龍文百斛鼎孫曰秦武王與孟說舉文龍之鼎扛舉也筆力可獨扛談舌久不掉非君亮誰䨇亮或作諒扶几導之言几或作机曲節初摐摐音窓前漢摐金皷此字从手或作摐摐从禾方云从手者博雅云撞也子虛賦摐金皷从木者自木名也半塗喜開鑿𣲖别失大江吾欲盈其氣不令見麾幢牛羊滿田野孫曰漢匈奴將十萬騎入武川塞見畜布野而無人牧怪之引去解斾束空杠音江旗干傾樽與斟酌四壁堆甖缸音江西都賦金缸銜壁注燈也𤣥帷}
