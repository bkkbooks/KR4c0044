  - {type: variant, offset: 3473, length: 0, content: '', WYG: 對禹問或問曰堯舜傳諸賢禹傳諸子信乎曰然然則禹之賢不及於堯與舜也歟曰不然堯舜之傳賢也欲天下之得其所也禹之傳子也憂後世爭之之亂也堯舜之利民也大禹之慮民也深利一作慮曰然則堯舜何以不憂後世曰舜如堯堯傳之禹如舜舜傳之得其人而傳之堯舜也無其人慮其患而不傳者禹也無其人下方有而不傳三字不傳者或作不得如巳者非是舜不能以傳禹堯為不知人禹不能以傳子舜為不知人堯以傳舜為憂後世禹以傳子為慮後世曰禹之慮也則深矣傳之子而當不淑則奈何之慮下或有民字曰時益以難理傳之人則爭未前定也傳之子則不爭前定也前定雖不當賢猶可以守法不前定而不遇賢則爭且亂天之生大聖也不數其生大惡也亦不數傳諸人得大聖然後人莫敢爭傳諸子得大惡然後人受其}
