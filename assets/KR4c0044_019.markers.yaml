  - {type: variant, offset: 0, length: 1593, content: 朱文公校昌黎先生集卷之十九考異音釋附書序與鄭相公書鄭餘慶时鎭㒷元再奉示問皆縁孟家事樊日元和九年三月以鄭餘慶為㒷元尹餘慶辟孟郊参謀郊挈其妻行至閬郷暴卒辭㫖惻惻憂慮深逺竊有以見大人君子篤於仁愛終始不倦伏讀感欷不知所喻舊与孟往還數人昨巳共致百千巳來㝷巳至東都計供葬事外尚有餘資今裴押衙所送二百七十千足以益業爲遺孀音霜樊日是歳十月葬郊其費皆出鄭相及東野旧往還者以其餘財贍給其家郊元子妻鄭氏永乆之賴孟氏兄弟在江東未至先与相識亦甚循善所慮才幹不足任事鄭氏兄弟惟最小者在東都固如所示不可依仗孟之深友太子舎人樊宗師孟下或有氏字比持服在東都今巳外除經營孟家事不啻如巳前後人所与及裴押衙所送錢物並委樊舎人主之營致生業必棄絶之罪於門下誠不忍竒寳横棄道側而閤下篋櫝尚有少闕不滿之処猶足更容輙冐言之退増汗懾篋或作匱方云无闕字謹狀與鄂州柳中丞書公綽时觀察鄂岳淮右殘孽尚守巢窟或作窟巢環㓂之師殆且十萬瞋目語難方云此用荘子語杭蜀本作難語非自以爲武人不肯循法度頡頑作氣勢竊爵位自尊大者肩相磨地相属也不聞有一人援桴鼓誓衆而前者但日令走馬来求賞給助㓂為声勢而已日方作月閤下書生也詩書礼楽是習仁義是修法度是束一旦去文就武鼓三軍而進之陳師鞠旅親与為辛苦慷慨感激同食下卒將二州之牧樊日元和十年詔公綽以兵五千隷安州刺史李聽討吳元済公綽曰朝廷謂吾書生不知兵耶請自行許之引兵渡江扺安州聽以軍礼迎謁公綽謂日以公丗將曉兵吾且欲署聀以兵法從亊聴日唯命以都知兵馬使中軍先鋒行營都虞候三牒受之選卒六千属聽戒其部將日行􅩌事一央都將聴𬒳恩威遂尽力當时服其知權十􅌰家有疾病公綽厚給之人皆感激故毎戦皆捷以壯士氣斬所乗馬樊日公綽所乗馬躡杀圉人公綽命杀馬以祭或日圉人不自備耳良馬可惜公綽日材良性駑必杀之補注柳氏叙訓及新旧唐史並以杀馬為公綽為襄陽莭度使时事司馬温公考異正引公此書證之去乃鄂岳时亊以祭踶大計切又徒兮切一作蹄漢武帝詔馬奔踶而致千里死之士雖古名將何以加兹此由天資忠孝欎於中而大作於外動皆中於機㑹以取勝於當丗而為戎臣師豈常習於威暴之事而楽其闘戦之危也哉愈誠怯弱不適於用聽於下風竊自増氣誇於中朝稠人廣衆㑹集之中或无㑹集二字所以羞武夫之顔令議者知將國兵而爲人之司命者不在彼而在此也而在方无而字臨敵重愼誡輕出入良用自愛以副見慕之徒之心而果為國立大功也幸甚幸甚不宣食或作用非是或无之徒二字方无下之字愈再拜又一首愈愚不能量事勢可否比常念淮右以靡弊困頓三州之地蛟蚋蟻蟲之聚感兇竪喣濡飲食之惠提童子之手坐之堂上奉以爲帥出死力以抗逆明詔戰天下之兵乗機逐利四出侵暴屠燒縣邑賊殺不辜環其地數千里莫不𬒳其毒洛汝襄荆許潁淮江爲之騷然丞相公卿士夫夫勞於圖議啚或作囯兆是握兵之將熊羆貙虎之士畏懦䠞将六切促也蹜莫肯杖戈爲士卒前行者獨閤下奮然率先楊兵界上將二州之守親出入行間與士卒均辛苦生其氣勢見將軍之鋒頴凛然有向敵之意用儒雅文字章句之業取先天下武夫関其口而奪之氣愚𥘉聞時方食不斍棄七箸起立豈以爲閤下眞能引孤軍單進與死㓂角逐爭一旦僥倖之利哉真或作直非是或无单字就令如是亦不足貴其所以服人心在行事適機宜而風采可畏愛故也是以前狀輙述鄙誠眷惠手翰還答益増欣悚惠下或有賜字夫一衆人心力耳目使所至如時雨三代用師不出是道閤下果能充其言継之以無倦得形便之地甲兵足用雖國家故所失地旬歳可坐而得歳或作月况此小㓂安足置齒牙間勉而卒之以俟其至幸甚夫逺徴軍士行者有羇旅離别之思居者有怨曠騷動之憂本軍有饋餉煩費之難地主多姑息形迹之患急之則怨緩之則不用命浮寄孤懸形势銷弱又與賊不相諳委臨敵恐駭難以有功若召募土人召或作占必得豪勇與賊相熟知其氣力所極無望風之驚愛護郷里勇於自戰徴兵滿萬不如召募数千閣下以爲何如儻可上聞行之否計巳與裴中丞相見行營事宜不惜時賜示及幸甚不宣愈再拜答魏愽田僕射書季冬極寒伏惟僕射尊體動止萬福即日愈蒙􅊵蒙恩改職事不任感懼諸本无蒙􅊵二字方从閣本今按蒙免者蒙田之庇而得遣免也連上文為句蒙恩者蒙上於乆, WYG: ''}
