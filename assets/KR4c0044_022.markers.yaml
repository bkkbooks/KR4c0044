  - {type: variant, offset: 0, length: 2007, content: 朱文公校昌黎先生集卷之二十二考異音釋附祭文祭田橫墓文貞元十一年九月愈如東京道出田横墓下十一年諸本或作十九年月下有十一日字如東京或作東如京洪氏曰東京洛陽也公以貞元十一年出長安至河陽而後如東都也十九年秋則公爲御史是冬即貶陽山安得以九月出横墓下唐都長安亦不得云東如京也方从閣杭蜀本作東如京云田横墓在偃師尸郷洛陽東三十里今公自河陽道横墓下以入洛故云東如京也今按洪氏作如東京及考歳月皆是方氏亦以京爲洛陽但據三本必欲作東如京爲誤耳今且未須别考它書只以其所引田横墓在洛陽東者論之則自墓下而走洛陽乃是西向安得言東如京乎况唐都長安謂洛陽為東京則可直謂之京則不可其理又甚明若據元和郡囯志則河陽西南至向南府八十里其大势亦不得云東如京也此又三本謬誤之一證故復表而出之感橫義髙能得士因取酒以祭爲文而弔之士下或有心字其辭曰事有曠百丗而相感者余不自知其何心非今丗之所稀孰爲使余歔欷而不可禁余旣博觀乎天下曷有庻幾乎夫子之所爲死者不復生嗟余去此其從誰死者或作死而生方作來皆非是當秦氏之敗亂得一士而可王何五百人之優優而不能脫夫子於劔鋩抑所寳之非賢亦天命之有常宝之或作宝者天或作大昔闕里之多士孔聖亦云其遑遑方从閣杭无其字非是苟余行之不迷雖顚沛其何傷自古死者非一夫子至今有耿光非方从閣杭作皆非是跽陳辭而薦酒䰟髣髴而來享歐陽生哀辭歐陽詹丗居閩越自詹巳上皆爲閩越官至州佐縣令者累累有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕今上𥘉故宰相常衮爲福建諸州觀察使治其地治上或有往字非是衮以文辭進有名於時又作大官臨莅其民郷縣小民有能誦書作文辭者衮親與之爲客主之禮吕汲公本如此方从閣杭苑粹辝進下即属鄉縣至者衮下又有故宰相字下乃属有名至其民又属親与云云顛倒錯乱全无文理而方云三本如此不當䡖改其蔽如此今定從吕本方主下有人字郷縣作縣郷則尚有可取云觀游宴饗必召與之宴或作讌與讀爲預或作預或疑與如字而之下當有俱字時未幾皆化翕然化方據新傳作仕非是詹于時獨秀出衮加敬愛諸生皆推服閩越之人舉進士繇詹始建中貞元間余就食江南未接人事往往聞詹名閭巷間詹之稱於江南也乆乆下或有矣字貞元三年余始至京師舉進士聞詹名尤甚余下或有年十九字聞方作則或云當并出則聞二字亦有理八年春遂與詹文辭同考試登第始相識自後詹歸閩中余或在京師他處不見詹乆者惟詹歸閩中時爲然其他時與詹離率不歴歳移時則必合合必兩忘其所趨乆然後去故余與詹相知爲深詹事父母盡孝道仁於妻子於朋友義以誠氣醇以方容貌嶷嶷魚力切歧嶷然其燕私善謔以和其文章切深喜往復善自道讀其書知其於慈孝最隆也十五年冬余以徐州從事朝正於京師詹爲國子監四門助教將率其徒伏闕下舉余爲博士㑹監有獄不果上或无監字監或作詹觀其心有益於余將忘其身之賤而爲之也嗚呼詹今其死矣詹閩越人也父母老矣捨朝夕之養以來京師其心將以有得於是而歸爲父母榮也以來或作而來有得或作在得或无於是字而有複出將以有得乎雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟詹雖未得位其名聲流於人人其德行信於朋友方作友朋雖詹與其父母皆可無憾也詹之事業文章李翺旣爲之傳故作哀辭以舒余哀以傳于後以遺其父母而解其悲哀以卒詹志云之傳或作之說或作之誌故上或有余字非是悲哀方作哀悲今按上文巳連有兩哀字不應如此重複或當刪去此哀字詹志或作其志求仕與友兮逺違其郷父母之命兮子奉以行友則旣濩兮禄實不豐以志爲養兮何有牛羊事實旣修兮名譽又光父母忻忻兮常若在旁命雖云短兮而忘於乎或作嗚呼祭穆貟外文爲崔侍御作晁本篇首題云維年月日故人博陵崔愬謹以清酌之奠祭于亡友穆六端公之靈方云豈穆貟邪舊傳貟卒檢校貟外郎杜亞留守東都辟爲從亊皆与此文合新傳貟終侍御史故晁本称端公也於乎建中之𥘉予居于嵩攜扶北奔避盗來攻奔或作帰晨及洛師相遇一時顧我如故眷然顧之如方作无眷或作捲子有令聞我來自山子之畯明我鈍而頑畯或作俊道旣云異誰從知我我思其厚不知其可知其或作知而或作可而於後八年君從杜侯我時在洛亦應其招留守無事多君子僚罔有疑忌維其嬉游草生之春鳥鳴之朝我轡在手君揚其鑣君居于室我旣來即或以嘯歌或以偃側嘨或作詠誨余以義復我以誠復我方作我復今按下文云无非德声則此二句專指穆也當作復我終日以語無非德聲以或作与主人信䜛有惑其下殺人無罪誣以成過入救不從反以爲福赫赫有聞王命三司察我于獄相從係縲曲生何樂直死何悲曲或作直直或作曲二何或皆作可皆非是上懷主人主方作王非是内閔其私閔或作憫方作関皆非是進退之難君處之宜君或作居非是旣釋于囚我來徐州道之悠悠思君爲憂我如京師君居父䘮哭泣而拜言詞不通我歸自西君反吉服晤言無他往復其昔其疑當作如不日而違重我心惻自後聞君母䘮是丁痛毒之懷六年以并孰云孝子而殞厥靈今我之至入門失聲失方作哭酒肉在前君胡不餐升君之堂不與我言於乎死矣何日來還祭郴州李使君文𥙷注筆墨間録云祭李郴州文尤雄竒維年月日將仕郎守江陵府法曹参軍韓愈謹以清酌庻羞之奠敬祭于故郴州李使君之靈文苑此篇首又云維元和元年歳次景戍二月乙未, WYG: ''}
