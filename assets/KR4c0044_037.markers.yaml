  - {type: variant, offset: 544, length: 337, content: 㪯兩汾州司馬崔圎爲揚州詔以公爲圎節度判官攝殿中侍御史以軍事如京師朝天子識之拜殿中侍御史内供奉由殿中爲侍御史入尚書省爲主客貟外郎由主客爲祠部郎中先皇帝時兵部侍郎李涵如囬紇下没切古匈奴也亦作鶻立可敦詔公兼侍御史賜紫金魚袋爲涵判官囬紇之人來曰唐之復土壃取囬紇力焉約我爲市馬旣入而歸我賄不足我於使人乎取之市字絶句方以馬字属上句而復出馬字連下支爲句非是涵懼不敢對視公公與之言曰我之復土壃爾信有力焉吾非無馬而與爾爲市爲賜不旣多乎公与或作公爲与上方无而字爾之馬歳至吾數所矩切皮而歸資邊吏請致詰也至上方有五字而无吾字皆非是天子念爾有勞故下詔禁侵犯方无故字諸戎畏我大國之爾與也莫敢校焉爾之父子寧而畜馬蕃者非我誰使之於是其衆皆環公拜是下或無其字旣又相率南面序拜皆兩㪯手曰不敢復有意大國兩㪯或作㪯, WYG: 舉}
