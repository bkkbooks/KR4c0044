  - {type: variant, offset: 5989, length: 0, content: '', WYG: 也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自專訪議羣下臣愚以為復讎之名雖同而其事各異或百姓相讎如周官所稱可議于今者或為官所誅如公羊所稱不可行於今者為官下或有吏字又周官所稱將復讎先告于士則無罪者若孤稚羸倫為切弱抱微志而伺敵人之便恐不能自言於官未可以為斷于今也然則殺之與赦不可一例宜定其制曰凡有復父讎者事發具其事申尚書省尚書省集議奏聞或無有字申或作由下二字今按此合有由字但下字當作申又或是上字耳更詳之酌其宜而處之則經律無失其指矣一無律字謹議錢重物輕狀以舊記考乃長慶元年作右臣伏凖御史臺牒凖中書門下帖奉進止錢重物輕為弊頗甚帖或作牒詳求適變可以便人所貴緡貨通行里閭寛息宜令百寮隨所見作利害狀者臣愚以為錢重物輕救之之法有四一曰在物土貢夫五榖布帛農人之所能出也工人之所能為也人不能鑄錢而使之賣布帛榖米以輸錢於官是以物愈賤而錢愈貴也而錢或無而字今使出布之鄉租賦悉以布出綿絲百貨之鄉租賦悉以綿絲百貨去京百里悉出草三百里以粟五百里之内及河渭可漕入上在到切水運願以草粟租賦悉以聴之則人益農錢益輕榖米布帛益重草粟下或有米字農或作豐二曰在塞其隙無使之洩禁人無得以銅為器皿或無皿字禁鑄銅為浮屠佛像鐘磬者蓄銅過若千斤者鑄錢以為他物者皆罪死不赦禁錢不得出五嶺下或有復出五嶺字買賣一以銀盜}
