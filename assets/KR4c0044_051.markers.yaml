  - {type: variant, offset: 2140, length: 0, content: '', WYG: 李泌為相舉為諫議大夫拜官不辭未至京師人皆想望風采云城山人能自苦刻不樂名利必諫諍死職下咸畏憚之想或作相非是既至諸諫官紛紛言事細碎無不聞達天子益厭苦之子或作下非是而城方與其二弟牟容連夜痛飲人莫能窺其意牟或作并容或作密二字或作并客有懷刺譏之者將造城而問者今按此二句亦衍一句疑亦以修改重復而誤也今當削去譏之者將四字城揣知其意輒彊與酒輒上或有彊與坐字容或時先醉仆席上或時先醉卧容懷中不能聽容語約其二弟云吾所得月俸汝可度吾家有㡬口月食米當㡬何買薪菜鹽米凡用㡬錢先具之其餘悉以送酒媪無留也未甞有所貯積雖其所服用切急不可闕者客稱其物可愛城輒喜舉而授之陳萇者候其始請月俸常往稱其錢帛之美月有獲焉至裴延齡讒毁陸䞇等坐貶黜德宗怒不解在朝無救者城聞而起曰吾諫官也不可令天子殺無罪之人而}
