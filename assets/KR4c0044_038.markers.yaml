  - {type: variant, offset: 2649, length: 0, content: '', WYG: 美具號以為經列之學官置師弟子讀而講之從始至今莫敢指斥號或作纂經上或有正字嚮使撰次不得其人文字曖昧雖有美實其誰觀之辭跡俱亡善惡惟一然則兹事至大不可輕以屬人中謝或無此二字伏惟唐至陛下再登太平剗刮羣姦掃灑疆土天之所覆莫不賔順惟或作以然而淮西之功尤為俊偉碑石所刻動流億年必得作者然後可盡能事今詞學之英所在麻列儒宗文師磊落相望麻或作成方從閣杭苑李謝本今按作麻殊無理疑此本是森字誤轉作麻後人見其誤而不得其説乃改作成耳且公答孟簡書亦有森列之語可考也方氏固執舊本定從麻字舛繆無理不成文章固為可怪然幸其如此存得本字使人得以因疑致察遂得其真若便廢麻而直作成字則人不復疑而本字無出可得矣然則方本雖誤而亦不為無功但不當便以為是而直廢他本不復思索參考耳今以無本亦未敢輕改且作麻字而著其説使讀為森云外之則宰相公卿郎官博士内之則翰林禁密遊談侍從之臣不可一二遽數召而使之無有不可至於臣者自知最為淺陋顧貪恩待趨以就事叢雜乖戾律呂}
