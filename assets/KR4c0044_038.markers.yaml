  - {type: variant, offset: 2920, length: 288, content: 賛聖功臣子之職下霑羣帥文字所宜陛失次待或作侍乾坤之容日月之光知其不可繪畫強顔爲之以塞詔㫖罪當誅死其碑文今巳撰成謹録封進無任慙羞戰怖之至謹上或有随表二字慙羞戰怖或作慚惶怖懼此下或有謹奉表以聞三月二十五日臣愈誠惶誠恐頓首頓首謹言二十三字今按此或本以聞下便著月日与今表式不同未詳其説奏韓弘人事物狀古本云四月一日涯度羣夷簡奉進止碑文宣賜韓弘一本右臣先奉恩勑撰平淮西碑文或无恩字或无勑字伏縁聖恩以碑本賜韓弘等今韓弘寄絹五百匹與臣充人事未敢受領謹録奏聞伏聽進止謹奏謝許受韓弘物狀臣某言今日品官第五文嵩至臣宅奉宣聖旨令臣受領韓弘等所寄撰碑人事絹者恩隨事至榮與幸并慙抃怵惕罔知所喻中謝伏以上賛, WYG: 贊}
