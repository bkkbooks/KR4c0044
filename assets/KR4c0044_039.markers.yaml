  - {type: variant, offset: 6882, length: 0, content: '', WYG: 欽定四庫全書别本韓文考異巻四十宋王伯大重編表狀論孔戣致仕狀方無孔戣字某官某右臣與孔戣同在南省為官數得相見或無同字戣為人守節清苦議論平正今年纔七十筋力耳目未覺衰老憂國忘家用意深逺所謂朝之耆徳老成人者臣知戣上疏求致仕故往看戣戣為臣言已䝉聖主允許伏以陛下優賢尚齒見戣頻上三疏言詞懇到重違其意遂即許之此誠陛下仁徳之至然如戣輩在朝不過三數人實可為國愛惜自古以來及聖朝故事年雖八九十但視聴心慮茍未昏錯尚可顧問委以事者雖求退罷無不慇懃留止優以禄秩不聴其去以明人君貪賢敬老之道也禮大夫七十而致事若不得謝則必賜之几杖安車禮下或有曰字致事方作致仕今按禮記作事七十求退人臣之常禮若有徳及氣力尚壯則君優而留之不必年過七十盡許致事也詩曰雖無老成人尚有典刑此言老成人重於典刑不可不惜而留也今戣幸無疾疹但以年當致事據禮求退陛下若不聴許亦無傷於義而有貪賢之美况左丞職事亦極清簡若戣尚以繁要為辭自可别授秩崇而務少者今中外之臣有年過於戣尚未得退戣獨何人得遂其願其或作所然人皆求進戣獨求退尤可賢重臣所領官無事不敢請對或無領字䝉陛下厚恩茍有所見不敢不言伏望聖恩特垂察納舉馬總自代狀京兆府銀青光禄大夫檢校尚書右僕射兼戸部尚書馬總右伏凖建中元年正月五日制常參官上後三日舉一人自代者伏以近者京尹用人稍輕所以市井之間盜賊未斷郊野之外疲瘵尚多方無近者至所以十字市井作畿甸前件官文武兼資寛猛得所累更方鎮皆有功能若以代臣實為至當謹録奏聞謹奏賀雨表臣某言臣聞聖人之徳與天地通誠發於中事應於外始聞其語今見其真臣誠歡誠喜頓首頓首伏以季夏以來雨澤不降臣職司京邑祈禱實頻青天湛然旱氣轉甚陛下憫兹黎庶有事山川中使纔出於九門隂雲已垂於四野龍神效職雷雨應期雷或作雲嘉榖奮興根葉肥潤抽莖展穗不失時宜人和年豐莫大之慶微臣幸䝉寵任獲覩殊祥慶抃歡呼倍於常品無任踊躍之至謹奉表陳賀以聞賀太陽不虧狀司天臺奏今月一日太陽不虧右司天臺奏今日辰卯間太陽合虧陛下敬畏天命克已修身誠發於中災銷於上自卯及已當虧不虧及或作至雖隔隂雲轉更明朗比於常日不覺有殊天且不違慶孰為大臣官忝京尹親覩殊祥欣感之誠實倍常品謹奉狀賀以聞狀下或有陳字舉張正甫自代狀尚書兵部再除日通議大夫守右散騎常侍上柱國南陽縣開國子食邑三百戸賜紫金魚袋張正甫右臣䝉恩除尚書兵部侍郎伏凖建中元年正月五日制常參官上後三日舉一人自代者前件官稟正直之性懐剛毅之姿嫉惡如仇讎見善若饑渇備更内外灼有名聲年齒雖髙氣力逾勵力或作志甘貧苦節不愧神明可謂古之老成朝之碩徳乆處散地實非所宜乞以代臣以副公望袁州申使狀使司牒州牒右自今月二日後每奉公牒牒尾故牒字皆為謹牒字有異於常初不敢陳論以為錯誤今既頻奉文牒前後並同在愈不勝戰懼之至伏乞仁恩特令改就常式以安下情國子監論新注學官牒國子監應令新注學官等牒凖今年赦文委國子祭酒選擇有經藝堪訓導生徒者以充學官近年吏部所注多循資序不考藝能至令生徒不自勸勵伏請非專誦經傳博涉墳史及進士五經諸色登科人不以比擬其新受官受或作授上日必加研試然後放行上副聖朝崇儒尚學之意具狀牒上吏部仍牒監者謹牒黄家賊事宜狀一臣去年貶嶺外刺史其州雖與黄家賊不相隣接然見往來過客并諳知嶺外事人所説至精至熟一或作右或有伏以字諳或作諸其賊並是夷獠亦無城郭可居依山傍險自稱洞主衣服言語都不似人尋常亦各營生急則屯聚相保比縁邕管經畧使多不得人徳既不能綏懐威又不能臨制侵欺虜縳以致怨恨蠻夷之性易動難安遂至攻劫州縣侵暴平人或復私讎或貪小利或聚或散終亦不能為事近者征討本起於裴行立陽旻此兩人者本無逺慮深謀意在邀功求賞此下或有時字亦縁見賊未屯聚之時將謂單弱立可摧破争獻謀計惟恐後時朝廷信之遂允其請自用兵已來已經二年前後所奏殺獲計不下一二萬人方無下已字今按恐當刪上已字萬上或無二字儻皆非虚賊已尋盡至今賊猶依舊足明欺罔朝廷邕容兩管因此凋弊殺傷疾患十室九空因或作内經二字患或作疫百姓怨嗟如出一口陽旻行立相繼身亡實由自邀功賞造作兵端人神共嫉以致殃咎自方作身嫉或作怒陽旻行立事既已往今所用嚴公素者亦非撫御之才不能别立規模依前還請攻討素或作集如此不已臣恐嶺南一道未有寧息之時一昨者併邕容兩管為一道深合事宜或無併字然邕州與賊逼近容州則甚懸隔其經畧使若置在邕州與賊隔江對岸兵鎮所處物力必全一則不敢輕有侵犯一則易為逐便控制今置在容州則邕州兵馬必少賊見勢弱易生奸心伏請移經畧使於邕州其容州但置刺史其實為至便一比者所發諸道南討兵馬例皆不諳山川不伏水土逺鄉羇旅疾疫殺傷伏或作服臣自南來見説江西所發共四百人曽未一年其所存者數不滿百方無者字岳鄂所發部三百人其所存者四分纔一續添續死每發倍難若令於邕容側近召募添置千人便割諸道見供行營人數粮賜均融充給所費既不増加而兵士又皆便習長有守備不同客軍守則有威攻則有利一自南討已來賊徒亦甚傷損察其情理厭苦必深大抵嶺南人稀地廣賊之所處又更荒僻假如盡殺其人盡得其地在於國計不為有益容貸羈縻比之禽獸來則捍禦去則不追亦未虧損朝廷事勢以臣之愚若因改元大慶赦其罪戾遣一郎官御史親往宣諭必望風降伏讙呼聴命呼方作呌仍為擇選有材用威信諳嶺南事者為經略使處理得宜自然永無侵叛之事有方作其理或作置應所在典貼良人男女等狀方無在字或又無等字方云二狀皆袁州進今按狀云往任袁州刺史方説非是應所在典貼良人男女等此是狀首標目所論事與前巻賀白龜狀體正同猶今之貼黄及狀眼也方本刪去非是右凖律不許典貼良人男女作奴婢驅使臣往任袁州刺史日檢責州界内得七百三十一人並是良人男女凖律計傭折直一時放免責或作到計上或有例字原其本末或因水旱不熟或因公私債負遂相典貼漸以成風名目雖殊奴婢不别鞭笞役使至死乃休既乖律文實虧正理袁州至小尚有七百餘人天下諸州其數固當不少今因大慶伏乞令有司重舉舊章一皆放免仍勒長吏嚴加檢責如有隠漏必重科懲則四海蒼生孰不感荷聖徳右前件如前謹具奏聞伏聴勅旨論淮西事宜狀方無狀字右臣伏以淮西三州之地自少陽疾病去年春夏以來圖為今日之事有職位者勞於計慮撫循奉所役者修其器械防守金帛粮畜耗於賞給勞於或作勞其非是耗於或作匱於執兵之卒四向侵掠農夫織婦擕持幼弱餉於其後雖時侵掠小有所得力盡筋疲不償其費餉或作飽非是又聞畜馬甚多自半年已來皆上槽櫪譬如有人雖有十夫之力自朝及夕常自大呼跳躍初雖可畏其勢不乆必自委頓乘其力衰三尺童子可使制其死命况以三小州殘弊困劇之餘而當天下之全力其破敗可立而待也待下方有之字非是然所未可知者在陛下斷與不斷耳夫兵不多不足以必勝必勝之師必在速戰方云必或作取兵多而戰不速則所費必廣兩界之間疆土之上日相攻劫必有殺傷近賊州縣徴役百端農夫織婦不得安業或時小遇水旱百姓愁苦當此之時則人人異議以惑陛下之聴下或有矣字陛下持之不堅半塗而罷傷威損費為弊必深所以要先决於心詳度本末事至不惑然可圖功然新史作乃方云然猶然後也下文然可集事然擬許其承繼皆一義今按此盖當時俗體如此故公狀中用之不欲改也為統帥者盡力行之於前而參謀議者盡心奉之於後内外相應其力乃成昔者殷髙宗大聖之主也以天子之威伐背叛之國三年乃尅不以為遲志在立功不計其所費背叛或作叛背傳曰斷而後行鬼神避之遲疑不斷未有能成其事者也臣謬承恩寵獲掌綸誥地親職重不同庶寮輒竭愚誠以效裨補謹條次平賊事宜一一如後一諸道發兵或三二千人勢力單弱羈旅異鄉賊不相諳委望風懾懼難便前進便方作更所在將帥以其客兵難處使先不存優恤待之既薄使之又苦處下或有㫖字不下或有撫字皆非是或被分割隊伍𨽻屬諸頭士卒本將一朝相失心孤意怯難以有功又其本軍各須資遣道路遼逺勞費倍多士卒有征行之艱閭里懐離别之思今聞陳許安唐汝夀等州與賊界連接處村落百姓悉有兵器小小俘刧皆能自防習於戰鬬識賊深淺既是土人䕶惜鄉里比來未有處分猶願自備衣粮共相}
