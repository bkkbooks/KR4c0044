  - {type: variant, offset: 7709, length: 0, content: '', WYG: 味陳奚取味或作服非是本朝景靈宫天興殿祝以青詞薦以酒果用唐制也名香薦孔嘉垂祥紛可録俾夀浩無涯貴相山瞻峻清文玉絶瑕代工聲問逺攝事敬恭加皎潔當天月葳蕤捧日霞葳或作婁方從蜀本孫曰天日以喻君月霞以喻臣杜攝事在人君之側唱妍酬亦麗俛仰但稱嗟亦或作匪方云唱酧謂李杜稱嗟公自謂也别本韓文考異巻十欽定四庫全書别本韓文考異巻十一宋王伯大重編雜著原道補注山谷嘗曰文章必謹布置每見學者多告以原道命意曲折石介守道曰孔子之易春秋自聖人以來未有也吏部原道原仁原毁行難禹問佛骨表諍臣論自諸子以来未有也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂德仁與義為定名道與德為虚位故道有君子小人而德有凶有吉子下或有有字老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也非天下或有之字下小字方作罪云尸子曰井中視星所視不過數星今按韓公未必用尸子語正使用之作罪亦非文意彼以煦煦香句切小惠兒為仁孑孑為義其小之也則宜其}
