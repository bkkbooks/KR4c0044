  - {type: variant, offset: 6131, length: 0, content: '', WYG: 欽定四庫全書别本韓文考異巻二十九宋王伯大重編碑誌唐故朝散大夫商州刺史除名徙封州董府君墓誌公諱溪字惟深丞相贈太師隴西恭惠公第二子十九歲明兩經獲第有司沈厚精敏未嘗有子弟之過賓接門下推舉人士侍側無虛口退而見其人淡若與之無情者太師賢而愛之父子閒自為知巳諸子雖賢莫敢望之太師累踐大官大或作從非是臻宰相致平治終始以禮號稱名臣晨昏之助葢有賴云太師之平汴州師下或無之字年考益髙挈持維綱鋤削荒纇音耒祝曰絲節淮南子明月之珠不能無纇纇或作頑納之太和而巳其囊篋細碎無所遺漏繄公之功上介尚書左僕射陸公長源齒差太師標望絶人聞其所為每稱舉以戒其子楊凝孟叔度以材德顯名朝廷或作於朝及來佐幕府佐或作往詣門請交屏所挾為或作屏棄所挾太師薨始以秘書郎選叅軍京兆府法曹選或作遷日伏階下與大尹爭是非大尹屢黜巳見大或並作太歲中奏為司録參軍與一府政以能拜尚書度支貟外郎遷倉部郎中萬年令兵誅恒州改度支郎中攝御史中丞為糧料使兵罷遷商州刺史糧料吏有忿争相牽告者事及於公因徵下御史獄因方作顯云漢韓安國傳由此顯名於漢當用此義今按此召對私耳與方所引者不類當只作因公不與吏辨一皆引伏受垢除名徙封州元和六年五月十二日死湘中年四十九州下方本無年月日但於湘中下云年若干今以晁本定按唐書元和七年立遂王為太子亦與下文相應明年立皇太子有赦令許歸𦵏其子居中始奉䘮歸元和八年十一月甲寅葬于河南河南縣萬安山下太師墓左夫人鄭氏附公凡再娶皆鄭氏女生六子四男二女長曰全正慧而早死次曰居中好學善為詩張籍稱之次曰從直曰居敬尚小直下或有次字長女嫁吳郡陸暢其季友後夫人之子公之母弟全素孝慈友弟公坐事棄同官令歸公歿比葬三年哭泣如始䘮者大臣髙其行白為太子舍人將葬舍人與其季弟澥户買切問銘於太史氏韓愈将𦵏下方有中字今以上文考之無者為是然世系表全素太子中書舍人通典中舍一云中書舍人又安知全素不自舍人遷中舍邪今按中字有則前後皆當有無則皆當無不應前無而後有也審如方說此志亦必是未遷時作況它本自有無中字者今姑從之不必曲為之說也愈則為之銘辭曰物以久弊或以轢音歴車所踐也毁考致要歸孰有彼此由我者吾不我者天斯而以然其誰使然貞曜先生墓誌先生孟郊湖州武康人也唐元和九年歲在甲午八月已亥已或作乙方云考唐厯是月無乙亥也貞曜先生孟氏卒無子其配鄭氏以告愈走位哭且召張籍會哭走或作赴位或作泣明日使以錢如東都供葬事諸嘗與往來者咸來哭弔嘗或作常韓氏遂以書告興元尹故相餘慶閏月樊宗師使來弔告𦵏期徵銘下或有於愈字愈哭曰嗚呼吾尚忍銘吾友也夫興元人以幣如孟氏賻且來商家事人或作尹樊子使來速銘曰不則無以掩諸幽乃序而銘之先生諱郊字東野父庭玢音彬娶裴氏女而選為崑山尉生先生及二季酆郢而卒先生生六七年端序則見長而愈騫則見或作有法涵而揉之或作足内外完好色夷氣清可畏而親及其為詩劌目鉥心劌居衛切鉥時橘切又音述劌利傷也老子亷而不劌鉥長針也說文綦鍼也刃迎縷解刃或作物鉤章棘句搯擢胃腎搯音滔或作滔非是擢音濁拔也搯捾也刮也廣韵引周書師乃搯捾胃腎或作皆盡神施鬼設閒見層出唯其大翫於詞而與世抹摋或作採掇方從閣杭南唐本云字林抹摋掃滅也漢谷永傳末殺災異人皆刼刼我獨有餘有以後時開先生者曰吾既擠而與之矣其猶足存邪開或作聞擠或作儕年幾五十始以尊夫人之命來集京師從進士試既得即去間四年又命來選為溧陽尉迎侍溧上又下或有以字去尉二年而故相鄭公尹河南奏為}
