  - {type: variant, offset: 0, length: 2917, content: 朱文公校昌黎先生外集卷之十考異音釋附順宗實録五起八月尽至山陵八月庚子詔曰惟皇天祐命烈祖誕受方國九聖儲祉萬方咸休肆予一人獲纉丕業嚴恭守位不遑暇逸或作給今从史而天祐匪降匪史作不疾恙無瘳无或作弗今从史將何以奉宗廟之靈展郊禋之禮疇咨庶尹對越上玄内愧于朕心上畏于天命夙夜祗慄惟懷永圖惟懷史作深惟一日萬機不可以乆曠天工人代不可以乆違皇太子某睿哲温文寛和慈惠慈史作仁孝友之德愛敬之誠通于神明格于上下爱敬或作敬爱或作仁爱今从史是用推皇王至公之道遵父子傳歸之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉若成憲永綏四方宜令皇太子即皇帝位朕稱太上皇居興慶宫制勑稱誥所司擇日行冊禮永貞元年八月辛丑太上皇居興慶宫誥曰有天下者傳歸於子前王之制也欽若大典斯爲至公式揚耿光用體文德朕獲奉宗廟臨御萬方降疾不瘳庶政多闕乃命元子代予守邦爰以令辰光膺冊禮宜以仐月九日冊皇帝於宣政殿仍命檢校司徒杜佑充冊使門下侍郎杜黄裳充副使仍命下二十一字史无國有大命恩俾惟新宜因紀元之慶用覃在宥之澤宜改貞元二十一年爲永貞元年自貞元二十一年八月五日昧爽巳前天下應犯死罪特降從流流巳下遞减一等又下誥曰人倫之本王化之先爰舉令圖允資内輔式表后妃之德俾形邦國之風兹禮經之大典也良娣王氏家承茂族德冠中宫雅修彤管之規克佩姆師之訓自服勤蘋藻祗奉宗祧令範益彰母儀斯著宜正長秋之位以明継躰之尊良媛董氏備位後庭素稱淑愼進升號位礼亦冝之号位或作位号良娣可冊爲太上皇后良媛宜冊爲太上皇德妃仍令所司備禮擇日冊命宣示中外咸使知聞壬寅制王伾開州司馬王叔文渝州司户並貟外置馳驛發遣叔文越州人以碁入東宫頗自言讀書知理道乗閒常言人閒疾苦上將大論宫市事叔文說中上意遂有寵因爲上言某可爲將某可爲相幸異日用之密結韋執誼并有當時名欲僥倖而速進者陸質吕温李景儉韓曄韓泰陳諌劉禹錫柳宗元等十數人定爲死交而凌凖程异等又因其黨而進交遊蹤跡詭祕莫有知其端者貞元十九年𥙷闕張正買䟽諌他事得召見正買與王仲舒劉伯芻裴茞常仲孺吕洞相善数遊止按史王中舒下更有韋成季三字今詳下文有成季字則此処當有此三字亦脫漏也正買得召見諸往來者皆往賀之有與之不善者告叔文執誼云正買䟽似論君朋黨事宜少誡執誼叔文信之執誼甞爲翰林學士父死罷官此時雖爲散郎以恩時時召入問外事執誼因言成季等朋讌聚遊無度皆譴斥之人莫知其由叔文旣得志與王伾李忠言等專断外事遂首用韋執誼爲相其常所交結相次抜擢至一日除数人日夜羣聚常或作甞一上或无至字伾以侍書幸寢陋呉語上所䙝狎而叔文頗任事自許㣲知文義好言事上以故稍敬之不得如伾出入無阻叔文入至翰林而伾入至柿林院見李忠言牛昭容等故各有所主伾主往來傳授劉禹錫陳諌韓曄韓泰柳宗元房啓凌凖等主謀議唱和採聽外事上疾乆不瘳内外皆欲上早定太子位叔文黙不發議已立太子天下喜而叔文獨有憂色喜上或有皆字常吟杜甫題諸葛亮廟詩末句云出師未用身先死長使英雄淚满襟按杜詩用作戦因歔欷流涕聞者咸竊笑之雖判兩使事未甞以簿書爲意日引其黨屏人切切細語謀奪宦者兵以制四海之命旣令范希朝韓泰揔綂京西諸城鎮行營兵馬中人尚未悟㑹邊上諸將各以狀辭中尉且言方属希朝中人始悟兵柄爲叔文所奪乃大怒曰從其謀吾屬必死其手密令其使歸告諸將曰無以兵屬人希朝至奉天諸將無至者韓泰白叔文計無所出唯曰柰何柰何無幾而母死執誼益不用其語叔文怒與其黨日夜謀起復起復必先斬執誼而盡誅不附巳者聞者皆恟懼皇太子旣監國遂逐之明年乃殺之伓杭州人病死遷所其黨皆斥逐叔文最所賢重者李景儉而最所謂竒才者吕温叔文用事時景儉持母䘮在東都而吕温使吐蕃半歳至叔文敗方歸故二人皆不得用叔文敗後数月乃貶執誼爲崖州司馬後二年病死海上執誼杜黄裳子壻與黄裳同在相位故最在後貶執誼進士對策髙等驟遷拾遺年二十餘入翰林巧惠便辟媚幸於德宗而性貪婪詭賊其從祖兄夏卿爲吏部侍郎執誼爲翰林學士受財爲人邊上諸將各以狀辭中尉且言方属希朝中人始悟兵柄爲叔文所奪乃大怒曰從其謀吾屬必死其手密令其使歸告諸將曰無以兵屬人希朝至奉天諸將無至者韓泰白叔文計無所出唯曰柰何柰何無幾而母死執誼益不用其語叔文怒與其黨日夜謀起復起復必先斬執誼而盡誅不附巳者聞者皆恟懼皇太子旣監國遂逐之明年乃殺之伓杭州人病死遷所其黨皆斥逐叔文最所賢重者李景儉而最所謂竒才者吕温叔文用事時景儉持母䘮在東都而吕温使吐蕃半歳至叔文敗方歸故二人皆不得用叔文敗後数月乃貶執誼爲崖州司馬後二年病死海上執誼杜黄裳子壻與黄裳同在相位故最在後貶執誼進士對策髙等驟遷拾遺年二十餘入翰林巧惠便辟媚幸於德宗而性貪婪詭賊其從祖兄夏卿爲吏部侍郎執誼爲翰林學士受財爲人求科第夏卿不應乃探出懷中金以内夏卿䄂夏卿驚曰吾與卿頼先人德致名位幸各巳逹豈可如此自毀壞巳或作以擺䄂引身而去執誼大慙恨旣而爲叔文所引用𥘉不敢負叔文迫公議時時有異同輒令人謝叔文云非敢負約爲異同蓋欲曲成兄弟爾約或作終非是弟疑當作亊叔文不之信遂成仇怨然叔文敗執誼亦自失形勢知禍且至雖尚爲相當不自得長奄奄無氣聞人行聲輒惶悸失色以至敗死時纔四十餘執誼自卑嘗諱不言嶺南州縣名爲郎官時嘗與同舎郎詣職方觀圖毎至嶺南圖執誼皆命去之閉目不視至拜相還所坐堂北壁有圖不就省七八日試就觀之乃崖州圖也以爲不祥甚惡之惮不能出口至貶果得崖州焉永貞二年正月景戍朔戌史作寅下同太上皇於興慶宫受朝賀皇帝率百僚奉上尊號曰應乾聖壽太上皇冊文曰維永貞二年二或作元非是歳次景戍正月景戍朔皇帝臣某稽首再拜奉冊言臣聞上聖玄邈獨超乎希夷彊名之極猶存乎罔象彊或作引非是豈足以表無爲之德光不宰之功然稱謂所施簡冊攸著涵泳道德感於精誠仰奉洪徽有以自竭伏惟太上皇帝陛下道継玄元業纉皇極膺千載之休曆承九聖之耿光昭宣化源發揚大號政有敦本示儉慶𥙿格天政有二字疑衍恩翔春風髙蹈體堯之德與神同符其動也天其静也地巍巍事表無仁育羣品而功成不處褰裳去之付神器於冲人想汾陽以得而言顧兹寡昧屬膺大寳懼忝傳歸之業莫申継述之志夙夜兢畏惟懷永圖今天下幸安皆睿訓所𬒳而未極徽號孰報君親是以台臣庶官文武之列抗䟽於内方伯藩守億兆之衆同詞於外請因壽曆以播鴻名臣不勝大願謹上尊號曰應乾聖壽太上皇當三朝獻壽之辰應五紀啓元之始光膺徽稱允恊神休斯天下之慶也元和元年正月甲申太上皇崩于興慶宫咸寕殿年四十六遺詔曰朕聞死生者物之大歸脩短者人之常分聞或作觀古先哲王明於至道莫不知其終以存義順其變以節哀故存者不至於傷生逝者不至於甚痛謂之逹理以貫通䘮朕自弱齡即敦清静逮乎近歳又嬰沈痼嘗亦親政益倦于勤以皇帝天資仁孝日躋聖敬爰釋重負委之康済而能内睦于九族外勤于萬機問寢益嚴侍膳無曠推此至德以安庶邦朕之知子無愧天下今厥疾大漸不寤不興付託得人顧復何恨四海兆庶亦奚所哀但聖人大孝在乎善継樞務之重軍國之殷纘而承之不可蹔闕以日易月抑惟舊章皇帝宜三日而聽政十三日小祥二十五日大祥五或作三非是二十七日釋服方鎮岳牧不用離任赴哀天下吏人誥至後出臨三日皆釋服無禁婚嫁祠祀飲酒食肉宫中當臨者朝脯各十五舉音非朝晡臨時禁無得哭釋服之後勿禁樂他不在誥中者皆以類從事伏以崇陵仙寢復土纔終甸邑疲人休功未幾今又重勞營奉朕所哀矜况漢魏二文皆著遺令永言景行常志夙心其山陵制度務從儉約並不用以金銀錦綵爲飾百辟卿士同力盡忠克申送往之哀冝展事居之禮居或作君非是布告天下明知朕懷七月壬申葬豊陵謚曰至德大聖大安孝皇帝廟曰順宗朱文公校昌黎先生外集卷之十, WYG: 聯}
