  - {type: line-break, offset: 0, content: '', id: KR4c0044_SBCK_040-1a01}
  - {type: variant, offset: 0, length: 1583, content: 朱文公校昌黎先生集卷之四十考異音釋附表狀論孔戣致仕狀方无孔戣字某官某右臣與孔戣同在南省爲官數得相見或无同字戣爲人守節清苦議論平正今年纔七十筋力耳目未覺衰老憂國忘家用意深逺所謂朝之耆德老成人者臣知戣上䟽求致仕故往看戣戣爲臣言巳蒙聖主允許伏以陛下優賢尚齒見戣頻上三䟽言詞懇到重違其意遂即許之此誠陛下仁德之至然如戣輩在朝不過三數人實可爲國愛惜自古以來及聖朝故事年雖八九十但視聽心慮苟未昏錯尚可顧問委以事者雖求退罷無不殷勤留止優以禄秩不聽其去以明人君貪賢敬老之道也禮大夫七十而致事若不得謝則必賜之几杖安車礼下或有日字致事方作致仕今按礼記作事七十求退人臣之常禮若有德及氣力尚壯則君優而留之不必年過七十盡許致事也詩曰雖無老成人尚有典刑此言老成人重於典刑不可不惜而留也今戣幸無疾疹但以年當致事據禮求退陛下若不聽許亦無傷於義而有貪賢之美況左丞職事亦極清簡若戣尚以繁要爲辭自可别授秩崇而務少者今中外之臣有年過於戣尚未得退戣獨何人得遂其願其或作所然人皆求進戣獨求退尤可賢重臣所領官無事不敢請對或无領字蒙陛下厚恩苟有所見不敢不言伏望聖恩特垂察納舉馬揔自代狀京兆府銀青光禄大夫檢校尚書右僕射兼户部尚書馬揔右伏凖建中元年正月五日制常參官上後三日舉一人自代者伏以近者京尹用人稍輕所以市井之間盗賊未㫁郊野之外疲瘵尚多方无近者至所以十字市井作畿甸前件官文武兼資寛猛得所累更方鎮皆有功能若以代臣實爲至當謹録奏聞謹奏賀雨表臣某言臣聞聖人之德與天地通誠發於中事應於外始聞其語今見其眞臣誠歡誠喜頓首頓首伏以季夏以來雨澤不降臣職司京邑所禱實頻青天湛然旱氣轉甚陛下憫兹黎庶有事山川中使纔出於九門隂雲巳垂於四野龍神效職雷雨應期雷或作雲嘉榖奮興根葉肥潤抽莖展穗不失時宜人和年豐莫大之慶微臣幸蒙寵任獲覩殊祥慶抃歡呼倍於常品無任踴躍之至謹奉表陳賀以聞賀太陽不虧狀狀蜀本作表司天臺奏今月一日太陽不虧右司天臺奏今日辰卯閒太陽合虧陛下敬畏天命克巳脩身誠發於中災銷於上自卯及巳當虧不虧及或作至雖隔隂雲轉更明㓪比於常日不覺有殊天且不違慶孰爲大臣官忝京尹親覩殊祥欣感之誠實倍常品謹奉狀賀以聞狀下或有陳字舉張正甫自代狀尚書兵部再除日通議大夫守右散騎常侍上柱國南陽縣開國子食邑五百户賜紫金魚袋張正甫右臣蒙恩除尚書兵部侍郎伏凖建中元年正月五日制常參官上後三日舉一人自代者前件官禀正直之性懷剛毅之姿嫉惡如仇讎見善若饑渴備更内外灼有名聲年齒雖髙氣力逾勵力或作志甘貧苦節不愧神明可謂古之老成朝之碩德乆處散地實非所宜乞以代臣以副公望袁州申使狀使司牒州牒右自今月二日後毎奉公牒牒尾故牒字皆爲謹牒宇有異於常𥘉不敢陳論以爲錯誤今旣頻奉文牒前後並同在愈不勝戰懼之至伏乞仁恩特令改就常式以安下情國子監論新注學官牒國子監應今新注學官等牒凖今年赦文委國子祭酒選擇有經藝堪訓導生徒者以充學官近年吏部所注多循資叙不考藝能至令生徒不自勸勵伏請非專誦經傳博渉墳史及進士五經諸色登科人不以比擬其新受官受或作授上日必加研試然後放行上副聖朝崇儒尚學之意具狀牒上吏部仍牒監者謹牒黃家賊事冝狀一臣去年貶嶺外刺史其州雖與黃家賊不相鄰接然見往來過客并諳知嶺外事人所說至精至熟一或作右或有伏以字諳方作諸其賊並是夷獠亦無城郭可居依山傍險自稱洞主衣服言語都不似人尋常亦各營生急則屯聚相保比縁邕管經略使多不得人德旣不能綏懷威又不能臨制侵欺虜縛以致怨恨蠻夷之性易動難安遂至攻劫州縣侵暴平人或復私讎或貪小利或聚或散終亦不能爲事近者征討本起於裴行立陽旻此兩人者本無逺慮深謀意在邀功求賞此下或有時字亦縁見賊未屯聚之時將謂單弱立可摧破爭獻謀計惟恐後時朝廷信之遂允其請自用兵巳來已經二年前後所奏殺獲計不下一二萬人方无下巳字今按恐當刪上巳字万上或无二字儻皆非虚賊巳尋盡至今賊猶依舊足明欺罔朝廷邕容兩管因此凋弊殺傷疾患十室九空因或作内經二字患或作疫百姓怨嗟如出一口陽旻行立相繼身亡實由自邀功賞造作兵端人神, WYG: ''}
