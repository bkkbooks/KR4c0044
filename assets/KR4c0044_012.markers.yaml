  - {type: variant, offset: 7679, length: 0, content: '', WYG: 章自名為此𫝊頗詳宻然尚恨有闕者不為許逺立傳又不載雷萬春事首尾逺雖才若不及巡者開門納巡位本在巡上授之柄而處其下無所疑忌竟與巡俱守死成功名城䧟而虜與巡死先後異耳開上或疑當有然字兩家子弟材智下不能通知二}
  - {type: page-break, offset: 7679, content: '', id: KR4c0044_WYG_013-6b, image: WYG1073/WYG1073-0435b.png}
  - {type: variant, offset: 7680, length: 0, content: '', WYG: 志以為巡死而逺就虜疑畏死而辭服於賊逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎當其圍守時外無蜉蚍音孚音毗䖝浮蟻子之援所欲忠者國與主耳而賊語以國亡主滅語方}
  - {type: variant, offset: 7681, length: 0, content: '', WYG: 作悟滅下或有悟之字今按悟字無理且從諸本作語若果合有悟字即是誤字之訛但以字上若有語字或悟字或語之字或誤之字即滅字下皆不當復有誤之字若以字上無此四種字即滅字下皆當有誤之字逺見救援不至而賊来益衆必以其言為信外無待而猶死守人相食且盡雖愚人亦能數日而知死處矣逺之不畏死亦明矣烏有城壊其徒俱死獨蒙愧恥求活雖至愚者不忍為嗚呼而謂逺之賢而為之耶其徒上方有而字或又疑而字當在死字之下邪上方無之字説者又謂逺與巡分城而守城之䧟自逺所分始以此詬逺此又與兒童之見無異詬或作語非是人之將死其藏腑必有先受其病者引繩而絶之其絶必有處觀者見其然從而尤之其亦不達於理矣小人之好議論不樂成人之美如是哉如巡逺之所成就如此卓卓猶不得免其他則又何説當二公之初守也寧能知人之卒不救棄城而逆遁茍此不能守雖避之他處何益之卒或無之字及其無救而且窮也將其創楚良切傷也殘餓羸之餘雖欲去必不達二公之賢其講之精矣守一城捍天下以千百就盡之卒戰百萬日滋之師蔽遮江淮沮遏其勢天下之不亡其誰之功也之不或無之字非是當是時棄城而圖存者不可一二數所矩切擅彊兵坐而觀者相環也不追議此而責二公以死守亦見其自比於逆亂設滛辭而助之攻也攻或作功非是愈嘗從事於汴徐二府屢道於兩府間府或作親祭於其所謂雙廟者其老人往往説巡逺時事云南霽雲之乞救於賀蘭也方無之字賀蘭嫉巡逺之聲威功績出巳上不肯出師救愛霽雲之勇且壯不聴其語彊畱之具食與樂延霽雲坐霽雲慷慨語曰雲來時睢音綏宋州也陽之人不食月餘日矣雲雖欲獨食義不忍雖食且不下咽坐下或無霽雲字非是因拔所佩刀斷一指血淋漓以示賀蘭一座大驚皆感激為雲泣下雲知賀蘭終無為雲出師意即馳去將出城抽矢射佛寺浮圖矢著直畧切其上甎半箭曰吾歸破賊必滅賀蘭此矢所以志也箭或作笴歸或作師非是愈貞元中過泗州船上人猶指以相語城䧟賊以刃脇降巡巡不屈即牽去將斬之又降霽雲雲未應或無霽字巡呼雲曰南八男兒死耳不可為不義屈雲笑曰欲將以有為也公有言雲敢不死即不屈欲將或疑衍一字張籍曰有于嵩者少依於巡及巡起事嵩常在圍中及巡或作及其常方作嘗籍大厯中於和州烏江縣見嵩嵩時年六十餘矣或無下嵩字以巡初嘗得臨渙縣尉好學無所不讀或無嘗字籍時尚小粗問巡逺事不能細也云巡長七尺餘鬚髯若神嘗見嵩讀漢書謂嵩曰何為乆讀此乆或作又嵩曰未熟也巡曰吾於書讀不過三徧終身不忘也因誦嵩所讀書盡巻不錯一字嵩驚以為巡偶熟此巻因亂抽他帙以試無不盡然嵩又取架上諸書試以問巡巡應口誦無疑嵩從巡乆亦不見巡常讀書也為文章操紙筆立書未嘗起草起方作有樊曰巡開元二十四年進士劉夢得嘉話載其謝加金吾表有云主辱臣死當臣致命之時惡稔罪盈是賊滅亡之日激勵將士賦詩有云裹瘡猶出陣飲血更登陴又夜聞笛聲詩有云營開星月近戰苦陣雲深觀此則巡之文章可見矣一本作未嘗有草新添巡守睢陽詩全章云接戰春來苦孤城日漸危合圍侔月暈分守效魚麗屢厭黄塵起時將白羽麾裏瘡猶出陣飲血更登陴忠信應難敵堅貞自不移無人報天子心計欲何施初守睢陽時士卒僅萬人城中居人户亦且數萬巡因一見問姓名其後無不識者或無户字巡怒鬚髯輒張及城䧟賊縳巡等數十人坐且將戮巡起旋其衆見巡起或起或泣或起或作猶起巡曰汝勿怖死命也衆泣不能仰視巡就戮時顔色不亂陽陽如平常逺寛厚長者貌如其心與巡同年生月日後於巡呼巡為兄死時年四十九呼巡或作呼之嵩貞元初死於亳宋間或傳嵩有田在亳宋間武人奪而有之嵩將詣州訟理為所殺嵩無子張籍云嵩將上或有而字為下或有其字皆非是河中府連理木頌司空咸寧王渾瑊也尹蒲之七年木連理生于河之東邑野夫來告且曰吾不知古殆氣之交暢也維吾王之徳交暢者有五是其應乎殆或作始或無五字皆非是訓戎奮威蕩戮凶回舉政宣和人則咸嘉入踐台階庶尹克司來帥熊羆四方作儀閔仁鰥寡不寧燕息仁或作人非是人樂王徳祝年萬億府有羣吏王有從事異體同心歸民于理異體或作上下非是體方作事天子是嘉俾錫勞王王拜稽首天子之光庶徳昭融神斯降祥殊本連理之柯同榮異壟之禾方云三館本潮本之柯皆作枝柯仍與下文同榮為一句今本木作禾由枝字訛也今按殊本連理之柯即今所頌之木也同榮異壟之禾即書所謂異畆同穎之嘉禾也葢追為前白之預言而泛舉其類耳司馬相如所謂雙鮥共抵之獸其句法亦類此如方所定則理乖語贅句分而韻不恊失之逺矣吾傒之産兹土也乆矣方無之字今按之字疑當作其今欲明于大君紀于策書王抑余也冶金伐石埀耀無極王余抑也欲或作將王余抑也或作余抑王也或依上文作王抑余也方從三本定此今按抑余余抑葢互文以叶韻耳作余抑王固無理作王抑余亦重復無它竒當從方本為是奮肆姁媮上音劬下音俞美態也不知所如願託頌詞長言之於康衢頌曰木何為兮此祥洵厥美兮在吾王洵方作詢非是願封植兮永固俾斯人兮不㤀斯或作其人或作民汴州東西水門記并序貞元十四年正月戊子隴西公命作東西水門或無隴西二字非是方云董晉本仲舒之裔自廣川徙隴西故云越三月辛已朔水門成三日癸未大合樂設水嬉㑹監軍軍司馬賔佐僚屬將校熊羆之士肅四方之賔客以落之士女龢古和字㑹闐郭溢郛既卒事其從事}
