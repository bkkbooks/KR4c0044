  - {type: variant, offset: 4629, length: 1, content: 与, WYG: 道不肯拔我一毛而利天下而夫人以有家為勞心不肯一動其心以畜其妻子其肯勞其心以為人乎哉楊之上或有然字非是畜或作蕃雖然其賢於世之患不得之而患失之者以濟其生之欲貪邪而亡道以喪其身者其亦逺矣亡或作忘又其言有可以警余者故余為之傳而自鑒焉鑒方作覽或作覺今疑自鑒或當作日覽五箴并序人患不知其過既知之不能改是無勇也方無是字余生三十有八年三或作四方從閤杭蜀本云洪樊辨證詳矣髮之短者日益白齒之揺者日益脱聰明不及於前時道徳日負於初心二於字或並作于其不至於君子而卒為小人也昭昭矣作五箴以訟其惡云游箴余少之時將求多能蚤夜以孜孜余今之時既飽而嬉蚤夜以無為余方從閤杭蜀本並作于云左傳于民生之不易于勝之不可保杜注于曰余今按方云不為無据然與}
