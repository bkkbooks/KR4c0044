  - {type: variant, offset: 7683, length: 4, content: 先生集卷, WYG: 韓愈請紀其成績其詞曰維汴州河水自中注厥初距河為城其不合者誕寘聨鎖于河宵浮晝湛舟不潜通距或作拒不合或作弗合湛或作沈舟不方作舟用方並從石本今按上下文意葢言置鎖雖足以禁舟}
  - {type: page-break, offset: 7683, content: '', id: KR4c0044_WYG_013-12a, image: WYG1073/WYG1073-0438a.png}
  - {type: variant, offset: 7688, length: 0, content: '', WYG: 潜通然未免虧疏宣洩之患故須作水門耳諸本作舟不潜通者是也今上文既言置鎖而下文乃云舟用潜通則是鎖為虚設而其下句亦不應著然字矣若以為誤則石本乃當時所刻不應有誤然亦安知非其書者之誤刻者之誤况或非所親見則又安知非傳者之誤耶其説之未盡者又見於溪堂盤谷等篇覽者詳之然其襟抱虧疏風氣宣洩邑居弗寧訛言屢騰歴載巳來孰究孰思皇帝御天下}
  - {type: variant, offset: 7689, length: 0, content: '', WYG: 有八載此邦之人遭逢疾威嚚童噭嘑上音呌下音呼皆聲也嚚童李迺刼衆阻兵懍懍栗栗若墜若覆時維隴西公受命作藩爰自洛京單車來臨遂拯其危遂去其疵拯或作持弗肅弗厲薫為大和神應祥福五榖穰熟既庶而豐人力有餘監軍是咨司馬是謀諸本及石本皆有此}
