  - {type: variant, offset: 7690, length: 0, content: '', WYG: 句方從閤本刪去云閤本葢公晚年所定當從之今詳此二語疑後人惡監軍二字而刪之耳方氏直謂閤本為公晚年所定不知何據而云然以今觀之其舛誤為最多疑為初出未校之本前已辨之詳矣大抵館閣藏書不過取之民間而諸儒畧以官課校之耳豈能一一精善過於私本世俗但見其為官本便尊信之而不復問其文理之何如巳為可笑今此乃復造為改定之説以鉗衆口則又可笑之甚也乃作水門為邦之郛以固風氣以閈冦偷閈或作扞黄流渾渾飛閣渠渠因而飾之匪為觀遊天子之武維隴西公是布天子之文維隴西公是宣文方以石閣蜀本作醇今按此記方氏多以石本固當據信但上條用字大誤而此醇字亦未安耳河之沄沄有君切轉流也源于崑崙天子萬祀公多受祉乃伐山石刻之日月尚俾來者知作之所始燕喜亭記燕或作宴此記方亦多從石本太原王𢎞中在連州與學佛人景常元慧游佛下或有之字慧下或有者字異日從二人者行於其居之後丘荒之間止髙而望得異處焉斬茅而嘉樹列發石而清泉激輦糞壤燔椔翳燔或作焚椔側師切詩作之屏之其椔其翳注曰木立死曰椔自斃曰翳却立而視之出者突然成丘䧟者呀虛加切張口皃然成谷窪烏𤓰切一曰窊也老子窪則盈者為池而缺者為洞若有鬼神異物隂來相之自是𢎞中與二人者晨往而夕忘歸焉乃立屋以避風雨寒暑避或作禦寒上或有禦字或作立屋以避風雨既除寒暑既去或作以禦風雨以除寒暑方從石本云左傳吾儕小人皆有闔廬以避燥濕寒暑既成愈請名之其丘曰竢徳之丘蔽於古而顯於今有竢之道也其丘上或有名字有竢下或有徳字其石谷曰謙受之谷瀑音暴又步木切曰振鷺之瀑谷言徳瀑言容也其土谷曰黄金之谷瀑曰秩秩之瀑谷言容瀑言徳也洞曰寒居之洞志其入時也池曰君子之池虚以鍾其美盈以出其惡也泉之源曰天澤之泉出髙而施下也合而名之以屋曰燕喜之亭取詩所謂魯侯燕喜者頌也名或作言者頌方從石閣杭蜀本如此或作頌者今按頌字疑衍文於是州民之老聞而相與觀焉方從石閣杭本如此或無老字而或作者州民之老或作州民之老民非是曰吾州之山水名天下然而無與燕喜者比經營於其側者相接也而莫直其地凡天作而地藏之以遺其人乎名下或有於字其側方以石本無其字直或作多或作宜皆非是方云直音值當也史記樗里子墓正直其北匃奴傳諸將居東方直上谷直讀如字地藏方從石本無地字其人方以石本無其字𢎞中自吏部郎貶秩而來部下或有侍字或無郎字皆非是次其道途所經自藍田入商洛田下或有山字涉淅湍方云今鄧州有淅川縣以淅水得名今按淅音錫其縣本楚之淅邑漢書所謂淅酈者也湍亦水名在鄧州穰縣臨漢水升峴胡典切首以望方城出荆門下岷音民江過洞庭上湘水行衡山之下由郴音琛踰嶺蝯􅀈音袖所家魚龍所宮極幽遐瑰詭之觀宜其於山水飫聞而厭見也蝯或作猿瑰或作瓌也或作之方從石本無也字今其意乃若不足傳曰智者樂水仁者樂山𢎞中之德與其所好可謂恊矣智以謀之仁以居之吾知其去是而羽儀於天朝也不逺矣遂刻}
