  - {type: variant, offset: 7662, length: 0, content: '', WYG: 别本韓文考異巻十二欽定四庫全書别本韓文考異巻十三宋王伯大重編雜著子産不毁鄉校頌我思古人伊鄭之僑以禮相國人未安其敎遊于鄉之校衆口囂囂安或作知方云此以敎叶僑與囂車牽詩用韵如此或謂子産毁鄉校則止曰何患焉可以成美夫豈多言亦各其志善也吾行不善吾避維善維否我於此視川不可防言不可弭下塞上聾邦其傾矣既鄉校不毁而鄭國以理在周之興養老乞言及其巳衰謗者使監成敗之迹昭哉可觀哉或作然維是子産執政之式維其不遇化止一國誠率是道相天下君交暢旁達施及無垠君或作者交暢旁達方從三本作旁暢交達非是達或作通於虖四海所以不理有君無臣誰其嗣之我思古人理下或有者字釋言此元和二年春作宰相鄭絪翰林學士李吉甫中書舍人裴垍也洪曰國語云驪姬使奄楚以環釋言注云以言自解釋也退之作釋言取此元和元年六月十日方無十日字愈自江陵法曹詔拜國子博士始進見今相國鄭公公賜之坐方無下公字且曰吾見子某詩吾時在翰林職親而地禁不敢相聞今為我寫子詩書為一通以來我下或有盡字而無為一通以字或無為我字而有盡字一方作二愈再拜謝退録詩書若干篇擇日時以獻若干方作著于獻下或有之字今按著于篇}
