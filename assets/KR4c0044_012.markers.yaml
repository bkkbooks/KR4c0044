  - {type: variant, offset: 7677, length: 1, content: 朱, WYG: 百官之進見相國者或立語以退而愈辱賜坐語相國之禮過矣以或作巳四海九州之人自百官巳下欲以其業徹相國左右者多矣皆憚而莫之敢獨愈辱先索相國之知至矣賜之大禮之過知之至是三者於敵以下受之宜以何報况在天子之宰乎敵以或作敵巳方云國語自敵以下則有讐注敵體也今人多用敵已字者非宰下或有相字人莫不自知凡適於用之謂才堪其事之謂力愈於二者雖日勉焉而不迨束帶執笏立士大夫之行不見斥以不肖幸矣其何敢敖於言乎或無乎字夫敖雖凶徳必有恃而敢行愈之族親鮮少無扳音攀引也聨之勢於今不善交人無相先相死之友於朝無宿資蓄貨以釣聲勢宿資蓄貨或作宿貨蓄資弱於才而腐於力不能奔走乘機抵􅇖虚宜切以要權利夫何恃而敖若夫狂惑喪心之人蹈河而入火妄言而罵詈者則有之矣而愈人知其無是疾也雖有讒者百人相國將不信之矣愈何懼而慎歟相國或作宰相或無歟字既累月又有來謂愈曰有讒子於翰林舍人李公與裴公者子其慎歟愈曰二公者吾君朝夕訪焉以為政於天下而階太平之治或作理居則與天子為心膂出則與天子為股肱四海九州之人自百官巳下其孰不願忠而望賜不下或有能字非是愈也不狂不愚不蹈河而入火病風而妄罵不當有如讒者之説也雖有讒者百人二公將不信之矣愈何懼而慎既以語應客夜歸私自尤曰咄當没切市有虎而曽參殺人讒者之效也詩曰取彼讒人投畀豺虎豺虎不食投畀有北有北不受投畀有昊傷於讒疾而甚之之辭也又曰亂之初生譛始既㴠亂之又生君子信讒始疑而終信之之謂也孔子曰逺佞人夫佞人不能逺則有時而信之矣今我恃直而不戒禍其至哉徐又自解之曰市有虎聴者庸也曽參殺人以愛惑聰也巷伯之傷亂世是逢也聰或作聴非是亂世方作世亂今三賢方與天子謀所以施政於天下而階太平之治聴聰而視明公正而敦大夫聰明則聴視不惑公正則不邇讒邪敦大則有以容而思彼讒人者孰敢進而為讒哉聴視或作視聴進而或作而進雖進而為之亦莫之聴矣我何懼而慎方無而慎字既累月上命李公相客謂愈曰子前被言於一相今李公又相子其危哉方無哉字愈曰前之謗我於宰相者翰林不知也後之謗我於翰林者宰相不知也今二公合處而㑹言若及愈必曰韓愈亦人耳彼敖宰相又敖翰林其將何求必不然吾乃今知免矣既而讒言果不行宰相或皆作相國乃今或作今乃又無矣字既下方無而字愛直贈李君房别左右前後皆正人也欲其身之不正烏可得耶烏或作焉吾觀李生在南陽公之側有所不知知之未嘗不為之思有所不疑疑之未嘗不為之言勇不動于氣義不陳乎色乎或作于南陽公舉措施為不失其宜天下之所窺觀稱道洋洋者抑亦左右前後有其人乎公下或有之字有其方作其有凡在此趨公之庭議公之事者吾既從而遊矣或無此字今按此下疑當有而字言而公信之者謀而公從之者四方之人則既聞而知之矣李生南陽公之甥也人不知者將曰李生之托婚於富貴之家將以充其所求而止耳故吾樂為天下道其為人焉今之從事於彼也吾為南陽公愛之為南上或有能字又未知人之舉李生於彼者何辭彼之所以待李生者何道又或作且舉不失辭待不失道雖失之此足愛惜而得之彼為歡忻於李生道猶若也舉之不以吾所稱待之不以吾所期李生之言不可出諸其口矣吾重為天下惜之惜或作愛張中丞傳後叙元和二年四月十三日夜愈與呉郡張籍閱家中舊書得李翰所為張巡傳巡上方無張字翰以}
