  - {type: variant, offset: 0, length: 2808, content: 朱文公校昌黎先生集卷之二十一考異音釋附序送區冊序方云洪謂區冊即區弘考其始末非也陽山天下之窮處也陸有丘陵之險虎豹之虞江流悍急横波之石廉利侔劒㦸舟上下失勢破碎淪溺者往往有之江上或有水有字廉或作其縣郭無居民官無丞尉夾江荒茅篁竹之間小吏十餘家皆鳥言夷面荒茅篁竹蜀本作荒榛茅竹篁諸本作叢方云漢書嚴助傳谿谷之間篁竹之中顔日竹田曰篁始至言語不通畫地爲字然後可告以出租賦奉期約語方作說不下有相字是以賔客游從之士無所爲而至士或作事愈待罪於斯且半歳矣有區音歐區治子之後後漢末有長沙區景生者誓言相好自南海挐舟而來升自賔階儀觀甚偉坐與之語文義卓然方無矣字觀或作冠莊周云逃空虚者聞人足音跫巨㳟切行声然而喜矣況如斯人者豈易得哉虚或作谷斯或作其方無斯字皆非是入吾室聞詩書仁義之說欣然喜若有志於其間也與之翳嘉林坐石磯投竿而漁陶然以樂若能遺外聲利而不厭乎貧賤也欣然下或有以字於或作乎間或作聞楽上方無以字厭下方無乎字今按欣然喜陶然楽當為一例故諸本皆有以字而方本皆無然竊詳其文勢之緩急恐上句應無而下句應有也故定從此本歳之𥘉吉歸拜其親酒壷旣傾序以識别吉或作告方云毛氏詩傳云𥘉吉朔日也此盖通言歳首也拜或作覲送張道士序張道士嵩髙之隱者通古今學有文武長材寄迹老子法中爲道士以養其親髙方作南下同隱方作有道今按有道語似太重當且作隱九年聞朝廷將治東方貢賦之不如法者三獻書不報長揖而去方下或有諸侯字京師士大夫多爲詩以贈而屬愈爲序詩曰大匠無棄材㝷尺各有施況當營都邑杞梓用不疑張侯嵩山來面有熊豹姿開口論利害劒鋒白差差白或作自非是恨無一人捶爲國笞羌夷捶方作箠詣闕三上書臣非黄冠師臣有膽與氣不忍死茅茨又不媚笑語不能伴兒嬉乃著道士服衆人莫臣知臣有平賊䇿狂童不難治其言簡且要陛下幸聽之天空日月髙下照理不遺或是章奏繁裁擇未及斯方从閣杭作期非是寧當不竢報歸䄂風披披答我事不爾吾親屬吾思昨宵夢倚門手取連環持今日有書至又言歸何時霜天熟柿栗收拾不可遲嶺北梁可構寒魚下清伊或作漪今按伊水在嵩北若前兩處作嵩南即此處不可作伊若彼作嵩髙則此乃可作伊耳漪字雖可通用然本不从水只是語助辭如書断断猗大斈作兮莊子猶為人猗亦是此類故說文水部無之但因伐檀漣漪淪漪故俗遂加水用之而韓公亦有含風漪之句則此作漪亦未可知今上文旣作嵩髙則此且作伊亦無害若有它證見得上文果當作南則此却當改為漪矣旣非公家用且復還其私從容進退間無一不合疑時有利不利雖賢欲奚爲但當勵前操富貴非公誰送髙閑上人序苟可以寓其巧智使機應於心不挫於氣則神完而守固雖外物至不膠於心堯舜禹湯治天下養叔治射庖丁治牛師曠治音聲扁鵲治病僚之於丸孫日莊子市南冝僚弄丸而兩家之難觧秋之於弈伯倫之於酒樂之終身不厭奚暇外慕夫外慕徙業者皆不造其堂不嚌其胾嚌在誼切胾側吏切補注嚌嘗也胾大脔也礼左殽右胾者也徒或作從非是往時張旭善草書樊曰旭蘇州呉都人新史張顚傳嗜酒毎大醉呌呼狂走乃下筆或以頭濡墨而書旣醒自以爲神不治他伎時或作者善方作喜非是喜怒窘窮憂悲愉佚怨恨思慕酣醉無聊不平有動於心必於草書焉發之喜怒文苑作喜焉草書怒焉草書不平監本作平生皆非是或无焉字觀於物見山水崖谷鳥獸蟲魚草木之花實日月列星風雨水火雷霆霹靂歌舞戰闘天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後丗或无猶字非是今閑之於草書有旭之心哉不得其心而遂其跡未見其能旭也爲旭有道利害必明無遺錙銖情炎於中利欲闘進有得有䘮勃然不釋然後一決於書而後旭可幾也情方作精而下或无後字今閑師浮屠氏一死生解外膠諸本並作膠方从杭歐謝本作繆云繆莫侯切猶綢繆也莊子内韄者不可繆而捉義盖同此今按膠者黏著之物而其力之潰敗不黏爲觧今以下文頽墮潰敗之語反之當定作膠是其爲心必泊然無所起其於丗必淡然無所嗜泊與淡相遭頽墮委靡潰敗不可収拾則其於書得無象之然乎二所下方从杭本皆有於字非是敗方作散然吾聞浮屠人善幻多技能善方从閣作喜今按善幻說巳見第四卷酬崔少府詩閑如通其術則吾不能知矣閑下或有師字方云此篇用意皆本於莊子所称宋元君昼圗有一史後至解衣槃礴羸郭注云内足者神間而意定又云王彦法謂退之此数語乃深得祖師向上体歇一路其見處勝裴休逺甚今按韓公本意但謂人必有不平之心欎積之乆而後發之則其氣勇决而伎必精今髙閑旣无是心則其爲伎冝其潰敗委靡而不能竒但恐其善幻多伎則不可知耳此自韓公所見非如畫史祖師之說也送殷貟外序唐受天命爲天子凡四方萬國不問海内外無小大咸臣順於朝方从閣抗无萬字今按如此則与下文不相應文杭本無於字皆非是時節貢水土百物大者特來小者附集元和睿聖文武皇帝旣嗣位悉治方内就法度十二年詔曰四方萬國惟囬鶻於唐最親奉職尤謹丞相其選宗室四品一人持節往賜君長告之朕意又選學有經法通知時事者一人與之爲貳法或作術由是殷侯侑自太常博士遷尚書虞部貟外郎兼侍御史朱衣象笏承命以行杭本無命字非是朝之大夫莫不出餞酒半右庶子韓愈執盞言曰殷大夫今人適數百里出門惘惘有離别可憐之色持𬒳入直三省丁寧顧婢子語刺刺不能休今子使萬里外國獨無幾微出於言面豈不眞知輕重大丈夫哉殷大夫或作殷侯持或作襆入直三省方云洪慶善謂唐无三省持𬒳入直當爲句絕三息暫反省息井切朱新仲云唐以侍中兩令爲三省長官張籍寄白舎人詩三省比年名望重說者以唐无三省非也若不言三省不知入直何所以上下文考之朱說爲長刺刺方云洪慶善云刺音慮逹切樊云刺七迹切若如供讀則當以戾爲義顧婢子語何戾耶潘岳閣道謡和嶠刺促不得休語意皆同此當以七迹切爲正丞相以子應詔眞誠知人士不通經果不足用於是相屬爲詩以道其行云人下或有矣字送楊少尹序昔䟽廣受二子以年老一朝辭位而去䟲或作踈方云漢書作䟽今按䟽正字踈俗躰也于時公卿設供張祖道都門外車數百兩道路觀者多歎息泣下共言其賢張或作帳方云謂供具張設也音竹亮切公送石弘序張上東門只用張字况二䟽本傳自可考漢書如髙祖留沛張飲黥布傳張御食飲皆謂張設也漢史旣傳其事而後丗工畫者又圗其迹至今照人耳目赫赫若前日事國子司業楊君巨源方以能詩訓後進一旦以年滿七十亦白丞相去歸其郷或无一旦二字丗常說古今人不相及今楊與二䟽其意豈異也及方从閣杭本作方及上或别有方字其意豈異也或作豈其異意邪皆非是予沗在公卿後遇病不能出不知楊侯去時城門外送者幾人車幾兩馬幾疋或无幾人字疋或作駟道邊觀者亦有歎息知其爲賢以否以与通用之例前巳屡見此爲最明白者而太史氏又能張大其事爲傳繼二䟽蹤跡否不落莫否方从閣本无蹤跡否三字非是或但无否字亦非見今丗無工畫者而畫與不畫固不論也然吾聞楊侯之去丞相有愛而惜之者白以爲其都少尹不絶其禄惜下方从閣杭本无之字白或作署或无白字又爲歌詩以勸之京師之長於詩者亦屬而和之又不知當時二䟽之去有是事否古今人同不同未可知也不下或无同字中丗士大夫以官爲家罷則無所於歸或无於字非是楊侯始冠舉於其郷歌鹿鳴而來也郷或作家今之歸指其樹曰某樹吾先人之所種也某水某丘吾童子時所釣遊也郷人莫不加敬誡子孫以楊侯不去其郷爲法古之所謂郷先生没而可祭於社者其在斯人歟其在斯人歟二語方从閣杭本皆無在字送權秀才序伯樂之廐多良馬卞和之匱多美玉卓犖瓌怪之士宜乎遊汴之塩鉄日爲, WYG: ''}
