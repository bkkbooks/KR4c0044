  - {type: variant, offset: 9813, length: 0, content: '', WYG: 今且未須别考它書只以其所引田横墓在洛陽東者論之則自墓下而走洛陽乃是西向安得言東如京乎況唐都長安謂洛陽為東京則可直謂之京則不可其理又甚明若據元和郡國志則河陽西南至河南府八十里其大勢亦不得云東如京也此又三本謬誤之一證故復表而出之感横義髙能得士因取酒以祭為文而弔之士下或有心字其辭曰事有曠百世而相感者余不自知其何心非今世之所稀孰為使余歔欷而不可禁今既博觀乎天下曷有庻㡬乎夫子之所為死者不復生嗟余去此其從誰死者或作死而生方作來皆非是當秦氏之敗亂得一士而可王何五百人之擾擾而不能脫夫子於劍鋩抑所寶之非賢亦天命之有常寶之或作寶者天或作大昔闕里之多士孔聖亦云其遑遑方從閣杭無其字非是茍余行之不迷雖顛沛其何傷自古死者非一夫子至今有耿光非方從閣杭作皆非是跽陳辭而薦酒䰟髣髴而來享歐陽生哀辭歐陽詹世居閩越自詹已上皆為閩越官至州佐縣令者累累有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕今上初故宰相常衮為福建諸州觀察使治其地治上或有往字非是衮以文辭進有名於時又作大官臨蒞其民鄉縣小民有能誦書作文辭者衮親與之為客主之禮吕及公本如此方從閣杭苑粹辭進下即屬鄉縣至者衮下又有故宰相字下乃屬有名至其民又屬親與云云顛倒錯亂全無文理方云三本如此不當輕改而其蔽如此今定從吕本方主下有人字鄉縣作縣鄉則尚有可取云觀游宴饗必召與之宴或作讌與讀為預或作預或疑與如字而之下當有俱字時未㡬皆化翕然化方據新傳作仕非是詹于時獨秀出衮加敬愛諸生皆推服閩越之人舉進士繇詹始建中貞元間余就食江南未接人事往往聞詹名閭巷間詹之稱於江南也乆久下或有矣字貞元三年余始至京師舉進士聞詹名尤甚余下或有年十九字聞方作則或云當并出則聞二字亦有理八年春遂與詹文辭同考試登第始相識自後詹歸閩中余或在京師他處不見詹乆者惟詹歸閩中時為然其他時與詹離率不歴嵗移時則必合合必兩忘其所趨久然後去故余與詹相知為深詹事父母盡孝道仁於妻子於朋友義以誠氣醇以方容貎嶷嶷魚力切岐嶷然其燕私善謔以和其文章切深喜往復善自道讀其書知其於慈孝最隆也十五年冬余以徐州從事朝正於京師詹為國子監四門助教將率其徒伏闕下舉余為博士㑹監有獄不果上或無監字監或作詹觀其心有益於余將忘其身之賤而為之也嗚呼詹今其死矣詹閩越人也父母老矣捨朝夕之養以來京師其心將以有得於是而歸為父母榮也以來或作而來有得或作在得或無於是字而冇複出將以冇得乎雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟詹雖未得位其名聲流於人人其德行信於朋友方作友朋雖詹與其父母皆可無憾也詹之事業文章李翺既為之傳故作哀辭以舒余哀以傳于後以遺其父母而解其悲哀以卒詹志云之傳或作之說或作之誌故上或有余字非是悲哀方作哀悲今按上文已連有兩哀字不應如此重複或當刪去此哀字詹志或作其志求仕與友兮逺違其鄉父母之命兮子奉以行友則既獲兮禄實不豐以志為養兮何有牛羊事實既修兮名譽又光父母忻忻兮常若在旁命雖云短兮其存者長終要必死兮願不永傷朋友親視兮藥物甚良親視或作視疾飲食孔時兮所欲無妨孔或作既夀命不齊兮人道之常在側與逺兮非有不同山川阻深兮魂魄流行祭祀則及兮勿謂不通哭泣無益兮抑哀自疆益或作救推生知死兮以慰孝誠嗚呼哀哉兮是亦難忘哉下或無兮字題哀辭後方本刪此四字或作題歐陽生哀辭後愈性不喜書自為此文惟自書兩通其一通遺清河崔羣羣與余皆歐陽生友也哀生之不得位而死哭之過時而悲友上或有之字其一通今書以遺彭城劉君伉君喜古文或無書字方無伉字下君字一作伉以吾所為合於古詣吾廬而來請者八九至而其色不怨志益堅方無至字凡愈之為此文盖哀歐陽生之不顯榮於前又懼其泯滅於後也今劉君之請未必知歐陽生其志在古文耳其志上或有之志字雖然愈之為古文豈獨取其句讀不類於今者邪雖然下或有茍愛吾文必求其義八字入字下又或有則進知於歐陽生矣必時觀十一字思古人而不得見學古道則欲兼通其辭通其辭者本志乎古道者也乎或作於方從三本無道字以上下文考之無道字即不成文理矣古之道不茍譽毁於人此下或有然則吾之所為文皆有實也十一字劉君好其辭則其知歐陽生也無惑焉獨孤申叔哀辭萬物之生誰非天邪明昭昏䝉誰使然邪行何為而怒居何故而憐邪怒或作怨或作思怒下或冇邪字居或作為胡喜厚其所可薄而恒不足於賢邪將下民之好惡與彼蒼懸邪或無蒼字抑蒼茫無端而蹔寓其問邪寓下或有於字死者無知吾為子慟而已矣如有知也子其自知之矣或無自字方無之字或無自字而有之字濯濯其英􅓮􅓮其光如聞其聲如見其容此句或作如處其旁非是方云以容叶光用古韻也烏虖逺矣何日而忘烏虖或作嗚呼祭穆員外文為崔侍御作晁本篇首題云維年月日故人博陵崔愬謹以清酌之奠祭于亡友穆六端公之靈方云豈穆員邪舊傳員卒檢校員外郎杜亞留守東郡辟為從事皆與此文合新傳員終侍御史故􅄯本稱端公也於乎建中之初予居于嵩携扶北奔避盜來攻奔或作歸晨及洛師相遇一時顧我如故眷然顧之如方作無眷或作睠子有令聞我來自山子之俊明我鈍而頑俊或作畯道既云異誰從知我我思其厚不知其可知其或作知而或作可而於後八年君從杜侯我時在洛亦應其招留守無事多君子僚罔有疑忌惟其嬉游草生之春鳥鳴之朝我轡在手君揚其鑣君居于室我既來即或以嘯歌或以偃側嘯或作詠誨余以義復我以誠復我方作我復今按下文云無非德聲則此二句專指穆也當作復我終日以語無非德聲以或作與主人信讒有惑其下殺人無罪誣以成過入救不從反以為禍赫赫有聞王命三司察我于獄相從係縲曲生何樂直死何悲曲或作直直或作曲二何或皆作可非是上懷主人主方作王非是内閔其私閔或作憫方作關皆非是進退之難君處之宜君或作居非是既釋于囚我來徐州道之悠悠思君為憂我如京師君居父䘮哭泣而拜言詞不通我歸自西君反吉服晤言無他往復其昔其疑當作如不日而違重我心惻自後聞君母䘮是丁痛毒之懷六年以并孰云孝子而殞厥靈今我之至入門失聲失方作哭酒肉在前君胡不餐升君之堂不與我言於乎死矣何日來還祭郴州李使君文補注筆墨間録云祭李郴州文尤雄竒維年月日將仕郎守江陵府法曹參軍韓愈謹以清酌庶羞之奠敬祭于故郴州李使君之靈文苑此篇首又云維元和元年嵗次丙戌二月乙未朔二十四日戊午將仕郎云云使君員外二兄之靈方云考之唐厯皆合古語有之白頭如新傾盖若舊顧意氣之何如何日時之足究何或作曷當貞元之癸未惕皇威而左授未或作酉今按癸未者貞元十九年貶山陽令時也伏荒炎之下邑嗟名頽而位仆歴貴部而西邁邇清光於暫覯於或作而言莫交而情無由既不賈而奚售莫或作若或作若而下無情字哀窮遐之無徒挐百憂以自副遐或作荒窮遐或作遐荒徒方作圖辱問訊之繆綢恒飽飢而愈疚接雄詞於章句窺逸跡於篆籀直右切孫曰周宣王太史造大篆因以為名苞黄甘而致貽獲紙筆之雙貿投义魚之短韻媿韜瑕而舉秀竢新命於衡陽費薪芻於館候空大庭以見處空音控憇水木之幽茂逞英心於縱博沃煩腸以清酹航北湖之空明覷鱗介之驚透宴州樓之豁逹衆管啾而並奏啾或作湫是方云選閒居賦啾啾而並奏得恩惠於新知脫窮愁於往陋窮方作寃輟行謀於俄頃見秋月之三彀逮天書之下降猶低廻以宿留上音秀下音溜念暌離之}
