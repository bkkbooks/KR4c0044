  - {type: variant, offset: 9811, length: 1, content: 斍, WYG: 尤不足以為据也别本韓文考異巻二十一欽定四庫全書别本韓文考異巻二十二宋王伯大重編祭文祭田横墓文貞元十一年九月愈如東京道出田横墓下十一年諸本或作十九年月下有十一日字如東京或作東如京洪氏曰東京洛陽也公以貞元十一年出長安至河陽而後如東都也十九年秋則公為御史是冬即貶陽山安得以九月出横墓下唐都長安亦不得云東如京也方從閣杭蜀本作東如京云田横墓在􅅯師户鄉洛陽東三十里今公自河陽道横墓下以入洛故云東如京也今按洪氏作如東京及考嵗月皆是方氏亦以京為洛陽但據三本必欲作東如京為誤}
