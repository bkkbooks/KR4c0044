  - {type: variant, offset: 0, length: 2386, content: 朱文公校昌黎先生外集卷之二上賈滑州書賈耽以貞元二年為滑州刺史此篇方从蜀苑愈儒服者不敢用他術十進術或作藝又惟古執贄之禮竊整頓舊所著文一十五章以爲贄而喻所以然之意於此章或作首下同曰豐山上有鍾焉視日山海經云豊山有九鍾和霜鳴注云霜降則鍾鳴人所不可至霜旣降則鏗然鳴蓋氣之感非自鳴也或无旣字愈年二十有三讀書學文十五年言行不敢戾於古人或无有字三或作二讀書斈文十五年洪云公与邢尚書書云生七歳而讀書十三而能文二十有五而擢第於春官愚固泯泯不能自計周流四方無所適歸固或作故非是伏惟閤下昭融古之典義含和發英作唐德元簡棄詭說保任皇極是宜小子刻心悚慕又焉得不感而鳴哉和或作華元或作臣方云周書注元德之首也徒以獻策闕下方勤行役且有負薪之疾不得稽首軒階遂拜書家僕待命于鄭之逆旅僕或作僮逆上或无之字伏以小子之文可見於十五章之内小子之志可見於此書與之進敢不勉與之退敢不從方作退進退之際實惟閤下裁之上考功崔虞部書或作上考功宏詞官虞部崔貟外書愈不肖行能誠無可取行巳頗僻與時俗異態抱愚守迷固不識仕進之門廼與羣士爭名競得失行人之所甚鄙求人之所甚利其爲不可雖童昬實知之失一或无行字如執事者不以是爲念援之幽窮之中推之髙顯之上是知其文之或可而不知其人之莫可也知其人之或可而不知其時之莫可也不知其人上方有是字旣以自咎又歎執事者所守異於人人句廢耳任目華實不兼故有所進故有所退以方作巳廢上或有之字不疑當作必今按人字属上句且執事始考文之明日浮囂之徒巳相與稱曰某得矣某得矣問其所從來必言其有自一日之間九変其說凡進士之應此選者三十有二人其所不言者數人而巳而愈在焉不言方作不云及執事旣上名之後三人之中其二人者固所傳聞矣華實兼者也果竟得之而又升焉或无其字固上或有則字果或作畢下同其一人者則莫之聞矣實與華違行與時乖果竟退之如是則可見時之所與者時之所不與者之相逺矣然愚之所守竟非偶然故不可變竟非或作慬非故或作固凡在京師八九年矣足不跡公卿之門名不譽於大夫士之口或无譽字於或作一或无士字始者謬爲今相國所第此時惟念以爲得失固有天命不在趍時而偃仰一室嘨歌古人今則復疑矣未知夫天竟如何命竟如何由人乎哉不由人乎哉未上或有又字或无夫字天竟或作天意人乎或並作乎人欲事干謁則患不能小書困於投刺欲上或有夫字於或作乎欲斈爲佞則患言訥詞直卒事不成爲方作于患下或有於字卒或作則徒使其躬儳焉而不終日其躬方本如此而㪯正躬作窮蓋誤而諸本作如方云蜀本作而今本皆以表記語刋作如然不知古而如同意此語不當以如似之義讀之唐人惟韓栁知此子厚荅韋中立書假而以僕年先吾子与公此文是也董彦逺曰春秋書星隕如雨左氏室如縣磬是皆以如爲而風俗通囯人望君而望歳鄒陽書白頭而新是皆以而爲如按家語君入廟如右荀子作而右楽府艾如張亦作艾而張今人所用漣而攷之李善文選乃連而也实用易之泣血漣如爲義去古益逺字義多失惟韓栁文時見一二因爲詳之今按孟子望道而未之見亦是此例方言又有而如古字通用之說然陸德明論當時語音之失有曰此人則而如靡異盖不以爲然也然則此而字湏讀爲如乃爲正耳董引室如縣磬乃拠左傳作罄字而杜預注云如而也言居室而資糧縣尽故其說如此囯語則作縣磬而韋昭注云府藏空虚但有榱梁如縣磬左傳蓋借罄爲磬而杜氏誤解囯語則正作磬字而韋說得之董氏所引不足拠以爲說今併論之附見于此是以勞思長懷中夜起坐度時揣巳廢然而返雖欲從之求由也巳又常念古之人日巳進今之人日巳退常方作嘗夫古之人四十而仕其行道爲學旣巳大成而又之死不倦故其事業功德老而益明死而益光故詩曰雖無老成人尚有典刑言老成之可尚也可上或有人字又曰樂只君子德音不巳謂死而不亡也巳或作忘亡或作忘方作巳夫今之人務利而遺道其學其問以之取名致官而巳方无夫字遺或仁違問上或无其字得一名獲一位則棄其業而役役於持權者之門故其事業功德日以忘月以削老而益昏死而遂亡位或作官忘方作亡愈仐二十有六矣距古人始仕之年尚十四年豈爲晚哉今下或有年始字豈上或有矣夫字行之以不息要之以至死不有得於今必有得於古不有得於身必有得於後用此自遣且以爲知已者之報執事以爲如何哉其信然否也爲如或作謂如仐所病者在於窮約無僦屋賃僕之資無緼𫀆糲食之給驅馬出門不知所之斯道未䘮天命不欺豈遂殆哉豈遂困哉竊惟執事之於愈也無師友之交無乆故之事無顔色言語之情卒然振而發之者必有以見知爾故盡暴其所志不敢以黙执亊下方有者字愈下方无也字顔色言語方作言語顔色尓或作耳以黙或作黙黙又懼執事多在省非公事不敢以至是則拜見之不可期獲侍之無時也是以進其說如此庶執事察之也至下或有於字期下或有也字庶或作幸與張徐州薦薛公達書此篇方本有之今疑非公作當刪與少室李拾遺書諸本室下有山字李下有渤字方从蜀苑新書云此書作於元和三年公時尚為博士新書云洛陽令誤也十二月某日愈頓首方无此八字伏承天恩詔河南敦諭拾遺公朝廷之士引頸東望若景星鳯皇之始見也爭先覩之爲快拾遺公新書作遺公萹内並同方今天子仁聖小大之事皆出宰相樂善言如不得聞小大㪯正作大小恐誤事或作士自即大位巳來於今四年凡所施者無不得宜者或作爲凡所施者新書作凡所出而施者勤儉之聲寛大之政幽閨婦女草野小人皆飽聞而厭道之草或作山人新書作子愈不通於古請問先生丗非太平之運歟加又有非人力而至者愈方作某於作于无丗字非作匪新書作兹非太平丗欤年榖熟衍符貺委至若干紀之姦不戰而拘纍彊梁之兇銷鑠縮栗迎風而委伏其有一事未就正自視若不成人四海之所環無一夫卑而兵者新書无自字視或作是非是而兵或作与兵若此時也拾遺公不疾起與天下之士君子樂成而亨之斯無時矣若上或有未有字昔者孔子知不可爲而爲之不巳足跡接於諸侯之國即可爲之時自藏深山牢関而固距即與仁義者異守矣或无足跡字想拾遺公冠帶就車惠然肯來舒所蓄積以𥙷綴盛德之有闕遺利加於時名垂於將來踊躍悚企傾刻以冀闕遺方作遺闕新書无有遺二字利下或无加字加於新書作加于垂下亦无於字傾或作頃又竊聞朝廷之議必起拾遺公使者往若不許即河南必継以行或无即字拾遺徴君若不至必加髙秩如是則辭少就多傷於廉而害於義拾遺公必不爲也則或作即新書无則字善, WYG: ''}
