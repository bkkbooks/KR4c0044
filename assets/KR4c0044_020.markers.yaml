  - {type: variant, offset: 5428, length: 0, content: '', WYG: 衣象笏承命以行杭本無命字非是朝之大夫莫不出餞酒半右庶子韓愈執盞言曰殷大夫今人適數百里出門惘惘有離别可憐之色持被入直三省丁寧顧婢子語刺刺不能休今子使萬里外國獨無幾微出於顔面豈不真知輕重大丈夫哉殷大夫或作殷侯持或作襆入直三省方云洪慶善謂唐無三省持被直入當為句絶三息暫反省息井切朱新仲云唐以侍中兩令為三省長官張籍寄白舎人詩三省比年名望重說者以唐無三省非也若不言三省不知入直何所以上下}
  - {type: variant, offset: 5429, length: 0, content: '', WYG: 考之朱說為長刺刺方云洪慶善云刺音慮達反樊云刺七迹切若如洪讀則當以類為義顧婢子語何戾耶潘岳閣道謡和嶠刺促不得休語意皆同此當以七迹切為正丞相以子應詔真誠知人士不通經果不足用於是相屬為詩以道其行云人下或有矣字送楊少尹序昔疏廣受二子以年老一朝辭位而去疏或作踈方云漢書作疏今按疏正字踈俗體也于時}
  - {type: page-break, offset: 5429, content: '', id: KR4c0044_WYG_021-6b, image: WYG1073/WYG1073-0526b.png}
  - {type: variant, offset: 5430, length: 3, content: 校昌黎, WYG: 卿設供張祖道都門外車數百兩道路觀者多歎息泣下共言其賢張或作帳方云謂供具張設也音竹亮切公送石𢎞序張上東門只用張字况二疏本傳自可考漢書如髙祖留沛張飲黥布傳張御食飲皆謂張設也漢史既傳其事而後世工畫者又圖其迹至今照人耳目赫赫若前日事國子司業楊君巨源方以能詩訓後進一旦以年滿七十亦白丞相去歸其鄉或無一旦二字世常說古今人不相及今楊與二疏其意豈異邪及方從閣杭本作古及上或别有方字其意豈異也或作豈其異意邪皆非是予忝在公卿後遇病不能出不知楊侯去時城門外送者幾人車幾兩馬幾疋或無幾人字疋字或作駟道邊觀者亦有歎息知其為賢以否以與通用之例前已屢見此為最明白者而太史氏又能張大其事為傳繼二疏蹤跡否不落莫否方從閣本無蹤跡否三字非是或但無否字亦非見今世無工畫者而畫與不畫固不論也然吾聞楊侯之去丞相有愛而惜之者白以為其都少尹不絶其祿惜下方從閣杭本無之字曰或作署或無白字又為歌詩以勸之京師之長於詩者亦屬而和之又不知當時二疏之去有是事否古今人同不同未可知也不下或無同字中世士大夫以官為家罷則無所於歸或無於字非是楊侯始冠舉於其鄉歌鹿鳴而來也鄉或作家今之歸指其樹曰某樹吾先人之所種也某水某丘吾童子時所釣遊也鄉人莫不加敬誡子孫以楊侯不去其鄉為法古之所謂鄉}
  - {type: page-break, offset: 5430, content: '', id: KR4c0044_WYG_021-7a, image: WYG1073/WYG1073-0526c.png}
