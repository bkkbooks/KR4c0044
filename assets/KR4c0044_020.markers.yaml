  - {type: variant, offset: 5435, length: 2, content: 集卷, WYG: 沒而可祭於社者其在斯人與其在斯人與二語方從閣杭本皆無在字送權秀才序伯樂}
  - {type: variant, offset: 5438, length: 0, content: '', WYG: 廐多良馬卞和之匱多美玉卓犖瓌怪之士宜乎遊於大人君子之門也怪或作奇相國隴西公既平汴州西下或有董字天子命御史大夫呉縣男為軍司馬縣或作郡方云非也造晉祭文石本可考下同門下之士權生實從之來權生之來固若常人耳之來下或有觀字其文辭引物連類窮情盡變宫商相宣金石諧和寂寥乎短章舂容乎大篇如是者閲之累日而無窮焉和方從閣杭蜀苑作聲云晉范啟謂孫綽天台山賦曰恐為金石非中宮商故文章以諧聲為尚公進平淮西表曰叢雜乖戾律呂失次亦謂此也今按諧和即謂其聲之和耳若作諧聲却犯本字而語意亦不活方說非是閲或作聞愈嘗觀於皇都每年貢士至千餘人或與之遊或得其文若權生者百無一}
  - {type: page-break, offset: 5438, content: '', id: KR4c0044_WYG_021-8b, image: WYG1073/WYG1073-0527b.png}
  - {type: variant, offset: 5439, length: 1, content: 十, WYG: 焉如是而將進於明有司重之以吳縣之知其果有成哉於是咸賦詩以贈之送湖南李正字序或作送李􅀈判官正字歸湖南方云􅀈之父仁鈞也貞元中愈從太傅隴西公平汴州李生之尊府以侍御史管汴之鹽鐵日為}
