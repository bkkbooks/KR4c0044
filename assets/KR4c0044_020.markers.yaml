  - {type: variant, offset: 5427, length: 0, content: '', WYG: 别本韓文考異巻二十欽定四庫全書别本韓文考異巻二十一宋王伯大重編序送區冊序方云洪謂區冊即𢎞考其始末非也陽山天下之窮處也陸有丘陵之險虎豹之虞江流悍急横波之石廉利侔劒㦸舟上下失勢破碎淪溺者徃徃有之江上或有水有字亷或作其縣郭無居民官無丞尉夾江荒茅篁竹之間小吏十餘家皆鳥言夷面荒茅篁竹蜀本作荒榛茅竹篁諸本作叢方云漢書嚴助傳谿谷之間篁竹之中顔曰竹田曰篁始至言語不通畫地為字然後可告以出租賦奉期約語方作說不下有相字是以賓客遊從之士無所為而至士或作事愈待罪於斯且半嵗矣有區音歐區冶子之後後漢末有長沙區景生者誓言相好自南海挐舟而來升自賓階儀觀甚偉坐與之語文義卓然方無矣字觀或作冠莊周云逃空虗者聞人足音跫旦恭切行聲然而喜矣况如斯人者豈易得哉虚或作谷斯或作其方無斯字皆非是入吾室聞詩書仁義之說欣然喜若有志於其間也與之翳嘉林坐石磯投竿而漁陶然以樂若能遺外聲利而不厭乎貧賤也欣然下或有以字於或作乎間或作聞樂上方無以字厭下方無乎字今按欣然喜陶然樂當為一例故諸本皆有以字而方本皆無然竊詳其文勢之緩急恐上句應無而下句應有也故定從此本嵗之初吉歸拜其親酒壺既傾序以識别吉或作告方云毛氏詩傳云初吉朔日也此葢通言嵗首也拜或作覲送張道士序張道士嵩髙之隱者通古今學有文武長材寄迹老子法中為道士以養其親高方作南下同隠方作有道隠今按有道語似太重當且作九年聞朝廷將治東方貢賦之不如法者三獻書不報長揖而去方下或有諸侯字京師士大夫多為詩以贈而屬愈為序詩曰大匠無棄材尋尺各有施况當營都邑杞梓用不疑張侯嵩山來面有熊豹姿開口論利害劒鋒白差差白或作自非是恨無一尺捶為國笞羌夷捶方作箠詣闕三上書臣非黄冠師臣有膽與氣不忍死茅茨又不媚笑語不能伴兒嬉乃著道士服衆人莫臣知臣有平賊策狂童不難治其言簡且要陛下幸聽之天空日月髙下照理不遺或是章奏繁裁擇未及斯方以杭作期非是寜當不竢報歸袖風披披答我事不爾吾親屬吾思昨宵夢倚門手取連環持今日有書至又言歸何時霜天熟柿栗收拾不可遲嶺北梁可構寒魚下清伊或作漪今按伊水在嵩北若前兩處作嵩南即此處不可作伊若彼作嵩髙則此乃可作伊耳漪字雖可通用然本不以水只是語句辭如書斷斷猗大學作兮荘子猶為人猗亦是此類故說文水部無之但因伐檀連漪淪漪故俗遂加水用之而韓公亦有含風漪之句謂此作漪亦未可知今上文既作嵩髙則此且作伊亦無害若有他證見得上文果當作南則此却當改為漪矣既非公家用且復還其私從容進退間無一不合宜時有利不利雖賢欲奚為但當勵前操富貴非公誰送高閑上人序茍可以寓其巧智使機應於心不挫於氣則神完而守固雖外物至不膠於心堯舜禹湯治天下養叔治射庖丁治牛師曠治音聲扁鵲治病僚之於丸孫曰莊子市南宜僚弄丸而兩家之難解秋之於奕伯倫之於酒樂之終身不厭奚暇外慕夫外慕徙業者皆不造其堂不嚌其胾嚌在誼切胾側吏切補注嚌嘗也胾大臠也禮左殽右胾者也徙或作從非是往時張旭善草書樊曰旭蘇州吳都人新史張顛傳嗜酒每太醉呌呼狂走乃下筆或以頭濡墨而書既醒自以為神不治他伎時或作者善方作喜非是喜怒窘窮憂悲愉佚怨恨思慕酣醉無聊不平有動於心必於草書焉發之喜怒文苑作喜焉草書怒焉草書不平監本作平生皆非是或無焉字觀於物見山水崖谷鳥獸蟲魚草木之花實日月列星風雨水火雷霆霹靂歌舞戰鬬天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世或無猶字非是今閑之於草書有旭之心哉不得其心而逐其跡未見其能旭也為旭有道利害必明無遺錙銖情炎於中利欲鬬進有得有喪勃然不釋然後一决於書而後旭可幾也情方作精而下或無後字今閑師浮屠氏一死生解外膠諸本並作膠方從杭歐謝本作繆云繆莫侯切猶綢繆也莊子内韄者不可繆而捉義葢同此今按膠者黏著之物而其力之潰敗不黏為解今以下文頽墮潰敗之語反之當定作膠是其為心必泊然無所起其於世必淡然無所嗜泊與淡相遭頽墮委靡潰敗不可收拾則其於書得無象之然乎二所下方從杭本皆有於字非是敗方作散然吾聞浮屠人善幻多技能善方從閣作善今按善幻說已見第四巻酬崔少府詩閑如通其術則吾不能知矣閑下或有師字方云此篇用意皆本於莊子所稱宋元君畫圖有一史後至解衣槃礴嬴郭注云内足者神數而意定又云士彦法謂退之此數語乃深得祖師向上體歇一路其見處勝裴休逺甚今按韓公本意但謂人必有不平之心鬱積之久而後發之則其氣勇決而伎必精今髙閑既無是心則其為伎宜其潰敗委靡而不能竒但恐其善幻多伎則不可知耳此自韓公所見非如畫史祖師之說也送殷員外序唐受天命為天子凡四方萬國不問海内外無小大咸臣順於朝方從閣杭無萬字今按如此則與下文不相應又杭本無於字皆非是時節貢水土百物大者特來小者附集元和睿聖文武皇帝既嗣位悉治方内就法度十二年詔曰四方萬國惟回鶻於唐最親奉職尤謹丞相其選宗室四品一人持節徃賜君長告之朕意又選學有經法通知時事者一人與之為貳法或作術由是殷侯侑自太常博士遷尚書虞部貟外郎兼侍御史}
