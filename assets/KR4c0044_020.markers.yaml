  - {type: variant, offset: 3697, length: 1, content: 丗, WYG: 世又以直廢廷上或有朝字吾既悲醉鄉之文辭而又嘉良臣之烈思識其子孫方無又字今子之來見我也無所挾吾猶將張之况文與行不失其世守渾然端且厚惜乎吾力不能振之而其言不見信於世也於其行姑與之飲酒其世方作於世於其或作於是送孟秀才序或注琯字今年秋見孟氏子琯於郴年甚少禮甚度手其文一編甚鉅退披其編以讀之盡其書無有不能吾固心存而目識之矣識音志矣方作也其十月吾道於衡潭以之荆累累見孟氏子焉其所與偕盡善人長者吾益以竒之吾益或作余益今將去是而隨舉於京師雖不有請猶將彊而授之以就其志况其請之煩邪彊而方作彊有非是京師之進士以千數其人靡所不有吾常折肱焉其要在詳擇而固交之善雖不吾與吾將彊而附不善雖不吾惡吾將彊而拒茍如是其於髙爵猶階而升堂又况其細}
