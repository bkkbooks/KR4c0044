  - {type: variant, offset: 4384, length: 0, content: '', WYG: 名字曰馯音寒姓也臂子弓子弓受易於商瞿卿下或無之字名字或作名耳方云子弓史記作子𢎞漢書作子弓又云商瞿授子庸子庸授子弓傳授之序與此不同孟軻師子思子思之學葢出曾子自孔子沒羣弟子莫不有書獨孟軻氏之傳得其宗故吾少而樂觀焉書上或有師字非是吾或作余太原王塤示余所為文好舉孟子之所道者與之言信悅孟子而屢賛其文辭夫沿河而下茍不止雖有遲疾必至於海如不得其道也雖疾不止終莫幸而至焉遲疾或作疾遲幸或作得故學者必慎其所道道於楊墨老莊佛之學而欲之聖人之道猶航斷港絶潢以望至於海也故求觀聖人之道必自孟子始今塤之所由既幾於知道如又得其船與檝知沿而不止嗚呼其可量也哉荆潭唱和詩序此謂裴均楊憑唐藝文志有裴均荆潭唱和集一巻諸本作裴垍非也從事有示愈以荆潭酬和詩者愈既受以卒業或作集方云卒業字見漢}
