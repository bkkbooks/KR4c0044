  - {type: variant, offset: 5307, length: 0, content: '', WYG: 欽定四庫全書别本韓文考異巻三十二宋王伯大重編碑誌司徒兼侍中中書令贈太尉許國公神道碑銘韓姬姓以國氏國下或有為字今按以國氏春秋傳語其先有自潁川走陽夏者其地於今為陳之太康太康之韓其稱盖乆然自公始大著公諱𢎞公之父曰海為人魁偉沈塞以武勇游仕許汴之間寡言自可不與人交衆推以為鉅人長者交或作校方云以上文自可言之作不與人交為是今以下文長者言之又似作不與人校為是更詳之鉅上方無為字或無以鉅人三字而為上有之字或併無以為鉅人四字官至游撃將軍贈太師娶鄉邑劉氏女生公是為齊國太夫人夫人之兄曰司徒𤣥佐有功建中貞元之間複出夫人字或作齊國功下或有於字為宣武軍帥有汴宋亳潁四州之地兵士十萬人公少依舅氏讀書習騎射事親孝謹偘偘自將不縱為子弟華靡遨放事偘偘或作侃侃字與偘同縱或作從出入敬恭軍中皆目之嘗一抵京師就明經試退曰此不足發名成業復去從舅氏學將兵數百人悉識其材鄙怯勇指付必堪其事司徒歎竒之兵下或有將字士卒屬之欲切心諸老將皆自以為不及方無皆字司徒卒去為宋南城將比六七嵗汴軍連亂不定貞元十五年劉逸淮死軍中皆曰此軍司徒所樹必擇其骨肉為士卒所慕賴庇者付之肉下或有而字今見在人莫如韓甥且其功最大而材又俊即柄授之而請之於天子天子以為然遂自大理評事拜工部尚書代逸淮為宣武軍節度使悉有其舅司徒之兵與地其舅或作舅氏當此時陳許帥曲環死而吳少誠反方無而宇自將圍許求援於逸淮㗖之以陳歸汴使數輩在館公悉驅出斬之選卒三千人㑹諸軍擊少誠許下少誠失勢以走河南無事公曰自吾舅没五亂于汴者吾苗薅樊曰淮南子云聖人之用兵也櫛髪薅苗所去者少而所利者多而髮櫛之幾盡然不一揃刈不足令震駴方云薅苗而髮櫛之淮南子語不下或無一字或作駭命劉鍔以其卒三百人待命于門數之以數與於亂自以為功并斬之以徇血流波道自是訖公之朝京師廿有一年莫敢有讙呶尼交切呌號于城郭者廿方作二十而下無有字李師古作言起事屯兵于曹以嚇音赫滑帥且告假道公使謂曰汝能越吾界而為盗邪有以相待無為空言作或作詐盜上方無為字滑師告急公使謂曰吾在此公無恐師或作帥前滑帥字疑亦當作師急或作及無上或安字有或告曰翦棘夷道兵且至矣請備之公曰兵來不除道也不為應師古詐窮變索遷延旋軍為下或有之字少誠以牛皮鞵與鞋同戸佳反材遺師古師古以鹽資少誠潜過公界覺皆留輸之庫曰此於法不得以私相餽田𢎞正之開魏博李師道使來告曰我代與田氏約相保援今𢎞正非其族又首變兩河事亦公之所惡我將與成徳合軍討之敢告非其方作其非非是公謂其使曰我不知利害知奉詔行事耳若兵北過河}
