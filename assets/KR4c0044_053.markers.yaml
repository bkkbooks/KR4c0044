  - {type: variant, offset: 3516, length: 1, content: 簡, WYG: 五代剖分王政不綱文弊質窮鼃俚混并天下已定治荒剔蠧討究儒術以興典憲薫醲涵浸殆百餘年其後文章稍稍可述至貞元}
  - {type: page-break, offset: 3516, content: '', id: KR4c0044_WYG_052-19a, image: WYG1073/WYG1073-0742a.png}
  - {type: variant, offset: 3519, length: 0, content: '', WYG: 間愈遂以六經之文為諸儒倡障隄末流反刓以樸剗偽以真然愈之才自視司馬遷揚雄至班固以下不論也當其所得粹然一出於正刋落陳言横騖别驅汪洋大肆要之無抵牾聖人者其道盖自比孟軻以荀卿揚雄為未醇寧不信然至進諫陳謀排難䘏孤矯拂媮末皇皇於仁義可謂篤道君子矣自晉訖隋老佛顯行聖道不斷如帶諸儒倚天下正議助為怪神愈獨喟然引聖争四海之惑雖䝉訕笑跲而復奮始若未之信卒大顯於時昔孟軻拒楊墨去孔子纔二百年愈排二家乃去千餘嵗撥亂反正功與齊而力倍之所以過况雄為不少矣自愈没其言大行學者仰之如泰山北斗云文録序趙徳昌黎公聖人之徒歟其文髙出與古之遺文不相上下所履之道則堯舜禹湯文武周孔孟軻揚雄所授受服行之實也固已不雜其傳由佛及耼莊楊之言不得干其思入其文也以是光於今大於後金石燋鑠斯文燦然徳行道學文庶幾乎古蓬茨中手持目覧飢食渇飲沛然滿飽顧非適諸聖賢之域而謬志於斯將所以盜其影響僻處無備得以所遇次之為巻私曰文録實以師氏為請益依歸之所云實或作寶記舊本韓文後歐陽文忠公予少家漢東漢東僻陋無學者吾家又貧無藏書州南有大姓李氏者其子彦輔頗好學予為兒童時多游其家見其弊筐貯故書在壁間發而視之得唐昌黎先生文集六巻脱畧顛倒無次第因乞李氏以歸讀之見其言深厚而雄博然予猶少未能悉究其義徒見其浩然無涯若可愛是時天下學者揚劉之作號為時文能者取科第擅名聲以誇榮當世未嘗有道韓文者予亦方舉進士以禮部詩賦為事年}
  - {type: page-break, offset: 3519, content: '', id: KR4c0044_WYG_052-19b, image: WYG1073/WYG1073-0742b.png}
  - {type: page-break, offset: 3519, content: '', id: KR4c0044_WYG_052-20a, image: WYG1073/WYG1073-0742c.png}
  - {type: page-break, offset: 3519, content: '', id: KR4c0044_WYG_052-20b, image: WYG1073/WYG1073-0742d.png}
  - {type: variant, offset: 3520, length: 0, content: '', WYG: 有七試于州為有司所黜因取所藏韓氏之文復閲之則喟然歎曰學者當至於是而止爾因怪時人之不道而顧已亦未暇學徒時時獨念于予心以謂方從進士干禄以養親茍得禄矣當盡力於斯文以償其素志後七年舉進士及第官于洛陽而尹師魯之徒皆在遂相與作為古文因出所藏昌黎集而補綴之求人家所有舊本而校定之其後天下學者亦漸趨於古而韓文遂行于世至于今盖三十餘年矣學者非韓不學也可謂盛矣嗚呼道固有行於逺而止於近有忽于往而貴于今者非惟世俗好惡之使然亦其理有當然者故孔孟惶惶於}
  - {type: page-break, offset: 3520, content: '', id: KR4c0044_WYG_052-21a, image: WYG1073/WYG1073-0743a.png}
  - {type: page-break, offset: 3520, content: '', id: KR4c0044_WYG_052-21b, image: WYG1073/WYG1073-0743b.png}
  - {type: variant, offset: 3521, length: 0, content: '', WYG: 時而師法於千萬世韓氏之文没而不見者二百}
  - {type: variant, offset: 3522, length: 16, content: 八月丞相奉詔平淮右八日東過華隂禮, WYG: 而後大施於今此又非特好惡之所上下盖其乆而愈明不可磨滅雖蔽}
