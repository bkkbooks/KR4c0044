  - {type: variant, offset: 3485, length: 0, content: '', WYG: 平章事又不得其黨皆憂悸不自保伾至其日坐翰林中疏三上不報知事不濟行且卧至有忽叫曰伾中風矣明日遂輿歸不出戊子以禮部侍郎權德輿為户部侍郎以倉部郎中判度支陳諫為河中少尹王伾叔文之黨於是始去乙未詔軍國政事宜權令皇太子某勾當百辟羣后中外庶僚悉心輔翼以底于理宣布朕意咸使知聞上自初即位則疾患不能言至四月益甚時扶坐殿羣臣望拜而已未甞有進見者天下事皆專斷於叔文而李忠言王伾為之内主執誼行之於外朋黨諠譁榮辱進退生於造次惟其所欲不拘程度既知内外厭毒慮見摧敗即謀兵權欲以自固而人情益疑懼不測其所為朝夕伺候㑹其與執誼交惡心腹内離外有韋臯裴垍嚴綬等牋表垍或作均而中官劉光奇俱文珍薛盈珍尚解玉等皆先朝任使舊人同心怨猜屢以啟上上固已厭倦萬機惡叔文等至是遂召翰林學士鄭絪衛次公王涯等入至德殿撰制詔而發命焉詔或作誥又下制以太常卿杜黄裳為門下侍郎左金吾衛大將軍袁滋為中書侍郎並平章事又下制吏部尚書平章事鄭珣瑜刑部尚書平章事髙郢並守本官罷相皇太子見百僚於東朝百寮拜賀皇太子涕泣不答拜丙申詔宰臣告天地社稷皇太子見四方使於麟德殿西亭别本韓文考異外集巻九欽定四庫全書别本韓文考異外集巻十宋王伯大重編順宗實録五起八月盡至山陵八月庚子詔曰惟皇天祐命烈祖誕受方國九聖儲祉萬方咸休肆予一人獲纘丕業嚴恭守位不遑暇逸或作給今從史而天祐匪降匪史作不疾恙無瘳無或作弗今從史將何以奉宗廟之靈展郊禋之禮疇咨庶尹對越上𤣥内愧于朕心上畏于天命夙夜祗慄惟懷永圖惟懷史作深惟一日萬幾不可以久曠天工人代不可以久違皇太子某睿哲温文寛和慈惠慈史作仁孝友之德愛敬之誠通于神明格于上下愛敬或作敬愛或作仁愛今從史是用推皇王至公之道遵父子傳歸之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉若成憲永綏四方宜令皇太子即皇帝位朕稱太上皇居興慶宮制􅃯稱誥所司擇日行册禮永貞元年八月辛丑太上皇居興慶宫誥曰有天下者傳歸于子前王之制也欽若大典斯為至公式揚耿光用體文德朕獲奉宗廟臨御萬方降疾不瘳庶政多闕乃命元子代予守邦爰以令辰光膺册禮宜以今月九日册皇帝於宣政殿仍命檢校司徒杜佑充册使門下侍郎杜黄裳充副使仍命下二十一字史無國有大命恩俾惟新宜因紀元之慶用覃在宥之澤宜改貞元二十一年為永貞元年自貞元二十一年八月五日昧爽已前天下應犯死罪特降從流流已下遞減一等又下誥曰人倫之本王化之先爰舉令圖允資内輔式表后妃之德俾刑窈窕之風兹禮經之大典也良娣王氏家承茂族德冠中宫雅修彤管之規克佩姆師之訓自服勤蘋藻祗奉宗祧令範益彰母儀斯著宜正長秋之位以明繼體之尊良媛董氏備位後庭素稱淑慎進升號位禮亦宜之號位或作位號良娣可册為太上皇后良媛宜册為太上皇德妃仍令所司備禮擇日册命宣示中外咸使知聞壬寅制王伾開州司馬王叔文渝州司户並員外置馳驛發遣叔文越州人以碁入東宫頗自言讀書知理道乗聞常言人間疾苦上將大論宫市事叔文説中上意遂有寵因為上言某可為將某可為相幸異日用之密結韋執誼并有當時名欲僥倖而速進者陸質吕温李景儉韓􅋫韓泰陳諫劉禹錫栁宗元等十數人定為死交而凌準程异等又固其黨而進交遊蹤跡詭祕莫有知其端者貞元十九年補闕張正買疏諫他事得召見正買與王仲舒劉伯芻裴茝常仲孺吕洞相善數遊止按史王仲舒下更有韋成季三字今詳下文有成季字則此處當有此三字亦脱漏也正買得召見諸往來者皆往賀之有與之不善者告叔文執誼云正買疏似論君朋黨事宜少誡執誼叔文信之執誼甞為翰林學士父死罷官此時雖為散郎以恩時時召入問外事執誼因言成季等朋讌聚遊無度皆譴斥之人莫知其由叔文既得志與王伾李忠言等專斷外事遂首用韋執誼為相其常所交結相次拔擢至一日除數人日夜羣聚常或作甞一日上或無至字伾以侍書幸寢陋呉語上所䙝狎而叔文頗任事自許微知文義好言事上以故稍敬之不得如伾出入無阻叔文入至翰林而伾入至柿林院見李忠言牛昭容等故各有所主伾主往來傳授劉禹錫陳諫韓􅋫韓泰柳宗元房啟凌準等主謀議唱和採聽外事上疾久不瘳内外皆欲上早定太子位叔文黙不發議已立太子天下喜而叔文獨有憂色喜上或有皆字常吟杜甫題諸葛亮廟詩末句云出師未用身先死長使英雄淚滿襟按杜甫用作捷因歔欷流涕聞者咸竊笑之雖判兩使事未甞以簿書為意日引其黨屏人切切細語謀奪宦者兵以制四海之命既令范希朝韓泰總統京西諸城鎮行營兵馬中人尚未悟㑹邊上諸將各以狀辭中尉且言方屬希朝中人始悟兵柄為叔文所奪乃大怒曰從其謀吾屬必死其手密令其使歸告諸將曰無以兵屬人希朝至奉天諸將無至者韓泰白叔文計無所出唯曰奈何奈何無㡬而母死執誼益不用其語叔文怒與其黨日夜謀起復起復必先斬執誼而盡誅不附已者聞者皆恟懼皇太子既監國遂逐之明年乃殺之伾杭州人病死遷所其黨皆斥逐叔文最所賢重者李景儉而最所謂奇才者吕温叔文用事時景儉持母喪在東都而吕温使吐蕃半嵗至叔文敗方歸故二人皆不得用叔文敗後數月乃貶執誼為崖州司馬後二年病死海上執誼杜黄裳子壻與黄裳同在相位故最在後貶初執誼進士對策髙等驟遷拾遺年二十餘入翰林巧慧便辟媚幸於德宗而性貪婪詭賊其從祖兄夏卿為吏部侍郎執誼為翰林學士受財為人求科第夏卿不應乃探出懷中金以内夏卿袖夏卿驚曰吾與卿賴先人德致名位幸各已達豈可如此自毁壞已或作以擺袖引身而去執誼大慙恨既而為叔文所引用初不敢負叔文迫公議時時有異同輒令人謝叔文云非敢負約為異同蓋欲曲成兄弟爾約或作終非是弟疑當作事叔文不之信遂成仇怨然叔文敗執誼亦自失形勢知禍且至雖尚為相當當字疑是常字不自得長奄奄無氣聞人行聲輒惶悸失色以致敗死時纔四十餘執誼自卑甞諱不言嶺南州縣名為郎官時甞與同舍郎詣職方觀圖毎至嶺南圖執誼皆命去之閉目不視至拜相還所坐堂北壁有圖不就省七八日試就觀之乃崖州圖也以為不祥甚惡之憚不能出口至貶果得崖州焉永貞二年正月景戌朔戌史作寅下同太上皇於興慶宫受朝賀皇帝率百僚奉上尊號曰應乾聖壽太上皇册文曰維永貞二年二或作元非是嵗次景戌正月景戌朔皇帝臣某稽首再拜奉册言臣聞上聖𤣥邈獨超乎希夷彊名之極猶存乎罔象疆或作引非是豈足以表無為之德光不宰之功然稱謂所施簡册攸著涵泳道德感於精誠仰奉法徽有以自竭伏惟太上皇帝陛下道繼𤣥元業纘皇極膺千載之休厯承九聖之耿光昭宣化源發揚大號政有敦本示儉慶裕格天政有二字疑衍恩翔春風仁育羣品而功成不處褰裳去之付神器於沖人想汾陽以髙蹈體堯之德與神同符其動也天其靜也地巍巍事表無得而言顧兹寡昧屬膺大寶懼忝傳歸之業莫申繼述之志夙夜兢畏惟懷永圖今天下幸安皆睿訓所被而未極徽號孰報君親是以台臣庶官文武之列抗疏於内方伯藩守億兆之衆同詞於外請因壽厯以播鴻名臣不勝大願謹上尊號曰應乾聖壽太上皇當三朝獻壽之辰應五紀啟元之始光膺徽稱允協神休斯天下之慶也元和元年正月甲申太上皇崩于興慶宫咸寧殿年四十六遺誥曰朕聞死生者物之大歸修短者人之常分聞或作觀古先哲王明於至道莫不知其終以存義順其變以節哀故存者不至於傷生逝者不至於甚痛謂之達理以貫通喪朕自弱齡即敦清靜逮乎近嵗又嬰沈痼甞亦親政益倦于勤以皇帝天資仁孝日躋聖敬爰釋重負委之康濟而能内睦于九族外勤于萬幾問寢益嚴侍膳無曠推此至德以安庶邦朕之知子無愧天下今厥疾大漸不寤不興付託得人顧復何恨四海兆庶亦奚所哀但聖人大孝在乎善繼樞務之重軍國之殷纘而承之不可蹔闕以日易月抑惟舊章皇帝宜三日而聽政十三日小祥二十五日大祥五或作三非是二十七日釋服方鎮岳牧不用離任赴哀天下吏人誥至後出臨三日皆釋服無禁婚嫁祠祀飲酒食肉宫中當臨者朝晡各十五舉音非朝晡臨時禁無得哭釋服之後勿禁樂他不在誥中者皆以類從事伏以崇陵仙寢復土纔終甸邑疲人休功未㡬今又重勞營奉朕所哀矜況漢魏二文皆著遺令永言景行常志夙心其山陵制度務從儉約並不用以金銀錦綵為飾百辟卿士同力盡忠克申送往之哀宜展事居之禮居或作君非是布告天下明知朕懷七月壬申葬豐陵諡曰至德大聖大安孝皇帝廟曰順宗别本韓文考異外集巻十欽定四庫全書别本韓文考異附録宋王伯大重編新書本傳宋景文公今以李翺所撰行狀皇甫湜所撰墓誌神道碑舊史本傳資治通鑑洪興祖所撰年譜程俱所撰歴官記方崧卿増攷年譜考其同異詳畧附注本文之下以見公之行事本末而文之已見於集者不復載云韓愈字退之鄧州南陽人七世祖茂有功於後魏封安定王父仲卿為武昌令有美政既去縣人刻石頌徳終祕書郎李白作文公父仲卿去思碑云南陽人而公常自稱昌黎李翺作公行狀亦云昌黎某人皇甫湜作墓誌不言鄉里又作神道碑乃云上世嘗居南陽又𨽻延州之武陽而舊史亦但云昌黎某今按新史盖因李碑而加鄧州二字也然考漢書地理志有兩南陽其一河内脩武即左傳所謂晉啓南陽也其一南陽堵陽即荆州之南陽郡字與赭同在唐屬鄧州者也元和姓纂唐書世系表有兩韓氏其一漢弓髙侯頽當𤣥孫騫避亂居南陽郡之赭陽九世孫河東太守術生河東太守純純四世孫安之晉員外郎二子潛恬隨司馬休之入後魏為𤣥菟太守二子都偃偃生後魏中郎頴穎生播徙昌黎棘城其一則頹當裔孫尋為後漢隴西太守世居潁川生司空稜後徙安定武安至後魏有常山太守武安成侯耆徙居九門生尚書令征南太將軍安定恒王茂茂生均均生晙晙生仁泰仁泰生叡素叡素生仲卿仲卿生㑹愈而中間嘗徙陳留以此而推則公固頴川之族尋稜之後而不得承騫之系矣而洪興祖所撰年譜但以騫之後世嘗徙昌黎遂附新史之説獨以赭陽為均州小有不同耳及其再考二書而見公世系之實則遂諱匿不敢復著仲卿㑹愈之名而直以為不可考今固不得而據也唯方崧卿増攷引董逌説以為騫乃韓瑗韓休之祖而公自出於尋稜與二書合其論南陽則又云今孟懐州皆春秋南陽之地自漢至隋二州皆屬河内郡唐顯慶中始以孟州𨽻河南府建中中乃以河南之四縣入河陽三城使其後又改為孟州今河内有河陽縣韓氏世居之故公每自言歸河陽省墳墓而女挐之銘亦曰歸骨于河南之河陽韓氏墓張籍祭公詩亦云舊􅉷盟津北則知公為河内之南陽人其説獨為得之公詩所謂舊籍在東都我家本瀍榖則必以地近而後嘗徙居耳但據此則公與昌黎之韓異派而每以自稱則又有不可曉者豈是時昌黎之族頗盛故隨稱之亦若所謂言劉悉出彭城言李悉出隴西者邪然設使公派果出昌黎也則其去赭陽已歴數世其後又屢遷徙不應舍其近世所居之土而逺指鄧州為鄉里也方又引孔武仲之説亦同董氏而王銍以為公生於河中之永樂今永樂猶有韓文鄉則其説為已詳盖其世系雖有不可知者然南陽之為河内脩武則無可疑者而新史洪譜之誤斷可識矣愈生三嵗而孤隨伯兄㑹貶官嶺表㑹卒嫂鄭鞠之李漢序云先生生於大歴三年戊申三嵗而孤見祭嫂文及乳母誌㑹事見盧東美誌洪譜云盧志所謂宗兄乃大宗小宗之宗舊史以為從父兄誤矣又云舊史大歴十二年夏五月起居舍人韓㑹坐元載貶官栁宗元先友記云㑹善清言有文章名最髙以故多謗㑹既卒公攜家北歸葬㑹河陽建中貞元間復避地於江南韓氏有别業在宣城因就食焉見歐陽詹哀詞復志賦祭嫂及老成文示爽詩愈自知讀書日記數千百言比長盡能通六經百家學行狀云讀書能記先生之所習墓志云先生七嵗好學言出成文今按復志賦云值中原之有事兮將就食於江之南始專專於講習兮非古訓為無所用其心則公之為學正在就食江南時也擢進士第洪譜云貞元三年丙寅公年十九始至京師見祭老成文歐陽哀詞答崔立之書五年已已有上賈滑州書六年庚午有河中府連里木頌七年辛未有送齊皥序八年壬申登進士第時年二十五見上邢君牙書唐科名記云貞元八年陸贄主司試明水賦御溝新栁詩公名在榜中見與陸員外書舊史云大歴貞元間文士多尚古學而獨孤及梁肅最稱淵奥愈從其徒游鋭意鑚仰而自振於一代洎舉進士投文於公卿間故相鄭餘慶頗為名譽由是知名是年有争臣論九年癸酉博學宏詞試太清宫觀紫極舞賦顔子不貳過論見上考功崔虞部書及與韋舍人書十年甲戌有省試學生代齋郎議方攷此議當繫十一年試宏詞下未詳是否洪譜又云是年常歸河陽省墳墓見祭老成文有贈張童子序十一年乙亥又試宏詞見答崔立之書有三上宰相書皆不報是年去京師過潼關有感二鳥賦既歸河陽有畫記遂自河陽如東都有祭田横文今按八年以後此年以前又嘗遊鳳翔以書抵邢君牙不得意去有岐山詩洪程皆定為此年六月誤矣㑹董晉為宣武節度使表署觀察推官晉卒愈從喪出不四日汴軍亂乃去依武寧節度使張建封建封辟府推官操行堅正鯁言無所忌董晉狀云十二年七月晉拜宣武節度使受命遂行韓愈實從公行狀云董公辟公以行得試祕書省校書郎為觀察推官墓誌云先生三十有一而仕神道碑云十四年用進士從董晉平汴州推官舊史作巡官洪譜云二狀載公入汴在十二年丙子與史合而志碑所記皆後二年殊不可曉豈今年辟公以行至十四年始有成命邪亦不應如是之緩也方攷蜀本樊本無三十一而仕之文但云歴官二十有七年爾然自公卒之年逆數之亦當以十四年三十一嵗為歴官之始故公入汴雖在十二年然水門記十四年正月作石本猶但稱攝節度掌書記前進士韓愈是辟命猶未下也計必是年辟命乃下故碑志之言如此不當以命下之緩為疑也今按公入汴之年洪方得之碑志所計年數若以命下之日言之亦未為失但云十四年從董晉平汴州則誤矣又送俱文珍序亦在十三年安得言十四年乃入汴乎要當以公之自言及二狀二史通鑑為正持正狂躁其攷之或有未審不足據也舊史之作巡官則程記已辨其非矣洪譜又云十三年丁丑公在汴有復志賦送汴州監軍俱文珍序十四年戊寅公在汴有天星詩水門記楊燕竒碑十五年已夘董晉行狀云二月三日丞相薨公從喪行四日而汴州亂有汴州亂詩歴官記云汴軍亂愈家在圍中尋得脱下汴東趨彭城愈從喪至洛還孟津渡汜水出陳許間以二月暮抵徐州節度使張建封居之于符離睢上及秋将辭去建封奏為節度推官試協律郎至冬建封使愈朝正于京師見歐陽哀詞是年有此日足可惜汴泗交流詩答李翺書上建封書論晨入夜歸事後又有諫撃毬書賀白兎狀徐泗豪節度掌書記㕔石記崔翰墓誌十六年庚辰春公朝正回徐有歸彭城詩夏去徐西居於洛陽見孟東野書及題下邳李生壁按公與東野書欲至秋辭去而題李生壁在五月十四日則不待至秋而已去徐矣舊史亦云公發言真率無所畏避豈竟以此不合雖建封之知已亦不能容邪公既去徐而建封卒翌日徐軍亂見白樂天哀二良文在洛有與衛中行書冬公如京師調四門博士洪譜云十七年辛已公在京師從調選三月東還見與盧汝州薦侯喜状將歸有贈孟東野房蜀客詩是年有送李愿歸盤谷序李楚金墓誌公自去年冬參調竟無所成而歸今年冬再往十八年壬午春始有四門博士之授為博士日嘗謁告歸洛因遊華山即答張徹詩所謂洛邑得休告華山窮絶徑者也李肇國史補云愈好竒與客登華山絶峯度不可返發狂慟哭為書與家人别華隂令百計取之乃下沈顔作聱書以為肇妄載豈有賢者輕命如此考公詩則知國史補乃實録也是年有送陸歙州序上巳日燕太學聴彈琴序與崔羣書施士丐墓誌馬彚行狀遷監察御史上疏極論宫市徳宗怒貶陽山令有愛在民民生子多以其姓字之洪譜云十九年癸未公年三十六自博士拜監察御史時有齒落哭楊兵曹陸歙州傪詩及與陳京給事書禘祫議論權停選舉狀苗氏墓誌又上李實書稱前守四門博士時已罷博士未受御史之命書云愈來京師於今十五年盖公自貞元五年從鄭滑間復來京師至此十五年矣實録於實詆之不餘力而此書乃盛稱其所長此又不可曉也方攷唐制凡居官以四考為滿公在官踰年又不知何故而罷罷而復遷行狀墓碑皆只言選授四門博士遷監察御史而此書稱前官又以文投贄於李實似若不得已者是固嘗罷博士而别遷也是嵗七月公猶任博士乞免停選狀謂臣雖非朝官月受俸錢可以考也罷免之由不可詳究終恐不至於媚實以求進也或云徳宗末年不任宰相所取信者李實韋執誼輩耳公盖未免於屈身以伸道也然公天旱人飢狀專指李實而言其脩實録又於實一辭不恕獨於此書抵牾如此又公年十九始來京師在貞元二年也至貞元十九年實十八年矣今云來京師於今十五年洪雖以再至言之其實牽合也併誌所疑以竢知者洪譜又云是時有詔以旱飢蠲租之半有司徴愈急公與張署李方叔上疏言關中天下根本民急如是請寛民徭而免田租天子惻然卒為幸臣所讒貶連州陽山令幸臣李實也見進學解及祭張署文舊史云愈嘗上章數千言極論宫市之弊貶陽山令疏今不傳則公之被黜坐論此兩事也方攷云公陽山之貶寄三學士詩序述其詳而行狀但云為幸臣所惡出宰陽山神道碑亦只云因疏關中旱飢專政者惡之則其非為論宫市明矣今公集有御史臺論天旱人飢狀與詩正合况翺湜皆從公遊者不應公嘗論宫市數千言而狀及碑誌畧不一言及也然行狀且謂為幸臣所惡而公詩云或自疑上疏上疏豈其由則是又未必皆上疏之罪也又曰同官盡才俊偏善栁與劉或慮語言泄傳之落寃讐又岳陽樓詩云前年出官由此禍最無妄姦猜畏彈射斥逐恣欺誑是盖為王叔文韋執誼等所排矣徳宗晚年韋王之黨已成是年補闕張正買疏諫他亊得召見與所善者數人皆被譴斥意公之出有類此也憶昨行云伾文未揃崖州熾雖得赦宥常愁猜是其為叔文等所排豈不明甚特無所歸咎駕其罪於上疏耳洪云宫市旱飢兩事言之而又不考韋王始末故為申及之洪譜又云以公詩攷之盖以十九年冬末貶官二十年甲申春始到陽山時有同冠峽貞女峽和張十一功曹送劉生謝李員外諸詩及别知賦送楊八弟歸湖南序區冊序答竇存亮書王𢎞中燕喜亭記改江陵法曹參軍洪譜及歴官記云二十一年乙酉正月丙申順宗即位二月甲子大赦八月辛丑改元永貞遷者皆追回愈為觀察使所抑財徙江陵府法曹參軍見八月十五夜贈張功曹詩及張署墓誌河南同官記洪又云公以今年春遇赦夏秋離陽山竢命于郴者三月至秋末始受法曹之命見祭李郴州文時有郴州祈雨及郴口諸詩自郴至衡有合江亭及謁衡岳廟詩自衡至潭有陪杜侍御遊湘西寺及湘中諸詩自此泛洞庭有阻風贈張十一詩至岳州有别竇司直詩赴江陵有途中寄翰林三學士詩又有送孟琯序荆潭唱和序上李㢲書鄭夫人殯表及五箴序云余生三十有八年則其箴盖是年作所謂幕中之辨盖謂在徐州時臺中之評則謂為御史時也元和初權知國子博士分司東都三嵗為真洪譜云永貞二年丙戌正月丙寅朔改元元和時憲宗即位之踰年也公年三十有九其春夏猶在江陵有李花寒食出遊夜歸贈張十一鄭羣贈簟答張徹諸詩六月自江陵召拜國子博士還朝後有豐陵行遊青龍寺贈崔立之送文暢諸詩城南諸聨句及祭十二兄岌文并墓誌二年丁亥春公為博士有元和聖徳詩并釋言行狀云宰相有愛公文者將以文學職處公有争先者構公語以飛之公恐及難遂求分司東都而公作周况妻韓氏墓誌乃云從兄俞卒開封尉愈於時為博士乞分教東都生以收其孥於開封界中教畜之飛語即釋言所解之讒而竟不能解故以兄喪為辭而求去耳時宰相鄭絪翰林舍人李吉甫裴垍也公以夏末離京赴東都有酬裴十六途中見寄詩是年有張中丞傳後叙答馮宿書盧於陵墓誌三年戊子改真博士見行狀有酬崔十六少府詩東都遇春詩與少室李渤書裴復墓誌新史渤傳云洛陽令韓愈遺渤書公時為博士五年方為河南令未嘗為洛陽令也改都官員外郎即拜河南令洪譜云四年已丑公年四十二改都官員外郎守東都省神道碑云除尚書都官郎中分司判祠部行狀新舊史皆云員外郎送李正字序亦但云都官郎碑文誤也方攷公除都官六月十日也制辭亦作員外郎洪譜又云神道碑云中官號功徳使司京城觀寺尚書斂手伏職先生按六典盡索之以歸誅其無良時其出入禁譁衆以正浮屠歴官記云公判祠部日與宦者為敵惡言罵辭狼籍公牒乃上書留守鄭餘慶乞與諸郎官更判不見允在東都有遊嵩洛諸題名送李翺侯參謀和盧汀錢徽與竇韋尋劉尊師諸詩送李正字歸湖南序并詩鄭涵校理序祭薛公達文并墓志京兆韋夫人墓志河南府同官記五年庚寅授河南縣令神道碑云魏鄆幽鎮各為留邸貯潜卒以槖罪士官無敢問者先生將擿其禁以壯朝廷斷民署吏俟令其發留守尹大恐遽相禁有使還為言憲宗悦曰韓愈助我者是後鄆邸果謀反東都將署留守以應淮蔡又有上留守鄭公啟時公以論事失鄭公意既令河南軍人有罪公追而杖之留守不悦公以啟辨明且力求去見集中行狀云改河南令日以職分辨于留守及尹故軍士莫敢犯禁疑鄭公卒聴其言故軍人畏服如此也在河南有感春詩燕河南秀才序送石洪序并詩及月蝕招楊之罘河南令舍池臺諸詩張圓墓碣盧殷墓誌遷職方員外郎洪譜云六月辛夘行尚書職方員外郎是年春公尚在河南有送窮文辛夘年雪寄盧仝誰氏子諸詩送温造序乳母誌至京師有酬盧雲失望秋作石鼓歌復讐狀盧丞房武畢坰墓誌華隂令栁澗有辠前刺史劾奏之未報而刺史罷澗諷百姓遮索軍頓役直後刺史惡之按其獄貶澗房州司馬愈過華以為刺史隂相黨上疏治之既御史覆問得澗贓再貶封谿尉愈坐是復為博士洪譜云七年壬辰二月乙未以職方員外郎復為國子博士年四十五舊史云愈因使過華上疏理澗公自去年以來未嘗出使或云即公赴職方時過華覩其事遂疏于朝爾進學解云三年博士冗不見治舊又作三為博士按公貞元壬午授四門博士元和丙戌為國子博士丁亥分教東都今年又自郎官下遷凡四為博士矣此先言暫為御史繼言三為博士則是丙戌而後三歴此官也若云三年則自元年夏赴召至四年春尚為博士首尾已四年矣方攷云丙戌初除丁亥分教自不必釐而為二其為博士實三遷也當作三為為是今按上句言暫為御史而此言三年博士正以其居官之久近為言恐當作年為是然亦未敢必也洪譜又云是年二月有論錢重物輕狀新志云自建中定兩税而物輕錢重民以為患于是詔百官議革其弊方攷以為此論在穆宗即位之初通鑑附之長慶元年秋為得其實今年初無此議也惟㑹要載元和六年二月制謂建中後貨輕物重許諸道所納見錢五分量徴二分餘三分兼納實估匹段或當時有此議然亦非七年也况公六年二月尚在東都洪誤矣洪譜又云是年有石鼎聨句贈劉師服詩祭石洪文李素石洪墓誌路應神道碑既才髙數黜官又下遷乃作進學解以自喻執政覧之竒其才改比部郎中史館脩撰洪譜云此除在八年癸已三月乙亥舊史云執政覧其文而憐之以其有史才故除是官時宰相武元衡李吉甫李絳也是年有答劉秀才論史書及烏氏田氏廟碑鄭儋神道碑李虛中董溪息國夫人墓誌轉考功知制誥洪譜云九年甲午十月甲子為考功郎中依前史館脩撰十二月戊午以考功知制誥是年有元微之書田𢎞正書送張道士序劉昌裔神道碑王適孟郊扶風郡夫人墓誌十年乙未公知制誥有和庫部盧曹長元日朝迴及寒食直歸遇雨二詩與李絳書進順宗實録狀舊史云愈撰實録繁簡不當敘事拙於取舍按退之作史詳畧各有意削去常事著其繫於政者其褒善貶惡之㫖明甚當時議者非之卒竄定無全篇良可惜也史又云愈説禁中事頗切直内官惡之往往於上前言其不實此言是也是年有與栁公綽二書論淮西事宜狀説見明年又有捕賊行賞表藍田縣丞㕔記獨孤郁衛之立墓誌徐偃王廟碑進中書舍人初憲宗將平蔡命御史中丞裴度使諸軍按視及還具言賊可滅與宰相議不合愈亦奏言淮西連年侵掠得不償費其敗可立而待然未可知者在陛下斷與不斷耳執政不喜㑹有人詆愈在江陵時為裴均所厚均子鍔素無狀愈為文章字命鍔謗語囂暴由是改太子右庶子洪譜云十一年丙申正月丙戌以考功郎中知制誥遷中書舍人丙申賜緋魚五月癸未降為太子右庶子行狀云盜殺武元衡公以為盜殺宰相而遽息兵其為懦甚大兵不可以息以天下力取三州尚何不可與裴丞相議合故兵遂用而宰相有不便之者月滿遷中書舍人後竟以他事改右庶子時宰相李逢吉韋貫之也其云月滿遷中書舍人者盖唐制臺郎滿嵗則遷公以去年冬知制誥至今春竟一嵗矣李漢云收拾遺文無所失墜公掌綸誥一年無一篇見收者失墜多矣唯後集有崔羣戸部侍郎制一首爾今按行狀通鑑洪譜論淮西事宜狀在去年知制誥時而神道碑新史則在遷中書舍人之後但行狀言公所論有殺宰相事乃在去年六月而狀中實無此語若狀果在六月之後則不應全不言及則是此狀不惟不在十一年正月之後亦不在十年六月之後也故通鑑直以繫於五月之下行狀敘事雖實而記言則誤碑文新史同為失之今當以通鑑為正洪譜又云是年有酬盧雲夫曲江荷花行周况妻韓氏墓誌王用碑科斗書後記及度以宰相節度彰義軍宣慰淮西奏愈行軍司馬愈請乘遽先入汴説韓𢎞使協力元濟平遷刑部侍郎行狀神道碑及舊史云十二年丁酉秋以兵老乆屯賊未滅上命裴丞相為淮西節度使以招討之丞相請公以行賜三品衣魚為行軍司馬從丞相居於郾城軍出潼關公請先乘遽至汴感説都統𢎞𢎞説用命師乘遂和公知蔡州精卒悉聚界上以拒官軍守城者率老弱且不過千人亟白丞相請以兵三千人間道以入必擒吳元濟丞相未及行而李愬自唐州文城壘提其卒以夜入蔡州果得元濟三軍之士為公恨蔡州既平布衣栢耆以計謁公公與語竒之遂白丞相曰淮西滅王承宗膽破可不勞用衆宜使辨士奉相公書明禍福以招之彼必服丞相然之公口占為書使栢耆袖之以至鎮州承宗果大恐上表請割徳棣二州以獻遣子入侍丞相歸京師以功遷刑部侍郎詔公撰平淮西碑其辭多敘裴度事時先入蔡州擒元濟李愬功第一愬不平之愬妻出入禁中因訴碑辭不實詔令磨公文命翰林學士段文昌重撰文勒石是年有送殷侑序祭張署文并墓誌及東征往還醻唱諸詩晚秋郾城夜㑹聨句為刑部時有舉錢徽自代狀十二年戊戌四月鄭餘慶為詳定禮樂使奏韓愈李程為副是年有李惟簡墓誌權徳輿碑憲宗遣使者往鳳翔迎佛骨入禁中三日乃送佛祠王公士庶奔走膜唄至為夷法灼體膚委珍貝騰沓係路愈聞惡之乃上表極諫帝大怒持示宰相將抵以死裴度崔羣曰愈言詆牾罪之誠宜然非内懐至忠安能及此願少寛假以來諫諍帝曰愈言我奉佛太過猶可容至謂東漢奉佛以後天子咸夭促言何乖剌耶愈人臣狂妄敢爾固不可赦於是中外駭懼雖戚里諸貴亦為愈言乃貶潮州刺史既至潮以表哀謝帝頗感悔欲復用之持示宰相曰愈前所論是大愛朕然不當言天子事佛乃年促耳皇甫鏄素忌愈直即奏言愈終狂疏可且内移乃改袁州刺史初愈至潮問民疾苦皆曰惡溪有鱷魚食民畜産且盡民是以窮數日愈自往視令其屬秦濟以一羊一豕投谿水而祝之是夕暴風震電起溪中數日水盡涸西徙六十里自是潮無鱷魚患袁人以男女為𨽻過期不贖則没入之愈至悉計庸得贖所没歸之父母七百餘人因與約禁其為𨽻洪譜云公以十四年已亥正月癸已貶潮州刺史宰相疑馮宿草疏出宿為歙州刺史時宰相皇甫鏄程异也公之被謫即日上道便道取疾以至海上據宜城驛記則以三月二日過宜城據瀧吏詩則以三月幾望至曲江據謝表則以三月二十五至潮州據祭文則以四月二十四日逐鱷魚其自曲江至潮以十許日行三千里盖瀧水湍急故也方攷乃云謝表及祭神文皆止云今月而逐鱷魚文正本皆但云年月日則公之到郡實不知何月日也况自韶至廣雖自順流而自廣之惠自惠之潮水陸相半要非旬日可到故公表亦云自潮至廣來往動皆經月則公到郡決非三月而逐鱷魚亦未必在四月二十四日也今按道理行程則方説為是但與大顛第一書石本乃云四月七日則又似實以三月二十五日至郡也未詳其説闕之可也洪譜又云公自京師至潮有路傍􅕤至藍關示姪孫湘武關西逢配流吐蕃食曲河驛次鄧州界過南陽隴吏題臨瀧寺至韶州寄張使君酬張使君惠書過始興江口感懐贈元十八協律初南食貽元十八答栁栁州食蝦蟇别趙子諸詩及宜城驛記潮州謝表祭鱷魚文請置鄉校牒賀冊尊號表是年七月已丑羣臣上尊號大赦十月已已凖例量移改授袁州刺史召拜國子祭酒洪譜云十五年庚子閏正月穆宗即位公以今年春到袁途中有酬張韶州端公及韶州留别張使君二詩至袁有袁州謝上賀穆宗即位賀赦賀册皇太后賀慶雲五表舉韓泰自代狀滕王閣記九月召拜國子祭酒而閣記乃云十月袁州刺史者盖命下在九月授命在十月也有祭湘君夫人文祭文所謂復其章綬者公為行軍司馬時賜金紫後為祭酒始復其舊也自袁趨京師有次石頭驛寄江西王中丞閣老仲舒詩至江州有寄鄂岳李大夫程及題西林寺故蕭二郎中舊堂詩因話録云蕭穎士子存字伯誠為金部員外郎惡裴延齡之為人棄官歸廬山公少時嘗受金部賞知及經江州遊廬山訪金部故居因賦此詩留百縑以拯之行次安陸有寄隨州周員外君巢二詩至棗陽縣有題廣昌館詩至㐮州有醉中留别李相公詩以冬暮至京師是年有南海廟碑與孟簡書論黄家賊事宜狀及典貼良人男女狀又論夷獠請因改元大慶遣使宣諭仍擇經畧使撫之又有栁子厚及姪孫滂祭文墓誌洪譜又云行狀云公入遷祭酒有直講能説禮而陋容學官多豪族子擯之不得共食公命吏曰召直講來與祭酒共食學官由此不敢賤直講奏儒生為學官日使㑹講生徒奔走聴聞者相喜曰韓公來為祭酒國子監不寂寞矣公在國子有雨中寄張籍詩舉張惟素自代及請復國子監生徒狀論新注學官牒薦張籍狀請上尊號表轉兵部侍郎洪譜云此除在長慶元年辛丑七月時有舉韋顗自代狀李郱張徹祭文李郱鄭羣薛戎墓誌今按方氏増攷論錢重物輕狀當在此年秋鎮州亂殺田𢎞正而立王廷湊詔愈宣撫既行衆皆危之元稹言韓愈可惜穆宗亦悔詔愈度事從宜無必入愈曰安有受君命而滯留自顧遂疾驅入廷湊嚴兵迓之甲士陳庭既坐庭湊曰所以紛紛者乃此士卒也愈大聲曰天子以公為有將帥材故賜以節豈意同賊反邪語未終士前奮曰先太師為國撃朱滔血衣猶在此軍何負朝廷乃以為賊乎愈曰以為爾不記先太師也若猶記之固善且為逆與順利害不能逺引古事但以天寶來禍福為爾等明之安禄山史思明李希烈梁崇義朱滔朱泚吳元濟李師道有若子若孫在乎亦有居官者乎衆曰無愈曰田公以魏博六州歸朝廷官中書令父子受旗節劉悟李祐皆大鎮此爾軍所共聞也衆曰𢎞正刻故此軍不安愈曰然爾曹害田公又殘其家矣復何道衆乃讙曰侍郎語是廷湊恐衆心動遽麾使去因泣謂愈曰今欲廷湊何所為愈曰神䇿六軍之將如牛元翼比者不少但朝廷顧大體不可棄之公乆圍之何也廷湊曰即出之愈曰若爾則無事矣㑹元翼亦潰圍出廷湊不追愈歸奏其語帝大悦轉吏部侍郎洪譜云長慶元年七月鎮州亂殺田𢎞正立王廷湊命深州刺史牛元翼節度深冀以討之十月命裴度為鎮州四面行營都招討使元翼為廷湊所圍二年壬寅二月赦廷湊詔愈宣撫歸而牛元翼果出行狀云公還於上前奏與廷湊及三軍語上大悦曰卿直向伊如此道由是有意大用授吏部侍郎今按先太師謂故鎮帥王武俊也神道碑云方鎮反太原兵以輕利誘迴紇召先生禍福譬引虎齧􅀈血直今所患非兵不足臃遽疏陳得失今按此數語不可曉他書亦皆無之未詳何謂恐有誤也洪譜又云是年有次夀陽驛次太原呈副使吳郎中次丞天營奉酬裴司空鎮州路上酬裴司空重見寄鎮州初歸諸詩及韋侍講盛山詩序論變鹽法事宜狀二年壬寅九月轉吏部侍郎行狀云凡令史皆不鎖聴出入或問公公曰人所以畏鬼者以其不能見也鬼如可見則人不畏矣選人不得見令史故令史勢重聴其出入故勢輕是年有鄆州谿堂詩竇司業祭文墓誌楚國夫人墓誌黄陵廟碑時宰相李逢吉惡李紳欲逐之遂以愈為京兆尹}
