  - {type: variant, offset: 2822, length: 7, content: 孟郊東野柳宗元, WYG: 教行於天下由龍逢為之師也忠之上或有其字非是自周之前千萬年渾渾然不知義之可以換其生也周或作殷方無以字故伯夷哀天下之偷且以彊則服食其葛薇逃山而死之下或有人字服或作伏且以彊則服作一句或有脱誤故後之人竦然而言曰雖餓死猶有義而不懼者況其小者乎故或作於是義或作死或作強故義之教行於天下由伯夷為之師也是三人俱以一身立教而為師於百千萬年間其身亡而其教存扶持天地功亦厚矣或無百字存下或有於字功上或有而字嚮令三師恥獨行慕通達則堯之日必曰得位而濟道安用讓為用或作能夏之日必曰長進而否退安用死為周之日必曰和光而同塵安用餓為和光而同塵方作同塵而和光若然者天下之人促促然而爭循循然而佞渾渾然而偷其何懼而不為哉是則三師生於今必謂偏而不通者矣其可不謂之大賢人者哉方無則字必字謂偏作為偏矣作也矣上或無者字嗚呼今之人其慕通達之為弊也且古聖人言通者蓋百行衆藝備於身而行之者也而上或有通字今恒人之言通者蓋百行衆藝闕於身而求合者也是則古之言通者通於道義今之言通者通於私曲其亦異矣古之今之下或並有人字將欲齊之者其不猶矜糞丸而擬質隋珠者乎或無其字或無不字或無之矜二字且令今父兄教其}
