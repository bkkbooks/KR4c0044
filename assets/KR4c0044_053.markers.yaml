  - {type: variant, offset: 2945, length: 0, content: '', WYG: 奠敬祭于石三學士之靈或無敬字惟君學成于身名彰于人知道之可行見人之不幸見人或作知命或作見命不上或無之字不事顧讓以圖就功如何奄忽永喪其躬此四字或作以喪其良能下或有知微有議四字或作不負長已誰知曰有義何害文今按諸本皆無理疑不足據曰景與愈與游為久或無曰字景下或無與字愈下有也字為久作日久自君之逝相遇輒哀傍無強親子孩妻姖或作稚方云姖古文姬字然義亦不近敢忘分濟念力未任客葬秦原孤䰟誰附奠以送訣悲何可窮尚饗祭房君文房次卿字蜀客維某年月日愈謹遣舊吏皇甫悦以酒肉之饋展祭于五官蜀客之柩}
  - {type: page-break, offset: 2945, content: '', id: KR4c0044_WYG_046-3b, image: WYG1073/WYG1073-0711b.png}
  - {type: variant, offset: 2946, length: 0, content: '', WYG: 方無維某字愈作某或無日字嗚呼君迺至于此吾復何言於此或作於斯若有鬼神吾未死無以妻子為念嗚呼君其能聞吾此言否君上或有房字尚饗髙君仙硯銘并序儒生髙常與予下天壇中路獲硯石似馬蹄狀外稜孤聳内發墨色幽奇天然疑神仙遺物寶而用之請予銘底仙馬有靈跡在于石稜而宛中有㸃墨迹文字之祥君家其昌方云應劭武紀注大苑舊有天馬種蹋石汗血顔曰蹋石謂蹋石有迹言其蹄堅利宋新仲謂銘語本此髙君畫讚此篇方從蜀本録之今按疑非公所作然姑存之君子温閑骨氣委和迹不拒物心不揚波澄源巻璞含白瑳瑳遺紙一張德音不忘潮州請置鄉校牒孔子曰道之以政齊之以刑則民免而無恥不如以德禮為先而輔以政刑也齊上或有而字或無則字或無禮字夫欲用德禮未有不由學校師弟子者此州學廢日久進士明經百十年間不聞有業成貢於王庭}
  - {type: page-break, offset: 2946, content: '', id: KR4c0044_WYG_046-4a, image: WYG1073/WYG1073-0711c.png}
  - {type: page-break, offset: 2946, content: '', id: KR4c0044_WYG_046-4b, image: WYG1073/WYG1073-0711d.png}
  - {type: variant, offset: 2947, length: 8, content: 左武衛胄曹李演廣, WYG: 於有司者百十年間方作百十數年非是貢於試於並無於字人吏目不識鄉飲酒之禮耳未甞聞鹿鳴之歌孫曰唐制鄉舉試訖長吏以鄉飲酒禮㑹屬僚設賔主陳俎豆備筦絃牲用少牢歌鹿鳴之詩與耆艾叙少長焉忠孝之行不勸亦縣之恥也方無目與耳字夫十室之邑必有忠信今此州戸萬有餘豈無庶㡬者邪刺史縣令不躬為之師里閭後生無所從學爾或作耳又或作矣非是趙德秀才沈雅專靜頗通經有}
