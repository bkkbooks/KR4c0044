  - {type: variant, offset: 3433, length: 0, content: '', WYG: 羊士諤為汀州寧化縣尉士諤性傾躁時以公事至京遇叔文用事朋黨相煽頗不能平公言其非叔文聞之怒欲下詔斬之執誼不可則令杖殺之執誼又以為不可遂貶焉由是叔文始大惡執誼往來二人門下者皆懼先時劉闢以劍南節度副使將韋臯之意于叔文求都領劍南三川謂叔文曰太尉使某致微誠於公若與其三川當以死相助若不用某亦當有以相酬使某或作使闢與其疑當作與某叔文怒亦將斬之而執誼固執不可闢尚遊京師未去至聞士諤遂逃歸尚下或有以字貶或作貶今按士上當或有貶字左散騎常侍致仕張萬福卒萬福魏州元城人也自曽祖至父皆明經官止縣令州佐萬福以祖父業儒皆不達不喜書學騎射年十七八從軍遼東有功為將而還累遷至壽州刺史州送租賦詣京師至潁川界為盜所奪福使輕兵馳入潁川界討之入潁川或作入潁州賊不意萬福至忙迫不得戰萬福悉聚而誅之盡得其所亡物并得前後所掠人妻子財物牛馬萬計悉還其家為淮南節度崔圓所忌失刺史改鴻臚卿以節度副使將兵千人鎮壽州萬福不以為恨許杲以平盧行軍}
