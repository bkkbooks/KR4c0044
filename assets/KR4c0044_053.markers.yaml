  - {type: variant, offset: 2994, length: 0, content: '', WYG: 日癸巳皇帝若曰於戲天下之大實惟重器祖宗之業允屬元良咨爾皇太子誦睿哲温恭寛仁慈惠文武之道秉自生之孝友之誠發于天性自膺上嗣毓德春闈恪慎于厥躬祗勤于大訓必能誕敷至化安勸庶邦朕寢疾彌留弗興弗寤是用命爾繼統俾紹前烈宜陟元后永綏兆人其令中書侍郎平章事髙郢奉冊即皇帝位爾惟奉若天道以康四海懋建皇極以熙庶功無忝我髙祖大宗之休命上自二十年九}
  - {type: page-break, offset: 2994, content: '', id: KR4c0044_WYG_047-3a, image: WYG1073/WYG1073-0713c.png}
  - {type: variant, offset: 2995, length: 0, content: '', WYG: 得風疾因不能言使四面求醫藥天下皆聞知德宗憂慼形于顔色數自臨視二十一年正月朔含元殿受朝還至别殿諸王親屬進賀獨皇太子疾不能朝德宗為之涕泣悲傷歎息因感疾恍惚日益甚二十餘日中外不通兩宫安否朝臣咸憂懼莫知所為雖翰林内臣亦無知者含元殿至日益甚四十一字中云德宗不豫諸王親戚皆侍醫藥獨上卧病不能侍德宗彌留思見太子涕咽久之二十三日上知内外憂疑紫衣麻鞋不俟正冠出九仙門召見諸軍使京師稍安二十四日宣遺詔上縗服見百寮}
  - {type: page-break, offset: 2995, content: '', id: KR4c0044_WYG_047-3b, image: WYG1073/WYG1073-0713d.png}
  - {type: variant, offset: 2999, length: 0, content: '', WYG: 即位上學書於王伾頗有寵伾下或有復出伾字王叔文以碁進俱待詔翰林數侍太子碁叔文詭譎多計上在東宮甞}
  - {type: variant, offset: 3000, length: 1, content: 著, WYG: 諸侍讀并叔文論政至宮市事上曰寡人方欲極言之衆皆稱贊獨叔文無言既退上獨留叔文謂曰向者君奚獨無言豈有意邪叔文曰叔文䝉幸太子有所見敢不以聞太子職當侍膳問安不宜言外事陛下在位久如疑太子收人心何以自解上大驚因泣曰非先生寡人無以知此遂大愛幸與王伾兩人相依附俱出入東宮聞德宗大漸上疾不能言伾即入以詔召叔文入坐翰林中使决事詔下或無召字文下或無入字使下或無決字伾以叔文意入言於宦者李忠言稱詔行下外初無知者以檢校司空平章事杜佑攝冢宰兼山陵使中丞武元衡為副使宗正卿李紓為按行山陵地使刑部侍郎鄭雲逵為鹵簿使或無兼字紓或}
