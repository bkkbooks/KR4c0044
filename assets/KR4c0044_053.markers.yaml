  - {type: variant, offset: 2754, length: 4, content: 奄棄萬國, WYG: 始為唐公肇基天命義同周之后稷髙祖神堯皇帝創業經始化隋為唐義同周之文王太宗文皇帝神武應期造有區夏義同周之武王應或作膺武王下或有也字其下三昭三穆謂之親廟與太祖而七四時常饗自如禮文伏以今年宗廟遞遷𤣥宗明皇帝在三昭三穆之外是親盡之祖雖有功德新主入廟禮合祧藏太廟中第一夾室每至禘袷之嵗合食如常藏下或有遷字或作祧遷藏太廟中中下或有從字謹議范蠡招大夫種詩之序議别本韓文考異外集巻一欽定四庫全書别本韓文考異外集巻二宋王伯大重編上賈滑州書賈耽以貞元二年為滑州刺史此篇方從蜀本愈儒服者不敢用他術干進術或作藝又惟古執䞇之禮竊整頓舊所著文一十五章以為䞇而喻所以然之意於此章或作首下同曰豐山上有鐘焉祝曰山海經云豐山有九鐘和霜鳴注云霜降則鐘鳴人所不可至霜既降則鏗然鳴蓋氣之感非自鳴也或無既字愈年二十有三讀書學文十五年言行不敢戾於古人或無有字三或作二讀書學文十五年洪云公與邢尚書書云生七嵗而讀書十三而能文二十有五擢第於春官愚固泯泯不能自計周流四方無所適歸固或作故非是}
