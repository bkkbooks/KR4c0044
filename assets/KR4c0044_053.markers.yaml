  - {type: variant, offset: 3481, length: 0, content: '', WYG: 召見德宗驚曰杜亞言卿昏耄卿乃如是徤耶圖形凌烟閣數賜酒饌衣服并勅度支籍口畜給其費至賀陽城等于延英門外天下益重其名二十一年以左散騎常侍致仕元和元年卒年九十萬福自始從軍至卒禄食七十年未甞病一日典九郡皆有惠愛癸丑韋臯上表請皇太子監國又上皇太子牋尋而裴垍嚴綬表繼至悉與臯同贈故忠州别駕陸䞇兵部尚書故道州刺史陽城左常侍䞇字敬輿呉郡人也年十八進士及第又以博學宏詞授鄭縣尉書判拔萃授渭南尉遷監察御史未㡬選為翰林學士遷祠部員外郎德宗幸奉天䞇隨行在天下搔擾逺近徵發書詔一日數十下皆出於䞇一日或作曰百非是䞇操筆持紙成於須㬰不復起草同職皆拱手嗟嘆不能有所助常啟德宗言方今書詔宜痛自引過罪已以感人心昔成湯以罪已致興後代推以為聖人楚王失國亡走一言善而復其國至今稱為賢者陛下誠能不恡改過以言謝天下臣雖愚陋為詔詞無所忌諱庶能令天下叛逆者迴心喻旨德宗從之故行在制詔始下聞者雖武人悍卒無不揮涕感激議者咸以為德宗尅平冦難旋復天位不惟神武成功爪牙宣力蓋以文德廣被腹心有助焉累遷考功郎中諫議大夫中書舍人兼翰林學士丁母憂免喪權知兵部侍郎復入翰林中外屬意旦夕竢其為相竇參深忌之䞇亦短參之所為且言其黷貨於是與參不能平尋真拜兵部侍郎知禮部貢舉於進士中得人為多八年春遷中書侍郎平章事始令吏部毎年集選人舊事吏部每年集人其後遂三年一置選選人猥至文書多不了尋勘真偽紛雜吏因得大為姦巧選士一蹉跌或至十年不得官而官之闕者或累嵗無人䞇令吏部分内外官員為三分計闕集人以為常其弊十去七八天下稱之初竇參出李㢲為常州刺史目迫其行㢲常銜之至參貶為郴州别駕㢲適遷湖南觀察德宗常與參言故相姜公輔罪參漏其語參敗公輔因上疏自陳其事非臣之過德宗詰之知參洩其語怒未有所發㑹㢲奏汴州節度劉士寧遺參金帛若干士寧得汴州參處其議士寧常德之故致厚貺德宗以參得罪而以武將交結發怒竟致參於死而議者多言參死由䞇焉以武當作與武裴延齡判度支天下皆嫉怨而獨幸於天子朝廷無敢言其短者䞇獨身當之日陳其不可用延齡固欲去䞇而代之又知䞇之不與已多阻其奏請也謗毁百端翰林學士呉通𤣥故與䞇同職姦巧佻薄䞇與不相能知䞇與延齡相持有間因盛言䞇短宰相趙璟本䞇所引同對嫉䞇之權密以䞇所戢彈延齡事告延齡戢通鑑作􅏺或作談戢彈或作彈戢延齡益得以為計由是天子益信延齡而不直贄竟罷䞇相以為太子賔客而黜張滂李􅂶等權按史滂充皆以論裴延齡得罪此但著黜滂充等而上文不言其所以得罪之由盖脱漏也言事者皆言其屈皆或作多䞇因畏懼至為賔客拒門不納交親士友春旱德宗數獵苑中延齡疏言䞇等失權怨望言於衆曰天下旱百姓且流亡度支愛惜不肯給諸軍軍中人無所食其事奈何以摇動羣心其意非止欲中傷臣而已後數日又獵苑中㑹神策軍人跪馬前云度支不給馬草德宗意延齡前言即迴馬而歸由是貶䞇為忠州别駕滂充皆斥逐德宗怒未解䞇不可測賴陽城等救乃止䞇之為相常以少年入翰林得幸於天子長養成就之不敢自愛事之不可者皆爭之德宗在位久益自攬持機柄親治細事失君人大體宰相益不得行其事職而議者乃云由䞇而然䞇居忠州十餘年常閉門不出入人無識面者避謗不著書習醫方集古今名方為陸氏集驗方五十巻卒於忠州年五十二上初即位與鄭餘慶陽城同徵詔始下而城贊皆卒城字亢宗北平人伐為官族好學貧不能得書乃求入集賢為書寫吏竊官書讀之晝夜不出經六年遂無所不通乃去滄州中條山下州或作洲非是逺近慕其德行來學者相繼於道閭里有爭者不詣官府詣城以決之李泌為相舉為諫議大夫拜官不辭未至京師人皆想望風采云城山人能自苦刻不樂名利必諫諍死職下咸畏憚之想或作相非是既至諸諫官紛紛言事細碎無不聞達天子益厭苦之子或作下非是而城方與其二弟牟容連夜痛飲人莫能窺其意牟或作并容或作密二字或作并客有懷刺譏之者將造城而問者今按此二句亦衍一句疑亦以修改重復而誤也今當削去譏之者將四字城揣知其意輒彊與酒輒上或有彊與坐字容或時先醉仆席上或時先醉卧容懷中不能聽容語約其二弟云吾所得月俸汝可度吾家有㡬口月食米當㡬何買薪菜鹽米凡用㡬錢先具之其餘悉以送酒媪無留也未甞有所貯積雖其所服用切急不可闕者客稱其物可愛城輒喜舉而授之陳萇者候其始請月俸常往稱其錢帛之美月有獲焉至裴延齡讒毁陸䞇等坐貶黜德宗怒不解在朝無救者城聞而起曰吾諫官也不可令天子殺無罪之人而信用姦臣即率拾遺王仲舒數人守延英門上疏論延齡姦佞䞇等無罪狀德宗大怒召宰相入語將加城等罪良久乃解令宰相諭遣之於是金吾將軍張萬福聞諫官伏閣諫趨往至延英門大言賀曰朝廷有直臣天下必太平矣直臣或作直言遂徧拜城與仲舒等曰諸諫議能如此言事天下安得不太平也或無也字已而連呼太平萬嵗太平萬嵗萬福武人時年八十餘自此名重天下時朝夕相延齡城曰脱以延齡為相當取白麻壞之慟哭於庭竟坐延齡事改國子司業至引諸生告之曰凡學者所以學為忠與孝也諸生寧有久不省其親乎明日謁城歸養者二十餘人有薛約者甞學於城狂躁以言事得罪將徙連州客寄有根蔕吏縱求得城家縱宜當作蹤坐吏於門與約飲決别涕泣送之郊外德宗聞之以城為黨罪人出為道州刺史太學王魯卿李儻等二百七十人詣闕乞留住數日吏遮止之疏不得上在州以家人禮待吏人宜罰者罰之宜賞者賞之一不以簿書介意賦税不登賦税或作税賦觀察使數誚讓上考功第城自署第曰撫字心勞徵科政拙考下下觀察使甞使判官督其賦至州怪城不出迎以問州吏吏曰刺史聞判官來以為已有罪自囚於獄不敢出判官大驚馳入謁城於獄曰使君何罪某奉命來候安否耳留一兩日未去城固不復歸館門外有故門扇横地城晝夜坐卧其上判官不自安辭去其後又遣他判官崔某往按之崔承命不辭載妻子一行中道而逃按或作或非是城孝友不忍與其弟異處皆不娶給侍終身有寡妹依城以居有生年四十餘癡不能如人常與弟負之以遊生或作甥或作男初城之妹夫亡在他處家貧不能塟城親與其弟畀尸以歸葬於其居之側往返千餘里卒時年六十餘戊午以户部侍郎潘孟陽為度支鹽鐵轉運副使其日王伾詐稱疾自免自叔文歸第伾日詣中人并杜佑請起叔文為相且摠北軍既不得請以}
