  - {type: variant, offset: 3490, length: 0, content: '', WYG: 特詔不臺參而除紳中丞紳果劾奏愈愈以詔自解其後文刺紛然宰相以臺府不協遂罷愈為兵部侍郎而出紳江西觀察使紳見帝得留愈亦復為吏部侍郎洪譜云三年癸卯六月以吏部侍郎為京兆尹兼御史大夫勅放臺參後不得為例十月癸已為兵部侍郎庚子為吏部侍郎行狀云改京兆尹六軍將士皆不敢犯私相告曰是尚欲燒佛骨者安可忤故盜賊止遇旱米價不敢上}
  - {type: page-break, offset: 3490, content: '', id: KR4c0044_WYG_052-16a, image: WYG1073/WYG1073-0740c.png}
