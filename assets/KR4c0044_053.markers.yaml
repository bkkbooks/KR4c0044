  - {type: variant, offset: 2846, length: 0, content: '', WYG: 之論得父母疾烹藥餌以是為孝未聞毁肢體者也鄠有以孝為旌門者乃本其自於鄠人曰彼自剔股以奉母疾瘳大夫以聞其令尹令尹以聞其上上俾聚土以旌其門使勿輸賦以為後勸孝下為字疑衍又疑是而字其門或無其字以為或作欲為恐按尹謂京兆尹令字衍下同鄠大夫常曰他邑有是人乎愈曰母疾則止於烹粉藥石以為是未聞毁傷支體以為養在教未聞有如此者或無愈字或無止字母下十二字本作父母疾烹藥餌以是為孝字今按是字或是事字按下文又有未聞此未聞字恐衍或是若夫字之類茍不傷於義則聖賢當先衆而為之也聖賢方作賢聖是不幸因而致死則毁傷滅絶之罪有歸矣其為不孝得無甚乎而下或有此字今按此句上是字疑是此字茍有合孝之道又不當旌門蓋生人之所宜為竭竭當作曷足為異乎茍或作若合下疑有乎字或無足字既以一家為孝是辨一邑里皆無孝矣以一身為孝是辨其祖父皆無孝矣然或䧟於危難能固其忠孝而不茍生之逆亂以是而死者乃旌表門閭爵禄其子孫斯為為勸已矧非是而希免輸者乎生之方云劉仲枕謂之當作於恐或然也表下或有其字習不以毁傷為罪滅絶為憂不􅆎於市而已黷於政況復旌其門為憂或作其憂非是河南府同官記方無府字永貞元年愈自陽山移江陵法曹叅軍獲事河東公公甞與其從事言建中初天子始紀年更元命官司舉貞觀開元之烈方無下公字烈或作例或作列非是羣臣惕慄奉職命材登良不敢私違當時自齒朝之士而上以及下百執事官闕一人將補必取其良百下方有吏字然而河南同時於天下稱多獨得將相五人或無同時二字方無將字人今按下文所記實為宰相者三裴均未為真相故特著其官職戎馬之盛則此處宜有將字方本誤也故於府之叅軍則得我公於河南主簿則得故相國范陽盧公邁於氾水主簿則得故相國今太子賔客滎陽鄭公餘慶下相國上方無故字今按故故相猶今言前宰相非亡没之謂方本誤也於陸渾主簿則得相國今吏部侍郎天水趙公宗儒相國今或作今相國於登封主簿則得故吏部尚書東都留守呉郡顧公少連故下方有相國字今以下文考之非是盧公去河南為右補闕其後由尚書左丞至宰相鄭公去氾水為監察御史佐山南軍其後由工部侍郎至宰相罷而又為趙公去陸渾為右拾遺其後由給事中為宰相中為或作中至顧公去登封為監察御史其後由京兆尹至吏部尚書東都留守我公去府為長水尉其後由膳部郎中為荆南節度行軍司馬遂為節度使自工部尚書至吏部尚書三相國之勞在史冊顧吏部慎職小心于時有聲在上或有布字我公愿潔而沉密開亮而卓偉行茂于宗事修于官嗣紹家烈不違其先作帥荆南厥聞休顯武志既揚文教亦熙登槐贊元其慶且至帥或作扜亦方作既故好語故事者以為五公之始迹也同其後進而偕大也亦同其稱名臣也又同官職雖分而功德有巨細其有忠勞於國家也同有若將同其後而先同其初也或無官職字分作則屬之下文而無而字忠上或無有字家下或無也字有聞而問者於是焉書既五年始立石刻其語河南府叅軍舍庭中方無有字語下方有于字於時河東公為左僕射宰相出藩大邦開府漢南時或作是鄭公以工部尚書留守東都趙公以吏部尚書鎮江陵漢南地連七州戎士十萬其官宰相也留守之官居禁省中嵗時出旌旗序留司文武百官於宫城門外而衙之守下方無之字江陵故楚都也戎士五萬三公同時千里相望可謂盛矣河東公名均姓裴氏記宜城驛方作宜城驛記下或有愈代姪孫作五字此驛置在古宜城内驛東北有井傳是昭王井有靈異至今人莫汲内下或有復出宜城字方無昭字驛前水傳是白起堰西山下澗灌此城壞楚人多死流城東陂臭聞逺近因號其陂臭陂有蛟害人漁者避之或脱堰字臭陂上或有曰字井東北數十步有楚昭王廟有舊時髙木萬株多不得其名歴代莫敢剪伐尤多古松大竹或無昭字名方作始于太傅帥襄陽遷宜城縣并改造南境數驛材木取足此林或無陽字舊廟屋極宏盛今惟草屋一區然問左側人尚云每嵗十月民相率聚祭其前廟後小城蓋王居也後或作復其内處偏髙廣員八九十畝號殿城當是王朝内之所也城或作域朝或作廟多甎可為書硯自小城内地今皆屬甄音真氏甄氏於小城北立墅以居甄氏有節行其子逢以學行為助教元和十四年二月二日題題}
