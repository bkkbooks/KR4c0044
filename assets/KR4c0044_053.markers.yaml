  - {type: variant, offset: 3404, length: 0, content: '', WYG: 依前翰林學士本官賜如故賜如或作餘如初叔文既專内外之政與其黨謀曰判度支則國賦在手可以厚給諸用事人取兵士心以固其權驟使重職人心不服藉杜佑雅有㑹計之名位重而務自全易可制故先令佑主其名而除之為副以專之藉或作籍或無藉字除之疑當作除已以户部尚書判度支王紹為兵部尚書以吏部郎中李鄘為御史中丞武元衡為左庶子初叔文黨數人貞元末已為御史在臺至元衡為中丞薄其人待之鹵莽皆有所憾而叔文又以元衡在風憲欲使附已使其黨誘以權利元衡不為之動叔文怒故有所授庚寅制下或有曰字門下侍郎守吏部尚書平章事賈耽可檢校司空兼左僕射守門下侍郎平章事鄭珣瑜可守吏部尚書守中書侍郎平章事髙郢可守}
  - {type: page-break, offset: 3404, content: '', id: KR4c0044_WYG_048-5a, image: WYG1073/WYG1073-0718a.png}
  - {type: variant, offset: 3405, length: 0, content: '', WYG: 部尚書守尚書左丞平章事韋執誼可守中書侍郎並依前平章事癸已詔曰萬國之本屬在元良主器之重歸于長子所以基社稷而固邦統古之制也廣陵王某孝友温恭慈仁忠恕博厚以容物寛明而愛人祗服訓詞言皆合雅講求典學禮必從師居有令聞動無違德朕獲纘丕緒祗若大猷惟懷永圖用建儲貳以承宗廟以奉粢盛爰舉舊章俾膺茂典宜册為皇太子改名某仍令所司擇日備禮册命初廣陵王名從水傍享至册為皇太子始改從今名丁酉吏部尚書平章事鄭珣瑜稱疾去位其日珣瑜方與諸相㑹食於中書故事丞相方食百寮無敢謁見者叔文是日至中書欲與執誼計事令直省通執誼直省以舊事告叔文叱直省直省懼入白執誼執誼逡巡慙赧竟起迎叔文就其閣語良久宰相杜佑髙郢珣瑜皆停筯以待郢下或有鄭字有報者云叔文索飯韋相已與之同餐閣中矣佑郢等心知其不可畏懼叔文執誼莫敢出言或無不字非是珣瑜獨歎曰吾豈可復居此位顧左右取馬徑歸遂不起前是左僕射賈耽以疾歸第未起珣瑜又繼去二相皆天下重望相次歸卧叔文執誼等益無所顧忌逺近大懼焉别本韓文考異外集巻七欽定四庫全書别本韓文考異外集巻八宋王伯大重編順宗實録三起四月盡五月夏四月乙已上御宣政殿册皇太子册曰建儲貳者必歸于冢嗣固邦本者允屬於元良咨爾元子廣陵王某幼挺岐嶷長標洵淑佩詩禮之明訓宣忠孝之𢎞規居惟保和動必循道識達刑政器合温文愛敬奉於君親仁德聞于士庶神祗龜筮罔不協從是用命爾為皇太子於戲惟我烈祖之有天下也功格上帝祚流無窮光纘洪業逮予十葉䖍恭寅畏日慎一日付爾以承祧之重勵爾以王鬯之勤以貞萬國之心以揚三善之德爾其尊師重傅親賢逺佞非禮勿踐非義勿行對越天地之耿光丕承祖宗之休烈可不慎歟時上即位已久而臣下未有親奏對者内外盛言王伾王叔文專行斷決日有異説又屬頻雨皆以為羣小用事之應至將册禮之夕雨乃止迨行事之時天氣清朗有慶雲見識者以為天意所歸及覩皇太子儀表班行既退無不相賀至有感泣者戊申詔曰惟先王光有天下必正我邦本以立人極建儲貳以承宗祧所以啟迪大猷安固洪業斯前代之令典也皇太子某體仁秉哲恭敬温文德協元良禮當上嗣朕奉若丕訓憲章前式惟承社稷之重載考春秋之義授之匕鬯以奉粢盛爰以令辰俾膺茂典今册禮云畢感慶交懷思與萬方同其惠澤自貞元二十一年二月二十四日已後至四月九日昧爽已前天下應犯死罪者特降從流流已下遞減一等文武常叅并州府縣官子為父後者賜勲兩轉古之所以教太子以茂選師傅以翼輔之法於訓詞而行其典禮左右前後罔非正人是以教諭而成德也給事中陸質中書舍人崔樞積學懿文守經據古夙夜講習庶協于中並充皇太子侍讀天下孝子順孫先旌表門閭者委所管州縣各加存䘏庚戌封皇太子長子寧等六人皆為王癸酉當作丑贈吐蕃弔祭使工}
