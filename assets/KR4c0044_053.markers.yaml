  - {type: variant, offset: 2993, length: 0, content: '', WYG: 封為宣王建中元年立為皇太子史云大厯十四年六月進封宣王十二月乙夘立為皇太子慈孝寛大仁而善斷留心藝學亦微信尚浮屠法禮重師傅引見輒先拜善𨽻書德宗之為詩并他文賜大臣者率皆令上書之德宗之幸奉天倉卒間上常親執弓矢率軍後先導衛備常辛苦倉或作蒼上之為太子於父子間慈孝交洽無嫌每以天下為憂德宗在位久稍不假宰相權而左右得因縁用事外則裴延齡李齊運韋渠牟等以姦佞相次進用延齡尤狡險判度支務刻剥聚斂以自為功天下皆怨怒上每進見候顔色輒言其不可至陸䞇張滂李充等以毁譴朝臣􅋏懼諫議大夫陽城等伏閣極論德宗怒甚將加城等罪内外無敢救者上獨開解之城等賴以免德宗卒不相延齡渠牟上有力焉貞元二十一年癸已德宗崩景申上即位太極殿册曰維貞元二十一年嵗次乙酉正月辛未朔二十}
  - {type: page-break, offset: 2993, content: '', id: KR4c0044_WYG_047-2a, image: WYG1073/WYG1073-0713a.png}
