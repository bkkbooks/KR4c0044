  - {type: variant, offset: 2736, length: 2, content: 䟽憲, WYG: 别本韓文考異補遺欽定四庫全書别本韓文考異外集巻宋王伯大重編諸本外集分為十巻凡三十四篇不知何人所編據行狀云有集四十巻小集十巻亦不知便是此外集與否方云只據蜀本定録二十五篇其篇目次弟皆與諸本不同以為可以旁攷而的然知為公文者然蜀本劉曄序乃云後集外順}
  - {type: page-break, offset: 2736, content: '', id: KR4c0044_WYG_042-1a, image: WYG1073/WYG1073-0694a.png}
  - {type: substitution, offset: 2736, original: 䟽, replacement: 疏, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19469}}
  - {type: 'kr:newline', offset: 2737, content: '

      ', id: KR4c0044_krp_053-bkkkrnewl155}
  - {type: line-break, offset: 2737, content: '', id: KR4c0044_SBCK_053-6b02}
  - {type: indent, offset: 2737, content: 　　　, id: KR4c0044_krp_053-bkkind29}
  - {type: variant, offset: 2739, length: 2, content: 崩慰, WYG: 實録為十巻則似亦以實録入於其中皆不知其何説也唯呂夏卿以為明水賦通解崔虞部書河南同官記皆見於趙德文録計必德親受於文公者比它本最為可信而李漢不以入集則疑凡外集所載漢亦有所未得未必皆其所不取者其説近是故今且從}
  - {type: page-break, offset: 2739, content: '', id: KR4c0044_WYG_042-1b, image: WYG1073/WYG1073-0694b.png}
  - {type: variant, offset: 2742, length: 0, content: '', WYG: 本而考其真偽異同之説以詳註於其下其甚偽者即雖不載其文而猶存其目使讀者猶有考焉其石刻聮句遺詩文等則從方本録之以補外集之闕又諸本有遺文一巻方本亦多不録今亦存之以附于後明水賦以𤣥化無宰至精感通為韵精或作誠古者聖人之制祭祀也必主忠敬崇吉蠲不貴其豐乃或薦之以水不可以黷斯用致之於天或無者字無也字於方作于其事信美其義惟𤣥月實水精故求其本也明為君德因取以名焉於是命烜氏俟清夜或將祀圓丘於𤣥冬或將祭方澤於朱夏祀方作祭祭或作祀持鑑而精氣韓曰淮南子積陰之寒氣為水水氣之精者為月旁射照月而陰靈樊曰謝莊月賦日以陽德月以陰靈潛下視而不見謂合}
  - {type: page-break, offset: 2742, content: '', id: KR4c0044_WYG_042-2a, image: WYG1073/WYG1073-0695a.png}
  - {type: variant, offset: 2743, length: 2, content: 䟽愈, WYG: 於希夷挹之則盈方同功於造化應於有生於無生或作聲形象未分徒騁離婁之目光華暗至如還合浦之珠既齊芳於酒醴詎比賤於潢汚芳方作髙云禮夏尚明水商尚醴周尚酒今作齊芳非都今按明水當在酒醴之上不應反}
  - {type: substitution, offset: 2743, original: 䟽, replacement: 疏, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19469}}
