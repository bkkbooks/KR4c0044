  - {type: line-break, offset: 3409, content: '', id: KR4c0044_SBCK_053-8a02}
  - {type: variant, offset: 3413, length: 0, content: '', WYG: 史館修撰張薦禮部尚書薦字孝舉代居深州之陸澤祖文成博學工文詞性好詼諧七登文學科薦聰明強記歴代史傳無不貫通為太師顏真卿所稱賞遂知名大厯中江東觀察表薦之江或作浙授左司禦率府兵曹參軍兼史館修撰貞元初為太常博士四年迴紇求和親使送咸安公主入迴紇以薦為判官改授殿中侍御史累遷諫議大夫十一年册迴紇子薦以秘書少監持節為使還久之遷秘書監二十年吐蕃贊普死以薦為工部侍郎兼御史大夫持節弔贈卒于赤嶺東迴紇辟吐蕃傳歸其柩辟字恐誤前後三使異國自始命至卒常兼史職在史館二十年著宰輔傳畧五服圖記寓居録靈怪集等景寅罷閩中萬安監先是福建觀察栁冕久不遷欲立事迹以求恩寵立或作以乃奏云閩中南朝放牧之地畜羊}
  - {type: page-break, offset: 3413, content: '', id: KR4c0044_WYG_049-3b, image: WYG1073/WYG1073-0720b.png}
  - {type: variant, offset: 3414, length: 1, content: 緫, WYG: 可使孳息請置監許之收境中畜産令吏牧其中收或作牧羊大者不過十斤馬之良者估不過數千不經時輒死又斂百姓苦之逺近以為笑至是觀察閻濟美奏罷之丁夘命焚容州所進毒藥可殺人者可或作所五月已已史作戊辰無五月字以杭州刺史韓臯為尚書左丞左或作右辛未史作五月已已以右金吾大將軍范希朝為檢校右僕射兼右神䇿京西諸城鎮行營兵馬節度使叔文欲專兵柄藉希朝年老舊將故用為將帥使主其名而尋以其黨韓泰為}
  - {type: page-break, offset: 3414, content: '', id: KR4c0044_WYG_049-4a, image: WYG1073/WYG1073-0720c.png}
