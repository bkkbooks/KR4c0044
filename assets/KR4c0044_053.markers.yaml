  - {type: variant, offset: 3138, length: 255, content: 天聖中余爲西京留守推官與梅聖俞遊嵩山入天封宫徘徊柱下而去遂登山頂之武后封禅處有石記戒人遊龍潭者母語笑以黷神龍龍怒則有雷恐因念退之記遇雷意其有所誡也其一在福先寺塔下當時所見墨蹟不知其後何人模刻于石也迓杜兼題名河南尹水陸運使杜兼尚書都官貟外郎韓愈水陸運判官洛陽縣尉李宗閔水陸運判官伊闕縣尉牛僧孺前同州韓城縣尉鄭伯義元和四年九月二十二日大尹給事奉詔祠濟瀆回愈與二判官於此迎候遂陪遊宿愈題華嶽題名方云此文刻於金天祠石闕昔人嘗集華嶽題名自唐開元至後唐清泰録爲十卷此文雖未必尽出公手然筆削之嚴要非公不可故鋉之淮西宣慰處置使, WYG: 臣郢}
