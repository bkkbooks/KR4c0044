  - {type: variant, offset: 3561, length: 0, content: '', WYG: 之使歌以祀公其詞曰公昔騎龍白雲鄉手抉雲漢分天章天孫為織雲錦裳飄然乘風來帝旁下與濁世掃粃糠西遊咸池略扶桑草木衣被昭回光追逐李杜參翺翔汗流籍湜走且僵滅没倒景不可望作書詆佛譏君王要觀南海窺衡湘歴舜九疑弔英皇祝融先驅海若藏約束鮫鱷如驅羊鈞天無人帝悲傷謳吟下招遣巫陽犦牲雞卜羞我觴於粲茘丹與蕉黄公不少留我涕滂翩然被髮下大荒别本韓}
