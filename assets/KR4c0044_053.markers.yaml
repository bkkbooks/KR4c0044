  - {type: variant, offset: 3539, length: 5, content: 嶽廟緫等八, WYG: 暫而終耀于無窮者其道當然也予之始得於韓也當其沈没棄廢之時予固知其不足以追時好而取勢利於是就而學之則予之所為者豈所以急名譽而干勢利之用哉亦志乎乆而已矣故予之仕於進不為喜退不為懼者盖其志先定而所學者宜然也集本出於蜀文字刻畫頗精於今世俗本而脱繆尤多凡三十年間聞}
