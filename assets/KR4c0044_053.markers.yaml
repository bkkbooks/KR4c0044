  - {type: variant, offset: 2809, length: 1, content: 並, WYG: 亦宜勉之將必或作必將或脱不在二字愈再拜與大顛師書此篇諸本皆無唯嘉祐小杭本有之其篇次在此與作召顛作顛師作和尚}
