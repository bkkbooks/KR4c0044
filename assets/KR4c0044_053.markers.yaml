  - {type: variant, offset: 2812, length: 0, content: '', WYG: 列於石刻之首今從杭本附此而名篇從方氏杭本又注云唐元和十四年刻石在潮陽靈山禪院宋慶厯丁亥江西袁陟世弼得此書疑之因之滁州謁歐陽永叔永叔覽之曰實退之語它竟不及也方本畧載其語又録歐公集古録跋尾云文公與顛師書世}
  - {type: variant, offset: 2813, length: 0, content: '', WYG: 罕傳予以集録古文其求之博蓋久而後獲其以繫辭為大傳謂著山林與著城郭無異等語宜為退之之言其後書吏部侍郎潮州刺史則非也蓋退之自刑部侍郎貶潮州後移袁州召為國子祭酒兼兵部侍郎久之始遷吏部而流俗傳但知為韓吏部爾顛師遺記雖云長慶中立蓋并韓書皆國初重刻故謬為附益爾方又注云今石刻乃元祐七年重立又云按公三簡皆邀速常語耳初無崇信佛法之説妄者旁沿别譔答問等語以肆誣謗要當存此簡以解後世之惑以今按杭本不知何人所注疑袁自書也更跋尾參之其記歐公之語不謬矣而東坡雜説乃云韓退之喜大顛如喜澄觀文暢意非信佛法也而或者妄撰退之與大顛書其詞凡鄙雖退之家奴僕亦無此語今一士人又於其末妄題云歐陽永叔謂此文非退之不能作又誣永叔矣蘇公此語蓋但見集注之出於或人而未見跋尾之為歐公親筆也二公皆號一代文宗而其去取不同如此覽者不能無惑然方氏盡載歐語而畧不及蘇説其意可見至呂伯㳟乃於文鑑特著蘇説以備乙覽則其同異之間又益後人之惑矣以余考之所傳三書最後一篇實有不成文理處但深味其間語意一二文勢抑揚則恐歐袁方意誠不為過但意或是舊本亡逸僧徒所記不真致有脱誤歐公特觀其大槩故但取其所可取而未暇及其所可疑蘇公乃覺其所可疑然亦不能察其為誤而直斥以為凡鄙所以其論雖各有所因而皆未能無所未盡也若乃後之君子則又往往不能究其本根其附歐説者既未必深知其所以為可信其主蘇氏者亦未必果以其説為然也徒幸其言可為韓公解紛若有補於世教故特表而出之耳皆非可與實事而求是者也至如方氏雖附歐説然亦未免曲為韓諱殊不知其言既曰久聞道德又曰側承道髙又曰所示廣大深逈非造次可諭又曰論甚宏博安得謂初無崇信其説之意邪韓公之事余於答孟簡書蓋已論其詳矣故不復論特從方本載此三書於别集并録歐公二語而附蘇説方説於其後且為全載書文於此而考其同異訂其謬誤如左方以為讀者以此觀之則其決為韓公之文而非它人之所能作無疑矣方氏所據石本與杭本又自不同則疑傳寫之訛而歐公所疑官稱之誤亦為得之但愚意猶恐當時既謫刺逺州亦未必更帶侍郎舊官也方氏所駁世俗偽造誣謗之書即今所謂别傳者洪氏辨證云别傳載公與大顛往復之語深詆退之其言多近世經義之説又偽作永叔跋云使退之復生不能自解免呉源明云徐君平見介甫不喜退之故作此文方氏又云周端禮曰徐安國自言年二十三四時戲為此今悔之無及然則其為徐作無疑矣但君平字安道而方云安國未知便是君平否耳然靈山石刻張繫所撰其間}
