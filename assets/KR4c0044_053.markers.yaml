  - {type: variant, offset: 2751, length: 1, content: 行, WYG: 羮之遺味幸希薦於廟中芍藥歌方從蜀本刪去今恐是公少作姑存之丈人庭中開好花更無凡木爭春華翠莖紅蕊天力與此恩不屬黄鍾家温馨熟美鮮香起似笑無言習君子霜刀翦汝天女勞何事低頭學桃李嬌癡婢子無靈性競挽春衫來比並靈性或作性靈欲將雙頰一晞紅緑窓磨偏青銅鏡晞或作稀一罇春酒甘若飴音怡丈人此樂無人知花前醉倒歌者誰楚狂小子韓退之海水水下方有詩字海水非不廣鄧林列子夸父逐日渴欲得飲云膏肉所浸生鄧林鄧林彌廣數千里焉豈無枝風波一蕩薄魚鳥不可依海水饒大波鄧林多驚風豈無魚與鳥巨細各不同海有吞舟鯨鄧有垂天鵬茍非鱗羽大蕩薄不可能我鱗不盈寸我羽不盈尺一木有餘陰一泉有餘澤我將辭海水濯鱗清泠池我將辭鄧林刷羽䝉籠枝海水非愛廣鄧林非愛枝風波亦常事鱗羽自不宜或作不自疑我鱗日已大我羽日已修風波無所苦還作鯨鵬遊贈崔立之此篇方從文苑昔者十日雨子桑苦寒飢哀歌坐空屋不怨但自悲桑苦寒或作來寒且方云考莊子實作子桑屋或作房其友名子輿忽然憂且思褰裳觸泥水裹飯往食之入門相對語天命良不宜好事漆園吏書之存雄辭千年事已逺二子情可推我讀此篇日正當雨雪時吾身固已困吾友復何為薄粥不足裹深泥諒難馳曽無子輿事空賦子桑詩或無此二句贈河陽李大夫四海失巢穴兩都困塵埃感恩由未報惆悵空一來由未或作未能方作能未今按由猶古字通裘破氣不煖馬羸鳴且哀裘破或作破裘氣或作竟馬羸或作羸馬主人情更重空使劍鋒摧苦寒歌黄昏苦寒歌夜半不能休夜半或作半夜豈不有陽春節氣聿其周或作嵗聿不其周節氣或作氣節君何愛重裘兼味養大賢何愛下疑有脱字養字或作成字氷食葛製神所憐神所或作誠可填窓塞户慎勿出暄風暖景明年日或作需明年非是贈同遊者已見正集請遷𤣥宗廟議方從蜀本舊志或無廟字非是方云舊史禮儀志長慶四年五月禮儀使奏樊云時穆宗當祔公豈以吏部侍郎為禮儀使邪右禮儀使奏謹按周禮天子七廟三昭三穆與太祖之廟而七尚書咸有一德亦曰七世之廟可以觀德尚書至觀德十六字舊史闕荀卿子曰有天下者祭七代有一國者祭五代或無卿字曰上或有亦字祭七代或作事七世祭五代或作事五世或作祭五廟則知天子上祭七廟典籍通規祖功宗德不在其數廟或作代國朝九廟之制法周之文太祖景}
