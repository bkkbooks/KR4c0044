  - {type: variant, offset: 3560, length: 0, content: '', WYG: 為舊物也嗚呼韓氏之文之道萬世所共尊天下所共傳而有也予於此本特以其舊物而尤惜之泉本云吾少居漢東年十五六時於里人李堯輔家見一弊筐棄在壁角中有故書數十册因得韓文於其間皆脱落無次序吾畧讀之愛其文辨而意深當是時學者方作時文天下之人無道韓文者予亦將舉進士以觖禄利未暇學也遂求於李氏而得之以歸補次成帙而藏之數年始及第遂官于洛而得師魯與之遊因出韓文而學之自後天下學者亦稍稍近古吾家所藏書萬巻然獨韓文最為舊物君為吾愛惜之可也今按泉州本乃汪彦章所刻此序獨與諸本不同不知何據其所謂君者又不知為何人也今并存之以俟知者潮州韓文公廟碑蘇文忠公匹夫而為百世師一言而為天下法是皆有以參天地之化關盛衰之運其生也有自來其逝也有所為矣故申呂自嶽降而傅說為列星古今所傳不可誣也孟子曰吾善養浩然之氣是氣也寓於尋常之中而塞乎天地之間卒然遇之則王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辯是孰使之然哉其必有不依形而立不恃力而行不待生而存不隨死而亡者矣故在天為星辰在地為河嶽幽則為鬼神而明則復為人此理之常無足怪者自東漢以來道喪文弊異端並起歴唐貞觀開元之盛輔以房杜姚宋而不能救獨韓文公起布衣談笑而麾之天下靡然從公復歸于正盖三百年於此矣文起八代之衰而道濟天下之溺忠犯人主之怒而勇奪三軍之帥此豈非參天地關盛衰浩然而獨存者乎盖嘗論天人之辨以謂人無所不至惟天不容偽智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精誠能開衡山之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇甫鏄李逢吉之謗能信於南海之民廟食百世而不能使其身一日安於朝廷之上盖其所能者天也其所不能者人也始潮人未知學公命進士趙徳為之師自是潮之士皆篤於文行延及齊民至于今號稱易治信乎孔子之言君子學道則愛人而小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉而廟在刺史公堂之後民以出入為艱前守欲請諸朝作新廟不果元祐五年朝散郎王君滌來守是邦凡所以養士治民者一以公為師民既悅服則出令曰願新公廟者聴民讙趨之卜地於州之城南七里期年而廟成或曰公去國萬里而謫于潮不能一嵗而歸没而有知其不眷戀于潮也審矣軾曰不然公之神在天下者如水之在地中無所往而不在也潮人獨信之深思之至焄蒿悽愴若或見之譬如鑿井得泉而曰水專在是豈理也哉元豐七年詔封公昌黎伯故榜曰昌黎伯韓文公之廟潮人請書其事于石因為作詩以}
