  - {type: line-break, offset: 2814, content: '', id: KR4c0044_SBCK_053-6b08}
  - {type: variant, offset: 2815, length: 0, content: '', WYG: 公問大顛云西國一真之法何不教人顛云教人達性离無明貪嗔驕慢不生嫉妬此亦釋子常言初無難解但韓公素所未聞而頗中其病故雖不盡解而適亦有㑹於心耳又載韓公責云人生貴賤各有定分何得以三塗之説誑人而顛答云公何不常守侍郎之任而來此為官耶則恐其有謬誤或其徒所附益也}
  - {type: variant, offset: 2816, length: 0, content: '', WYG: 啟方無此二字孟夏漸熱惟道體安和熱下或有伏字愈弊劣無謂坐事貶官到此久聞道德切思見顏切杭作竊方據石本如此切乃懇切之意此下大率多從石本云縁昨到來未獲參謁儻能暫垂見過實為多幸杭本無倘能以下十字已帖縣令具人船奉迎日久竚瞻帖杭作貼久當作夕竚方據石本作佇不宣愈白方據石無愈白字今據石本此下具銜姓名下云上顛師四月七日愈啟方無此二字海上窮處無與話言側承道髙思獲披接專輒有此咨屈儻惠能降喻非所敢望也惠字疑衍或下有然字而併在能字之下諸本及石本皆誤至此一二日却歸髙居亦無不可旦夕渴望杭本無倘惠以下二十七字而有此旬來晴明不甚熱倘能乗間一訪實謂幸也十八字今按此旬以下乃下篇語定從石本不宣愈白方據石本無愈白字今據石本與前書同但云六月初三日愈啟方無此二字惠勻至辱答問珍悚無已所示廣大深逈非造次可諭杭作量易大傳曰書不盡言言不盡意然則聖人之意其終不可得而見邪方據石本意作㫖無而字邪作也今按易實作意邪而無終而二字大抵石本亦自多誤也後放此如此而論讀來一百遍一字疑衍蘇氏所謂凡鄙蓋指此等處耳不如親見顏色隨問而對之易了方據石夲如此但無親字處今按親下當有見字而兩本皆闕故不敢増而空其以待知者杭但云不如親面而對之是亦蘇氏所謂凡鄙者然親字乃方本之闕文面字乃問字之誤筆而又脱去顔色隨易了六字耳此旬來晴明旦夕不甚熱倘能乗閒一訪幸甚旦夕馳望杭本已見上篇此不復出愈聞道無疑滯行止繫縛茍非所戀著則山林閒寂與城郭無異此從杭本但郭作隍今㨿歐公語從方本方據石本止下有所字下有愛戀字所下無戀字及則字而著字下伏出著字及與字異下有邪字皆非是其用邪字尤不當律令亦所謂凡鄙者也但或疑非字下當有有字言於行止繫縳若無所戀則静閙一致語尤明白耳或者又疑非當作有則語意賔主尤順然未知孰是又諸本皆無不敢輒増改也大顛師論甚宏愽而必守山林義不至城郭顛杭見上或無師字義字城作州自激修行獨立空曠無累之地者非通道也自方作似然細考之與下文激修行四字皆可疑方又以也為矣而并非通道四字屬於行字之下又以獨為自而立下有於字皆非是勞於一來安於所適道故如是於杭作于適方據石本與杭本並作識今得真石本考之乃如此然則方之所考亦不詳矣蓋適猶便也與唯適之安之語用字畧同言一來雖勞而既來則當隨其所便無處不安也道故如是即所以結上文道無疑滯之意方以如為此亦石本誤不宣愈頓首方據石本無未三字今據石本與前二書同但云大顛禪師七月十五日不知韓公之於大顛既聞其語而為禮益恭如此何也别本韓文考異外集巻二欽定四庫全書别本韓文考異外集巻三宋王伯大重編送汴州監軍俱文珍序并詩韓曰董晉為宣武軍節度使俱文珍為監軍公為觀察推官文珍將如京師作序詩而送之樊曰此序不入正集李漢以文珍故為公諱耶今之天下之鎮陳留為大屯兵十萬連地四州左淮右河抱負齊楚濁流浩浩舟車所同故自天寶已來當藩垣屏翰之任有弓矢鈇鉞之權皆國之元臣天子所左右屏翰方作翰屏其監統中貴必材雄德茂榮耀寵光能俯達人情仰喻天意者然後為之故我監軍俱公輟侍從之榮受腹心之寄奮其武毅張我皇威遇變出奇先事獨運偃息談笑危疑以平天子無東顧之憂方伯有同和之美危疑方作疑危十三年春將如京師相國隴西公飲餞於青門之外謂功德皆可歌之也於或作于或無青字命其屬咸作詩以頌繹之詩曰奉使羌池靜臨戎汴水安或作閒非是沖天鵬翅闊報國劍鋩寒曉日驅征騎春風詠采蘭孫曰東晢補亡詩曰循彼南陔言采其蘭采蘭以養親也誰言臣子道忠孝兩全難送浮屠令縱西遊序方無浮屠字縱下有上人二字其行異其情同君子與其進可也方無進字非是令縱釋氏之秀者又善為文又上或有而字浮遊徜徉跡接天下藩維大臣文武豪士令縱未始不褰衣而負業往造其門下衣或作裳其有尊行美德建功樹業令縱從而為之歌頌典而不諛麗而不淫其有中古之遺風與樹或作植有中或作中有古下或有人字風下或有可字乗閒致密促席接膝譏評文章商較人士浩浩乎不窮愔愔乎深而有歸或無乗閒致密四字而有及字人士或作士人或作人事於是乎吾忘令縱之為釋氏之子也其來也雲凝其去也風休方懽而已辭雖義而不求吾於令縱不知其不可也盍賦詩以道其行與路鵠秀才序方云送路鵠贈别二序語意無倫脱誤不可讀如曰自河南令為博士於公所歴官次亦不合故併闕之今從其説刪去贈别序説已見上送毛仙翁十八兄序方云直諫表論顧威狀之蠡外集者翁序皆最未見決非公文表狀亦不録足以知其果偽也今並從方本刪去别本韓文考異外集巻三欽定四庫全書别本韓文考異外集巻四宋王伯大重編通解洪曰通解釋言解鄠人對或云皆少作陳齊之云通解之乎者也下皆未當此雖少作然亦本訛也今之人以一善為行而恥為之慕達節而稱夫通才者多矣然而脂韋汩没以至於老死者相繼亦未見他之稱他下或有人字今按此句疑有脱誤其豈非亂教賊名之術歟亂或作害且五常之教與天地皆生然而天下之人不得其師終不能自知而行之矣地下方有而字非是故堯之前千萬年天下之人促促然不知其讓之為美也於是許由哀天下之愚且以爭為能迺脱屣其九州髙揖而辭堯由是後之人竦然而言曰雖天下猶有薄而不售者況其小者乎或作焉下同故讓之教行於天下許由為之師也為之或作之為下二語同自桀之前千萬年天下之人循循然不知忠易其死也故龍逢哀天下之不仁覩君父百姓入水火而不救於是進盡其言}
