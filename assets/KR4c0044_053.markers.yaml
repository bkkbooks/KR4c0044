  - {type: variant, offset: 2772, length: 4, content: 任號絶限, WYG: 得聞小大舉正作大小恐誤事或作士自即大位已來于今四年凡所施者無不得宜者或作為凡所施者新書作凡所出而施者勤儉之聲寛大之政幽閨婦女草野小人皆飽聞而厭道之草或作山人新書作子愈不通於古請問先生世非太平之運歟加又有非人力而至者愈方作某於作于無世字非作匪新書作兹非太平世歟年榖熟衍符貺委至若干紀之姦不戰而拘纍彊梁之兇銷鑠縮栗迎風而委伏其有一事未就正自視若不成人四海之所環無一夫甲而兵者新書無自字視或作是非是而兵或作與兵若此時也拾遺公不疾起與天下之士君子樂成而享之斯無時矣若上或有未有字昔者孔子知不可為而為之不已足跡接於諸侯之國即可為之時自藏深山牢闗而固距即與仁義者異守矣或無足跡字想拾遺公冠帶就車惠然肯來舒所蓄積}
