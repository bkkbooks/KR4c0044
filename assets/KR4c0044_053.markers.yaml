  - {type: variant, offset: 2746, length: 0, content: '', WYG: 齊髙此蓋以其無臭味嫌不足於芬芳故有齊芳之語方説非是明德惟馨𤣥功不宰于以表誠潔于以戒荒怠茍失其道殺牛之祭何為如得其宜明水之薦斯在宜方作情薦或作為不引而自致不行而善至雖辭麴蘖之名實處罇罍之器降於圓魄殊匪金莖之露出自方諸乍似鮫人之淚匪或作非露或作靈乍方作已將以贊于陰德配夫陽燧音遂配}
