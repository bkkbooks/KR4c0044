  - {type: variant, offset: 2971, length: 0, content: '', WYG: 二月方本不載實録云諸本順宗實録皆以附外集然李漢序謂又有注論語}
  - {type: variant, offset: 2972, length: 0, content: '', WYG: 巻傳學者順宗實録五巻列於史書不在集中則知實録固不必附也今按李漢之説據當時而言之似未為失然其為害已足使筆解亡逸無復真本實録竄易不成全書是則皆李漢之為也方氏不察而從其説既已誤矣況今去公之時又益以逺比之當日事體又大不同故其片文隻字名為公之作而決可知其非偽者皆當收拾使無失墜乃為真能好公之文者固不當以一時茍簡之論為限斷而直有所遺也故今於實録姑仍外集而詳加校定庶㡬猶足以見公筆削之大指云史臣韓愈撰或無此五字順宗至德大聖大安孝皇帝德下史有𢎞道二字諱誦德宗長子母曰昭德皇后王氏上元二年正}
