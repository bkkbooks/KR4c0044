  - {type: variant, offset: 2800, length: 1, content: 長, WYG: 跨越前後者不可勝數豈一人卒卒能紀而傳之邪士上或無之字能上或無復出卒方云司馬遷傳卒卒無須㬰之間顔曰促遽之意也僕年志已就衰退不可自敦率或無就字敦率方云猶敦勉也或作敢為或無此二字今按此二字恐有脱誤宰相知其無他才能不足用哀其老窮齟齬無所合不欲令四海内有戚戚者猥言之上茍加一職榮之耳非必督責迫蹙令就功役也他上方無無字就下或有其字賤不敢逆盛指行且謀引去且傳聞不同善惡隨人所見傳聞或作傳云聞甚者附黨惜愛不同巧造語言鑿空構立善惡事迹於今何所承受取信而可草草作傳記令傳萬世乎方無乎字若無鬼神豈可不自心慚愧若有鬼神將不福人僕雖騃亦粗知自愛實不敢率爾為也自心上或有可字非是或無心字夫聖唐鉅跡及賢士大夫事皆磊磊軒天地决不沈没或無聖字方從文苑決下有必字又云蜀本作落落掀天地而無必字又按决或作決地或作抉地云今按古潮本軒亦或作掀而無必字盖因栁子厚書所云磊磊軒天地者決必沈没故諸本或誤加必字耳今從栁集作軒從潮本去必字今館中非無人將必有作者勤而纂之後生可畏}
