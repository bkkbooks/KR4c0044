  - {type: variant, offset: 2798, length: 1, content: 題, WYG: 答劉秀才論史書方從蜀苑六月九日韓愈白秀才方無此九字或有某月日韓愈白劉君足下辱問見愛教勉以所宜務敢不拜賜愚以為凡史氏褒貶大法春秋已備之矣為或作謂後之作者在據事跡實録則善惡自見或復出實録二字見下或有矣字然此尚非淺陋偷惰者所能就況褒貶邪孔子聖人作春秋辱於魯衛陳宋齊楚卒不遇而死齊太史氏兄弟㡬盡或無氏字左丘明紀春秋時事以失明司馬遷作史記刑誅班固瘐死孫曰和帝永元初洛陽令种兢以事捕固固死獄中洪曰漢律囚以飢寒死曰瘐孟堅死獄中故云瘐音愈今本作瘦傳冩之誤陳壽起又廢卒亦無所至王隠謗退死家習鑿齒無一足孫曰鑿齒字彥威襄陽人以脚疾廢居里巷符堅䧟襄陽大説之與諸鎮書曰昔晉平呉利在二陸今獲江南獲士纔一人有半耳崔浩范􅈌赤誅魏收夭絶宋孝王誅死足下所稱呉兢亦不聞身貴而今其後有聞也赤或作赤族二字夭或作或無今其字或無其後字夫為史者不有人禍則有天刑豈可不畏懼而輕為之哉唐有天下二百年矣聖君賢相相踵其餘文武之士立功}
