  - {type: variant, offset: 3419, length: 2, content: 太子, WYG: 專其事主或作在甲戌以度支郎中韓泰守兵部郎中兼中丞充左}
  - {type: variant, offset: 3422, length: 2, content: 庶孑, WYG: 神策京西都栅行營兵馬節度行軍司馬賜紫乙亥追改為檢校兵部郎中職如故甲申史作丁丑以萬年令房啟為容州刺史}
  - {type: page-break, offset: 3422, content: '', id: KR4c0044_WYG_049-4b, image: WYG1073/WYG1073-0720d.png}
  - {type: variant, offset: 3429, length: 0, content: '', WYG: 初啟善於叔文之黨因相推致遂獲寵于叔文求進用或無因字叔文以為容管經畧使使行約至荆南授之云脱不得荆南即與湖南故啟宿留於江陵久之方行至湖南又久之而叔文與執誼爭權數有異同故不果尋聞皇太子監國啟惶駭奔馳而往是日以郴州員外司馬鄭餘慶為尚書左丞是日史作癸未乙酉以尚書左丞}
  - {type: page-break, offset: 3429, content: '', id: KR4c0044_WYG_049-5a, image: WYG1073/WYG1073-0721a.png}
  - {type: variant, offset: 3430, length: 1, content: 愈, WYG: 臯為鄂岳觀察武昌軍節度使以尚下十八字史作以右丞韓臯為鄂岳沔蘄團練觀察使仍日係甲辰下初臯自以為前輩舊人累更重任頗以簡倨自髙嫉叔文黨謂人曰吾不能事新貴人臯從弟􅋫幸於叔文以告叔文故出之辛邜以王叔文為户部侍郎職如故賜紫初叔文欲依前帶翰林學士宦者俱文珍等惡其專權削去翰林之職叔文見制書大驚謂人曰叔文日時至此商量公事若不得此院職事即無因而至矣王伾曰諾即疏請不從再疏乃許三五日一入翰林去學士名又與歸登同日賜紫内出衫笏賜登而叔文不霑文珍等所惡獨不得賜今按而叔文下數句重復不可讀疑因後來修改已増新字而不去舊文如買乳母之例也蓋上文已有俱文珍等惡其專權之句則此不當更有文珍等所惡五字有不霑字則不當更有獨不得賜四字若并有此九字則上不當有不霑字且此文珍等字上亦合更有脱字謬誤甚明今當削去文珍等以下九字則語意明白無復可疑矣由此始懼以衢州别駕令狐峘為秘書少監峘國子祭酒德棻𤣥孫進士登第司徒楊綰未達時遇之以為賢為禮部修史引峘入史館自華原尉拜拾遺累遷起居舍人大厯八年劉晏為吏部尚書奏峘為刑部員外}
