  - {type: variant, offset: 3400, length: 1, content: 裴, WYG: 臣珣瑜檢校司空平章事臣佑奉疏曰大行皇帝知陛下仁孝慮陛下悲哀不即人心聽政事故發遺詔令一行漢氏之制今陛下安得守曽閔匹夫之小行忘皇王繼親之大孝以虧臣子承順之義猶不許壬寅宰臣又上言曰陛下以聖德至孝繼受寶命宜奉先帝約束以時聽斷不可以久從之癸卯朝百寮于紫宸門杜佑前跪進曰陛下居憂過禮羣臣懼焉願一覩聖顔因再拜而起左右乃為皇帝舉帽百寮皆再拜佑復奏曰陛下至性殊常哀毁之甚臣等不勝惶灼伏望為宗廟社稷割哀強食景午罷翰林陰陽星卜醫相覆碁諸待詔三十二人三或作四初王叔文以碁待詔既用事惡其與已儕類相亂罷之已酉易定節}
  - {type: page-break, offset: 3400, content: '', id: KR4c0044_WYG_047-5b, image: WYG1073/WYG1073-0714d.png}
  - {type: variant, offset: 3402, length: 0, content: '', WYG: 使張茂昭可同中書門下平章事餘如故或無使字可史作兼河北節度自至德已來不常朝覲前年冬茂昭來朝未還故寵之辛亥史作夘詔吏部侍郎韋執誼守左丞同中書門下平章事賜紫侍郎史作郎中左丞史作尚書右丞初執誼為翰林學士知叔文幸於東宫傾心附之叔文亦欲自廣朋黨密與交好至是遂特用為相乙夘太常奏禮云喪三年不祭惟祭天地社稷周禮圜鍾之均六變天神皆降林鍾之均八變地示咸出不廢天地之祭不敢以卑廢尊也樂者所以降神也不以樂則祭不成今遵遺詔行易月之制請制内遇祭輟樂終制用樂從之又奏禮三年祭宗廟今請竢袝廟畢復常從之辛酉貶京兆尹李實為通州長史詔曰實素以宗屬累更任使驟升班列遂極寵榮而政乖惠和務在苛厲詔下或有詞一道字曰下或有京尹字實上或有嗣道王字比年旱歉先聖憂人特詔逋租悉皆蠲免而實敢肆誣罔復令徵剥頗紊朝廷之法實惟聚斂之臣歉或作暵自國哀以來増毒彌甚無辜斃踣深所興嗟朕嗣守洪業敷𢎞理道寧容蠧政以害齊人宜加貶黜用申邦憲尚從優貸俾佐逺藩實謟事李齊運驟遷至京兆尹恃寵強愎不顧文法文或作乃是時春夏旱京畿乏食實一不以介意方務聚斂徵求以給進奉毎奏對輒曰今年雖旱而穀甚好由是租税皆不免人窮至壞屋賣瓦木貸麥苗以應官或無貸字優人成輔端為謡嘲之實聞之奏輔端誹謗朝政杖殺之實遇侍御史王播於道故事尹與御史相遇尹下道避實不肯避導騎如故播詰讓導騎者實怒遂奏播為三原令廷詬之原或作泉非是陵轢公卿已下隨喜怒誣奏遷黜朝廷畏忌之陵或作凌常有詔免畿内逋租實不行用詔書徵之如初勇於殺害人吏不聊生至譴市里讙呼皆袖瓦礫遮道伺之實由閒道獲免壬戌洪云史作寅誤制殿中丞皇太子侍書翰林待詔王伾可守左常侍依前翰林待詔書或作讀依前翰林待詔史作充翰林學士今按前云上學書於王伾後云以侍書得幸於上則此當從史作侍書為是蘇州司功王叔文可起居舍人翰林學士又以司勲員外郎翰林學士知制誥鄭絪為中書舍人學士如故又以給事中馮伉為兵部侍郎以兵部員外郎史館修撰歸登為給事中修撰如故登伉皆上在東宫時侍讀以師傳恩拜别本韓文考異外集巻六欽定四庫全書别本韓文考異外集巻七宋王伯大重編順宗實録二起二月盡三月二月甲子上御丹鳯門大赦天下自貞元二十一年二月二十四日昧爽已前大辟已下罪無輕重常赦所不原者咸赦原之諸色人中有材行兼茂明於理體者經術精深可為師法者達於吏理可使從政者宜委常參官各舉所知其在外者長吏精加訪擇具名聞奏仍優禮發遣舊事宫中有要市外物令官吏主之與人為市隨給其直外物下或有間字貞元末以宦者為使抑買人物稍不如本估末年不復行文書置白望數百人於兩市并要閙坊閲人所賣物但稱宫市即斂手付與真偽不復可辨無敢問所從來其論價之髙下者率用百錢物買人直數千錢物其論疑當作與論仍索進奉門户并脚價錢將物詣市至有空手而歸者名為宫市而實奪之常有農夫以驢負柴至城賣遇宦者稱宫市取之纔與絹數尺又就索門户仍邀以驢送至内農夫涕泣以所得絹付之不肯受曰須汝驢送柴至内農夫曰我有父母妻子待此然後食今以柴與汝不取直而歸汝尚不肯我有死而已遂歐宦者待或作得有死或作必死街吏擒以聞詔黜此宦者而賜農夫絹十匹然宫市亦不為之改易諫官御史數奏疏諫不聽上初登位禁之至大赦又明禁又貞元中買乳母皆令選寺觀婢以充之而給與其直例多不中選寺觀次當出者賣産業割與地買之貴有姿貌者以徒其徒苦之至是亦禁焉地上與字恐誤或賣產業是本後改作割地而傳者不去舊文又誤増與字貞元末五坊小兒張捕鳥雀於閭里皆為暴横以取錢物至有張羅網於門不許人出入者或有張井上者使不得汲水近之輙曰汝驚供奉鳥雀痛歐之出錢物求謝乃去或相聚飲食於肆醉飽而去賣者或不知就索其直多被歐罵或時留蛇一囊為質曰此蛇所以致鳥雀而捕之者今留付汝幸善飼之勿令飢渴賣者愧謝求哀乃携而去上在春宫時洞知其弊常欲奏禁之至即位遂推而行之人情大悦春或作東乙丑停鹽鐵使進獻舊鹽鐵錢物悉入正庫一助經費其後主此務者稍以時市珍翫時新物充進獻以其恩澤其後益甚嵗進錢物謂之羨餘而經入益少至貞元末逐月有獻焉謂之月進至是乃罷遂或作逐非是命右金吾將軍兼中丞田景度持節告哀於吐蕃以庫部員外熊執易為副兵部郎中兼中丞元季方告哀于新羅且册立新羅嗣王主客員外郎兼殿中監馬于為副三月庚午朔出後官三百人辛未以翰林待詔王伾為翰林學士壬申以故相撫州别駕姜公輔為吉州刺史前户部侍郎判度支汀州别駕蘇弁為忠州刺史追故相忠州刺史陸贄郴州别駕鄭餘慶前京兆尹杭州刺史韓臯前諫議大夫道州刺史陽城赴京師德宗自貞元十年已後不復有赦令左降官雖有名德才望以微過忤㫖譴遂者一去皆不復叙用至是人情大悦而陸䞇陽城皆未聞追詔而卒於遷所士君子惜之聞下或有於字癸酉出後宫并教坊女妓六百人聽其親戚迎于九仙門百姓相聚讙呼大喜景戌詔曰檢校司空平章事杜佑可檢校司徒平章事充度支并鹽鐵使以浙西觀察李錡為浙西節度檢校刑部尚書賜徐州軍額曰武寧制曰朕新委元臣綜釐重務爰求貳職固在能臣起居舍人王叔文精識瓌材寡徒少欲質直無隱沉深有謀其忠也盡致君之大方其言也達為政之要道凡所詢訪皆合大猷宜繼前勞佇光新命可度支鹽鐵}
