  - {type: variant, offset: 3434, length: 7, content: 勲貟外郎兼侍御, WYG: 馬將卒三千人駐濠州不去有窺淮南意圓令萬福攝濠州刺}
  - {type: substitution, offset: 3434, original: 勲, replacement: 勳, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20646}}
  - {type: variant, offset: 3442, length: 0, content: '', WYG: 杲聞即提卒去止當塗陳莊賊䧟舒州圓又以萬福為舒州刺史督淮南岸盜賊連破其黨大厯三年召赴京師代宗謂曰聞卿名久欲一識卿且將累卿以許杲萬福拜謝因前曰陛下以許杲召臣如河北賊諸將叛以屬何人代宗笑曰且欲議許杲事方當大用卿即以為和州刺史行營防禦使督淮南岸盜賊至州杲懼移軍上元杲至楚州大掠節度使韋元甫命萬福討之未至淮陰杲為其將康自勤所逐勤或作勸下同自勤擁兵繼掠循淮而東擁或作權萬福倍道追而殺之免者十二三盡得其所虜掠金銀婦女等皆獲致其家女或作人代宗詔以本州兵千五百人防秋京西遂帶和州刺史鎮咸陽固留宿衛固或作因}
