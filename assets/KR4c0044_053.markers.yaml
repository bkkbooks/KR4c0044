  - {type: variant, offset: 3432, length: 0, content: '', WYG: 南曹累遷至禮部侍郎峘之判南曹晏為尚書楊炎為侍郎峘得晏之舉分闕必擇其善者與晏而以惡者與炎炎固已不平至峘為禮部而炎為相有杜封者故相鴻漸之子求補𢎞文生炎甞出杜門下託峘以封峘謂使者曰相公欲封成其名乞署封名下一字峘因得以記焉炎不意峘賣之署名屬峘峘明日疏言宰相炎迫臣以威臣從之則負陛下不從即炎當害臣即或作則德宗以問炎炎具道所以德宗怒曰此姦人不可奈欲杖而流之炎救解乃黜為衡州别駕貞元初李泌為相以左庶子史館修撰徵至則與同職孔述睿爭競細碎數侵述睿述睿長告以讓不欲爭告或作者也長告謂長假泌卒竇參為相惡其為人貶吉州别駕改吉州刺史齊映除江西觀察過吉州峘自以前輩懷怏怏不以刺史禮見入謁從容步進不袜首屬戎器或無袜字或又作抹非是映以為恨去至府奏峘舉前刺史過失鞫不得真無政事不宜臨郡貶衢州别駕上即位以秘書少監徵未至卒峘在史館修𤣥宗實録一百巻撰代宗實録三十巻雖頗勤苦然多遺漏不稱良史初德宗將厚奉元陵事峘時為中書舍人兼史職奏疏諫請薄其葬有答詔優奬元和三年以修實録功追贈工部尚書是月以襄州為襄府按元和郡國志作襄陽大都督府襄下當有陽字徙臨漢縣於古城曰鄧城縣别本韓文考異外集巻八欽定四庫全書别本韓文考異外集巻九宋王伯大重編順宗實録四起六月盡七月六月乙亥乙或作已貶宣州巡}
