  - {type: variant, offset: 2880, length: 4, content: 室李渤題, WYG: 牢之奠敬祭于故尚書右僕射平章事隴西公之靈嗚呼天髙而明地厚而平五氣叙行萬彚順成交感旁暢聖賢以生雨水于雲瀆水于坤蕃昌生物有假有因坤或作神昌生或作生庶天睠唐邦錫之元臣肫肫元臣其德孔碩肫肫或作盹盹誤不謟不笑不威不赫不謟不笑或作不容不謟或作不䧟不酷或無不笑二字而連下文不威為句下文其敵下别出不讐二字與上求字叶不求其盈不致其敵盈方作用爰立作相訏謨實勒立方作初出若無辭疇德之聞德或作得帝念東土公其來撫乃守洛都乃藩浚郊迺去厥疾乃施厥膏不知其勞鰥寡以饒維昔浚郊厥亂維舊昔或作若厥亂維舊或作維亂舊政或作維亂政舊有狡有狂其羣孔醜公其來矣為民父母為民或作公為非是父誨其義母仁其愚既變既從孰云其初孰云或作親去或作親云非是自爾徂逺混然一區公來自中天子所倚公今不歸誰佐天子公既來止東人以完公既來止方作既來至止或作公來至止今依行狀更定公既殁矣人誰與安濁流渾渾有闢其郛填道歡呼公來之初今公之歸公在喪車旨酒既盈嘉肴在盛嗚呼我公庶享其誠尚饗雷塘禱雨文此篇乃栁子厚文此不當録祭石}
