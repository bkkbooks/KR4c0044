  - {type: variant, offset: 2766, length: 2, content: 難勝, WYG: 而鳴哉和或作華元或作臣方云周書注元德之首也徒以獻策闕下方勤行役且有負薪之疾不得稽首軒階遂拜書家僕待命于鄭之逆旅僕或作僮逆上或無之字伏以小子之文可見於十五章之内小子之志可見於此書與之進敢不勉與之退敢不從方作退進退之際實惟閣下裁之上考功崔虞部書或作上考功宏詞官虞部崔員外書愈不肖行能誠無可取行已頗僻與時俗異態抱愚守迷固不識仕進之門迺與羣士爭名競得失行人之所甚鄙求人之所甚利其為不可雖童昏實知之失下或無行字如執事者不以是為念援之幽窮之中推之髙顯之上是知其文之或可而不知其人之莫可也知其人之或可而不知其時之莫可也不知其人上方有是字既以自咎又歎執事者所守異於人人句廢耳任目華實不兼故有所進故有所退以方作已廢上或有之字不疑當作必今按人字屬上句且執事始考文之明日浮囂之徒已相與稱曰}
