  - {type: variant, offset: 2748, length: 2, content: 降禍, WYG: 清烟消氣明桂華吐耀兎影騰精兎影或作玉兎騰方作流聊設監以取水伊不注而能盈霏然而象的爾而呈始漠漠而霜積漸微微而浪生而象或作垂象或作無象的方作酌漠漠而方作茫茫以豈不以德協于坎同類則感形藏在空氣應則通同方作有恐今按同類與氣應對屬差互當作類同在或作於鶴鳴在陰之理不謬虎嘯于谷之義可崇理方作論虎方作武義方作道試今按作虎為是但當時程避諱當作武耳足以驗聖賢之無黨知天地之至公足以驗聖賢方庶令知聖賢黨或作窮知方作驗竊比}
