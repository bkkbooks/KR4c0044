  - {type: variant, offset: 2878, length: 1, content: 謁, WYG: 别本韓文考異外集巻四欽定四庫全書别本韓文考異外集巻五宋王伯大重編除崔羣户部侍郎制勅地官之職邦教是先必選國華以從人望具官崔羣體道履仁外和内敏或作内和外敏清而容物善不近名從容禮樂之間特達珪璋之表比參密命𢎞益既多及貳儀曹升擢惟允邁兹令德藹然休聲兹或作此選賢與能于今雖重擇才均賦自古尤難雖方作惟重或作盛均或作經往慎乃司以服嘉命可下或有云云字祭董相公文祭下或有汴州字維貞元五年嵗次已夘二月乙亥朔某日節度行軍司馬檢校右散騎常侍兼御史大夫知使事呉縣開國男食邑三百户陸長源呉縣開國或作呉郡或無食邑三百户字度支營田判官檢校金部員外郎侍御史孟叔度觀察支使監察御史裏行丘潁觀察推官守祕書省校書郎韓愈等謹以}
