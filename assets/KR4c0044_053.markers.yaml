  - {type: variant, offset: 2844, length: 0, content: '', WYG: 邪吾不知矣余懼其説之將深為通解擇言解韓曰此篇雖曰擇言甚於水火然曰知理者必擇於言則未甞欲人緘嘿茍容而已不然則幕中之評臺中之辦公豈遂忘言乎哉火洩於密而為用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反為災乎乎方作於方無其字下二語同水發於深而為用且遠能不違於道可浮可載可飲可灌以濟乎生物及其導而不防反為患矣乎方作於言起於微而為用且慱能不違於道可化可令可告可訓以推於生物及其縱而不慎反為禍矣火既我灾有水而可伏其熖能使不䧟于灰燼矣䧟或作蹈或作熖水既我患有土而可遏其流能使不仆於波濤矣方無而可字言既我禍即無以掩其辭能不罹於過者亦鮮矣於過或作其失過下方有失字所以知理者又焉得不擇其言歟其為慎而甚於水火言上方無其字而字恐誤鄠人對樊曰新史孝友傳云唐時陳藏器注本草拾遺謂人肉治棄疾自是民間以父母疾多刲股肉以進或給帛或旌門善乎}
