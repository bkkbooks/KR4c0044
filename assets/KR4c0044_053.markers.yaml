  - {type: variant, offset: 2830, length: 5, content: 厚石洪濬川, WYG: 弟者曰爾當通於行如仲尼雖愚亦知其不能也方無亦字也或作邪非是曰爾尚力一行如古之一賢雖中人亦希其能矣賢上或無一字豈不由聖可慕而不可齊邪賢可及而可齊也也方作邪今按恐上句無邪字下句也字却當作邪今之人行未能及乎賢而欲齊乎聖者亦見其病矣夫古人之進修或㡬乎聖人今之人行不出乎中人而恥乎力一行為獨行且曰我通}
