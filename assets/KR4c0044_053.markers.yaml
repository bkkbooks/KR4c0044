  - {type: line-break, offset: 3501, content: '', id: KR4c0044_SBCK_053-8a06}
  - {type: variant, offset: 3511, length: 2, content: 密國, WYG: 械囚送府使以尹杖杖之}
  - {type: variant, offset: 3514, length: 0, content: '', WYG: 曰安有此使歸其囚是時紳方幸旦夕且相宰相欲去之故以臺與府不協為請兩改其官紳既復留公入謝上曰卿與紳争何事公因自辨數日復為吏部侍郎神道碑云復為兵部侍郎銓不鎖入吏選父七十母六十身七十悉與三利取才財勢路絶今按碑失兵部一節此兵字當作吏字不鎖入吏即謂前縱吏出入事三利取才未詳其義疑銓法有此語或是有脱誤也洪譜云公為京兆有舉馬總自代狀賀雨及賀太陽不虧表祭竹林神曲江祭龍文再為兵部有舉張正甫自代狀是年有羅池廟碑送鄭權序并詩祭馬總女挐文并李干女挐墓誌韓𢎞碑論孔戣致仕狀長慶四年卒年五十七贈禮部尚書謚曰文洪譜云四年甲辰正月敬宗即位二月有王仲舒碑四月有張徹墓誌八月有孔戣墓誌是年公没年五十七行狀云得病滿百日假既罷以十二月二日卒於靖安里第公屬纊語曰某伯兄徳行}
  - {type: page-break, offset: 3514, content: '', id: KR4c0044_WYG_052-16b, image: WYG1073/WYG1073-0740d.png}
  - {type: variant, offset: 3515, length: 0, content: '', WYG: 曉方藥食必視本草年止於四十二某疎愚食不擇禁忌位為侍郎年出伯兄十五嵗矣如又不足於何而足自獲終於牖下幸不至失大節以下見先人可謂榮矣明年張籍祭公詩有云去夏公請告養疾城南莊籍時官休罷兩月同遊翔又曰共愛池上佳聨句舒􅜯情又曰公為遊溪詩唱詠多慷慨城南莊在長安城南公之别墅也池上聨句集中無之遊溪詩即南溪始泛三首是也又曰公有曠達識生死為一綱及當臨終晨意色亦不荒贈我珍重言傲然委衾裳其於死生之際如此神道碑云遺命喪葬無不如禮俗習釋氏畫寫浮圖日以七數之及拘隂陽所謂吉凶一無汚我今按此事可見公之平生謹守禮法排斥異教自信之篤至死不變可以為後世法而譜不載盖不以為然也愈性明銳不詭隨與人交終始不少變成就後進士往往知名經愈指授皆稱韓門弟子愈官顯稍謝遣凡内外親若交友無後者為嫁遣孤女而䘏其家嫂鄭喪為服期以報行狀云公氣厚性通論議多大體神道碑云朝有大獄大疑文武㑹同莫先發言先生援經引決考合傳記侃侃正色伏其所詞墓誌云公洞朗軒闢不施㦸級平居雖寢食未嘗去書怠以為枕餐以飴口講評孜孜以磨諸生恐不完美游以詼笑嘯歌使皆醉義忘歸嗚呼可謂樂易君子鉅人者矣碑又云内外惸弱悉撫之一親以仁使男有官女有從不啻於已生交於人已而我負終不計死則庀其家均食剖資雖微弱待之如賢戚人詬笑之愈篤未嘗一食不對客閨人或晝見其面退相指語以為異事未嘗宿貨餘財每曰吾前日解衣質食今存者已多矣每言文章自漢司馬相如太史公劉向揚雄後作者不世出故愈深探本元卓然樹立成一家言其原道原性師説等數十篇皆奥衍閎深與孟軻揚雄相表裏而佐佑六經云至他文造端置辭要為不襲蹈前人者然惟愈為之沛然若有餘至其徒李翺李漢皇甫湜從而效之遽不及逺甚從愈游者若孟郊張籍亦皆自名於時墓誌云先生之作無圓無方至是歸工抉經之心執聖之權尚友作者跋邪觝異以扶孔氏存皇之極知人罪非我計茹古涵今無有端涯渾渾灝灝不可窺校及其酣放豪曲快字凌紙怪發鯨鏗春麗驚耀天下然而栗宻窈眇章妥句適精能之至入神出天嗚呼極矣後人無以加之矣姬氏已來一人而止矣今按知人罪非我計此句中必有脱誤疑當云人知人罪非我所計方氏語附程子曰韓愈亦近世豪傑之士如原道之言雖不能無病然自孟子以來能知此者獨愈而已其曰孟氏醇乎醇又曰荀與揚也擇焉而不精語焉而不詳若無所見安能由千載之後判其得失若是之明也又曰退之晚年之文所見甚髙不可易而讀也古之學者修徳而已有徳則言可不學而能此必然之理也退之乃以學文之故日求其所未至故其所見及此其於為學之序雖若有所戾者然其言曰軻之死不得其傳此非有所襲於前人之語又非鑿空信口率然而言之是必有所見矣若無所見則其所謂以是而傳者果何事邪今按諸賢之論唯此二條為能極其深處然復考諸臨川王氏之書則其詩有曰紛紛易盡百年身舉世何人識道真力去陳言誇末俗可憐無補費精神其為予奪乃有大不同者故嘗折其衷而論之竊謂程子之意固為得其大端而王氏之言亦自不為無理盖韓公於道知其用之周於萬事而未知其體之具於吾之一心知其可行於天下而未知其本之當先於吾之一身也是以其言常詳於外而畧於内其志常極於逺大而其行未必能謹於細微雖知文與道有内外淺深之殊而終未能審其緩急重輕之序以決取舍雖汲汲以行道濟時抑邪舉正為事而或未免雜乎貪位慕禄之私此其見於文字之中信有如王氏所譏者矣但王氏雖能言此而其所謂道真者實乃老佛之餘波正韓公所深詆則是楚雖失而齊亦未為得耳故今兼存其説而因附以狂妄管窺之一二私竊以為得若以是而論之則於韓公之學所以為失者庶幾其有分乎贊曰唐興}
