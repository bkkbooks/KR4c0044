  - {type: variant, offset: 5069, length: 0, content: '', WYG: 欽定四庫全書别本韓文考異巻十六宋王伯大重編書上宰相書正月二十七日前鄉貢進士韓愈謹伏光範門下再拜獻書相公閣下書下或有于字方云時宰相趙憬賈耽盧邁也詩之序曰菁菁者莪樂育材也君子能長育人材則天下喜樂之矣或作也其詩曰菁菁者莪在彼中阿既見君子樂且有儀説者曰菁菁者盛也莪微草也阿大陵也言君子之長育人材若大陵之長育微草能使之菁菁然盛也或無也字既見君子樂且有儀云者天下美之之辭也其三章曰既見君子錫我百朋説者曰百朋多之之辭也或無下百朋字言君子既長育人材又當爵命之賜之厚禄以寵貴之云爾賜之賜或作錫之或作以其卒章曰汎汎楊舟載沈載浮既見君子我心則休説者曰載載也沈浮者物也載載也或作載者載也或作載者舟也或作載舟也言君子之於人材無所不取若舟之於物浮沈皆載之云爾既見君子我心則休云者言若此則天下之心美之也心上或無之字君子之於人也既長育之又當爵命寵貴之而於其才無所遺焉孟子曰君子有三樂王天下不與存焉其一曰樂得天下之英才而教育之此皆聖人賢士之所極言至論古今之所宜法者也然則孰能長育天下之人材将非吾君與吾相乎孰能教育天下之英才将非吾君與吾相乎然則下或無孰能至相乎十七字方云歐本本存此則與後相應然亦無孰長人三字則非是幸今天下無事小大之官各守其職或作所錢穀甲兵之問不至於廟堂論道經邦之暇捨此宜無大者焉今有人生二十八年矣名不著於農工商賈之版其業則讀書著文歌頌堯舜之道雞鳴而起孜孜焉亦不為利或無而字其所讀皆聖人之書楊墨釋老之學無所入於其心其所著皆約六經之㫖而成文抑邪與正辨時俗之所惑與或作興居窮守約方無守字亦時有感激怨懟音墜竒怪之辭以求知於天下亦不悖於教化妖滛䛕佞譸張譸音輈張誑也之説無所出於其中四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畆之宫其可懷宮或作宅方云一畆之宮本儒行語公苗蕃志無宮以歸今本亦誤今按二字無大利害公用儒行語亦或有之然謂其専用宮字而不得更用宅字則固矣遑遑乎四海無所歸恤恤乎饑不得食寒不得衣濱於死而益固得其所者爭笑之忽将棄其舊而新是圖求老農老圃而為師悼本志之變化中夜涕泗交頥雖不足當詩人孟子之謂抑長育之使成材其亦可矣教育之使成才其亦可矣子之下或有所字抑又聞古之君子相其君也之字或在君子下或子下别有之字一夫不獲其所若已推而内之溝中今有人生七年而學聖人之道以修其身積二十年不得已一朝而毁之是亦不獲其所矣十下或有一字伏念今有仁人在上位若不往告之而遂行是果於自棄而不以古之君子之道待吾相也其可乎寧往告焉若不得志則命也其亦行矣志上或有其字今疑志字衍洪範曰凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之二不字方並作弗也而康而色曰予攸好徳汝則錫之福是皆與善之辭也抑又聞古之人有自進者而君子不逆之矣曰予攸好徳汝則錫之福之謂也君上或無而字抑又聞上之設官制禄必求其人而授之者非茍慕其才而富貴其身也方無貴字盖将用其能理不能用其明理不明者耳下之修已立誠必求其位而居之者非茍没於利而榮於名也没或作役方云國語重耳不没於利注没貪也盖将推已之所餘以濟其不足者耳然則上之於求人下之於求位交相求而一其致焉耳一其致或作其致一茍以是而為心則上之道不必難其下下之道不必難其上可舉而舉焉不必讓其自舉也讓下或有於字可進而進焉不必亷於自進也於下或有其字抑又聞上之化下得其道則勸賞不必徧加乎天下而天下從焉化上方無之字則方作其疑當併有則其字因人之所欲為而遂推之之謂也方作矣今天下不由吏部而仕進者㡬希矣主上感傷山林之士有逸遺者屢召内外之臣旁求於四海而其至者盖闕焉求下方有儒雅字雅亦或作士豈其無人乎哉亦見國家不以非常之道禮之而不来耳家下方有之字彼之處隱就閒者亦人耳其耳目鼻口之所欲其心之所樂其體之所安豈有異於人乎哉今所以惡衣食窮體膚麋鹿之與處猨􅀈之與居固自以其身不能與時從順俯仰故甘心自絶而不悔焉从方作俗今按後巻與馮宿書云委曲从順向風承意則諸本作从順者固韓公常用之語也方本語意拙澁非是而方聞國家之仕進者必舉於州縣然後升於禮部聞下或有今字吏部試之以繡繪雕琢之文考之以聲勢之逆順章句之短長中其程式者然後得從下士之列雖有化俗之方安邉之畫不繇是而稍進萬不有一得焉進下或有者字彼惟恐入山之不深入林之不宻其影響昧昧惟恐聞於人也惟恐或作之恐或無此二字今若聞有以書進宰相而求仕者而宰相不辱焉而薦之天子而爵命之而布其書於四方進或作上而宰而爵或並無而字或並無天子二字方無於字枯槁沈溺魁閎寛通之士必且洋洋焉動其心峨峨焉纓其冠于于焉而来矣此所謂勸賞不必徧加乎天下而天下從焉者也因人之所欲為而遂推之之謂者也伏惟覽詩書孟子之所指念育才錫福之所以考古之君子相其君之道而忘自進自舉之罪思設官制禄之故以誘致山林逸遺之士庶天下之行道者知所歸焉歸上方有依字小子不敢自幸其嘗所著文輒採其可者若干首録在異巻冀辱賜觀焉或無敢字或無冀字冀辱或作伏垂干黷尊嚴伏地待罪愈再拜後十九日復上書二月十六日前鄉貢進士韓愈謹再拜言相公閣下向上書及所著文後待命凡十有九日不得命恐懼不敢逃遁不知所為方無向字及逃字从乃復敢自納於不測之誅以求畢其説而請命於左右愈聞之蹈水火者之求免於人也不惟其父兄子弟之慈愛然後呼而望之也将有介於其側者雖其所憎怨茍不至乎欲其死者則将大其聲疾呼而望其仁之也仁或作人而之下有救字或作人而下無之字今按此若作人之救則正與下句全字為對而下文再疊其語亦以二字相對但覺其語差凡故今且從方本注彼介於其側者聞其聲而見其事不惟其父兄子弟之慈愛然後往而全之也雖有所憎怨茍不至乎欲其死者則将枉奔盡氣濡手足焦毛髪救之而不辭也若是者何哉其勢誠急而其情誠可悲也愈之彊學力行有年矣愚不惟道之險夷愚上或有其字而愚下有也字也又或作甚或有其字而無也甚二字行且不息以蹈於窮餓之水火其既危且亟矣大其聲而疾呼矣閣下其亦聞而見之矣方作歟其将往而全之歟抑将安而不救歟不下或有之字有来言於閣下者曰有觀溺於水而爇於火者有可救之道而終莫之救也閣下且以為仁人乎哉不然若愈者亦君子之所宜動心者也或謂愈子言則然矣宰相則知子矣如時不可何謂愈下或有曰字愈竊謂之不知言者誠其材能不足當吾賢相之舉耳材方作才能不或作不能而無足字相上或無賢字若所謂時者固在上位者之為耳非天之所為也位者下方無之字又無也字或併無之為耳非四字之為耳三字或作為之耳皆非是前五六年時宰相薦聞尚有自布衣䝉抽擢者與今豈異時哉且今節度觀察使及防禦營田諸小使等尚得自舉判官無間於已仕未仕者或無使及二字非是間或作聞或作間况在宰相吾君所尊敬者而曰不可乎古之進人者或取於盜或舉於管庫今布衣雖賤猶足以方於此情隘辭蹙不知所裁亦惟少垂憐焉憐下或有察字愈再拜}
