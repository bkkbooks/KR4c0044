  - {type: variant, offset: 16393, length: 0, content: '', WYG: 考異巻一欽定四庫全書别本韓文考異巻二宋王伯大重編古詩北極一首贈李觀北極有羈羽南溟有沈鱗川源浩浩隔影響兩無因風雲一朝㑹變化成一身誰言道里逺里方作理非是陶詩云不怨道里長正作里感激疾如神我年二十五求友昧其人哀歌西京市乃與夫子親所尚茍同趨尚或作向趨方云孟子云三子者不同道其趨一也注趨讀如趣賢愚豈異倫方為金石姿萬世無緇磷音鄰無為兒女態兒女或作女兒非是憔悴悲賤貧此日足可惜一首贈張籍洪曰此詩雜用韻又叠用韵歐陽}
  - {type: page-break, offset: 16393, content: '', id: KR4c0044_WYG_002-1a, image: WYG1073/WYG1073-0284a.png}
  - {type: page-break, offset: 16393, content: '', id: KR4c0044_WYG_002-1b, image: WYG1073/WYG1073-0284b.png}
  - {type: variant, offset: 16394, length: 3, content: 校昌黎, WYG: 云退之工於用韻得寛韻則波瀾横溢泛入傍韻如此日足可惜之類是也得窄韻則不復旁出因難見巧如病中贈張十八之類是也此日足可惜此酒不足嘗不足或作不可捨酒去相語去方作須今按須字無理或是復字傳冩誤矣共分一日光念昔未知子孟君自南方自矜有所得言子有文章我名屬相府欲往不得行或作驤思之不可見百端在中腸維時月魄死冬日朝在房韓曰朝旦也月令孟冬之月日在房驅馳公事退聞子適及成或作墻方云此詩視古用韻不入今韻者多為後學以意妄改吴才老云詩人用行字韻二十有五無叶今讀者此詩後用東去趍彭城諒知有所成皆庚韵也何獨於此疑之命車載之至引坐於中堂開懐聽其説往往副所望音亡孔丘殁已逺仁義路久荒紛紛百家起詭怪相披猖亂也長老守所聞後生習為常少詩詔切知誠難得純粹古巳亡古一作固譬彼植園木有根易為長留之不遣去館置城西旁嵗時未云幾浩浩觀湖江未或作來江或作湘非是方云植園木以喻籍之始從學也觀湖江以喻其成也衆夫指之笑謂我知不明兒童畏雷電魚鼈驚夜光州家舉進士選試繆所當馳辭對我䇿章句何煒音偉光也煌相公董晋也朝服立工席歌鹿鳴禮終樂亦闋苦穴切終也記曰爵卒而樂闋相拜送於庭之子去須㬰赫赫留盛名竊喜復竊嘆竊喜復或作慷慨仍諒知有所成人事安可恒奄忽令我傷聞子髙第日正從相公喪孫曰貞元十五年髙郢知舉籍登第是嵗三月晋卒愈䕶其喪行哀情逢吉語倘怳上音敞下許昉切補注相如曰聽敞怳而亡聞注耳不諦也倘或作􅐞方云楚詞逺遊作敞怳相如傳作敞怳難為雙暮宿偃師縣名今在洛州西徒展轉在牀諸本作展轉在空床今按或當從諸本夜聞汴州亂遶壁行徬徨我時留妻子時留或作乃棄倉卒不及將相見不復期零落甘所丁驕兒未絶乳念之不能忘忽如在我所或作其側所或作前或作側耳若聞啼聲中途安得返一日不可更俄有東來説我家免罹殃乘船下汴水東去趨彭城徐州地孫曰公妻子}
  - {type: page-break, offset: 16394, content: '', id: KR4c0044_WYG_002-2a, image: WYG1073/WYG1073-0285a.png}
  - {type: page-break, offset: 16394, content: '', id: KR4c0044_WYG_002-2b, image: WYG1073/WYG1073-0285b.png}
