  - {type: variant, offset: 16403, length: 0, content: '', WYG: 𨽻書今八分也詩成使之冩亦足張吾軍所以欲得酒為文俟其醺酒味既冷冽酒氣又氛氲上音芬下于云切祝云氣也冷或作冷氣或作烟氛或作氤方云氛氲盛貌字見選雪賦性情漸浩浩諧笑方云云此誠得酒意餘外徒繽紛亂也長安衆富兒盤饌羅羶葷音熏臭莱不解文字飲惟能醉紅裙雖得一餉樂有如聚飛蚊今我及數子固無蕕與薫險語破鬼膽補注開元天寳遺事李果為洛陽令有劉兼者過其境夜聞人外語聲曰古今正人李令是也見其行事令人破胆開戸視之無物乃鬼神也髙詞嫓匹詣切祝曰爾雅妃嫓也注相偶嫓也嫓或作動皇墳至寶不雕琢或作瑑神功謝鋤耘方今向太平元凱承華勛吾徒幸無事庶以窮朝曛音薫日入也同冠峽南方二月半春物亦已少維舟山水間晨坐聴百鳥宿雲尚含姿朝日忽升曉羇旅感和鳴囚拘念輕矯和鳴或作陽和方云和鳴輕矯皆指百鳥而言也潺湲淚久迸久或作交詰曲思增繞行矣且無然盖棺事乃了送惠師惠師浮屠者乃是不羇人鄒陽上吴王書使不羇之士與牛馬同皂注不羇無所拘繫也又司馬遷傳少負不羇之才十五愛山水超然謝朋親或作同隠淪脱冠翦頭髪頭或作短按下對蹤塵當作頭髪飛步遺蹤塵飛或作孤發跡入四明梯空上秋旻遂登天台望韓曰天台山名在台州衆壑皆嶙峋上音隣下音旬深崖貌選階楯峋嶙祝云前漢岭巆嶙峋夜宿最髙頂舉頭看星辰光芒相照燭南北爭羅陳兹地絶翔走自然嚴且神㣲風吹木石澎湃上音彭下普拜切相如曰洶湧澎湃聞韶鈞夜半起下視夜半或作半夜或作中夜溟波銜日輪魚龍驚踊躍呌嘯成悲辛嘯或作咲方云選海賦及鮑謝詩多用呌嘯字怪氣或紫赤敲磨共輪囷去輪切屈曲也鄒陽曰輪囷離竒金鵶韓曰日也既騰翥章恕切騰舉六合俄清新常聞禹穴竒東去窺甌閩越俗不好古流傳失其真幽蹤邈難得聖路嗟長堙廻臨浙江濤屹起髙峨岷音旻二山壯志死不息洪曰謂伍子胥也千年如隔晨是非竟何有棄去非吾倫凌江詣廬嶽廬山在今江州浩蕩極遊廵崔崒没雲表陂陀上普河切下音沱廣云陂陀不平之意孫云言廬山上没雲表下浸湖淪淪岸也浸湖淪是時雨初霽懸瀑垂天紳天或作大方云宋之問詩雨巖天作帶雲壑樹披衣孟東野詩亦常用天紳字前年往羅浮羅浮山在廣州曾城博羅二縣之境步戞南海漘音脣補注水際也大哉陽徳盛榮茂恒留春鵬鶱墮長翮鶱或作騫方云鶱從鳥虛言切飛舉也從馬者起䖍切虧也今字多誤用故詳之}
