  - {type: variant, offset: 16396, length: 1, content: 黎, SBCK: 􅀺}
  - {type: variant, offset: 16398, length: 0, content: '', WYG: 在徐州從喪朝至洛方無朝字洛下有陽字軍今按朝至洛盖用洛誥語又下文云日西入門則此當作朝至洛明矣還走不及停還或作旋假道經盟津出入行澗岡日西入軍門羸馬顛且僵音姜仆也主人願少留延入陳壺觴卑賤不敢辭忽忽心如狂飲食豈知味絲竹徒轟轟平明脱身去决若驚鳬翔黄昏次汜音似氾水在河南城臯縣水欲過無舟航過或作濟號呼久乃至夜濟十里黄中流上灘潬灘方作沙潬或作澤方云郭璞曰江東人呼水中沙堆為潬潬即灘也今按下句便有沙字恐只當作灘二字複出如上句言舟航之類沙水不可詳驚波暗合沓星宿爭翻芒轅馬蹢躅鳴諸本或作馬乏復悲鳴或作馬蹢濁鳴悲左右泣僕童甲午憇時門左傳昭十九年鄭大水龍鬬于時門之外洧淵柱氏注云時門鄭城門也臨泉窺鬬龍東南出陳許陂澤平茫茫方作茫茫平云用古韵勢今按此詩固用古韵然皆因其語之自然未嘗作意捨此而用彼也諸本只作陂澤平茫茫韵與語恊本無不可若作陂澤茫茫平却覺不響不應以欲用古韵之故牽挽而强就之也又按别本平或作路又或作何者語意尤勝讀者詳之道邊草木花紅紫相低昻百里不逢人角角雄雉鳴角方云音谷見集韵雄雉或作雉雛行行二月暮乃及徐南疆下馬步堤岸上船拜吾兄洪曰公有三兄皆早世見于集中者雲卿之子俞紳卿之子岌皆公從兄或曰吾兄謂張籍非也誰云經艱難艱或作險百口無夭殤或作横方云楚詞强死者子為國殤三字全語意見列僕射南陽公張建封也宅我陮音綏水名在徐州孫云二月未公至徐州泗濠節度使張建封以公為節度推官祝曰公與孟東野書云主人與余有故居余符離睢上即此也水陽篋中有餘衣盎烏浪切盆也中有餘糧閉門讀書史讀或作閲窻戸忽已凉諸本多作清風窻户凉或作窻戸風已凉或作窻户清風凉今按公以二月末到徐不知此詩何時作若夏即當作清風窻户凉若秋即當作窻户風已凉日念子來遊子豈知我情别離未為久辛苦多所經對食每不飽共言無倦聽連延三十日晨坐達五更我友二三子友方作有宦遊在西京東野窺禹穴李翺觀濤江蕭條千萬里㑹合安可逢淮之水舒舒楚山直叢叢子又舍我去我懐焉所窮焉或作安男兒不再壯百嵗如風狂方作狂風只今按方亦强用古韵之過不如作風狂語勢尤徤髙爵尚可求無為守一鄉幽懐幽懐不能冩能或作可行此春江潯音尋水涯選弭節乎江潯適與佳節㑹士女競光隂凝䊋耀洲渚繁吹蕩人心人方作神非是間闗林中鳥亦知和為音諸本作知時為和音非是然今本疑亦有誤或恐為是其字豈無一罇酒自酌還自吟但悲時易失四序迭相侵我歌君子行視古猶視今君子法天運君子法天運四時可前知可或作毎小人唯所遇寒暑不可期利害有常勢取捨無定姿焉能使我心皎皎逺憂疑落葉一首送陳羽或作葉落篇首同非是落葉不更息斷蓬無復歸飄颻終自異邂逅暫相依悄悄深夜語悠悠寒月輝誰云少年别流涙各霑衣歸彭城天下兵又動太平竟何時訏音吁大也謨者誰子無乃失所宜前年闗中旱閭井多死飢方作饑去嵗東郡水郡或作洛方云非也舊紀貞元十五年秋鄭滑大水}
