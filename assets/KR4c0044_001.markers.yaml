  - {type: variant, offset: 16399, length: 2, content: 集卷, WYG: 民為流屍上天不虛應禍福各有隨我欲進短䇿無由至彤墀彤或作丹刳肝以為紙瀝血以書辭上言陳堯舜下言引龍䕫言詞多感激文字少葳蕤上音逶下音緌盛貌選文物共葳蕤葳或作萎方云紛葳蕤以馺遝見陸機文賦今按葳蕤已見楚詞一讀已自怪再尋良自疑食芹説文芹楚葵也列子宋有田夫自曝於日謂其妻曰負日}
  - {type: variant, offset: 16402, length: 0, content: '', WYG: 暄人莫知者以獻吾君將有重賞又有喜食芹者對鄉豪稱之鄉豪取而嘗之蟄於口慘於腹衆哂而怨之其人大慙晉山濤為吏部郎舉嵇康自代康恨不知已移書責之曰野人有快炙背而美芹欲獻之至尊雖有區區之意亦已踈矣顧足下多似之雖云美獻御固已癡緘封在骨髓耿耿空自竒昨者到京城屢陪髙車馳周行多俊異議論無瑕疵見待頗異禮未能去毛皮到口不敢吐徐徐俟其􅇖虚冝切揚子曰􅇖可扺乎􅇖罅隙也歸來戎馬閒驚顧似覉雌孤雌也枚乘曰日暮則迷鳥覉雌宿焉連日或不語終朝見相欺相方曰我見相或作相見疑今按此三家三本皆有誤乘閒輙騎馬茫茫詣空陂遇酒即酩酊君知我為誰醉後煌煌東方星奈此衆客醉初喧或忿爭或作紛争方作争紛中静雜嘲戲雜或作惟方云雜以嘲戲選典論全語淋漓身上衣漓或作浪顛倒筆下字人生如此少酒賤且勤置醉贈張秘書方云今本下或注徹字徹元和四年進士此詩元和初作徹猶未第公五六年間皆在東都此詩盖在長安日作非徹也人皆勸我酒我若耳不聞今日到君家呼酒持勸君為此座上客方作士非是及余各能文君詩多態度藹藹春空雲東野動驚俗天葩吐竒芬張籍學古淡軒鶴避雞羣鶴方及諸本皆作昂鶴今按此言張籍學古淡而不驚於綺靡如以乘軒之而反避鷄羣也又軒鶴乃與天葩之句相偶阿買趙堯夫曰或問魯直阿買是退之何人答云退之姪必有據而云不識字頗知書八分樊曰秦壊古文有八體其}
