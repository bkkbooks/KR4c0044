  - {type: variant, offset: 12616, length: 0, content: '', WYG: 辭絶共悽然自説經今六百年當時萬事皆眼見不知幾許猶流傳爭持酒食來相饋禮數不同樽俎異月明伴宿玉堂空骨冷魂清無夢寐夜半金雞啁哳陟鎋切又陟頡切鳴火輪飛出客心驚人間有累不可住依然離别難為情船開棹進一廻顧萬里蒼蒼烟水暮世俗寜知偽與真至今傳者武陵人東方半明韓曰此詩與煌煌東方星興寄頗同盖指順宗即位不能親政而憲宗在東宫之時也樊曰公億昨行所謂伾文未剪崖州熾雖得赦宥常愁猜近者三姦悉破碎羽穴無㡳幽黄能義與此詩同惟此詩曰東方半明所以㣲其詞如此盖風人之託物也東方半明大星没半或作未方以閤本云洪慶善曰舊本作半明今蜀本題語亦作半明既云大星没則不應未明也傳本多習於詩人成語而不攷其意義故也獨有太白配殘月嗟爾殘月勿相疑同光共影須㬰期殘月暉暉太白睒睒音挾太元經明復睒天中獨爛也或作睒睒方云字當从日雞三號音毫杜詩曰初鳴度必三更五㸃贈唐衢集註衢從退之遊舊史附公傳末新史削之舊史云衢應進士久而不第能為歌詩意多感激見人文章有所傷激讀訖必哭涕泗不能巳毎與人言論既别發聲一號音辭悲切聞者莫不涕下故世稱唐衢善哭白樂天亦甞贈以詩略云賈誼哭時事阮籍哭路岐唐生今亦哭異代同其悲虎有爪兮牛有角虎可搏兮牛可觸奈何君獨抱竒材手把鋤犂餓空谷當今天子急賢良匭函孫曰唐武后垂拱二年命銅為匭置之廟堂東曰延恩南曰招諫西曰伸寃北曰通𤣥朝出開明光漢殿名也胡不上書自薦達坐令四海如虞唐貞女峽連州桂陽縣江盤峽束春湍豪雷風戰闘魚龍逃懸流轟轟射水府一㵼百里翻雲濤漂船擺補買切間也石萬瓦裂咫尺性命輕鴻毛鴻或作於或作如贈侯喜吾黨侯生字叔􅙝或作起方云起之古文也呼我持竿釣温水洛水在河南易乾鑿度曰王者有盛徳之應則洛水先温故號温洛平明鞭馬出都門盡日行行荆棘裏温水㣲茫絶又流深如車轍闊容輈蝦蟇跳過雀兒浴此縱有魚何足求我為侯生不能已盤針擘粒投泥滓晡時堅坐到黄昏到或作至手倦目勞方一起暫動還休未可期蝦行蛭音質水蛭也賈誼曰夫豈從蝦與蛭螾渡似皆疑舉竿引線忽有得一寸纔分鱗與鬐音頎莊子曰驚揚而奮鬐或作鰭今按鬐馬鬛也當作鰭然莊子作鬐則亦可通用也是日侯生與韓子良久歎息相看悲我今行事盡如此此事正好為吾規半世遑遑就舉選一名始得紅顔衰始或作已非是人間事勢豈不見徒自辛苦終何為便當提㩗妻與子南入箕潁箕山名潁水名許由巢父隠處無還時叔􅙝君今氣方鋭我言至切君勿嗤君欲釣魚須逺去大魚豈肯居沮洳上音疽下音茹漸濕地肯或作有非是古意韓曰華山記云山頂有池生千葉蓮花服之羽化因曰華山觀公詩意與前詩皆有興寄其曰古意㫖深逺矣而孫氏引李肇國史補言愈好竒登華山絶峯發狂慟哭沈顔作登華㫖畧曰仲尼悲麟悲不在麟也墨翟泣絲泣不在絲也又引公答張徹詩云洛邑得休告華山窮絶陘以實國史補之云質之校本乃大不然姑存之太華胡化切峯頭玉井蓮開花十丈藕如船冷比雪霜甘比蜜一片入口沈痾痊我欲求之不憚逺青壁無路難夤縁方从唐本作五月壁路難攀縁云鮑溶集有陪公登華山詩盖五月也夤或作攀今按公此詩本以古意名篇非登山紀事之詩也且太華之險千古屹立所謂削成五千仞者豈獨五月然後難攀縁哉若以句法言之則五月壁路之與青壁無路意象工拙又大不侔亦不待識者而知其得失矣方氏泥于古本牽于旁証而不尋其文理乃去此而取彼其亦誤矣原其所以盖縁五月本是青字唐本誤分為二而讀者不曉因復削去無字遂成此謬今以諸本為正安得長梯上摘實下種七澤司馬相如子虛賦楚有七澤其小者名雲夢方九百里根株連列}
