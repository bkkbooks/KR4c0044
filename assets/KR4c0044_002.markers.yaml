  - {type: variant, offset: 12614, length: 1, content: 卷, WYG: 别本韓文考異巻二欽定四庫全書别本韓文考異巻三宋王伯大重編古詩河之水二首寄子姪老成河之水去悠悠我不如水東流我有孤姪在海陬或作隅方云古音隅五侯切分與流通三年不見兮使我生憂日復日夜復夜三年不見汝使我鬢髮未老而先化河之水悠悠去我不如水東注我有孤姪在海浦三年不見兮使我心苦采蕨于山緡武中切韓曰釣魚繳魚于淵方作泉今按以淵為泉避諱也依例當作􅘢我徂京師不逺其還其或作而山石山石犖确上力角切下音覺磽确也行徑㣲黄昏到寺蝙蝠上布田切下甫服切伏翼也一名仙䑕飛昇堂坐階新雨足或作定非是芭蕉葉大支即梔字子肥僧言古壁佛畵好以火來照所見稀所見或作見所非是鋪牀拂席置羮飯踈糲蘭末切糲麄而粺精列子食則粢糲亦足飽我飢夜深静卧百蟲絶清月出嶺光入扉天明獨去無道路出入髙下窮烟霏山紅澗碧紛爛漫時見松􅇫皆十圍􅇫或作櫟方云選南都賦楓槐櫨􅇫李善曰􅇫與櫟同當流赤足蹋澗石水聲激激風吹衣吹或作生人生如此自可樂或作可自得自可方作自得或作可自皆非是豈必局束為人鞿音饑馬絡也楚詞今雖好修姱以鞿覊兮注韁在口曰覊前漢是猶以鞿而御悍突為人鞿言為人所拘縶也嗟哉吾黨二三子安得至老不更歸天星送楊凝郎中賀正天星牢落雞喔咿上音渥下音伊雞聲也僕夫起餐車載脂脂以滑車正當窮冬寒未巳借問君子行安之㑹朝元正無不至受命上宰須及期侍從近臣有虛位公今此去歸何時或作何時歸汴泗交流贈張僕射建封貞元十五年公在徐州張建封幕汴水徐之西泗水徐之南故以名篇汴泗交流郡城角築場千步平如削築或作斸方云詩九月築場圃謂築堅以為場也短垣三面繚逶迤擊鼓騰騰樹赤旗新秋朝凉未見日秋或作雨公早結束來何為分曹决勝約前定百馬攅在丸切聚也蹄近相映毬驚杖奮合且離紅牛纓紱黄金羈側身轉臂著馬腹霹靂應手神珠馳超遥散漫兩閒暇揮霍奮迅也枚乘曰蜿墠揮霍紛紜争變化發難得巧意氣麤讙聲四合壯士呼此誠習戰非為劇豈若安坐行良圖當今忠臣不可得公馬莫走須殺賊忽忽忽忽乎余未知生之為樂也生之為方作為生之非是願脱去而無因安得長翮大翼如雲生我身乘風振奮出六合絶浮塵死生哀樂兩相棄是非得失付閒人鳴鴈公在徐州與孟東野書有曰去年脱汴州之亂遂來于此主人與余有故居余符離睢水上及秋將辭去云云主人謂張建封公在徐鬱鬱不得志見於書與詩者如此嗷嗷鳴鴈鳴且飛上鳴字或作鴻窮秋南去春北歸去寒就暖識所依或作處非是天長地闊棲息稀風霜酸苦稻梁鴻鴈前輩多使稲梁事盖出戰國䇿廣絶交論云分鴈騖之稲梁又杜甫詩自古稻梁多不足㣲毛羽摧落身不肥毛羽或作羽毛徘徊反顧羣侣違哀鳴欲下洲渚非江南水濶朝雲多朝方作朔矣今按既云江南則不應言朔雲兼作朝雲語亦差響草長沙軟無網羅閑飛静集鳴相和違憂懐惠性匪他惠一作息凌風一舉君謂何龍移此詩謂南山湫也湫初在平地一日風雷移居山上其山下湫遂化為土公題炭谷詩曰厭處平地上巢居挿天山天昏地黑蛟龍移雷驚電激雄雌隨激或作撃方云雷奔電激班固西都賦語雄雌或作雌雄清泉百丈化為土魚鱉枯死吁可悲雉帶箭此詩公佐張僕射于徐從獵而作也讀之其狀如在目前盖冩物之妙者原頭火燒静兀兀野雉畏鷹出復没出復方作伏欲而今按雉出復没射者彎弓不肯輕發正是形容持滿命中之巧毫釐不差處改作伏欲神采索然矣將軍欲以巧伏人盤馬彎弓惜不發地形漸窄觀者多雉驚弓滿勁箭加衝人决起百餘尺紅翎白鏃作木切相傾斜將軍仰笑軍吏賀五色爾雅雉五色皆備曰暈離披馬前墮條山蒼歐本注云中條山在黄河之曲今蒲中也條山蒼河水黄浪波沄沄去浪波或作波浪松栢在山岡山或作高贈鄭兵曹罇酒相逢十載前君為壯夫我少年罇酒相逢十載後我為壯夫君白首我材與世不相當戢鱗委翅無復望當今賢俊皆周行君何為乎亦遑遑亦或作獨盃行到君莫停手破除萬事無過酒桃源圖孫曰武陵郡朗州國朝改為鼎州洪曰淵明叙桃源初無神仙之説梁任安貧為武陵記亦祖述其語耳淵明云先世避秦時亂而安貧云曩以避秦人之亂邑人相率携妻孥隠此厥後絶不外通何人世之多遷貿也後人不深考因謂秦人至晉猶不死遂以為地仙洪駒父云荆公桃源行東坡和桃源詩皆得之王摩詰退之劉夢得諸人以為神仙者非是神仙有無何眇芒或作渺茫桃源之説誠荒唐流水盤廻山百轉生綃數幅垂中堂武陵晉太康中武陵人捕魚從溪行忘路逺近逢桃林夾岸無雜花果云秦人避世于此太守好事者題封逺寄南宫下南宫先生忻得之波濤入筆驅文辭文工畫妙各臻極異境怳惚移於斯架巖鑿谷開宫室接屋連墻千萬日嬴顛劉蹶了不聞地坼天分非所恤種挑處處惟開花川原近逺蒸紅霞近逺或作逺近初來猶自念鄉邑嵗久此地還成家漁舟之子來何所物色相猜更問語大蛇中斷喪前王羣馬南渡開新主聽}
