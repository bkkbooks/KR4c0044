  - {type: variant, offset: 0, length: 3145, content: 朱文公校昌黎先生集卷之二考異音釋附古詩北極一首贈李觀北極有羇羽南溟有沈鱗川源浩浩隔影響兩無因風雲一朝㑹變化成一身誰言道里逺里方作理非是陶詩云不怨道里長正作里感激疾如神我年二十五求友昧其人哀歌西京市乃與夫子親所尚苟同趨尚或作向趨方云孟子云三子者不同道其趨一也注趨讀如趣賢愚豈異倫方爲金石姿萬丗無緇磷音鄰無爲兒女態兒女或作女兒非是燋悴悲賤貧此日足可惜一首贈張籍洪曰此詩雜用韻又疊用韻歐陽公云退之工於用韻得寛韻則波瀾橫溢泛入傍韻如此日足可惜之類是也得窄韻則不復旁出因難見巧如病中贈張十八之類是也此日足可惜此酒不足嘗不足或作不可捨酒去相語去方作須今按湏字無理或是復字傳寫誤尓共分一日光念昔未知子孟君自南方自矜有所得言子有文章我名屬相府欲徃不得行或作驤思之不可見百端在中腸維時月魄死冬日朝在房韓曰朝旦也月令孟冬之月日在房驅馳公事退聞子適及城或作墻方云此詩視古用韻不入今韻者多爲後斈以意妄改呉才老云詩人用行字韻二十有五無叶今讀者此詩後用東去趍彭城諒知有所成皆庚韻也何獨於此疑之命車載之至引坐於中堂開懷聽其說往往副所望音亡孔丘殁巳逺仁義路乆荒紛紛百家起詭怪相披猖乱也長老守所聞後生習爲常少詩詔切知誠難得純粹古巳亡古一作固譬彼植園木有根易爲長留之不遣去館置城西旁歳時未云幾浩浩觀湖江未或作来江或作湘非是方云植園木以喻籍之始从斈也觀湖江以喻其成也衆夫指之笑謂我知不明兒童畏雷電魚鼈驚夜光州家舉進士選試繆所當馳辭對我䇿章句何煒音偉光也煌相公董晋也朝服立工席歌鹿鳴禮終樂亦闋苦穴切終也記曰爵卒而楽闋相拜送於庭之子去須臾赫赫流盛名竊喜復竊嘆竊喜復或作慷慨仍諒知有所成人事安可恒奄忽令我傷聞子髙第日正從相公䘮孫曰正元十五年髙郢知㪯籍登第是歳三月晋卒愈護其䘮行哀情逢吉語倘怳上音敞下許昉切𥙷注相如曰聽敞怳而亡聞注耳不諦也惝或作敞方云楚詞逺遊作惝怳相如傳作敞怳難爲雙暮宿偃師縣名今在洛州西徒展轉在牀諸本作展轉在空床仐按或當从諸本夜聞汴州亂遶壁行徬徨我時留妻子時留或作乃弃倉卒不及將相見不復期零落甘所丁驕兒未絶乳念之不能忘忽如在我所或作其側所或作前或作側耳若聞啼聲中途安得返一日不可更俄有東來說我家免罹殃乗船下汴水東去趨彭城徐州地孫曰公妻子先在徐州從䘮朝至洛方無朝字洛下有陽字今按朝至洛盖用洛誥語又下文云日西入軍門則此當作朝至洛明矣還走不及停還或作旋假道經盟津出入行澗岡日西入軍門羸馬㒹且僵音姜什也主人願少留延入陳壷觴卑賤不敢辭忽忽心如狂飲食豈知味絲竹徒轟轟平明脫身去决若驚鳬翔黄昏次汜音似汜水在河南城皐縣水欲過無舟航過或作濟號呼乆乃至夜濟十里黄中流上灘潬灘方作沙潬或作澤方云郭璞曰江東人呼水中沙堆為潬潬即灘也今按下句便有沙字恐只當作灘二字複出如上句言舟航之類沙水不可詳驚波暗合沓星宿爭翻芒轅馬蹢躅鳴諸本或作馬乏復悲鳴或作馬蹢濁鳴悲左右泣僕童甲午憩時門左傳昭十九年鄭大水龍鬪于時門之外洧渊杜氏注云時門鄭城門也臨泉窺闘龍東南出陳許陂澤平茫茫方作茫茫平云用古䪨今按此詩固用古䪨然皆因其語势之自然未甞作意捨此而用彼也諸本只作陂澤平茫茫韵諸語恊本無不可若作陂澤茫茫平却斍不響不應以欲用古韵之故牽挽而強就之也又按别本平或作路而或作何者語意尤勝讀者詳之道邊草木花紅紫相低昻百里不逢人角角雄雉鳴角方云音谷見集韵雄雉或作雉雛行行二月暮乃及徐南疆下馬歩堤岸上船拜吾兄洪曰公有三兄皆早丗見於集中者雲卿之子俞紳卿之子岌皆公從兄或曰吾兄謂張籍非也誰云經艱難艱或作險百口無夭殤或作横方云楚詞強死者為國殤三字全語亦見列子僕射南陽公張建封也宅我睢音綏水名在徐州孫云二月末公至徐州泗濠節度使張建封以公爲節度推官祝曰公與孟東野書云主人與余有故居余符離睢上即此也水陽篋中有餘衣盎烏浪切盆也中有餘糧閉門讀書史讀或作閱䆫戸忽巳凉諸本多作清風䆫户凉或作䆫户風已涼或作䆫户清風凉今按公以二月末到徐不知此詩何時作若夏即當作清風䆫户凉若秋即當作䆫户風巳凉日念子來遊子豈知我情别離未爲乆辛苦多所經對食毎不飽共言無倦聽連延三十日晨坐逹五更我友二三子友方作有宦遊在西京東野窺禹穴李翶觀濤江蕭條千萬里㑹合安可逢淮之水舒舒楚山直叢叢子又捨我去我懷焉所窮焉或作安男兒不再壯百歳如風狂方作狂風今按方亦強用古韻之過不如只作風狂語势尤徤髙爵尚可求無爲守一郷幽懷幽懷不能寫能或作可行此春江潯音尋水涯選弭節乎江潯適與佳節㑹士女競光隂凝䊋耀洲渚䌓吹蕩人心人方作神非是閒關林中鳥亦知和爲音諸本作知時爲和音非是然今本疑亦有誤或恐爲是其字豈無一罇酒自酌還自吟但悲時易失四序迭相侵我歌君子行視古猶視今君子法天運君子法天運四時可前知可或作毎小人惟所遇寒暑不可期利害有常勢取捨無定姿焉能使我心皎皎逺憂疑落葉一首送陳羽或作葉落篇首同非是落葉不更息㫁蓬無復歸飄颻終自異邂逅暫相依悄悄深夜語悠悠寒月輝誰云少年别流淚各霑衣歸彭城天下兵又動太平竟何時訏音吁大也謨者誰子無乃失所宜前年關中旱閭井多死飢方作饑去歳東郡水郡或作洛方云非也舊紀貞元十五年秋鄭滑大水生民爲流屍上天不虚應禍福各有隨我欲進短䇿無由至彤墀彤或作丹刳肝以爲紙瀝血以書辭上言陳堯舜下言引龍䕫言詞多感激文字少葳蕤上音逶下音緌盛皃選文物共葳蕤葳或作萎方云紛葳㽔以馺遝見陸機文賦今按葳蕤巳見楚詞一讀巳自怪再尋良自疑食芹說文芹楚葵也列子宋有出大自曝於日謂其妻曰負日之暄人莫知者以献吾君將有重賞又有喜食芹者對郷豪稱之郷豪取而嘗之蜇於口慘於腹衆哂而怨之其人大慙晋山濤為吏部郎㪯嵇康自代康恨不知巳移書責之曰野人有快炙背而美芹欲献之至尊雖有區區之意亦巳踈矣願足下勿似之雖云美獻御固巳癡緘封在骨髓耿耿空自竒昨者到京城屢陪髙車馳周行多俊異議論無瑕疵見待頗異禮未能去毛皮到口不敢吐徐徐俟其巇虚宜切楊子曰巇可抵乎巇罅隙也歸來戎馬閒驚顧似覉雌孤雌也枚乗曰日暮則迷鳥覉雌宿焉連日或不語終朝見相欺相方作我見相或作相見今按此三家三本疑皆有誤乗閒輙騎馬茫茫詣空陂遇酒即酩酊君知我爲誰醉後煌煌東方星柰此衆客醉𥘉喧或忿爭或作紛爭方作爭紛中静雜嘲戲雜或作惟方云雜以嘲戯選典論全語淋漓身上衣漓或作浪顚倒筆下字人生如此少酒賤且勤置醉贈張秘書方云今本下或注徹字徹元和四年進士此詩元和𥘉作徹猶未第公五六年間皆在東都此詩盖在長安日作非徹也人皆勸我酒我若耳不聞今日到君家呼酒持勸君爲此座上客方作士非是及余各能文君詩多態度藹藹春空雲東野動驚俗天葩吐竒芬張籍學古淡軒鶴避雞群鶴方及諸本皆作昻今按此言張籍斈古淡而不驚於綺靡如以乗軒之鶴而反避雞羣也又軒鶴乃與天葩之句相偶阿買趙堯夫曰或問魯直阿買是退之何人荅云退之姪必有據而云不識字頗知書八分樊曰秦壞古文有八體其一隷書今八分也詩成使之寫亦足張吾軍所以欲得酒爲文俟其醺酒味旣冷冽酒氣又氛氲上音芬下於云切祝云氣也冷或作冷氣或作煙氛或作氤方云氛氲盛皃字見選雪賦性情漸浩浩諧笑方云云此誠得酒意餘外徒􅌭紛亂也長安衆冨兒盤饌羅羶葷音熏臭菜不解文字飲惟能醉紅裙雖得一餉樂有如聚飛蚊今我及數子固無蕕與薫險語破鬼膽補注開元天寳遺事李果爲洛陽令有劉兼者過其境夜聞人外語声曰古今正人李令是也见其行事令人破瞻開户視之無物乃鬼神也髙詞嫓匹詣切祝曰爾雅妃嫓也注相偶嫓也嫓或作動皇墳至寳不雕琢或作瑑神功謝鋤耘方今向太平元凱承華勛吾徒幸無事庶以窮朝曛音薫日入也同冠峽南方二月半春物亦巳少維舟山水間晨坐聽百鳥宿雲尚含姿朝日忽升曉羇旅感和鳴囚拘念輕矯和鳴或作陽和方云和鳴輕矯皆指百鳥而言也潺湲淚乆迸乆或作交詰曲思増繞行矣且無然蓋棺事乃了送惠師惠師浮屠者乃是不羇人鄒陽上呉王書使不羇之士與牛馬同皂注不羇無所拘繫也又司馬迁傳少負不羇之才十五愛山水超然謝朋親或作同隱淪脫冠翦頭髮頭或作短按下對蹤塵當作頭髮飛歩遺蹤塵飛或作孤發跡入四明梯空上秋旻遂登天台望韓日天台山名在台州衆壑皆嶙峋上音鄰下音荀深崖皃選階楯峋嶙, WYG: ''}
