  - {type: variant, offset: 8572, length: 1, content: 颷, WYG: 建瓴水言其易也捜竒日有富嗜善心無寜石梁平侹侹音挺説文長貌沙水光泠冷乘枯摘野豔沈細抽潜腥遊寺去陟巘陟或作登尋徑返穿汀徑或作巫非是縁雲竹竦竦失路麻㝠㝠滛潦忽翻野平蕪眇開溟防泄塹夜塞懼衝城晝扃及去事戎轡相逢宴軍伶孫曰伶樂官軍伶軍中樂觥秋縱兀兀獵旦馳䮐䮐古螢切祝曰馬腹幹肥張旦或作晏從賦孫曰謂徹赴舉試也漢書以臣錯充賦始分手朝京忽同舲音零舡有忩牖樊曰是年以徐州從事朝正京師與徹同行急時促暗棹戀月留虛亭畢事駈傳馬安居守忩螢梅花灞水别宫燭驪山醒驪力馳切韓曰杜詩軍吏囘宫燭筆墨間録曰劉澗云酒醒極有風味省選逮投足鄉賔尚摧翎音零鳥羽樊曰二句謂徹下第也塵祛又一摻所咸切詩曰摻執子之手兮孫曰摻􅅂執􅃑而别也淚眥音漬目際也列子拂眥揚眉而望之還雙熒洛邑得休告華山窮絶陘音形連山中絶倚岩睨海浪引袖拂天星日駕此迴轄金神所司刑泉紳拖脩白石劔攅髙青磴都鄧切岩磴選石磴㵼紅泉蘚澾音闥孫云澾滑也拳跼音局韓曰踡跼楚辭云踡跼顧而不行梯飈}
