  - {type: variant, offset: 7014, length: 1, content: 爲, WYG: 為别本韓文考異巻六欽定四庫全書别本韓文考異巻七宋王伯大重編古詩雪後寄崔二十六丞公斯立藍田十月雪塞闗我興南望愁羣山攅天嵬嵬凍相映嵬嵬諸本作崔嵬君乃寄命於其問秩卑俸薄食口衆豈有酒食開容顔殿前羣公賜食罷驊騮周穆王馬蹋路驕且閑稱多量少鑒裁宻豈念幽桂遺榛菅上音臻下音官榛或作蓁幾欲犯嚴出薦口氣象硉兀上盧骨切硉兀髙亢皃兀或作矹未可攀歸來殞涕揜闗卧心之紛秩誰能刪詩翁憔悴斸荒棘斸陟王切斫也時元和十年十月孟郊已死洪曰詩翁指孟郊也清玊刻佩聯玦環玦古宂切韓曰玦如環而玦肉好如一謂之環孫曰三者喻孟郊詩之工也腦脂遮眼卧壯士洪曰謂張籍病眼大弨蚩招切弓弛也挂壁無由彎挂方作擐云擐貫也言擐于壁而不用也或作擐臂乾坤施惠萬物遂獨於數子懐偏慳朝欷詐計香衣二切戲欷也暮唶唶子夜切嘆也祝曰後漢遥望見春陵郭唶曰氣佳哉選咄唶令心悲不可解我心安得如石頑送僧澄觀浮屠西來何施為擾擾四海爭奔馳構樓架閣切星漢誇雄鬬麗止者誰僧伽樊曰李邕泗州普光王寺碑僧伽者龍朔中西來嘗縱觀臨淮發念置寺既成中宗賜名普光王以景龍四年三月二日示滅於京洪曰李太白僧伽歌云此僧本住南天竺為法頭陀來此國又云嗟子落泊江淮久罕遇真心說空有葢相遇于江淮也太白于豪傑中識郭子儀隠逸中識司馬承􅐃浮屠中識僧伽則其人可知後出淮泗上淮方作雄云雄言特出也今按上句巳有誇雄宇下句又云尤恢奇則此作雄非是勢到衆佛尤恢奇恢或作魁方云恢奇字見史記公孫洪傳此詩今本以恢為魁又惡上語意同遂易雄為淮非也今按作恢亦不免與上句相犯况淮之不可為雄自避上句誇雄字初不專為此耶越商胡賈脫身罪或作獻今從謝校珪璧滿船寧計資清淮無波平如席欄柱傾扶半天赤火燒水轉掃地空突兀便髙三百尺影沉潭底龍驚遁當晝無雲跨虛碧借問經營本何人道人澄觀名籍籍愈昔從軍大梁下徃來滿屋賢豪者屋或作日方云滿屋字見世說皆言澄觀雖僧徒公才吏用當今無後從徐州辟書至紛紛過客何由記人言澄觀乃詩人人言或作又言一座競吟詩句新向風長歎不可見我欲收歛加冠巾洛陽窮秋厭窮獨丁丁啄門疑啄木啄門或作打門疑或作如有僧來訪呼使前伏犀孫曰伏犀謂骨當額上入髪際韓曰伏犀貴相李固頂骨匿犀後為太尉即此揷腦髙頰權或作顴方从杭蜀本云選洛神賦𢎞敏俳文髙權長頭髙權古字只作權刋本不深考也頰古叶切靣頰也權輔骨也選輔承權頰惜哉已老無所及坐睨神骨空澘音刪然臨淮太守謂泗州刺史初到郡逺遣州民送音問好奇賞俊直難逢直或作實去去為致思從容山南鄭相公樊員外酬答為詩其末咸有見及語樊封以示愈依賦十四韻以獻鄭餘慶樊宗師也宗鄭餘慶元和九年為山南西道節度使樊師為副李肇國史補曰元和以後為文奇詭則學於韓愈苦澁則學于樊宗師公此詩及宗師墓誌語奇而澁皆所以效其體也梁維西南屏維或作惟山厲水刻屈禀生肖勦剛勦音巢輊㨗也方云荆公山谷本作勁云難諧在民物榮公鼎軸老方云餘慶封滎陽郡公作滎者非烹幹烹謂烹擊幹謂幹旋猶言宰制也力徤倔渠勿切强也幹或作鮮非是帝咨女予徃牙纛前􅽛坲上蒲悶切下音佛或作拂方云佛哱塵起貌字見楚辭九歎威風挾惠氣葢壤兩劘拂方云劘音摩子虛賦上摩蘭蕙下拂羽葢文選作靡賈山傳贊自下劘上序傳只作摩古摩靡劘字皆通用揚子劘虎牙莊子喜則交頸相靡漢衡山王贊臣下漸靡使然今集韻摩下不出靡字非也拂諸本作刜茫漫華黒閒指畫變怳歘許忽切暴起也即忽字華黑或作筆墨非是方云華陽黑水惟梁州謂山南所領也誠既富而美章彚音胃文采也霍炳蔚日延講大訓龜判錯衮黻孫曰定公八年公羊傳寳者何璋判白弓繡質龜青純何休注判半也半圭曰璋白藏天子青藏諸矦故曰判龜判謂圭玉也衮龍衮衣黻者繡兩已相背于裳也龜判言其所執衮黻言其所服錯雜也言講大訓者之多錯雜如此樊子坐賔署演孔刮老佛刮或作亂方云字見劇秦文金舂撼玊應孫曰舂撞也金玉相應以况樊鄭唱酧之作也厥臭香氣也劇蕙鬱欝金香草遺我一言重跽巨已切長跪受惕齋慄辭慳義卓濶孫曰言詞約而義富呀豁疚掊掘疚或作疾方云疚勞也呀虛加切掊彼垢切掘渠勿切掊擊也掘掘地也孫曰呀豁隙竅也因其隙竅疾加掊掘掊掘者討究也如新去耵矃雷霆逼􅄓䫻于聿切孫曰言讀此詩如新去耳中垢却聞雷霆􅄓䫻言驚恐不定也新或作初耵矃並上聲方云盯矃耳垢也从日非􅄓或作颷或作䬖䬖字書未見或與䬝同綴此豈為訓俚言紹莊屈此或作作孫曰言我綴此答詩豈以為訓乎俚下之言聊以紹莊周屈原而巳奉和武相公鎮蜀時詠使宅韋太尉所養孔雀武元衡韋臯也諸本無奉字穆穆鸞鳯友何年來止兹飄零失故態隔絶抱長思翠角髙獨聳金華煥相差坐䝉恩顧重畢命守堦墀感春三首作于元和十一年三月為中書舍人時也偶坐藤樹下暮春下旬間藤隂巳可庇蘂落還漫漫亹亹音尾翠色貌新葉大瓏瓏花落聲晚花乾青天髙寥寥兩蝶飛翻翻或作翩翩或作翩翻時節適當爾懐悲自無端黄黃蕪菁花孫曰方言云豐蕘蕪菁也陳楚謂之豐齊魯謂之蕘闗西謂之蕪菁趙魏之間謂之大芥蕪菁即蔓菁也桃李事巳退狂風簸枯榆音俞木名白枌也狼籍九衢内彺一作强春序一如此汝顔安足賴汝或作去誰能駕飛車相從觀海外孫曰飛車仙駕韓曰竒肱國人一臂能駕飛車从風逺行出山海經晨遊百花林}
