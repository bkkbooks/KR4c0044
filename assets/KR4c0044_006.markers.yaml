  - {type: variant, offset: 7023, length: 5, content: 文集卷之六, WYG: 友莫一在燕席死者長眇芒生者困乖隔生者或作生有少年真可喜老大百無益早赴街西行香贈盧李二中舍人盧汀李逢吉天街東西異祗命孫曰謂承詔也遂成游月明御溝曉御溝或作溝水蟬吟堤樹秋老僧情不薄僻寺境還幽寂寥二三子歸騎得相收寥或作寞晚寄張十八助教周郎博士張籍周况也或無郎字}
