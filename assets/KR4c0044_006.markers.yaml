  - {type: variant, offset: 7016, length: 6, content: 文公校昌黎先, WYG: 朱兼白白栁枝弱而細懸樹垂百尺樹或作對左右同來人金紫貴顯劇或作極嬌童為我歌哀響跨箏笛跨或作誇非是艶姬蹋筵舞清眸刺劒㦸孫曰言眸子清朗如劍㦸之刺心懐平}
