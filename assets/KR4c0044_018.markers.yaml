  - {type: variant, offset: 6042, length: 0, content: '', WYG: 欽定四庫全書别本韓文考異巻十九宋王伯大重編書序與鄭相公書鄭餘慶時鎮興元再奉示問皆縁孟家事樊曰元和九年三月以鄭餘慶為興元尹餘慶辟孟郊參謀郊挈其妻行至閿鄉因暴卒辭旨惻惻憂慮深逺竊有以見大人君子篤於仁愛終始不倦伏讀感欷不知所喻舊與孟徃還數人昨已共致百千已來尋已至東都計供葬事外尚有餘資今裴押衙所送二百七十千足以益業為遺孀音霜樊曰是嵗十月𦵏郊其費皆出鄭相及東野舊徃還者以其餘財贍給其家郊無子妻鄭氏永久之賴孟氏兄弟在江東未至先與相識亦甚循善所慮才幹不足任事鄭氏兄弟惟最小者在東都固如所示不可依仗孟之深友太子舎人樊宗師孟下或有氏字比持服在東都今已外除經營孟家事不啻如已前後人所與及裴押衙所送錢物並委樊舎人主之營致生業必能不失利宜候孟氏兄弟到分付成事庶可靜守無大闕敗伏惟不至逺憂續具一一諮報不宣諮或作咨愈再拜與袁相公書袁滋先鎮襄陽後鎮荆南不知此書的在何時也伏聞賓位尚有闕員幸蒙不以常輩知遇恒不自知愚且賤思有論薦竊見朝議郎前太子舎人樊宗師孝友聰明家故饒財身居長嫡悉推與諸弟諸弟皆優贍有餘而宗師妻子常寒露饑餒宗師怡然處之無有難色窮究經史章通句解至於隂陽軍法聲律悉皆研極原本又善為文章詞句刻深獨追古作者為徒不顧世俗輕重通微曉事可與晤語與或作以又習於吏職識時知變非如儒生文士止有偏長退勇守專未為宰物者所識年近五十遑遑勉勉思有所試閤下倘引而致之密加識察有少不如所言愈為欺罔大君子便宜得棄絶之罪於門下誠不忍竒寳横棄道側而閤下篋櫝尚有少闕不滿之處猶足更容輒冐言之退增汗懾篋或作匱方云無闕字謹狀與鄂州栁中丞書公綽時觀察鄂岳淮右殘孽尚守巢窟或作窟巢環宼之師殆且十萬瞋目語難方云此用荘子語杭蜀本作難語非自以為武人不肯循法度頡頏作氣勢竊爵位自尊大者肩相摩地相屬也不聞有一人援桴鼓誓衆而前者但日令走馬來求賞給助宼為聲勢而已日方作月閤下書生也詩書禮樂是習仁義是修法度是束一旦去文就武鼓三軍而進之陳師鞠旅親與為辛苦慷慨感激同食下卒將二州之牧樊曰元和十年詔公綽以兵五千隸安州刺史李聽討呉元濟公綽曰朝廷謂吾書生不知兵邪請自行許之引兵渡江抵安州聽以軍禮迎謁公綽謂曰以公世將曉兵吾且欲署職以兵法從事聽曰唯命以都知兵馬使軍中先鋒行營都虞候三牒受之選卒六千屬聽戒其部將曰行營事一决都將聽被恩威遂盡力當時服其知權士卒家有疾病公綽厚給之人皆感激故每戰皆捷以壯士氣斬所乘馬樊曰公綽所乘馬躡殺圉人公綽命殺馬以祭或曰圉人不自僃耳良馬可惜公綽曰馬材良性毒必殺之補註栁氏敘訓及新舊唐史並以殺為公綽為襄陽節度使時事司馬温公考異正引公此書証之云乃鄂岳時事以祭踶死之士踶夫計切又徒兮切一作蹄漢武帝詔馬奔踶而致千里雖古名將何以加兹此由天資忠孝鬱於中而大作於外動皆中於機㑹以取勝於當世而為戎臣師豈常習於威暴之事而樂其鬭戰之危也哉愈誠怯弱不適於用聽於下風竊自增氣誇於中朝稠人廣衆㑹集之中或無㑹集二字所以羞武夫之顔令議者知將國兵而為人之司命者不在彼而在此也而在方無而字臨敵重慎誡輕出入良用自愛以副見慕之徒之心而果為國立大功也幸甚幸甚不宣命或作用非是或無之徒二字方無下之字愈再拜又一首愈愚不能量事勢可否比常念淮右以靡弊困頓三州之地蚊蚋蟻蟲之聚感兇竪喣濡飲食之惠提童子之手坐之堂上奉以為帥出死力以抗逆明詔戰天下之兵乗機逐利四出侵暴屠燒縣邑賊殺不辜環其地數千里莫不被其毒洛汝襄荆許潁淮江為之騷然丞相公卿士大夫勞於圖議圖或作國非是握兵之將熊羆貙虎之士畏懦䠞將六切促也蹜莫肯杖戈為士卒前行者獨閤下奮然率先揚兵界上將二州之守親出入行間與士卒均辛苦生其氣勢見將軍之鋒頴凜然有向敵之意用儒雅文字章句之業取先天下武夫闗其口而奪之氣愚初聞時方食不覺棄匕箸起立豈以為閤下真能引孤軍單進與死宼角逐爭一旦僥倖之利哉真或作直非是或無單字就令如是亦不足貴其所以服人心在行事適機宜而風采可畏愛故也是以前狀輒述鄙誠眷惠手翰還答益增欣悚惠下或有賜字夫一衆人心力耳目使所至如時雨三代用師不出是道閤下果能充其言繼之以無倦得形便之地甲兵足用雖國家故所失地旬嵗可坐而得嵗或作月况此小宼安足置齒牙間勉而卒之以俟其至幸甚夫逺徴軍士行者有羇旅離别之思居者有怨曠騷動之憂本軍有饋餉煩費之難地主多姑息形迹之患急之則怨緩之則不用命浮寄孤懸形勢銷弱又與賊不相諳委臨敵恐駭難以有功若召募土人召或作占必得豪勇與賊相熟知其氣力所極無望風之驚愛䕶鄉里勇於自戰徴兵滿萬不如召募數千閤下以為何如儻可上聞行之否計已與裴中丞相見行營事宜不惜時賜示及幸甚不宣愈再拜答魏博田僕射書季冬極寒伏惟僕射尊體動止萬福即日愈蒙免蒙恩改職事不任感懼諸本無蒙免二字方從閣本今按蒙免者蒙田之庇而得遣免也連上文為句蒙恩者蒙上之恩而改職事也連下文為句使至奉十一月十二日示問欣慰殊深賛善十一郎行已附狀伏計尋上達愈雖未獲拜識嘗承僕射眷私猥辱薦聞待之上介事雖不允受賜實多頃者又蒙不以文字鄙薄令譔廟碑見遇殊常荷徳尤切安有書問稍簡遂敢自疎比所與楊書記書葢縁久闕附狀求因間粗述下情或無求字間或作閑今按此謂楊書記書因田之間為述已意也忽奉累紙示問辭意重疊捧讀再三但增慙悚僕射公忠賢徳為内外所宗位望益尊謙巽滋甚謬承知遇欣荷實深伏望照察限以官守拜奉未由無任馳戀謹因使廻奉狀不宣謹狀與華州李尚書書呂本注綘字方云以史考之綘以元和十年二月出刺華州又公與綘同年故曰久故蜀本注實字非是比來不審尊體動止何似比或作夜乍離闕庭伏計倍增戀慕愈於久}
