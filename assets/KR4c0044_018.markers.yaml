  - {type: punctuation, offset: 3404, content: (, id: KR4c0044_krp_018-bkkpn226}
  - {type: variant, offset: 3404, length: 0, content: '', WYG: 每有來訪者皆有意於不肖者也略不辭讓遂盡言之惟吾子諒察言下方無之字愈白與孟尚書書孟下一有簡字愈白行官自南廻過吉州得吾兄二十四日手書數番忻悚兼至未審入秋來眠食何似伏惟萬福來示云有人傳愈近少信奉釋氏此傳之者妄也或無吉州二字下云被吾兄二十四日手示披讀數番方从閣杭本無行官至來示三十八字但云蒙惠書今按閣杭乃節本諸本乃其本文今从之信此傳之方从閣杭蜀本無此四字潮州時有一老僧號大顛頗聰明識道理逺地無可與語者故自山召至州郭留十數日無下方有所字無與者字實能外形骸以理自勝不為事物侵亂與之語雖不盡解要自胷中無滯礙以為難得因與來徃要自至難得十一字諸本皆如此方从閣杭蜀本刪胷中無滯礙五字自又或作且今按此書稱許大顛之語多為後人妄意隐避刪節太過故多脫落失其正思如上兩條猶無大利害若此語中刪去五字則要自以為難得一句不復成文理矣蓋韓公之學見於原道者雖有以識夫大用之流行而於本然之全體}
