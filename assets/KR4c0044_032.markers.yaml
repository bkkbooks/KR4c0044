  - {type: variant, offset: 5291, length: 0, content: '', WYG: 欽定四庫全書别本韓文考異巻三十三宋王伯大重編碑誌楚國夫人墓誌銘韓𢎞妻楚國夫人姓翟氏故檢校御史大夫宋州刺史良佐之女今司徒兼中書令許國公之妻前鄜坊節度使散騎常侍兼御史大夫公武之母或無司字坊或作州非是夫人在家以孝友聰明為父母所偏愛選所宜歸以適韓氏韓氏族大且貴又太尉劉公甥内外尊顯又或作父非是公下或有之字夫人入門上下莫不贊賀或作賢事皇姑齊國太夫人肅恭誠至奉養不怠皇姑以夫人能盡婦道稱之六親能上或有為字其事夫義以順其教子愛以公司徒公曰我之能守貴富不危溢者楚國有助焉耳大夫領梁偏師卒就蔡功受節居藩為邦家令人父母之教然也夫人以元和十四年十一月一日薨于鄜之公府春秋若干大夫委節去位奉喪以居東都詔起之辭以羸毁不任即命又加喻勉固不變天子嗟嘆之起上或有再字固下或有守字長慶二年三月某日葬夫人于洛陽北山夫人生二子長曰肅元為太子司議郎以卒贈尚書主客郎中其次大夫公武也銘曰翟氏之先盖出宗周璜顯于魏以佐文侯髙陵翟方進封髙陵侯相漢義以家酬遷于南陽始自郎苗逮魏晉宋代不絶史以至夫人太守之子司徒之妻大夫之母公居河東子在鄜畤為王屏翰有壤千里公或作父非是公曰姑止以承我祀子曰母兮莫我撫已莫我或作莫慰文駟雕軒往來有煒莫尊于母莫榮于妻從古迄今孰盛與夷用昭厥裔篆此銘詩唐故國子司業竇公墓誌銘國子司業竇公諱牟字某或作字貽周六代祖敬逺嘗封西河公大父同昌司馬比四代仍襲爵名代或作世字同昌諱􅉙生皇考諱叔向官至左拾遺溧音栗水令贈工部尚書尚書於大歴初名能為詩文及公為文最長於詩孝謹厚重舉進士登第孝謹厚重又作孝愛謹厚佐六府五公八遷至檢校虞部郎中或無虞部字元和五年真拜尚書虞部郎中轉洛陽令都官郎中澤州刺史以至司業年七十四長慶二年二月丙寅以疾卒其年八月某日葬河南偃師先公尚書之兆次初公善事繼母家居未出學問於江東尚幼也名聲詞章行於京師人遲音穉其至及公就進士且試其輩皆曰莫先竇生于時公舅袁髙為給事中方有重名愛且賢公然實未嘗以干有司嘗下或有有字公一舉成名而東遇其黨必曰非我之才維吾舅之私其佐昭義軍也遇其將死公權代領以定其危後將盧從史重公不遣奏進官職公視從史益驕不遜偽疾經年舉音預祝曰舁車也歸東都從史卒敗死公不以覺㣲避去為賢告人公始佐崔大夫縱留}
