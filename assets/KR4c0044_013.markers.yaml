  - {type: variant, offset: 8443, length: 0, content: '', WYG: 分其地孫曰謂析李師道所據十三州為三鎮馬總鄆曹濮等州觀察使薛平青州刺史王遂沂州刺史以華州刺史禮部尚書兼御史大夫扶風馬公為鄆音運秦為薛郡地漢為東平國曹濮音卜古昆吾之墟節度觀察等使鎮其地公下或有總字既一年褒其軍號曰天平軍上即位之二年召公入且将用之以其人之安公也復歸之鎮安下或有於字此句或作以彼之人安於公也上之三年公為政於鄆曹濮也適四年矣治成制定衆志大固惡絶於心仁形於色竱心一力以供國家之職竱心一力或作竭心力竱或作竭一或作戮方云竱旨兖切專也國語竱本肇末于時沂密始分而殘其帥方云沂帥王遂也洪曰謂十四年沂海将王弁殺其觀察使王遂自稱留後其後幽鎮魏不悦於政相扇繼變謂長慶元年幽州盧龍軍都知兵馬使朱克融囚其節度使張洪靖以反成徳軍大将王廷湊殺其節度田𢎞正以反二年魏博節度使田布自殺兵馬使史憲誠自稱留後復歸於舊於政或作于政方云謂張𢎞靖被囚田𢎞正史憲誠皆為下所殺徐亦乘勢逐帥自置同於三方置或作署或置上有署字方云此謂崔羣為王智興所逐也惟鄆也截然中居四鄰望之若防之制水恃以無恐閤杭蜀及諸本皆有四鄰望之一句方从石本刪去今按文勢及當時事實皆當有此句若其無之則下文所謂恃以無恐者為誰恃之邪大凡為人作文而身或在逺無由親視摹刻既有脱誤又以毁之重勞遂不能改若此者葢親見之亦非獨古為然也方氏最信閤杭蜀本雖有謬誤往往曲從今此三本幸皆不誤而反為石本脱句所奪甚可笑也然而皆曰鄆為虜巢且六十年将彊卒武曹濮於鄆州大而近方云曹濮於鄆自為一句或作於曹濮州非是軍所根柢皆驕以易怨而公承死亡之後掇拾之餘剥膚椎髓公私掃地赤立新舊不相保持萬目睽睽持或作恃公於此時能安以治之其功為大若幽鎮魏徐之亂不扇而變此功反小何也公之始至衆未熟化以武則忿以憾以恩則横而肆或無以憾二字或作而憾一以為赤子一以為龍蛇憊蒲拜切病也心罷音疲精磨以嵗月然後致之難也及教之行衆皆戴公為親父母夫叛父母從仇讐非人之情故曰易下或有也字於是天子以公為尚書右僕射封扶風縣開國伯以褒嘉之或無公及封字縣或作郡公亦樂衆之和知人之悦而侈上之賜也於是為堂於其居之西北隅號曰谿堂以饗士大夫通上下之志既饗其從事陳曽謂其衆言公之畜此邦其勤不亦至乎此邦之人纍力佳切繫也説文綴得理也公之化惟所令之不亦順乎上勤下順遂濟登兹不亦休乎昔者人謂斯何今者人謂斯何雖然斯堂之作意其有謂而喑無詩歌是不考引公徳而接邦人於道也徳下或無而字乃使来請其詩曰帝奠九壥與㕓同有葉有年有荒不條河岱之間不或作有及我憲考一收正之收或作牧視邦選侯以公来尸公来尸之人始未信公不飲食以訓以狥孰饑無食孰呻孰歎孰寃不問不得分願孰為邦蟊亡侯切螣也節根之螟蟊或作蛑音義同羊狠狼貪以口覆城吹之喣之摩手拊之箴之石之膊音粕而磔陟格切説文薄脯膊之屋上左氏成二年傅龍人囚靈蒲就魁殺而膊諸城上磔閃也張也箴或作針之凡公四封既富以彊謂公吾父孰違公令可以師征不寧守邦師方从石本作帥今按平淮西碑云屢興師征作師為是石本或誤未可知也公作谿堂播播流水淺有蒲蓮深有蒹葦公以賓燕其鼓駭駭方云此詩十一章以令叶强以駭叶水皆古音也令有平聲一讀公獨孤郁墓志亦見淮南子勿驚勿駭萬物将自理勿撓勿攖萬物将自清駭古音自與理叶也周官注疾雷撃鼓曰駭西京賦所謂駭雷鼓是也今按古音之説甚善吳才老補音補韻二書其説甚詳駭水叶韻如管子宮如牛鳴盎中徴如負豕覺而駭亦一證也沙隨程可久曰吳説雖多其例不過四聲互用切饗通用二條而已此説得之如通其説則古書雖不盡見今可以例推也公燕谿堂賓校醉飽流有跳魚岸有集鳥既歌以舞其鼓考考公在谿堂公御琴瑟公暨賓贊稽經諏律稽考也諏訪也施詩智切用不差人用不屈谿有薲苽上音苹下音孤孫曰説文薲苹也苽凋胡也周禮魚宜苽有龜有魚公在中流右詩左書無我斁徒故切又音亦遺此邦是庥音休爾雅曰䕃貓相乳蜀本乳下有説字司徒北平王家貓有生子同日者其一死焉或作其一母死或作其母一死有二子飲於死母母且死其鳴咿咿其一方乳其子若聞之起而若聽之走而若救之走下方無而字銜其一置于其棲又往如之反而乳之若其子然噫亦異之大者也方無也字夫貓人畜也非性於仁義者也方從閤杭無仁字非是其感於所畜者乎哉北平王牧人以康伐罪以平伐或作罰非是理隂陽以得其宜國事既畢家道乃行父父子子兄兄弟弟雍雍如也愉愉如也視外猶視中一家猶一人夫如是其所感應召致其亦可知矣易曰信及豚魚非此類也夫非此或作亦其非是愈時獲幸於北平王客有問王之徳者愈以是對客曰夫禄位貴富人之所大欲也得之之難未若持之之難也得之於功或失於徳得之於身或失}
