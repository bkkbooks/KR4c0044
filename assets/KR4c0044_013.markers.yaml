  - {type: variant, offset: 0, length: 4699, content: 朱文公校昌黎先生集卷之十三考異音釋附雜著子産不毀郷校頌我思古人伊鄭之僑以禮相國人未安其敎遊于郷之校衆口囂囂安或作知方云此以教叶僑与囂車舝詩用韵如此或謂子産毀郷校則止曰何患焉可以成美夫豈多言亦各其志善也吾行不善吾避維善維否我於此視川不可防言不可弭下塞上聾邦其傾矣旣郷校不毀而鄭國以理在周之興養老乞言及其巳衰謗者使監成敗之迹昭哉可觀哉或作然維是子産執政之式維其不遇化止一國誠率是道相天下君父暢旁逹施及無珢君或作者交暢旁逹方从三本作旁暢交逹非是逹或作通於虖四海所以不理有君無臣誰其嗣之我思古人理下或有者字釋言此元和二年春作宰相鄭絪翰林斈士李吉甫中書舎人裴垍也洪日囯語云驪姬使奄楚以環釋言注云以言自觧釋也退之作釋言取此元和元年六月十日方无十日字愈自江陵法曹詔拜國子博士始進見今相國鄭公公賜之坐方无下公字且曰吾見子某詩吾時在翰林職親而地禁不敢相聞今爲我寫子詩書爲一通以來我下或有盡字而无爲一通以字或无爲我字而有盡字一方作二愈再拜謝退録詩書若干篇擇日時以獻若干方作箸于獻下或有之字今按著于萹雖古語然施之於此似不相入且公亦未必特用此語以爲竒也於後之數月有來謂愈者曰子獻相國詩書乎曰然曰有爲䜛於相國之座者曰韓愈曰相國徴余文余不敢匿相國豈知我哉子其愼之或无爲字愼下方无之字愈應之曰愈爲御史得罪德宗朝同遷于南者凡三人獨愈爲先収用相國之賜大矣百官之進見相國者或立語以退而愈辱賜坐語相國之禮過矣以或作巳四海九州之人自百官巳下欲以其業徹相國左右者多矣皆憚而莫之敢獨愈辱先索相國之知至矣賜之大禮之過知之至是三者於敵以下受之宜以何報况在天子之宰乎敵以或作敵巳方云囯語自敵以下則有讎注敵体也今人多用敵巳字者非宰下或有相字人莫不自知凡適於用之謂才堪其事之謂力愈於二者雖日勉焉而不近束帶執笏立士大夫之行不見斥以不肖幸矣其何敢敖於言乎或无乎字夫敖雖凶德必有恃而敢行愈之族親鮮少無扳音攀引也聮之勢於今不善交人無相先相死之友於朝無宿資蓄貨以鈞聲勢宿資蓄貨或作宿貨蓄資弱於才而腐於力不能奔走乘機抵巇虚宜切以要權利夫何恃而敖若夫狂惑䘮心之人蹈河而入火妄言而罵詈者則有之矣而愈人知其無是疾也雖有䜛者百人相國將不信之矣愈何懼而愼歟相囯或作宰相或无欤字旣累月又有來謂愈曰有讒子於翰林舎人李公與裴公者子其愼歟愈曰二公者吾君朝夕訪焉以爲政於天下而階太平之洽或作理居則與天子爲心膂出則與天子爲股肱四海九州之人自百官已下其孰不願忠而望賜不下或有能字非是愈也不狂不愚不蹈河而入火病風而妄罵不當有如讒者之說也雖有讒者百人二公將不信之矣愈何懼而愼旣以語應客夜歸私自尤曰咄當没切市有虎而曽參殺人讒者之效也詩曰取彼讒人投卑豺虎豺虎不食投卑有北有北不受投卑有昊傷於讒疾而甚之之辭也又曰亂之𥘉生僭始旣涵亂之又生君子信讒始疑而終信之之謂也孔子曰逺佞人夫佞人不能逺則有時而信之矣今我恃直而不戒禍其至哉徐又自解之曰市有虎聽者庸也曽參殺人以愛惑聦也巷伯之傷亂丗是逢也聦或作聴非是乱丗方作丗乱今三賢方與天子謀所以施政於天下而階太平之治聽聦而視明公正而敦大夫聦明則聽視不惑公正則不邇䜛邪敦大則有以容而思彼䜛人者孰敢進而爲䜛哉聽視或作視聽進而或作而進雖進而爲之亦莫之聽矣我何懼而愼方无而愼字旣累月上命李公相客謂愈曰子前𬒳言於一相今李公又相子其危哉方无哉字愈曰前之謗我於宰相者翰林不知也後之謗我於翰林者宰相不知也今二公合處而㑹言若及愈必曰韓愈亦人耳彼敖宰相又敖翰林其將何求必不然吾乃今知免矣旣而䜛言果不行宰相或皆作相囯乃今或作今乃又无矣字旣下方无而字愛直贈李君房别左右前後皆正人也欲其身之不正烏可得邪烏或作焉吾觀李生在南陽公之側有所不知知之未甞不爲之思有所不疑疑之未嘗不爲之言勇不動于氣義不陳乎色乎或作于南陽公舉措施爲不失其宜天下之所窺觀稱道洋洋者抑亦左右前後有其人乎公下或有之字有其方作其有凡在此趨公之庭議公之事者吾旣從而遊矣或无此字今按此下疑當有而字言而公信之者謀而公從之者四方之人則旣聞而知之矣李生南陽公之甥也人不知者將曰李生之託婚於貴富之家將以充其所求而止耳故吾樂爲天下道其爲人焉今之從事於彼也吾爲南陽公愛之爲南上或有能字又未知人之舉李生於彼者何辭彼之所以待李生者何道又或作且舉不失辭待不失道雖失之此足愛惜而得之彼爲歡忻於李生道猶若也舉之不以吾所稱待之不以吾所期李生之言不可出諸其口矣吾重爲天下惜之惜或作爱張中丞傳後叙元和二年四月十三日𥘉愈與呉郡張籍閱家中舊書得李翰所爲張廵使廵上方无張字翰以文章自名爲此傳頗詳密然尚恨有闕者不爲許逺立傳又不載雷萬春事首尾逺雖材若不及廵者開門納廵位本在廵上授之柄而處其下無所疑忌竟與廵俱守死成功名城䧟而虜與廵死先後異耳開上或疑當有然字兩家子弟材智下不能通知二父志以爲廵死而逺就虜疑畏死而辭服於賊逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎當其圍守時外無蚍音孚音毗虫浮蟻子之援所欲忠者國與主耳而賊語以國亡主滅語方校作悟滅下或有悟之字今按悟字无理且从諸本作語若果合有悟字即是誤字之訛但以字上若有語字或誤字或語之字或誤之字即滅字下皆不當復有誤之字若以字上无此四種字即烕字下皆當有誤之字逺見救援不至而賊來益衆必以其言爲信外無待而猶死守人相食且盡雖愚人不能数日而知死處矣逺之不畏死亦明矣烏有城壞其徒俱死獨蒙愧恥求活雖至愚者不忍爲嗚呼而謂逺之賢而爲之邪其徒上方有而字或又疑而字當在死字之下邪上方无之字說者又謂逺與廵分城而守城之䧟自逺所分始以此詬逺此又與兒童之見無異詬或作語非是人之將死其藏腑必有先受其病者引繩而絶之其絕必有處觀者見其然從而尤之其亦不逹於理矣小人之好議論不樂成人之美如是哉如廵逺之所成就如此卓卓猶不得免其他則又何說當二公之𥘉守也寜能知人之卒不救棄城而逆遁苟此不能守雖避之他處何益之卒或无之字及其無救而且窮也將其創楚良切傷也殘餓羸倫為切之餘雖欲去必不逹二公之賢其講之精矣守一城捍天下以千百就盡之卒戰百萬日滋之師蔽遮江淮沮遏其勢天下之不亡其誰之功也之不或无之字非是當是時棄城而圖存者不可一二數所矩切擅彊兵坐而觀者相環也不追議此而責二公以死守亦見其自比於逆亂設淫辭而助之攻也改或作功非是愈嘗從事於汴徐二府屢道於兩府閒府或作親祭於其所謂雙廟者其老人往往說巡逺時事云南霽雲之乞救於賀蘭也方无之字賀蘭嫉巡逺之聲威功績出巳上不肯出師救愛霽雲之勇且壯不聽其語彊留之具食與樂延霽雲坐霽雲慷慨語曰雲來時雎音綏宋州也陽之人不食月餘日矣雲雖欲獨食義不忍雖食且不下咽慷上或无霽雲字非是因拔所佩刀㫁一指血淋漓以示賀蘭一座大驚皆感激爲雲泣下雲知賀蘭終無爲雲出師意即馳去將出城抽矢射佛寺浮圖矢著直略切其上甎半箭曰吾歸破賊必滅賀蘭此矢所以志也箭或作笴歸或作師非是愈貞元中過泗州船上人猶指以相語城䧟賊以刃脅降巡巡不屈即牽去將斬之又降霽雲雲未應或无霽字巡呼雲曰南八男兒死耳不可爲不義屈雲笑曰欲將以有爲也公有言雲敢不死即不屈欲將或疑衍一字張籍曰有于嵩者少依於巡及廵起事嵩常在圍中及巡或作及其常方作甞籍大曆中於和州烏江縣見嵩嵩時年六十餘矣或无下嵩字以巡𥘉甞得臨渙縣尉好斈無所不讀或无甞字籍時尚小粗問巡逺事不能細也云巡長七尺餘鬚髯若神嘗見嵩讀漢書謂嵩曰何爲乆讀此乆或作又嵩曰未熟也巡曰吾於書讀不過三徧終身不忘也因誦嵩所讀書盡卷不錯一字嵩驚以爲巡偶熟此卷因亂抽他帙以試無不盡然嵩又取架上諸書試以問巡巡應口誦無疑嵩從巡乆亦不見巡常讀書也爲文章操𥿄筆立書未嘗起草起方作有樊日廵開元二十四年進士刘夢得嘉話載其謝加金吾表有云主辱臣死當臣致命之時惡稔罪盈是賊滅亡之日激勵將士賦詩有云褁瘡猶出陣飲血更登陴又夜聞笛声詩有云營開星月近戦苦陣雲深觀此則廵之文章可見矣一本作未甞有草新添巡守睢陽詩全章云接戦春來苦孤城日漸危合圍侔月暈分守效魚䴡屡厭黄塵起時將白羽麾裹瘡猶出陣斂血更登陴忠信應難敵堅貞自不移无人報天子心計欲何施𥘉守睢陽時士卒僅萬人城中居人户亦且數萬巡因一見問姓名其後無不識者或无户字巡怒鬚髯輒張及城䧟賊縛巡等數十人王拜稽首天子之光庶德昭融神斯降祥殊本連理之柯同榮異壟之禾方云三館本潮本之何皆作枝柯仍与下文同榮爲一句今本木作禾由枝字訛也今按殊本連理之柯即今所頌之木也同榮異壟之禾即書所謂異畒同類之嘉禾也盖追爲前白之預言而汎㪯其類耳司馬相如所謂雙觡共抵之獸其句法亦類此如方所定則理乖語贅句分而韵不恊失之逺矣吾傒之産兹土也乆矣方无之字今按之字疑當作其今欲明于大君紀于䇿書王抑余也冶金伐石垂耀無極王余抑也欲或作將王余抑也或作余抑王也或依上文作王抑余也方从三本定此今按抑余余抑盖互文以叶韻耳作余抑王固无理作王抑余亦重復无它竒當从方本爲是奮肆姁媮上音劬下音俞美熊也不知所如願託頌詞長言之于康衢頌曰木何爲兮此祥洵厥美兮在吾王洵方作詢非是願封植兮永固俾斯人兮不忘斯或作其人或作民汴州東西水門記并序貞元十四年正月戊子隴西公命作東西水門或无隴西二字非是方云董晋本仲舒之裔自廣川徙隴西故云越三月辛巳朔水門成三日癸未大合樂設水嬉㑹監軍軍司馬賔佐僚屬將校熊羆之士肅四方之賔客以落之士女龢古和字㑹闐郭溢郛旣卒事其從事昌黎韓愈請紀成績其詞曰維汴州河水自中注厥𥘉距河爲城其不合者誕寘聮鎖于河宵浮晝湛舟不潜通距或作拒不合或作弗合湛或作沈舟不方作舟用方並从石本今按上下文意盖言置鎖雖足以禁舟之潜通然未􅊵虧䟽宣洩之患故須作水門耳諸本作舟不潜通者是也今上文旣言置鎖而下文乃天舟用潜通則是鎖為虚設而其下句亦不應著然字矣若以為誤則石本乃當時所刻不應有誤然亦安知非其書者之誤刻者之誤况或非所親見則又安知非傳者之誤耶其說之未盡者又見於溪堂盤谷等篇覧者詳之然其襟抱虧䟽風氣宣洩邑居弗寜訛言屢騰歷載巳來孰究孰思皇帝御天下十有八載此邦之人遭逢疾威嚚童噭嘑上音呌下音呼皆声也嚚童李迺刼衆阻兵懍懍栗栗若墜若覆時維隴西公受命作潘爰自洛京單車來臨遂拯其危遂去其疵拯或作持弗肅弗厲薰爲大和神應祥福五榖穰熟旣庶而豐人力有餘監軍是咨司馬是謀諸本及石本皆有此二句方从閤本刪去云閤本盖公晚年所定當从之今詳此二語疑後人惡監軍二字而刪之耳方氏直謂閤本為公晚年所定不知何據而云然以今觀之其舛誤為最多疑為𥘉出未校之本前巳辨之詳矣大抵館閤藏書不過取之民間而諸儒略以官課校之耳豈能一一精善過於私本丗俗但見其為官本便尊信之而不復問其文理之如何巳為可笑今此乃復造為改定之說以鉗衆口則又可笑之甚也乃作水門爲邦之郛以固風氣以閈㓂偷閈戓作扞黄流渾渾飛閣渠渠因而飾之匪爲觀遊天子之武維隴西公是布天子之文維隴西公是宣文方从石閤蜀本作醇今按此記方氏多从石本石本固當據信但上條用字大誤而此醇此亦未安耳河之沄沄有君切轉流也源于寔崙天子萬祀公多受祉乃伐山石刻之日月尚俾來者知作之所始燕喜亭記燕或作宴此記方亦多从石本太原王弘中在連州與學佛人景常元慧游佛下或有之字惠下或有者字異日從二人者行於其居之後丘荒之間上髙而望得異處焉斬茅而嘉樹列發石而清泉激輦糞壤燔椔翳燔或作焚椔側師切詩作之屏之其椔其翳注曰木立死曰椔自斃曰翳却立而視之岀者突然成丘䧟者呀虚加切張口皃然成谷漥烏瓜切一日窊也老子窪則盈者爲池而缺者爲洞若有鬼神異物隂來相之自是弘中與二人者晨往而夕忘歸焉乃立屋以避風雨寒暑避或作禦寒上或有禦字或作立屋以避風雨旣除寒暑旣去或作以禦風雨以除寒暑方从石本云左傳吾儕小人皆有闔庐以避燥􅊜寒暑旣成愈請名之其丘曰竢德之丘蔽於古而顯於今有竢之道也其丘上或有名字有竢下或有德字其石谷曰謙受之谷瀑音暴又歩木切曰振鷺之瀑谷言德瀑言容也其土谷曰黄金之谷瀑曰秩秩之瀑谷言容瀑言德也洞曰寒居之洞志其入時也池曰君子之池虚以鍾其美盈以出其惡也泉之源曰天澤之泉出髙而施下也合而名之以屋曰燕喜之亭取詩所謂魯侯燕喜者頌也名或作言者頌方从石閤, WYG: ''}
