  - {type: variant, offset: 1368, length: 761, content: 州桂陽縣江盤峽束春湍豪雷風戰闘魚龍逃懸流轟轟射水府一瀉百里翻雲濤漂船擺𥙷買切開也石萬瓦裂咫尺性命輕鴻毛鴻或作於或作如贈侯喜吾黨侯生字叔􅙝或作起方云起之古文也呼我持竿釣温水洛水在河南易乾鑿度曰王者有盛德之應則洛水先温故號温洛平明鞭馬出都門盡日行行荆棘裏温水微茫絶又流深如車轍闊容輈蝦蟇跳過雀兒浴此縱有魚何足求我爲侯生不能巳盤針擘粒投泥滓晡時堅坐到黃昏到或作至手倦目勞方一起暫動還休未可期蝦行蛭音質水蛭也賈誼曰夫豈從蝦與蛭螾渡似皆疑舉竿引線忽有得一寸纔分鱗與鬐音頎莊子日驚掦而奮鬐或作鰭今按鬐馬鬛也當作鰭然莊子作鬐則亦可通用也是日侯生與韓子良乆歎息相看悲我今行事盡如此此事正好爲吾規半丗遑遑就舉選一名始得紅顔衰始或作巳非是人間事勢豈不見徒自辛苦終何爲便當提攜妻與子南入箕潁箕山名潁水名許由巢父隱處無還時叔􅙝君今氣方銳我言至切君勿嗤君欲釣魚須逺去大魚豈肯居沮洳上音疽下音茹漸湿地肯或作有非是痕淚非是雖不勑還情庶幾朝暮盤羞惻庭闈幽房無人感伊威尓雅委䑕也詩伊威在室人生此難餘可祈子去矣時若發機矣或作呉非是句法見上張文潜說蜃沈海底氣昇霏彩雉野伏朝扇翬音揮五采旌扇或作羽非是盖宫扇以雉尾爲之翬文彩皃此言雉伏於野而其羽可用爲朝廷之儀与上下二句爲一類也處子窈窕王所妃蜃沈止所妃此二句君子不患人不我知之意苟有令德隱不腓下音肥孫曰百卉貝腓腓病也言苟有令德雖在隱約不以爲病況今天子鋪德威鋪或作輔非是蔽能者誅薦受禨音幾祥也出送撫背我涕揮行行正直愼脂韋楚辝如脂如韋注脂韋柔弱皃業成志樹來頎頎音祈祝曰詩碩人頎頎言儀表長䴡絞好頎頎然我當爲子言天扉三星行三星斗牛箕洪曰三星行剥琢行皆元和𥘉召爲囯子博士時作樊曰蘇内翰云吾平生遭口語无数盖生时与退之相似吾命在牛斗間而身宫亦在箕故其詩曰我生之辰月宿南斗且曰无善名以聞无悪声以攘今謗吾者或云死或云仙退之之言良非虚耳, WYG: 著}
