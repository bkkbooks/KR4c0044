  - {type: variant, offset: 113, length: 976, content: 釣魚綫魚于淵方作泉今按以淵爲泉避諱也依例當作􅘢我徂京師不逺其還其或作而山石山石犖确上力角切下音斍磽确也行徑微黃昬到寺蝙蝠上布田切下甫服切伏翼也一名仙䑕飛昇堂坐階新雨足或作定非是芭蕉葉大支即梔字子肥僧言古壁佛畫好以火來照所見稀所見或作見所非是鋪牀拂席置羮飯踈糲蘭未切粝麄而粺精列子食則粢粝亦足飽我飢夜深静卧百蟲絶清月出嶺光入扉天明獨去無道路出入髙下窮煙霏山紅間碧紛爛漫時見松櫪皆十圍歷或作櫟方云選南都賦楓槐櫨櫪李善曰櫪與櫟同當流赤足蹋澗石水聲激激風吹衣吹或作生人生如此自可樂或作可自得自可方作自得或作可自皆非是豈必局束爲人鞿音飢馬絡也楚詞今雖好脩姱以鞿覊兮注韁在口日覊前漢是猶以鞿而御悍突爲人鞿言爲人所拘縶也嗟哉吾黨二三子安得至老不更歸天星送楊凝郎中賀正天星牢落雞喔咿上音渥下音伊圭声也僕夫起餐車載脂脂以滑車正當窮冬寒未巳借問君子行安之㑹朝元正無不至受命上宰須及期侍從近臣有虚位公今此去歸何時或作何时歸汴泗交流贈張僕射建封貞元十五年公在徐州張建封幕汴水徐之西泗水徐之南故以名篇辤去云云主人謂張建封公在徐欎二不得志見於書與詩者如此嗷嗷鳴鴈鳴且飛上鳴字或作鴻窮秋南去春北歸去寒就暖識所依或作處非是天長地闊棲息稀風霜酸苦稻粱鴻鴈前輩多使稲粱事盖出戦囯䇿廣絶交論云分鴈鶩之稻粱又杜甫詩自古稲粱多不足微毛羽墔落身不肥毛羽或作羽毛徘徊反顧羣侣違哀鳴欲下洲渚非江南水闊朝雲多朝方作朔今按旣云江南則不應言朔雲矣兼作朝雲語亦差響草長沙軟無網羅閑飛静集鳴相和違憂懷惠性匪他惠一作息凌風一舉君謂何龍移此詩謂南山湫也湫𥘉在平地一日風雷移居山上其山下湫遂化為土公題炭谷詩云厭處平地士巢居挿天山天昏地黒蛟龍移雷驚電激雄雌隨激或作擊方云雷奔電激班固西都賦語雄雌或作雌雄清泉百丈化爲土魚鼈枯死吁可悲雉帶箭鋪牀拂席置此詩公佐張僕射十徐從獵而作也讀之其狀如在目前盖寫物之妙者原頭火燒静兀兀野雉畏鷹出復没出復方作伏欲今按雉出復没而射者弯弓不肯輕發正是形容持蒲命巾之巧豪釐不差處改作伏欲神采索然矣將軍欲以巧伏人盤馬彎弓惜不發地形漸窄觀者多雉驚弓滿勁箭加衝人决起百餘尺紅翎白鏃作木切相傾斜將軍仰笑軍吏賀五色爾雅雉五色皆備曰翬離披馬前墮條山蒼歐本注云中條山在黄河之曲今蒲中也條山蒼河水黃浪波沄沄去浪波或作波浪松栢在山岡山或作髙贈鄭兵曹罇酒相逢十載前君爲壯夫我少年罇酒相逢十載後我爲壯夫君白首我材與丗, WYG: 根株}
