  - {type: variant, offset: 0, length: 1516, content: 朱文公校昌黎先生集卷之十四考異音釋附雜著鄆州谿堂詩并序此篇方多从石本憲宗之十四年始定東平三分其地孫曰謂析李師道所據十三州為三鎮馬㧾鄆曹濮等州觀察使薛平青州刺史王遂沂州刺史以華州刺史禮部尚書兼御史大夫扶風馬公爲鄆音運秦為薛郡地漢為東平囯曹濮音卜古昆吾之墟節度觀察等使鎮其地公下或有㧾字旣一年褒其軍號曰天平軍上即位之二年召公入且將用之以其人之安公也復歸之鎮安下或有於字此句或作以彼之人安於公也上之三年公爲政於鄆曹濮也適四年矣治成制定衆志大固惡絶於心仁形於色竱心一力以供國家之職竱心一力或作竭心力竱或作竭一或作戮方云竱旨兖切專也囯語竱本肇末于時沂宻始分而殘其師方云沂帥王遂也洪日謂十四年沂海將王弁殺其觀察使王遂自称留後其後幽鎮魏不恱於政相扇継變謂長慶元年幽州盧龍軍都知兵馬使朱克融囚其節度使張洪靖以反成德軍大將王廷湊殺其節度田弘正以反二年魏博節度使田布自殺兵馬使史憲誠自称留後復歸於舊於政或作于政方云謂張弘靖𬒳囚田弘正史憲誠皆為下所殺徐亦乗勢逐帥自置同於三方置或作署或置上有署字方云此謂崔羣為王智㒷所逐也惟鄆也截然中居四鄰望之若防之制水恃以無恐閤杭蜀及諸本皆有四鄰望之一句方从石本刪去今按文势及當時亊實皆當有此句若其无之則下文所謂恃以无恐者為誰恃之邪大凡為人作文而身或在逺无由親視摹刻旣有脫誤又以毀之重勞遂不能改若此者盖親見之亦非獨古為然也方氏最信閤杭蜀本雖有謬誤往往曲从今此三本幸皆不誤而反為石本脫句所奪甚可笑也然而皆曰鄆爲虜巢且六十年將彊卒武曹濮於鄆州大而近方云曹濮於鄆自爲一句或作於曹濮州非是軍所根柢皆驕以易怨而公承死亡之後掇拾之餘剥膚椎髓公私掃地赤立新舊不相保持萬目睽睽持或作恃公於此時能安以治之其功爲大若幽鎮魏徐之亂不扇而變此功反小何也公之始至衆未孰化以武則忿以憾以恩則横而肆或无以憾二字或作而撼一以爲赤子一以爲龍蛇憊蒲拜切病也心罷音疲精磨以歲月然後致之難也及教之行衆皆戴公爲親父母夫叛父母從仇讎非人之情故曰易下或有也字於是天子以公爲尚書右僕射封扶風縣開國伯以褒嘉之或无公及封字縣或作郡公亦樂衆之和知人之恱而侈上之賜也於是爲堂於是居之西北隅號曰谿堂以饗士大夫通上下之志旣饗其從事陳曽謂其衆言公之畜此邦其勤不亦至乎此邦之人纍力隹切繫也說文綴得理也公之化惟所令之不亦順乎上勤下順遂濟登兹不亦休乎昔者人謂斯何今者人謂斯何雖然斯堂之作意其有謂而喑無詩歌是不考引公德而接邦人於道也德下或无而字乃使來請其詩曰帝奠九壥与㕓同有葉有年有荒不條河岱之閒不或作有及我憲考一收正之收或作牧視邦選侯以公來尸公來尸之人始未信公不飲食以訓以徇孰饑無食孰呻孰歎孰冤不問不得分願孰爲邦蟊亡侯切螣也節根之螟蟊或作蛑音義同羊狠狼貪以口覆城吹之喣之摩手拊之箴之石之膊音粕而磔陟格切說文薄脯膊之屋上左氏成二年傳龍人囚靈蒲就魁殺而膊諸城上磔閃也張也箴或作針之凡公四封旣富以疆謂公吾父孰違公令可以師征不寜守邦師方从石本作帥今按平淮西碑云屡㒷師征作師為是石本或誤未可知也公作谿堂播播流水淺有蒲蓮深有蒹葦公以賔燕其鼔駭駭方云此詩十一章以令叶強以駭叶水皆古音也令有平声一讀公獨孤郁墓志亦見淮南子勿驚勿駭方物將自理勿撓勿櫻万物將自清駭古音自与理叶也周官注疾雷擊鼓日駭西京賦所謂駭雷鼓是也今按古音之說甚善呉才老𥙷音𥙷韻二書其說甚詳駭水叶韻如𬋩子宫如牛鳴盎中徴如負豕斍而駭亦一證也沙隨程可乆曰呉說虽多其例不過四声互用切響通用二條而巳此說得之如通其說則古書虽不尽見今可以例推也公燕谿堂賔校醉飽流有跳魚岸有集鳥旣歌以舞其鼔考考公在谿堂公御琴瑟公曁賔賛稽經諏律稽考也􅓪訪也施詩智切用不差人用不屈谿有薲苽上音苹下音孤孫日說文薲苹也苽凋胡也周礼魚宜苽有龜有魚公在中流右詩左書無我斁徒故切又音亦遺, WYG: ''}
