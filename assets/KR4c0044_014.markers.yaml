  - {type: line-break, offset: 10185, content: '', id: KR4c0044_SBCK_014-19a01}
  - {type: variant, offset: 10185, length: 0, content: '', WYG: 詞則實傳也况有諸本可从乎太學生何蕃入太學者廿餘年矣諸本作二十餘年方从杭本作卄年餘又云蜀本作二十而餘字亦綴於年之下按説文廿音入二十并也􅧁先合切三十之省便古文也考之國語有云行玉廿穀者正作此字泰山秦碑亦云皇帝臨立廿有六年則又以四字為句而以廿為一字尤明白矣故公文多用廿􅧁字唯孔左丞碑尚以四言故可考如南海碑薛助教碑石本亦皆然但世人多不之見耳今廿从方十餘年从諸本嵗舉進士學成行尊自太學諸生推頌不敢與蕃齒相與言於助教博士助教博士以状申於司業祭酒司業祭酒撰次蕃之羣行焯焯音灼者數十餘事以之升於禮部而以聞於天子之升或作升之聞下或無於字京師諸生以薦蕃名文説者不可選紀公卿大夫知蕃者比肩立莫為禮部名下或有為字立下或有歎字而無莫為禮部四字為禮部者率蕃所不合者以是無成功蕃淮南人父母具全具或作俱初入太學嵗率一歸父母止之其後間一二嵗乃一歸又止之不歸者五嵗矣蕃純孝人也閔親之老不自克一日揖諸生歸養於和州諸生不能止乃閉蕃空舎中於是太學六館之士百餘人又以蕃之義行言於司業陽先生城請諭留蕃或無諭字諭方作論於是太學闕祭酒㑹陽先生出道州不果留歐陽詹生言曰蕃仁勇人也詹生或作生詹方本陽下注詹字下同今按歐陽詹生如史稱轅固生樂段公之類甚多不當作注或者曰蕃居太學諸生不為非義𦵏死者之無歸哀其孤而字焉方从杭蜀本無𦵏字非是惠之大小必以力復斯其所謂仁歟蕃之力不任其體其貌不任其心吾不知其勇也歐陽詹生曰朱泚千禮切之亂太學諸生舉将從之来請起蕃蕃正色叱之六館之士不從亂兹非其勇歟惜乎蕃之居下其可以施於人者不流也譬之水其為澤不為川乎川者髙澤者卑髙者流卑者止是故蕃之仁義充諸心行諸太學積者多施者不遐也天将雨水氣上無擇於川澤澗谿之髙下氣上或有之字然則澤之道其亦有施乎抑亦待於彼者歟故凡貧賤}
