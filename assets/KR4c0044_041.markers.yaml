  - {type: variant, offset: 398, length: 0, content: '', WYG: 實處罇罍之器降於圓魄殊匪金莖之露出自方諸乍似鮫人之淚匪或作非露或作靈乍方作已將以贊于陰德配夫陽燧音遂配上或有非獨二字夫或作干夜寂天清烟消氣明桂華吐耀兎影騰精兎影或作玉兎騰方作流聊設監以取水伊不注而能盈霏然而象的爾而呈始漠漠而霜積漸微微而浪生而象或作垂象或作無象的方作酌漠漠而方作茫茫以豈不以德協于坎同類則感形藏在空氣應則通同方作有恐今按同類與氣應對屬差互當作類同在或作於鶴鳴在陰之理不謬虎嘯于谷之義可崇理方作論虎方作武義方作道試今按作虎為是但當時程避諱當作武耳足以驗聖賢之無黨知天地之至公足以驗聖賢方庶令知聖賢黨或作窮知方作驗竊比大羮之遺味幸希薦於廟中芍藥歌方從蜀本刪去今恐是公少作姑存之丈人庭中開好花更無凡木爭春華翠莖紅蕊天力與此恩不屬黄鍾家温馨熟美鮮香起似笑無言習君子霜刀翦汝天女勞何事低頭學桃李嬌癡婢子無靈性競挽春衫來比並靈性或作性靈欲將雙頰一晞紅緑窓磨偏青銅鏡晞或作稀一罇春酒甘若飴音怡丈人此樂無人知花前醉倒歌者誰楚狂小子韓退之海水水下方有詩字海水非不廣鄧林列子夸父逐日渴欲得飲云膏肉所浸生鄧林鄧林彌廣數千里焉豈無枝風波一蕩薄魚鳥不可依海水饒大波鄧林多驚風豈無魚與鳥巨細各不同海有吞舟鯨鄧有垂天鵬茍非鱗羽大蕩薄不可能我鱗不盈寸我羽不盈尺一木有餘陰一泉有餘澤我將辭海水濯鱗清泠池我將辭鄧林刷羽䝉籠枝海水非愛廣鄧林非愛枝風波亦常事鱗羽自不宜或作不自疑我鱗日已大我羽日已修風波無所苦還作鯨鵬遊贈崔立之此篇方從文苑昔者十日雨子桑苦寒飢哀歌坐空屋不怨但自悲桑苦寒或作來寒且方云考莊子實作子桑屋或作房其友名子輿忽然憂且思褰裳觸泥水裹飯往食之入門相對語天命良不宜好事漆園吏書之存雄辭千年事已逺二子情可推我讀此篇日正當雨雪時吾身固已困吾友復何為薄粥不足裹深泥諒難馳曽無子輿事空賦子桑詩或無此二句贈河陽李大夫四海失巢穴兩都困塵埃感恩由未報惆悵空一來由未或作未能方作能未今按由猶古字通裘破氣不煖馬羸鳴且哀裘破或作破裘氣或作竟馬羸或作羸馬主人情更重空使劍鋒摧苦寒歌黄昏苦寒歌夜半不能休夜半或作半夜豈不有陽春節氣聿其周或作嵗聿不其周節氣或作氣節君何愛重裘兼味養大賢何愛下疑有脱字養字或作成字氷食葛製神所憐神所或作誠可填窓塞户慎勿出暄風暖景明年日或作需明年非是贈同遊者已見正集請遷𤣥宗廟議方從蜀本舊志或無廟字非是方云舊史禮儀志}
