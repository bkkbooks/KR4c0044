  - {type: variant, offset: 3, length: 8, content: 校昌黎先生外集目, WYG: 然為惡亦必不敢宜特下詔云蔡州自吳少誠已來相承為節度使亦微有功效少陽之没陽或作誠非是朕亦本擬與元濟恐其年少未能理事所以未便處置待其稍能緝綏然擬許其承繼今忽自為狂勃侵掠不受朝命事不得已所以有此討伐擬或作後勃或作悖至如淄青恒州范陽等道祖父各有功業相承命節年嵗已乆朕必不利其土地輕有改易各宜自安節下或有制字而無節字今按李徳裕之討澤潞正用此䇿以伐其交世以為竒不知韓公已言之矣如妄自疑懼敢相扇動朕即赦元濟不問迴軍討之自然破膽不敢妄有異説右前件謹}
