  - {type: variant, offset: 449, length: 0, content: '', WYG: 五起八月盡至山陵八月庚子詔曰惟皇天祐命烈祖誕受方國九聖儲祉萬方咸休肆予一人獲纘丕業嚴恭守位不遑暇逸或作給今從史而天祐匪降匪史作不疾恙無瘳無或作弗今從史將何以奉宗廟之靈展郊禋之禮疇咨庶尹對越上𤣥内愧于朕心上畏于天命夙夜祗慄惟懷永圖惟懷史作深惟一日萬幾不可以久曠天工人代不可以久違皇太子某睿哲温文寛和慈惠慈史作仁孝友之德愛敬之誠通于神明格于上下愛敬或作敬愛或作仁愛今從史是用推皇王至公之道遵父子傳歸之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉若成憲永綏四方宜令皇太子即皇帝位朕稱太上皇居興慶宮制􅃯稱誥所司擇日行册禮永貞元年八月辛丑太上皇居興慶宫誥曰有天下者傳歸于子前王之制也欽若大典斯為至公式揚耿光用體文德朕獲奉宗廟臨御萬方降疾不瘳庶政多闕乃命元子代予守邦爰以令辰光膺册禮宜以今月九日册皇帝於宣政殿仍命檢校司徒杜佑充册使門下侍郎杜黄裳充副使仍命下二十一字史無國有大命恩俾惟新宜因紀元之慶用覃在宥之澤宜改貞元二十一年為永貞元年自貞元二十一年八月五日昧爽已前天下應犯死罪特降從流流已下遞減一等又下誥曰人倫之本王化之先爰舉令圖允資内輔式表后妃之德俾刑窈窕之風兹禮經之大典也良娣王氏家承茂族德冠中宫雅修彤管之規克佩姆師之訓自服勤蘋藻祗奉宗祧令範益彰母儀斯著宜正長秋之位以明繼體之尊良媛董氏備位後庭素稱淑慎進升號位禮亦宜之號位或作位號良娣可册為太上皇后良媛宜册為太上皇德妃仍令所司備禮擇日册命宣示中外咸使知聞壬寅制王伾開州司馬王叔文渝州司户並員外置馳驛發遣叔文越州人以碁入東宫頗自言讀書知理道乗聞常言人間疾苦上將大論宫市事叔文説中上意遂有寵因為上言某可為將某可為相幸異日用之密結韋執誼并有當時名欲僥倖而速進者陸質吕温李景儉韓􅋫韓泰陳諫劉禹錫栁宗元等十數人定為死交而凌準程异等又固其黨而進交遊蹤跡詭祕莫有知其端者貞元十九年補闕張正買疏諫他事得召見正買與王仲舒劉伯芻裴茝常仲孺吕洞相善數遊止按史王仲舒下更有韋成季三字今詳下文有成季字則此處當有此三字亦脱漏也正買得召見諸往來者皆往賀之有與之不善者告叔文執誼云正買疏似論君朋黨事宜少誡執誼叔文信之執誼甞為翰林學士父死罷官此時雖為散郎以恩時時召入問外事執誼因言成季等朋讌聚遊無度皆譴斥之人莫知其由叔文既得志與王伾李忠言等專斷外事遂首用韋執誼為相其常所交結相次拔擢至一日除數人日夜羣聚常或作甞一日上或無至字伾以侍書幸寢陋呉語上所䙝狎而叔文頗任事自許微知文義好言事上以故稍敬之不得如伾出入無阻叔文入至翰林而伾入至柿林院見李忠言牛昭容等故各有所主伾主往來傳授劉禹錫陳諫韓􅋫韓泰柳宗元房啟凌準等主謀議唱和採聽外事上疾久不瘳内外皆欲上早定太子位叔文黙不發議已立太子天下喜而叔文獨有憂色喜上或有皆字常吟杜甫題諸葛亮廟詩末句云出師未用身先死長使英雄淚滿襟按杜甫用作捷因歔欷流涕聞者咸竊笑之雖判兩使事未甞以簿書為意日引其黨屏人切切細語謀奪宦者兵以制四海之命既令范希朝韓泰總統京西諸城鎮行營兵馬中人尚未悟㑹邊上諸將各以狀辭中尉且言方屬希朝中人始悟兵柄為叔文所奪乃大怒曰從其謀吾屬必死其手密令其使歸告諸將曰無以兵屬人希朝至奉天諸將無至者韓泰白叔文計無所出唯曰奈何奈何無㡬而母死執誼益不用其語叔文怒與其黨日夜謀起復起復必先斬執誼而盡誅不附已者聞者皆恟懼皇太子既監國遂逐之明年乃殺之伾杭州人病死遷所其黨皆斥逐叔文最所賢重者李景儉而最所謂奇才者吕温叔文用事時景儉持母喪在東都而吕温使吐蕃半嵗至叔文敗方歸故二人皆不得用叔文敗後數月乃貶執誼為崖州司馬後二年病死海上執誼杜黄裳子壻與黄裳同在相位故最在後貶初執誼進士對策髙等驟遷拾遺年二十餘入翰林巧慧便辟媚幸於德宗而性貪婪詭賊其從祖兄夏卿為吏部侍郎執誼為翰林學士受財為人求科第夏卿不應乃探出懷中金以内夏卿袖夏卿驚曰吾與卿賴先人德致名位幸各已達豈可如此自毁壞已或作以擺袖引身而去執誼大慙恨既而為叔文所引用初不敢負叔文迫公議時時有異同輒令人謝叔文云非敢負約為異同蓋欲曲成兄弟爾約或作}
