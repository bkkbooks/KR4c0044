  - {type: variant, offset: 399, length: 5, content: 安慈恩塔題, WYG: 慶四年五月禮儀使奏樊云時穆宗當祔公豈以吏部侍郎為禮儀使邪右禮儀使奏謹按周禮天子七廟三昭三穆與太祖之廟而七尚書咸有一德亦曰七世之廟可以觀德尚書至觀德十六字舊史闕荀卿子曰有天下者祭七代有一國者祭五代或無卿字曰上或有亦字祭七代或作事七世祭五代或作事五世或作祭五廟則知天子上祭七廟典籍通規祖功宗德不在其數廟或作代國朝九廟之制法周之文太祖景皇帝始為唐公肇基天命義同周之后稷髙祖神堯皇帝創業經始化隋為唐義同周之文王太宗文皇帝神武應期造有區夏義同周之武王應或作膺武王下或有也字其下三昭三穆謂之親廟與太祖而七四時常饗自如禮文伏以今年宗廟遞遷𤣥宗明皇帝在三昭三穆之外是親盡之祖雖有功德新主入廟禮合祧藏太廟中第一夾室每至禘袷之嵗合食如常藏下或有遷字或作祧遷藏太廟中中下或有從字謹議范蠡招大夫種詩之序議别本韓文考異外集巻一欽定四庫全書别本韓文考異外集巻二宋王伯大重編上賈滑州書賈耽以貞元二年為滑州刺史此篇方從蜀本愈儒服者不敢用他術干進術或作藝又惟古執䞇之禮竊整頓舊所著文一十五章以為䞇而喻所以然之意於此章或作首下同曰豐山上有鐘焉祝曰山海經云豐山有九鐘和霜鳴注云霜降則鐘鳴人所不可至霜既降則鏗然鳴蓋氣之感非自鳴也或無既字愈年二十有三讀書學文十五年言行不敢戾於古人或無有字三或作二讀書學文十五年洪云公與邢尚書書云生七嵗而讀書十三而能文二十有五擢第於春官愚固泯泯不能自計周流四方無所適歸固或作故非是伏惟閣下昭融古之典義含和發英作唐德元簡棄詭説保任皇極是宜小子刻心悚慕又焉得不感而鳴哉和或作華元或作臣方云周書注元德之首也徒以獻策闕下方勤行役且有負薪之疾不得稽首軒階遂拜書家僕待命于鄭之逆旅僕或作僮逆上或無之字伏以小子之文可見於十五章之内小子之志可見於此書與之進敢不勉與之退敢不從方作退進退之際實惟閣下裁之上考功崔虞部書或作上考功宏詞官虞部崔員外書愈不肖行能誠無可取行已頗僻與時俗異態抱愚守迷固不識仕進之門迺與羣士爭}
