  - {type: variant, offset: 447, length: 0, content: '', WYG: 巻六欽定四庫全書别本韓文考異外集巻七宋王伯大重編順宗實録二起二月盡三月二月甲子上御丹鳯門大赦天下自貞元二十一年二月二十四日昧爽已前大辟已下罪無輕重常赦所不原者咸赦原之諸色人中有材行兼茂明於理體者經術精深可為師法者達於吏理可使從政者宜委常參官各舉所知其在外者長吏精加訪擇具名聞奏仍優禮發遣舊事宫中有要市外物令官吏主之與人為市隨給其直外物下或有間字貞元末以宦者為使抑買人物稍不如本估末年不復行文書置白望數百人於兩市并要閙坊閲人所賣物但稱宫市即斂手付與真偽不復可辨無敢問所從來其論價之髙下者率用百錢物買人直數千錢物其論疑當作與論仍索進奉門户并脚價錢將物詣市至有空手而歸者名為宫市而實奪之常有農夫以驢負柴至城賣遇宦者稱宫市取之纔與絹數尺又就索門户仍邀以驢送至内農夫涕泣以所得絹付之不肯受曰須汝驢送柴至内農夫曰我有父母妻子待此然後食今以柴與汝不取直而歸汝尚不肯我有死而已遂歐宦者待或作得有死或作必死街吏擒以聞詔黜此宦者而賜農夫絹十匹然宫市亦不為之改易諫官御史數奏疏諫不聽上初登位禁之至大赦又明禁又貞元中買乳母皆令選寺觀婢以充之而給與其直例多不中選寺觀次當出者賣産業割與地買之貴有姿貌者以徒其徒苦之至是亦禁焉地上與字恐誤或賣產業是本後改作割地而傳者不去舊文又誤増與字貞元末五坊小兒張捕鳥雀於閭里皆為暴横以取錢物至有張羅網於門不許人出入者或有張井上者使不得汲水近之輙曰汝驚供奉鳥雀痛歐之出錢物求謝乃去或相聚飲食於肆醉飽而去賣者或不知就索其直多被歐罵或時留蛇一囊為質曰此蛇所以致鳥雀而捕之者今留付汝幸善飼之勿令飢渴賣者愧謝求哀乃携而去上在春宫時洞知其弊常欲奏禁之至即位遂推而行之人情大悦春或作東乙丑停鹽鐵使進獻舊鹽鐵錢物悉入正庫一助經費其後主此務者稍以時市珍翫時新物充進獻以其恩澤其後益甚嵗進錢物謂之羨餘而經入益少至貞元末逐月有獻焉謂之月進至是乃罷遂或作逐非是命右金吾將軍兼中丞田景度持節告哀於吐蕃以庫部員外熊執易為副兵部郎中兼中丞元季方告哀于新羅且册立新羅嗣王主客員外郎兼殿中監馬于為副三月庚午朔出後官三百人辛未以翰林待詔王伾為翰林學士壬申以故相撫州别駕姜公輔為吉州刺史前户部侍郎判度支汀州别駕蘇弁為忠州刺史追故相忠州刺史陸贄郴州别駕鄭餘慶前京兆尹杭州刺史韓臯前諫議大夫道州刺史陽城赴京師德宗自貞元十年已後不復有赦令左降官雖有名德才望以微過忤㫖譴遂者一去皆不復叙用至是人情大悦而陸䞇陽城皆未聞追詔而卒於遷所士君子惜之聞下或有於字癸酉出後宫并教坊女妓六百人聽其親戚迎于九仙門百姓相聚讙呼大喜景戌詔曰檢校司空平章事杜佑可檢校司徒平章事充度支并鹽鐵使以浙西觀察李錡為浙西節度檢校刑部尚書賜徐州軍額曰武寧制曰朕新委元臣綜釐重務爰求貳職固在能臣起居舍人王叔文精識瓌材寡徒少欲質直無隱沉深有謀其忠也盡致君之大方其言也達為政之要道凡所詢訪皆合大猷宜繼前勞佇光新命可度支鹽鐵副使依前翰林學士本官賜如故賜如或作餘如初叔文既專内外之政與其黨謀曰判度支則國賦在手可以厚給諸用事人取兵士心以固其權驟使重職人心不服藉杜佑雅有㑹計之名位重而務自全易可制故先令佑主其名而除之為副以專之藉或作籍或無藉字除之疑當作除已以户部尚書判度支王紹為兵部尚書以吏部郎中李鄘為御史中丞武元衡為左庶子初叔文黨數人貞元末已為御史在臺至元衡為中丞薄其人待之鹵莽皆有所憾而叔文又以元衡在風憲欲使附已使其黨誘以權利元衡不為之動叔文怒故有所授庚寅制下或有曰字門下侍郎守吏部尚書平章事賈耽可檢校司空兼左僕射守門下侍郎平章事鄭珣瑜可守吏部尚書守中書侍郎平章事髙郢可守刑部尚書守尚書左丞平章事韋執誼可守中書侍郎並依前平章事癸已詔曰萬國之本屬在元良主器之重歸于長子所以基社稷而固邦統古之制也廣陵王某孝友温恭慈仁忠恕博厚以容物寛明而愛人祗服訓詞言皆合雅講求典學禮必從師居有令聞動無違德朕獲纘丕緒祗若大猷惟懷永圖用建儲貳以承宗廟以奉粢盛爰舉舊章俾膺茂典宜册為皇太子改名某仍令所司擇日備禮册命初廣陵王名從水傍享至册為皇太子始改從今名丁酉吏部尚書平章事鄭珣瑜稱疾去位其日珣瑜方與諸相㑹食於中書故事丞相方食百寮無敢謁見者叔文是日至中書欲與執誼計事令直省通執誼直省以舊事告叔文叱直省直省懼入白執誼執誼逡巡慙赧竟起迎叔文就其閣語良久宰相杜佑髙郢珣瑜皆停筯以待郢下或有鄭字有報者云叔文索飯韋相已與之同餐閣中矣佑郢等心知其不可畏懼叔文執誼莫敢出言或無不字非是珣瑜獨歎曰吾豈可復居此位顧左右取馬徑歸遂不起前是左僕射賈耽以疾歸第未起珣瑜又繼去二相皆天下重望相次歸卧叔文執誼等益無所顧忌逺近大懼焉别本韓文考異外集巻七欽定四庫全書别本韓文考異外集巻八宋王伯大重編順宗實録三起四月盡五月夏四月乙已上御宣政殿册皇太子册曰建儲貳者必歸于冢嗣固邦本者允屬於元良咨爾元子廣陵王某幼挺岐嶷長標洵淑佩詩禮之明訓宣忠孝之𢎞規居惟保和動必循道識達刑政器合温文愛敬奉於君親仁德聞于士庶神祗龜筮罔不協從是用命爾為皇太子於戲惟我烈祖之有天下也功格上帝祚流無窮光纘洪業逮予十葉䖍恭寅畏日慎一日付爾以承祧之重勵爾以王鬯之勤以貞萬國之心以揚三善之德爾其尊師重傅親賢逺佞非禮勿踐非義勿行對越天地之耿光丕承祖宗之休烈可不慎歟時上即位已久而臣下未有親奏對者内外盛言王伾王叔文專行斷決日有異説又屬頻雨皆以為羣小用事之應至將册禮之夕雨乃止迨行事之時天氣清朗有慶雲見識者以為天意所歸及覩皇太子儀表班行既退無不相賀至有感泣者戊申詔曰惟先王光有天下必正我邦本以立人極建儲貳以承宗祧所以啟迪大猷安固洪業斯前代之令典也皇太子某體仁秉哲恭敬温文德協元良禮當上嗣朕奉若丕訓憲章前式惟承社稷之重載考春秋之義授之匕鬯以奉粢盛爰以令辰俾膺茂典今册禮云畢感慶交懷思與萬方同其惠澤自貞元二十一年二月二十四日已後至四月九日昧爽已前天下應犯死罪者特降從流流已下遞減一等文武常叅并州府縣官子為父後者賜勲兩轉古之所以教太子以茂選師傅以翼輔之法於訓詞而行其典禮左右前後罔非正人是以教諭而成德也給事中陸質中書舍人崔樞積學懿文守經據古夙夜講習庶協于中並充皇太子侍讀天下孝子順孫先旌表門閭者委所管州縣各加存䘏庚戌封皇太子長子寧等六人皆為王癸酉當作丑贈吐蕃弔祭使工部侍郎兼御史大夫史館修撰張薦禮部尚書薦字孝舉代居深州之陸澤祖文成博學工文詞性好詼諧七登文學科薦聰明強記歴代史傳無不貫通為太師顏真卿所稱賞遂知名大厯中江東觀察表薦之江或作浙授左司禦率府兵曹參軍兼史館修撰貞元初為太常博士四年迴紇求和親使送咸安公主入迴紇以薦為判官改授殿中侍御史累遷諫議大夫十一年册迴紇子薦以秘書少監持節為使還久之遷秘書監二十年吐蕃贊普死以薦為工部侍郎兼御史大夫持節弔贈卒于赤嶺東迴紇辟吐蕃傳歸其柩辟字恐誤前後三使異國自始命至卒常兼史職在史館二十年著宰輔傳畧五服圖記寓居録靈怪集等景寅罷閩中萬安監先是福建觀察栁冕久不遷欲立事迹以求恩寵立或作以乃奏云閩中南朝放牧之地畜羊馬可使孳息請置監許之收境中畜産令吏牧其中收或作牧羊大者不過十斤馬之良者估不過數千不經時輒死又斂百姓苦之逺近以為笑至是觀察閻濟美奏罷之丁夘命焚容州所進毒藥可殺人者可或作所五月已已史作戊辰無五月字以杭州刺史韓臯為尚書左丞左或作右辛未史作五月已已以右金吾大將軍范希朝為檢校右僕射兼右神䇿京西諸城鎮行營兵馬節度使叔文欲專兵柄藉希朝年老舊將故用為將帥使主其名而尋以其黨韓泰為行軍司馬專其事主或作在甲戌以度支郎中韓泰守兵部郎中兼中丞充左右神策京西都栅行營兵馬節度行軍司馬賜紫乙亥追改為檢校兵部郎中職如故甲申史作丁丑以萬年令房啟為容州刺史兼御史中丞初啟善於叔文之黨因相推致遂獲寵于叔文求進用或無因字叔文以為容管經畧使使行約至荆南授之云脱不得荆南即與湖南故啟宿留於江陵久之方行至湖南又久之而叔文與執誼爭權數有異同故不果尋聞皇太子監國啟惶駭奔馳而往是日以郴州員外司馬鄭餘慶為尚書左丞是日史作癸未乙酉以尚書左丞韓臯為鄂岳觀察武昌軍節度使以尚下十八字史作以右丞韓臯為鄂岳沔蘄團練觀察使仍日係甲辰下初臯自以為前輩舊人累更重任頗以簡倨自髙嫉叔文黨謂人曰吾不能事新貴人臯從弟􅋫幸於叔文以告叔文故出之辛邜以王叔文為户部侍郎職如故賜紫初叔文欲依前帶翰林學士宦者俱文珍等惡其專權削去翰林之職叔文見制書大驚謂人曰叔文日時至此商量公事若不得此院職事即無因而至矣王伾曰諾即疏請不從再疏乃許三五日一入翰林去學士名又與歸登同日賜紫内出衫笏賜登而叔文不霑文珍等所惡獨不得賜今按而叔文下數句重復不可讀疑因後來修改已増新字而不去舊文如買乳母之例也蓋上文已有俱文珍等惡其專權之句則此不當更有文珍等所惡五字有不霑字則不當更有獨不得賜四字若并有此九字則上不當有不霑字且此文珍等字上亦合更有脱字謬誤甚明今當削去文珍等以下九字則語意明白無復可疑矣由此始懼以衢州别駕令狐峘為秘書少監峘國子祭酒德棻𤣥孫進士登第司徒楊綰未達時遇之以為賢為禮部修史引峘入史館自華原尉拜拾遺累遷起居舍人大厯八年劉晏為吏部尚書奏峘為刑部員外判南曹累遷至禮部侍郎峘之判南曹晏為尚書楊炎為侍郎峘得晏之舉分闕必擇其善者與晏而以惡者與炎炎固已不平至峘為禮部而炎為相有杜封者故相鴻漸之子求補𢎞文生炎甞出杜門下託峘以封峘謂使者曰相公欲封成其名乞署封名下一字峘因得以記焉炎不意峘賣之署名屬峘峘明日疏言宰相炎迫臣以威臣從之則負陛下不從即炎當害臣即或作則德宗以問炎炎具道所以德宗怒曰此姦人不可奈欲杖而流之炎救解乃黜為衡州别駕貞元初李泌為相以左庶子史館修撰徵至則與同職孔述睿爭競細碎數侵述睿述睿長告以讓不欲爭告或作者也長告謂長假泌卒竇參為相惡其為人貶吉州别駕改吉州刺史齊映除江西觀察過吉州峘自以前輩懷怏怏不以刺史禮見入謁從容步進不袜首屬戎器或無袜字或又作抹非是映以為恨去至府奏峘舉前刺史過失鞫不得真無政事不宜臨郡貶衢州别駕上即位以秘書少監徵未至卒峘在史館修𤣥宗實録一百巻撰代宗實録三十巻雖頗勤苦然多遺漏不稱良史初德宗將厚奉元陵事峘時為中書舍人兼史職奏疏諫請薄其葬有答詔優奬元和三年以修實録功追贈工部尚書是月以襄州為襄府按元和郡國志作襄陽大都督府襄下當有陽字徙臨漢縣於古城曰鄧城縣别本韓文考異外集巻八欽定四庫全書别本韓文考異外集巻九宋王伯大重編順宗實録四起六月盡七月六月乙亥乙或作已貶宣州巡官羊士諤為汀州寧化縣尉士諤性傾躁時以公事至京遇叔文用事朋黨相煽頗不能平公言其非叔文聞之怒欲下詔斬之執誼不可則令杖殺之執誼又以為不可遂貶焉由是叔文始大惡執誼往來二人門下者皆懼先時劉闢以劍南節度副使將韋臯之意于叔文求都領劍南三川謂叔文曰太尉使某致微誠於公若與其三川當以死相助若不用某亦當有以相酬使某或作使闢與其疑當作與某叔文怒亦將斬之而執誼固執不可闢尚遊京師未去至聞士諤遂逃歸尚下或有以字貶或作貶今按士上當或有貶字左散騎常侍致仕張萬福卒萬福魏州元城人也自曽祖至父皆明經官止縣令州佐萬福以祖父業儒皆不達不喜書學騎射年十七八從軍遼東有功為將而還累遷至壽州刺史州送租賦詣京師至潁川界為盜所奪福使輕兵馳入潁川界討之入潁川或作入潁州賊不意萬福至忙迫不得戰萬福悉聚而誅之盡得其所亡物并得前後所掠人妻子財物牛馬萬計悉還其家為淮南節度崔圓所忌失刺史改鴻臚卿以節度副使將兵千人鎮壽州萬福不以為恨許杲以平盧行軍司馬將卒三千人駐濠州不去有窺淮南意圓令萬福攝濠州刺史杲聞即提卒去止當塗陳莊賊䧟舒州圓又以萬福為舒州刺史督淮南岸盜賊連破其黨大厯三年召赴京師代宗謂曰聞卿名久欲一識卿且將累卿以許杲萬福拜謝因前曰陛下以許杲召臣如河北賊諸將叛以屬何人代宗笑曰且欲議許杲事方當大用卿即以為和州刺史行營防禦使督淮南岸盜賊至州杲懼移軍上元杲至楚州大掠節度使韋元甫命萬福討之未至淮陰杲為其將康自勤所逐勤或作勸下同自勤擁兵繼掠循淮而東擁或作權萬福倍道追而殺之免者十二三盡得其所虜掠金銀婦女等皆獲致其家女或作人代宗詔以本州兵千五百人防秋京西遂帶和州刺史鎮咸陽固留宿衛固或作因李正已反將斷江淮路令兵守埇橋渦口江淮進奉船千餘隻泊渦口不敢進德宗以萬福為濠州刺史萬福馳至渦口立馬岸上發進奉船淄青將士停岸睥睨不敢動諸道繼進改泗州刺史為杜亞所忌徵拜左金吾衛將軍召見德宗驚曰杜亞言卿昏耄卿乃如是徤耶圖形凌烟閣數賜酒饌衣服并勅度支籍口畜給其費至賀陽城等于延英門外天下益重其名二十一年以左散騎常侍致仕元和元年卒年九十萬福自始從軍至卒禄食七十年未甞病一日典九郡皆有惠愛癸丑韋臯上表請皇太子監國又上皇太子牋尋而裴垍嚴綬表繼至悉與臯同贈故忠州别駕陸䞇兵部尚書故道州刺史陽城左常侍䞇字敬輿呉郡人也年十八進士及第又以博學宏詞授鄭縣尉書判拔萃授渭南尉遷監察御史未㡬選為翰林學士遷祠部員外郎德宗幸奉天䞇隨行在天下搔擾逺近徵發書詔一日數十下皆出於䞇一日或作曰百非是䞇操筆持紙成於須㬰不復起草同職皆拱手嗟嘆不能有所助常啟德宗言方今書詔宜痛自引過罪已以感人心昔成湯以罪已致興後代推以為聖人楚王失國亡走一言善而復其國至今稱為賢者陛下誠能不恡改過以言謝天下臣雖愚陋為詔詞無所忌諱庶能令天下叛逆者迴心喻旨德宗從之故行在制詔始下聞者雖武人悍卒無不揮涕感激議者咸以為德宗尅平冦難旋復天位不惟神武成功爪牙宣力蓋以文德廣被腹心有助焉累遷考功郎中諫議大夫中書舍人兼翰林學士丁母憂免喪權知兵部侍郎復入翰林中外屬意旦夕竢其為相竇參深忌之䞇亦短參之所為且言其黷貨於是與參不能平尋真拜兵部侍郎知禮部貢舉於進士中得人為多八年春遷中書侍郎平章事始令吏部毎年集選人舊事吏部每年集人其後遂三年一置選選人猥至文書多不了尋勘真偽紛雜吏因得大為姦巧選士一蹉跌或至十年不得官而官之闕者或累嵗無人䞇令吏部分内外官員為三分計闕集人以為常其弊十去七八天下稱之初竇參出李㢲為常州刺史}
