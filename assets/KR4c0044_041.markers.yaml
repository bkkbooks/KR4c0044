  - {type: line-break, offset: 362, content: '', id: KR4c0044_SBCK_041-2b08}
  - {type: indent, offset: 362, content: 　　　, id: KR4c0044_krp_041-bkkind56}
  - {type: variant, offset: 362, length: 0, content: '', WYG: 方本有之以附嘲鼾睡詩之後云此篇見文苑英華蓋為董晉作董晉行狀亦可攷右謹按符瑞圖王者德至於地則嘉禾生伏惟皇帝陛下道合天地恩霑動植邇無不協逺無不賔神人以和風雨咸若前件嘉禾等或兩根並植一穗連房或延蔓敷榮異實共蒂既叶和同之慶又標豐稔之祥感自皇恩微莖何極於造化親逢嘉瑞小臣喜遇於休明無任}
  - {type: page-break, offset: 362, content: '', id: KR4c0044_WYG_041-9a, image: WYG1073/WYG1073-0692c.png}
  - {type: indent, offset: 370, content: 　, id: KR4c0044_krp_041-bkkind57}
  - {type: variant, offset: 370, length: 0, content: '', WYG: 伏見勅命皇帝以閏正月三日嗣臨寶位海内惟新凡在臣庶不勝慶幸惟俯同下情未由拜賀但増馳戀謹奉狀不宣某再拜或無此三字}
  - {type: variant, offset: 377, length: 1, content: 觀, SBCK: 􅀚}
