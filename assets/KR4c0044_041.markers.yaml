  - {type: variant, offset: 115, length: 3, content: 制祭董, WYG: 上疏請官自賣鹽可以富國强兵陳利害一十八條詔下其説令公卿詳議公與韋處厚條詰之事遂不行平叔所陳十八條此可見者十六方云白樂天作平叔判度支詞曰計能析秋毫吏畏如夏日東坡曰此必小人也按栁氏家訓平叔後以賍敗窮失官錢四十萬緍是宜以此終也樊曰食貨志云自兵興河北鹽法羈縻而已至皇甫鎛又奏置㩁鹽法如江淮搉法犯禁嵗多及田𢎞正舉魏博歸朝穆宗命河北罷㩁鹽戸部侍郎張平叔議㩁鹽法弊請官糶鹽可以富國詔公卿議可否中書舍人韋處厚兵部侍郎韓愈詰之以為不可平叔屈服平叔所陳利害凡十八條公為隨條分析處厚則發十難以折之云張平叔所奏鹽法條件右奉勅將變鹽法事貴精詳宜令臣等各陳利害可否聞奏者平叔所上變法條件臣終始詳度恐不可施行各隨本條分析利害如後一件平叔請令州府差人自糶官鹽收實估匹段省司凖舊例支用自然獲利一倍已上者臣今通計所在百姓貧多富少除城郭外有見錢糴鹽者十無二三多用雜物及米榖博易鹽商利歸於巳無物不取或從賖貸升斗約以時熟填還用此取濟兩得利便今令州縣人吏坐鋪自糶利不關已罪則加身不得見錢及頭段物恐失官利必不敢糶變法之後百姓貧者無從得鹽而食矣求利未得斂怨已多自然坐失鹽利常數所云獲利一倍臣所未見一件平叔又請鄉村去州縣逺處令所由將鹽就村糶易不得令百姓闕鹽者臣以為鄉村逺處或三家五家山谷居住不可令人吏將鹽家至戸到多將則糶貨不盡少將則得錢無多無或作不計其往來自充粮食不足比如商人或自負擔斗石往與百姓博易所冀平價之上利得三錢兩錢不比所由為官所使到村之後必索百姓供應所利至少為弊則多此又不可行者也一件平叔云所務至重須令廟堂宰}
