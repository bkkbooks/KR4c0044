  - {type: variant, offset: 121, length: 3, content: 祭石君, WYG: 也下不及百姓上不歸官家積數至多不可遽筭以此言之不為有益平叔又請令所在及農隙時併召車牛盤鹽送納都倉不得令有闕絶者州縣和顧車牛百姓必無情願事須差配然付脚錢百姓將車載鹽所由先皆無檢齊集之後始得載鹽及至院監請受又須待其輪次不用門戸皆被停留輸納之時人事又别凡是和顧無不皆然百姓寧為私家載物取錢五}
