  - {type: variant, offset: 419, length: 1, content: 福, WYG: 下云上顛師四月七日愈啟方無此二字海上窮處無與話言側承道髙思獲披接專輒有此咨屈儻惠能降喻非所敢望也惠字疑衍或下有然字而併在能字之下諸本及石本皆誤至此一二日却歸髙居亦無不可旦夕渴望杭本無倘惠以下二十七字而有此旬來晴明不甚熱倘能乗間一訪實謂幸也十八字今按此旬以下乃下篇語定從石本不宣愈白方據石本無愈白字今據石本與前書同但云六月初三日愈啟方無此二字惠勻至辱答問珍悚無已所示廣大深逈非造次可諭杭作量易大傳曰書不盡言言不盡意然則聖人之意其終不可得而見邪方據石本意作㫖無而字邪作也今按易實作意邪而無終而二字大抵石本亦自多誤也後放此如此而論讀來一百遍一字疑衍蘇氏所謂凡鄙蓋指此等處耳不如親見顏色隨問而對之易了方據石夲如此但無親字處今按親下當有見字而兩本皆闕故不敢増而空其以待知者杭但云不如親面而對之是亦蘇氏所謂凡鄙者然親字乃方本之闕文面字乃問字之誤筆而又脱去顔色隨易了六字耳此旬來晴明旦夕不甚熱倘能乗閒一訪幸甚旦夕馳望杭本已見上篇此不復出愈聞道無疑滯行止繫縛茍非所戀著則山林閒寂與城郭無異此從杭本但郭作隍今㨿歐公語從方本方據石本止下有所字下有愛戀字所下無戀字及則字而著字下伏出著字及與字異下有邪字皆非是其用邪字尤不當律令亦所謂凡鄙者也但或疑非字下當有有字言於行止繫縳若無所戀則静閙一致語尤明白耳或者又疑非當作有則語意賔主尤順然未知孰是又諸本皆無不敢輒増改也大顛師論甚宏愽而必守山林義不至城郭顛杭見上或無師字義字城作州自激修行獨立空曠無累之地者非通道也自方作似然細考之與下文激修行四字皆可疑方又以也為矣而并非通道四字屬於行字之下又以獨為自而立下有於字皆非是勞於一來安於所適道故如是於杭作于適方據石本與杭本並作識今得真石本考之乃如此然則方之所考亦不詳矣蓋適猶便也與唯適之安之語用字畧同言一來雖勞而既來則當隨其所便無處不安也道故如是即所以結上文道無疑滯之意方以如為此亦石本誤不宣愈頓首方據石本無未三字今據石本與前二書同但云大顛禪師七月十五日不知韓公之於大顛既聞其語而為禮益恭如此何也别本韓文考異外集巻二欽定四庫全書别本韓文考異外集巻三宋王伯大重編送汴州監軍俱文珍序并詩韓曰董晉為宣武軍節度使俱文珍為監軍公為觀察推官文珍將如京師作序詩而送之樊曰此序不入正集李漢以文珍故為公諱耶今之天下之鎮陳留為大屯兵十萬連地四州左淮右河抱負齊楚濁流浩浩舟車所同故自天寶已來當藩垣屏翰之任有弓矢鈇鉞之權皆國之元臣天子所左右屏翰方作翰屏其監統中貴必材雄德茂榮耀寵光能俯達人情仰喻天意者然後為之故我監軍俱公輟侍從之榮受腹心之寄奮其武毅張我皇威遇變出奇}
