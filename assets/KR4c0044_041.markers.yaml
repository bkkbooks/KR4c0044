  - {type: variant, offset: 431, length: 10, content: 名迓杜兼題名華嶽題名, WYG: 李生壁平余始得李生於河中今相遇於下邳自始及今十四年矣邳或作邽非是洪云下邳貞觀中屬泗元和中屬徐始相見吾與之皆未冠未通人事追思多有可笑者與生皆然也今者相遇皆有妻子昔時無度量之心寧復可有是生之為交何其近古人也近下方有於字是來也余黜於徐州將西居於洛陽泛舟於清泠池泊於文雅臺下西望商丘東望修竹園入微子廟求鄒陽枚叔司馬相如之故文久立於廟陛間悲那頌之不作於是者已久丘或作州非是廟陛間或作廟下陛間頌之方作之頌衍今按廟字疑或作廟下隴西李翺太原王涯上谷侯喜實同與焉涯或作渥貞元十六年五月十四日}
