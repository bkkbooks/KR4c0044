  - {type: variant, offset: 144, length: 6, content: 牒第六卷順宗, WYG: 優則一作有今既奪其業又禁不得求覔職事及為人把錢捉店看守莊磑不知其罪其一作何一朝窮蹙之也若必行此則富商大賈必生怨恨或收市重寶逃入反側之地以資冦盜此又不可不慮也一件平叔云叔下疑當有云字或稱字之類今亦補足行此䇿後兩市軍人富商大賈或行財賄邀截喧訴請令所由切加收捉如獲頭首所在决殺連狀聚衆人等各决脊杖二十檢責軍司軍戸鹽如有隠漏並凖府縣例科决并賞所由告人者此一件若果行之不惟大失人心兼亦驚動逺近不知糶鹽所獲幾何而害人蠧政其弊}
