  - {type: variant, offset: 239, length: 0, content: '', WYG: 牟}
  - {type: variant, offset: 240, length: 1, content: 㝷, WYG: 執中尋}
  - {type: indent, offset: 246, content: 　, id: KR4c0044_krp_041-bkkind41}
  - {type: variant, offset: 246, length: 0, content: '', WYG: 方云此詩得於五竇聮珠集公時任都官外郎同洛陽令竇公河南令韋執中以訪之元和五年也詩以同尋師為韻人各一首洪氏年譜亦見秦客何年駐仙源此地深還隨躡鳬騎來訪馭風襟院閉青霞入松髙老鶴尋猶疑影形坐敢起竊桃心}
