  - {type: indent, offset: 266, content: 　, id: KR4c0044_krp_041-bkkind47}
  - {type: variant, offset: 266, length: 0, content: '', WYG: 諸本注云此篇恐非公作今姑存之抑逼教唱歌不解看豔詞坐中把酒人豈有歡樂姿幸有伶者婦其身如栁枝但令奉君酒如醉如憨癡聲自肉中出使人能逶隨復奉慳恡者贈金不皺眉豈有長直夫喉中聲雌雌君心豈無恥君豈是女兒君教發直言大聲無休時君教哭古恨不肯復吞悲乍可阻君意豔歌難可為}
