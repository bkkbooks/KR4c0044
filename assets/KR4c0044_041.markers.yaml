  - {type: variant, offset: 445, length: 0, content: '', WYG: 寡人無以知此遂大愛幸與王伾兩人相依附俱出入東宮聞德宗大漸上疾不能言伾即入以詔召叔文入坐翰林中使决事詔下或無召字文下或無入字使下或無決字伾以叔文意入言於宦者李忠言稱詔行下外初無知者以檢校司空平章事杜佑攝冢宰兼山陵使中丞武元衡為副使宗正卿李紓為按行山陵地使刑部侍郎鄭雲逵為鹵簿使或無兼字紓或作杼逵或作達又命中書侍郎平章事髙郢撰哀册文禮部侍郎權德輿撰諡册文太常卿許孟容撰議文庚子百寮請聽政曰自漢以來喪期之數以日易月而皆三日而聽政以來或作已來我國家列聖亦克修奉罔或有違況大行皇帝酌於故實重下遺詔今日至期而陛下親政事羣臣不敢安宜存大孝以寧萬國天下之幸不許是月昇泗州為上州二月辛丑朔中書侍郎平章事臣郢門下侍郎平章事臣珣瑜檢校司空平章事臣佑奉疏曰大行皇帝知陛下仁孝慮陛下悲哀不即人心聽政事故發遺詔令一行漢氏之制今陛下安得守曽閔匹夫之小行忘皇王繼親之大孝以虧臣子承順之義猶不許壬寅宰臣又上言曰陛下以聖德至孝繼受寶命宜奉先帝約束以時聽斷不可以久從之癸卯朝百寮于紫宸門杜佑前跪進曰陛下居憂過禮羣臣懼焉願一覩聖顔因再拜而起左右乃為皇帝舉帽百寮皆再拜佑復奏曰陛下至性殊常哀毁之甚臣等不勝惶灼伏望為宗廟社稷割哀強食景午罷翰林陰陽星卜醫相覆碁諸待詔三十二人三或作四初王叔文以碁待詔既用事惡其與已儕類相亂罷之已酉易定節度使張茂昭可同中書門下平章事餘如故或無使字可史作兼河北節度自至德已來不常朝覲前年冬茂昭來朝未還故寵之辛亥史作夘詔吏部侍郎韋執誼守左丞同中書門下平章事賜紫侍郎史作郎中左丞史作尚書右丞初執誼為翰林學士知叔文幸於東宫傾心附之叔文亦欲自廣朋黨密與交好至是遂特用為相乙夘太常奏禮云喪三年不祭惟祭天地社稷周禮圜鍾之均六變天神皆降林鍾之均八變地示咸出不廢天地之祭不敢以卑廢尊也樂者所以降神也不以樂則祭不成今遵遺詔行易月之制請制内遇祭輟樂終制用樂從之又奏禮三年祭宗廟今請竢袝廟畢復常從之辛酉貶京兆尹李實為通州長史詔曰實素以宗屬累更任使驟升班列遂極寵榮而政乖惠和務在苛厲詔下或有詞一道字曰下或有京尹字實上或有嗣道王字比年旱歉先聖憂人特詔逋租悉皆蠲免而實敢肆誣罔復令徵剥頗紊朝廷之法實惟聚斂之臣歉或作暵自國哀以來増毒彌甚無辜斃踣深所興嗟朕嗣守洪業敷𢎞理道寧容蠧政以害齊人宜加貶黜用申邦憲尚從優貸俾佐逺藩實謟事李齊運驟遷至京兆尹恃寵強愎不顧文法文或作乃是時春夏旱京畿乏食實一不以介意方務聚斂徵求以給進奉毎奏對輒曰今年雖旱而穀甚好由是租税皆不免人窮至壞屋賣瓦木貸麥苗以應官或無貸字優人成輔端為謡嘲之實聞之奏輔端誹謗朝政杖殺之實遇侍御史王播於道故事尹與御史相遇尹下道避實不肯避導騎如故播詰讓導騎者實怒遂奏播為三原令廷詬之原或作泉非是陵轢公卿已下隨喜怒誣奏遷黜朝廷畏忌之陵或作凌常有詔免畿内逋租實不行用詔書徵之如初勇於殺害人吏不聊生至譴市里讙呼皆袖瓦礫遮道伺之實由閒道獲免壬戌洪云史作寅誤制殿中丞皇太子侍書翰林待詔王伾可守左常侍依前翰林待詔書或作讀依前翰林待詔史作充翰林學士今按前云上學書於王伾後云以侍書得幸於上則此當從史作侍書為是蘇州司功王叔文可起居舍人翰林學士又以司勲員外郎翰林學士知制誥鄭絪為中書舍人學士如故又以給事中馮伉為兵部侍郎以兵部員外郎史館修撰歸登為給事中修撰如故登伉皆上在東宫時侍讀以師傳恩拜别本韓文考異}
