  - {type: variant, offset: 129, length: 10, content: 髙君仙硯銘髙君畫賛潮, WYG: 錢也文下或無錢字不和顧則無可載鹽和顧則害及百姓此又不可也一件平叔稱停減鹽務所由收其粮課一嵗尚得十萬貫文尚或作計今又稱既有巡院請量閒劇留官吏於倉塲勾當要害守捉少置人數優恤粮料嚴加把捉如有漏失私糶等並凖條處分者平叔所管鹽務所由人數有幾量留之外收其粮課一嵗尚得十萬貫此又不近理也比來要害守捉人數至多尚有漏失私糶之弊今又減置人數謂能私鹽斷絶此又於理不可也一件平叔云變法之後嵗計必有所餘日用還恐不足謂一年已來且未責以課利後必數倍校多者此又不可方今國用常言不足若一嵗頓闕課利為害已深雖云明年校多豈可懸保此又非公私蓄積尚少之時可行者也一件平叔又云浮寄姦猾者轉富土著守業者日貧若官自糶鹽不問貴賤貧富士農工商道士僧尼并兼游惰因其所食盡輸官錢并諸道軍諸使家口親族遞相影占不曽輸稅若官自糶鹽此輩無一人遺漏者臣以此數色人等官未自糶鹽之時從來糴鹽而食不待官自糶然後食鹽也糶上或有來字今按文勢恐於字上更有從字今亦補足若官不自糶鹽此色人等不糴鹽而食官自糶鹽即糴而食之則信如平叔所言矣若官自糶與不自糶皆常糴鹽而食則今官自糶亦無利也所謂知其一而不知其二見其近而不見其逺也國家𣙜鹽糶與商人商人納榷糶與百姓國或作官則是天下百姓無貧富貴賤皆已輸錢于官矣不必與國家交手付錢然後為輸錢于官也一件平叔云初定兩税時絹一匹直錢三千今絹一匹直錢八百百姓貧虛或先取粟麥價及至收穫悉以還債又充官稅顆粒不殘若官中糶鹽一家五口所食鹽價不過十錢隨日而輸不勞驅遣則必無舉債逃亡之患者舉債或作舉賃臣以為百姓困弊不皆為鹽價貴也今官自糶鹽與依舊令商人糶其價貴賤所校無多通計一家五口所食之鹽平叔所計一日以十錢為率一月當用錢三百是則三日食鹽一斤一月率當十斤三百是方作三百六十足云或云六十字恐羡非盖鹽每斤已當三十六文月當十斤則三百六十也足或作是屬下句今按平叔所究鹽價一斤止三十文韓公通計民間所加脚費多者一月或至三十六文耳其地近者自不及此難預計也故此上文但云一日以十錢為率則一月安得用三百六十乎其六十字當依或説刪去足改作是而屬下句為當新法實價與舊每斤不校三四錢以下通計五口之家以平叔所約之法計之賤於舊價日校一錢月校三十不滿五口之家所校更少然則改用新法百姓亦未免窮困流散也初定稅時一匹絹三千今只八百假如特變鹽法絹價亦未肯貴五口之家因變鹽法日得一錢之利豈能便免作債收穫之時不被徴索輸官税後有贏餘也以臣所見百姓困弊日乆不以事擾之自然漸校不在變鹽法也今絹一匹八百百姓尚多寒無衣者若使匹直三千則無衣者必更衆多况絹之貴賤皆不縁鹽法以此言之鹽法未要變也一件平叔云每}
