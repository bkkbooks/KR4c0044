  - {type: variant, offset: 224, length: 0, content: '', WYG: 方云見孟東野集相思繞我心日夕千萬重年光坐婉娩春淚銷顏容郊臺鏡晦舊暉庭草滋深茸望夫山上石别劍水中龍愈}
  - {type: indent, offset: 228, content: 　, id: KR4c0044_krp_041-bkkind39}
  - {type: variant, offset: 228, length: 0, content: '', WYG: 説見上我心隨月光寫君庭中央郊月光有時晦我心安所忘愈常恐金石契斷為相思腸郊平生無百嵗岐路有四方愈四方各異俗適異非所將郊駑蹄顧挫秣逸翮遺稻梁愈時危抱獨沉道泰懷同翔郊獨居久寂黙相顧聊慨慷愈慨慷丈夫志可以耀鋒鋩郊蘧甯知巻舒孔顔識行藏愈殷鑒諒不逺佩蘭永芬芳郊茍無夫子聽誰更知音揚愈}
  - {type: page-break, offset: 228, content: '', id: KR4c0044_WYG_041-1b, image: WYG1073/WYG1073-0688d.png}
  - {type: variant, offset: 229, length: 1, content: 劔, WYG: 劍}
  - {type: 'kr:newline', offset: 235, content: '

