  - {type: variant, offset: 271, length: 0, content: '', WYG: 韓曰古詩不愁歌者苦但傷知音希知音者誠希念子不能别行行天未曉擕手踏明月}
  - {type: variant, offset: 281, length: 1, content: 寄, SBCK: 􅀉}
  - {type: indent, offset: 282, content: 　, id: KR4c0044_krp_041-bkkind49}
  - {type: variant, offset: 282, length: 0, content: '', WYG: 京城數尺雪寒氣倍常年泯泯都無地茫茫豈是天崩奔驚亂射揮霍訝相纒不覺侵堂陛方應折屋椽出門愁落道上馬恐平韉朝鼓矜凌起山齋酩酊眠吾方嗟此役君乃詠其妍水玉清顔隔波濤盛句傳朝飱思共飯夜宿憶同氊舉目無非白雄文乃獨𤣥}
