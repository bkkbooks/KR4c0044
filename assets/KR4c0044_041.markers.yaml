  - {type: variant, offset: 116, length: 1, content: 祭, SBCK: 􅀕}
  - {type: variant, offset: 119, length: 0, content: '', WYG: 充使臣以為若法可行不假令宰相充使若不可行雖宰相為使無益也下若字或作令或有若字無下十一字又宰相者所以臨察百司考其殿最或無者字或無又者二字若自為使縱有敗闕遣誰舉之此又不可者也一件平叔又云法行之後停減鹽司所由糧課年可收錢十萬貫方無一件字今按此别是一條當有一件字臣以為變法之後弊隨事生尚恐不登常數安得更望贏利一件平叔欲令府縣糶鹽每月更加京兆尹料錢百千司録及兩縣令每月各加五十千其餘觀察及諸州刺史縣令録事參軍多至每月五十千少至五千三千者臣今計此用錢已多其餘官典及巡察手力所由等粮課仍不在此數通計所給每嵗不下十萬貫未見其利所費已廣平叔又云停鹽司諸色所由粮課約每嵗合減得十萬貫錢或無所由二字今臣計其新法亦用十萬不啻減得十萬却用十萬所亡所得一無贏餘也平叔又請以糶鹽多少為刺史縣令殿最多者遷轉不拘常例如闕課利依條科責者刺史縣令職在分憂今惟以鹽利多少為之升黜不復考其治行非唐虞三載考績黜陟幽明之義也一件平叔請定鹽價每斤三十文又每三百里每斤價加收二文以充脚價量地逺近險易加至六文脚價不足官與出名為每斤三十文其實已三十六文也也上方無文字今鹽價京師每斤四十諸州則不等此變法之後祗校數文於百姓未有厚利也祗方作只脚價用五文者官與出二文用或作每二或作三用十文者官與出四文是鹽一斤官糶得錢名為三十其實斤多得二十八少得二十六文折長補短每斤收錢不過二十六七百姓折長補短每斤用錢三十四則是}
