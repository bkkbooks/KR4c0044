  - {type: variant, offset: 405, length: 1, content: 洛, WYG: 競得失行人之所甚鄙求人之所甚利其為不可雖童昏實知之失下或無行字如執事者不以是為念援之幽窮之中推之髙顯之上是知其文之或可而不知其人之莫可也知其人之或可而不知其時之莫可也不知其人上方有是字既以自咎又歎執事者所守異於人人句廢耳任目華實不兼故有所進故有所退以方作已廢上或有之字不疑當作必今按人字屬上句且執事始考文之明日浮囂之徒已相與稱曰某得矣某得矣問其所從來必言其有自一日之問九變其説凡進士之應此選者三十有二人其所不言者數人而已而愈在焉不言方作不云及執事既上名之後三人之中其二人者固所傳聞矣華實兼者也果竟得之而又升焉或無其字固上或有則字果或作畢下同其一人者則莫之聞矣實與華違行與時乖果竟退之如是則可見時之所與者時之所不與者之相逺矣然愚之所守竟非偶然故不可變竟非或作僅非故或作固凡在京師八九年矣足不跡公卿之門名不譽於大夫士之口或無譽字於或作一或無士字始者謬為今相國所第此時惟念以為得失固有天命不在趍時而偃仰一室嘯歌古人今則復疑矣未知夫天竟如何命竟如何由人乎哉不由人乎哉未上或有又字或無夫字天竟或作天意人乎或並作乎人欲事干謁則患不能小書困於投刺欲上或有夫字於或作乎欲學為佞則患言訥詞直卒事不成為方作于患下或有於字卒或作則徒使其躬儳焉而不終日其躬方本如此而舉正躬作窮蓋誤而諸本作如方云蜀本作而今本皆以表記誤刋作如然不知古如而同意此語不當以如似之義讀之唐人惟韓栁知此子厚答韋中立書假而以僕年先吾子與公此文是也董彥逺曰春秋書星隕如雨左傳室如縣罄是皆以如為而風俗通國人望君而望嵗鄒陽書白頭而新是皆以而為如按家語君入廟如右茍子作而右樂府艾如張亦作艾而張今人所用漣洏攷之李善文選乃連而也實用易之泣血漣如為義去古益逺字義多失惟韓栁文時見一二因為詳之今按孟子望道而未之見亦是此例方言又有而如古字通用之説然陸德明論當時語音之失有曰}
