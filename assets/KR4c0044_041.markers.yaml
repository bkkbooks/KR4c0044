  - {type: variant, offset: 417, length: 0, content: '', WYG: 字方從蜀苑新書云此書作於元和三年公時尚為博士新書云洛陽令誤也十二月某日愈頓首方無此八字伏承天恩詔河南敦諭拾遺公朝廷之士引頸東望若景星鳯皇之始見也爭先覩之為快拾遺公新書作遺公篇並内同方今天子仁聖小大之事皆出宰相樂善言如不得聞小大舉正作大小恐誤事或作士自即大位已來于今四年凡所施者無不得宜者或作為凡所施者新書作凡所出而施者勤儉之聲寛大之政幽閨婦女草野小人皆飽聞而厭道之草或作山人新書作子愈不通於古請問先生世非太平之運歟加又有非人力而至者愈方作某於作于無世字非作匪新書作兹非太平世歟年榖熟衍符貺委至若干紀之姦不戰而拘纍彊梁之兇銷鑠縮栗迎風而委伏其有一事未就正自視若不成人四海之所環無一夫甲而兵者新書無自字視或作是非是而兵或作與兵若此時也拾遺公不疾起與天下之士君子樂成而享之斯無時矣若上或有未有字昔者孔子知不可為而為之不已足跡接於諸侯之國即可為之時自藏深山牢闗而固距即與仁義者異守矣或無足跡字想拾遺公冠帶就車惠然肯來舒所蓄積以補綴盛德之有闕遺利加於時名垂于將来踊躍悚企傾刻以冀闕遺方作遺闕新書無有遺二字利下或無加字加於新書作加于垂下亦無于字傾或作頃又竊聞朝廷之議必起拾遺公使者往若不許即河南必繼以行或無即字拾遺徵君若不至必加髙秩如是則辭少就多傷於亷而害於義拾遺公必不為也則或作即新書無則字善人斯進其類皆有望於拾遺公拾遺公儻不為起使衆善人不與斯人施也或無使字也或作者今按此句疑有誤由拾遺公而使天子不盡得良臣君子不盡得顯位人庶不盡被惠利其害不為細人庶或作庶人必望審察而逺思之務使合於孔子之道幸甚而下或有長字逺新書作諦愈再拜答劉秀才論史書方從蜀苑六月九日韓愈白秀才方無此九字或有某月日韓愈白劉君足下辱問見愛教勉以所宜務敢不拜賜愚以為凡史氏褒貶大法春秋已備之矣為或作謂後之作者在據事跡實録則善惡自見或復出實録二字見下或有矣字然此尚非淺陋偷惰者所能就況褒貶邪孔子聖人作春秋辱於魯衛陳宋齊楚卒不遇而死齊太史氏兄弟㡬盡或無氏字左丘明紀春秋時事以失明司馬遷作史記刑誅班固瘐死孫曰和帝永元初洛陽令种兢以事捕固固死獄中洪曰漢律囚以飢寒死曰瘐孟堅死獄中故云瘐音愈今本作瘦傳冩之誤陳壽起又廢卒亦無所至王隠謗退死家習鑿齒無一足孫曰鑿齒字彥威襄陽人以脚疾廢居里巷符堅䧟襄陽大説之與諸鎮書曰昔晉平呉利在二陸今獲江南獲士纔一人有半耳崔浩范􅈌赤誅魏收夭絶宋孝王誅死足下所稱呉兢亦不聞身貴而今其後有聞也赤或作赤族二字夭或作或無今其字或無其後字夫為史者不有人禍則有天刑豈可不畏懼而輕為之哉唐有天下二百年矣聖君賢相相踵其餘文武之士立功名跨越前後者不可勝數豈一人卒卒能紀而傳之邪士上或無之字能上或無復出卒方云司馬遷傳卒卒無須㬰之間顔曰促遽之意也僕年志已就衰退不可自敦率或無就字敦率方云猶敦勉也或作敢為或無此二字今按此二字恐有脱誤宰相知其無他才能不足用哀其老窮齟齬無所合不欲令四海内有戚戚者猥言之上茍加一職榮之耳非必督責迫蹙令就功役也他上方無無字就下或有其字賤不敢逆盛指行且謀引去且傳聞不同善惡隨人所見傳聞或作傳云聞甚者附黨惜愛不同巧造語言鑿空構立善惡事迹於今何所承受取信而可草草作傳記令傳萬世乎方無乎字若無鬼神豈可不自心慚愧若有鬼神將不福人僕雖騃亦粗知自愛實不敢率爾為也自心上或有可字非是或無心字夫聖唐鉅跡及賢士大夫事皆磊磊軒天地决不沈没或無聖字方從文苑決下有必字又云蜀本作落落掀天地而無必字又按决或作決地或作抉地云今按古潮本軒亦或作掀而無必字盖因栁子厚書所云磊磊軒天地者決必沈没故諸本或誤加必字耳今從栁集作軒從潮本去必字今館中非無人將必有作者勤而纂之後生可畏安知不在足下亦宜勉之將必或作必將或脱不在二字愈再拜與大顛師書此篇諸本皆無唯嘉祐小杭本有之其篇次在此與作召顛作顛師作和尚方本列於石刻之首今從杭本附此而名篇從方氏杭本又注云唐元和十四年刻石在潮陽靈山禪院宋慶厯丁亥江西袁陟世弼得此書疑之因之滁州謁歐陽永叔永叔覽之曰實退之語它竟不及也方本畧載其語又録歐公集古録跋尾云文公與顛師書世所罕傳予以集録古文其求之博蓋久而後獲其以繫辭為大傳謂著山林與著城郭無異等語宜為退之之言其後書吏部侍郎潮州刺史則非也蓋退之自刑部侍郎貶潮州後移袁州召為國子祭酒兼兵部侍郎久之始遷吏部而流俗傳但知為韓吏部爾顛師遺記雖云長慶中立蓋并韓書皆國初重刻故謬為附益爾方又注云今石刻乃元祐七年重立又云按公三簡皆邀速常語耳初無崇信佛法之説妄者旁沿别譔答問等語以肆誣謗要當存此簡以解後世之惑以今按杭本不知何人所注疑袁自書也更跋尾參之其記歐公之語不謬矣而東坡雜説乃云韓退之喜大顛如喜澄觀文暢意非信佛法也而或者妄撰退之與大顛書其詞凡鄙雖退之家奴僕亦無此語今一士人又於其末妄}
