  - {type: indent, offset: 248, content: 　　　, id: KR4c0044_krp_041-bkkind42}
  - {type: variant, offset: 248, length: 0, content: '', WYG: 方云此詩得於文苑英華其後即以正集中春雪詩首句云新年都末有芳華者系之疑亦公作也已上並方本所載諸本所無者今悉存之諸本更有遺文一巻方獨取}
