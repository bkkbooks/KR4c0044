  - {type: variant, offset: 443, length: 0, content: '', WYG: 韓愈書别本韓文考異外集巻四欽定四庫全書别本韓文考異外集巻五宋王伯大重編除崔羣户部侍郎制勅地官之職邦教是先必選國華以從人望具官崔羣體道履仁外和内敏或作内和外敏清而容物善不近名從容禮樂之間特達珪璋之表比參密命𢎞益既多及貳儀曹升擢惟允邁兹令德藹然休聲兹或作此選賢與能于今雖重擇才均賦自古尤難雖方作惟重或作盛均或作經往慎乃司以服嘉命可下或有云云字祭董相公文祭下或有汴州字維貞元五年嵗次已夘二月乙亥朔某日節度行軍司馬檢校右散騎常侍兼御史大夫知使事呉縣開國男食邑三百户陸長源呉縣開國或作呉郡或無食邑三百户字度支營田判官檢校金部員外郎侍御史孟叔度觀察支使監察御史裏行丘潁觀察推官守祕書省校書郎韓愈等謹以少牢之奠敬祭于故尚書右僕射平章事隴西公之靈嗚呼天髙而明地厚而平五氣叙行萬彚順成交感旁暢聖賢以生雨水于雲瀆水于坤蕃昌生物有假有因坤或作神昌生或作生庶天睠唐邦錫之元臣肫肫元臣其德孔碩肫肫或作盹盹誤不謟不笑不威不赫不謟不笑或作不容不謟或作不䧟不酷或無不笑二字而連下文不威為句下文其敵下别出不讐二字與上求字叶不求其盈不致其敵盈方作用爰立作相訏謨實勒立方作初出若無辭疇德之聞德或作得帝念東土公其來撫乃守洛都乃藩浚郊迺去厥疾乃施厥膏不知其勞鰥寡以饒維昔浚郊厥亂維舊昔或作若厥亂維舊或作維亂舊政或作維亂政舊有狡有狂其羣孔醜公其來矣為民父母為民或作公為非是父誨其義母仁其愚既變既從孰云其初孰云或作親去或作親云非是自爾徂逺混然一區公來自中天子所倚公今不歸誰佐天子公既來止東人以完公既來止方作既來至止或作公來至止今依行狀更定公既殁矣人誰與安濁流渾渾有闢其郛填道歡呼公來之初今公之歸公在喪車旨酒既盈嘉肴在盛嗚呼我公庶享其誠尚饗雷塘禱雨文此篇乃栁子厚文此不當録祭石名文或作祭石濬川文維元和七年嵗次壬辰十月二十七日右補闕宋景國子博士韓愈謹以清酌庶羞之奠敬祭于石三學士之靈或無敬字惟君學成于身名彰于人知道之可行見人之不幸見人或作知命或作見命不上或無之字不事顧讓以圖就功如何奄忽永喪其躬此四字或作以喪其良能下或有知微有議四字或作不負長已誰知曰有義何害文今按諸本皆無理疑不足據曰景與愈與游為久或無曰字景下或無與字愈下有也字為久作日久自君之逝相遇輒哀傍無強親子孩妻姖或作稚方云姖古文姬字然義亦不近敢忘分濟念力未任客葬秦原孤䰟誰附奠以送訣悲何可窮尚饗祭房君文房次卿字蜀客維某年月日愈謹遣舊吏皇甫悦以酒肉之饋展祭于五官蜀客之柩前方無維某字愈作某或無日字嗚呼君迺至于此吾復何言於此或作於斯若有鬼神吾未死無以妻子為念嗚呼君其能聞吾此言否君上或有房字尚饗髙君仙硯銘并序儒生髙常與予下天壇中路獲硯石似馬蹄狀外稜孤聳内發墨色幽奇天然疑神仙遺物寶而用之請予銘底仙馬有靈跡在于石稜而宛中有㸃墨迹文字之祥君家其昌方云應劭武紀注大苑舊有天馬種蹋石汗血顔曰蹋石謂蹋石有迹言其蹄堅利宋新仲謂銘語本此髙君畫讚此篇方從蜀本録之今按疑非公所作然姑存之君子温閑骨氣委和迹不拒物心不揚波澄源巻璞含白瑳瑳遺紙一張德音不忘潮州請置鄉校牒孔子曰道之以政齊之以刑則民免而無恥不如以德禮為先而輔以政刑也齊上或有而字或無則字或無禮字夫欲用德禮未有不由學校師弟子者此州學廢日久進士明經百十年間不聞有業成貢於王庭試於有司者百十年間方作百十數年非是貢於試於並無於字人吏目不識鄉飲酒之禮耳未甞聞鹿鳴之歌孫曰唐制鄉舉試訖長吏以鄉飲酒禮㑹屬僚設賔主陳俎豆備筦絃牲用少牢歌鹿鳴之詩與耆艾叙少長焉忠孝之行不勸亦縣之恥也方無目與耳字夫十室之邑必有忠信今此州戸萬有餘豈無庶㡬者邪刺史縣令不躬為之師里閭後生無所從學爾或作耳又或作矣非是趙德秀才沈雅專靜頗通經有文章能知先王之道論説且排異端而宗孔氏可以為師矣師下方有友字請攝海陽縣尉為衙推官或無官字專勾當州學以督生徒興愷悌之風刺史出已俸百千以為舉本收其贏餘以給學生㕑饌舉或作學直諫表方本無說見第三巻今從之論顧威狀同上别本韓文考異外集巻五欽定四庫全書别本韓文考異外集巻六宋王伯大重編順宗實録一起藩邸盡貞元二十一年二月方本不載實録云諸本順宗實録皆以附外集然李漢序謂又有注論語十巻傳學者順宗實録五巻列於史書不在集中則知實録固不必附也今按李漢之説據當時而言之似未為失然其為害已足使筆解亡逸無復真本實録竄易不成全書是則皆李漢之為也方氏不察而從其説既已誤矣況今去公之時又益以逺比之當日事體又大不同故其片文隻字名為公之作而決可知其非偽者皆當收拾使無失墜乃為真能好公之文者固不當以一時茍簡之論為限斷而直有所遺也故今於實録姑仍外集而詳加校定庶㡬猶足以見公筆削之大指云史臣韓愈撰或無此五字順宗至德大聖大安孝皇帝德下史有𢎞道二字諱誦德宗長子母曰昭德皇后王氏上元二年正月十二日生大厯十四年封為宣王建中元年立為皇太子史云大厯十四年六月進封宣王十二月乙夘立為皇太子慈孝寛大仁而善斷留心藝學亦微信尚浮屠法禮重師傅引見輒先拜善𨽻書德宗之為詩并他文賜大臣者率皆令上書之德宗之幸奉天倉卒間上常親執弓矢率軍後先導衛備常辛苦倉或作蒼上之為太子於父子間慈孝交洽無嫌每以天下為憂德宗在位久稍不假宰相權而左右得因縁用事外則裴延齡李齊運韋渠牟等以姦佞相次進用延齡尤狡險判度支務刻剥聚斂以自為功天下皆怨怒上每進見候顔色輒言其不可至陸䞇張滂李充等以毁譴朝臣􅋏懼諫議大夫陽城等伏閣極論德宗怒甚將加城等罪内外無敢救者上獨開解之城等賴以免德宗卒不相延齡渠牟上有力焉貞元二十一年癸已德宗崩景申上即位太極殿册曰維貞元二十一年嵗次乙酉正月辛未朔二十三日癸巳皇帝若曰於戲天下之大實惟重器祖宗之業允屬元良咨爾皇太子誦睿哲温恭寛仁慈惠文武之道秉自生之孝友之誠發于天性自膺上嗣毓德春闈恪慎于厥躬祗勤于大訓必能誕敷至化安勸庶邦朕寢疾彌留弗興弗寤是用命爾繼統俾紹前烈宜陟元后永綏兆人其令中書侍郎平章事髙郢奉冊即皇帝位爾惟奉若天道以康四海懋建皇極以熙庶功無忝我髙祖大宗之休命上自二十年九月得風疾因不能言使四面求醫藥天下皆聞知德宗憂慼形于顔色數自臨視二十一年正月朔含元殿受朝還至别殿諸王親屬進賀獨皇太子疾不能朝德宗為之涕泣悲傷歎息因感疾恍惚日益甚二十餘日中外不通兩宫安否朝臣咸憂懼莫知所為雖翰林内臣亦無知者含元殿至日益甚四十一字中云德宗不豫諸王親戚皆侍醫藥獨上卧病不能侍德宗彌留思見太子涕咽久之二十三日上知内外憂疑紫衣麻鞋不俟正冠出九仙門召見諸軍使京師稍安二十四日宣遺詔上縗服見百寮二十六日即位上學書於王伾頗有寵伾下或有復出伾字王叔文以碁進俱待詔翰林數侍太子碁叔文詭譎多計上在東宮甞與諸侍讀并叔文論政至宮市事上曰寡人方欲極言之衆皆稱贊獨叔文無言既退上獨留叔文謂曰向者君奚獨無言豈有意邪叔文曰叔文䝉幸太子有所見敢不以聞太子職當侍膳問安不宜言外事陛下在位久如疑太子收人心何以自解上大驚因泣曰非}
