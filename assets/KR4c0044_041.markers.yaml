  - {type: variant, offset: 407, length: 4, content: 惠林寺題, WYG: 人則而如靡異蓋不以為然也然則此而字須讀為如乃為正耳董引室如縣磬乃據左傳作罄字而杜預注云如而也言居室而資糧縣盡故其説如此國語則作縣磬而韋昭注云府藏空虚但有榱梁如縣磬左傳蓋借罄為磬而杜氏誤解國語則正作磬字而韋説得之董氏所引不足據以為説今併論之附見于此是以勞思長懷中夜起坐度時揣已廢然而返雖欲從之末由也已又常念古之人日已進今之人日已退常方作甞夫古之人四十而仕其行道為學既已大成而又之死不倦故其事業功德老而益明死而益光故詩曰雖無老成人尚有典刑言老成之可尚也可上或有人字又曰樂只君子德音不已謂死而不亡也已或作忘亡或作忘方作已夫今之人務利而遺道其學其問以之取}
