  - {type: variant, offset: 450, length: 0, content: '', WYG: 非是弟疑當作事叔文不之信遂成仇怨然叔文敗執誼亦自失形勢知禍且至雖尚為相當當字疑是常字不自得長奄奄無氣聞人行聲輒惶悸失色以致敗死時纔四十餘執誼自卑甞諱不言嶺南州縣名為郎官時甞與同舍郎詣職方觀圖毎至嶺南圖執誼皆命去之閉目不視至拜相還所坐堂北壁有圖不就省七八日試就觀之乃崖州圖也以為不祥甚惡之憚不能出口至貶果得崖州焉永貞二年正月景戌朔戌史作寅下同太上皇於興慶宫受朝賀皇帝率百僚奉上尊號曰應乾聖壽太上皇册文曰維永貞二年二或作元非是嵗次景戌正月景戌朔皇帝臣某稽首再拜奉册言臣聞上聖𤣥邈獨超乎希夷彊名之極猶存乎罔象疆或作引非是豈足以表無為之德光不宰之功然稱謂所施簡册攸著涵泳道德感於精誠仰奉法徽有以自竭伏惟太上皇帝陛下道繼𤣥元業纘皇極膺千載之休厯承九聖之耿光昭宣化源發揚大號政有敦本示儉慶裕格天政有二字疑衍恩翔春風仁育羣品而功成不處褰裳去之付神器於沖人想汾陽以髙蹈體堯之德與神同符其動也天其靜也地巍巍事表無得而言顧兹寡昧屬膺大寶懼忝傳歸之業莫申繼述之志夙夜兢畏惟懷永圖今天下幸安皆睿訓所被而未極徽號孰報君親是以台臣庶官文武之列抗疏於内方伯藩守億兆之衆同詞於外請因壽厯以播鴻名臣不勝大願謹上尊號曰應乾聖壽太上皇當三朝獻壽之辰應五紀啟元之始光膺徽稱允協神休斯天下之慶也元和元年正月甲申太上皇崩于興慶宫咸寧殿年四十六遺誥曰朕聞死生者物之大歸修短者人之常分聞或作觀古先哲王明於至道莫不知其終以存義順其變以節哀故存者不至於傷生逝者不至於甚痛謂之達理以貫通喪朕自弱齡即敦清靜逮乎近嵗又嬰沈痼甞亦親政益倦于勤以皇帝天資仁孝日躋聖敬爰釋重負委之康濟而能内睦于九族外勤于萬幾問寢益嚴侍膳無曠推此至德以安庶邦朕之知子無愧天下今厥疾大漸不寤不興付託得人顧復何恨四海兆庶亦奚所哀但聖人大孝在乎善繼樞務之重軍國之殷纘而承之不可蹔闕以日易月抑惟舊章皇帝宜三日而聽政十三日小祥二十五日大祥五或作三非是二十七日釋服方鎮岳牧不用離任赴哀天下吏人誥至後出臨三日皆釋服無禁婚嫁祠祀飲酒食肉宫中當臨者朝晡各十五舉音非朝晡臨時禁無得哭釋服之後勿禁樂他不在誥中者皆以類從事伏以崇陵仙寢復土纔終甸邑疲人休功未㡬今又重勞營奉朕所哀矜況漢魏二文皆著遺令永言景行常志夙心其山陵制度務從儉約並不用以金銀錦綵為飾百辟卿士同力盡忠克申送往之哀宜展事居之禮居或作君非是布告天下明知朕懷七月壬申葬豐陵諡曰至德大聖大安孝皇帝廟曰順宗别本韓文考異外集巻十欽定四庫全書别本韓文考異附録宋王伯大重編}
