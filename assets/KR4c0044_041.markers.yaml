  - {type: line-break, offset: 235, content: '', id: KR4c0044_SBCK_041-2a11}
  - {type: 'kr:non-cjk', offset: 235, content: ︻, id: KR4c0044_krp_041-bkkkrnonc12}
  - {type: variant, offset: 235, length: 0, content: '', WYG: 同上天地有靈術得之者唯君郊築爐地區外積火燒氛氲愈照海鑠幽怪滿空歊異氛郊山磨電奕奕水淬龍蝹蝹愈太一裝以寶列仙篆其文郊可用懾百神豈惟壯三軍愈有時幽匣吟忽似深潭聞郊風胡久已死此劒將誰分愈行當獻天子然後致殊勲郊豈如豐城下空有斗間雲愈}
