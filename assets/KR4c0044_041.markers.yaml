  - {type: variant, offset: 140, length: 0, content: '', WYG: 糶鹽不少長吏或有不親公事所由浮詞云當界無人糴鹽臣即}
  - {type: variant, offset: 141, length: 2, content: 置郷, WYG: 差清强巡官檢責所在實戸據口團保給一年鹽使其四季輸納鹽價口多糶少及鹽價遲違請停觀察使見任改散慢官其刺史已下貶與上佐其餘官貶逺處者平叔本請官自糶鹽以寛百姓令其蘇息免更流亡今令責戸口團保給鹽令其隨季輸納鹽價所謂擾而困之之意也百姓貧家食鹽至少或有淡食動經旬月若據口給鹽一無鹽字依時徴價辦與不辦並須納錢遲違及違條件觀察使已下各加罪譴一本譴作於字又無下文茍字茍官吏畏罪必用威刑臣恐因此所在不安百姓轉致流散此又不可之大者也一件平叔請限商人鹽納官後不得輒於諸軍諸使覔職掌把錢捉店看守莊磑祝曰磑磨也世本公輸般作之磑五對切以求影庇請令所在官吏嚴加訪察訪一作防如有違犯應有資財並令納官仍牒送府縣充所由者臣以為鹽商納𣙜為官糶鹽子父相承坐受厚利比百姓實則}
