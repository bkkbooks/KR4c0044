  - {type: indent, offset: 343, content: 　　, id: KR4c0044_krp_041-bkkind54}
  - {type: variant, offset: 343, length: 0, content: '', WYG: 下或注并序字今按此篇不類公它文且云元和八年則又非少作其非公作無疑今刪去}
  - {type: indent, offset: 352, content: 　, id: KR4c0044_krp_041-bkkind55}
  - {type: variant, offset: 352, length: 0, content: '', WYG: 愈啟伏見册命皇帝以閏月三日嗣臨大位以主神人含生之類孰不䝉賴相公翼輔聖明大慶資始伏惟永永與國同休愈下情不勝慶躍限以所守不獲隨例拜賀謹差某奉啟不宣謹啟}
