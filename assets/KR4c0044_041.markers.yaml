      ', id: KR4c0044_krp_041-bkkkrnewl49}
  - {type: line-break, offset: 381, content: '', id: KR4c0044_SBCK_041-2b09}
  - {type: indent, offset: 381, content: 　　　, id: KR4c0044_krp_041-bkkind58}
  - {type: variant, offset: 381, length: 0, content: '', WYG: 二月五日恩赦今月二十四日夘時到州當時集百官僧道百姓宣示訖聖上以繼明之初垂惟新之澤曲成不遺於萬物大賚遂延於四海寰宇斯泰品類皆蘇渥恩普霑逺近同慶蘇渥或乙此二字非是愈以藩條有制拜賀無由不勝欣抃之至謹差萍鄉縣丞李某奉狀陳賀某或作於}
  - {type: page-break, offset: 381, content: '', id: KR4c0044_WYG_041-9b, image: WYG1073/WYG1073-0692d.png}
  - {type: indent, offset: 388, content: 　, id: KR4c0044_krp_041-bkkind59}
  - {type: variant, offset: 388, length: 2, content: 䟽憲, WYG: 此篇見洪氏年譜方氏増考云公既南行家亦譴逐二月二日已過商州之南而此狀言七月二十七日牒則八月作也不知其家何故猶未至潮又姪孫湘亦從公而南故宿曽江口有示湘詩而過始興江口詩謂目前百口還相逐與狀言妻子孫姪未到者皆不相應此狀恐妄也今按公之到郡既不見年月之實則此狀亦無由可攷方氏引曽江始興二詩以訂此狀之妄蓋亦有理但恐或是已過始興留家在後而獨先到郡亦不可知但其狀詞頗類袁州申使狀則又未有以必見其妄故今日存之亦闕疑之意也伏奉七月二十七日牒以愈貶授刺史特加優禮以州小俸薄慮有闕乏毎月别給錢五十千以送使錢充者開緘捧讀驚榮交至顧已量分慚懼益深欲致辭為讓則乖伏屬之禮承命茍貪又非循省之道進退反側無以自寧其妻子男女并孤遺孫姪奴婢等尚未到官窮州使賔罕至身衣口食絹米足充過此以往實無所用積之於室非亷者所為受之於官名且不正恃䝉眷待輒此披陳别本韓文考異補遺欽定四庫全書别本韓文考異外集巻宋王伯大重編諸本外集分為十巻凡三十四篇不知何人所編據行狀云有集四十巻小集十巻亦不知便是此外集與否方云只據蜀本定録二十五篇其篇目次弟皆與諸本不同以為可以旁攷而的然知為公文者然蜀本劉曄序乃云後集外順}
  - {type: page-break, offset: 388, content: '', id: KR4c0044_WYG_041-10a, image: WYG1073/WYG1073-0693a.png}
  - {type: page-break, offset: 388, content: '', id: KR4c0044_WYG_041-10b, image: WYG1073/WYG1073-0693b.png}
  - {type: page-break, offset: 388, content: '', id: KR4c0044_WYG_042-1a, image: WYG1073/WYG1073-0694a.png}
  - {type: variant, offset: 391, length: 2, content: 崩慰, WYG: 實録為十巻則似亦以實録入於其中皆不知其何説也唯呂夏卿以為明水賦通解崔虞部書河南同官記皆見於趙德文録計必德親受於文公者比它本最為可信而李漢不以入集則疑凡外集所載漢亦有所未得未必皆其所不取者其説近是故今且從}
  - {type: page-break, offset: 391, content: '', id: KR4c0044_WYG_042-1b, image: WYG1073/WYG1073-0694b.png}
  - {type: variant, offset: 394, length: 0, content: '', WYG: 本而考其真偽異同之説以詳註於其下其甚偽者即雖不載其文而猶存其目使讀者猶有考焉其石刻聮句遺詩文等則從方本録之以補外集之闕又諸本有遺文一巻方本亦多不録今亦存之以附于後明水賦以𤣥化無宰至精感通為韵精或作誠古者聖人之制祭祀也必主忠敬崇吉蠲不貴其豐乃或薦之以水不可以黷斯用致之於天或無者字無也字於方作于其事信美其義惟𤣥月實水精故求其本也明為君德因取以名焉於是命烜氏俟清夜或將祀圓丘於𤣥冬或將祭方澤於朱夏祀方作祭祭或作祀持鑑而精氣韓曰淮南子積陰之寒氣為水水氣之精者為月旁射照月而陰靈樊曰謝莊月賦日以陽德月以陰靈潛下視而不見謂合}
  - {type: page-break, offset: 394, content: '', id: KR4c0044_WYG_042-2a, image: WYG1073/WYG1073-0695a.png}
  - {type: variant, offset: 395, length: 2, content: 䟽題, WYG: 於希夷挹之則盈方同功於造化應於有生於無生或作聲形象未分徒騁離婁之目光華暗至如還合浦之珠既齊芳於酒醴詎比賤於潢汚芳方作髙云禮夏尚明水商尚醴周尚酒今作齊芳非都今按明水當在酒醴之上不應反言齊髙此蓋以其無臭味嫌不足於芬芳故有齊芳之語方説非是明德惟馨𤣥功不宰于以表誠潔于以戒荒怠茍失其道殺牛之祭何為如得其宜明水之薦斯在宜方作情薦或作為不引而自致不行而善至雖辭麴蘖之}
  - {type: page-break, offset: 395, content: '', id: KR4c0044_WYG_042-2b, image: WYG1073/WYG1073-0695b.png}
