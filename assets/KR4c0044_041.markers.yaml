  - {type: variant, offset: 421, length: 2, content: 塔寺, WYG: 事獨運偃息談笑危疑以平天子無東顧之憂方伯有同和之美危疑方作疑危十三年春將如京師相國隴西公飲餞於青門之外謂功德皆可歌之也於或作于或無青字命其屬咸作詩以頌繹之詩曰奉使羌池靜臨戎汴水安或作閒非是沖天鵬翅闊報國劍鋩寒曉日驅征騎春風詠采蘭孫曰東晢補亡詩曰循彼南陔言采其蘭采蘭以養親也誰言臣子道忠孝兩全難送浮屠令縱西遊序方無浮屠字縱下有上人二字其行異其情同君子與其進可也方無進字非是令縱釋氏之秀者又善為文又上或有而字浮遊徜徉跡接天下藩維大臣文武豪士令縱未始不褰衣而負業往造其門下衣或作裳其有尊行美德建功樹業令縱從而為之歌頌典而不諛麗而不淫其有中古之遺風與樹或作植有中或作中有古下或有人字風下或有可字乗閒致密促席接膝譏評文章商較人士浩浩乎不窮愔愔乎深而有歸或無乗閒致密四字而有及字人士或作士人或作人事於是乎吾忘令縱之為釋氏之子也其來也雲凝其去也風休方懽而已辭雖義而不求吾於令縱不知其不可也盍賦詩以道其行與路鵠秀才序方云送路鵠贈别二序語意無倫脱誤不可讀如曰自河南令為博士於公所歴官次亦不合故併闕之今從其説刪去贈别序説已見上送毛仙翁十八兄序方云直諫表論顧威狀之蠡外集者翁序皆最未見決非公文表狀亦不録足以知其果偽也今並從方本刪去别本韓文考異外集巻三欽定四庫全書别本韓文考異外集巻四宋王伯大重編通解洪曰通解釋言解鄠人對或云皆少作陳齊之云通解之乎者也下皆未當此雖少作然亦本訛也今之人以一善為行而恥為之慕達節而稱夫通才者多矣然而脂韋汩没以至於老死者相繼亦未見他之稱他下或有人字今按此句疑有脱誤其豈非亂教賊名之術歟亂或作害且五常之教與天地皆生然而天下之人不得其師終不能自知而行之矣地下方有而字非是故堯之前千萬年天下之人促促然不知其讓之為美也於是許由哀天下之愚且以爭為能迺脱屣其九州髙揖而辭堯由是後之人竦然而言曰雖天下猶有薄而不售者況其小者乎或作焉下同故讓之教行於天下許由為之師也為之或作之為下二語同自桀之前千萬年天下之人循循然不知忠易其死也故龍逢哀天下之不仁覩君父百姓入水火而不救於是進盡其言退就割烹就下或有其字非是故後之臣竦然而言曰雖萬死猶有忠而不懼者況其小者乎故忠之教行於天下由龍逢為之師也忠之上或有其字非是自周之前千萬年渾渾然不知義之可以換其生也周或作殷方無以字故伯夷哀天下之偷且以彊則服食其葛薇逃山而死之下或有人字服或作伏且以彊則服作一句或有脱誤故後之人竦然而言曰雖餓死猶有義而不懼者況其小者乎故或作於是義或作死或作強故義之教行於天下由伯夷為之師也是三人俱以一身立教而為師於百千萬年間其身亡而其教存扶持天地功亦厚矣或無百字存下或有於字功上或有而字嚮令三師恥獨行慕通達則堯之日必曰得位而濟道安用讓為用或作能夏之日必曰長進而否退安用死為周之日必曰和光而同塵安用餓為和光而同塵方作同塵而和光若然者天下之人促促然而爭循循然而佞渾渾然而偷其何懼而不為哉是則三師生於今必謂偏而不通者矣其可不謂之大賢人者哉方無則字必字謂偏作為偏矣作也矣上或無者字嗚呼今之人其慕通達之為弊也且古聖人言通者蓋百行衆藝備於身而行之者也而上或有通字今恒人之言通者蓋百行衆藝闕於身而求合者也是則古之言通者通於道義今之言通者通於私曲其亦異矣古之今之下或並有人字將欲齊之者其不猶矜糞丸而擬質隋珠者乎或無其字或無不字或無之矜二字且令今父兄教其子弟者曰爾當通於行如仲尼雖愚亦知其不能也方無亦字也或作邪非是曰爾尚力一行如古之一賢雖中人亦希其能矣賢上或無一字豈不由聖可慕而不可齊邪賢可及而可齊也也方作邪今按恐上句無邪字下句也字却當作邪今之人行未能及乎賢而欲齊乎聖者亦見其病矣夫古人之進修或㡬乎聖人今之人行不出乎中人而恥乎力一行為獨行且曰我通同如聖人進修或作中人非是我下或有周字同字疑衍彼其欺心邪吾不知矣彼其欺人而賊名邪吾不知矣余懼其説之將深為通解擇言解韓曰此篇雖曰擇言甚於水火然曰知理者必擇於言則未甞欲人緘嘿茍容而已不然則幕中之評臺中之辦公豈遂忘言乎哉火洩於密而為用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反為災乎乎方作於方無其字下二語同水發於深而為用且遠能不違於道可浮可載可飲可灌以濟乎生物及其導而不防反為患矣乎方作於言起於微而為用且慱能不違於道可化可令可告可訓以推於生物及其縱而不慎反為禍矣火既我灾有水而可伏其熖能使不䧟于灰燼矣䧟或作蹈或作熖水既我患有土而可遏其流能使不仆於波濤矣方無而可字言既我禍即無以掩其辭能不罹於過者亦鮮矣於過或作其失過下方有失字所以知理者又焉得不擇其言歟其為慎而甚於水火言上方無其字而字恐誤鄠人對樊曰新史孝友傳云唐時陳藏器注本草拾遺謂人肉治棄疾自是民間以父母疾多刲股肉以進或給帛或旌門善乎韓愈之論得父母疾烹藥餌以是為孝未聞毁肢體者也鄠有以孝為旌門者乃本其自於鄠人曰彼自剔股以奉母疾瘳大夫以聞其令尹令尹以聞其上上俾聚土以旌其門使勿輸賦以為後勸孝下為字疑衍又疑是而字其門或無其字以為或作欲為恐按尹謂京兆尹令字衍下同鄠大夫常曰他邑有是人乎愈曰母疾則止於烹粉藥石以為是未聞毁傷支體以為養在教未聞有如此者或無愈字或無止字母下十二字本作父母疾烹藥餌以是為孝字今按是字或是事字按下文又有未聞此未聞字恐衍或是若夫字之類茍不傷於義則聖賢當先衆而為之也聖賢方作賢聖是不幸因而致死則毁傷滅絶之罪有歸矣其為不孝得無甚乎而下或有此字今按此句上是字疑是此字茍有合孝之道又不當旌門蓋生人之所宜為竭竭當作曷足為異乎茍或作若合下疑有乎字或無足字既以一家為孝是辨一邑里皆無孝矣以一身為孝是辨其祖父皆無孝矣然或䧟於危難能固其忠孝而不茍生之逆亂以是而死者乃旌表門閭爵禄其子孫斯為為勸已矧非是而希免輸者乎生之方云劉仲枕謂之當作於恐或然也表下或有其字習不以毁傷為罪滅絶為憂不􅆎於市而已黷於政況復旌其門為憂或作其憂非是河南府同官記方無府字永貞元年愈自陽山移江陵法曹叅軍獲事河東公公甞與其從事言建中初天子始紀年更元命官司舉貞觀開元之烈方無下公字烈或作例或作列非是羣臣惕慄奉職命材登良不敢私違當時自齒朝之士而上以及下百執事官闕一人將補必取其良百下方有吏字然而河南同時於天下稱多獨得將相五人或無同時二字方無將字人今按下文所記實為宰相者三裴均未為真相故特著其官職戎馬之盛則此處宜有將字方本誤也故於府之叅軍則得我公於河南主簿則得故相國范陽盧公邁於氾水主簿則得故相國今太子賔客滎陽鄭公餘慶下相國上方無故字今按故故相猶今言前宰相非亡没之謂方本誤也於陸渾主簿則得相國今吏部侍郎天水趙公宗儒相國今或作今相國於登封主簿則得故吏部尚書東都留守呉郡顧公少連故下方有相國字今以下文考之非是盧公去河南為右補闕其後由尚書左丞至宰相鄭公去氾水為監察御史佐山南軍其後由工部侍郎至宰相罷而又為趙公去陸渾為右拾遺其後由給事中為宰相中為或作中至顧公去登封為監察御史其後由京兆尹至吏部尚書東都留守我公去府為長水尉其後由膳部郎中為荆南節度行軍司馬遂為節度使自工部尚書至吏部尚書三相國之勞在史冊顧吏部慎職小心于時有聲在上或有布字我公愿潔而沉密開亮而卓偉行茂于宗事修于官嗣紹家烈不違其先作帥荆南厥聞休顯武志既揚文教亦熙登槐贊元其慶且至帥或作扜亦方作既故好語故事者以為五公之始迹也同其後進而偕大也亦同其稱名臣也又同官職雖分而功德有巨細其有忠勞於國家也同有若將同其後而先同其初也或無官職字分作則屬之下文而無而字忠上或無有字家下或無也字有聞而問者於是焉書既五年始立石刻其語河南府叅軍舍庭中方無有字語下方有于字於時河東公為左僕射宰相出藩大邦開府漢南時或作是鄭公以工部尚書留守東都趙公以吏部尚書鎮江陵漢南地連七州戎士十萬其官宰相也留守之官居禁省中嵗時出旌旗序留司文武百官於宫城門外而衙之守下方無之字江陵故楚都也戎士五萬三公同時千里相望可謂盛矣河東公名均姓裴氏記宜城驛方作宜城驛記下或有愈代姪孫作五字此驛置在古宜城内驛東北有井傳是昭王井有靈異至今人莫汲内下或有復出宜城字方無昭字驛前水傳是白起堰西山下澗灌此城壞楚人多死流城東陂臭聞逺近因號其陂臭陂有蛟害人漁者避之或脱堰字臭陂上或有曰字井東北數十步有楚昭王廟有舊時髙木萬株多不得其名歴代莫敢剪伐尤多古松大竹或無昭字名方作始于太傅帥襄陽遷宜城縣并改造南境數驛材木取足此林或無陽字舊廟屋極宏盛今惟草屋一區然問左側人尚云每嵗十月民相率聚祭其前廟後小城蓋王居也後或作復其内處偏髙廣員八九十畝號殿城當是王朝内之所也城或作域朝或作廟多甎可為書硯自小城内地今皆屬甄音真氏甄氏於小城北立墅以居甄氏有節行其子逢以學行為助教元和十四年二月二日}
