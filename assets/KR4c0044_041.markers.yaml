  - {type: variant, offset: 0, length: 1, content: 朱, WYG: 相保聚以備冦賊若令召募立可成軍若要添兵自可取足賊平之後易使歸農伏請諸道先所追到行營者悉令却牒歸本道據行營所追人額器械弓矢一物已上悉送行營充給却下方無牒字據下或無行字給上或無充字今按上下}
  - {type: page-break, offset: 0, content: '', id: KR4c0044_WYG_040-11a, image: WYG1073/WYG1073-0682c.png}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 勢合有行字行下更合有營字其理甚明今輒補足所召募人兵數既足加之教練三數月後諸道客軍一切可罷比之徴發逺人利害懸隔一繞逆賊州縣堡柵等各置兵馬都數雖多每處則至少又相去濶逺難相應接所以數被攻刧致有損傷至上或有兵字今若分為四道每道各置三萬人擇要害地屯聚一處使有隠然之望或無分字隠方作殷按漢書隠若一敵國方本非是審量事勢乘時逐利可入則四道一時俱發使其狼狽驚惶首尾不相救濟四或作諸若未可入則深壁髙壘以逸待勞自然不要諸處多置防備臨賊小縣可收百姓於便地作行縣以士領之使免散失一蔡州士卒為元濟迫脇勢不得已遂與王師交戰原其本根皆是國家百姓進退皆死誠可閔傷宜明勅諸軍使深知此意當戰鬭之際固當以盡敵為心若形勢已窮不能為惡者不須過有殺戮喻以聖徳放之使歸銷其􅇯悖之心貸以生全之幸自然相率棄逆歸順一論語曰欲速則不達見小利則大事不成比來征討無功皆由欲其速捷有司計筭所費茍務因循小不如意即求休罷河北淮西等見承前事勢知國家必不與之持乆併力苦戰幸其一勝即希冀恩赦朝廷無至忠憂國之人不惜傷損威重因其有請便議罷兵往日之事患皆然也往或作近臣愚以為淮西三小州之地元濟又甚庸愚而陛下以聖朝英武之姿用四海九州之力除此小冦難易可知泰山壓卵未足為喻一兵之勝負實在賞罰賞厚可令亷士動心罰重可令凶人喪魄亷方作戰非是然可集事不可愛惜所費憚于行刑然或作則一淄青恒冀兩道與蔡州氣類畧同今聞討伐元濟人情必有救助之意伐或作罰下同然皆暗弱自保無暇虚張聲勢則必有之至於分兵出界}
