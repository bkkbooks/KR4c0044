  - {type: variant, offset: 254, length: 0, content: '', WYG: 三篇餘並不録今並附見于後其可疑者亦但存其目而不載其文云片片驅鴻急紛紛逐吹斜到江還作水著樹漸成花越喜飛排瘴胡愁厚葢砂兼雲封洞口助月照天涯暝見迷巢鳥朝逢失轍車呈豐盡相賀寧止力耕家贈族姪上或有徐州字我年十八九壯氣起胷中作書獻雲闕辭家逐秋蓬嵗時易遷次身命多厄窮一名雖云就片禄不足充今者復何事卑棲寄徐戎蕭條資用盡濩落門巷空朝眠未能起逺懷方鬱悰擊門者誰子問言乃吾宗自云有奇術深妙知天工既往悵何及將來喜還通期吾語非佞當為佐時雍嘲鼾睡洪曰李希聲家有退之遺詩數十篇希聲云皆非也獨嘲鼾二篇似之録于末澹師晝睡時聲氣一何猥頑飈吹肥脂坑谷相嵬磊雄哮乍咽絶毎發壯益倍有如阿鼻尸長喚忍衆罪馬牛驚不食百鬼聚相待木枕十字裂鏡面生痱瘤上音肥下音㵽韓曰痱瘤腫病也鐵佛聞皺眉石人戰摇腿孰云天地仁吾欲責真宰幽尋虱搜耳猛作濤翻海太陽不忍明飛御皆墮怠乍如彭與黥呼寃受葅醢又如圏中虎號瘡兼吼餒雖令伶倫吹苦韻難可改唯令巫咸招䰟爽難復在何山有靈藥療此願與採澹公坐卧時長睡無不穏吾甞聞其聲深慮五藏損黄河弄濆瀑梗澀連拙鮌南帝初奮槌鑿竅洩混沌韓曰莊子南海之帝儵與中央之帝混沌善謀報其德曰人皆有七竅以視所食息此獨無有試鑿之日鑿一竅七日而混沌死逈然忽長引萬丈不可忖謂言絶於斯繼出方衮衮幽幽寸喉中草木森苯䔿上音本下音忖韓曰苯䔿草木叢生也盜賊雖狡獪亡魂敢窺閫鴻䝉總合雜詭譎騁戾狠乍如鬬呶呶忽若怨􅈤􅈤賦形苦不同無路尋根本何能堙其源惟有土一畚}
