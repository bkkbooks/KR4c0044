  - {type: line-break, offset: 323, content: '', id: KR4c0044_SBCK_041-2b06}
  - {type: indent, offset: 323, content: 　, id: KR4c0044_krp_041-bkkind53}
  - {type: variant, offset: 323, length: 0, content: '', WYG: 補註公作論語傳未成而殁見於張籍祭詩下於洪慶善之兑者甚明今世所傳如宰予晝寢以書作晝子在齊聞韶三月不知肉味以三月作音浴乎沂以浴作㳂子在回何敢死以死作先雖甚鄙賤然為伊川之學者皆取之愈白侯生足下所示論語問甚善聖人踐形之説孟子詳於其書當終始究之若萬物皆備於我反身而誠是也茍有偽焉則萬物不備矣踐形之道無它誠是也足下謂賢者不能踐形非也賢者非不能踐形能而不備耳形言其備也所謂具體而微是也充實之謂美充實而有光輝之謂大充實則具體未大則微夫或去聖一間或得其一體皆踐形而未備者唯反身而誠則能踐形之備者耳愈昔註解其書而不敢過求其意取聖人之旨而合之則足以信後生輩耳此説甚為穏當切更思之}
  - {type: page-break, offset: 323, content: '', id: KR4c0044_WYG_041-7b, image: WYG1073/WYG1073-0691d.png}
