  - {type: variant, offset: 418, length: 0, content: '', WYG: 云歐陽永叔謂此文非退之不能作又誣永叔矣蘇公此語蓋但見集注之出於或人而未見跋尾之為歐公親筆也二公皆號一代文宗而其去取不同如此覽者不能無惑然方氏盡載歐語而畧不及蘇説其意可見至呂伯㳟乃於文鑑特著蘇説以備乙覽則其同異之間又益後人之惑矣以余考之所傳三書最後一篇實有不成文理處但深味其間語意一二文勢抑揚則恐歐袁方意誠不為過但意或是舊本亡逸僧徒所記不真致有脱誤歐公特觀其大槩故但取其所可取而未暇及其所可疑蘇公乃覺其所可疑然亦不能察其為誤而直斥以為凡鄙所以其論雖各有所因而皆未能無所未盡也若乃後之君子則又往往不能究其本根其附歐説者既未必深知其所以為可信其主蘇氏者亦未必果以其説為然也徒幸其言可為韓公解紛若有補於世教故特表而出之耳皆非可與實事而求是者也至如方氏雖附歐説然亦未免曲為韓諱殊不知其言既曰久聞道德又曰側承道髙又曰所示廣大深逈非造次可諭又曰論甚宏博安得謂初無崇信其説之意邪韓公之事余於答孟簡書蓋已論其詳矣故不復論特從方本載此三書於别集并録歐公二語而附蘇説方説於其後且為全載書文於此而考其同異訂其謬誤如左方以為讀者以此觀之則其決為韓公之文而非它人之所能作無疑矣方氏所據石本與杭本又自不同則疑傳寫之訛而歐公所疑官稱之誤亦為得之但愚意猶恐當時既謫刺逺州亦未必更帶侍郎舊官也方氏所駁世俗偽造誣謗之書即今所謂别傳者洪氏辨證云别傳載公與大顛往復之語深詆退之其言多近世經義之説又偽作永叔跋云使退之復生不能自解免呉源明云徐君平見介甫不喜退之故作此文方氏又云周端禮曰徐安國自言年二十三四時戲為此今悔之無及然則其為徐作無疑矣但君平字安道而方云安國未知便是君平否耳然靈山石刻張繫所撰其間載韓公問大顛云西國一真之法何不教人顛云教人達性离無明貪嗔驕慢不生嫉妬此亦釋子常言初無難解但韓公素所未聞而頗中其病故雖不盡解而適亦有㑹於心耳又載韓公責云人生貴賤各有定分何得以三塗之説誑人而顛答云公何不常守侍郎之任而來此為官耶則恐其有謬誤或其徒所附益也愈啟方無此二字孟夏漸熱惟道體安和熱下或有伏字愈弊劣無謂坐事貶官到此久聞道德切思見顏切杭作竊方據石本如此切乃懇切之意此下大率多從石本云縁昨到來未獲參謁儻能暫垂見過實為多幸杭本無倘能以下十字已帖縣令具人船奉迎日久竚瞻帖杭作貼久當作夕竚方據石本作佇不宣愈白方據石無愈白字今據石本此下具銜姓}
