  - {type: variant, offset: 412, length: 1, content: 謁, WYG: 致官而已方無夫字遺或作違問上或無其字得一名獲一位則棄其業而役役於持權者之門故其事業功德日以忘月以削老而益昏死而遂亡位或作官亡方作忘愈今二十有六矣距古人始仕之年尚十四年豈為晚哉今下或有年始字豈上或有矣夫字行之以不息要之以至死不有得於今必有得於古不有得於身必有得於後用此自遣且以為知已者之報執事以為如何哉其信然否也為如或作謂如今所病者在於窮約無僦屋賃僕之資無緼袍糲食之給驅馬出門不知所之斯道未喪天命不欺豈遂殆哉豈遂困哉竊惟執事之於愈也無師友之交無久故之事無顏色言語之情卒然振而發之者必有以見知爾故盡暴其所志不敢以黙執事下方有者字愈下方無也字顔色言語方作言語顔色爾或作耳以黙或作黙黙又懼執事多在省非公事不敢以至是則拜見之不可期獲侍之無時也是以進其説如是庶執事察之也至下或有於字期下或有也字庶或作幸與張徐州薦薛公達書此篇方本有之今疑非公作當刪與}
