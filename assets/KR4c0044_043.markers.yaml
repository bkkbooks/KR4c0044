  - {type: variant, offset: 1030, length: 1, content: 去, WYG: 與少室李拾遺書諸本室下有山子李下有渤字方從蜀苑新書云此書作於元和三年公時尚為博士新書云洛陽令誤也十二月某日愈頓首方無此八字伏承天恩詔河南敦諭拾遺公朝廷之士引頸東望若景星鳯皇之始見也爭先覩之為快拾遺公新書作遺公篇並内同方}
