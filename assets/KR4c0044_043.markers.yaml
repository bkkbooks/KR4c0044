  - {type: variant, offset: 1047, length: 0, content: '', WYG: 事未就正自視若不成人四海之所環無一夫甲而兵者新書無自字視或作是非是而兵或作與兵若此時也拾遺公不疾起與天下之士君子樂成而享之斯無時矣若上或有未有字昔者孔子知不可為而為之不已足跡接於諸侯之國即可為之時自藏深山牢闗而固距即與仁義者異守矣或無足跡字想拾遺公冠帶就車惠然肯來舒所蓄積以補綴盛德之有闕遺利加於時名垂于將来踊躍悚企傾刻以冀闕遺方作遺闕新書無有遺二字利下或無加字加於新書作加于垂下亦無于字傾或作頃又竊聞朝廷之議必起拾遺公使者往若不許即河南必繼以行或無即字拾遺徵君若不至必加髙秩如是則辭少就多傷於亷而害於義拾遺公必不為也則或作即新書無則字善人斯進其類皆有望於拾遺公拾遺公儻不為起使衆善人不與斯人施也或無使字也或作者今按此句疑有誤由拾遺公而使天子不盡得良臣君子不盡得顯位人庶不盡被惠利其害不為細人庶或作庶人必望審察而逺思之務使合於孔子之道幸甚而下或有長字逺新書作諦愈再拜答劉秀才論史書方從蜀苑六月九日韓愈白秀才方無此九字或有某月日韓愈白劉君足下辱問見愛教勉以所宜務敢不拜賜愚以為凡史氏褒貶大法春秋已備之矣為或作謂後之作者在據事跡實録則善惡自見或復出實録二字見下或有矣字然此尚非淺陋偷惰者所能就況褒貶邪孔子聖人作春秋辱於魯衛陳宋齊楚卒不遇而死齊太史氏兄弟㡬盡或無氏字左丘明紀春秋時事以失明司馬遷作史記刑誅班固瘐死孫曰和帝永元初洛陽令种兢以事捕固固死獄中洪曰漢律囚以飢寒死曰瘐孟堅死獄中故云瘐}
