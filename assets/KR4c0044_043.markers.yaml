  - {type: variant, offset: 1029, length: 0, content: '', WYG: 愈儒服者不敢用他術干進術或作藝又惟古執䞇之禮竊整頓舊所著文一十五章以為䞇而喻所以然之意於此章或作首下同曰豐山上有鐘焉祝曰山海經云豐山有九鐘和霜鳴注云霜降則鐘鳴人所不可至霜既降則鏗然鳴蓋氣之感非自鳴也或無既字愈年二十有三讀書學文十五年言行不敢戾於古人或無有字三或作二讀書學文十五年洪云公與邢尚書書云生七嵗而讀書十三而能文二十有五擢第於春官愚固泯泯不能自計周流四方無所適歸固或作故非是伏惟閣下昭融古之典義含和發英作唐德元簡棄詭説保任皇極是宜小子刻心悚慕又焉得不感而鳴哉和或作華元或作臣方云周書注元德之首也徒以獻策闕下方勤行役且有負薪之疾不得稽首軒階遂拜書家僕待命于鄭之逆旅僕或作僮逆上或無之字伏以小子之文可見於十五章之内小子之志可見於此書與之進敢不勉與之退敢不從方作退進退之際實惟閣下裁之上考功崔虞部書或作上考功宏詞官虞部崔員外書愈不肖行能誠無可取行已頗僻與時俗異態抱愚守迷固不識仕進之門迺與羣士爭名競得失行人之所甚鄙求人之所甚利其為不可雖童昏實知之失下或無行字如執事者不以是為念援之幽窮之中推之髙顯之上是知其文之或可而不知其人之莫可也知其人之或可而不知其時之莫可也不知其人上方有是字既以自咎又歎執事者所守異於人人句廢耳任目華實不兼故有所進故有所退以方作已廢上或有之字不疑當作必今按人字屬上句且執事始考文之明日浮囂之徒已相與稱曰某得矣某得矣問其所從來必言其有自一日之問九變其説凡進士之應此選者三十有二人其所不言者數人而已而愈在焉不言方作不云及執事既上名之後三人之中其二人者固所傳聞矣華實兼者也果竟得之而又升焉或無其字固上或有則字果或作畢下同其一人者則莫之聞矣實與華違行與時乖果竟退之如是則可見時之所與者時之所不與者之相逺矣然愚之所守竟非偶然故不可變竟非或作僅非故或作固凡在京師八九年矣足不跡公卿之門名不譽於大夫士之口或無譽字於或作一或無士字始者謬為今相國所第此時惟念以為得失固有天命不在趍時而偃仰一室嘯歌古人今則復疑矣未知夫天竟如何命竟如何由人乎哉不由人乎哉未上或有又字或無夫字天竟或作天意人乎或並作乎人欲事干謁則患不能小書困於投刺欲上或有夫字於或作乎欲學為佞則患言訥詞直卒事不成為方作于患下或有於字卒或作則徒使其躬儳焉而不終日其躬方本如此而舉正躬作窮蓋誤而諸本作如方云蜀本作而今本皆以表記誤刋作如然不知古如而同意此語不當以如似之義讀之唐人惟韓栁知此子厚答韋中立書假而以僕年先吾子與公此文是也董彥逺曰春秋書星隕如雨左傳室如縣罄是皆以如為而風俗通國人望君而望嵗鄒陽書白頭而新是皆以而為如按家語君入廟如右茍子作而右樂府艾如張亦作艾而張今人所用漣洏攷之李善文選乃連而也實用易之泣血漣如為義去古益逺字義多失惟韓栁文時見一二因為詳之今按孟子望道而未之見亦是此例方言又有而如古字通用之説然陸德明論當時語音之失有曰北人則而如靡異蓋不以為然也然則此而字須讀為如乃為正耳董引室如縣磬乃據左傳作罄字而杜預注云如而也言居室而資糧縣盡故其説如此國語則作縣磬而韋昭注云府藏空虚但有榱梁如縣磬左傳蓋借罄為磬而杜氏誤解國語則正作磬字而韋説得之董氏所引不足據以為説今併論之附見于此是以勞思長懷中夜起坐度時揣已廢然而返雖欲從之末由也已又常念古之人日已進今之人日已退常方作甞夫古之人四十而仕其行道為學既已大成而又之死不倦故其事業功德老而益明死而益光故詩曰雖無老成人尚有典刑言老成之可尚也可上或有人字又曰樂只君子德音不已謂死而不亡也已或作忘亡或作忘方作已夫今之人務利而遺道其學其問以之取名致官而已方無夫字遺或作違問上或無其字得一名獲一位則棄其業而役役於持權者之門故其事業功德日以忘月以削老而益昏死而遂亡位或作官亡方作忘愈今二十有六矣距古人始仕之年尚十四年豈為晚哉今下或有年始字豈上或有矣夫字行之以不息要之以至死不有得於今必有得於古不有得於身必有得於後用此自遣且以為知已者之報執事以為如何哉其信然否也為如或作謂如今所病者在於窮約無僦屋賃僕之資無緼袍糲食之給驅馬出門不知所之斯道未喪天命不欺豈遂殆哉豈遂困哉竊惟執事之於愈也無師友之交無久故之事無顏色言語之情卒然振而發之者必有以見知爾故盡暴其所志不敢以黙執事下方有者字愈下方無也字顔色言語方作言語顔色爾或作耳以黙或作黙黙又懼執事多在省非公事不敢以至是則拜見之不可期獲侍之無時也是以進其説如是庶執事察之也至下或有於字期下或有也字庶或作幸與張徐州薦薛公達書此篇方本有之今疑非公作當}
