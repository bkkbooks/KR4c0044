  - {type: variant, offset: 1034, length: 6, content: 朱文公校昌黎, WYG: 事皆出宰相樂善言如不得聞小大舉正作大小恐誤事或作士自即大位已來于今四年凡所施者無不得宜者或作為凡所施者新書作凡所出而施者勤儉之聲寛大之政幽閨婦女草野小人皆飽聞而厭道之草或作山人新書作子愈不通於古請問}
