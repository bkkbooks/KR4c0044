  - {type: variant, offset: 1046, length: 0, content: '', WYG: 運歟加又有非人力而至者愈方作某於作于無世字非作匪新書作兹非太平世歟年榖熟衍符貺委至若干紀之姦不戰而拘纍彊梁之兇銷鑠縮栗迎風而委伏其有}
