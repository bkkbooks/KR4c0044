  - {type: variant, offset: 11460, length: 1, content: 歷, WYG: 絶自兹人生一世間不自張與施譬如浮江木縱横豈自知寜懐别時苦勿作别後思送石處士赴河陽幕或注得起字石洪也元和五年烏重裔辟洪置幕府公嘗有序長把種樹書史記始皇紀秦皇焚書所不去者卜筮醫藥種樹之書人云避世士忽騎將軍馬自號報恩子風雲入壯懐雲入或作雷開泉石别幽耳鉅鹿師欲老常山險猶恃鉅鹿邢州也常山鎮州也元和四年節度使王承宗反詔中人吐突承璀以兵討之無功五年遂赦王承宗鎮州今真定府豈惟彼相憂固是吾徒耻去去事方急酒行可以起送湖南李正字歸或作送李正字歸湖南或作李判官請李礎父仁鈞時為親王府長史礎自胡南告來省公嘗有序送之此其詩也東都作長沙長沙郡入楚深洞庭值秋晚人隨鴻鴈少江共蒹葭逺歴歴}
