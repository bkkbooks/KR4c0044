  - {type: variant, offset: 11505, length: 0, content: '', WYG: 别本韓文考異巻四欽定四庫全書别本韓文考異巻五宋王伯大重編古詩辛卯年雪元和六年春寒氣不肯歸河南二月末雪花一尺圍崩騰相排姊抺切逼也孫曰排宻也龍鳯交橫飛波濤何飄揚天風吹旛旂白帝盛羽衛鬖髿或作㲚上音參又蘇含切下音沙髮垂貌祝曰選緑苔鬖髿乎砌上振裳衣白霓先啓途從以萬玉妃翕翕陵厚載譁譁弄隂機生平未曾見何暇議是非或云豐年祥飽食可庶幾善禱吾所慕誰言寸誠微醉留東野昔年因讀李白杜甫詩長恨二子不相從吾與東野生並世如何復躡二子蹤東野不得官白首誇龍鍾方云依字當作躘踵盧仝詩盧子躘踵也賢愚總莫驚韓子稍姦黠自慙青蒿倚長松低頭拜東野願得終始如駏蛩上音巨下音卭樊曰孔叢子北方有獸名曰蟨愛蛩蛩駏驉食得甘草必齧以遺蛩蛩駏驉見人將來必負蟨以走蟨非愛駏蛩也為其假足也二獸亦非心愛蟨也為其得甘草而遺之也夫禽獸猶知比假而相報也况士君子之欲名利者乎東野不􅂞頭有如寸筳撞鉅鐘吾願身為雲東野變為龍四方上下逐東野雖有離别無由逢離别或作别離李花二首諸夲作一首方云此二詩也自當春天地争奢華以下分焉意義甚明編者誤合之樊曰此詩自夜領張徹投盧仝而下狀極李花之妙矣蘇内翰梅詩舉此云縞裙練恱玉川家肝膽清新冷不邪穠李争春猶辦此更教踏雪㸔梅花亦一奇也平旦入西園梨花數株若矜夸旁有一株李顔色慘慘似含嗟問之不肯道所以獨繞百帀至日斜忽憶前時經此樹正見芳意初萌牙或作芽方云漢傳如}
