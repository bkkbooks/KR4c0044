  - {type: variant, offset: 9404, length: 1, content: 収, WYG: 明燈雪逕抵樵叟扺或作詆樵或作講皆非是此但言偶逢之耳風廊折談僧陸渾在洛州縣名也桃花閒有湯沸如烝三月崧少歩崧一作嵩孫曰戴延之西征記嵩山東為大室西為少室相去十七里嵩其搃名也謂之室者以其下有石室焉躑躅花名一名羊躑躅餘見上杏花詩注紅千層洲沙厭晚坐洲沙或作沙洲嶺壁窮晨昇晨或作朝沈㝠不計日為樂不可勝遷滿一已異方作畢非是乖離坐難憑行行事結束人馬何蹻其略切泮水曰其馬蹻蹻馬逝也騰感激生膽勇從軍豈嘗曽洸洸音光韓曰武夫洸洸司徒公時王鍔檢校司徒為河南尹天子爪與肱爪一作股提師十萬餘四海欽風稜魯登切河北兵未進未或作始方云時討王承宗而吐突承璀督師逗遛不進作始者非蔡州帥新薨曷不請掃除活彼黎與烝鄙夫誠怯弱受恩愧徒𢎞猶思脱儒冠棄死取先登又欲面言事上書求詔徴侵官固非是妄作譴可懲惟當待責免耕斸竹足切斫也歸溝塍音乘稻田畦班固西都賦溝塍刻􅍢今君得所附或作行得所非是勢若脱韝音鉤韝臂捍以皮為之所以臂鷹鷹檄筆無與讓幕謀耳其膺職或作識非是收}
