  - {type: variant, offset: 11506, length: 0, content: '', WYG: 草萌牙事有萌牙無用芽字柰何趂酒不省録不見玉枝攅霜葩枝或作杖泫胡畎切流也然為汝下雨淚無由反斾羲和車東風來吹不改顔蒼茫夜氣生相遮氷盤夏薦碧實脆斥去不御慙其花斥去或作片雲或作雲去或作斥逐方云張衡思𤣥賦斥西施而不御韓語原此或本皆誤也當春天地爭奢華洛陽園苑尤紛挐或作拏方云董彦逺云挐從如今人從奴唐韻以挐為或體非也考相如子虚賦王逸九思皆只作挐今按説}
  - {type: page-break, offset: 11506, content: '', id: KR4c0044_WYG_005-3a, image: WYG1073/WYG1073-0328c.png}
  - {type: variant, offset: 11507, length: 4, content: 公校昌黎, WYG: 拏從奴牽引也挐從如持也古書作拏盖通用誰將平地萬堆雪將方作准剪刻作此連天花日光色照未明月暫入都交加夜領張徹投盧仝乘雲共至玉皇家長姬香御四羅列縞白色裙練􅍤始銳切佩巾詩無感我􅍤兮無等差静濯明䊋有所奉顧我未肯置齒牙清寒瑩骨肝膽醒一生思慮無由邪招楊之罘方云之罘元和十一年進士閤本作之果字訛也柏生兩石間萬嵗終不大野馬不識人難以駕車葢柏移就平地馬羈入廐中馬思自由悲柏有傷根容傷根柏不死千丈日以至千或作百日以或作不難以或作巳馬悲罷還樂振迅矜鞍轡迅或作方云振迅字見七月詩傳鮑昭鶴賦之罘音浮南山來文字得我驚館置使讀書日有求歸聲我令之罘歸失得柏與馬失得方作失待或作實待或作實失理令按三本皆無理唯嘉祐杭本作失得似頗有而舉正不收葢其意曰失得之計觀於柏馬可見云爾之罘别我去計出柏馬下我自之罘歸入門思而悲之罘别我去能不思我為洒掃縣中居引水經竹間嚻譁所不及何異山中閑前陳百家書食有肉與魚先王遺文章綴緝實在余禮稱獨學陋易貴不逺復作詩招之罘晨夕抱飢渴寄盧仝玉川}
  - {type: page-break, offset: 11507, content: '', id: KR4c0044_WYG_005-3b, image: WYG1073/WYG1073-0328d.png}
  - {type: page-break, offset: 11507, content: '', id: KR4c0044_WYG_005-4a, image: WYG1073/WYG1073-0329a.png}
  - {type: variant, offset: 11510, length: 1, content: 黎, SBCK: 􅀺}
  - {type: variant, offset: 11513, length: 2, content: 集卷, WYG: 洛城裏破屋數間而巳矣一奴長鬚不裹頭一婢赤脚老無齒辛勤奉養十餘人上有慈親下妻子先生結髪憎俗徒閉門不出動一紀至令鄰僧乞米送僕忝縣尹能不耻令或作今非是尹一作令俸錢供給公私餘時致薄少助祭祀勸參留守謁大尹樊曰唐洛城有東都留守有河南尹公誌盧登封墓曰為書告留守與河南尹是時鄭餘慶留守東都李素以少尹行大尹事言語纔及輒掩耳水北山人得名聲去年去作幕下士水南山人又繼徃孫曰謂洛水}
  - {type: page-break, offset: 11513, content: '', id: KR4c0044_WYG_005-4b, image: WYG1073/WYG1073-0329b.png}
  - {type: variant, offset: 11516, length: 0, content: '', WYG: 南北也在洛陽城中水北石洪水南温造元和五年烏重𦙍為河陽三城節度使辟石洪温造為從事鞍馬僕從塞閭里從或作夫少室山人孫曰李渤字濬之刻志於學與仲兄涉皆隠盧山乆之徙終南少室山元和元年以左拾遺召不至}
  - {type: 'kr:newline', offset: 11517, content: '

      ', id: KR4c0044_krp_004-bkkkrnewl439}
  - {type: variant, offset: 11517, length: 0, content: '', WYG: 年河南尹遣吏持詔敦促又不赴公為河南令遺渤書譬說渤善公言始出家于東都索價髙兩以諫官徴不起彼皆刺口論世事有力未免遭驅使先生事業不可量惟用法律自繩巳春秋三傳束髙閣三方作五或作左巳今按鄒夾春秋世無傳而當世見行三傳作五左皆非也此孫曰晋杜乂殷洪並才名冠世更翼弗之重語人曰軰宜束之髙閣俟天下太平然後議其任耳獨抱遺經究終始抱方作把非是徃年弄筆嘲同異孫曰仝與馬異結交詩云仝不仝異不異是謂大同而小異仝自仝異自異是謂仝不徃兮異不至怪辭驚衆謗不巳近來自說尋坦途猶上虚空跨緑駬虚空或作青雲方云緑駬今本二字皆從馬按穆天子傳荀列史漢皆作緑耳郭璞注穆傳猶魏時鮮卑獻黄耳馬是以耳色言也此詩豈以重韻妄刋耶去嵗生兒名添丁仝有添丁詩意令與國充耘耔音子擁苗本國家丁口連四海}
