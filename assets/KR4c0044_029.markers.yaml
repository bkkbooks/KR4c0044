  - {type: variant, offset: 2343, length: 0, content: '', WYG: 塗為書致吾意已而自署其末與封敢告以請愈既與為禮發書云云其末有複語千萬永訣八字方無末有字名日月與封皆孝權迹名下或有與字孝權與余同年進士其上世有暠者當宇文時為車騎大將軍鄜城太守卒葬河北謚曰忠公至孝權間五世矣孝權大父諱孝先太子通事舍人孝先或作奉先父諱庭光贈綏州刺史綏州之卒孝權葢尚小杭本史下無綏州字非是母曰太原縣君卒既葬孝權守墓樹松柏三年而後歸卒上方有複出縣君字選為河南府文學或無府字去官徐州使拜章請為判官授協律郎孝權始不痛絶詔下大悔即詐稱疾不言三年元和初徐使死孝權疾即日已試判入髙等授鄠縣尉明年故相趙宗儒鎮荆南以孝權為判官拜監察御史經二年拜真御史明年分司東臺轉殿中按皇甫氏子母病不侍走京師求試職宰相怒曰吾故皇甫氏御史助所善相戲法侮}
