  - {type: variant, offset: 503, length: 770, content: 惟愈於執亊也可以此言進此言進方作言此言或作言此亊愈蒙幸於執亊其所從舊矣若寛假之使不失其性加待之使足以爲名寅而入盡辰而退申而入終酉而退終方作中率以爲常亦不廢事天下之人聞執事之於愈如是也聞下或无执亊之三字必皆曰執亊之好士也如此好或作待抗蜀文苑只此句有也字餘並无今从之執事之待士以禮如此執事之使人不枉其性而能有容如此執事之欲成人之名如此執事之厚於故舊如此又將曰韓愈之識其所依歸也如此閣本惟此句有也字餘並无今从之韓愈之不謟屈於富貴之人如此韓愈之賢能使其主待之以禮如此則死於執事之門無悔也能上方无䝨字則上或有苟如此三字若使隨行而入逐隊而趨言不敢盡其誠道有所屈於已方无所字天下之人聞執事之於愈如此皆曰執事之用韓愈哀其窮収之而巳耳韓愈之亊執亊不以道利之而巳耳苟如是雖日受千金之賜一歳九遷其官感恩則有之矣將以稱於天下曰知已知已則未也或无復岀知已二字伏惟哀其所不足矜其愚不録其罪察其辭而垂仁採納焉哀下方有察字按下文合有察字此不當有愈恐懼再拜答胡生書或作胡直均方注直均均或作鈞考登科記直鈞貞元十九年進士也愈頓首胡生秀才足下雨不止薪芻價益髙生逺客懷道守義非其人不交得無病乎斯須不展思想無已斯須或作頃渇或作傾渴皆非是愈不善自謀口多而食寡然猶月有所入以愈之不足知生之窮也至於是而不悔非信道篤者其誰能之所示千百言略不及此而以不屡相見爲憂謝相知爲急謀道不謀食樂以忘憂者生之謂矣顧無以當之如何當或作荅夫别是非分賢與不肖公卿貴位者之任也愈不敢有意於是如生之徒於我厚者知其賢時或道之於生未有益也未有下或有所字不知者乃用是爲謗不敢自愛懼生之無益而有傷也如之何若曰彼有所合吾不利其求則庻可矣方无其字仐按後卷答陳商書云文虽工不利於求則此其字亦當作於生又離郷邑去親愛甘辛苦而不厭者本非爲是也如之何愈之於生旣不變矣戒生無以示愈者語於人用息不知者之謗生愼從之語方作謂講禮釋友二篇比舊此言乆, WYG: 久}
