  - {type: variant, offset: 0, length: 333, content: 朱文公校昌黎先生集卷之三十四考異音釋附碑誌南陽樊紹述墓誌銘補注後山詩話歐陽公謂退之為樊宗師墓誌便似樊文其始出於司馬子長子長為長卿傳如其文惟其過之故兼之也樊紹述旣卒且葬愈將銘之從其家求書得書號魁紀公者三十卷曰樊子者又三十卷春秋集傳十五卷表牋狀策書序傳記紀誌說論今文讃銘凡二百九十一篇誌上方无紀字道路所遇及器物門里雜銘二百二十賦十詩七百一十九一十或作又十曰多矣哉古未嘗有也然而必出於巳不襲蹈前人一言一句洪曰囯史補云元和之後文章則斈竒於韓愈斈澁於樊宗師退之作樊墓誌称其為文不剽襲觀絳守居園池記誠然亦太竒澁矣本朝王晟刘忱皆為之注解如瑶翻碧㶑嵬眼傾耳等語皆前人所未道也歐陽公䟦絳守居園池語云元和文章之盛極矣其竒怪至於如此又詩曰嘗聞紹述絳守居偶來登覽周四偶異哉樊子怪可吁心欲獨去, WYG: ''}
