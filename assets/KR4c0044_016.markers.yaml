  - {type: variant, offset: 8535, length: 0, content: '', WYG: 欽定四庫全書别本韓文考異巻十七宋王伯大重編書上張僕射書九月一日愈再拜受牒之明日在使院中有小吏持院中故事節目十餘事来示愈其中不可者有自九月至明年二月之終皆晨入夜歸非有疾病事故輒不許出當時以初受命不敢言古人有言曰人各有能有不能若此者非愈之所能也愈下或無之字抑而行之必發狂疾上無以承事於公忘其将所以報徳者下無以自立喪失其所以為心夫如是則安得而不言忘或作望非是喪或作哀或校作衷皆非是凡執事之擇於愈者非為其能晨入夜歸也必将有以取之茍有以取之雖不晨入而夜歸其所取者猶在也或無将字與而字所取下亦無者字下之事上不一其事上之使下不一其事量力而任之度才而處之其所不能不彊使為是故為下者不獲罪於上為上者不得怨於下矣或作也孟子有云今之諸侯無大相過者以其皆好臣其所教而不好臣其所受教諸本皆如此閣本二教字並作命方從杭蜀苑教作受命所受教作所受命云考孟子上語當作受命今按依孟子則上語不當有受字下語不當有以字而二命字本皆作教童而習者皆能知之不知方氏何據而云考孟子上語當作受命也今之時與孟子之時又加逺矣皆好其聞命而奔走者不好其直已而行道者聞命而奔走者好利者也直已而行道者好義者也未有好利而愛其君者未有好義而忘其君者文苑而愛作而能愛而忘作而不愛二語並無者字今之王公大人惟執事可以聞此言惟愈於執事也可以此言進此言進方作言此言或作言此事愈䝉幸於執事其所從舊矣若寛假之使不失其性加待之使足以為名寅而入盡辰而退申而入終酉而退終方作中率以為常亦不廢事天下之人聞執事之於愈如是也聞下或無執事之三字必皆曰執事之好士也如此好或作待杭蜀文苑只此句有也字餘並無今從之執事之待士以禮如此執事之使人不枉其性而能有容如此執事之欲成人之名如此執事之厚於故舊如此又将曰韓愈之識其所依歸也如此閣本惟此句有也字餘並無今從之韓愈之不諂屈於富貴之人如此韓愈之賢能使其主待之以禮如此則死於執事之門無悔也能上方無賢字則上或有茍如此三字若使隨行而入逐隊而趨言不敢盡其誠道有所屈於巳方無所字天下之人聞執事之於愈如此皆曰執事之用韓愈之其窮収之而已耳韓愈之事執事不以道利之而已耳茍如是雖日受千金之賜一嵗九遷其官感恩則有之矣将以稱於天下曰知已知已則未也或無復出知已二字伏惟哀其所不足矜其愚不録其罪察其辭而垂仁採納焉哀下方有察字按下文合有察字此不當有愈恐懼再拜答胡生書或作胡直均方注直均均或作鈞考登科記直鈞貞元十九年進士也愈頓首胡生秀才足下雨不止薪芻價益髙生逺客懷道守義非其人不交得無病乎斯須不展思想無已斯須或作頃渇或作傾渇皆非是愈不善自謀口多而食寡然猶月有所入以愈之不足知生之窮也至於是而不悔非信道篤者其誰能之所示千百言略不及此而以不屢相見為憂謝相知為急謀道不謀食樂以忘憂者生之謂矣顧無以當之如何當或作答夫别是非分賢與不肖公卿貴位者之任也愈不敢有意於是如生之徒於我厚者知其賢時或道之於生未有益也未有下或有所字不知者乃用是為謗不敢自愛懼生之無益而有傷也如之何若曰彼有所合吾不利其求則庶可矣方無其字今按後巻答陳商書云文雖工不利於求則此其字亦當作於生又離鄉邑去親愛甘辛苦而不厭者本非為是也如之何愈之於生既不變矣戒生無以示愈者語於人用息不知者之謗生慎從之語方作謂講禮釋友二篇比舊尤佳或作嘉方作加志深而喻切因事以陳辭古之作者正如是爾愈頓首與于襄陽書七月三日将仕郎守國子四門博士韓愈謹奉書尚書閣下士之能享大名顯當世者莫不有先逹之士負天下之望者為之前焉士之上或有夫字達或作進士之能垂休光照後世者亦莫不有後進之士負天下之望者為之後焉莫為之前雖美而不彰莫為之後雖盛而不傳是二人者未始不相須也然而千百載乃一相遇焉豈上之人無可援音袁下之人無可推他回切記曰上弗援下弗推歟何其相須之殷而相遇之疎也其故在下之人負其能不肯諂其上上之人負其位不肯顧其下故髙材多戚戚之窮盛位無赫赫之光是二人者之所為皆過也未嘗干之不可謂上無其人未嘗求之不可謂下無其人愈之誦}
