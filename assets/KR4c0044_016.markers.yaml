  - {type: variant, offset: 0, length: 2276, content: 朱文公校昌黎先生集卷之十六考異音釋附書上宰相書正月二十七日前郷貢進士韓愈謹伏光範門下再拜獻書相公閤下書下或有于字方云時宰相趙憬賈耽盧邁也詩之序曰菁菁者莪樂育材也君子能長育人材則天下喜樂之矣或作也其詩曰菁菁者莪在彼中阿旣見君子樂且有儀說者曰菁菁者盛也莪微草也阿大陵也言君子之長育人材若大陵之長育微草能使之菁菁然盛也或无也字旣見君子樂且有儀云者天下美之之辭也其三章曰旣見君子錫我百朋說者曰百朋多之之辭也或无下百朋字言君子旣長育人材又當爵命之賜之厚禄以寵貴之云爾賜之賜或作錫之或作以其卒章曰汎汎楊舟載沈載浮旣見君子我心則休說者曰載載也沈浮者物也載載也或作載者載也或作載者舟也或作載舟也言君子之於人才無所不取若舟之於物浮沈皆載之云爾旣見君子我心則休云者言若此則天下之心美之也心上或无之字君子之於人也旣長育之又當爵命寵貴之而於其才無所遺焉孟子曰君子有三樂王天下不與存焉其一曰樂得天下之英才而敎育之此皆聖人賢士之所極言至論古今之所宜法者也然則孰能長育天下之人材將非吾君與吾相乎孰能敎育天下之英才將非吾君與吾相乎然則下或无孰能至相乎十七字方云歐本二存此則与後相應然亦无孰長人三字則非是幸今天下無事小大之官各守其職或作所錢榖甲兵之問不至於廟堂論道經邦之暇捨此宜無大者焉今有人生二十八年矣名不著於農工商賈之版其業則讀書著文歌頌堯舜之道雞嗚而起孜孜焉亦不爲利或無而字其所讀皆聖人之書揚墨釋老之學無所入於其心其所著皆約六經之㫖而成文抑邪與正辨時俗之所惑与或作㒷居窮守約方天守字亦時有感激怨懟音墜竒怪之辭以求知於天下亦不悖於敎化妖淫䛕佞譸張譸音輈張誑也之說無所出於其中四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畒之宫其可懷宫或作宅方云一畒之宫本儒行語公苗蕃誌无宫以歸今本亦誤今按二字无大利害公用儒行語亦或有之然謂其專用宮字而不得更用宅字則固矣遑遑乎四海無所歸恤恤乎飢不得食寒不得衣濵於死而益固得其所者爭笑之忽將棄其舊而新是圖求老農老圃而爲師悼本志之變化中夜涕泗交頥雖不足當詩人孟子之謂抑長育之使成材其亦可矣教育之使成才其亦可矣子之下或有所字抑又聞古之君子相其君也之字或在君子下或子下别有之字一夫不獲其所若已推而内之溝中今有人生七年而學聖人之道以修其身積二十年不得巳一朝而毀之是亦不獲其所矣十下或有一字伏念今有仁人在上位若不往告之而遂行是果於自棄而不以古之君子之道待吾相也其可乎寧往告焉若不得志則命也其亦行矣志上或有其字今疑志字衍洪範曰凡厥庶民有猷有爲有守汝則念之不恊于極不罹于咎皇則受之二不字方並作弗也而康而色曰予攸好德汝則錫之福是皆與善之辭也抑又聞古之人有自進者而君子不逆之矣曰予攸好德汝則錫之福之謂也君上或无而字抑又聞上之設官制禄必求其人而授之者非苟慕其才而富貴其身也方无貴字蓋將用其能理不能用其明理不明者耳下之修已立誠必求其位而居之者非苟没於利而榮於名也没或作役方云囯語重耳不没於利主没貪也蓋將推巳之所餘以濟其不足者耳然則上之於求人下之於求位交相求而一其致焉耳一其致或作其致一苟以是而爲心則上之道不必難其下下之道不必難其上可舉而舉焉不必讓其自舉也譲下或有於字可進而進焉不必廉於自進也於下或有其字抑又聞上之化下得其道則勸賞不必徧加乎天下而天下從焉化上方无之字則方作其疑當併有則其字因人之所欲爲而遂推之之謂也方作矣今天下不由吏部而仕進者幾希矣主上感傷山林之士有逸遺者屡詔内外之臣旁求於四海而其至者蓋闕焉求下方有儒雅字雅亦或作士豈其無人乎哉亦見國家不以非常之道禮之而不來耳家下方有之字彼之處隱就閒者亦人耳其耳目鼻口之所欲其心之所樂其體之所安豈有異於人乎哉今所以惡衣食窮體膚麋鹿之與處猨狖之與居固自以其身不能與時從順俯仰故甘心自絶而不悔焉从方作俗今按後卷与馮宿書云委曲从順向風承意則諸本作从順者固韓公常用之語也方本語意拙澁非是而方聞國家之仕進者必舉於州縣然後升於禮部吏部聞下或有今字試之以繡繪雕琢之文考之以聲勢之逆順章句之短長中其程式者然後得從下士之列雖有化俗之方安邊之畫不繇是而稍進萬不有一得焉進下或有者字彼惟恐入山之不深入林之不宻其影響昧昧惟恐聞於人也惟恐或作之恐或无此二字今若聞有以書進宰相而求仕者而宰相不辱焉而薦之天子而爵命之而布其書於四方進或作上而宰而爵或並无而字而復出天子二字方无於字枯槁沈溺魁閎寛通之士必且洋洋焉動其心峨峨焉纓其冠于于焉而來矣此所謂勸賞不必徧加乎天下而天下從焉者也因人之所欲爲而遂推之之謂者也伏惟覧詩書孟子之所指念育才錫福之所以考古之君子相其君之道而忘自進自舉之罪思設官制禄之故以誘致山林逸遺之士庻天下之行道者知所歸焉歸上方有依字小子不敢自幸其嘗所著文輒採其可者若干首録在異卷冀辱賜觀焉或无敢字或无冀字冀辱或作伏垂干黷尊嚴伏地待罪愈再拜後十九日復上書二月十六日前郷貢進士韓愈謹再拜言相公閤下向上書及所著文後待命凡十有九日不得命恐懼不敢逃遁不知所爲方无向字及逃字从乃復敢自納於不測之誅以求畢其說而請命於左右愈聞之蹈水火者之求􅊵於人也不惟其父兄子弟之慈愛然後呼而望之也將有介於其側者雖其所憎怨苟不至乎欲其死者則將大其聲疾呼而望其仁之也仁或作人而之下有救字或作人而下无之字今按此若作人之救則正与下句全字爲對而下文再曡其語亦以二字相對但斍其語差凡故今且从方本注彼介於其側者聞其聲而見其事不惟其父兄子弟之慈愛然後往而全之也雖有所憎怨苟不至乎欲其死者則將狂奔盡氣濡手足焦毛髮救之而不辭也若是者何哉其勢誠急而其情誠可悲也愈之彊學力行有年矣愚不惟道之險夷愚上或有其字而愚下有也字也又或作甚或有其字而无也甚二字行且不息以蹈於窮餓之水火其旣危且亟矣大其聲而疾呼矣, WYG: ''}
