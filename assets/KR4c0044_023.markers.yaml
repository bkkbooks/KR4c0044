  - {type: variant, offset: 6433, length: 0, content: '', WYG: 悖未孚繄君之賴乃奏乞留乃遷殿中朱衣象版惟義之趨豈利之踐虺豺發釁闔府屠割或作剥償其恨犯君獨髙脫露刀成林弓矢穰穰刀或作刄千萬為徒譟讙為狂君獨叱之上不負汝為此不祥將死無所雖愚何知慙屈變色君義不辱殺身就德天子嘉之贈官近侍歸於一死萬古是記我之從女為君之配君於其家行實髙世無所於𦵏輿䰟東歸於𦵏或作掩𦵏輿或作與誄以贈之莫知我哀嗚呼哀哉尚饗祭女挐女文挐或從奴方云古本祭文與壙銘皆作女挐重彦逺曰挐字傳寫之誤盖古文如紛挐等字無從奴者公最好古名其女不應用俗字也今按挐拏通說已見第五巻李花詩維年月日阿爹阿八使汝妳以清酒時果庶羞之奠祭于第四小娘子挐子之靈嗚呼昔汝疾極值吾南逐極或作亟蒼黄分散使汝驚憂我視汝顔心知死隔汝視我靣悲不能啼我既}
