  - {type: variant, offset: 1252, length: 0, content: '', WYG: 女挐壙銘女挐韓愈退之第四女也慧而早死愈之為少秋官言佛夷鬼其法亂治梁武事之卒有侯景之敗可一掃刮絶去不宜使爛熳為少或作少為非是方無武字刮方作削天子謂其言不祥斥之潮州漢南海掲陽之地或無漢字愈既行有司以罪人家不可留京師迫遣之或無可字女挐年十二病在席既驚痛與其父訣病或作疾方作在病無席字又輿致走道撼頓失食飲節死于商南層峰驛即瘞道南山下層峯或作密五年愈為京兆始令子弟與其姆音戊女師也記曰姆教婉娩聴從易棺衾歸女挐之骨于河南之河陽韓氏墓葬之京兆下或有尹字葬上或有而字女挐死當元和十四年二月二日和下或有之字其發而歸在長慶三年十月之四日其葬在十一月之十一日銘曰汝宗葬于是汝安歸之惟永寧}
