  - {type: variant, offset: 7348, length: 0, content: '', WYG: 别本韓文考異巻七欽定四庫全書别本韓文考異巻八宋王伯大重編聯句方云諸聨句多元和初作城南聯句聨句古無此法自退之始樊曰劉貢父云退之與孟東野聨句宏壯辨博似若出一手王深父云退之容有潤色呂氏童訓徐師川問山谷曰人言東野聨句大非平日所作恐是退之有所潤色山谷云退之安能潤色東野若東野潤色退之却有此理方云蜀木作一百五十韻今本因之然此詩實多三韻不可以為据竹影金瑣碎郊瑣或作鎖非是沈存中云乃日光非竹影洪曰日光在其中若曰日光金鎖碎則不可也泉音玉淙琤音一作聲淙藏宗士江二切琤楚耕切陸士衡詩曰山溜何泠泠飛泉潄鳴玉樊曰荆公詩云風泉隔屋撞哀玉竹月縁階貼碎金語本此瑠璃翦木葉愈翡翠開園英流滑隨仄歩郊搜尋得深行遥岑出寸碧愈逺目増雙明乾穟音遂禾秀乾滯徳也紛挂地郊紛或作絲或作紅化蟲枯挶莖挶居玉切韓曰挶持也孫曰化蟲蟲之變化者如蟬蟻之類枯挶莖者言化蟲巳枯尚挶持於草木之莖也木腐或垂耳愈草珠競駢蒲眠切並也睛浮虛有新斸郊摧扤饒孤撑方云扤動也字不當从木古樂府不見山顛倒摧扤下為薪囚飛黏網動愈盜啅接彈驚啅音卓鳥食也杜詩啾啾黄雀啅接彈言彈丸相接故驚也方云囚飛盜啅潮本作蟲飛雀啅此詩一體六語皆賦物而不言其名舊本並同上脱實自開坼郊牽柔誰繞縈禮䑕拱而立愈陸機云河東有大䑕能人立交前兩脚於頸上跳舞善鳴駭牛躅直六反躑躅也且鳴駭方作騃音俟説文馬行仡仡也詩儦儦俟俟韓詩作駓駓騃騃故西京賦云羣獸駓騃此當从俟音則於躅且鳴義為合也今按方説騃躅二字於牛義無取疑當从蜀本作駭而躅當作觸乃於牛有意又與上字相偶然無所据姑附于此蔬甲喜臨社郊時乃八月田毛田所生者謂之毛宅不毛是也樂寛征露螢不自暖愈凍蝶尚思輕孫曰尚欲飛也宿羽有先曉郊孫曰宿鳥有未曉而飛也食鱗時半横孫曰魚之食者半横水中菱翻紫角利愈翻作繁荷折碧圓傾楚膩食也鱣知連切口在頷下江東曰黄魚鮪亂郊獠羞螺蠏并獠張絞切又盧作切祝曰西南夷别名孫曰羞亦食也言水有鱣鮪螺蠏若獠羞然桑蠖烏郭切桑蟲也見虚指愈言空有迹耳穴貍聞鬬獰逗翳上音豆下於計切逗上也翳陰也孫曰言鳥止於林隂其翅相觸也翅相築郊擺幽尾交榜薄庚切孫曰擊也如蛇之類擺幽出僻其尾相擊也蔓涎孫曰謂蝸牛涎於蔓上角出縮愈樹啄啄木鳥頭敲鏗脩箭竹也褭金餌郊羣鮮沸池􅅅岸殻坼𤣥兆愈孫曰言岸有蟲壳拆開如立兆象野麰漸豐萌窰煙羃䟽島郊窰音由白烟羃覆也周禮羃人窰或作瑶沙篆印迴平孫曰言迴曲之平處洪曰華山有青柯平鐘藥平因地之平處以為名也㾕肌遭蚝七吏切毛蟲有毒刺愈刺七亦切㾕或作瘁方云見鬬雞篇啾耳聞雞生竒慮恣迴轉郊遐睎縱逢迎巔音顛山頂林戢歛也逺睫愈縹敷沼切祝曰青黄色孫曰夷樂也言望巔林觀縹氣戢目以夷情氣夷空情歸跡歸不得郊捨心捨還爭靈麻撮狗蝨愈孫曰胡麻也狀如狗蝨村稚啼禽猩孫曰言小兒之啼如猩猩爾雅猩猩小而好啼紅皺孫曰菓實皺而紅者脱者曰乾棗曬檐瓦郊檐或作簷黄團繫門衡洪曰𤓰蔞也一曰天𤓰衡門上木得雋徂兖切言豪俊左氏得雋曰克蠅虎韓曰崔豹古今注蠅豹即蠅虎徤愈相殘雀豹孫曰雀之鷙者以其勇徤故曰雀豹趟音棖洪曰跳躍貌玉篇䞴趟跟党也束枯樵指禿郊刈熟擔肩赬澁旋隨戀切皮巻臠愈巻求晚切脔力轉切不舒放也苦開腹彭亨孫伯野謂此二語與上二語意属一曰澁旋乃旋果實之澁者苦開乃破𤓰瓠之苦者也方言謂環而鐫之為旋巻脔見莊子彭亨方作膨脝又云古字只作彭亨毛詩傳炰烋猶彭亨是也機舂韓曰果碓也潺湲力郊吹簸飄颻精賽饌祭食木盤簇愈靸妖藤索絣靸恐合切絣北萌切孫曰靸小兒履絣以藤索為之樊曰此句與其下䟠䋲機婺疑為今之靸韆韓曰巳上泛言城南景物之盛靸妖或作妖靸絣或作帡或作耕方作併云今併字不入庚韻故學者疑之履今按靸廣韻云蘇合切小兒履也今猶以為鞋面䟽之名但用之於此句似無意義疑當作扱楚治切收也取也獲也妖謂狐狸之属能為妖媚者也絣當从系獄中以繩索急縛罪人之名也言捕取妖狐而以藤索縛之也荒學五六巻郊古藏四三塋音營墓域四三或作三四里儒拳足拜愈土怪家語季桓子穿井得土缶問孔子孔子曰土之怪者羵羊缶也閃眸瞬目偵候也蹄遁補復破郊絲窠掃還成暮堂蝙蝠沸愈破竈伊威盈伊威或作蛜蝛方云詩釋又曰或旁加蟲後人増也追此訊前主郊荅云皆冢卿上卿也敗壁剥寒月愈孫曰月自敗壁而入如剥破之狀折篁嘯遺笙孫曰風吹聲袿熏霏霏在郊綦跡微微呈袿或作桂綦或作棊皆非是方云袿音圭婦人上服也古樂府衣上香猶在握裡書未滅班偼妤賦俯視兮丹墀思君兮履綦綦履下飾也在或作炷呈或作星皆非是劒石猶竦檻愈獸材尚挐楹寳唾拾未盡郊玉啼墮猶鎗楚耕切唾或作碣啼方作題云蜀都賦玉題相輝題椽上飾也故曰墮猶鎗鎗墮聲本或作琤或云􅀈柱躓也與玉題意相類洪曰此以咳唾喻珠璣以啼泣喻玉筯也唾又作硾啼又作揥當今按上下文意皆婦女事洪説為是若作題即上句作碣然非文意乂躓乃柱礎亦非可拾之物也牕綃孫曰言牕紗中尚疑閟藏佳人也疑閟豔愈䊋燭巳銷檠緑髪韓曰細草孫曰緑苔也抽珉甃郊孫曰珉石之次玉者甃并甃眠甃美言之也言緑苔生於珉甃之上青膚孫曰青皮也韓曰苔蘚聳瑶楨音貞説文木也瑶楨美榦白蛾飛舞地愈幽蠧落書棚薄萌切博雅云閤也説文棧也蠧書蟲棚書架蠧一名蟬韓曰巳上言郊墟宅野之古廢惟惜集嘉詠郊吐芳類鳴嚶窺竒摘海異愈恣韻激天鯨天上鯤鯨激騰躍也腸胃繞萬象郊精神驅五兵蜀雄李杜拔愈李杜下對雷電未詳其説嶽力雷車轟大句斡𤣥造郊𤣥或作元髙言軋霄崢孫曰山之切雲者謂霄崢軋轢也芒端轉寒燠愈神助溢盃觥巨細各乘運愈湍潿湍急流潿濁不流韓曰巳上言昔人吟咏之工潿或作湋亦騰聲凌花咀粉蘂郊削縷穿珠櫻綺語洗晴雪愈嬌辭哢雛鸎酣歡雜弁珥郊珥音餌耳飾歡方作勸雜或作新方从閤本云昔涥于髠所謂前有墮珥後有遺簮當今按方意勸為勸酒之意然此皆形容詩語之工不作勸而作歡字則對價字為尤切繁價流金瓊􅔽蓞寫江調郊江或作紅方云選劉體𤣥詩悲發江南調謝靈運詩采菱調易急江南歌不緩李善皆引古江南詞江南可採蓮以舞之東野本集亦喜用江調字萎蕤綴藍瑛音英玉光方云萎蕤青花圓實亦名玉竹藍瑛藍田之玉也庖霜繪𤣥鯽愈浙玉炊香粳音更方云浙字從折之舌切魏文帝朝王朗曰不能效君昔在㑹稽所杭米古浙作折其從折者星厯切孟子所謂接浙而行是也本多作浙朝饌巳百態郊春醪又千名哀匏蹙駛景愈蹙駛或作缺蹙或作蹙缺洌清也唱凝餘晶日光疑猶遏也解魄不自主郊痺卑利切肌坐空瞠或作膛子今按莊瞠若乎其後膛丑庚切直見也言坐乆而無所見也扳援上音攀下音袁挽引也賤蹊絶愈孫曰謂賤者不可扳援而至也炫曜仙選更藂巧競採笑郊藂或作叢方云唐人多書叢作藂楚詞及舊本韓栁集皆然今本尚見一二姑存之駢鮮互探嬰桑變言桑樹變化却生蕪蔓忽蕪蔓愈樟音章裁斵也浪登丁登丁斵木之聲霞鬬謂雲霞相合也詎能極郊風期誰復賡誰復或作復誰臯神臯區扶帝壤愈瓌藴郁天京祥色被文彦郊良才插杉檉河栁隠伏饒氣象愈興潜示堆坑擘華西京賦注華山首陽本一山河神巨靈以手擘開其上以足蹈離其下中分為兩河因通流神物巨靈也露神物郊擁終儲地禎終終南山儲蓄也訏謨壯締結也始愈輔弼登階清泰階坌秀恣填塞郊呀靈畜渟達丁切水止也澄益大聨漢魏愈聨或作連肇初邁周嬴積照㴠徳鏡郊傳經儷音麗偶也金籝音盈笭也韋賢曰遺子黄金滿籝不如教子一經食音寺家行鼎鼐愈寵族飫弓旌奕制盡從賜郊盡或作書此句未詳殊私得逾程過法度也飛橋上架漢愈漢天河繚岸俯規瀛海也規或作窺方規度也東方朔傳規以為苑瀟碧逺輸委郊湖嵌口銜切費攜擎湖本作胡方云瀟碧竹也胡嵌石也萄苜上音陶下音目張騫使外國得蒲萄苜蓿從大漠愈苜或作首漠或作漢非是楓櫧音諸選云沙棠櫟櫧華楓枰櫨櫧或作儲至南荆嘉植鮮危朽郊膏理易滋榮理或作􅀈方云此以嘉植言也周禮其植物宜膏物鄭注云謂楊栁之属理致白如膏懸長巧紐翠愈紐或作細紐結也象曲善攅珩攅聚珩玉也善或作葢魚口星浮沒郊馬毛錦斑騂五方亂風土愈百種分鉏耕葩蘖相妬出郊蘖方作孽非是菲茸共舒情類招臻倜詭愈倜他歴切類物臻極也相如封禪書云竒物譎詭倜儻窮變翼萃伏衿纓翼禽属危望跨飛動郊㝠升躡登閎方云字見楊雄校獵賦蜀本登作竹育切宏屋嚮也春游轢靃靡愈靃音隨孫曰草木敷華皃轢踐也祝曰草木弱皃楚詞萍草靃靡彩伴䬃嫈嫇上音縈下音萌祝曰廣韻嫈嫇新婦貌遺燦飄的皪郊選珠翠的皪白狀淑顔洞精誠嬌應如在寤愈頽意若含酲鵷毳孫曰鴛鴦之羽以飾其衣帶詩毳衣如菼翔衣帶郊鵝肪截佩璜肪音方脂也孫曰玉書云白如截脂黑如純漆赤如雞冠黄如蒸栗璜半壁也文昇相照灼愈武勝屠攙音讒搶楚庚切祝曰彗星為攙搶注言謂之孛言其形孛孛似掃彗孫曰攙搶以喻㓂亂割錦不酬價郊構雲結屋於髙處有髙營通波牣鱗介愈牣方作仞云相如賦充仞其中古字作仞作牣非也今按詩及孟子皆作牣方説非是䟽畹䟽寛也富蕭蘅音行杜蘅香草大者曰杜若買養馴孔翠郊逺苞樹蕉栟音并栟櫚選栟櫚枸榔鴻頭排刺芡愈芡音儉補注方言曰南楚謂之雞頭北燕謂之䓈青徐淮泗之間謂之芡又云雞頭或謂之鴈頭鵠卵也攅聚也韓曰巳上言土地人物富華之盛瓌橙香橙也諸本作方云卵也納涼聯句盤有饋禽今本亦誤鶩廣雜良牧郊䝉休賴先盟罷旄奉瓌衛愈守封踐忠貞戰服脱明介郊朝冠飄彩紘爵勲逮僮𨽻愈簮笏自懐捐也繃北萌切小兒繃也以繒帛為之亦謂之襁乳下秀嶷嶷郊椒蕃言子孫多如椒蕃泣喤喤音横小兒啼聲詩其泣喤喤貌鑑其貌有光可以鑒也清溢匣愈眸光寒發硎館儒養經史郊綴戚觴孫甥考鐘饋肴核愈戞鼓侑牢牲飛膳自北下郊函珍極東烹如𤓰煮大卵愈比線茹芳菁海嶽錯口腹郊趙燕錫媌娙媌音茅娙五莖切美婦人也選燕趙多佳人媌或作媖一笑釋仇恨愈百金交弟兄貨至貊戎市郊呼傳鸜鵒令令鸚鵒傳呼也鸚或作鸚方云戎貊鸚鵡鸚鵒四物也或本非是順居無鬼瞰愈瞰音闞視也楊雄曰髙明之家鬼瞰其室抑横免官評官謗也韓曰已上言門地簮纓之家殺候肆凌翦郊籠原市罝紭音𢎞網綱羽空鳥被箭羽毛滿空顛雉鷃愈血路迸狐麖音京獸名一角牛尾其狀似麋折足去踸踔郊踸勅甚切踔直角切孫曰行不正貌莊子夔謂蚿曰吾以一足踸踔而行注踸踔自跳躑也蹙鬐怒䰃音彭鬤乃庚切䰃鬤言魚中鉤其怒如此鬤張兒躍犬疾翥飛舉貌鳥愈呀鷹甚飢䖟音盲筭蹄上林賦射麋角麟顔師古云持引其脚計其所獲也所謂筭蹄如此記功賞郊裂腦擒摚掁上音膛下音棖摚距也掁􅨄也諸本腦作􅠱擒作相摚作盪又作湯方从蜀本云􅠱腦字之誤或作掁􅨄也盪掁湯􅨄之義監本作摚掁摚距也義亦通而擒作相則非盪今按􅠱别本作脇疑傳冩之誤當作摚猛斃孫曰謂猛獸斃牛馬樂愈妖殘孫曰謂妖鳥殘滅梟􅀈惸􅀈或作鴿方云􅀈音格今鵂鶹也今按􅀈音柯額切爾雅􅀈鵋􅀈今鵂鶹也其音各者鳥水鳥也窟窮尚嗔視郊箭出方驚抨普耕切彈也連箱載已實愈礙轍棄仍嬴喘覷鋒刃㸃郊困衝株枿盲掃淨豁矌矌愈騁遥畧苹苹音平韓曰草聚生也選馳苹苹饞鉏咸切饕也楚牙切飽活臠郊惡嚼􅀈音博噍貌腥鯖音征廣韻煮魚煎食曰五候鯖韓曰已上言射獵之盛嵗律及郊至愈古音命韶韺音英帝嚳樂曰六英旗斾流日月郊孫曰畫日月於旗上流行也帳廬以帷為廬扶棟甍莫耕切屋棟磊落大皃奠鴻璧愈大璧周禮以蒼璧禮天是也參差席香藑音瓊爾雅葍藑茅楚詞索藑茅以莛蓴注靈草也孫曰香茅也席鋪也𤣥祇祉兆姓郊黑秬饛音䝉豐盛食滿貌豐盛慶流蠲瘥癘愈威暢捐䡴輣上尺容切下音彭韓曰後漢䡴輣撞城注䡴撞車也輣樓車也靈燔燔柴也望髙冏郊尸鼎切虛空也龍駕聞敲䬝音横車相擊聲或作䬖説已見上是惟禮之盛愈永用表其宏徳孕厚生植郊恩熙完刖剠與黥同已上言行郊祀之禮宅土盡華族愈運田閒强甿䕃庾森嶺檜郊啄場􅞪祥䳟音明孫曰䳟鳥名楊子鷦䳟遴集食其潔矣祝曰鷦䳟似鳳南方神鳥楚辭鷦䳟開路兮注智鳥也方云鷦䳟鳳也諸本多訛作鵬非畦肥翦韭薤愈陶固收盆甖利養積餘健郊孝思事嚴枋補彭切祭求神掘雲破嵽嵲愈雲或作靈採月漉坳泓寺砌砌石也上明鏡郊石明如鏡僧盂敲曉鉦音征鐃也似鈴而無舌泥象對騁怪愈鐵鐘孤舂鍠音横鐘聲舂撞也後漢鍠鍠鎗鎗注鐘鼓聲癭頸閙鳩鴿郊蛇于丸切垣亂蛷音求多足虫垣或作􅀈方云求蜿蜒於墻屋之間作􅀈非蠑音榮􅔼蝪葚桑葚黑老蠶蠋愈蠋音燭桑虫也麥黄韻鸝鶊上音离下音庚鸝鶊二鳥名鸝黄鸝庚倉庚韓曰巳上言民居寺宇之美韶曙韶妍也曙曉也曙或作署遟勝賞郊賢朋戒先庚朋方作明馳門填偪與逼側同仄愈競墅輾語箭切砯砰上披冰切下普耕切選砯岩皷作砰聲如雷列子砰然若聞雷霆之聲碎纈紅滿杏郊碎纈或作醉結方从閤本云曾本亦作碎唐小説裴晉公午橋有文杏百株立碎錦坊少陵詩内蘂繁於纈杜牧之詩花䲧團宫纈或云當作醉纈李長吉詩醉纈抛紅網稠凝碧浮􅄳徐盈切飴也䠞子六切蹋也繩覲娥婺愈上或作蹴覲或作觀娥婺美女也鬬草擷胡結切監本拮將取也潮本作擷拮或作祮璣珵音呈楚辭豈珵美之能當注美玉也粉汗澤廣額郊金星寳黶也墮連瓔瓔珞婦人頂飾鼻偷困淑郁愈郁香氣眼剽强盯􅟑上音掁下音萌玉篇視貌是節是時也飽顔色郊兹疆稱都城書饒書富也罄魚繭愈國史補云紙之好者有魚子紙晉王羲之用蚕繭紙紀盛播琴箏孫曰謂播之樂府韓曰巳上言里人遊觀之樂奚必事逺覿郊無端逐羇傖助庚切祝曰晉史吳人謂中州人曰傖羇傖謂謫陽山江陵時也將身親魍魅愈浮跡侣鷗鶄音精鶄腥味空奠屈郊天年徒羡彭天或作天驚魂見蛇蚓愈觸嗅值蝦蟛上音遐下音彭似蠏而小曰彭蜞幸得履中氣郊中和之氣沗從拂天棖孫曰天門也棖門兩旁木言自遷謫得歸朝廷也禮記上介拂棖歸私暫休暇愈驅明出庠􅓺明或作昵方云樊本作驅抳抳止輪木也時景元校作驅朋今按驅馳遟明而出太學也葢作此時公方為博士鮮意鮮新也竦輕暢郊連輝猶言連璧也照瓊瑩陶暄逐風乙愈乙鳥轄切説文𤣥鳥也齊魯之間謂之乙躍視舞晴蜻音精蜻蜓也風乙或作乙乙晴蜻或作蜻蜻皆非是足勝竒也言勝遊處自多詣郊心貪敵無勍渠京切强敵也始知樂名教愈何用苦拘儜尼耕切固也晉史不簡蚩儜拘儜拘束也又困弱貌畢景盡日也任詩趣郊焉能守䃘䃘愈䃘䃘與論語硜硜義同小謹之貌方云字書無䃘字按塩鐵論器多堅䃘又皇甫謚釋勸篇龍潜九淵䃘然執髙何令升晉書音義䃘口萌切不知字書何以逸之也㑹合聨句樊曰公召為國子博士與張籍張徹孟郊㑹京師而有此詩故郊有京遊歩方振謫夢意猶恟等語徹有馬辭虎豹怒舟出蛟鼉恐之句皆敘公南還意而公則云念難須勤追悔易勿輕踵其義一也韓曰黄魯直嘗云退之㑹合聨句四君子皆佳士意氣相入雜之成文世之文章之士少聨句葢筆力不能相追或成四公子棊耳離别言無期㑹合意彌重籍病添兒女戀老喪丈夫勇愈劒心猛氣也知未死或作謝詩思猶孤聳郊愁去劇箭飛讙來若泉涌徹析言析開析也貫事也多新貫析或作折攄抱無昔壅籍念難須勤追悔易勿輕踵愈吟巴山犖嶨或作嵤方云嶨音學山多大石也説楚波堆壟郊馬辭虎豹怒舟出蛟鼉恐徹狂鯨時孤軒起也幽狖音柚獸狀如猿雜百種愈瘴衣常腥膩蠻器多踈宂籍踈宂不堪也剥苔洪曰湘中斑竹方生斑每㸃上有青苔錢封之孫曰博物志云洞庭之山帝之二女居之涕下揮竹竹盡斑苕溪漁隠曰斑竹惟青湘間有未嘗有苔蕂梧間别有一種斑竹間有苔蘚封之弔班林角飯餌沉塚愈忽爾銜逺命歸歟舞新寵郊爾或作示非是歟或作還鬼窟脱幽妖天居覿清栱愈栱或作拱京遊歩方振謫夢意猶恟籍恟許拱切懼也詩書誇舊知酒食接新奉愈嘉言寫清越瘉病失肬與尤同結病也腫郊腫大也夏隂偶髙庇宵魄接虛擁愈魄方作魂本今按宵魄謂月方非是雪絃謂琴有陽春白雪之歌寂寂聽茗盌與椀同纎纎捧郊纎捧謂美婦之手馳輝燭浮螢幽響泄潜蛬愈蛬音拱爾雅曰蟋蟀蛬今促織也詩老獨何心江疾有餘尰郊尰音腫足腫我家本瀍榖瀍水名出河南穀城山有地介臯鞏皆河南地名史記韓獻成臯鞏休跡憶沈㝠楊子蜀莊沈㝠猶言隠淪也峨冠慙闒音榻或作闒或作溻􅀈愈􅀈音冗祝曰不肖也劣也司馬遷云在闒茸之中楚辭雜班駮與闒茸皆以茸為􅀈諸本此四句下無愈字方从唐蜀本增洪云退之家在洛陽嘗謫陽山今為博士則唐本為是􅀈一作􅀈升朝髙轡逸振物羣聽悚方云别本悚作竦嵇康琴賦竦衆聽而駭神徒言濯幽泌音祕詩泌之洋洋注泉水也誰與薙音替又音雉除草也荒茸籍茸音冗草生荒或作芒方云此漢敘傳所謂夷險芟荒是也芒字非朝紳鬱青緑馬飾曜珪珙音拱璧也孫曰謂銜轡之属珪珙以為飾也國讐未銷鑠我志蕩卭隴郊時劉闢亂蜀王師出征故云蕩卭隴也二山名君才誠倜儻時論方洶許拱切洶或作汹音凶溶音勇洶溶水貌格言多彪蔚懸解無梏拲上古沃切下音拱周禮上罪枯拲而桎張生得淵泉寒色拔山冡堅如撞羣金羣鍾也眇若抽獨蛹愈蛹音勇祝曰蚕化為之孫曰言微而不絶伊余何所擬跛鼈詎能踊塊然墮岳石飄爾罥巢氄郊罥音畎氄音冗罥網也氄鳥獸細毛也書鳥獸氄毛孫曰此聨甚言其危龍斾垂天衛雲韶凝禁甬孫曰甬道天子之居君胡眠安然朝鼓聲洶洶愈胡或作乎非是鬬雞聨句韓曰公與東野聨句詞意雄渾極其情態間以人才為喻兩皆傑作真歐陽文忠所謂韓孟於文詞兩雄力相當者也樊曰至若爭觀雲填道助呌波翻海則公詩之豪而一噴一醒然再接再礪乃則東野工處大雞昂然來小雞竦敬也而待愈崢嶸顛盛氣顛音田孫曰玉藻曰盛氣顛實揚休注云顛讀為闐揚讀為陽盛身中之氣使之闐滿如陽氣之休物也方云顛讀為闐見禮記洗刷凝鮮彩郊髙行若矜豪側睨如伺殆愈精光目相射劒㦸心獨在郊既取冠為胄復以距為鐓音隊孫曰鐓鍪柄下蹲禮記進矛㦸者前其鐓是也或作鎩漢書鉤㦸長鎩今按鎩廣韻所拜切於四聲不協然鐓乃刃下之平底者與距不相似亦未詳其説也天時得清寒地利挾爽塏愈塏音凱髙地磔毛各噤巨禁切口閉也㾕或作㾕或作瘴或作痒方从杭本云㾕所錦切寒病也義訓寒謂之㾕􅂒皮日休詩枕下聞澎湃肌上生㾕􅂒韓渥詩禁㾕餘寒酒半醒怒癭爭碨烏罪切碨磊不平也選磔磈磊而相摩磊俄膺忽爾低植立瞥疋蔑切而改郊腷膊上音愎下音粕古詩腷腷膊膊雞初鳴戰聲喧繽翻落羽皠七罪切白也中休事未決小挫勢益倍愈妬腸務生敵腸方作腹敵或作欺賊性專相醢裂血失鳴聲啄殷烏闌切赤黒色甚飢餒郊對起何急驚隨旋誠巧紿音怠欺也毒手飽李陽樊曰晉石勒與李陽隣居嵗常爭麻池相歐擊勒既即偽位召陽酣謔引陽臂笑曰孤昔日厭卿老拳卿亦飽孤毒手杜子美義鶻行所謂巨顙折老拳亦此事也神槌困}
