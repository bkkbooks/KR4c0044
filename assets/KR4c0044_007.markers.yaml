  - {type: variant, offset: 7360, length: 0, content: '', WYG: 八孫曰言蜀師敗或分為二三或㪚為七八逆頸盡徽索仇頭恣髠鬝格八切秃也怒鬚猶鬇鬡上士耕切下女耕切髪亂也斷臂仍􅤿􅧜愈􅤿方作敤云若果切擊也又云字書無敤字今按諸公所校本􅤿皆音蒲八切􅧜格八切與鬇鬡皆叠韻石潛設竒伏宂覷孫曰謂蜀兵雖敗尚有潜于石覷于宂者騪精察精或作幽中矢類妖㺑音杉妖㺑狂犬也跳鋒狀驚豽似狸蒼黑無前足能捕䑕與同方云豽蜀本音女滑切字當从豸㺅属今本多從犭从簡也蹋翻聚林嶺斗起成埃圿郊圿音戞垢圿也斾亡多空杠音江旗竿旗斾亡失尚有空杠也軸折鮮聯轄剟音掇削擊也膚浹瘡痍敗面碎剠㓤茶八切剥㓤也渾奔肆狂勷方云狂當作􅀈音匡本亦或作劻劻勷遽也故􅀈躟為行遽鬤為髪亂}
