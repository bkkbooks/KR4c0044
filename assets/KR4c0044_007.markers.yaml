  - {type: variant, offset: 7349, length: 0, content: '', WYG: 亥愈史記魏朱亥為侯嬴薦於魏公子公子矯魏主令代晉鄙鄙合符疑之亥袖四十斤鐵椎椎殺晉鄙槌或作椎或作鎚方云謝本云貞元本毒手作尊拳尊拳劉伶語也邵公濟云善本神槌作袖搥於史記本}
  - {type: variant, offset: 7350, length: 0, content: '', WYG: 為合然晉祖納曰假有神錐必有神槌神槌尊拳豈皆借用字耶今按毒手是李陽本事中語而神槌字則朱亥事中無之故邵欲改神作袖以從本事然又属對不親切故方又欲從謝本借劉伶之尊拳以附李陽借祖納之神槌以附朱亥則兩句皆為兼用兩事而不偏枯耳然亦未敢遽改也今以其説未明復為詳説如此以俟考焉惻心我以仁碎首爾何罪獨勝事有然旁驚汗流浼郊知雄歡動顔怯負愁看賄爭觀雲填道助呌波翻海愈事爪深難解事或作爭方从唐本云館本作事李校同樊本作剚皆側吏切漢蒯通傳事刃}
  - {type: page-break, offset: 7350, content: '', id: KR4c0044_WYG_008-15b, image: WYG1073/WYG1073-0374d.png}
  - {type: variant, offset: 7351, length: 0, content: '', WYG: 之腹中考功記葘蚤不齵則輪雖敝不匡鄭讀蚤為𤓰謂輻入牙中者葘聲如胾泰山平原人謂樹立物為葘公葢全用此二字也管子倳戰十萬又春有以剚耜事剚葘倳古音義同閤杭蜀本皆作爭其訛久矣嗔睛時未怠一噴一醒然樊曰雞用水噴神氣始醒再接再礪乃郊或作再礪乃鍜乃礪又或作勵皆非是樊曰接猶接戰也爭觀雲填道助呌波翻海則公詩之豪一噴一醒然再接再礪乃則東野工處頭垂碎丹砂翼搨拖錦綵搨或作榻方云字當從手選陳琳檄垂頭榻翼莫所憑恃五臣注搨歛也士獵切此當一以摧搨為義音他獵切軒軒猶軒昂也豁尚賈音古齊髙固之晉師桀石投人以徇衆曰欲勇者賈予餘勇賈買也餘清厲鳴聲也比歸凱愈選俊感收毛受恩慚始隗下五罪切毛遂郭隗也英心甘鬬死義肉耻庖宰君看鬬雞篇短韻有可採郊有或作亦或作言皆非是納涼聨句韓曰此篇敘久謫新召還為學官本末甚詳遞嘯取遥風微微近秋朔郊金柔氣尚低火老候愈濁愈熙熙炎光流竦竦髙雲擢愈閃紅孫曰電光也電光之閃有若蚴虬驚蚴於紏切又音憂龍類楚詞蒼龍蚴虬於左右虬或作蚪凝赤孫曰凝聚也赤氣之聚如山岳也聳山嶽目林恐焚燒耳井憶瀺灂上上咸切下才弱切瀺灂水聲前漢瀺灂霄墜仰懼失交泰非時結冰雹化鄧韓曰列子夸父逐日影於嵎谷之際渴欲得飲赴飲河渭河渭不足將北走飲大澤未至道渴而死棄其杖尸膏肉所浸化為鄧林渴且多奔河誠巳慤暍音暍祝曰字林暍傷暑也莊子暍者反求乎冷風道者誰子叩商叩擊也韓曰列子師商彈瑟當春而叩商絃以召南吕涼風忽至草木成實者何樂洗矣得滂沱洗或作洒方云古洗與洒通史記觀范雎之見者羣臣莫不洒然變色易容徐廣洗先典切洗矣猶洗然也感然鳴鸑鷟下土角切孫曰鸑鷟鳳属感言得滂沱則瑞應至嘉願茍未從嘉或作佳或作喜方云公後詩有嘉願還中州佳喜皆字訛也前心空緬邈清砌千迴坐冷瓌再三握煩懐却星星或作醒醒方云劉夢得詩自羞不是髙陽仙一夜星星騎馬回唐人星醒通用髙意還卓卓郊龍沈劇煮鱗劇方作極牛喘甚焚角蟬煩鳴轉喝於邁切祝曰聲嘶前漢正見秋蟬喝栁詩長楊流喝盡烏噪飢不啄晝蠅食案繁宵蚋肌血渥單絺厭巳褫長䈉音霎扇也孫曰方言扇自闗而東謂之䈉祝曰選屏輕箑字一作䈉或作箑倦還捉幸兹得佳朋於此䕃華桷青熒文簟施青或作清淡澉音敢韓曰選淡澉手足注淡澉猶洗滌也甘𤓰濯大壁孫曰華屋中壁也曠凝淨古畫壁上古畫竒駮犖上北角切下吕角切牛色雜又竒怪貌璧或作璧畫或作菁凄如羾寒門羾方云杭本作淜蜀本作珝淜今馮字徒渉也史記武紀所謂寒門者谷口也顔曰今治谷去甘泉八十里盛夏凛然此納涼詩也淜字自當又甘泉賦登桑欒而羾天門羾音貢至也諸}
