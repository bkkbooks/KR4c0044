  - {type: variant, offset: 4872, length: 0, content: '', WYG: 外口實譁言或作宮王母不得已顔嚬口齎嗟齎音咨或作咨嗟或作咨頷頭可其奏送以紫玊珂苦何切祝曰石次玉韓曰梁簡文帝詩桃花紫玉珂方朔不懲創挾恩更矜誇詆欺劉天子正晝溺殿衙溺徒帛切朔本傳醉入殿中誤遺殿上一旦不辭訣攝身凌蒼霞凌或作入為今按此詩亦必有而作譴瘧鬼樊曰後漢禮儀志季冬之月先臈一日大儺謂之逐疫注云漢舊儀顓頊氏有二子生而亡去為疫鬼一居江水是為􅒻鬼此詩首云屑屑水帝魂未云湛湛江水清歸居安汝妃此也屑屑水帝魂謝謝無餘輝如何不肖子尚奮􅒻鬼威乘秋作寒熱翁嫗烏遇切説文姆也所罵譏求食歐音嘔泄間不知臭穢非歐或作嘔泄或作洩方云嚴助傳夏時歐泄霍亂之病相属字正作歐泄醫師加百毒熏灌無停機灸音疚師施艾炷酷若獵火圍詛師毒口牙舌作霹靂飛符師弄刀筆丹墨交橫揮咨汝之胄出門戸何巍巍祖軒而父頊未沬於前徽孫曰謂前人之美沬或作昧或作法方云沬巳也離騷經芬至今猶未沬又選孝標書音徽}
