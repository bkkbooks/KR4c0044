  - {type: variant, offset: 7356, length: 2, content: 集卷, WYG: 獰競掣跌孫曰言生而惡者競相牽掣跌墮也癡突孫曰謂癡弱而突出者爭相填軋也爭填軋渴鬬信豗音灰相擊呶音譊噉奸何噢嗗郊噢音郁嗗烏八切奸賊黨噢嗗噉􅀢聲又飲聲更呼相簸蕩交斫雙缺􅀢五轄切器缺也亦曰齒缺火發激鋩音亡刃端腥血漂騰足滑愈漂或作飄飛猱奴刀切孫曰猱以喻軍士}
  - {type: page-break, offset: 7356, content: '', id: KR4c0044_WYG_008-21b, image: WYG1073/WYG1073-0377d.png}
  - {type: variant, offset: 7359, length: 0, content: '', WYG: 壯無整陣言賊不得自整其陣無整陣翩鶻户骨切孫曰鶻鷙鳥邪戞邪擊也鶻亦以喻軍士有邪戞江倒沸鯨鯤山揺潰􅓔敕俱切獸似貍猰郊猰音軋孫曰猰㺄類江倒山揺喻蜀兵之敗中離分二三外變迷}
