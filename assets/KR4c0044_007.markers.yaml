  - {type: variant, offset: 0, length: 1865, content: 朱文公校昌黎先生文集卷之七考異音釋附古詩雪後寄崔二十六丞公斯立藍田十月雪塞関我興南望愁羣山攅天嵬嵬凍相映嵬嵬諸本作崔嵬君乃寄命於其間秩卑俸薄食口衆豈有酒食開容顔殿前羣公賜食罷驊騮周穆王馬蹋路驕且閑稱多量少鍳裁宻豈念幽桂遺榛菅上音臻下音官榛或作蓁幾欲犯嚴出薦口氣象硉兀上盧骨切硉兀高亢皃兀或作矹未可攀歸來殞涕揜関卧心之紛辭誰能刪詩翁憔悴斸荒棘斸陟玉切斫也時元和十年十月孟郊已死洪曰詩翁指孟郊也清王刻佩聮玦環玦古穴切韓曰玦如環而玦肉好如一謂之環孫曰三者喻孟郊詩之王也腦脂遮眼卧壯士洪曰謂張籍病眼大弨强招切弛也挂壁無由彎挂方作擐云擐貫也言擐於壁而不用也或作擐臂乾坤施惠萬物遂獨於数子懷偏慳朝欷詐旣香衣二切戯欷也暮唶唶子夜切歎也祝曰後漢遥望見㫪陵郭唶曰氣佳哉選咄唶令心悲不可解我心安得如石頑送僧澄觀浮屠西来何施爲優優四海爭奔馳構楼架閣切星漢誇雄鬪麗止者誰僧伽樊曰李邕泗州普光玉寺碑僧伽者龍朔中西來甞縱觀臨淮發念置寺旣成中宗䑗名普光玉以景龍四年三月二日示㓕於京洪曰李太白曾伽歌云此僧本住南天竺為法頭陀來此囯又云嗟子落泊江淮乆罕遇眞心說空有蓋相遇於江淮也太白於豪傑中識郭子儀隱逸中識司馬承禛浮屠中識僧伽則其人可知後出淮泗上淮方作雄云雄言特出也今桉上句已有誇雄字下句又云尤恢竒則此作雄非是勢到衆佛尤恢竒恢或作魁方云恢竒字見史記公孫洪傳此詩今本以恢為魁又悪上語意同遂易雄為淮非也今按作恢亦不免与上句相犯况淮之不可為雄自避上句誇雄字𥘉不專為此耶越商胡賈脫身罪或作献今從謝校珪璧滿船寕計資淸淮無波平如席欄柱傾扶半天赤火燒水轉掃地空突兀便高三百尺影沉潭底龍驚遁當晝無雲跨虚碧借問經營夲何人道人澄觀名籍籍愈昔從軍大梁下往来滿屋賢豪者屋或作日方云蒲屋字見丗說皆言澄觀雖僧徒公才吏用當今無後從徐州辟書至紛紛過客何由記人言澄觀乃詩人人言或作又言一座競吟詩句新向風長歎不可見我欲收歛加冠巾洛陽窮秋厭窮獨丁丁啄門疑啄木啄門或作打門疑或作如有僧來訪呼使前伏犀孫曰伏犀謂骨當額上入髪祭韓曰伏犀貴相李固頂骨匿犀後爲太尉即此挿腦高頰權或作顴方従杭蜀本云選洛神賦敏俳文高權長頭高權古字只作權刋本不深考也頰古叶切靣頰也權輔骨也選靨輔承權頬惜哉巳老無所及坐睨神骨空潸音删然臨淮太守謂泗州刺史𥘉到郡逺遣州民送音問好竒賞俊直難逢直或作实去去爲致思從容山南鄭相公樊貟外酬荅爲詩其末咸有見及語樊封以示愈依賦十四韻以獻鄭餘慶樊宗師也鄭餘慶元和九年爲山南西道節度使樊宗師爲副李肇囯史𥙷曰元和以後爲文竒詭則斈於韓愈苦澁則斈於樊宗師公此詩及宗師墓誌語竒而澁皆所以效其体也梁維西南屏維或作推山厲水刻屈禀生肖勦剛勦音巣輕捷也方云荆公山谷本作勁云難諧在民物滎公鼎軸老方云餘慶封榮陽郡公作榮者非烹斡烹謂烹擊斡謂斡旋猶言幸制也力健倔渠勿切強也斡或作鮮非是帝咨女予往牙纛前􅽛坲上蒲悶切下音佛或作拂方云佛哱塵起皃字見楚詞九歎威風挾惠氣盖壌兩劘拂方云劘音摩子虚賦上摩蘭蕙下拂羽盖文選作靡賈山傳賛自下劘上序傳只作摩古摩靡劘字皆通用揚子劘虎牙莊子喜則交頸相靡漢衡山王賛臣下漸靡使然今集韻摩下不出靡字非也􅰩諸本作刜茫漫華黒閒指畫變怳歘許忽切暴起也即忽字華黒或作筆墨非是住云華陽黒水惟梁州渭山南所領也誠旣冨而美章彚音胃文采也霍炳蔚日延講大訓龜判錯衮黻孫曰定公八年公羊傳宝者何璋判白弓繡質亀青純何休注判半也半圭曰璋白藏天子青藏諸侯故曰判亀判謂亀玉也衮龍衮衣黻者綉兩巳相背於裳也亀判言其所執衮蔽言其所服錯雜也言講大訓者之多錯雜如此樊子坐賔署演孔刮老佛刮或作乱方云字見劇秦文金㫪撼玉應孫曰㫪撞也金下相應以況樊鄭唱酬之作也厥臭香氣也劇蕙欎欎金香草遺我一言重跽巨已切長跪受惕齋慄辭慳義卓闊孫曰言詞約而義富呀豁疚掊掘疚或作疾方云疚勞也呀虚加切掊彼垢切掘渠勿切掊擊也掘掘地也孫曰呀豁隙竅也因其隙竅疾加掊掘掊掘者計究也如新去耵聹雷霆逼颶䫻于聿切孫曰言讀此詩如新去耳中垢却聞雷霆颶䫻言驚恐不定也新或作𥘉盯矃並上声方云盯矃耳垢也从日非颶或作䬝或作䬖䬖字書未見或与䬝同綴此豈爲訓俚言紹莊屈此或作作孫曰言我綴此荅詩豈以爲訓乎俚下之言聊以紹莊周屈原而巳奉和武相公鎭蜀時詠使宅韋太尉所養孔雀武元衡韋皐也諸本无奉字穆穆鸞鳯友何年來止兹飄零失故態隔絶抱長思翠角髙獨聳金華煥相差坐蒙恩顧重畢命守堦墀感春三首作於元和十一年三月爲中書舎人時也偶坐藤樹下暮春下旬間藤隂巳可庇落蘂還漫漫斖斖音尾翠色皃新葉大瓏瓏花落声晩花乾青天髙寥寥兩蝶飛翻翻或作翩翩或作翩翻時節適當爾懷悲自無端黄黄蕪菁花孫曰方言云豐蕘羌菁也陳楚謂之豊齊魯謂之蕘関西謂之羌菁趙魏之間謂之太芥羌菁, WYG: ''}
