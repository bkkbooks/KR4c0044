  - {type: variant, offset: 7352, length: 2, content: 昌黎, WYG: 本多用此定栁文扣亦作珝又淮南子北方北極之山曰寒門故離騷連絶垠乎寒門若以珝言則寒門當用此義然前義為優今按方後説是葢谷口既非絶境未為極寒之地又不言有水則徒渉字亦無理當改作羾皓若攅玉璞掃寛延鮮飈汲冷漬香穱音捉稻田種麥又麥飯篚實摘林珍盤肴饋禽㲉㲉或作殻説巳見上空堂喜淹留貧饌羞齷齪愈齷齪菲薄也殷勤相勸勉左右加礱斵上音籠孫曰壁也即下言賈勇事加或作皆賈勇發霜硎爭前躍冰槊孫曰莊子庖丁解牛十九年而刀若新發於硎風俗通云矛長丈八者謂之槊皆以禦熱微然草根響}
  - {type: page-break, offset: 7352, content: '', id: KR4c0044_WYG_008-18a, image: WYG1073/WYG1073-0376a.png}
  - {type: variant, offset: 7353, length: 1, content: 黎, SBCK: 􅀺}
  - {type: variant, offset: 7355, length: 0, content: '', WYG: 被詩情覺感衰悲舊改工異逞新貌誰言擯朋老孫曰謂擯棄于朋友而又加之以老也猶自將心學危簷不敢憑朽机懼傾撲音雹倒也机一作瓦青雲路難近黄鶴足仍鋜土角切玉篇云鎖足未能飲淵泉立滯呌芳葯郊葯音渥楚辭辛夷楣兮葯房木草楚人謂白芷曰葯與子昔睽離嗟余苦屯剥直道敗邪徑拙謀傷巧諑音卓韓曰楚詞謡諑謂余以善淫注諑猶讃也炎胡度氛氲熱石行犖硞音確犖硞石聲又多石貌痟飢夏尤甚瘧渴秋更數君顔不可覿君手無由搦女角切持也今來沐新恩庻見返鴻朴儒庠恣游息聖籍飽商㩁音確商畧也左思曰商㩁萬俗危行無低徊正言免咿喔上音伊下音渥楚詞屈原卜居曰將咿喔嚅唲以事婦人乎注强笑噱也車馬獲同驅酒醪欣共欶音朔説文吮也惟憂棄菅蒯上音姦下苦怪切左傳曰雖有絲麻無棄菅蒯敢望侍帷幄此志且何如希君為追都回切治玉琢愈秋雨聯句樊曰按詩云儒宫烟火濕此公為學官在京師時又云因思征蜀士葢憲宗元和初也萬木聲號呼百川氣交㑹郊庭翻樹離合離或作雜牖變景明藹愈潨聀戒切説文小水入大水㵼殊未終飛浮亦云泰郊牽懐到空山屬近也聴邇驚瀨愈簷垂白練直練或作龍渠漲清湘大郊甘津澤祥禾伏潤肥荒艾愈禾方作木非是伏或作服主人吟有歡客子歌無奈郊侵陽日沈𤣥剥節風搜兑愈坱圠上鳥朗切下音軋賈誼曰大均播物坱圠無垠應劭曰其氣坱圠非有限齊也張衡曰地勢坱圠注坱圠猶髙下也遊峽喧颼飀上音蒐下音留祝曰髙風也隋盧思道納涼賦動颼飀於翠帳臥江汰郊汰音太濤也微飄來枕前髙灑自天外愈蛬音拱蟋蟀也宂何迫迮或作窄方云義訓迫迮急也字見鴇羽詩箋蟬枝掃鳴噦郊援菊茂新芳援或作園逕蘭銷晚馤愈馤音藹香也地鏡時昏曉池星競漂沛郊讙呶尼交切尋一聲灌注咽羣籟愈儒宫煙火濕市舍煎熬忲郊忲音太奢也臥冷空避門衣寒屢循帶愈循或作脩方云李陵傳數數自循其力瓌又自循其髪顔注謂摩頂也梁范靜妻詩循帶易緩愁難却心之憂矣巨銷鑠水怒巳倒流隂繁恐凝害郊憂魚思舟檝魚或作虞非是感禹勤畎澮愈懐襄信可畏䟽決須有賴郊可畏方作不思非是䟽決謂禹決江䟽方作踈葢俗體也筮命或馮蓍卜晴將問蔡愈蔡大龜也晴或作情庭商家語曰齊有一足鳥名商羊童謡曰天將大雨商羊鼓舞今齊有之忽驚舞墉禜音榮孫曰墉城墉也禜祭名左氏曰日月星辰之神則雪霜風雨之不時於是乎禜之亦親酹郊氛醨孫曰氛醨謂雲氣稍薄也稍踈映氛或作氣雺亂上音謀下音茂爾雅天氣下地不應曰雺注言䝉昧也還擁薈詩薈兮蔚兮注雲興貌謂雲霧擁塞也隂旌孫曰亦謂雲氣如旌旗之狀時摎音劉顔師古云摎流猶周流也流帝鼓孫曰天帝之鼓謂雷霆也鎮訇磕上呼宏切下苦葢切大聲也選訇磕㗦嘈棗圃落青璣孫曰棗未熟而落如青璣也璣珠之不圓者𤓰畦爛文貝貧薪不燭竈富粟空填廥愈廥音澮芻藁藏秦俗動言利魯儒欲同丐深路倒羸驂弱途擁行􅋴音犬車轄毛羽皆遭凍離蓰不能翽羽飛聲方云離今本從竹非古樂府竹竿何嫋嫋魚尾何離蓰翻浪洗虚空傾濤敗藏葢郊吾人猶在陳僮僕誠自鄶音澮國名也孫曰左傳自鄶以下無譏焉注以其微也洪曰言吾人猶絶糧僮僕母足言者因思征蜀士未免濕戎斾安得發商飈廓然吹宿靄白日懸大野幽泥化輕􅙟音藹後漢軼埃􅙟之混濁戰場暫一乾賊肉行可膾愈捜心思有效抽策期稱最豈惟慮收穫亦以救顛沛郊禽情初嘯儔礎音楚負楹石色微收霈庶幾諧我願遂止無巳太愈征蜀聨句事見聖徳詩題注日王忿違慠與傲同日或作曰方云唐本閤本皆作日此語左傳漢史屢見入詩則自庾信始日余監推轂民願始天從是也有命事誅㧞蜀險豁闗防秦師縱横猾愈風旗帀地揚雷鼓轟天殺言鼓聲如雷轟天震動也竹兵彼皴音逡説文細皮起蜀以竹為弓矢脆鐵刃我鎗䶪郊䶪初八切齒利也刃或作刀方作力刑神咤㹈音釐㹈牛尾可為旄旄隂燄颭職琰切風吹也札甲也洪曰説者謂此聯盡雕刻之工而語仍壯刑神隂燄主我師而言犀札卑也夫差水犀之甲三千翻霓孫曰言旌旗動如虹霓也紛偃蹇塞野孫曰言兵衆塞野勢欲傾側也澒坱圠愈澒或作傾}
