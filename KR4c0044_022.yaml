front:
  text: 朱文公校昌黎先生集卷之二十二考異音釋附
  hash: sha256:1b52dae56ae51f62de51554333ce17ebd54ab0368b05fe1d0f4c20b4ec17c575
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_022-1a}
body:
  text: 祭文祭田橫墓文貞元十一年九月愈如東京道出田横墓下十一年諸本或作十九年月下有十一日字如東京或作東如京洪氏曰東京洛陽也公以貞元十一年出長安至河陽而後如東都也十九年秋則公爲御史是冬即貶陽山安得以九月出横墓下唐都長安亦不得云東如京也方从閣杭蜀本作東如京云田横墓在偃師尸郷洛陽東三十里今公自河陽道横墓下以入洛故云東如京也今按洪氏作如東京及考歳月皆是方氏亦以京爲洛陽但據三本必欲作東如京爲誤耳今且未須别考它書只以其所引田横墓在洛陽東者論之則自墓下而走洛陽乃是西向安得言東如京乎况唐都長安謂洛陽為東京則可直謂之京則不可其理又甚明若據元和郡囯志則河陽西南至向南府八十里其大势亦不得云東如京也此又三本謬誤之一證故復表而出之感橫義髙能得士因取酒以祭爲文而弔之士下或有心字其辭曰事有曠百丗而相感者余不自知其何心非今丗之所稀孰爲使余歔欷而不可禁余旣博觀乎天下曷有庻幾乎夫子之所爲死者不復生嗟余去此其從誰死者或作死而生方作來皆非是當秦氏之敗亂得一士而可王何五百人之優優而不能脫夫子於劔鋩抑所寳之非賢亦天命之有常宝之或作宝者天或作大昔闕里之多士孔聖亦云其遑遑方从閣杭无其字非是苟余行之不迷雖顚沛其何傷自古死者非一夫子至今有耿光非方从閣杭作皆非是跽陳辭而薦酒䰟髣髴而來享歐陽生哀辭歐陽詹丗居閩越自詹巳上皆爲閩越官至州佐縣令者累累有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕今上𥘉故宰相常衮爲福建諸州觀察使治其地治上或有往字非是衮以文辭進有名於時又作大官臨莅其民郷縣小民有能誦書作文辭者衮親與之爲客主之禮吕汲公本如此方从閣杭苑粹辝進下即属鄉縣至者衮下又有故宰相字下乃属有名至其民又属親与云云顛倒錯乱全无文理而方云三本如此不當䡖改其蔽如此今定從吕本方主下有人字郷縣作縣郷則尚有可取云觀游宴饗必召與之宴或作讌與讀爲預或作預或疑與如字而之下當有俱字時未幾皆化翕然化方據新傳作仕非是詹于時獨秀出衮加敬愛諸生皆推服閩越之人舉進士繇詹始建中貞元間余就食江南未接人事往往聞詹名閭巷間詹之稱於江南也乆乆下或有矣字貞元三年余始至京師舉進士聞詹名尤甚余下或有年十九字聞方作則或云當并出則聞二字亦有理八年春遂與詹文辭同考試登第始相識自後詹歸閩中余或在京師他處不見詹乆者惟詹歸閩中時爲然其他時與詹離率不歴歳移時則必合合必兩忘其所趨乆然後去故余與詹相知爲深詹事父母盡孝道仁於妻子於朋友義以誠氣醇以方容貌嶷嶷魚力切歧嶷然其燕私善謔以和其文章切深喜往復善自道讀其書知其於慈孝最隆也十五年冬余以徐州從事朝正於京師詹爲國子監四門助教將率其徒伏闕下舉余爲博士㑹監有獄不果上或无監字監或作詹觀其心有益於余將忘其身之賤而爲之也嗚呼詹今其死矣詹閩越人也父母老矣捨朝夕之養以來京師其心將以有得於是而歸爲父母榮也以來或作而來有得或作在得或无於是字而有複出將以有得乎雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟詹雖未得位其名聲流於人人其德行信於朋友方作友朋雖詹與其父母皆可無憾也詹之事業文章李翺旣爲之傳故作哀辭以舒余哀以傳于後以遺其父母而解其悲哀以卒詹志云之傳或作之說或作之誌故上或有余字非是悲哀方作哀悲今按上文巳連有兩哀字不應如此重複或當刪去此哀字詹志或作其志求仕與友兮逺違其郷父母之命兮子奉以行友則旣濩兮禄實不豐以志爲養兮何有牛羊事實旣修兮名譽又光父母忻忻兮常若在旁命雖云短兮而忘於乎或作嗚呼祭穆貟外文爲崔侍御作晁本篇首題云維年月日故人博陵崔愬謹以清酌之奠祭于亡友穆六端公之靈方云豈穆貟邪舊傳貟卒檢校貟外郎杜亞留守東都辟爲從亊皆与此文合新傳貟終侍御史故晁本称端公也於乎建中之𥘉予居于嵩攜扶北奔避盗來攻奔或作帰晨及洛師相遇一時顧我如故眷然顧之如方作无眷或作捲子有令聞我來自山子之畯明我鈍而頑畯或作俊道旣云異誰從知我我思其厚不知其可知其或作知而或作可而於後八年君從杜侯我時在洛亦應其招留守無事多君子僚罔有疑忌維其嬉游草生之春鳥鳴之朝我轡在手君揚其鑣君居于室我旣來即或以嘯歌或以偃側嘨或作詠誨余以義復我以誠復我方作我復今按下文云无非德声則此二句專指穆也當作復我終日以語無非德聲以或作与主人信䜛有惑其下殺人無罪誣以成過入救不從反以爲福赫赫有聞王命三司察我于獄相從係縲曲生何樂直死何悲曲或作直直或作曲二何或皆作可皆非是上懷主人主方作王非是内閔其私閔或作憫方作関皆非是進退之難君處之宜君或作居非是旣釋于囚我來徐州道之悠悠思君爲憂我如京師君居父䘮哭泣而拜言詞不通我歸自西君反吉服晤言無他往復其昔其疑當作如不日而違重我心惻自後聞君母䘮是丁痛毒之懷六年以并孰云孝子而殞厥靈今我之至入門失聲失方作哭酒肉在前君胡不餐升君之堂不與我言於乎死矣何日來還祭郴州李使君文𥙷注筆墨間録云祭李郴州文尤雄竒維年月日將仕郎守江陵府法曹参軍韓愈謹以清酌庻羞之奠敬祭于故郴州李使君之靈文苑此篇首又云維元和元年歳次景戍二月乙未在期謂此㑹之難又授縞紵以託心左氏袞二十九年吴季札聘鄭見子産如舊相識与之縞帶子産献紵裘焉示兹誠之不謬授方作援儻後日之北遷約窮歡於一晝雖掾俸之酸寒要抜貧而爲富何人生之難信捐斯言而莫就始訝信於暫踈遂承凶於不救承或作成見明旌之低昻尚遲疑於别䄂明方从諸本作銘此从閣本字見檀弓鄭注云神明之旌憶交酬而迭舞奠單杯而哭柩美夫君之爲政不橈志於讒構橈或作僥或作撓從手皆非是遭脣舌之紛羅獨陵晨而孤雊彼憸人之浮言雖百車其何詬車方作年今按後漢書馮衍出妻書云詞語百車韓盖用此作年非是洞古往而髙觀固邪正之相宼幸竊覩其始終敢不明白而蔽覆神乎來哉辭以爲侑尚饗祭薛助教文維元和四年歳次已丑後三月二十一日景寅朝散郎守國子慱士韓愈太學助敎侯繼謹以清酌之奠祭于亡友國子助教薛君之靈散墓志石本作議継下或有䓁字薜君之灵晁本作河東薛君七官之灵嗚呼吾徒學而不見施設禄又不足以活身天於此時奪其友人同官大學日得相因柰何永違祇隔數晨笑語爲别慟哭來門来或作東藏棺蔽惟欲見無縁皎皎眉目在人目前酌以告誠庻幾有神嗚呼哀哉尚饗祭虞部張貟外文維年月日愈等謹以清酌庻羞之奠敬祭于亡友張十三貟外之靈文苑作元和十年眺本作維元和十年月日中書舎人王涯考功郎中知制誥韓愈礼部侍郎崔羣京兆尹許季同考功貪外郎庾豕宣河中節度判官殿中侍御史邢冊等方云六人皆張季友之同年也嗚呼往在貞元俱從賔薦司我明試時維邦彦各以文售幸皆少年羣遊旅宿其歡甚焉出言無尤有獲同喜他年諸人莫有能比倐忽逮今二十餘歳存皆衰白半亦辭丗外纏公事内迫家私中宵興歎無復昔時如何今者又失夫子今者或作於今懿德柔聲永絶心耳廬親之墓終䘮乃歸陽瘖避職妻子不知分司憲臺風紀由振遂遷司虞以播華問不能老壽孰究其因託嗣於宗天維不仁託嗣或作嗣託酒食備設靈其降止論德叙情以視諸誄尚饗祭河南張貟外文樊日張署維年月日彰義軍行軍司馬守太子右庶子兼御史中丞韓愈謹遣某乙以庶羞清酌之奠祭于亡友故河南縣令張十一貟外之靈或无守太子右庶子字貞元十九君爲御史余以無能同詔並跱跱或作峙方云選潘岳関中詩列營棊跱注跱立也亦作峙君德渾剛標髙掲巳有不吾如唾猶泥滓余戇而狂年未三紀乗氣加人無挾自恃彼婉孌者實憚吾曹側肩帖耳有舌如刀我落陽山以尹鼯揉君飄臨武臨武縣在郴州山林之牢歳弊寒兇雪虐風饕顚於馬下我泗君咷音桃號咷雪虐方从杭本作嘯虎云以顛於馬下言之由虎声懼也風饕謂虎貪風而嘯不巳虎近於虐訛自此也饕或作號今按杭本全然不成文理以上語歳弊寒兇言之八字相偶當為雪虐明甚夜息南山同卧一席守隸防夫觝頂交跖音隻足下項或作頃非是洞庭漫汗䊀天無壁風濤相豗呼回切中作霹靂追程盲進颿􅊑箭激騠或作帆或作飄南上湘水屈氏所沈上或作之二妃行迷涙蹤染林山哀浦思鳥獸呌音余唱君和百篇在吟君止于縣我又南踰把􅊦相飲後期有無期宿界上一又相語自别幾時遽變寒暑遽或作復方作徧枕臂欹眠加余以股僕來告言虎入廐處無敢驚逐以我􅐒去􅐒音蒙樊曰公貞元十九年与張俱令南方明年冬㑹宿臨武界上虎入公廐取􅐒去􅐒馿子也虎寅属也公載張語云云巳而順宗即位皆改江陵府椽公法曹張工曹君云是物不駿於乗虎取而往來寅其徴寅方作夤今按寅為辰名夤乃夤縁之義當改作寅說見下條我預在此與君俱膺猛獸果信惡禱而憑獸蜀本作首方云李本校作孟首不知得之何本也葛魯卿云􅐒不駿虎取之則亨矣不待禱而有慿也今按洪謝本皆作孟首謂正月孟春之首也張言来寅其徴以虎為寅神故言来歳寅月當有徴驗孟首果得帰也然且作猛獸亦通余出嶺中君竢州下偕掾江陵非余望者郴山竒變其水清寫泊砂倚石有遌下呉故切又音咢一作楚詞重華不可遌注逢也或曰心不欲見而見曰遌無捨衡陽放酒熊咆音庖熊声虎噑音豪虎声不存令章罰籌蝟毛不存或作存不罰或作罪方云唐人㑹飲以夀記罰刘夢得詩罰夀長樹纛是也今按令章謂酒令違令則以籌記其罰也委舟湘流往觀南嶽雲壁潭潭穹林攸擢雲方作天避風太湖七日鹿角太或作大鹿角侗庭湖中地名元微之有鹿角詩湖旁至今有鹿角廵檢司也鈎登大鮎奴兼切楚詞鱣鮎兮延延注鮎鰋也怒頰豕豞許角切豞或作豹非是方云豞豕声臠盤炙酒羣奴餘啄走官階下首下凥髙上苦刀切祝日髖也前漢東方朔凥益髙下馬伏塗從事是遭予徴博士君以使巳相見京師過願之始分教東生君掾雍於用切首兩都相望音忘於别何有解手背面遂十一年君出我入如相避然生闊死休吞不復宣生闊死休或作生死休咎非是刑官屬郎引章訐奪或作奮訐方作許奪今按奪謂争执不与猶今言定奪公亊也墓志云守法争議棘棘不阿莭此事也方本无義或本亦非權臣不愛南昌是斡今按墓志張自刑部出刺䖍州然則昌當作康明條謹獄氓獠悵絞切又力道切户歌用遷澧音礼澧州水名浦爲人受瘥瘥昨何切病也孫日署自䖍州改澧州刺史民稅出雜産物与尚書有經数觀察使牒州徴陪經使署曰刺史可為法不可貪官害民晋牒不肯從竟以代罷還家東都起令河南屈拜後生憤所不堪屢以正免身伸事蹇竟死不昇孰勸爲善丞相南討余辱司馬議兵大梁走出洛下哭不憑棺奠不親斚不撫其子葬不送野望君傷懷有隕如瀉望君或作定居非是銘君之績納石壤中爰及祖考紀德事功中方作下紀方作巳事或作著今按上文巳有下韻則此不當再有下字巳字亦无文埋下當作中巳當作紀无疑也事功作著功於理巳順但下文便有外著後丗則重出著字又似可疑姑从日本作事盖紀其德紀其事紀其功也又恐或是序字以似而誤然无所據不敢輒改也外著後丗鬼神與通君其奚憾不余鍳衷嗚呼哀哉尚饗祭左司李貟外太夫人文維年月日某官某等謹以清酌庶羞之奠敬祭于某縣太君鄭氏尊夫人之靈某等或作某乙等胄于茂族配此德門克成厥家享有全福爲婦爲母再朝中宫搢紳推榮宗黨是則某等幸隨令子同服官僚庶展哀誠式陳牢醴尚饗祭薛中丞文方云此祭薛存誠也唐史有傳維年月日文苑作元和九年某官某乙等謹以清酌庶羞之奠祭于亡友故御史中丞贈刑部侍郎薛公之靈公之懿德茂行可以勵俗清文敏識足以發身宗族稱其孝慈友朋歸其信義累昇科第亟踐班行左掖南臺孫日北斉號御史䑓為南䑓樊日左掖則給亊中南䑓則御史中丞共傳故事詩人墨客争諷新篇羽儀朝廷輝映中外長途方騁大限俄窮聖上軫不慦之悲具僚興云亡之歎况某等忘言斯乆知我俱深青春之遊白首相失來陳薄奠詎盡哀誠嗚呼哀哉尚饗祭裴太常文維年月日愈等謹以庶羞清酌之奠敬祭于故太常裴二十一兄之靈文苑作元和九年晁本月日下具給事中李逢吉給事中孟簡吏部侍郎張惟素吏部侍郎張賈北部郎中史舘修撰韓愈等五人朝廷之重莫過乎禮雖經䇿具存而精通蓋寡自郊丘故事宗廟時宜大君之所旁求丞相之所卒問羣儒拱手宗祝醉心兄皆指陳根源斟酌通變莫不允符天㫖克恊神休至乎公卿冠昏士庶䘮祭疑皆響答問必實歸從我者足爲軌儀異我者無逃指笑動爲時法言比古經獨立一朝髙視千古而又驅馳朋執僶俛宗親檐石之儲常空於私室方丈之食毎盛於賔筵檐諸本多作甔方云舊本多作檐公秋懷詩用甔字按後漢明帝紀生无檐石之儲檐字本此郭璞方言注甔石之儲实用甔字前漢蒯通揚雄傳皆只作儋貨殖傳醤千儋顔曰儋人儋之也一儋雨甖丁濫切贈必固辭求無不應孰云具美而不永年某等早接遊從實欽道義致誠薄奠以訣終天嗚呼哀哉尚饗潮州祭神文五首晁本第一首題作祭湖神又第二首題作又祭止雨文第三題祭城隍文第四題祭界石神文第五不立題維年月日潮州刺史韓愈謹差攝潮陽縣尉史虚巳以特羊庶羞之奠告于大湖神之靈愈承朝命爲此州長今月二十五日至治下凡大神降依庇貺斯人者皆愈所當率徒属奔走致誠親執祀事於廟庭下今以始至方上奏天子思慮不能專一冠衣不淨㓗與人吏未相識知牲糈下先旅切又音所孫曰糈祠神米離騷巫咸將夕降兮懷椒糈而要之酒食器皿觕与粗同潮本云一作損弊不能嚴清又未卜日時不敢自薦見使攝潮陽縣尉史虚已以告神其降監尚饗維年月日潮州刺史韓愈謹以清酌腵脩之奠祈于大湖神之靈腵或作時丁喚切記曰大饗尚腵脩今按若作時則脩當作羞曰稻旣穟矣而雨不得熟以穫也或无以穫字非是𧖟起且眠矣而雨不得老以簇也杄切廣云蚕簇也歳且盡矣稻不可以復種而𧖟不可以復育也農夫桑婦將無以應賦稅継衣食也非神之不愛人刺史失所職也方无之字百姓何罪使至極也神聦明而端一聽不可濫以惑也刺史不仁可坐以罪惟彼無辜惠以福也劃劙上忽麥切又音畫下力支切又音䴡祝曰劃劙觧也分剖也孫曰刮去也雲隂卷月日也月日或作日月非是幸身有衣口得食給神役也口上或有而字得或作有充上之湏脫刑辟也選牲爲酒以報靈德也吹擊管鼓侑香㓗也拜庭跪坐如法式也庭方作廷不信當治疾殃殛也神其尚饗維年月日潮州刺史韓愈謹以柔毛剛鬛孫曰記日羊日柔毛豕日剛鬛清酌庶羞之奠祭于城隍之神間者以淫雨將爲人災無以應貢賦供給神明上下獲罪罰之故乃以六月壬子奔走分告乞晴于爾明神下或再出爾字属下句明神閔人之不辜若饗若答饗或作響糞除天地山川清風時興白日顯行𧖟榖以登人不咨嗟咨方作疵惟神之恩夙夜不敢忘怠謹下良日躬率將吏薦兹血毛清酌嘉羞侑以音聲以謝神貺神其饗之方作兹維年月日潮州刺史韓愈謹遣耆壽成㝢以清酌少牢之奠告于界石神之靈此五字或作界石之神曰惟封部之内山川之神克庥于人麻或作庇官則置立室宇備具服器奠饗以時淫雨旣霽𧖟榖以成織婦耕男忻忻衎衎是神之庥庇于人也敢不明受其賜謹選良月吉日齋㓗以祀神其鑒之尚饗鉴之方作鍳兹維年月日潮州刺史韓愈謹以清酌庶羞之奠祭于大湖之神惟神降依兹土以庇其人今兹無有水旱雷雨風火疾疫爲災各寕厥宇以供上役長吏免𬒳其譴頼神之德夙夜不敢忘謹具食飲躬齋洗奏音聲以獻以樂以謝厥賜不敢有所祈尚饗朱文公校昌黎先生集卷之二十二
