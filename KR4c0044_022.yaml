front:
  text: 朱文公校昌黎先生集卷之二十二考異音釋附
  hash: sha256:1b52dae56ae51f62de51554333ce17ebd54ab0368b05fe1d0f4c20b4ec17c575
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_022-1a}
body:
  text: 祭文祭田橫墓文貞元十一年九月愈如東京道出田橫墓下十一年諸本或作十九年月下有十一日字如東京或作東如京洪氏曰東京洛陽也公以貞元十一年出長安至河陽而後如東都也十九年秋則公為御史是冬即貶陽山安得以九月出橫墓下唐都長安亦不得云東如京也方從閣杭蜀本作東如京云田橫墓在偃師尸鄉洛陽東三十里今公自河陽道橫墓下以入洛故云東如京也今按洪氏作如東京及考歲月皆是方氏亦以京為洛陽但據三本必欲作東如京為誤耳今且未須别考它書只以其所引田橫墓在洛陽東者論之則自墓下而走洛陽乃是西向安得言東如京乎况唐都長安謂洛陽為東京則可直謂之京則不可其理又甚明若據元和郡國志則河陽西南至向南府八十里其大勢亦不得云東如京也此又三本謬誤之一證故復表而出之感橫義髙能得士因取酒以祭為文而弔之士下或有心字其辭曰事有曠百丗而相感者余不自知其何心非今丗之所稀孰為使余歔欷而不可禁余既博觀乎天下曷有庶幾乎夫子之所為死者不復生嗟余去此其從誰死者或作死而生方作來皆非是當秦氏之敗亂得一士而可王何五百人之優優而不能脫夫子於劔鋩抑所寶之非賢亦天命之有常寶之或作寶者天或作大昔闕里之多士孔聖亦云其遑遑方從閣杭無其字非是苟余行之不迷雖顚沛其何傷自古死者非一夫子至今有耿光非方從閣杭作皆非是跽陳辭而薦酒魂髣佛而來享歐陽生哀辭歐陽詹丗居閩越自詹巳上皆為閩越官至州佐縣令者纍纍有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕今上𥘉故宰相常衮為福建諸州觀察使治其地治上或有往字非是衮以文辭進有名於時又作大官臨蒞其民鄉縣小民有能誦書作文辭者衮親與之為客主之禮吕汲公本如此方從閣杭苑粹辝進下即屬鄉縣至者衮下又有故宰相字下乃屬有名至其民又屬親與云云顛倒錯亂全無文理而方云三本如此不當輕改其蔽如此今定從吕本方主下有人字鄉縣作縣鄉則尚有可取云觀遊宴饗必召與之宴或作宴與讀為預或作預或疑與如字而之下當有俱字時未幾皆化翕然化方據新傳作仕非是詹于時獨秀出衮加敬愛諸生皆推服閩越之人舉進士繇詹始建中貞元間余就食江南未接人事往往聞詹名閭巷間詹之稱於江南也久久下或有矣字貞元三年余始至京師舉進士聞詹名尤甚余下或有年十九字聞方作則或云當并出則聞二字亦有理八年春遂與詹文辭同考試登第始相識自後詹歸閩中余或在京師他處不見詹久者惟詹歸閩中時為然其他時與詹離率不歷歲移時則必合合必兩忘其所趨久然後去故余與詹相知為深詹事父母盡孝道仁於妻子於朋友義以誠氣醇以方容貌嶷嶷魚力切歧嶷然其燕私善謔以和其文章切深喜往復善自道讀其書知其於慈孝最隆也十五年冬余以徐州從事朝正於京師詹為國子監四門助教將率其徒伏闕下舉余為博士會監有獄不果上或無監字監或作詹觀其心有益於余將忘其身之賤而為之也嗚呼詹今其死矣詹閩越人也父母老矣捨朝夕之養以來京師其心將以有得於是而歸為父母榮也以來或作而來有得或作在得或無於是字而有復出將以有得乎雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟詹雖未得位其名聲流於人人其德行信於朋友方作友朋雖詹與其父母皆可無憾也詹之事業文章李翺既為之傳故作哀辭以舒余哀以傳于後以遺其父母而解其悲哀以卒詹志云之傳或作之説或作之志故上或有余字非是悲哀方作哀悲今按上文巳連有兩哀字不應如此重復或當刪去此哀字詹志或作其志求仕與友兮逺違其鄉父母之命兮子奉以行友則既濩兮祿實不豐以志為養兮何有牛羊事實既修兮名譽又光父母欣欣兮常若在旁命雖云短兮而忘於乎或作嗚呼祭穆貟外文為崔侍御作朝本篇首題云維年月日故人博陵崔訴謹以清酌之奠祭于亡友穆六端公之靈方云豈穆貟邪舊傳貟卒檢校貟外郎杜亞留守東都辟為從事皆與此文合新傳貟終侍御史故朝本稱端公也於乎建中之𥘉豫居于嵩攜扶北奔避盜來攻奔或作歸晨及洛師相遇一時顧我如故眷然顧之如方作無眷或作捲子有令聞我來自山子之畯明我鈍而頑畯或作俊道既云異誰從知我我思其厚不知其可知其或作知而或作可而於後八年君從杜侯我時在洛亦應其招留守無事多君子僚罔有疑忌維其嬉遊草生之春鳥鳴之朝我轡在手君揚其鑣君居于室我既來即或以嘯歌或以偃側嘨或作詠誨余以義復我以誠復我方作我復今按下文云無非德聲則此二句專指穆也當作復我終日以語無非德聲以或作與主人信讒有惑其下殺人無罪誣以成過入救不從反以為福赫赫有聞王命三司察我于獄相從係縲曲生何樂直死何悲曲或作直直或作曲二何或皆作可皆非是上懷主人主方作王非是內閔其私閔或作憫方作關皆非是進退之難君處之宜君或作居非是既釋于囚我來徐州道之悠悠思君為憂我如京師君居父喪哭泣而拜言詞不通我歸自西君反吉服晤言無他往復其昔其疑當作如不日而違重我心惻自後聞君母喪是丁痛毒之懷六年以并孰云孝子而殞厥靈今我之至入門失聲失方作哭酒肉在前君胡不餐升君之堂不與我言於乎死矣何日來還祭郴州李使君文輔注筆墨間録云祭李郴州文尤雄竒維年月日將仕郎守江陵府法曹參軍韓愈謹以清酌庶羞之奠敬祭于故郴州李使君之靈文苑此篇首又云維元和元年歲次景戍二月乙未在期謂此會之難又授縞紵以託心左氏袞二十九年吳季札聘鄭見子産如舊相識與之縞帶子産獻紵裘焉示兹誠之不謬授方作援儻後日之北遷約窮歡於一晝雖掾俸之酸寒要拔貧而為富何人生之難信捐斯言而莫就始訝信於暫踈遂承凶於不救承或作成見明旌之低昻尚遲疑於别袖明方從諸本作銘此從閣本字見檀弓鄭注云神明之旌憶交酬而迭舞奠單杯而哭柩美夫君之為政不橈志於讒構橈或作僥或作撓從手皆非是遭脣舌之紛羅獨陵晨而孤雊彼憸人之浮言雖百車其何詬車方作年今按後漢書馮衍出妻書云詞語百車韓蓋用此作年非是洞古往而髙觀固邪正之相寇幸竊覩其始終敢不明白而蔽覆神乎來哉辭以為侑尚饗祭薛助教文維元和四年歲次已丑後三月二十一日景寅朝散郎守國子慱士韓愈太學助教侯繼謹以清酌之奠祭于亡友國子助教薛君之靈散墓志石本作議繼下或有等字薜君之靈朝本作河東薛君七官之靈嗚呼吾徒學而不見施設祿又不足以活身天於此時奪其友人同官大學日得相因奈何永違祇隔數晨笑語為别慟哭來門來或作東藏棺蔽惟欲見無緣皎皎眉目在人目前酌以告誠庶幾有神嗚呼哀哉尚饗祭虞部張貟外文維年月日愈等謹以清酌庶羞之奠敬祭于亡友張十三貟外之靈文苑作元和十年眺本作維元和十年月日中書舍人王涯考功郎中知制誥韓愈禮部侍郎崔羣京兆尹許季同考功貪外郎庾豕宣河中節度判官殿中侍御史邢册等方云六人皆張季友之同年也嗚呼往在貞元俱從賔薦司我明試時維邦彥各以文售幸皆少年羣遊旅宿其歡甚焉出言無尤有獲同喜他年諸人莫有能比倐忽逮今二十餘歲存皆衰白半亦辭丗外纏公事內迫家私中宵興歎無復昔時如何今者又失夫子今者或作於今懿德柔聲永絶心耳廬親之墓終喪乃歸陽瘖避職妻子不知分司憲臺風紀由振遂遷司虞以播華問不能老壽孰究其因託嗣於宗天維不仁託嗣或作嗣託酒食備設靈其降止論德敘情以視諸誄尚饗祭河南張貟外文樊日張署維年月日彰義軍行軍司馬守太子右庶子兼御史中丞韓愈謹遣某乙以庶羞清酌之奠祭于亡友故河南縣令張十一貟外之靈或無守太子右庶子字貞元十九君為御史余以無能同詔並跱跱或作峙方云選潘嶽關中詩列營棊跱注跱立也亦作峙君德渾剛標髙揭巳有不吾如唾猶泥滓余戇而狂年未三紀乘氣加人無挾自恃彼婉孌者實憚吾曹側肩帖耳有舌如刀我落陽山以尹鼯揉君飄臨武臨武縣在郴州山林之牢歲弊寒凶雪虐風叨顚於馬下我泗君咷音桃號咷雪虐方從杭本作嘯虎云以顛於馬下言之由虎聲懼也風叨謂虎貪風而嘯不巳虎近於虐訛自此也叨或作號今按杭本全然不成文理以上語歲弊寒凶言之八字相偶當為雪虐明甚夜息南山同卧一席守隸防夫抵頂交跖音隻足下項或作頃非是洞庭漫汗糊天無壁風濤相豗呼回切中作霹靂追程盲進帆􅊑箭激騠或作帆或作飄南上湘水屈氏所沈上或作之二妃行迷淚蹤染林山哀浦思鳥獸呌音余唱君和百篇在吟君止于縣我又南踰把􅊦相飲後期有無期宿界上一又相語自别幾時遽變寒暑遽或作復方作遍枕臂欹眠加余以股僕來告言虎入廄處無敢驚逐以我􅐒去􅐒音蒙樊曰公貞元十九年與張俱令南方明年冬會宿臨武界上虎入公廄取􅐒去􅐒驢子也虎寅屬也公載張語云云巳而順宗即位皆改江陵府椽公法曹張工曹君云是物不駿於乘虎取而往來寅其徴寅方作夤今按寅為辰名夤乃夤緣之義當改作寅説見下條我預在此與君俱膺猛獸果信惡禱而憑獸蜀本作首方云李本校作孟首不知得之何本也葛魯卿云􅐒不駿虎取之則亨矣不待禱而有慿也今按洪謝本皆作孟首謂正月孟春之首也張言來寅其徴以虎為寅神故言來歲寅月當有徴驗孟首果得歸也然且作猛獸亦通余出嶺中君俟州下偕掾江陵非余望者郴山竒變其水清寫泊砂倚石有遌下吳故切又音咢一作楚詞重華不可遌注逢也或曰心不欲見而見曰遌無捨衡陽放酒熊咆音庖熊聲虎嗥音豪虎聲不存令章罰籌蝟毛不存或作存不罰或作罪方云唐人會飲以夀記罰劉夢得詩罰夀長樹纛是也今按令章謂酒令違令則以籌記其罰也委舟湘流往觀南嶽雲壁潭潭穹林攸擢雲方作天避風太湖七日鹿角太或作大鹿角侗庭湖中地名元微之有鹿角詩湖旁至今有鹿角巡檢司也鈎登大鮎奴兼切楚詞鱣鮎兮延延注鮎鰋也怒頰豕豞許角切豞或作豹非是方云豞豕聲臠盤炙酒羣奴餘啄走官階下首下凥髙上苦刀切祝日髖也前漢東方朔凥益髙下馬伏塗從事是遭豫徴博士君以使巳相見京師過願之始分教東生君掾雍於用切首兩都相望音忘於别何有解手背面遂十一年君出我入如相避然生闊死休吞不復宣生闊死休或作生死休咎非是刑官屬郎引章訐奪或作奮訐方作許奪今按奪謂爭執不與猶今言定奪公事也墓志云守法爭議棘棘不阿莭此事也方本無義或本亦非權臣不愛南昌是斡今按墓志張自刑部出刺虔州然則昌當作康明條謹獄氓獠悵絞切又力道切户歌用遷澧音禮澧州水名浦為人受瘥瘥昨何切病也孫日署自虔州改澧州刺史民稅出雜産物與尚書有經數觀察使牒州徴陪經使署曰刺史可為法不可貪官害民晉牒不肯從竟以代罷還家東都起令河南屈拜後生憤所不堪屢以正免身伸事蹇竟死不升孰勸為善丞相南討余辱司馬議兵大梁走出洛下哭不憑棺奠不親斚不撫其子葬不送野望君傷懷有隕如瀉望君或作定居非是銘君之績納石壤中爰及祖考紀德事功中方作下紀方作巳事或作著今按上文巳有下韻則此不當再有下字巳字亦無文埋下當作中巳當作紀無疑也事功作著功於理巳順但下文便有外著後丗則重出著字又似可疑姑從日本作事蓋紀其德紀其事紀其功也又恐或是序字以似而誤然無所據不敢輒改也外著後丗鬼神與通君其奚憾不余鑒衷嗚呼哀哉尚饗祭左司李貟外太夫人文維年月日某官某等謹以清酌庶羞之奠敬祭于某縣太君鄭氏尊夫人之靈某等或作某乙等胄于茂族配此德門克成厥家享有全福為婦為母再朝中宫搢紳推榮宗黨是則某等幸隨令子同服官僚庶展哀誠式陳牢醴尚饗祭薛中丞文方云此祭薛存誠也唐史有傳維年月日文苑作元和九年某官某乙等謹以清酌庶羞之奠祭于亡友故御史中丞贈刑部侍郎薛公之靈公之懿德茂行可以勵俗清文敏識足以發身宗族稱其孝慈友朋歸其信義纍升科第亟踐班行左掖南臺孫日北齊號御史臺為南臺樊日左掖則給事中南臺則御史中丞共傳故事詩人墨客爭諷新篇羽儀朝廷輝映中外長途方騁大限俄窮聖上軫不慦之悲具僚興云亡之歎况某等忘言斯久知我俱深青春之遊白首相失來陳薄奠詎盡哀誠嗚呼哀哉尚饗祭裴太常文維年月日愈等謹以庶羞清酌之奠敬祭于故太常裴二十一兄之靈文苑作元和九年朝本月日下具給事中李逢吉給事中孟簡吏部侍郎張惟素吏部侍郎張賈北部郎中史館修撰韓愈等五人朝廷之重莫過乎禮雖經䇿具存而精通蓋寡自郊丘故事宗廟時宜大君之所旁求丞相之所卒問羣儒拱手宗祝醉心兄皆指陳根源斟酌通變莫不允符天旨克協神休至乎公卿冠昏士庶喪祭疑皆響答問必實歸從我者足為軌儀異我者無逃指笑動為時法言比古經獨立一朝髙視千古而又驅馳朋執僶俯宗親簷石之儲常空於私室方丈之食每盛於賔筵簷諸本多作甔方云舊本多作簷公秋懷詩用甔字按後漢明帝紀生無簷石之儲簷字本此郭璞方言注甔石之儲實用甔字前漢蒯通揚雄傳皆只作儋貨殖傳醬千儋顔曰儋人儋之也一儋雨罌丁濫切贈必固辭求無不應孰云具美而不永年某等早接遊從實欽道義致誠薄奠以訣終天嗚呼哀哉尚饗潮州祭神文五首朝本第一首題作祭湖神又第二首題作又祭止雨文第三題祭城隍文第四題祭界石神文第五不立題維年月日潮州刺史韓愈謹差攝潮陽縣尉史虛巳以特羊庶羞之奠告于大湖神之靈愈承朝命為此州長今月二十五日至治下凡大神降依庇貺斯人者皆愈所當率徒屬奔走致誠親執祀事於廟庭下今以始至方上奏天子思慮不能專一冠衣不淨潔與人吏未相識知牲糈下先旅切又音所孫曰糈祠神米離騷巫咸將夕降兮懷椒糈而要之酒食器皿粗與粗同潮本云一作損弊不能嚴清又未卜日時不敢自薦見使攝潮陽縣尉史虛已以告神其降監尚饗維年月日潮州刺史韓愈謹以清酌腵修之奠祈于大湖神之靈腵或作時丁喚切記曰大饗尚腵修今按若作時則修當作羞曰稻既穟矣而雨不得熟以穫也或無以穫字非是𧖟起且眠矣而雨不得老以簇也杄切廣云蠶簇也歲且盡矣稻不可以復種而𧖟不可以復育也農夫桑婦將無以應賦稅繼衣食也非神之不愛人刺史失所職也方無之字百姓何罪使至極也神聰明而端一聽不可濫以惑也刺史不仁可坐以罪惟彼無辜惠以福也劃劙上忽麥切又音畫下力支切又音麗祝曰劃劙解也分剖也孫曰刮去也雲隂卷月日也月日或作日月非是幸身有衣口得食給神役也口上或有而字得或作有充上之須脫刑辟也選牲為酒以報靈德也吹擊管鼓侑香潔也拜庭跪坐如法式也庭方作廷不信當治疾殃殛也神其尚饗維年月日潮州刺史韓愈謹以柔毛剛鬛孫曰記日羊日柔毛豕日剛鬛清酌庶羞之奠祭于城隍之神間者以淫雨將為人災無以應貢賦供給神明上下獲罪罰之故乃以六月壬子奔走分告乞晴于爾明神下或再出爾字屬下句明神閔人之不辜若饗若答饗或作響糞除天地山川清風時興白日顯行𧖟榖以登人不咨嗟咨方作疵惟神之恩夙夜不敢忘怠謹下良日躬率將吏薦兹血毛清酌嘉羞侑以音聲以謝神貺神其饗之方作兹維年月日潮州刺史韓愈謹遣耆壽成宇以清酌少牢之奠告于界石神之靈此五字或作界石之神曰惟封部之內山川之神克庥于人麻或作庇官則置立室宇備具服器奠饗以時淫雨既霽𧖟榖以成織婦耕男欣欣衎衎是神之庥庇于人也敢不明受其賜謹選良月吉日齋潔以祀神其鑒之尚饗鑒之方作鑒兹維年月日潮州刺史韓愈謹以清酌庶羞之奠祭于大湖之神惟神降依兹土以庇其人今兹無有水旱雷雨風火疾疫為災各寧厥宇以供上役長吏免𬒳其譴賴神之德夙夜不敢忘謹具食飲躬齋洗奏音聲以獻以樂以謝厥賜不敢有所祈尚饗朱文公校昌黎先生集卷之二十二
