front:
  text: 朱文公校昌黎先生外集卷之二
  hash: sha256:610e35e9214a1bbd9f7827d2f7b42d33aeb71e026510ed6360e6fe2fd6879a83
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_044-1a}
body:
  text: 上賈滑州書賈耽以貞元二年為滑州刺史此篇方從蜀苑愈儒服者不敢用他術十進術或作藝又惟古執贄之禮竊整頓舊所著文一十五章以為贄而喻所以然之意於此章或作首下同曰豐山上有鍾焉視日山海經云豐山有九鍾和霜鳴注云霜降則鍾鳴人所不可至霜既降則鏗然鳴蓋氣之感非自鳴也或無既字愈年二十有三讀書學文十五年言行不敢戾於古人或無有字三或作二讀書學文十五年洪云公與邢尚書書云生七歲而讀書十三而能文二十有五而擢第於春官愚固泯泯不能自計周流四方無所適歸固或作故非是伏惟閣下昭融古之典義含和發英作唐德元簡棄詭説保任皇極是宜小子刻心悚慕又焉得不感而鳴哉和或作華元或作臣方云周書注元德之首也徒以獻策闕下方勤行役且有負薪之疾不得稽首軒階遂拜書家僕待命于鄭之逆旅僕或作僮逆上或無之字伏以小子之文可見於十五章之內小子之志可見於此書與之進敢不勉與之退敢不從方作退進退之際實惟閣下裁之上考功崔虞部書或作上考功宏詞官虞部崔貟外書愈不肖行能誠無可取行巳頗僻與時俗異態抱愚守迷固不識仕進之門乃與羣士爭名競得失行人之所甚鄙求人之所甚利其為不可雖童昏實知之失一或無行字如執事者不以是為念援之幽窮之中推之髙顯之上是知其文之或可而不知其人之莫可也知其人之或可而不知其時之莫可也不知其人上方有是字既以自咎又歎執事者所守異於人人句廢耳任目華實不兼故有所進故有所退以方作巳廢上或有之字不疑當作必今按人字屬上句且執事始考文之明日浮囂之徒巳相與稱曰某得矣某得矣問其所從來必言其有自一日之間九變其説凡進士之應此選者三十有二人其所不言者數人而巳而愈在焉不言方作不云及執事既上名之後三人之中其二人者固所傳聞矣華實兼者也果竟得之而又升焉或無其字固上或有則字果或作畢下同其一人者則莫之聞矣實與華違行與時乖果竟退之如是則可見時之所與者時之所不與者之相逺矣然愚之所守竟非偶然故不可變竟非或作慬非故或作固凡在京師八九年矣足不迹公卿之門名不譽於大夫士之口或無譽字於或作一或無士字始者謬為今相國所第此時惟念以為得失固有天命不在趍時而偃仰一室嘨歌古人今則復疑矣未知夫天竟如何命竟如何由人乎哉不由人乎哉未上或有又字或無夫字天竟或作天意人乎或並作乎人欲事干謁則患不能小書困於投刺欲上或有夫字於或作乎欲學為佞則患言訥詞直卒事不成為方作于患下或有於字卒或作則徒使其躬儳焉而不終日其躬方本如此而舉正躬作窮蓋誤而諸本作如方云蜀本作而今本皆以表記語刋作如然不知古而如同意此語不當以如似之義讀之唐人惟韓栁知此子厚答韋中立書假而以僕年先吾子與公此文是也董彥逺曰春秋書星隕如雨左氏室如縣磬是皆以如為而風俗通國人望君而望歲鄒陽書白頭而新是皆以而為如按家語君入廟如右荀子作而右樂府艾如張亦作艾而張今人所用漣而考之李善文選乃連而也實用易之泣血漣如為義去古益逺字義多失惟韓栁文時見一二因為詳之今按孟子望道而未之見亦是此例方言又有而如古字通用之説然陸德明論當時語音之失有曰此人則而如靡異蓋不以為然也然則此而字須讀為如乃為正耳董引室如縣磬乃據左傳作罄字而杜預注云如而也言居室而資糧縣盡故其説如此國語則作縣磬而韋昭注云府藏空虛但有榱梁如縣磬左傳蓋借罄為磬而杜氏誤解國語則正作磬字而韋説得之董氏所引不足據以為説今併論之附見于此是以勞思長懷中夜起坐度時揣巳廢然而返雖欲從之求由也巳又常念古之人日巳進今之人日巳退常方作嘗夫古之人四十而仕其行道為學既巳大成而又之死不倦故其事業功德老而益明死而益光故詩曰雖無老成人尚有典刑言老成之可尚也可上或有人字又曰樂只君子德音不巳謂死而不亡也巳或作忘亡或作忘方作巳夫今之人務利而遺道其學其問以之取名致官而巳方無夫字遺或仁違問上或無其字得一名獲一位則棄其業而役役於持權者之門故其事業功德日以忘月以削老而益昏死而遂亡位或作官忘方作亡愈仐二十有六矣距古人始仕之年尚十四年豈為晚哉今下或有年始字豈上或有矣夫字行之以不息要之以至死不有得於今必有得於古不有得於身必有得於後用此自遣且以為知已者之報執事以為如何哉其信然否也為如或作謂如仐所病者在於窮約無僦屋賃僕之資無緼𫀆糲食之給驅馬出門不知所之斯道未喪天命不欺豈遂殆哉豈遂困哉竊惟執事之於愈也無師友之交無久故之事無顔色言語之情卒然振而發之者必有以見知爾故盡暴其所志不敢以默執事下方有者字愈下方無也字顔色言語方作言語顔色尓或作耳以默或作默默又懼執事多在省非公事不敢以至是則拜見之不可期獲侍之無時也是以進其説如此庶執事察之也至下或有於字期下或有也字庶或作幸與張徐州薦薛公達書此篇方本有之今疑非公作當刪與少室李拾遺書諸本室下有山字李下有渤字方從蜀苑新書云此書作於元和三年公時尚為博士新書云洛陽令誤也十二月某日愈頓首方無此八字伏承天恩詔河南敦諭拾遺公朝廷之士引頸東望若景星鳯皇之始見也爭先覩之為快拾遺公新書作遺公萹內並同方今天子仁聖小大之事皆出宰相樂善言如不得聞小大舉正作大小恐誤事或作士自即大位巳來於今四年凡所施者無不得宜者或作為凡所施者新書作凡所出而施者勤儉之聲寬大之政幽閨婦女草野小人皆飽聞而厭道之草或作山人新書作子愈不通於古請問先生丗非太平之運歟加又有非人力而至者愈方作某於作于無丗字非作匪新書作兹非太平丗歟年榖熟衍符貺委至若干紀之姦不戰而拘纍強梁之凶銷鑠縮栗迎風而委伏其有一事未就正自視若不成人四海之所環無一夫卑而兵者新書無自字視或作是非是而兵或作與兵若此時也拾遺公不疾起與天下之士君子樂成而亨之斯無時矣若上或有未有字昔者孔子知不可為而為之不巳足迹接於諸侯之國即可為之時自藏深山牢關而固距即與仁義者異守矣或無足迹字想拾遺公冠帶就車惠然肯來舒所蓄積以輔綴盛德之有闕遺利加於時名垂於將來踊躍悚企傾刻以冀闕遺方作遺闕新書無有遺二字利下或無加字加於新書作加于垂下亦無於字傾或作頃又竊聞朝廷之議必起拾遺公使者往若不許即河南必繼以行或無即字拾遺徴君若不至必加髙秩如是則辭少就多傷於廉而害於義拾遺公必不為也則或作即新書無則字善音愈今本作瘦傳寫之誤陳壽起又廢卒亦無所至王隱謗退死家習鑿齒無一足孫日鑿齒字彥威襄陽人以腳疾廢居里巷符堅稻襄陽大説之與諸鎮書日昔晉平吳利在二陸仐獲江南獲士才一人有半耳崔浩范曄赤誅魏收夭絶宋孝王誅死足下所稱吳兢亦不聞身貴而今其後有聞也赤或作赤族二字夭或作天或無仐其字或無其後字夫為史者不有人禍則有天刑豈可不畏懼而輕為之哉唐有天下二百年矣聖君賢相相踵其餘文武之士立功名跨越前後者不可勝數豈一人卒卒能紀而傳之邪士上或尤之字能上或無復出卒字方云司馬遷傳卒卒無須臾之間顔日促遽之意也僕年志巳就衰退不可自敦率或無就字敦率方云猶敦勉也或作敢為或無此二字仐按此二字恐有脫誤宰相知其無他才能不足用哀其老窮齟齬無所合不欲令四海內有戚戚者猥言之上苟加一職榮之耳非必督責迫蹙令就功役也他上方無無字就下或有其字賤不敢逆盛指行且謀引去且傳聞不同善惡隨人所見傳聞或作傳云聞見甚者附黨憎愛不同巧造語言鑿空構立善惡事迹於仐何所承受取信而可草草作傳記令傳萬丗乎方無乎字若無鬼神豈可不自心慙愧若有鬼神將不福人僕雖騃亦粗知自愛實不敢率爾為也自心上或有可字非是或無心字夫聖唐巨迹及賢士大夫事皆磊磊軒天地決不沈沒或無聖字方從文苑決下有必字又云蜀本作落落掀天地而無必字又按決或作決地或作抉地今按古潮本軒亦作掀而無必字蓋因栁子厚書云所云磊磊軒天地者決必沈沒故諸本或誤加必字耳今從柳集作軒從潮本去必字今館中非無人將必有作者勤而纂之後生可畏安知不在足下亦宜勉之將必或作必將或脫不在二字愈再拜與大顛師書此書諸本皆無唯嘉祐小杭本有之其篇次在此與作召顛作巔師作知尚方本列於石刻之首今從杭本附此而名篇從方氏杭本又注云唐元和十四年刻石在潮陽靈山禪院宋慶曆丁亥江西袁陟丗弼得此書疑之因之滁用謁歐陽永叔永叔覽之日實退之語它意不及也方本略載其語又録歐公集古録跋尾云文公與顛師書丗所罕傳豫以集録古文其求之博蓋久而後獲其以繫辭為大傳謂著山林與著城郭無異等語宜為退之之言其後書吏部侍郎潮州刺史則非也蓋退之自刑部侍郎貶潮州後移袁州召為國子祭酒遷兵部侍郎久之始遷吏部而流俗相傳但知為韓吏部爾顛師遺記雖云長慶中立蓋并韓書皆國𥘉重刻故謬為附益年方又注云今石刻乃元祐七年重立又云按公三簡皆邀速常語耳𥘉無崇信佛法之説妄者旁沿别撰答問等語以肆誣謗要當存此簡以解後丗之惑今按杭本不知何人所注疑袁自書也更以跋尾參之其記歐公之語不謬矣而東坡雜説乃云韓退之喜大顛如喜澄觀文暢意非信佛法也而或者妄撰退之與大顛書其詞凡鄙雖退之家奴僕亦無此語仐一士人又於其末妄題云歐陽永叔謂此文非退之不能作又誣永叔矣蘇公此語蓋但見集注之出於或人而未見跋尾之為歐公親筆也二公皆號一代文宗而其去取不同如此覽者不能無惑然方氏盡載歐語而略不及蘇説其所可見至吕伯恭乃於文鑑特著蘇説以備乙覽則其同異之間又益後人之惑矣以余考之所傳王書最後一篇實有不成文理處但深味其間語意一二文勢抑揚則恐歐袁方意誠不為過但意或是舊本亡逸僧徒所記不真致有脫誤歐公特觀其大槩故但取其所可取而未暇及其所可疑蘇公乃覺其所可疑然亦不能祭其為誤而直斥以為凡鄙所以其論雖各有以而皆未能無所未盡也若乃後之君子則又往往不能究其本根其附歐説者既未必深知其所以為可信其主蘇氏者亦未必果以其説為然也徒幸其言可為韓公解紛若有輔於丗教故特表而出之耳皆非可與實事而求是者也至如方氏雖附歐説然亦未免曲為韓諱殊不知其言既曰久聞道德又曰側承道髙又曰所示廣大深逈非造次可諭又曰論甚宏博安得謂𥘉無崇信其説之意邪韓公之事余於答孟簡書蓋已論其詳矣故不復論特從方本載此三書於别集并録歐公二語而附蘇説方説於其後且為全載書文於此而考其同異訂其謬誤如左方以為讀者以此觀之則其決為韓公之文而非它人之所能作無疑矣方氏所據石本與杭本又自不同則疑傳寫之訛而歐公所疑官稱之誤亦為得之但愚意猶恐當時既謫刺逺州亦未必更帶侍郎舊官也方氏所駁丗俗偽造誣謗之書即仐所謂别傳者洪氏辨證云别傳載公與大顚往復之語深詆退之其言多近丗經義之説又偽作永叔跋云使退之復生不能自解免吳源明云徐君平見介甫不喜退之故作此文方氏又云周端禮曰徐安國自言年二十三四時戲為此今悔之無及然則其為徐作無疑矣但君平字安道而方云安國未知便是君平否耳然靈山石刻張繫所撰其間載韓公問大顛云西國一真之法何不教人顛云教人達性離無明貪嗔驕慢不生嫉妬此亦釋子常言𥘉無難解但韓公素所未聞而頗中其病文雖不盡解而適亦有會於心耳又載韓公青云人生貴賤各有定分何得以三塗之説誑人而顛答云公何不常守侍郎之任而來此為宫耶則恐其有謬誤或其徒所附益也愈啓方無此二字孟夏漸熱惟道體安和熱下或有伏字愈弊劣無謂坐事貶官到此久聞道德切思見顔切杭作竊方據石本如此切乃懇切之意此下大率多從石本云緣昨到來未獲參謁儻能暫垂見過實為多幸杭本無倘能以下十字巳帖縣令具人船奉迎日久佇瞻帖杭作貼久當作夕佇方據石本作佇不宣愈白方據石本無愈白字仐據石本此下具銜姓名下云上顛師四月七日愈啓方無此二字海上窮處無與話言側承道髙思獲披接專輒有此咨屈儻惠能降喻非所敢望也惠字疑衍或下有然字而併在能字之下諸本及石本皆誤至此一二日却歸髙居亦無不可旦夕渴望杭本無倘惠以下二十七字而有此旬來晴明不甚熱倘能乘間一訪實謂幸也十八字今按此旬以下乃下篇語定從石本不宣愈白方據石本無愈白字今據石本與前書同但云六月𥘉三日愈啓方無此二字惠勻至辱答問珍悚無巳所示廣大深逈非造次可諭爾作量易大傳曰書不盡言言不盡意然則聖人之意其終不可得而見邪方㯫石本意作旨無而字邪作也仐按易實作意邪而無終而二字大抵石本亦自多誤也後放此如此而論讀來一百遍一字疑衍蘇氏所謂凡鄙蓋指此等處耳不如親見顔色隨問而對之易了方據石本如此但無親字今按親下當有見字而兩本皆闕故不敢增而空其處以待知者杭但云不如親面而對之是亦蘇氏所謂凡鄙者然親字乃方本之闕文面字乃問字之誤筆而又脫去曰顔色隨易了六字耳此旬來晴明旦夕不甚熱儻能乘間一訪幸甚旦夕馳望杭本巳見上萹此不復出愈聞道無疑滯行止繫縳苟非所戀著則山林間寂與城郭無異此從杭本但郭作皇仐據歐公語從方本方據石本止下有所字縳下有愛戀字所下無戀字及則字而著字下復出著字及與字異下有邪字皆非是其用邪字尤不當律令亦所謂凡鄙者也但或疑非字下當有有字言於行止繫縳若無所戀著則靜閙一致語尤明白三或又疑非當作有則語意賔主尤順然未知孰是又諸本皆無不敢輒增改也大顛師論甚宏博而必守山林義不至城郭顛杭見上方無師字杭無義字城作州自激修行獨立空矌無纍之地者非通道也自方作似然細考之與下文激修行四字皆可疑方又以也為矣而井非通道四字萬於行字之下又以獨為自而立下有於字皆非是勞於一來安於所適道故如是於杭作于適方據石本與杭本並作識今得真石本考之乃如此然則方之所考亦不詳矣蓋適猶便也與唯適之安之語用字略同言一來雖勞而既來則當隨其所便無如不安也道故如是即所以結上文道無疑滯之意方以如為此亦石本誤不宣愈頓首方據石本無末三字仐據石本與前二書同但云大顛禪師七月十五日不知韓公之於大顛既聞其語而為禮益恭如此何也朱文公校昌黎先生外集卷之二
