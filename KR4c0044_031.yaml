front:
  text: 朱文公校昌黎先生集卷之三十一考異音釋附
  hash: sha256:354f7d95fae8447ae34091c100684431733c571fe43b43620956d5f4a51543bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_031-1a}
body:
  text: 碑志南海神廟碑神或作東此篇方從石本集注此碑石刻其首云使持節袁州諸軍事守袁州刺史韓愈撰使持節循州諸軍事守循州刺史陳諌書并篆額其後云元和十五年十月一日建海於天地間為物最巨自三代聖王莫不祀事考於傳記而南海神次最貴在北東西三神河伯之上號為祝融洪曰太公金匱云南海之神曰祝融東海之神曰勾芒北海之神曰顓頊西海之神曰蓐收今按東海神名阿明南海祝融西海巨乘北海禺強亦見養生雜書然公言南海神次最貴則是據太公書矣天寶中天子以為古爵莫貴於公侯故海嶽之祝犧幣之數放而依之所以致崇極於大神今王亦爵也而禮海嶽尚循公侯之事虛王儀而不用非致崇極之意也由是册尊南海神為廣利王祝號祭式與次俱升升或作升武德貞觀之制四海年别一祭各以五郊迎氣日祭之祀官以當界都督刺史充至是封王分命卿監十三人取三月十七日一時備禮兼册祭其祭儀具開元禮因其故廟易而新之在今廣州治之東南海道八十里扶胥之口黃木之灣烏還切常以立夏氣至命廣州刺史行事祠下事訖驛聞而刺史常節度五嶺諸軍仍觀察其郡邑於南方事無所不統地大以逺故常選用重人既貴而富且不習海事又當祀時海常多大風將往皆憂戚既進觀顧怖悸故常以疾為解而委事於其副其來巳久解或作辝故明宫齋廬上雨旁風無所蓋障牲酒瘠酸取具臨時水陸之品狼藉籩豆薦祼興俯不中儀式吏滋不供神不顧享供從石本方作恭誤盲風上眉庚切盲疾也月令盲風至怪雨發作無節人蒙其害方云或謂祕閣本盲作蟲字見吕氏春秋考石本只作盲月令盲風至注疾風也山海經符陽之山多怪雨風雲之所出也元和十二年始詔用前尚書右丞國子祭酒魯國孔公孔戣為廣州刺史兼御史大夫以殿都甸切南服公正直方嚴中心樂易祇愼所職治人以明事神以誠內外單盡不為表襮蒲報切又音博表襮衣領也至州之明年將夏祝册自京師至吏以時告公乃齋祓視册誓羣有司曰册有皇帝名乃上所自署其文曰嗣天子某謹遣官某敬祭其上或有具字或作且字官上或有某字今按其上冝有且字然石本無之不欲增也官上某字石本無之或以為用左傳其官臣偃之語其恭且嚴如是敢有不承明日吾將宿廟下以供晨事明日吏以風雨白不聽於是州府文武吏士凡百數交謁更諫皆揖而退公遂升舟風雨少弛棹夫奏功雲隂解駮日光穿漏波伏不興省牲之夕載暘載隂將事之夜天地開除月星明穊方云穊凡利切説文稠也選何晏景福殿賦穊若函星之纒連李善音古愛切蜀本作概非是五鼓既作牽牛正中方云月令季春之月旦牽牛中上文言立夏行事正此時也公乃盛服執笏以入即事文武賔屬俯首聽位各執其職牲肥酒香樽爵靜潔降登有數神具醉飽其或作其海之百靈祕怪慌惚畢出蜿蜿蛇蛇來享飲食慌或作恍蜿蜿或作蜓蜓享或作慕祝曰龍貌也選狀蜿蜿以蝹蝹史記驂赤螭青蚪之凼蟉蜿蜓輔注歐文忠公集古録云蜓蜓當從碑本作蛇蛇闔廟旋艫音盧舳艫祥飈卑遙切送帆音凡與帆同旗纛旄麾飛揚暗藹上音掩下於蓋切暗日無光藹木繁茂也選芳風暗藹鐃尼交切似鈴無舌有柄周禮以金鐃止鼓是也鼓嘲轟髙管噭譟上吉弔切丁桑到切噭吼也譟羣呼煩擾也武夫奮棹工師唱和穹龜長魚踊躍後先乾端坤倪軒豁呈露祀之之歲風災熄滅人厭魚蟹五榖胥熟祀之方從石本作祝今按祝當作祀其理甚明或疑誤刻今改從諸本明年祀歸又廣廟宫而大之祀諸本石本皆同方作祝誤治其庭壇改作東西兩序齋庖之房百用具修明年其時公又固往不懈益虔歲仍大和耋艾歌詠始公之至盡除他名之稅罷衣食於官之可去者四方之使不以資交以身為帥燕享有時賞與以節公藏私畜上下與足於是免屬州負逋之緡錢草有四萬米三萬二千斛賦金之州耗金一歲八百困不能償皆以丐之草有四万或作十有八万草方誤作二十三或作八加西南守長之俸誅其尤無良不聽令者由是皆自重慎法西南或作四面人士之落南不能歸者與流徙之胄百草八族用其才良而廩其無告者其女子可嫁與之錢財令無失時草方作二十嫁下方有者字石本無方誤也時或作所刑德並流方地數千里不識盜賊山行海宿不擇處所事神治人其可謂備至耳矣或無其字或無耳字咸願刻廟石以著厥美而繫以詩乃作詩曰南海隂墟祝融之宅隂或作之即祀于旁帝命南伯吏惰不躬正自今公明用享錫右我家邦右或作祐惟明天子惟愼厥使我公在官神人致喜海嶺之陬既足既濡胡不均弘俾執事樞公行勿遲公無遽歸匪我私公神人具依仐按此文石本今最易得而方本失考者凡五條然則它云石本者恐亦不能無謬也處州孔子廟碑此萹方從石本韓曰碑記不載年月日苐云朝散大夫國子祭酒賜紫金魚袋韓愈撰自天子至郡邑守長通得祀而遍天下者唯社稷與孔子為然而社祭土稷祭榖句龍與棄乃其佐享非其專主為或作焉然字屬下句而社方無而字句上方有而字皆非是又其位所不屋而壇豈如孔子用王者事巍然當座以門人為配自天子而下北靣跪祭進退誠敬禮如親弟子者跪祭或作拜跪薦祭句龍棄祝曰禮記云云以功孔子以德固自有次第哉自古多有以功德得其位者不得常祀句龍棄孔子皆不得位而得常祀然其祀事皆不如孔子之盛所謂生人以來未有如孔子者其賢過於堯舜逺矣此其效歟不如或作無如人或作民以或作巳孔或作夫郡邑皆有孔子廟或不能修事雖設博士弟子或役於有司名存實亡失其所業獨處州刺史鄴侯李繁繁鄴侯佖之子至官能以為先既新作孔子廟又令工改為顔子至子夏十人像令或作命顔子或作顔回其餘六十子及後大儒公羊髙左丘明孟軻荀况伏生毛公韓生董生髙堂生楊雄鄭玄等數十人皆圖之壁子上或有二字選博士弟子必皆其人又為置講堂教之行禮肄習其中又為字或在其中字下置或作設置本錢廪米令可繼處以守廟成躬率吏及博士弟子入學行釋菜禮菜或作奠歐陽公曰釋奠釋菜祭之略者也古者士之見師以菜為贄始入學者必釋菜以禮其先師其學官四時之祭乃皆䆁菜䆁奠有樂無尸而釋菜無樂則又其略也故其禮亡焉而仐釋奠幸存然亦無樂又不遍舉於四時獨春秋行事而巳耆老歎嗟其子弟皆興於學鄴侯尚文其於古記無不貫逹故其為政知所先後可歌也巳乃作詩曰惟此廟學鄴侯所作厥𥘉􅋻下神不以宇生師所處亦窘寒暑生或作先乃新斯宫神降其獻講讀有常不誡用勸揭揭居謁切又音桀又音羯髙舉也元誓有師之尊羣聖嚴嚴大法以存像圖孔肖咸在斯堂以瞻以儀俾不惑忘惑或作或後之君子無廢成美琢詞碑石以贊攸始柳州羅池廟碑此萹方從石本羅池廟者故刺史柳侯廟也柳侯為州不鄙夷其民動以禮法三年民各自矜奮兹圡雖逺京師吾等亦天氓奮下或有曰字今按冝有曰字然石本無之不欲輔也仐天幸惠仁侯若不化服我則非人於是老少相教語莫違侯令凡有所為於其鄉閭及於其家皆曰吾侯聞之得無不可於意否莫不忖度而後從事凡令之期民勸趨之無有後先必以其時於是民業有經公無負租流逋四歸樂生興事宅有新屋步有新船步或作涉方云柳子厚鐵爐步志曰江之滸凡舟可縻而上下曰步今按孔戣志亦有泊步字池園潔修豬牛鴨雞肥大蕃息子嚴父詔婦順夫指嫁娶葬送各有條法出相弟長入相慈孝先時民貧以男女相質久不得贖盡沒為隸我侯之至按國之故以傭除本悉奪歸之大修孔子廟城郭巷道皆治使端正樹以名木柳民既皆恱喜巷道或作道巷嘗與其部將魏忠謝寧歐陽翼飲酒驛亭謂曰吾棄於時而寄於此與若等好也明年吾將死死而為神後三年為廟祀我及期而死三年孟秋辛卯侯降于州之後堂歐陽翼等見而拜之其夕夢翼而告曰館我於羅池其月景辰唐國諱丙故丙為景廟成大祭過客李儀醉酒慢侮堂上得疾扶出廟門即死明年春魏忠歐陽翼使謝寧來京師請書其事于石余謂柳侯生能澤其民死能驚動福禍之以食其土可謂靈也巳福禍或作禍福作迎享送神詩遺柳民俾歌以祀焉而并刻之柳侯河東人諱宗元字子厚賢而有文章嘗位於朝光顯矣巳而擯不用其辭曰荔子丹兮蕉黃蕉下或有葉字或有子字雜肴𬞞兮進侯堂侯之船兮湖湘士人云柳人迎神其俗以一船兩旗置木馬偶人於舟作樂而導之登岸而趍於廟兩旗度中流兮風泊之待侯不來兮不知我悲侯乘駒兮入廟慰我民兮不嚬以笑鵝之山兮柳之水桂樹團團兮白石齒齒侯朝出遊兮暮來歸春與猿吟兮秋鶴與飛或作秋與鶴飛今按歐公以此句為石本之誤沈存中云非也倒用鶴與兩字則語勢愈健如楚詞云吉日辰良也但此石本團團字𥘉誤刻作圑圎後鐫改之今尚可見則亦石本不能無誤之一證也北方之人兮為侯是非千秋萬歲兮侯無我違福我兮壽我驅厲鬼兮山之左下無苦􅊜兮髙無乾粳古行切或作粳稌徒古切稻也充羡兮蛇蛟結蟠言粳稌之穗如蛇蛟我民報事兮無怠其始自仐兮欽于丗丗黃陵廟碑曾子開曰湘水出全瀟水出道二水至永合而為一以入洞庭黃陵庿在瀟湘之尾洞庭之口孫曰在覃之湘陰縣或云在嶽州此萹方從石本湘旁有廟曰黃陵自前古立以祠堯之二女舜二妃者庭有石碑斷裂分散在地其文剝缺石或作古或無此字考圖記言漢荆州牧劉表景升之立題曰湘夫人碑仐驗其文乃晉太康九年又其額曰虞帝二妃之碑非景升立者秦博士對始皇帝云湘君者堯之二女舜妃者也劉向鄭玄亦皆以二妃為湘君而離騷九歌既有湘君又有湘夫人王逸之解以為湘君者自其水神而謂湘夫人乃二妃也從舜南征三苗不及道死沅音元沅水出牂柯湘之間及或作返據下文當作及山海經曰洞庭之山帝之二女居之郭璞疑二女者帝舜之后不當降小水為其夫人因以二女為天帝之女方云石本書璞作朴唐人多然下文揭陽亦作揭陽小水或作小君方云考山海經作小水是也以余考之璞與王逸俱失也堯之長女娥皇為舜正妃故曰君其二女女英自宜降曰夫人也故九歌辭謂娥皇為君謂女英帝子各以其盛者推言之也帝上或有為字禮有小君君母明其正自得稱君也或無君母二字書曰舜陟方乃死傳謂舜升道南方以死升或作升或又曰舜死葬蒼梧二妃從之不及溺死沅湘之間今謂竹書紀年帝王之沒皆曰陟陟升也謂升天也書曰殷禮陟配天言以道終其德協天也書紀舜之沒云陟者與竹書周書同文也其下言方乃死者所以釋陟為死也地之勢東南不如言舜南巡而死冝言下方不得言陟方也以此謂舜死葬蒼梧於時二妃從之不及而溺者皆不可信溺下或有死字二妃既曰以謀語舜脫舜之厄成舜之聖堯死而舜有天下為天子二妃之力冝常為神食民之祭仐之渡湖江者莫敢不進禮廟下湖或作潮非是又或作湘元和十四年春余以言事得罪黜為潮州刺史其地於漢南海之揭陽厲毒所聚懼不得脫死過廟而禱之其冬移袁州刺史明年九月拜國子祭酒使以私錢十萬抵嶽州願易廟之圯桷腐瓦於刺史王堪長慶元年刺史張愈自京師往與愈故善刺史王堪上或有州字與上或有余字仐按此合有余字然石本無之不欲補也謂曰丐我一碑石載二妃廟事且令後丗知有子名愈曰諾既至州報曰碑謹具遂篆其事俾刻之唐故江南西道觀察使中大夫洪州刺史兼御史中丞上柱國賜紫金魚袋贈左散騎常侍太原王公神道碑銘王氏皆王者之後在太原者為姬姓或無之字春秋時王子成父敗狄有功因賜氏厥後丗居太原至東漢隱士烈博士徴不就居祁縣因號所居鄉為君子下或有鄉字公其君子鄉人也魏晉涉隋丗有名人國朝大王父玄暕音柬古限切歷御史屬三院止尚書郎生景肅守三郡終傳涼王生政襄鄧等州防禦使鄂州採訪使贈吏部尚書公尚書之弟某子公諱仲舒字弘中蜀作諱弘中字某後墓志同仐按上句巳有公字此不當再出當刪然無别本可據姑存之少孤奉母夫人家江南讀書著文其譽藹鬱當時名公皆折官位輩行下浪切願為交貞元𥘉射策拜左拾遺與陽城合遏裴延齡不得為相德宗𥘉怏怏無奈久而嘉之方無而字之或作其下又有直字其後入閣德宗顧列謂宰相曰第幾人必王某也果然月餘特改右輔闕或無右字遷禮部考功吏部三貟外郎在禮部奏議詳雅省中伏其能伏或作服在考功吏部提約明故吏無以欺同列有恃恩自得者衆皆媚承公嫉其為人不宜視方無人字由此貶連州司户移夔州司馬又移荆南因佐其節度事或無事字為參謀得五品服放迹在外積四年元和𥘉收拾俊賢徴拜吏部貟外郎未幾為職方郎中知制誥友人得罪斥逐後其家親知過門縮頸不敢視公獨省問為計度論議直其冤由是出為峽州刺史峽或作硤方云友人楊慿也轉廬州未至丁母夫人憂服除又為婺州時疫旱甚人死亡且盡公至多方救活天遂雨疫定比數年里閭完復制使出巡人填道迎顯公德事具聞就加金紫顯或作頌轉蘇州變其屋居以絶火延隄松江路害絶阻滯火上或有其字阻或作沮秋夏賦調自為書與人以期吏無及門而集政成為天下守之最政或作化天子曰王某之文可思最宜為誥有古風豈可久以吏事役之復拜中書舍人既至京師㑪流無在者視同列皆邈然少年益自悲而謂人曰豈可復治筆硯於其間哉上若未棄臣宜用所長在外久周知俗之利病方無利字非是俾治之當不自愧宰相以聞遂得觀察江南西道奏罷榷酤錢九千萬軍息之無巳掌吏壞産猶不釋囚之公至脫械不問千或作十人遭水旱賦窘公曰我且減燕樂絶他用錢可足乎遂以代之方無足字代下無之字罷軍之息錢禁浮屠誑誘壞其舍以葺公宇息上或有日字三年法大成錢餘於庫粟餘於廪人享於田廬謳謡於道途天子復思且徴以代虛吏部左丞位以待之長慶三年十一月十七日薨於洪州年六十二上哀慟輟朝贈左散騎常侍某日歸葬於某處某既以公之德刻而藏之墓矣子𥘉又請詩以揭之某下或無於字既上或無某字某或作愈詞曰生人之治本乎斯文有事其末而忘其源切近昧陋道由是堙有志其本而泥古陳當用而迂乖戾不伸較是二者其過也均有美王公志儒之本逹士之經秩秩而積㴠涵而停韡為華英不矜不盈英為諸本作英而華英作英華孰播其馨孰發其明介然而居士友以傾敷文帝階擢列侍從以忠逺名有直有諷辨遏堅懇巨邪不用堅懇或作聖懇秀出班行乃動帝目帝省竭心恩顧日渥翔于郎署鶱于禁密發帝之令簡古而蔚不比于權以直友冤𫾣撼挫揠竟遭斥奔久淹于外歷守大藩所至極思必悉利病萎枯以膏燠暍以醒暍或作暘坦之敞之必絶其徑浚之澄之使安其泳帝思其文復命掌誥公潛謂人此職冝少豈無凋郡庸以自效上藉其實俾統于洪藉或作籍逋之攸除姦訛革風祛蔽于目釋負于躬方乎所部禁絶浮屠乎或作平風雨順易粳稻盈疇人得其所乃恬乃謳所或作饒謳或作謡化成有代思以息勞虛位而俟奄忽滔滔維德維績志于斯石日逺彌髙奄忽方作勿隨又云此銘有美玉公不用韻未章三語分兩韻例又異也仐按銘之卒章績石二句雖自叶韻而未句髙字仍與勞滔韻叶非有異也朱文公校昌黎先生集卷之三十一
