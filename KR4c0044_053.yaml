front:
  text: 朱文公校昌黎先生集遺文考異音釋附
  hash: sha256:7c106e99d2a6dc682270f30b8c8468bd23e72ae828a426daa4b7e07f7ae488b1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_053-1a}
body:
  text: 聮句有所思聮句此下三聮句方云見孟東野集相思繞我心日夕千萬重年光坐婉晚春淚銷顔容郊臺鏡晦舊暉庭草滋新茸望天山上石别劒水中龍愈遣興聮句説上我心隨月光寫君庭中央郊月光有時晦我心安所忘愈常恐金石契斷為相思腸郊平生無百歲岐路有四方愈四方各異俗適異非所將郊駑蹄顧挫秣逸翮遺稻粱愈時危抱獨沉道泰懷同翔郊獨居久寂默相顧聊慨慷愈慨慷丈夫志可以耀鋒鋩郊蘧􅑔知卷舒孔顔識行藏愈㓪鑒諒不逺佩蘭永芳芳郊苟無夫子聽誰使知音揚愈贈劒客李園聮句同上天地有靈術得之者唯君郊築爐地區外積火燒氛氲愈照海鑠幽怪滿空歊異氛郊山磨電奕奕水淬龍蝹蝹愈太一裝以寶列仙篆其文郊可用懾百神豈惟壯三軍愈有時幽匣吟忽似深潭聞郊風胡久巳死此劒將誰分愈行當獻天子然後致殊勳郊豈如豐城下空有斗間雲愈遺詩同竇牟韋執中尋劉尊師不遇方云此詩得於五竇聮味集公時任都官外郎同洛陽令竇公河南令韋執中以訪之元和五年也詩以同尋師為韻人各一首洪氏年譜亦見秦客何年駐仙源此地深還隨躡鳬騎來訪馭風襟院閉青霞入松髙老鶴尋猶疑隱形坐敢起竊桃心春雪方云此詩得於文苑英華其後即以正集中春雪詩首句云新年都未有芳華者系之疑亦公作也巳上並方本所載諸本所無者今悉存之諸本更有遺文一卷方獨取贈族姪嘲鼾睡三篇餘並不録今並附見于後其可疑者亦但存其目而不載其文云片片驅鴻急紛紛逐吹斜到江還作水著樹漸成花越喜飛排瘴胡愁厚蓋砂兼雲封洞口助月照天涯暝見迷巢鳥朝逢失轍車呈豐盡相賀寧止力耕家贈族姪上或有徐州字我年十八九壯氣起胸中作書獻雲闕辭家逐秋蓬歲時易遷次身命多厄窮一名雖云就片祿不足充今者復何事卑棲寄徐戎蕭條資用盡濩落門巷空朝眠未能起逺懷方鬱悰擊門者誰子問言乃吾宗自云有竒術探妙知天工既往悵何及將來喜還通期吾語非佞當為佐時雍嘲鼾睡洪日李希聲家有退之遺詩數十篇希聲云皆非也獨嘲鼾二篇似之録于末淡師晝睡時聲氣一何猥頑飈吹肥脂坑谷相嵬磊雄哮乍咽絶每發壯益倍有如阿鼻尸長喚忍衆罪馬牛驚不食百鬼聚相待木枕十字裂鏡面生痱癗上音肥下音灅韓日痱瘤腫病也鐵佛聞皺眉石人戰搖腿孰云天地仁吾欲責真宰幽尋虱㮴耳猛作濤翻海太陽不忍明飛御皆惰怠乍如彭與黥呼冤受𦵔醢又如圈中虎號瘡兼吼餒雖令伶倫吹苦韻難可改唯令巫咸招魂爽難復在何山有靈藥療此願與採淡公坐卧時長睡無不穩吾嘗聞其聲深慮五藏損黃河弄濆瀑梗澀連拙鮌南帝𥘉奮槌鑿竅泄混沌韓日莊子南海之帝倏與中央之帝混沌善謀報其德日人皆有七竅以視所食息此獨無有試鑿之日鑿一竅七日而混沌死逈然忽長引萬文不可忖謂言絶於斯繼出方衮衮幽幽寸喉中草木森苯䔿上音本下音忖韓日苯䔿草木叢生也盜賊雖狡獪亡魂敢窺閫鴻蒙揔合雜詭譎騁戾狠乍如鬪呶呶忽若怨􅈤􅈤賦形苦不同無路尋根本何能堙其源惟有土二畚晝月玉碗不磨著泥土青天孔出白石輔兔入臼藏蛙縮肚桂樹枯株女閉户隂為陽羞固自古嗟汝下民或敢侮戲謿盜視汝目瞽贈張徐州莫辭酒莫辭酒此會固難同請看工女機上帛半作軍人旗上紅莫辭酒誰為君王之爪牙春雷三月不作響戰士豈得來還家辭唱歌諸本注云此篇恐非公作今姑存之抑逼教唱歌不解看豔詞坐中把酒人豈有歡樂姿幸有伶者婦腰身如柳枝但令送君酒如醉如憨凝聲自肉中出使人能逶隨復遣慳吝者贈金不皺眉豈有長直夫喉中聲雌雌若心豈無恥君豈是女兒君教發直言大聲無休時君教哭古恨不肯復吞悲乍可阻君意豔歌難可為知音者誠希韓曰古觢不愁歌者苦但傷知音稀知音者誠希念子不能别行行天未曉携子踏明月酬藍田崔丞立之詠雪見寄京城數尺雪寒氣倍常年泯泯都無地茫茫豈是天崩奔驚亂射揮霍訝相纏不覺侵堂陛方應折屋椽出門愁落道上馬恐平韉朝鼓矜凌起山齋酩酊眠吾方嗟此役君乃詠其妍水王清顔隔波濤盛句傳朝飱思共飯夜宿憶同氊舉目無非白雄文乃獨玄潭州泊船呈諸公夜寒眠半覺鼓笛閙嘈嘈暗浪舂樓堞驚風破竹篙主人看使範客子讀離騷聞道松醪賤何須吝錯刀飲城南道邊古墓上逢中丞過贈禮部衛貟外少室張道士中丞謂裴度也偶上城南土骨堆共傾春酒三五杯為逢桃樹相料音聊理不覺中丞喝道來池上絮池上無風有落暉楊花暗後自飛飛為將纎質凌清鏡濕却無窮不得歸記監軍新竹亭記今按此文恐非或作今刪去書答侯生問論語書補注公作論語傳未成而殁見於張籍祭詩下於洪慶善之説者甚明今丗所傳如宰豫晝寢以書釋晝子在齊聞韶三月不知肉味以三月作音浴乎沂以浴作沿子在回何敢死以死作先雖甚鄙賤然為伊川之學者皆取之愈白侯生足下所示論語問甚善聖人踐形之説孟子詳於其書當終始究之若萬物皆備於我反身而誠是也苟有偽焉則萬物不備矣踐形之道無它誠是也足下謂賢者不能踐形非也賢者非不能踐形能而不備耳形言其備也所謂具體而微是也充實之謂美充實而有光輝之謂大充實則具體未大則微故或去聖一間或得其一體皆踐形而未備者唯反身而誠則能踐形之備者耳愈昔注解其書而不敢過求其意取聖人之旨而合之則足以信後生輩耳此説甚為隱當切更思之愈白墓志相州刺史御史中丞田公故夫人魏氏墓志銘下或注并序字今按此篇不類公它文且云元和八年則又非少作其非公作無疑今刪去啓皇帝即位賀宰相啓愈啓伏見册命皇帝以閠月三日嗣臨大位以主神人含生之類孰不蒙賴相公翼亮聖明大慶資始伏惟永永與國同休愈下情不勝慶躍限以所守不獲隨例拜賀謹差某奉啓不宣謹啓狀奏汴州得嘉禾嘉瓜狀方本有之以附廟鼾睡詩之後云此篇見文苑英華蓋為董晉作董晉行狀亦可考右謹按符瑞圖王者德至於地則嘉禾生伏惟皇帝陛下道合天地恩霑動植邇無不協逺無不賔神人以和風雨咸若前件嘉禾等或兩根並植一穗連房或延蔓敷榮異實共蒂既叶和同之慶久標豐稔之祥感自皇恩微莖何極於造化親逢嘉瑞小臣喜遇於休明無任皇帝即位賀諸道狀伏見勑命皇帝以閠正月三日嗣臨寶位海內惟新凡在臣庶不勝慶幸惟俯同下情未由拜賀但增馳戀謹奉狀不宣某再拜或無此三字皇帝即位降赦賀觀察使狀二月五日恩赦今月二十四日卯時到州當時集百官僧道百姓宣示訖聖上以繼明之𥘉垂惟新之澤曲成不遺於萬物大賚遂延於四海寰宇斯泰品類皆蘇渥恩普霑逺近同慶蘇渥或乙此二字非是愈以藩條有制拜賀無由不勝欣抃之至謹差萍鄉縣丞李某奉狀陳賀某或作於潮州謝孔大夫狀此篇見洪氏年譜方氏增考云公既南行家亦譴逐二月二日已過商州之南而此狀言七月二十七日牒則八月作也不知其家何故猶未至潮又姪孫湘亦從公而南故宿曾江口有示湘詩而過始興江口詩謂目前百口還相逐與狀言妻子孫姪未到者皆不相應此狀恐妄也今按公之到郡既不見年月之實則此狀亦無由可考方氏弓曽江始興二詩以訂此狀之妄蓋亦有理但恐或是巳過始興留家在後而獨先到郡亦不可知但其狀詞頗類袁州申使狀則又未有以必見其妄故今且存之亦闕疑之意也伏奉七月二十七日牒以愈貶授刺史特加優禮以州小俸薄慮有闕乏每月别給錢五十千以送使錢充者開緘捧讀驚榮交至顧巳量分慚懼益深欲致辭為讓則乖伏屬之禮承命苟貪又非循省之道進退反側無以自寧其妻子男女并孤遺孫姪奴婢等尚未到官窮州使賔罕至身衣口食絹米足充過此以往實無所用積之於室非廉者所為受之於官名且不正恃蒙眷待輒此披陳疏憲宗崩慰諸道疏愈言上天降禍大行皇帝奄棄萬國伏惟攀慕永痛哀感難勝某承詔不任號絶限以官守拜慰未由伏增惶戀謹差某奉疏不宣韓愈再拜題名長安慈恩塔題名巳下並方本所載韓愈退之李翶翔之孟郊東野柳宗元子厚石洪濬川同登洛北惠林寺題名韓愈李景興侯喜尉遲汾貞元十七年七月二十二日魚于溫洛宿此而歸昌黎韓愈書謁少室李渤題名愈同樊宗師盧同謁少室李拾遺福先塔寺題名處士石洪濬川吏部貟外王仲舒弘中水部貟外鄭楚相叔敖洛陽縣令潘宿陽乾明國子博士韓愈退之前試左武衛胄曹李演廣文前杭州錢塘縣尉鄭絃文明元和三年十月九日同遊嵩山天封宫題名歐公跋語附元和四年三月二十六日與著作佐郎樊宗師處士盧同自洛中至少室謁李徴君渤樊次玉泉寺疾作歸明日遂與李盧道士韋𪷟僧榮並少室而東抵衆寺上太室中峯宿封禪壇下石室遂自龍泉寺釣龍潭水遇雷明日觀啓母石入此觀與道士趙玄遇乃歸閠月三日國子博士韓愈題歐公集古跋尾云右韓退之題名二皆在洛陽其一在嵩山天封宫石柱上刻之記龍潭遇雷事天聖中余為西京留守推官與梅聖俞遊嵩山入天封宫徘徊柱下而去遂登山頂之武后封禪處有石記戒人遊龍潭者母語笑以黷神龍龍怒則有雷恐因念退之記遇雷意其有所誡也其一在福先寺塔下當時所見墨迹不知其後何人模刻于石也迓杜兼題名河南尹水陸運使杜兼尚書都官貟外郎韓愈水陸運判官洛陽縣尉李宗閔水陸運判官伊闕縣尉牛僧孺前同州韓城縣尉鄭伯義元和四年九月二十二日大尹給事奉詔祠濟瀆回愈與二判官於此迎候遂陪遊宿愈題華嶽題名方云此文刻於金天祠石闕昔人嘗集華嶽題名自唐開元至後唐清泰録為十卷此文雖未必盡出公手然筆削之嚴要非公不可故鋉之淮西宣慰處置使門下侍郎平章事裴度副使刑部侍郎兼御史大夫馬總行軍司馬太子右庶孑兼御史中丞韓愈判官司勳貟外郎兼侍御史李正封都官貟外郎兼侍御史馮宿掌書記禮部貟外郎兼侍御史李宗閔都知兵馬使左驍衛將軍威逺軍使兼御史大夫李文恱左廂都押衙兼都虞候左衛將軍兼御史中丞密國公髙承簡元和十一年八月丞相奉詔平淮右八日東過華隂禮于嶽廟總等八人實備將佐以從朱文公校昌黎先生集遺文卷終
