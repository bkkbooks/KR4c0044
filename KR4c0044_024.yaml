front:
  text: 朱文公校昌黎先生集卷之二十四考異音釋附
  hash: sha256:104b565d49e3cbf0e4a570d10c83df480f8e2663e89ca4ad6e79a92c735b5c93
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_024-1a}
body:
  text: 碑志李元賔墓銘李觀字元賔方云謝從古本刪字字今文粹亦然石本有之此文方從石本今並從之其先隴西人也或無也字始來自江之東年二十四舉進士三年登上第東下或有食太學之祿五字又舉博學宏辭得太子校書一年書下或有又字年二十九客死于京師于或作於既斂之三日友人博陵崔弘禮葬之于國東門之外七里斂下或無之字友上或有其字葬上或有賣馬字葬下或無之字鄉曰慶義原曰嵩原慶義或作某鄉嵩原或作某原友人韓愈書石以志之辭曰人下或有昌黎字辭上或有其字巳呼元賔壽也者吾不知其所慕天也者吾不知其所惡生而不淑孰謂其壽謂其或作為之死而不朽孰謂之夭謂之或作為其巳呼元賔才髙乎當丗而行出乎古人才或作文出或作過巳呼元賔竟何為哉竟何為哉已呼元賔諸本無此再出四字方從石本今亦從之但方又云上竟字石本作意而邵公濟嘗歎其句法之妙謂歐公而下好韓氏學者皆未之見遂從其説定上字作志意之意下字作究竟之竟則豫不識其何説也竊意若非當時誤刻即是後來字半磨滅而讀者不審遂傳此謬好事者又從而夸大之使丗之愚而好怪者遂為所惑其可笑也崔評事墓銘君諱翰字叔清博陵安平人安平或作平安方云今深州有安平縣曾大父知道仕至大理司直大父玄同為刑部侍郎出刺徐相州同方作童非是或無相字父倚舉進士天寶之亂隱居而終君既喪厥父攜扶孤老託于大江之南卒喪通儒書作五字句詩敦行孝悌詼諧縱謔卓詭不羈又善飲酒江南人士多從之遊卓詭方無此二字或作處丗皆非是貞元八年君生四十七年矣方云以卒日考之七當作六自江南應節度使王栖曜命于鄜州既至表授右衛胄曹參軍實參幕府事直道正言輔益弘多弘或作尤既去職遂家于汝州汝州刺史吳郡陸長源引為防禦判官表授試大理評事十二年相國隴西公作藩汴州而吳郡為軍司馬隴西公以為吳郡之從則賢也之從或作從事或併出之字皆非是署為觀察巡官實掌軍田鑿澮溝斬茭茅或作苑方云苑鳬葵也此兼水陸言之作茅自當為陸田千二百頃水田五百頃或無為字五百或作二千連歲大穰軍食以饒幕府以其功狀聞或無其字使者未復命以十五年正月五日寢疾終于家年五十有六矣隴西公賻贈有加自始有疾吳郡率幕府寮屬日一至其廬問焉其既甚也日再往問焉其終也往哭焉比小斂大斂三哭焉方無大斂字今按上文并大斂計之乃得三哭方本非是於斂之二十日其妻與其子以君之喪旋葬于汝州與方作以或無于字其二月某日遂葬于某縣某鄉某原君內仁九族外盡賔客於其所止其來如歸苟親矣雖不肖收之如賢苟賢矣雖貧賤待之如貴人是故其殁也其弔者與其哭者其聲也必哀盡焉妻鄭氏也有子二人女一人吾聞位不稱德者有後嗚呼君其終有後乎德者下或有其終字銘曰朝之言嘻嘻夕之言怡怡偕入而出乘馬馳馬下或有而字一日不見而死吁其悲其下或有可字施先生墓銘貞元十八年十月十一日太學博士施先生士丐卒其寮太原郭伉買石志其墓方無太原字昌黎韓愈為之辭曰先生明毛鄭詩通春秋左氏傳善講説朝之賢士大夫從而執經考疑者繼于門繼下或有往字太學生習毛鄭詩春秋左氏傳者皆其弟子貴遊之子弟時先生之説二經來太學帖帖坐諸生下恐不卒得聞帖帖或作怡怡下又有然字非是先生死二經生喪其師仕於學者亡其朋故自賢士大夫老師宿儒新進小生聞先生之死哭泣相弔歸衣服貨財先生年六十九在太學者十九年由四門助教為太學助教由助教為博士太學由四下十八字此從諸本方從杭本無為太學助教由助教八字云蓋言由四門助教至為博士於太學故也若從今文則下太學字贅矣仐按此既言其在太學者十九年則所歷官不應但一再遷而巳當從諸本為是但下太學二字疑衍不然則或在博士上或在下文當去下然無所據不敢輒改姑存之以俟知者秩滿當去諸生輒拜疏乞留下或有或乞遷三字或留或遷凡十九年不離太學方云杭本無凡下八字今按上文巳云在太學者十九年則此八字誠為重復然欲去之則或留或遷語勢未盡又不知公意果如何仐亦論而闕之不敢定其去留也祖曰旭袁州宜春尉父曰婼丑略切豪州定逺丞豪方作豪説巳見前按此志在元和之前去水為是妻曰太原王氏先先生卒子曰友直明州鄮縣主薄鄮或作鄞曰友諒太廟齋郎系曰先生之祖氏自施父其後施常事孔子以彰讎為博士延為太尉太尉之孫始為吳人曰然曰續亦載其迹續或作績先生之興公車是召纂序前聞于光有曜古聖人言其旨密微箋注紛羅顚倒是非紛方作分聞先生講論如客得歸得或作有卑讓肫肫出言孔揚方云中庸曰肫肫其仁鄭注肫讀如誨爾諄諄之諄􅝴誠貌今其死矣誰嗣為宗為或作其縣曰萬年原曰神禾高四尺者先生墓邪考功貟外盧君墓銘銘或作表愈之宗兄故起居舍人君樊曰柳子厚先友記云韓會昌黎人善清言有文章名最高然以故多謗至起居郎貶官卒則起居舍人君會也以道德文學伏一丗伏或作服其友四人其一范陽盧君東美少未出仕皆在江淮間天下大夫士謂之四夔方無少字韓曰永泰中會與盧東美張正則崔造為友好談經濟之略常以王佐自許時人號為四夔舊史載於崔造傳新史亦具載之而托言乃以何長師李華盧東美韓衢為四夔非是其義以為道可與古之夔臯者侔故云爾夔臯或作臯夔後同或曰夔嘗為相丗謂相夔四人者雖處而未仕天下許以為相故云大曆𥘉御史大夫李栖筠由工部侍郎為浙西觀察使當是時中國新去亂仕多避處江淮間仕或作士嘗為顯官得名聲以老故自任者以千百數大夫莫之取獨晨衣朝服從騎吏入下里舍請盧君方無晨字君時始任戴冠通詩書與其羣日講説周公孔子以相磨礱浸灌婆娑嬉遊未有捨所為為人意既起從大夫天下未知君者惟竒大夫之取人也不常必得人其知君者謂君之從人也非其常守必得其從知上方無其字其後為太常博士監察御史河南府司録考功貟外郎年若干而終在官舉其職若干或作五十四夫人李姓隴西人君在配君子無違德配上或有作字君殁訓子女得母道甚或作甚得母道後君二十年年六十六而終二十或作若干十六或作十四將合葬其子暢命其孫立曰乃祖德烈靡不聞然其詳而信者宜莫若吾先人之友先人之友無在者起居丈有季曰愈能為古文業其家文或作又是必能道吾父事業汝其往請銘焉父下或有之字立於是奉其父命奔走來告愈謂立曰子來宜也行不可一二舉且吾之生也後不與而祖接不得詳也得下或有其字其大者莫若衆所與觀所與衆寡兹可以審其德矣乃祖未出而處也天下大夫士以為與古之夔臯者侔且可以為相其德不既大矣乎大夫或作之講説周公孔子樂其道不樂從事於俗得所從不擇外內奮而起其進退不既合於義乎擇或作釋銘如是可以示於今與後也歟立拜手曰唯唯君祖子輿濮州濮陽令父同舒州望江令夫人之祖延宗鄆州司馬父進成鄜州洛交令君祖下三十四字或但言君祖某某官父某某官夫人之祖某某官父某某官夫人下或無之字男三人暢申易女三人皆嫁為士人妻士下或無人字墓在河南緱氏縣梁國之原緱氏下七字或作某縣某原其年月日或無此四字非是元和二年二月十日云十下或有四字施州房使君鄭夫人殯表夫人之先出於周方無之字仐按此篇之文平易明白宜有之字以鄭為氏因𥘉侯曾祖諱隨祖諱玠厥考諱絳咸垂休歸于房宗生九子左右黍稷祠春秋道順德嚴顯且𥙿宜壽而富今何謬冨或作貴永貞冬至前四日寓殯墳此非其丘清邊郡王楊燕竒碑文眺本作清郡王楊公神道碑公諱燕竒字燕竒字上或無竒字弘農華隂人也大父知古祁州司倉烈考文誨天寶中實為平盧衙前兵馬使盧下或有軍字位至特進檢校太子賔客封弘農郡開國伯丗掌諸蕃互市恩信著明夷人慕之祿山之亂公年幾二十進言於其父曰大人守官宜不得去王室在難某其行矣宜或作義其父為之請於戎帥遂率諸將校之子弟各一人間道趨闕變服詭行日倍百里天子嘉之特拜左金吾衛大將軍貟外置賜勳上柱國寶應二年春詔從僕射田公平劉展又從下河北大曆八年帥師納戎帥勉于滑州九年從朝于京師建中二年城汴州功勞居多二年或作二歲三年從攻李希烈先登貞元二年從司徒劉公復汴州十二年與諸將執以城叛者歸之于京師事平授御史大夫食實封百户賜繒綵有加封下或有五字十四年年六十一五月某日終于家自始命左金吾大將軍凡十五遷為御史大夫職為節度押衙右廂兵馬使兼馬軍先鋒兵馬使右或作左階為特進勳為上柱國爵為清邊郡王食虛邑自三百户至三千户真食五百户終焉或無自字或無五字公結髮從軍四十餘年或作歲敵攻無堅城守必完臨危蹈難歔欷感發乘機應會捷出神怪不畏義死不榮幸生故其事君無疑行其事上無間言𥘉僕射田公其母隔於冀州公獨請往迎之經營賊城出入死地卒致其母田公德之約為父子故公始姓田氏田公終而後復其族焉嗣子通王屬良禎以其年十月庚寅葬公于開封縣魯陵岡隴西郡夫人李氏祔焉通王德宗之子諶以貞元中領宣武及河東節葬月或作二月或作三月或作八月或作十月方云燕竒卒於五月作二三月者誤矣但八月十月皆有庚寅不知孰是大抵此碑多誤不曉所以僕射田公田神功也神功以上元二年平劉展此作寶應二年舊傳神功大曆八年冬覲闕廷信宿而終此作九年皆差也夫人清夷郡太守祐之孫漁陽郡長史獻之女柔嘉淑明先公而殂有男四人女三人後夫人河南郡夫人雍氏某官之孫某官之女有男一人女二人咸有至性純行夫人同仁均養親族不知異焉男一人女二人或作男二人女一人女上或有有字一亦無有字君子於是知楊公之德又行於家也銘曰烈烈大夫逢時之虞大夫或作丈夫感泣辭親從難于秦維兹爰始遂勤其事四十餘年或禆或專攻牢保危爵位巳隮既明且愼終老無隳魯陵之岡蔡河在側在或作之蒸蒸孝子思顯勳績斫石于此式垂後嗣河南少尹裴君墓志銘公諱復字茂紹復或作稷方云唐丗系表集古録皆作復河東人曾大父元簡大理正大父曠御史中丞京畿採訪使父虬以有氣略敢諌諍為諌議大夫方無有字事諍二字或作言或無諍字引正大疑有寵代宗朝屢辭官不肯拜卒贈工部尚書公舉賢良拜同官尉僕射南陽公開府徐州召公主書記三遷至侍御史入朝歷殿中侍御史纍遷至刑部郎中遷或作選非是疾病改河南少尹輿至官若干日卒實元和三年四月二十三日享年五十夫人博陵崔氏少府監頲之女男三人璟質皆既冠其季始六歲曰充郎充或作彥方云丗系表作望郎卜葬得公卒之四月壬寅遂以其日葬東都芒山之隂杜翟村公幼有文年十四上時雨詩代宗以為能將召入為翰林學士尚書公請免曰願使卒學方無使字丁後母喪上使臨弔又詔尚書公曰父忠而子果孝吾加賜以厲天下終喪必且以為翰林詔或作謂林下或有學士字其在徐州府能勤而有勞在朝以恭儉守其職居喪必有聞待諸弟友以善教館婺矛牙妹畜孤甥能别而有恩而有或作而以歷十一官而無宅於都無田於野無遺資以為葬斯其可銘也巳銘曰裴為顯姓入唐尤盛支分族離各為大家方云此銘以家叶離方言罹謂之羅羅謂之罹蓋古音通也今按詩兔爰及楚詞多此類惟公之系德隆位細曰子曰孫厥聲丗繼子或作祖晉陽之色愈愈翼翼色或作邑無外無私幼壯若一何壽之不遐而祿之不多謂必有後其又信然耶國子助教河東薛君墓志銘石本有河東字方本無然此後方多從石本今亦從之君諱公逹字大順薛姓字大順或作字某曾祖曰希莊撫州刺史贈大理卿祖曰元暉果州流溪縣丞贈左散騎常侍祖下十六字方云閣杭蜀本皆闕推監本與石本同今按方氏所校專據三本而謂今本皆不足取今此數字乃三本所無而今有者若非偶有石本則必以為後人校增而不之信矣故知今本與閣杭蜀苑粹不同者未必皆無所自也觀者詳之父曰播尚書禮部侍郎侍郎命君後兄據據為尚書水部郎中贈給事中據或作授君少氣髙為文有氣力務出於竒以不同俗為主始舉進士不與先輩揖作胡馬及圎丘詩京師人未見其書皆口相傳以熟及擢第輔家令主簿佐鳯翔軍或無及擢弟三字軍帥武人君為作書奏讀不識句傳一幕以為笑不為變笑下或有君字後九月九日大會射設標的髙出百數十尺會下或有命字令曰中酬錦與金若干一軍盡射莫能中或無盡字能中下或有者字君執弓腰二矢指一矢以興指或作挾閣本無指一矢三字仐按下文三發三中考之閣本之謬明矣揖其帥曰請以為公歡遂適射所一座皆起隨之或無皆字射三發連三中或無射字的壞不可復射中輒一軍大呼以笑連三大呼笑帥益不喜即自免去後佐河陽軍任事去害興利功為多拜協律郎益棄竒與人為同今天子修太學官有公卿言詔拜國子助教分教東都生元和四年年􅕊七二月十四日疾暴卒􅕊七石本如此下二十一日亦然方著其説而不及改今正之君再娶𥘉娶琅邪王氏後娶京兆韋氏或無𥘉娶以下十二字凡産四男五女男生輒即死或無産字即字自給事至君後再絶皆有名或無皆有名三字然三字之義未詳而方氏亦不著石本之有無姑闕以俟知者遺言曰以公儀之子巳巳後我巳巳後我或作為已後今按此云巳巳者必其子之小字也其年閏三月草二日草説見上弟試太子通事舍人公儀京兆府司録公幹以君之喪歸試下七字或作某官京下五字或作殿中侍御史以五月十五日葬于京兆府萬年縣少陵原合祔王夫人塋以君下二十八字或作以君之喪葬京兆某縣銘曰官不遂歸譏於時不下或有能字非是譏或作議石本逸身不得年又將尤誰丗再絶而紹祭以不隳監察御史元君妻京兆韋氏夫人墓志銘諸本無京兆以上九字夫人諱叢字茂之姓韋氏茂方作成仐以名義推之當作茂其上七丗祖父封龍門公龍門之後丗率相繼為顯官夫人曾祖父諱伯陽自萬年令為太原少尹副留守北都卒贈祕書監或無北都字其大王父迢以都官郎為嶺南軍司馬卒贈同州刺史王考夏卿以太子少保卒贈左僕射保下或無卒字僕射娶裴氏臯女或無僕射字臯為給事中臯父宰相耀卿夫人於僕射為季女愛之為上或有少字非是選壻得今御史河南元稹選上或有其字稹時始以選校書祕書省中校上或有授字非是其後遂以能直言䇿第一拜左拾遺果直言失官又起為御史舉職無所顧夫人固前受教於賢父母得其良夫又及教於先姑氏固或作因父上方無賢字得上或有及字及或作受皆非是率所事所言皆從儀法言或作動年二十七以元和四年七月九日卒卒三月得其年之十月十三日葬咸陽從先舅姑兆銘曰詩歌碩人爰敘宗親女子之事有以榮身夫人之先纍公纍卿有赫外祖相我唐明有或作於祖或作舅非是歸逢其良夫夫婦婦獨不與年而卒以夭實生五子一女之存銘于好辭以永於聞好或作理韓文二十四卷終
