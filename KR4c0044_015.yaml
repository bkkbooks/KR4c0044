front:
  text: 朱文公校昌黎先生集卷之十五考異音釋附
  hash: sha256:d5b64527b5397db16f61759d13d49d742772d9d2895909a7d03112e60894bc33
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_015-1a}
body:
  text: 書與孟東野書東野或作郊與足下别久矣以吾心之思足下知足下懸懸於吾也以吾或作以余方從閣蜀本云除下文江湖豫樂也一語餘並作吾各以事牽不可合并其於人人非足下之為見而日與之處足下知吾心樂否也其於人人或無下人字説見前卷答張藉書或作它人非是方無此四字之處方作人處吾言之而聽者誰歟吾唱之而和者誰歟言無聽也唱無和也獨行而無徒也是非無所與同也足下知吾心樂否也無聽無和上或並有之而字行下方無而字與同方作以同説巳見前足下才髙氣清行古道處今丗無田而衣食事親左右無違足下之用心勤矣足下之處身勞且苦矣混混與丗相濁獨其心追古人而從之從之方作從今之人云謝以貞元本定今按上語與丗相濁即是從今之人更著二字則贅而不詞矣舊書之不足據有如此者故特詳著其語云足下之道其使吾悲也使上方無其字去年春脫汴州之亂幸不死無所於歸遂來于此於或作與方作以今按送楊少尹序亦有此語主人與吾有故哀其窮居吾于符離雎上及秋將辭去因𬒳留以職事默默在此行一年矣到今年秋聊復辭去江湖余樂也與足下終幸矣李習之娶吾亡兄之女期在後月朝夕當來此張籍在和州居喪家甚貧恐足下不知故具此白冀足下一來相視也自彼至此雖逺要皆舟行可至速圖之吾之望也春且盡時氣向熱惟侍奉吉慶愈眼疾比劇甚無聊不復一一盡時方本作時盡向作日今按方本無文理蓋其意信本而不信理好竒而不喜常故其所取每得乖戾暗澀之語雖此等無利害極分明處亦不能􅊵是可歎巳愈再拜答竇秀才書竇下或有存亮字愈白愈少駑怯於他藝能自度無可努力又不通時事而與丗多齟齬念終無以樹立遂發憤篤專於文學學不得其術不得上一有而字凡所辛苦而僅有之者皆符於空言而不適於實用又重以自廢是故學成而道益窮年老而智愈困智或作身今又以罪黜於朝廷逺宰蠻縣愁憂無聊瘴癘侵加喘喘焉無以冀朝夕足下年少才俊辭雅而氣鋭雅或作清當朝廷求賢如不及之時當道者又皆良有司操數寸之管書盈尺之𥿄髙可以釣爵位循次而進亦不失萬一於甲科書方作盡循上或有若字或無万一二字今乃乘不測之舟入無人之地以相從問文章為事舟或作川身勤而事左辭重而請約非計之得也左或作尤非是雖使古之君子積道藏德遁其光而不曜膠其口而不傳者遇足下之請懇懇猶將倒廩傾囷羅列而進也其光二字方作丗曜或作耀請或作情囷一作箘云若愈之愚不肖又安敢有愛於左右哉顧足下之能足以自奮愈之所有如前所陳是以臨事愧恥而不敢答也錢財不足以賄左右之匱急文章不足以發足下之事業章不足或作章不可稛苦隕切國語日稛載而歸稛絭束也一作管子小正篇諸侯之使垂槖而入稛載而歸載而往垂槖而歸足下亮之而巳愈白上李尚書書李下或有實字月日將仕郎前守四門博士韓愈謹載拜奉書尚書大尹閣下載或作再古字通用或無尚書二字愈來京師於今十五年所見公卿大臣不可勝數皆能守官奉職無過失而巳未見有赤心事上憂國如家如閣下者或無如家二字今年巳來不雨者百有餘日種不入土野無青草而盜賊不敢起榖價不敢貴百坊百二十司六軍二十四縣之人皆若閣下親臨其家老姦宿贓銷縮摧沮魂亡魄喪影滅迹絶非閣下條理鎮服宣布天子威德其何能及此愈也少從事於文學見有忠於君孝於親者雖在千百年之前猶敬而慕之况親逢閣下得不候於左右以求效其懇懇謹獻所為文兩卷凡十五篇謹或作請非敢以為文也以為謁見之資也進退惟命愈恐懼再拜賀徐州張僕射白兔狀或注建封字狀或作書云伏聞今月五日營田巡官陳從政獻瑞兔毛質皎白天馴其心皎或作全或作皎其始實得之符離安阜屯安阜方求名如唐孟元揚董作西華屯是也今按下云得之軍田則此屯字乃屯田之屯也屯之役天朝行遇之迫之弗逸人立而拱屯或作田弗或作不竊惟休咎之兆天所以啓覺于下依類託喻事之纎悉不可圗驗非睿智博通孰克究明愈雖不敏請試辨之或無愈雖不敏一語兔隂類也又窟居狡而伏逆象也今白其色絶其群也馴其心化我德也人立而拱非禽獸之事革而從人且服罪也得之符離符離實戎國名又附麗也戎方從閣杭本作我名下注絶句二字麗或作離今按實我國名不成文理漢書衛青傳討涌泥破符離晉均日二王號也所謂戎國從或取此不在農夫之田而在軍田武德行也不戰而來之之道也有安阜之嘉名焉道下方無也字安阜或作革附或作安附嘉方作喜又無名字皆非是伏惟閣下股肱帝室藩垣天下方無閣下字四方其有逆亂之臣未血斧鑕之屬畏威崩析歸我乎哉其事兆矣諸本多如此嘉祐杭本亦然方本之屬作其屬屬下句析作析云漢終軍傳野獸井角明同本也衆支內時示無外也殆將有解編髮前左祍而蒙化者又王夢謂論今南師獲白虎偃武興文之應也獲之者張武張而猛也公言蓋祖此今按嘉祐諸本之析二字文理分明方氏但據蜀本而不復著諸本之同異其所定又皆誤蓋其屬師我事小不足言不若逆亂之臣歸我之為大而可願也崩折亦不成文若用論語分崩離折之語則當從木若用史記折而入於魏之語則當從手二義皆通然既有崩字則似本用論語中字也是宜具迹表聞以承答天意小子不惠猥以文句微識蒙念或無不惠二字念方從文苑作合全無文理云睹兹盛美焉敢避不讓之責而默默耶方從杭蜀苑作默貨也亦不成文理愈再拜上兵部李侍郎書蜀本生異字或作異非是十二月九日將仕郎守江陵府法曹參軍韓愈謹上書侍郎閣下愈少鄙鈍於時事都不通䁱家貧不足以自活應舉覔官凡二十年矣薄命不幸動遭讒謗進寸退尺卒無所成性本好文學好或作喜因困厄悲愁無所告語遂得究窮於經傳史記百家之説沈潛乎訓義反復乎句讀礱磨乎事業而奮發乎文章凡自唐虞巳來編簡所存大之為河海髙之為山嶽文苑作泰山與上下句不類非是方從三本云明之為日月幽之為鬼神纎之為珠璣華實變之為雷霆風雨竒辭奧旨靡不通逹惟是鄙鈍不通曉於時事學成而道益窮年老而智益困智或作身私自憐悼悔其𥘉心髮秃齒豁不見知已夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難為聽而識之者難遇也難為屬上句為或作其則屬下句云伏以閣下內仁而外義行髙而德巨尚賢而與能哀窮而悼屈方本仁下賢下無而字今諸此上下四句本或皆有而字者為正或皆無之或上二句無而下二句有者亦通而方本必於其第一第三句去之使其參差齟齬而不可讀以為古則不淳從為今則不響不識其何意也自江而西既化而行矣今者入守內職為朝廷大臣當天子新即位汲汲於理化之日出言舉事宜必施設宜或作計既有聽之之明又有振之之力寧戚之歌􅎦子紅切􅎦明鄭大夫明之言不發於左右則後而失其時矣謹獻舊文一卷扶樹教道有所明白南行詩一卷舒憂娛悲雜以瓌怪之言時俗之好所以諷於口而聽於耳也如賜覽觀亦有可采干黷嚴尊伏增惶恐愈再拜答尉遲生書下或注汾字愈白尉遲生足下或無愈白二字夫所謂文者必有諸其中是故君子愼其實實之美惡其發也不掩本深而末茂形大而聲宏行峻而言厲心醇而氣和昭晣者無疑優遊者有餘體不備不可以為成人辭不足不可以為成文愈之所聞者如是有問於愈者亦以是對今吾子所為皆善矣謙謙然若不足而以徴於愈愈又敢有愛於言乎抑所能言者皆古之道古之道不足以取於今吾子何其愛之異也或無復出古之道三字賢公卿大夫在上比肩始進之賢士在下比肩彼其得之必有以取之也也上方無之字子欲仕乎其往問焉皆可學也若獨有愛於是而非仕之謂則愈也嘗學之矣請繼今以言答楊子書方云此書答楊敬之凌之子也所謂逺其兄甚者謂誨之誨之馮之子柳子厚所為説車者也辱書并示表記述書辭等五篇比於東都略見顔色未得接言語心固巳相竒但不敢果於貌定果於或作果以知人堯舜所難又嘗服宰豫之誡故未敢決然決亦不敢忽然忘也舜方作帝到城巳來不多與人還往友朋之中所敬信者平昌孟東野東野吃吃説足下不離口崔大敦詩不多見每每説人物亦以足下為處子之秀近又得李七翶書亦云足下之文逺其兄甚李下或無七字甚下或有矣字夫以平昌之賢其言一人固足信矣况又崔與李繼至而交説邪故不待相見相信巳熟既相見不要約巳相親審知足下之才充其容也今辱書乃云云是所謂以黃金注重外而內惑也然恐足下少年與僕老者不相類尚須驗以言故具白所以而今而後不置疑於其間可也所以下或復有以字非是間上方無其字若曰長育人才則有天子之大臣在若僕者守一官且不足以修理况如是重任邪學問有暇幸時見臨愈白至鄧州北寄上襄陽于相公書或注順字音迪伏蒙示文武順聖樂辭唐德宗以後方鎮多製樂舞以獻頔獻順聖樂曲其曲將半行綴皆伏一人舞于中又令女妓為佾舞雄健壯妙號文武順聖樂天保樂詩讀蔡琰胡笳辭詩後漢蔡琰字文姫中郎將雍之女興平中沒於南胸奴十二年移族從并與京兆書保或作寶移族從以下八字方從閣杭本如此云頔丗雄朔易時移群從古數為京兆人以書修敬於京兆尹李實劉夢得集有代李井答書可考諸本或以從并為徙并非也今按劉集代實答頔第二書也其曰移族從者頔與京兆書外别有移群從書移非移居之移乃移文之移蓋始去其舊鄉故移書以曉其宗族群從也自幕府至鄧之北境凡五百餘里自庚子至甲辰凡五日庚上或無自字手披目視口詠其言心惟其義且恐且懼忽若有亡不知鞍馬之勤道途之逺也夫澗谷之水深不過咫尺丘垤之山髙不能踰尋丈人則狎而玩之人則方作則人或無則字及至臨泰山之懸崖窺巨海之驚瀾莫不戰掉悼栗眩惑而自失悼或作悸或作惶或作憚方云説文悼懼也陳楚謂懼曰悼陸士衡表五情震悼所觀變於前所守易於內亦其理宜也閣下負超卓之竒材蓄雄剛之俊德渾然天成無有畔岸而又貴窮乎公相威動乎區極區或作樞天子之毗諸侯之師故其文章言語與事相侔憚赫若雷霆浩汗若河漢正聲諧韶護徑氣沮金石憚赫或作變化方云閣蜀録粹皆作燀赫字小訛也憚丹末切與怛同莊子聲侔鬼神憚赫千里豐而不餘一言約而不失一辭其事信其理切孔子之言曰有德者必有言信乎其有德且有言也或無之言字揚子雲曰商書灝灝爾周書噩噩爾信乎其能灝灝而且噩噩也雲下或有言字昔者齊君行而失道管子請釋老馬管仲隰朋從威公伐孤竹迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道見韓子而隨之隨上方無而字樊遲請學稼孔子使問之老農夫馬之智不賢於夷吾農之能不聖於尼父然且云爾者聖賢之能多農馬之知專故也然下或有則字非是今愈雖愚且賤其從事於文實專且久則其贊王公之能而稱大君子之美不為僣越也伏惟詳察愈恐懼再拜為分司郎官上鄭尚書相公啓愈啓伏蒙仁恩猥賜示問猥或作俯方無今按言猥若俯者事上之禮無者非是感戴戰悚若無所容措悚或作猥然尚有厥誠須盡露於左右者敢避其煩黷懷不滿之意於受恩之地哉方無厥誠字黷或作瀆字通用方作默則訛矣又連下句讀之其誤益甚愈幸甚三得為屬吏朝夕不離門下出入五年方從杭蜀本無入字今按出入漢人語多有之公作襄陽盧承志亦云出入十年方誤矣竊目計較受與報不宜在門下諸從事後較或作惟故事有當言未賞敢不言有不便於己輒吐私情閣下所宜憐也方從問本無於字非是分司郎官職事惟祠部為煩且重愈獨判二年日與宦者為敵相伺候罪過惡言詈辭狼藉公牒不敢為恥實慮陷禍故前者懷狀乞與諸郎官更判意雖甚專事似率爾言語精神不能自明不蒙察允遽以慙歸僶俯日日遂踰纍旬私圖其宜敢以病告鳲鳩平均歌於國風從事獨賢雅以怨刺伏惟俯加憐察幸甚幸甚閣無俯字録無俯察二字俯或作特今按得失之意巳論於篇首矣愈再拜為河南令上留守鄭相公啓愈啓愈為相公官屬五年辱知辱愛伏念曽無絲毫事為報答效方從三本無伏字日夜思慮謀畫以為事大君子當以道不宜苟且求容恱故於事未嘗敢疑惑宜行則行宜止則止止方並作尓按對上句行字義當作止方本無理不詞今改從衆受容受察不復進謝閣杭本無受容字非是自以為如此真得事大君子之道方無之字今雖蒙沙汰為縣固猶在相公治下未同去離門牆為故吏為形迹嫌疑改前所為以自踈外於大君子固當不待煩説於左右而後察也外下方從三本無於字非是人有告人辱罵其妹與妻為其長者得不追而問之乎追而不至為其長者得不怒而杖之乎坐軍營操兵守禦為留守出入前後驅從者此真為軍人矣坐坊市賣餅又稱軍人則誰非軍人也愚以為此必姦人以錢財賂將吏盜相公文牒竊注名姓於軍籍中以陵駕府縣此固相公所欲去奉法吏所當嫉雖捕繫杖之未過也陵駕方云字見選沈休文論嫉下或有矣字未上方從三本無之字非是未下或有至字或作不至過昨聞相公追捕所告受辱罵者愚以為大君子為政當有權變始似小異要歸於正耳軍吏紛紛入見告屈為其長者安得不小致為之之意乎長下方從三本無者字非是未敢以此仰疑大君子及見諸從事説則與小人所望信者少似乖戾雖然豈敢生疑於萬一方無於字必諸從事與諸將吏未能去朋黨心蓋覆黤黮上塢感切下它感切甚黑也劉伶客至詩黤黮元夜隂韓曰青黑色不以真情狀白露左右小人受私恩良久安敢閉蓄以為私恨不一二陳道伏惟相公憐察幸甚幸甚受私或作私受今按私受非是然此七字為句語亦太煩又下語便有私恨字不應重復如此疑北私字是衍文也愈無適時才用漸不喜為吏得一事為名可自罷去不啻如棄涕唾無一分顧藉心方從閣本名字在罷字下而名字下更有一罷字杭本無名字可自作自可亦無下罷字今按此句諸本皆不可讀但别本作得一事為名可自罷去比閣本只移一名字去一罷字比杭本但增一名字倒一自字而文義通暢略無疑滯今從之又按此二書誤字尢多而閣杭蜀本又為特甚不知何故如此大氐公於朝廷或抵上官論時事及職事則皆如公狀之體不用古文竒語此二篇亦其類也切意讀者厭其無竒而輒改之故其多誤至此顧失大君子纎芥意如丘山重守官去官惟今日指揮愈惶懼再拜上朱文公校昌黎先生集卷之十五
