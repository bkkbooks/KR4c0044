body:
  text: 朱文公校昌黎先生外集卷之八考異音釋附順宗實録三起四月盡五月夏四月乙巳上御宣政殿册皇太子册曰建儲二者必歸於冡嗣固邦本者允屬於元良咨爾元子廣陵王某幼挺岐嶷長標洵淑佩詩禮之明訓宣忠孝之弘規居惟保和動必循道識逹刑政器合溫文愛敬奉於君親仁德聞於士庶神祗龜筮罔不協從是用命爾為皇太子於戲維我烈祖之有天下也功格上帝祚流無窮光纘洪業逮豫十葉虔恭寅畏日愼一日付爾以承祧之重勵爾以主鬯之勤以貞萬國之心以揚三善之德爾其尊師重傅親賢逺佞非禮勿踐非義勿行對越天地之耿光丕承祖宗之休烈可不慎歟時上即位巳久而臣下未有親奏對者內外盛言王伾王叔文專行斷決日有異説又屬頻雨皆以為羣小用事之應至將册禮之夕雨乃止逮行事之時天氣清朗有慶雲見識者以為天意所歸及覩皇太子儀表班行既退無不相賀至有感泣者戊申詔曰惟先王光有天下必正我邦本以立人極建儲二以承宗祧所以啓迪大猷安固洪業斯前代之令典也皇太子某體仁秉哲恭敬溫文德協元良禮當上嗣朕奉若丕訓憲章前式惟承社稷之重載考春秋之義授之匕鬯以奉粢盛爰以令辰俾膺茂典今册禮云畢感慶交懷思與萬方同其惠澤自貞元二十一年二月二十四日巳後至四月九日昧爽巳前天下應犯死罪者特降從流流巳下遞減一等文武常參并州府縣官子為父後者賜勳兩轉古之所以教太子必茂選師傅以翼輔之法於訓詞而行其典禮左右前後罔非正人是以教諭而成德也給事中陸質中書舍人崔樞積學懿文守經據古夙夜講習庶協于中並充皇太子侍讀天下孝子順孫先旌表門閭者委所管州縣各加存恤庚戍封皇太子長子寧等六人為郡王癸酉當作丑贈吐蕃弔祭使工部侍郎兼御史大夫史館修撰張薦禮部尚書薦字孝舉代居深州之陸澤祖文成博學工文詞性好詼諧七登文學科薦聰眀強記歷代史傳無不貫通為太師顔真卿所稱賞遂知名大曆中江東觀察表薦之江或作浙授左司禦率府兵曹參軍兼史館修撰貞元𥘉為太常博士四年回紇求和親使送咸安公主入回紇以薦為判官改授殿中侍御史纍遷諫議大夫十一年册回紇子薦以祕書少監持節為使還久之遷祕書監二十年吐蕃贊普死以薦為工部侍郎兼御史大夫持節弔贈卒於赤嶺東回紇辟吐蕃傳歸其柩辟字恐誤前後三使異國自始命至卒常兼史職在史館二十年著宰輔傳略五服圗記寓居録靈怪集等景寅罷閩中萬安監先是福建觀察柳冕久不遷欲立事迹以求恩寵立或作以乃奏云閩中南朝放牧之地畜羊馬可使孳息請置監許之收境中畜産令吏牧其中收或作牧羊大者不過十斤馬之良者估不過數千不經時輒死又斂百姓苦之逺近以為笑至是觀察閻濟美奏罷之丁卯命焚容州所進毒藥可殺人者可或作所五月巳巳史作戊辰無五月字以杭州刺史韓臯為尚書左丞左或作右辛未史作五月巳巳以右金吾大將軍范希朝為檢校右僕射兼右神䇿京西諸城鎮行營兵馬節度使叔文欲專兵柄藉希朝年老舊將故用為將帥使主其名而尋以其黨韓泰為行軍司馬專其事主或作在甲戍以度支郎中韓泰守兵部郎中兼中丞充左右神䇿京西都柵行營兵馬節度行軍司馬賜紫乙亥追改為檢校兵部郎中職如故甲申史作丁丑以萬年令房啓為容州刺史兼御史中丞𥘉啓善於叔文之黨因相推致遂獲寵於叔文求進用或無因字叔文以為容管經略使使行約至荆南授之云脫不得荆南即與湖南故啓宿留於江陵久之方行至湖南又久之而叔文與執誼爭權數有異同故不果尋聞皇太子監國啓惶駭奔馳而往是日以郴州貟外司馬鄭餘慶為尚書左丞是日史作癸未乙酉以尚書左丞韓皋為鄂嶽觀察武昌軍節度使以尚下十八字史作以右丞韓皋為鄂嶽沔蘄團練觀察使仍曰係甲辰日𥘉皋自以前輩舊人纍更重任頗以簡倨自髙嫉叔文之黨謂人曰吾不能事新貴人皋從弟曄幸於叔文以告叔文故出之辛卯以王叔文為户部侍郎職如故賜紫𥘉叔文欲依前帶翰林學士宦者俱文珍等惡其專權削去翰林之職叔文見制書大驚謂人曰叔文日時至此商量公事若不得此院職事即無因而至矣王伾曰諾即疏請不從再疏乃許三五日一入翰林去學士名又與歸登同日賜紫內出衫笏賜登而叔文不霑文珍等所惡獨不得賜今按而叔文下數句重復不可讀疑因後來修改巳增新字而不去舊文如前買乳母之例也蓋上文巳有俱交珍等惡其專權之句則此不當更有文珍等所惡五字有不霑字即不當更有獨不得賜四字若并有此九字即上不當有不霑字且此文珍等字上亦合更有脫字謬誤甚明今當削去文珍等以下九字則語意明白無復可疑矣由此始懼以衢州别駕令狐峘為祕書少監峘國子祭酒德棻玄孫進士登第司徒楊綰未逹時遇之以為賢為禮部修史引峘入史館自華原尉拜拾遺纍遷起居舍人大曆八年劉晏為吏部尚書奏峘為刑部貟外判南曹纍遷至禮部侍郎峘之判南曹晏為尚書楊炎為侍郎峘得晏之舉分闕必擇其善者與晏而以惡者與炎炎固巳不平至峘為禮部而炎為相有杜封者故相鴻漸之子求輔弘文生炎嘗出杜氏門下託峘以封峘謂使者曰相公欲封成其名乞署封名下一字峘因得以記焉炎不意峘賣之署名屬峘峘明日疏言宰相炎迫臣以威臣從之則負陛下不從即炎當害臣即或作則德宗以問炎炎具道所以德宗怒曰此姦人不可奈欲杖而流之炎救解乃黜為衡州别駕貞元𥘉李泌為相以左庶子史館修撰徴至則與同職孔述睿爭競細碎數侵述睿述睿長告以讓不欲爭告或作者長告謂長假也泌卒竇參為相惡其為人貶吉州别駕改吉州刺史齊映除江西觀察過吉州峘自以前輩懷怏怏不以刺史禮見入謁從容步進不祙首屬戎器或無祙字或又作秣非是映以為恨去至府奏峘舉前刺史過失鞫不得真無政事不宜臨郡貶衢州别駕上即位以祕書少監徴未至卒峘在史館修玄宗實録一百卷撰代宗實録三十卷雖頗勤苦然多遺漏不稱良史𥘉德宗將厚奉元陵事峘時為中書舍人兼史職奏疏諌請薄其葬有答詔優獎元和三年以修實録功追贈工部尚書是月以襄州為襄府按元和郡國志作襄陽大都督府襄下當有陽字徙臨漢縣於古城曰鄧城縣朱文公校昌黎先生外集卷之八
