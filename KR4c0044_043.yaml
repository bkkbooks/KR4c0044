body:
  text: 芍藥歌方以蜀本刪去今恐是公少作姑存之丈人庭中開好花更無凡木爭春華翠莖紅蘂天力與此恩不屬黃鍾家溫馨熟美鮮香起似笑無言習君子霜刀翦汝天女勞何事低頭學桃李嬌癡婢子無靈性競挽春衫來比並靈性或作性靈欲將雙頰一睎紅緑窗磨遍青銅鏡睎或作稀一樽春酒甘若飴音怡丈人此樂無人知花前醉倒歌者誰楚狂小子韓退之海水水下方有詩字海水非不廣鄧林列子夸父逐日竭欲得飲云云膏肉所浸生鄧林鄧林彌廣數千里焉豈無枝風波一蕩薄魚鳥不可依海水饒大波鄧林多驚風豈無魚與鳥巨細各不同海有吞舟鯨鄧有垂天鵬苟非鱗羽大蕩薄不可能我鱗不盈寸我羽不盈尺一木有餘隂一泉有餘澤我將辭海水濯鱗清冷池我將辭鄧林刷羽蒙籠枝海水非愛廣鄧林非愛枝風波亦常事鱗羽自不宜或作不自疑我鱗日巳大我羽日巳修風波無所苦還作鯨鵬遊贈崔立之此篇方從文苑昔者十日雨子桑苦寒飢哀歌坐空屋不怨但自悲桑苦寒或作來寒且方云考莊子實作子桑屋或作房其友名子輿忽然憂且思褰裳觸泥水裹飯往食之入門相對語天命良不疑好事漆園吏書之存雄辭千年事巳逺二子情可推我讀此篇日正當雨雪時吾身固巳困吾友復何為薄粥不足裹深泥諒難馳曽無子輿事空賦子桑詩或無此二句贈河陽李大夫四海失巢穴兩都困塵埃感恩由未報惆悵空一來由未或作未能方作能未今按由猶古字通裘破氣不暖馬羸鳴且哀裘破或作破裘氣或作竟馬羸或作羸馬主人情更重空使劒鋒摧苦寒歌黃昏苦寒歌夜半不能休夜半或作半夜豈不有陽春節歲聿其周或作歲聿不其周節歲或作歲節君何愛重裘兼味養大賢何愛下疑有脫字養或作成字冰食葛製神所憐神所或作誠可填窗塞戶愼勿出暄風暖景明年日或作需明年非是贈同遊者巳見正集請遷玄宗廟議方從蜀本舊志或無庿字非是方云舊史禮儀志長慶四年五月禮儀使奏樊云時穆宗當祔公豈以吏部侍郎為禮儀使邪右禮儀使奏謹按周禮天子七廟三昭三穆與太祖之廟而七尚書咸有一德亦曰七丗之廟可以觀德尚書至觀德十六字舊史闕荀卿子曰有天下者祭七代有一國者祭五代或無卿字日上或有亦字祭七代或作事七丗祭五代或作事五出或作祭五庿則知天子上祭七廟典籍通規祖功宗德不在其數庿或作代國朝九廟之制法周之文太祖景皇帝始為唐公肇基天命義同周之后稷髙祖神堯皇帝創業經始化隋為唐義同周之文王太宗文皇帝神武應期造有區夏義同周之武王應或作膺武王下或有也字其下三昭三穆謂之親廟與太祖而七四時常饗自如禮文伏以今年宗廟遞遷玄宗明皇帝在三昭三穆之外是親盡之祖雖有功德新主入廟禮合祧藏太廟中第一夾室每至禘祫之歲合食如常藏下或有遷字或作祧遷藏太庿中中下或有從字謹議范蠡招大夫種詩之序議三器論此二篇方從蜀本刪去今從之朱文公校昌黎先生外集卷之一
