seq: 43
front:
  text: 是命烜氏候清夜或將祀圎丘於玄冬或將祭方澤於朱夏祀方作祭祭或作祀持鑑而精氣韓曰淮南子積隂之寒氣為水水氣之精者為月旁射照月而隂靈樊曰謝莊月賦日以陽德月以隂靈潛下視而不見謂合道於希夷挹之則盈方同功於造化應於有生於無生或作聲形象未分徒騁離婁之目光華暗至如還合浦之珠既齊芳於酒醴詎比賤於潢汚芳方作髙云禮夏尚明水商尚醴周尚酒今作齊芳非今按明水當在酒醴之上不應反言齊髙此蓋以其都無臭味嫌不足於芬芳故有齊芳之語方説非是明德惟馨玄功不宰于以表誠潔于以戒荒怠苟失其道殺牛之祭何為如得其宜明水之薦斯在宜方作情薦或作為不引而自致不行而善至雖辭麴蘖之名實處樽罍之器降於圎魄殊匪金莖之露出自方諸乍似鮫人之淚匪或作非露或作靈乍方作巳將以贊于隂德配夫陽燧音遂配上或有非獨二字夫或作于夜寂天清煙消氣明桂華吐耀兔影騰精兔影或作玉兔騰方作流聊設監以取水伊不注而能盈霏然而象的爾而呈始漠漠而霜積漸微微而浪生而象或作垂象或作無象的方作酌漠漠而方作茫茫以豈不以德協于坎同類則感形藏在空氣應則通同方作有今按同類與氣應對屬差互恐當作類同在或作於鶴鳴在隂之理不謬虎嘯于谷之義可崇理方作論虎方作武義方作道今按作虎為是但當時程試避諱當作武耳足以驗聖賢之無黨知天地之至公足以驗聖賢方作庶令知聖真黨或作窮知方作驗竊比大羮之遺味幸希薦於廟中
