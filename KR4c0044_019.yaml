front:
  text: 朱文公校昌黎先生集卷之十九考異音釋附
  hash: sha256:34ecc2b135b46207f0ac58c205602eb64d3fe0e18d2591723057df1903e32134
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_019-1a}
body:
  text: 書序與鄭相公書鄭餘慶時鎮興元再奉示問皆緣孟家事樊日元和九年三月以鄭餘慶為興元尹餘慶辟孟郊參謀郊挈其妻行至閬鄉暴卒辭旨惻惻憂慮深逺竊有以見大人君子篤於仁愛終始不倦伏讀感欷不知所喻舊與孟往還數人昨巳共致百千巳來尋巳至東都計供葬事外尚有餘資今裴押衙所送二百七十千足以益業為遺孀音霜樊日是歲十月葬郊其費皆出鄭相及東野舊往還者以其餘財贍給其家郊元子妻鄭氏永久之賴孟氏兄弟在江東未至先與相識亦甚循善所慮才幹不足任事鄭氏兄弟惟最小者在東都固如所示不可依仗孟之深友太子舍人樊宗師孟下或有氏字比持服在東都今巳外除經營孟家事不啻如巳前後人所與及裴押衙所送錢物並委樊舍人主之營致生業必棄絶之罪於門下誠不忍竒寶橫棄道側而閣下篋櫝尚有少闕不滿之處猶足更容輒冒言之退增汗懾篋或作匱方云無闕字謹狀與鄂州柳中丞書公綽時觀察鄂嶽淮右殘孽尚守巢窟或作窟巢環寇之師殆且十萬瞋目語難方云此用莊子語杭蜀本作難語非自以為武人不肯循法度頡頑作氣勢竊爵位自尊大者肩相磨地相屬也不聞有一人援桴鼓誓衆而前者但日令走馬來求賞給助寇為聲勢而已日方作月閣下書生也詩書禮樂是習仁義是修法度是束一旦去文就武鼓三軍而進之陳師鞠旅親與為辛苦慷慨感激同食下卒將二州之牧樊日元和十年詔公綽以兵五千隸安州刺史李聽討吳元濟公綽曰朝廷謂吾書生不知兵耶請自行許之引兵渡江扺安州聽以軍禮迎謁公綽謂日以公丗將曉兵吾且欲署聀以兵法從事聽日唯命以都知兵馬使中軍先鋒行營都虞候三牒受之選卒六千屬聽戒其部將日行􅩌事一央都將聽𬒳恩威遂盡力當時服其知權十􅌰家有疾病公綽厚給之人皆感激故每戰皆捷以壯士氣斬所乘馬樊日公綽所乘馬躡殺圉人公綽命殺馬以祭或日圉人不自備耳良馬可惜公綽日材良性駑必殺之補注柳氏敘訓及新舊唐史並以殺馬為公綽為襄陽莭度使時事司馬溫公考異正引公此書證之去乃鄂嶽時事以祭踶大計切又徒兮切一作蹄漢武帝詔馬奔踶而致千里死之士雖古名將何以加兹此由天資忠孝欎於中而大作於外動皆中於機會以取勝於當丗而為戎臣師豈常習於威暴之事而樂其鬪戰之危也哉愈誠怯弱不適於用聽於下風竊自增氣誇於中朝稠人廣衆會集之中或無會集二字所以羞武夫之顔令議者知將國兵而為人之司命者不在彼而在此也而在方無而字臨敵重愼誡輕出入良用自愛以副見慕之徒之心而果為國立大功也幸甚幸甚不宣食或作用非是或無之徒二字方無下之字愈再拜又一首愈愚不能量事勢可否比常念淮右以靡弊困頓三州之地蛟蚋蟻蟲之聚感凶竪喣濡飲食之惠提童子之手坐之堂上奉以為帥出死力以抗逆明詔戰天下之兵乘機逐利四出侵暴屠燒縣邑賊殺不辜環其地數千里莫不𬒳其毒洛汝襄荆許潁淮江為之騷然丞相公卿士夫夫勞於圖議啚或作國兆是握兵之將熊羆貙虎之士畏懦蹙將六切促也蹜莫肯杖戈為士卒前行者獨閣下奮然率先楊兵界上將二州之守親出入行間與士卒均辛苦生其氣勢見將軍之鋒頴凛然有向敵之意用儒雅文字章句之業取先天下武夫關其口而奪之氣愚𥘉聞時方食不覺棄七箸起立豈以為閣下真能引孤軍單進與死寇角逐爭一旦僥幸之利哉真或作直非是或無單字就令如是亦不足貴其所以服人心在行事適機宜而風采可畏愛故也是以前狀輒述鄙誠眷惠手翰還答益增欣悚惠下或有賜字夫一衆人心力耳目使所至如時雨三代用師不出是道閣下果能充其言繼之以無倦得形便之地甲兵足用雖國家故所失地旬歲可坐而得歲或作月况此小寇安足置齒牙間勉而卒之以俟其至幸甚夫逺徴軍士行者有羇旅離别之思居者有怨曠騷動之憂本軍有饋餉煩費之難地主多姑息形迹之患急之則怨緩之則不用命浮寄孤懸形勢銷弱又與賊不相諳委臨敵恐駭難以有功若召募土人召或作占必得豪勇與賊相熟知其氣力所極無望風之驚愛護鄉里勇於自戰徴兵滿萬不如召募數千閣下以為何如儻可上聞行之否計巳與裴中丞相見行營事宜不惜時賜示及幸甚不宣愈再拜答魏博田僕射書季冬極寒伏惟僕射尊體動止萬福即日愈蒙􅊵蒙恩改職事不任感懼諸本無蒙􅊵二字方從閣本今按蒙免者蒙田之庇而得遣免也連上文為句蒙恩者蒙上於久故遊從之中伏蒙恩奬知待最深最厚無有比者方無伏字比或作倫懦弱昏塞不能奮勵出竒少答所遇拜辭之後切念旬朔不即獲侍言笑東望殞涕有兒女子之感或無子字方云史記非兒女子所知為兒女子所詐當有子字獨宿直舍無可告語展轉歔欷不能自禁華州雖實百郡之首重於藩維然閣下居之則為失所愚以為苟慮有所及宜密以上聞不宜以踈外自待不下或無宜字接過客俗子絶口不桂時事務為崇深以拒止嫉妬之口親近藥物方書動作步超以致和宣滯為國自愛副鄙陋拳拳之心幸甚幸甚謹奉狀不宣愈再拜尹不臺參答友人書或作與友人論京尹不臺參書洪日長慶三年六月以公為京兆尹兼御史大夫敕放臺參後不得為例按魏氏春秋云故事御史中丞與洛陽令相遇則分路而行以士主多逐捕不欲稽留然非唐制也順宗實録云故事尹與御史相遇尹下道避尹尚避御史豈有不臺參之理當時敕放臺參後不為例則知故事須臺參也唐本事須臺參下云亦是何典故赤令尚與中丞分道而行何况京尹聖恩以為然便令宣與李紳不用臺參今本顚倒不可讀當從唐本樊日時宰相惡御史中丞李紳欲逐之特詔公不臺參以激紳二果劾奏公公以詔自解文刺紛然宰相以臺府不協遂罷公為兵部侍郎而出紳為江西觀察使紳朝辝位訴帝復留紳為兵部侍郎公復為吏部按正元十八年公為四門博士時薦士十人於陸傪李紳在焉紳昧其平昔之薦而劾公公既不言而丗亦未有辨之者又謂公蹙紳以附逢吉獨王黃州答丁晉公書以謂曲在紳蓋公論也所示情眷之至不勝悚荷臺參實奏云容桂觀察使帶中丞尚不臺參或無使字京尹郡國之首所管神州赤縣官帶大夫豈得却不如事須臺參聖恩以為然便令宣與李紳不用臺參亦是何典故赤令尚與中丞分道而行何况京尹方云吕丞相本改定亦是以下十九字綴於事須臺參之下仍於却不如下添中丞二字慶善云今本顚倒不可讀當從唐本不知洪所謂唐本者何本也閣杭蜀本只同今文姑以闕疑可也一日不用臺參巳下當再出臺參二字義亦自通今按二説皆未安後説雖差勝然文意似亦未足當闕之以俟知者人見近事習耳目所熟稍殊異即怪之其於道理有何所傷聖君使行即是故事自古豈有定制也停推巡緣府中𥚹迫是實若别差人即是妄説豈有此事小人言不可信類如此亦在大賢斟酌而斷之流言止於智者正謂此耳客多自修報狀不得或作不及自修報或作不及修報狀伏惟照察照方作昭今按唐人書帖用照察字亦多送陸歙州詩序或無詩字或作送陸貟外出刺歙州詩并序方云陸傪也洪云一本自此下為第二十卷貞元十八年二月十八日祠部貟外郎陸君出刺歙州朝廷夙夜之賢都邑遊居之良齎咨涕洟咸以為不當去歙大州也刺史尊官也由郎官而往者前後相望也當今賦出於天下江南居十九宣使之所察歙為富州宰臣之所薦聞天子之所選用其不輕而重也較然矣如是而齎咨涕洟以為不當去者陸君之道行乎朝廷則天下望其賜刺一州則專而不能咸咸或作或而屬下句方從閣本作咸而屬上句今按莊子有周遍咸之語方本得之先一州而後天下豈吾君與吾相之心哉先上諸本有謂字方從閣本云杭本訛咸作或然尚無謂字蜀本始作或為今本易為作謂訛轉甚也於是昌黎韓愈道願留者之心而泄其思作詩曰我衣之華兮我佩之光陸君之去兮誰與翶翔諸本如此方從閣杭本光翔下皆有兮字去下無兮字今按古詩賦有句二用韻及語助者賡歌是也有隔句用韻及兮而兮在上句之未韻在下句之末者騷經是也有隔句用韻而上句不韻不兮下句押韻有兮者橘頌之類是也今此詩方本若用賡敬之例則華光有弓而不韻其去字一句又并無也若用騷經之例則光翔當用韻而不當有兮華雖可以有兮而去復不可以無兮也若用橘頌之例則下三句為合而首句不當有兮也韓公深於騷者不應如此蓋方所從之本失之也今定從諸本以騷經及賈誼吊屈首章為例若欲以橘頌為例則止去方本首句一兮字尤為簡便但無此本不敢以意創耳斂此大惠兮施于一州今其去矣胡不為留我作此詩歌于逵道無疾其驅天子有詔送孟東野序大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趍也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得巳者而后言其歌也有思其哭也有懷凡出乎口而為聲者其皆有弗平者乎樂也者欎於中而泄於外者也擇其善鳴者而假之鳴金石絲竹匏土革木八者物之善鳴者也維天之於時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推􅐁其必有不得其平者乎鳥下方從閣本有獸字非是敓古奪字或作奪其於人也亦然人聲之精者為言文辭之於言又其精也方從閣杭蜀本去又字而取下句尢字足戓一句不成文理説見下條尤擇其善鳴者而假之鳴按上文巳再言擇其善鳴者而假之鳴矣則此又言人聲之精者為言而文詞又其精者故尤擇其善鳴者而假之鳴又字尤字正是關鍵血脈首尾相應處方以三本之誤遂去又字而以尤字屬上句不唯此句不成文理又使此篇語無次第其誤尤甚今悉正之其在唐虞咎陶禹其善鳴者也而假以鳴在下或有於字假下或有之字夔弗能以文辝鳴又自假於韶以鳴弗方作不而無能字夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而逺傳曰天將以夫子為木鐸其弗信矣乎其末也莊周以其荒唐之辝鳴辝或作説下或有於楚二字方云莊子蒙人蒙梁地也且辝楚威王之䀻未嘗仕於楚也楚大國也其亡也以屈原鳴臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老聃申不害韓非眘到田駢鄒衍户佼音絞又古爻切魯人啇君師之鞅死入蜀著書二十篇號户子孫武張儀蘇秦之屬皆以其術鳴秦之興李斯鳴之漢之時司馬遷相如揚雄最其善鳴者也其下魏晉氏鳴者不及於古然亦未嘗絶也其下方無其字然亦未嘗絶也諸本皆有此句方從閣本刪去今按有此一句文意乃足閣本脫也就其善者其聲清以浮其節數以急其辝淫以哀其志弛以肆善下或有鳴字浮方從諸本作淳唯蜀本及文苑作浮今按此數句皆言魏晉以下文章之病不應用淳字以美之諸本皆誤數以急弛以肆二句諸本皆如此方從謝本刪去二以字今按自其聲至此四句當為二列其苐二苐四句古本偶皆脫一字而方必從之遂使句之短長參差不齊而不可讀正與上李巽書相似其意以為必如是然後為古而不知所謂古者不在是也其為言也亂雜而無章將天醜其德莫之顧邪何為乎不鳴其善鳴者也諸本如此方從閣本以亂為詞又從閣杭本刪去將天以下十九字今按方本極無理蓋因亂而誤為辝又因辝而轉作詞耳今當改詞為亂又輔十九字文意乃足唐之有天下陳子昻蘇源明元結李白杜甫李觀皆以其所能鳴其存而在下者孟郊東野始以其詩鳴其髙出魏晉不懈而及於古其他浸淫乎漢氏矣魏晉方作晉魏或無古字氏矣方從閣本無此二字皆非是從吾遊者李翶張籍其尤也三子者之鳴信善矣方無信字或作善鳴皆非是左傳云克巳復禮仁也信善哉公雖未必用此語然亦偶合也抑不知天將和其聲而使鳴國家之盛邪抑將窮餓其身思愁其心腸而使自鳴其不幸邪三子者之命則懸乎天矣方從閣杭蜀苑則下有有字非是若果有有字即天下當有者字更詳之其在上也奚以喜其在下也奚以悲東野之役於江南也有若不釋然者故吾道其命於天者以解之釋或作懌然者方作者然云顧命王不懌或作不釋釋猶開釋也按嘉祐本作不釋然者其語本出莊子方與或本皆誤也以解方無以字非是送許郢州序或作送許史君刺郢州序仍注仲輿二字或作志雍樊云志雍安陸許氏貞元九年進士終監察御史愈嘗以書自通於于公纍數百言公下或有頔字其大要言先逹之士得人而託之則道德彰而名問流後進之士得人而託之則事業顯而爵位通要下或有也字問或作聞下有矜乎能上有矜乎位雖恆相求而喜不相遇于公不以其言為不可復書曰足下之言是也諸本無喜字方從閣杭蜀苑得之于公身居方伯之尊蓄不丗之材而能與卑鄙庸陋相應答如影響是非忠乎君而樂乎善以國家之務為巳任者乎丗下或有出字出下或有羣字愈雖不敢私其大恩抑不可不謂之知巳恆矜而誦之情巳至而事不從小人之所不為也故於使君之行道刺史之事以為于公贈凡天下之事成於自同而敗於自異為刺史者恆私於其民不以實應乎府為觀察使者恆急於其賦不以情信乎州繇是刺史不安其官觀察使不得其政財巳竭而斂不休人巳窮而賦愈急其不去為盜也亦幸矣賦方作怒以上下文考之非是誠使刺史不私於其民觀察使不急於其賦方無下其字以上句考之非是刺史曰吾州之民天下之民也惠不可以獨厚觀察使亦曰某州之民天下之民也斂不可以獨急如是而政不均令不行者未之有也以獨急或無以字其前之言者于公既巳信而行之矣今之言者其有不信乎前下方無之字非是今疑其字當作某縣之於州猶州之於府也有以事乎上有以臨乎下同則成異則敗者皆然也非使君之賢其誰能信之信方作從以上文考之非是愈於使君非燕遊一朝之好也故其贈行不以頌而以規送竇從事序踰甌閩而南皆百越之地甌方作越以下文重出越字考之非是或無甌字亦非越或作粵於天文其次星紀其星牽牛連山隔其隂巨海敵其陽敵一作歊氣上蒸也方從閣苑作𫾣云敲橫擲也謂巨海𫾣蕩其南也今按𫾣徴扣也字書訓以橫擲而漢書注又訓擲為發動蓋不以杖末奮擊但以杖身徴扣而發動之所謂橫擲也海之為物最巨其所震蕩豈徴扣之謂邪閣本蓋誤而方必為曲説以附之殊不可曉作歊亦非是但當作敵乃當抵對捍之意與上句隔字正相對也是維島居卉服之民風氣之殊著自古昔氣方從閣蜀本作俗今按島居卉服巳見其民俗之陋因又言此以見其風氣之惡自是兩事故下文云民俗既遷風氣亦隨也閣蜀皆誤古方作在非是唐之有天下號令之所加無異於逺近民俗既遷風氣亦隨雪霜時降癘疫不興瀕海之饒固加於𥘉疫或作疾方云瀕濵也篆文無賔字漢志瀕南山又瀕河十郡只用類字加於方作如其今以上文考之此當言其氣俗既變生物益蕃之意若云固如其𥘉則却是未曽變矣方本非是是以人之之南海者若東西州焉之之諸本無復出之字方從閣杭蜀苑得之若或作如皇帝臨天下二十有二年臨下或有御字詔工部侍郎趙植為廣州刺史盡牧南海之民署從事扶風竇平平以文辝進於其行也其族人殿中侍御史牟合東都交遊之能文者二十有八人賦詩以贈之於是昌黎韓愈嘉趙南海之能得人壯從事之答於知我不憚行之逺也我或作巳行之逺文苑如此諸本之或作於或作我於行逺方無行之二字皆非是又樂貽周之愛其族叔父能合文辝以寵榮之作送竇從事少府平序貽上或有其宗二字上巳日燕太學聽彈琴詩序與衆樂之之謂樂樂而不失其正又樂之尤也尤方從閣本作光四方無鬪爭金革之聲京師之人既庶且豐天子念致理之艱難樂居安之間暇肇置三令節洪曰舊史云貞元四年九月詔正月晦日三月三日九月九日三節日冝任文武官僚選勝地追賞為樂五年正月詔以二月一日為中和節代正月晦日備三令節數此序在正元壬午癸未間公為四門博士其云肇置三令節蓋謂德宗朝始置耳詔公卿羣有司至于其日率厥官屬飲酒以樂所以同其休宣其和感其心成其文者也方無屬字三月𥘉吉實惟其時司業武公下或有少儀二字於是總太學儒官三十有六人列燕于祭酒之堂樽爼既陳肴羞惟時盞犖序行獻酬有容歌風雅之古辭斥夷狄之新聲褒衣危冠與與如也與與或作愈愈方從杭蜀本云詩我黍與與淮南子善用兵者陵其與與皆音餘今按論語有此全句有儒一生魁然其形抱琴而來歷階以升儒一或作一儒以或作而坐于樽爼之南鼓有虞氏之南風賡之以文王宣父之操孫曰賡續也樊曰文王操見史記孔子學琴於師襄宣父操如將歸猗蘭龜山也優遊夷愈廣厚髙明追三代之遺音想舞雩之詠歎及暮而退皆充然若有得也有下或有所字武公於是作歌詩以美之命屬官咸作之命四門博士昌黎韓愈序之送齊皡下第序皥或作曎方云考唐宰相丗系表當作皡古之所謂公無私者其取捨進退無擇於親踈逺邇惟其宜可焉其下之視上也亦惟視其舉黜之當否不以親踈逺邇疑乎其上之人下或有也字或無之人二字而有也字故上之人行志擇誼坦乎其無憂於下也或無故字或無之字下之人尅巳愼行確乎其無惑於上也是故為君不勞而為臣甚易見一善焉可得詳而舉也見一不善焉可得明而去也方從閣杭蜀苑無詳明二字及道之衰上下交疑於是乎舉讎舉子之事載之傳中而稱美之而謂之忠或無下而字見一善焉若親與邇不敢舉也見一不善焉若疏與逺不敢去也方無上敢字衆之所同好焉矯而黜之乃公也衆之所同惡焉激而舉之乃忠也衆下或皆有人字於是乎有違心之行有怫志之言有內愧之名若然者俗所謂良有司也然或作是膚受之訴不行於君巧言之誣不起於人矣烏呼今之君天下者不亦勞乎為有司者不亦難乎為人嚮道者不亦勤乎烏呼方云猶嗚呼也古文於乎烏呼嗚呼皆一義或作於是乎非是為有方無為字為人嚮道諸本皆同但嚮或作鄉方從閣苑以人為仁殊無文理蓋所謂人者指應舉者而言為之作嚮道者謂指引其道路所嚮如公之於侯喜侯雲長之徒是巳其作鄉者亦音向與兵書所謂以鄉人為導者音義皆不同也是故端居而念焉非君人者之過也則曰有司焉則非有司之過也則曰今舉天下人焉則非今舉天下人之過也蓋其漸有因其本有根生於私其親成於私其身以已之不直而謂人皆然其親其下或有所字其植之也固久其除之也實難非百年必丗不可得而化也非知命不惑不可得而改也巳矣乎其終能復古乎若髙陽齊生者其起豫者乎齊生之兄為時名相出藩于南之兄方元之字于下方從杭苑有鎮字公閣本無今按齊映以貞元七年由桂管改江西是時淇州只為江西觀察使至咸通中乃有鎮南之號耳杭苑皆誤朝之碩臣皆其舊交齊生舉進士有司用是連枉齊生齊生不以云乃曰我之未至也有司其枉我哉其枉或作豈枉方從閣杭蜀本得之我將利吾器而俟其時耳抱負其業東歸於家吾觀於人有不得志則非其上者衆矣亦莫計其身之短長也若齊生者既至矣而曰我未也不以閔於有司其不亦鮮乎哉既至矣方作既不得志矣今按上文曰我之未至也下文日我未也則此作至為是未下或有至字吾用是知齊生後日誠良有司也能復古者也公無私者也知命不惑者也送陳密序太學生陳密請於余曰密承訓於先生今將歸覲其親不得朝夕見願先生賜之言密將以為戒覲或作拜密來太學舉明經纍年不獲選是弗利於是科也獲下或有其字今將易其業而三禮樊日唐制取士有明經科而明經之别有五經有三經有二經有三禮有三傳有史科凡禮記春秋左氏傅為大經詩周禮儀禮為中經易尚書春秋公羊傳為小經孫曰三禮科正元五年二月置是習願先生之張之也密將以為鄉榮方無以字余愧乎其言遺之言曰子之業信習矣其容信合於禮矣其下或有儀字非是抑吾所見者外也夫外不足以信內子誦其文則思其義習其儀則行其道則將謂子君子也爵祿之來也不可辭矣科寧有利不利邪謂其習其或並無其字送李願歸盤谷序樊日東坡云歐陽公言晉無文章惟陶淵明歸去來一萹而巳余亦謂唐無文章惟韓退之送李願歸盤谷一萹而巳平生欲效此作一萹每執筆輒罷因自笑日不若且放教退之獨步唐人跋序後云云昌黎韓愈知名之士髙願之賢故敘而送之云云樊日按正元十七年歲在辛巳歐陽公集古録云當時退之官尚未顯其道未為當時所宗師故但云知名士然當時送願者為不少而獨刻此序蓋其文章巳重於時也方云此序正元十七年作公年才三十四耳太行之陽有盤谷盤谷之間泉甘而土肥草木藂茂居民鮮少或曰謂其環兩山之間故曰盤或曰是谷也宅凼而勢阻隱者之所盤旋友人李願居之盤下諸本皆有旋字珙氏石本杭本同或作桓方從樊氏石本閣蜀苑剛去今按兩石本不同説見下條友人諸本及洪氏石本皆作友方云樊氏石本作有今按校此書者以印本之不同而取正於石本今石本乃又不同如此則又未知其孰是也然以理推之則作有者為無理故今特詳著之以見所謂石本者之不足信也願之言曰人之稱大丈夫者我知之矣利澤施于人名聲昭于峕施于諸本于作於方從石本坐于廟朝進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賞怒有刑文苑賞作賜樊氏石本無此六字才畯滿前道古今而譽盛德入耳而不煩曲眉豐頰清聲而便體秀外而惠中飄輕𥚑翳長袖粉白黛緑者列屋而間居妬寵而負恃爭妍而取憐大丈夫之遇知於天子用力於當丗者之所為也天子諸本作主上方從石本為上諸本有所字方從石本刪去下文於時者之所為也同此吾非惡此而逃之是有命焉不可幸而致也窮居而間處升髙而望逺諸本如此方從石閣苑作逺望坐茂樹以終日濯清泉以自潔採於山美可茹釣於水鮮可食起居無時惟適之安蜀本及洪氏石本之作所方從苑粹樊氏石本作之今按此二石本不同又足以見所謂石本者之難信矣然以理推之作之為是諸舊本亦多同者與其有譽於前孰若無毀於其後與其有樂於身孰若無憂於其心與其下諸本並有有字方從石本刪去車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者之所為也我則行之伺候於公卿之門奔走於形勢之途足將進而趑趄口將言而囁嚅趑取私切趄音狙囁之舌切又而舌切需女居切又音如赼趄行不進貌囁需不敢出口也處穢汙而不羞觸刑辟而誅戮穢汙方從諸本作汙穢今用石本改不羞樊本作弗差辟樊石本作法徼幸於萬一老死而後止者其於為人賢不肖何如也昌黎韓愈聞其言而壯之與之酒而為之歌曰盤之中維子之宫盤之土可以稼諸本作惟子之稼方從石閣如此盤之泉可濯可沿石閣杭本沿作湘方從石本云洪氏以為作湘者石本磨滅或以閣本意之也然此文自如往而復以上皆二語一韻以稼叶土此類國多以容叶深以詩七月易恆卦小象考之亦合古韻獨湘不可與泉叶按公論語筆解以浴于沂作沿于沂政與此沿同義今只以沿為正今按方以古韻為據舍所信之石杭閣本而去相從沿其説當矣然必以筆解為説又似太拘今丗所傳筆解蓋未必韓公本真也又按洪云石本在濟源張端家皆缺裂不全惟可濯可湘一句甚明又與方引洪氏磨滅之説不同不知何故姑記之以俟知者然其大槩只為從湘字耳政使實然亦不足取其説詳於下條云盤之阻誰爭子所窈而深廓其有容繚而曲如往而復嗟盤之樂兮樂且無殃殃方從洪校石本作央又云樊本只作殃然閣杭蜀本皆作央王逸注離騷云央盡也巳也方又云此文如叢作藂俊作畯時作峕皆石本字也今按作殃於義為得又按此萹諸校本多從石本而樊洪兩石巳自不同未知孰是其有同者亦或無理未可盡信按歐公集古跋尾云盤谷序石本正元中所刻以集本校之或小不同疑刻石誤然以其當時之物姑存之以為佳玩其小大不足校也詳公此言最為通論近丗論者專以石本為正如水門記溪堂詩豫巳論之南海廟劉統軍碑之類亦然其謬可考而知也虎豹逺迹兮蛟龍遁藏鬼神守護兮呵禁不祥禁或作禦飲則食兮壽而康無不足兮奚所望則或作且膏吾車兮秣吾馬從子于盤兮終吾生以徜徉上音常下音羊猶徘徊也送牛堪序此篇或在後卷之首方從閣杭蜀本置此以明經舉者誦數十萬言又約通大義徴辝引類旁出入他經者又誦數十萬言其為業也勤矣登第於有司者去民畒而就吏祿由是進而纍為卿相者常常有之其為獲也亦大矣然吾未嘗聞有登第於有司而進謝於其門者豈有司之待之也抑以公不以情舉者之望於有司也亦將然乎門上或無其字其進而謝於其門也則為私乎抑無乃人事之未思或者不能舉其禮乎若牛堪者思慮足以及之材質足以行之而又不聞其往者其將有以哉或無將字違衆而求識立竒而取名非堪心之所存也由是而觀之若堪之用心其至於大官也不為幸矣堪太學生也余博士也博士師屬也於其登第而歸將榮於其鄉也能無説乎朱文公校昌黎先生集卷之十九
