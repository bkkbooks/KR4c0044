front:
  text: 朱文公校昌黎先生集卷之三考異音釋附
  hash: sha256:7dfe11dbec064ac83b538706ec7bd4a8e48b80115e21f9a06ea5ad7d341625a5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_003-1a}
body:
  text: 古詩河之水二首寄子姪老成河之水去悠悠我不如水東流我有孤姪在海陬或作隅方云古音隅五侯切分與流通三年不見兮使我生憂日復日夜復夜三年不見汝使我鬢髮未老而先化河之水悠悠去我不如水東注我有孤姪在海浦三年不見兮使我心苦采蕨于山緡武巾切韓曰釣魚線魚于淵方作泉今按以淵為泉避諱也依例當作􅘢我徂京師不逺其還其或作而山石山石犖確上力角切下音覺磽確也行徑微黃昏到寺蝙蝠上布田切下甫服切伏翼也一名仙鼠飛升堂坐階新雨足或作定非是芭蕉葉大支即梔字子肥僧言古壁佛畫好以火來照所見稀所見或作見所非是鋪牀拂席置羮飯踈糲蘭未切糲粗而稗精列子食則粢糲亦足飽我飢夜深靜卧百蟲絶清月出嶺光入扉天明獨去無道路出入髙下窮煙霏山紅間碧紛爛漫時見松櫪皆十圍歷或作櫟方云選南都賦楓槐櫨櫪李善曰櫪與櫟同當流赤足踏澗石水聲激激風吹衣吹或作生人生如此自可樂或作可自得自可方作自得或作可自皆非是豈必局束為人鞿音飢馬絡也楚詞今雖好修姱以鞿羈兮注韁在口日羈前漢是猶以鞿而御悍突為人鞿言為人所拘縶也嗟哉吾黨二三子安得至老不更歸天星送楊凝郎中賀正天星牢落雞喔咿上音渥下音伊圭聲也僕夫起餐車載脂脂以滑車正當窮冬寒未巳借問君子行安之會朝元正無不至受命上宰須及期侍從近臣有虛位公今此去歸何時或作何時歸汴泗交流贈張僕射建封貞元十五年公在徐州張建封幕汴水徐之西泗水徐之南故以名篇辭去云云主人謂張建封公在徐欎二不得志見於書與詩者如此嗷嗷鳴鴈鳴且飛上鳴字或作鴻窮秋南去春北歸去寒就暖識所依或作處非是天長地闊棲息稀風霜酸苦稻粱鴻鴈前輩多使稻粱事蓋出戰國䇿廣絶交論云分鴈鶩之稻粱又杜甫詩自古稻粱多不足微毛羽墔落身不肥毛羽或作羽毛徘徊反顧羣侣違哀鳴欲下洲渚非江南水闊朝雲多朝方作朔今按既云江南則不應言朔雲矣兼作朝雲語亦差響草長沙軟無網羅間飛靜集鳴相和違憂懷惠性匪他惠一作息凌風一舉君謂何龍移此詩謂南山湫也湫𥘉在平地一日風雷移居山上其山下湫遂化為土公題炭谷詩云厭處平地士巢居插天山天昏地黑蛟龍移雷驚電激雄雌隨激或作擊方云雷奔電激班固西都賦語雄雌或作雌雄清泉百丈化為土魚鱉枯死吁可悲雉帶箭鋪牀拂席置此詩公佐張僕射十徐從獵而作也讀之其狀如在目前蓋寫物之妙者原頭火燒靜兀兀野雉畏鷹出復沒出復方作伏欲今按雉出復沒而射者彎弓不肯輕發正是形容持蒲命巾之巧豪釐不差處改作伏欲神采索然矣將軍欲以巧伏人盤馬彎弓惜不發地形漸窄觀者多雉驚弓滿徑箭加衝人決起百餘尺紅翎白鏃作木切相傾斜將軍仰笑軍吏賀五色爾雅雉五色皆備曰翬離披馬前墮條山蒼歐本注云中條山在黃河之曲今蒲中也條山蒼河水黃浪波沄沄去浪波或作波浪松柏在山岡山或作髙贈鄭兵曹樽酒相逢十載前君為壯夫我少年樽酒相逢十載後我為壯夫君白首我材與丗不相當戢鱗委翅無復望當今賢俊皆周行君何為乎亦遑遑亦或作獨杯行到君莫停手破除萬事獨爛也或作睒睒方云字當從目雞三號音毫杜詩日𥘉鳴度必三更五點贈唐衢集注衢從退之遊舊史附公傳末新史削之舊史云衢應進士久而不第能為歌詩意多感激見人文章有所傷激讀訖必哭涕泗不能巳每與人言論既别發聲一號音辝悲切聞者莫不涕下故丗稱唐衢善哭白樂天亦嘗贈以詩略云賈誼哭時事阮籍哭路歧唐生今亦哭異代同其悲虎有爪兮牛有角虎可搏兮牛可觸奈何君獨抱竒材手把鋤犂餓空谷當今天子急賢良匭函孫曰唐武后垂拱二年命銅為匭置之廟堂東曰延恩南曰招諌西曰伸冤北曰通玄朝出開明光漢殿名也胡不上書自薦逹坐令四海如虞唐貞女峽連州桂陽縣江盤峽束春湍豪雷風戰鬪魚龍逃懸流轟轟射水府一瀉百里翻雲濤漂船擺輔買切開也石萬瓦裂咫尺性命輕鴻毛鴻或作於或作如贈侯喜吾黨侯生字叔􅙝或作起方云起之古文也呼我持竿釣溫水洛水在河南易乾鑿度曰王者有盛德之應則洛水先溫故號溫洛平明鞭馬出都門盡日行行荆棘裏溫水微茫絶又流深如車轍闊容輈蝦蟇跳過雀兒浴此縱有魚何足求我為侯生不能巳盤針擘粒投泥滓晡時堅坐到黃昏到或作至手倦目勞方一起暫動還休未可期蝦行蛭音質水蛭也賈誼曰夫豈從蝦與蛭蚓渡似皆疑舉竿引線忽有得一寸才分鱗與鬐音頎莊子日驚掦而奮鬐或作鰭今按鬐馬鬛也當作鰭然莊子作鬐則亦可通用也是日侯生與韓子良久歎息相看悲我今行事盡如此此事正好為吾規半丗遑遑就舉選一名始得紅顔衰始或作巳非是人間事勢豈不見徒自辛苦終何為便當提攜妻與子南入箕潁箕山名潁水名許由巢父隱處無還時叔􅙝君今氣方鋭我言至切君勿嗤君欲釣魚須逺去大魚豈肯居沮洳上音疽下音茹漸濕地肯或作有非是痕淚非是雖不勑還情庶幾朝暮盤羞惻庭闈幽房無人感伊威尓雅委鼠也詩伊威在室人生此難餘可祈子去矣時若發機矣或作吳非是句法見上張文潛説蜃沈海底氣升霏彩雉野伏朝扇翬音揮五采旌扇或作羽非是蓋宫扇以雉尾為之翬文彩貌此言雉伏於野而其羽可用為朝廷之儀與上下二句為一類也處子窈窕王所妃蜃沈止所妃此二句君子不患人不我知之意苟有令德隱不腓下音肥孫曰百卉貝腓腓病也言苟有令德雖在隱約不以為病況今天子鋪德威鋪或作輔非是蔽能者誅薦受禨音幾祥也出送撫背我涕揮行行正直愼脂韋楚辝如脂如韋注脂韋柔弱貌業成志樹來頎頎音祈祝曰詩碩人頎頎言儀表長麗絞好頎頎然我當為子言天扉三星行三星斗牛箕洪曰三星行剝琢行皆元和𥘉召為國子博士時作樊曰蘇內翰云吾平生遭口語無數蓋生時與退之相似吾命在牛斗間而身宫亦在箕故其詩曰我生之辰月宿南斗且曰無善名以聞無惡聲以攘今謗吾者或云死或云仙退之之言良非虛耳八月十五夜贈張功曹著纎雲四卷天無河清風吹空月舒波波月光沙平水息聲影絶沙平方作平沙非是一杯相屬之欲切漢灌夫傳及飲酒酣夫起舞屬蚡師古曰屬付也猶今之舞訖相勸君當歌君歌聲酸辭且苦不能聽終淚如雨洞庭連天九疑髙蛟龍出沒猩鼯音吾鼠名一曰飛生號十生九死到官所幽居默默如藏逃下牀畏蛇食畏藥海氣濕蟄熏腥臊􅊜方作溫非是昨者州前槌大鼓嗣皇順宗即位正元二十一年正月繼聖登夔皋赦書一日行萬里罪從大辟皆除死方云荆公與謝本作除徙下文巳有遷者追回流者還則除死為當遷者追回流者還滌瑕蕩垢朝清班朝清或作清朝方云唐本作朝清蓋言追還之人皆得條瑕垢而朝清班惟已為使家所抑故只量移江陵也州家申名使家抑坎軻秪得移荆蠻秪或作只它詩皆然判司功曹卑官不堪説卑官一作宮卑未免捶楚韓曰老社送髙書記詩脫身簿尉中始與捶楚辝孫曰公時遷為江陵府法曹塵埃間同時輩流多上道天路幽險難追攀君歌且休聽我歌我歌今與君殊科杭本如此言張之歌詞酸苦而巳直歸之於命蓋反騷之意而其詞氣抑揚頓挫正一篇轉換用力處也方從諸本我下去歌字而君下著豈字全失詩意使一篇首尾不相運掉無復精神又不著花本之異蓋考之亦未詳耶一年明月今宵多明月一作月明人生由命非由他託何切非我也有酒不飲奈明何謁衡嶽廟遂宿嶽寺題門樓或無廟字公兩謫南方𥘉自陽州北還過衡在永正元年八月過潭適當殘秋陪杜侍御遊湘西寺詩云是時秋向殘是也今云我來正逢秋雨節故知此詩自山陽還時作後自潮州還移刺袁州則元和十五年十月蓋未嘗過衡據袁州謝表云去年正月貶授朝州刺史其年十月凖例量移云云即自潮徑當來袁又未嘗遇秋雨節時也蘇東坡觀海市詩云潮陽太守南遷歸喜見石廩堆祝融粗言之耳五嶽祭秩皆三公皆或作比非是四方環鎮嵩當中火維地荒足妖怪天假神柄神衡山之神專其雄噴雲泄霧藏半腹雖有絶頂誰能窮我來正逢秋雨節隂氣晦昧無清風清方作晴今按清風興群隂伏無清風則雨意未巳也晴字非是潛心默禱若有應豈非正直能感通非方作即非是能感方作感能今按若從方讀則此句為吃羌語矣須臾靜掃衆峯出仰見突兀撑青空紫蓋連延接天柱衡山有五峯紫蓋天柱石廩祝融芙蓉石廩一名石囷石廪騰擲堆祝融森然魄動下馬拜松柏一徑趁靈宫柏或作桂粉牆丹柱動光彩鬼物圗畫填青紅升階傴僂薦脯酒欲以菲薄明其衷廟令老人識神意令一作內睢盱上許圭切下香于切顧視貌偵丑鄭切候也伺能鞠躬手持杯珓導我擲珓方從唐本作校云廣韻作珓字古者以士為之也朝野僉載作珓角與校音義皆相近魏野有詠竹校子詩只作校字荆楚歲時記又作教今按當從廣韻及衆本云此最吉餘難同竄逐蠻荒幸不死衣食才足甘長終侯王將相望久絶神縱欲福難為功夜投佛寺上髙閣星月掩映雲朣朧方云選秋興賦月朣朧而含光從日者非今按字書二字從日當更考之猿鳴鍾動不知曙杲杲寒日生於東岣嶁山東坡中隱堂詩岣嶁何須到韓公浪自悲謂此詩也岣嶁上音矩下音縷山尖神禹碑盛洪之荆州記曰南嶽周回數曰里昔禹登而祭之又徐靈期南嶽記曰夏禹導水通瀆刻石書名山之髙南嶽文云髙四千一十丈南嶽即衡山也字青石赤形模竒科斗拳身薤音械古文似科斗薤書如薤葉倒披倒或作葉方從蜀本云衡陽舊刻亦然魏都賦云華蓮重葩而倒披今按岣嶁者衡山南麓别峯之名薤倒按者古有倒薤書見歐公集名録目唐玄度十躰書方得之矣然今衡山實無此碑此詩所記蓋當時傳聞之誤故其卒草自為疑詞以見微意劉禹錫寄吕衡州溫亦云嘗聞祝融峯上有神禹銘古石琅玕姿祕文螭虎形蓋亦得於傳聞也鸞飄鳯泊拏奴加切又女書切皆以象其碑之摹刻虎螭事嚴迹祕鬼莫窺道人獨上偶見之我來咨嗟涕漣洏上音連下音而涕流貌千搜萬索何處有森森緑樹猿猱悲猱或作啼永貞行韓曰正元二十一年德宗崩順宗即位病瘖不能視朝王伾王叔文用事四月䇿皇太子八月立為皇帝是為憲宗順宗為太上皇改元永正此詩載太皇謂順宗小人謂叔文元臣故老謂杜佑髙郢鄭珣瑜等嗣皇謂憲宗也君不見太皇諒隂指順宗即位之時未出令小人乘時偷國柄北軍百萬虎與貔音毗天子自將非他師或作時一朝奪印付私黨是歲王叔文以金吾大將軍范希朝為左右神䇿諸行營節度以韓泰為其行軍司馬叔文欲奪取宦官兵權以自固藉希朝老將使主帥而實以泰專其事人情疑懼凛凛朝士何能為狐鳴梟噪爭署置眻睒跳踉上音迢下音梁得意喜躍之貌相嫵媚上音武下音眉相媚説也眻睒或作睒閃方云眻睒獸狂視貌字見吳都賦夜作詔書朝拜官超資越序曾無難公然白日受賄賂火齊下音劑韓曰珠名選班固西都賦翡翠火齊流耀含英注珠也樊曰火齊狀如云母色如紫金有光耀别之則如蟬翼積之則如紗縠之重杳詳見南史祝曰文選磊落漫衍乎其側磊落堆金盤元臣故老不敢語晝卧王叔文用事一日諸相會食叔文至中書欲與韋執誼計事執誼起迎諸相停箸以待有頃報叔文索飯已與韋相同餐閣中矣柱佑髙郢懼不敢言鄭珣瑜獨歎日吾豈可復居此位索馬徑歸卧不起涕泣何汍瀾董賢三公誰復惜三或作一非是侯景九錫行可歎國家功髙德且厚天位未許庸天干嗣皇卓犖信英主文如太宗武髙祖膺圗受禪登明堂共流幽州鯀死羽四門肅穆賢俊登數君謂柳宗元劉禹錫之類匪親豈其朋郎官孫曰時貶禮部貟外郎栁宗元邵州司封郎中韓曄池州屯田貟外郎劉禹錫連州刺史皆自郎官遷謫清要為丗稱荒郡迫野嗟可矜湖波連天日相騰蠻俗生梗瘴癘蒸江氛嶺祲音浸妖氣昏若凝一蛇兩頭見未曾怪鳥鳴喚令人憎鳴喚或作爭鳴蠱蟲群飛夜撲燈雄虺毒螫墮股肱食中置藥肝心崩左右使令詐難慿愼勿浪信常兢兢吾嘗同僚補注退之與子厚禹錫最厚善江陵途中寄三學士詩云同官盡才俊偏善柳與劉情可勝賞或作常非是具書目見韓曰公先以言事出為陽山令故書所目見告之非妄徴嗟爾既往宜為懲洞庭湖阻風贈張十一署永正元年自陽山徙掾江陵十月過洞庭湖作或云赴陽山時非也公江陵途中詩敘𥘉赴陽山云春風洞庭浪而此詩首云十月隂氣盛可知其非矣十月隂氣盛北風無時休蒼茫洞庭岸與子維雙舟霧雨晦爭泄波濤怒相投大雞斷四聽斷方從杭蜀本作絶今按此句既有絶字則下一句不應便復出方為杭蜀所誤此比多矣今但刋正不能悉論而論其最著者一二以曉觀者糧絶誰與謀相去不容步險如礙山丘清談可以飽夢想接無由男女喧左右飢啼但啾啾非懷北歸興何用勝羇愁雲外有白日寒光自悠悠能令暫開霽過是吾無求李花贈張十一署或作李有花江陵城西二月尾花不見桃惟見李風揉雨練雪羞比揉或作柔非是波濤翻空杳無涘翻空方作相翻非是君知此處花何似白花倒燭天夜明羣雞驚鳴官吏起金烏海底𥘉飛來朱輝散射青霞開迷魂亂眼看不得迷魂亂眼或作迷亂入眼入又作人皆非是照耀萬樹繁如堆念昔少年著遊燕對花豈省曽辭杯省曽辝或作曽辝酒非是自從流落憂感集欲去未到先思回祗今四十巳如此後日更老誰論哉力攜一樽獨就醉獨或作共非是不忍虛擲委黃埃委或作隨杏花居鄰北郭古寺孫曰江陵所居之鄰空杏花兩株能白紅曲江滿園不可到看此寧避雨與風二年流竄出嶺外所見草木多異同冬寒不嚴地恆泄陽氣發亂無全功無全閣本作全無非是浮花浪蘂鎮長有才開還落瘴霧中山榴躑躅上直炙切下厨玉切韓曰本草注躑躅樹生髙三四尺花似山石榴少意思照耀黃紫徒為叢鷓鴣鉤輈下張流切孫曰鉤輈鷓鴣聲祝曰嶺春記鷓鴣自呼云鉤輈李羣玉詩又聽鉤輈格磔聲猿呌歇杳杳深谷攢青楓杳杳或作杳靄豈如此樹一來玩若在京國情何窮今旦胡為忽惆悵惆或作怊後放此萬片飄泊隨西東明年更發應更好更發一作花發道人孫曰謂寺僧樊曰八年六月公召拜國子博士明年花發時公為博士于京矣莫忘鄰家翁感春四首我所思兮在何所情多地遐兮遍處處東西南北皆欲往千山隔兮萬山阻孫曰張衡四愁詩我所思兮在太山欲往從之梁甫艱我所思兮在桂林欲往從之湘水深我所思兮在漢陽欲往從之隴坂長我所思兮在鴈門欲往從之雪紛紛公云取此春風吹園雜花開朝日照屋百鳥語三杯取醉不復論一生長恨奈何許諸本奈作春方從杭蜀本云古樂府奈何許石闕生口中御碑不得語皇天平分成四時春氣漫誕最可悲雜花糚林草蓋地白日座上傾天維傾謂傾側風動而然西京賦振天維衍地絡一本注云天維謂春光照灼如維帟之張舉也蜂喧鳥咽留不得紅蕚萬片從風吹豈如秋霜雖慘冽慘或作凛方以西京賦氷霜慘列定作慘摧落老物樊曰晉宣帝嘗疾張皇后往省帝曰老物可僧又曰老物不足惜誰惜之為此徑須沽酒飲自外天地棄不疑近憐老杜無檢束爛漫長醉多文辭屈原離騷二十五樊曰屈原賦二十五篇蓋離騷經一九歌十一天問一九章九逺遊卜居漁父各一凡二十五篇不肯餔啜糟與醨惜哉此子巧言語不到聖處寧非癡韓曰聖處謂酒清者為聖人先儒云公以原介於莊周司馬遷之間其感春云云蓋與屈原之懲於諷諌而傷其違聖之達節也幸逢堯舜明四目條理品彚皆得宜平明出門暮歸舍酩酊馬上韓曰晉山簡每出嬉遊兒童歌曰日久倒載歸酪酊無所知時時能騎馬倒著白接離知為誰閣杭蜀本作誰為方從諸本云按公後詩有遇酒即酪酊公知我為誰即此義也今按方氏此論最公使它處皆如此則無可議矣朝騎一馬出暝就一牀卧詩書漸欲拋節行久已惰方作破非是冠欹感髮秃語誤驚齒墮孤負平生心孤或作辜巳矣知何奈乃個切元稹立部伎詩云古人邪正知誰奈諸本皆同無可疑者荆公本奈作那李本知作如亦無大異獨方從閣本作巳知無可奈乃不成文理故今定從諸本我恨不如江頭人我恨方從杭本作奈我閣本無奈字亦無恨字蜀作我奈今按杭蜀本蓋因前篇之未有奈字而誤也閣本亦少一字皆非是今從監本長網橫江遮紫鱗獨宿荒陂射鳧鴈賣納租賦官不嗔歸來歡笑對妻子衣食自給寧羞貧今者無端讀書史智慧只足勞精神閣本如此為當方乃不從而以足為是又不可曉也畫蛇著足無處用兩鬢雪白趨埃塵乾愁漫解坐自纍與衆異趣誰相親數杯澆腸雖暫醉皎皎萬慮醒還新百年未滿不得死且可勤買拋青春買或作置樊曰酒名也唐人名酒多以春杜子美有麯米春裴鉶作傳亦有松醪春寒食日出遊張十一院長見示病中億花九篇寒食日出遊夜歸因以投贈張十一院長即工曹署樊曰國史輔云外郎遺輔相呼為院長輔注公與張同自御史貶官又同為江陵椽公法曹參軍張功曹參軍元和元年李花𥘉發君始病我往看君花轉盛走馬城西惆悵歸不忍千株雪相映邇來又見桃與梨交開紅白如爭競可憐物色阻攜手空展霜縑音兼祝曰絲繒也古樂府云新人工織縑故人工織素吟九詠紛紛落盡泥與塵不共新糚比端正桐華最晚今巳繁君不強起時難更關山逺别固其理寸步難見始知命憶昔與君同貶官夜渡洞庭看斗柄豈料生還得一處引袖拭淚悲且慶各言生死兩追隨生死方作死生直置心親無貌敬念君又署南荒吏路指鬼門樊曰容州北流縣南三十里有二石相對闊三十步俗號鬼門關諺曰鬼門關十人九不還幽且敻休正切逺也三公盡是知音人曷不薦賢陛下聖囊空甑倒誰救之我今一食日還併自然憂氣損天和安得康強保天性斷鶴兩翅鳴何哀縶驥四足氣空橫户孟切今朝寒食行野外緑楊市岸蒲生迸生或作芽宋玉庭孫曰宋玉楚人故居在江陵韓曰杜詩曽聞宋玉宅每欲到荆州荆州即江陵也邊不見人輕浪參差魚動鏡自嗟孤賤足瑕疵特見放縱荷寬政飲酒寧嫌􅊦底深題詩尚倚筆鋒徑明宵故欲相就醉故或作固有月莫愁當火令洪云此時春未夏𥘉故云火令方云非也此謂寒食禁火耳火令字見周禮魏武帝亦有寒食禁火令但東坡嘗為李公擇書此詩作燈火令又不知其所據何本也今按方説是也此言夜行有月故不憂當寒食禁火之令耳坡讀亦誤憶昨行和張十一或作和張十一憶昨行憶昨夾鍾之吕𥘉吹灰上公禮罷元侯回上洪作杜云杜佑自淮南入朝也方作社云此為荆帥裴均罷社而享客也今按方説是也但以上為社則未然左傳云五行之官封為上公祀為貴神其土正曰后土在家則祀中霤在野則為社故杜注用幣于社云以請於上公則上公即社神也况此句內又自以元侯為對耶車載牲牢甕舁音余對舉也酒並召賔客延鄒枚腰金首翠謂娼姬之服光照耀絲竹逈發清以哀青天白日花草麗玉斚屢舉傾金罍張君名聲座所屬起舞先醉長松摧宿酲未解舊痁失廉切瘧疾左傳曰痁作而伏作舊痁方作痁字今按此句內上有宿酲字則此當為舊痁明矣方誤深室靜卧聞風雷自期殞命在春序屈指數日憐嬰孩危辭苦語感我耳淚落不掩何漼漼徂回切選指季豹而漼焉注涕泣垂貌念昔從君渡湘水湘或作湖大帆夜劃窮髙桅吾回切檣竿陽山鳥路出臨武驛馬拒地驅頻隤三館本作槌方云博雅槌椎也亦有義今按方義暗僻不可曉此但言當謫官時馳驛發遣而山路險惡故羸馬拒地不進𬒳驅而屢至傾隤耳隤或取虺隤字然其義但為不能升髙之病又似未必然也踐蛇茹蠱不擇死忽有飛詔從天來伾文未揃崖州韋執誼也熾揃或作剪謝校從剪方云説文揃滅也史記西南夷贊有揃剽字雖得赦宥恆愁猜近者三姦悉破碎集注元和元年正月順宗即位二月大赦公自陽山徙禒江陵三姦方用事其年八月憲宗立伾貶開州司馬叔文偷州司户並貟外置十一月繼貶執誼崖州司馬及是三姦始悉破碎焉羽窟無底幽黃能集注能有兩音奴來切者三足鱉也奴登切者熊屬足似鹿者也左傳堯殛鯀于羽山其神化為黃熊以入于羽淵國語作黃能音賢能之能東海人祭禹廟不用熊白及鱉為饌疑鯀化為二物則兩音亦可通用眼中了了見鄉國知有歸日眉方開今君縱署天涯吏縱或作從今按張署墓志雍管張署為判官也投檄北去何難哉無妄之憂勿藥喜一善自足禳千災頭輕目朗肌骨健古劒新斸磨塵埃殃銷禍散百福併從此直至耇與鮐音台樊曰詩黃耇台背箋云台之言鮐也大者則背有鮐文耇或作耆嵩山東頭伊洛岸勝事不假須穿栽或作裁君當先行我待滿沮溺可繼窮年推他回切韓曰取禮記三推九推之意朱文公校昌黎先生集卷之三
