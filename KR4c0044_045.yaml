front:
  text: 朱文公校昌黎先生外集卷之三考異音釋附
  hash: sha256:8d26adad02a1577793d208d7940138a4582c88f0101b9c23ab07904951f08004
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_045-1a}
body:
  text: 送汴州監軍俱文珍序并詩韓日董晋為宣武軍節度使俱文珍為監軍公為觀察推官文珍將如京師作序詩而送之樊曰此序不入正集李漢以文珍故為公諱耶今之天下之鎮陳留爲大屯兵十萬連地四州左淮右河抱負齊楚濁流浩浩舟車所同故自天寳巳來當藩垣屏翰之任有弓矢鈇鉞之權皆國之元臣天子所左右屏翰方作翰屏其監綂中貴必材雄德茂榮耀寵光能俯逹人情仰喻天意者然後爲之故我監軍俱公輟侍從之榮受腹心之寄奮其武毅張我皇威遇変出竒先事獨運偃息談笑危疑以平天子無東顧之憂方伯有同和之美危疑方作疑危十三年春將如京師相國隴西公飲餞於青門之外謂功德皆可歌之也於或作于或无青字命其屬咸作詩以鋪繹之詩曰奉使羌池静臨戎汴水安或作閒非是沖天鵬翅闊報國劒鋩寒曉日驅征騎春風詠采蘭孫曰束晢𥙷亡詩曰循彼南陔言采其蘭采蘭以養親也誰言臣子道忠孝兩全難送浮屠令縱西遊序方无浮屠字縱下有上人二字其行異其情同君子與其進可也方无進字非是令縱釋氏之秀者又善爲文又上或有而字浮游徜徉跡接天下藩維大臣文武豪士令縱未始不褰衣而負業往造其門下衣或作裳其有尊行美德建功樹業令縱從而爲之歌頌典而不䛕䴡而不淫其有中古之遺風與樹或作植有巾或作巾有古下或有人字風下或有可字乗閒致密促席接膝譏評文章商較人士浩浩乎不窮愔愔乎深而有歸或无乗閒致密四字而有及字人士或作士人或作人事於是乎吾忘令縱之爲釋氏之子也其來也雲凝其去也風休方懽而巳辭雖義而不求吾於令縱不知其不可也盍賦詩以道其行與路鵠秀才序方云送路鵠送别二序語意无倫脫誤不可讀如曰自河南令為博士於公所歴官次亦不合故併闕之今從其說刪去贈别序說巳見上送毛仙翁十八兄序方云直諌表論顧威狀種蠡議毛仙翁序皆最末見决非公文如杭本之有外集者表狀亦不録足以知其果為也今並从方本刪去朱文公校昌黎先生外集卷之三
  hash: sha256:cbfd42510128298876387981b21328c6db993c6fe215717d17db79fee7db3bf3
