front:
  text: 朱文公校昌黎先生集卷之四十考異音釋附
  hash: sha256:63ed79c053a0de2facc7bf63da5489cccd0164c0651c5f3409cf8cf5cbaac416
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_040-1a}
body:
  text: 表狀論孔戣致仕狀方無孔戣字某官某右臣與孔戣同在南省為官數得相見或無同字戣為人守節清苦議論平正今年才七十筋力耳目未覺衰老憂國忘家用意深逺所謂朝之耆德老成人者臣知戣上疏求致仕故往看戣戣為臣言巳蒙聖主允許伏以陛下優賢尚齒見戣頻上三疏言詞懇到重違其意遂即許之此誠陛下仁德之至然如戣輩在朝不過三數人實可為國愛惜自古以來及聖朝故事年雖八九十但視聽心慮苟未昏錯尚可顧問委以事者雖求退罷無不殷勤留止優以祿秩不聽其去以明人君貪賢敬老之道也禮大夫七十而致事若不得謝則必賜之几杖安車禮下或有日字致事方作致仕今按禮記作事七十求退人臣之常禮若有德及氣力尚壯則君優而留之不必年過七十盡許致事也詩曰雖無老成人尚有典刑此言老成人重於典刑不可不惜而留也今戣幸無疾疹但以年當致事據禮求退陛下若不聽許亦無傷於義而有貪賢之美況左丞職事亦極清簡若戣尚以繁要為辭自可别授秩崇而務少者今中外之臣有年過於戣尚未得退戣獨何人得遂其願其或作所然人皆求進戣獨求退尤可賢重臣所領官無事不敢請對或無領字蒙陛下厚恩苟有所見不敢不言伏望聖恩特垂察納舉馬揔自代狀京兆府銀青光祿大夫檢校尚書右僕射兼户部尚書馬揔右伏凖建中元年正月五日制常參官上後三日舉一人自代者伏以近者京尹用人稍輕所以市井之間盜賊未斷郊野之外疲瘵尚多方無近者至所以十字市井作畿甸前件官文武兼資寬猛得所纍更方鎮皆有功能若以代臣實為至當謹録奏聞謹奏賀雨表臣某言臣聞聖人之德與天地通誠發於中事應於外始聞其語今見其真臣誠歡誠喜頓首頓首伏以季夏以來雨澤不降臣職司京邑所禱實頻青天湛然旱氣轉甚陛下憫兹黎庶有事山川中使才出於九門隂雲巳垂於四野龍神效職雷雨應期雷或作雲嘉榖奮興根葉肥潤抽莖展穗不失時宜人和年豐莫大之慶微臣幸蒙寵任獲覩殊祥慶抃歡呼倍於常品無任踴躍之至謹奉表陳賀以聞賀太陽不虧狀狀蜀本作表司天臺奏今月一日太陽不虧右司天臺奏今日辰卯間太陽合虧陛下敬畏天命克巳修身誠發於中災銷於上自卯及巳當虧不虧及或作至雖隔隂雲轉更明㓪比於常日不覺有殊天且不違慶孰為大臣官忝京尹親覩殊祥欣感之誠實倍常品謹奉狀賀以聞狀下或有陳字舉張正甫自代狀尚書兵部再除日通議大夫守右散騎常侍上柱國南陽縣開國子食邑五百户賜紫金魚袋張正甫右臣蒙恩除尚書兵部侍郎伏凖建中元年正月五日制常參官上後三日舉一人自代者前件官稟正直之性懷剛毅之姿嫉惡如仇讎見善若飢渴備更內外灼有名聲年齒雖髙氣力逾勵力或作志甘貧苦節不愧神明可謂古之老成朝之碩德久處散地實非所宜乞以代臣以副公望袁州申使狀使司牒州牒右自今月二日後每奉公牒牒尾故牒字皆為謹牒宇有異於常𥘉不敢陳論以為錯誤今既頻奉文牒前後並同在愈不勝戰懼之至伏乞仁恩特令改就常式以安下情國子監論新注學官牒國子監應今新注學官等牒凖今年赦文委國子祭酒選擇有經藝堪訓導生徒者以充學官近年吏部所注多循資敘不考藝能至令生徒不自勸勵伏請非專誦經傳博涉墳史及進士五經諸色登科人不以比擬其新受官受或作授上日必加研試然後放行上副聖朝崇儒尚學之意具狀牒上吏部仍牒監者謹牒黃家賊事冝狀一臣去年貶嶺外刺史其州雖與黃家賊不相鄰接然見往來過客并諳知嶺外事人所説至精至熟一或作右或有伏以字諳方作諸其賊並是夷獠亦無城郭可居依山傍險自稱洞主衣服言語都不似人尋常亦各營生急則屯聚相保比緣雍管經略使多不得人德既不能綏懷威又不能臨制侵欺虜縛以致怨恨蠻夷之性易動難安遂至攻劫州縣侵暴平人或復私讎或貪小利或聚或散終亦不能為事近者征討本起於裴行立陽旻此兩人者本無逺慮深謀意在邀功求賞此下或有時字亦緣見賊未屯聚之時將謂單弱立可摧破爭獻謀計惟恐後時朝廷信之遂允其請自用兵巳來已經二年前後所奏殺獲計不下一二萬人方無下巳字今按恐當刪上巳字万上或無二字儻皆非虛賊巳尋盡至今賊猶依舊足明欺罔朝廷雍容兩管因此凋弊殺傷疾患十室九空因或作內經二字患或作疫百姓怨嗟如出一口陽旻行立相繼身亡實由自邀功賞造作兵端人神共嫉以致殃咎自方作身嫉或作怒陽旻行立事既巳往今所用嚴公素者亦非撫御之才不能别立規模依前還請攻討素或作集如此不巳臣恐嶺南一道未有寧息之時一昨者併雍容兩管為一道深合事宜或無併字然雍州與賊逼近容州則甚懸隔其經略使若置在雍州與賊隔江對岸兵鎮所處物力必全一則不敢輕有侵犯一則易為逐便控制今置在容州則雍州兵馬必少賊見勢弱易生姦心伏請移經略使於雍州其容州但置刺史實為至便一比者所發諸道南討兵馬例皆不諳山川不伏水土遠鄉羇旅疾疫殺傷伏或作服臣自南來見説江西所發共四百人曾未一年其所存者數不滿百方無者字嶽鄂所發都三百人其所存者四分才一續添續死每發倍難若令於雍容側近召募添置千人便割諸道見供行營人數糧賜均融充給所費既不增加而兵士又皆使習長有守備不同客軍守則有威攻則有利一自南討巳來賊徒亦甚傷損察其情理厭苦必深大抵嶺南人稀地廣賊之所處又更荒僻假如盡殺其人盡得其地在於國計不為有益容貸羈縻比之禽獸來則捍禦去則不追亦未虧損朝廷事勢以臣之愚若因改元大慶赦其罪戾遣一郎官御史親往宣諭必望風降伏歡呼聽命呼方作呌仍為擇選有材用威信諳嶺南事者為經略使處理得宜自然永無侵叛之事有方作其理或作置應所在典貼良人男女等狀方無在字或又無等字方云二狀皆袁州進今按狀云往任袁州刺史方説非是應所在典貼良人男女等此是狀首標目所論事與前卷賀白龜狀體正同猶今之貼黃及狀眼也方本刪去非是右準律不許典貼良人男女作奴婢驅使臣往任袁州刺史日檢青州界內得七百三十一人並是良人男女準律計傭折直一時放免責或作到計上或有例字原其本末或因水旱不熟或因公私債負遂相典貼漸以成風名目雖殊奴婢不别鞭笞役使至死乃休既乖律文實虧政理袁州至小尚有七百餘人天下諸州其數固當不少今因大慶伏乞令有司重舉舊章一皆放免仍勒長吏嚴加檢責如有隱漏必重科懲則四海蒼生孰不感荷聖德以前件如前謹具奏聞伏聽勑旨論淮西事宜狀方無狀字右臣伏以淮西三州之地自少陽疾病去年春夏巳來圗為今日之事有職位者勞於計慮撫循奉所役者修其器械防守金帛糧畜耗於賞給勞於或作勞其非是耗於或作匱于執兵之卒四向侵掠農夫織婦㩦持幼弱餉於其後雖時侵掠小有所得力盡筋疲不償其費餉或作飽非是又聞畜馬甚多自半年巳來皆上槽櫪譬如有人雖有十夫之力自朝及夕常自大呼跳躍𥘉雖可畏其勢不久必自委頓乘其力衰三尺童子可使制其死命況以三小州殘弊因劇之餘而當天下之全力其破敗可立而待也待下方有之字非是然所未可知者在陛下斷與不斷耳夫兵不多不足以必勝必勝之師必在速戰以下必或作取兵多而戰不速則所費必廣兩界之間疆場之上日相攻劫必有殺傷近賊州縣徴役百端農夫織婦不得安業或時小遇水旱百姓愁苦當此之時則人人異議以惑陛下之聽下或有矣字陛下持之不堅半塗而罷傷威損費為弊必深所以要先決於心詳度本末事至不惑然可圖功然新史作乃方云然猶然後也下文然可集事然擬許其承繼皆一義今按此蓋當時俗躰如此故公狀中用之不欲改也為統帥者盡力行之於前而參謀議者盡心奉之於後內外相應其功乃成昔者殷髙保聚以備寇賊若令召募立可成軍若要添兵自可取足賊平之後易使歸農伏請諸道先所追到行營者悉令却牒歸本道據行營所追人額器械弓矢一物巳上悉送行營充給却下方無牌字據下或無行字給上或無充字今按上下文勢合有行字行下更合有營字其理甚明今輒補足所召募人兵數既足加之教練三數月後諸道客軍一切可罷比之徴發逺人利害懸隔一繞逆賊州縣堡柵等各置兵馬都數雖多每處則至少又相去闊逺難相應接所以數𬒳攻劫致有損傷至上或有兵字今若分為四道每道各置三萬人擇要害地屯聚一處使有隱然之望或無分字隱方作殷按漢書隱若一敵國方本非是審量事勢乘時逐利可入則四道一時俱發使其狼狽驚惶首尾不相救濟四或作諸若未可入則深壁高壘以逸待勞自然不要諸處多置防備臨賊小縣可收百姓於便地作行縣以主領之使免散失一蔡州士卒為元濟迫脅勢不得巳遂與王師交戰原其本根皆是國家百姓進退皆死誠可閔傷宜明勑諸軍使深知此意當戰鬭之際固當以盡敵為心若形勢巳窮不能為惡者不須過有殺戮喻以聖德放之使歸銷其凶悖之心貸以生全之幸自然相率棄逆歸順一論語曰欲速則不逹見小利則大事不成比來征討無功皆由欲其速捷有司計算所費苟務因循小不如意即求休罷河北淮西等見承前事勢知國家必不與之持久併力苦戰幸其一勝即希冀恩赦朝廷無至忠憂國之人不惜傷損威重因其有請便議罷兵往日之事患皆然也往或作近臣愚以為淮西三小州之地元濟又甚庸愚而陛下以聖明英武之姿用四海九州之力除此小冦難易可知太山壓卵未足為喻一兵之勝負實在賞罰賞厚可令廉士動心罰重可令凶人喪魄廉方作戰非是然可集事不可愛惜所費憚於行刑然或作則一淄青恆冀兩道與蔡州氣類略同今聞討伐元濟人情必有救助之意伐或作罰下同然皆暗弱自保無暇虛張聲勢則必有之至於分兵出界公然為惡亦必不敢宜特下詔云蔡州自吳少誠巳來相承為節度使亦微有功效少陽之殁陽或作誠非是朕亦本擬與元濟恐其年少未能理事所以未便處置待其稍能緝綏然擬許其承繼令忽自為狂勃侵掠不受朝命事不得巳所以有此討伐擬或作後勃或作悖至如淄青恆州范陽等道祖父各有功業相承命節年歲巳久朕必不利其土地輕有改易各宜自安節下或有制字或有制字而無節字今按李德𥙿之討澤潞正用此䇿以伐其交丗以為竒不知韓公巳言之矣如妄自疑懼敢相扇動朕即赦元濟不問回軍討之自然破膽不敢妄有異説以前件謹録奏聞伏乞天恩特賜裁擇謹奏論變鹽法事宜狀長慶二年張平叔為户部侍郎上疏請官自賣鹽可以富國強兵陳利害十八條詔下其説令公卿詳議公與韋處厚條詰之事遂不行平叔所陳十八條此可見者十六方云白樂天行平叔判度支詞曰計能析秋毫吏畏如夏日東坡曰此必小人也按柳氏家訓平叔後以贓敗窮失官錢四十万緡是宜以此終也樊曰食貨志云自兵興河北鹽法羇縻而巳至皇甫鎛又奏置榷鹽法如江淮榷法犯禁歲多及田弘正舉魏博歸朝穆宗命河北罷榷鹽户部侍郎張平叔議榷鹽法弊請官糴鹽可以冨國詔公卿議可否中書舍人韋處厚兵部侍郎韓愈詰之以為不可平叔屈服平叔所陳利害凡十八條公為隨條分析處厚則發十難以折之云張平叔所奏鹽法條件右奉勑將變鹽法事貴精詳宜令臣等各陳利害可否聞奏者平叔所上變法條件臣終始詳度恐不可施行各隨本條分析利害如後一件平叔請令州府差人自糶官鹽收實估匹段省司凖舊例支用自然獲利一倍巳上者臣令通計所在百姓貧多富少除城郭外有見錢糴鹽者十無二三多用雜物及米穀博易鹽商利歸於巳無物不取或從賖貸升斗約以時熟填還用此取濟兩得利便令令州縣人吏坐鋪自糶利不關巳罪則加身不得見錢及頭假物恐失官利必不敢糶變法之後百姓貧者無從得鹽而食矣求利未得斂怨巳多自然坐失鹽利常數所云獲利一倍臣所未見一件平叔又請鄉村去州縣逺處令所由將鹽就村糶易不得令百姓闕鹽者臣以為鄉村逺處或三家五家山谷居住不可令人吏將鹽家至户到多將則糶貨不盡少將則得錢無多無或作不計其往來自充糧食不足比來商人或自負擔斗石往與百姓博易所冀平價之上利得三錢兩錢不比所由為官所使到村之後必索百姓供應所利至少為弊則多此又不可行者也一件平叔云所務至重須令廟堂宰相充使臣以為若法可行不假令宰相充使若不可行雖宰相為使無益也下若字或作令或有若字無下十一字又宰相者所以臨察百司考其殿最或無者字或無又者二字若自為使縱有敗闕遣誰舉之此又不可者也一件平叔又云法行之後停減鹽司所由糧課年可收錢十萬貫方無一件字今按此别是一條當有一件字臣以為變法之後弊隨事生尚恐不登常數安得更望贏利一件平叔欲令府縣糶鹽每月更加京兆尹料錢百千司録及兩縣令每月各加五十千其餘觀察及諸州刺史縣令録事參軍多至每月五十千少至五千三千者臣仐計此用錢巳多其餘官典及巡察手力所由等糧課仍不在此數通計所給每歲不下十萬貫未見其利所費巳廣平叔又云停鹽司諸色所由糧課約每歲合減得十萬貫錢或無所由二字仐臣計其新法亦用十萬不啻減得十萬却用十萬所亡所得一無贏餘也平叔又請以糶鹽多少為刺史縣令殿最多者遷轉不拘常例如闕課利依條科責者刺史縣令職在分憂今惟以鹽利多少為之升黜不復考其治行非唐虞三載考黜陟幽明之義也一件平叔請定鹽價每斤三十文又每二百里每斤價加收二文以充腳價量地逺近險易加至六文腳價不足官與出名為每斤三十文其實巳三十六文也也上方無文字仐鹽價京師每斤四十諸州則不登此變法之後祗校數文於百姓未有厚利也祇方作只腳價用五文者官與出二文用或作每二或作三用十文者官與出四文是鹽一斤官糶得錢名為三十其實斤多得二十八少得二十六文折長輔短每斤收錢不過二十六七百姓折長輔短每斤用錢三十四則是公私之間每斤常失七八文也下不及百姓上不歸官家積數至多不可遽算以此言之不為有益平叔又請令所在及農隙時併召車牛般鹽送納都倉不得令有闕絶者州縣和雇車牛百姓必無情願事須差配然付腳錢百姓將車載鹽所由先皆無檢齊集之後始得載鹽及至院監請受又須待其輪次不用門户皆𬒳停留輸納之時人事又别凡是和雇無不皆然百姓寧為私家載物取錢五文不為官家載物取十文錢也文下或無錢字不和雇則無可載鹽和雇則害及百姓此又不可也一件平叔稱停減鹽務所由收其糧課一歲尚得十萬貫文尚或作計仐又稱既有巡院請量間劇留官吏於倉場勾當要害守捉少置人數優恤糧料嚴加把捉如有漏失私糶等並凖條處分者平叔所管鹽務所由人數有幾量留之外收其糧課一歲尚得十萬貫此又不近理也比來要害守捉人數至多尚有漏失私糶之弊仐又減置人數謂能私鹽斷絶此又於理不可也一件平叔云變法之後歲計必有所餘日用還恐不足謂一年巳來且未責以課利後必數倍校多者此又不可方仐國用常言不足若一歲頓闕課利為害巳深雖云明年校多豈可懸保此又非公私蓄積尚少之時可行者也一件平叔又云浮寄姦猾者轉富土著守業者日貧若官自糶鹽不問貴賤貧富士農工啇道士僧尼并兼遊惰因其所食盡輸官錢并諸道軍諸使家口親族遞相影占不曽輸稅若官自糶鹽此輩無一人遺漏者臣以此數色人等官未自糶鹽之時從來糴鹽而食不待官自糶然後食鹽也糴上或有來字今按文勢恐來字上更有從字仐亦輔足若官不自糶鹽此色人等不糶鹽而食官自糶鹽即糴而食之則信如平叔所言矣若官自糶與不自糶皆常糴鹽而食則今官自糶亦無利也所謂知其一而不知其二見其近而不見其逺也國家榷鹽糶與商人商人納榷糶與百姓國或作官則是天下百姓無貧富貴賤皆巳輸錢於官矣不必與國家交手付錢然後為輸錢於官也一件平叔云𥘉定兩稅時絹一匹直錢三千今絹一匹直錢八百百姓貧虛或先取粟麥價及至收穫悉以還債又充官稅顆粒不殘若官中糶鹽一家五口所食鹽價不過十錢隨日而輸不勞驅遣則必無舉債逃亡之患者舉債或作舉賃臣以為百姓困弊不皆為鹽價貴也今官自糶鹽與依舊令商人糶其價貴賤所校無多通計一家五口所食之鹽平叔所計一日以十錢為率一月當用錢三百是則三日食鹽一斤一月率當十斤三日是方作三百六十足云或云六十字恐羡非蓋鹽每斤巳當三十六文月當十斤則三百六十也足或作是屬下句今按平叔所定鹽價一斤止三十文韓公通計民間所加腳費多者一月或至三十六文耳其地近者自不及此難預計也故此上文但云一日以十錢為率則一月安得用三百六十乎其六十字當依或説刪去足改作是而屬下句為當新法實價與舊每斤不校三四錢以下通計五口之家以平叔所約之法計之賤於舊價日校一錢月校三十不滿五口之家所校更少然則改用新法百姓亦未免窮困流散也𥘉定稅時一匹絹三千今只八百假如特變鹽法絹價亦未肯貴五口之家因變鹽法日得一錢之利豈能便免作債收穫之時不𬒳徴索輸官稅後有贏餘也以臣所見百姓困弊日久不以事擾之自然漸校不在變鹽法也今絹一匹八百百姓尚多寒無衣者若使匹直三千則無衣者必更衆多况絹之貴賤皆不緣鹽法以此言之鹽法未要變也一件平叔云每州糶鹽不少長吏或有不親公事所由浮詞云當界無人糴鹽臣即請差清強巡官檢責所在實户據口團保給一年鹽使其四季輸納鹽價口多糶少及鹽價遲違請停觀察使見任改散慢官其刺史巳下貶與上佐其餘官貶逺處者平叔本請官自糶鹽以寬百姓令其蘇息免更流亡今令責實户口團保給鹽令其隨季輸納鹽價所謂擾而困之前意也百姓貧家食鹽至少或有淡食動經旬月若據口給鹽一無鹽字依時徴價辦與不辦並須納錢遲違及違條件觀察使巳下各加罪譴一本譴作於字又無下文苟字苟官吏畏罪必用威刑臣恐因此所在不安百姓轉致流散此又不可之大者也一件平叔請限商人鹽納官後不得輒於諸軍諸使覔職掌把錢捉店看守莊磑祝曰磑磨也丗本公輸般作之磑五對切以求影庇請令所在官吏嚴加訪察訪一作防如有違犯應有資財並令納官仍牒送府縣充所由者臣以為鹽商納榷為官糶鹽子父相承坐受厚利比百姓實則校優則一作有令既奪其業又禁不得求覔職事及為人把錢捉店看守莊磑不知其罪其一作可一朝窮蹙之也若必行此則冨商大賈必生怨恨或收市重寶逃入反側之地以資冦盜此又不可不慮也一件平叔云叔下疑當有云字或稱字之類今亦輔足行此䇿後兩市軍人富商大賈或行財賄邀截喧訴請令所由切加收捉如獲頭首所在決殺連狀聚衆人等各決脊杖二十檢貴軍司軍户鹽如有隱漏並凖府縣例科決并賞所由告人者此一件若果行之不惟大失人心兼亦驚動逺近不知糶鹽所獲幾何而害人蠧政其弊實甚以前件狀奉今月九日勑令臣等各陳利害者謹録奏聞伏聽勑旨朱文公校昌黎先生集卷之四十終
