body:
  text: 書上宰相書正月二十七日前鄉貢進士韓愈謹伏光範門下再拜獻書相公閣下書下或有于字方云時宰相趙憬賈耽盧邁也詩之序曰菁菁者莪樂育材也君子能長育人材則天下喜樂之矣或作也其詩曰菁菁者莪在彼中阿既見君子樂且有儀説者曰菁菁者盛也莪微草也阿大陵也言君子之長育人材若大陵之長育微草能使之菁菁然盛也或無也字既見君子樂且有儀云者天下美之之辭也其三章曰既見君子錫我百朋説者曰百朋多之之辭也或無下百朋字言君子既長育人材又當爵命之賜之厚祿以寵貴之云爾賜之賜或作錫之或作以其卒章曰泛泛楊舟載沈載浮既見君子我心則休説者曰載載也沈浮者物也載載也或作載者載也或作載者舟也或作載舟也言君子之於人才無所不取若舟之於物浮沈皆載之云爾既見君子我心則休云者言若此則天下之心美之也心上或無之字君子之於人也既長育之又當爵命寵貴之而於其才無所遺焉孟子曰君子有三樂王天下不與存焉其一曰樂得天下之英才而教育之此皆聖人賢士之所極言至論古今之所宜法者也然則孰能長育天下之人材將非吾君與吾相乎孰能教育天下之英才將非吾君與吾相乎然則下或無孰能至相乎十七字方云歐本二存此則與後相應然亦無孰長人三字則非是幸今天下無事小大之官各守其職或作所錢榖甲兵之問不至於廟堂論道經邦之暇捨此宜無大者焉今有人生二十八年矣名不著於農工商賈之版其業則讀書著文歌頌堯舜之道雞嗚而起孜孜焉亦不為利或無而字其所讀皆聖人之書揚墨釋老之學無所入於其心其所著皆約六經之旨而成文抑邪與正辨時俗之所惑與或作興居窮守約方天守字亦時有感激怨懟音墜竒怪之辭以求知於天下亦不悖於教化妖淫諛佞譸張譸音輈張誑也之説無所出於其中四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畒之宫其可懷宫或作宅方云一畒之宫本儒行語公苗蕃志無宫以歸今本亦誤今按二字無大利害公用儒行語亦或有之然謂其專用宮字而不得更用宅字則固矣遑遑乎四海無所歸恤恤乎飢不得食寒不得衣濵於死而益固得其所者爭笑之忽將棄其舊而新是圖求老農老圃而為師悼本志之變化中夜涕泗交頥雖不足當詩人孟子之謂抑長育之使成材其亦可矣教育之使成才其亦可矣子之下或有所字抑又聞古之君子相其君也之字或在君子下或子下别有之字一夫不獲其所若已推而內之溝中今有人生七年而學聖人之道以修其身積二十年不得巳一朝而毀之是亦不獲其所矣十下或有一字伏念今有仁人在上位若不往告之而遂行是果於自棄而不以古之君子之道待吾相也其可乎寧往告焉若不得志則命也其亦行矣志上或有其字今疑志字衍洪範曰凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之二不字方並作弗也而康而色曰豫攸好德汝則錫之福是皆與善之辭也抑又聞古之人有自進者而君子不逆之矣曰豫攸好德汝則錫之福之謂也君上或無而字抑又聞上之設官制祿必求其人而授之者非苟慕其才而富貴其身也方無貴字蓋將用其能理不能用其明理不明者耳下之修已立誠必求其位而居之者非苟沒於利而榮於名也沒或作役方云國語重耳不沒於利主沒貪也蓋將推巳之所餘以濟其不足者耳然則上之於求人下之於求位交相求而一其致焉耳一其致或作其致一苟以是而為心則上之道不必難其下下之道不必難其上可舉而舉焉不必讓其自舉也讓下或有於字可進而進焉不必廉於自進也於下或有其字抑又聞上之化下得其道則勸賞不必遍加乎天下而天下從焉化上方無之字則方作其疑當併有則其字因人之所欲為而遂推之之謂也方作矣今天下不由吏部而仕進者幾希矣主上感傷山林之士有逸遺者屢詔內外之臣旁求於四海而其至者蓋闕焉求下方有儒雅字雅亦或作士豈其無人乎哉亦見國家不以非常之道禮之而不來耳家下方有之字彼之處隱就間者亦人耳其耳目鼻口之所欲其心之所樂其體之所安豈有異於人乎哉今所以惡衣食窮體膚麋鹿之與處猿狖之與居固自以其身不能與時從順俯仰故甘心自絶而不悔焉從方作俗今按後卷與馮宿書云委曲從順向風承意則諸本作從順者固韓公常用之語也方本語意拙澀非是而方聞國家之仕進者必舉於州縣然後升於禮部吏部聞下或有今字試之以繡繪雕琢之文考之以聲勢之逆順章句之短長中其程式者然後得從下士之列雖有化俗之方安邊之畫不繇是而稍進萬不有一得焉進下或有者字彼惟恐入山之不深入林之不密其影響昧昧惟恐聞於人也惟恐或作之恐或無此二字今若聞有以書進宰相而求仕者而宰相不辱焉而薦之天子而爵命之而布其書於四方進或作上而宰而爵或並無而字而復出天子二字方無於字枯稿沈溺魁閎寬通之士必且洋洋焉動其心峨峨焉纓其冠于于焉而來矣此所謂勸賞不必遍加乎天下而天下從焉者也因人之所欲為而遂推之之謂者也伏惟覽詩書孟子之所指念育才錫福之所以考古之君子相其君之道而忘自進自舉之罪思設官制祿之故以誘致山林逸遺之士庶天下之行道者知所歸焉歸上方有依字小子不敢自幸其嘗所著文輒採其可者若干首録在異卷冀辱賜觀焉或無敢字或無冀字冀辱或作伏垂干黷尊嚴伏地待罪愈再拜後十九日復上書二月十六日前鄉貢進士韓愈謹再拜言相公閣下向上書及所著文後待命凡十有九日不得命恐懼不敢逃遁不知所為方無向字及逃字從乃復敢自納於不測之誅以求畢其説而請命於左右愈聞之蹈水火者之求􅊵於人也不惟其父兄子弟之慈愛然後呼而望之也將有介於其側者雖其所憎怨苟不至乎欲其死者則將大其聲疾呼而望其仁之也仁或作人而之下有救字或作人而下無之字今按此若作人之救則正與下句全字為對而下文再疊其語亦以二字相對但覺其語差凡故今且從方本注彼介於其側者聞其聲而見其事不惟其父兄子弟之慈愛然後往而全之也雖有所憎怨苟不至乎欲其死者則將狂奔盡氣濡手足焦毛髮救之而不辭也若是者何哉其勢誠急而其情誠可悲也愈之強學力行有年矣愚不惟道之險夷愚上或有其字而愚下有也字也又或作甚或有其字而無也甚二字行且不息以蹈於窮餓之水火其既危且亟矣大其聲而疾呼矣後草九日復上書三月十六日前鄉貢進士韓愈謹再拜言相公閣下愈聞周公之為輔相其急於見賢也方一食三吐其哺方一沐三捉其髮輔相下或有也字其急或無其字捉或作握也當是時天下之賢才皆巳舉用姦邪讒佞欺負之徒皆巳除去姦下方有人字無欺字非是四海皆巳無虞九夷八蠻之在荒服之外者皆巳賔貢之在或無之字天災時變昆蟲草木之妖皆巳銷息天下之所謂禮樂刑政教化之具皆巳修理風俗皆巳敦厚動植之物風雨霜露之所霑𬒳者皆巳得宜休徴嘉瑞麟鳯龜龍之屬皆巳備至而周公以聖人之才慿叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢於周公而巳豈復有賢於時百執事者哉豈復有所計議能輔於周公之化者哉然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以負成王託周公之意不得於天下之心託周公疑此周公字當是國字意下方有以字如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則將不暇食與沐矣豈特吐哺捉髮為動而止哉維其如是故于今頌成王之德而稱周公之功不衰今閣下為輔相亦近耳天下之賢才豈盡舉用姦邪讒佞欺負之徒豈盡除去方無侫欺字四海豈盡無虞九夷八蠻之在荒服之外者豈盡賔貢天災時變昆蟲草木之妖豈盡銷息天下之所謂禮樂刑政教化之具豈盡修理風俗豈盡敦厚動植之物風雨霜露之所霑𬒳者豈盡得宜休徴嘉瑞麟鳯龜龍之屬豈盡備至其所求進見之士雖不足以希望盛德至比於百執事豈盡出其下哉其所稱説豈盡無所輔哉至比或作如比今雖不能如周公吐哺捉髮亦宜引而進之察其所以而去就之不宜默默而巳也愈之待命四十餘日矣餘日或作日餘書再上而志不得通足三及門而閽人辭焉惟其昏愚不知逃遁故復有周公之説焉閣下其亦察之或無此六字古之士三月不仕則相弔故出疆必載質然所以重於自進者以其於周不可則去之魯於魯不可則去之齊於齊不可則去之宋之鄭之秦之楚也之魯之齊之下或並有於字則去之宋方無則字今天下一君四海一國舍乎此則夷狄矣去父母之邦矣故士之行道者不得於朝則山林而已矣道下一有也字山林者士之所獨善自養而不憂天下者之所能安也如有憂天下之心則不能矣故愈每自進而不知愧焉書亟上足數及門而不知止焉寧獨如此而巳惴惴焉惟不得出大賢之門下是懼亦惟少垂察焉不得上或有恐字瀆冒威尊惶恐無巳威尊或作尊威無巳方作無文非是愈再拜答侯繼書韓曰正元八年繼與公同登進士第十一年公上宰相書不報遂東歸作是書且云懼足下以字退歸因謂不復能自強不息故因書奉曉公時自勵如此此其所以卒為唐儒宗學者仰之如山斗云裴子自城來得足下一書明日又於崔大處得足下陜音閃漢弘農之陜縣州所留書玩而復之不能自休尋知足下不得留僕又為考官所辱欲致一書開足下并自舒其所懷含意連辭將發復巳卒不能成就其説開或作聞及得足下二書凡僕之所欲進於左右者足下皆以自得之方無以字今按以巳通晉宋人書帖多用以字僕雖欲重纍其辭諒無居足下之意外者故絶意不為雖欲或作雖復方無之意二字行自念方當逺去潛深伏隩音郁水內日隩與時丗不相聞行或作亦當或作將隩或作奧或無丗字今按行疑當作復雖足下之思我無所窺尋其聲光故不得不有書為别非復有所感發也僕少好學問自五經之外百氏之書未有聞而不求得而不觀者然其所志惟在其意義所歸至於禮樂之名數隂陽土地星辰方藥之書未嘗一得其門户方無方藥二字雖今之仕進者不要此道然古之人未有不通此而能為大賢君子者子下或有事字者下或有也字僕雖庸愚每讀書輒用自愧今幸不為時所用無朝夕役役之勞將試學焉力不足而後止猶將愈於汲汲於時俗之所爭既不得而怨天尤人者此吾今之志也此句或無今字懼足下以吾退歸因謂我不復能自強不息方無我字故因書奉曉冀足下知吾之退未始不為進而衆人之進未始不為退也或無兩之字不為方並作為不既貨馬即求船東下二事皆不過後月十日有相問者為我謝焉月十日或只作旬字方無我字此下或有愈再拜字答崔立之書斯立足下僕見險不能止動不得時䫟頓狼狽失其所操持困不知變以至辱於再三君子小人之所憫笑天下之所背而馳者也方無至字及也字足下猶復以為可教貶損道德乃至手筆以問之扳援古昔辭義髙逺且進且勸足下之於故舊之道得矣之於上或無之字得下或有之字雖僕亦固望於吾子不敢望於他人者耳然尚有似不相曉者非故欲發余乎不然何子之不以丈夫期我也方無之字不能默默聊復自明自明或作明白僕始年十六七時未知人事讀聖人之書以為人之仕者皆為人耳非有利乎已也及年二十時苦家貧衣食不足謀於所親然後知仕之不唯為人耳及來京師見有舉進士者人多貴之僕誠樂之就求其術或出禮部所試賦詩䇿等以相示賦詩或作詩賦僕以為可無學而能因詣州縣求舉有司者好惡出於其心四舉而後有成亦未即得仕司下或無者字聞吏部有以博學宏辭選者人尤謂之才且得美仕就求其術或出所試文章亦禮部之類私怪其故然猶樂其名因又詣州府求舉凡二試於吏部一既得之而又黜於中書雖不得仕人或謂之能焉退自取所試讀之乃類於徘優者之辭顔忸怩而心不寧者數月退下或有因字類於或作類乎既巳為之則欲有所成就書所謂恥過作非者也所成方無此二字或無所字因復求舉亦無幸焉乃復自疑以為所試與得之者不同其程度及得觀之余亦無甚愧焉夫所謂博學者豈今之所謂者乎夫所謂宏辭者豈今之所謂者乎誠使古之豪傑之士若屈原孟軻司馬遷相如揚雄之徒進于是選必知其懷慙乃不自進而巳耳或無相如二字設使與夫今之善進取者競於蒙昧之中僕必知其辱焉或無進者三字然彼五子者且使生於今之丗其道雖不顯於天下其自負何如哉五或作數生或作出肯與夫斗筲者決得失於一夫之目而為之憂樂哉故凡僕之汲汲於進者其小得蓋欲以具裘葛養窮孤其大得蓋欲以同吾之所樂於人耳具或作完窮孤或作孤窮其他可否自計巳熟誠不待人而後知今足下乃復比之獻玉者以為必俟工人之剖然後見知於天下雖兩刖足不為病且無使勍者再剋誠足下相勉之意厚也玉人或作良工方無見字兩刖或作刖兩刖足下或有而字病方作痛或作疾尅或作刖下同然仕進者豈捨此而無門哉足下謂我必待是而後進者尤非相悉之辭也後進或作後辰尤非方作非尤非是僕之玉固未嘗獻而足固未嘗刖足下無為為我戚戚也或無足下字或無復出為字或併無二為字非是方今天下風俗尚有未及於古者邊境尚有𬒳甲執兵者境或作地或無境字主上不得怡而宰相以為憂僕雖不賢亦且潛究其得失或無其字致之乎吾相薦之乎吾君上希卿大夫之位下猶取一障而乘之若都不可得猶將耕於寬間之野釣於寂寞之濵求國家之遺事考賢人哲士之終始終上或有所字作唐之一經垂之於無窮誅姦諛於既死發潛德之幽光二者將必有一可足下以為僕之玉凡幾獻而足凡幾刖也又所謂勍者果誰哉再尅之刑信如何也册或作形士固信於知巳微足下無以發吾之狂言信或作伸吾下或無之字愈再拜答李翊書六月二十六日或無此六字愈白李生足下生之書辭甚髙而其間何下而恭也而恭或作之恭非是能如是誰不欲告生以其道道德之歸也有日矣況其外之文乎外或作餘非是抑愈所謂望孔子之門牆而不入于其宫者焉足以知是且非邪者下或有也字焉或作鳥雖然不可不為生言之生所謂立言者是也或無者字生所為者與所期者甚似而幾矣抑不知生之志蘄勝於人而取於人邪將蘄至於古之立言者邪取於人或無於字下三語同蘄勝於人而取於人則固勝於人而可取於人矣將蘄至於古之立言者則無望其速成無誘於勢利言者下或有邪字非是養其根而俟其實加其膏而希其光根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也抑又有難者愈之所為不自知其至猶未也至或作志雖然學之二十餘年矣始者非三代兩漢之書不敢觀非聖人之志不敢存餘年方作年餘兩或作秦處若忘行若遺儼乎其若思茫乎其若迷當其取於心而注於手也惟陳言之務去戞戞乎其難哉其觀於人不知其非笑之為非笑也人下或有也字如是者亦有年猶不改然後識古書之正偽與雖正而不至焉者昭昭然白黑分矣而務去之乃徐有得也當其取於心而注於手也汨汨然來矣其觀於人也笑之則以為喜譽之則以為愛以其猶有人之説者存也二則字下或並有心字如是者亦有年然後浩乎其沛然矣吾又懼其雜也迎而距之平心而察之其皆醇也然後肆焉後或作后雖然不可以不養也行之乎仁義之途遊之乎詩書之源無迷其途無絶其源終吾身而巳矣源或作府無絶其源亦作無虛其府氣水也言浮物也水大而物之浮者大小畢浮氣之與言猶是也氣盛則言之短長與聲之髙下者皆宜雖如是其敢自謂幾於成乎雖幾於成其用於人也奚取焉雖然待用於人者其肖於器邪用與舍屬諸人或無邪字而有則時用焉四字或併有邪字君子則不然處心有道行已有方用則施諸人舍則傳諸其徒垂諸文而為後丗法如是者其亦足樂乎其無足樂也施諸或作垂諸也方作乎有志乎古者希矣志乎古必遺乎今吾誠樂而悲之上古字下或有人字亟稱其人所以勸之非敢褒其可褒而貶其可貶也問於愈者多矣念生之言不志乎利聊相為言之愈白重答翊書答下或有李字愈白李生生之自道其志可也其所疑於我者非也人之來者雖其心異於生其於我也皆有意焉君子之於人無不欲其入於善入方從杭本作人非是寧有不可告而告之孰有可進而不進也言辭之不酬禮貌之不答雖孔子不得行於互鄉宜乎余之不為也方從三本無於字非是余或作愈苟來者吾斯進之而巳矣鳥待其禮踰而情過乎雖然生之志求知於我邪求益於我邪其思廣聖人之道邪其欲善其身而使人不可及邪其何汲汲於知而求待之殊也其思上或有求字及邪或作及也賢不肖固有分矣生其急乎其所自立而無患乎人不已知未嘗聞有響大而聲微者也况愈之於生懇懇邪屬有腹疾無聊不果自書屬卞或無有字不下方無果字愈白代張籍與李浙東書或作浙東觀察李中丞或注巽字月日前某官某謹東向再拜寓書浙東觀察使中丞李公閣下寓或作獻或無使字籍聞議論者皆云方今居古方伯連帥之職生一方得專制於其境內者惟閣下心事犖犖與俗輩不同籍固以藏之胸中矣云上方無皆字云下方無方字又無簡字近者閣下從事李協律翶到京師籍於李君友也友上或有朋字不見六七年聞其至馳往省之問無恙外不睱出一言且先賀其得賢主人李君曰子豈盡知之乎吾將盡言之言下無之字數日籍益聞所不聞不聞或作未嘗籍私獨喜常以為自今巳後不復有如古人者於今忽有之巳或作以退自悲不幸兩目不見物無用於天下退下或有而字胸中雖有知識家無錢財寸步不能自致今去李中丞五千里何由致其身於其人之側開口一吐出胸中之竒乎因飲泣不能語人或作身非是方無能字既數日復自奮曰無所能人乃宜以盲廢有所能人雖盲當廢於俗輩不當廢於行古人之道者曰或作目非是所能或並無所字浙水東七州戶不下數十萬不盲者何限十方作百李中丞取人固當問其賢不賢不當計盲與不盲也計下或有其字當今盲於心者皆是若籍自謂獨盲於目爾其心則能别是非若賜之坐而問之其口固能言也别上或有計字是非方作非是幸未死實欲一吐出心中平生所知見閣下能信而致之於門邪方無心中字或無見字致或作置字籍又善於古詩樊日白樂天贈復詩云張君何為者業文三十春亢工樂府詞學代少其倫字使其心不以憂衣食亂閣下無事時一致之座側使跪進其所有閣下慿几而聽之未必不如聽吹竹彈絲𫾣金擊石也於或作為進其或作進籍方云校本一云𫾣當憐敵唐人多使敵字如盧同詩敵金摐玉擊或作材或無之今按方云敵字甚怪所引盧同詩當亦是誤本耳夫盲者業專於藝必口故樂工皆盲諸本專字在必字下今從文苑但文苑必作也而下缺一字疑是精字更詳之籍儻可與此輩比並乎或無籍字或無比乎二字今按並字疑倫使籍誠不以蓄妻子憂飢寒亂心有錢財以濟醫藥其盲未甚庶幾其復見天地日月因得不廢則自今至死之年皆閣下之賜幾下或無其字賜下或有也字閣下濟之以巳絶之年賜之以既盲之視其恩輕重大小籍宜如何報也閣下裁之度之裁下或無之字籍慙見音腆面靣慙再拜答李秀才書李下或有師錫字方注圗南字愈白故友李觀元賔十年之前示愈别吳中故人詩六章其首章則吾子也盛有所稱引元賔行峻潔清其中狹隘不能苞容於尋常人不肯苟有論説因究其所以於是知吾子非庸衆人苞或作包或有復出庸字或作庸庸之衆時吾子在吳中其後愈出在外無因緣相見元賔既殁其文益可貴重思元賔而不見見元賔之所與者則如元賔焉杭本無既沒以下八字非是與方作以仐按方以以與可通用故從杭本作以然孰若從諸本之為正邪今者辱惠書及文章觀其姓名元賔之聲容恍若相接讀其文辭見元賔之知人交道之不汚文辝方從閣杭本作命辝云元賔所命意於辭也今按此文辝指李生所作耳非謂元賔之辝也正使實謂元賔之辝作命辝亦無理甚矣子之心有似於吾元賔也矣或作乎於或作乎子之言以愈所為不違孔子不以琢雕為工將相從於此愈敢自愛其道而以辭讓為事乎然愈之所志於古者不惟其辭之好好其道焉爾讀吾子之辭而得其所用心將復有深於是者與吾子樂之况其外之文乎與或作歟屬上句非是愈頓首答陳生書生下或有啇字或注師錫字愈白陳生足下今之負名譽享顯榮者在上位幾人足下求速化之術不於其人乃以訪愈是所謂借聽於聾求道於盲雖其請之勤勤教之云云未有見其得者也或無有字今按有字或當在此句其字下愈之志在古道又甚好其言辭觀足下之書及十四篇之詩亦云有志於是矣而其所問則名所慕則科故愈疑於其對焉雖然厚意不可虛辱聊為足下誦其所聞蓋君子病乎在已而順乎在天待已以信而事親以誠所謂病乎在已者仁義存乎內彼聖賢者能推而廣之而我蠢焉為衆人蠢焉或作蠢然所謂順乎在天者貴賤窮通之來平吾心而隨順之不以纍于其𥘉謂下閣杭本無順字非是所謂待已以信者已果能之人曰不能勿信也已果不能人曰能之勿信也孰信哉信乎巳而巳矣方從閣杭本無果下至信也十字文録併上已字亦無今按此閣杭本之謬全無文理而方信之誤矣所謂事親以誠者盡其心不夸於外先乎其質後乎其文者也後上或有而字盡其心不夸於外者不以已之得於外者為父母榮也名與位之謂也先乎其質者行也後乎其文者飲食旨甘以其外物供養之道也行上或有文字旨甘或作甘旨道下或有者字非是誠者不欺之名也待於外而後為養薄於質而厚於文斯其不類於欺歟果若是子之汲汲於科名以不得進為親之羞者惑也速化之術如是而巳古之學者惟義之問誠將學於太學愈猶守是説而俟見焉猶或作獨見下或有知字方云見胡甸切公時為博士也愈白與李翺書與或作答使至辱足下書歡愧來并不容于心或無足下字嗟乎子之言意皆是也僕雖巧説何能逃其責邪然皆子之愛我多重我厚不酌時人待我之情而以子之待我之意使我望於時人也僕之家本窮空重遇攻劫衣服無所得養生之具無所有家纍僅三十口攜此將安所歸託乎捨之入京不可也挈之而行不可也足下將安以為我謀哉此句方無將字此一事耳足下謂我入京城有所益乎謂上或有誠字城或作誠僕之有子猶有不知者時人能知我哉之下或有所字持僕所守驅而使奔走伺候公卿間開口論議其安能有以合乎驅方作執今後作驅即屬下句作執即屬上句詳下文亦有復驅之使就其故地之文而待守執三字語太繁復故當以驅為正僕在京城八九年無所取資日求於人以度時月當時行之不覺也今而思之如痛定之人思當痛之時不知何能自處也今年加長矣復驅之使就其故地是亦難矣長下或有巳字非是所貴乎京師者不以明天子在上賢公卿在下布衣韋帶之士談道義者多乎不以上或有得字以僕遑遑於其中能上聞而下逹乎其知我者固少知而相愛不相忌者又加少內無所資外無所從終安所為乎知下或無我字資上方無所字從或作縱嗟乎子之責我誠是也愛我誠多也今天下之人有如子者乎或無今字自堯舜巳耒士有不遇者乎無也子獨安能使我潔清不汙而處其所可樂哉方無處字非不願為子之所云者力不足勢不便故也為或作僕於此豈以為大相知乎纍纍隨行役役逐隊飢而食飽而嬉者也飽而嬉或作飽而悲方從杭本作而悲云悲者悲其不得所從故也皆非是其所以止而不去者以其心誠有愛於僕也然所愛於我者少不知我者猶多吾豈樂於此乎哉將亦有所病而求息於此也所愛或作其爰少上或有尤字非是知下方有於字猶或作尤非是吾下或無豈字嗟乎子誠愛我矣子之所責於我者誠是矣然恐子有時不暇責我而悲我不暇悲我而自責且自悲也及之而後知履之而後難耳孔子稱顔回一簞食一瓢飲人不堪其憂回也不改其樂孔子上或有昔者字瓢飲下或有在陋巷字彼人者有聖者為之依歸而又有簞食瓢飲足以不死其不憂而樂也豈不易哉聖上或無有字依上方無之字若僕無所依歸無簞食無瓢飲無所取資則餓而死其不亦難乎子之聞我言亦悲矣嗟乎子亦愼其所之哉離違久年還侍左右當日􅌚喜故専使馳此候足下意并以自解此候方從杭本作候此今按此與與孟東野書春且持盡相似説巳見於彼矣愈冉拜未文公校昌黎先生集卷之十六
