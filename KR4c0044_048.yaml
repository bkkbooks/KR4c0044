front:
  text: 朱文公校昌黎先生外集卷之六考異音釋附
  hash: sha256:75c1f16e76095d85d8b33b55f673d145588cd3fec94f008053120587aa79cd1c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0044_SBCK_048-1a}
body:
  text: 順宗實録一起藩邸盡貞元二十一年二月方本不載實録云諸本順宗實録皆以附外集然李漢序謂又有注論語十卷傳學者順宗實録五卷列於史書不在集中則知實録固不必附也仐按李漢之説據當時而言之似未為失然其為害巳足使筆解亡逸無復真本實録竄易不成全書是則皆李漢之為也方氏不察而從其説既巳誤矣况今去公之時又益以逺比之當日事體又大不同故其片文隻字名為公之作而決可知其非偽者皆當收拾使無失墜乃為真能好公之文者固不當以一時茍簡之論為限斷而直有所遺也故今於實録姑仍外集而詳加校定庶幾猶足以見公筆削之大指云史臣韓愈撰或無此五字順宗至德大聖大安孝皇帝德下史有弘道二字諱誦德宗長子母曰昭德皇后王氏上元二年正月十二日生大曆十四年封為宣王建中元年立為皇太子史云大曆十四年六月進封宣王十二月乙卯立為皇太子慈孝寬大仁而善斷留心藝學亦微信尚浮屠法禮重師傅引見輒先拜善隸書德宗之為詩并他文賜大臣者率皆令上書之德宗之幸奉天倉卒間上常親執弓矢率軍後先導衛備嘗辛苦倉或作蒼上之為太子於父子間慈孝交洽無嫌每以天下為憂德宗在位久稍不假宰相權而左右得因緣用事外則裴延齡李齊運韋渠牟等以姦佞相次進用延齡尤狡險判度支務刻剝聚斂以自為功天下皆怨怒上每進見候顔色輒言其不可至陸贄張滂李充等以毀譴朝臣􅋏懼諌議大夫陽城等伏閣極論德宗怒甚將加城等罪內外無敢救者上獨開解之城等賴以免德宗卒不相延齡渠牟上有力焉貞元二十一年癸巳德宗崩景申上即位太極殿册曰維貞元二十一年歲次乙酉正月辛未朔二十三日癸己皇帝若曰於戲天下之大實惟重器祖宗之業允屬元良咨爾皇太子誦睿哲溫恭寬仁慈惠文武之道秉自生知孝友之誠發於天性自膺上嗣育德春闈恪愼于厥躬祗勤于大訓必能誕敷至化安勸庶邦朕寢疾彌留弗興弗寤是用命爾繼統俾紹前烈冝陟元后永綏兆人其令中書侍郎平章事髙郢奉册即皇帝位爾惟奉若天道以康四海懋建皇極以熙庶功無忝我髙祖太宗之休命上自二十年九月得風疾因不能言使四面求醫藥天下皆聞知德宗憂戚形于顔色數自臨視二十一年正月朔含元殿受朝還至别殿諸王親屬進賀獨皇太子疾不能朝德宗為之涕泣悲傷歎息因感疾恍惚日益甚二十餘日中外不通兩宫安否朝臣咸憂懼莫知所為雖翰林內臣亦無知者含元殿至日益甚四十一字中云德宗不豫諸王親戚皆侍醫藥獨上卧病不能侍德宗彌留思見太子涕咽久之二十三日上知內外疑紫衣麻鞋不俟正冠出九仙門召見諸軍使京師稍安二十四日宣遺詔上縗服見百寮二十六日即位上學書於王伾頗有寵伾下或有復出丕字王叔文以碁進俱待詔翰林數侍太子碁叔文詭譎多計上在東宫嘗與諸侍讀并叔文論政至宫市事上曰寡人方欲極言之衆皆稱贊獨叔文無言既退上獨留叔文謂曰向者君奚獨無言豈有意邪叔文曰叔文蒙幸太子有所見敢不以聞太子職當侍膳問安不冝言外事陛下在位久如疑太子收人心何以自解上大驚因泣曰非先生寡人無以知此遂大愛幸與王伾兩人相依附俱出入東宫聞德宗大漸上疾不能言伾即入以詔召叔文入坐翰林中使決事詔下或無召字文下或無入字使下或無決字伾以叔文意入言於宦者李忠言稱詔行下外𥘉無知者以檢校司空平章事杜佑攝冡宰兼山陵使中丞武元衡為副使宗正卿李紓為按行山陵地使刑部侍郎鄭雲逵為鹵薄使或無兼字紓或作杼達或作逹又命中書侍郎平章事髙郢撰哀册文禮部侍郎權德輿撰諡册文太常卿許孟容撰議文庚子百寮請聽政曰自漢以來喪期之數以日易月而皆三日而聽政以來或作巳來我國家列聖亦克修奉罔或有違况大行皇帝酌於故實重下遺詔今日至期而陛下未親政事羣臣不敢安宜存大孝以寧萬國天下之幸不許是月升泗州為上州二月辛丑朔中書侍郎平章事臣郢門下侍郎平章事臣珣瑜檢校司空平章事臣佑奉疏曰大行皇帝知陛下孝慮陛下悲哀不即人心聽政事故發遺詔令一行漢氏之制今陛下安得守曽閔匹夫之小行忘皇王繼親之大孝以虧臣子承順之義猶不許壬寅宰臣又上言曰陛下以聖德至孝繼受寶命宜奉先帝約束以時聽斷不可以久從之癸卯朝百寮于紫宸門杜佑前跪進曰陛下居憂過禮羣臣懼焉願一覩聖顔因再拜而起左右乃為皇帝舉帽百寮皆再拜佑復奏曰陛下至性殊常哀毀之甚臣等不勝惶灼伏望為宗廟社稷割哀強食景午罷翰林隂陽星卜醫相覆碁諸待詔三十二人三或作四𥘉王叔文以碁待詔既用事惡其與巳儕類相亂罷之巳酉易定節度使張茂昭可同中書門下平章事餘如故或無使字可史作兼河北節度自至德巳來不常朝覲前年冬茂昭來朝未還故寵之辛亥史作卯詔吏部侍郎韋執誼守左丞同中書門下平章事賜紫侍郎史作郎中左丞史作尚書右丞初執誼為翰林學士知叔文幸於東宫傾心附之叔文亦欲自廣朋黨密與交好至是遂特用為相乙卯太常奏禮云喪三年不祭惟祭天地社稷周禮圜鍾之均六變天神皆降林鍾之均八變地示咸出不廢天地之祭不敢以卑廢尊也樂者所以降神也不以樂則祭不成今遵遺詔行易月之制請制內遇祭輟樂終制用樂從之又奏禮三年祭宗廟今請俟祔廟畢復常從之辛酉貶京兆尹李實為通州長史詔曰實素以宗屬纍更任使驟升班列遂極寵榮而政乖惠和務在苛厲詔下或有詞一道字曰下或有京尹字實丄或有嗣道王字比年旱歉先聖憂人特詔逋科悉皆蠲免而實敢肆誣罔復令徴剝頗紊朝廷之法實惟聚斂之臣歉或作暵自國哀巳來增毒彌甚無辜斃踣深所興嗟朕嗣守洪業敷弘理道寧容蠧政以害齊人宜加貶黜用申邦憲尚從優貸俾佐逺潘實諂事李齊運驟遷至京兆尹恃寵強愎不顧文法文或作乃是時春夏旱京畿乏食實一不以介意方務聚斂徴求以給進奉每奏對輒曰今年雖旱而穀甚好由是租稅皆不免人窮至壞屋賣瓦木貸麥苗以應官或無貸字優人成輔端為謡嘲之實聞之奏輔端誹謗朝政杖殺之實遇侍御史王播於道故事尹與御史相遇尹下道避實不肯避導騎如故播詰讓導騎者實怒遂奏播為三原令廷詬之原或作泉非是陵轢公卿巳下隨喜怒誣奏遷黜朝廷畏忌之陵或作凌嘗有詔免畿內逋租實不行用詔書徴之如𥘉勇於殺害人吏不聊生至譴市里歡呼皆袖瓦礫遮道伺之實由間道獲免壬戍洪云史作寅誤制殿中丞皇太子侍書翰林待詔王伾可守左常侍依前翰林待詔書或作讀依前翰林待詔史作充翰林學士今按前云上學書於王伾後云以侍書得幸於上則此當從史作侍書為是蘇州司功王叔文可起居舍人翰林學士又以司勳貟外郎翰林學士知制誥鄭絪為中書舍人學士如故又以給事中馮伉為兵部侍郎以兵部貟外郎史館修撰歸登為給事中修撰如故登伉皆上在東宫時侍讀以師傳恩拜朱文公校昌黎先生外集卷之六
